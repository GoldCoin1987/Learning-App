<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Squeeze the balloon: push it down here, it bulges there</text>

  <!-- LEFT report card: sharp in range, smeared in speed -->
  <text x="150" y="52" text-anchor="middle" font-weight="bold" fill="#000">Sharpen range...</text>
  <rect x="40" y="62" width="220" height="170" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <!-- center lines -->
  <line x1="150" y1="62" x2="150" y2="232" stroke="#000" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="40" y1="147" x2="260" y2="147" stroke="#000" stroke-width="0.5" stroke-dasharray="2 3"/>
  <!-- narrow in range (tall thin vertical blob), wide in speed (spread sideways) -->
  <ellipse cx="150" cy="147" rx="60" ry="14" fill="#000" opacity="0.30"/>
  <ellipse cx="150" cy="147" rx="46" ry="9" fill="#000" opacity="0.45"/>
  <text x="150" y="218" text-anchor="middle" fill="#000">tight up-down (range)</text>
  <text x="150" y="120" text-anchor="middle" fill="#000">but spread sideways</text>
  <text x="150" y="106" text-anchor="middle" fill="#000">(speed bulges out)</text>

  <!-- RIGHT report card: sharp in speed, smeared in range -->
  <text x="410" y="52" text-anchor="middle" font-weight="bold" fill="#000">...or sharpen speed</text>
  <rect x="300" y="62" width="220" height="170" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="410" y1="62" x2="410" y2="232" stroke="#000" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="300" y1="147" x2="520" y2="147" stroke="#000" stroke-width="0.5" stroke-dasharray="2 3"/>
  <!-- narrow in speed (thin vertical line), wide in range (spread up-down) -->
  <ellipse cx="410" cy="147" rx="14" ry="60" fill="#000" opacity="0.30"/>
  <ellipse cx="410" cy="147" rx="9" ry="46" fill="#000" opacity="0.45"/>
  <text x="460" y="151" text-anchor="middle" fill="#000">tight sideways</text>
  <text x="460" y="167" text-anchor="middle" fill="#000">(speed)</text>
  <text x="410" y="224" text-anchor="middle" fill="#000">but spread up-down (range bulges)</text>

  <!-- shared axis note -->
  <text x="280" y="252" text-anchor="middle" fill="#000">(both cards: across = speed error, up/down = range error)</text>

  <!-- takeaway box -->
  <rect x="40" y="266" width="480" height="84" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">The smear has to go somewhere. There is a fixed 'budget'</text>
  <text x="280" y="308" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">of fuzziness you can only move around, never delete.</text>
  <text x="280" y="332" text-anchor="middle" fill="#000">Sharpen one axis and the response bulges out along the other.</text>
</svg>
