<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="600" height="360" fill="#ffffff"/>
  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Two ways to teach a radar what a drone looks like</text>

  <!-- LEFT: hand-written rules (hard) -->
  <rect x="25" y="48" width="255" height="240" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="152" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Hand-write the rules</text>
  <text x="152" y="88" text-anchor="middle" fill="#000">(HARD)</text>

  <text x="40" y="116" fill="#000">IF echo wiggle &gt; X ...</text>
  <text x="40" y="138" fill="#000">AND rotor buzz near Y ...</text>
  <text x="40" y="160" fill="#000">AND size between A and B ...</text>
  <text x="40" y="182" fill="#000">AND not a bird because ...?</text>
  <text x="40" y="204" fill="#000">AND not weather because ...?</text>

  <text x="152" y="236" text-anchor="middle" font-weight="bold" fill="#000">endless special cases</text>
  <!-- frustrated face -->
  <circle cx="152" cy="258" r="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="146" cy="254" r="1.6" fill="#000"/>
  <circle cx="158" cy="254" r="1.6" fill="#000"/>
  <path d="M144 266 Q152 260 160 266" fill="none" stroke="#000" stroke-width="2"/>

  <!-- RIGHT: learned from examples -->
  <rect x="320" y="48" width="255" height="240" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="447" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Show labeled examples</text>
  <text x="447" y="88" text-anchor="middle" fill="#000">(the ML way)</text>

  <!-- labeled return chips -->
  <rect x="338" y="104" width="70" height="30" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="373" y="123" text-anchor="middle" fill="#000">drone</text>
  <rect x="418" y="104" width="70" height="30" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="453" y="123" text-anchor="middle" fill="#000">bird</text>
  <rect x="338" y="140" width="70" height="30" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="373" y="159" text-anchor="middle" fill="#000">bird</text>
  <rect x="418" y="140" width="70" height="30" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="453" y="159" text-anchor="middle" fill="#000">drone</text>
  <text x="498" y="140" fill="#000">...</text>
  <text x="447" y="186" text-anchor="middle" fill="#000">thousands of labeled returns</text>

  <!-- arrow to model -->
  <line x1="447" y1="192" x2="447" y2="212" stroke="#000" stroke-width="2" marker-end="url(#ah1)"/>
  <rect x="372" y="214" width="150" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="447" y="236" text-anchor="middle" font-weight="bold" fill="#000">model LEARNS the pattern</text>
  <!-- happy face -->
  <circle cx="447" cy="266" r="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="441" cy="262" r="1.6" fill="#000"/>
  <circle cx="453" cy="262" r="1.6" fill="#000"/>
  <path d="M439 268 Q447 276 455 268" fill="none" stroke="#000" stroke-width="2"/>

  <defs>
    <marker id="ah1" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 z" fill="#000"/>
    </marker>
  </defs>

  <!-- takeaway box -->
  <rect x="25" y="306" width="550" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="300" y="324" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Some distinctions are easy to state but hard to hand-code.</text>
  <text x="300" y="341" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">ML learns them from many labeled examples instead.</text>
</svg>
