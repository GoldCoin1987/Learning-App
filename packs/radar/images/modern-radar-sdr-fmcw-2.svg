<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Cost and size collapsed: room-sized radar to a fingertip</text>

  <!-- LEFT: old big box radar -->
  <text x="160" y="54" text-anchor="middle" font-weight="bold" fill="#000">THEN: huge, costly, specialized</text>
  <rect x="80" y="70" width="160" height="120" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="160" y="120" text-anchor="middle" fill="#000">big radar</text>
  <text x="160" y="138" text-anchor="middle" fill="#000">cabinet</text>
  <!-- dish on top -->
  <path d="M110,70 A50 30 0 0 1 210 70" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="160" y1="70" x2="160" y2="52" stroke="#000" stroke-width="2"/>
  <text x="160" y="208" text-anchor="middle" fill="#000">warships, airports</text>

  <!-- arrow -->
  <line x1="252" y1="130" x2="320" y2="130" stroke="#000" stroke-width="3" marker-end="url(#arr2)"/>
  <text x="286" y="120" text-anchor="middle" fill="#000">shrank</text>
  <text x="286" y="148" text-anchor="middle" fill="#000">to</text>

  <!-- RIGHT: tiny options -->
  <text x="480" y="54" text-anchor="middle" font-weight="bold" fill="#000">NOW: tiny, cheap, everywhere</text>

  <!-- SDR + laptop -->
  <rect x="360" y="74" width="70" height="36" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="395" y="96" text-anchor="middle" fill="#000">SDR</text>
  <text x="395" y="124" text-anchor="middle" fill="#000">+ a laptop</text>

  <!-- fingertip with chip -->
  <path d="M470,118 Q500,70 530,118 L530,150 Q500,160 470,150 Z" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="500" y="178" text-anchor="middle" fill="#000">a fingertip</text>
  <rect x="490" y="92" width="20" height="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="500" y="106" text-anchor="middle" font-size="9" fill="#000">chip</text>
  <text x="556" y="98" text-anchor="middle" fill="#000">FMCW</text>
  <text x="556" y="112" text-anchor="middle" fill="#000">radar</text>
  <text x="556" y="126" text-anchor="middle" fill="#000">chip</text>

  <!-- takeaway -->
  <rect x="60" y="220" width="520" height="124" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="320" y="246" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Same principles from this whole course - now on a chip or a laptop.</text>
  <text x="320" y="272" text-anchor="middle" fill="#000">Because it got cheap and small, radar spread out of elite labs</text>
  <text x="320" y="290" text-anchor="middle" fill="#000">and into cars, homes, and the hands of hobbyists.</text>
  <text x="320" y="316" text-anchor="middle" fill="#000">And because so much is software, features can improve with updates.</text>
  <text x="320" y="336" text-anchor="middle" fill="#000">A cheap dongle does NOT rival a warship radar - it is for learning and short range.</text>

  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
