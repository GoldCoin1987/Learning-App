<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The basic conflict: short pulse vs long pulse</text>

  <!-- LEFT: short pulse -->
  <text x="155" y="56" text-anchor="middle" font-weight="bold" fill="#000">SHORT pulse</text>
  <!-- the transmitted pulse: a narrow tall block -->
  <line x1="40" y1="120" x2="270" y2="120" stroke="#000" stroke-width="1"/>
  <rect x="120" y="86" width="14" height="34" fill="#000"/>
  <text x="155" y="138" text-anchor="middle" fill="#000">time</text>
  <text x="127" y="80" text-anchor="middle" fill="#000">brief, sharp</text>
  <!-- two close targets resolved as two blips -->
  <line x1="40" y1="200" x2="270" y2="200" stroke="#000" stroke-width="2"/>
  <text x="155" y="218" text-anchor="middle" fill="#000">distance</text>
  <polyline points="60,200 110,200 120,162 130,200 175,200 185,162 195,200 250,200" stroke="#000" stroke-width="2" fill="none"/>
  <text x="155" y="240" text-anchor="middle" font-weight="bold" fill="#000">TWO blips (fine detail)</text>
  <text x="155" y="258" text-anchor="middle" fill="#000">but little energy: cannot see far</text>

  <!-- divider -->
  <line x1="285" y1="50" x2="285" y2="265" stroke="#000" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- RIGHT: long pulse -->
  <text x="415" y="56" text-anchor="middle" font-weight="bold" fill="#000">LONG pulse</text>
  <line x1="300" y1="120" x2="530" y2="120" stroke="#000" stroke-width="1"/>
  <rect x="340" y="86" width="150" height="34" fill="#000"/>
  <text x="415" y="138" text-anchor="middle" fill="#000">time</text>
  <text x="415" y="80" text-anchor="middle" fill="#000">long, lots of energy</text>
  <!-- two close targets merged into one blob -->
  <line x1="300" y1="200" x2="530" y2="200" stroke="#000" stroke-width="2"/>
  <text x="415" y="218" text-anchor="middle" fill="#000">distance</text>
  <path d="M320 200 C 380 150, 450 150, 510 200" stroke="#000" stroke-width="2" fill="none"/>
  <text x="415" y="240" text-anchor="middle" font-weight="bold" fill="#000">ONE blob (blurred)</text>
  <text x="415" y="258" text-anchor="middle" fill="#000">lots of energy: sees far</text>

  <!-- takeaway box -->
  <rect x="55" y="286" width="450" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="308" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Short = fine detail but weak. Long = strong but blurry.</text>
  <text x="280" y="330" text-anchor="middle" fill="#000">Like a camera: a quick flash freezes detail; a long exposure is bright but blurs.</text>
</svg>
