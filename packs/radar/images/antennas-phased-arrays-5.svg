<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Why phased arrays win: hop beams, null a jammer</text>

  <!-- flat array panel at bottom center -->
  <rect x="262" y="296" width="36" height="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="270" cy="306" r="3" fill="#000"/>
  <circle cx="280" cy="306" r="3" fill="#000"/>
  <circle cx="290" cy="306" r="3" fill="#000"/>
  <text x="280" y="332" text-anchor="middle" fill="#000" font-size="11">phased array</text>

  <!-- beam 1 to target A (up-left) -->
  <polygon points="280,296 150,150 185,138" fill="#000" opacity="0.15" stroke="#000" stroke-width="1.5"/>
  <circle cx="160" cy="140" r="7" fill="#000"/>
  <text x="150" y="126" text-anchor="middle" fill="#000">target 1</text>

  <!-- beam 2 to target B (straight up) -->
  <polygon points="280,296 268,120 296,120" fill="#000" opacity="0.15" stroke="#000" stroke-width="1.5"/>
  <circle cx="282" cy="112" r="7" fill="#000"/>
  <text x="282" y="100" text-anchor="middle" fill="#000">target 2</text>

  <!-- beam 3 to target C (up-right) -->
  <polygon points="280,296 400,160 372,140" fill="#000" opacity="0.15" stroke="#000" stroke-width="1.5"/>
  <circle cx="396" cy="150" r="7" fill="#000"/>
  <text x="406" y="138" text-anchor="middle" fill="#000">target 3</text>

  <text x="120" y="200" text-anchor="middle" fill="#000" font-size="11">beam hops between</text>
  <text x="120" y="216" text-anchor="middle" fill="#000" font-size="11">many targets, instantly</text>

  <!-- NULL toward jammer (far right), dashed -->
  <line x1="280" y1="296" x2="500" y2="200" stroke="#000" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="500" y="232" text-anchor="middle" fill="#000" font-weight="bold">NULL</text>
  <text x="500" y="248" text-anchor="middle" fill="#000" font-size="11">(blind spot)</text>
  <text x="500" y="188" text-anchor="middle" font-weight="bold" fill="#000">jammer</text>
  <text x="455" y="208" text-anchor="middle" fill="#000" font-size="11">aim a blind spot here</text>

  <!-- takeaway box -->
  <rect x="40" y="326" width="480" height="28" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Track many targets, form many beams, and null interference.</text>
</svg>
