<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Range is sharp, but cross-range smears far away</text>

  <!-- radar on the left -->
  <rect x="30" y="176" width="18" height="28" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="39" y="220" text-anchor="middle" fill="#000">radar</text>

  <!-- the widening beam wedge -->
  <polygon points="48,190 500,96 500,284" fill="#000" opacity="0.10" stroke="#000" stroke-width="1.5"/>

  <!-- centre line of the beam (the 'along the beam' / range direction) -->
  <line x1="48" y1="190" x2="500" y2="190" stroke="#000" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- RANGE direction arrow (along the beam) -->
  <line x1="120" y1="150" x2="260" y2="150" stroke="#000" stroke-width="2"/>
  <polygon points="260,150 246,144 246,156" fill="#000"/>
  <text x="190" y="140" text-anchor="middle" font-weight="bold" fill="#000">RANGE (along beam)</text>
  <text x="190" y="166" text-anchor="middle" fill="#000" font-size="11">fine: timing splits near/far</text>

  <!-- near: narrow, so two close points are separate -->
  <circle cx="150" cy="178" r="4" fill="#000"/>
  <circle cx="150" cy="202" r="4" fill="#000"/>
  <text x="150" y="240" text-anchor="middle" fill="#000" font-size="11">near: beam</text>
  <text x="150" y="254" text-anchor="middle" fill="#000" font-size="11">is thin</text>

  <!-- CROSS-RANGE direction (across the beam) far away -->
  <line x1="470" y1="100" x2="470" y2="280" stroke="#000" stroke-width="2"/>
  <polygon points="470,100 464,114 476,114" fill="#000"/>
  <polygon points="470,280 464,266 476,266" fill="#000"/>
  <text x="470" y="312" text-anchor="middle" font-weight="bold" fill="#000">CROSS-RANGE</text>
  <text x="470" y="328" text-anchor="middle" fill="#000" font-size="11">(across beam)</text>

  <!-- far: two points side by side blur together inside the wide beam -->
  <circle cx="455" cy="150" r="4" fill="#000"/>
  <circle cx="455" cy="230" r="4" fill="#000"/>
  <text x="360" y="135" text-anchor="middle" fill="#000" font-size="11">far away the beam is wide,</text>
  <text x="360" y="150" text-anchor="middle" fill="#000" font-size="11">so side-by-side points</text>
  <text x="360" y="165" text-anchor="middle" fill="#000" font-size="11">blur into one blob</text>

  <!-- takeaway box -->
  <rect x="40" y="334" width="480" height="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">A real antenna's beam is too wide far off to make a sharp side-to-side picture.</text>
</svg>
