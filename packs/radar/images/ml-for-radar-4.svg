<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="620" height="360" fill="#ffffff"/>
  <text x="310" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Honest cautions about radar ML</text>

  <!-- LEFT: needs lots of labeled data -->
  <rect x="25" y="48" width="270" height="230" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="160" y="70" text-anchor="middle" font-weight="bold" fill="#000">1. Hungry for labeled data</text>

  <!-- big stack of labeled examples -->
  <g stroke="#000" stroke-width="1.5" fill="#ffffff">
    <rect x="60" y="92" width="200" height="22"/>
    <rect x="60" y="118" width="200" height="22"/>
    <rect x="60" y="144" width="200" height="22"/>
    <rect x="60" y="170" width="200" height="22"/>
  </g>
  <text x="160" y="107" text-anchor="middle" fill="#000">labeled return: drone</text>
  <text x="160" y="133" text-anchor="middle" fill="#000">labeled return: bird</text>
  <text x="160" y="159" text-anchor="middle" fill="#000">labeled return: person</text>
  <text x="160" y="185" text-anchor="middle" fill="#000">... thousands more ...</text>
  <text x="160" y="214" text-anchor="middle" fill="#000">radar data is scarce and</text>
  <text x="160" y="230" text-anchor="middle" fill="#000">expensive to collect + label</text>
  <text x="160" y="256" text-anchor="middle" font-style="italic" fill="#000">no data, no learning</text>

  <!-- RIGHT: fails on unseen condition -->
  <rect x="325" y="48" width="270" height="230" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="460" y="70" text-anchor="middle" font-weight="bold" fill="#000">2. Fails on the unseen</text>

  <text x="345" y="96" fill="#000">trained on: clear weather</text>
  <!-- trained-ok box -->
  <rect x="345" y="104" width="230" height="34" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="460" y="125" text-anchor="middle" fill="#000">new heavy rain it never saw</text>
  <!-- X over it -->
  <line x1="345" y1="104" x2="575" y2="138" stroke="#000" stroke-width="2"/>
  <line x1="575" y1="104" x2="345" y2="138" stroke="#000" stroke-width="2"/>
  <text x="460" y="160" text-anchor="middle" fill="#000">can guess WRONG - and</text>
  <text x="460" y="176" text-anchor="middle" fill="#000">stay confident (fails quietly)</text>

  <!-- backstop note -->
  <rect x="345" y="196" width="230" height="64" fill="#ffffff" stroke="#000" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="460" y="218" text-anchor="middle" font-weight="bold" fill="#000">Safety-critical?</text>
  <text x="460" y="236" text-anchor="middle" fill="#000">keep classic methods</text>
  <text x="460" y="252" text-anchor="middle" fill="#000">(CFAR, matched filter) as a backstop</text>

  <!-- takeaway box -->
  <rect x="25" y="296" width="570" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="310" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Also beware data leakage: the same target/session in train AND test fakes high accuracy.</text>
  <text x="310" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">ML complements the physics-based processing - it does not magically replace it.</text>
</svg>
