<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="580" height="360" fill="#ffffff"/>
  <text x="290" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Jittery blips over many scans become one smooth TRACK</text>

  <!-- axes -->
  <line x1="55" y1="55" x2="55" y2="250" stroke="#000" stroke-width="2"/>
  <text x="55" y="46" text-anchor="middle" fill="#000">position (up/down)</text>
  <line x1="55" y1="250" x2="545" y2="250" stroke="#000" stroke-width="2"/>
  <text x="300" y="268" text-anchor="middle" fill="#000">time: scan 1, 2, 3, ... &#8594;</text>

  <!-- smooth fitted track line through the noisy blips -->
  <polyline points="80,210 150,192 220,174 290,156 360,138 430,120 500,102" stroke="#000" stroke-width="2.5" fill="none"/>
  <text x="500" y="92" text-anchor="middle" font-weight="bold" fill="#000">smooth TRACK</text>
  <text x="500" y="115" text-anchor="middle" fill="#000">(the path)</text>

  <!-- raw noisy blips scattered around the line (hollow circles) -->
  <g stroke="#000" stroke-width="1.5" fill="#ffffff">
    <circle cx="80" cy="200" r="5"/>
    <circle cx="150" cy="202" r="5"/>
    <circle cx="220" cy="166" r="5"/>
    <circle cx="290" cy="166" r="5"/>
    <circle cx="360" cy="128" r="5"/>
    <circle cx="500" cy="110" r="5"/>
  </g>
  <text x="150" y="224" text-anchor="middle" fill="#000">raw blips bounce around</text>

  <!-- a MISSED scan: dashed gap, no blip at scan 6 -->
  <line x1="430" y1="250" x2="430" y2="60" stroke="#000" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="430" y="72" text-anchor="middle" font-weight="bold" fill="#000">missed</text>
  <text x="430" y="86" text-anchor="middle" fill="#000">(no blip)</text>

  <!-- a FALSE blip far off the line -->
  <circle cx="255" cy="95" r="5" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <text x="255" y="86" text-anchor="middle" font-weight="bold" fill="#000">false blip</text>

  <!-- takeaway box -->
  <rect x="35" y="304" width="510" height="46" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="290" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">A track is the whole path over time - NOT a single blip.</text>
  <text x="290" y="339" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Like following one runner through a crowd across many photos.</text>
</svg>
