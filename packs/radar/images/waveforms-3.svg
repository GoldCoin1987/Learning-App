<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A chirp: frequency sweeps low to high during the pulse</text>

  <!-- TOP: the waveform itself, wiggles getting closer together -->
  <text x="280" y="56" text-anchor="middle" font-weight="bold" fill="#000">The transmitted 'chirp' (like a rising whistle)</text>
  <line x1="50" y1="120" x2="520" y2="120" stroke="#000" stroke-width="1"/>
  <text x="525" y="124" text-anchor="start" fill="#000">time</text>
  <!-- wiggle that compresses left to right -->
  <polyline points="55,120 70,94 86,120 102,96 118,120 135,99 152,120 170,103 188,120 206,108 224,120 240,112 256,120 270,115 284,120 296,116 310,120 322,117 334,120 345,118 356,120 366,119 376,120 386,119 396,120 406,119 416,120" stroke="#000" stroke-width="1.8" fill="none"/>
  <text x="100" y="146" text-anchor="middle" fill="#000">low frequency</text>
  <text x="380" y="146" text-anchor="middle" fill="#000">high frequency</text>

  <!-- MIDDLE: frequency-vs-time ramp -->
  <text x="280" y="186" text-anchor="middle" font-weight="bold" fill="#000">Frequency rising steadily over the pulse</text>
  <line x1="80" y1="270" x2="80" y2="206" stroke="#000" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="74" y="206" text-anchor="end" fill="#000">frequency</text>
  <line x1="80" y1="270" x2="480" y2="270" stroke="#000" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="485" y="274" text-anchor="start" fill="#000">time</text>
  <!-- the rising ramp -->
  <line x1="90" y1="262" x2="460" y2="214" stroke="#000" stroke-width="2"/>
  <!-- a marked moment -->
  <line x1="275" y1="270" x2="275" y2="238" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="275" cy="238" r="3" fill="#000"/>
  <text x="285" y="232" text-anchor="start" fill="#000">each moment is 'tagged' by its frequency</text>

  <!-- takeaway box -->
  <rect x="55" y="288" width="450" height="58" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Because each part of the pulse has its own frequency,</text>
  <text x="280" y="332" text-anchor="middle" fill="#000">the receiver can line the parts up and squeeze them into a sharp peak.</text>

  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
