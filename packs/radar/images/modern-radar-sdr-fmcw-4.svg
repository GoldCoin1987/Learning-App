<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="380" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">One tiny FMCW radar chip, many everyday jobs</text>

  <!-- center chip -->
  <rect x="280" y="160" width="80" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="320" y="186" text-anchor="middle" font-weight="bold" fill="#000">FMCW</text>
  <text x="320" y="202" text-anchor="middle" font-weight="bold" fill="#000">radar chip</text>
  <text x="320" y="216" text-anchor="middle" font-size="9" fill="#000">tx + rx + antennas</text>

  <!-- spokes -->
  <line x1="280" y1="170" x2="170" y2="100" stroke="#000" stroke-width="2" marker-end="url(#arr4)"/>
  <line x1="360" y1="170" x2="470" y2="100" stroke="#000" stroke-width="2" marker-end="url(#arr4)"/>
  <line x1="280" y1="210" x2="170" y2="290" stroke="#000" stroke-width="2" marker-end="url(#arr4)"/>
  <line x1="360" y1="210" x2="470" y2="290" stroke="#000" stroke-width="2" marker-end="url(#arr4)"/>

  <!-- CAR -->
  <rect x="60" y="62" width="120" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="84" text-anchor="middle" font-weight="bold" fill="#000">in cars</text>
  <text x="120" y="100" text-anchor="middle" fill="#000">cruise control,</text>
  <text x="120" y="114" text-anchor="middle" fill="#000">blind-spot, braking</text>

  <!-- INDUSTRY -->
  <rect x="460" y="62" width="120" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="520" y="84" text-anchor="middle" font-weight="bold" fill="#000">in industry</text>
  <text x="520" y="100" text-anchor="middle" fill="#000">tank-level gauge</text>
  <text x="520" y="114" text-anchor="middle" fill="#000">(how full a tank is)</text>

  <!-- HOME -->
  <rect x="60" y="270" width="120" height="64" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="292" text-anchor="middle" font-weight="bold" fill="#000">in homes</text>
  <text x="120" y="308" text-anchor="middle" fill="#000">presence / fall</text>
  <text x="120" y="322" text-anchor="middle" fill="#000">sensing (no camera)</text>

  <!-- GESTURE -->
  <rect x="460" y="270" width="120" height="64" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="520" y="292" text-anchor="middle" font-weight="bold" fill="#000">gestures</text>
  <text x="520" y="308" text-anchor="middle" fill="#000">wave a hand to</text>
  <text x="520" y="322" text-anchor="middle" fill="#000">control a device</text>

  <!-- takeaway -->
  <rect x="120" y="346" width="400" height="28" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="320" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Tiny, cheap, low-power - so radar is now all around us.</text>

  <defs>
    <marker id="arr4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
