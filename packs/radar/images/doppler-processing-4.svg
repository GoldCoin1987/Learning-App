<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The range-Doppler map: movers stand out from the still pile</text>

  <!-- grid box -->
  <rect x="120" y="58" width="320" height="210" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- faint grid -->
  <line x1="200" y1="58" x2="200" y2="268" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="280" y1="58" x2="280" y2="268" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="360" y1="58" x2="360" y2="268" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="120" y1="110" x2="440" y2="110" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="120" y1="163" x2="440" y2="163" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="120" y1="216" x2="440" y2="216" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>

  <!-- zero-speed column marker -->
  <line x1="160" y1="58" x2="160" y2="268" stroke="#000" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="160" y="284" text-anchor="middle" fill="#000">0</text>

  <!-- tall clutter ridge AT zero speed (a column of solid bars) -->
  <rect x="150" y="62" width="20" height="202" fill="#000" opacity="0.30"/>
  <text x="160" y="50" text-anchor="middle" font-weight="bold" fill="#000">clutter ridge</text>
  <text x="160" y="304" text-anchor="middle" fill="#000">(stationary stuff piles up at zero speed)</text>

  <!-- moving targets: bright spots away from zero -->
  <circle cx="300" cy="120" r="8" fill="#000"/>
  <text x="300" y="108" text-anchor="middle" fill="#000">target A</text>
  <circle cx="380" cy="210" r="8" fill="#000"/>
  <text x="380" y="232" text-anchor="middle" fill="#000">target B</text>

  <!-- axes labels -->
  <text x="280" y="324" text-anchor="middle" font-weight="bold" fill="#000">speed (Doppler) &#8594;</text>
  <text x="104" y="163" text-anchor="middle" font-weight="bold" fill="#000" transform="rotate(-90 104 163)">range &#8594;</text>

  <!-- takeaway box -->
  <rect x="55" y="332" width="450" height="24" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="349" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Still clutter sits at zero speed; movers glow away from it, at their own range and speed.</text>
</svg>
