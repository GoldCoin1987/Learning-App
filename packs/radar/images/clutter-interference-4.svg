<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Two kinds of jamming</text>

  <!-- LEFT: NOISE JAMMING -->
  <rect x="20" y="44" width="250" height="262" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="145" y="66" text-anchor="middle" font-weight="bold" fill="#000">NOISE JAMMING</text>
  <text x="145" y="83" text-anchor="middle" fill="#000">raise the noise floor, hide targets</text>

  <!-- axes left -->
  <line x1="50" y1="100" x2="50" y2="250" stroke="#000" stroke-width="2"/>
  <text x="50" y="96" text-anchor="middle" fill="#000" font-size="11">strength</text>
  <line x1="50" y1="250" x2="250" y2="250" stroke="#000" stroke-width="2"/>
  <!-- high noisy floor -->
  <polyline points="55,210 70,200 85,214 100,202 115,212 130,205 145,214 160,201 175,213 190,204 205,212 220,206 235,213" stroke="#000" stroke-width="1.5" fill="none"/>
  <line x1="50" y1="218" x2="250" y2="218" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="150" y="190" text-anchor="middle" fill="#000">LOUD raised noise floor</text>
  <!-- buried target -->
  <circle cx="150" cy="225" r="5" fill="#000"/>
  <text x="150" y="270" text-anchor="middle" fill="#000">real target buried in the noise</text>

  <!-- RIGHT: DECEPTION JAMMING -->
  <rect x="290" y="44" width="250" height="262" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="415" y="66" text-anchor="middle" font-weight="bold" fill="#000">DECEPTION JAMMING</text>
  <text x="415" y="83" text-anchor="middle" fill="#000">send back FAKE echoes</text>

  <!-- radar scope right -->
  <circle cx="415" cy="180" r="80" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="415" y1="100" x2="415" y2="260" stroke="#000" stroke-width="1"/>
  <line x1="335" y1="180" x2="495" y2="180" stroke="#000" stroke-width="1"/>
  <!-- real blip -->
  <circle cx="445" cy="150" r="5" fill="#000"/>
  <text x="470" y="138" text-anchor="middle" fill="#000">real</text>
  <!-- ghost blips -->
  <circle cx="380" cy="210" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="430" cy="225" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="390" cy="150" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="415" y="278" text-anchor="middle" fill="#000">hollow = FAKE ghost targets</text>

  <!-- takeaway box -->
  <rect x="40" y="320" width="480" height="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Noise jamming hides targets; deception jamming invents fake ones.</text>
</svg>
