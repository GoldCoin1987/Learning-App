<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="580" height="360" fill="#ffffff"/>
  <text x="290" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A track's life: initiate -&gt; maintain -&gt; coast -&gt; drop</text>

  <!-- timeline axis -->
  <line x1="40" y1="140" x2="545" y2="140" stroke="#000" stroke-width="2"/>
  <polygon points="545,140 533,134 533,146" fill="#000"/>
  <text x="300" y="172" text-anchor="middle" fill="#000">scans over time &#8594;</text>

  <!-- scan ticks with blips: hits (filled), miss (hollow/none) -->
  <!-- INITIATE: a few hits in a row -->
  <circle cx="80" cy="140" r="6" fill="#000"/>
  <circle cx="120" cy="140" r="6" fill="#000"/>
  <circle cx="160" cy="140" r="6" fill="#000"/>
  <text x="120" y="108" text-anchor="middle" font-weight="bold" fill="#000">INITIATE</text>
  <text x="120" y="122" text-anchor="middle" fill="#000">a few hits in a row</text>

  <!-- MAINTAIN: keep getting hits -->
  <circle cx="210" cy="140" r="6" fill="#000"/>
  <circle cx="250" cy="140" r="6" fill="#000"/>
  <circle cx="290" cy="140" r="6" fill="#000"/>
  <text x="250" y="195" text-anchor="middle" font-weight="bold" fill="#000">MAINTAIN</text>
  <text x="250" y="209" text-anchor="middle" fill="#000">update each scan</text>

  <!-- COAST: a brief miss (hollow) -->
  <circle cx="340" cy="140" r="6" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <text x="340" y="108" text-anchor="middle" font-weight="bold" fill="#000">COAST</text>
  <text x="340" y="122" text-anchor="middle" fill="#000">brief miss - keep</text>
  <text x="340" y="220" text-anchor="middle" fill="#000">predicting</text>
  <!-- reappears -->
  <circle cx="380" cy="140" r="6" fill="#000"/>
  <text x="380" y="220" text-anchor="middle" fill="#000">reappears</text>

  <!-- DROP: gone too long (several hollow) -->
  <circle cx="430" cy="140" r="6" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <circle cx="470" cy="140" r="6" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <circle cx="510" cy="140" r="6" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <text x="470" y="108" text-anchor="middle" font-weight="bold" fill="#000">DROP</text>
  <text x="470" y="122" text-anchor="middle" fill="#000">gone too long</text>
  <line x1="495" y1="125" x2="525" y2="95" stroke="#000" stroke-width="2"/>
  <line x1="525" y1="125" x2="495" y2="95" stroke="#000" stroke-width="2"/>

  <!-- legend -->
  <circle cx="70" cy="252" r="6" fill="#000"/>
  <text x="82" y="256" text-anchor="start" fill="#000">hit (blip seen)</text>
  <circle cx="220" cy="252" r="6" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <text x="232" y="256" text-anchor="start" fill="#000">miss (no blip)</text>

  <!-- takeaway box -->
  <rect x="35" y="288" width="510" height="62" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="290" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Start following once a target is really there; coast through brief misses;</text>
  <text x="290" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">give up (delete) if it stays gone. Tracks DO need deleting.</text>
  <text x="290" y="342" text-anchor="middle" font-size="11" fill="#000">Like deciding to follow someone, then giving up if they vanish for a while.</text>
</svg>
