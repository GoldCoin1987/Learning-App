<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="620" height="360" fill="#ffffff"/>
  <text x="310" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Micro-Doppler signatures: moving PARTS leave a rhythm</text>
  <text x="310" y="40" text-anchor="middle" font-size="11" fill="#000">each is a time (across) vs Doppler/speed (up) picture, like a spectrogram</text>

  <!-- PANEL 1: walking person -->
  <rect x="25" y="58" width="180" height="180" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="115" y="78" text-anchor="middle" font-weight="bold" fill="#000">walking person</text>
  <!-- steady main body line -->
  <line x1="40" y1="160" x2="190" y2="160" stroke="#000" stroke-width="2.5"/>
  <text x="196" y="163" fill="#000"></text>
  <!-- swinging-limb sine wiggles above and below -->
  <path d="M40 160 Q55 120 70 160 Q85 200 100 160 Q115 120 130 160 Q145 200 160 160 Q175 120 190 160" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="115" y="100" text-anchor="middle" fill="#000">swinging arms/legs</text>
  <text x="115" y="226" text-anchor="middle" fill="#000">gentle sweeping curves</text>

  <!-- PANEL 2: drone -->
  <rect x="220" y="58" width="180" height="180" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="310" y="78" text-anchor="middle" font-weight="bold" fill="#000">drone</text>
  <!-- steady main body line -->
  <line x1="235" y1="160" x2="385" y2="160" stroke="#000" stroke-width="2.5"/>
  <!-- rotor: strong flat bands above and below -->
  <line x1="240" y1="108" x2="380" y2="108" stroke="#000" stroke-width="2"/>
  <line x1="240" y1="120" x2="380" y2="120" stroke="#000" stroke-width="1"/>
  <line x1="240" y1="200" x2="380" y2="200" stroke="#000" stroke-width="2"/>
  <line x1="240" y1="212" x2="380" y2="212" stroke="#000" stroke-width="1"/>
  <text x="310" y="100" text-anchor="middle" fill="#000">spinning rotor blades</text>
  <text x="310" y="226" text-anchor="middle" fill="#000">flat buzzing bands</text>

  <!-- PANEL 3: bird -->
  <rect x="415" y="58" width="180" height="180" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="505" y="78" text-anchor="middle" font-weight="bold" fill="#000">bird</text>
  <line x1="430" y1="160" x2="580" y2="160" stroke="#000" stroke-width="2.5"/>
  <!-- flapping: irregular spikes -->
  <path d="M435 160 L450 128 L465 160 L482 134 L498 160 L515 126 L532 160 L548 136 L565 160 L578 130" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="505" y="100" text-anchor="middle" fill="#000">flapping wings</text>
  <text x="505" y="226" text-anchor="middle" fill="#000">irregular flaps</text>

  <!-- shared axis hint -->
  <text x="310" y="256" text-anchor="middle" fill="#000">(main body motion = the steady centre line; the wiggles are the tiny PART motions)</text>

  <!-- takeaway box -->
  <rect x="25" y="276" width="570" height="70" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="310" y="296" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Micro-Doppler = the tiny extra wiggles from moving PARTS, on top of the main motion.</text>
  <text x="310" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Each object's signature looks different - perfect input for image-style ML (a CNN).</text>
  <text x="310" y="336" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Like telling walkers, cyclists and cars apart by the RHYTHM of their motion.</text>
</svg>
