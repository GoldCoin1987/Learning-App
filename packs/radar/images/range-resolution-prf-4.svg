<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The PRF dilemma: one setting can't win both</text>

  <!-- table outline -->
  <rect x="40" y="60" width="480" height="180" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- column divider -->
  <line x1="280" y1="60" x2="280" y2="240" stroke="#000" stroke-width="2"/>
  <!-- header divider -->
  <line x1="40" y1="100" x2="520" y2="100" stroke="#000" stroke-width="2"/>
  <!-- row divider -->
  <line x1="40" y1="170" x2="520" y2="170" stroke="#000" stroke-width="1"/>

  <!-- headers -->
  <text x="160" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">LOW PRF</text>
  <text x="400" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">HIGH PRF</text>

  <!-- low PRF cells -->
  <text x="160" y="130" text-anchor="middle" fill="#000">Range: CLEAN</text>
  <text x="160" y="148" text-anchor="middle" fill="#000">(unambiguous)</text>
  <text x="160" y="200" text-anchor="middle" fill="#000">Speed: AMBIGUOUS</text>
  <text x="160" y="218" text-anchor="middle" fill="#000">(folds / wraps)</text>

  <!-- high PRF cells -->
  <text x="400" y="130" text-anchor="middle" fill="#000">Range: AMBIGUOUS</text>
  <text x="400" y="148" text-anchor="middle" fill="#000">(folds / wraps)</text>
  <text x="400" y="200" text-anchor="middle" fill="#000">Speed: CLEAN</text>
  <text x="400" y="218" text-anchor="middle" fill="#000">(unambiguous)</text>

  <!-- takeaway box -->
  <rect x="40" y="258" width="480" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="279" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Can't have both perfectly at once with one PRF.</text>
  <text x="280" y="299" text-anchor="middle" fill="#000">Real radars compromise (medium PRF) or vary/stagger the PRF.</text>
</svg>
