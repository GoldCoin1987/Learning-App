<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 330" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="330" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The range-Doppler map: targets as bright spots</text>

  <!-- grid box -->
  <rect x="110" y="60" width="340" height="200" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- faint grid lines -->
  <line x1="195" y1="60" x2="195" y2="260" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="280" y1="60" x2="280" y2="260" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="365" y1="60" x2="365" y2="260" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="110" y1="110" x2="450" y2="110" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="110" y1="160" x2="450" y2="160" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="110" y1="210" x2="450" y2="210" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>

  <!-- axes labels -->
  <text x="280" y="288" text-anchor="middle" font-weight="bold" fill="#000">speed (Doppler) &#8594;</text>
  <text x="95" y="160" text-anchor="middle" font-weight="bold" fill="#000" transform="rotate(-90 95 160)">range &#8594;</text>

  <!-- target spots -->
  <circle cx="220" cy="130" r="9" fill="#000"/>
  <text x="220" y="118" text-anchor="middle" fill="#000">target 1</text>

  <circle cx="370" cy="200" r="9" fill="#000"/>
  <text x="370" y="232" text-anchor="middle" fill="#000">target 2</text>

  <!-- takeaway box -->
  <rect x="80" y="298" width="400" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="316" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Each target glows at its range and its speed</text>
</svg>
