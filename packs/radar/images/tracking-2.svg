<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="580" height="380" fill="#ffffff"/>
  <text x="290" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Predict-and-correct: a repeating cycle each scan</text>

  <!-- Step 1: last estimate -->
  <rect x="40" y="70" width="130" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="105" y="95" text-anchor="middle" font-weight="bold" fill="#000">1. Last estimate</text>
  <text x="105" y="112" text-anchor="middle" fill="#000">here, going</text>
  <text x="105" y="126" text-anchor="middle" fill="#000">this fast</text>

  <!-- arrow to predict -->
  <line x1="170" y1="100" x2="225" y2="100" stroke="#000" stroke-width="2"/>
  <polygon points="225,100 213,94 213,106" fill="#000"/>

  <!-- Step 2: predict -->
  <rect x="225" y="70" width="130" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="290" y="95" text-anchor="middle" font-weight="bold" fill="#000">2. PREDICT</text>
  <text x="290" y="112" text-anchor="middle" fill="#000">where it should</text>
  <text x="290" y="126" text-anchor="middle" fill="#000">be next</text>

  <!-- arrow to measure -->
  <line x1="355" y1="100" x2="410" y2="100" stroke="#000" stroke-width="2"/>
  <polygon points="410,100 398,94 398,106" fill="#000"/>

  <!-- Step 3: new measurement -->
  <rect x="410" y="70" width="130" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="475" y="95" text-anchor="middle" font-weight="bold" fill="#000">3. MEASURE</text>
  <text x="475" y="112" text-anchor="middle" fill="#000">new blip</text>
  <text x="475" y="126" text-anchor="middle" fill="#000">arrives</text>

  <!-- arrow down to blend -->
  <line x1="475" y1="130" x2="475" y2="175" stroke="#000" stroke-width="2"/>
  <polygon points="475,175 469,163 481,163" fill="#000"/>

  <!-- Step 4: blend / correct -->
  <rect x="225" y="175" width="250" height="64" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="350" y="198" text-anchor="middle" font-weight="bold" fill="#000">4. BLEND / CORRECT</text>
  <text x="350" y="216" text-anchor="middle" fill="#000">mix prediction + measurement,</text>
  <text x="350" y="230" text-anchor="middle" fill="#000">WEIGHTED by how much you trust each</text>

  <!-- arrow back up-left to step 1 (closing the loop) -->
  <line x1="225" y1="207" x2="105" y2="207" stroke="#000" stroke-width="2"/>
  <line x1="105" y1="207" x2="105" y2="130" stroke="#000" stroke-width="2"/>
  <polygon points="105,130 99,142 111,142" fill="#000"/>
  <text x="150" y="223" text-anchor="middle" fill="#000">becomes next estimate</text>

  <!-- trust note -->
  <rect x="40" y="262" width="500" height="42" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="290" y="280" text-anchor="middle" font-weight="bold" fill="#000">Noisy measurement? Trust the PREDICTION more.</text>
  <text x="290" y="296" text-anchor="middle" font-weight="bold" fill="#000">Reliable measurement? Trust the MEASUREMENT more.</text>

  <!-- takeaway box -->
  <rect x="40" y="320" width="500" height="46" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="290" y="338" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">The blended result is far steadier than the raw blips.</text>
  <text x="290" y="355" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Like catching a ball: predict where it goes, adjust as you see it.</text>
</svg>
