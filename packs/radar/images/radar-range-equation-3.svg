<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 330" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="330" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Radar Cross Section: how BIG you look, not how big you are</text>

  <!-- Cell 1: big bird, small echo -->
  <rect x="25" y="50" width="160" height="150" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="105" y="70" text-anchor="middle" font-weight="bold" fill="#000">big bird</text>
  <!-- bird shape -->
  <path d="M70 110 Q105 90 140 110 Q105 122 70 110 Z" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <circle cx="138" cy="106" r="4" fill="#000"/>
  <text x="105" y="150" text-anchor="middle" fill="#000">large + soft</text>
  <!-- small echo bar -->
  <rect x="80" y="168" width="50" height="14" fill="#000"/>
  <text x="105" y="195" text-anchor="middle" fill="#000">tiny echo</text>

  <!-- Cell 2: small metal corner, big echo -->
  <rect x="200" y="50" width="160" height="150" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="70" text-anchor="middle" font-weight="bold" fill="#000">small metal corner</text>
  <!-- corner reflector shape -->
  <path d="M260 130 L280 95 L300 130 Z" stroke="#000" stroke-width="2" fill="#000"/>
  <text x="280" y="150" text-anchor="middle" fill="#000">small + metal</text>
  <!-- big echo bar -->
  <rect x="225" y="160" width="110" height="22" fill="#000"/>
  <text x="280" y="195" text-anchor="middle" fill="#000">HUGE echo</text>

  <!-- Cell 3: stealth shape deflecting -->
  <rect x="375" y="50" width="160" height="150" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="455" y="70" text-anchor="middle" font-weight="bold" fill="#000">stealth shape</text>
  <!-- angled facet -->
  <path d="M425 130 L470 100 L485 118 L440 148 Z" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <!-- incoming wave deflected away (not back) -->
  <line x1="380" y1="92" x2="448" y2="118" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="455" y1="118" x2="500" y2="160" stroke="#000" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="455" y="178" text-anchor="middle" fill="#000">bounced away</text>
  <text x="455" y="192" text-anchor="middle" fill="#000">=&gt; looks tiny</text>

  <text x="280" y="232" text-anchor="middle" font-weight="bold" fill="#000">Echo strength (RCS) depends on shape and material, NOT just physical size.</text>
  <text x="280" y="255" text-anchor="middle" fill="#000">A small shiny metal corner can shout louder to radar than a big soft bird.</text>
  <text x="280" y="275" text-anchor="middle" fill="#000">Stealth uses clever shaping and materials to look as tiny as possible.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
