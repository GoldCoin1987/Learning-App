<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The core problem: find the mover hidden in the clutter</text>

  <!-- scene box -->
  <rect x="40" y="48" width="480" height="232" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- ground line -->
  <line x1="40" y1="240" x2="520" y2="240" stroke="#000" stroke-width="1.5"/>
  <text x="50" y="258" text-anchor="start" fill="#000">ground</text>

  <!-- big clutter blobs: hills + buildings -->
  <path d="M70,240 Q130,150 200,240 Z" fill="#000" opacity="0.18" stroke="#000" stroke-width="1.5"/>
  <path d="M180,240 Q260,130 360,240 Z" fill="#000" opacity="0.18" stroke="#000" stroke-width="1.5"/>
  <rect x="380" y="170" width="40" height="70" fill="#000" opacity="0.18" stroke="#000" stroke-width="1.5"/>
  <rect x="430" y="150" width="34" height="90" fill="#000" opacity="0.18" stroke="#000" stroke-width="1.5"/>
  <text x="250" y="120" text-anchor="middle" font-weight="bold" fill="#000">CLUTTER: huge, useless echoes</text>
  <text x="250" y="138" text-anchor="middle" fill="#000">(ground, hills, buildings, rain) - all STILL</text>

  <!-- the weak moving target: small plane symbol, hidden among blobs -->
  <g>
    <polygon points="300,190 320,186 326,190 320,194" fill="#000"/>
    <line x1="310" y1="182" x2="310" y2="198" stroke="#000" stroke-width="2"/>
    <line x1="326" y1="190" x2="332" y2="190" stroke="#000" stroke-width="2"/>
    <!-- motion arrow -->
    <line x1="334" y1="190" x2="364" y2="190" stroke="#000" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrh)"/>
    <text x="350" y="178" text-anchor="middle" font-weight="bold" fill="#000">find the mover</text>
    <text x="350" y="210" text-anchor="middle" fill="#000">weak, but MOVING</text>
  </g>

  <!-- takeaway box -->
  <rect x="55" y="296" width="450" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="318" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">A real target is faint next to the clutter - but it moves.</text>
  <text x="280" y="338" text-anchor="middle" fill="#000">Movers shift the echo's frequency (Doppler); still clutter does not.</text>

  <defs>
    <marker id="arrh" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
