<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A radar is a loop of parts that work together</text>

  <!-- TRANSMITTER -->
  <rect x="20" y="60" width="90" height="54" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="65" y="82" text-anchor="middle" font-weight="bold" fill="#000">Transmitter</text>
  <text x="65" y="100" text-anchor="middle" fill="#000">makes pulse</text>

  <!-- DUPLEXER -->
  <rect x="150" y="60" width="90" height="54" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="195" y="82" text-anchor="middle" font-weight="bold" fill="#000">Duplexer</text>
  <text x="195" y="100" text-anchor="middle" fill="#000">shares antenna</text>

  <!-- ANTENNA -->
  <rect x="280" y="60" width="90" height="54" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="325" y="82" text-anchor="middle" font-weight="bold" fill="#000">Antenna</text>
  <text x="325" y="100" text-anchor="middle" fill="#000">beams / catches</text>

  <!-- arrows top row -->
  <line x1="110" y1="87" x2="148" y2="87" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="240" y1="87" x2="278" y2="87" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>

  <!-- pulse out / echo in from antenna -->
  <path d="M370 78 L460 78" stroke="#000" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="500" y="82" text-anchor="middle" fill="#000">pulse out -&gt;</text>
  <path d="M460 100 L370 100" stroke="#000" stroke-width="2" fill="none" stroke-dasharray="6 5" marker-end="url(#arr)"/>
  <text x="500" y="104" text-anchor="middle" fill="#000">&lt;- echo in</text>

  <!-- echo goes down from antenna to receiver (via duplexer side) -->
  <path d="M195 114 L195 170" stroke="#000" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="235" y="148" text-anchor="middle" fill="#000">tiny echo</text>

  <!-- RECEIVER / LNA -->
  <rect x="150" y="176" width="90" height="54" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="195" y="198" text-anchor="middle" font-weight="bold" fill="#000">Receiver</text>
  <text x="195" y="216" text-anchor="middle" fill="#000">amplifies echo</text>

  <!-- ADC -->
  <rect x="280" y="176" width="90" height="54" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="325" y="198" text-anchor="middle" font-weight="bold" fill="#000">ADC</text>
  <text x="325" y="216" text-anchor="middle" fill="#000">makes numbers</text>

  <!-- SIGNAL PROCESSOR -->
  <rect x="410" y="176" width="100" height="54" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="460" y="194" text-anchor="middle" font-weight="bold" fill="#000">Signal</text>
  <text x="460" y="210" text-anchor="middle" font-weight="bold" fill="#000">processor</text>
  <text x="460" y="224" text-anchor="middle" fill="#000">finds targets</text>

  <!-- DISPLAY -->
  <rect x="540" y="176" width="80" height="54" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="580" y="198" text-anchor="middle" font-weight="bold" fill="#000">Display</text>
  <text x="580" y="216" text-anchor="middle" fill="#000">shows result</text>

  <!-- arrows bottom row -->
  <line x1="240" y1="203" x2="278" y2="203" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="370" y1="203" x2="408" y2="203" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="510" y1="203" x2="538" y2="203" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>

  <!-- takeaway -->
  <rect x="60" y="270" width="520" height="72" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="320" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Transmitter -&gt; antenna -&gt; receiver -&gt; processor -&gt; display.</text>
  <text x="320" y="312" text-anchor="middle" fill="#000">The pulse goes out, the echo comes back, the computer turns it</text>
  <text x="320" y="330" text-anchor="middle" fill="#000">into a detection (range, speed, direction).</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
