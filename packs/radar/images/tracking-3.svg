<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="580" height="360" fill="#ffffff"/>
  <text x="290" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Prediction tells you WHERE to look (gate) and lets a track COAST</text>

  <!-- axes -->
  <line x1="55" y1="50" x2="55" y2="250" stroke="#000" stroke-width="2"/>
  <text x="55" y="42" text-anchor="middle" fill="#000">position</text>
  <line x1="55" y1="250" x2="545" y2="250" stroke="#000" stroke-width="2"/>
  <text x="300" y="268" text-anchor="middle" fill="#000">time: scan 1, 2, 3, 4 &#8594;</text>

  <!-- confirmed blips for scans 1 and 2 (filled) -->
  <circle cx="110" cy="200" r="6" fill="#000"/>
  <text x="110" y="220" text-anchor="middle" fill="#000">scan 1</text>
  <circle cx="210" cy="170" r="6" fill="#000"/>
  <text x="210" y="190" text-anchor="middle" fill="#000">scan 2</text>

  <!-- track line so far -->
  <line x1="110" y1="200" x2="210" y2="170" stroke="#000" stroke-width="2.5"/>

  <!-- predicted next spot for scan 3 with a GATE (search window) -->
  <line x1="210" y1="170" x2="310" y2="140" stroke="#000" stroke-width="1.5" stroke-dasharray="6 5"/>
  <circle cx="310" cy="140" r="5" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <ellipse cx="310" cy="140" rx="40" ry="34" stroke="#000" stroke-width="2" fill="none"/>
  <text x="310" y="95" text-anchor="middle" font-weight="bold" fill="#000">predicted spot</text>
  <text x="372" y="140" text-anchor="start" font-weight="bold" fill="#000">GATE</text>
  <text x="372" y="155" text-anchor="start" fill="#000">(small search</text>
  <text x="372" y="169" text-anchor="start" fill="#000">window)</text>

  <!-- a far-off false blip OUTSIDE the gate, rejected -->
  <circle cx="430" cy="210" r="5" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <text x="430" y="230" text-anchor="middle" fill="#000">far-off false blip</text>
  <text x="430" y="244" text-anchor="middle" fill="#000">- rejected</text>

  <!-- scan 4: MISSED, track COASTS on prediction -->
  <line x1="310" y1="140" x2="410" y2="110" stroke="#000" stroke-width="1.5" stroke-dasharray="6 5"/>
  <circle cx="410" cy="110" r="5" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <text x="410" y="86" text-anchor="middle" font-weight="bold" fill="#000">scan 4 MISSED</text>
  <text x="410" y="100" text-anchor="middle" fill="#000">track COASTS here</text>

  <!-- takeaway box -->
  <rect x="35" y="304" width="510" height="46" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="290" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Only look inside the gate (saves effort, rejects far-off false alarms).</text>
  <text x="290" y="339" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">If a blip is missed, coast on the prediction until it reappears.</text>
</svg>
