<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 320" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="660" height="320" fill="#ffffff"/>
  <text x="330" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The whole radar chain: from a single echo to AI-assisted sensing</text>

  <!-- stage boxes in a flow -->
  <!-- echo -->
  <rect x="20" y="120" width="92" height="62" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="66" y="146" text-anchor="middle" font-weight="bold" fill="#000">echo</text>
  <text x="66" y="164" text-anchor="middle" fill="#000">a reflection</text>

  <line x1="112" y1="151" x2="140" y2="151" stroke="#000" stroke-width="2" marker-end="url(#ah5)"/>

  <!-- range/speed/angle -->
  <rect x="142" y="120" width="110" height="62" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="197" y="142" text-anchor="middle" font-weight="bold" fill="#000">measure</text>
  <text x="197" y="160" text-anchor="middle" fill="#000">range, speed,</text>
  <text x="197" y="176" text-anchor="middle" fill="#000">angle</text>

  <line x1="252" y1="151" x2="280" y2="151" stroke="#000" stroke-width="2" marker-end="url(#ah5)"/>

  <!-- maps -->
  <rect x="282" y="120" width="100" height="62" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="332" y="146" text-anchor="middle" font-weight="bold" fill="#000">maps</text>
  <text x="332" y="164" text-anchor="middle" fill="#000">range-Doppler</text>

  <line x1="382" y1="151" x2="410" y2="151" stroke="#000" stroke-width="2" marker-end="url(#ah5)"/>

  <!-- detection -->
  <rect x="412" y="120" width="92" height="62" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="458" y="146" text-anchor="middle" font-weight="bold" fill="#000">detection</text>
  <text x="458" y="164" text-anchor="middle" fill="#000">find blips</text>

  <line x1="504" y1="151" x2="532" y2="151" stroke="#000" stroke-width="2" marker-end="url(#ah5)"/>

  <!-- tracking -->
  <rect x="534" y="120" width="92" height="62" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="580" y="146" text-anchor="middle" font-weight="bold" fill="#000">tracking</text>
  <text x="580" y="164" text-anchor="middle" fill="#000">follow paths</text>

  <!-- arrow down to ML -->
  <line x1="580" y1="182" x2="580" y2="212" stroke="#000" stroke-width="2" marker-end="url(#ah5)"/>

  <!-- ML recognition box spanning -->
  <rect x="300" y="214" width="326" height="58" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="463" y="238" text-anchor="middle" font-weight="bold" fill="#000">ML recognition (NEW)</text>
  <text x="463" y="258" text-anchor="middle" fill="#000">learned labels, esp. from micro-Doppler signatures</text>

  <!-- bracket: classic signal processing -->
  <text x="290" y="100" text-anchor="middle" fill="#000">classic signal processing turns echoes into maps, detections and tracks</text>
  <line x1="30" y1="108" x2="616" y2="108" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>

  <defs>
    <marker id="ah5" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 z" fill="#000"/>
    </marker>
  </defs>

  <!-- takeaway -->
  <text x="330" y="296" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Radar measures echoes; signal processing makes maps, detections and tracks;</text>
  <text x="330" y="313" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">machine learning adds learned recognition on top. That is the whole picture.</text>
</svg>
