<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The threshold: which bumps do we call targets?</text>

  <!-- axes -->
  <line x1="60" y1="60" x2="60" y2="250" stroke="#000" stroke-width="2"/>
  <text x="60" y="50" text-anchor="middle" fill="#000">echo strength</text>
  <line x1="60" y1="250" x2="525" y2="250" stroke="#000" stroke-width="2"/>
  <text x="500" y="268" text-anchor="middle" fill="#000">cells across the map &#8594;</text>

  <!-- threshold line -->
  <line x1="60" y1="150" x2="525" y2="150" stroke="#000" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="120" y="143" text-anchor="middle" font-weight="bold" fill="#000">THRESHOLD</text>

  <!-- noisy baseline with bumps -->
  <polyline points="60,225 80,218 100,228 120,215 140,224 160,90 180,150 200,222 215,219 230,226 245,200 252,150 258,200 270,224 290,216 310,228 330,214 350,205 360,150 372,205 390,222 410,196 430,220 450,225 470,218 490,226 510,220" stroke="#000" stroke-width="1.5" fill="none"/>

  <!-- real target peak, well above threshold: DETECTION -->
  <circle cx="160" cy="90" r="6" fill="#000"/>
  <text x="160" y="78" text-anchor="middle" font-weight="bold" fill="#000">DETECTION</text>
  <text x="160" y="307" text-anchor="middle" fill="#000">real target,</text>
  <text x="160" y="322" text-anchor="middle" fill="#000">above the line</text>

  <!-- noise bump poking above: FALSE ALARM -->
  <circle cx="252" cy="150" r="6" fill="#000"/>
  <text x="252" y="120" text-anchor="middle" font-weight="bold" fill="#000">FALSE ALARM</text>
  <text x="252" y="135" text-anchor="middle" fill="#000">(just noise)</text>

  <!-- weak real target below the line: MISSED -->
  <circle cx="355" cy="205" r="6" fill="#000"/>
  <text x="400" y="200" text-anchor="middle" font-weight="bold" fill="#000">MISSED DETECTION</text>
  <text x="400" y="215" text-anchor="middle" fill="#000">(weak target below line)</text>

  <!-- takeaway box -->
  <rect x="40" y="334" width="480" height="24" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="351" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Above the threshold = called a target; below = ignored as noise.</text>
</svg>
