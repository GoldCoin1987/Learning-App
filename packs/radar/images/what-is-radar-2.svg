<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="300" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Distance from time: how long the echo takes</text>

  <!-- timeline -->
  <line x1="60" y1="120" x2="510" y2="120" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <text x="525" y="124" fill="#000">time</text>

  <!-- pulse sent marker -->
  <line x1="110" y1="100" x2="110" y2="140" stroke="#000" stroke-width="2"/>
  <text x="110" y="92" text-anchor="middle" fill="#000">pulse sent</text>

  <!-- echo received marker -->
  <line x1="400" y1="100" x2="400" y2="140" stroke="#000" stroke-width="2"/>
  <text x="400" y="92" text-anchor="middle" fill="#000">echo heard</text>

  <!-- delay bracket -->
  <line x1="110" y1="165" x2="400" y2="165" stroke="#000" stroke-width="1" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="255" y="185" text-anchor="middle" fill="#000">round-trip delay (out AND back)</text>

  <text x="60" y="225" fill="#000">Longer delay = object is farther away.</text>
  <text x="60" y="250" fill="#000">distance = (speed of light x delay) / 2</text>
  <text x="60" y="272" fill="#000">We halve it because the wave travelled there and back.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
