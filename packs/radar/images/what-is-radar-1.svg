<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="300" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Radar: a pulse goes out, the echo comes back</text>

  <!-- ground -->
  <line x1="20" y1="250" x2="200" y2="250" stroke="#000" stroke-width="2"/>

  <!-- radar dish (a simple curved antenna on a stand) -->
  <path d="M70 150 A40 40 0 0 1 70 230" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <line x1="70" y1="190" x2="95" y2="190" stroke="#000" stroke-width="2"/>
  <circle cx="95" cy="190" r="4" fill="#000"/>
  <line x1="78" y1="200" x2="78" y2="250" stroke="#000" stroke-width="2"/>
  <text x="70" y="275" text-anchor="middle" fill="#000">radar dish</text>

  <!-- plane (target) -->
  <g stroke="#000" stroke-width="2" fill="#ffffff">
    <ellipse cx="470" cy="110" rx="34" ry="9"/>
    <path d="M455 110 L440 90 L452 110 Z" fill="#000"/>
    <path d="M470 105 L470 86 L482 105 Z" fill="#000"/>
  </g>
  <text x="470" y="78" text-anchor="middle" fill="#000">airplane (object)</text>

  <!-- pulse out (top wavy arrow) -->
  <path d="M105 175 Q200 130 250 125 T430 110" stroke="#000" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="250" y="150" text-anchor="middle" fill="#000">pulse out (radio wave)</text>

  <!-- echo back (lower arrow) -->
  <path d="M435 135 Q300 175 200 185 T110 205" stroke="#000" stroke-width="2" fill="none" stroke-dasharray="6 5" marker-end="url(#arr)"/>
  <text x="285" y="205" text-anchor="middle" fill="#000">echo back (the bounce)</text>

  <text x="280" y="293" text-anchor="middle" fill="#000">Like a shout in a canyon: send a wave, listen for the echo that returns.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
