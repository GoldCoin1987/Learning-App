<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Reading a radar image: brightness = how strongly it echoes</text>

  <!-- the radar image panel (greyscale-ish reflectivity map) -->
  <rect x="40" y="44" width="320" height="240" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="200" y="64" text-anchor="middle" fill="#000" font-size="11">a patch of "radar reflectivity" (not a colour photo)</text>

  <!-- dark smooth area (low reflectivity) -->
  <rect x="52" y="78" width="296" height="60" fill="#000" opacity="0.78"/>
  <text x="200" y="112" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">DARK = smooth surface, weak echo</text>

  <!-- bright metal building / edges (strong reflector) -->
  <rect x="80" y="158" width="60" height="60" fill="#000" opacity="0.06" stroke="#000" stroke-width="1.5"/>
  <rect x="86" y="164" width="48" height="48" fill="#ffffff" stroke="#000" stroke-width="3"/>
  <text x="110" y="236" text-anchor="middle" fill="#000" font-size="11">BRIGHT</text>
  <text x="110" y="250" text-anchor="middle" fill="#000" font-size="10">metal / edges</text>
  <text x="110" y="262" text-anchor="middle" fill="#000" font-size="10">strong echo</text>

  <!-- radar shadow behind the bright object -->
  <rect x="150" y="158" width="150" height="60" fill="#000" opacity="0.88"/>
  <text x="225" y="186" text-anchor="middle" fill="#ffffff" font-size="11">radar SHADOW</text>
  <text x="225" y="202" text-anchor="middle" fill="#ffffff" font-size="10">(blocked, no echo)</text>

  <!-- right side: a brightness scale legend -->
  <text x="455" y="64" text-anchor="middle" font-weight="bold" fill="#000">brightness scale</text>

  <!-- gradient-style stack from dark (bottom) to bright (top) using opacity steps -->
  <rect x="420" y="80" width="70" height="26" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <rect x="420" y="106" width="70" height="26" fill="#000" opacity="0.25" stroke="#000" stroke-width="1.5"/>
  <rect x="420" y="132" width="70" height="26" fill="#000" opacity="0.55" stroke="#000" stroke-width="1.5"/>
  <rect x="420" y="158" width="70" height="26" fill="#000" opacity="0.85" stroke="#000" stroke-width="1.5"/>

  <text x="455" y="98" text-anchor="middle" fill="#000" font-size="10">bright</text>
  <text x="500" y="78" text-anchor="start" fill="#000" font-size="10"></text>
  <text x="455" y="176" text-anchor="middle" fill="#ffffff" font-size="10">dark</text>

  <!-- arrow + labels for scale meaning -->
  <line x1="505" y1="86" x2="505" y2="178" stroke="#000" stroke-width="1.5"/>
  <polygon points="505,86 500,98 510,98" fill="#000"/>
  <text x="520" y="100" text-anchor="start" fill="#000" font-size="10">strong</text>
  <text x="520" y="112" text-anchor="start" fill="#000" font-size="10">reflector</text>
  <text x="520" y="172" text-anchor="start" fill="#000" font-size="10">weak</text>

  <text x="455" y="210" text-anchor="middle" fill="#000" font-size="10">It is grayscale</text>
  <text x="455" y="224" text-anchor="middle" fill="#000" font-size="10">reflectivity, not</text>
  <text x="455" y="238" text-anchor="middle" fill="#000" font-size="10">a colour photo.</text>

  <!-- takeaway box -->
  <rect x="40" y="300" width="480" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Bright spots reflect strongly (metal, edges); dark areas reflect weakly</text>
  <text x="280" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">(smooth ground); shadows fall where the signal is blocked.</text>
</svg>
