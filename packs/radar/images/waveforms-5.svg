<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">FMCW: the frequency gap (beat) tells you the range</text>

  <!-- axes -->
  <line x1="70" y1="250" x2="70" y2="60" stroke="#000" stroke-width="2" marker-end="url(#arr5)"/>
  <text x="64" y="60" text-anchor="end" fill="#000">frequency</text>
  <line x1="70" y1="250" x2="520" y2="250" stroke="#000" stroke-width="2" marker-end="url(#arr5)"/>
  <text x="525" y="254" text-anchor="start" fill="#000">time</text>

  <!-- SENT: repeating up-ramps (sawtooth sweep) -->
  <polyline points="80,240 200,90 200,240 320,90 320,240 440,90" stroke="#000" stroke-width="2" fill="none"/>
  <text x="150" y="84" text-anchor="middle" font-weight="bold" fill="#000">SENT now (repeating sweep)</text>

  <!-- ECHO: same ramps shifted to the right (delayed) -->
  <polyline points="120,240 240,90 240,240 360,90 360,240 480,90" stroke="#000" stroke-width="1.6" fill="none" stroke-dasharray="6 4"/>
  <text x="350" y="300" text-anchor="middle" fill="#000">ECHO returns a little later (delayed)</text>

  <!-- vertical line showing the frequency gap at one instant -->
  <line x1="280" y1="240" x2="280" y2="250" stroke="#000" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="280" y1="115" x2="280" y2="165" stroke="#000" stroke-width="3"/>
  <circle cx="280" cy="115" r="3" fill="#000"/>
  <circle cx="280" cy="165" r="3" fill="#000"/>
  <line x1="280" y1="140" x2="370" y2="120" stroke="#000" stroke-width="1"/>
  <text x="374" y="118" text-anchor="start" font-weight="bold" fill="#000">'beat' = frequency gap</text>
  <text x="374" y="134" text-anchor="start" fill="#000">at this instant</text>

  <!-- bigger delay note -->
  <text x="190" y="270" text-anchor="middle" fill="#000">bigger delay (farther) =&gt; bigger gap</text>

  <!-- takeaway box -->
  <rect x="55" y="290" width="450" height="58" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="312" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Always transmitting; compare the echo to what is sent RIGHT NOW.</text>
  <text x="280" y="334" text-anchor="middle" fill="#000">The frequency gap gives range. This is how tiny car-radar chips work.</text>

  <defs>
    <marker id="arr5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
