<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Two ways to resist a jammer</text>

  <!-- LEFT: FREQUENCY HOPPING -->
  <rect x="20" y="44" width="250" height="262" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="145" y="66" text-anchor="middle" font-weight="bold" fill="#000">FREQUENCY AGILITY</text>
  <text x="145" y="83" text-anchor="middle" fill="#000">hop so the jammer can't sit on you</text>

  <!-- axes left: frequency vs time -->
  <line x1="55" y1="100" x2="55" y2="260" stroke="#000" stroke-width="2"/>
  <text x="55" y="96" text-anchor="middle" fill="#000" font-size="11">frequency</text>
  <line x1="55" y1="260" x2="250" y2="260" stroke="#000" stroke-width="2"/>
  <text x="235" y="278" text-anchor="middle" fill="#000">time &#8594;</text>
  <!-- hopping steps -->
  <line x1="60" y1="230" x2="100" y2="230" stroke="#000" stroke-width="3"/>
  <line x1="100" y1="150" x2="140" y2="150" stroke="#000" stroke-width="3"/>
  <line x1="140" y1="200" x2="180" y2="200" stroke="#000" stroke-width="3"/>
  <line x1="180" y1="120" x2="220" y2="120" stroke="#000" stroke-width="3"/>
  <text x="150" y="250" text-anchor="middle" fill="#000">radar jumps frequencies</text>

  <!-- RIGHT: SPATIAL NULL -->
  <rect x="290" y="44" width="250" height="262" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="415" y="66" text-anchor="middle" font-weight="bold" fill="#000">SPATIAL NULLING</text>
  <text x="415" y="83" text-anchor="middle" fill="#000">point a blind spot at the jammer</text>

  <!-- antenna at bottom -->
  <rect x="405" y="250" width="20" height="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="415" y="280" text-anchor="middle" fill="#000">antenna</text>

  <!-- main beam toward target (up-left) -->
  <polygon points="415,250 350,120 395,110" fill="#000" opacity="0.15" stroke="#000" stroke-width="1.5"/>
  <polygon points="350,108 372,116 350,124 356,116" fill="#000"/>
  <text x="345" y="100" text-anchor="middle" fill="#000">beam to target</text>

  <!-- null toward jammer (up-right), dashed wedge -->
  <line x1="415" y1="250" x2="490" y2="120" stroke="#000" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="495" y="150" text-anchor="middle" fill="#000">NULL</text>
  <text x="495" y="165" text-anchor="middle" fill="#000">(blind spot)</text>
  <!-- jammer symbol -->
  <text x="495" y="112" text-anchor="middle" font-weight="bold" fill="#000">jammer</text>

  <!-- takeaway box -->
  <rect x="40" y="320" width="480" height="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Hop frequencies and steer a blind spot at the jammer.</text>
</svg>
