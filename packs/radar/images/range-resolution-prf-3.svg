<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="340" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Range resolution: telling two close targets apart</text>

  <!-- LEFT: sharp pulse, two separate blips -->
  <text x="155" y="56" text-anchor="middle" font-weight="bold" fill="#000">Sharp pulse (wide bandwidth)</text>
  <line x1="40" y1="160" x2="270" y2="160" stroke="#000" stroke-width="2"/>
  <text x="155" y="178" text-anchor="middle" fill="#000">distance</text>
  <!-- two narrow peaks -->
  <polyline points="60,160 110,160 120,90 130,160 175,160 185,90 195,160 250,160" stroke="#000" stroke-width="2" fill="none"/>
  <text x="125" y="80" text-anchor="middle" fill="#000">target A</text>
  <text x="190" y="80" text-anchor="middle" fill="#000">target B</text>
  <text x="155" y="200" text-anchor="middle" font-weight="bold" fill="#000">TWO blips</text>

  <!-- divider -->
  <line x1="285" y1="50" x2="285" y2="215" stroke="#000" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- RIGHT: smeared pulse, one blob -->
  <text x="415" y="56" text-anchor="middle" font-weight="bold" fill="#000">Smeared pulse (narrow bandwidth)</text>
  <line x1="300" y1="160" x2="530" y2="160" stroke="#000" stroke-width="2"/>
  <text x="415" y="178" text-anchor="middle" fill="#000">distance</text>
  <!-- one broad hump -->
  <path d="M320 160 C 380 90, 450 90, 510 160" stroke="#000" stroke-width="2" fill="none"/>
  <text x="415" y="86" text-anchor="middle" fill="#000">A + B merged</text>
  <text x="415" y="200" text-anchor="middle" font-weight="bold" fill="#000">ONE blob</text>

  <!-- takeaway box -->
  <rect x="70" y="240" width="420" height="78" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">A sharper, wider-bandwidth pulse resolves finer detail.</text>
  <text x="280" y="284" text-anchor="middle" fill="#000">Resolution is set by BANDWIDTH (sharpness),</text>
  <text x="280" y="302" text-anchor="middle" fill="#000">not simply by pulse length.</text>
</svg>
