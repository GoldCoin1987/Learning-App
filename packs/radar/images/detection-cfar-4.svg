<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="600" height="360" fill="#ffffff"/>
  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">CFAR: judge a cell against the average of its neighbors</text>

  <!-- row of cells -->
  <!-- training cells (left) -->
  <g stroke="#000" stroke-width="1.5" fill="#ffffff">
    <rect x="40" y="120" width="42" height="42"/>
    <rect x="82" y="120" width="42" height="42"/>
    <rect x="124" y="120" width="42" height="42"/>
    <!-- guard left -->
    <rect x="166" y="120" width="42" height="42"/>
    <!-- test cell -->
    <rect x="208" y="120" width="42" height="42" stroke-width="3"/>
    <!-- guard right -->
    <rect x="250" y="120" width="42" height="42"/>
    <!-- training cells (right) -->
    <rect x="292" y="120" width="42" height="42"/>
    <rect x="334" y="120" width="42" height="42"/>
    <rect x="376" y="120" width="42" height="42"/>
  </g>

  <!-- shading: training cells (hatch via opacity) -->
  <rect x="40" y="120" width="42" height="42" fill="#000" opacity="0.12"/>
  <rect x="82" y="120" width="42" height="42" fill="#000" opacity="0.12"/>
  <rect x="124" y="120" width="42" height="42" fill="#000" opacity="0.12"/>
  <rect x="292" y="120" width="42" height="42" fill="#000" opacity="0.12"/>
  <rect x="334" y="120" width="42" height="42" fill="#000" opacity="0.12"/>
  <rect x="376" y="120" width="42" height="42" fill="#000" opacity="0.12"/>
  <!-- guard cells darker -->
  <rect x="166" y="120" width="42" height="42" fill="#000" opacity="0.30"/>
  <rect x="250" y="120" width="42" height="42" fill="#000" opacity="0.30"/>
  <!-- test cell dot -->
  <circle cx="229" cy="141" r="7" fill="#000"/>

  <!-- labels under cells -->
  <text x="124" y="178" text-anchor="middle" font-weight="bold" fill="#000">training (neighbor) cells</text>
  <text x="124" y="192" text-anchor="middle" fill="#000">estimate the local noise</text>
  <text x="229" y="108" text-anchor="middle" font-weight="bold" fill="#000">test cell</text>
  <text x="292" y="178" text-anchor="middle" font-weight="bold" fill="#000">training (neighbor) cells</text>

  <!-- guard call-outs -->
  <text x="187" y="210" text-anchor="middle" fill="#000">guard</text>
  <text x="271" y="210" text-anchor="middle" fill="#000">guard</text>
  <line x1="187" y1="200" x2="187" y2="164" stroke="#000" stroke-width="1"/>
  <line x1="271" y1="200" x2="271" y2="164" stroke="#000" stroke-width="1"/>
  <text x="229" y="228" text-anchor="middle" fill="#000">guard cells skipped so the target's own energy</text>
  <text x="229" y="242" text-anchor="middle" fill="#000">doesn't inflate the noise estimate</text>

  <!-- threshold arrow on the right -->
  <line x1="440" y1="60" x2="440" y2="200" stroke="#000" stroke-width="2"/>
  <line x1="436" y1="110" x2="560" y2="110" stroke="#000" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="500" y="103" text-anchor="middle" font-weight="bold" fill="#000">threshold</text>
  <line x1="436" y1="150" x2="560" y2="150" stroke="#000" stroke-width="1.5"/>
  <text x="505" y="168" text-anchor="middle" fill="#000">local noise average</text>
  <!-- gap arrow -->
  <line x1="455" y1="150" x2="455" y2="110" stroke="#000" stroke-width="1.5"/>
  <polygon points="455,110 451,120 459,120" fill="#000"/>
  <text x="468" y="134" text-anchor="start" fill="#000">set a bit ABOVE</text>

  <!-- takeaway box -->
  <rect x="35" y="300" width="530" height="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="300" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">A cell is called a target only if it stands clearly above its neighbors' average.</text>
  <text x="300" y="336" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">(CFAR = Constant False Alarm Rate)</text>
</svg>
