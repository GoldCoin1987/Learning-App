<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="380" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A pulse train's report card: a bed of spikes</text>

  <!-- grid box: range-error vs speed-error -->
  <rect x="120" y="52" width="320" height="210" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- center lines -->
  <line x1="280" y1="52" x2="280" y2="262" stroke="#000" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="120" y1="157" x2="440" y2="157" stroke="#000" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- a regular grid of spikes (the ambiguities) -->
  <!-- main (true) peak in the center, larger -->
  <circle cx="280" cy="157" r="8" fill="#000"/>
  <!-- the repeating spikes -->
  <g fill="#000">
    <circle cx="200" cy="157" r="5"/>
    <circle cx="360" cy="157" r="5"/>
    <circle cx="280" cy="87" r="5"/>
    <circle cx="280" cy="227" r="5"/>
    <circle cx="200" cy="87" r="4"/>
    <circle cx="360" cy="87" r="4"/>
    <circle cx="200" cy="227" r="4"/>
    <circle cx="360" cy="227" r="4"/>
  </g>

  <!-- spacing arrows -->
  <line x1="200" y1="157" x2="360" y2="157" stroke="#000" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="320" y="150" text-anchor="middle" fill="#000">spacing &#8776; PRF</text>

  <!-- label the two ambiguity directions -->
  <text x="280" y="278" text-anchor="middle" fill="#000">extra spikes sideways = Doppler (speed) ambiguities</text>
  <text x="455" y="157" text-anchor="middle" fill="#000" transform="rotate(-90 455 157)">extra spikes up/down = range ambiguities</text>

  <!-- axes labels -->
  <text x="280" y="296" text-anchor="middle" font-weight="bold" fill="#000">speed error &#8594;</text>
  <text x="104" y="157" text-anchor="middle" font-weight="bold" fill="#000" transform="rotate(-90 104 157)">range error &#8594;</text>

  <!-- takeaway box -->
  <rect x="40" y="308" width="480" height="64" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">The repeating spikes ARE the range and Doppler ambiguities</text>
  <text x="280" y="350" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">(the PRF dilemma) drawn on the report card.</text>
  <text x="280" y="366" text-anchor="middle" fill="#000">How far apart the spikes sit is set by the PRF (the pulse spacing).</text>
</svg>
