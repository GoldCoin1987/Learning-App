<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">PRF: a radar sends pulses over and over, then listens</text>

  <!-- time axis -->
  <line x1="50" y1="200" x2="520" y2="200" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <text x="525" y="217" text-anchor="end" fill="#000">time</text>

  <!-- pulses: tall narrow bars sent at regular spacing -->
  <rect x="70" y="120" width="14" height="80" fill="#000"/>
  <rect x="210" y="120" width="14" height="80" fill="#000"/>
  <rect x="350" y="120" width="14" height="80" fill="#000"/>
  <rect x="490" y="120" width="14" height="80" fill="#000"/>
  <text x="77" y="110" text-anchor="middle" fill="#000">pulse</text>
  <text x="217" y="110" text-anchor="middle" fill="#000">pulse</text>
  <text x="357" y="110" text-anchor="middle" fill="#000">pulse</text>
  <text x="497" y="110" text-anchor="middle" fill="#000">pulse</text>

  <!-- listening gaps between pulses -->
  <text x="147" y="160" text-anchor="middle" fill="#000">listen</text>
  <text x="287" y="160" text-anchor="middle" fill="#000">listen</text>
  <text x="427" y="160" text-anchor="middle" fill="#000">listen</text>
  <path d="M88 185 L206 185" stroke="#000" stroke-width="1" stroke-dasharray="4 4"/>
  <path d="M228 185 L346 185" stroke="#000" stroke-width="1" stroke-dasharray="4 4"/>
  <path d="M368 185 L486 185" stroke="#000" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- spacing bracket = one period -->
  <line x1="77" y1="240" x2="217" y2="240" stroke="#000" stroke-width="1.5"/>
  <line x1="77" y1="235" x2="77" y2="245" stroke="#000" stroke-width="1.5"/>
  <line x1="217" y1="235" x2="217" y2="245" stroke="#000" stroke-width="1.5"/>
  <text x="147" y="258" text-anchor="middle" fill="#000">time between pulses</text>

  <!-- takeaway box -->
  <rect x="130" y="272" width="300" height="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="291" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">PRF = how many pulses per second</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
