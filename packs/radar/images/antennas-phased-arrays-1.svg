<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A narrow beam tells you the direction (angle)</text>

  <!-- LEFT: WIDE BEAM = FUZZY ANGLE -->
  <rect x="20" y="44" width="250" height="262" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="145" y="66" text-anchor="middle" font-weight="bold" fill="#000">WIDE BEAM</text>
  <text x="145" y="83" text-anchor="middle" fill="#000">fuzzy angle</text>

  <!-- radar at left edge -->
  <rect x="38" y="180" width="16" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="46" y="222" text-anchor="middle" fill="#000">radar</text>

  <!-- wide wedge -->
  <polygon points="54,193 240,120 240,266" fill="#000" opacity="0.12" stroke="#000" stroke-width="1.5"/>
  <text x="150" y="115" text-anchor="middle" fill="#000">echo could be</text>
  <text x="150" y="285" text-anchor="middle" fill="#000">anywhere in here</text>
  <!-- target -->
  <circle cx="225" cy="193" r="7" fill="#000"/>
  <text x="225" y="178" text-anchor="middle" fill="#000">target</text>

  <!-- RIGHT: NARROW BEAM = PRECISE ANGLE -->
  <rect x="290" y="44" width="250" height="262" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="415" y="66" text-anchor="middle" font-weight="bold" fill="#000">NARROW BEAM</text>
  <text x="415" y="83" text-anchor="middle" fill="#000">precise angle</text>

  <!-- radar at left edge -->
  <rect x="308" y="180" width="16" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="316" y="222" text-anchor="middle" fill="#000">radar</text>

  <!-- reference line (straight ahead) -->
  <line x1="324" y1="193" x2="520" y2="193" stroke="#000" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="470" y="188" text-anchor="middle" fill="#000" font-size="11">straight ahead</text>

  <!-- narrow wedge tilted up -->
  <polygon points="324,193 510,150 510,168" fill="#000" opacity="0.18" stroke="#000" stroke-width="1.5"/>
  <!-- angle arc -->
  <path d="M 374 193 A 50 50 0 0 0 366 178" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="392" y="178" text-anchor="middle" fill="#000" font-size="11">angle</text>
  <!-- target -->
  <circle cx="495" cy="159" r="7" fill="#000"/>
  <text x="495" y="144" text-anchor="middle" fill="#000">target</text>
  <text x="415" y="285" text-anchor="middle" fill="#000">angle = where beam points</text>

  <!-- takeaway box -->
  <rect x="40" y="320" width="480" height="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">A narrower beam pins down the direction more precisely.</text>
</svg>
