<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="340" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Inside the receiver: faint echo to numbers</text>

  <!-- faint echo in -->
  <text x="60" y="120" text-anchor="middle" fill="#000">faint echo</text>
  <polyline points="20,140 30,134 40,146 50,135 60,145 70,138 80,142" stroke="#000" stroke-width="1.5" fill="none"/>
  <line x1="84" y1="140" x2="110" y2="140" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>

  <!-- LNA (highlighted with thick border) -->
  <rect x="112" y="116" width="96" height="48" fill="#ffffff" stroke="#000" stroke-width="4"/>
  <text x="160" y="136" text-anchor="middle" font-weight="bold" fill="#000">Low-noise</text>
  <text x="160" y="152" text-anchor="middle" font-weight="bold" fill="#000">amplifier</text>
  <line x1="208" y1="140" x2="234" y2="140" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>

  <!-- mixer / slide to lower freq -->
  <rect x="236" y="116" width="100" height="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="286" y="136" text-anchor="middle" fill="#000">slide down to</text>
  <text x="286" y="152" text-anchor="middle" fill="#000">easier freq.</text>
  <line x1="336" y1="140" x2="362" y2="140" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>

  <!-- filter -->
  <rect x="364" y="116" width="80" height="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="404" y="144" text-anchor="middle" fill="#000">filter</text>
  <line x1="444" y1="140" x2="470" y2="140" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ADC -->
  <rect x="472" y="116" width="80" height="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="512" y="144" text-anchor="middle" font-weight="bold" fill="#000">ADC</text>
  <line x1="552" y1="140" x2="578" y2="140" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>

  <!-- numbers out -->
  <text x="606" y="136" text-anchor="middle" fill="#000">1 0 1 1</text>
  <text x="606" y="152" text-anchor="middle" fill="#000">numbers</text>

  <!-- highlight callout for LNA -->
  <line x1="160" y1="164" x2="160" y2="210" stroke="#000" stroke-width="1.5"/>
  <rect x="60" y="210" width="220" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="170" y="230" text-anchor="middle" font-weight="bold" fill="#000">The FIRST amplifier adds the</text>
  <text x="170" y="246" text-anchor="middle" font-weight="bold" fill="#000">least hiss -&gt; sets the noise floor</text>

  <!-- takeaway -->
  <rect x="80" y="282" width="480" height="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="320" y="304" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">The front end matters most: the faintest echo the whole radar</text>
  <text x="320" y="322" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">can hear is set by that first low-noise amplifier.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
