<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Steering by timing: delay each element a little</text>

  <!-- elements stacked on the left, each fires a bit later -->
  <text x="95" y="58" text-anchor="middle" font-weight="bold" fill="#000">elements</text>
  <text x="95" y="74" text-anchor="middle" fill="#000" font-size="11">(each started later going down)</text>

  <!-- five elements with start markers -->
  <!-- element 1 (top, earliest) -->
  <rect x="60" y="92" width="18" height="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="44" y="103" text-anchor="end" fill="#000" font-size="11">now</text>
  <!-- element 2 -->
  <rect x="60" y="130" width="18" height="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="44" y="141" text-anchor="end" fill="#000" font-size="11">+1</text>
  <!-- element 3 -->
  <rect x="60" y="168" width="18" height="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="44" y="179" text-anchor="end" fill="#000" font-size="11">+2</text>
  <!-- element 4 -->
  <rect x="60" y="206" width="18" height="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="44" y="217" text-anchor="end" fill="#000" font-size="11">+3</text>
  <!-- element 5 -->
  <rect x="60" y="244" width="18" height="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="44" y="255" text-anchor="end" fill="#000" font-size="11">+4</text>

  <!-- ripple wavefronts from each, combining into a tilted line -->
  <!-- the tilted combined wavefront (in step) -->
  <line x1="150" y1="84" x2="470" y2="270" stroke="#000" stroke-width="3"/>
  <line x1="180" y1="76" x2="500" y2="262" stroke="#000" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="345" y="150" text-anchor="middle" fill="#000" font-weight="bold">combined wavefront</text>
  <text x="345" y="166" text-anchor="middle" fill="#000" font-size="11">(waves add up in step)</text>

  <!-- arrow showing beam direction, perpendicular to wavefront, tilted up-right -->
  <line x1="300" y1="180" x2="430" y2="110" stroke="#000" stroke-width="2"/>
  <polygon points="430,110 416,112 424,126" fill="#000"/>
  <text x="445" y="100" text-anchor="middle" fill="#000" font-weight="bold">beam tilts</text>
  <text x="445" y="116" text-anchor="middle" fill="#000" font-size="11">this way</text>

  <!-- analogy note -->
  <rect x="60" y="278" width="300" height="40" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="210" y="297" text-anchor="middle" fill="#000" font-size="11">Like a line of swimmers each starting</text>
  <text x="210" y="312" text-anchor="middle" fill="#000" font-size="11">a beat later, angling the ripple.</text>

  <!-- takeaway box -->
  <rect x="40" y="326" width="480" height="28" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Delay each element a bit and the combined beam tilts.</text>
</svg>
