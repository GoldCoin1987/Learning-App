<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Old big boxes vs modern: a chip plus software (SDR)</text>

  <!-- LEFT: OLD -->
  <text x="160" y="56" text-anchor="middle" font-weight="bold" fill="#000">OLD: many big separate boxes</text>
  <rect x="40" y="74" width="100" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="90" y="96" text-anchor="middle" fill="#000">amplifier</text>
  <rect x="180" y="74" width="100" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="230" y="96" text-anchor="middle" fill="#000">mixer</text>
  <rect x="40" y="124" width="100" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="90" y="146" text-anchor="middle" fill="#000">filters</text>
  <rect x="180" y="124" width="100" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="230" y="146" text-anchor="middle" fill="#000">ADC</text>
  <rect x="40" y="174" width="240" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="160" y="196" text-anchor="middle" fill="#000">signal processor (big rack)</text>

  <!-- arrow collapse -->
  <line x1="300" y1="150" x2="360" y2="150" stroke="#000" stroke-width="3" marker-end="url(#arr)"/>
  <text x="330" y="140" text-anchor="middle" fill="#000">collapses</text>
  <text x="330" y="168" text-anchor="middle" fill="#000">into</text>

  <!-- RIGHT: MODERN -->
  <text x="490" y="56" text-anchor="middle" font-weight="bold" fill="#000">MODERN: one chip + software</text>
  <!-- small chip -->
  <rect x="420" y="90" width="90" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="465" y="114" text-anchor="middle" font-weight="bold" fill="#000">one small</text>
  <text x="465" y="130" text-anchor="middle" font-weight="bold" fill="#000">RF chip</text>
  <text x="465" y="146" text-anchor="middle" fill="#000">(mix+filter+ADC)</text>
  <!-- chip legs -->
  <line x1="425" y1="150" x2="425" y2="158" stroke="#000" stroke-width="2"/>
  <line x1="445" y1="150" x2="445" y2="158" stroke="#000" stroke-width="2"/>
  <line x1="465" y1="150" x2="465" y2="158" stroke="#000" stroke-width="2"/>
  <line x1="485" y1="150" x2="485" y2="158" stroke="#000" stroke-width="2"/>
  <line x1="505" y1="150" x2="505" y2="158" stroke="#000" stroke-width="2"/>

  <line x1="465" y1="160" x2="465" y2="180" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>

  <!-- computer / software -->
  <rect x="410" y="184" width="110" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="465" y="206" text-anchor="middle" font-weight="bold" fill="#000">software on</text>
  <text x="465" y="222" text-anchor="middle" font-weight="bold" fill="#000">a computer</text>

  <!-- takeaway -->
  <rect x="60" y="258" width="520" height="86" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="320" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Software-defined radio (SDR): most of the receiver becomes</text>
  <text x="320" y="298" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">one chip, and the processor is just software.</text>
  <text x="320" y="320" text-anchor="middle" fill="#000">Like a whole stereo rack turning into an app on your phone.</text>
  <text x="320" y="336" text-anchor="middle" fill="#000">There is still hardware - just a lot less of it.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
