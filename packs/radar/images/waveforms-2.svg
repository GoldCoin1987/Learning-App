<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Pulse compression: long pulse in, sharp spike out</text>

  <!-- LEFT: long coded pulse going in -->
  <text x="150" y="58" text-anchor="middle" font-weight="bold" fill="#000">Transmit a LONG coded pulse</text>
  <line x1="40" y1="150" x2="270" y2="150" stroke="#000" stroke-width="1"/>
  <text x="150" y="200" text-anchor="middle" fill="#000">time</text>
  <!-- a long wiggly chirped block -->
  <rect x="55" y="110" width="200" height="80" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <polyline points="58,150 70,124 82,150 96,128 110,150 126,132 140,150 158,136 172,150 192,140 206,150 228,143 242,150 252,148" stroke="#000" stroke-width="1.5" fill="none"/>
  <text x="150" y="104" text-anchor="middle" fill="#000">lots of energy + a 'code' stamped on</text>

  <!-- big arrow: compress -->
  <line x1="280" y1="150" x2="320" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <text x="300" y="138" text-anchor="middle" font-weight="bold" fill="#000">compress</text>

  <!-- RIGHT: sharp spike out with sidelobes -->
  <text x="430" y="58" text-anchor="middle" font-weight="bold" fill="#000">On receive: a SHARP spike</text>
  <line x1="335" y1="170" x2="525" y2="170" stroke="#000" stroke-width="2"/>
  <text x="430" y="200" text-anchor="middle" fill="#000">distance</text>
  <!-- one tall narrow peak with small ripples beside it -->
  <polyline points="345,170 405,170 415,168 422,162 430,86 438,162 445,168 515,170" stroke="#000" stroke-width="2" fill="none"/>
  <!-- small sidelobe ripples -->
  <polyline points="375,170 383,158 391,170" stroke="#000" stroke-width="1.5" fill="none"/>
  <polyline points="468,170 476,158 484,170" stroke="#000" stroke-width="1.5" fill="none"/>
  <text x="430" y="80" text-anchor="middle" font-weight="bold" fill="#000">tall, narrow</text>
  <line x1="383" y1="156" x2="360" y2="120" stroke="#000" stroke-width="1"/>
  <text x="356" y="114" text-anchor="end" fill="#000">small sidelobe</text>
  <line x1="476" y1="156" x2="500" y2="120" stroke="#000" stroke-width="1"/>
  <text x="504" y="114" text-anchor="start" fill="#000">'ghost' ripples</text>

  <!-- takeaway box -->
  <rect x="55" y="286" width="450" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="308" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Energy of a long pulse AND the sharpness of a short one.</text>
  <text x="280" y="330" text-anchor="middle" fill="#000">Gentle shaping (windowing) trims the side ripples, at a slight cost.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
