<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A chirp's report card: a tilted ridge (range-Doppler coupling)</text>

  <!-- grid box: range-error vs speed-error -->
  <rect x="120" y="52" width="320" height="200" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- center lines -->
  <line x1="280" y1="52" x2="280" y2="252" stroke="#000" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="120" y1="152" x2="440" y2="152" stroke="#000" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="280" y="266" text-anchor="middle" fill="#000">0</text>
  <text x="112" y="156" text-anchor="end" fill="#000">0</text>

  <!-- the tilted ridge: a long diagonal smear instead of a thumbtack -->
  <g opacity="0.32">
    <polygon points="150,212 168,200 410,72 392,92" fill="#000"/>
  </g>
  <g opacity="0.5">
    <polygon points="160,202 172,194 400,78 388,90" fill="#000"/>
  </g>
  <!-- peak at center marked -->
  <circle cx="280" cy="152" r="5" fill="#000"/>

  <!-- arrow showing 'faster reads as closer' -->
  <line x1="350" y1="118" x2="385" y2="92" stroke="#000" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="408" y="118" text-anchor="middle" fill="#000">a faster target</text>
  <text x="408" y="132" text-anchor="middle" fill="#000">slides up the ridge</text>

  <!-- axes labels -->
  <text x="280" y="290" text-anchor="middle" font-weight="bold" fill="#000">speed error &#8594; (faster)</text>
  <text x="104" y="152" text-anchor="middle" font-weight="bold" fill="#000" transform="rotate(-90 104 152)">range error &#8594; (closer)</text>

  <!-- takeaway box -->
  <rect x="40" y="302" width="480" height="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="322" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">The peak smears along a slanted line, not a clean dot.</text>
  <text x="280" y="340" text-anchor="middle" fill="#000">So a chirp can confuse 'a bit faster' with 'a bit closer'.</text>

  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
