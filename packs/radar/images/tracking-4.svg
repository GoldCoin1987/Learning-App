<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="580" height="360" fill="#ffffff"/>
  <text x="290" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Data association: which new blip belongs to which track?</text>

  <!-- legend -->
  <circle cx="70" cy="46" r="6" fill="#000"/>
  <text x="82" y="50" text-anchor="start" fill="#000">predicted track spot</text>
  <circle cx="250" cy="46" r="6" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <text x="262" y="50" text-anchor="start" fill="#000">new blip this scan</text>

  <!-- Track A (top): clean nearest match -->
  <circle cx="120" cy="110" r="6" fill="#000"/>
  <text x="120" y="100" text-anchor="middle" font-weight="bold" fill="#000">Track A</text>
  <circle cx="200" cy="118" r="5" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <line x1="126" y1="111" x2="194" y2="117" stroke="#000" stroke-width="1.5"/>
  <polygon points="194,117 182,112 184,122" fill="#000"/>
  <text x="280" y="118" text-anchor="start" fill="#000">matched to nearest blip - OK</text>

  <!-- Track B (middle): clean nearest match -->
  <circle cx="120" cy="175" r="6" fill="#000"/>
  <text x="120" y="165" text-anchor="middle" font-weight="bold" fill="#000">Track B</text>
  <circle cx="205" cy="182" r="5" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <line x1="126" y1="176" x2="199" y2="181" stroke="#000" stroke-width="1.5"/>
  <polygon points="199,181 187,176 189,186" fill="#000"/>
  <text x="280" y="182" text-anchor="start" fill="#000">matched to nearest blip - OK</text>

  <!-- Tracks C and D crossing: a MIX-UP -->
  <circle cx="120" cy="250" r="6" fill="#000"/>
  <text x="120" y="270" text-anchor="middle" font-weight="bold" fill="#000">Track C</text>
  <circle cx="120" cy="290" r="6" fill="#000"/>
  <text x="120" y="306" text-anchor="middle" font-weight="bold" fill="#000">Track D</text>
  <!-- crossing predicted paths -->
  <line x1="120" y1="250" x2="230" y2="290" stroke="#000" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="120" y1="290" x2="230" y2="250" stroke="#000" stroke-width="1" stroke-dasharray="5 4"/>
  <!-- two blips near the crossing -->
  <circle cx="235" cy="252" r="5" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <circle cx="235" cy="288" r="5" stroke="#000" stroke-width="1.5" fill="#ffffff"/>
  <!-- crossing region highlight -->
  <rect x="150" y="248" width="60" height="44" stroke="#000" stroke-width="2" fill="#000" opacity="0.12"/>
  <rect x="150" y="248" width="60" height="44" stroke="#000" stroke-width="2" fill="none"/>
  <text x="180" y="240" text-anchor="middle" font-weight="bold" fill="#000">crossing!</text>
  <text x="300" y="262" text-anchor="start" font-weight="bold" fill="#000">tracks may SWAP</text>
  <text x="300" y="278" text-anchor="start" fill="#000">which blip is C? which is D?</text>
  <text x="300" y="292" text-anchor="start" fill="#000">association can mix them up</text>

  <!-- takeaway box -->
  <rect x="35" y="318" width="510" height="38" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="290" y="336" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Match each blip to its nearest track - but crossings and look-alikes</text>
  <text x="290" y="351" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">cause swaps. (Like a teacher matching today's kids to yesterday's names.)</text>
</svg>
