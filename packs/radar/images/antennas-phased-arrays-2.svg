<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A real beam: one main lobe plus small side lobes</text>

  <!-- antenna at bottom center -->
  <rect x="270" y="300" width="20" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="332" text-anchor="middle" fill="#000">antenna</text>

  <!-- MAIN LOBE: big wedge pointing up -->
  <polygon points="280,300 250,70 310,70" fill="#000" opacity="0.18" stroke="#000" stroke-width="2"/>
  <text x="280" y="60" text-anchor="middle" font-weight="bold" fill="#000">MAIN LOBE</text>
  <text x="280" y="150" text-anchor="middle" fill="#000" font-size="11">most energy,</text>
  <text x="280" y="166" text-anchor="middle" fill="#000" font-size="11">where you look</text>

  <!-- SIDE LOBES: small wedges left and right -->
  <polygon points="280,300 170,210 200,170" fill="#000" opacity="0.12" stroke="#000" stroke-width="1.5"/>
  <polygon points="280,300 390,210 360,170" fill="#000" opacity="0.12" stroke="#000" stroke-width="1.5"/>
  <text x="150" y="200" text-anchor="middle" fill="#000">side lobe</text>
  <text x="150" y="216" text-anchor="middle" fill="#000" font-size="11">(weak, unwanted)</text>
  <text x="410" y="200" text-anchor="middle" fill="#000">side lobe</text>
  <text x="410" y="216" text-anchor="middle" fill="#000" font-size="11">(weak, unwanted)</text>

  <!-- small far side lobes -->
  <polygon points="280,300 195,290 210,265" fill="#000" opacity="0.10" stroke="#000" stroke-width="1"/>
  <polygon points="280,300 365,290 350,265" fill="#000" opacity="0.10" stroke="#000" stroke-width="1"/>

  <!-- warning note -->
  <rect x="40" y="232" width="200" height="50" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="140" y="252" text-anchor="middle" fill="#000" font-size="11">side lobes can let in</text>
  <text x="140" y="268" text-anchor="middle" fill="#000" font-size="11">clutter / jamming the wrong way</text>

  <!-- takeaway box -->
  <rect x="40" y="324" width="480" height="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="344" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Designers keep the side lobes low.</text>
</svg>
