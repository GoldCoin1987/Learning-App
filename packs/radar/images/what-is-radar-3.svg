<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Doppler: a moving object changes the echo's pitch</text>

  <!-- divider -->
  <line x1="280" y1="50" x2="280" y2="250" stroke="#000" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- LEFT: approaching, waves squished -->
  <text x="140" y="62" text-anchor="middle" font-weight="bold" fill="#000">Coming toward you</text>
  <circle cx="80" cy="150" r="14" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <line x1="94" y1="150" x2="140" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <!-- squished arcs -->
  <path d="M170 130 A22 22 0 0 1 170 170" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M185 128 A26 26 0 0 1 185 172" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M200 126 A30 30 0 0 1 200 174" stroke="#000" stroke-width="2" fill="none"/>
  <text x="140" y="210" text-anchor="middle" fill="#000">waves squished together</text>
  <text x="140" y="230" text-anchor="middle" fill="#000">echo pitch rises = HIGHER</text>

  <!-- RIGHT: receding, waves stretched -->
  <text x="420" y="62" text-anchor="middle" font-weight="bold" fill="#000">Moving away</text>
  <circle cx="480" cy="150" r="14" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <line x1="466" y1="150" x2="420" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <!-- stretched arcs -->
  <path d="M390 120 A38 38 0 0 0 390 180" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M360 112 A46 46 0 0 0 360 188" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M325 104 A54 54 0 0 0 325 196" stroke="#000" stroke-width="2" fill="none"/>
  <text x="420" y="210" text-anchor="middle" fill="#000">waves stretched apart</text>
  <text x="420" y="230" text-anchor="middle" fill="#000">echo pitch drops = LOWER</text>

  <text x="280" y="280" text-anchor="middle" fill="#000">Just like a passing siren: the pitch shift tells radar the object's speed.</text>
  <text x="280" y="302" text-anchor="middle" fill="#000">Pitch change tells SPEED, not distance.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
