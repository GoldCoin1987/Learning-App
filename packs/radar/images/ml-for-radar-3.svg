<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="320" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Where ML sits: on TOP of the radar processing you already learned</text>

  <!-- stage 1: raw echoes -->
  <rect x="20" y="100" width="120" height="70" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="80" y="128" text-anchor="middle" font-weight="bold" fill="#000">raw echoes</text>
  <text x="80" y="148" text-anchor="middle" fill="#000">(IQ samples)</text>

  <line x1="140" y1="135" x2="172" y2="135" stroke="#000" stroke-width="2" marker-end="url(#ah3)"/>

  <!-- stage 2: usual processing / maps -->
  <rect x="174" y="86" width="150" height="98" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="249" y="108" text-anchor="middle" font-weight="bold" fill="#000">usual radar</text>
  <text x="249" y="124" text-anchor="middle" font-weight="bold" fill="#000">processing</text>
  <text x="249" y="146" text-anchor="middle" fill="#000">range-Doppler map</text>
  <text x="249" y="164" text-anchor="middle" fill="#000">micro-Doppler picture</text>

  <line x1="324" y1="135" x2="356" y2="135" stroke="#000" stroke-width="2" marker-end="url(#ah3)"/>

  <!-- stage 3: ML model -->
  <rect x="358" y="100" width="130" height="70" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="423" y="128" text-anchor="middle" font-weight="bold" fill="#000">ML model</text>
  <text x="423" y="148" text-anchor="middle" fill="#000">classify / decide</text>

  <line x1="488" y1="135" x2="520" y2="135" stroke="#000" stroke-width="2" marker-end="url(#ah3)"/>

  <!-- stage 4: label -->
  <rect x="522" y="100" width="100" height="70" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="572" y="124" text-anchor="middle" font-weight="bold" fill="#000">label</text>
  <text x="572" y="144" text-anchor="middle" fill="#000">person / car</text>
  <text x="572" y="160" text-anchor="middle" fill="#000">/ drone</text>

  <!-- note: works on the maps, not raw samples -->
  <text x="249" y="206" text-anchor="middle" fill="#000">the model usually works on these MAPS,</text>
  <text x="249" y="222" text-anchor="middle" fill="#000">not on the raw samples</text>

  <!-- note: alongside or instead of hand rules -->
  <text x="423" y="206" text-anchor="middle" fill="#000">added alongside (or instead of)</text>
  <text x="423" y="222" text-anchor="middle" fill="#000">hand-written rules - not magic</text>

  <defs>
    <marker id="ah3" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 z" fill="#000"/>
    </marker>
  </defs>

  <!-- takeaway box -->
  <rect x="20" y="256" width="602" height="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="321" y="276" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">ML is one more block on top of the signal processing - it reads the maps and decides.</text>
  <text x="321" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">It does not replace the physics; the radar still has to make those maps first.</text>
</svg>
