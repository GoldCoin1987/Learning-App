<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The duplexer: one antenna, a huge shout then a tiny listen</text>

  <!-- antenna in the middle -->
  <path d="M270 120 A36 36 0 0 1 270 192" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <line x1="270" y1="156" x2="245" y2="156" stroke="#000" stroke-width="2"/>
  <text x="258" y="110" text-anchor="middle" fill="#000">one antenna</text>

  <!-- duplexer switch box -->
  <rect x="150" y="138" width="80" height="38" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="190" y="161" text-anchor="middle" font-weight="bold" fill="#000">Duplexer</text>
  <line x1="230" y1="156" x2="244" y2="156" stroke="#000" stroke-width="2"/>

  <!-- LEFT: transmit phase -->
  <text x="150" y="60" text-anchor="middle" font-weight="bold" fill="#000">SHOUT (transmit)</text>
  <rect x="20" y="80" width="90" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="65" y="104" text-anchor="middle" fill="#000">Transmitter</text>
  <!-- big pulse arrow -->
  <path d="M110 100 L150 130" stroke="#000" stroke-width="4" fill="none" marker-end="url(#arr)"/>
  <text x="120" y="135" text-anchor="middle" fill="#000">HUGE pulse</text>

  <!-- receiver guarded -->
  <rect x="20" y="200" width="90" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="65" y="224" text-anchor="middle" fill="#000">Receiver</text>
  <!-- blocked path during transmit -->
  <line x1="150" y1="168" x2="112" y2="210" stroke="#000" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="124" y1="178" x2="140" y2="194" stroke="#000" stroke-width="2"/>
  <line x1="140" y1="178" x2="124" y2="194" stroke="#000" stroke-width="2"/>
  <text x="118" y="172" text-anchor="middle" fill="#000">ears covered</text>

  <!-- RIGHT: receive phase -->
  <text x="430" y="60" text-anchor="middle" font-weight="bold" fill="#000">LISTEN (receive)</text>
  <!-- faint echo into antenna -->
  <path d="M420 100 L300 140" stroke="#000" stroke-width="1.5" fill="none" stroke-dasharray="6 5" marker-end="url(#arr)"/>
  <text x="400" y="118" text-anchor="middle" fill="#000">tiny echo</text>
  <!-- echo routed to receiver now -->
  <path d="M180 176 L120 205" stroke="#000" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="200" y="205" text-anchor="middle" fill="#000">to receiver</text>

  <!-- takeaway -->
  <rect x="60" y="266" width="440" height="80" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Like covering your ears while you shout, then uncovering</text>
  <text x="280" y="306" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">them to listen.</text>
  <text x="280" y="326" text-anchor="middle" fill="#000">The duplexer shares one antenna AND protects the receiver</text>
  <text x="280" y="340" text-anchor="middle" fill="#000">from the powerful transmit pulse.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
