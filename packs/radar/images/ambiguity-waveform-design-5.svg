<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Waveform design: cover what matters, push the fuzz aside</text>

  <!-- grid box: range-error vs speed-error -->
  <rect x="120" y="52" width="320" height="210" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- center lines -->
  <line x1="280" y1="52" x2="280" y2="262" stroke="#000" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="120" y1="157" x2="440" y2="157" stroke="#000" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- 'mission' clear zone: a box around center we care about -->
  <rect x="240" y="117" width="80" height="80" fill="#ffffff" stroke="#000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="280" y="110" text-anchor="middle" font-weight="bold" fill="#000">keep this zone clean</text>
  <text x="280" y="161" text-anchor="middle" fill="#000">(speeds &amp;</text>
  <text x="280" y="175" text-anchor="middle" fill="#000">ranges we care about)</text>

  <!-- sharp central peak inside the zone -->
  <circle cx="280" cy="157" r="6" fill="#000"/>

  <!-- ambiguities pushed to the corners (don't-care regions) -->
  <g fill="#000" opacity="0.45">
    <circle cx="150" cy="80" r="6"/>
    <circle cx="410" cy="80" r="6"/>
    <circle cx="150" cy="235" r="6"/>
    <circle cx="410" cy="235" r="6"/>
  </g>
  <text x="150" y="68" text-anchor="middle" fill="#000">fuzz pushed</text>
  <text x="410" y="68" text-anchor="middle" fill="#000">out here</text>
  <text x="150" y="252" text-anchor="middle" fill="#000">(don't-care</text>
  <text x="410" y="252" text-anchor="middle" fill="#000">regions)</text>

  <!-- axes labels -->
  <text x="280" y="290" text-anchor="middle" font-weight="bold" fill="#000">speed error &#8594;</text>
  <text x="104" y="157" text-anchor="middle" font-weight="bold" fill="#000" transform="rotate(-90 104 157)">range error &#8594;</text>

  <!-- takeaway box -->
  <rect x="40" y="302" width="480" height="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="322" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Like one blanket on a cold night: you can't cover everything,</text>
  <text x="280" y="340" text-anchor="middle" fill="#000">so cover what matters and push the fuzz where it won't hurt.</text>
</svg>
