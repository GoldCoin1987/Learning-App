<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 330" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="330" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">To see twice as far costs about 16x the power</text>

  <!-- baseline axis -->
  <line x1="70" y1="250" x2="520" y2="250" stroke="#000" stroke-width="2"/>
  <text x="295" y="278" text-anchor="middle" fill="#000">detection range (how far the radar can see)</text>

  <!-- bar 1: range 1x, power 1x -->
  <rect x="110" y="210" width="60" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="140" y="234" text-anchor="middle" fill="#000">1x</text>
  <text x="140" y="200" text-anchor="middle" fill="#000">range 1x</text>
  <text x="140" y="186" text-anchor="middle" font-weight="bold" fill="#000">power 1x</text>

  <!-- bar 2: range 2x, power 16x (tall) -->
  <rect x="330" y="70" width="60" height="180" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="165" text-anchor="middle" fill="#000">16x</text>
  <text x="360" y="60" text-anchor="middle" fill="#000">range 2x</text>
  <text x="360" y="46" text-anchor="middle" font-weight="bold" fill="#000">power 16x</text>

  <!-- range markers under axis -->
  <line x1="140" y1="250" x2="140" y2="258" stroke="#000" stroke-width="2"/>
  <line x1="360" y1="250" x2="360" y2="258" stroke="#000" stroke-width="2"/>
  <text x="140" y="270" text-anchor="middle" fill="#000">R</text>
  <text x="360" y="270" text-anchor="middle" fill="#000">2R</text>

  <!-- arrow showing 2^4 = 16 -->
  <line x1="175" y1="150" x2="325" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <text x="250" y="142" text-anchor="middle" font-weight="bold" fill="#000">2^4 = 16</text>

  <!-- footnote about doubling power -->
  <text x="280" y="305" text-anchor="middle" fill="#000">Flip side: doubling the power only extends range by about 19% (fourth root of 2 = 1.19).</text>
  <text x="280" y="322" text-anchor="middle" fill="#000">Reaching farther is brutally expensive.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
