<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Find the target hidden in the clutter</text>

  <!-- radar at left -->
  <circle cx="60" cy="250" r="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="60" y1="236" x2="60" y2="216" stroke="#000" stroke-width="2"/>
  <text x="60" y="290" text-anchor="middle" font-weight="bold" fill="#000">RADAR</text>

  <!-- ground -->
  <line x1="30" y1="270" x2="530" y2="270" stroke="#000" stroke-width="2"/>
  <text x="130" y="288" text-anchor="middle" fill="#000">ground clutter (strong echo)</text>

  <!-- hills (surface clutter) -->
  <polyline points="300,270 340,210 380,270" fill="none" stroke="#000" stroke-width="2"/>
  <polyline points="360,270 400,225 440,270" fill="none" stroke="#000" stroke-width="2"/>
  <text x="385" y="205" text-anchor="middle" fill="#000">hills</text>

  <!-- sea waves clutter -->
  <path d="M460,270 q8,-10 16,0 q8,-10 16,0 q8,-10 16,0" fill="none" stroke="#000" stroke-width="2"/>
  <text x="492" y="288" text-anchor="middle" fill="#000">sea waves</text>

  <!-- rain cloud (volume clutter) -->
  <ellipse cx="180" cy="90" rx="46" ry="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="160" y1="112" x2="156" y2="130" stroke="#000" stroke-width="1.5"/>
  <line x1="180" y1="112" x2="176" y2="130" stroke="#000" stroke-width="1.5"/>
  <line x1="200" y1="112" x2="196" y2="130" stroke="#000" stroke-width="1.5"/>
  <text x="180" y="60" text-anchor="middle" fill="#000">rain (strong echo)</text>

  <!-- the small wanted target: a plane -->
  <polygon points="330,120 352,128 330,136 336,128" fill="#000"/>
  <text x="330" y="108" text-anchor="middle" font-weight="bold" fill="#000">tiny WANTED target</text>

  <!-- big arrows showing strong clutter echoes vs small target echo -->
  <text x="280" y="160" text-anchor="middle" fill="#000">clutter echoes are often FAR stronger than the target</text>

  <!-- takeaway box -->
  <rect x="40" y="334" width="480" height="24" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="351" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Clutter = strong unwanted echoes; the real target is the small one to find.</text>
</svg>
