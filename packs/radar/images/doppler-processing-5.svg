<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Blind speeds: a mover that looks 'unchanged'</text>

  <!-- A real mover, but its echo happens to repeat identically each pulse -->
  <text x="280" y="52" text-anchor="middle" font-weight="bold" fill="#000">This target IS moving, yet its echo repeats the same each pulse</text>
  <line x1="40" y1="118" x2="520" y2="118" stroke="#000" stroke-width="1"/>
  <!-- 5 identical-looking pulses -->
  <g stroke="#000" stroke-width="1.8" fill="none">
    <polyline points="55,118 62,102 69,134 76,102 83,118"/>
    <polyline points="150,118 157,102 164,134 171,102 178,118"/>
    <polyline points="245,118 252,102 259,134 266,102 273,118"/>
    <polyline points="340,118 347,102 354,134 361,102 368,118"/>
    <polyline points="435,118 442,102 449,134 456,102 463,118"/>
  </g>
  <text x="55" y="148" text-anchor="start" fill="#000">pulse 1</text>
  <text x="245" y="148" text-anchor="start" fill="#000">pulse 3</text>
  <text x="435" y="148" text-anchor="start" fill="#000">pulse 5</text>
  <text x="280" y="170" text-anchor="middle" fill="#000">its speed lines up exactly with the pulse rhythm, so it looks still</text>

  <!-- consequence: MTI subtraction wrongly cancels it -->
  <rect x="70" y="186" width="420" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="204" text-anchor="middle" fill="#000">MTI subtraction sees 'no change' and cancels it too -</text>
  <text x="280" y="220" text-anchor="middle" font-weight="bold" fill="#000">the real mover vanishes! This speed is a 'blind speed'.</text>

  <!-- the fix: stagger PRF -->
  <text x="280" y="252" text-anchor="middle" font-weight="bold" fill="#000">Fix: stagger the PRF (change the gap between pulses)</text>
  <!-- uneven pulse spacing to depict stagger -->
  <line x1="40" y1="300" x2="520" y2="300" stroke="#000" stroke-width="1"/>
  <g stroke="#000" stroke-width="2">
    <line x1="70" y1="300" x2="70" y2="278"/>
    <line x1="150" y1="300" x2="150" y2="278"/>
    <line x1="260" y1="300" x2="260" y2="278"/>
    <line x1="320" y1="300" x2="320" y2="278"/>
    <line x1="450" y1="300" x2="450" y2="278"/>
  </g>
  <text x="280" y="320" text-anchor="middle" fill="#000">uneven spacing means no single speed can hide every time</text>

  <!-- takeaway box -->
  <rect x="55" y="330" width="450" height="24" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="347" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Varying the PRF stops real movers from disappearing at a blind speed.</text>
</svg>
