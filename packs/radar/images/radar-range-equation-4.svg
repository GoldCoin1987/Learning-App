<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 330" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="330" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Detection = does the echo stand ABOVE the noise?</text>

  <!-- vertical axis: signal strength -->
  <line x1="70" y1="60" x2="70" y2="250" stroke="#000" stroke-width="2"/>
  <text x="70" y="50" text-anchor="middle" fill="#000">echo strength</text>
  <line x1="70" y1="250" x2="520" y2="250" stroke="#000" stroke-width="2"/>

  <!-- noise floor line (the background hiss) -->
  <line x1="70" y1="185" x2="520" y2="185" stroke="#000" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="455" y="178" text-anchor="middle" fill="#000">noise floor (hiss)</text>

  <!-- jagged noise under the line -->
  <polyline points="70,200 95,193 120,205 145,196 170,206 195,194 220,204 245,197 270,205 295,193 320,206 345,196 370,204 395,195 420,205 445,197 470,203 495,196 520,204" stroke="#000" stroke-width="1" fill="none"/>

  <!-- strong echo bar, well above noise: DETECTED -->
  <rect x="150" y="90" width="50" height="160" fill="#000"/>
  <text x="175" y="80" text-anchor="middle" font-weight="bold" fill="#000">DETECTED</text>
  <text x="175" y="270" text-anchor="middle" fill="#000">echo above hiss</text>

  <!-- weak echo bar, sinking below noise: MISSED -->
  <rect x="370" y="200" width="50" height="50" fill="#000"/>
  <text x="395" y="80" text-anchor="middle" font-weight="bold" fill="#000">MISSED</text>
  <text x="395" y="270" text-anchor="middle" fill="#000">echo lost in hiss</text>

  <text x="280" y="298" text-anchor="middle" fill="#000">What matters is the signal-to-noise ratio (SNR): how far the echo rises above the hiss.</text>
  <text x="280" y="317" text-anchor="middle" fill="#000">The range limit is where a faint echo finally sinks into the noise.</text>
</svg>
