<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Who moves? SAR vs ISAR</text>

  <!-- LEFT: SAR -->
  <rect x="20" y="40" width="250" height="270" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="145" y="62" text-anchor="middle" font-weight="bold" fill="#000">SAR</text>
  <text x="145" y="79" text-anchor="middle" fill="#000" font-size="11">radar MOVES, scene stays still</text>

  <!-- moving radar along a path -->
  <line x1="50" y1="110" x2="240" y2="110" stroke="#000" stroke-width="1.5" stroke-dasharray="2 4"/>
  <rect x="60" y="102" width="14" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="130" y="102" width="14" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="200" y="102" width="14" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="215" y1="110" x2="245" y2="110" stroke="#000" stroke-width="2"/>
  <polygon points="245,110 232,104 232,116" fill="#000"/>
  <text x="145" y="134" text-anchor="middle" fill="#000" font-size="11">radar flies along</text>

  <!-- still ground scene -->
  <rect x="70" y="240" width="150" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="120" y1="240" x2="120" y2="280" stroke="#000" stroke-width="0.5"/>
  <line x1="170" y1="240" x2="170" y2="280" stroke="#000" stroke-width="0.5"/>
  <text x="145" y="300" text-anchor="middle" fill="#000" font-size="11">still ground</text>
  <!-- beams down to ground -->
  <line x1="67" y1="118" x2="100" y2="240" stroke="#000" stroke-width="0.7"/>
  <line x1="137" y1="118" x2="145" y2="240" stroke="#000" stroke-width="0.7"/>
  <line x1="207" y1="118" x2="190" y2="240" stroke="#000" stroke-width="0.7"/>

  <!-- RIGHT: ISAR -->
  <rect x="290" y="40" width="250" height="270" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="415" y="62" text-anchor="middle" font-weight="bold" fill="#000">ISAR</text>
  <text x="415" y="79" text-anchor="middle" fill="#000" font-size="11">radar STILL, target moves</text>

  <!-- still radar -->
  <rect x="310" y="150" width="16" height="24" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="318" y="190" text-anchor="middle" fill="#000" font-size="11">still radar</text>
  <!-- watching beam -->
  <line x1="326" y1="162" x2="430" y2="162" stroke="#000" stroke-width="0.7" stroke-dasharray="3 3"/>

  <!-- rotating target (ship on a turntable) -->
  <circle cx="450" cy="162" r="46" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <!-- a little ship shape -->
  <polygon points="424,168 476,168 466,182 434,182" fill="#000" opacity="0.15" stroke="#000" stroke-width="1.5"/>
  <rect x="440" y="150" width="20" height="18" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <!-- rotation arrows -->
  <path d="M 450 108 A 54 54 0 0 1 504 162" fill="none" stroke="#000" stroke-width="1.5"/>
  <polygon points="504,162 498,148 510,150" fill="#000"/>
  <path d="M 450 216 A 54 54 0 0 1 396 162" fill="none" stroke="#000" stroke-width="1.5"/>
  <polygon points="396,162 402,176 390,174" fill="#000"/>
  <text x="450" y="240" text-anchor="middle" fill="#000" font-size="11">target turns / rocks</text>
  <text x="415" y="272" text-anchor="middle" fill="#000" font-size="10">(like a statue on a turntable</text>
  <text x="415" y="286" text-anchor="middle" fill="#000" font-size="10">while you stand still)</text>

  <!-- takeaway box -->
  <rect x="40" y="326" width="480" height="28" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="344" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Either way, many viewing angles build the picture: SAR the radar moves, ISAR the target moves.</text>
</svg>
