<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The echo weakens going OUT and coming BACK</text>

  <!-- radar on the left -->
  <path d="M40 150 A34 34 0 0 1 40 218" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <line x1="40" y1="184" x2="60" y2="184" stroke="#000" stroke-width="2"/>
  <circle cx="60" cy="184" r="4" fill="#000"/>
  <text x="48" y="245" text-anchor="middle" fill="#000">radar</text>

  <!-- target on the right -->
  <g stroke="#000" stroke-width="2" fill="#ffffff">
    <ellipse cx="500" cy="150" rx="26" ry="8"/>
    <path d="M488 150 L478 136 L486 150 Z" fill="#000"/>
  </g>
  <text x="500" y="125" text-anchor="middle" fill="#000">target</text>

  <!-- outgoing spreading wave: arcs that grow as they move right -->
  <text x="195" y="100" text-anchor="middle" fill="#000">wave OUT: spreads + dims</text>
  <path d="M95 165 A30 30 0 0 1 95 203" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M150 150 A45 45 0 0 1 150 218" stroke="#000" stroke-width="1.5" fill="none" stroke-dasharray="5 4"/>
  <path d="M215 138 A58 58 0 0 1 215 230" stroke="#000" stroke-width="1" fill="none" stroke-dasharray="4 5"/>
  <line x1="250" y1="184" x2="470" y2="160" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>

  <!-- returning spreading echo: arcs that grow as they move left, lower path -->
  <text x="320" y="295" text-anchor="middle" fill="#000">echo BACK: spreads + dims AGAIN</text>
  <path d="M455 250 A26 26 0 0 0 455 218" stroke="#000" stroke-width="1" fill="none" stroke-dasharray="4 5"/>
  <path d="M395 262 A40 40 0 0 0 395 206" stroke="#000" stroke-width="1.2" fill="none" stroke-dasharray="4 5"/>
  <line x1="470" y1="220" x2="95" y2="240" stroke="#000" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arr)"/>

  <!-- big takeaway box -->
  <rect x="150" y="150" width="260" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">dims twice =&gt; echo drops as R^4</text>

  <text x="280" y="313" text-anchor="middle" fill="#000">Like a flashlight that dims with distance, but here it dims on the way out AND on the way back.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
