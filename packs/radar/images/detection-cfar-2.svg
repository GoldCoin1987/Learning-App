<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" font-family="sans-serif" font-size="11">
  <rect x="0" y="0" width="600" height="340" fill="#ffffff"/>
  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Where you set the threshold trades two mistakes</text>

  <!-- ===== Panel 1: too low ===== -->
  <text x="110" y="52" text-anchor="middle" font-weight="bold" fill="#000">Threshold too LOW</text>
  <line x1="30" y1="70" x2="30" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="30" y1="200" x2="190" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="30" y1="180" x2="190" y2="180" stroke="#000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <polyline points="30,188 45,178 60,190 75,175 90,100 105,182 120,176 135,160 150,184 165,170 180,188" stroke="#000" stroke-width="1.3" fill="none"/>
  <circle cx="90" cy="100" r="4" fill="#000"/>
  <circle cx="45" cy="178" r="3" fill="#000"/>
  <circle cx="75" cy="175" r="3" fill="#000"/>
  <circle cx="135" cy="160" r="3" fill="#000"/>
  <circle cx="165" cy="170" r="3" fill="#000"/>
  <text x="110" y="222" text-anchor="middle" fill="#000">many FALSE ALARMS</text>
  <text x="110" y="238" text-anchor="middle" fill="#000">(noise pokes above)</text>

  <!-- ===== Panel 2: too high ===== -->
  <text x="300" y="52" text-anchor="middle" font-weight="bold" fill="#000">Threshold too HIGH</text>
  <line x1="220" y1="70" x2="220" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="220" y1="200" x2="380" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="220" y1="92" x2="380" y2="92" stroke="#000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <polyline points="220,188 235,178 250,190 265,175 280,110 295,182 310,176 325,150 340,184 355,170 370,188" stroke="#000" stroke-width="1.3" fill="none"/>
  <circle cx="280" cy="110" r="4" fill="#000"/>
  <circle cx="325" cy="150" r="4" fill="#000"/>
  <text x="300" y="222" text-anchor="middle" fill="#000">real targets MISSED</text>
  <text x="300" y="238" text-anchor="middle" fill="#000">(peaks below line)</text>

  <!-- ===== Panel 3: balanced ===== -->
  <text x="490" y="52" text-anchor="middle" font-weight="bold" fill="#000">Threshold BALANCED</text>
  <line x1="410" y1="70" x2="410" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="410" y1="200" x2="570" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="410" y1="138" x2="570" y2="138" stroke="#000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <polyline points="410,188 425,178 440,190 455,175 470,108 485,182 500,176 515,150 530,184 545,170 560,188" stroke="#000" stroke-width="1.3" fill="none"/>
  <circle cx="470" cy="108" r="4" fill="#000"/>
  <text x="490" y="222" text-anchor="middle" fill="#000">real targets kept,</text>
  <text x="490" y="238" text-anchor="middle" fill="#000">noise rejected</text>

  <!-- takeaway box -->
  <rect x="40" y="290" width="520" height="42" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="300" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Lower the threshold and false alarms rise; raise it and misses rise.</text>
  <text x="300" y="324" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">You cannot make both zero at once.</text>
</svg>
