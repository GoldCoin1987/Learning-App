<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="300" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Three jobs a radar can do</text>

  <!-- Panel 1: SEARCH -->
  <rect x="25" y="50" width="160" height="180" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="105" y="72" text-anchor="middle" font-weight="bold" fill="#000">SEARCH</text>
  <circle cx="105" cy="140" r="45" stroke="#000" stroke-width="1" fill="#ffffff"/>
  <line x1="105" y1="140" x2="105" y2="95" stroke="#000" stroke-width="2"/>
  <path d="M105 95 A45 45 0 0 1 145 118" stroke="#000" stroke-width="1" fill="none" marker-end="url(#arr)"/>
  <circle cx="135" cy="120" r="3" fill="#000"/>
  <circle cx="80" cy="165" r="3" fill="#000"/>
  <text x="105" y="210" text-anchor="middle" fill="#000">scan around,</text>
  <text x="105" y="224" text-anchor="middle" fill="#000">find things</text>

  <!-- Panel 2: TRACK -->
  <rect x="200" y="50" width="160" height="180" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="72" text-anchor="middle" font-weight="bold" fill="#000">TRACK</text>
  <path d="M225 180 Q270 100 335 110" stroke="#000" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <circle cx="225" cy="180" r="3" fill="#000"/>
  <circle cx="262" cy="138" r="3" fill="#000"/>
  <circle cx="300" cy="118" r="3" fill="#000"/>
  <text x="280" y="210" text-anchor="middle" fill="#000">follow one</text>
  <text x="280" y="224" text-anchor="middle" fill="#000">found object</text>

  <!-- Panel 3: IMAGE -->
  <rect x="375" y="50" width="160" height="180" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="455" y="72" text-anchor="middle" font-weight="bold" fill="#000">IMAGE</text>
  <rect x="420" y="95" width="70" height="70" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <path d="M428 150 L445 120 L460 140 L472 110 L482 130" stroke="#000" stroke-width="2" fill="none"/>
  <text x="455" y="210" text-anchor="middle" fill="#000">build a</text>
  <text x="455" y="224" text-anchor="middle" fill="#000">picture</text>

  <text x="280" y="262" text-anchor="middle" fill="#000">Pulsed radar = send a pulse, then listen.</text>
  <text x="280" y="282" text-anchor="middle" fill="#000">Continuous radar = transmit all the time.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
