<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The dream 'report card': a single sharp thumbtack</text>

  <!-- grid box: range-error vs speed-error -->
  <rect x="120" y="58" width="320" height="210" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- faint grid -->
  <line x1="200" y1="58" x2="200" y2="268" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="360" y1="58" x2="360" y2="268" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="120" y1="110" x2="440" y2="110" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="120" y1="216" x2="440" y2="216" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4"/>

  <!-- center crosshair: zero range-error, zero speed-error -->
  <line x1="280" y1="58" x2="280" y2="268" stroke="#000" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="120" y1="163" x2="440" y2="163" stroke="#000" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- the single sharp peak (a thumbtack) at the center -->
  <polygon points="280,78 290,163 270,163" fill="#000"/>
  <circle cx="280" cy="78" r="5" fill="#000"/>
  <text x="280" y="70" text-anchor="middle" font-weight="bold" fill="#000">one sharp peak</text>

  <!-- 'flat everywhere else' notes -->
  <text x="180" y="240" text-anchor="middle" fill="#000">flat: no other bumps</text>
  <text x="385" y="100" text-anchor="middle" fill="#000">flat: no confusion</text>

  <!-- axes labels -->
  <text x="280" y="288" text-anchor="middle" font-weight="bold" fill="#000">speed error (how off in speed) &#8594;</text>
  <text x="104" y="163" text-anchor="middle" font-weight="bold" fill="#000" transform="rotate(-90 104 163)">range error (how off in range) &#8594;</text>

  <!-- takeaway box -->
  <rect x="40" y="300" width="480" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Ideal: one tall spike at the true range and speed, perfectly flat elsewhere.</text>
  <text x="280" y="340" text-anchor="middle" fill="#000">No place a target could be mistaken for another. (Sadly, impossible.)</text>
</svg>
