<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Matched filter: compare the echo to a stored copy</text>

  <!-- the noisy incoming echo -->
  <text x="150" y="54" text-anchor="middle" font-weight="bold" fill="#000">Incoming echo (buried in noise)</text>
  <line x1="40" y1="100" x2="270" y2="100" stroke="#000" stroke-width="1"/>
  <polyline points="45,100 55,92 63,107 72,95 82,104 90,90 100,108 110,96 120,103 130,93 140,106 150,98 160,104 170,91 180,107 190,95 200,103 210,97 220,105 230,93 240,104 250,99 260,102" stroke="#000" stroke-width="1.3" fill="none"/>
  <text x="150" y="122" text-anchor="middle" fill="#000">somewhere in here is our pulse</text>

  <!-- the stored copy -->
  <text x="410" y="54" text-anchor="middle" font-weight="bold" fill="#000">Stored copy of what was sent</text>
  <line x1="300" y1="100" x2="530" y2="100" stroke="#000" stroke-width="1"/>
  <rect x="345" y="74" width="140" height="50" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <polyline points="348,100 360,80 372,100 386,82 400,100 416,86 430,100 448,90 462,100 480,94" stroke="#000" stroke-width="1.5" fill="none"/>
  <text x="410" y="122" text-anchor="middle" fill="#000">the exact transmitted shape</text>

  <!-- compare arrows down to a peak -->
  <line x1="150" y1="132" x2="240" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arr4)"/>
  <line x1="410" y1="132" x2="320" y2="180" stroke="#000" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="280" y="160" text-anchor="middle" font-weight="bold" fill="#000">slide one past the other and compare</text>

  <!-- the output peak where they line up -->
  <line x1="80" y1="270" x2="500" y2="270" stroke="#000" stroke-width="2"/>
  <text x="290" y="290" text-anchor="middle" fill="#000">how well they match, vs position</text>
  <polyline points="90,270 250,270 262,266 272,258 290,196 308,258 318,266 330,270 490,270" stroke="#000" stroke-width="2" fill="none"/>
  <line x1="290" y1="196" x2="360" y2="200" stroke="#000" stroke-width="1"/>
  <text x="364" y="204" text-anchor="start" font-weight="bold" fill="#000">strong match = a PEAK</text>

  <!-- takeaway box -->
  <rect x="55" y="306" width="450" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="332" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">It does not invent a target; it just lines up a known pulse and peaks on the match.</text>

  <defs>
    <marker id="arr4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
