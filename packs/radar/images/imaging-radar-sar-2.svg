<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="380" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">SAR: a moving radar acts like one huge antenna</text>

  <!-- flight path line -->
  <line x1="60" y1="70" x2="500" y2="70" stroke="#000" stroke-width="1.5" stroke-dasharray="2 4"/>
  <text x="280" y="58" text-anchor="middle" fill="#000" font-size="11">flight path</text>

  <!-- small antenna shown at several positions along the path -->
  <!-- position 1 -->
  <rect x="78" y="62" width="14" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="85" y1="78" x2="200" y2="250" stroke="#000" stroke-width="1"/>
  <!-- position 2 -->
  <rect x="168" y="62" width="14" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="175" y1="78" x2="220" y2="250" stroke="#000" stroke-width="1"/>
  <!-- position 3 -->
  <rect x="258" y="62" width="14" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="265" y1="78" x2="250" y2="250" stroke="#000" stroke-width="1"/>
  <!-- position 4 -->
  <rect x="348" y="62" width="14" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="355" y1="78" x2="280" y2="250" stroke="#000" stroke-width="1"/>
  <!-- position 5 -->
  <rect x="438" y="62" width="14" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="445" y1="78" x2="300" y2="250" stroke="#000" stroke-width="1"/>

  <text x="120" y="100" text-anchor="middle" fill="#000" font-size="11">small antenna collects an echo at each spot</text>

  <!-- direction-of-flight arrow -->
  <line x1="470" y1="92" x2="510" y2="92" stroke="#000" stroke-width="2"/>
  <polygon points="510,92 496,86 496,98" fill="#000"/>
  <text x="490" y="110" text-anchor="middle" fill="#000" font-size="11">moves</text>

  <!-- brace showing the synthetic aperture spanning the path -->
  <path d="M 85 130 C 85 142, 285 142, 285 130" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M 285 130 C 285 142, 445 142, 445 154" fill="none" stroke="#000" stroke-width="0"/>
  <line x1="85" y1="136" x2="445" y2="136" stroke="#000" stroke-width="2"/>
  <text x="265" y="160" text-anchor="middle" font-weight="bold" fill="#000">echoes combined = one ENORMOUS "synthetic" antenna</text>
  <text x="265" y="176" text-anchor="middle" fill="#000" font-size="11">as long as the flight path -&gt; a very narrow effective beam</text>

  <!-- the ground / sharp image swath -->
  <rect x="150" y="250" width="300" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="180" y1="250" x2="180" y2="310" stroke="#000" stroke-width="0.5"/>
  <line x1="210" y1="250" x2="210" y2="310" stroke="#000" stroke-width="0.5"/>
  <line x1="240" y1="250" x2="240" y2="310" stroke="#000" stroke-width="0.5"/>
  <line x1="270" y1="250" x2="270" y2="310" stroke="#000" stroke-width="0.5"/>
  <line x1="300" y1="250" x2="300" y2="310" stroke="#000" stroke-width="0.5"/>
  <line x1="330" y1="250" x2="330" y2="310" stroke="#000" stroke-width="0.5"/>
  <line x1="360" y1="250" x2="360" y2="310" stroke="#000" stroke-width="0.5"/>
  <line x1="390" y1="250" x2="390" y2="310" stroke="#000" stroke-width="0.5"/>
  <line x1="420" y1="250" x2="420" y2="310" stroke="#000" stroke-width="0.5"/>
  <text x="300" y="334" text-anchor="middle" font-weight="bold" fill="#000">sharp, high-resolution image of the ground</text>

  <!-- takeaway box -->
  <rect x="40" y="348" width="480" height="24" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Fly a small antenna and combine the echoes: longer path = finer detail.</text>
</svg>
