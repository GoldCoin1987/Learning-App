<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Radar is everywhere</text>

  <!-- Cell 1: air traffic control -->
  <rect x="30" y="50" width="160" height="110" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <g stroke="#000" stroke-width="2" fill="#ffffff">
    <ellipse cx="110" cy="95" rx="26" ry="7"/>
    <path d="M98 95 L88 82 L96 95 Z" fill="#000"/>
  </g>
  <text x="110" y="135" text-anchor="middle" fill="#000">Air traffic</text>
  <text x="110" y="150" text-anchor="middle" fill="#000">(see planes)</text>

  <!-- Cell 2: weather -->
  <rect x="200" y="50" width="160" height="110" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <path d="M255 95 q-14 0 -14 12 q-14 0 -10 14 h50 q6 -16 -10 -16 q0 -12 -16 -10 z" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <line x1="248" y1="128" x2="246" y2="138" stroke="#000" stroke-width="2"/>
  <line x1="262" y1="128" x2="260" y2="138" stroke="#000" stroke-width="2"/>
  <line x1="276" y1="128" x2="274" y2="138" stroke="#000" stroke-width="2"/>
  <text x="280" y="150" text-anchor="middle" fill="#000">Weather (storms)</text>

  <!-- Cell 3: car -->
  <rect x="370" y="50" width="160" height="110" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <path d="M408 110 h44 l8 -16 h-44 z" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <circle cx="418" cy="114" r="6" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <circle cx="448" cy="114" r="6" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <text x="450" y="135" text-anchor="middle" fill="#000">Car cruise /</text>
  <text x="450" y="150" text-anchor="middle" fill="#000">crash warning</text>

  <!-- Cell 4: ship -->
  <rect x="115" y="170" width="160" height="110" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <path d="M165 225 h60 l-10 18 h-40 z" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <line x1="195" y1="225" x2="195" y2="200" stroke="#000" stroke-width="2"/>
  <line x1="170" y1="248" x2="220" y2="248" stroke="#000" stroke-width="2"/>
  <text x="195" y="270" text-anchor="middle" fill="#000">Ships (in fog)</text>

  <!-- Cell 5: speed gun -->
  <rect x="285" y="170" width="160" height="110" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="345" y="205" width="34" height="20" stroke="#000" stroke-width="2" fill="#ffffff"/>
  <line x1="345" y1="225" x2="345" y2="238" stroke="#000" stroke-width="2"/>
  <line x1="379" y1="213" x2="398" y2="213" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <text x="365" y="270" text-anchor="middle" fill="#000">Police speed gun</text>

  <text x="280" y="305" text-anchor="middle" fill="#000">Radio waves see through darkness, cloud, and rain where eyes cannot.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
