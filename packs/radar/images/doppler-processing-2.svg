<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="380" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Watch the same spot over many pulses</text>

  <!-- STILL: top row -->
  <text x="280" y="52" text-anchor="middle" font-weight="bold" fill="#000">Still thing: echo looks identical pulse to pulse</text>
  <line x1="40" y1="120" x2="520" y2="120" stroke="#000" stroke-width="1"/>
  <!-- 5 identical pulses (same wiggle, same position within each slot) -->
  <g stroke="#000" stroke-width="1.8" fill="none">
    <polyline points="55,120 62,104 69,136 76,104 83,120"/>
    <polyline points="150,120 157,104 164,136 171,104 178,120"/>
    <polyline points="245,120 252,104 259,136 266,104 273,120"/>
    <polyline points="340,120 347,104 354,136 361,104 368,120"/>
    <polyline points="435,120 442,104 449,136 456,104 463,120"/>
  </g>
  <text x="55" y="150" text-anchor="start" fill="#000">pulse 1</text>
  <text x="150" y="150" text-anchor="start" fill="#000">pulse 2</text>
  <text x="245" y="150" text-anchor="start" fill="#000">pulse 3</text>
  <text x="340" y="150" text-anchor="start" fill="#000">pulse 4</text>
  <text x="435" y="150" text-anchor="start" fill="#000">pulse 5</text>
  <text x="280" y="170" text-anchor="middle" fill="#000">unchanging = no movement here</text>

  <!-- MOVING: bottom row -->
  <text x="280" y="216" text-anchor="middle" font-weight="bold" fill="#000">Moving thing: echo gently shifts pulse to pulse</text>
  <line x1="40" y1="284" x2="520" y2="284" stroke="#000" stroke-width="1"/>
  <!-- 5 pulses whose wiggle creeps to the right (phase marches along) -->
  <g stroke="#000" stroke-width="1.8" fill="none">
    <polyline points="55,284 62,268 69,300 76,268 83,284"/>
    <polyline points="152,284 159,268 166,300 173,268 180,284"/>
    <polyline points="249,284 256,268 263,300 270,268 277,284"/>
    <polyline points="346,284 353,268 360,300 367,268 374,284"/>
    <polyline points="443,284 450,268 457,300 464,268 471,284"/>
  </g>
  <!-- drift arrow showing the creep -->
  <line x1="69" y1="312" x2="457" y2="312" stroke="#000" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrm)"/>
  <text x="263" y="330" text-anchor="middle" fill="#000">steady, regular change = something is moving</text>

  <!-- takeaway box -->
  <rect x="55" y="344" width="450" height="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="363" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">One pulse can't show this - the regular drift only appears over many.</text>

  <defs>
    <marker id="arrm" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
