<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">MTI: subtract one pulse from the next</text>

  <!-- Three panels: pulse N, minus pulse N-1, equals result -->
  <!-- Panel A: pulse N -->
  <rect x="30" y="60" width="150" height="150" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="105" y="80" text-anchor="middle" font-weight="bold" fill="#000">pulse N</text>
  <!-- still building (tall) -->
  <rect x="55" y="120" width="26" height="70" fill="#000" opacity="0.18" stroke="#000" stroke-width="1.5"/>
  <text x="68" y="205" text-anchor="middle" fill="#000">still</text>
  <!-- mover (small dot) at one spot -->
  <circle cx="140" cy="130" r="7" fill="#000"/>
  <text x="140" y="150" text-anchor="middle" fill="#000">mover</text>

  <text x="195" y="140" text-anchor="middle" font-size="22" font-weight="bold" fill="#000">&#8722;</text>

  <!-- Panel B: pulse N-1 -->
  <rect x="210" y="60" width="150" height="150" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="285" y="80" text-anchor="middle" font-weight="bold" fill="#000">pulse N-1</text>
  <!-- SAME still building, same place -->
  <rect x="235" y="120" width="26" height="70" fill="#000" opacity="0.18" stroke="#000" stroke-width="1.5"/>
  <text x="248" y="205" text-anchor="middle" fill="#000">still</text>
  <!-- mover at a DIFFERENT spot (it moved) -->
  <circle cx="300" cy="160" r="7" fill="#000"/>
  <text x="300" y="180" text-anchor="middle" fill="#000">mover</text>

  <text x="375" y="140" text-anchor="middle" font-size="22" font-weight="bold" fill="#000">=</text>

  <!-- Panel C: result -->
  <rect x="390" y="60" width="150" height="150" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="465" y="80" text-anchor="middle" font-weight="bold" fill="#000">what's left</text>
  <!-- building cancels: show faint dashed outline = ~zero -->
  <rect x="415" y="120" width="26" height="70" fill="#ffffff" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="428" y="205" text-anchor="middle" fill="#000">~zero</text>
  <!-- both mover positions survive -->
  <circle cx="500" cy="130" r="7" fill="#000"/>
  <circle cx="460" cy="160" r="7" fill="#000"/>
  <text x="480" y="100" text-anchor="middle" fill="#000">mover survives</text>

  <!-- spot-the-difference note -->
  <text x="280" y="240" text-anchor="middle" fill="#000">Like comparing two photos a moment apart and keeping only what changed.</text>

  <!-- takeaway box -->
  <rect x="55" y="258" width="450" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Still clutter is identical, so it subtracts to almost nothing.</text>
  <text x="280" y="300" text-anchor="middle" fill="#000">The mover changed between pulses, so it survives the subtraction.</text>

  <!-- blind-speed footnote -->
  <text x="280" y="334" text-anchor="middle" font-size="11" fill="#000">(Watch out: a few exact 'blind speeds' look unchanged too - vary the PRF to catch them.)</text>
</svg>
