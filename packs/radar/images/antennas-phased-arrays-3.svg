<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Two ways to sweep the beam</text>

  <!-- LEFT: MECHANICAL (spinning dish) -->
  <rect x="20" y="44" width="250" height="262" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="145" y="66" text-anchor="middle" font-weight="bold" fill="#000">OLD WAY: SPIN THE DISH</text>
  <text x="145" y="83" text-anchor="middle" fill="#000">mechanical scanning</text>

  <!-- pedestal -->
  <rect x="135" y="230" width="20" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <!-- dish (curved) -->
  <path d="M 110 150 A 50 70 0 0 0 110 230 L 150 215 A 30 45 0 0 1 150 165 Z" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="118" y="248" text-anchor="middle" fill="#000" font-size="11">dish</text>
  <!-- rotation arrow -->
  <path d="M 150 120 A 60 30 0 1 1 90 120" fill="none" stroke="#000" stroke-width="2"/>
  <polygon points="90,120 100,112 100,128" fill="#000"/>
  <text x="120" y="108" text-anchor="middle" fill="#000">physically rotates</text>
  <!-- beam out the front -->
  <polygon points="145,190 250,160 250,178" fill="#000" opacity="0.15" stroke="#000" stroke-width="1.5"/>
  <text x="150" y="290" text-anchor="middle" fill="#000" font-size="11">slow: heavy metal must move</text>

  <!-- RIGHT: PHASED ARRAY (flat panel) -->
  <rect x="290" y="44" width="250" height="262" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="415" y="66" text-anchor="middle" font-weight="bold" fill="#000">NEW WAY: FLAT PANEL</text>
  <text x="415" y="83" text-anchor="middle" fill="#000">phased array, no moving parts</text>

  <!-- flat panel of elements -->
  <rect x="360" y="120" width="24" height="150" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="372" cy="138" r="5" fill="#000"/>
  <circle cx="372" cy="162" r="5" fill="#000"/>
  <circle cx="372" cy="186" r="5" fill="#000"/>
  <circle cx="372" cy="210" r="5" fill="#000"/>
  <circle cx="372" cy="234" r="5" fill="#000"/>
  <circle cx="372" cy="252" r="5" fill="#000"/>
  <text x="372" y="288" text-anchor="middle" fill="#000" font-size="11">many fixed elements</text>

  <!-- two beam directions, electronically -->
  <polygon points="384,170 500,120 500,138" fill="#000" opacity="0.15" stroke="#000" stroke-width="1.5"/>
  <polygon points="384,200 500,210 500,228" fill="#000" opacity="0.15" stroke="#000" stroke-width="1.5"/>
  <text x="455" y="110" text-anchor="middle" fill="#000" font-size="11">beam can point here...</text>
  <text x="460" y="248" text-anchor="middle" fill="#000" font-size="11">...or instantly here</text>

  <!-- takeaway box -->
  <rect x="40" y="320" width="480" height="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Move metal (slow) vs steer electronically (instant).</text>
</svg>
