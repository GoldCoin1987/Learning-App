<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 330" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="330" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Adding up many echoes pulls a weak signal out of the noise</text>

  <!-- LEFT: many faint pulses, each barely above noise -->
  <text x="140" y="58" text-anchor="middle" font-weight="bold" fill="#000">many faint pulses</text>
  <line x1="40" y1="170" x2="240" y2="170" stroke="#000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="200" y="185" text-anchor="middle" fill="#000">noise floor</text>

  <!-- five faint, noisy little bumps -->
  <polyline points="50,160 60,150 70,162 80,152 90,161" stroke="#000" stroke-width="1" fill="none"/>
  <polyline points="95,162 105,151 115,160 125,150 135,162" stroke="#000" stroke-width="1" fill="none"/>
  <polyline points="140,160 150,149 160,162 170,151 180,160" stroke="#000" stroke-width="1" fill="none"/>
  <polyline points="185,161 195,150 205,160 215,152 225,161" stroke="#000" stroke-width="1" fill="none"/>
  <text x="140" y="205" text-anchor="middle" fill="#000">each one barely</text>
  <text x="140" y="220" text-anchor="middle" fill="#000">peeks over the hiss</text>

  <!-- big plus / arrow to the right -->
  <text x="278" y="150" text-anchor="middle" font-size="22" font-weight="bold" fill="#000">+</text>
  <line x1="262" y1="180" x2="312" y2="180" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <text x="287" y="200" text-anchor="middle" fill="#000">stack them</text>

  <!-- RIGHT: one clear, tall detection -->
  <text x="430" y="58" text-anchor="middle" font-weight="bold" fill="#000">one clear detection</text>
  <line x1="340" y1="170" x2="520" y2="170" stroke="#000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="485" y="185" text-anchor="middle" fill="#000">noise floor</text>
  <!-- tall clean peak -->
  <rect x="405" y="80" width="40" height="90" fill="#000"/>
  <text x="425" y="205" text-anchor="middle" fill="#000">now it clearly</text>
  <text x="425" y="220" text-anchor="middle" fill="#000">rises above noise</text>

  <text x="280" y="270" text-anchor="middle" font-weight="bold" fill="#000">This is called integration: averaging many pulses lifts the SNR.</text>
  <text x="280" y="293" text-anchor="middle" fill="#000">Just like stacking many photos taken in the dark to reveal a faint object,</text>
  <text x="280" y="310" text-anchor="middle" fill="#000">the steady echo adds up while the random hiss tends to cancel out.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
