<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Clutter on a range-Doppler map: it spreads a little</text>

  <!-- axes -->
  <line x1="120" y1="60" x2="120" y2="280" stroke="#000" stroke-width="2"/>
  <text x="120" y="50" text-anchor="middle" fill="#000">range (how far)</text>
  <line x1="120" y1="280" x2="520" y2="280" stroke="#000" stroke-width="2"/>
  <text x="500" y="298" text-anchor="middle" fill="#000">speed &#8594;</text>

  <!-- zero-speed marker -->
  <line x1="190" y1="60" x2="190" y2="280" stroke="#000" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="190" y="312" text-anchor="middle" fill="#000">zero speed</text>

  <!-- clutter ridge: near zero speed but SLIGHTLY widened -->
  <rect x="170" y="70" width="40" height="200" fill="#000" opacity="0.18" stroke="#000" stroke-width="1.5"/>
  <text x="190" y="160" text-anchor="middle" font-weight="bold" fill="#000" transform="rotate(-90 190 160)">CLUTTER RIDGE</text>
  <text x="300" y="95" text-anchor="middle" fill="#000">slightly WIDE, not a thin line</text>
  <text x="300" y="110" text-anchor="middle" fill="#000">(wind, sea, weather drift)</text>

  <!-- target spot away from ridge -->
  <circle cx="420" cy="170" r="7" fill="#000"/>
  <text x="420" y="150" text-anchor="middle" font-weight="bold" fill="#000">TARGET</text>
  <text x="420" y="195" text-anchor="middle" fill="#000">its own speed,</text>
  <text x="420" y="210" text-anchor="middle" fill="#000">away from clutter</text>

  <!-- takeaway box -->
  <rect x="40" y="332" width="480" height="24" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="349" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Clutter moves a little, so it is a spread ridge - a thin notch is not enough.</text>
</svg>
