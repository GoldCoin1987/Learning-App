<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="680" height="320" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The algorithms ARE the radar - they run as software on the samples</text>

  <!-- antenna + SDR feeding samples -->
  <line x1="50" y1="150" x2="50" y2="110" stroke="#000" stroke-width="2"/>
  <line x1="50" y1="110" x2="36" y2="92" stroke="#000" stroke-width="2"/>
  <line x1="50" y1="110" x2="64" y2="92" stroke="#000" stroke-width="2"/>
  <rect x="30" y="150" width="86" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="73" y="167" text-anchor="middle" fill="#000">SDR gives</text>
  <text x="73" y="183" text-anchor="middle" fill="#000">raw samples</text>
  <line x1="118" y1="170" x2="150" y2="170" stroke="#000" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- software pipeline box -->
  <rect x="152" y="64" width="496" height="148" fill="#ffffff" stroke="#000" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="400" y="84" text-anchor="middle" font-weight="bold" fill="#000">all of this is just SOFTWARE on a laptop</text>

  <rect x="168" y="104" width="104" height="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="220" y="124" text-anchor="middle" fill="#000">pulse</text>
  <text x="220" y="140" text-anchor="middle" fill="#000">compression</text>

  <rect x="288" y="104" width="104" height="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="340" y="124" text-anchor="middle" fill="#000">range-Doppler</text>
  <text x="340" y="140" text-anchor="middle" fill="#000">map</text>

  <rect x="408" y="104" width="104" height="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="460" y="124" text-anchor="middle" fill="#000">CFAR</text>
  <text x="460" y="140" text-anchor="middle" fill="#000">detection</text>

  <rect x="528" y="104" width="104" height="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="580" y="132" text-anchor="middle" fill="#000">tracking</text>

  <line x1="272" y1="128" x2="288" y2="128" stroke="#000" stroke-width="2" marker-end="url(#arr3)"/>
  <line x1="392" y1="128" x2="408" y2="128" stroke="#000" stroke-width="2" marker-end="url(#arr3)"/>
  <line x1="512" y1="128" x2="528" y2="128" stroke="#000" stroke-width="2" marker-end="url(#arr3)"/>

  <text x="400" y="184" text-anchor="middle" fill="#000">the same concepts from earlier modules - now lines of code</text>

  <!-- takeaway -->
  <rect x="80" y="240" width="520" height="64" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="340" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">The hardware is now a small front end; the radar lives in software.</text>
  <text x="340" y="288" text-anchor="middle" fill="#000">Yes, software radar does REAL radar - it runs the very same algorithms.</text>

  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
