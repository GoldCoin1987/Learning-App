<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Everyday picture: a walking panorama</text>

  <!-- walking path with footsteps -->
  <line x1="50" y1="120" x2="430" y2="120" stroke="#000" stroke-width="1.5" stroke-dasharray="2 5"/>
  <text x="240" y="108" text-anchor="middle" fill="#000" font-size="11">you walk past the scene, taking a photo at each step</text>

  <!-- four camera positions, each a small box with a view cone to the scene -->
  <!-- pos 1 -->
  <rect x="60" y="112" width="20" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <polygon points="80,116 130,150 110,170" fill="#000" opacity="0.10" stroke="#000" stroke-width="1"/>
  <text x="70" y="146" text-anchor="middle" fill="#000" font-size="10">photo 1</text>
  <!-- pos 2 -->
  <rect x="150" y="112" width="20" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <polygon points="170,116 210,160 190,176" fill="#000" opacity="0.10" stroke="#000" stroke-width="1"/>
  <text x="160" y="146" text-anchor="middle" fill="#000" font-size="10">photo 2</text>
  <!-- pos 3 -->
  <rect x="240" y="112" width="20" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <polygon points="260,116 280,164 256,176" fill="#000" opacity="0.10" stroke="#000" stroke-width="1"/>
  <text x="250" y="146" text-anchor="middle" fill="#000" font-size="10">photo 3</text>
  <!-- pos 4 -->
  <rect x="330" y="112" width="20" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <polygon points="350,116 350,164 326,172" fill="#000" opacity="0.10" stroke="#000" stroke-width="1"/>
  <text x="340" y="146" text-anchor="middle" fill="#000" font-size="10">photo 4</text>

  <!-- direction of walking -->
  <line x1="400" y1="120" x2="440" y2="120" stroke="#000" stroke-width="2"/>
  <polygon points="440,120 426,114 426,126" fill="#000"/>
  <text x="420" y="138" text-anchor="middle" fill="#000" font-size="11">walk</text>

  <!-- big arrow down: stitch -->
  <line x1="280" y1="200" x2="280" y2="236" stroke="#000" stroke-width="2"/>
  <polygon points="280,236 273,222 287,222" fill="#000"/>
  <text x="350" y="222" text-anchor="middle" fill="#000" font-size="11">stitch them together</text>

  <!-- the stitched super-detailed panorama -->
  <rect x="100" y="244" width="360" height="70" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="190" y1="244" x2="190" y2="314" stroke="#000" stroke-width="0.5"/>
  <line x1="280" y1="244" x2="280" y2="314" stroke="#000" stroke-width="0.5"/>
  <line x1="370" y1="244" x2="370" y2="314" stroke="#000" stroke-width="0.5"/>
  <text x="280" y="284" text-anchor="middle" font-weight="bold" fill="#000">one super-detailed panorama</text>

  <!-- takeaway box -->
  <rect x="40" y="328" width="480" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="346" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Many viewpoints along a path combine into far more detail than one alone.</text>
</svg>
