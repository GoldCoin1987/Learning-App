<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">mmWave: very high frequency means tiny antennas and fine detail</text>

  <!-- LEFT: high frequency wave (tight wiggles) -->
  <text x="160" y="56" text-anchor="middle" font-weight="bold" fill="#000">very high frequency (mmWave)</text>
  <line x1="60" y1="90" x2="260" y2="90" stroke="#000" stroke-width="1" stroke-dasharray="2 2"/>
  <polyline points="60,90 70,72 80,108 90,72 100,108 110,72 120,108 130,72 140,108 150,72 160,108 170,72 180,108 190,72 200,108 210,72 220,108 230,72 240,108 250,72 260,90" stroke="#000" stroke-width="2" fill="none"/>
  <text x="160" y="128" text-anchor="middle" fill="#000">waves are very short</text>

  <!-- tiny antenna -->
  <rect x="120" y="150" width="80" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="160" y="166" text-anchor="middle" fill="#000">so antennas</text>
  <text x="160" y="182" text-anchor="middle" fill="#000">are TINY</text>
  <text x="160" y="210" text-anchor="middle" fill="#000">many fit on one chip</text>
  <text x="160" y="226" text-anchor="middle" fill="#000">(a small phased array</text>
  <text x="160" y="240" text-anchor="middle" fill="#000">- gives angle too)</text>

  <!-- divider -->
  <line x1="320" y1="50" x2="320" y2="250" stroke="#000" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- RIGHT: fine detail, short range -->
  <text x="480" y="56" text-anchor="middle" font-weight="bold" fill="#000">fine detail, but SHORT range</text>
  <!-- two close dots resolved -->
  <circle cx="430" cy="100" r="6" fill="#000"/>
  <circle cx="455" cy="100" r="6" fill="#000"/>
  <text x="500" y="104" text-anchor="middle" fill="#000">tells apart</text>
  <text x="495" y="120" text-anchor="middle" fill="#000">close things</text>

  <!-- range bar -->
  <line x1="400" y1="160" x2="470" y2="160" stroke="#000" stroke-width="3" marker-end="url(#arr5b)"/>
  <text x="500" y="164" text-anchor="middle" fill="#000">reaches only</text>
  <text x="500" y="180" text-anchor="middle" fill="#000">a short way</text>

  <!-- honest note -->
  <rect x="60" y="262" width="520" height="86" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="320" y="286" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Honest limits: cheap SDRs and chips have less power and bandwidth</text>
  <text x="320" y="306" text-anchor="middle" fill="#000">than big systems. Great for learning and short-range sensing -</text>
  <text x="320" y="324" text-anchor="middle" fill="#000">NOT for long-range surveillance.</text>
  <text x="320" y="342" text-anchor="middle" font-weight="bold" fill="#000">Short-range, not warship-range.</text>

  <defs>
    <marker id="arr5b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
