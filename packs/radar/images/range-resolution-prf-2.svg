<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="340" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Range ambiguity: a far echo arrives after the next pulse</text>

  <!-- time axis -->
  <line x1="50" y1="170" x2="520" y2="170" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <text x="525" y="187" text-anchor="end" fill="#000">time</text>

  <!-- pulse 1 sent -->
  <rect x="70" y="120" width="12" height="50" fill="#000"/>
  <text x="76" y="112" text-anchor="middle" fill="#000">pulse 1</text>

  <!-- pulse 2 sent -->
  <rect x="300" y="120" width="12" height="50" fill="#000"/>
  <text x="306" y="112" text-anchor="middle" fill="#000">pulse 2</text>

  <!-- the LATE echo from pulse 1, arriving after pulse 2 -->
  <rect x="360" y="135" width="10" height="35" fill="#000" opacity="0.55"/>
  <text x="365" y="128" text-anchor="middle" fill="#000">far echo</text>
  <text x="365" y="200" text-anchor="middle" fill="#000">(really from pulse 1)</text>

  <!-- curved path showing echo 1 returning late -->
  <path d="M76 120 C 120 60, 320 60, 365 132" stroke="#000" stroke-width="1.5" fill="none" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="220" y="62" text-anchor="middle" fill="#000">long trip back from a distant target</text>

  <!-- the wrong reading -->
  <line x1="312" y1="170" x2="362" y2="170" stroke="#000" stroke-width="3"/>
  <text x="337" y="225" text-anchor="middle" fill="#000">radar thinks: short gap after pulse 2</text>
  <text x="337" y="241" text-anchor="middle" font-weight="bold" fill="#000">=&gt; looks CLOSE (but it is FAR)</text>

  <!-- takeaway box -->
  <rect x="70" y="262" width="420" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="283" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Wait longer between pulses to hear far echoes cleanly.</text>
  <text x="280" y="305" text-anchor="middle" fill="#000">Faster pulsing (higher PRF) = shorter maximum unambiguous range.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
