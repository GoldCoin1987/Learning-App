<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Three kinds of clutter</text>

  <!-- Panel 1: SURFACE -->
  <rect x="20" y="50" width="160" height="230" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="100" y="72" text-anchor="middle" font-weight="bold" fill="#000">SURFACE</text>
  <text x="100" y="90" text-anchor="middle" fill="#000">ground / sea</text>
  <line x1="35" y1="210" x2="165" y2="210" stroke="#000" stroke-width="2"/>
  <path d="M35,230 q10,-12 20,0 q10,-12 20,0 q10,-12 20,0 q10,-12 20,0 q10,-12 20,0" fill="none" stroke="#000" stroke-width="2"/>
  <text x="100" y="258" text-anchor="middle" fill="#000">spread-out flat</text>
  <text x="100" y="273" text-anchor="middle" fill="#000">surface</text>

  <!-- Panel 2: VOLUME -->
  <rect x="200" y="50" width="160" height="230" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="72" text-anchor="middle" font-weight="bold" fill="#000">VOLUME</text>
  <text x="280" y="90" text-anchor="middle" fill="#000">rain / snow</text>
  <ellipse cx="280" cy="160" rx="52" ry="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="250" y1="190" x2="246" y2="212" stroke="#000" stroke-width="1.5"/>
  <line x1="270" y1="190" x2="266" y2="212" stroke="#000" stroke-width="1.5"/>
  <line x1="290" y1="190" x2="286" y2="212" stroke="#000" stroke-width="1.5"/>
  <line x1="310" y1="190" x2="306" y2="212" stroke="#000" stroke-width="1.5"/>
  <text x="280" y="258" text-anchor="middle" fill="#000">fills a 3-D</text>
  <text x="280" y="273" text-anchor="middle" fill="#000">volume of air</text>

  <!-- Panel 3: POINT -->
  <rect x="380" y="50" width="160" height="230" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="460" y="72" text-anchor="middle" font-weight="bold" fill="#000">POINT</text>
  <text x="460" y="90" text-anchor="middle" fill="#000">one fixed tower</text>
  <line x1="460" y1="120" x2="460" y2="210" stroke="#000" stroke-width="3"/>
  <line x1="448" y1="210" x2="472" y2="210" stroke="#000" stroke-width="2"/>
  <circle cx="460" cy="118" r="5" fill="#000"/>
  <text x="460" y="258" text-anchor="middle" fill="#000">one strong</text>
  <text x="460" y="273" text-anchor="middle" fill="#000">fixed reflector</text>

  <!-- takeaway box -->
  <rect x="40" y="320" width="480" height="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Surface (ground/sea), volume (rain/snow), point (a fixed reflector).</text>
</svg>
