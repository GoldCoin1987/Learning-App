<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="580" height="360" fill="#ffffff"/>
  <text x="290" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Why one FIXED threshold fails: noise is not the same everywhere</text>

  <!-- axes -->
  <line x1="55" y1="55" x2="55" y2="245" stroke="#000" stroke-width="2"/>
  <text x="55" y="46" text-anchor="middle" fill="#000">echo strength</text>
  <line x1="55" y1="245" x2="545" y2="245" stroke="#000" stroke-width="2"/>

  <!-- region divider -->
  <line x1="300" y1="55" x2="300" y2="245" stroke="#000" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="175" y="262" text-anchor="middle" font-weight="bold" fill="#000">HIGH-noise region</text>
  <text x="175" y="277" text-anchor="middle" fill="#000">(ground clutter / rain)</text>
  <text x="425" y="262" text-anchor="middle" font-weight="bold" fill="#000">LOW-noise region</text>
  <text x="425" y="277" text-anchor="middle" fill="#000">(clear sky)</text>

  <!-- one fixed threshold across the whole map -->
  <line x1="55" y1="130" x2="545" y2="130" stroke="#000" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="110" y="123" text-anchor="middle" font-weight="bold" fill="#000">one FIXED threshold</text>

  <!-- left: high noise baseline that pokes above the line repeatedly -->
  <polyline points="55,170 75,120 95,175 115,118 135,168 155,125 175,172 195,115 215,170 235,128 255,168 275,122 295,170" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="75" cy="120" r="4" fill="#000"/>
  <circle cx="115" cy="118" r="4" fill="#000"/>
  <circle cx="195" cy="115" r="4" fill="#000"/>
  <circle cx="275" cy="122" r="4" fill="#000"/>
  <text x="175" y="100" text-anchor="middle" fill="#000">noise crosses the line:</text>
  <text x="175" y="114" text-anchor="middle" font-weight="bold" fill="#000">FALSE ALARMS</text>

  <!-- right: low noise baseline, a real but weak target sits below the high fixed line -->
  <polyline points="305,225 325,220 345,228 365,222 385,165 405,224 425,219 445,226 465,221 485,227 505,220 525,226 545,222" stroke="#000" stroke-width="1.5" fill="none"/>
  <circle cx="385" cy="165" r="5" fill="#000"/>
  <text x="430" y="160" text-anchor="middle" fill="#000">real target sits BELOW line:</text>
  <text x="430" y="174" text-anchor="middle" font-weight="bold" fill="#000">MISSED</text>

  <!-- takeaway box -->
  <rect x="35" y="306" width="510" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="290" y="324" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">A single height false-alarms in the noisy area AND misses targets in the quiet area.</text>
  <text x="290" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">One fixed volume cannot suit both a library and a party.</text>
</svg>
