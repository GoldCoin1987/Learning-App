<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="580" height="360" fill="#ffffff"/>
  <text x="290" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The CFAR threshold ADAPTS: up over noise, down over quiet</text>

  <!-- axes -->
  <line x1="55" y1="55" x2="55" y2="250" stroke="#000" stroke-width="2"/>
  <text x="55" y="46" text-anchor="middle" fill="#000">echo strength</text>
  <line x1="55" y1="250" x2="545" y2="250" stroke="#000" stroke-width="2"/>
  <text x="300" y="268" text-anchor="middle" fill="#000">cells across the map &#8594;</text>

  <!-- region labels -->
  <text x="150" y="288" text-anchor="middle" fill="#000">noisy (clutter)</text>
  <text x="400" y="288" text-anchor="middle" fill="#000">quiet (clear sky)</text>

  <!-- noise floor: high on the left, low on the right -->
  <polyline points="55,150 80,140 105,158 130,138 155,155 180,142 205,165 230,180 255,205 280,210 305,212 330,208 355,213 380,209 405,212 430,208 455,213 480,209 505,212 530,210" stroke="#000" stroke-width="1.3" fill="none"/>
  <text x="150" y="135" text-anchor="middle" fill="#000">high noise</text>
  <text x="430" y="228" text-anchor="middle" fill="#000">low noise</text>

  <!-- adaptive threshold riding just above the noise floor everywhere -->
  <polyline points="55,120 80,110 105,128 130,108 155,125 180,112 205,135 230,150 255,175 280,180 305,182 330,178 355,183 380,179 405,182 430,178 455,183 480,179 505,182 530,180" stroke="#000" stroke-width="2.5" fill="none"/>
  <text x="120" y="98" text-anchor="middle" font-weight="bold" fill="#000">adaptive threshold</text>
  <text x="120" y="112" text-anchor="middle" fill="#000">rides UP here</text>
  <text x="455" y="168" text-anchor="middle" font-weight="bold" fill="#000">drops DOWN here</text>

  <!-- a real target in the quiet region that now clears the lowered threshold -->
  <line x1="370" y1="250" x2="370" y2="120" stroke="#000" stroke-width="6"/>
  <circle cx="370" cy="120" r="6" fill="#000"/>
  <text x="370" y="110" text-anchor="middle" font-weight="bold" fill="#000">target found</text>

  <!-- takeaway box -->
  <rect x="35" y="306" width="510" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="290" y="324" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">By tracking the local noise, the false-alarm rate stays roughly CONSTANT everywhere</text>
  <text x="290" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">- like auto-brightness adjusting to the room.</text>
</svg>
