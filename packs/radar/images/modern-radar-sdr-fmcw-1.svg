<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Software-defined radio: a small device, then software does the rest</text>

  <!-- antenna -->
  <line x1="70" y1="170" x2="70" y2="110" stroke="#000" stroke-width="2"/>
  <line x1="70" y1="110" x2="52" y2="86" stroke="#000" stroke-width="2"/>
  <line x1="70" y1="110" x2="88" y2="86" stroke="#000" stroke-width="2"/>
  <text x="70" y="190" text-anchor="middle" fill="#000">antenna</text>
  <text x="70" y="206" text-anchor="middle" fill="#000">(catches radio)</text>

  <line x1="92" y1="150" x2="150" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- SDR device -->
  <rect x="156" y="118" width="120" height="64" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="216" y="142" text-anchor="middle" font-weight="bold" fill="#000">small SDR</text>
  <text x="216" y="158" text-anchor="middle" font-weight="bold" fill="#000">device</text>
  <text x="216" y="174" text-anchor="middle" fill="#000">digitizes raw radio</text>

  <line x1="278" y1="150" x2="340" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="309" y="142" text-anchor="middle" fill="#000">raw</text>
  <text x="309" y="174" text-anchor="middle" fill="#000">samples</text>

  <!-- laptop -->
  <rect x="346" y="104" width="150" height="92" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="421" y="128" text-anchor="middle" font-weight="bold" fill="#000">computer</text>
  <text x="421" y="150" text-anchor="middle" fill="#000">SOFTWARE does</text>
  <text x="421" y="166" text-anchor="middle" fill="#000">the radar work</text>
  <text x="421" y="186" text-anchor="middle" fill="#000">(it is just code)</text>
  <!-- laptop base -->
  <line x1="336" y1="206" x2="506" y2="206" stroke="#000" stroke-width="2"/>
  <line x1="346" y1="196" x2="336" y2="206" stroke="#000" stroke-width="2"/>
  <line x1="496" y1="196" x2="506" y2="206" stroke="#000" stroke-width="2"/>

  <!-- change code note -->
  <line x1="421" y1="218" x2="421" y2="246" stroke="#000" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- takeaway box -->
  <rect x="60" y="252" width="520" height="92" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="320" y="276" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Change the CODE = change what it does. No rewiring.</text>
  <text x="320" y="300" text-anchor="middle" fill="#000">Like a webcam plus software, or a phone whose features are apps:</text>
  <text x="320" y="318" text-anchor="middle" fill="#000">one cheap device, many behaviours set by software.</text>
  <text x="320" y="338" text-anchor="middle" fill="#000">There is still a little hardware - the antenna and the SDR.</text>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
