<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320">
  <rect x="0" y="0" width="520" height="320" fill="white"/>
  <text x="260" y="22" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Depth x Width Expansion with Chip-Select Decoder</text>
  <text x="260" y="40" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Four 8Kx8 chips form a 32Kx8 memory; A13-A14 pick the bank.</text>

  <!-- address bus -->
  <text x="40" y="80" font-family="monospace" font-size="11" fill="black">A12-A0</text>
  <line x1="80" y1="76" x2="200" y2="76" stroke="black" stroke-width="1.5"/>
  <text x="40" y="120" font-family="monospace" font-size="11" fill="black">A14-A13</text>
  <line x1="85" y1="116" x2="120" y2="116" stroke="#d33" stroke-width="1.5"/>

  <!-- 2:4 decoder -->
  <rect x="120" y="95" width="60" height="80" fill="none" stroke="#d33" stroke-width="1.5"/>
  <text x="150" y="130" font-family="monospace" font-size="10" text-anchor="middle" fill="#d33">2:4</text>
  <text x="150" y="145" font-family="monospace" font-size="10" text-anchor="middle" fill="#d33">DEC</text>

  <!-- four memory chips -->
  <g font-family="monospace" font-size="10">
    <rect x="280" y="60" width="120" height="44" fill="none" stroke="black" stroke-width="1.5"/>
    <text x="340" y="80" text-anchor="middle" fill="black">8K x 8  (bank 0)</text>
    <text x="340" y="96" text-anchor="middle" fill="black">0x0000-0x1FFF</text>

    <rect x="280" y="118" width="120" height="44" fill="none" stroke="black" stroke-width="1.5"/>
    <text x="340" y="138" text-anchor="middle" fill="black">8K x 8  (bank 1)</text>
    <text x="340" y="154" text-anchor="middle" fill="black">0x2000-0x3FFF</text>

    <rect x="280" y="176" width="120" height="44" fill="none" stroke="black" stroke-width="1.5"/>
    <text x="340" y="196" text-anchor="middle" fill="black">8K x 8  (bank 2)</text>
    <text x="340" y="212" text-anchor="middle" fill="black">0x4000-0x5FFF</text>

    <rect x="280" y="234" width="120" height="44" fill="none" stroke="black" stroke-width="1.5"/>
    <text x="340" y="254" text-anchor="middle" fill="black">8K x 8  (bank 3)</text>
    <text x="340" y="270" text-anchor="middle" fill="black">0x6000-0x7FFF</text>
  </g>

  <!-- decoder outputs to CS pins -->
  <g stroke="#d33" stroke-width="1.5" fill="none">
    <polyline points="180,108 240,108 240,82 280,82"/>
    <polyline points="180,125 250,125 250,140 280,140"/>
    <polyline points="180,142 250,142 250,198 280,198"/>
    <polyline points="180,160 240,160 240,256 280,256"/>
  </g>
  <text x="262" y="78" font-family="monospace" font-size="9" fill="#d33">CS0</text>
  <text x="262" y="293" font-family="monospace" font-size="9" fill="#d33">CS3</text>

  <!-- shared low address bus to all chips -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <polyline points="200,76 215,76 215,70 280,70"/>
    <polyline points="215,76 215,128 280,128"/>
    <polyline points="215,128 215,186 280,186"/>
    <polyline points="215,186 215,244 280,244"/>
  </g>

  <!-- shared data bus -->
  <line x1="400" y1="90" x2="460" y2="90" stroke="#093" stroke-width="1.5"/>
  <line x1="400" y1="148" x2="460" y2="148" stroke="#093" stroke-width="1.5"/>
  <line x1="400" y1="206" x2="460" y2="206" stroke="#093" stroke-width="1.5"/>
  <line x1="400" y1="264" x2="460" y2="264" stroke="#093" stroke-width="1.5"/>
  <line x1="460" y1="90" x2="460" y2="264" stroke="#093" stroke-width="1.5"/>
  <line x1="460" y1="170" x2="490" y2="170" stroke="#093" stroke-width="1.5"/>
  <text x="495" y="174" font-family="monospace" font-size="11" fill="#093">D7-D0</text>

  <text x="260" y="310" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Low bits select the word inside a chip; high bits select WHICH chip via the decoder.</text>
</svg>
