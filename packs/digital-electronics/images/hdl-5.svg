<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 250">
  <rect x="0" y="0" width="560" height="250" fill="white"/>
  <text x="280" y="26" font-family="sans-serif" font-size="17" text-anchor="middle" fill="black">Two kinds of logic</text>

  <!-- Combinational -->
  <text x="150" y="58" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Combinational</text>
  <text x="150" y="76" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#444">output follows inputs right away</text>
  <line x1="50" y1="115" x2="100" y2="115" stroke="black" stroke-width="2" marker-end="url(#m)"/>
  <text x="45" y="119" font-family="monospace" font-size="11" text-anchor="end">a,b</text>
  <rect x="100" y="98" width="90" height="36" fill="none" stroke="black" stroke-width="2"/>
  <text x="145" y="121" font-family="sans-serif" font-size="12" text-anchor="middle">gates</text>
  <line x1="190" y1="115" x2="240" y2="115" stroke="black" stroke-width="2" marker-end="url(#m)"/>
  <text x="246" y="119" font-family="monospace" font-size="11" text-anchor="start">y</text>
  <text x="150" y="160" font-family="monospace" font-size="11" text-anchor="middle" fill="#070">always @(*)  blocking  =</text>
  <text x="150" y="178" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#444">no memory, no clock</text>

  <!-- divider -->
  <line x1="280" y1="48" x2="280" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Sequential -->
  <text x="420" y="58" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Sequential</text>
  <text x="420" y="76" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#444">remembers; updates on clock edge</text>
  <line x1="320" y1="115" x2="370" y2="115" stroke="black" stroke-width="2" marker-end="url(#m)"/>
  <text x="315" y="119" font-family="monospace" font-size="11" text-anchor="end">d</text>
  <rect x="370" y="98" width="90" height="36" fill="none" stroke="black" stroke-width="2"/>
  <text x="415" y="121" font-family="sans-serif" font-size="12" text-anchor="middle">flip-flop</text>
  <line x1="460" y1="115" x2="510" y2="115" stroke="black" stroke-width="2" marker-end="url(#m)"/>
  <text x="516" y="119" font-family="monospace" font-size="11" text-anchor="start">q</text>
  <text x="415" y="148" font-family="monospace" font-size="11" text-anchor="middle">clk &#9650;</text>
  <text x="420" y="168" font-family="monospace" font-size="11" text-anchor="middle" fill="#070">always @(posedge clk)  non-blocking  &lt;=</text>
  <text x="420" y="186" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#444">stores a value each clock tick</text>

  <text x="280" y="228" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Combinational = pure function of now. Sequential = remembers across clock ticks.</text>

  <defs>
    <marker id="m" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="black"/></marker>
  </defs>
</svg>
