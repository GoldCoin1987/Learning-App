<svg xmlns="http://www.w3.org/2000/svg" width="520" height="200" viewBox="0 0 520 200" font-family="sans-serif" font-size="13">
  <rect width="520" height="200" fill="#ffffff"/>
  <text x="260" y="22" text-anchor="middle" font-size="15" font-weight="bold">Turnstile: two states, two inputs</text>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L7 3 L0 6 z" fill="#333"/>
    </marker>
  </defs>

  <circle cx="140" cy="110" r="38" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="140" y="115" text-anchor="middle">LOCKED</text>
  <circle cx="380" cy="110" r="38" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="115" text-anchor="middle">UNLOCKED</text>

  <!-- LOCKED -> UNLOCKED on coin (top) -->
  <path d="M172 90 q100 -46 200 0" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="52" text-anchor="middle" font-size="11">input: coin</text>
  <!-- UNLOCKED -> LOCKED on push (bottom) -->
  <path d="M348 130 q-100 46 -200 0" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="178" text-anchor="middle" font-size="11">input: push</text>

  <!-- LOCKED self loop on push -->
  <path d="M118 78 q-20 -30 0 -44 q20 -14 30 16" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="108" y="28" text-anchor="middle" font-size="11">push</text>
  <!-- UNLOCKED self loop on coin -->
  <path d="M402 78 q20 -30 0 -44 q-20 -14 -30 16" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="412" y="28" text-anchor="middle" font-size="11">coin</text>

  <text x="20" y="194" font-size="10" fill="#555">A coin unlocks it; a push locks it again. Other inputs keep it in the same state (self-loops).</text>
</svg>
