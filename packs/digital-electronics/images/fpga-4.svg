<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect x="0" y="0" width="520" height="300" fill="white"/>
  <text x="260" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Four Kinds of Chip: When Each One Wins</text>

  <!-- table grid -->
  <g stroke="black" stroke-width="1.2" fill="none">
    <rect x="20" y="44" width="480" height="200"/>
    <line x1="140" y1="44" x2="140" y2="244"/>
    <line x1="260" y1="44" x2="260" y2="244"/>
    <line x1="380" y1="44" x2="380" y2="244"/>
    <line x1="20" y1="74" x2="500" y2="74"/>
    <line x1="20" y1="116" x2="500" y2="116"/>
    <line x1="20" y1="158" x2="500" y2="158"/>
    <line x1="20" y1="200" x2="500" y2="200"/>
  </g>

  <!-- header row -->
  <g font-family="sans-serif" font-size="11" text-anchor="middle" fill="black" font-weight="bold">
    <text x="80" y="63">CPU / MCU</text>
    <text x="200" y="63">GPU</text>
    <text x="320" y="63">FPGA</text>
    <text x="440" y="63">ASIC</text>
  </g>

  <!-- "what it is" row -->
  <g font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">
    <text x="80" y="91">sequential</text>
    <text x="80" y="104">software</text>
    <text x="200" y="91">many cores,</text>
    <text x="200" y="104">batched math</text>
    <text x="320" y="91">becomes real</text>
    <text x="320" y="104">parallel hardware</text>
    <text x="440" y="91">fixed hardware,</text>
    <text x="440" y="104">made once</text>
  </g>

  <!-- row labels -->
  <g font-family="sans-serif" font-size="10" text-anchor="start" fill="black" font-weight="bold">
    <text x="24" y="139">Parallel?</text>
    <text x="24" y="181">Latency</text>
    <text x="24" y="223">Best for</text>
  </g>

  <!-- parallel row -->
  <g font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">
    <text x="80" y="140">little</text>
    <text x="200" y="140">lots (batched)</text>
    <text x="320" y="140">lots (spatial)</text>
    <text x="440" y="140">lots (fixed)</text>

    <text x="80" y="182">low, simple</text>
    <text x="200" y="176">high &amp;</text>
    <text x="200" y="188">variable</text>
    <text x="320" y="176">low &amp;</text>
    <text x="320" y="188">predictable</text>
    <text x="440" y="176">low &amp;</text>
    <text x="440" y="188">predictable</text>

    <text x="80" y="218">control,</text>
    <text x="80" y="230">cheap, easy</text>
    <text x="200" y="218">big offline</text>
    <text x="200" y="230">number-crunch</text>
    <text x="320" y="218">real-time</text>
    <text x="320" y="230">parallel, flexible</text>
    <text x="440" y="218">huge volume,</text>
    <text x="440" y="230">best per-unit cost</text>
  </g>

  <text x="260" y="266" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">FPGA = reprogrammable parallel hardware with low, predictable latency and no per-design factory cost.</text>
  <text x="260" y="284" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">ASIC wins only at very high volume; a CPU/GPU is easier but slower or less predictable for streaming.</text>
</svg>
