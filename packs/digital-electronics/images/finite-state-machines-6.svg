<svg xmlns="http://www.w3.org/2000/svg" width="540" height="220" viewBox="0 0 540 220" font-family="sans-serif" font-size="12">
  <rect width="540" height="220" fill="#ffffff"/>
  <text x="270" y="22" text-anchor="middle" font-size="15" font-weight="bold">Illegal states and safe recovery</text>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L7 3 L0 6 z" fill="#333"/>
    </marker>
  </defs>

  <!-- valid states cluster -->
  <circle cx="120" cy="90" r="26" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="120" y="94" text-anchor="middle">IDLE</text>
  <circle cx="230" cy="90" r="26" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="230" y="94" text-anchor="middle">RUN</text>
  <line x1="146" y1="90" x2="204" y2="90" stroke="#333" marker-end="url(#arrow)"/>
  <text x="120" y="135" text-anchor="middle" font-size="10" fill="#555">used codes (valid)</text>

  <!-- illegal codes -->
  <rect x="350" y="60" width="60" height="34" fill="none" stroke="#b00" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="380" y="82" text-anchor="middle" font-size="11" fill="#b00">110</text>
  <rect x="350" y="110" width="60" height="34" fill="none" stroke="#b00" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="380" y="132" text-anchor="middle" font-size="11" fill="#b00">111</text>
  <text x="380" y="165" text-anchor="middle" font-size="10" fill="#b00">unused / illegal codes</text>

  <!-- recovery arrows back to IDLE -->
  <path d="M348 74 q-100 -30 -210 4" fill="none" stroke="#777" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M348 128 q-110 70 -210 -14" fill="none" stroke="#777" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="270" y="200" text-anchor="middle" font-size="11" fill="#777">default branch sends any bad code back to a safe state (IDLE/reset)</text>

  <text x="20" y="214" font-size="10" fill="#555"></text>
</svg>
