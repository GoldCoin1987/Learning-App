<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
  <rect x="0" y="0" width="500" height="280" fill="white"/>
  <text x="250" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">The Clock Period Must Fit the Slowest Path</text>

  <!-- launch FF -->
  <rect x="40" y="70" width="80" height="80" fill="none" stroke="black" stroke-width="2"/>
  <text x="80" y="100" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">FF A</text>
  <text x="48" y="95" font-family="monospace" font-size="11" fill="black">D</text>
  <text x="105" y="95" font-family="monospace" font-size="11" fill="black">Q</text>
  <text x="80" y="135" font-family="monospace" font-size="10" text-anchor="middle" fill="black">launch</text>

  <!-- logic cloud -->
  <line x1="120" y1="90" x2="200" y2="90" stroke="black" stroke-width="2"/>
  <rect x="200" y="60" width="100" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="250" y="86" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">combinational</text>
  <text x="250" y="102" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">logic</text>
  <line x1="300" y1="90" x2="380" y2="90" stroke="black" stroke-width="2"/>

  <!-- capture FF -->
  <rect x="380" y="70" width="80" height="80" fill="none" stroke="black" stroke-width="2"/>
  <text x="420" y="100" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">FF B</text>
  <text x="388" y="95" font-family="monospace" font-size="11" fill="black">D</text>
  <text x="445" y="95" font-family="monospace" font-size="11" fill="black">Q</text>
  <text x="420" y="135" font-family="monospace" font-size="10" text-anchor="middle" fill="black">capture</text>

  <!-- delay budget bar -->
  <text x="250" y="185" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">One clock period (T_clk) must hold the whole chain:</text>
  <rect x="60" y="200" width="90" height="34" fill="#cccccc" opacity="0.6" stroke="black"/>
  <text x="105" y="222" font-family="monospace" font-size="12" text-anchor="middle" fill="black">t_cq</text>
  <rect x="150" y="200" width="200" height="34" fill="#aaaaaa" opacity="0.6" stroke="black"/>
  <text x="250" y="222" font-family="monospace" font-size="12" text-anchor="middle" fill="black">t_pd (logic)</text>
  <rect x="350" y="200" width="90" height="34" fill="#cccccc" opacity="0.6" stroke="black"/>
  <text x="395" y="222" font-family="monospace" font-size="12" text-anchor="middle" fill="black">t_su</text>

  <!-- total -->
  <line x1="60" y1="248" x2="440" y2="248" stroke="black" stroke-width="1"/>
  <line x1="60" y1="243" x2="60" y2="253" stroke="black" stroke-width="1"/>
  <line x1="440" y1="243" x2="440" y2="253" stroke="black" stroke-width="1"/>
  <text x="250" y="270" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">t_cq + t_pd + t_su  must be  &#8804;  T_clk</text>
</svg>
