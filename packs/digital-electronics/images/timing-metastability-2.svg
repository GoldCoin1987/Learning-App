<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260">
  <rect x="0" y="0" width="480" height="260" fill="white"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Two-Flop Synchronizer (single-bit CDC)</text>

  <!-- async input -->
  <text x="20" y="120" font-family="monospace" font-size="12" fill="black">async_in</text>
  <line x1="80" y1="115" x2="130" y2="115" stroke="black" stroke-width="2"/>

  <!-- FF1 -->
  <rect x="130" y="85" width="80" height="80" fill="none" stroke="black" stroke-width="2"/>
  <text x="170" y="110" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">FF1</text>
  <text x="138" y="105" font-family="monospace" font-size="11" fill="black">D</text>
  <text x="195" y="105" font-family="monospace" font-size="11" fill="black">Q</text>
  <text x="170" y="150" font-family="monospace" font-size="10" text-anchor="middle" fill="black">(may go</text>
  <text x="170" y="161" font-family="monospace" font-size="10" text-anchor="middle" fill="black">metastable)</text>

  <!-- between -->
  <line x1="210" y1="100" x2="280" y2="100" stroke="black" stroke-width="2"/>
  <text x="245" y="92" font-family="monospace" font-size="10" text-anchor="middle" fill="black">meta</text>

  <!-- FF2 -->
  <rect x="280" y="85" width="80" height="80" fill="none" stroke="black" stroke-width="2"/>
  <text x="320" y="110" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">FF2</text>
  <text x="288" y="105" font-family="monospace" font-size="11" fill="black">D</text>
  <text x="345" y="105" font-family="monospace" font-size="11" fill="black">Q</text>

  <!-- output -->
  <line x1="360" y1="100" x2="430" y2="100" stroke="black" stroke-width="2"/>
  <text x="395" y="92" font-family="monospace" font-size="11" text-anchor="middle" fill="black">sync_out</text>

  <!-- clk_dst -->
  <text x="245" y="240" font-family="monospace" font-size="12" text-anchor="middle" fill="black">clk_dst</text>
  <line x1="170" y1="210" x2="170" y2="165" stroke="black" stroke-width="2"/>
  <line x1="320" y1="210" x2="320" y2="165" stroke="black" stroke-width="2"/>
  <line x1="100" y1="210" x2="400" y2="210" stroke="black" stroke-width="2"/>
  <!-- clk arrowheads into FFs -->
  <polygon points="170,165 165,175 175,175" fill="black"/>
  <polygon points="320,165 315,175 325,175" fill="black"/>

  <text x="240" y="60" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">FF1 lets metastability settle one clock; FF2 resamples a (very likely) resolved level</text>
</svg>
