<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" width="460" height="360">
  <rect x="0" y="0" width="460" height="360" fill="#ffffff"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="16">
    <text x="120" y="28">The three basic operations</text>
  </g>
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- NOT: triangle + bubble -->
    <path d="M 60 70 L 60 120 L 100 95 Z"/>
    <circle cx="108" cy="95" r="6"/>
    <line x1="30" y1="95" x2="60" y2="95"/>
    <line x1="114" y1="95" x2="140" y2="95"/>
    <!-- AND: D shape -->
    <path d="M 210 65 L 240 65 A 30 30 0 0 1 240 125 L 210 125 Z"/>
    <line x1="180" y1="78" x2="210" y2="78"/>
    <line x1="180" y1="112" x2="210" y2="112"/>
    <line x1="270" y1="95" x2="300" y2="95"/>
    <!-- OR: curved shape -->
    <path d="M 360 65 Q 400 65 428 95 Q 400 125 360 125 Q 378 95 360 65 Z"/>
    <line x1="335" y1="78" x2="368" y2="78"/>
    <line x1="335" y1="112" x2="368" y2="112"/>
    <line x1="428" y1="95" x2="450" y2="95"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="55" y="60">NOT (flip)</text>
    <text x="60" y="145">out = A'</text>
    <text x="205" y="60">AND (both)</text>
    <text x="205" y="145">out = A . B</text>
    <text x="360" y="60">OR (either)</text>
    <text x="360" y="145">out = A + B</text>
  </g>
  <!-- Truth tables -->
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="45" y="190">NOT</text>
    <text x="30" y="210">A | A'</text>
    <text x="30" y="228">0 |  1</text>
    <text x="30" y="246">1 |  0</text>

    <text x="195" y="190">AND</text>
    <text x="170" y="210">A B | A.B</text>
    <text x="170" y="228">0 0 |  0</text>
    <text x="170" y="246">0 1 |  0</text>
    <text x="170" y="264">1 0 |  0</text>
    <text x="170" y="282">1 1 |  1</text>

    <text x="345" y="190">OR</text>
    <text x="320" y="210">A B | A+B</text>
    <text x="320" y="228">0 0 |  0</text>
    <text x="320" y="246">0 1 |  1</text>
    <text x="320" y="264">1 0 |  1</text>
    <text x="320" y="282">1 1 |  1</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="35" y="330">AND = 1 only when both inputs are 1.  OR = 1 when at least one is 1.</text>
    <text x="35" y="350">NOT flips 0 to 1 and 1 to 0.  A' (overbar) means "NOT A".</text>
  </g>
</svg>
