<svg xmlns="http://www.w3.org/2000/svg" width="380" height="240" viewBox="0 0 380 240" font-family="sans-serif" font-size="13">
  <rect width="380" height="240" fill="#ffffff"/>
  <text x="190" y="24" text-anchor="middle" font-size="15" font-weight="bold">2:1 Multiplexer</text>

  <!-- trapezoid mux body -->
  <polygon points="150,60 230,90 230,170 150,200" fill="#eef4ff" stroke="#333" stroke-width="1.5"/>

  <!-- data inputs -->
  <line x1="90" y1="85" x2="150" y2="85" stroke="#333"/>
  <text x="80" y="89" text-anchor="end">I0</text>
  <line x1="90" y1="135" x2="150" y2="135" stroke="#333"/>
  <text x="80" y="139" text-anchor="end">I1</text>

  <!-- select -->
  <line x1="190" y1="225" x2="190" y2="185" stroke="#333"/>
  <text x="190" y="240" text-anchor="middle">S</text>

  <!-- output -->
  <line x1="230" y1="130" x2="300" y2="130" stroke="#333"/>
  <text x="312" y="134">Y</text>

  <text x="180" y="120" text-anchor="middle" font-size="11" fill="#555">MUX</text>
  <text x="60" y="225" font-size="11" fill="#555">Y = S'·I0 + S·I1</text>
</svg>
