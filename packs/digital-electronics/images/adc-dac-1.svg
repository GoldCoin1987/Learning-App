<svg xmlns="http://www.w3.org/2000/svg" width="560" height="280" viewBox="0 0 560 280" font-family="sans-serif" font-size="13">
  <rect width="560" height="280" fill="#ffffff"/>
  <text x="280" y="22" text-anchor="middle" font-size="15" font-weight="bold">Successive-Approximation (SAR) ADC</text>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L7 3 L0 6 z" fill="#333"/>
    </marker>
  </defs>

  <!-- input + S/H -->
  <text x="20" y="100" font-size="12">V_in</text>
  <line x1="48" y1="96" x2="80" y2="96" stroke="#333" marker-end="url(#arrow)"/>
  <rect x="82" y="78" width="70" height="40" fill="#eef" stroke="#333"/>
  <text x="117" y="103" text-anchor="middle" font-size="12">S/H</text>

  <!-- comparator -->
  <line x1="152" y1="96" x2="186" y2="96" stroke="#333" marker-end="url(#arrow)"/>
  <polygon points="190,72 190,120 236,96" fill="#ffe" stroke="#333"/>
  <text x="206" y="100" font-size="11">cmp</text>

  <!-- SAR logic register -->
  <line x1="236" y1="96" x2="276" y2="96" stroke="#333" marker-end="url(#arrow)"/>
  <rect x="278" y="68" width="130" height="56" fill="#efe" stroke="#333"/>
  <text x="343" y="92" text-anchor="middle" font-size="12">SAR control</text>
  <text x="343" y="110" text-anchor="middle" font-size="12">register (N bits)</text>

  <!-- digital out -->
  <line x1="408" y1="96" x2="448" y2="96" stroke="#333" marker-end="url(#arrow)"/>
  <text x="452" y="100" font-size="12">D[N-1:0]</text>

  <!-- DAC feedback -->
  <rect x="278" y="170" width="130" height="44" fill="#fef" stroke="#333"/>
  <text x="343" y="197" text-anchor="middle" font-size="12">internal DAC</text>
  <line x1="343" y1="124" x2="343" y2="170" stroke="#333" marker-end="url(#arrow)"/>
  <text x="350" y="150" font-size="11">code</text>

  <!-- DAC back to comparator (-) -->
  <path d="M278 192 L213 192 L213 116" fill="none" stroke="#333" marker-end="url(#arrow)"/>
  <text x="190" y="150" font-size="11">V_DAC</text>

  <text x="20" y="250" font-size="11" fill="#555">Binary search: each clock the SAR sets one bit, compares V_in to V_DAC, keeps or clears it.</text>
  <text x="20" y="266" font-size="11" fill="#555">N comparisons -> N-bit result. Throughput moderate; area and power low (the embedded workhorse).</text>
</svg>
