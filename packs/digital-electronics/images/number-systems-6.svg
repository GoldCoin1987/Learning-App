<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240">
  <rect x="0" y="0" width="420" height="240" fill="white"/>
  <text x="210" y="28" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Binary Addition: 0111 + 0011</text>
  <!-- carries -->
  <text x="60"  y="70" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">carries</text>
  <g font-family="monospace" font-size="18" text-anchor="middle" fill="black">
    <text x="170" y="70">1</text>
    <text x="200" y="70">1</text>
    <text x="230" y="70">1</text>
    <!-- first number -->
    <text x="140" y="100"></text>
    <text x="170" y="100">0</text>
    <text x="200" y="100">1</text>
    <text x="230" y="100">1</text>
    <text x="260" y="100">1</text>
    <!-- plus second -->
    <text x="110" y="130">+</text>
    <text x="170" y="130">0</text>
    <text x="200" y="130">0</text>
    <text x="230" y="130">1</text>
    <text x="260" y="130">1</text>
    <!-- sum -->
    <text x="140" y="170">1</text>
    <text x="170" y="170">0</text>
    <text x="200" y="170">1</text>
    <text x="230" y="170">0</text>
    <text x="260" y="170">0</text>
  </g>
  <line x1="120" y1="143" x2="280" y2="143" stroke="black" stroke-width="2"/>
  <text x="210" y="200" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">rule: 1 + 1 = 10 (write 0, carry 1)</text>
  <text x="210" y="224" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">7 + 3 = 10 (binary 1010), same as decimal</text>
</svg>
