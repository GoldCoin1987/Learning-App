<svg xmlns="http://www.w3.org/2000/svg" width="420" height="260" viewBox="0 0 420 260" font-family="sans-serif" font-size="13">
  <rect width="420" height="260" fill="#ffffff"/>
  <text x="210" y="24" text-anchor="middle" font-size="15" font-weight="bold">2-to-4 Decoder (code -&gt; one active line)</text>

  <!-- decoder body -->
  <rect x="140" y="55" width="100" height="150" fill="#eef4ff" stroke="#333" stroke-width="1.5"/>
  <text x="190" y="135" text-anchor="middle" font-size="12" fill="#555">DECODER</text>

  <!-- inputs -->
  <line x1="70" y1="95" x2="140" y2="95" stroke="#333"/>
  <text x="60" y="99" text-anchor="end">A1</text>
  <line x1="70" y1="160" x2="140" y2="160" stroke="#333"/>
  <text x="60" y="164" text-anchor="end">A0</text>
  <text x="60" y="45" font-size="11" fill="#555">2-bit input code</text>

  <!-- outputs -->
  <line x1="240" y1="72" x2="320" y2="72" stroke="#333"/>
  <text x="330" y="76">Y0</text>
  <line x1="240" y1="116" x2="320" y2="116" stroke="#333"/>
  <text x="330" y="120">Y1</text>
  <line x1="240" y1="160" x2="320" y2="160" stroke="#333"/>
  <text x="330" y="164">Y2</text>
  <line x1="240" y1="190" x2="320" y2="190" stroke="#333"/>
  <text x="330" y="194">Y3</text>

  <text x="20" y="235" font-size="11" fill="#555">Exactly ONE output is 1 (the rest 0).</text>
  <text x="20" y="250" font-size="11" fill="#555">A1A0 = 10  =>  Y2 = 1, all others 0</text>
</svg>
