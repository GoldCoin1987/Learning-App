<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320">
  <rect x="0" y="0" width="420" height="320" fill="white"/>
  <text x="210" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">A 2-Variable K-Map (a 2x2 grid)</text>
  <text x="210" y="44" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">columns = B, rows = A; each cell is one row of the truth table</text>

  <!-- axis labels -->
  <text x="200" y="78" font-family="monospace" font-size="13" text-anchor="middle" fill="black">B</text>
  <text x="110" y="160" font-family="monospace" font-size="13" text-anchor="middle" fill="black">A</text>

  <!-- column labels 0 1 -->
  <text x="180" y="96" font-family="monospace" font-size="13" text-anchor="middle">0</text>
  <text x="260" y="96" font-family="monospace" font-size="13" text-anchor="middle">1</text>

  <!-- row labels 0 1 -->
  <text x="140" y="135" font-family="monospace" font-size="13" text-anchor="middle">0</text>
  <text x="140" y="215" font-family="monospace" font-size="13" text-anchor="middle">1</text>

  <!-- 2x2 grid, top-left (150,110), 80x60 -->
  <rect x="150" y="110" width="80" height="60" fill="white" stroke="black" stroke-width="1"/>
  <rect x="230" y="110" width="80" height="60" fill="white" stroke="black" stroke-width="1"/>
  <rect x="150" y="170" width="80" height="60" fill="white" stroke="black" stroke-width="1"/>
  <rect x="230" y="170" width="80" height="60" fill="white" stroke="black" stroke-width="1"/>

  <!-- minterm labels (A B) -->
  <text x="190" y="138" font-family="monospace" font-size="12" text-anchor="middle">AB=00</text>
  <text x="270" y="138" font-family="monospace" font-size="12" text-anchor="middle">AB=01</text>
  <text x="190" y="198" font-family="monospace" font-size="12" text-anchor="middle">AB=10</text>
  <text x="270" y="198" font-family="monospace" font-size="12" text-anchor="middle">AB=11</text>

  <text x="190" y="158" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">m0</text>
  <text x="270" y="158" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">m1</text>
  <text x="190" y="218" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">m2</text>
  <text x="270" y="218" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">m3</text>

  <text x="210" y="262" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Neighbours left-right or up-down differ in just ONE variable.</text>
  <text x="210" y="284" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">That one-variable change is the whole trick of a K-map.</text>
</svg>
