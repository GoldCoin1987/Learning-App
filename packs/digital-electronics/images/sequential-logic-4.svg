<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect x="0" y="0" width="520" height="300" fill="white"/>
  <text x="260" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Latch vs Flip-Flop: level vs edge</text>

  <!-- shared enable/clock -->
  <text x="34" y="74" font-family="monospace" font-size="13" text-anchor="middle" fill="black">EN/CLK</text>
  <polyline points="80,90 130,90 130,55 210,55 210,90 290,90 290,55 370,55 370,90 480,90"
            fill="none" stroke="black" stroke-width="2"/>

  <!-- D -->
  <text x="34" y="150" font-family="monospace" font-size="13" text-anchor="middle" fill="black">D</text>
  <polyline points="80,165 110,165 110,130 250,130 250,165 330,165 330,130 480,130"
            fill="none" stroke="black" stroke-width="2"/>

  <!-- Latch Q: transparent while EN high -->
  <text x="34" y="215" font-family="monospace" font-size="12" text-anchor="middle" fill="black">Latch Q</text>
  <polyline points="80,230 130,230 130,195 210,195 210,230 290,230 290,195 330,195 330,230 480,230"
            fill="none" stroke="black" stroke-width="2"/>

  <!-- FF Q: samples D only at rising edges (x=130, x=290) -->
  <text x="34" y="278" font-family="monospace" font-size="12" text-anchor="middle" fill="black">FF Q</text>
  <polyline points="80,290 130,290 130,258 290,258 290,290 480,290"
            fill="none" stroke="black" stroke-width="2"/>

  <!-- rising edge markers -->
  <line x1="130" y1="50" x2="130" y2="295" stroke="#d33" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="290" y1="50" x2="290" y2="295" stroke="#d33" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="260" y="120" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Latch Q follows D the whole time EN is HIGH (transparent). FF Q samples D only at each rising edge.</text>
</svg>
