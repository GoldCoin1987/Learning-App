<svg xmlns="http://www.w3.org/2000/svg" width="540" height="230" viewBox="0 0 540 230" font-family="sans-serif" font-size="12">
  <rect width="540" height="230" fill="#ffffff"/>
  <text x="270" y="22" text-anchor="middle" font-size="15" font-weight="bold">FSM + datapath (control plus the workers)</text>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L7 3 L0 6 z" fill="#333"/>
    </marker>
  </defs>

  <!-- control FSM -->
  <rect x="50" y="80" width="160" height="80" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="130" y="112" text-anchor="middle">Control FSM</text>
  <text x="130" y="132" text-anchor="middle" font-size="10" fill="#555">(decides the steps)</text>

  <!-- datapath -->
  <rect x="330" y="80" width="160" height="80" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="108" text-anchor="middle">Datapath</text>
  <text x="410" y="126" text-anchor="middle" font-size="10" fill="#555">registers, adders,</text>
  <text x="410" y="140" text-anchor="middle" font-size="10" fill="#555">counters, memory</text>

  <!-- control signals FSM -> datapath -->
  <line x1="210" y1="105" x2="328" y2="105" stroke="#333" marker-end="url(#arrow)"/>
  <text x="269" y="97" text-anchor="middle" font-size="10">control signals (load, add, shift)</text>

  <!-- status flags datapath -> FSM -->
  <line x1="330" y1="140" x2="212" y2="140" stroke="#777" marker-end="url(#arrow)"/>
  <text x="271" y="158" text-anchor="middle" font-size="10" fill="#777">status flags (done, zero, overflow)</text>

  <text x="20" y="206" font-size="11" fill="#555">The FSM tells the datapath what to do each step; the datapath reports back so the FSM</text>
  <text x="20" y="222" font-size="11" fill="#555">can decide what to do next. This split is the core of every processor.</text>
</svg>
