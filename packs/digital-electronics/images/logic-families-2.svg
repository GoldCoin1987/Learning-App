<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect x="0" y="0" width="400" height="400" fill="white"/>
  <text x="200" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Logic Levels &amp; Noise Margins</text>

  <!-- axis labels -->
  <text x="120" y="50" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">DRIVER output</text>
  <text x="290" y="50" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">RECEIVER input</text>

  <!-- voltage axis -->
  <line x1="40" y1="70" x2="40" y2="360" stroke="black" stroke-width="2"/>
  <text x="30" y="74" font-family="sans-serif" font-size="11" text-anchor="end" fill="black">VDD</text>
  <text x="30" y="358" font-family="sans-serif" font-size="11" text-anchor="end" fill="black">0V</text>

  <!-- DRIVER bands (left column x=70..170) -->
  <!-- VOH region: top guaranteed-high output -->
  <rect x="70" y="70" width="100" height="60" fill="#cccccc" stroke="black" stroke-width="1"/>
  <text x="120" y="105" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">output HIGH</text>
  <line x1="70" y1="130" x2="170" y2="130" stroke="black" stroke-width="2"/>
  <text x="120" y="145" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">VOH (min)</text>

  <!-- VOL region: bottom guaranteed-low output -->
  <line x1="70" y1="300" x2="170" y2="300" stroke="black" stroke-width="2"/>
  <text x="120" y="295" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">VOL (max)</text>
  <rect x="70" y="300" width="100" height="60" fill="#cccccc" stroke="black" stroke-width="1"/>
  <text x="120" y="335" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">output LOW</text>

  <!-- RECEIVER bands (right column x=230..330) -->
  <rect x="230" y="70" width="100" height="40" fill="#cccccc" stroke="black" stroke-width="1"/>
  <text x="280" y="95" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">read HIGH</text>
  <line x1="230" y1="110" x2="330" y2="110" stroke="black" stroke-width="2"/>
  <text x="280" y="125" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">VIH (min)</text>

  <!-- forbidden zone -->
  <rect x="230" y="110" width="100" height="160" fill="none" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="280" y="195" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">forbidden</text>

  <line x1="230" y1="270" x2="330" y2="270" stroke="black" stroke-width="2"/>
  <text x="280" y="265" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">VIL (max)</text>
  <rect x="230" y="270" width="100" height="90" fill="#cccccc" stroke="black" stroke-width="1"/>
  <text x="280" y="320" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">read LOW</text>

  <!-- noise margin arrows -->
  <line x1="200" y1="130" x2="200" y2="110" stroke="black" stroke-width="2"/>
  <text x="200" y="124" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">NMH</text>
  <line x1="200" y1="270" x2="200" y2="300" stroke="black" stroke-width="2"/>
  <text x="200" y="288" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">NML</text>

  <text x="200" y="385" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">NMH = VOH - VIH ; NML = VIL - VOL</text>
</svg>
