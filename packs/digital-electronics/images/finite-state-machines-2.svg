<svg xmlns="http://www.w3.org/2000/svg" width="520" height="220" viewBox="0 0 520 220" font-family="sans-serif" font-size="13">
  <rect width="520" height="220" fill="#ffffff"/>
  <text x="260" y="22" text-anchor="middle" font-size="15" font-weight="bold">Traffic light as a state machine</text>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L7 3 L0 6 z" fill="#333"/>
    </marker>
  </defs>

  <!-- three states in a triangle/cycle -->
  <circle cx="120" cy="110" r="34" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="120" y="115" text-anchor="middle">GREEN</text>
  <circle cx="400" cy="110" r="34" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="115" text-anchor="middle">RED</text>
  <circle cx="260" cy="185" r="30" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="260" y="190" text-anchor="middle">YELLOW</text>

  <!-- GREEN -> YELLOW -->
  <line x1="148" y1="130" x2="235" y2="172" stroke="#333" marker-end="url(#arrow)"/>
  <text x="178" y="160" text-anchor="middle" font-size="11">timer</text>
  <!-- YELLOW -> RED -->
  <line x1="285" y1="172" x2="372" y2="130" stroke="#333" marker-end="url(#arrow)"/>
  <text x="342" y="160" text-anchor="middle" font-size="11">timer</text>
  <!-- RED -> GREEN (top arc) -->
  <path d="M372 92 q-140 -70 -224 0" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="46" text-anchor="middle" font-size="11">timer</text>

  <text x="20" y="212" font-size="10" fill="#555">States = the three lights. Each "timer" input moves the machine to the next state. Always in exactly one state.</text>
</svg>
