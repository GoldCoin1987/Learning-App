<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <rect x="0" y="0" width="520" height="300" fill="white"/>
  <text x="260" y="22" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">SRAM 6T Cell vs DRAM 1T1C Cell</text>

  <!-- ===== SRAM 6T (left) ===== -->
  <text x="130" y="48" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">SRAM (6 transistors)</text>

  <!-- cross-coupled inverters as two boxes -->
  <rect x="80" y="90" width="50" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="105" y="115" font-family="monospace" font-size="11" text-anchor="middle" fill="black">INV</text>
  <rect x="150" y="130" width="50" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="175" y="155" font-family="monospace" font-size="11" text-anchor="middle" fill="black">INV</text>

  <!-- cross-couple feedback lines -->
  <polyline points="130,100 218,100 218,150 200,150" fill="none" stroke="black" stroke-width="1.5"/>
  <polyline points="150,160 62,160 62,110 80,110" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- access transistors -->
  <rect x="40" y="100" width="22" height="20" fill="none" stroke="#06c" stroke-width="1.5"/>
  <rect x="218" y="140" width="22" height="20" fill="none" stroke="#06c" stroke-width="1.5"/>

  <!-- word line -->
  <line x1="51" y1="100" x2="51" y2="70" stroke="#06c" stroke-width="1.5"/>
  <line x1="229" y1="140" x2="229" y2="70" stroke="#06c" stroke-width="1.5"/>
  <line x1="40" y1="70" x2="240" y2="70" stroke="#06c" stroke-width="1.5"/>
  <text x="250" y="74" font-family="monospace" font-size="10" fill="#06c">WL</text>

  <!-- bit lines -->
  <line x1="40" y1="110" x2="20" y2="110" stroke="#093" stroke-width="1.5"/>
  <line x1="20" y1="110" x2="20" y2="190" stroke="#093" stroke-width="1.5"/>
  <text x="14" y="205" font-family="monospace" font-size="10" fill="#093">BL</text>
  <line x1="240" y1="150" x2="258" y2="150" stroke="#093" stroke-width="1.5"/>
  <line x1="258" y1="150" x2="258" y2="190" stroke="#093" stroke-width="1.5"/>
  <text x="250" y="205" font-family="monospace" font-size="10" fill="#093">BL'</text>

  <text x="130" y="240" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Bistable latch: holds state, no</text>
  <text x="130" y="255" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">refresh, non-destructive read.</text>
  <text x="130" y="270" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Fast, large area = low density.</text>

  <!-- divider -->
  <line x1="290" y1="40" x2="290" y2="285" stroke="#ccc" stroke-width="1"/>

  <!-- ===== DRAM 1T1C (right) ===== -->
  <text x="405" y="48" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">DRAM (1 transistor + 1 cap)</text>

  <!-- access transistor -->
  <rect x="380" y="110" width="26" height="24" fill="none" stroke="#06c" stroke-width="1.5"/>
  <text x="393" y="127" font-family="monospace" font-size="10" text-anchor="middle" fill="#06c">M</text>

  <!-- word line into gate -->
  <line x1="393" y1="110" x2="393" y2="70" stroke="#06c" stroke-width="1.5"/>
  <line x1="330" y1="70" x2="470" y2="70" stroke="#06c" stroke-width="1.5"/>
  <text x="478" y="74" font-family="monospace" font-size="10" fill="#06c">WL</text>

  <!-- bit line -->
  <line x1="380" y1="122" x2="340" y2="122" stroke="#093" stroke-width="1.5"/>
  <line x1="340" y1="122" x2="340" y2="200" stroke="#093" stroke-width="1.5"/>
  <text x="334" y="215" font-family="monospace" font-size="10" fill="#093">BL</text>

  <!-- storage capacitor -->
  <line x1="406" y1="122" x2="440" y2="122" stroke="black" stroke-width="1.5"/>
  <line x1="440" y1="112" x2="440" y2="132" stroke="black" stroke-width="2"/>
  <line x1="448" y1="112" x2="448" y2="132" stroke="black" stroke-width="2"/>
  <line x1="448" y1="122" x2="465" y2="122" stroke="black" stroke-width="1.5"/>
  <line x1="458" y1="135" x2="472" y2="135" stroke="black" stroke-width="1.5"/>
  <line x1="461" y1="140" x2="469" y2="140" stroke="black" stroke-width="1.5"/>
  <text x="455" y="105" font-family="monospace" font-size="10" text-anchor="middle" fill="black">C</text>

  <text x="405" y="240" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Charge on C leaks: needs periodic</text>
  <text x="405" y="255" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">REFRESH. Read is destructive (must</text>
  <text x="405" y="270" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">write back). Tiny cell = high density.</text>
</svg>
