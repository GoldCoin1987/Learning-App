<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220">
  <rect x="0" y="0" width="560" height="220" fill="white"/>
  <text x="280" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Crystal -&gt; PLL -&gt; On-Chip Clock Tree</text>

  <!-- crystal -->
  <rect x="20" y="80" width="80" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="60" y="100" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">XTAL</text>
  <text x="60" y="116" font-family="monospace" font-size="11" text-anchor="middle" fill="black">25 MHz</text>
  <line x1="100" y1="105" x2="135" y2="105" stroke="black" stroke-width="2"/>
  <polygon points="135,101 143,105 135,109" fill="black"/>

  <!-- PLL/MMCM -->
  <rect x="145" y="75" width="100" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="195" y="100" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">PLL / MMCM</text>
  <text x="195" y="118" font-family="monospace" font-size="10" text-anchor="middle" fill="black">x6 -&gt; 150 MHz</text>
  <line x1="245" y1="105" x2="280" y2="105" stroke="black" stroke-width="2"/>

  <!-- global clock buffer -->
  <rect x="280" y="80" width="70" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="315" y="100" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">global</text>
  <text x="315" y="114" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">clk buffer</text>

  <!-- balanced H-tree to flops -->
  <line x1="350" y1="105" x2="400" y2="105" stroke="black" stroke-width="2"/>
  <line x1="400" y1="55" x2="400" y2="155" stroke="black" stroke-width="2"/>
  <line x1="400" y1="55" x2="450" y2="55" stroke="black" stroke-width="2"/>
  <line x1="400" y1="105" x2="450" y2="105" stroke="black" stroke-width="2"/>
  <line x1="400" y1="155" x2="450" y2="155" stroke="black" stroke-width="2"/>

  <!-- flip-flops -->
  <rect x="450" y="42" width="40" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="470" y="59" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">FF</text>
  <rect x="450" y="92" width="40" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="470" y="109" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">FF</text>
  <rect x="450" y="142" width="40" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="470" y="159" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">FF</text>

  <text x="280" y="200" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Balanced (H-tree) distribution equalizes path length so clock arrives skew-free at every FF</text>
</svg>
