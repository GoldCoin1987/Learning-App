<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260">
  <rect x="0" y="0" width="560" height="260" fill="white"/>
  <text x="280" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Clean Clock vs Jittery Clock (edges that wobble)</text>

  <!-- CLEAN clock -->
  <text x="20" y="60" font-family="sans-serif" font-size="12" fill="black">CLEAN: edges land exactly on time</text>
  <polyline points="40,110 40,70 100,70 100,110 160,110 160,70 220,70 220,110 280,110 280,70 340,70 340,110 400,110 400,70 460,70 460,110 520,110"
            fill="none" stroke="black" stroke-width="2"/>
  <!-- ideal grid ticks -->
  <line x1="100" y1="70" x2="100" y2="120" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="220" y1="70" x2="220" y2="120" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="340" y1="70" x2="340" y2="120" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="460" y1="70" x2="460" y2="120" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- JITTERY clock -->
  <text x="20" y="175" font-family="sans-serif" font-size="12" fill="black">JITTERY: edges arrive a little early/late</text>
  <polyline points="40,225 40,185 108,185 108,225 156,225 156,185 226,185 226,225 274,225 274,185 348,185 348,225 392,225 392,185 466,185 466,225 520,225"
            fill="none" stroke="black" stroke-width="2"/>
  <!-- same ideal grid for comparison -->
  <line x1="100" y1="185" x2="100" y2="235" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="220" y1="185" x2="220" y2="235" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="340" y1="185" x2="340" y2="235" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="460" y1="185" x2="460" y2="235" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="280" y="252" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Dashed lines = ideal edge times. Jitter = how far real edges drift off those lines.</text>
</svg>
