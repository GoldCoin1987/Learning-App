<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect x="0" y="0" width="400" height="400" fill="white"/>
  <text x="200" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">4-bit Two's-Complement Wheel</text>
  <circle cx="200" cy="210" r="150" fill="none" stroke="black" stroke-width="2"/>
  <!-- 16 positions, 0 at top, increasing clockwise -->
  <text x="200" y="80" font-family="monospace" font-size="13" text-anchor="middle" fill="black">0000 = 0</text>
  <text x="257" y="92" font-family="monospace" font-size="13" text-anchor="middle" fill="black">0001 = 1</text>
  <text x="303" y="125" font-family="monospace" font-size="13" text-anchor="middle" fill="black">0010 = 2</text>
  <text x="333" y="172" font-family="monospace" font-size="13" text-anchor="middle" fill="black">0011 = 3</text>
  <text x="345" y="215" font-family="monospace" font-size="13" text-anchor="middle" fill="black">0100 = 4</text>
  <text x="333" y="258" font-family="monospace" font-size="13" text-anchor="middle" fill="black">0101 = 5</text>
  <text x="303" y="302" font-family="monospace" font-size="13" text-anchor="middle" fill="black">0110 = 6</text>
  <text x="257" y="335" font-family="monospace" font-size="13" text-anchor="middle" fill="black">0111 = 7</text>
  <text x="200" y="350" font-family="monospace" font-size="13" text-anchor="middle" fill="black">1000 = -8</text>
  <text x="143" y="335" font-family="monospace" font-size="13" text-anchor="middle" fill="black">1001 = -7</text>
  <text x="97" y="302" font-family="monospace" font-size="13" text-anchor="middle" fill="black">1010 = -6</text>
  <text x="67" y="258" font-family="monospace" font-size="13" text-anchor="middle" fill="black">1011 = -5</text>
  <text x="55" y="215" font-family="monospace" font-size="13" text-anchor="middle" fill="black">1100 = -4</text>
  <text x="67" y="172" font-family="monospace" font-size="13" text-anchor="middle" fill="black">1101 = -3</text>
  <text x="97" y="125" font-family="monospace" font-size="13" text-anchor="middle" fill="black">1110 = -2</text>
  <text x="143" y="92" font-family="monospace" font-size="13" text-anchor="middle" fill="black">1111 = -1</text>
  <!-- wrap discontinuity marker between 0111 and 1000 (bottom) -->
  <line x1="200" y1="345" x2="200" y2="375" stroke="black" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="200" y="392" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">overflow boundary: +7 -> -8</text>
  <!-- direction arrow -->
  <text x="200" y="200" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">+1 increments</text>
  <text x="200" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">clockwise</text>
  <text x="200" y="232" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(mod 16)</text>
</svg>
