    <text x="488" y="160" fill="black">board</text>
  </g>

  <!-- arrows -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="84" y1="79" x2="102" y2="79"/>
    <line x1="174" y1="79" x2="192" y2="79"/>
    <line x1="264" y1="79" x2="282" y2="79"/>
    <line x1="364" y1="79" x2="382" y2="79"/>
    <line x1="414" y1="98" x2="414" y2="128"/>
    <line x1="444" y1="149" x2="462" y2="149"/>
