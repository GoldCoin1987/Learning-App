<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200">
  <rect x="0" y="0" width="560" height="200" fill="white"/>
  <text x="280" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">A Clock is a Steady "Tick": ON, OFF, ON, OFF...</text>

  <!-- baseline labels -->
  <text x="20" y="70" font-family="sans-serif" font-size="11" fill="black">HIGH (1)</text>
  <text x="20" y="135" font-family="sans-serif" font-size="11" fill="black">LOW (0)</text>

  <!-- square wave clock: high=60, low=120 -->
  <polyline points="80,120 80,60 140,60 140,120 200,120 200,60 260,60 260,120 320,120 320,60 380,60 380,120 440,120 440,60 500,60 500,120 520,120"
            fill="none" stroke="black" stroke-width="2"/>

  <!-- one period bracket -->
  <line x1="80" y1="150" x2="200" y2="150" stroke="black" stroke-width="1"/>
  <line x1="80" y1="145" x2="80" y2="155" stroke="black" stroke-width="1"/>
  <line x1="200" y1="145" x2="200" y2="155" stroke="black" stroke-width="1"/>
  <text x="140" y="170" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">one period (one full tick)</text>

  <text x="280" y="192" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Every period has the same length. Frequency = ticks per second (e.g. 25 MHz = 25 million ticks/sec).</text>
</svg>
