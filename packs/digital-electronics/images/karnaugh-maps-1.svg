<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 380">
  <rect x="0" y="0" width="440" height="380" fill="white"/>
  <text x="220" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">4-Variable K-Map (Gray-ordered axes)</text>
  <text x="220" y="44" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">columns = CD, rows = AB; cell shows minterm number</text>

  <!-- column header label -->
  <text x="250" y="78" font-family="monospace" font-size="13" text-anchor="middle" fill="black">CD</text>
  <text x="120" y="200" font-family="monospace" font-size="13" text-anchor="middle" fill="black">AB</text>

  <!-- column Gray labels: 00 01 11 10 -->
  <text x="190" y="96" font-family="monospace" font-size="13" text-anchor="middle" fill="black">00</text>
  <text x="250" y="96" font-family="monospace" font-size="13" text-anchor="middle" fill="black">01</text>
  <text x="310" y="96" font-family="monospace" font-size="13" text-anchor="middle" fill="black">11</text>
  <text x="370" y="96" font-family="monospace" font-size="13" text-anchor="middle" fill="black">10</text>

  <!-- row Gray labels: 00 01 11 10 -->
  <text x="150" y="130" font-family="monospace" font-size="13" text-anchor="middle" fill="black">00</text>
  <text x="150" y="170" font-family="monospace" font-size="13" text-anchor="middle" fill="black">01</text>
  <text x="150" y="210" font-family="monospace" font-size="13" text-anchor="middle" fill="black">11</text>
  <text x="150" y="250" font-family="monospace" font-size="13" text-anchor="middle" fill="black">10</text>

  <!-- 4x4 grid of cells, top-left at (160,110), 60 wide x 40 tall -->
  <!-- row 0 (AB=00): m0 m1 m3 m2 -->
  <rect x="160" y="110" width="60" height="40" fill="white" stroke="black" stroke-width="1"/>
  <rect x="220" y="110" width="60" height="40" fill="white" stroke="black" stroke-width="1"/>
  <rect x="280" y="110" width="60" height="40" fill="white" stroke="black" stroke-width="1"/>
  <rect x="340" y="110" width="60" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="190" y="135" font-family="monospace" font-size="13" text-anchor="middle">0</text>
  <text x="250" y="135" font-family="monospace" font-size="13" text-anchor="middle">1</text>
  <text x="310" y="135" font-family="monospace" font-size="13" text-anchor="middle">3</text>
  <text x="370" y="135" font-family="monospace" font-size="13" text-anchor="middle">2</text>

  <!-- row 1 (AB=01): m4 m5 m7 m6 -->
  <rect x="160" y="150" width="60" height="40" fill="white" stroke="black" stroke-width="1"/>
  <rect x="220" y="150" width="60" height="40" fill="#cfe8cf" stroke="black" stroke-width="1"/>
  <rect x="280" y="150" width="60" height="40" fill="#cfe8cf" stroke="black" stroke-width="1"/>
  <rect x="340" y="150" width="60" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="190" y="175" font-family="monospace" font-size="13" text-anchor="middle">4</text>
  <text x="250" y="175" font-family="monospace" font-size="13" text-anchor="middle">5=1</text>
  <text x="310" y="175" font-family="monospace" font-size="13" text-anchor="middle">7=1</text>
  <text x="370" y="175" font-family="monospace" font-size="13" text-anchor="middle">6</text>

  <!-- row 2 (AB=11): m12 m13 m15 m14 -->
  <rect x="160" y="190" width="60" height="40" fill="white" stroke="black" stroke-width="1"/>
  <rect x="220" y="190" width="60" height="40" fill="#cfe8cf" stroke="black" stroke-width="1"/>
  <rect x="280" y="190" width="60" height="40" fill="#cfe8cf" stroke="black" stroke-width="1"/>
  <rect x="340" y="190" width="60" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="190" y="215" font-family="monospace" font-size="13" text-anchor="middle">12</text>
  <text x="250" y="215" font-family="monospace" font-size="13" text-anchor="middle">13=1</text>
  <text x="310" y="215" font-family="monospace" font-size="13" text-anchor="middle">15=1</text>
  <text x="370" y="215" font-family="monospace" font-size="13" text-anchor="middle">14</text>

  <!-- row 3 (AB=10): m8 m9 m11 m10 -->
  <rect x="160" y="230" width="60" height="40" fill="white" stroke="black" stroke-width="1"/>
  <rect x="220" y="230" width="60" height="40" fill="white" stroke="black" stroke-width="1"/>
  <rect x="280" y="230" width="60" height="40" fill="white" stroke="black" stroke-width="1"/>
  <rect x="340" y="230" width="60" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="190" y="255" font-family="monospace" font-size="13" text-anchor="middle">8</text>
  <text x="250" y="255" font-family="monospace" font-size="13" text-anchor="middle">9</text>
  <text x="310" y="255" font-family="monospace" font-size="13" text-anchor="middle">11</text>
  <text x="370" y="255" font-family="monospace" font-size="13" text-anchor="middle">10</text>

  <!-- circled group of 4: cells m5,m7,m13,m15 -> spans cols 01,11 and rows 01,11 -->
  <rect x="226" y="156" width="108" height="68" rx="20" ry="20" fill="none" stroke="#1f7a1f" stroke-width="3"/>

  <text x="220" y="300" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1f7a1f">Group of 4 (a prime implicant): {5,7,13,15}</text>
  <text x="220" y="320" font-family="monospace" font-size="13" text-anchor="middle" fill="#1f7a1f">B AND D  (B=1, D=1; A,C vary)</text>
  <text x="220" y="344" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">A group of 2^k cells covering n vars eliminates k of them.</text>
</svg>
