<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320">
  <rect x="0" y="0" width="460" height="320" fill="white"/>
  <text x="230" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Supply voltages have dropped over time</text>
  <text x="230" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Lower voltage = less power and heat (power grows with voltage squared)</text>

  <!-- baseline -->
  <line x1="50" y1="250" x2="430" y2="250" stroke="black" stroke-width="2"/>
  <text x="40" y="254" font-family="sans-serif" font-size="11" text-anchor="end" fill="black">0V</text>

  <!-- bar 1: 5V TTL/older CMOS -->
  <rect x="70" y="80" width="60" height="170" fill="#cccccc" stroke="black" stroke-width="2"/>
  <text x="100" y="74" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">5 V</text>
  <text x="100" y="270" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">old TTL,</text>
  <text x="100" y="284" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">74HC</text>

  <!-- bar 2: 3.3V -->
  <rect x="170" y="138" width="60" height="112" fill="#cccccc" stroke="black" stroke-width="2"/>
  <text x="200" y="132" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">3.3 V</text>
  <text x="200" y="270" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">LVC,</text>
  <text x="200" y="284" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">many MCUs</text>

  <!-- bar 3: 1.8V -->
  <rect x="270" y="189" width="60" height="61" fill="#cccccc" stroke="black" stroke-width="2"/>
  <text x="300" y="183" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">1.8 V</text>
  <text x="300" y="270" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">modern</text>
  <text x="300" y="284" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">chip cores</text>

  <!-- bar 4: lower -->
  <rect x="370" y="216" width="60" height="34" fill="#cccccc" stroke="black" stroke-width="2"/>
  <text x="400" y="210" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">1.2 V</text>
  <text x="400" y="270" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">and</text>
  <text x="400" y="284" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">lower</text>

  <!-- arrow showing trend -->
  <line x1="100" y1="60" x2="400" y2="60" stroke="black" stroke-width="2"/>
  <polygon points="400,60 390,55 390,65" fill="black"/>
  <text x="250" y="312" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Mixing a 5 V part with a 1.8 V part can fail - check levels or add a level shifter</text>
</svg>
