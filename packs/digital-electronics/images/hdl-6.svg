<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 290">
  <rect x="0" y="0" width="560" height="290" fill="white"/>
  <text x="280" y="26" font-family="sans-serif" font-size="17" text-anchor="middle" fill="black">The accidental latch trap</text>

  <!-- BAD -->
  <text x="150" y="56" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#a00">FORGOT to cover a case</text>
  <rect x="40" y="68" width="220" height="78" fill="none" stroke="#a00" stroke-width="2"/>
  <text x="52" y="90" font-family="monospace" font-size="11" text-anchor="start">always @(*)</text>
  <text x="52" y="108" font-family="monospace" font-size="11" text-anchor="start">  if (sel) y = a;</text>
  <text x="52" y="126" font-family="monospace" font-size="11" text-anchor="start" fill="#a00">  // no else!</text>
  <text x="150" y="166" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#a00">when sel=0, y must "remember"</text>
  <text x="150" y="184" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#a00">tool infers an unwanted LATCH</text>

  <!-- GOOD -->
  <text x="410" y="56" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#070">DEFAULT first = no latch</text>
  <rect x="300" y="68" width="220" height="78" fill="none" stroke="#070" stroke-width="2"/>
  <text x="312" y="90" font-family="monospace" font-size="11" text-anchor="start">always @(*)</text>
  <text x="312" y="108" font-family="monospace" font-size="11" text-anchor="start" fill="#070">  y = 1'b0;   // default</text>
  <text x="312" y="126" font-family="monospace" font-size="11" text-anchor="start">  if (sel) y = a;</text>
  <text x="410" y="166" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#070">y is always driven on every path</text>
  <text x="410" y="184" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#070">clean combinational logic</text>

  <text x="280" y="226" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Fix: give every output a default, and finish every if with else / case with default.</text>
  <text x="280" y="252" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#444">SystemVerilog always_comb warns you automatically when a latch would form.</text>
</svg>
