<svg xmlns="http://www.w3.org/2000/svg" width="560" height="300" viewBox="0 0 560 300" font-family="sans-serif" font-size="13">
  <rect width="560" height="300" fill="#ffffff"/>
  <text x="280" y="22" text-anchor="middle" font-size="15" font-weight="bold">From smooth analog wave to digital numbers</text>

  <!-- axes -->
  <line x1="50" y1="240" x2="520" y2="240" stroke="#333"/>
  <line x1="50" y1="40" x2="50" y2="240" stroke="#333"/>
  <text x="525" y="244" font-size="11">time</text>
  <text x="30" y="44" font-size="11">volts</text>

  <!-- level grid lines (8 levels => 3-bit) -->
  <g stroke="#ccc" stroke-dasharray="3 3">
    <line x1="50" y1="215" x2="520" y2="215"/>
    <line x1="50" y1="190" x2="520" y2="190"/>
    <line x1="50" y1="165" x2="520" y2="165"/>
    <line x1="50" y1="140" x2="520" y2="140"/>
    <line x1="50" y1="115" x2="520" y2="115"/>
    <line x1="50" y1="90" x2="520" y2="90"/>
    <line x1="50" y1="65" x2="520" y2="65"/>
  </g>

  <!-- smooth analog sine -->
  <path d="M50 165 Q110 60 170 90 T290 165 T410 240 T520 165" fill="none" stroke="#1565c0" stroke-width="2"/>
  <text x="120" y="55" font-size="11" fill="#1565c0">smooth analog signal (real world)</text>

  <!-- quantized staircase (sampled + rounded) -->
  <path d="M50 165 H110 V90 H170 V90 H230 V140 H290 V165 H350 V215 H410 V240 H470 V190 H520"
        fill="none" stroke="#c62828" stroke-width="2"/>
  <text x="300" y="270" font-size="11" fill="#c62828">red staircase = quantized samples (rounded to nearest level)</text>

  <!-- sample dots -->
  <g fill="#c62828">
    <circle cx="80" cy="165" r="3"/>
    <circle cx="140" cy="90" r="3"/>
    <circle cx="200" cy="90" r="3"/>
    <circle cx="260" cy="140" r="3"/>
    <circle cx="320" cy="165" r="3"/>
    <circle cx="380" cy="215" r="3"/>
    <circle cx="440" cy="240" r="3"/>
  </g>

  <text x="50" y="290" font-size="11" fill="#555">Sampling takes snapshots in time; quantization snaps each snapshot to the nearest allowed level.</text>
</svg>
