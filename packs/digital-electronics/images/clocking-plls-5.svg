<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 280">
  <rect x="0" y="0" width="580" height="280" fill="white"/>
  <text x="290" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">PLL: turn 25 MHz into 100 MHz (multiply by 4)</text>

  <!-- reference input -->
  <text x="18" y="112" font-family="monospace" font-size="12" fill="black">25 MHz</text>
  <text x="18" y="126" font-family="sans-serif" font-size="10" fill="black">reference</text>
  <line x1="70" y1="130" x2="100" y2="130" stroke="black" stroke-width="2"/>
  <polygon points="100,126 108,130 100,134" fill="black"/>

  <!-- Phase detector -->
  <rect x="110" y="105" width="80" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="126" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">phase</text>
  <text x="150" y="140" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">detector</text>

  <!-- Loop filter -->
  <line x1="190" y1="130" x2="215" y2="130" stroke="black" stroke-width="2"/>
  <rect x="215" y="105" width="80" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="255" y="126" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">loop</text>
  <text x="255" y="140" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">filter</text>

  <!-- VCO -->
  <line x1="295" y1="130" x2="320" y2="130" stroke="black" stroke-width="2"/>
  <rect x="320" y="105" width="80" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="360" y="126" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">VCO</text>
  <text x="360" y="140" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">(tunable osc.)</text>

  <!-- output -->
  <line x1="400" y1="130" x2="540" y2="130" stroke="black" stroke-width="2"/>
  <polygon points="540,126 548,130 540,134" fill="black"/>
  <text x="500" y="120" font-family="monospace" font-size="12" text-anchor="middle" fill="black">100 MHz out</text>

  <!-- feedback tap -->
  <line x1="460" y1="130" x2="460" y2="225" stroke="black" stroke-width="2"/>
  <line x1="460" y1="225" x2="300" y2="225" stroke="black" stroke-width="2"/>

  <!-- divider /4 -->
  <rect x="240" y="205" width="60" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="270" y="230" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">divide /4</text>
  <line x1="240" y1="225" x2="150" y2="225" stroke="black" stroke-width="2"/>
  <line x1="150" y1="225" x2="150" y2="155" stroke="black" stroke-width="2"/>
  <polygon points="146,155 150,147 154,155" fill="black"/>
  <text x="195" y="218" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">feedback</text>

  <text x="290" y="270" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Divide the 100 MHz output by 4 = 25 MHz, match it to the reference. Locked: out = 4 x 25 = 100 MHz.</text>
</svg>
