<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect x="0" y="0" width="480" height="320" fill="#ffffff"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="16">
    <text x="120" y="28">The derived gates</text>
  </g>
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- NAND -->
    <path d="M 40 55 L 65 55 A 25 25 0 0 1 65 105 L 40 105 Z"/>
    <circle cx="96" cy="80" r="6"/>
    <line x1="15" y1="66" x2="40" y2="66"/>
    <line x1="15" y1="94" x2="40" y2="94"/>
    <line x1="102" y1="80" x2="120" y2="80"/>
    <!-- NOR -->
    <path d="M 180 55 Q 213 55 238 80 Q 213 105 180 105 Q 197 80 180 55 Z"/>
    <circle cx="246" cy="80" r="6"/>
    <line x1="158" y1="66" x2="187" y2="66"/>
    <line x1="158" y1="94" x2="187" y2="94"/>
    <line x1="252" y1="80" x2="270" y2="80"/>
    <!-- XOR -->
    <path d="M 330 55 Q 363 55 388 80 Q 363 105 330 105 Q 347 80 330 55 Z"/>
    <path d="M 322 55 Q 339 80 322 105"/>
    <line x1="300" y1="66" x2="333" y2="66"/>
    <line x1="300" y1="94" x2="333" y2="94"/>
    <line x1="388" y1="80" x2="410" y2="80"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="45" y="50">NAND</text>
    <text x="30" y="130">(A.B)'</text>
    <text x="185" y="50">NOR</text>
    <text x="175" y="130">(A+B)'</text>
    <text x="335" y="50">XOR</text>
    <text x="320" y="130">A (+) B</text>
  </g>
  <!-- truth tables row -->
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="20" y="175">A B | NAND NOR XOR XNOR</text>
    <text x="20" y="195">0 0 |   1    1    0    1</text>
    <text x="20" y="213">0 1 |   1    0    1    0</text>
    <text x="20" y="231">1 0 |   1    0    1    0</text>
    <text x="20" y="249">1 1 |   0    0    0    1</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="20" y="285">NAND = NOT-AND.  NOR = NOT-OR.  XOR = 1 when inputs DIFFER.</text>
    <text x="20" y="305">XNOR = NOT-XOR = 1 when inputs are EQUAL.</text>
  </g>
</svg>
