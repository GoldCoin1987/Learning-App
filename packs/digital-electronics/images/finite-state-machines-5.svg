<svg xmlns="http://www.w3.org/2000/svg" width="540" height="240" viewBox="0 0 540 240" font-family="sans-serif" font-size="12">
  <rect width="540" height="240" fill="#ffffff"/>
  <text x="270" y="22" text-anchor="middle" font-size="15" font-weight="bold">The three-block FSM structure</text>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L7 3 L0 6 z" fill="#333"/>
    </marker>
  </defs>

  <!-- next-state logic -->
  <rect x="30" y="80" width="130" height="70" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="95" y="110" text-anchor="middle">Next-state</text>
  <text x="95" y="128" text-anchor="middle">logic</text>

  <!-- state register -->
  <rect x="220" y="80" width="120" height="70" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="280" y="110" text-anchor="middle">State</text>
  <text x="280" y="128" text-anchor="middle">register</text>
  <text x="280" y="168" text-anchor="middle" font-size="10" fill="#555">(flip-flops, clocked)</text>

  <!-- output logic -->
  <rect x="400" y="80" width="120" height="70" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="460" y="110" text-anchor="middle">Output</text>
  <text x="460" y="128" text-anchor="middle">logic</text>

  <!-- inputs into next-state -->
  <line x1="0" y1="100" x2="28" y2="100" stroke="#333" marker-end="url(#arrow)"/>
  <text x="6" y="92" font-size="10">inputs</text>

  <!-- next-state -> register -->
  <line x1="160" y1="115" x2="218" y2="115" stroke="#333" marker-end="url(#arrow)"/>
  <text x="189" y="107" text-anchor="middle" font-size="10">next</text>

  <!-- register -> output logic -->
  <line x1="340" y1="115" x2="398" y2="115" stroke="#333" marker-end="url(#arrow)"/>
  <text x="369" y="107" text-anchor="middle" font-size="10">state</text>

  <!-- output out -->
  <line x1="520" y1="115" x2="540" y2="115" stroke="#333" marker-end="url(#arrow)"/>
  <text x="505" y="170" font-size="10">outputs</text>

  <!-- feedback: state back to next-state logic -->
  <path d="M280 150 q0 50 -185 50 q-95 0 -95 -50 v-30" fill="none" stroke="#777" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="190" y="218" text-anchor="middle" font-size="10" fill="#777">current state fed back</text>

  <!-- clock -->
  <line x1="280" y1="55" x2="280" y2="78" stroke="#333" marker-end="url(#arrow)"/>
  <text x="280" y="50" text-anchor="middle" font-size="10">clock</text>

  <text x="20" y="234" font-size="10" fill="#555">Block 1 picks the next state. Block 2 remembers it. Block 3 turns the state into outputs.</text>
</svg>
