<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360">
  <rect x="0" y="0" width="520" height="360" fill="white"/>
  <text x="260" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">The Memory Hierarchy: fast-and-small to slow-and-big</text>

  <!-- pyramid levels (narrow top = fast/small, wide bottom = slow/big) -->
  <!-- Level 1: Registers -->
  <polygon points="230,50 290,50 300,95 220,95" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="260" y="78" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Registers</text>

  <!-- Level 2: Cache (SRAM) -->
  <polygon points="220,95 300,95 315,150 205,150" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="260" y="120" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Cache</text>
  <text x="260" y="136" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">(SRAM)</text>

  <!-- Level 3: Main memory (DRAM) -->
  <polygon points="205,150 315,150 335,215 185,215" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="260" y="178" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Main memory / RAM</text>
  <text x="260" y="194" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">(DRAM, volatile)</text>

  <!-- Level 4: Storage (Flash/SSD) -->
  <polygon points="185,215 335,215 360,290 160,290" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="260" y="245" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Storage: SSD / flash / disk</text>
  <text x="260" y="261" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">(non-volatile)</text>

  <!-- left arrow: faster, smaller -->
  <line x1="110" y1="290" x2="110" y2="55" stroke="black" stroke-width="1.5"/>
  <polygon points="110,50 105,62 115,62" fill="black"/>
  <text x="100" y="100" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black" transform="rotate(-90 100 100)">faster, smaller, costlier per bit</text>

  <!-- right arrow: bigger, cheaper -->
  <line x1="420" y1="55" x2="420" y2="290" stroke="black" stroke-width="1.5"/>
  <polygon points="420,295 415,283 425,283" fill="black"/>
  <text x="432" y="160" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black" transform="rotate(90 432 160)">bigger, cheaper per bit, slower</text>

  <!-- bottom note -->
  <text x="260" y="322" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Top levels lose data when power is off (VOLATILE).</text>
  <text x="260" y="340" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Storage keeps data with power off (NON-VOLATILE).</text>
</svg>
