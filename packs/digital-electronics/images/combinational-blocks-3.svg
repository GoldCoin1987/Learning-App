<svg xmlns="http://www.w3.org/2000/svg" width="420" height="280" viewBox="0 0 420 280" font-family="sans-serif" font-size="13">
  <rect width="420" height="280" fill="#ffffff"/>
  <text x="210" y="24" text-anchor="middle" font-size="15" font-weight="bold">4:1 Multiplexer (a selectable switch)</text>

  <!-- trapezoid mux body -->
  <polygon points="170,55 250,90 250,200 170,235" fill="#eef4ff" stroke="#333" stroke-width="1.5"/>
  <text x="210" y="150" text-anchor="middle" font-size="12" fill="#555">MUX</text>

  <!-- data inputs -->
  <line x1="90" y1="75" x2="170" y2="75" stroke="#333"/>
  <text x="80" y="79" text-anchor="end">I0</text>
  <line x1="90" y1="115" x2="170" y2="115" stroke="#333"/>
  <text x="80" y="119" text-anchor="end">I1</text>
  <line x1="90" y1="155" x2="170" y2="155" stroke="#333"/>
  <text x="80" y="159" text-anchor="end">I2</text>
  <line x1="90" y1="195" x2="170" y2="195" stroke="#333"/>
  <text x="80" y="199" text-anchor="end">I3</text>

  <!-- select lines -->
  <line x1="195" y1="265" x2="195" y2="218" stroke="#333"/>
  <line x1="225" y1="265" x2="225" y2="212" stroke="#333"/>
  <text x="210" y="278" text-anchor="middle">S1  S0  (select code)</text>

  <!-- output -->
  <line x1="250" y1="145" x2="340" y2="145" stroke="#333"/>
  <text x="350" y="149">Y</text>

  <text x="20" y="255" font-size="11" fill="#555">Select code picks ONE input to connect to Y.</text>
  <text x="20" y="270" font-size="11" fill="#555">S1S0 = 10  =>  Y = I2</text>
</svg>
