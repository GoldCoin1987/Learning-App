<svg xmlns="http://www.w3.org/2000/svg" width="520" height="240" viewBox="0 0 520 240" font-family="sans-serif" font-size="12">
  <rect width="520" height="240" fill="#ffffff"/>
  <text x="260" y="22" text-anchor="middle" font-size="15" font-weight="bold">Moore vs Mealy: where the output comes from</text>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L7 3 L0 6 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Moore (left) -->
  <text x="130" y="50" text-anchor="middle" font-size="13" font-weight="bold">MOORE</text>
  <circle cx="80" cy="120" r="30" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="80" y="116" text-anchor="middle">A</text>
  <text x="80" y="130" text-anchor="middle" font-size="10" fill="#b00">out=0</text>
  <circle cx="200" cy="120" r="30" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="200" y="116" text-anchor="middle">B</text>
  <text x="200" y="130" text-anchor="middle" font-size="10" fill="#b00">out=1</text>
  <line x1="110" y1="120" x2="170" y2="120" stroke="#333" marker-end="url(#arrow)"/>
  <text x="140" y="112" text-anchor="middle" font-size="11">in=1</text>
  <text x="140" y="180" text-anchor="middle" font-size="10" fill="#555">output written on the</text>
  <text x="140" y="194" text-anchor="middle" font-size="10" fill="#555">state bubble</text>

  <!-- divider -->
  <line x1="260" y1="60" x2="260" y2="210" stroke="#ccc" stroke-width="1"/>

  <!-- Mealy (right) -->
  <text x="390" y="50" text-anchor="middle" font-size="13" font-weight="bold">MEALY</text>
  <circle cx="340" cy="120" r="30" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="340" y="124" text-anchor="middle">A</text>
  <circle cx="460" cy="120" r="30" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="460" y="124" text-anchor="middle">B</text>
  <line x1="370" y1="120" x2="430" y2="120" stroke="#333" marker-end="url(#arrow)"/>
  <text x="400" y="106" text-anchor="middle" font-size="11" fill="#b00">in=1 / out=1</text>
  <text x="400" y="180" text-anchor="middle" font-size="10" fill="#555">output written on the</text>
  <text x="400" y="194" text-anchor="middle" font-size="10" fill="#555">transition arrow</text>

  <text x="20" y="228" font-size="10" fill="#555">Moore output depends on the state only. Mealy output depends on the state AND the current input.</text>
</svg>
