<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220">
  <rect x="0" y="0" width="560" height="220" fill="white"/>
  <text x="280" y="28" font-family="sans-serif" font-size="17" text-anchor="middle" fill="black">From text to real gates: the HDL flow</text>

  <rect x="30" y="70" width="120" height="56" fill="none" stroke="black" stroke-width="2"/>
  <text x="90" y="95" font-family="sans-serif" font-size="13" text-anchor="middle">HDL text</text>
  <text x="90" y="113" font-family="monospace" font-size="11" text-anchor="middle" fill="#444">module ...</text>

  <line x1="150" y1="98" x2="210" y2="98" stroke="black" stroke-width="2" marker-end="url(#f)"/>
  <text x="180" y="90" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#070">simulate</text>

  <rect x="210" y="70" width="130" height="56" fill="none" stroke="black" stroke-width="2"/>
  <text x="275" y="95" font-family="sans-serif" font-size="13" text-anchor="middle">Simulation</text>
  <text x="275" y="113" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#444">check behavior</text>

  <line x1="340" y1="98" x2="400" y2="98" stroke="black" stroke-width="2" marker-end="url(#f)"/>
  <text x="370" y="90" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#070">synthesize</text>

  <rect x="400" y="70" width="130" height="56" fill="none" stroke="black" stroke-width="2"/>
  <text x="465" y="95" font-family="sans-serif" font-size="13" text-anchor="middle">Real gates</text>
  <text x="465" y="113" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#444">on a chip / FPGA</text>

  <text x="280" y="170" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">You write what the circuit IS. Simulation tests it; synthesis builds it.</text>
  <text x="280" y="190" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#444">Like a blueprint a factory turns into a physical thing.</text>

  <defs>
    <marker id="f" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="black"/></marker>
  </defs>
</svg>
