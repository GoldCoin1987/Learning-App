<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 400">
  <rect x="0" y="0" width="460" height="400" fill="white"/>
  <text x="230" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Reading Two Groups Off a 4-Variable K-Map</text>
  <text x="230" y="44" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">1 = output is 1; circle adjacent 1s, then read the simpler term</text>

  <text x="260" y="76" font-family="monospace" font-size="13" text-anchor="middle" fill="black">CD</text>
  <text x="120" y="190" font-family="monospace" font-size="13" text-anchor="middle" fill="black">AB</text>

  <!-- column Gray labels -->
  <text x="190" y="94" font-family="monospace" font-size="13" text-anchor="middle">00</text>
  <text x="250" y="94" font-family="monospace" font-size="13" text-anchor="middle">01</text>
  <text x="310" y="94" font-family="monospace" font-size="13" text-anchor="middle">11</text>
  <text x="370" y="94" font-family="monospace" font-size="13" text-anchor="middle">10</text>

  <!-- row Gray labels -->
  <text x="150" y="130" font-family="monospace" font-size="13" text-anchor="middle">00</text>
  <text x="150" y="170" font-family="monospace" font-size="13" text-anchor="middle">01</text>
  <text x="150" y="210" font-family="monospace" font-size="13" text-anchor="middle">11</text>
  <text x="150" y="250" font-family="monospace" font-size="13" text-anchor="middle">10</text>

  <!-- grid top-left (160,110), 60x40 -->
  <!-- AB=00 row: m0 m1 m3 m2 -->
  <rect x="160" y="110" width="60" height="40" fill="white" stroke="black"/>
  <rect x="220" y="110" width="60" height="40" fill="#cfe8cf" stroke="black"/>
  <rect x="280" y="110" width="60" height="40" fill="#cfe8cf" stroke="black"/>
  <rect x="340" y="110" width="60" height="40" fill="white" stroke="black"/>
  <text x="250" y="135" font-family="monospace" font-size="14" text-anchor="middle">1</text>
  <text x="310" y="135" font-family="monospace" font-size="14" text-anchor="middle">1</text>

  <!-- AB=01 row: m4 m5 m7 m6 -->
  <rect x="160" y="150" width="60" height="40" fill="white" stroke="black"/>
  <rect x="220" y="150" width="60" height="40" fill="#cfe8cf" stroke="black"/>
  <rect x="280" y="150" width="60" height="40" fill="#cfe8cf" stroke="black"/>
  <rect x="340" y="150" width="60" height="40" fill="white" stroke="black"/>
  <text x="250" y="175" font-family="monospace" font-size="14" text-anchor="middle">1</text>
  <text x="310" y="175" font-family="monospace" font-size="14" text-anchor="middle">1</text>

  <!-- AB=11 row: m12 m13 m15 m14 -->
  <rect x="160" y="190" width="60" height="40" fill="white" stroke="black"/>
  <rect x="220" y="190" width="60" height="40" fill="white" stroke="black"/>
  <rect x="280" y="190" width="60" height="40" fill="white" stroke="black"/>
  <rect x="340" y="190" width="60" height="40" fill="white" stroke="black"/>

  <!-- AB=10 row: m8 m9 m11 m10 -->
  <rect x="160" y="230" width="60" height="40" fill="#f0d9b5" stroke="black"/>
  <rect x="220" y="230" width="60" height="40" fill="white" stroke="black"/>
  <rect x="280" y="230" width="60" height="40" fill="white" stroke="black"/>
  <rect x="340" y="230" width="60" height="40" fill="#f0d9b5" stroke="black"/>
  <text x="190" y="255" font-family="monospace" font-size="14" text-anchor="middle">1</text>
  <text x="370" y="255" font-family="monospace" font-size="14" text-anchor="middle">1</text>

  <!-- green group of 4: cols 01,11 across rows 00,01 -> C=1,D=1 constant -->
  <rect x="226" y="116" width="108" height="68" rx="18" ry="18" fill="none" stroke="#1f7a1f" stroke-width="3"/>
  <!-- orange wrap group: bottom row left+right cells (m8,m10) wrap-around -->
  <rect x="155" y="226" width="70" height="48" rx="14" ry="14" fill="none" stroke="#b5651d" stroke-width="3"/>
  <rect x="335" y="226" width="70" height="48" rx="14" ry="14" fill="none" stroke="#b5651d" stroke-width="3"/>

  <text x="230" y="300" font-family="monospace" font-size="13" text-anchor="middle" fill="#1f7a1f">Green group of 4: C=1, D=1 (A,B vary) =  C AND D</text>
  <text x="230" y="322" font-family="monospace" font-size="13" text-anchor="middle" fill="#b5651d">Orange wrap group of 2: A=1, B=0, D=0 =  A AND B' AND D'</text>
  <text x="230" y="350" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Simplified result = OR of the groups:</text>
  <text x="230" y="372" font-family="monospace" font-size="13" text-anchor="middle" fill="black">F = (C AND D) OR (A AND B' AND D')</text>
</svg>
