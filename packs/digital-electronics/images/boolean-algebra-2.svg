<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" width="460" height="320">
  <rect x="0" y="0" width="460" height="320" fill="#ffffff"/>
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- helper: a NAND = AND body + bubble -->
    <!-- N1 -->
    <path d="M 90 40 L 120 40 A 22 22 0 0 1 120 84 L 90 84 Z"/>
    <circle cx="148" cy="62" r="5"/>
    <!-- N2 -->
    <path d="M 90 110 L 120 110 A 22 22 0 0 1 120 154 L 90 154 Z"/>
    <circle cx="148" cy="132" r="5"/>
    <!-- N3 -->
    <path d="M 220 70 L 250 70 A 22 22 0 0 1 250 114 L 220 114 Z"/>
    <circle cx="278" cy="92" r="5"/>
    <!-- N4 -->
    <path d="M 220 150 L 250 150 A 22 22 0 0 1 250 194 L 220 194 Z"/>
    <circle cx="278" cy="172" r="5"/>
    <!-- N5 (carry NAND) -->
    <path d="M 340 200 L 370 200 A 22 22 0 0 1 370 244 L 340 244 Z"/>
    <circle cx="398" cy="222" r="5"/>

    <!-- inputs A, B -->
    <line x1="20" y1="48" x2="90" y2="48"/>
    <line x1="20" y1="76" x2="90" y2="76"/>
    <!-- A,B also feed N1 same as drawn; route A to N1 top, B to N1 bottom -->
    <line x1="55" y1="48" x2="55" y2="118"/>
    <line x1="55" y1="118" x2="90" y2="118"/>
    <line x1="40" y1="76" x2="40" y2="146"/>
    <line x1="40" y1="146" x2="90" y2="146"/>

    <!-- N1 out -> N2? layout: N1 out feeds N3 and N4 -->
    <line x1="153" y1="62" x2="200" y2="62"/>
    <line x1="200" y1="62" x2="200" y2="78"/>
    <line x1="200" y1="78" x2="220" y2="78"/>
    <!-- A to N3 -->
    <line x1="180" y1="48" x2="180" y2="106"/>
    <line x1="180" y1="106" x2="220" y2="106"/>
    <!-- N1 out to N4 -->
    <line x1="200" y1="62" x2="200" y2="158"/>
    <line x1="200" y1="158" x2="220" y2="158"/>
    <!-- B to N4 -->
    <line x1="165" y1="76" x2="165" y2="186"/>
    <line x1="165" y1="186" x2="220" y2="186"/>

    <!-- N3,N4 outputs -> N? produce SUM via N5-like: combine to SUM -->
    <line x1="283" y1="92" x2="320" y2="92"/>
    <line x1="320" y1="92" x2="320" y2="206"/>
    <line x1="320" y1="206" x2="340" y2="206"/>
    <line x1="283" y1="172" x2="310" y2="172"/>
    <line x1="310" y1="172" x2="310" y2="238"/>
    <line x1="310" y1="238" x2="340" y2="238"/>
    <!-- SUM out -->
    <line x1="403" y1="222" x2="440" y2="222"/>

    <!-- CARRY = N1 output inverted = A.B ; tap N1 out to a final symbol; here Cout = (N1 out)' -->
    <line x1="153" y1="62" x2="153" y2="30"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="20" y="44">A</text>
    <text x="20" y="92">B</text>
    <text x="98" y="58">N1</text>
    <text x="98" y="128">N1b</text>
    <text x="228" y="88">N3</text>
    <text x="228" y="168">N4</text>
    <text x="348" y="218">N5</text>
    <text x="444" y="226">SUM</text>
    <text x="158" y="26">Cout = (A.B)' ' = A.B</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="14">
    <text x="40" y="300">Half-adder from NAND gates:  SUM = A XOR B,  Cout = A . B</text>
  </g>
</svg>
