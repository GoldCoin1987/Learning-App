<svg xmlns="http://www.w3.org/2000/svg" width="560" height="260" viewBox="0 0 560 260" font-family="sans-serif" font-size="13">
  <rect width="560" height="260" fill="#ffffff"/>
  <text x="280" y="22" text-anchor="middle" font-size="15" font-weight="bold">More bits = more levels (resolution)</text>

  <!-- 1-bit -->
  <text x="90" y="55" text-anchor="middle" font-size="12" font-weight="bold">1 bit</text>
  <text x="90" y="72" text-anchor="middle" font-size="11">2 levels</text>
  <rect x="55" y="85" width="70" height="120" fill="none" stroke="#333"/>
  <line x1="55" y1="145" x2="125" y2="145" stroke="#999"/>

  <!-- 2-bit -->
  <text x="215" y="55" text-anchor="middle" font-size="12" font-weight="bold">2 bits</text>
  <text x="215" y="72" text-anchor="middle" font-size="11">4 levels</text>
  <rect x="180" y="85" width="70" height="120" fill="none" stroke="#333"/>
  <g stroke="#999"><line x1="180" y1="115" x2="250" y2="115"/><line x1="180" y1="145" x2="250" y2="145"/><line x1="180" y1="175" x2="250" y2="175"/></g>

  <!-- 3-bit -->
  <text x="340" y="55" text-anchor="middle" font-size="12" font-weight="bold">3 bits</text>
  <text x="340" y="72" text-anchor="middle" font-size="11">8 levels</text>
  <rect x="305" y="85" width="70" height="120" fill="none" stroke="#333"/>
  <g stroke="#999">
    <line x1="305" y1="100" x2="375" y2="100"/><line x1="305" y1="115" x2="375" y2="115"/>
    <line x1="305" y1="130" x2="375" y2="130"/><line x1="305" y1="145" x2="375" y2="145"/>
    <line x1="305" y1="160" x2="375" y2="160"/><line x1="305" y1="175" x2="375" y2="175"/>
    <line x1="305" y1="190" x2="375" y2="190"/>
  </g>

  <!-- N-bit formula -->
  <text x="470" y="55" text-anchor="middle" font-size="12" font-weight="bold">N bits</text>
  <text x="470" y="72" text-anchor="middle" font-size="11">2 to the N levels</text>
  <rect x="435" y="85" width="70" height="120" fill="#f4f4f4" stroke="#333"/>
  <text x="470" y="150" text-anchor="middle" font-size="13" font-weight="bold">2^N</text>

  <text x="40" y="235" font-size="11" fill="#555">An N-bit converter splits its full-scale range into 2^N equal steps. One step = the smallest amount</text>
  <text x="40" y="251" font-size="11" fill="#555">it can resolve, called 1 LSB = full-scale / 2^N. More bits means finer steps and a smoother result.</text>
</svg>
