<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220">
  <rect x="0" y="0" width="640" height="220" fill="white"/>
  <text x="320" y="28" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">IEEE 754 Single Precision (32 bits)</text>
  <!-- Sign: 1 bit -->
  <rect x="20" y="60" width="40" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="40" y="92" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">S</text>
  <!-- Exponent: 8 bits -->
  <rect x="60" y="60" width="200" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="160" y="92" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Exponent (8)</text>
  <!-- Mantissa: 23 bits -->
  <rect x="260" y="60" width="360" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="440" y="92" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Mantissa / Fraction (23)</text>
  <!-- bit index labels -->
  <text x="40" y="50" font-family="monospace" font-size="11" text-anchor="middle" fill="black">31</text>
  <text x="70" y="128" font-family="monospace" font-size="11" text-anchor="middle" fill="black">30</text>
  <text x="250" y="128" font-family="monospace" font-size="11" text-anchor="middle" fill="black">23</text>
  <text x="270" y="128" font-family="monospace" font-size="11" text-anchor="middle" fill="black">22</text>
  <text x="610" y="128" font-family="monospace" font-size="11" text-anchor="middle" fill="black">0</text>
  <!-- value formula -->
  <text x="320" y="160" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">value = (-1)^S x 1.M x 2^(E - 127)   [bias = 127]</text>
  <text x="320" y="184" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">E=0: denormal (no implicit 1)   E=255: Inf (M=0) / NaN (M!=0)</text>
  <text x="320" y="206" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">double: 1 / 11 / 52 bits, bias = 1023</text>
</svg>
