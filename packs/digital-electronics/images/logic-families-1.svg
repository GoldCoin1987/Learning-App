<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect x="0" y="0" width="400" height="400" fill="white"/>
  <text x="200" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">CMOS Inverter (PMOS pull-up / NMOS pull-down)</text>

  <!-- VDD rail -->
  <line x1="120" y1="60" x2="280" y2="60" stroke="black" stroke-width="2"/>
  <text x="290" y="64" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">VDD</text>
  <line x1="200" y1="60" x2="200" y2="95" stroke="black" stroke-width="2"/>

  <!-- PMOS body -->
  <rect x="180" y="95" width="40" height="55" fill="none" stroke="black" stroke-width="2"/>
  <text x="232" y="126" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">PMOS</text>
  <!-- PMOS bubble on gate (active-low) -->
  <circle cx="168" cy="122" r="5" fill="white" stroke="black" stroke-width="2"/>
  <line x1="163" y1="122" x2="130" y2="122" stroke="black" stroke-width="2"/>

  <!-- output node between the two transistors -->
  <line x1="200" y1="150" x2="200" y2="250" stroke="black" stroke-width="2"/>
  <circle cx="200" cy="200" r="4" fill="black"/>
  <line x1="200" y1="200" x2="300" y2="200" stroke="black" stroke-width="2"/>
  <text x="305" y="204" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">OUT</text>

  <!-- NMOS body -->
  <rect x="180" y="250" width="40" height="55" fill="none" stroke="black" stroke-width="2"/>
  <text x="232" y="282" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">NMOS</text>
  <line x1="180" y1="278" x2="130" y2="278" stroke="black" stroke-width="2"/>

  <!-- shared gate / input -->
  <line x1="130" y1="122" x2="130" y2="278" stroke="black" stroke-width="2"/>
  <circle cx="130" cy="200" r="4" fill="black"/>
  <line x1="130" y1="200" x2="80" y2="200" stroke="black" stroke-width="2"/>
  <text x="40" y="204" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">IN</text>

  <!-- ground rail -->
  <line x1="200" y1="305" x2="200" y2="345" stroke="black" stroke-width="2"/>
  <line x1="170" y1="345" x2="230" y2="345" stroke="black" stroke-width="2"/>
  <line x1="180" y1="352" x2="220" y2="352" stroke="black" stroke-width="2"/>
  <line x1="190" y1="359" x2="210" y2="359" stroke="black" stroke-width="2"/>
  <text x="240" y="349" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">GND</text>

  <text x="200" y="388" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">IN low -> PMOS on, OUT high; IN high -> NMOS on, OUT low</text>
</svg>
