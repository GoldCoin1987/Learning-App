<svg xmlns="http://www.w3.org/2000/svg" width="560" height="240" viewBox="0 0 560 240" font-family="sans-serif" font-size="13">
  <rect width="560" height="240" fill="#ffffff"/>
  <text x="280" y="22" text-anchor="middle" font-size="15" font-weight="bold">Moore "1011" sequence detector (overlapping)</text>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L7 3 L0 6 z" fill="#333"/>
    </marker>
  </defs>

  <!-- states: S0 S1 S10 S101 S1011 along a row -->
  <circle cx="70"  cy="120" r="26" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="70"  y="124" text-anchor="middle">S0</text>
  <circle cx="190" cy="120" r="26" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="190" y="124" text-anchor="middle">S1</text>
  <circle cx="310" cy="120" r="26" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="310" y="124" text-anchor="middle">S10</text>
  <circle cx="430" cy="120" r="26" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="430" y="124" text-anchor="middle">S101</text>
  <circle cx="510" cy="120" r="26" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="510" cy="120" r="21" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="510" y="118" text-anchor="middle" font-size="11">S1011</text>
  <text x="510" y="130" text-anchor="middle" font-size="10" fill="#b00">y=1</text>

  <!-- forward transitions (input that advances) -->
  <line x1="96"  y1="120" x2="162" y2="120" stroke="#333" marker-end="url(#arrow)"/>
  <text x="129" y="112" text-anchor="middle" font-size="11">1</text>
  <line x1="216" y1="120" x2="282" y2="120" stroke="#333" marker-end="url(#arrow)"/>
  <text x="249" y="112" text-anchor="middle" font-size="11">0</text>
  <line x1="336" y1="120" x2="402" y2="120" stroke="#333" marker-end="url(#arrow)"/>
  <text x="369" y="112" text-anchor="middle" font-size="11">1</text>
  <line x1="456" y1="120" x2="482" y2="120" stroke="#333" marker-end="url(#arrow)"/>
  <text x="469" y="112" text-anchor="middle" font-size="11">1</text>

  <!-- S0 self loop on 0 -->
  <path d="M55 98 q-22 -34 -2 -52 q22 -18 30 14" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="44" y="46" text-anchor="middle" font-size="11">0</text>

  <!-- S1 self loop on 1 -->
  <path d="M175 98 q-22 -34 -2 -52 q22 -18 30 14" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="164" y="46" text-anchor="middle" font-size="11">1</text>

  <!-- S10 back to S0 on 0 -->
  <path d="M290 142 q-110 56 -210 4" fill="none" stroke="#777" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="180" y="205" text-anchor="middle" font-size="11" fill="#777">0</text>

  <!-- S101 back to S10 on 0 -->
  <path d="M412 100 q-50 -34 -94 -2" fill="none" stroke="#777" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="365" y="74" text-anchor="middle" font-size="11" fill="#777">0</text>

  <!-- S1011 overlap: on 1 -> S101 ; on 0 -> S10 (drawn as note) -->
  <path d="M500 144 q-40 50 -180 -8" fill="none" stroke="#777" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="395" y="200" text-anchor="middle" font-size="11" fill="#777">0 (overlap)</text>

  <text x="20" y="232" font-size="10" fill="#555">Output y is a function of state only (Moore). Overlap reuses the "11" tail of 1011.</text>
</svg>
