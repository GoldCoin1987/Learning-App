<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300">
  <rect x="0" y="0" width="460" height="300" fill="white"/>
  <text x="230" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Open-Drain Wired-AND Bus with Pull-Up (e.g. I2C)</text>

  <!-- VDD rail -->
  <line x1="60" y1="60" x2="400" y2="60" stroke="black" stroke-width="2"/>
  <text x="230" y="52" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">VDD</text>

  <!-- pull-up resistor -->
  <line x1="230" y1="60" x2="230" y2="90" stroke="black" stroke-width="2"/>
  <rect x="222" y="90" width="16" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="244" y="114" font-family="sans-serif" font-size="11" fill="black">Rp</text>
  <line x1="230" y1="130" x2="230" y2="170" stroke="black" stroke-width="2"/>

  <!-- shared open-drain line (SDA/SCL) -->
  <line x1="80" y1="170" x2="400" y2="170" stroke="black" stroke-width="3"/>
  <text x="400" y="164" font-family="sans-serif" font-size="11" fill="black">SDA</text>

  <!-- node 1 NMOS pull-down -->
  <line x1="120" y1="170" x2="120" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="110" y1="200" x2="130" y2="200" stroke="black" stroke-width="2"/>
  <line x1="110" y1="220" x2="130" y2="220" stroke="black" stroke-width="2"/>
  <line x1="120" y1="220" x2="120" y2="250" stroke="black" stroke-width="1.5"/>
  <line x1="100" y1="200" x2="100" y2="220" stroke="black" stroke-width="2"/>
  <line x1="85" y1="210" x2="100" y2="210" stroke="black" stroke-width="1.5"/>
  <text x="80" y="214" font-family="sans-serif" font-size="10" text-anchor="end" fill="black">D1</text>
  <line x1="115" y1="250" x2="125" y2="250" stroke="black" stroke-width="2"/>
  <line x1="118" y1="255" x2="122" y2="255" stroke="black" stroke-width="2"/>
  <text x="120" y="275" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">device 1</text>

  <!-- node 2 NMOS pull-down -->
  <line x1="320" y1="170" x2="320" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="310" y1="200" x2="330" y2="200" stroke="black" stroke-width="2"/>
  <line x1="310" y1="220" x2="330" y2="220" stroke="black" stroke-width="2"/>
  <line x1="320" y1="220" x2="320" y2="250" stroke="black" stroke-width="1.5"/>
  <line x1="300" y1="200" x2="300" y2="220" stroke="black" stroke-width="2"/>
  <line x1="285" y1="210" x2="300" y2="210" stroke="black" stroke-width="1.5"/>
  <text x="280" y="214" font-family="sans-serif" font-size="10" text-anchor="end" fill="black">D2</text>
  <line x1="315" y1="250" x2="325" y2="250" stroke="black" stroke-width="2"/>
  <line x1="318" y1="255" x2="322" y2="255" stroke="black" stroke-width="2"/>
  <text x="320" y="275" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">device 2</text>

  <text x="230" y="296" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Any device pulling low wins (wired-AND); idle line floats HIGH via Rp.</text>
</svg>
