<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300">
  <rect x="0" y="0" width="560" height="300" fill="white"/>
  <text x="280" y="26" font-family="sans-serif" font-size="17" text-anchor="middle" fill="black">Software runs in order; hardware runs all at once</text>

  <!-- Software side -->
  <text x="150" y="58" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">SOFTWARE (a to-do list)</text>
  <rect x="70" y="72" width="160" height="30" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="92" font-family="monospace" font-size="12" text-anchor="middle">step 1: read a</text>
  <line x1="150" y1="102" x2="150" y2="118" stroke="black" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="70" y="120" width="160" height="30" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="140" font-family="monospace" font-size="12" text-anchor="middle">step 2: add b</text>
  <line x1="150" y1="150" x2="150" y2="166" stroke="black" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="70" y="168" width="160" height="30" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="188" font-family="monospace" font-size="12" text-anchor="middle">step 3: store y</text>
  <text x="150" y="222" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#444">one CPU does these one after another</text>

  <!-- divider -->
  <line x1="280" y1="50" x2="280" y2="240" stroke="#999" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Hardware side -->
  <text x="420" y="58" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">HARDWARE (a circuit)</text>
  <rect x="330" y="78" width="80" height="34" fill="none" stroke="black" stroke-width="2"/>
  <text x="370" y="100" font-family="monospace" font-size="12" text-anchor="middle">gate A</text>
  <rect x="430" y="78" width="80" height="34" fill="none" stroke="black" stroke-width="2"/>
  <text x="470" y="100" font-family="monospace" font-size="12" text-anchor="middle">gate B</text>
  <rect x="330" y="128" width="80" height="34" fill="none" stroke="black" stroke-width="2"/>
  <text x="370" y="150" font-family="monospace" font-size="12" text-anchor="middle">gate C</text>
  <rect x="430" y="128" width="80" height="34" fill="none" stroke="black" stroke-width="2"/>
  <text x="470" y="150" font-family="monospace" font-size="12" text-anchor="middle">gate D</text>
  <text x="420" y="200" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#070">all four are live and reacting</text>
  <text x="420" y="218" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#070">at the same instant (parallel)</text>

  <text x="280" y="268" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">HDL describes the circuit on the right, not the to-do list on the left.</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="black"/></marker>
  </defs>
</svg>
