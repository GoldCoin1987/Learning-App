<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280" font-family="sans-serif" font-size="13">
  <rect width="440" height="280" fill="#ffffff"/>
  <text x="220" y="24" text-anchor="middle" font-size="15" font-weight="bold">Full Adder: A + B + Cin</text>

  <!-- adder block -->
  <rect x="60" y="60" width="120" height="110" fill="#eef4ff" stroke="#333" stroke-width="1.5"/>
  <text x="120" y="118" text-anchor="middle" font-size="12" fill="#555">FULL</text>
  <text x="120" y="134" text-anchor="middle" font-size="12" fill="#555">ADDER</text>

  <!-- inputs -->
  <line x1="10" y1="80" x2="60" y2="80" stroke="#333"/>
  <text x="5" y="84" text-anchor="end">A</text>
  <line x1="10" y1="110" x2="60" y2="110" stroke="#333"/>
  <text x="5" y="114" text-anchor="end">B</text>
  <line x1="10" y1="150" x2="60" y2="150" stroke="#333"/>
  <text x="5" y="154" text-anchor="end">Cin</text>

  <!-- outputs -->
  <line x1="180" y1="95" x2="230" y2="95" stroke="#333"/>
  <text x="240" y="99">Sum</text>
  <line x1="180" y1="140" x2="230" y2="140" stroke="#333"/>
  <text x="240" y="144">Cout</text>

  <!-- truth table -->
  <text x="300" y="55" font-size="12" font-weight="bold">Truth table</text>
  <text x="300" y="75" font-family="monospace" font-size="12">A B Cin | S Cout</text>
  <text x="300" y="92" font-family="monospace" font-size="12">0 0  0  | 0  0</text>
  <text x="300" y="109" font-family="monospace" font-size="12">0 0  1  | 1  0</text>
  <text x="300" y="126" font-family="monospace" font-size="12">0 1  0  | 1  0</text>
  <text x="300" y="143" font-family="monospace" font-size="12">0 1  1  | 0  1</text>
  <text x="300" y="160" font-family="monospace" font-size="12">1 0  0  | 1  0</text>
  <text x="300" y="177" font-family="monospace" font-size="12">1 0  1  | 0  1</text>
  <text x="300" y="194" font-family="monospace" font-size="12">1 1  0  | 0  1</text>
  <text x="300" y="211" font-family="monospace" font-size="12">1 1  1  | 1  1</text>

  <text x="20" y="245" font-size="11" fill="#555">Sum = A XOR B XOR Cin</text>
  <text x="20" y="262" font-size="11" fill="#555">Cout = 1 when two or more inputs are 1 (majority)</text>
</svg>
