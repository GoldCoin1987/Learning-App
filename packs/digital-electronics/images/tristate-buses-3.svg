<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <rect x="0" y="0" width="480" height="300" fill="white"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">A Tri-State Buffer: the Enable Picks 0, 1, or Hi-Z</text>

  <!-- buffer triangle -->
  <polygon points="180,110 180,190 250,150" fill="white" stroke="black" stroke-width="2"/>
  <!-- input -->
  <line x1="120" y1="150" x2="180" y2="150" stroke="black" stroke-width="2"/>
  <text x="114" y="154" font-family="sans-serif" font-size="13" text-anchor="end" fill="black">input</text>
  <!-- output -->
  <line x1="250" y1="150" x2="320" y2="150" stroke="black" stroke-width="2"/>
  <text x="326" y="154" font-family="sans-serif" font-size="13" fill="black">output</text>
  <!-- enable -->
  <line x1="215" y1="220" x2="215" y2="172" stroke="black" stroke-width="2"/>
  <text x="215" y="240" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">enable (on / off)</text>

  <!-- truth-ish table -->
  <line x1="60" y1="262" x2="420" y2="262" stroke="black" stroke-width="1"/>
  <text x="70" y="280" font-family="sans-serif" font-size="12" fill="black">enable ON, input 0  ->  output 0</text>
  <text x="70" y="296" font-family="sans-serif" font-size="12" fill="black">enable ON, input 1  ->  output 1</text>
  <text x="250" y="280" font-family="sans-serif" font-size="12" fill="black">enable OFF  ->  Hi-Z</text>
  <text x="250" y="296" font-family="sans-serif" font-size="12" fill="black">(disconnected, lets go of wire)</text>
</svg>
