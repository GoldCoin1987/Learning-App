<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280">
  <rect x="0" y="0" width="480" height="280" fill="white"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Two Special Codes</text>
  <!-- BCD half -->
  <text x="120" y="56" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">BCD: 27</text>
  <rect x="40"  y="70" width="70" height="40" fill="none" stroke="black" stroke-width="2"/>
  <rect x="130" y="70" width="70" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="75"  y="96" font-family="monospace" font-size="15" text-anchor="middle" fill="black">0010</text>
  <text x="165" y="96" font-family="monospace" font-size="15" text-anchor="middle" fill="black">0111</text>
  <text x="75"  y="128" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">digit 2</text>
  <text x="165" y="128" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">digit 7</text>
  <text x="120" y="152" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">each decimal digit</text>
  <text x="120" y="166" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">in its own nibble</text>
  <!-- divider -->
  <line x1="240" y1="50" x2="240" y2="260" stroke="black" stroke-width="1"/>
  <!-- Gray half -->
  <text x="360" y="56" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Gray: one bit changes</text>
  <g font-family="monospace" font-size="14" text-anchor="middle" fill="black">
    <text x="360" y="84">000</text>
    <text x="360" y="104">001</text>
    <text x="360" y="124">011</text>
    <text x="360" y="144">010</text>
    <text x="360" y="164">110</text>
  </g>
  <!-- arrows -->
  <g stroke="black" stroke-width="1">
    <line x1="395" y1="80" x2="395" y2="98"/>
    <line x1="395" y1="100" x2="395" y2="118"/>
    <line x1="395" y1="120" x2="395" y2="138"/>
    <line x1="395" y1="140" x2="395" y2="158"/>
  </g>
  <text x="360" y="200" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">exactly 1 bit flips</text>
  <text x="360" y="214" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">each step down</text>
  <text x="240" y="246" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">BCD -&gt; displays/clocks   |   Gray -&gt; position sensors</text>
</svg>
