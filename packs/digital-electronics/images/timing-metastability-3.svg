<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260">
  <rect x="0" y="0" width="460" height="260" fill="white"/>
  <text x="230" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Propagation Delay: signals take time</text>

  <!-- gate box -->
  <rect x="180" y="150" width="90" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="225" y="180" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">logic gate</text>
  <line x1="120" y1="175" x2="180" y2="175" stroke="black" stroke-width="2"/>
  <line x1="270" y1="175" x2="340" y2="175" stroke="black" stroke-width="2"/>
  <text x="115" y="179" font-family="monospace" font-size="12" text-anchor="end" fill="black">in</text>
  <text x="345" y="179" font-family="monospace" font-size="12" fill="black">out</text>

  <!-- input waveform -->
  <text x="30" y="74" font-family="monospace" font-size="12" text-anchor="end" fill="black">in</text>
  <polyline points="40,90 150,90 150,55 420,55" fill="none" stroke="black" stroke-width="2"/>
  <line x1="150" y1="45" x2="150" y2="135" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="150" y="42" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">input changes</text>

  <!-- output waveform (delayed) -->
  <text x="30" y="124" font-family="monospace" font-size="12" text-anchor="end" fill="black">out</text>
  <polyline points="40,135 230,135 230,100 420,100" fill="none" stroke="black" stroke-width="2"/>
  <line x1="230" y1="95" x2="230" y2="145" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="230" y="92" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">output settles</text>

  <!-- delay arrow -->
  <line x1="150" y1="232" x2="230" y2="232" stroke="black" stroke-width="1"/>
  <line x1="150" y1="227" x2="150" y2="237" stroke="black" stroke-width="1"/>
  <line x1="230" y1="227" x2="230" y2="237" stroke="black" stroke-width="1"/>
  <text x="190" y="250" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">propagation delay t_pd</text>
</svg>
