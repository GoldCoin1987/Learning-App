<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280" font-family="sans-serif" font-size="13">
  <rect width="440" height="280" fill="#ffffff"/>
  <text x="220" y="24" text-anchor="middle" font-size="15" font-weight="bold">ALU (the CPU's calculator)</text>

  <!-- ALU shape: notched block -->
  <polygon points="120,60 230,60 270,120 270,150 230,210 120,210 160,135" fill="#eef4ff" stroke="#333" stroke-width="1.5"/>
  <text x="205" y="140" text-anchor="middle" font-size="13" fill="#555">ALU</text>

  <!-- operand inputs -->
  <line x1="50" y1="85" x2="135" y2="85" stroke="#333"/>
  <text x="44" y="89" text-anchor="end">A</text>
  <line x1="50" y1="185" x2="135" y2="185" stroke="#333"/>
  <text x="44" y="189" text-anchor="end">B</text>

  <!-- function select -->
  <line x1="195" y1="270" x2="195" y2="190" stroke="#333"/>
  <text x="195" y="283" text-anchor="middle" font-size="11">function select</text>
  <text x="285" y="245" font-size="11" fill="#555">(add, sub, AND, OR, XOR, shift)</text>

  <!-- result -->
  <line x1="270" y1="135" x2="350" y2="135" stroke="#333"/>
  <text x="360" y="139">Result</text>

  <!-- flags -->
  <line x1="245" y1="75" x2="350" y2="75" stroke="#333"/>
  <text x="360" y="79" font-size="11">Flags</text>
  <text x="290" y="105" font-size="11" fill="#555">Z  C  N  V</text>
  <text x="20" y="263" font-size="10" fill="#555">Z=zero  C=carry  N=negative  V=overflow</text>
</svg>
