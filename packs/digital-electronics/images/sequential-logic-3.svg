<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320">
  <rect x="0" y="0" width="520" height="320" fill="white"/>
  <text x="260" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">SR Latch: two gates feed each other (memory)</text>

  <!-- top NOR gate -->
  <rect x="200" y="60" width="110" height="55" fill="none" stroke="black" stroke-width="2"/>
  <text x="255" y="93" font-family="monospace" font-size="13" text-anchor="middle" fill="black">NOR</text>

  <!-- bottom NOR gate -->
  <rect x="200" y="200" width="110" height="55" fill="none" stroke="black" stroke-width="2"/>
  <text x="255" y="233" font-family="monospace" font-size="13" text-anchor="middle" fill="black">NOR</text>

  <!-- R input into top gate -->
  <text x="120" y="78" font-family="monospace" font-size="13" text-anchor="middle" fill="black">R (Reset)</text>
  <line x1="170" y1="75" x2="200" y2="75" stroke="black" stroke-width="2"/>

  <!-- S input into bottom gate -->
  <text x="120" y="245" font-family="monospace" font-size="13" text-anchor="middle" fill="black">S (Set)</text>
  <line x1="170" y1="240" x2="200" y2="240" stroke="black" stroke-width="2"/>

  <!-- Q output from top -->
  <line x1="310" y1="87" x2="400" y2="87" stroke="black" stroke-width="2"/>
  <text x="420" y="92" font-family="monospace" font-size="14" text-anchor="middle" fill="black">Q</text>

  <!-- Qbar output from bottom -->
  <line x1="310" y1="228" x2="400" y2="228" stroke="black" stroke-width="2"/>
  <text x="425" y="233" font-family="monospace" font-size="14" text-anchor="middle" fill="black">Q'</text>

  <!-- cross-coupling: top output down to bottom input -->
  <polyline points="355,87 355,150 175,150 175,225 200,225" fill="none" stroke="#d33" stroke-width="2"/>
  <!-- cross-coupling: bottom output up to top input -->
  <polyline points="375,228 375,165 185,165 185,105 200,105" fill="none" stroke="#d33" stroke-width="2"/>
  <text x="260" y="160" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#d33">feedback (the memory loop)</text>

  <text x="260" y="290" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">S=1 sets Q=1.  R=1 resets Q=0.  S=R=0 HOLDS.  S=R=1 is forbidden.</text>
  <text x="260" y="308" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Each gate's output feeds the other's input, so the latch remembers its last value.</text>
</svg>
