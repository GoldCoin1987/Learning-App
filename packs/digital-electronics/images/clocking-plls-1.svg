<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260">
  <rect x="0" y="0" width="560" height="260" fill="white"/>
  <text x="280" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Charge-Pump PLL Frequency Synthesizer</text>

  <!-- reference input -->
  <text x="20" y="118" font-family="monospace" font-size="12" fill="black">f_ref</text>
  <line x1="55" y1="125" x2="90" y2="125" stroke="black" stroke-width="2"/>
  <polygon points="90,121 98,125 90,129" fill="black"/>

  <!-- PFD -->
  <rect x="100" y="100" width="70" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="135" y="122" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">PFD</text>
  <text x="135" y="138" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">phase det.</text>

  <!-- Charge pump -->
  <line x1="170" y1="125" x2="195" y2="125" stroke="black" stroke-width="2"/>
  <rect x="195" y="100" width="65" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="227" y="122" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Charge</text>
  <text x="227" y="136" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">pump</text>

  <!-- Loop filter -->
  <line x1="260" y1="125" x2="285" y2="125" stroke="black" stroke-width="2"/>
  <rect x="285" y="100" width="70" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="320" y="120" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Loop</text>
  <text x="320" y="134" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">filter (LPF)</text>

  <!-- VCO -->
  <line x1="355" y1="125" x2="380" y2="125" stroke="black" stroke-width="2"/>
  <rect x="380" y="100" width="65" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="412" y="129" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">VCO</text>

  <!-- output -->
  <line x1="445" y1="125" x2="520" y2="125" stroke="black" stroke-width="2"/>
  <polygon points="520,121 528,125 520,129" fill="black"/>
  <text x="500" y="116" font-family="monospace" font-size="12" text-anchor="middle" fill="black">f_out</text>

  <!-- feedback tap -->
  <line x1="478" y1="125" x2="478" y2="210" stroke="black" stroke-width="2"/>
  <line x1="478" y1="210" x2="300" y2="210" stroke="black" stroke-width="2"/>

  <!-- divider /N -->
  <rect x="245" y="190" width="55" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="272" y="215" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">/ N</text>
  <line x1="245" y1="210" x2="135" y2="210" stroke="black" stroke-width="2"/>
  <line x1="135" y1="210" x2="135" y2="150" stroke="black" stroke-width="2"/>
  <polygon points="131,150 135,142 139,150" fill="black"/>

  <text x="280" y="252" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">In lock: f_out = N x f_ref  (with an optional /M on the reference, f_out = (N/M) f_ref)</text>
</svg>
