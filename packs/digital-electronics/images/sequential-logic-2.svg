<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200">
  <rect x="0" y="0" width="520" height="200" fill="white"/>
  <text x="260" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">4-Bit SISO Shift Register (shifts on each rising CLK edge)</text>

  <!-- serial in -->
  <text x="35" y="100" font-family="monospace" font-size="12" text-anchor="middle" fill="black">SIN</text>
  <line x1="55" y1="95" x2="90" y2="95" stroke="black" stroke-width="2"/>

  <!-- four DFFs -->
  <g font-family="monospace" font-size="13" text-anchor="middle">
    <rect x="90"  y="70" width="70" height="55" fill="none" stroke="black" stroke-width="2"/>
    <text x="125" y="92" fill="black">D  Q</text>
    <text x="125" y="115" fill="black">FF0</text>

    <rect x="200" y="70" width="70" height="55" fill="none" stroke="black" stroke-width="2"/>
    <text x="235" y="92" fill="black">D  Q</text>
    <text x="235" y="115" fill="black">FF1</text>

    <rect x="310" y="70" width="70" height="55" fill="none" stroke="black" stroke-width="2"/>
    <text x="345" y="92" fill="black">D  Q</text>
    <text x="345" y="115" fill="black">FF2</text>

    <rect x="420" y="70" width="70" height="55" fill="none" stroke="black" stroke-width="2"/>
    <text x="455" y="92" fill="black">D  Q</text>
    <text x="455" y="115" fill="black">FF3</text>
  </g>

  <!-- interconnects Q->D -->
  <line x1="160" y1="95" x2="200" y2="95" stroke="black" stroke-width="2"/>
  <line x1="270" y1="95" x2="310" y2="95" stroke="black" stroke-width="2"/>
  <line x1="380" y1="95" x2="420" y2="95" stroke="black" stroke-width="2"/>
  <line x1="490" y1="95" x2="510" y2="95" stroke="black" stroke-width="2"/>
  <text x="505" y="88" font-family="monospace" font-size="12" text-anchor="end" fill="black">SOUT</text>

  <!-- shared clock -->
  <line x1="125" y1="125" x2="125" y2="165" stroke="black" stroke-width="2"/>
  <line x1="235" y1="125" x2="235" y2="165" stroke="black" stroke-width="2"/>
  <line x1="345" y1="125" x2="345" y2="165" stroke="black" stroke-width="2"/>
  <line x1="455" y1="125" x2="455" y2="165" stroke="black" stroke-width="2"/>
  <line x1="70"  y1="165" x2="455" y2="165" stroke="black" stroke-width="2"/>
  <text x="55" y="170" font-family="monospace" font-size="12" text-anchor="end" fill="black">CLK</text>

  <text x="260" y="192" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Data advances one stage per clock; after 4 clocks SIN reaches SOUT (delay line).</text>
</svg>
