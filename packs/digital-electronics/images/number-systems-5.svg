<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 230">
  <rect x="0" y="0" width="460" height="230" fill="white"/>
  <text x="230" y="28" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">A Byte = 8 Bits</text>
  <!-- 8 boxes -->
  <g font-family="monospace" font-size="18" text-anchor="middle">
    <rect x="40"  y="60" width="45" height="50" fill="none" stroke="black" stroke-width="2"/>
    <rect x="85"  y="60" width="45" height="50" fill="none" stroke="black" stroke-width="2"/>
    <rect x="130" y="60" width="45" height="50" fill="none" stroke="black" stroke-width="2"/>
    <rect x="175" y="60" width="45" height="50" fill="none" stroke="black" stroke-width="2"/>
    <rect x="240" y="60" width="45" height="50" fill="none" stroke="black" stroke-width="2"/>
    <rect x="285" y="60" width="45" height="50" fill="none" stroke="black" stroke-width="2"/>
    <rect x="330" y="60" width="45" height="50" fill="none" stroke="black" stroke-width="2"/>
    <rect x="375" y="60" width="45" height="50" fill="none" stroke="black" stroke-width="2"/>
    <text x="62"  y="92" fill="black">1</text>
    <text x="107" y="92" fill="black">0</text>
    <text x="152" y="92" fill="black">1</text>
    <text x="197" y="92" fill="black">1</text>
    <text x="262" y="92" fill="black">0</text>
    <text x="307" y="92" fill="black">1</text>
    <text x="352" y="92" fill="black">1</text>
    <text x="397" y="92" fill="black">0</text>
  </g>
  <!-- nibble braces -->
  <text x="130" y="140" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">nibble (4 bits)</text>
  <text x="330" y="140" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">nibble (4 bits)</text>
  <line x1="40" y1="120" x2="220" y2="120" stroke="black" stroke-width="1"/>
  <line x1="240" y1="120" x2="420" y2="120" stroke="black" stroke-width="1"/>
  <text x="230" y="178" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">1 bit = one 0 or 1   |   4 bits = 1 nibble</text>
  <text x="230" y="200" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">8 bits = 1 byte   |   a word = the chip's native size</text>
  <text x="230" y="222" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">(often 16, 32, or 64 bits)</text>
</svg>
