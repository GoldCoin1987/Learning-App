<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" width="420" height="300">
  <rect x="0" y="0" width="420" height="300" fill="#ffffff"/>
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- TOP: NAND = bubbled-OR (De Morgan) -->
    <!-- NAND body (AND shape) -->
    <path d="M 60 50 L 100 50 A 30 30 0 0 1 100 110 L 60 110 Z"/>
    <circle cx="138" cy="80" r="6"/>
    <line x1="30" y1="62" x2="60" y2="62"/>
    <line x1="30" y1="98" x2="60" y2="98"/>
    <line x1="144" y1="80" x2="180" y2="80"/>
    <!-- equivalent OR with bubbled inputs -->
    <circle cx="266" cy="62" r="6"/>
    <circle cx="266" cy="98" r="6"/>
    <line x1="240" y1="62" x2="260" y2="62"/>
    <line x1="240" y1="98" x2="260" y2="98"/>
    <path d="M 272 45 Q 312 45 340 80 Q 312 115 272 115 Q 290 80 272 45 Z"/>
    <line x1="340" y1="80" x2="380" y2="80"/>
    <!-- BOTTOM: NOR = bubbled-AND -->
    <!-- NOR body (OR shape) -->
    <path d="M 60 190 Q 100 190 128 225 Q 100 260 60 260 Q 78 225 60 190 Z"/>
    <circle cx="134" cy="225" r="6"/>
    <line x1="30" y1="207" x2="68" y2="207"/>
    <line x1="30" y1="243" x2="68" y2="243"/>
    <line x1="140" y1="225" x2="180" y2="225"/>
    <!-- equivalent AND with bubbled inputs -->
    <circle cx="266" cy="207" r="6"/>
    <circle cx="266" cy="243" r="6"/>
    <line x1="240" y1="207" x2="260" y2="207"/>
    <line x1="240" y1="243" x2="260" y2="243"/>
    <path d="M 272 195 L 312 195 A 30 30 0 0 1 312 255 L 272 255 Z"/>
    <line x1="352" y1="225" x2="390" y2="225"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="15">
    <text x="205" y="86">=</text>
    <text x="205" y="231">=</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="40" y="35">NAND</text>
    <text x="285" y="35">OR with inverted inputs</text>
    <text x="40" y="180">NOR</text>
    <text x="285" y="180">AND with inverted inputs</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="14">
    <text x="55" y="290">De Morgan: (A.B)' = A' + B'   and   (A + B)' = A'.B'</text>
  </g>
</svg>
