<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300">
  <rect x="0" y="0" width="460" height="300" fill="white"/>
  <text x="230" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Setup/Hold Window Around a Clock Edge</text>

  <!-- Clock waveform -->
  <text x="30" y="74" font-family="sans-serif" font-size="13" text-anchor="end" fill="black">CLK</text>
  <polyline points="40,90 200,90 200,55 230,55 230,90 420,90"
            fill="none" stroke="black" stroke-width="2"/>
  <!-- rising edge marker -->
  <line x1="200" y1="40" x2="200" y2="200" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="200" y="36" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">active edge</text>

  <!-- Setup/hold window shading -->
  <rect x="150" y="120" width="50" height="80" fill="#cccccc" opacity="0.5"/>
  <rect x="200" y="120" width="35" height="80" fill="#999999" opacity="0.5"/>

  <!-- Data waveform: must be stable across the window -->
  <text x="30" y="164" font-family="sans-serif" font-size="13" text-anchor="end" fill="black">D</text>
  <polyline points="40,180 110,180 130,140 150,140 150,140 235,140 255,180 420,180"
            fill="none" stroke="black" stroke-width="2"/>
  <text x="175" y="216" font-family="monospace" font-size="11" text-anchor="middle" fill="black">stable region</text>

  <!-- setup arrow -->
  <line x1="150" y1="232" x2="200" y2="232" stroke="black" stroke-width="1"/>
  <line x1="150" y1="227" x2="150" y2="237" stroke="black" stroke-width="1"/>
  <line x1="200" y1="227" x2="200" y2="237" stroke="black" stroke-width="1"/>
  <text x="175" y="250" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">t_su</text>

  <!-- hold arrow -->
  <line x1="200" y1="232" x2="235" y2="232" stroke="black" stroke-width="1"/>
  <line x1="235" y1="227" x2="235" y2="237" stroke="black" stroke-width="1"/>
  <text x="217" y="250" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">t_h</text>

  <text x="230" y="282" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">D must not change inside the t_su + t_h window or the FF may go metastable</text>
</svg>
