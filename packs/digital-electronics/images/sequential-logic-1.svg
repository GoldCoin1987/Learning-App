<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <rect x="0" y="0" width="480" height="300" fill="white"/>
  <text x="240" y="22" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Positive-Edge-Triggered D Flip-Flop Timing</text>

  <!-- row labels -->
  <text x="30" y="68" font-family="monospace" font-size="14" text-anchor="middle" fill="black">CLK</text>
  <text x="30" y="148" font-family="monospace" font-size="14" text-anchor="middle" fill="black">D</text>
  <text x="30" y="228" font-family="monospace" font-size="14" text-anchor="middle" fill="black">Q</text>

  <!-- baselines -->
  <line x1="60" y1="80" x2="460" y2="80" stroke="#ccc" stroke-width="1"/>
  <line x1="60" y1="160" x2="460" y2="160" stroke="#ccc" stroke-width="1"/>
  <line x1="60" y1="240" x2="460" y2="240" stroke="#ccc" stroke-width="1"/>

  <!-- CLK: two periods, rising edges at x=120 and x=320 -->
  <polyline points="60,80 120,80 120,40 220,40 220,80 320,80 320,40 420,40 420,80 460,80"
            fill="none" stroke="black" stroke-width="2"/>

  <!-- D: goes high at x=90, low at x=380 -->
  <polyline points="60,160 90,160 90,120 380,120 380,160 460,160"
            fill="none" stroke="black" stroke-width="2"/>

  <!-- Q: samples D only on rising edges. Q=0 until edge at 120, then 1; stays 1 (D still 1 at edge 320) -->
  <polyline points="60,240 120,240 120,200 460,200"
            fill="none" stroke="black" stroke-width="2"/>

  <!-- rising-edge markers -->
  <line x1="120" y1="36" x2="120" y2="244" stroke="#d33" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="320" y1="36" x2="320" y2="244" stroke="#d33" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="280" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#d33">edge: Q<-D=1</text>
  <text x="320" y="280" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#d33">edge: Q<-D=1</text>

  <text x="240" y="296" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Q changes only at the rising edge (t_cq later); D between edges is ignored.</text>
</svg>
