<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240">
  <rect x="0" y="0" width="480" height="240" fill="white"/>
  <text x="240" y="28" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Binary Place Values: reading 1011</text>
  <!-- place-value headers -->
  <rect x="60"  y="50" width="90" height="40" fill="none" stroke="black" stroke-width="2"/>
  <rect x="150" y="50" width="90" height="40" fill="none" stroke="black" stroke-width="2"/>
  <rect x="240" y="50" width="90" height="40" fill="none" stroke="black" stroke-width="2"/>
  <rect x="330" y="50" width="90" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="105" y="76" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">8</text>
  <text x="195" y="76" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">4</text>
  <text x="285" y="76" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">2</text>
  <text x="375" y="76" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">1</text>
  <!-- the bits -->
  <rect x="60"  y="95" width="90" height="40" fill="none" stroke="black" stroke-width="2"/>
  <rect x="150" y="95" width="90" height="40" fill="none" stroke="black" stroke-width="2"/>
  <rect x="240" y="95" width="90" height="40" fill="none" stroke="black" stroke-width="2"/>
  <rect x="330" y="95" width="90" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="105" y="123" font-family="monospace" font-size="18" text-anchor="middle" fill="black">1</text>
  <text x="195" y="123" font-family="monospace" font-size="18" text-anchor="middle" fill="black">0</text>
  <text x="285" y="123" font-family="monospace" font-size="18" text-anchor="middle" fill="black">1</text>
  <text x="375" y="123" font-family="monospace" font-size="18" text-anchor="middle" fill="black">1</text>
  <!-- contributions -->
  <text x="105" y="165" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">8</text>
  <text x="195" y="165" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">0</text>
  <text x="285" y="165" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">2</text>
  <text x="375" y="165" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">1</text>
  <text x="240" y="200" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">add the ON columns: 8 + 0 + 2 + 1 = 11</text>
  <text x="240" y="226" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">each place is double the one to its right</text>
</svg>
