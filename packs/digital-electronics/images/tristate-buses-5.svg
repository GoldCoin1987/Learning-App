<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect x="0" y="0" width="480" height="320" fill="white"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Shared Parallel Bus  vs  Point-to-Point Serial Link</text>

  <!-- LEFT: parallel bus -->
  <text x="120" y="56" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Old: many wires shared</text>
  <rect x="30" y="70" width="60" height="40" fill="white" stroke="black" stroke-width="2"/>
  <text x="60" y="95" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">chip A</text>
  <rect x="150" y="70" width="60" height="40" fill="white" stroke="black" stroke-width="2"/>
  <text x="180" y="95" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">chip B</text>

  <!-- 8 parallel lines -->
  <line x1="40" y1="140" x2="220" y2="140" stroke="black" stroke-width="1.5"/>
  <line x1="40" y1="152" x2="220" y2="152" stroke="black" stroke-width="1.5"/>
  <line x1="40" y1="164" x2="220" y2="164" stroke="black" stroke-width="1.5"/>
  <line x1="40" y1="176" x2="220" y2="176" stroke="black" stroke-width="1.5"/>
  <line x1="40" y1="188" x2="220" y2="188" stroke="black" stroke-width="1.5"/>
  <line x1="40" y1="200" x2="220" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="40" y1="212" x2="220" y2="212" stroke="black" stroke-width="1.5"/>
  <line x1="40" y1="224" x2="220" y2="224" stroke="black" stroke-width="1.5"/>
  <line x1="60" y1="110" x2="60" y2="140" stroke="black" stroke-width="1.5"/>
  <line x1="180" y1="110" x2="180" y2="140" stroke="black" stroke-width="1.5"/>
  <text x="120" y="250" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">8 bits side by side</text>
  <text x="120" y="270" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">bits drift apart (skew),</text>
  <text x="120" y="284" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">slow at high speed</text>

  <!-- divider -->
  <line x1="245" y1="50" x2="245" y2="290" stroke="black" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- RIGHT: serial link -->
  <text x="365" y="56" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">New: one fast private link</text>
  <rect x="280" y="120" width="60" height="40" fill="white" stroke="black" stroke-width="2"/>
  <text x="310" y="145" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">chip A</text>
  <rect x="400" y="120" width="60" height="40" fill="white" stroke="black" stroke-width="2"/>
  <text x="430" y="145" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">chip B</text>
  <line x1="340" y1="140" x2="400" y2="140" stroke="black" stroke-width="2"/>
  <text x="370" y="132" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">1 bit at a time</text>
  <text x="370" y="190" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">bits sent in a row,</text>
  <text x="370" y="204" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">very fast (e.g. SPI)</text>
</svg>
