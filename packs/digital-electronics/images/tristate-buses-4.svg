<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect x="0" y="0" width="480" height="320" fill="white"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">A CPU's Three Buses: Address, Data, Control</text>

  <!-- CPU box -->
  <rect x="30" y="120" width="90" height="120" fill="white" stroke="black" stroke-width="2"/>
  <text x="75" y="185" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">CPU</text>

  <!-- Memory box -->
  <rect x="360" y="80" width="90" height="80" fill="white" stroke="black" stroke-width="2"/>
  <text x="405" y="125" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Memory</text>

  <!-- Peripheral box -->
  <rect x="360" y="200" width="90" height="80" fill="white" stroke="black" stroke-width="2"/>
  <text x="405" y="245" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">I/O device</text>

  <!-- address bus (one way) -->
  <line x1="120" y1="150" x2="350" y2="150" stroke="black" stroke-width="2"/>
  <polygon points="350,150 340,145 340,155" fill="black"/>
  <text x="235" y="143" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">address bus  (which location?)</text>

  <!-- data bus (two way, tri-state) -->
  <line x1="120" y1="185" x2="350" y2="185" stroke="black" stroke-width="3"/>
  <polygon points="350,185 340,180 340,190" fill="black"/>
  <polygon points="120,185 130,180 130,190" fill="black"/>
  <text x="235" y="178" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">data bus  (the value, both directions)</text>

  <!-- control bus -->
  <line x1="120" y1="220" x2="350" y2="220" stroke="black" stroke-width="2"/>
  <polygon points="350,220 340,215 340,225" fill="black"/>
  <text x="235" y="213" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">control bus  (read? write? who talks?)</text>

  <!-- branches up to memory and down to io for data bus -->
  <line x1="340" y1="185" x2="340" y2="160" stroke="black" stroke-width="1.5"/>
  <line x1="340" y1="185" x2="340" y2="200" stroke="black" stroke-width="1.5"/>

  <text x="240" y="305" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Only one device drives the data bus at a time; the rest stay Hi-Z.</text>
</svg>
