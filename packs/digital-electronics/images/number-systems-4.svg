<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300">
  <rect x="0" y="0" width="360" height="300" fill="white"/>
  <text x="180" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Decimal / Binary / Hex</text>
  <!-- header row -->
  <line x1="30" y1="40" x2="330" y2="40" stroke="black" stroke-width="2"/>
  <text x="80"  y="58" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Decimal</text>
  <text x="180" y="58" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Binary</text>
  <text x="290" y="58" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Hex</text>
  <line x1="30" y1="66" x2="330" y2="66" stroke="black" stroke-width="2"/>
  <line x1="130" y1="40" x2="130" y2="290" stroke="black" stroke-width="1"/>
  <line x1="240" y1="40" x2="240" y2="290" stroke="black" stroke-width="1"/>
  <!-- rows -->
  <text x="80"  y="88"  font-family="monospace" font-size="13" text-anchor="middle" fill="black">0</text>
  <text x="180" y="88"  font-family="monospace" font-size="13" text-anchor="middle" fill="black">0000</text>
  <text x="290" y="88"  font-family="monospace" font-size="13" text-anchor="middle" fill="black">0</text>
  <text x="80"  y="110" font-family="monospace" font-size="13" text-anchor="middle" fill="black">5</text>
  <text x="180" y="110" font-family="monospace" font-size="13" text-anchor="middle" fill="black">0101</text>
  <text x="290" y="110" font-family="monospace" font-size="13" text-anchor="middle" fill="black">5</text>
  <text x="80"  y="132" font-family="monospace" font-size="13" text-anchor="middle" fill="black">9</text>
  <text x="180" y="132" font-family="monospace" font-size="13" text-anchor="middle" fill="black">1001</text>
  <text x="290" y="132" font-family="monospace" font-size="13" text-anchor="middle" fill="black">9</text>
  <text x="80"  y="154" font-family="monospace" font-size="13" text-anchor="middle" fill="black">10</text>
  <text x="180" y="154" font-family="monospace" font-size="13" text-anchor="middle" fill="black">1010</text>
  <text x="290" y="154" font-family="monospace" font-size="13" text-anchor="middle" fill="black">A</text>
  <text x="80"  y="176" font-family="monospace" font-size="13" text-anchor="middle" fill="black">11</text>
  <text x="180" y="176" font-family="monospace" font-size="13" text-anchor="middle" fill="black">1011</text>
  <text x="290" y="176" font-family="monospace" font-size="13" text-anchor="middle" fill="black">B</text>
  <text x="80"  y="198" font-family="monospace" font-size="13" text-anchor="middle" fill="black">12</text>
  <text x="180" y="198" font-family="monospace" font-size="13" text-anchor="middle" fill="black">1100</text>
  <text x="290" y="198" font-family="monospace" font-size="13" text-anchor="middle" fill="black">C</text>
  <text x="80"  y="220" font-family="monospace" font-size="13" text-anchor="middle" fill="black">15</text>
  <text x="180" y="220" font-family="monospace" font-size="13" text-anchor="middle" fill="black">1111</text>
  <text x="290" y="220" font-family="monospace" font-size="13" text-anchor="middle" fill="black">F</text>
  <line x1="30" y1="234" x2="330" y2="234" stroke="black" stroke-width="1"/>
  <text x="180" y="256" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">one hex digit = exactly 4 bits</text>
  <text x="180" y="278" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A-F stand for 10-15</text>
</svg>
