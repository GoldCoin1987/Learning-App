<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 240">
  <rect x="0" y="0" width="520" height="240" fill="white"/>
  <text x="260" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">3-Bit Up Counter: one step per clock tick</text>

  <!-- clock ticks row -->
  <text x="40" y="70" font-family="monospace" font-size="12" text-anchor="middle" fill="black">tick</text>
  <text x="40" y="120" font-family="monospace" font-size="12" text-anchor="middle" fill="black">count</text>
  <text x="40" y="160" font-family="monospace" font-size="12" text-anchor="middle" fill="black">binary</text>

  <!-- columns -->
  <g font-family="monospace" font-size="14" text-anchor="middle" fill="black">
    <text x="110" y="70">0</text><text x="160" y="70">1</text><text x="210" y="70">2</text>
    <text x="260" y="70">3</text><text x="310" y="70">4</text><text x="360" y="70">5</text>
    <text x="410" y="70">6</text><text x="460" y="70">7</text>

    <text x="110" y="120">0</text><text x="160" y="120">1</text><text x="210" y="120">2</text>
    <text x="260" y="120">3</text><text x="310" y="120">4</text><text x="360" y="120">5</text>
    <text x="410" y="120">6</text><text x="460" y="120">7</text>

    <text x="110" y="160">000</text><text x="160" y="160">001</text><text x="210" y="160">010</text>
    <text x="260" y="160">011</text><text x="310" y="160">100</text><text x="360" y="160">101</text>
    <text x="410" y="160">110</text><text x="460" y="160">111</text>
  </g>

  <!-- arrows between counts -->
  <g stroke="#d33" stroke-width="2" fill="none">
    <line x1="124" y1="115" x2="146" y2="115"/><line x1="174" y1="115" x2="196" y2="115"/>
    <line x1="224" y1="115" x2="246" y2="115"/><line x1="274" y1="115" x2="296" y2="115"/>
    <line x1="324" y1="115" x2="346" y2="115"/><line x1="374" y1="115" x2="396" y2="115"/>
    <line x1="424" y1="115" x2="446" y2="115"/>
  </g>

  <!-- wrap arrow -->
  <polyline points="460,175 460,205 110,205 110,175" fill="none" stroke="#d33" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="285" y="222" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#d33">after 7 it wraps back to 0 (a mod-8 counter)</text>
</svg>
