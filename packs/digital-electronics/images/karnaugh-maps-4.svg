<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect x="0" y="0" width="480" height="320" fill="white"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">A 3-Variable K-Map (a 2x4 grid)</text>
  <text x="240" y="44" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">columns = BC in Gray-code order, rows = A; 8 cells = 8 minterms</text>

  <!-- axis labels -->
  <text x="270" y="76" font-family="monospace" font-size="13" text-anchor="middle" fill="black">BC</text>
  <text x="90" y="160" font-family="monospace" font-size="13" text-anchor="middle" fill="black">A</text>

  <!-- column Gray labels: 00 01 11 10 (one bit changes each step, incl wrap) -->
  <text x="170" y="94" font-family="monospace" font-size="13" text-anchor="middle">00</text>
  <text x="240" y="94" font-family="monospace" font-size="13" text-anchor="middle">01</text>
  <text x="310" y="94" font-family="monospace" font-size="13" text-anchor="middle">11</text>
  <text x="380" y="94" font-family="monospace" font-size="13" text-anchor="middle">10</text>

  <!-- row labels 0 1 -->
  <text x="120" y="135" font-family="monospace" font-size="13" text-anchor="middle">0</text>
  <text x="120" y="185" font-family="monospace" font-size="13" text-anchor="middle">1</text>

  <!-- grid: top-left (135,110), 70x50, 2 rows x 4 cols -->
  <!-- row A=0: m0 m1 m3 m2 -->
  <rect x="135" y="110" width="70" height="50" fill="white" stroke="black"/>
  <rect x="205" y="110" width="70" height="50" fill="white" stroke="black"/>
  <rect x="275" y="110" width="70" height="50" fill="white" stroke="black"/>
  <rect x="345" y="110" width="70" height="50" fill="white" stroke="black"/>
  <text x="170" y="140" font-family="monospace" font-size="13" text-anchor="middle">m0</text>
  <text x="240" y="140" font-family="monospace" font-size="13" text-anchor="middle">m1</text>
  <text x="310" y="140" font-family="monospace" font-size="13" text-anchor="middle">m3</text>
  <text x="380" y="140" font-family="monospace" font-size="13" text-anchor="middle">m2</text>

  <!-- row A=1: m4 m5 m7 m6 -->
  <rect x="135" y="160" width="70" height="50" fill="white" stroke="black"/>
  <rect x="205" y="160" width="70" height="50" fill="white" stroke="black"/>
  <rect x="275" y="160" width="70" height="50" fill="white" stroke="black"/>
  <rect x="345" y="160" width="70" height="50" fill="white" stroke="black"/>
  <text x="170" y="190" font-family="monospace" font-size="13" text-anchor="middle">m4</text>
  <text x="240" y="190" font-family="monospace" font-size="13" text-anchor="middle">m5</text>
  <text x="310" y="190" font-family="monospace" font-size="13" text-anchor="middle">m7</text>
  <text x="380" y="190" font-family="monospace" font-size="13" text-anchor="middle">m6</text>

  <text x="240" y="238" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Columns go 00, 01, 11, 10 (NOT 00,01,10,11) so neighbours always</text>
  <text x="240" y="256" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">differ in one bit. The left and right edges also wrap around (m0 next to m2).</text>
  <text x="240" y="286" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1f7a1f">Adjacent on the grid = one variable apart = can be merged.</text>
</svg>
