<svg xmlns="http://www.w3.org/2000/svg" width="420" height="240" viewBox="0 0 420 240" font-family="sans-serif" font-size="13">
  <rect width="420" height="240" fill="#ffffff"/>
  <text x="210" y="22" text-anchor="middle" font-size="15" font-weight="bold">Full Adder (1-bit)</text>

  <!-- XOR1 -->
  <path d="M60 60 q20 20 0 40 q25 -5 40 -20 q-25 -15 -40 -20 z" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="40" y="70" text-anchor="end">A</text>
  <text x="40" y="98" text-anchor="end">B</text>
  <line x1="42" y1="68" x2="62" y2="68" stroke="#333"/>
  <line x1="42" y1="92" x2="62" y2="92" stroke="#333"/>
  <text x="78" y="84" font-size="11">XOR</text>

  <!-- XOR2 -->
  <path d="M180 70 q20 20 0 40 q25 -5 40 -20 q-25 -15 -40 -20 z" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="80" x2="182" y2="80" stroke="#333"/>
  <line x1="140" y1="150" x2="140" y2="102" stroke="#333"/>
  <line x1="140" y1="102" x2="182" y2="102" stroke="#333"/>
  <text x="120" y="165" text-anchor="middle">Cin</text>
  <line x1="120" y1="150" x2="140" y2="150" stroke="#333"/>
  <text x="198" y="94" font-size="11">XOR</text>
  <line x1="220" y1="90" x2="300" y2="90" stroke="#333"/>
  <text x="312" y="94">Sum</text>

  <!-- AND gates + OR for carry -->
  <path d="M180 150 h22 a22 22 0 0 1 0 44 h-22 z" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="190" y="176" font-size="10">AND</text>
  <line x1="150" y1="158" x2="180" y2="158" stroke="#333"/>
  <line x1="150" y1="186" x2="180" y2="186" stroke="#333"/>

  <path d="M255 130 q18 16 0 32 q24 -4 36 -16 q-24 -12 -36 -16 z" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="252" y="150" font-size="10">OR</text>
  <line x1="224" y1="172" x2="255" y2="140" stroke="#333"/>
  <line x1="240" y1="138" x2="255" y2="138" stroke="#333"/>
  <line x1="290" y1="146" x2="320" y2="146" stroke="#333"/>
  <text x="332" y="150">Cout</text>

  <text x="60" y="225" font-size="11" fill="#555">Sum = A⊕B⊕Cin   Cout = AB + Cin(A⊕B)</text>
</svg>
