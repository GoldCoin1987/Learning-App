<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240">
  <rect x="0" y="0" width="460" height="240" fill="white"/>
  <text x="230" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">A Logic Cell: LUT + Flip-Flop</text>

  <!-- LUT -->
  <rect x="60" y="70" width="120" height="90" fill="#e6e6e6" stroke="black" stroke-width="1.5"/>
  <text x="120" y="108" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">k-input LUT</text>
  <text x="120" y="126" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(SRAM truth table)</text>

  <!-- LUT inputs -->
  <g stroke="black" stroke-width="1.5">
    <line x1="20" y1="85" x2="60" y2="85"/>
    <line x1="20" y1="105" x2="60" y2="105"/>
    <line x1="20" y1="125" x2="60" y2="125"/>
    <line x1="20" y1="145" x2="60" y2="145"/>
  </g>
  <text x="14" y="119" font-family="sans-serif" font-size="11" text-anchor="end" fill="black">inputs</text>

  <!-- LUT output to mux/FF -->
  <line x1="180" y1="115" x2="230" y2="115" stroke="black" stroke-width="1.5"/>

  <!-- Flip-flop -->
  <rect x="230" y="80" width="90" height="70" fill="#e6e6e6" stroke="black" stroke-width="1.5"/>
  <text x="275" y="112" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">D  FF  Q</text>
  <!-- clock triangle -->
  <polyline points="230,135 240,140 230,145" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="275" y1="150" x2="275" y2="175" stroke="black" stroke-width="1.5"/>
  <text x="275" y="190" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">clk</text>

  <!-- Output mux: registered vs combinational -->
  <line x1="320" y1="115" x2="360" y2="115" stroke="black" stroke-width="1.5"/>
  <line x1="180" y1="115" x2="180" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="180" y1="200" x2="350" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="350" y1="200" x2="350" y2="125" stroke="black" stroke-width="1.5"/>
  <rect x="360" y="100" width="20" height="30" fill="#cfe8cf" stroke="black" stroke-width="1.5"/>
  <text x="370" y="120" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">mux</text>
  <line x1="380" y1="115" x2="430" y2="115" stroke="black" stroke-width="1.5"/>
  <text x="424" y="108" font-family="sans-serif" font-size="11" text-anchor="end" fill="black">out</text>

  <text x="230" y="228" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">LUT computes any function of its inputs; the FF optionally registers it. Thousands of these = the fabric.</text>
</svg>
