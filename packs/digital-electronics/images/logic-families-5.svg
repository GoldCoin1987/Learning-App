<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 340">
  <rect x="0" y="0" width="460" height="340" fill="white"/>
  <text x="230" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Open-drain bus with one pull-up (wired-AND)</text>
  <text x="230" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Each chip can only pull the line LOW or let go (release)</text>

  <!-- supply and pull-up resistor -->
  <line x1="40" y1="80" x2="40" y2="100" stroke="black" stroke-width="2"/>
  <text x="20" y="84" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">+V</text>
  <rect x="30" y="100" width="20" height="45" fill="none" stroke="black" stroke-width="2"/>
  <text x="58" y="127" font-family="sans-serif" font-size="11" text-anchor="start" fill="black">pull-up R</text>
  <line x1="40" y1="145" x2="40" y2="175" stroke="black" stroke-width="2"/>

  <!-- shared bus line -->
  <line x1="40" y1="175" x2="420" y2="175" stroke="black" stroke-width="3"/>
  <text x="230" y="166" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">shared bus line</text>

  <!-- device A -->
  <line x1="140" y1="175" x2="140" y2="210" stroke="black" stroke-width="2"/>
  <circle cx="140" cy="175" r="4" fill="black"/>
  <rect x="110" y="210" width="60" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="140" y="240" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">chip A</text>
  <line x1="140" y1="260" x2="140" y2="285" stroke="black" stroke-width="2"/>
  <line x1="125" y1="285" x2="155" y2="285" stroke="black" stroke-width="2"/>
  <line x1="130" y1="291" x2="150" y2="291" stroke="black" stroke-width="2"/>

  <!-- device B -->
  <line x1="320" y1="175" x2="320" y2="210" stroke="black" stroke-width="2"/>
  <circle cx="320" cy="175" r="4" fill="black"/>
  <rect x="290" y="210" width="60" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="320" y="240" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">chip B</text>
  <line x1="320" y1="260" x2="320" y2="285" stroke="black" stroke-width="2"/>
  <line x1="305" y1="285" x2="335" y2="285" stroke="black" stroke-width="2"/>
  <line x1="310" y1="291" x2="330" y2="291" stroke="black" stroke-width="2"/>

  <text x="230" y="320" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Line is HIGH only if BOTH release it; ANY chip pulling LOW wins (this is AND)</text>
</svg>
