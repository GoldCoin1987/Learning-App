<svg xmlns="http://www.w3.org/2000/svg" width="560" height="300" viewBox="0 0 560 300" font-family="sans-serif" font-size="13">
  <rect width="560" height="300" fill="#ffffff"/>
  <text x="280" y="22" text-anchor="middle" font-size="15" font-weight="bold">Choosing an ADC: speed vs resolution</text>

  <!-- axes -->
  <line x1="70" y1="250" x2="520" y2="250" stroke="#333"/>
  <line x1="70" y1="50" x2="70" y2="250" stroke="#333"/>
  <text x="295" y="285" text-anchor="middle" font-size="12">speed (samples per second) -&gt;</text>
  <text x="40" y="150" font-size="12" transform="rotate(-90 40 150)" text-anchor="middle">resolution (bits) -&gt;</text>

  <!-- Sigma-delta: high res, low speed (top-left) -->
  <rect x="95" y="70" width="130" height="55" rx="6" fill="#e3f2fd" stroke="#333"/>
  <text x="160" y="92" text-anchor="middle" font-size="12" font-weight="bold">Sigma-delta</text>
  <text x="160" y="108" text-anchor="middle" font-size="10">high resolution,</text>
  <text x="160" y="120" text-anchor="middle" font-size="10">slow (audio, scales)</text>

  <!-- SAR: middle workhorse -->
  <rect x="230" y="140" width="130" height="55" rx="6" fill="#e8f5e9" stroke="#333"/>
  <text x="295" y="162" text-anchor="middle" font-size="12" font-weight="bold">SAR</text>
  <text x="295" y="178" text-anchor="middle" font-size="10">balanced workhorse</text>
  <text x="295" y="190" text-anchor="middle" font-size="10">(everyday MCU input)</text>

  <!-- Flash: fast, low res (bottom-right) -->
  <rect x="375" y="200" width="130" height="45" rx="6" fill="#fff3e0" stroke="#333"/>
  <text x="440" y="220" text-anchor="middle" font-size="12" font-weight="bold">Flash</text>
  <text x="440" y="236" text-anchor="middle" font-size="10">very fast, few bits</text>

  <text x="70" y="298" font-size="10" fill="#555">Each architecture wins a different corner: flash = speed, sigma-delta = resolution, SAR = the all-rounder.</text>
</svg>
