<svg xmlns="http://www.w3.org/2000/svg" width="560" height="240" viewBox="0 0 560 240" font-family="sans-serif" font-size="13">
  <rect width="560" height="240" fill="#ffffff"/>
  <text x="280" y="22" text-anchor="middle" font-size="15" font-weight="bold">R-2R Ladder DAC (4-bit)</text>

  <!-- top rail (series R) -->
  <line x1="60" y1="70" x2="500" y2="70" stroke="#333" stroke-width="1.5"/>

  <!-- series R resistors on top rail between nodes -->
  <!-- nodes at x=120,230,340,450 -->
  <text x="85"  y="62" text-anchor="middle" font-size="11">R</text>
  <text x="175" y="62" text-anchor="middle" font-size="11">R</text>
  <text x="285" y="62" text-anchor="middle" font-size="11">R</text>
  <text x="395" y="62" text-anchor="middle" font-size="11">R</text>

  <!-- vertical 2R legs to switches -->
  <g stroke="#333" stroke-width="1.5" fill="none">
    <line x1="120" y1="70" x2="120" y2="130"/>
    <line x1="230" y1="70" x2="230" y2="130"/>
    <line x1="340" y1="70" x2="340" y2="130"/>
    <line x1="450" y1="70" x2="450" y2="130"/>
    <line x1="60"  y1="70" x2="60"  y2="130"/>
  </g>
  <text x="105" y="105" font-size="11">2R</text>
  <text x="215" y="105" font-size="11">2R</text>
  <text x="325" y="105" font-size="11">2R</text>
  <text x="435" y="105" font-size="11">2R</text>
  <text x="45"  y="105" font-size="11">2R</text>

  <!-- bit switches (toggle between GND and Vref) -->
  <g font-size="11" text-anchor="middle">
    <circle cx="120" cy="140" r="4" fill="#333"/>
    <circle cx="230" cy="140" r="4" fill="#333"/>
    <circle cx="340" cy="140" r="4" fill="#333"/>
    <circle cx="450" cy="140" r="4" fill="#333"/>
    <text x="120" y="165">b3 (MSB)</text>
    <text x="230" y="165">b2</text>
    <text x="340" y="165">b1</text>
    <text x="450" y="165">b0 (LSB)</text>
  </g>

  <!-- termination leg label -->
  <text x="60" y="165" text-anchor="middle" font-size="10" fill="#555">term</text>

  <!-- bus rails -->
  <line x1="60" y1="185" x2="500" y2="185" stroke="#aaa" stroke-dasharray="4 3"/>
  <text x="510" y="189" font-size="11" fill="#555">Vref / GND</text>

  <!-- output node + opamp -->
  <line x1="500" y1="70" x2="525" y2="70" stroke="#333"/>
  <text x="528" y="74" font-size="12">V_out</text>

  <text x="20" y="212" font-size="11" fill="#555">Only two resistor values (R, 2R) -> easy to match in IC. Each bit steers 2R leg to Vref or GND.</text>
  <text x="20" y="228" font-size="11" fill="#555">Binary weighting comes from the ladder's repeated halving, not from N distinct resistor values.</text>
</svg>
