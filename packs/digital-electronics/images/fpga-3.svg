<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect x="0" y="0" width="480" height="320" fill="white"/>
  <text x="240" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Inside an FPGA: a Fabric of Building Blocks</text>

  <!-- I/O ring -->
  <rect x="40" y="44" width="400" height="240" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="240" y="40" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">configurable I/O ring (connects to pins)</text>

  <!-- grid of logic blocks -->
  <g font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">
    <!-- row 1 -->
    <rect x="60" y="70" width="48" height="38" fill="#e6e6e6" stroke="black" stroke-width="1.2"/>
    <text x="84" y="86">logic</text><text x="84" y="98">block</text>
    <rect x="118" y="70" width="48" height="38" fill="#e6e6e6" stroke="black" stroke-width="1.2"/>
    <text x="142" y="86">logic</text><text x="142" y="98">block</text>
    <rect x="176" y="70" width="56" height="38" fill="#cfe8cf" stroke="black" stroke-width="1.2"/>
    <text x="204" y="86">block</text><text x="204" y="98">RAM</text>
    <rect x="242" y="70" width="48" height="38" fill="#e6e6e6" stroke="black" stroke-width="1.2"/>
    <text x="266" y="86">logic</text><text x="266" y="98">block</text>
    <rect x="300" y="70" width="56" height="38" fill="#ffe0b3" stroke="black" stroke-width="1.2"/>
    <text x="328" y="86">DSP</text><text x="328" y="98">block</text>

    <!-- row 2 -->
    <rect x="60" y="120" width="48" height="38" fill="#e6e6e6" stroke="black" stroke-width="1.2"/>
    <text x="84" y="136">logic</text><text x="84" y="148">block</text>
    <rect x="118" y="120" width="48" height="38" fill="#ffe0b3" stroke="black" stroke-width="1.2"/>
    <text x="142" y="136">DSP</text><text x="142" y="148">block</text>
    <rect x="176" y="120" width="56" height="38" fill="#e6e6e6" stroke="black" stroke-width="1.2"/>
    <text x="204" y="136">logic</text><text x="204" y="148">block</text>
    <rect x="242" y="120" width="48" height="38" fill="#cfe8cf" stroke="black" stroke-width="1.2"/>
    <text x="266" y="136">block</text><text x="266" y="148">RAM</text>
    <rect x="300" y="120" width="56" height="38" fill="#e6e6e6" stroke="black" stroke-width="1.2"/>
    <text x="328" y="136">logic</text><text x="328" y="148">block</text>

    <!-- row 3 -->
    <rect x="60" y="170" width="48" height="38" fill="#e6e6e6" stroke="black" stroke-width="1.2"/>
    <text x="84" y="186">logic</text><text x="84" y="198">block</text>
    <rect x="118" y="170" width="48" height="38" fill="#e6e6e6" stroke="black" stroke-width="1.2"/>
    <text x="142" y="186">logic</text><text x="142" y="198">block</text>
    <rect x="176" y="170" width="56" height="38" fill="#ffe0b3" stroke="black" stroke-width="1.2"/>
    <text x="204" y="186">DSP</text><text x="204" y="198">block</text>
    <rect x="242" y="170" width="48" height="38" fill="#e6e6e6" stroke="black" stroke-width="1.2"/>
    <text x="266" y="186">logic</text><text x="266" y="198">block</text>
    <rect x="300" y="170" width="56" height="38" fill="#cfe8cf" stroke="black" stroke-width="1.2"/>
    <text x="328" y="186">block</text><text x="328" y="198">RAM</text>
  </g>

  <!-- clock block -->
  <rect x="372" y="120" width="56" height="38" fill="#d9d9f3" stroke="black" stroke-width="1.5"/>
  <text x="400" y="136" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">clock</text>
  <text x="400" y="148" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">(PLL)</text>

  <!-- interconnect note -->
  <text x="195" y="230" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">programmable wires connect the blocks (the interconnect)</text>

  <!-- legend -->
  <g font-family="sans-serif" font-size="10" fill="black">
    <rect x="60" y="248" width="14" height="12" fill="#e6e6e6" stroke="black"/>
    <text x="80" y="258" text-anchor="start">logic block = LUT + flip-flop</text>
    <rect x="240" y="248" width="14" height="12" fill="#cfe8cf" stroke="black"/>
    <text x="260" y="258" text-anchor="start">block RAM = on-chip memory</text>
    <rect x="60" y="266" width="14" height="12" fill="#ffe0b3" stroke="black"/>
    <text x="80" y="276" text-anchor="start">DSP block = fast multiplier</text>
  </g>

  <text x="240" y="300" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">The bitstream sets every block and every wire, turning the fabric into your circuit.</text>
</svg>
