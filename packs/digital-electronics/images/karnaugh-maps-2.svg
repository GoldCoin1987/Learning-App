<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 360">
  <rect x="0" y="0" width="440" height="360" fill="white"/>
  <text x="220" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Don't-Cares Extend a Group</text>
  <text x="220" y="44" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">1 = required, X = don't-care, blank = 0</text>

  <text x="250" y="74" font-family="monospace" font-size="13" text-anchor="middle" fill="black">CD</text>
  <text x="120" y="180" font-family="monospace" font-size="13" text-anchor="middle" fill="black">AB</text>

  <text x="190" y="92" font-family="monospace" font-size="13" text-anchor="middle">00</text>
  <text x="250" y="92" font-family="monospace" font-size="13" text-anchor="middle">01</text>
  <text x="310" y="92" font-family="monospace" font-size="13" text-anchor="middle">11</text>
  <text x="370" y="92" font-family="monospace" font-size="13" text-anchor="middle">10</text>

  <text x="150" y="126" font-family="monospace" font-size="13" text-anchor="middle">00</text>
  <text x="150" y="166" font-family="monospace" font-size="13" text-anchor="middle">01</text>
  <text x="150" y="206" font-family="monospace" font-size="13" text-anchor="middle">11</text>
  <text x="150" y="246" font-family="monospace" font-size="13" text-anchor="middle">10</text>

  <!-- grid: top-left (160,106), 60x40 -->
  <!-- row AB=00 -->
  <rect x="160" y="106" width="60" height="40" fill="#cfe0f0" stroke="black"/>
  <rect x="220" y="106" width="60" height="40" fill="white" stroke="black"/>
  <rect x="280" y="106" width="60" height="40" fill="white" stroke="black"/>
  <rect x="340" y="106" width="60" height="40" fill="#cfe0f0" stroke="black"/>
  <text x="190" y="131" font-family="monospace" font-size="14" text-anchor="middle">1</text>
  <text x="370" y="131" font-family="monospace" font-size="14" text-anchor="middle">X</text>

  <!-- row AB=01 -->
  <rect x="160" y="146" width="60" height="40" fill="white" stroke="black"/>
  <rect x="220" y="146" width="60" height="40" fill="white" stroke="black"/>
  <rect x="280" y="146" width="60" height="40" fill="white" stroke="black"/>
  <rect x="340" y="146" width="60" height="40" fill="white" stroke="black"/>

  <!-- row AB=11 -->
  <rect x="160" y="186" width="60" height="40" fill="white" stroke="black"/>
  <rect x="220" y="186" width="60" height="40" fill="white" stroke="black"/>
  <rect x="280" y="186" width="60" height="40" fill="white" stroke="black"/>
  <rect x="340" y="186" width="60" height="40" fill="white" stroke="black"/>

  <!-- row AB=10 -->
  <rect x="160" y="226" width="60" height="40" fill="#cfe0f0" stroke="black"/>
  <rect x="220" y="226" width="60" height="40" fill="white" stroke="black"/>
  <rect x="280" y="226" width="60" height="40" fill="white" stroke="black"/>
  <rect x="340" y="226" width="60" height="40" fill="#cfe0f0" stroke="black"/>
  <text x="190" y="251" font-family="monospace" font-size="14" text-anchor="middle">1</text>
  <text x="370" y="251" font-family="monospace" font-size="14" text-anchor="middle">X</text>

  <!-- corner group of 4 via wrap-around: cells (00,00)(00,10)(10,00)(10,10) -->
  <rect x="155" y="101" width="70" height="50" rx="14" ry="14" fill="none" stroke="#b5651d" stroke-width="3"/>
  <rect x="335" y="101" width="70" height="50" rx="14" ry="14" fill="none" stroke="#b5651d" stroke-width="3"/>
  <rect x="155" y="221" width="70" height="50" rx="14" ry="14" fill="none" stroke="#b5651d" stroke-width="3"/>
  <rect x="335" y="221" width="70" height="50" rx="14" ry="14" fill="none" stroke="#b5651d" stroke-width="3"/>

  <text x="220" y="296" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#b5651d">Four corners are mutually adjacent (wrap-around).</text>
  <text x="220" y="316" font-family="monospace" font-size="13" text-anchor="middle" fill="#b5651d">group = B' AND D'  (treating both X as 1)</text>
  <text x="220" y="338" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Don't-cares are covered only when they enlarge a group; never required alone.</text>
</svg>
