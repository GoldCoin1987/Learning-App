<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320">
  <rect x="0" y="0" width="520" height="320" fill="white"/>
  <text x="260" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">NOR Flash vs NAND Flash</text>

  <!-- divider -->
  <line x1="260" y1="40" x2="260" y2="300" stroke="#ccc" stroke-width="1"/>

  <!-- ===== NOR (left) ===== -->
  <text x="130" y="52" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">NOR flash</text>

  <!-- parallel cells reachable directly -->
  <line x1="50" y1="70" x2="50" y2="180" stroke="black" stroke-width="1.5"/>
  <g fill="none" stroke="black" stroke-width="1.5">
    <rect x="60" y="78" width="40" height="22"/>
    <rect x="60" y="118" width="40" height="22"/>
    <rect x="60" y="158" width="40" height="22"/>
  </g>
  <line x1="50" y1="89" x2="60" y2="89" stroke="black" stroke-width="1.5"/>
  <line x1="50" y1="129" x2="60" y2="129" stroke="black" stroke-width="1.5"/>
  <line x1="50" y1="169" x2="60" y2="169" stroke="black" stroke-width="1.5"/>
  <text x="130" y="93" font-family="monospace" font-size="10" fill="black">cell</text>
  <text x="130" y="133" font-family="monospace" font-size="10" fill="black">cell</text>
  <text x="130" y="173" font-family="monospace" font-size="10" fill="black">cell</text>

  <text x="130" y="215" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Cells in PARALLEL.</text>
  <text x="130" y="232" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Fast RANDOM read of any byte.</text>
  <text x="130" y="249" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Run code directly (XIP).</text>
  <text x="130" y="266" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Lower density.</text>
  <text x="130" y="288" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Use: boot code, firmware.</text>

  <!-- ===== NAND (right) ===== -->
  <text x="390" y="52" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">NAND flash</text>

  <!-- cells in series string -->
  <line x1="320" y1="89" x2="340" y2="89" stroke="black" stroke-width="1.5"/>
  <g fill="none" stroke="black" stroke-width="1.5">
    <rect x="340" y="78" width="34" height="22"/>
    <rect x="386" y="78" width="34" height="22"/>
    <rect x="432" y="78" width="34" height="22"/>
  </g>
  <line x1="374" y1="89" x2="386" y2="89" stroke="black" stroke-width="1.5"/>
  <line x1="420" y1="89" x2="432" y2="89" stroke="black" stroke-width="1.5"/>
  <line x1="466" y1="89" x2="480" y2="89" stroke="black" stroke-width="1.5"/>
  <text x="357" y="93" font-family="monospace" font-size="9" text-anchor="middle" fill="black">c</text>
  <text x="403" y="93" font-family="monospace" font-size="9" text-anchor="middle" fill="black">c</text>
  <text x="449" y="93" font-family="monospace" font-size="9" text-anchor="middle" fill="black">c</text>
  <text x="403" y="118" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">cells in a SERIES string</text>

  <text x="390" y="150" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Cells in SERIES.</text>
  <text x="390" y="167" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Read/write by PAGE, erase by BLOCK.</text>
  <text x="390" y="184" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">No single-byte random read.</text>
  <text x="390" y="201" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Much higher density, cheaper.</text>
  <text x="390" y="223" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Use: mass storage (SSD, SD, eMMC).</text>

  <text x="390" y="270" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Both store a bit as trapped charge</text>
  <text x="390" y="287" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">on a floating gate; erase-before-write.</text>
</svg>
