<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" width="460" height="300">
  <rect x="0" y="0" width="460" height="300" fill="#ffffff"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="16">
    <text x="70" y="28">Truth table to canonical SOP (sum of products)</text>
  </g>
  <g stroke="#000000" stroke-width="1.5" fill="none">
    <rect x="30" y="50" width="190" height="160"/>
    <line x1="30" y1="74" x2="220" y2="74"/>
    <line x1="90" y1="50" x2="90" y2="210"/>
    <line x1="150" y1="50" x2="150" y2="210"/>
    <line x1="180" y1="50" x2="180" y2="210"/>
    <line x1="30" y1="96" x2="220" y2="96"/>
    <line x1="30" y1="118" x2="220" y2="118"/>
    <line x1="30" y1="140" x2="220" y2="140"/>
    <line x1="30" y1="162" x2="220" y2="162"/>
    <line x1="30" y1="184" x2="220" y2="184"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="40" y="68">A</text>
    <text x="100" y="68">B</text>
    <text x="160" y="68">C</text>
    <text x="186" y="68">f</text>
    <text x="40" y="90">0</text><text x="100" y="90">0</text><text x="160" y="90">0</text><text x="186" y="90">0</text>
    <text x="40" y="112">0</text><text x="100" y="112">0</text><text x="160" y="112">1</text><text x="186" y="112">1</text>
    <text x="40" y="134">0</text><text x="100" y="134">1</text><text x="160" y="134">0</text><text x="186" y="134">0</text>
    <text x="40" y="156">0</text><text x="100" y="156">1</text><text x="160" y="156">1</text><text x="186" y="156">1</text>
    <text x="40" y="178">1</text><text x="100" y="178">0</text><text x="160" y="178">0</text><text x="186" y="178">0</text>
    <text x="40" y="200">1</text><text x="100" y="200">1</text><text x="160" y="200">1</text><text x="186" y="200">1</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="250" y="108">row 1: A'B'C</text>
    <text x="250" y="152">row 3: A'BC</text>
    <text x="250" y="196">row 7: ABC</text>
    <text x="250" y="240">Take each row where f = 1,</text>
    <text x="250" y="258">AND the inputs (bar the 0s),</text>
    <text x="250" y="276">then OR those products:</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="14">
    <text x="35" y="240">f = A'B'C + A'BC + ABC</text>
  </g>
</svg>
