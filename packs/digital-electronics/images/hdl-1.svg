<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320">
  <rect x="0" y="0" width="520" height="320" fill="white"/>
  <text x="260" y="22" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Same clocked block: &lt;= vs = on a 3-stage shift register</text>

  <text x="260" y="44" font-family="monospace" font-size="12" text-anchor="middle" fill="#444">q1&lt;=d; q2&lt;=q1; q3&lt;=q2;  (vs  q1=d; q2=q1; q3=q2;)</text>

  <!-- Non-blocking column -->
  <text x="150" y="74" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#070">NON-BLOCKING ( &lt;= )  CORRECT</text>
  <rect x="60" y="86" width="50" height="34" fill="none" stroke="black" stroke-width="2"/>
  <rect x="140" y="86" width="50" height="34" fill="none" stroke="black" stroke-width="2"/>
  <rect x="220" y="86" width="50" height="34" fill="none" stroke="black" stroke-width="2"/>
  <text x="85" y="108" font-family="monospace" font-size="13" text-anchor="middle">q1</text>
  <text x="165" y="108" font-family="monospace" font-size="13" text-anchor="middle">q2</text>
  <text x="245" y="108" font-family="monospace" font-size="13" text-anchor="middle">q3</text>
  <line x1="30" y1="103" x2="60" y2="103" stroke="black" stroke-width="2" marker-end="url(#a)"/>
  <line x1="110" y1="103" x2="140" y2="103" stroke="black" stroke-width="2" marker-end="url(#a)"/>
  <line x1="190" y1="103" x2="220" y2="103" stroke="black" stroke-width="2" marker-end="url(#a)"/>
  <line x1="270" y1="103" x2="300" y2="103" stroke="black" stroke-width="2" marker-end="url(#a)"/>
  <text x="30" y="98" font-family="monospace" font-size="11" fill="#444">d</text>
  <text x="150" y="150" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#070">RHS uses OLD values: 3 real flip-flops</text>

  <!-- Blocking column -->
  <text x="160" y="196" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#a00">BLOCKING ( = )  WRONG HERE</text>
  <rect x="60" y="208" width="50" height="34" fill="none" stroke="#a00" stroke-width="2"/>
  <text x="85" y="230" font-family="monospace" font-size="13" text-anchor="middle">q1</text>
  <line x1="30" y1="225" x2="60" y2="225" stroke="#a00" stroke-width="2" marker-end="url(#r)"/>
  <line x1="110" y1="225" x2="300" y2="225" stroke="#a00" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#r)"/>
  <text x="30" y="220" font-family="monospace" font-size="11" fill="#a00">d</text>
  <text x="205" y="218" font-family="monospace" font-size="12" text-anchor="middle" fill="#a00">q2,q3 collapse to q1</text>
  <text x="160" y="266" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#a00">RHS uses NEW q1 immediately: 1 flip-flop, not 3</text>

  <text x="260" y="298" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Rule: non-blocking &lt;= in posedge clk blocks; blocking = in always @(*).</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="black"/></marker>
    <marker id="r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#a00"/></marker>
  </defs>
</svg>
