<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 250">
  <rect x="0" y="0" width="440" height="250" fill="white"/>
  <text x="220" y="28" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Negate with Two's Complement: make -5</text>
  <!-- step 1 -->
  <text x="20" y="70" font-family="sans-serif" font-size="13" fill="black">start with +5:</text>
  <text x="200" y="70" font-family="monospace" font-size="18" fill="black">0000 0101</text>
  <!-- step 2 -->
  <text x="20" y="110" font-family="sans-serif" font-size="13" fill="black">flip every bit:</text>
  <text x="200" y="110" font-family="monospace" font-size="18" fill="black">1111 1010</text>
  <!-- step 3 -->
  <text x="20" y="150" font-family="sans-serif" font-size="13" fill="black">add 1:</text>
  <text x="200" y="150" font-family="monospace" font-size="18" fill="black">1111 1011</text>
  <line x1="200" y1="160" x2="350" y2="160" stroke="black" stroke-width="1"/>
  <text x="20" y="190" font-family="sans-serif" font-size="13" fill="black">result = -5:</text>
  <text x="200" y="190" font-family="monospace" font-size="18" fill="black">1111 1011</text>
  <text x="220" y="226" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">leading 1 means negative; do the same steps to go back</text>
</svg>
