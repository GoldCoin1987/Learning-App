<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 280">
  <rect x="0" y="0" width="540" height="280" fill="white"/>
  <text x="270" y="26" font-family="sans-serif" font-size="17" text-anchor="middle" fill="black">A module: a labeled box with pins</text>

  <rect x="170" y="70" width="200" height="140" fill="none" stroke="black" stroke-width="2"/>
  <text x="270" y="100" font-family="monospace" font-size="14" text-anchor="middle">adder</text>
  <text x="270" y="124" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#444">(the body: logic inside)</text>

  <!-- input pins -->
  <line x1="110" y1="95" x2="170" y2="95" stroke="black" stroke-width="2" marker-end="url(#p)"/>
  <text x="105" y="99" font-family="monospace" font-size="12" text-anchor="end">a[7:0]</text>
  <line x1="110" y1="130" x2="170" y2="130" stroke="black" stroke-width="2" marker-end="url(#p)"/>
  <text x="105" y="134" font-family="monospace" font-size="12" text-anchor="end">b[7:0]</text>
  <line x1="110" y1="165" x2="170" y2="165" stroke="black" stroke-width="2" marker-end="url(#p)"/>
  <text x="105" y="169" font-family="monospace" font-size="12" text-anchor="end">cin</text>
  <text x="60" y="60" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#070">inputs</text>

  <!-- output pins -->
  <line x1="370" y1="112" x2="430" y2="112" stroke="black" stroke-width="2" marker-end="url(#p)"/>
  <text x="436" y="116" font-family="monospace" font-size="12" text-anchor="start">sum[7:0]</text>
  <line x1="370" y1="155" x2="430" y2="155" stroke="black" stroke-width="2" marker-end="url(#p)"/>
  <text x="436" y="159" font-family="monospace" font-size="12" text-anchor="start">cout</text>
  <text x="475" y="60" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#070">outputs</text>

  <text x="270" y="245" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A wire carries a signal between pins/boxes. [7:0] means an 8-bit bus.</text>
  <text x="270" y="265" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#444">Designs are boxes built from smaller boxes.</text>

  <defs>
    <marker id="p" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="black"/></marker>
  </defs>
</svg>
