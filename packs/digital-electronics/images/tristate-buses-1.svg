<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320">
  <rect x="0" y="0" width="460" height="320" fill="white"/>
  <text x="230" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Multiple Tri-State Buffers on One Shared Bus</text>

  <!-- shared bus line -->
  <line x1="40" y1="160" x2="420" y2="160" stroke="black" stroke-width="3"/>
  <text x="40" y="152" font-family="sans-serif" font-size="12" fill="black">shared bus (one driver at a time)</text>

  <!-- pull-up resistor -->
  <line x1="400" y1="160" x2="400" y2="120" stroke="black" stroke-width="2"/>
  <rect x="392" y="80" width="16" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="400" y1="80" x2="400" y2="60" stroke="black" stroke-width="2"/>
  <text x="412" y="104" font-family="sans-serif" font-size="11" fill="black">Rpu</text>
  <text x="394" y="54" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">VDD</text>

  <!-- Buffer A (enabled) -->
  <polygon points="60,200 60,250 100,225" fill="#cccccc" stroke="black" stroke-width="1.5"/>
  <line x1="40" y1="225" x2="60" y2="225" stroke="black" stroke-width="1.5"/>
  <line x1="100" y1="225" x2="100" y2="160" stroke="black" stroke-width="1.5"/>
  <text x="34" y="229" font-family="sans-serif" font-size="11" text-anchor="end" fill="black">Din A</text>
  <line x1="80" y1="270" x2="80" y2="240" stroke="black" stroke-width="1.5"/>
  <text x="80" y="285" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">OE_A = 1</text>
  <text x="80" y="225" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">A</text>

  <!-- Buffer B (Hi-Z) -->
  <polygon points="190,200 190,250 230,225" fill="white" stroke="black" stroke-width="1.5"/>
  <line x1="170" y1="225" x2="190" y2="225" stroke="black" stroke-width="1.5"/>
  <line x1="230" y1="225" x2="230" y2="160" stroke="black" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="164" y="229" font-family="sans-serif" font-size="11" text-anchor="end" fill="black">Din B</text>
  <line x1="210" y1="270" x2="210" y2="240" stroke="black" stroke-width="1.5"/>
  <text x="210" y="285" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">OE_B = 0</text>
  <text x="210" y="225" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">B</text>
  <text x="248" y="200" font-family="sans-serif" font-size="10" fill="black">Hi-Z</text>

  <!-- Buffer C (Hi-Z) -->
  <polygon points="320,200 320,250 360,225" fill="white" stroke="black" stroke-width="1.5"/>
  <line x1="300" y1="225" x2="320" y2="225" stroke="black" stroke-width="1.5"/>
  <line x1="360" y1="225" x2="360" y2="160" stroke="black" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="294" y="229" font-family="sans-serif" font-size="11" text-anchor="end" fill="black">Din C</text>
  <line x1="340" y1="270" x2="340" y2="240" stroke="black" stroke-width="1.5"/>
  <text x="340" y="285" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">OE_C = 0</text>
  <text x="340" y="225" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">C</text>
  <text x="378" y="200" font-family="sans-serif" font-size="10" fill="black">Hi-Z</text>

  <text x="230" y="310" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Exactly one OE asserted: only A drives; B and C are high-impedance.</text>
</svg>
