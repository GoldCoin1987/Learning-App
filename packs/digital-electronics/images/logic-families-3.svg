<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360">
  <rect x="0" y="0" width="460" height="360" fill="white"/>
  <text x="230" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">A gate is a circuit of transistor switches</text>
  <text x="230" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Example: a NOT gate (inverter) made of two switches</text>

  <!-- supply rail -->
  <line x1="90" y1="80" x2="370" y2="80" stroke="black" stroke-width="2"/>
  <text x="378" y="84" font-family="sans-serif" font-size="12" text-anchor="start" fill="black">+ supply (= "1")</text>
  <line x1="230" y1="80" x2="230" y2="115" stroke="black" stroke-width="2"/>

  <!-- top switch (pulls output toward supply) -->
  <rect x="190" y="115" width="80" height="45" fill="none" stroke="black" stroke-width="2"/>
  <text x="230" y="142" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">top switch</text>
  <text x="280" y="120" font-family="sans-serif" font-size="11" text-anchor="start" fill="black">ON when IN = 0</text>

  <!-- output node -->
  <line x1="230" y1="160" x2="230" y2="225" stroke="black" stroke-width="2"/>
  <circle cx="230" cy="192" r="4" fill="black"/>
  <line x1="230" y1="192" x2="340" y2="192" stroke="black" stroke-width="2"/>
  <text x="346" y="196" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">OUT</text>

  <!-- bottom switch (pulls output toward 0V) -->
  <rect x="190" y="225" width="80" height="45" fill="none" stroke="black" stroke-width="2"/>
  <text x="230" y="252" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">bottom switch</text>
  <text x="280" y="232" font-family="sans-serif" font-size="11" text-anchor="start" fill="black">ON when IN = 1</text>

  <!-- input controls both switches -->
  <line x1="190" y1="137" x2="120" y2="137" stroke="black" stroke-width="2"/>
  <line x1="190" y1="247" x2="120" y2="247" stroke="black" stroke-width="2"/>
  <line x1="120" y1="137" x2="120" y2="247" stroke="black" stroke-width="2"/>
  <circle cx="120" cy="192" r="4" fill="black"/>
  <line x1="120" y1="192" x2="60" y2="192" stroke="black" stroke-width="2"/>
  <text x="20" y="196" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">IN</text>

  <!-- ground -->
  <line x1="230" y1="270" x2="230" y2="305" stroke="black" stroke-width="2"/>
  <line x1="205" y1="305" x2="255" y2="305" stroke="black" stroke-width="2"/>
  <line x1="213" y1="312" x2="247" y2="312" stroke="black" stroke-width="2"/>
  <line x1="221" y1="319" x2="239" y2="319" stroke="black" stroke-width="2"/>
  <text x="262" y="309" font-family="sans-serif" font-size="12" text-anchor="start" fill="black">0V (= "0")</text>

  <text x="230" y="348" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Exactly one switch is closed, so OUT is pulled to "1" or "0" - the opposite of IN</text>
</svg>
