<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="sans-serif" font-size="14">
  <rect width="720" height="400" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="17" text-anchor="middle">/proc is a live dashboard of the running system</text>

  <!-- Dashboard frame -->
  <rect x="40" y="55" width="640" height="310" rx="10" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="360" y="82" fill="#000000" text-anchor="middle" font-size="13">Like gauges on a car dashboard, each file shows one live reading</text>

  <!-- gauge 1 -->
  <rect x="70" y="105" width="180" height="100" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="160" y="132" fill="#000000" text-anchor="middle" font-family="monospace" font-size="12">/proc/cpuinfo</text>
  <text x="160" y="160" fill="#000000" text-anchor="middle" font-size="12">What CPUs do I have?</text>
  <text x="160" y="185" fill="#000000" text-anchor="middle" font-size="12">model, cores, speed</text>

  <!-- gauge 2 -->
  <rect x="270" y="105" width="180" height="100" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="360" y="132" fill="#000000" text-anchor="middle" font-family="monospace" font-size="12">/proc/meminfo</text>
  <text x="360" y="160" fill="#000000" text-anchor="middle" font-size="12">How much memory</text>
  <text x="360" y="185" fill="#000000" text-anchor="middle" font-size="12">is free right now?</text>

  <!-- gauge 3 -->
  <rect x="470" y="105" width="180" height="100" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="560" y="132" fill="#000000" text-anchor="middle" font-family="monospace" font-size="12">/proc/loadavg</text>
  <text x="560" y="160" fill="#000000" text-anchor="middle" font-size="12">How busy is the</text>
  <text x="560" y="185" fill="#000000" text-anchor="middle" font-size="12">system overall?</text>

  <!-- gauge 4 -->
  <rect x="170" y="230" width="180" height="100" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="260" y="257" fill="#000000" text-anchor="middle" font-family="monospace" font-size="12">/proc/version</text>
  <text x="260" y="285" fill="#000000" text-anchor="middle" font-size="12">Which kernel</text>
  <text x="260" y="310" fill="#000000" text-anchor="middle" font-size="12">is running?</text>

  <!-- gauge 5 -->
  <rect x="370" y="230" width="180" height="100" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="460" y="257" fill="#000000" text-anchor="middle" font-family="monospace" font-size="11">/proc/&lt;pid&gt;/</text>
  <text x="460" y="285" fill="#000000" text-anchor="middle" font-size="12">What is one</text>
  <text x="460" y="310" fill="#000000" text-anchor="middle" font-size="12">process doing?</text>

  <text x="360" y="358" fill="#000000" text-anchor="middle" font-size="12">Read any gauge with: cat &lt;file&gt;</text>
</svg>
