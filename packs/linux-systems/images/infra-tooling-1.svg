<svg xmlns="http://www.w3.org/2000/svg" width="860" height="300" viewBox="0 0 860 300" font-family="sans-serif">
  <rect width="860" height="300" fill="#0f1117"/>
  <text x="430" y="28" fill="#e8e8e8" font-size="18" font-weight="bold" text-anchor="middle">Managing a Linux Fleet Reproducibly</text>

  <!-- Control node -->
  <g>
    <rect x="20" y="90" width="180" height="120" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="110" y="118" fill="#9ec1ff" font-size="14" font-weight="bold" text-anchor="middle">Control node</text>
    <text x="110" y="140" fill="#cfd8ec" font-size="11" text-anchor="middle">Ansible playbooks</text>
    <text x="110" y="158" fill="#cfd8ec" font-size="11" text-anchor="middle">inventory + roles</text>
    <text x="110" y="176" fill="#8893a8" font-size="10" text-anchor="middle">declarative,</text>
    <text x="110" y="190" fill="#8893a8" font-size="10" text-anchor="middle">idempotent</text>
  </g>

  <!-- SSH label -->
  <text x="270" y="135" fill="#7fd6a0" font-size="11" text-anchor="middle">agentless</text>
  <text x="270" y="150" fill="#7fd6a0" font-size="11" text-anchor="middle">SSH (via bastion)</text>

  <!-- Fleet boxes -->
  <g>
    <rect x="360" y="60" width="150" height="56" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="435" y="84" fill="#9ec1ff" font-size="13" font-weight="bold" text-anchor="middle">web-01</text>
    <text x="435" y="102" fill="#8893a8" font-size="10" text-anchor="middle">pkg + config + service</text>
  </g>
  <g>
    <rect x="360" y="126" width="150" height="56" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="435" y="150" fill="#9ec1ff" font-size="13" font-weight="bold" text-anchor="middle">web-02</text>
    <text x="435" y="168" fill="#8893a8" font-size="10" text-anchor="middle">same state, every run</text>
  </g>
  <g>
    <rect x="360" y="192" width="150" height="56" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="435" y="216" fill="#9ec1ff" font-size="13" font-weight="bold" text-anchor="middle">db-01</text>
    <text x="435" y="234" fill="#8893a8" font-size="10" text-anchor="middle">systemd timer backups</text>
  </g>

  <!-- Observability -->
  <g>
    <rect x="600" y="90" width="240" height="120" rx="8" fill="#2a1f2e" stroke="#c97fd6" stroke-width="2"/>
    <text x="720" y="116" fill="#e3a8ee" font-size="13" font-weight="bold" text-anchor="middle">Observability</text>
    <text x="720" y="138" fill="#cfd8ec" font-size="11" text-anchor="middle">journald to aggregation</text>
    <text x="720" y="156" fill="#cfd8ec" font-size="11" text-anchor="middle">Prometheus to Grafana</text>
    <text x="720" y="174" fill="#cfd8ec" font-size="11" text-anchor="middle">eBPF deep inspection</text>
    <text x="720" y="194" fill="#8893a8" font-size="10" text-anchor="middle">metrics + logs scraped out</text>
  </g>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f7cff"/>
    </marker>
    <marker id="ahp" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#c97fd6"/>
    </marker>
  </defs>
  <line x1="200" y1="150" x2="356" y2="120" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="200" y1="150" x2="356" y2="154" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="200" y1="150" x2="356" y2="218" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="510" y1="150" x2="596" y2="150" stroke="#c97fd6" stroke-width="2" marker-end="url(#ahp)"/>

  <text x="430" y="282" fill="#6f7a90" font-size="11" text-anchor="middle">The artifact, not the keystrokes, is the source of truth: re-running converges every host to the declared state.</text>
</svg>
