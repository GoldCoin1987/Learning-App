<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="sans-serif">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">A Device Tree: a Parts List That Tells Linux What's on the Board</text>
  <text x="360" y="50" text-anchor="middle" font-size="12" fill="#111">A small board can't announce its parts, so a text file describes them</text>

  <!-- The board -->
  <rect x="40" y="80" width="280" height="280" fill="#ffffff" stroke="#111" stroke-width="3"/>
  <text x="180" y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">The board (hardware)</text>
  <rect x="70" y="124" width="100" height="50" fill="#eeeeee" stroke="#111"/>
  <text x="120" y="154" text-anchor="middle" font-size="12" fill="#111">CPU</text>
  <rect x="190" y="124" width="100" height="50" fill="#eeeeee" stroke="#111"/>
  <text x="240" y="148" text-anchor="middle" font-size="12" fill="#111">memory</text>
  <rect x="70" y="186" width="100" height="50" fill="#eeeeee" stroke="#111"/>
  <text x="120" y="210" text-anchor="middle" font-size="11" fill="#111">temp sensor</text>
  <rect x="190" y="186" width="100" height="50" fill="#eeeeee" stroke="#111"/>
  <text x="240" y="216" text-anchor="middle" font-size="12" fill="#111">an LED</text>
  <text x="180" y="270" text-anchor="middle" font-size="11" font-style="italic" fill="#111">These parts are silent -</text>
  <text x="180" y="288" text-anchor="middle" font-size="11" font-style="italic" fill="#111">they don't say "I am here".</text>

  <!-- arrow -->
  <line x1="322" y1="220" x2="382" y2="220" stroke="#111" stroke-width="3"/>
  <polygon points="382,220 370,213 370,227" fill="#111"/>
  <text x="352" y="210" text-anchor="middle" font-size="10" fill="#111">described</text>
  <text x="352" y="244" text-anchor="middle" font-size="10" fill="#111">in text</text>

  <!-- Device tree file -->
  <rect x="400" y="80" width="280" height="170" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="540" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">device tree (.dts text file)</text>
  <text x="420" y="132" font-size="12" font-family="monospace" fill="#111">sensor {</text>
  <text x="420" y="152" font-size="12" font-family="monospace" fill="#111">  compatible =</text>
  <text x="420" y="170" font-size="12" font-family="monospace" fill="#111">    "bosch,bmp280";</text>
  <text x="420" y="190" font-size="12" font-family="monospace" fill="#111">  address = 0x76;</text>
  <text x="420" y="210" font-size="12" font-family="monospace" fill="#111">};</text>
  <text x="540" y="236" text-anchor="middle" font-size="10" fill="#111">one entry per part on the board</text>

  <!-- Kernel reads it -->
  <line x1="540" y1="250" x2="540" y2="282" stroke="#111" stroke-width="3"/>
  <polygon points="540,282 533,270 547,270" fill="#111"/>
  <rect x="400" y="288" width="280" height="64" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="540" y="314" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Linux reads the list at boot</text>
  <text x="540" y="334" text-anchor="middle" font-size="11" fill="#111">and loads the right driver for each part</text>

  <text x="360" y="394" text-anchor="middle" font-size="12" fill="#111">The "compatible" name links a part to its driver. A typo there means Linux</text>
  <text x="360" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">never finds the part - the most common device-tree mistake.</text>
</svg>
