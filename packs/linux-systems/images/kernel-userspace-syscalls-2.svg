<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="sans-serif">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="30" fill="#000000" font-size="19" font-weight="bold" text-anchor="middle">The Two Worlds of an Operating System</text>

  <!-- Userspace box -->
  <rect x="40" y="60" width="640" height="120" rx="10" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="360" y="86" fill="#000000" font-size="15" font-weight="bold" text-anchor="middle">USERSPACE  (your normal programs, limited privileges)</text>
  <rect x="70" y="100" width="120" height="56" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="130" y="133" fill="#000000" font-size="12" text-anchor="middle">Web browser</text>
  <rect x="230" y="100" width="120" height="56" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="290" y="133" fill="#000000" font-size="12" text-anchor="middle">Text editor</text>
  <rect x="390" y="100" width="120" height="56" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="450" y="133" fill="#000000" font-size="12" text-anchor="middle">Music player</text>
  <rect x="550" y="100" width="100" height="56" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="600" y="133" fill="#000000" font-size="12" text-anchor="middle">Games</text>

  <!-- The doorway / boundary -->
  <line x1="40" y1="215" x2="290" y2="215" stroke="#000000" stroke-width="2" stroke-dasharray="7 5"/>
  <line x1="430" y1="215" x2="680" y2="215" stroke="#000000" stroke-width="2" stroke-dasharray="7 5"/>
  <rect x="290" y="195" width="140" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="360" y="220" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">SYSTEM CALL</text>
  <text x="360" y="252" fill="#000000" font-size="11" text-anchor="middle">the only doorway between the two worlds</text>

  <!-- Kernel box -->
  <rect x="40" y="270" width="640" height="120" rx="10" fill="#ffffff" stroke="#000000" stroke-width="2.5"/>
  <text x="360" y="296" fill="#000000" font-size="15" font-weight="bold" text-anchor="middle">KERNEL  (trusted core, full privileges)</text>
  <text x="360" y="320" fill="#000000" font-size="12" text-anchor="middle">controls hardware and memory directly</text>
  <rect x="100" y="334" width="160" height="44" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="180" y="361" fill="#000000" font-size="12" text-anchor="middle">CPU and memory</text>
  <rect x="290" y="334" width="140" height="44" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="360" y="361" fill="#000000" font-size="12" text-anchor="middle">Disk drive</text>
  <rect x="460" y="334" width="160" height="44" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="540" y="361" fill="#000000" font-size="12" text-anchor="middle">Network card</text>
</svg>
