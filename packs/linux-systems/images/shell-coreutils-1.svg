<svg xmlns="http://www.w3.org/2000/svg" width="640" height="200" viewBox="0 0 640 200" font-family="monospace">
  <rect width="640" height="200" fill="#0f1419"/>
  <text x="320" y="30" fill="#e6e1cf" font-size="16" text-anchor="middle" font-weight="bold">Pipeline data-flow: stdout - stdin chaining</text>

  <!-- cmd1 -->
  <rect x="20" y="80" width="150" height="50" rx="6" fill="#1f2933" stroke="#39bae6" stroke-width="2"/>
  <text x="95" y="105" fill="#39bae6" font-size="14" text-anchor="middle">cat access.log</text>
  <text x="95" y="122" fill="#5c6773" font-size="11" text-anchor="middle">cmd1</text>

  <!-- cmd2 -->
  <rect x="245" y="80" width="150" height="50" rx="6" fill="#1f2933" stroke="#ffb454" stroke-width="2"/>
  <text x="320" y="105" fill="#ffb454" font-size="14" text-anchor="middle">grep ' 404 '</text>
  <text x="320" y="122" fill="#5c6773" font-size="11" text-anchor="middle">cmd2</text>

  <!-- cmd3 -->
  <rect x="470" y="80" width="150" height="50" rx="6" fill="#1f2933" stroke="#aad94c" stroke-width="2"/>
  <text x="545" y="105" fill="#aad94c" font-size="14" text-anchor="middle">wc -l</text>
  <text x="545" y="122" fill="#5c6773" font-size="11" text-anchor="middle">cmd3</text>

  <!-- arrows -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e6e1cf"/>
    </marker>
  </defs>
  <line x1="170" y1="105" x2="240" y2="105" stroke="#e6e1cf" stroke-width="2" marker-end="url(#arr)"/>
  <text x="205" y="95" fill="#e6e1cf" font-size="16" text-anchor="middle">|</text>
  <line x1="395" y1="105" x2="465" y2="105" stroke="#e6e1cf" stroke-width="2" marker-end="url(#arr)"/>
  <text x="430" y="95" fill="#e6e1cf" font-size="16" text-anchor="middle">|</text>

  <text x="95" y="160" fill="#5c6773" font-size="11" text-anchor="middle">stdout (fd 1)</text>
  <text x="320" y="160" fill="#5c6773" font-size="11" text-anchor="middle">stdin to stdout</text>
  <text x="545" y="160" fill="#5c6773" font-size="11" text-anchor="middle">stdout to terminal</text>

  <text x="320" y="188" fill="#5c6773" font-size="12" text-anchor="middle">Each | wires the left command's stdout into the right command's stdin; all run concurrently.</text>
</svg>
