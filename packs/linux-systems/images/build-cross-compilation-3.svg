<svg xmlns="http://www.w3.org/2000/svg" width="820" height="330" viewBox="0 0 820 330" font-family="sans-serif">
  <rect width="820" height="330" fill="#ffffff"/>
  <text x="410" y="30" fill="#000000" font-size="17" font-weight="bold" text-anchor="middle">make rebuilds only what changed</text>

  <defs>
    <marker id="bc3arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <text x="200" y="62" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">You edit ONE file: util.c</text>

  <!-- main.c unchanged -->
  <rect x="40" y="80" width="130" height="55" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="105" y="105" fill="#000000" font-size="12" text-anchor="middle">main.c</text>
  <text x="105" y="124" fill="#444444" font-size="10" text-anchor="middle">unchanged</text>

  <!-- util.c changed -->
  <rect x="40" y="160" width="130" height="55" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  <text x="105" y="185" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">util.c</text>
  <text x="105" y="204" fill="#000000" font-size="10" text-anchor="middle">** EDITED **</text>

  <!-- main.o skipped -->
  <rect x="320" y="80" width="130" height="55" fill="#ffffff" stroke="#000000" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="385" y="105" fill="#000000" font-size="12" text-anchor="middle">main.o</text>
  <text x="385" y="124" fill="#444444" font-size="10" text-anchor="middle">reused, skipped</text>
  <line x1="170" y1="107" x2="318" y2="107" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#bc3arr)"/>
  <text x="244" y="98" fill="#444444" font-size="9" text-anchor="middle">not recompiled</text>

  <!-- util.o rebuilt -->
  <rect x="320" y="160" width="130" height="55" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  <text x="385" y="185" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">util.o</text>
  <text x="385" y="204" fill="#000000" font-size="10" text-anchor="middle">REBUILT</text>
  <line x1="170" y1="187" x2="318" y2="187" stroke="#000000" stroke-width="2" marker-end="url(#bc3arr)"/>
  <text x="244" y="178" fill="#000000" font-size="9" text-anchor="middle">recompile</text>

  <!-- relink -->
  <rect x="600" y="120" width="160" height="75" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="680" y="155" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">program</text>
  <text x="680" y="176" fill="#444444" font-size="10" text-anchor="middle">re-linked</text>
  <line x1="450" y1="120" x2="598" y2="150" stroke="#000000" stroke-width="2" marker-end="url(#bc3arr)"/>
  <line x1="450" y1="187" x2="598" y2="165" stroke="#000000" stroke-width="2" marker-end="url(#bc3arr)"/>

  <text x="410" y="262" fill="#000000" font-size="12" text-anchor="middle">make checks timestamps: main.o is newer than main.c, so it is reused. Only util.o is rebuilt, then everything is linked.</text>
  <text x="410" y="290" fill="#000000" font-size="12" text-anchor="middle">Like an assembly line that re-does only the one station whose part changed -- fast, even for huge projects.</text>
  <text x="410" y="314" fill="#444444" font-size="11" text-anchor="middle">(Dashed box = skipped. Bold box = rebuilt.)</text>
</svg>
