<svg xmlns="http://www.w3.org/2000/svg" width="660" height="320" viewBox="0 0 660 320" font-family="sans-serif">
  <rect width="660" height="320" fill="#ffffff"/>
  <text x="330" y="30" fill="#000000" font-size="18" text-anchor="middle">One line of /etc/passwd, field by field</text>
  <text x="330" y="52" fill="#000000" font-size="12" text-anchor="middle">This file lists accounts. It is readable by everyone, so it holds NO password.</text>

  <!-- the raw line -->
  <text x="330" y="92" fill="#000000" font-size="15" text-anchor="middle" font-family="monospace">alice:x:1000:1000:Alice Smith:/home/alice:/bin/bash</text>

  <!-- field labels with connectors -->
  <line x1="55"  y1="100" x2="55"  y2="140" stroke="#000000"/>
  <line x1="120" y1="100" x2="120" y2="170" stroke="#000000"/>
  <line x1="160" y1="100" x2="160" y2="140" stroke="#000000"/>
  <line x1="205" y1="100" x2="205" y2="170" stroke="#000000"/>
  <line x1="300" y1="100" x2="300" y2="140" stroke="#000000"/>
  <line x1="430" y1="100" x2="430" y2="170" stroke="#000000"/>
  <line x1="560" y1="100" x2="560" y2="140" stroke="#000000"/>

  <text x="55"  y="155" fill="#000000" font-size="11" text-anchor="middle">user name</text>
  <text x="120" y="185" fill="#000000" font-size="11" text-anchor="middle">x = password is</text>
  <text x="120" y="199" fill="#000000" font-size="11" text-anchor="middle">kept elsewhere</text>
  <text x="160" y="155" fill="#000000" font-size="11" text-anchor="middle">UID 1000</text>
  <text x="205" y="185" fill="#000000" font-size="11" text-anchor="middle">primary</text>
  <text x="205" y="199" fill="#000000" font-size="11" text-anchor="middle">group (GID)</text>
  <text x="300" y="155" fill="#000000" font-size="11" text-anchor="middle">full name (comment)</text>
  <text x="430" y="185" fill="#000000" font-size="11" text-anchor="middle">home folder</text>
  <text x="560" y="155" fill="#000000" font-size="11" text-anchor="middle">login shell</text>

  <!-- shadow callout -->
  <rect x="120" y="225" width="420" height="70" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="330" y="250" fill="#000000" font-size="14" text-anchor="middle">The real password hash lives in /etc/shadow</text>
  <text x="330" y="272" fill="#000000" font-size="12" text-anchor="middle">readable by root only - so other users cannot copy your hash</text>
  <text x="330" y="289" fill="#000000" font-size="11" text-anchor="middle">a hash is a scrambled, one-way version of the password</text>
</svg>
