<svg xmlns="http://www.w3.org/2000/svg" width="820" height="340" viewBox="0 0 820 340" font-family="sans-serif">
  <rect width="820" height="340" fill="#ffffff"/>
  <text x="410" y="30" fill="#000000" font-size="17" font-weight="bold" text-anchor="middle">Static library vs dynamic library</text>

  <defs>
    <marker id="bc4arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- divider -->
  <line x1="410" y1="55" x2="410" y2="300" stroke="#000000" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- STATIC side -->
  <text x="205" y="62" fill="#000000" font-size="14" font-weight="bold" text-anchor="middle">STATIC  (.a)  -- baked in</text>

  <rect x="120" y="80" width="170" height="120" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="205" y="104" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">your program</text>
  <rect x="140" y="120" width="130" height="60" fill="#ffffff" stroke="#000000" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="205" y="146" fill="#000000" font-size="11" text-anchor="middle">copy of the</text>
  <text x="205" y="164" fill="#000000" font-size="11" text-anchor="middle">library code</text>

  <text x="205" y="228" fill="#000000" font-size="11" text-anchor="middle">Library code is copied INTO</text>
  <text x="205" y="246" fill="#000000" font-size="11" text-anchor="middle">the program at build time.</text>
  <text x="205" y="270" fill="#444444" font-size="10" text-anchor="middle">+ self-contained, runs anywhere</text>
  <text x="205" y="286" fill="#444444" font-size="10" text-anchor="middle">- bigger; fixes need a rebuild</text>

  <!-- DYNAMIC side -->
  <text x="612" y="62" fill="#000000" font-size="14" font-weight="bold" text-anchor="middle">DYNAMIC  (.so)  -- shared</text>

  <rect x="470" y="80" width="120" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="530" y="115" fill="#000000" font-size="12" text-anchor="middle">program A</text>
  <rect x="630" y="80" width="120" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="690" y="115" fill="#000000" font-size="12" text-anchor="middle">program B</text>

  <rect x="540" y="190" width="140" height="55" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  <text x="610" y="214" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">libfoo.so</text>
  <text x="610" y="232" fill="#444444" font-size="9" text-anchor="middle">one shared copy</text>

  <line x1="530" y1="140" x2="595" y2="188" stroke="#000000" stroke-width="2" marker-end="url(#bc4arr)"/>
  <line x1="690" y1="140" x2="625" y2="188" stroke="#000000" stroke-width="2" marker-end="url(#bc4arr)"/>
  <text x="612" y="170" fill="#444444" font-size="10" text-anchor="middle">loaded at run time</text>

  <text x="612" y="270" fill="#444444" font-size="10" text-anchor="middle">+ smaller; one fix updates everyone</text>
  <text x="612" y="286" fill="#444444" font-size="10" text-anchor="middle">- the .so must be found at run time</text>

  <text x="410" y="320" fill="#000000" font-size="12" text-anchor="middle">Static = the recipe printed inside each cookbook. Dynamic = one shared cookbook on a shelf many cooks open.</text>
</svg>
