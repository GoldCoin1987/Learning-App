<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="sans-serif" font-size="14">
  <rect width="720" height="400" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="17" text-anchor="middle">/sys: the kernel's map of your hardware</text>
  <text x="360" y="50" fill="#000000" font-size="13" text-anchor="middle">Folders describe each device; reading a file tells you its state</text>

  <!-- /sys root -->
  <rect x="290" y="70" width="140" height="40" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="360" y="96" fill="#000000" text-anchor="middle" font-family="monospace" font-size="14">/sys</text>

  <!-- class -->
  <rect x="120" y="150" width="200" height="50" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="220" y="172" fill="#000000" text-anchor="middle" font-family="monospace" font-size="12">/sys/class/net/</text>
  <text x="220" y="190" fill="#000000" text-anchor="middle" font-size="11">grouped by what they do</text>

  <!-- devices -->
  <rect x="400" y="150" width="200" height="50" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="500" y="172" fill="#000000" text-anchor="middle" font-family="monospace" font-size="12">/sys/devices/</text>
  <text x="500" y="190" fill="#000000" text-anchor="middle" font-size="11">the real device tree</text>

  <line x1="330" y1="110" x2="220" y2="150" stroke="#000000" stroke-width="1.5"/>
  <line x1="390" y1="110" x2="500" y2="150" stroke="#000000" stroke-width="1.5"/>

  <!-- eth0 detail -->
  <rect x="120" y="240" width="200" height="120" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="220" y="265" fill="#000000" text-anchor="middle" font-family="monospace" font-size="12">.../net/eth0/</text>
  <text x="135" y="290" fill="#000000" font-family="monospace" font-size="12">operstate -&gt; up</text>
  <text x="135" y="312" fill="#000000" font-family="monospace" font-size="12">address  -&gt; MAC</text>
  <text x="135" y="334" fill="#000000" font-family="monospace" font-size="12">speed    -&gt; 1000</text>
  <text x="220" y="354" fill="#000000" text-anchor="middle" font-size="11">read these with cat</text>
  <line x1="220" y1="200" x2="220" y2="240" stroke="#000000" stroke-width="1.5"/>

  <!-- symlink note -->
  <rect x="400" y="240" width="200" height="120" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="500" y="270" fill="#000000" text-anchor="middle" font-size="12">class/ entries are</text>
  <text x="500" y="290" fill="#000000" text-anchor="middle" font-size="12">shortcuts (symlinks)</text>
  <text x="500" y="310" fill="#000000" text-anchor="middle" font-size="12">into devices/</text>
  <text x="500" y="338" fill="#000000" text-anchor="middle" font-size="11">one device,</text>
  <text x="500" y="356" fill="#000000" text-anchor="middle" font-size="11">many views</text>

  <line x1="320" y1="300" x2="400" y2="300" stroke="#000000" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ar3)"/>

  <defs>
    <marker id="ar3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
