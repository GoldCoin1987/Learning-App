<svg xmlns="http://www.w3.org/2000/svg" width="780" height="320" viewBox="0 0 780 320" font-family="sans-serif">
  <rect width="780" height="320" fill="#ffffff"/>
  <text x="390" y="30" fill="#000000" font-size="18" font-weight="bold" text-anchor="middle">Two main Linux families: same idea, different words</text>

  <!-- Debian/Ubuntu column -->
  <rect x="40" y="60" width="320" height="220" rx="10" fill="#ffffff" stroke="#000000" stroke-width="2.5"/>
  <text x="200" y="88" fill="#000000" font-size="15" font-weight="bold" text-anchor="middle">Debian / Ubuntu</text>
  <line x1="60" y1="100" x2="340" y2="100" stroke="#000000" stroke-width="1"/>
  <text x="200" y="124" fill="#000000" font-size="13" text-anchor="middle">command:  apt</text>
  <text x="200" y="150" fill="#000000" font-size="13" text-anchor="middle">package file:  .deb</text>
  <text x="200" y="182" fill="#000000" font-size="12" text-anchor="middle">apt install firefox</text>
  <text x="200" y="206" fill="#000000" font-size="12" text-anchor="middle">apt remove firefox</text>
  <text x="200" y="230" fill="#000000" font-size="12" text-anchor="middle">apt update</text>
  <text x="200" y="262" fill="#000000" font-size="11" text-anchor="middle">(also: Mint, Debian, Pop!_OS)</text>

  <!-- Fedora/RHEL column -->
  <rect x="420" y="60" width="320" height="220" rx="10" fill="#ffffff" stroke="#000000" stroke-width="2.5"/>
  <text x="580" y="88" fill="#000000" font-size="15" font-weight="bold" text-anchor="middle">Fedora / RHEL</text>
  <line x1="440" y1="100" x2="720" y2="100" stroke="#000000" stroke-width="1"/>
  <text x="580" y="124" fill="#000000" font-size="13" text-anchor="middle">command:  dnf</text>
  <text x="580" y="150" fill="#000000" font-size="13" text-anchor="middle">package file:  .rpm</text>
  <text x="580" y="182" fill="#000000" font-size="12" text-anchor="middle">dnf install firefox</text>
  <text x="580" y="206" fill="#000000" font-size="12" text-anchor="middle">dnf remove firefox</text>
  <text x="580" y="230" fill="#000000" font-size="12" text-anchor="middle">dnf check-update</text>
  <text x="580" y="262" fill="#000000" font-size="11" text-anchor="middle">(also: CentOS, Rocky, Alma)</text>

  <text x="390" y="306" fill="#000000" font-size="12" text-anchor="middle">Learn the idea once; switching family is mostly translating the command name.</text>
</svg>
