<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360" font-family="sans-serif">
  <rect width="820" height="360" fill="#0f1117"/>
  <text x="410" y="30" fill="#e8e8e8" font-size="18" font-weight="bold" text-anchor="middle">systemd: the manager of background programs</text>

  <defs>
    <marker id="ah6" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f7cff"/>
    </marker>
    <marker id="ah6r" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- systemd box -->
  <rect x="40" y="120" width="200" height="110" rx="10" fill="#3a2f1a" stroke="#fbbf24" stroke-width="2"/>
  <text x="140" y="160" fill="#fde68a" font-size="18" font-weight="bold" text-anchor="middle">systemd</text>
  <text x="140" y="184" fill="#cfd8ec" font-size="12" text-anchor="middle">PID 1, the manager</text>
  <text x="140" y="204" fill="#8893a8" font-size="11" text-anchor="middle">starts / stops / watches</text>

  <!-- services -->
  <rect x="360" y="70" width="200" height="46" rx="8" fill="#173a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="460" y="98" fill="#a7f3c8" font-size="13" text-anchor="middle">sshd.service (running)</text>

  <rect x="360" y="155" width="200" height="46" rx="8" fill="#173a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="460" y="183" fill="#a7f3c8" font-size="13" text-anchor="middle">cron.service (running)</text>

  <rect x="360" y="240" width="200" height="46" rx="8" fill="#3a2230" stroke="#ff6b8a" stroke-width="2"/>
  <text x="460" y="262" fill="#ffb3c4" font-size="13" text-anchor="middle">myapp.service</text>
  <text x="460" y="278" fill="#cfd8ec" font-size="10" text-anchor="middle">crashed!</text>

  <!-- manage arrows -->
  <line x1="240" y1="150" x2="358" y2="100" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah6)"/>
  <line x1="240" y1="175" x2="358" y2="178" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah6)"/>
  <line x1="240" y1="200" x2="358" y2="258" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah6)"/>

  <!-- restart loop -->
  <path d="M560,263 C660,263 660,150 562,150" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#ah6r)"/>
  <text x="690" y="205" fill="#a7f3c8" font-size="11" text-anchor="middle">restarts it</text>
  <text x="690" y="220" fill="#a7f3c8" font-size="11" text-anchor="middle">automatically</text>

  <text x="410" y="330" fill="#8893a8" font-size="12" text-anchor="middle">Each background program (a "service" / "daemon") is started, supervised, and restarted by systemd.</text>
</svg>
