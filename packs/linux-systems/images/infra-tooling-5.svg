<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="sans-serif">
  <rect width="720" height="430" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">Ansible: one checklist, applied to many machines over SSH</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#111">"Agentless" means nothing special is installed on the machines first</text>

  <!-- Playbook + inventory -->
  <rect x="40" y="80" width="190" height="80" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="135" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Playbook (YAML)</text>
  <text x="135" y="126" text-anchor="middle" font-size="11" fill="#111">the checklist of</text>
  <text x="135" y="142" text-anchor="middle" font-size="11" fill="#111">what each machine needs</text>

  <rect x="40" y="175" width="190" height="80" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="135" y="199" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Inventory</text>
  <text x="135" y="221" text-anchor="middle" font-size="11" fill="#111">the LIST of which</text>
  <text x="135" y="237" text-anchor="middle" font-size="11" fill="#111">machines to do it to</text>

  <!-- Control node -->
  <rect x="280" y="120" width="150" height="100" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="355" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Control node</text>
  <text x="355" y="172" text-anchor="middle" font-size="11" fill="#111">reads checklist,</text>
  <text x="355" y="188" text-anchor="middle" font-size="11" fill="#111">connects out and</text>
  <text x="355" y="204" text-anchor="middle" font-size="11" fill="#111">applies it</text>

  <!-- arrows in -->
  <defs>
    <marker id="a5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#111"/></marker>
  </defs>
  <line x1="230" y1="120" x2="278" y2="150" stroke="#111" stroke-width="2" marker-end="url(#a5)"/>
  <line x1="230" y1="215" x2="278" y2="190" stroke="#111" stroke-width="2" marker-end="url(#a5)"/>

  <!-- SSH lines to machines -->
  <line x1="430" y1="150" x2="520" y2="110" stroke="#047857" stroke-width="2" marker-end="url(#a5)"/>
  <line x1="430" y1="170" x2="520" y2="175" stroke="#047857" stroke-width="2" marker-end="url(#a5)"/>
  <line x1="430" y1="190" x2="520" y2="240" stroke="#047857" stroke-width="2" marker-end="url(#a5)"/>
  <text x="475" y="135" text-anchor="middle" font-size="10" fill="#047857">over SSH</text>

  <!-- machines -->
  <rect x="525" y="85" width="160" height="50" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
  <text x="605" y="106" text-anchor="middle" font-size="12" fill="#111">web-01</text>
  <text x="605" y="124" text-anchor="middle" font-size="10" fill="#065f46">now matches the checklist</text>
  <rect x="525" y="150" width="160" height="50" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
  <text x="605" y="171" text-anchor="middle" font-size="12" fill="#111">web-02</text>
  <text x="605" y="189" text-anchor="middle" font-size="10" fill="#065f46">same state, every run</text>
  <rect x="525" y="215" width="160" height="50" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
  <text x="605" y="236" text-anchor="middle" font-size="12" fill="#111">db-01</text>
  <text x="605" y="254" text-anchor="middle" font-size="10" fill="#065f46">no agent needed</text>

  <!-- takeaway -->
  <rect x="40" y="300" width="645" height="100" fill="#ffffff" stroke="#111" stroke-width="2"/>
  <text x="362" y="328" text-anchor="middle" font-size="13" fill="#111">Playbook = WHAT each machine should look like.</text>
  <text x="362" y="350" text-anchor="middle" font-size="13" fill="#111">Inventory = WHICH machines to apply it to.</text>
  <text x="362" y="372" text-anchor="middle" font-size="13" fill="#111">Ansible logs in over SSH and makes each machine MATCH the checklist.</text>
  <text x="362" y="392" text-anchor="middle" font-size="12" font-style="italic" fill="#111">Nothing pre-installed on the machines: if you can SSH in, you can manage it.</text>
</svg>
