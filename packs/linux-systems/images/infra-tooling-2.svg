<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="sans-serif">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">One computer by hand vs many computers reliably</text>

  <!-- LEFT: one box by hand -->
  <text x="180" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8">One computer, set up by hand</text>
  <rect x="80" y="80" width="200" height="90" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="180" y="112" text-anchor="middle" font-size="13" fill="#111">You type the commands</text>
  <text x="180" y="132" text-anchor="middle" font-size="13" fill="#111">install, edit files,</text>
  <text x="180" y="152" text-anchor="middle" font-size="13" fill="#111">start the service</text>
  <text x="180" y="195" text-anchor="middle" font-size="12" font-style="italic" fill="#111">Fine. It works.</text>

  <!-- person -->
  <circle cx="60" cy="100" r="10" fill="#ffffff" stroke="#111" stroke-width="2"/>
  <line x1="60" y1="110" x2="60" y2="135" stroke="#111" stroke-width="2"/>
  <line x1="60" y1="118" x2="78" y2="125" stroke="#111" stroke-width="2"/>

  <!-- divider -->
  <line x1="360" y1="70" x2="360" y2="300" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- RIGHT: fleet -->
  <text x="540" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#b45309">Fifty computers (a "fleet")</text>
  <rect x="430" y="80" width="80" height="40" fill="#fde68a" stroke="#111" stroke-width="2"/>
  <text x="470" y="105" text-anchor="middle" font-size="11" fill="#111">server</text>
  <rect x="520" y="80" width="80" height="40" fill="#fde68a" stroke="#111" stroke-width="2"/>
  <text x="560" y="105" text-anchor="middle" font-size="11" fill="#111">server</text>
  <rect x="610" y="80" width="80" height="40" fill="#fde68a" stroke="#111" stroke-width="2"/>
  <text x="650" y="105" text-anchor="middle" font-size="11" fill="#111">server</text>
  <rect x="430" y="128" width="80" height="40" fill="#fde68a" stroke="#111" stroke-width="2"/>
  <text x="470" y="153" text-anchor="middle" font-size="11" fill="#111">server</text>
  <rect x="520" y="128" width="80" height="40" fill="#fde68a" stroke="#111" stroke-width="2"/>
  <text x="560" y="153" text-anchor="middle" font-size="11" fill="#111">server</text>
  <rect x="610" y="128" width="80" height="40" fill="#fde68a" stroke="#111" stroke-width="2"/>
  <text x="650" y="153" text-anchor="middle" font-size="11" fill="#111">...x50</text>
  <text x="540" y="195" text-anchor="middle" font-size="12" font-style="italic" fill="#111">By hand? Slow, and</text>
  <text x="540" y="213" text-anchor="middle" font-size="12" font-style="italic" fill="#111">each ends up slightly different.</text>

  <!-- bottom takeaway -->
  <rect x="60" y="320" width="600" height="80" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="360" y="350" text-anchor="middle" font-size="13" fill="#111">Doing one machine by hand is fine. Doing many the SAME way,</text>
  <text x="360" y="372" text-anchor="middle" font-size="13" fill="#111">every time, even after a rebuild, is the hard part.</text>
  <text x="360" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Goal: reproducible, not "remembered."</text>
</svg>
