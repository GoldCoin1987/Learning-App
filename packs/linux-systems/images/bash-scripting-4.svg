<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="monospace">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">if / then: do something only when a test is true</text>

  <defs>
    <marker id="ar4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- code -->
  <rect x="40" y="60" width="300" height="120" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="54" y="86" fill="#000000" font-size="13">if [[ -f report.txt ]]; then</text>
  <text x="54" y="112" fill="#000000" font-size="13">    echo "found it"</text>
  <text x="54" y="138" fill="#000000" font-size="13">else</text>
  <text x="54" y="164" fill="#000000" font-size="13">    echo "missing"</text>

  <!-- flowchart -->
  <rect x="430" y="58" width="220" height="46" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="540" y="80" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">test:  is report.txt a file?</text>
  <text x="540" y="96" fill="#444444" font-size="10" text-anchor="middle">[[ -f report.txt ]]</text>

  <!-- diamond -->
  <polygon points="540,120 620,160 540,200 460,160" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="540" y="165" fill="#000000" font-size="13" text-anchor="middle">true?</text>
  <line x1="540" y1="104" x2="540" y2="118" stroke="#000000" stroke-width="2" marker-end="url(#ar4)"/>

  <!-- yes branch -->
  <line x1="620" y1="160" x2="660" y2="160" stroke="#000000" stroke-width="2" marker-end="url(#ar4)"/>
  <text x="640" y="150" fill="#000000" font-size="11" text-anchor="middle">yes</text>
  <rect x="600" y="220" width="110" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="655" y="245" fill="#000000" font-size="12" text-anchor="middle">"found it"</text>
  <line x1="660" y1="162" x2="655" y2="218" stroke="#000000" stroke-width="2" marker-end="url(#ar4)"/>

  <!-- no branch -->
  <line x1="460" y1="160" x2="420" y2="160" stroke="#000000" stroke-width="2" marker-end="url(#ar4)"/>
  <text x="440" y="150" fill="#000000" font-size="11" text-anchor="middle">no</text>
  <rect x="365" y="220" width="110" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="420" y="245" fill="#000000" font-size="12" text-anchor="middle">"missing"</text>
  <line x1="418" y1="162" x2="420" y2="218" stroke="#000000" stroke-width="2" marker-end="url(#ar4)"/>

  <text x="190" y="220" fill="#000000" font-size="11" text-anchor="middle">[[ ... ]] is the test;</text>
  <text x="190" y="238" fill="#000000" font-size="11" text-anchor="middle">-f means "is a real file".</text>
  <text x="190" y="262" fill="#000000" font-size="11" text-anchor="middle">then = if true, else = otherwise.</text>

  <text x="360" y="320" fill="#000000" font-size="12" text-anchor="middle">A test like  [[ -f file ]]  is either true or false. The "then" part runs only when it is true.</text>
  <text x="360" y="348" fill="#444444" font-size="11" text-anchor="middle">Use  [[ ]]  for files/strings and  (( ))  for number comparisons like  (( count &gt; 0 )).</text>
</svg>
