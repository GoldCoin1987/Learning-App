<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="sans-serif" font-size="14">
  <rect width="720" height="400" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="17" text-anchor="middle">One process folder: /proc/&lt;pid&gt;/</text>
  <text x="360" y="50" fill="#000000" font-size="13" text-anchor="middle">Each running program gets a folder named by its number (PID)</text>

  <!-- folder -->
  <rect x="250" y="70" width="220" height="46" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="360" y="99" fill="#000000" text-anchor="middle" font-family="monospace" font-size="15">/proc/1492/</text>

  <!-- lines down -->
  <line x1="360" y1="116" x2="360" y2="145" stroke="#000000" stroke-width="1.5"/>

  <!-- entries -->
  <rect x="40" y="150" width="200" height="90" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="140" y="177" fill="#000000" text-anchor="middle" font-family="monospace" font-size="13">cmdline</text>
  <text x="140" y="200" fill="#000000" text-anchor="middle" font-size="12">the exact command</text>
  <text x="140" y="220" fill="#000000" text-anchor="middle" font-size="12">that started it</text>

  <rect x="260" y="150" width="200" height="90" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="360" y="177" fill="#000000" text-anchor="middle" font-family="monospace" font-size="13">status</text>
  <text x="360" y="200" fill="#000000" text-anchor="middle" font-size="12">state, owner,</text>
  <text x="360" y="220" fill="#000000" text-anchor="middle" font-size="12">memory used (VmRSS)</text>

  <rect x="480" y="150" width="200" height="90" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="580" y="177" fill="#000000" text-anchor="middle" font-family="monospace" font-size="13">fd/</text>
  <text x="580" y="200" fill="#000000" text-anchor="middle" font-size="12">every file and socket</text>
  <text x="580" y="220" fill="#000000" text-anchor="middle" font-size="12">it has open</text>

  <!-- connector lines -->
  <line x1="360" y1="145" x2="140" y2="150" stroke="#000000" stroke-width="1.5"/>
  <line x1="360" y1="145" x2="360" y2="150" stroke="#000000" stroke-width="1.5"/>
  <line x1="360" y1="145" x2="580" y2="150" stroke="#000000" stroke-width="1.5"/>

  <!-- maps -->
  <rect x="260" y="265" width="200" height="70" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="360" y="292" fill="#000000" text-anchor="middle" font-family="monospace" font-size="13">maps</text>
  <text x="360" y="315" fill="#000000" text-anchor="middle" font-size="12">its memory regions</text>
  <line x1="360" y1="240" x2="360" y2="265" stroke="#000000" stroke-width="1.5"/>

  <text x="360" y="365" fill="#000000" text-anchor="middle" font-size="12">ps and top read these same files for you.</text>
</svg>
