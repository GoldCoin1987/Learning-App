<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="640" height="420" fill="#0f172a"/>
  <text x="320" y="30" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">Linux Process State Transitions</text>

  <!-- state node style: rect with rounded corners -->
  <!-- R: Running -->
  <rect x="260" y="60" width="120" height="50" rx="8" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/>
  <text x="320" y="82" text-anchor="middle" fill="#dbeafe" font-size="14" font-weight="bold">R</text>
  <text x="320" y="100" text-anchor="middle" fill="#bfdbfe" font-size="11">Running / Runnable</text>

  <!-- S: Interruptible sleep -->
  <rect x="60" y="180" width="120" height="50" rx="8" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
  <text x="120" y="202" text-anchor="middle" fill="#dcfce7" font-size="14" font-weight="bold">S</text>
  <text x="120" y="220" text-anchor="middle" fill="#bbf7d0" font-size="11">Interruptible sleep</text>

  <!-- D: Uninterruptible sleep -->
  <rect x="460" y="180" width="120" height="50" rx="8" fill="#7f1d1d" stroke="#f87171" stroke-width="2"/>
  <text x="520" y="202" text-anchor="middle" fill="#fee2e2" font-size="14" font-weight="bold">D</text>
  <text x="520" y="220" text-anchor="middle" fill="#fecaca" font-size="11">Uninterruptible</text>

  <!-- T: Stopped -->
  <rect x="60" y="320" width="120" height="50" rx="8" fill="#78350f" stroke="#fbbf24" stroke-width="2"/>
  <text x="120" y="342" text-anchor="middle" fill="#fef3c7" font-size="14" font-weight="bold">T</text>
  <text x="120" y="360" text-anchor="middle" fill="#fde68a" font-size="11">Stopped (SIGSTOP)</text>

  <!-- Z: Zombie -->
  <rect x="460" y="320" width="120" height="50" rx="8" fill="#3b0764" stroke="#c084fc" stroke-width="2"/>
  <text x="520" y="342" text-anchor="middle" fill="#f3e8ff" font-size="14" font-weight="bold">Z</text>
  <text x="520" y="360" text-anchor="middle" fill="#e9d5ff" font-size="11">Zombie (defunct)</text>

  <!-- arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- R -> S : blocks on I/O / sleep -->
  <path d="M268,108 C200,140 160,150 130,178" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="160" y="135" fill="#cbd5e1" font-size="10">block (signalable)</text>

  <!-- S -> R : wakeup / signal -->
  <path d="M150,178 C200,150 230,135 280,112" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="205" y="170" fill="#cbd5e1" font-size="10">wakeup</text>

  <!-- R -> D : kernel I/O (no signals) -->
  <path d="M372,108 C440,140 480,150 510,178" fill="none" stroke="#f87171" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="130" fill="#fca5a5" font-size="10">disk/NFS I/O</text>

  <!-- D -> R : I/O completes only -->
  <path d="M495,178 C450,150 420,135 372,112" fill="none" stroke="#f87171" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="408" y="172" fill="#fca5a5" font-size="10">I/O done ONLY</text>

  <!-- R -> T : SIGSTOP / Ctrl-Z -->
  <path d="M268,100 C160,160 110,250 118,318" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="120" y="270" fill="#fde68a" font-size="10">SIGSTOP / Ctrl-Z</text>

  <!-- T -> R : SIGCONT -->
  <path d="M150,322 C200,260 240,160 300,110" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="225" y="250" fill="#fde68a" font-size="10">SIGCONT</text>

  <!-- R -> Z : exit() -->
  <path d="M372,100 C480,160 520,250 520,318" fill="none" stroke="#c084fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="270" fill="#e9d5ff" font-size="10">exit()</text>

  <!-- Z -> gone : parent wait() reaps -->
  <text x="520" y="392" text-anchor="middle" fill="#e9d5ff" font-size="10">parent wait() reaps -&gt; gone</text>

  <text x="320" y="408" text-anchor="middle" fill="#64748b" font-size="11">D-state ignores SIGKILL: a stopped process can't run the signal handler until I/O returns.</text>
</svg>
