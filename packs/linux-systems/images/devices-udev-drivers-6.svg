<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="Helvetica, Arial, sans-serif">
  <rect width="720" height="320" fill="#ffffff"/>
  <text x="360" y="34" fill="#000000" font-size="19" font-weight="bold" text-anchor="middle">How a driver gets matched to its hardware</text>

  <!-- description -->
  <rect x="40" y="70" width="280" height="90" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="180" y="96" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">A description of the device</text>
  <text x="180" y="118" fill="#000000" font-size="11" text-anchor="middle">"there is a temperature sensor</text>
  <text x="180" y="135" fill="#000000" font-size="11" text-anchor="middle">of type acme,temp1 here"</text>
  <text x="180" y="153" fill="#000000" font-size="11" text-anchor="middle">(a device-tree entry)</text>

  <!-- match arrow -->
  <line x1="320" y1="115" x2="400" y2="115" stroke="#000000" stroke-width="2" marker-end="url(#ar)"/>
  <text x="360" y="105" fill="#000000" font-size="11" text-anchor="middle">match</text>

  <!-- driver -->
  <rect x="402" y="70" width="280" height="90" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="542" y="96" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">The matching driver</text>
  <text x="542" y="118" fill="#000000" font-size="11" text-anchor="middle">"I handle acme,temp1"</text>
  <text x="542" y="135" fill="#000000" font-size="11" text-anchor="middle">its setup function runs</text>
  <text x="542" y="153" fill="#000000" font-size="11" text-anchor="middle">to start the device</text>

  <!-- result -->
  <line x1="360" y1="200" x2="360" y2="160" stroke="#000000" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="180" y="205" width="360" height="56" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="360" y="230" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">Result: a working device</text>
  <text x="360" y="250" fill="#000000" font-size="11" text-anchor="middle">a /dev file or /sys entry you can use</text>

  <text x="360" y="295" fill="#000000" font-size="12" text-anchor="middle">The name string is the key: if it does not match, the driver never binds.</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
