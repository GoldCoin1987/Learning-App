<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" font-family="Helvetica, Arial, sans-serif">
  <rect width="760" height="300" fill="#ffffff"/>
  <text x="380" y="34" fill="#000000" font-size="19" font-weight="bold" text-anchor="middle">Plug in a USB stick: the file appears by itself</text>

  <!-- step 1 plug in -->
  <rect x="20" y="80" width="150" height="80" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="95" y="110" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">1. You plug</text>
  <text x="95" y="130" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">in a USB stick</text>

  <line x1="170" y1="120" x2="210" y2="120" stroke="#000000" stroke-width="2" marker-end="url(#ar)"/>

  <!-- step 2 kernel -->
  <rect x="212" y="80" width="160" height="80" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="292" y="106" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">2. Kernel notices</text>
  <text x="292" y="126" fill="#000000" font-size="11" text-anchor="middle">sends an event</text>
  <text x="292" y="143" fill="#000000" font-size="11" text-anchor="middle">(a "uevent")</text>

  <line x1="372" y1="120" x2="412" y2="120" stroke="#000000" stroke-width="2" marker-end="url(#ar)"/>

  <!-- step 3 udev -->
  <rect x="414" y="80" width="160" height="80" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="494" y="106" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">3. udev service</text>
  <text x="494" y="126" fill="#000000" font-size="11" text-anchor="middle">reads its rules,</text>
  <text x="494" y="143" fill="#000000" font-size="11" text-anchor="middle">creates the node</text>

  <line x1="574" y1="120" x2="614" y2="120" stroke="#000000" stroke-width="2" marker-end="url(#ar)"/>

  <!-- step 4 dev node -->
  <rect x="616" y="80" width="130" height="80" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="681" y="110" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">4. /dev/sdb</text>
  <text x="681" y="130" fill="#000000" font-size="11" text-anchor="middle">appears,</text>
  <text x="681" y="147" fill="#000000" font-size="11" text-anchor="middle">ready to use</text>

  <text x="380" y="215" fill="#000000" font-size="13" text-anchor="middle">This is "plug and play": no reboot, no manual setup.</text>
  <text x="380" y="240" fill="#000000" font-size="12" text-anchor="middle">A udev rule can also give the same device a stable name every time,</text>
  <text x="380" y="260" fill="#000000" font-size="12" text-anchor="middle">e.g. always /dev/backup-drive no matter which port you use.</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
