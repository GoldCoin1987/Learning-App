<svg xmlns="http://www.w3.org/2000/svg" width="660" height="420" viewBox="0 0 660 420" font-family="monospace">
  <rect width="660" height="420" fill="#0f1117"/>
  <text x="330" y="32" fill="#e6e6e6" font-size="18" text-anchor="middle" font-family="sans-serif">LVM stack: physical disks -&gt; PV -&gt; VG -&gt; LV -&gt; filesystem</text>

  <!-- Physical disks -->
  <rect x="40" y="60" width="120" height="50" fill="#37474f" stroke="#90a4ae"/>
  <text x="100" y="82" fill="#e6e6e6" font-size="13" text-anchor="middle">/dev/sdb</text>
  <text x="100" y="100" fill="#90a4ae" font-size="11" text-anchor="middle">whole disk / partn</text>
  <rect x="180" y="60" width="120" height="50" fill="#37474f" stroke="#90a4ae"/>
  <text x="240" y="82" fill="#e6e6e6" font-size="13" text-anchor="middle">/dev/sdc1</text>
  <text x="240" y="100" fill="#90a4ae" font-size="11" text-anchor="middle">partition</text>
  <text x="170" y="135" fill="#66bb6a" font-size="12" text-anchor="middle" font-family="sans-serif">pvcreate</text>

  <!-- PV layer -->
  <rect x="40" y="145" width="260" height="46" fill="#1b3a2b" stroke="#66bb6a"/>
  <text x="170" y="167" fill="#a5d6a7" font-size="14" text-anchor="middle">PVs (Physical Volumes)</text>
  <text x="170" y="184" fill="#66bb6a" font-size="11" text-anchor="middle" font-family="sans-serif">disks/partitions tagged for LVM, sliced into PEs</text>
  <text x="170" y="210" fill="#42a5f5" font-size="12" text-anchor="middle" font-family="sans-serif">vgcreate vg0 ...</text>

  <!-- VG layer -->
  <rect x="40" y="220" width="580" height="46" fill="#1a2f4a" stroke="#42a5f5"/>
  <text x="330" y="242" fill="#90caf9" font-size="14" text-anchor="middle">VG  "vg0"  (Volume Group = pool of extents from all PVs)</text>
  <text x="330" y="259" fill="#42a5f5" font-size="11" text-anchor="middle" font-family="sans-serif">free extents can be handed to any LV -&gt; this is what makes online growth possible</text>
  <text x="330" y="288" fill="#ce93d8" font-size="12" text-anchor="middle" font-family="sans-serif">lvcreate / lvextend</text>

  <!-- LV layer -->
  <rect x="40" y="298" width="180" height="46" fill="#3a1f3a" stroke="#ab47bc"/>
  <text x="130" y="320" fill="#ce93d8" font-size="13" text-anchor="middle">LV  lv_root</text>
  <text x="130" y="337" fill="#ab47bc" font-size="11" text-anchor="middle" font-family="sans-serif">/dev/vg0/lv_root</text>
  <rect x="240" y="298" width="180" height="46" fill="#3a1f3a" stroke="#ab47bc"/>
  <text x="330" y="320" fill="#ce93d8" font-size="13" text-anchor="middle">LV  lv_data</text>
  <text x="330" y="337" fill="#ab47bc" font-size="11" text-anchor="middle" font-family="sans-serif">resize online</text>
  <rect x="440" y="298" width="180" height="46" fill="#2a2a3a" stroke="#7e57c2" stroke-dasharray="5 4"/>
  <text x="530" y="320" fill="#b39ddb" font-size="13" text-anchor="middle">LV  snapshot</text>
  <text x="530" y="337" fill="#7e57c2" font-size="11" text-anchor="middle" font-family="sans-serif">CoW point-in-time</text>

  <!-- Filesystem layer -->
  <rect x="40" y="356" width="380" height="44" fill="#4a3a1a" stroke="#ffb74d"/>
  <text x="230" y="378" fill="#ffe0b2" font-size="13" text-anchor="middle">Filesystem (ext4 / XFS)  ->  mounted at /  and  /data</text>
  <text x="230" y="394" fill="#ffb74d" font-size="11" text-anchor="middle" font-family="sans-serif">grow with resize2fs (ext4) or xfs_growfs (XFS) AFTER lvextend</text>
</svg>
