<svg xmlns="http://www.w3.org/2000/svg" width="860" height="260" viewBox="0 0 860 260" font-family="sans-serif">
  <rect width="860" height="260" fill="#ffffff"/>
  <text x="430" y="30" fill="#000000" font-size="18" font-weight="bold" text-anchor="middle">What happens when you run: sudo apt install nginx</text>

  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- Step 1: you ask -->
  <rect x="20" y="80" width="160" height="90" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="100" y="108" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">1. You ask</text>
  <text x="100" y="130" fill="#000000" font-size="11" text-anchor="middle">"install nginx"</text>
  <text x="100" y="150" fill="#000000" font-size="10" text-anchor="middle">(one command)</text>

  <!-- Step 2: repository -->
  <rect x="220" y="80" width="170" height="90" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="305" y="108" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">2. Repository</text>
  <text x="305" y="130" fill="#000000" font-size="11" text-anchor="middle">online store of</text>
  <text x="305" y="148" fill="#000000" font-size="11" text-anchor="middle">trusted programs</text>

  <!-- Step 3: resolve deps -->
  <rect x="430" y="80" width="180" height="90" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="520" y="108" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">3. Resolve deps</text>
  <text x="520" y="130" fill="#000000" font-size="11" text-anchor="middle">find every other</text>
  <text x="520" y="148" fill="#000000" font-size="11" text-anchor="middle">program it needs</text>

  <!-- Step 4: install -->
  <rect x="650" y="80" width="180" height="90" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="740" y="108" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">4. Install</text>
  <text x="740" y="130" fill="#000000" font-size="11" text-anchor="middle">download + set up</text>
  <text x="740" y="148" fill="#000000" font-size="11" text-anchor="middle">all of them</text>

  <!-- arrows -->
  <line x1="180" y1="125" x2="218" y2="125" stroke="#000000" stroke-width="2" marker-end="url(#ah2)"/>
  <line x1="390" y1="125" x2="428" y2="125" stroke="#000000" stroke-width="2" marker-end="url(#ah2)"/>
  <line x1="610" y1="125" x2="648" y2="125" stroke="#000000" stroke-width="2" marker-end="url(#ah2)"/>

  <text x="430" y="220" fill="#000000" font-size="12" text-anchor="middle">The package manager does steps 2 to 4 for you. Like an app store that also installs everything the app needs.</text>
</svg>
