<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="sans-serif">
  <rect width="720" height="430" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">The verifier: a safety checker at the kernel's door</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#111">It checks your program BEFORE it is allowed to run</text>

  <!-- program in -->
  <rect x="30" y="160" width="150" height="90" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="105" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">your eBPF</text>
  <text x="105" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">program</text>
  <text x="105" y="234" text-anchor="middle" font-size="10" fill="#111">wants to load</text>

  <line x1="180" y1="205" x2="238" y2="205" stroke="#111" stroke-width="3"/>
  <polygon points="238,205 226,198 226,212" fill="#111"/>

  <!-- verifier -->
  <rect x="245" y="120" width="230" height="170" fill="#eeeeee" stroke="#111" stroke-width="3"/>
  <text x="360" y="146" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">VERIFIER checks:</text>
  <text x="258" y="174" font-size="11" fill="#111">- Does it always finish?</text>
  <text x="258" y="196" font-size="11" fill="#111">  (no endless loops)</text>
  <text x="258" y="222" font-size="11" fill="#111">- Only touches memory</text>
  <text x="258" y="244" font-size="11" fill="#111">  it is allowed to?</text>
  <text x="258" y="270" font-size="11" fill="#111">- No reading junk data?</text>

  <!-- PASS arrow -->
  <line x1="475" y1="170" x2="540" y2="140" stroke="#111" stroke-width="3"/>
  <polygon points="540,140 526,140 533,153" fill="#111"/>
  <rect x="545" y="105" width="150" height="70" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="620" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">PASS</text>
  <text x="620" y="156" text-anchor="middle" font-size="11" fill="#065f46">runs in the kernel</text>

  <!-- FAIL arrow -->
  <line x1="475" y1="245" x2="540" y2="280" stroke="#111" stroke-width="3"/>
  <polygon points="540,280 526,277 532,290" fill="#111"/>
  <rect x="545" y="250" width="150" height="70" fill="#ffffff" stroke="#111" stroke-width="2"/>
  <text x="620" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">FAIL</text>
  <text x="620" y="301" text-anchor="middle" font-size="11" fill="#111">rejected, never runs</text>

  <text x="360" y="360" text-anchor="middle" font-size="12" fill="#111">An unsafe program is turned away at load time...</text>
  <text x="360" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">...so it can never crash the running kernel.</text>
  <text x="360" y="408" text-anchor="middle" font-size="11" font-style="italic" fill="#111">The trade-off: you cannot do everything a full kernel module could.</text>
</svg>
