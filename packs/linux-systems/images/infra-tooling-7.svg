<svg xmlns="http://www.w3.org/2000/svg" width="760" height="440" viewBox="0 0 760 440" font-family="sans-serif">
  <rect width="760" height="440" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">The production landscape (a map of the words you will hear)</text>
  <text x="380" y="48" text-anchor="middle" font-size="12" fill="#111">You do not need to master these now - just recognize where each one fits</text>

  <!-- 1 Provision -->
  <rect x="30" y="75" width="160" height="110" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">1. Provision</text>
  <text x="110" y="124" text-anchor="middle" font-size="11" fill="#111">create the machines/</text>
  <text x="110" y="140" text-anchor="middle" font-size="11" fill="#111">cloud + network</text>
  <text x="110" y="166" text-anchor="middle" font-size="11" font-style="italic" fill="#1d4ed8">Terraform</text>

  <!-- 2 Configure -->
  <rect x="210" y="75" width="160" height="110" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="290" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">2. Configure</text>
  <text x="290" y="124" text-anchor="middle" font-size="11" fill="#111">set up the inside:</text>
  <text x="290" y="140" text-anchor="middle" font-size="11" fill="#111">packages, files, services</text>
  <text x="290" y="166" text-anchor="middle" font-size="11" font-style="italic" fill="#047857">Ansible</text>

  <!-- 3 Ship -->
  <rect x="390" y="75" width="160" height="110" fill="#fde68a" stroke="#111" stroke-width="2"/>
  <text x="470" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">3. Ship code</text>
  <text x="470" y="124" text-anchor="middle" font-size="11" fill="#111">build + test + deploy</text>
  <text x="470" y="140" text-anchor="middle" font-size="11" fill="#111">automatically</text>
  <text x="470" y="166" text-anchor="middle" font-size="11" font-style="italic" fill="#b45309">CI/CD, containers, Kubernetes</text>

  <!-- 4 Watch -->
  <rect x="570" y="75" width="160" height="110" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
  <text x="650" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">4. Watch</text>
  <text x="650" y="124" text-anchor="middle" font-size="11" fill="#111">logs + numbers,</text>
  <text x="650" y="140" text-anchor="middle" font-size="11" fill="#111">is it healthy?</text>
  <text x="650" y="162" text-anchor="middle" font-size="11" font-style="italic" fill="#6d28d9">Prometheus/Grafana,</text>
  <text x="650" y="178" text-anchor="middle" font-size="11" font-style="italic" fill="#6d28d9">logs, eBPF</text>

  <!-- arrows between stages -->
  <defs>
    <marker id="a7" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#111"/></marker>
  </defs>
  <line x1="190" y1="130" x2="208" y2="130" stroke="#111" stroke-width="3" marker-end="url(#a7)"/>
  <line x1="370" y1="130" x2="388" y2="130" stroke="#111" stroke-width="3" marker-end="url(#a7)"/>
  <line x1="550" y1="130" x2="568" y2="130" stroke="#111" stroke-width="3" marker-end="url(#a7)"/>

  <!-- cross-cutting: secrets -->
  <rect x="120" y="215" width="240" height="70" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="240" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">Secrets (passwords, keys)</text>
  <text x="240" y="262" text-anchor="middle" font-size="11" fill="#111">live in a locked "vault" -</text>
  <text x="240" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#b91c1c">never written into the code</text>

  <!-- cross-cutting: scheduling -->
  <rect x="400" y="215" width="240" height="70" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="520" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">Scheduled jobs</text>
  <text x="520" y="262" text-anchor="middle" font-size="11" fill="#111">run on a timer:</text>
  <text x="520" y="278" text-anchor="middle" font-size="11" fill="#111">cron (classic) or systemd timers</text>

  <!-- the thread -->
  <rect x="60" y="315" width="640" height="100" fill="#ffffff" stroke="#111" stroke-width="2"/>
  <text x="380" y="343" text-anchor="middle" font-size="13" fill="#111">The one big idea connects them all: describe what you want as CODE,</text>
  <text x="380" y="365" text-anchor="middle" font-size="13" fill="#111">let tools make reality match it, automatically and repeatably.</text>
  <text x="380" y="389" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Kubernetes is this same idea at large scale, across a whole cluster.</text>
  <text x="380" y="408" text-anchor="middle" font-size="11" font-style="italic" fill="#111">This is orientation: knowing the map matters more than mastering every tool today.</text>
</svg>
