<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" font-family="monospace">
  <rect width="720" height="340" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">set -euo pipefail: fail fast and loud</text>

  <defs>
    <marker id="ar8" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- WITHOUT -->
  <text x="180" y="62" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">WITHOUT the safety line</text>
  <rect x="40" y="74" width="280" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="180" y="99" fill="#000000" font-size="12" text-anchor="middle">cd /backup   (FAILS, folder gone)</text>
  <line x1="180" y1="114" x2="180" y2="132" stroke="#000000" stroke-width="2" marker-end="url(#ar8)"/>
  <rect x="40" y="134" width="280" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="180" y="159" fill="#000000" font-size="12" text-anchor="middle">rm -rf *   (runs in WRONG dir!)</text>
  <text x="180" y="196" fill="#000000" font-size="11" text-anchor="middle">keeps going after the error &#8594; disaster</text>

  <!-- WITH -->
  <text x="540" y="62" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">WITH set -euo pipefail</text>
  <rect x="400" y="74" width="280" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="540" y="99" fill="#000000" font-size="12" text-anchor="middle">cd /backup   (FAILS, folder gone)</text>
  <line x1="540" y1="114" x2="540" y2="132" stroke="#000000" stroke-width="2" marker-end="url(#ar8)"/>
  <rect x="400" y="134" width="280" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="540" y="159" fill="#000000" font-size="12" text-anchor="middle">script STOPS here immediately</text>
  <text x="540" y="196" fill="#000000" font-size="11" text-anchor="middle">rm never runs &#8594; safe</text>

  <!-- legend -->
  <rect x="120" y="220" width="480" height="78" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="138" y="244" fill="#000000" font-size="12">-e : stop on the first command that fails</text>
  <text x="138" y="266" fill="#000000" font-size="12">-u : stop if you use a variable you never set (catches typos)</text>
  <text x="138" y="288" fill="#000000" font-size="12">-o pipefail : a pipeline fails if ANY stage in it fails</text>

  <text x="360" y="324" fill="#444444" font-size="11" text-anchor="middle">Put  set -euo pipefail  right under the shebang so mistakes halt the script instead of charging on.</text>
</svg>
