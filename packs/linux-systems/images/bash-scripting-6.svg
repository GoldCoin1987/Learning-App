<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" font-family="monospace">
  <rect width="720" height="340" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">Arguments: words typed after the script name</text>

  <defs>
    <marker id="ar6" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- command line -->
  <text x="360" y="64" fill="#000000" font-size="14" text-anchor="middle">./greet.sh   Sam   Alex   Jo</text>

  <!-- brackets to $1 $2 $3 -->
  <rect x="190" y="78" width="70" height="30" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="225" y="98" fill="#000000" font-size="13" text-anchor="middle">Sam</text>
  <rect x="300" y="78" width="70" height="30" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="335" y="98" fill="#000000" font-size="13" text-anchor="middle">Alex</text>
  <rect x="410" y="78" width="70" height="30" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="445" y="98" fill="#000000" font-size="13" text-anchor="middle">Jo</text>

  <line x1="225" y1="108" x2="225" y2="138" stroke="#000000" stroke-width="2" marker-end="url(#ar6)"/>
  <line x1="335" y1="108" x2="335" y2="138" stroke="#000000" stroke-width="2" marker-end="url(#ar6)"/>
  <line x1="445" y1="108" x2="445" y2="138" stroke="#000000" stroke-width="2" marker-end="url(#ar6)"/>

  <text x="225" y="156" fill="#000000" font-size="15" text-anchor="middle" font-weight="bold">$1</text>
  <text x="335" y="156" fill="#000000" font-size="15" text-anchor="middle" font-weight="bold">$2</text>
  <text x="445" y="156" fill="#000000" font-size="15" text-anchor="middle" font-weight="bold">$3</text>

  <!-- aggregate vars -->
  <rect x="120" y="186" width="480" height="86" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="140" y="212" fill="#000000" font-size="13">"$@"  = all arguments  &#8594;  Sam Alex Jo  (each kept separate)</text>
  <text x="140" y="238" fill="#000000" font-size="13">$#    = how many       &#8594;  3</text>
  <text x="140" y="264" fill="#000000" font-size="13">shift = drop $1, so $2 becomes the new $1</text>

  <text x="360" y="300" fill="#000000" font-size="12" text-anchor="middle">Inside the script, the first word is $1, the second $2, and so on. "$@" is the whole list.</text>
  <text x="360" y="326" fill="#444444" font-size="11" text-anchor="middle">For named options like  -o out.txt , use  getopts  instead of counting positions.</text>
</svg>
