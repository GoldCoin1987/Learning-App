<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="Helvetica, Arial, sans-serif">
  <rect width="720" height="320" fill="#ffffff"/>
  <text x="360" y="34" fill="#000000" font-size="19" font-weight="bold" text-anchor="middle">Reading one line of  ls -l /dev/sda</text>

  <!-- the line -->
  <text x="360" y="90" fill="#000000" font-size="20" font-family="Consolas, monospace" font-weight="bold" text-anchor="middle">brw-rw---- 1 root disk 8, 0 /dev/sda</text>

  <!-- type bit -->
  <line x1="60" y1="100" x2="60" y2="150" stroke="#000000" stroke-width="2"/>
  <rect x="20" y="150" width="180" height="60" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="110" y="175" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">b = block device</text>
  <text x="110" y="194" fill="#000000" font-size="11" text-anchor="middle">(c would mean character)</text>

  <!-- major -->
  <line x1="408" y1="100" x2="370" y2="150" stroke="#000000" stroke-width="2"/>
  <rect x="250" y="150" width="190" height="60" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="345" y="175" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">8 = major number</text>
  <text x="345" y="194" fill="#000000" font-size="11" text-anchor="middle">which driver handles it</text>

  <!-- minor -->
  <line x1="432" y1="100" x2="560" y2="150" stroke="#000000" stroke-width="2"/>
  <rect x="490" y="150" width="200" height="60" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="590" y="175" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">0 = minor number</text>
  <text x="590" y="194" fill="#000000" font-size="11" text-anchor="middle">which exact device</text>

  <text x="360" y="265" fill="#000000" font-size="13" text-anchor="middle">Where a normal file shows its size, a device file shows two numbers:</text>
  <text x="360" y="288" fill="#000000" font-size="13" text-anchor="middle">major (the driver) and minor (the specific device).</text>
</svg>
