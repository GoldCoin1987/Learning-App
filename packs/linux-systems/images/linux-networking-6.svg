<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="18" text-anchor="middle" font-weight="bold">Linux as a router: forwarding between two networks</text>
  <text x="360" y="48" fill="#000000" font-size="12" text-anchor="middle">A building mailroom: take a letter in one door, pass it out the right one</text>

  <!-- left network -->
  <rect x="30" y="120" width="150" height="100" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="105" y="148" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">Network A</text>
  <text x="105" y="172" fill="#000000" font-size="11" text-anchor="middle">10.0.1.0/24</text>
  <text x="105" y="196" fill="#000000" font-size="11" text-anchor="middle">a laptop</text>

  <!-- the linux router -->
  <rect x="270" y="100" width="180" height="140" fill="#eeeeee" stroke="#000000" stroke-width="2"/>
  <text x="360" y="126" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">Linux box</text>
  <text x="360" y="146" fill="#000000" font-size="11" text-anchor="middle">two interfaces</text>
  <text x="290" y="170" fill="#000000" font-size="10" font-family="monospace">eth0</text>
  <text x="400" y="170" fill="#000000" font-size="10" font-family="monospace">eth1</text>
  <rect x="288" y="184" width="144" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="360" y="200" fill="#000000" font-size="10" text-anchor="middle">forwarding switch:</text>
  <text x="360" y="216" fill="#000000" font-size="10" font-family="monospace" text-anchor="middle">ip_forward = 1</text>

  <!-- right network -->
  <rect x="540" y="120" width="150" height="100" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="615" y="148" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">Network B</text>
  <text x="615" y="172" fill="#000000" font-size="11" text-anchor="middle">10.0.2.0/24</text>
  <text x="615" y="196" fill="#000000" font-size="11" text-anchor="middle">a server</text>

  <!-- arrows through -->
  <line x1="180" y1="160" x2="268" y2="160" stroke="#000000" stroke-width="2"/>
  <polygon points="268,155 278,160 268,165" fill="#000000"/>
  <line x1="452" y1="160" x2="538" y2="160" stroke="#000000" stroke-width="2"/>
  <polygon points="538,155 548,160 538,165" fill="#000000"/>

  <!-- off / on note -->
  <rect x="30" y="260" width="660" height="90" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="40" y="284" fill="#000000" font-size="11">By default the switch is OFF: a normal Linux host keeps its own traffic and</text>
  <text x="40" y="302" fill="#000000" font-size="11">will NOT pass packets between networks (a closed mailroom).</text>
  <text x="40" y="326" fill="#000000" font-size="11" font-family="monospace">Turn it on:  sysctl -w net.ipv4.ip_forward=1   -&gt;  now it acts as a router.</text>
</svg>
