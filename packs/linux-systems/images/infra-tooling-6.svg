<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="sans-serif">
  <rect width="720" height="430" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">Idempotent: run it once or twice, same end state</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#111">Like a thermostat: you set 70 degrees once, and it just keeps the room at 70</text>

  <!-- Run 1 -->
  <text x="180" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8">Run #1</text>
  <rect x="60" y="95" width="100" height="50" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="110" y="118" text-anchor="middle" font-size="11" fill="#111">starting</text>
  <text x="110" y="134" text-anchor="middle" font-size="11" fill="#111">machine</text>
  <line x1="160" y1="120" x2="208" y2="120" stroke="#111" stroke-width="3" marker-end="url(#a6)"/>
  <text x="184" y="112" text-anchor="middle" font-size="10" fill="#111">apply</text>
  <rect x="210" y="95" width="110" height="50" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="265" y="113" text-anchor="middle" font-size="11" fill="#111">server installed,</text>
  <text x="265" y="129" text-anchor="middle" font-size="11" fill="#111">running</text>
  <text x="265" y="162" text-anchor="middle" font-size="11" font-style="italic" fill="#111">It made changes.</text>

  <defs>
    <marker id="a6" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#111"/></marker>
  </defs>

  <!-- Run 2 -->
  <text x="180" y="210" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8">Run #2 (same checklist again)</text>
  <rect x="60" y="225" width="100" height="50" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="110" y="248" text-anchor="middle" font-size="11" fill="#111">already</text>
  <text x="110" y="264" text-anchor="middle" font-size="11" fill="#111">set up</text>
  <line x1="160" y1="250" x2="208" y2="250" stroke="#111" stroke-width="3" marker-end="url(#a6)"/>
  <text x="184" y="242" text-anchor="middle" font-size="10" fill="#111">apply</text>
  <rect x="210" y="225" width="110" height="50" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="265" y="243" text-anchor="middle" font-size="11" fill="#111">server installed,</text>
  <text x="265" y="259" text-anchor="middle" font-size="11" fill="#111">running</text>
  <text x="265" y="292" text-anchor="middle" font-size="11" font-style="italic" fill="#111">Nothing to change. No-op.</text>

  <!-- check vs no-op panel -->
  <rect x="380" y="95" width="300" height="180" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="530" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">How it stays safe to re-run</text>
  <text x="530" y="150" text-anchor="middle" font-size="12" fill="#111">For each item it first CHECKS:</text>
  <text x="530" y="174" text-anchor="middle" font-size="12" fill="#111">"Is this already true?"</text>
  <text x="530" y="202" text-anchor="middle" font-size="12" fill="#111">Yes  to  leave it alone</text>
  <text x="530" y="226" text-anchor="middle" font-size="12" fill="#111">No  to  fix just that one thing</text>
  <text x="530" y="256" text-anchor="middle" font-size="11" font-style="italic" fill="#111">So extra runs do not pile up or break things.</text>

  <!-- takeaway -->
  <rect x="60" y="320" width="620" height="85" fill="#ffffff" stroke="#111" stroke-width="2"/>
  <text x="370" y="350" text-anchor="middle" font-size="13" fill="#111">"Idempotent" = running it again does not change the result.</text>
  <text x="370" y="372" text-anchor="middle" font-size="13" fill="#111">The tool describes the DESIRED END STATE and only fixes what is off.</text>
  <text x="370" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">That is why it is always safe to run a playbook again.</text>
</svg>
