<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="sans-serif">
  <rect width="720" height="400" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">The Two Primitives Beneath a Container</text>

  <!-- cgroups outer ring (limits) -->
  <rect x="120" y="60" width="480" height="250" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="360" y="84" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e">cgroups = resource LIMITS</text>
  <text x="360" y="104" text-anchor="middle" font-size="12" fill="#92400e">caps how much CPU and memory the app may use</text>

  <!-- namespaces inner ring (isolation) -->
  <rect x="180" y="120" width="360" height="150" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="360" y="144" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">namespaces = ISOLATION</text>
  <text x="360" y="164" text-anchor="middle" font-size="12" fill="#1e40af">give the app its own private view</text>
  <text x="360" y="180" text-anchor="middle" font-size="11" fill="#1e40af">(own process list, files, network, hostname)</text>

  <!-- the process -->
  <rect x="290" y="196" width="140" height="56" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="360" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">Your app</text>
  <text x="360" y="240" text-anchor="middle" font-size="12" fill="#065f46">(an ordinary process)</text>

  <text x="360" y="340" text-anchor="middle" font-size="14" fill="#111">A container is just a normal process wrapped by two kernel features:</text>
  <text x="360" y="364" text-anchor="middle" font-size="13" fill="#111">namespaces decide what it can SEE; cgroups decide how much it can USE.</text>
  <text x="360" y="388" text-anchor="middle" font-size="13" fill="#111">Both come from the one shared host kernel -- no second OS is involved.</text>
</svg>
