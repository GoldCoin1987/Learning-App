<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="30" fill="#000000" font-size="19" font-weight="bold" text-anchor="middle">A read() Call: from your program to the disk and back</text>

  <defs>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- mode labels -->
  <text x="60" y="70" fill="#000000" font-size="12" font-weight="bold">USER MODE</text>
  <text x="60" y="220" fill="#000000" font-size="12" font-weight="bold">KERNEL MODE</text>
  <line x1="40" y1="150" x2="680" y2="150" stroke="#000000" stroke-width="1.5" stroke-dasharray="7 5"/>

  <!-- step 1: program -->
  <rect x="40" y="80" width="180" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="130" y="104" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">1. Your program</text>
  <text x="130" y="123" fill="#000000" font-size="11" text-anchor="middle">asks: read(file)</text>

  <!-- step 2: switch (crosses line) -->
  <line x1="130" y1="136" x2="130" y2="178" stroke="#000000" stroke-width="2" marker-end="url(#arr)"/>
  <text x="140" y="166" fill="#000000" font-size="10">switch to kernel mode</text>

  <!-- step 3: kernel -->
  <rect x="40" y="180" width="200" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="140" y="204" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">2. Kernel takes over</text>
  <text x="140" y="223" fill="#000000" font-size="11" text-anchor="middle">finds the file, talks to disk</text>

  <!-- step 4: disk -->
  <line x1="240" y1="208" x2="318" y2="208" stroke="#000000" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="320" y="180" width="160" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="400" y="204" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">3. Disk drive</text>
  <text x="400" y="223" fill="#000000" font-size="11" text-anchor="middle">hands over the data</text>

  <!-- return path: disk -> kernel copies up -->
  <line x1="400" y1="180" x2="400" y2="120" stroke="#000000" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="400" y1="116" x2="520" y2="116" stroke="#000000" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arr)"/>

  <!-- step 5: data back to program -->
  <rect x="520" y="88" width="170" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="605" y="112" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">4. Data returned</text>
  <text x="605" y="131" fill="#000000" font-size="11" text-anchor="middle">program resumes</text>

  <text x="360" y="300" fill="#000000" font-size="12" text-anchor="middle">The CPU switches to kernel mode only for the duration of the call,</text>
  <text x="360" y="320" fill="#000000" font-size="12" text-anchor="middle">then switches back to user mode so your program can continue.</text>
</svg>
