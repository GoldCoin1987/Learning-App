<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="sans-serif">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Virtual Machines vs Containers</text>

  <!-- VM side -->
  <text x="180" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8">Virtual Machines</text>
  <rect x="40" y="70" width="280" height="50" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="180" y="100" text-anchor="middle" font-size="13" fill="#111">App A / App B (each w/ own libs)</text>
  <rect x="40" y="122" width="280" height="50" fill="#bfdbfe" stroke="#1d4ed8"/>
  <text x="180" y="152" text-anchor="middle" font-size="13" fill="#111">Guest OS + Guest Kernel (x N)</text>
  <rect x="40" y="174" width="280" height="40" fill="#93c5fd" stroke="#1d4ed8"/>
  <text x="180" y="199" text-anchor="middle" font-size="13" fill="#111">Hypervisor</text>
  <rect x="40" y="216" width="280" height="40" fill="#60a5fa" stroke="#1d4ed8"/>
  <text x="180" y="241" text-anchor="middle" font-size="13" fill="#111">Host OS / Kernel</text>
  <rect x="40" y="258" width="280" height="38" fill="#3b82f6" stroke="#1d4ed8"/>
  <text x="180" y="282" text-anchor="middle" font-size="13" fill="#fff">Hardware</text>

  <!-- Container side -->
  <text x="540" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#047857">Containers</text>
  <rect x="400" y="70" width="280" height="50" fill="#d1fae5" stroke="#047857"/>
  <text x="540" y="92" text-anchor="middle" font-size="13" fill="#111">App A | App B | App C (own libs)</text>
  <text x="540" y="110" text-anchor="middle" font-size="11" fill="#065f46">isolated by namespaces + cgroups</text>
  <rect x="400" y="122" width="280" height="40" fill="#a7f3d0" stroke="#047857"/>
  <text x="540" y="147" text-anchor="middle" font-size="13" fill="#111">Container Runtime (Docker/Podman)</text>
  <rect x="400" y="164" width="280" height="92" fill="#6ee7b7" stroke="#047857"/>
  <text x="540" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#064e3b">ONE Shared Host Kernel</text>
  <text x="540" y="222" text-anchor="middle" font-size="11" fill="#064e3b">namespaces | cgroups v2 | seccomp</text>
  <text x="540" y="240" text-anchor="middle" font-size="11" fill="#064e3b">capabilities | overlayfs</text>
  <rect x="400" y="258" width="280" height="38" fill="#10b981" stroke="#047857"/>
  <text x="540" y="282" text-anchor="middle" font-size="13" fill="#fff">Hardware</text>

  <text x="360" y="340" text-anchor="middle" font-size="13" fill="#111">VMs virtualize hardware (N kernels). Containers virtualize the</text>
  <text x="360" y="360" text-anchor="middle" font-size="13" fill="#111">process view of ONE kernel: a container = namespaces + cgroups</text>
  <text x="360" y="380" text-anchor="middle" font-size="13" fill="#111">+ a layered filesystem over a shared kernel.</text>
</svg>
