<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="sans-serif">
  <rect width="720" height="430" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">The eBPF toolbox: from easy to expert</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#111">You almost never write raw eBPF by hand - tools do it for you</text>

  <!-- Step 1: bpftrace (easiest) -->
  <rect x="60" y="80" width="600" height="80" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="80" y="108" font-size="14" font-weight="bold" fill="#111">1. bpftrace - easiest start</text>
  <text x="80" y="132" font-size="11" fill="#111">Short one-line commands to answer a quick question.</text>
  <text x="80" y="151" font-size="11" font-family="monospace" fill="#111">Think "the one-liner tool of the kernel."</text>

  <!-- Step 2: bcc tools -->
  <rect x="60" y="175" width="600" height="80" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="80" y="203" font-size="14" font-weight="bold" fill="#111">2. bcc tools - ready-made commands</text>
  <text x="80" y="227" font-size="11" fill="#111">A toolbox of finished programs you just run, e.g.</text>
  <text x="80" y="246" font-size="11" font-family="monospace" fill="#111">execsnoop (every program started), opensnoop (every file opened).</text>

  <!-- Step 3: libbpf / CO-RE -->
  <rect x="60" y="270" width="600" height="80" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="80" y="298" font-size="14" font-weight="bold" fill="#111">3. libbpf + CO-RE - for building real products</text>
  <text x="80" y="322" font-size="11" fill="#111">Write a program once, ship it, and it runs across many kernel versions.</text>
  <text x="80" y="341" font-size="11" font-style="italic" fill="#111">This is the specialist end - not needed for this intro.</text>

  <!-- arrow showing difficulty -->
  <line x1="690" y1="90" x2="690" y2="345" stroke="#111" stroke-width="2"/>
  <polygon points="690,345 684,333 696,333" fill="#111"/>
  <text x="708" y="220" font-size="11" fill="#111" transform="rotate(90 708 220)">harder, more powerful</text>

  <text x="360" y="392" text-anchor="middle" font-size="12" fill="#111">Beginners live at the top: run a bpftrace one-liner or a bcc tool.</text>
  <text x="360" y="414" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">All three end up as a verified eBPF program in the kernel.</text>
</svg>
