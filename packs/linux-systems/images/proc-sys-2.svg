<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif" font-size="14">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="17" text-anchor="middle">A virtual file: reading asks the kernel a live question</text>

  <!-- You / command box -->
  <rect x="30" y="120" width="180" height="80" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="120" y="150" fill="#000000" text-anchor="middle">You type:</text>
  <text x="120" y="175" fill="#000000" text-anchor="middle" font-family="monospace">cat /proc/meminfo</text>

  <!-- Kernel box -->
  <rect x="500" y="100" width="190" height="120" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="595" y="130" fill="#000000" text-anchor="middle" font-size="15">Linux kernel</text>
  <text x="595" y="155" fill="#000000" text-anchor="middle" font-size="12">(live numbers held</text>
  <text x="595" y="172" fill="#000000" text-anchor="middle" font-size="12">in memory, not on disk)</text>
  <text x="595" y="200" fill="#000000" text-anchor="middle" font-size="12">MemFree, MemTotal...</text>

  <!-- arrow request -->
  <line x1="215" y1="150" x2="495" y2="150" stroke="#000000" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="355" y="142" fill="#000000" text-anchor="middle" font-size="12">"how much memory is free?"</text>

  <!-- arrow answer -->
  <line x1="495" y1="185" x2="215" y2="185" stroke="#000000" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="355" y="205" fill="#000000" text-anchor="middle" font-size="12">answer appears as text</text>

  <!-- Output box -->
  <rect x="30" y="240" width="660" height="110" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="50" y="268" fill="#000000" font-family="monospace" font-size="13">MemTotal:       16331776 kB</text>
  <text x="50" y="290" fill="#000000" font-family="monospace" font-size="13">MemFree:         8421500 kB</text>
  <text x="50" y="312" fill="#000000" font-family="monospace" font-size="13">MemAvailable:   12004332 kB</text>
  <text x="50" y="340" fill="#000000" font-size="12">No real file is stored: ls -l shows 0 bytes. The text is built fresh each time you read.</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
