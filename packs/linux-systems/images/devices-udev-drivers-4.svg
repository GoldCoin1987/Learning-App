<svg xmlns="http://www.w3.org/2000/svg" width="720" height="330" viewBox="0 0 720 330" font-family="Helvetica, Arial, sans-serif">
  <rect width="720" height="330" fill="#ffffff"/>
  <text x="360" y="34" fill="#000000" font-size="19" font-weight="bold" text-anchor="middle">How a program reaches the hardware</text>

  <!-- application -->
  <rect x="270" y="60" width="180" height="46" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="360" y="82" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">Your program</text>
  <text x="360" y="99" fill="#000000" font-size="11" text-anchor="middle">read() / write()</text>

  <line x1="360" y1="106" x2="360" y2="136" stroke="#000000" stroke-width="2" marker-end="url(#ar)"/>

  <!-- /dev file -->
  <rect x="270" y="138" width="180" height="46" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="360" y="160" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">/dev file</text>
  <text x="360" y="177" fill="#000000" font-size="11" text-anchor="middle">e.g. /dev/ttyUSB0</text>

  <line x1="360" y1="184" x2="360" y2="214" stroke="#000000" stroke-width="2" marker-end="url(#ar)"/>

  <!-- driver -->
  <rect x="250" y="216" width="220" height="46" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="360" y="238" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">Driver (kernel code)</text>
  <text x="360" y="255" fill="#000000" font-size="11" text-anchor="middle">knows how to talk to this device</text>

  <line x1="360" y1="262" x2="360" y2="292" stroke="#000000" stroke-width="2" marker-end="url(#ar)"/>

  <!-- hardware -->
  <rect x="270" y="294" width="180" height="30" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="360" y="314" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">Physical hardware</text>

  <!-- side note -->
  <text x="600" y="160" fill="#000000" font-size="12" text-anchor="middle">The driver is</text>
  <text x="600" y="178" fill="#000000" font-size="12" text-anchor="middle">the translator</text>
  <text x="600" y="196" fill="#000000" font-size="12" text-anchor="middle">between the file</text>
  <text x="600" y="214" fill="#000000" font-size="12" text-anchor="middle">and the device.</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
