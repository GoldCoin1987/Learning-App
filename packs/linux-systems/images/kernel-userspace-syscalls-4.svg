<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="30" fill="#000000" font-size="19" font-weight="bold" text-anchor="middle">Watching System Calls with strace</text>

  <!-- command line -->
  <rect x="40" y="55" width="640" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="56" y="80" fill="#000000" font-size="14" font-family="monospace">$ strace cat hello.txt</text>

  <!-- output terminal -->
  <rect x="40" y="110" width="640" height="200" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="56" y="138" fill="#000000" font-size="13" font-family="monospace">openat(AT_FDCWD, "hello.txt", O_RDONLY) = 3</text>
  <text x="56" y="166" fill="#000000" font-size="13" font-family="monospace">read(3, "Hello!\n", 131072)          = 7</text>
  <text x="56" y="194" fill="#000000" font-size="13" font-family="monospace">write(1, "Hello!\n", 7)              = 7</text>
  <text x="56" y="222" fill="#000000" font-size="13" font-family="monospace">close(3)                            = 0</text>
  <text x="56" y="262" fill="#000000" font-size="13" font-family="monospace">openat(..., "missing.txt", ...) = -1 ENOENT</text>
  <text x="56" y="288" fill="#000000" font-size="12" font-family="monospace">    (No such file or directory)</text>

  <!-- annotations -->
  <text x="370" y="138" fill="#000000" font-size="11">&#8592; open the file</text>
  <text x="370" y="166" fill="#000000" font-size="11">&#8592; read its contents</text>
  <text x="370" y="194" fill="#000000" font-size="11">&#8592; write to the screen</text>
  <text x="490" y="222" fill="#000000" font-size="11">&#8592; done, close it</text>
  <text x="370" y="262" fill="#000000" font-size="11" font-weight="bold">a FAILED call</text>

  <text x="360" y="345" fill="#000000" font-size="12" text-anchor="middle">Each line is one system call: its name, arguments, and the result.</text>
  <text x="360" y="364" fill="#000000" font-size="12" text-anchor="middle">A result of -1 means it failed; the error name (ENOENT) tells you why.</text>
</svg>
