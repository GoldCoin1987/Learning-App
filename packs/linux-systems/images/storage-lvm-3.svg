<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380" font-family="sans-serif">
  <rect width="680" height="380" fill="#ffffff"/>
  <text x="340" y="30" fill="#000000" font-size="18" text-anchor="middle" font-weight="bold">Partitioning a disk: MBR vs GPT</text>

  <!-- Disk container -->
  <text x="340" y="60" fill="#000000" font-size="13" text-anchor="middle">A partition table is a small "map" at the front of the disk</text>

  <!-- MBR disk -->
  <text x="60" y="95" fill="#000000" font-size="14" text-anchor="start" font-weight="bold">MBR (old)</text>
  <rect x="60" y="105" width="560" height="55" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <rect x="60" y="105" width="40" height="55" fill="#cccccc" stroke="#000000" stroke-width="2"/>
  <text x="80" y="128" fill="#000000" font-size="9" text-anchor="middle">map</text>
  <text x="80" y="142" fill="#000000" font-size="9" text-anchor="middle">512 B</text>
  <line x1="240" y1="105" x2="240" y2="160" stroke="#000000" stroke-width="1"/>
  <line x1="380" y1="105" x2="380" y2="160" stroke="#000000" stroke-width="1"/>
  <line x1="520" y1="105" x2="520" y2="160" stroke="#000000" stroke-width="1"/>
  <text x="170" y="137" fill="#000000" font-size="11" text-anchor="middle">part 1</text>
  <text x="310" y="137" fill="#000000" font-size="11" text-anchor="middle">part 2</text>
  <text x="450" y="137" fill="#000000" font-size="11" text-anchor="middle">part 3</text>
  <text x="570" y="137" fill="#000000" font-size="11" text-anchor="middle">part 4</text>
  <text x="340" y="180" fill="#000000" font-size="11" text-anchor="middle">Limit: up to ~2 TiB, only 4 main partitions, one tiny map with no backup</text>

  <!-- GPT disk -->
  <text x="60" y="220" fill="#000000" font-size="14" text-anchor="start" font-weight="bold">GPT (modern default)</text>
  <rect x="60" y="230" width="560" height="55" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <rect x="60" y="230" width="40" height="55" fill="#cccccc" stroke="#000000" stroke-width="2"/>
  <text x="80" y="253" fill="#000000" font-size="9" text-anchor="middle">map</text>
  <rect x="580" y="230" width="40" height="55" fill="#cccccc" stroke="#000000" stroke-width="2"/>
  <text x="600" y="250" fill="#000000" font-size="9" text-anchor="middle">backup</text>
  <text x="600" y="262" fill="#000000" font-size="9" text-anchor="middle">map</text>
  <line x1="190" y1="230" x2="190" y2="285" stroke="#000000" stroke-width="1"/>
  <line x1="300" y1="230" x2="300" y2="285" stroke="#000000" stroke-width="1"/>
  <line x1="410" y1="230" x2="410" y2="285" stroke="#000000" stroke-width="1"/>
  <line x1="500" y1="230" x2="500" y2="285" stroke="#000000" stroke-width="1"/>
  <text x="145" y="262" fill="#000000" font-size="10" text-anchor="middle">part 1</text>
  <text x="245" y="262" fill="#000000" font-size="10" text-anchor="middle">part 2</text>
  <text x="355" y="262" fill="#000000" font-size="10" text-anchor="middle">...</text>
  <text x="455" y="262" fill="#000000" font-size="10" text-anchor="middle">up to 128</text>
  <text x="340" y="305" fill="#000000" font-size="11" text-anchor="middle">Huge disks, up to 128 partitions, keeps a backup copy of the map at the end</text>

  <!-- Tools -->
  <rect x="60" y="325" width="560" height="40" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="70" y="350" fill="#000000" font-size="12" font-family="monospace">See it: lsblk     Edit it: fdisk / parted   (writing the map; data stays put)</text>
</svg>
