<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" font-family="sans-serif">
  <rect width="820" height="320" fill="#ffffff"/>
  <text x="410" y="30" fill="#000000" font-size="17" font-weight="bold" text-anchor="middle">Cross-compiling: build on your PC, run on a different computer</text>

  <defs>
    <marker id="bc6arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- HOST box -->
  <rect x="30" y="70" width="330" height="210" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="195" y="95" fill="#000000" font-size="14" font-weight="bold" text-anchor="middle">HOST: your PC (x86)</text>
  <text x="195" y="113" fill="#444444" font-size="10" text-anchor="middle">where you build</text>

  <rect x="55" y="130" width="280" height="50" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="195" y="150" fill="#000000" font-size="12" text-anchor="middle">cross-compiler</text>
  <text x="195" y="168" fill="#444444" font-size="10" text-anchor="middle">aarch64-linux-gnu-gcc</text>

  <rect x="55" y="195" width="280" height="50" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="195" y="215" fill="#000000" font-size="12" text-anchor="middle">sysroot</text>
  <text x="195" y="233" fill="#444444" font-size="10" text-anchor="middle">a copy of the target's libraries + headers</text>

  <!-- arrow -->
  <line x1="360" y1="175" x2="455" y2="175" stroke="#000000" stroke-width="3" marker-end="url(#bc6arr)"/>
  <text x="407" y="163" fill="#000000" font-size="11" text-anchor="middle">produces</text>
  <text x="407" y="197" fill="#444444" font-size="10" text-anchor="middle">ARM program</text>

  <!-- TARGET box -->
  <rect x="470" y="70" width="320" height="210" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="630" y="95" fill="#000000" font-size="14" font-weight="bold" text-anchor="middle">TARGET: Raspberry Pi (ARM)</text>
  <text x="630" y="113" fill="#444444" font-size="10" text-anchor="middle">where it runs</text>

  <rect x="495" y="135" width="270" height="55" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="630" y="160" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">ARM program</text>
  <text x="630" y="180" fill="#444444" font-size="10" text-anchor="middle">runs on the real board...</text>

  <rect x="495" y="205" width="270" height="50" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="630" y="227" fill="#000000" font-size="12" text-anchor="middle">...or under QEMU on your PC</text>
  <text x="630" y="245" fill="#444444" font-size="10" text-anchor="middle">qemu-aarch64 (pretends to be ARM)</text>

  <text x="410" y="302" fill="#000000" font-size="12" text-anchor="middle">Like writing instructions in ARM "machine language" for a factory abroad. Your PC cannot run ARM code directly -- use real hardware or QEMU.</text>
</svg>
