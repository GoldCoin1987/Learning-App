<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="sans-serif">
  <rect width="720" height="400" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="18" text-anchor="middle" font-weight="bold">ss: who is listening, and who is connected</text>
  <text x="360" y="48" fill="#000000" font-size="12" text-anchor="middle">Two different questions about the machine's network sockets</text>

  <!-- LISTENING column -->
  <rect x="30" y="70" width="320" height="260" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="190" y="94" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">LISTENING</text>
  <text x="190" y="114" fill="#000000" font-size="11" text-anchor="middle">a door standing open, waiting</text>
  <text x="40" y="146" fill="#000000" font-size="11" font-family="monospace">$ ss -ltn</text>
  <text x="40" y="170" fill="#000000" font-size="11" font-family="monospace">State   Local Address:Port</text>
  <line x1="40" y1="178" x2="338" y2="178" stroke="#000000" stroke-width="1"/>
  <text x="40" y="198" fill="#000000" font-size="11" font-family="monospace">LISTEN  0.0.0.0:22   (SSH)</text>
  <text x="40" y="218" fill="#000000" font-size="11" font-family="monospace">LISTEN  0.0.0.0:80   (web)</text>
  <text x="50" y="252" fill="#000000" font-size="11">Means: a service here is ready</text>
  <text x="50" y="270" fill="#000000" font-size="11">to ACCEPT new connections on</text>
  <text x="50" y="288" fill="#000000" font-size="11">that port number.</text>
  <text x="50" y="314" fill="#000000" font-size="10" font-style="italic">A port = a numbered slot for a service.</text>

  <!-- ESTABLISHED column -->
  <rect x="370" y="70" width="320" height="260" fill="#eeeeee" stroke="#000000" stroke-width="2"/>
  <text x="530" y="94" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">ESTABLISHED</text>
  <text x="530" y="114" fill="#000000" font-size="11" text-anchor="middle">a call already in progress</text>
  <text x="380" y="146" fill="#000000" font-size="11" font-family="monospace">$ ss -tn state established</text>
  <text x="380" y="170" fill="#000000" font-size="11" font-family="monospace">Local Addr      Peer Addr</text>
  <line x1="380" y1="178" x2="678" y2="178" stroke="#000000" stroke-width="1"/>
  <text x="380" y="198" fill="#000000" font-size="11" font-family="monospace">192.168.1.42:51324</text>
  <text x="380" y="216" fill="#000000" font-size="11" font-family="monospace">      -&gt; 140.82.112.3:443</text>
  <text x="390" y="250" fill="#000000" font-size="11">Means: an active conversation</text>
  <text x="390" y="268" fill="#000000" font-size="11">between you and a remote peer</text>
  <text x="390" y="286" fill="#000000" font-size="11">is happening right now.</text>
  <text x="390" y="314" fill="#000000" font-size="10" font-style="italic">ss replaces the old netstat.</text>

  <text x="360" y="362" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">See it:  ss -tulpn   (listening sockets + the program owning each)</text>
  <text x="360" y="384" fill="#000000" font-size="11" text-anchor="middle">t=TCP  u=UDP  l=listening  p=program  n=numbers (no name lookups)</text>
</svg>
