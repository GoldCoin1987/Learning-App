<svg xmlns="http://www.w3.org/2000/svg" width="600" height="260" viewBox="0 0 600 260" font-family="monospace">
  <rect width="600" height="260" fill="#ffffff"/>
  <text x="300" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">Redirection: sending output to a file</text>

  <!-- command box -->
  <rect x="40" y="90" width="170" height="50" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="125" y="112" fill="#000000" font-size="15" text-anchor="middle">echo "hi"</text>
  <text x="125" y="130" fill="#444444" font-size="11" text-anchor="middle">produces output</text>

  <!-- normally to screen -->
  <text x="125" y="180" fill="#444444" font-size="12" text-anchor="middle">normally prints to the screen</text>

  <!-- arrow with > -->
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
  <line x1="210" y1="115" x2="380" y2="115" stroke="#000000" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="295" y="105" fill="#000000" font-size="20" text-anchor="middle" font-weight="bold">&gt;</text>
  <text x="295" y="138" fill="#444444" font-size="11" text-anchor="middle">redirect</text>

  <!-- file box -->
  <rect x="390" y="90" width="170" height="50" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="475" y="120" fill="#000000" font-size="15" text-anchor="middle">notes.txt</text>

  <text x="300" y="220" fill="#000000" font-size="13" text-anchor="middle">echo "hi" &gt; notes.txt  overwrites the file</text>
  <text x="300" y="242" fill="#000000" font-size="13" text-anchor="middle">echo "hi" &gt;&gt; notes.txt  appends to the end instead</text>
</svg>
