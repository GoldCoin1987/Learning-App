<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="18" text-anchor="middle" font-weight="bold">ping: testing whether you can reach something</text>
  <text x="360" y="48" fill="#000000" font-size="12" text-anchor="middle">Like shouting "you there?" and timing the echo back</text>

  <!-- your machine -->
  <rect x="30" y="120" width="150" height="90" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="105" y="150" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">Your machine</text>
  <text x="105" y="172" fill="#000000" font-size="11" text-anchor="middle">192.168.1.42</text>
  <text x="105" y="194" fill="#000000" font-size="11" text-anchor="middle" font-family="monospace">ping</text>

  <!-- remote host -->
  <rect x="540" y="120" width="150" height="90" fill="#eeeeee" stroke="#000000" stroke-width="2"/>
  <text x="615" y="150" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">Remote host</text>
  <text x="615" y="172" fill="#000000" font-size="11" text-anchor="middle">a server</text>
  <text x="615" y="194" fill="#000000" font-size="11" text-anchor="middle">(e.g. 8.8.8.8)</text>

  <!-- request arrow -->
  <line x1="185" y1="150" x2="535" y2="150" stroke="#000000" stroke-width="2"/>
  <polygon points="535,145 545,150 535,155" fill="#000000"/>
  <text x="360" y="140" fill="#000000" font-size="12" text-anchor="middle">1. "Are you there?" (echo request)</text>

  <!-- reply arrow -->
  <line x1="535" y1="185" x2="185" y2="185" stroke="#000000" stroke-width="2"/>
  <polygon points="185,180 175,185 185,190" fill="#000000"/>
  <text x="360" y="205" fill="#000000" font-size="12" text-anchor="middle">2. "Yes!" (echo reply)</text>

  <!-- result panel -->
  <rect x="30" y="240" width="660" height="100" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="40" y="262" fill="#000000" font-size="12" font-family="monospace" font-weight="bold">$ ping -c3 8.8.8.8</text>
  <text x="40" y="284" fill="#000000" font-size="11" font-family="monospace">64 bytes from 8.8.8.8: time=12.4 ms     &lt;- reply came back, so it IS reachable</text>
  <text x="40" y="304" fill="#000000" font-size="11" font-family="monospace">round-trip time = how long the trip took</text>
  <text x="40" y="326" fill="#000000" font-size="11" font-family="monospace">No reply at all  -&gt;  unreachable (down, blocked, or wrong address)</text>
</svg>
