<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="monospace">
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">Anatomy of a bash script</text>

  <defs>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- the file -->
  <text x="200" y="60" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">backup.sh  (just a text file)</text>
  <rect x="40" y="72" width="320" height="150" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="56" y="98" fill="#000000" font-size="13">#!/usr/bin/env bash</text>
  <text x="56" y="124" fill="#000000" font-size="13">echo "starting backup"</text>
  <text x="56" y="150" fill="#000000" font-size="13">cp -r ~/work /backup</text>
  <text x="56" y="176" fill="#000000" font-size="13">echo "done"</text>

  <!-- callouts -->
  <text x="380" y="98" fill="#000000" font-size="11">&#8592; shebang: which program runs the file</text>
  <text x="380" y="150" fill="#000000" font-size="11">&#8592; ordinary shell commands,</text>
  <text x="394" y="166" fill="#000000" font-size="11">one per line, run top to bottom</text>

  <!-- chmod step -->
  <rect x="40" y="250" width="200" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="140" y="276" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">chmod +x backup.sh</text>
  <text x="140" y="294" fill="#444444" font-size="10" text-anchor="middle">mark it runnable (once)</text>

  <line x1="240" y1="278" x2="300" y2="278" stroke="#000000" stroke-width="2" marker-end="url(#ar2)"/>

  <!-- run step -->
  <rect x="305" y="250" width="200" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="405" y="276" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">./backup.sh</text>
  <text x="405" y="294" fill="#444444" font-size="10" text-anchor="middle">run it as a command</text>

  <line x1="505" y1="278" x2="565" y2="278" stroke="#000000" stroke-width="2" marker-end="url(#ar2)"/>

  <!-- output -->
  <rect x="570" y="246" width="120" height="64" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="630" y="272" fill="#000000" font-size="12" text-anchor="middle">starting backup</text>
  <text x="630" y="292" fill="#000000" font-size="12" text-anchor="middle">done</text>

  <text x="360" y="338" fill="#000000" font-size="12" text-anchor="middle">A script is saved commands. Add the shebang, make it executable once, then run it any time.</text>
</svg>
