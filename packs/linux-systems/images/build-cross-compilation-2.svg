<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300" font-family="sans-serif">
  <rect width="820" height="300" fill="#ffffff"/>
  <text x="410" y="30" fill="#000000" font-size="17" font-weight="bold" text-anchor="middle">From source code to a running program</text>

  <defs>
    <marker id="bc2arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- source files -->
  <rect x="20" y="90" width="150" height="120" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="95" y="78" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">Source files</text>
  <text x="95" y="125" fill="#000000" font-size="12" text-anchor="middle">main.c</text>
  <text x="95" y="150" fill="#000000" font-size="12" text-anchor="middle">util.c</text>
  <text x="95" y="178" fill="#444444" font-size="10" text-anchor="middle">what you wrote</text>

  <!-- compile arrow -->
  <line x1="170" y1="150" x2="218" y2="150" stroke="#000000" stroke-width="2" marker-end="url(#bc2arr)"/>
  <text x="194" y="140" fill="#000000" font-size="10" text-anchor="middle">compile</text>
  <text x="194" y="172" fill="#444444" font-size="9" text-anchor="middle">each file</text>

  <!-- object files -->
  <rect x="220" y="90" width="160" height="120" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="300" y="78" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">Object files</text>
  <text x="300" y="125" fill="#000000" font-size="12" text-anchor="middle">main.o</text>
  <text x="300" y="150" fill="#000000" font-size="12" text-anchor="middle">util.o</text>
  <text x="300" y="178" fill="#444444" font-size="10" text-anchor="middle">machine code,</text>
  <text x="300" y="192" fill="#444444" font-size="10" text-anchor="middle">not yet runnable</text>

  <!-- link arrow -->
  <line x1="380" y1="150" x2="428" y2="150" stroke="#000000" stroke-width="2" marker-end="url(#bc2arr)"/>
  <text x="404" y="140" fill="#000000" font-size="10" text-anchor="middle">link</text>
  <text x="404" y="172" fill="#444444" font-size="9" text-anchor="middle">join them</text>

  <!-- program -->
  <rect x="430" y="105" width="170" height="90" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="515" y="145" fill="#000000" font-size="14" font-weight="bold" text-anchor="middle">program</text>
  <text x="515" y="168" fill="#444444" font-size="10" text-anchor="middle">the file you can run</text>

  <!-- libraries fed into link -->
  <rect x="430" y="225" width="170" height="46" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="515" y="246" fill="#000000" font-size="11" text-anchor="middle">library code</text>
  <text x="515" y="262" fill="#444444" font-size="9" text-anchor="middle">(printf, math, ...)</text>
  <line x1="515" y1="225" x2="515" y2="197" stroke="#000000" stroke-width="2" marker-end="url(#bc2arr)"/>

  <text x="700" y="150" fill="#000000" font-size="11" text-anchor="middle">One command,</text>
  <text x="700" y="168" fill="#000000" font-size="11" text-anchor="middle">gcc, runs both</text>
  <text x="700" y="186" fill="#000000" font-size="11" text-anchor="middle">steps for you.</text>

  <text x="410" y="293" fill="#000000" font-size="12" text-anchor="middle">Compile turns each source file into machine code; link joins the pieces (and library code) into one program.</text>
</svg>
