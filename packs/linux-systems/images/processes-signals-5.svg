<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" fill="#000000" font-size="18" font-weight="bold">Foreground vs Background Jobs</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- terminal box -->
  <rect x="250" y="60" width="140" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="320" y="84" text-anchor="middle" fill="#000000" font-size="14" font-weight="bold">Your terminal</text>
  <text x="320" y="102" text-anchor="middle" fill="#000000" font-size="11">where you type commands</text>

  <!-- foreground -->
  <rect x="40" y="185" width="200" height="70" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="140" y="210" text-anchor="middle" fill="#000000" font-size="14" font-weight="bold">Foreground job</text>
  <text x="140" y="230" text-anchor="middle" fill="#000000" font-size="11">holds the terminal;</text>
  <text x="140" y="245" text-anchor="middle" fill="#000000" font-size="11">you wait for it to finish</text>

  <!-- background -->
  <rect x="400" y="185" width="200" height="70" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="500" y="210" text-anchor="middle" fill="#000000" font-size="14" font-weight="bold">Background job</text>
  <text x="500" y="230" text-anchor="middle" fill="#000000" font-size="11">runs while you keep</text>
  <text x="500" y="245" text-anchor="middle" fill="#000000" font-size="11">using the prompt  ( &amp; )</text>

  <!-- arrows -->
  <path d="M285,116 C230,145 190,160 160,183" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="170" y="150" fill="#000000" font-size="10">run command</text>
  <path d="M355,116 C420,145 460,160 490,183" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="150" fill="#000000" font-size="10">add  &amp;  at the end</text>

  <!-- bidirectional move arrows -->
  <path d="M245,235 L395,235" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="228" text-anchor="middle" fill="#000000" font-size="10">bg  (resume in background)</text>
  <path d="M395,255 L245,255" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="275" text-anchor="middle" fill="#000000" font-size="10">fg  (bring back to foreground)</text>

  <text x="320" y="320" text-anchor="middle" fill="#000000" font-size="12">Ctrl-Z pauses a foreground job.   jobs  lists them.</text>
  <text x="320" y="345" text-anchor="middle" fill="#000000" font-size="12">nohup / disown let a background job keep running after you log out.</text>
  <text x="320" y="375" text-anchor="middle" fill="#000000" font-size="11">Example:   sleep 1000 &amp;     then     jobs -l     then     fg %1</text>
</svg>
