<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380" font-family="sans-serif">
  <rect width="820" height="380" fill="#0f1117"/>
  <text x="410" y="30" fill="#e8e8e8" font-size="18" font-weight="bold" text-anchor="middle">journald: One Central Logbook for Everything</text>

  <defs>
    <marker id="ah4" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f7cff"/>
    </marker>
  </defs>

  <!-- services -->
  <rect x="40" y="80" width="150" height="50" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
  <text x="115" y="110" fill="#cfd8ec" font-size="13" text-anchor="middle">sshd.service</text>

  <rect x="40" y="160" width="150" height="50" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
  <text x="115" y="190" fill="#cfd8ec" font-size="13" text-anchor="middle">myapp.service</text>

  <rect x="40" y="240" width="150" height="50" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
  <text x="115" y="270" fill="#cfd8ec" font-size="13" text-anchor="middle">the kernel</text>

  <!-- arrows to journal -->
  <line x1="190" y1="105" x2="320" y2="170" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah4)"/>
  <line x1="190" y1="185" x2="320" y2="185" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah4)"/>
  <line x1="190" y1="265" x2="320" y2="200" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah4)"/>

  <!-- journal -->
  <rect x="325" y="130" width="180" height="110" rx="10" fill="#173a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="415" y="175" fill="#a7f3c8" font-size="16" font-weight="bold" text-anchor="middle">journald</text>
  <text x="415" y="200" fill="#cfd8ec" font-size="12" text-anchor="middle">the journal</text>
  <text x="415" y="218" fill="#8893a8" font-size="11" text-anchor="middle">(one tagged log store)</text>

  <!-- arrow to reader -->
  <line x1="505" y1="185" x2="600" y2="185" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah4)"/>

  <!-- journalctl reader -->
  <rect x="605" y="130" width="180" height="110" rx="10" fill="#3a2f1a" stroke="#fbbf24" stroke-width="2"/>
  <text x="695" y="170" fill="#fde68a" font-size="15" font-weight="bold" text-anchor="middle">journalctl</text>
  <text x="695" y="192" fill="#cfd8ec" font-size="11" text-anchor="middle">you read it here</text>
  <text x="695" y="212" fill="#8893a8" font-size="11" text-anchor="middle">filter by service</text>

  <!-- commands -->
  <text x="410" y="300" fill="#9ec1ff" font-size="13" font-family="monospace" text-anchor="middle">journalctl -u myapp     (just this service)</text>
  <text x="410" y="324" fill="#9ec1ff" font-size="13" font-family="monospace" text-anchor="middle">journalctl -u myapp -f  (follow new lines, like tail -f)</text>
  <text x="410" y="348" fill="#9ec1ff" font-size="13" font-family="monospace" text-anchor="middle">journalctl -b           (just this boot)</text>
</svg>
