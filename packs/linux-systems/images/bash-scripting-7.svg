<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="monospace">
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">The quoting gotcha: always write "$var"</text>

  <text x="360" y="52" fill="#444444" font-size="12" text-anchor="middle">file is named:  my report.txt   (it has a space)</text>

  <!-- LEFT: unquoted, wrong -->
  <rect x="30" y="74" width="320" height="210" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="190" y="98" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">WITHOUT quotes  (bug)</text>
  <text x="48" y="128" fill="#000000" font-size="13">file="my report.txt"</text>
  <text x="48" y="154" fill="#000000" font-size="13">rm $file</text>
  <text x="48" y="186" fill="#000000" font-size="11">bash splits on the space, so rm sees</text>
  <text x="48" y="204" fill="#000000" font-size="11">TWO names:</text>
  <rect x="48" y="216" width="100" height="30" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="98" y="236" fill="#000000" font-size="12" text-anchor="middle">my</text>
  <rect x="160" y="216" width="130" height="30" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="225" y="236" fill="#000000" font-size="12" text-anchor="middle">report.txt</text>
  <text x="190" y="270" fill="#000000" font-size="11" text-anchor="middle">deletes the wrong files!</text>

  <!-- RIGHT: quoted, right -->
  <rect x="370" y="74" width="320" height="210" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="530" y="98" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">WITH quotes  (correct)</text>
  <text x="388" y="128" fill="#000000" font-size="13">file="my report.txt"</text>
  <text x="388" y="154" fill="#000000" font-size="13">rm "$file"</text>
  <text x="388" y="186" fill="#000000" font-size="11">quotes keep it as ONE name:</text>
  <rect x="388" y="200" width="240" height="30" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="508" y="220" fill="#000000" font-size="12" text-anchor="middle">my report.txt</text>
  <text x="530" y="262" fill="#000000" font-size="11" text-anchor="middle">deletes exactly the right file</text>

  <text x="360" y="316" fill="#000000" font-size="12" text-anchor="middle">An unquoted $var is split on spaces. Double-quoting  "$var"  keeps the value as one piece.</text>
  <text x="360" y="342" fill="#444444" font-size="11" text-anchor="middle">Same reason  for f in $(ls)  is buggy: filenames with spaces split apart. Quote everything.</text>
</svg>
