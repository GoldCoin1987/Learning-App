<svg xmlns="http://www.w3.org/2000/svg" width="760" height="410" viewBox="0 0 760 410" font-family="sans-serif">
  <rect width="760" height="410" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">From Built Image to a Running Board on Your Screen</text>
  <text x="380" y="50" text-anchor="middle" font-size="12" fill="#111">Copy the image to a card, plug it in, and watch it boot over a cable</text>

  <!-- Step 1: image file -->
  <rect x="30" y="95" width="150" height="100" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="105" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">image file</text>
  <text x="105" y="152" text-anchor="middle" font-size="10" fill="#111">built on your PC</text>
  <text x="105" y="170" text-anchor="middle" font-size="10" fill="#111">(one .img file =</text>
  <text x="105" y="184" text-anchor="middle" font-size="10" fill="#111">the whole system)</text>

  <line x1="180" y1="145" x2="210" y2="145" stroke="#111" stroke-width="3"/>
  <polygon points="210,145 198,138 198,152" fill="#111"/>
  <text x="195" y="132" text-anchor="middle" font-size="9" fill="#111">copy</text>

  <!-- Step 2: SD card -->
  <rect x="215" y="95" width="150" height="100" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="290" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">SD card</text>
  <text x="290" y="152" text-anchor="middle" font-size="10" fill="#111">written with the</text>
  <text x="290" y="166" text-anchor="middle" font-size="10" fill="#111">image (check the</text>
  <text x="290" y="180" text-anchor="middle" font-size="10" fill="#111">target carefully!)</text>

  <line x1="365" y1="145" x2="395" y2="145" stroke="#111" stroke-width="3"/>
  <polygon points="395,145 383,138 383,152" fill="#111"/>
  <text x="380" y="132" text-anchor="middle" font-size="9" fill="#111">plug in</text>

  <!-- Step 3: SBC -->
  <rect x="400" y="95" width="160" height="100" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="480" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">the board (SBC)</text>
  <text x="480" y="148" text-anchor="middle" font-size="10" fill="#111">Raspberry Pi /</text>
  <text x="480" y="162" text-anchor="middle" font-size="10" fill="#111">BeagleBone -</text>
  <text x="480" y="176" text-anchor="middle" font-size="10" fill="#111">powers on + boots</text>

  <line x1="560" y1="145" x2="590" y2="145" stroke="#111" stroke-width="3"/>
  <polygon points="590,145 578,138 578,152" fill="#111"/>
  <text x="575" y="132" text-anchor="middle" font-size="9" fill="#111">cable</text>

  <!-- Step 4: serial console -->
  <rect x="595" y="95" width="150" height="100" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="670" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">serial console</text>
  <text x="670" y="148" text-anchor="middle" font-size="10" fill="#111">a plain text window</text>
  <text x="670" y="162" text-anchor="middle" font-size="10" fill="#111">on your PC shows</text>
  <text x="670" y="176" text-anchor="middle" font-size="10" fill="#111">boot text + login</text>

  <!-- rootfs note -->
  <rect x="100" y="230" width="560" height="95" fill="#ffffff" stroke="#111" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="380" y="256" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Inside the image: a robust root filesystem</text>
  <text x="380" y="280" text-anchor="middle" font-size="12" fill="#111">Often read-only (squashfs) so a sudden power cut can't corrupt it,</text>
  <text x="380" y="300" text-anchor="middle" font-size="12" fill="#111">with a small writable "overlay" on top for the few files that must change.</text>
  <text x="380" y="318" text-anchor="middle" font-size="11" font-style="italic" fill="#111">Read-only base = survives being unplugged at any moment.</text>

  <text x="380" y="362" text-anchor="middle" font-size="12" fill="#111">Build -&gt; write to card -&gt; boot the board -&gt; watch it over a serial cable.</text>
  <text x="380" y="384" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">The serial console is your window in when there's no monitor or keyboard.</text>
</svg>
