<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="sans-serif">
  <rect width="720" height="430" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">Three places eBPF changed how Linux works</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#111">All three: watch live kernel events safely, with little slowdown</text>

  <!-- Column 1: Observability -->
  <rect x="30" y="75" width="200" height="270" fill="#ffffff" stroke="#111" stroke-width="2"/>
  <text x="130" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Observability</text>
  <text x="130" y="120" text-anchor="middle" font-size="11" fill="#111">(measuring what runs)</text>
  <line x1="50" y1="132" x2="210" y2="132" stroke="#111" stroke-width="1"/>
  <text x="45" y="158" font-size="11" fill="#111">See which programs</text>
  <text x="45" y="176" font-size="11" fill="#111">are slow, what files</text>
  <text x="45" y="194" font-size="11" fill="#111">they open, how long</text>
  <text x="45" y="212" font-size="11" fill="#111">each request takes.</text>
  <text x="45" y="246" font-size="11" font-style="italic" fill="#111">Safer than strace</text>
  <text x="45" y="264" font-size="11" font-style="italic" fill="#111">on a busy server.</text>
  <text x="45" y="300" font-size="11" fill="#111">Tools: bpftrace, bcc</text>

  <!-- Column 2: Networking -->
  <rect x="260" y="75" width="200" height="270" fill="#ffffff" stroke="#111" stroke-width="2"/>
  <text x="360" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Networking</text>
  <text x="360" y="120" text-anchor="middle" font-size="11" fill="#111">(handling packets)</text>
  <line x1="280" y1="132" x2="440" y2="132" stroke="#111" stroke-width="1"/>
  <text x="275" y="158" font-size="11" fill="#111">Sort, balance, or</text>
  <text x="275" y="176" font-size="11" fill="#111">drop packets the</text>
  <text x="275" y="194" font-size="11" fill="#111">instant they arrive</text>
  <text x="275" y="212" font-size="11" fill="#111">(the XDP hook).</text>
  <text x="275" y="246" font-size="11" font-style="italic" fill="#111">Very fast; used to</text>
  <text x="275" y="264" font-size="11" font-style="italic" fill="#111">block attacks.</text>
  <text x="275" y="300" font-size="11" fill="#111">Tool: Cilium</text>

  <!-- Column 3: Security -->
  <rect x="490" y="75" width="200" height="270" fill="#ffffff" stroke="#111" stroke-width="2"/>
  <text x="590" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Security</text>
  <text x="590" y="120" text-anchor="middle" font-size="11" fill="#111">(spotting bad behavior)</text>
  <line x1="510" y1="132" x2="670" y2="132" stroke="#111" stroke-width="1"/>
  <text x="505" y="158" font-size="11" fill="#111">Notice a suspicious</text>
  <text x="505" y="176" font-size="11" fill="#111">action, like a shell</text>
  <text x="505" y="194" font-size="11" fill="#111">opening inside a</text>
  <text x="505" y="212" font-size="11" fill="#111">container.</text>
  <text x="505" y="246" font-size="11" font-style="italic" fill="#111">Flag or block it</text>
  <text x="505" y="264" font-size="11" font-style="italic" fill="#111">with full detail.</text>
  <text x="505" y="300" font-size="11" fill="#111">Tools: Falco, Tetragon</text>

  <text x="360" y="378" text-anchor="middle" font-size="12" fill="#111">This is an intro: know what eBPF is, why it matters, and run a canned tool.</text>
  <text x="360" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">Writing production eBPF programs is a separate specialty.</text>
</svg>
