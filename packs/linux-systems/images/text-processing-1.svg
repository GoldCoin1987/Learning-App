<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="monospace">
  <rect width="720" height="320" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">grep keeps only the lines that match</text>

  <defs>
    <marker id="ah1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- input file -->
  <text x="120" y="62" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">file (every line)</text>
  <rect x="30" y="74" width="180" height="190" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="42" y="100" fill="#000000" font-size="13">apple pie</text>
  <text x="42" y="126" fill="#000000" font-size="13">ERROR disk full</text>
  <text x="42" y="152" fill="#000000" font-size="13">banana bread</text>
  <text x="42" y="178" fill="#000000" font-size="13">ERROR no route</text>
  <text x="42" y="204" fill="#000000" font-size="13">cherry cake</text>
  <text x="42" y="230" fill="#000000" font-size="13">ok all good</text>

  <!-- grep box -->
  <rect x="270" y="140" width="180" height="60" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="360" y="166" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">grep "ERROR"</text>
  <text x="360" y="187" fill="#444444" font-size="11" text-anchor="middle">keep matching lines</text>

  <line x1="210" y1="170" x2="268" y2="170" stroke="#000000" stroke-width="2" marker-end="url(#ah1)"/>
  <line x1="450" y1="170" x2="508" y2="170" stroke="#000000" stroke-width="2" marker-end="url(#ah1)"/>

  <!-- output -->
  <text x="610" y="120" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">output</text>
  <rect x="510" y="132" width="180" height="76" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="522" y="160" fill="#000000" font-size="13">ERROR disk full</text>
  <text x="522" y="186" fill="#000000" font-size="13">ERROR no route</text>

  <text x="360" y="296" fill="#000000" font-size="13" text-anchor="middle">grep is like the Find box: it shows only the lines containing your text.</text>
  <text x="360" y="314" fill="#444444" font-size="11" text-anchor="middle">-i ignore case   -v keep NON-matching lines   -n add line numbers   -r search a whole folder</text>
</svg>
