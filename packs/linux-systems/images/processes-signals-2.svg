<svg xmlns="http://www.w3.org/2000/svg" width="640" height="440" viewBox="0 0 640 440" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="640" height="440" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" fill="#000000" font-size="18" font-weight="bold">The Process Tree (everything descends from PID 1)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- PID 1 -->
  <rect x="240" y="55" width="160" height="50" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="320" y="78" text-anchor="middle" fill="#000000" font-size="14" font-weight="bold">PID 1  (init / systemd)</text>
  <text x="320" y="95" text-anchor="middle" fill="#000000" font-size="11">the first process, started by the kernel</text>

  <!-- second level -->
  <rect x="60" y="180" width="150" height="48" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="135" y="200" text-anchor="middle" fill="#000000" font-size="12" font-weight="bold">login shell</text>
  <text x="135" y="216" text-anchor="middle" fill="#000000" font-size="11">PID 842  (PPID 1)</text>

  <rect x="245" y="180" width="150" height="48" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="320" y="200" text-anchor="middle" fill="#000000" font-size="12" font-weight="bold">web server</text>
  <text x="320" y="216" text-anchor="middle" fill="#000000" font-size="11">PID 990  (PPID 1)</text>

  <rect x="430" y="180" width="150" height="48" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="505" y="200" text-anchor="middle" fill="#000000" font-size="12" font-weight="bold">ssh daemon</text>
  <text x="505" y="216" text-anchor="middle" fill="#000000" font-size="11">PID 700  (PPID 1)</text>

  <!-- third level -->
  <rect x="60" y="320" width="150" height="48" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="135" y="340" text-anchor="middle" fill="#000000" font-size="12" font-weight="bold">text editor</text>
  <text x="135" y="356" text-anchor="middle" fill="#000000" font-size="11">PID 1203  (PPID 842)</text>

  <rect x="245" y="320" width="150" height="48" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="320" y="340" text-anchor="middle" fill="#000000" font-size="12" font-weight="bold">worker</text>
  <text x="320" y="356" text-anchor="middle" fill="#000000" font-size="11">PID 1010  (PPID 990)</text>

  <!-- arrows parent -> child -->
  <path d="M280,105 C220,135 170,150 145,178" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M320,105 L320,178" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M360,105 C420,135 480,150 500,178" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M135,228 L135,318" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M320,228 L320,318" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="320" y="410" text-anchor="middle" fill="#000000" font-size="12">PID = a process's ID number.  PPID = its parent's ID.  Each arrow points from parent to child.</text>
  <text x="320" y="430" text-anchor="middle" fill="#000000" font-size="12">View it with:  pstree    (every process traces back up to PID 1)</text>
</svg>
