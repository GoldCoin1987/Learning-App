<svg xmlns="http://www.w3.org/2000/svg" width="700" height="340" viewBox="0 0 700 340" font-family="sans-serif">
  <rect width="700" height="340" fill="#ffffff"/>
  <text x="350" y="30" fill="#000000" font-size="18" text-anchor="middle" font-weight="bold">One line of /etc/fstab, field by field</text>
  <text x="350" y="55" fill="#000000" font-size="12" text-anchor="middle">/etc/fstab tells Linux what to mount automatically at every boot</text>

  <!-- the line -->
  <rect x="30" y="80" width="640" height="40" fill="#eeeeee" stroke="#000000" stroke-width="2"/>
  <text x="60"  y="105" fill="#000000" font-size="13" font-family="monospace">UUID=4d2a-9f1c   /data   ext4   defaults,noatime   0   2</text>

  <!-- pointer lines -->
  <line x1="100" y1="120" x2="100" y2="150" stroke="#000000" stroke-width="1"/>
  <line x1="250" y1="120" x2="250" y2="150" stroke="#000000" stroke-width="1"/>
  <line x1="335" y1="120" x2="335" y2="150" stroke="#000000" stroke-width="1"/>
  <line x1="450" y1="120" x2="450" y2="150" stroke="#000000" stroke-width="1"/>
  <line x1="560" y1="120" x2="560" y2="150" stroke="#000000" stroke-width="1"/>
  <line x1="615" y1="120" x2="615" y2="150" stroke="#000000" stroke-width="1"/>

  <!-- field 1 -->
  <text x="40"  y="170" fill="#000000" font-size="12" font-weight="bold">1. what</text>
  <text x="40"  y="187" fill="#000000" font-size="10">UUID = a name</text>
  <text x="40"  y="201" fill="#000000" font-size="10">for the filesystem</text>
  <text x="40"  y="215" fill="#000000" font-size="10">(stable, never</text>
  <text x="40"  y="229" fill="#000000" font-size="10">changes)</text>

  <!-- field 2 -->
  <text x="215" y="170" fill="#000000" font-size="12" font-weight="bold">2. where</text>
  <text x="215" y="187" fill="#000000" font-size="10">the folder to</text>
  <text x="215" y="201" fill="#000000" font-size="10">attach it to</text>

  <!-- field 3 -->
  <text x="320" y="245" fill="#000000" font-size="12" font-weight="bold">3. type</text>
  <text x="320" y="262" fill="#000000" font-size="10">filesystem</text>
  <text x="320" y="276" fill="#000000" font-size="10">format</text>

  <!-- field 4 -->
  <text x="430" y="170" fill="#000000" font-size="12" font-weight="bold">4. options</text>
  <text x="430" y="187" fill="#000000" font-size="10">how to mount</text>
  <text x="430" y="201" fill="#000000" font-size="10">(ro, noatime...)</text>

  <!-- field 5 -->
  <text x="540" y="245" fill="#000000" font-size="12" font-weight="bold">5. dump</text>
  <text x="540" y="262" fill="#000000" font-size="10">old backup</text>
  <text x="540" y="276" fill="#000000" font-size="10">flag (use 0)</text>

  <!-- field 6 -->
  <text x="610" y="170" fill="#000000" font-size="12" font-weight="bold">6. pass</text>
  <text x="610" y="187" fill="#000000" font-size="10">check order:</text>
  <text x="610" y="201" fill="#000000" font-size="10">1=root, 2=rest,</text>
  <text x="610" y="215" fill="#000000" font-size="10">0=skip</text>

  <!-- caution box -->
  <rect x="30" y="290" width="640" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="350" y="307" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">Caution: a wrong line here can stop the machine from booting.</text>
  <text x="350" y="324" fill="#000000" font-size="11" text-anchor="middle" font-family="monospace">Test it first:  sudo mount -a   (mounts everything, shows typos now)</text>
</svg>
