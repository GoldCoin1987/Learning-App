<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="760" height="300" fill="#0f172a"/>
  <text x="380" y="30" fill="#e2e8f0" font-size="18" font-weight="bold" text-anchor="middle">From hardware event to a /dev node</text>

  <!-- Kernel -->
  <rect x="20" y="70" width="150" height="90" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="95" y="100" fill="#38bdf8" font-size="14" font-weight="bold" text-anchor="middle">Kernel</text>
  <text x="95" y="122" fill="#cbd5e1" font-size="11" text-anchor="middle">driver probes HW</text>
  <text x="95" y="140" fill="#cbd5e1" font-size="11" text-anchor="middle">emits uevent</text>

  <!-- netlink arrow -->
  <line x1="170" y1="115" x2="245" y2="115" stroke="#facc15" stroke-width="2" marker-end="url(#a)"/>
  <text x="207" y="105" fill="#facc15" font-size="10" text-anchor="middle">netlink</text>

  <!-- udevd -->
  <rect x="250" y="70" width="170" height="90" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="335" y="100" fill="#34d399" font-size="14" font-weight="bold" text-anchor="middle">systemd-udevd</text>
  <text x="335" y="122" fill="#cbd5e1" font-size="11" text-anchor="middle">matches rules in</text>
  <text x="335" y="140" fill="#cbd5e1" font-size="11" text-anchor="middle">/etc/udev/rules.d/</text>

  <!-- arrow to dev -->
  <line x1="420" y1="115" x2="495" y2="115" stroke="#facc15" stroke-width="2" marker-end="url(#a)"/>

  <!-- devtmpfs / /dev -->
  <rect x="500" y="70" width="240" height="90" rx="8" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>
  <text x="620" y="100" fill="#f472b6" font-size="14" font-weight="bold" text-anchor="middle">devtmpfs (/dev)</text>
  <text x="620" y="122" fill="#cbd5e1" font-size="11" text-anchor="middle">/dev/ttyUSB0  (c 188:0)</text>
  <text x="620" y="140" fill="#cbd5e1" font-size="11" text-anchor="middle">+ symlink /dev/radar0</text>

  <!-- rule box -->
  <rect x="120" y="210" width="520" height="60" rx="8" fill="#111827" stroke="#64748b" stroke-width="1.5"/>
  <text x="380" y="232" fill="#94a3b8" font-size="11" text-anchor="middle">Persistent rule (survives reboot):</text>
  <text x="380" y="254" fill="#e2e8f0" font-size="12" font-family="Consolas, monospace" text-anchor="middle">SUBSYSTEM=="tty", ATTRS{idVendor}=="0403", SYMLINK+="radar0"</text>

  <line x1="335" y1="160" x2="335" y2="210" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#a)"/>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#facc15"/>
    </marker>
  </defs>
</svg>
