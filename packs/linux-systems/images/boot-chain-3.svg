<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320" font-family="sans-serif">
  <rect width="640" height="320" fill="#ffffff"/>
  <text x="320" y="28" fill="#000000" font-size="17" font-weight="bold" text-anchor="middle">UEFI Firmware Finds the Bootloader on the Disk</text>

  <defs>
    <marker id="bc3arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- Firmware box -->
  <rect x="30" y="80" width="170" height="90" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="115" y="110" fill="#000000" font-size="14" font-weight="bold" text-anchor="middle">UEFI firmware</text>
  <text x="115" y="130" fill="#000000" font-size="10" text-anchor="middle">on the motherboard</text>
  <text x="115" y="148" fill="#000000" font-size="10" text-anchor="middle">"where do I boot?"</text>

  <!-- Arrow to disk -->
  <line x1="200" y1="125" x2="278" y2="125" stroke="#000000" stroke-width="2" marker-end="url(#bc3arrow)"/>
  <text x="239" y="116" fill="#000000" font-size="10" text-anchor="middle">looks at</text>

  <!-- Disk -->
  <rect x="290" y="60" width="320" height="220" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="450" y="84" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">The hard disk (GPT layout)</text>

  <!-- ESP partition -->
  <rect x="310" y="100" width="280" height="60" rx="5" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="450" y="122" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">EFI System Partition (ESP)</text>
  <text x="450" y="140" fill="#000000" font-size="10" text-anchor="middle">small, formatted FAT32 - holds grubx64.efi</text>
  <text x="450" y="153" fill="#000000" font-size="9" text-anchor="middle">this is what UEFI reads first</text>

  <!-- Root partition -->
  <rect x="310" y="175" width="280" height="85" rx="5" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="450" y="200" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">Main partition (root filesystem)</text>
  <text x="450" y="220" fill="#000000" font-size="10" text-anchor="middle">your programs, files, the kernel image</text>
  <text x="450" y="240" fill="#000000" font-size="9" text-anchor="middle">used later, after the kernel starts</text>

  <text x="320" y="305" fill="#000000" font-size="11" text-anchor="middle">UEFI reads a real file from the ESP and runs it. Old BIOS instead ran raw bytes from the disk's first sector.</text>
</svg>
