<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440" font-family="sans-serif">
  <rect width="720" height="440" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">Hooks: the events an eBPF program can attach to</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#111">A hook is a spot in the kernel where your program wakes up</text>

  <!-- Kernel timeline bar -->
  <rect x="40" y="120" width="640" height="40" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="360" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">things happening inside the kernel</text>

  <!-- Hook 1: syscall -->
  <line x1="160" y1="160" x2="160" y2="210" stroke="#111" stroke-width="2"/>
  <circle cx="160" cy="120" r="7" fill="#111"/>
  <rect x="60" y="210" width="200" height="95" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="160" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">A program asks the</text>
  <text x="160" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">kernel (a syscall)</text>
  <text x="160" y="276" text-anchor="middle" font-size="10" fill="#111">hooks: tracepoints,</text>
  <text x="160" y="292" text-anchor="middle" font-size="10" fill="#111">kprobes</text>

  <!-- Hook 2: function -->
  <line x1="360" y1="160" x2="360" y2="210" stroke="#111" stroke-width="2"/>
  <circle cx="360" cy="120" r="7" fill="#111"/>
  <rect x="262" y="210" width="196" height="95" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="360" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">A kernel function</text>
  <text x="360" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">is called</text>
  <text x="360" y="276" text-anchor="middle" font-size="10" fill="#111">hook: kprobe</text>
  <text x="360" y="292" text-anchor="middle" font-size="10" fill="#111">(entry of a function)</text>

  <!-- Hook 3: packet -->
  <line x1="560" y1="160" x2="560" y2="210" stroke="#111" stroke-width="2"/>
  <circle cx="560" cy="120" r="7" fill="#111"/>
  <rect x="460" y="210" width="200" height="95" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="560" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">A network packet</text>
  <text x="560" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">arrives</text>
  <text x="560" y="276" text-anchor="middle" font-size="10" fill="#111">hooks: XDP, tc</text>
  <text x="560" y="292" text-anchor="middle" font-size="10" fill="#111">(the packet path)</text>

  <!-- eBPF runs note -->
  <text x="360" y="345" text-anchor="middle" font-size="12" fill="#111">At any of these spots, your small eBPF program runs for a moment.</text>

  <text x="360" y="392" text-anchor="middle" font-size="12" fill="#111">Same idea as watching syscalls (Module 7) or reading /proc (Module 8) -</text>
  <text x="360" y="414" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">but live, in the kernel, with almost no slowdown.</text>
</svg>
