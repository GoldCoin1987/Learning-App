<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360" font-family="sans-serif">
  <rect width="820" height="360" fill="#0f1117"/>
  <text x="410" y="30" fill="#e8e8e8" font-size="18" font-weight="bold" text-anchor="middle">systemctl: Controlling a Service</text>

  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f7cff"/>
    </marker>
  </defs>

  <!-- Two state boxes -->
  <rect x="120" y="120" width="200" height="90" rx="10" fill="#3a2230" stroke="#ff6b8a" stroke-width="2"/>
  <text x="220" y="160" fill="#ffb3c4" font-size="18" font-weight="bold" text-anchor="middle">STOPPED</text>
  <text x="220" y="186" fill="#cfd8ec" font-size="12" text-anchor="middle">not running</text>

  <rect x="500" y="120" width="200" height="90" rx="10" fill="#173a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="600" y="160" fill="#a7f3c8" font-size="18" font-weight="bold" text-anchor="middle">RUNNING</text>
  <text x="600" y="186" fill="#cfd8ec" font-size="12" text-anchor="middle">doing its job now</text>

  <!-- start arrow -->
  <line x1="322" y1="150" x2="498" y2="150" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah2)"/>
  <text x="410" y="142" fill="#9ec1ff" font-size="14" font-weight="bold" text-anchor="middle">systemctl start</text>

  <!-- stop arrow -->
  <line x1="498" y1="185" x2="322" y2="185" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah2)"/>
  <text x="410" y="205" fill="#9ec1ff" font-size="14" font-weight="bold" text-anchor="middle">systemctl stop</text>

  <!-- status note -->
  <text x="410" y="245" fill="#8893a8" font-size="12" text-anchor="middle">systemctl status &#8594; ask "is it running, and why/why not?"</text>

  <!-- enable/disable: at boot -->
  <rect x="60" y="280" width="700" height="56" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
  <text x="410" y="304" fill="#9ec1ff" font-size="13" font-weight="bold" text-anchor="middle">enable = start automatically AT BOOT (every restart)   vs   start = run it NOW (once)</text>
  <text x="410" y="324" fill="#cfd8ec" font-size="11" text-anchor="middle">disable = do not auto-start at boot.  Tip: usually you want BOTH "enable --now".</text>
</svg>
