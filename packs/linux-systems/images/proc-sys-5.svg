<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif" font-size="14">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="17" text-anchor="middle">Some files are switches: writing one flips a setting</text>

  <!-- before -->
  <text x="180" y="70" fill="#000000" text-anchor="middle" font-size="14">BEFORE</text>
  <rect x="60" y="85" width="240" height="70" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="180" y="112" fill="#000000" text-anchor="middle" font-family="monospace" font-size="12">cat /proc/sys/net/</text>
  <text x="180" y="130" fill="#000000" text-anchor="middle" font-family="monospace" font-size="12">ipv4/ip_forward</text>
  <text x="180" y="150" fill="#000000" text-anchor="middle" font-family="monospace" font-size="13">0  (off)</text>

  <!-- write action -->
  <rect x="240" y="185" width="240" height="60" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="360" y="210" fill="#000000" text-anchor="middle" font-size="12">write a new value</text>
  <text x="360" y="232" fill="#000000" text-anchor="middle" font-family="monospace" font-size="12">echo 1 &gt; .../ip_forward</text>

  <line x1="180" y1="155" x2="290" y2="185" stroke="#000000" stroke-width="1.5" marker-end="url(#ar2)"/>
  <line x1="430" y1="185" x2="540" y2="155" stroke="#000000" stroke-width="1.5" marker-end="url(#ar2)"/>

  <!-- after -->
  <text x="540" y="70" fill="#000000" text-anchor="middle" font-size="14">AFTER</text>
  <rect x="420" y="85" width="240" height="70" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="540" y="112" fill="#000000" text-anchor="middle" font-family="monospace" font-size="12">cat /proc/sys/net/</text>
  <text x="540" y="130" fill="#000000" text-anchor="middle" font-family="monospace" font-size="12">ipv4/ip_forward</text>
  <text x="540" y="150" fill="#000000" text-anchor="middle" font-family="monospace" font-size="13">1  (on)</text>

  <!-- persistence note -->
  <rect x="60" y="275" width="600" height="80" rx="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="360" y="300" fill="#000000" text-anchor="middle" font-size="13">This change is live but lost on reboot.</text>
  <text x="360" y="324" fill="#000000" text-anchor="middle" font-size="12">To make it stick, add the line to a file in /etc/sysctl.d/</text>
  <text x="360" y="344" fill="#000000" text-anchor="middle" font-family="monospace" font-size="12">net.ipv4.ip_forward = 1</text>

  <defs>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
