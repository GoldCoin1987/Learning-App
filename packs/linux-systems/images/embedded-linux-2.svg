<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300" font-family="sans-serif">
  <rect width="820" height="300" fill="#0f1117"/>
  <text x="410" y="28" fill="#e8e8e8" font-size="18" font-weight="bold" text-anchor="middle">Device Tree: compatible String Binds a Driver</text>

  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#56b56a"/>
    </marker>
  </defs>

  <rect x="40" y="60" width="330" height="200" rx="8" fill="#161a26" stroke="#4f7cff" stroke-width="2"/>
  <text x="205" y="84" fill="#9ec1ff" font-size="13" font-weight="bold" text-anchor="middle">Device Tree node (.dts)</text>
  <text x="60" y="116" fill="#cfd8ec" font-size="12" font-family="monospace">i2c1: i2c@21a0000 {</text>
  <text x="76" y="138" fill="#cfd8ec" font-size="12" font-family="monospace">  bmp280@76 {</text>
  <text x="92" y="160" fill="#ffd479" font-size="12" font-family="monospace">    compatible =</text>
  <text x="92" y="178" fill="#ffd479" font-size="12" font-family="monospace">      "bosch,bmp280";</text>
  <text x="92" y="200" fill="#cfd8ec" font-size="12" font-family="monospace">    reg = &lt;0x76&gt;;</text>
  <text x="76" y="222" fill="#cfd8ec" font-size="12" font-family="monospace">  };</text>
  <text x="60" y="244" fill="#cfd8ec" font-size="12" font-family="monospace">};</text>

  <rect x="450" y="60" width="330" height="200" rx="8" fill="#161a26" stroke="#56b56a" stroke-width="2"/>
  <text x="615" y="84" fill="#a8e6b3" font-size="13" font-weight="bold" text-anchor="middle">Kernel driver (module)</text>
  <text x="470" y="116" fill="#cfd8ec" font-size="12" font-family="monospace">static const struct</text>
  <text x="470" y="134" fill="#cfd8ec" font-size="12" font-family="monospace">of_device_id m[] = {</text>
  <text x="486" y="160" fill="#ffd479" font-size="12" font-family="monospace">{ .compatible =</text>
  <text x="486" y="178" fill="#ffd479" font-size="12" font-family="monospace">  "bosch,bmp280" },</text>
  <text x="486" y="200" fill="#cfd8ec" font-size="12" font-family="monospace">{ }</text>
  <text x="470" y="222" fill="#cfd8ec" font-size="12" font-family="monospace">};</text>
  <text x="470" y="244" fill="#8893a8" font-size="11" font-family="monospace">probe() runs on match</text>

  <line x1="372" y1="170" x2="448" y2="170" stroke="#56b56a" stroke-width="2.5" marker-end="url(#ah2)"/>
  <text x="410" y="160" fill="#a8e6b3" font-size="11" text-anchor="middle">match</text>

  <text x="410" y="284" fill="#6f7a90" font-size="11" text-anchor="middle">A typo in either compatible string = no match = driver never probes. The DT describes hardware the bus cannot enumerate.</text>
</svg>
