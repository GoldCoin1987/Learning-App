<svg xmlns="http://www.w3.org/2000/svg" width="640" height="280" viewBox="0 0 640 280" font-family="monospace">
  <rect width="640" height="280" fill="#0f1117"/>
  <text x="320" y="34" fill="#e6e6e6" font-size="18" text-anchor="middle" font-family="sans-serif">Permission string: d rwx r-x r-t</text>

  <!-- type cell -->
  <rect x="40" y="70" width="56" height="56" fill="#37474f" stroke="#90a4ae"/>
  <text x="68" y="106" fill="#ffd54f" font-size="26" text-anchor="middle">d</text>
  <text x="68" y="150" fill="#90a4ae" font-size="13" text-anchor="middle" font-family="sans-serif">type</text>
  <text x="68" y="168" fill="#90a4ae" font-size="11" text-anchor="middle" font-family="sans-serif">(dir)</text>

  <!-- owner -->
  <rect x="120" y="70" width="150" height="56" fill="#1b3a2b" stroke="#66bb6a"/>
  <text x="145" y="106" fill="#a5d6a7" font-size="26" text-anchor="middle">r</text>
  <text x="195" y="106" fill="#a5d6a7" font-size="26" text-anchor="middle">w</text>
  <text x="245" y="106" fill="#a5d6a7" font-size="26" text-anchor="middle">x</text>
  <text x="195" y="150" fill="#66bb6a" font-size="13" text-anchor="middle" font-family="sans-serif">owner (u)</text>

  <!-- group -->
  <rect x="270" y="70" width="150" height="56" fill="#1a2f4a" stroke="#42a5f5"/>
  <text x="295" y="106" fill="#90caf9" font-size="26" text-anchor="middle">r</text>
  <text x="345" y="106" fill="#90caf9" font-size="26" text-anchor="middle">-</text>
  <text x="395" y="106" fill="#ffb74d" font-size="26" text-anchor="middle">s</text>
  <text x="345" y="150" fill="#42a5f5" font-size="13" text-anchor="middle" font-family="sans-serif">group (g)</text>

  <!-- other -->
  <rect x="420" y="70" width="150" height="56" fill="#3a1f3a" stroke="#ab47bc"/>
  <text x="445" y="106" fill="#ce93d8" font-size="26" text-anchor="middle">r</text>
  <text x="495" y="106" fill="#ce93d8" font-size="26" text-anchor="middle">-</text>
  <text x="545" y="106" fill="#ffb74d" font-size="26" text-anchor="middle">t</text>
  <text x="495" y="150" fill="#ab47bc" font-size="13" text-anchor="middle" font-family="sans-serif">other (o)</text>

  <!-- special-bit callouts -->
  <text x="395" y="200" fill="#ffb74d" font-size="13" text-anchor="middle" font-family="sans-serif">s = setgid bit (x still set)</text>
  <text x="545" y="200" fill="#ffb74d" font-size="13" text-anchor="middle" font-family="sans-serif">t = sticky bit (x still set)</text>

  <text x="320" y="245" fill="#e6e6e6" font-size="15" text-anchor="middle" font-family="sans-serif">Octal: special=3 (setgid+sticky) | u=7 g=5 o=5  ->  chmod 3755</text>
  <text x="320" y="268" fill="#90a4ae" font-size="12" text-anchor="middle" font-family="sans-serif">Uppercase S/T would mean the special bit is set but execute is NOT.</text>
</svg>
