<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300" font-family="sans-serif">
  <rect width="800" height="300" fill="#ffffff"/>
  <text x="400" y="30" fill="#000000" font-size="17" font-weight="bold" text-anchor="middle">CMake describes the build; a build tool does it</text>

  <defs>
    <marker id="bc5arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- CMakeLists -->
  <rect x="40" y="100" width="180" height="90" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="130" y="132" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">CMakeLists.txt</text>
  <text x="130" y="155" fill="#444444" font-size="10" text-anchor="middle">you write this once,</text>
  <text x="130" y="171" fill="#444444" font-size="10" text-anchor="middle">in plain words</text>

  <!-- arrow generates -->
  <line x1="220" y1="145" x2="290" y2="145" stroke="#000000" stroke-width="2" marker-end="url(#bc5arr)"/>
  <text x="255" y="135" fill="#000000" font-size="10" text-anchor="middle">cmake</text>
  <text x="255" y="167" fill="#444444" font-size="9" text-anchor="middle">generates</text>

  <!-- generated build files -->
  <rect x="300" y="100" width="190" height="90" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="395" y="128" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">build files</text>
  <text x="395" y="150" fill="#444444" font-size="10" text-anchor="middle">Makefiles or Ninja files</text>
  <text x="395" y="166" fill="#444444" font-size="10" text-anchor="middle">(auto-written for you)</text>

  <!-- arrow run -->
  <line x1="490" y1="145" x2="560" y2="145" stroke="#000000" stroke-width="2" marker-end="url(#bc5arr)"/>
  <text x="525" y="135" fill="#000000" font-size="10" text-anchor="middle">make /</text>
  <text x="525" y="167" fill="#000000" font-size="10" text-anchor="middle">ninja</text>

  <!-- program -->
  <rect x="570" y="105" width="180" height="80" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="660" y="140" fill="#000000" font-size="14" font-weight="bold" text-anchor="middle">program</text>
  <text x="660" y="162" fill="#444444" font-size="10" text-anchor="middle">compiled + linked</text>

  <text x="400" y="230" fill="#000000" font-size="12" text-anchor="middle">CMake (and Meson) do not compile code themselves -- they write the build instructions, then make or Ninja carry them out.</text>
  <text x="400" y="258" fill="#000000" font-size="12" text-anchor="middle">The same CMakeLists.txt works on Linux, Mac, and Windows, which is why CMake is the modern default for C/C++.</text>
  <text x="400" y="284" fill="#444444" font-size="11" text-anchor="middle">Think: a manager writing the work order, then the crew building from it.</text>
</svg>
