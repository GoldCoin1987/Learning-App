<svg xmlns="http://www.w3.org/2000/svg" width="860" height="240" viewBox="0 0 860 240" font-family="sans-serif">
  <rect width="860" height="240" fill="#ffffff"/>
  <text x="430" y="28" fill="#000000" font-size="18" font-weight="bold" text-anchor="middle">The Boot Chain: Each Step Hands Off to the Next</text>

  <defs>
    <marker id="bc2arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- Power -->
  <rect x="15" y="80" width="110" height="70" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="70" y="108" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">Power button</text>
  <text x="70" y="128" fill="#000000" font-size="10" text-anchor="middle">you press it</text>

  <!-- Firmware -->
  <rect x="155" y="80" width="120" height="70" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="215" y="104" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">Firmware</text>
  <text x="215" y="122" fill="#000000" font-size="10" text-anchor="middle">UEFI / BIOS</text>
  <text x="215" y="138" fill="#000000" font-size="9" text-anchor="middle">tests hardware</text>

  <!-- Bootloader -->
  <rect x="305" y="80" width="120" height="70" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="365" y="104" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">Bootloader</text>
  <text x="365" y="122" fill="#000000" font-size="10" text-anchor="middle">GRUB</text>
  <text x="365" y="138" fill="#000000" font-size="9" text-anchor="middle">loads the kernel</text>

  <!-- Kernel -->
  <rect x="455" y="80" width="140" height="70" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="525" y="104" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">Kernel</text>
  <text x="525" y="122" fill="#000000" font-size="10" text-anchor="middle">+ initramfs</text>
  <text x="525" y="138" fill="#000000" font-size="9" text-anchor="middle">mounts real disk</text>

  <!-- Init -->
  <rect x="625" y="80" width="120" height="70" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="685" y="104" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">init (PID 1)</text>
  <text x="685" y="122" fill="#000000" font-size="10" text-anchor="middle">systemd</text>
  <text x="685" y="138" fill="#000000" font-size="9" text-anchor="middle">starts services</text>

  <!-- Login -->
  <rect x="775" y="80" width="75" height="70" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="812" y="112" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">Login</text>
  <text x="812" y="130" fill="#000000" font-size="9" text-anchor="middle">prompt</text>

  <!-- Arrows -->
  <line x1="125" y1="115" x2="153" y2="115" stroke="#000000" stroke-width="2" marker-end="url(#bc2arrow)"/>
  <line x1="275" y1="115" x2="303" y2="115" stroke="#000000" stroke-width="2" marker-end="url(#bc2arrow)"/>
  <line x1="425" y1="115" x2="453" y2="115" stroke="#000000" stroke-width="2" marker-end="url(#bc2arrow)"/>
  <line x1="595" y1="115" x2="623" y2="115" stroke="#000000" stroke-width="2" marker-end="url(#bc2arrow)"/>
  <line x1="745" y1="115" x2="773" y2="115" stroke="#000000" stroke-width="2" marker-end="url(#bc2arrow)"/>

  <text x="430" y="200" fill="#000000" font-size="11" text-anchor="middle">Like a relay race: each runner hands the baton to the next. If one stage fails, the chain stops there.</text>
</svg>
