<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="monospace">
  <rect width="720" height="300" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">Small helper tools, each does one job</text>

  <!-- six labeled cards -->
  <rect x="30" y="56" width="200" height="64" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="130" y="80" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">cut</text>
  <text x="130" y="102" fill="#444444" font-size="11" text-anchor="middle">pick out columns/fields</text>

  <rect x="260" y="56" width="200" height="64" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="360" y="80" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">sort</text>
  <text x="360" y="102" fill="#444444" font-size="11" text-anchor="middle">put lines in order</text>

  <rect x="490" y="56" width="200" height="64" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="590" y="80" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">uniq -c</text>
  <text x="590" y="102" fill="#444444" font-size="11" text-anchor="middle">count repeated lines</text>

  <rect x="30" y="136" width="200" height="64" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="130" y="160" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">wc -l</text>
  <text x="130" y="182" fill="#444444" font-size="11" text-anchor="middle">count lines</text>

  <rect x="260" y="136" width="200" height="64" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="360" y="160" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">head / tail</text>
  <text x="360" y="182" fill="#444444" font-size="11" text-anchor="middle">first / last few lines</text>

  <rect x="490" y="136" width="200" height="64" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="590" y="160" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">tr</text>
  <text x="590" y="182" fill="#444444" font-size="11" text-anchor="middle">swap/delete characters</text>

  <!-- why sort before uniq -->
  <rect x="60" y="222" width="600" height="56" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="360" y="246" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">uniq only looks at neighbouring lines</text>
  <text x="360" y="268" fill="#444444" font-size="12" text-anchor="middle">so sort FIRST to bring identical lines together, then uniq -c can count them.</text>
</svg>
