<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="sans-serif">
  <rect width="640" height="360" fill="#0f1117"/>
  <text x="320" y="30" fill="#e6e6e6" font-size="18" font-weight="bold" text-anchor="middle">Bash vs. Python: the ops decision boundary</text>

  <!-- Bash zone -->
  <rect x="30" y="55" width="270" height="270" rx="10" fill="#16271a" stroke="#3fa34d" stroke-width="2"/>
  <text x="165" y="82" fill="#7ee787" font-size="15" font-weight="bold" text-anchor="middle">Stay in bash</text>
  <text x="50" y="115" fill="#cfe9d2" font-size="12">- Gluing CLI tools together</text>
  <text x="50" y="140" fill="#cfe9d2" font-size="12">- Pipelines, redirection, file globs</text>
  <text x="50" y="165" fill="#cfe9d2" font-size="12">- Short (&lt; ~50-100 lines)</text>
  <text x="50" y="190" fill="#cfe9d2" font-size="12">- No real data structures needed</text>
  <text x="50" y="215" fill="#cfe9d2" font-size="12">- systemd ExecStart, CI steps</text>
  <text x="50" y="240" fill="#cfe9d2" font-size="12">- Entrypoints, backups, provisioning</text>
  <text x="50" y="280" fill="#7ee787" font-size="12" font-weight="bold">Always: set -euo pipefail</text>
  <text x="50" y="302" fill="#7ee787" font-size="12" font-weight="bold">Always: ShellCheck clean</text>

  <!-- arrow -->
  <line x1="305" y1="190" x2="335" y2="190" stroke="#888" stroke-width="2" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#888"/></marker></defs>

  <!-- Python zone -->
  <rect x="340" y="55" width="270" height="270" rx="10" fill="#1a2333" stroke="#4d8edb" stroke-width="2"/>
  <text x="475" y="82" fill="#79b8ff" font-size="15" font-weight="bold" text-anchor="middle">Switch to Python</text>
  <text x="360" y="115" fill="#cfdcf0" font-size="12">- Nested data / dicts / JSON</text>
  <text x="360" y="140" fill="#cfdcf0" font-size="12">- HTTP, APIs, parsing structured text</text>
  <text x="360" y="165" fill="#cfdcf0" font-size="12">- Real error handling &amp; retries</text>
  <text x="360" y="190" fill="#cfdcf0" font-size="12">- Anything you must unit-test</text>
  <text x="360" y="215" fill="#cfdcf0" font-size="12">- Past ~50-100 lines of logic</text>
  <text x="360" y="240" fill="#cfdcf0" font-size="12">- subprocess, pathlib, argparse</text>
  <text x="360" y="280" fill="#79b8ff" font-size="12" font-weight="bold">Quoting bugs are warning you</text>
  <text x="360" y="302" fill="#79b8ff" font-size="12" font-weight="bold">to leave bash early</text>
</svg>
