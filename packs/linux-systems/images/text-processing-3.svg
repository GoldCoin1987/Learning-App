<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="monospace">
  <rect width="720" height="300" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">sed s/old/new/ is Find-and-Replace for a text stream</text>

  <defs>
    <marker id="ah3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- before line -->
  <text x="130" y="78" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">before</text>
  <rect x="30" y="90" width="220" height="44" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="46" y="118" fill="#000000" font-size="14">level=DEBUG msg=hi</text>

  <!-- sed command -->
  <rect x="280" y="84" width="160" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="360" y="108" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">sed</text>
  <text x="360" y="128" fill="#000000" font-size="12" text-anchor="middle">s/DEBUG/INFO/</text>

  <line x1="250" y1="112" x2="278" y2="112" stroke="#000000" stroke-width="2" marker-end="url(#ah3)"/>
  <line x1="440" y1="112" x2="468" y2="112" stroke="#000000" stroke-width="2" marker-end="url(#ah3)"/>

  <!-- after line -->
  <text x="585" y="78" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">after</text>
  <rect x="470" y="90" width="220" height="44" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="486" y="118" fill="#000000" font-size="14">level=INFO msg=hi</text>

  <!-- anatomy -->
  <text x="360" y="178" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">s / DEBUG / INFO / g</text>
  <text x="200" y="204" fill="#444444" font-size="12" text-anchor="middle">s = substitute</text>
  <text x="360" y="204" fill="#444444" font-size="12" text-anchor="middle">find / replace</text>
  <text x="540" y="204" fill="#444444" font-size="12" text-anchor="middle">g = every match on the line</text>

  <text x="360" y="246" fill="#000000" font-size="13" text-anchor="middle">Without g, only the FIRST match on each line changes. With g, ALL of them change.</text>
  <text x="360" y="272" fill="#000000" font-size="13" text-anchor="middle">sed -i edits the file in place. Use sed -i.bak to also keep a .bak backup.</text>
</svg>
