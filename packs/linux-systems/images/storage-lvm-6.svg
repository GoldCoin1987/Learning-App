<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" viewBox="0 0 680 420" font-family="sans-serif">
  <rect width="680" height="420" fill="#ffffff"/>
  <text x="340" y="30" fill="#000000" font-size="18" text-anchor="middle" font-weight="bold">LVM: pool your disks, then resize storage anytime</text>

  <!-- Physical disks at bottom of pool feeding up -->
  <text x="340" y="58" fill="#000000" font-size="12" text-anchor="middle">Picture combining plots of land into one big estate you can re-divide</text>

  <!-- LV layer (top) -->
  <rect x="40" y="80" width="170" height="55" fill="#eeeeee" stroke="#000000" stroke-width="2"/>
  <text x="125" y="103" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">LV  lv_root</text>
  <text x="125" y="122" fill="#000000" font-size="10" text-anchor="middle">a virtual "disk"</text>
  <rect x="230" y="80" width="170" height="55" fill="#eeeeee" stroke="#000000" stroke-width="2"/>
  <text x="315" y="103" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">LV  lv_data</text>
  <text x="315" y="122" fill="#000000" font-size="10" text-anchor="middle">can grow on the fly</text>
  <rect x="420" y="80" width="170" height="55" fill="#ffffff" stroke="#000000" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="505" y="103" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">LV  snapshot</text>
  <text x="505" y="122" fill="#000000" font-size="10" text-anchor="middle">point-in-time copy</text>
  <text x="620" y="112" fill="#000000" font-size="11" text-anchor="middle">format</text>
  <text x="620" y="126" fill="#000000" font-size="11" text-anchor="middle">+ mount</text>

  <!-- arrows down to VG -->
  <line x1="125" y1="135" x2="125" y2="160" stroke="#000000" stroke-width="1"/>
  <line x1="315" y1="135" x2="315" y2="160" stroke="#000000" stroke-width="1"/>
  <line x1="505" y1="135" x2="505" y2="160" stroke="#000000" stroke-width="1"/>
  <text x="350" y="153" fill="#000000" font-size="10" text-anchor="middle" font-family="monospace">lvcreate / lvextend (carve out of the pool)</text>

  <!-- VG layer (the pool) -->
  <rect x="40" y="165" width="600" height="70" fill="#dddddd" stroke="#000000" stroke-width="2"/>
  <text x="340" y="190" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">VG  "vg0"  =  one big pool of space</text>
  <text x="340" y="212" fill="#000000" font-size="11" text-anchor="middle">free space here can be handed to any LV with no repartitioning,</text>
  <text x="340" y="227" fill="#000000" font-size="11" text-anchor="middle">while everything stays mounted -- this is why LVM resizes "online"</text>

  <!-- arrows down to PVs -->
  <line x1="160" y1="235" x2="160" y2="260" stroke="#000000" stroke-width="1"/>
  <line x1="520" y1="235" x2="520" y2="260" stroke="#000000" stroke-width="1"/>
  <text x="340" y="253" fill="#000000" font-size="10" text-anchor="middle" font-family="monospace">vgcreate (gather the disks)</text>

  <!-- PV layer -->
  <rect x="100" y="265" width="180" height="50" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="190" y="287" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">PV  /dev/sdb</text>
  <text x="190" y="304" fill="#000000" font-size="10" text-anchor="middle">disk tagged for LVM</text>
  <rect x="400" y="265" width="180" height="50" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="490" y="287" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">PV  /dev/sdc</text>
  <text x="490" y="304" fill="#000000" font-size="10" text-anchor="middle">disk tagged for LVM</text>

  <!-- arrows down to disks -->
  <line x1="190" y1="315" x2="190" y2="340" stroke="#000000" stroke-width="1"/>
  <line x1="490" y1="315" x2="490" y2="340" stroke="#000000" stroke-width="1"/>
  <text x="340" y="333" fill="#000000" font-size="10" text-anchor="middle" font-family="monospace">pvcreate (prepare each disk)</text>

  <!-- physical disks -->
  <rect x="100" y="345" width="180" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="190" y="370" fill="#000000" font-size="12" text-anchor="middle">physical disk 1</text>
  <rect x="400" y="345" width="180" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="490" y="370" fill="#000000" font-size="12" text-anchor="middle">physical disk 2</text>

  <!-- grow note -->
  <text x="340" y="408" fill="#000000" font-size="11" text-anchor="middle" font-family="monospace">To grow: lvextend (bigger LV)  then  resize2fs (bigger filesystem)</text>
</svg>
