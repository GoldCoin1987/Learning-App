<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">Running a job on a schedule: cron vs systemd timers</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#111">Both run a task again and again on a clock (e.g. "back up every night at 2am")</text>

  <!-- cron -->
  <rect x="50" y="75" width="290" height="200" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="195" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">cron (the classic way)</text>
  <text x="195" y="128" text-anchor="middle" font-size="12" fill="#111">A simple table of times</text>
  <text x="195" y="146" text-anchor="middle" font-size="12" fill="#111">and commands to run.</text>
  <text x="70" y="176" font-size="12" fill="#111">+ Tiny and everywhere</text>
  <text x="70" y="198" font-size="12" fill="#111">+ Easy for simple jobs</text>
  <text x="70" y="226" font-size="12" fill="#b91c1c">- If the machine was OFF</text>
  <text x="70" y="244" font-size="12" fill="#b91c1c">  at 2am, the run is just missed</text>
  <text x="70" y="262" font-size="12" fill="#b91c1c">- Logging is bare-bones</text>

  <!-- systemd timers -->
  <rect x="380" y="75" width="290" height="200" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="525" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#047857">systemd timers (modern)</text>
  <text x="525" y="128" text-anchor="middle" font-size="12" fill="#111">A .timer triggers a .service</text>
  <text x="525" y="146" text-anchor="middle" font-size="12" fill="#111">(built into modern Linux).</text>
  <text x="400" y="176" font-size="12" fill="#111">+ Logs go to the journal</text>
  <text x="400" y="198" font-size="12" fill="#111">+ Can catch a MISSED run after</text>
  <text x="400" y="216" font-size="12" fill="#111">  downtime (Persistent=true)</text>
  <text x="400" y="238" font-size="12" fill="#111">+ Ordering + resource limits</text>
  <text x="400" y="262" font-size="12" font-style="italic" fill="#065f46">Covered in the systemd module.</text>

  <!-- takeaway -->
  <rect x="60" y="300" width="600" height="62" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="360" y="328" text-anchor="middle" font-size="13" fill="#111">Same goal, two tools. Reach for cron for quick simple jobs;</text>
  <text x="360" y="350" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">prefer systemd timers when you need logging or missed-run recovery.</text>
</svg>
