<svg xmlns="http://www.w3.org/2000/svg" width="820" height="220" viewBox="0 0 820 220" font-family="sans-serif">
  <rect width="820" height="220" fill="#0f1117"/>
  <text x="410" y="28" fill="#e8e8e8" font-size="18" font-weight="bold" text-anchor="middle">Linux Boot Chain: Power Button to Login</text>

  <!-- Stage boxes -->
  <g>
    <rect x="20"  y="70" width="160" height="80" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="100" y="100" fill="#9ec1ff" font-size="14" font-weight="bold" text-anchor="middle">Firmware</text>
    <text x="100" y="120" fill="#cfd8ec" font-size="11" text-anchor="middle">BIOS / UEFI</text>
    <text x="100" y="136" fill="#8893a8" font-size="10" text-anchor="middle">POST, find ESP</text>
  </g>

  <g>
    <rect x="220" y="70" width="160" height="80" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="300" y="100" fill="#9ec1ff" font-size="14" font-weight="bold" text-anchor="middle">Bootloader</text>
    <text x="300" y="120" fill="#cfd8ec" font-size="11" text-anchor="middle">GRUB2 / U-Boot</text>
    <text x="300" y="136" fill="#8893a8" font-size="10" text-anchor="middle">loads kernel+initramfs</text>
  </g>

  <g>
    <rect x="420" y="70" width="180" height="80" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="510" y="100" fill="#9ec1ff" font-size="14" font-weight="bold" text-anchor="middle">Kernel + initramfs</text>
    <text x="510" y="120" fill="#cfd8ec" font-size="11" text-anchor="middle">vmlinuz, cmdline</text>
    <text x="510" y="136" fill="#8893a8" font-size="10" text-anchor="middle">mount root, pivot</text>
  </g>

  <g>
    <rect x="640" y="70" width="160" height="80" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="720" y="100" fill="#9ec1ff" font-size="14" font-weight="bold" text-anchor="middle">init (PID 1)</text>
    <text x="720" y="120" fill="#cfd8ec" font-size="11" text-anchor="middle">systemd</text>
    <text x="720" y="136" fill="#8893a8" font-size="10" text-anchor="middle">target -&gt; login</text>
  </g>

  <!-- Arrows -->
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f7cff"/>
    </marker>
  </defs>
  <line x1="180" y1="110" x2="218" y2="110" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="380" y1="110" x2="418" y2="110" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="600" y1="110" x2="638" y2="110" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah)"/>

  <text x="410" y="190" fill="#6f7a90" font-size="11" text-anchor="middle">execve(PID 1) is the kernel-to-userspace handoff. initramfs exists to load the drivers needed to mount the real root.</text>
</svg>
