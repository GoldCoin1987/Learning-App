<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="sans-serif">
  <rect width="720" height="430" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">Two ways to add behavior to the kernel</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#111">The old risky way vs the eBPF way</text>

  <!-- Left: kernel module -->
  <rect x="30" y="70" width="320" height="320" fill="#ffffff" stroke="#111" stroke-width="2"/>
  <text x="190" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Old way: a kernel module</text>

  <rect x="55" y="115" width="270" height="40" fill="#eeeeee" stroke="#111"/>
  <text x="190" y="140" text-anchor="middle" font-size="12" fill="#111">Write code with full kernel power</text>

  <rect x="55" y="165" width="270" height="40" fill="#eeeeee" stroke="#111"/>
  <text x="190" y="190" text-anchor="middle" font-size="12" fill="#111">A bug can crash the whole machine</text>

  <rect x="55" y="215" width="270" height="40" fill="#eeeeee" stroke="#111"/>
  <text x="190" y="240" text-anchor="middle" font-size="12" fill="#111">Often need a REBOOT to load it</text>

  <rect x="55" y="265" width="270" height="40" fill="#eeeeee" stroke="#111"/>
  <text x="190" y="290" text-anchor="middle" font-size="12" fill="#111">Nobody checks it for safety first</text>

  <text x="190" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Risky on a live system</text>
  <text x="190" y="368" text-anchor="middle" font-size="11" fill="#111">(like stopping the car to open the engine)</text>

  <!-- Right: eBPF -->
  <rect x="370" y="70" width="320" height="320" fill="#ffffff" stroke="#111" stroke-width="3"/>
  <text x="530" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">eBPF way: a checked mini-program</text>

  <rect x="395" y="115" width="270" height="40" fill="#dbeafe" stroke="#111"/>
  <text x="530" y="140" text-anchor="middle" font-size="12" fill="#111">Write a small, fenced-in program</text>

  <rect x="395" y="165" width="270" height="40" fill="#dbeafe" stroke="#111"/>
  <text x="530" y="190" text-anchor="middle" font-size="12" fill="#111">A safety checker must approve it</text>

  <rect x="395" y="215" width="270" height="40" fill="#dbeafe" stroke="#111"/>
  <text x="530" y="240" text-anchor="middle" font-size="12" fill="#111">Loads into the LIVE kernel, no reboot</text>

  <rect x="395" y="265" width="270" height="40" fill="#dbeafe" stroke="#111"/>
  <text x="530" y="290" text-anchor="middle" font-size="12" fill="#111">Remove it cleanly when done</text>

  <text x="530" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Safe enough for production</text>
  <text x="530" y="368" text-anchor="middle" font-size="11" fill="#111">(a sensor added while the car keeps driving)</text>
</svg>
