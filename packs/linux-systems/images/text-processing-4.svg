<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="monospace">
  <rect width="720" height="320" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">awk splits each line into columns: $1 $2 $3 ...</text>

  <!-- the line -->
  <text x="360" y="60" fill="#000000" font-size="13" text-anchor="middle">one line:  alice  42  London</text>

  <!-- columns -->
  <rect x="120" y="78" width="140" height="54" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="190" y="104" fill="#000000" font-size="16" text-anchor="middle">alice</text>
  <text x="190" y="124" fill="#444444" font-size="12" text-anchor="middle">$1</text>

  <rect x="290" y="78" width="120" height="54" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="350" y="104" fill="#000000" font-size="16" text-anchor="middle">42</text>
  <text x="350" y="124" fill="#444444" font-size="12" text-anchor="middle">$2</text>

  <rect x="440" y="78" width="160" height="54" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="520" y="104" fill="#000000" font-size="16" text-anchor="middle">London</text>
  <text x="520" y="124" fill="#444444" font-size="12" text-anchor="middle">$3  (also $NF = last)</text>

  <text x="360" y="158" fill="#444444" font-size="12" text-anchor="middle">By default awk splits on spaces. $0 means the whole line. NF = how many fields.</text>

  <!-- summing a column -->
  <line x1="40" y1="178" x2="680" y2="178" stroke="#cccccc" stroke-width="1"/>
  <text x="360" y="200" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">Summing the second column (a running total)</text>

  <rect x="60" y="214" width="120" height="70" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="120" y="238" fill="#000000" font-size="13" text-anchor="middle">apples 5</text>
  <text x="120" y="258" fill="#000000" font-size="13" text-anchor="middle">pears 3</text>
  <text x="120" y="278" fill="#000000" font-size="13" text-anchor="middle">plums 4</text>

  <rect x="240" y="226" width="250" height="46" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="365" y="246" fill="#000000" font-size="12" text-anchor="middle">awk '{ sum += $2 }</text>
  <text x="365" y="264" fill="#000000" font-size="12" text-anchor="middle">END { print sum }'</text>

  <rect x="560" y="226" width="100" height="46" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="610" y="254" fill="#000000" font-size="18" text-anchor="middle">12</text>

  <text x="360" y="306" fill="#444444" font-size="12" text-anchor="middle">Add $2 from every line; END runs once at the end to print the total. Like a spreadsheet SUM.</text>
</svg>
