<svg xmlns="http://www.w3.org/2000/svg" width="720" height="330" viewBox="0 0 720 330" font-family="monospace">
  <rect width="720" height="330" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">Regex building blocks: a pattern is a shape, not just a word</text>

  <!-- anchors row -->
  <text x="40" y="70" fill="#000000" font-size="14" font-weight="bold">^</text>
  <text x="70" y="70" fill="#000000" font-size="13">matches the START of a line</text>
  <text x="430" y="70" fill="#444444" font-size="12">^Error  -> line begins with Error</text>

  <text x="40" y="104" fill="#000000" font-size="14" font-weight="bold">$</text>
  <text x="70" y="104" fill="#000000" font-size="13">matches the END of a line</text>
  <text x="430" y="104" fill="#444444" font-size="12">done$   -> line ends with done</text>

  <text x="40" y="138" fill="#000000" font-size="14" font-weight="bold">.</text>
  <text x="70" y="138" fill="#000000" font-size="13">matches ANY one character</text>
  <text x="430" y="138" fill="#444444" font-size="12">c.t  -> cat, cot, c7t, c%t</text>

  <text x="40" y="172" fill="#000000" font-size="14" font-weight="bold">*</text>
  <text x="70" y="172" fill="#000000" font-size="13">0 or more of the thing before it</text>
  <text x="430" y="172" fill="#444444" font-size="12">ab*  -> a, ab, abb, abbb</text>

  <text x="40" y="206" fill="#000000" font-size="14" font-weight="bold">[...]</text>
  <text x="90" y="206" fill="#000000" font-size="13">any ONE listed character</text>
  <text x="430" y="206" fill="#444444" font-size="12">[aeiou] -> one vowel</text>

  <text x="40" y="240" fill="#000000" font-size="14" font-weight="bold">[a-z]</text>
  <text x="90" y="240" fill="#000000" font-size="13">a range of characters</text>
  <text x="430" y="240" fill="#444444" font-size="12">[0-9] -> any one digit</text>

  <!-- worked example -->
  <rect x="40" y="262" width="640" height="48" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="55" y="284" fill="#000000" font-size="13" font-weight="bold">^[0-9]</text>
  <text x="150" y="284" fill="#000000" font-size="13">= a line that STARTS with a digit.</text>
  <text x="55" y="302" fill="#444444" font-size="12">Read a pattern left to right, one piece at a time, like spelling out a shape.</text>
</svg>
