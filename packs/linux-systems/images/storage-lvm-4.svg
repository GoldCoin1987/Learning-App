<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380" font-family="sans-serif">
  <rect width="680" height="380" fill="#ffffff"/>
  <text x="340" y="30" fill="#000000" font-size="18" text-anchor="middle" font-weight="bold">A filesystem organizes a partition into files</text>

  <!-- left: raw partition -->
  <rect x="40" y="70" width="150" height="120" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="115" y="60" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">Before format</text>
  <text x="115" y="125" fill="#000000" font-size="12" text-anchor="middle">raw blocks,</text>
  <text x="115" y="143" fill="#000000" font-size="12" text-anchor="middle">no structure</text>

  <!-- arrow: mkfs -->
  <line x1="195" y1="130" x2="245" y2="130" stroke="#000000" stroke-width="2"/>
  <polygon points="245,124 257,130 245,136" fill="#000000"/>
  <text x="226" y="120" fill="#000000" font-size="11" text-anchor="middle" font-family="monospace">mkfs</text>

  <!-- right: formatted -->
  <rect x="262" y="70" width="170" height="120" fill="#eeeeee" stroke="#000000" stroke-width="2"/>
  <text x="347" y="60" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">After format (ext4)</text>
  <text x="347" y="100" fill="#000000" font-size="11" text-anchor="middle">index of files +</text>
  <text x="347" y="116" fill="#000000" font-size="11" text-anchor="middle">folders + a journal</text>
  <rect x="280" y="130" width="40" height="25" fill="#ffffff" stroke="#000000"/>
  <rect x="328" y="130" width="40" height="25" fill="#ffffff" stroke="#000000"/>
  <rect x="376" y="130" width="40" height="25" fill="#ffffff" stroke="#000000"/>
  <text x="347" y="172" fill="#000000" font-size="10" text-anchor="middle">file  file  file</text>

  <!-- journal callout -->
  <rect x="470" y="80" width="180" height="110" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="560" y="100" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">Journaling</text>
  <text x="560" y="125" fill="#000000" font-size="10" text-anchor="middle">Write the PLAN first,</text>
  <text x="560" y="141" fill="#000000" font-size="10" text-anchor="middle">then make the change.</text>
  <text x="560" y="163" fill="#000000" font-size="10" text-anchor="middle">A crash mid-write can</text>
  <text x="560" y="178" fill="#000000" font-size="10" text-anchor="middle">be replayed safely.</text>

  <!-- comparison table -->
  <text x="340" y="225" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">Common filesystem types</text>
  <line x1="40" y1="235" x2="640" y2="235" stroke="#000000" stroke-width="1"/>
  <text x="55"  y="258" fill="#000000" font-size="12" font-weight="bold">ext4</text>
  <text x="150" y="258" fill="#000000" font-size="11">Linux default. Journaling. Safe, well tested.</text>
  <text x="55"  y="282" fill="#000000" font-size="12" font-weight="bold">XFS</text>
  <text x="150" y="282" fill="#000000" font-size="11">Great for very large files. Can grow but never shrink.</text>
  <text x="55"  y="306" fill="#000000" font-size="12" font-weight="bold">Btrfs/ZFS</text>
  <text x="150" y="306" fill="#000000" font-size="11">Copy-on-write: cheap snapshots, checks for bit-rot.</text>
  <text x="55"  y="330" fill="#000000" font-size="12" font-weight="bold">FAT/exFAT</text>
  <text x="150" y="330" fill="#000000" font-size="11">Simple, works on Windows/Mac/cameras. For sharing.</text>
  <text x="55"  y="354" fill="#000000" font-size="12" font-weight="bold">tmpfs</text>
  <text x="150" y="354" fill="#000000" font-size="11">Lives in RAM. Very fast, but empty again after reboot.</text>
</svg>
