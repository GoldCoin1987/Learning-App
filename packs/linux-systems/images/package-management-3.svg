<svg xmlns="http://www.w3.org/2000/svg" width="700" height="340" viewBox="0 0 700 340" font-family="sans-serif">
  <rect width="700" height="340" fill="#ffffff"/>
  <text x="350" y="30" fill="#000000" font-size="18" font-weight="bold" text-anchor="middle">A dependency tree: one program needs others</text>

  <defs>
    <marker id="ah3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- top: the program you want -->
  <rect x="270" y="60" width="160" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2.5"/>
  <text x="350" y="84" fill="#000000" font-size="14" font-weight="bold" text-anchor="middle">photo-editor</text>
  <text x="350" y="103" fill="#000000" font-size="10" text-anchor="middle">(what you asked for)</text>

  <!-- middle: direct dependencies -->
  <rect x="90" y="180" width="150" height="50" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="165" y="210" fill="#000000" font-size="13" text-anchor="middle">image-library</text>

  <rect x="460" y="180" width="150" height="50" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="535" y="210" fill="#000000" font-size="13" text-anchor="middle">menu-toolkit</text>

  <!-- bottom: shared dependency -->
  <rect x="275" y="270" width="150" height="50" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="350" y="300" fill="#000000" font-size="13" text-anchor="middle">math-core</text>

  <!-- arrows from top to direct deps -->
  <line x1="310" y1="116" x2="190" y2="178" stroke="#000000" stroke-width="2" marker-end="url(#ah3)"/>
  <line x1="390" y1="116" x2="510" y2="178" stroke="#000000" stroke-width="2" marker-end="url(#ah3)"/>

  <!-- arrows from direct deps to shared dep -->
  <line x1="180" y1="230" x2="290" y2="270" stroke="#000000" stroke-width="2" marker-end="url(#ah3)"/>
  <line x1="520" y1="230" x2="410" y2="270" stroke="#000000" stroke-width="2" marker-end="url(#ah3)"/>

  <text x="350" y="160" fill="#000000" font-size="11" text-anchor="middle">"needs" (arrow points to what is required)</text>

  <rect x="20" y="20" width="14" height="14" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="350" y="336" fill="#000000" font-size="11" text-anchor="middle">The package manager follows every arrow and installs the whole set in the right order, automatically.</text>
</svg>
