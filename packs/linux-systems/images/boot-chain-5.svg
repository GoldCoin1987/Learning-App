<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300" font-family="sans-serif">
  <rect width="660" height="300" fill="#ffffff"/>
  <text x="330" y="28" fill="#000000" font-size="17" font-weight="bold" text-anchor="middle">The Handoff: Kernel Starts the First Program (PID 1)</text>

  <defs>
    <marker id="bc5arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- Kernel side -->
  <rect x="30" y="80" width="240" height="150" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="150" y="106" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">Kernel space</text>
  <text x="150" y="132" fill="#000000" font-size="10" text-anchor="middle">- probes hardware</text>
  <text x="150" y="152" fill="#000000" font-size="10" text-anchor="middle">- mounts the real disk</text>
  <text x="150" y="172" fill="#000000" font-size="10" text-anchor="middle">- then starts ONE program</text>
  <text x="150" y="200" fill="#000000" font-size="10" font-style="italic" text-anchor="middle">the kernel keeps running</text>
  <text x="150" y="216" fill="#000000" font-size="10" font-style="italic" text-anchor="middle">underneath everything</text>

  <!-- Arrow -->
  <line x1="270" y1="150" x2="388" y2="150" stroke="#000000" stroke-width="2" marker-end="url(#bc5arrow)"/>
  <text x="329" y="140" fill="#000000" font-size="10" text-anchor="middle">starts</text>
  <text x="329" y="168" fill="#000000" font-size="9" text-anchor="middle">(the handoff)</text>

  <!-- Userspace side -->
  <rect x="400" y="80" width="230" height="150" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="515" y="106" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">User space</text>
  <text x="515" y="132" fill="#000000" font-size="11" font-weight="bold" text-anchor="middle">init = PID 1 (systemd)</text>
  <text x="515" y="154" fill="#000000" font-size="10" text-anchor="middle">the very first program</text>
  <text x="515" y="172" fill="#000000" font-size="10" text-anchor="middle">it starts every other</text>
  <text x="515" y="190" fill="#000000" font-size="10" text-anchor="middle">service, then the</text>
  <text x="515" y="208" fill="#000000" font-size="10" text-anchor="middle">login prompt appears</text>

  <text x="330" y="265" fill="#000000" font-size="11" text-anchor="middle">PID 1 is special: it is the ancestor of all other programs and it never exits while the computer is on.</text>
</svg>
