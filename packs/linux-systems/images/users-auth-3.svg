<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="sans-serif">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="30" fill="#000000" font-size="18" text-anchor="middle">Groups let users share access</text>
  <text x="320" y="52" fill="#000000" font-size="12" text-anchor="middle">A group is a named bucket of users; each group has a number (GID)</text>

  <!-- users -->
  <circle cx="100" cy="130" r="34" fill="#ffffff" stroke="#000000"/>
  <text x="100" y="135" fill="#000000" font-size="13" text-anchor="middle">alice</text>
  <circle cx="100" cy="250" r="34" fill="#ffffff" stroke="#000000"/>
  <text x="100" y="255" fill="#000000" font-size="13" text-anchor="middle">bob</text>
  <circle cx="100" cy="190" r="0"/>

  <!-- group: photos -->
  <rect x="330" y="80" width="220" height="90" rx="10" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="440" y="108" fill="#000000" font-size="15" text-anchor="middle">group: photos (GID 1005)</text>
  <text x="440" y="132" fill="#000000" font-size="12" text-anchor="middle">members: alice, bob</text>
  <text x="440" y="152" fill="#000000" font-size="11" text-anchor="middle">both can read/write shared photo files</text>

  <!-- group: sudo -->
  <rect x="330" y="210" width="220" height="90" rx="10" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="440" y="238" fill="#000000" font-size="15" text-anchor="middle">group: sudo (GID 27)</text>
  <text x="440" y="262" fill="#000000" font-size="12" text-anchor="middle">members: alice</text>
  <text x="440" y="282" fill="#000000" font-size="11" text-anchor="middle">members may borrow root powers</text>

  <!-- membership lines -->
  <line x1="134" y1="125" x2="330" y2="110" stroke="#000000" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="134" y1="245" x2="330" y2="140" stroke="#000000" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="134" y1="135" x2="330" y2="240" stroke="#000000" stroke-width="1.5" marker-end="url(#arr3)"/>

  <text x="320" y="335" fill="#000000" font-size="11" text-anchor="middle">Tip: after you are added to a group, log out and back in for it to take effect.</text>

  <defs>
    <marker id="arr3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
