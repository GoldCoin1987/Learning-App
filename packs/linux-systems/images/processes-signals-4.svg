<svg xmlns="http://www.w3.org/2000/svg" width="640" height="430" viewBox="0 0 640 430" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="640" height="430" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" fill="#000000" font-size="18" font-weight="bold">Process States (the STAT letter in ps)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- R Running -->
  <rect x="250" y="60" width="140" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="320" y="84" text-anchor="middle" fill="#000000" font-size="14" font-weight="bold">R — Running</text>
  <text x="320" y="102" text-anchor="middle" fill="#000000" font-size="11">using (or ready for) the CPU</text>

  <!-- S sleeping -->
  <rect x="40" y="185" width="160" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="120" y="209" text-anchor="middle" fill="#000000" font-size="14" font-weight="bold">S — Sleeping</text>
  <text x="120" y="227" text-anchor="middle" fill="#000000" font-size="11">waiting; wakes on a signal</text>

  <!-- D uninterruptible -->
  <rect x="440" y="185" width="160" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="520" y="205" text-anchor="middle" fill="#000000" font-size="14" font-weight="bold">D — Uninterruptible</text>
  <text x="520" y="222" text-anchor="middle" fill="#000000" font-size="11">stuck in disk/network I/O</text>
  <text x="520" y="236" text-anchor="middle" fill="#000000" font-size="11">ignores even SIGKILL</text>

  <!-- T stopped -->
  <rect x="40" y="320" width="160" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="120" y="344" text-anchor="middle" fill="#000000" font-size="14" font-weight="bold">T — Stopped</text>
  <text x="120" y="362" text-anchor="middle" fill="#000000" font-size="11">paused by Ctrl-Z / SIGSTOP</text>

  <!-- Z zombie -->
  <rect x="440" y="320" width="160" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="520" y="344" text-anchor="middle" fill="#000000" font-size="14" font-weight="bold">Z — Zombie</text>
  <text x="520" y="362" text-anchor="middle" fill="#000000" font-size="11">finished; awaiting cleanup</text>

  <!-- arrows -->
  <path d="M270,110 C200,145 165,160 140,183" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="150" y="150" fill="#000000" font-size="10">waits</text>
  <path d="M180,185 C220,158 250,140 300,116" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="245" y="160" fill="#000000" font-size="10">wakes up</text>

  <path d="M370,110 C440,145 475,160 500,183" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="150" fill="#000000" font-size="10">disk I/O</text>
  <path d="M495,185 C455,158 420,140 372,114" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="408" y="178" fill="#000000" font-size="10">I/O done</text>

  <path d="M268,104 C150,170 100,255 112,318" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="95" y="265" fill="#000000" font-size="10">Ctrl-Z</text>
  <path d="M150,322 C205,255 245,165 300,114" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="235" y="250" fill="#000000" font-size="10">fg / bg (SIGCONT)</text>

  <path d="M372,104 C490,170 535,255 525,318" fill="none" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="265" fill="#000000" font-size="10">exits</text>

  <text x="320" y="412" text-anchor="middle" fill="#000000" font-size="11">A zombie is gone once its parent collects its result (reaps it). See it with:  ps aux</text>
</svg>
