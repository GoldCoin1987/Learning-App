<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="sans-serif">
  <rect width="720" height="400" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Running a Container: Ports and Volumes</text>

  <!-- Host box -->
  <rect x="30" y="56" width="660" height="250" fill="#f8fafc" stroke="#111" stroke-width="2"/>
  <text x="120" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Host machine</text>

  <!-- Container -->
  <rect x="380" y="100" width="270" height="160" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="515" y="124" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Container</text>
  <text x="515" y="146" text-anchor="middle" font-size="12" fill="#111">web app listening</text>
  <text x="515" y="164" text-anchor="middle" font-size="12" fill="#111">on port 80 inside</text>
  <rect x="430" y="178" width="170" height="30" fill="#a7f3d0" stroke="#047857"/>
  <text x="515" y="199" text-anchor="middle" font-size="12" fill="#111">port 80 (inside)</text>
  <rect x="430" y="214" width="170" height="30" fill="#a7f3d0" stroke="#047857"/>
  <text x="515" y="235" text-anchor="middle" font-size="12" fill="#111">/data (inside)</text>

  <!-- Host port -->
  <rect x="70" y="120" width="150" height="44" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="145" y="140" text-anchor="middle" font-size="12" fill="#111">Host port 8080</text>
  <text x="145" y="157" text-anchor="middle" font-size="11" fill="#111">in your browser</text>

  <!-- port mapping arrow -->
  <line x1="222" y1="142" x2="428" y2="193" stroke="#1d4ed8" stroke-width="3"/>
  <polygon points="428,193 414,191 419,180" fill="#1d4ed8"/>
  <text x="320" y="158" text-anchor="middle" font-size="11" fill="#1d4ed8">-p 8080:80  (port mapping)</text>

  <!-- Host folder -->
  <rect x="70" y="210" width="150" height="44" fill="#fef3c7" stroke="#b45309"/>
  <text x="145" y="230" text-anchor="middle" font-size="12" fill="#111">Host folder</text>
  <text x="145" y="247" text-anchor="middle" font-size="11" fill="#111">(saved on disk)</text>

  <!-- volume arrow -->
  <line x1="222" y1="232" x2="428" y2="229" stroke="#b45309" stroke-width="3"/>
  <polygon points="428,229 414,225 415,236" fill="#b45309"/>
  <text x="320" y="222" text-anchor="middle" font-size="11" fill="#b45309">-v data:/data  (volume)</text>

  <text x="360" y="334" text-anchor="middle" font-size="13" fill="#111">docker run -p 8080:80 -v data:/data nginx</text>
  <text x="360" y="358" text-anchor="middle" font-size="13" fill="#111">Port mapping (-p) lets outside traffic reach the app inside.</text>
  <text x="360" y="380" text-anchor="middle" font-size="13" fill="#111">A volume (-v) keeps data even after the container is deleted.</text>
</svg>
