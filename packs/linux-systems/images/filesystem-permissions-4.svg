<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340" font-family="sans-serif">
  <rect width="640" height="340" fill="#ffffff"/>
  <text x="320" y="32" fill="#000000" font-size="18" text-anchor="middle">The number shortcut:  755  =  rwxr-xr-x</text>

  <text x="320" y="62" fill="#000000" font-size="14" text-anchor="middle">Add up the letters in each group:  r = 4,  w = 2,  x = 1</text>

  <!-- owner column -->
  <rect x="60" y="85" width="150" height="120" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="135" y="108" fill="#000000" font-size="13" text-anchor="middle">OWNER</text>
  <text x="135" y="135" fill="#000000" font-size="16" text-anchor="middle" font-family="monospace">r=4  w=2  x=1</text>
  <line x1="80" y1="148" x2="190" y2="148" stroke="#000000"/>
  <text x="135" y="172" fill="#000000" font-size="20" text-anchor="middle" font-family="monospace">4+2+1</text>
  <text x="135" y="196" fill="#000000" font-size="22" text-anchor="middle" font-family="monospace">= 7</text>

  <!-- group column -->
  <rect x="245" y="85" width="150" height="120" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="320" y="108" fill="#000000" font-size="13" text-anchor="middle">GROUP</text>
  <text x="320" y="135" fill="#000000" font-size="16" text-anchor="middle" font-family="monospace">r=4   x=1</text>
  <line x1="265" y1="148" x2="375" y2="148" stroke="#000000"/>
  <text x="320" y="172" fill="#000000" font-size="20" text-anchor="middle" font-family="monospace">4+1</text>
  <text x="320" y="196" fill="#000000" font-size="22" text-anchor="middle" font-family="monospace">= 5</text>

  <!-- other column -->
  <rect x="430" y="85" width="150" height="120" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="505" y="108" fill="#000000" font-size="13" text-anchor="middle">OTHER</text>
  <text x="505" y="135" fill="#000000" font-size="16" text-anchor="middle" font-family="monospace">r=4   x=1</text>
  <line x1="450" y1="148" x2="560" y2="148" stroke="#000000"/>
  <text x="505" y="172" fill="#000000" font-size="20" text-anchor="middle" font-family="monospace">4+1</text>
  <text x="505" y="196" fill="#000000" font-size="22" text-anchor="middle" font-family="monospace">= 5</text>

  <text x="320" y="248" fill="#000000" font-size="26" text-anchor="middle" font-family="monospace">7   5   5</text>
  <text x="320" y="282" fill="#000000" font-size="15" text-anchor="middle" font-family="monospace">chmod 755 file</text>
  <text x="320" y="312" fill="#000000" font-size="13" text-anchor="middle">Owner can do everything; everyone else can read and run, but not change.</text>
</svg>
