<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" viewBox="0 0 680 360" font-family="sans-serif">
  <rect width="680" height="360" fill="#ffffff"/>
  <text x="340" y="30" fill="#000000" font-size="18" text-anchor="middle" font-weight="bold">From empty disk to usable storage: the four steps</text>

  <!-- Step 1: raw disk -->
  <rect x="30" y="70" width="130" height="90" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="95" y="60" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">1. Raw disk</text>
  <text x="95" y="118" fill="#000000" font-size="12" text-anchor="middle">empty space</text>
  <text x="95" y="136" fill="#000000" font-size="11" text-anchor="middle">/dev/sda</text>

  <!-- arrow -->
  <line x1="165" y1="115" x2="195" y2="115" stroke="#000000" stroke-width="2"/>
  <polygon points="195,110 205,115 195,120" fill="#000000"/>

  <!-- Step 2: partition -->
  <rect x="210" y="70" width="130" height="90" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <line x1="210" y1="115" x2="340" y2="115" stroke="#000000" stroke-width="1"/>
  <text x="275" y="60" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">2. Partition</text>
  <text x="275" y="98" fill="#000000" font-size="11" text-anchor="middle">part 1</text>
  <text x="275" y="138" fill="#000000" font-size="11" text-anchor="middle">part 2</text>

  <!-- arrow -->
  <line x1="345" y1="115" x2="375" y2="115" stroke="#000000" stroke-width="2"/>
  <polygon points="375,110 385,115 375,120" fill="#000000"/>

  <!-- Step 3: filesystem -->
  <rect x="390" y="70" width="130" height="90" fill="#eeeeee" stroke="#000000" stroke-width="2"/>
  <text x="455" y="60" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">3. Filesystem</text>
  <text x="455" y="112" fill="#000000" font-size="12" text-anchor="middle">format (ext4)</text>
  <text x="455" y="130" fill="#000000" font-size="11" text-anchor="middle">mkfs</text>

  <!-- arrow -->
  <line x1="525" y1="115" x2="555" y2="115" stroke="#000000" stroke-width="2"/>
  <polygon points="555,110 565,115 555,120" fill="#000000"/>

  <!-- Step 4: mount -->
  <rect x="540" y="70" width="120" height="90" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="600" y="60" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">4. Mount</text>
  <text x="600" y="112" fill="#000000" font-size="12" text-anchor="middle">attach at</text>
  <text x="600" y="130" fill="#000000" font-size="11" text-anchor="middle">/data</text>

  <!-- Everyday analogy row -->
  <text x="340" y="205" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">Everyday picture: building on a plot of land</text>
  <text x="95"  y="235" fill="#000000" font-size="11" text-anchor="middle">empty plot</text>
  <text x="275" y="235" fill="#000000" font-size="11" text-anchor="middle">divide into lots</text>
  <text x="455" y="235" fill="#000000" font-size="11" text-anchor="middle">build + filing system</text>
  <text x="600" y="235" fill="#000000" font-size="11" text-anchor="middle">add a driveway</text>

  <!-- See it commands -->
  <rect x="30" y="270" width="630" height="70" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="40" y="292" fill="#000000" font-size="12" font-family="monospace">See the layout:  lsblk        (lists disks and partitions)</text>
  <text x="40" y="312" fill="#000000" font-size="12" font-family="monospace">See free space:  df -h        (shows mounted filesystems and usage)</text>
  <text x="40" y="332" fill="#000000" font-size="12" font-family="monospace">See details:     lsblk -f     (adds filesystem type and UUID)</text>
</svg>
