<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="sans-serif">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="30" fill="#000000" font-size="18" text-anchor="middle">A Linux computer is multi-user</text>
  <text x="320" y="52" fill="#000000" font-size="12" text-anchor="middle">Every person AND many background services is a "user" with a number (UID)</text>

  <!-- root box -->
  <rect x="220" y="70" width="200" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="320" y="95" fill="#000000" font-size="15" text-anchor="middle">root (the superuser)</text>
  <text x="320" y="115" fill="#000000" font-size="12" text-anchor="middle">UID 0 - can do anything</text>

  <!-- regular users -->
  <rect x="40" y="190" width="160" height="70" fill="#ffffff" stroke="#000000"/>
  <text x="120" y="213" fill="#000000" font-size="14" text-anchor="middle">alice (a person)</text>
  <text x="120" y="232" fill="#000000" font-size="12" text-anchor="middle">UID 1000</text>
  <text x="120" y="250" fill="#000000" font-size="11" text-anchor="middle">regular login</text>

  <rect x="240" y="190" width="160" height="70" fill="#ffffff" stroke="#000000"/>
  <text x="320" y="213" fill="#000000" font-size="14" text-anchor="middle">bob (a person)</text>
  <text x="320" y="232" fill="#000000" font-size="12" text-anchor="middle">UID 1001</text>
  <text x="320" y="250" fill="#000000" font-size="11" text-anchor="middle">regular login</text>

  <rect x="440" y="190" width="160" height="70" fill="#ffffff" stroke="#000000"/>
  <text x="520" y="213" fill="#000000" font-size="14" text-anchor="middle">www-data</text>
  <text x="520" y="232" fill="#000000" font-size="12" text-anchor="middle">UID 33 (service)</text>
  <text x="520" y="250" fill="#000000" font-size="11" text-anchor="middle">runs the web server</text>

  <!-- arrows: regular users borrow root -->
  <line x1="120" y1="190" x2="270" y2="130" stroke="#000000" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <line x1="320" y1="190" x2="320" y2="130" stroke="#000000" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="180" y="165" fill="#000000" font-size="11" text-anchor="middle">borrow powers briefly with sudo</text>

  <text x="320" y="300" fill="#000000" font-size="12" text-anchor="middle">You normally log in as a regular user (alice/bob), NOT as root.</text>
  <text x="320" y="320" fill="#000000" font-size="12" text-anchor="middle">When you need root power, you borrow it for one command with sudo.</text>
  <text x="320" y="340" fill="#000000" font-size="11" text-anchor="middle">Names are for humans; the kernel really uses the numbers (UID).</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
