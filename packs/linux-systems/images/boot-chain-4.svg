<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" font-family="sans-serif">
  <rect width="680" height="300" fill="#ffffff"/>
  <text x="340" y="28" fill="#000000" font-size="17" font-weight="bold" text-anchor="middle">The initramfs: A Temporary Stepping-Stone to the Real Disk</text>

  <defs>
    <marker id="bc4arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- Step 1: kernel in RAM -->
  <rect x="30" y="80" width="180" height="110" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="120" y="106" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">1. Kernel in memory</text>
  <text x="120" y="128" fill="#000000" font-size="10" text-anchor="middle">just started, but it</text>
  <text x="120" y="144" fill="#000000" font-size="10" text-anchor="middle">cannot read the real</text>
  <text x="120" y="160" fill="#000000" font-size="10" text-anchor="middle">disk yet (no driver)</text>

  <!-- arrow -->
  <line x1="210" y1="135" x2="248" y2="135" stroke="#000000" stroke-width="2" marker-end="url(#bc4arrow)"/>

  <!-- Step 2: initramfs -->
  <rect x="258" y="80" width="180" height="110" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="348" y="106" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">2. initramfs (in RAM)</text>
  <text x="348" y="128" fill="#000000" font-size="10" text-anchor="middle">tiny temporary disk</text>
  <text x="348" y="144" fill="#000000" font-size="10" text-anchor="middle">holds the drivers</text>
  <text x="348" y="160" fill="#000000" font-size="10" text-anchor="middle">needed to reach disk</text>

  <!-- arrow -->
  <line x1="438" y1="135" x2="476" y2="135" stroke="#000000" stroke-width="2" marker-end="url(#bc4arrow)"/>
  <text x="457" y="125" fill="#000000" font-size="9" text-anchor="middle">switch</text>

  <!-- Step 3: real root -->
  <rect x="486" y="80" width="170" height="110" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="571" y="106" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">3. Real root disk</text>
  <text x="571" y="128" fill="#000000" font-size="10" text-anchor="middle">now mounted as /</text>
  <text x="571" y="144" fill="#000000" font-size="10" text-anchor="middle">the actual system</text>
  <text x="571" y="160" fill="#000000" font-size="10" text-anchor="middle">files live here</text>

  <text x="340" y="240" fill="#000000" font-size="11" text-anchor="middle">The initramfs is like a spare key kept under the mat: just enough to open the front door (mount the real disk),</text>
  <text x="340" y="258" fill="#000000" font-size="11" text-anchor="middle">then it is thrown away. Without it, the kernel could not reach a disk on encrypted, RAID, or NVMe storage.</text>
</svg>
