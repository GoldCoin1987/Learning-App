<svg xmlns="http://www.w3.org/2000/svg" width="660" height="320" viewBox="0 0 660 320" font-family="sans-serif">
  <rect width="660" height="320" fill="#ffffff"/>
  <text x="330" y="30" fill="#000000" font-size="18" text-anchor="middle">sudo: borrow root for ONE command</text>

  <!-- regular user -->
  <rect x="40" y="120" width="150" height="70" fill="#ffffff" stroke="#000000"/>
  <text x="115" y="150" fill="#000000" font-size="14" text-anchor="middle">you (alice)</text>
  <text x="115" y="170" fill="#000000" font-size="11" text-anchor="middle">a regular user</text>

  <!-- command -->
  <rect x="255" y="120" width="160" height="70" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="335" y="150" fill="#000000" font-size="13" text-anchor="middle" font-family="monospace">sudo apt update</text>
  <text x="335" y="170" fill="#000000" font-size="11" text-anchor="middle">enter YOUR password</text>

  <!-- root power -->
  <rect x="480" y="120" width="150" height="70" fill="#ffffff" stroke="#000000"/>
  <text x="555" y="146" fill="#000000" font-size="14" text-anchor="middle">runs as root</text>
  <text x="555" y="165" fill="#000000" font-size="11" text-anchor="middle">just this one</text>
  <text x="555" y="180" fill="#000000" font-size="11" text-anchor="middle">command</text>

  <line x1="190" y1="155" x2="255" y2="155" stroke="#000000" stroke-width="1.5" marker-end="url(#arr5)"/>
  <line x1="415" y1="155" x2="480" y2="155" stroke="#000000" stroke-width="1.5" marker-end="url(#arr5)"/>

  <!-- return arrow -->
  <path d="M555 190 L555 240 L115 240 L115 190" fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr5)"/>
  <text x="335" y="235" fill="#000000" font-size="11" text-anchor="middle">when the command finishes, you are a regular user again</text>

  <text x="330" y="275" fill="#000000" font-size="12" text-anchor="middle">Why not just log in as root all the time? A single mistake would have</text>
  <text x="330" y="293" fill="#000000" font-size="12" text-anchor="middle">unlimited power. sudo limits the risk and records who did what.</text>

  <defs>
    <marker id="arr5" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
