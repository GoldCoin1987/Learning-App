<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" font-family="monospace">
  <rect width="720" height="340" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">Bash or Python? When to switch</text>

  <defs>
    <marker id="ar9" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- bash side -->
  <rect x="30" y="56" width="300" height="216" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="180" y="82" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">Stay in bash when...</text>
  <text x="48" y="112" fill="#000000" font-size="12">- gluing CLI tools together</text>
  <text x="48" y="138" fill="#000000" font-size="12">- short pipelines and file work</text>
  <text x="48" y="164" fill="#000000" font-size="12">- roughly under ~100 lines</text>
  <text x="48" y="190" fill="#000000" font-size="12">- no real data structures needed</text>
  <text x="48" y="216" fill="#000000" font-size="12">- backups, setup, simple automation</text>
  <text x="48" y="248" fill="#000000" font-size="11">always: set -euo pipefail, quote "$var"</text>

  <!-- arrow -->
  <line x1="334" y1="164" x2="384" y2="164" stroke="#000000" stroke-width="2" marker-end="url(#ar9)"/>
  <text x="359" y="154" fill="#000000" font-size="10" text-anchor="middle">grows</text>

  <!-- python side -->
  <rect x="390" y="56" width="300" height="216" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="540" y="82" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">Switch to Python when...</text>
  <text x="408" y="112" fill="#000000" font-size="12">- you need lists / dicts / JSON</text>
  <text x="408" y="138" fill="#000000" font-size="12">- HTTP, APIs, structured data</text>
  <text x="408" y="164" fill="#000000" font-size="12">- real error handling and retries</text>
  <text x="408" y="190" fill="#000000" font-size="12">- you want to write unit tests</text>
  <text x="408" y="216" fill="#000000" font-size="12">- past ~100 lines or quoting hurts</text>
  <text x="408" y="248" fill="#000000" font-size="11">tools: subprocess, pathlib, argparse</text>

  <text x="360" y="300" fill="#000000" font-size="12" text-anchor="middle">Bash shines at short glue between commands. Python shines at logic, data, and tests.</text>
  <text x="360" y="326" fill="#444444" font-size="11" text-anchor="middle">Run  shellcheck script.sh  to catch quoting and other bugs before you ship.</text>
</svg>
