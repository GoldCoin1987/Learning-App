<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Image vs Running Container</text>

  <!-- Registry -->
  <rect x="40" y="80" width="160" height="120" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
  <text x="120" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Registry</text>
  <text x="120" y="126" text-anchor="middle" font-size="11" fill="#111">(online library</text>
  <text x="120" y="142" text-anchor="middle" font-size="11" fill="#111">of images)</text>
  <rect x="70" y="152" width="100" height="34" fill="#ddd6fe" stroke="#6d28d9"/>
  <text x="120" y="174" text-anchor="middle" font-size="12" fill="#111">nginx:1.27</text>

  <!-- pull arrow -->
  <line x1="204" y1="140" x2="268" y2="140" stroke="#111" stroke-width="3"/>
  <polygon points="268,140 256,133 256,147" fill="#111"/>
  <text x="236" y="130" text-anchor="middle" font-size="12" fill="#111">pull</text>

  <!-- Image -->
  <rect x="272" y="80" width="170" height="120" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="357" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">IMAGE</text>
  <text x="357" y="124" text-anchor="middle" font-size="11" fill="#111">read-only template</text>
  <text x="357" y="140" text-anchor="middle" font-size="11" fill="#111">(a saved recipe;</text>
  <text x="357" y="156" text-anchor="middle" font-size="11" fill="#111">does nothing on</text>
  <text x="357" y="172" text-anchor="middle" font-size="11" fill="#111">its own)</text>

  <!-- run arrow -->
  <line x1="446" y1="140" x2="510" y2="140" stroke="#111" stroke-width="3"/>
  <polygon points="510,140 498,133 498,147" fill="#111"/>
  <text x="478" y="130" text-anchor="middle" font-size="12" fill="#111">run</text>

  <!-- Containers -->
  <rect x="514" y="64" width="166" height="58" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="597" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">CONTAINER #1</text>
  <text x="597" y="108" text-anchor="middle" font-size="11" fill="#065f46">running process</text>

  <rect x="514" y="130" width="166" height="58" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="597" y="154" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">CONTAINER #2</text>
  <text x="597" y="174" text-anchor="middle" font-size="11" fill="#065f46">running process</text>

  <text x="597" y="210" text-anchor="middle" font-size="11" fill="#111">one image -&gt; many containers</text>

  <text x="360" y="262" text-anchor="middle" font-size="14" fill="#111">An IMAGE is the saved package (like a recipe or an app installer).</text>
  <text x="360" y="286" text-anchor="middle" font-size="14" fill="#111">A CONTAINER is that image actually running (the dish being cooked).</text>
  <text x="360" y="318" text-anchor="middle" font-size="13" fill="#111">You "pull" an image from a registry, then "run" it to start a container.</text>
  <text x="360" y="342" text-anchor="middle" font-size="13" fill="#111">The same image can start many independent containers.</text>
</svg>
