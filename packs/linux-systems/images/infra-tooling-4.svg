<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="sans-serif">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">Infrastructure as Code: a written recipe vs one chef's memory</text>

  <!-- LEFT: one chef's memory -->
  <text x="180" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#b45309">In one person's head</text>
  <rect x="60" y="75" width="240" height="150" fill="#fde68a" stroke="#111" stroke-width="2"/>
  <circle cx="180" cy="115" r="18" fill="#ffffff" stroke="#111" stroke-width="2"/>
  <text x="180" y="120" text-anchor="middle" font-size="11" fill="#111">chef</text>
  <text x="180" y="160" text-anchor="middle" font-size="12" fill="#111">"I remember how</text>
  <text x="180" y="178" text-anchor="middle" font-size="12" fill="#111">I set it up..."</text>
  <text x="180" y="205" text-anchor="middle" font-size="11" font-style="italic" fill="#111">If they forget or leave,</text>
  <text x="180" y="220" text-anchor="middle" font-size="11" font-style="italic" fill="#111">the recipe is lost.</text>

  <!-- RIGHT: written recipe (code) -->
  <text x="540" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#047857">Written down as a recipe (code)</text>
  <rect x="420" y="75" width="240" height="150" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="540" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">setup.yml (a file)</text>
  <text x="445" y="125" font-size="11" fill="#111" font-family="monospace">- install web server</text>
  <text x="445" y="145" font-size="11" fill="#111" font-family="monospace">- put config in place</text>
  <text x="445" y="165" font-size="11" fill="#111" font-family="monospace">- make sure it is running</text>
  <text x="540" y="198" text-anchor="middle" font-size="11" font-style="italic" fill="#065f46">Anyone can read it,</text>
  <text x="540" y="213" text-anchor="middle" font-size="11" font-style="italic" fill="#065f46">re-run it, and review changes.</text>

  <!-- arrow down to machines -->
  <defs>
    <marker id="a4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#047857"/></marker>
  </defs>
  <line x1="540" y1="225" x2="540" y2="262" stroke="#047857" stroke-width="3" marker-end="url(#a4)"/>
  <text x="610" y="250" text-anchor="middle" font-size="11" fill="#047857">applied by a tool</text>

  <rect x="450" y="265" width="55" height="35" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
  <rect x="513" y="265" width="55" height="35" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
  <rect x="576" y="265" width="55" height="35" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
  <text x="540" y="288" text-anchor="middle" font-size="10" fill="#111">many machines, same setup</text>

  <!-- takeaway -->
  <rect x="60" y="330" width="600" height="72" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="360" y="358" text-anchor="middle" font-size="13" fill="#111">Infrastructure as Code = describe the setup in a file, keep it like source code,</text>
  <text x="360" y="380" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">and let a tool apply it automatically and repeatably.</text>
</svg>
