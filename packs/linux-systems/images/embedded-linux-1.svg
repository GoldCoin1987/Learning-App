<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" font-family="sans-serif">
  <rect width="900" height="240" fill="#0f1117"/>
  <text x="450" y="28" fill="#e8e8e8" font-size="18" font-weight="bold" text-anchor="middle">ARM Embedded Boot Chain (vs x86/UEFI)</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f7cff"/>
    </marker>
  </defs>

  <g>
    <rect x="14" y="80" width="120" height="84" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="74" y="108" fill="#9ec1ff" font-size="13" font-weight="bold" text-anchor="middle">Boot ROM</text>
    <text x="74" y="126" fill="#cfd8ec" font-size="10" text-anchor="middle">on-SoC, masked</text>
    <text x="74" y="142" fill="#8893a8" font-size="9" text-anchor="middle">loads SPL from</text>
    <text x="74" y="154" fill="#8893a8" font-size="9" text-anchor="middle">MMC/SPI/USB</text>
  </g>

  <g>
    <rect x="160" y="80" width="120" height="84" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="220" y="108" fill="#9ec1ff" font-size="13" font-weight="bold" text-anchor="middle">SPL / MLO</text>
    <text x="220" y="126" fill="#cfd8ec" font-size="10" text-anchor="middle">tiny 1st stage</text>
    <text x="220" y="142" fill="#8893a8" font-size="9" text-anchor="middle">init DRAM, clocks</text>
    <text x="220" y="154" fill="#8893a8" font-size="9" text-anchor="middle">load U-Boot</text>
  </g>

  <g>
    <rect x="306" y="80" width="150" height="84" rx="8" fill="#264027" stroke="#56b56a" stroke-width="2"/>
    <text x="381" y="108" fill="#a8e6b3" font-size="13" font-weight="bold" text-anchor="middle">U-Boot</text>
    <text x="381" y="126" fill="#cfd8ec" font-size="10" text-anchor="middle">env, bootcmd</text>
    <text x="381" y="142" fill="#8893a8" font-size="9" text-anchor="middle">load kernel + DTB</text>
    <text x="381" y="154" fill="#8893a8" font-size="9" text-anchor="middle">tftp / mmc / bootz</text>
  </g>

  <g>
    <rect x="482" y="80" width="150" height="84" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="557" y="108" fill="#9ec1ff" font-size="13" font-weight="bold" text-anchor="middle">Kernel + DTB</text>
    <text x="557" y="126" fill="#cfd8ec" font-size="10" text-anchor="middle">zImage / Image</text>
    <text x="557" y="142" fill="#8893a8" font-size="9" text-anchor="middle">DT describes HW</text>
    <text x="557" y="154" fill="#8893a8" font-size="9" text-anchor="middle">mount rootfs</text>
  </g>

  <g>
    <rect x="658" y="80" width="130" height="84" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="723" y="108" fill="#9ec1ff" font-size="13" font-weight="bold" text-anchor="middle">init (PID 1)</text>
    <text x="723" y="126" fill="#cfd8ec" font-size="10" text-anchor="middle">BusyBox / systemd</text>
    <text x="723" y="142" fill="#8893a8" font-size="9" text-anchor="middle">-&gt; serial login</text>
  </g>

  <line x1="134" y1="122" x2="158" y2="122" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="280" y1="122" x2="304" y2="122" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="456" y1="122" x2="480" y2="122" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="632" y1="122" x2="656" y2="122" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah)"/>

  <text x="450" y="200" fill="#6f7a90" font-size="11" text-anchor="middle">No BIOS/UEFI: the SoC mask ROM is the first stage. There is no ACPI; the device tree replaces hardware self-description.</text>
  <text x="450" y="220" fill="#6f7a90" font-size="11" text-anchor="middle">x86 contrast: UEFI firmware -&gt; GRUB (ESP) -&gt; kernel + ACPI tables -&gt; init.</text>
</svg>
