<svg xmlns="http://www.w3.org/2000/svg" width="600" height="250" viewBox="0 0 600 250" font-family="monospace">
  <rect width="600" height="250" fill="#ffffff"/>
  <text x="300" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">How the shell finds a command using $PATH</text>

  <!-- you type -->
  <rect x="30" y="60" width="130" height="40" rx="5" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="95" y="85" fill="#000000" font-size="15" text-anchor="middle">you type: ls</text>

  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
  <line x1="160" y1="80" x2="205" y2="80" stroke="#000000" stroke-width="2" marker-end="url(#arr3)"/>

  <text x="300" y="70" fill="#444444" font-size="12" text-anchor="middle">shell searches each folder in $PATH, in order:</text>

  <!-- path folders -->
  <rect x="210" y="85" width="110" height="34" rx="5" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="265" y="107" fill="#000000" font-size="13" text-anchor="middle">/usr/local/bin</text>

  <rect x="335" y="85" width="80" height="34" rx="5" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="375" y="107" fill="#000000" font-size="13" text-anchor="middle">/usr/bin</text>

  <rect x="430" y="85" width="80" height="34" rx="5" fill="#ffffff" stroke="#000000" stroke-width="2.5"/>
  <text x="470" y="107" fill="#000000" font-size="13" text-anchor="middle">/bin</text>
  <text x="470" y="138" fill="#000000" font-size="11" text-anchor="middle">found: /bin/ls</text>

  <line x1="320" y1="102" x2="333" y2="102" stroke="#000000" stroke-width="1.5"/>
  <line x1="415" y1="102" x2="428" y2="102" stroke="#000000" stroke-width="1.5"/>

  <text x="300" y="185" fill="#000000" font-size="13" text-anchor="middle">$PATH is a list of folders separated by colons (:)</text>
  <text x="300" y="210" fill="#000000" font-size="12" text-anchor="middle">/usr/local/bin:/usr/bin:/bin</text>
  <text x="300" y="234" fill="#444444" font-size="12" text-anchor="middle">First match wins. If no folder has it: "command not found".</text>
</svg>
