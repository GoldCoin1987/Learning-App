<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="sans-serif">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Two netns Joined by a veth Pair</text>
  <text x="360" y="50" text-anchor="middle" font-size="12" fill="#555">The container-networking primitive: a virtual cable between isolated network stacks</text>

  <!-- ns1 -->
  <rect x="40" y="80" width="250" height="220" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="165" y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8">netns: red</text>
  <text x="165" y="126" text-anchor="middle" font-size="11" fill="#1e3a8a">own routes, neigh, iptables/nft</text>
  <rect x="80" y="200" width="170" height="56" rx="6" fill="#bfdbfe" stroke="#1d4ed8"/>
  <text x="165" y="223" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">veth0</text>
  <text x="165" y="244" text-anchor="middle" font-size="12" fill="#111">10.0.0.1/24</text>

  <!-- ns2 -->
  <rect x="430" y="80" width="250" height="220" rx="8" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="555" y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="#047857">netns: blue</text>
  <text x="555" y="126" text-anchor="middle" font-size="11" fill="#065f46">own routes, neigh, iptables/nft</text>
  <rect x="470" y="200" width="170" height="56" rx="6" fill="#a7f3d0" stroke="#047857"/>
  <text x="555" y="223" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">veth1</text>
  <text x="555" y="244" text-anchor="middle" font-size="12" fill="#111">10.0.0.2/24</text>

  <!-- veth cable -->
  <line x1="250" y1="228" x2="470" y2="228" stroke="#b45309" stroke-width="4"/>
  <circle cx="250" cy="228" r="6" fill="#b45309"/>
  <circle cx="470" cy="228" r="6" fill="#b45309"/>
  <text x="360" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#b45309">veth pair</text>
  <text x="360" y="252" text-anchor="middle" font-size="11" fill="#92400e">packets in one end exit the other</text>

  <text x="360" y="340" text-anchor="middle" font-size="13" fill="#111">ip netns add red; ip netns add blue</text>
  <text x="360" y="360" text-anchor="middle" font-size="13" fill="#111">ip link add veth0 type veth peer name veth1</text>
  <text x="360" y="380" text-anchor="middle" font-size="13" fill="#111">ip link set veth0 netns red; ip link set veth1 netns blue</text>
  <text x="360" y="400" text-anchor="middle" font-size="12" fill="#555">A Linux bridge in place of the cable = the container/docker0 model.</text>
</svg>
