<svg xmlns="http://www.w3.org/2000/svg" width="840" height="300" viewBox="0 0 840 300" font-family="sans-serif">
  <rect width="840" height="300" fill="#0f1117"/>
  <text x="420" y="28" fill="#e8e8e8" font-size="18" font-weight="bold" text-anchor="middle">APT Install: Trust Chain and Dependency Resolution</text>

  <!-- Repo metadata signing chain (top) -->
  <g>
    <rect x="20" y="56" width="180" height="64" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="110" y="80" fill="#9ec1ff" font-size="13" font-weight="bold" text-anchor="middle">Release file</text>
    <text x="110" y="98" fill="#cfd8ec" font-size="10" text-anchor="middle">lists Packages hashes</text>
    <text x="110" y="112" fill="#8893a8" font-size="9" text-anchor="middle">+ InRelease (GPG sig)</text>
  </g>

  <g>
    <rect x="250" y="56" width="180" height="64" rx="8" fill="#2a1f44" stroke="#a06bff" stroke-width="2"/>
    <text x="340" y="80" fill="#c9aaff" font-size="13" font-weight="bold" text-anchor="middle">apt update</text>
    <text x="340" y="98" fill="#cfd8ec" font-size="10" text-anchor="middle">verify sig vs trusted key</text>
    <text x="340" y="112" fill="#8893a8" font-size="9" text-anchor="middle">/etc/apt/keyrings/*.gpg</text>
  </g>

  <g>
    <rect x="480" y="56" width="180" height="64" rx="8" fill="#1f3a2a" stroke="#46c46e" stroke-width="2"/>
    <text x="570" y="80" fill="#9be8b3" font-size="13" font-weight="bold" text-anchor="middle">Resolver</text>
    <text x="570" y="98" fill="#cfd8ec" font-size="10" text-anchor="middle">walk Depends/Conflicts</text>
    <text x="570" y="112" fill="#8893a8" font-size="9" text-anchor="middle">pick versions + pins</text>
  </g>

  <g>
    <rect x="690" y="56" width="130" height="64" rx="8" fill="#44351f" stroke="#e0a23b" stroke-width="2"/>
    <text x="755" y="84" fill="#ffd58a" font-size="13" font-weight="bold" text-anchor="middle">dpkg -i</text>
    <text x="755" y="102" fill="#cfd8ec" font-size="10" text-anchor="middle">unpack + configure</text>
  </g>

  <!-- arrows -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8893a8"/>
    </marker>
  </defs>
  <line x1="200" y1="88" x2="248" y2="88" stroke="#8893a8" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="430" y1="88" x2="478" y2="88" stroke="#8893a8" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="660" y1="88" x2="688" y2="88" stroke="#8893a8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- bottom: hash verification of the actual .deb -->
  <g>
    <rect x="250" y="180" width="410" height="56" rx="8" fill="#171b26" stroke="#3a4358" stroke-width="1.5"/>
    <text x="455" y="204" fill="#cfd8ec" font-size="12" font-weight="bold" text-anchor="middle">Downloaded .deb is hashed; hash must match the signed Packages index</text>
    <text x="455" y="223" fill="#8893a8" font-size="10" text-anchor="middle">signature covers the index -> index covers each package hash = end-to-end trust</text>
  </g>
  <line x1="340" y1="120" x2="360" y2="178" stroke="#8893a8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <line x1="755" y1="120" x2="600" y2="178" stroke="#8893a8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ah)"/>

  <text x="420" y="276" fill="#6f7890" font-size="11" text-anchor="middle">Key insight: APT trusts a KEY, not a server. A mirror or MITM cannot forge a validly signed index.</text>
</svg>
