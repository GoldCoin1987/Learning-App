<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">SSH: safely controlling a computer far away</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#111">Like a locked, private phone line into another machine's command line</text>

  <!-- Your computer -->
  <rect x="50" y="110" width="200" height="120" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="150" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Your computer</text>
  <text x="150" y="165" text-anchor="middle" font-size="12" fill="#111">you type commands</text>
  <text x="150" y="190" text-anchor="middle" font-size="11" fill="#111">private key (kept secret,</text>
  <text x="150" y="206" text-anchor="middle" font-size="11" fill="#111">proves it is you)</text>

  <!-- Remote machine -->
  <rect x="470" y="110" width="200" height="120" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="570" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Remote machine</text>
  <text x="570" y="165" text-anchor="middle" font-size="12" fill="#111">runs your commands</text>
  <text x="570" y="190" text-anchor="middle" font-size="11" fill="#065f46">public key (the matching</text>
  <text x="570" y="206" text-anchor="middle" font-size="11" fill="#065f46">"lock" for your key)</text>

  <!-- encrypted tunnel -->
  <rect x="270" y="150" width="180" height="40" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="360" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">encrypted SSH</text>
  <text x="360" y="184" text-anchor="middle" font-size="11" fill="#111">connection</text>

  <!-- arrows -->
  <defs>
    <marker id="a3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#111"/></marker>
  </defs>
  <line x1="250" y1="170" x2="268" y2="170" stroke="#111" stroke-width="3" marker-end="url(#a3)"/>
  <line x1="450" y1="170" x2="468" y2="170" stroke="#111" stroke-width="3" marker-end="url(#a3)"/>

  <text x="360" y="270" text-anchor="middle" font-size="13" fill="#111">"SSH" = Secure Shell. Everything sent over the line is scrambled (encrypted),</text>
  <text x="360" y="290" text-anchor="middle" font-size="13" fill="#111">so no one in between can read or change it.</text>
  <text x="360" y="328" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">A key pair (private + public) is safer than a password</text>
  <text x="360" y="348" text-anchor="middle" font-size="12" fill="#111">and lets tools log in automatically, with no human typing a password.</text>
</svg>
