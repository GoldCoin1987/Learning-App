<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" viewBox="0 0 680 360" font-family="sans-serif">
  <rect width="680" height="360" fill="#ffffff"/>
  <text x="340" y="30" fill="#000000" font-size="18" text-anchor="middle" font-weight="bold">Three extra storage ideas (the big picture)</text>

  <!-- RAID 1 mirror -->
  <text x="120" y="65" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">RAID 1 (mirror)</text>
  <rect x="40" y="80" width="70" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="75" y="115" fill="#000000" font-size="11" text-anchor="middle">disk A</text>
  <rect x="130" y="80" width="70" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="165" y="115" fill="#000000" font-size="11" text-anchor="middle">disk B</text>
  <text x="120" y="158" fill="#000000" font-size="10" text-anchor="middle">same data on both;</text>
  <text x="120" y="172" fill="#000000" font-size="10" text-anchor="middle">one can fail safely</text>
  <text x="120" y="190" fill="#000000" font-size="10" text-anchor="middle" font-family="monospace">mdadm</text>

  <!-- LUKS encryption -->
  <text x="340" y="65" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">LUKS (encryption)</text>
  <rect x="280" y="80" width="120" height="60" fill="#eeeeee" stroke="#000000" stroke-width="2"/>
  <text x="340" y="108" fill="#000000" font-size="11" text-anchor="middle">scrambled</text>
  <text x="340" y="124" fill="#000000" font-size="11" text-anchor="middle">data + lock</text>
  <text x="340" y="158" fill="#000000" font-size="10" text-anchor="middle">unreadable without</text>
  <text x="340" y="172" fill="#000000" font-size="10" text-anchor="middle">the passphrase</text>
  <text x="340" y="190" fill="#000000" font-size="10" text-anchor="middle" font-family="monospace">cryptsetup</text>

  <!-- Swap -->
  <text x="560" y="65" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">Swap</text>
  <rect x="500" y="80" width="120" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="560" y="105" fill="#000000" font-size="11" text-anchor="middle">disk space used</text>
  <text x="560" y="121" fill="#000000" font-size="11" text-anchor="middle">as overflow RAM</text>
  <text x="560" y="158" fill="#000000" font-size="10" text-anchor="middle">when memory is full,</text>
  <text x="560" y="172" fill="#000000" font-size="10" text-anchor="middle">spill to disk (slow)</text>
  <text x="560" y="190" fill="#000000" font-size="10" text-anchor="middle" font-family="monospace">mkswap / swapon</text>

  <!-- monitoring box -->
  <rect x="40" y="220" width="600" height="120" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="340" y="245" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">Checking your storage</text>
  <line x1="60" y1="255" x2="620" y2="255" stroke="#000000" stroke-width="1"/>
  <text x="70" y="280" fill="#000000" font-size="12" font-family="monospace">df -h        how much free space on each mounted filesystem</text>
  <text x="70" y="305" fill="#000000" font-size="12" font-family="monospace">du -sh *     how much space each folder is using</text>
  <text x="70" y="330" fill="#000000" font-size="12" font-family="monospace">lsblk -f     the whole disk -> partition -> filesystem map</text>
</svg>
