<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320" font-family="sans-serif">
  <rect width="640" height="320" fill="#ffffff"/>
  <text x="320" y="32" fill="#000000" font-size="18" text-anchor="middle">Reading a permission string:  -rwxr-xr--</text>

  <!-- type cell -->
  <rect x="40" y="60" width="56" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="68" y="98" fill="#000000" font-size="26" text-anchor="middle" font-family="monospace">-</text>
  <text x="68" y="140" fill="#000000" font-size="12" text-anchor="middle">type</text>
  <text x="68" y="156" fill="#000000" font-size="11" text-anchor="middle">- = file</text>
  <text x="68" y="170" fill="#000000" font-size="11" text-anchor="middle">d = folder</text>

  <!-- owner -->
  <rect x="120" y="60" width="150" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="145" y="98" fill="#000000" font-size="26" text-anchor="middle" font-family="monospace">r</text>
  <text x="195" y="98" fill="#000000" font-size="26" text-anchor="middle" font-family="monospace">w</text>
  <text x="245" y="98" fill="#000000" font-size="26" text-anchor="middle" font-family="monospace">x</text>
  <text x="195" y="140" fill="#000000" font-size="13" text-anchor="middle">OWNER (you)</text>
  <text x="195" y="158" fill="#000000" font-size="11" text-anchor="middle">read + write + run</text>

  <!-- group -->
  <rect x="270" y="60" width="150" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="295" y="98" fill="#000000" font-size="26" text-anchor="middle" font-family="monospace">r</text>
  <text x="345" y="98" fill="#000000" font-size="26" text-anchor="middle" font-family="monospace">-</text>
  <text x="395" y="98" fill="#000000" font-size="26" text-anchor="middle" font-family="monospace">x</text>
  <text x="345" y="140" fill="#000000" font-size="13" text-anchor="middle">GROUP</text>
  <text x="345" y="158" fill="#000000" font-size="11" text-anchor="middle">read + run, no write</text>

  <!-- other -->
  <rect x="420" y="60" width="150" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="445" y="98" fill="#000000" font-size="26" text-anchor="middle" font-family="monospace">r</text>
  <text x="495" y="98" fill="#000000" font-size="26" text-anchor="middle" font-family="monospace">-</text>
  <text x="545" y="98" fill="#000000" font-size="26" text-anchor="middle" font-family="monospace">-</text>
  <text x="495" y="140" fill="#000000" font-size="13" text-anchor="middle">OTHER (everyone)</text>
  <text x="495" y="158" fill="#000000" font-size="11" text-anchor="middle">read only</text>

  <text x="320" y="210" fill="#000000" font-size="14" text-anchor="middle">r = read    w = write (change)    x = execute (run; on a folder = enter it)</text>
  <text x="320" y="236" fill="#000000" font-size="14" text-anchor="middle">A dash ( - ) means that permission is turned OFF.</text>

  <text x="320" y="280" fill="#000000" font-size="13" text-anchor="middle">Like a document's sharing settings: who can view, who can edit.</text>
  <text x="320" y="304" fill="#000000" font-size="12" text-anchor="middle">Three groups of three: owner, then group, then everyone else.</text>
</svg>
