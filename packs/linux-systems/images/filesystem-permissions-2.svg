<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" font-family="sans-serif">
  <rect width="640" height="420" fill="#ffffff"/>
  <text x="320" y="30" fill="#000000" font-size="18" text-anchor="middle">The Linux filesystem: one tree starting at /</text>

  <!-- root -->
  <rect x="285" y="50" width="70" height="34" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="320" y="73" fill="#000000" font-size="18" text-anchor="middle" font-family="monospace">/</text>
  <text x="395" y="71" fill="#000000" font-size="12" text-anchor="middle">the root</text>

  <!-- connector lines -->
  <line x1="320" y1="84" x2="320" y2="100" stroke="#000000"/>
  <line x1="80" y1="100" x2="560" y2="100" stroke="#000000"/>
  <line x1="80" y1="100" x2="80" y2="120" stroke="#000000"/>
  <line x1="200" y1="100" x2="200" y2="120" stroke="#000000"/>
  <line x1="320" y1="100" x2="320" y2="120" stroke="#000000"/>
  <line x1="440" y1="100" x2="440" y2="120" stroke="#000000"/>
  <line x1="560" y1="100" x2="560" y2="120" stroke="#000000"/>

  <!-- top-level boxes row 1 -->
  <rect x="40" y="120" width="80" height="60" fill="#ffffff" stroke="#000000"/>
  <text x="80" y="143" fill="#000000" font-size="15" text-anchor="middle" font-family="monospace">/home</text>
  <text x="80" y="162" fill="#000000" font-size="11" text-anchor="middle">your</text>
  <text x="80" y="175" fill="#000000" font-size="11" text-anchor="middle">files</text>

  <rect x="160" y="120" width="80" height="60" fill="#ffffff" stroke="#000000"/>
  <text x="200" y="143" fill="#000000" font-size="15" text-anchor="middle" font-family="monospace">/etc</text>
  <text x="200" y="162" fill="#000000" font-size="11" text-anchor="middle">settings</text>
  <text x="200" y="175" fill="#000000" font-size="11" text-anchor="middle">(config)</text>

  <rect x="280" y="120" width="80" height="60" fill="#ffffff" stroke="#000000"/>
  <text x="320" y="143" fill="#000000" font-size="15" text-anchor="middle" font-family="monospace">/bin</text>
  <text x="320" y="162" fill="#000000" font-size="11" text-anchor="middle">programs</text>
  <text x="320" y="175" fill="#000000" font-size="11" text-anchor="middle">(commands)</text>

  <rect x="400" y="120" width="80" height="60" fill="#ffffff" stroke="#000000"/>
  <text x="440" y="143" fill="#000000" font-size="15" text-anchor="middle" font-family="monospace">/var</text>
  <text x="440" y="162" fill="#000000" font-size="11" text-anchor="middle">logs &amp;</text>
  <text x="440" y="175" fill="#000000" font-size="11" text-anchor="middle">changing data</text>

  <rect x="520" y="120" width="80" height="60" fill="#ffffff" stroke="#000000"/>
  <text x="560" y="143" fill="#000000" font-size="15" text-anchor="middle" font-family="monospace">/tmp</text>
  <text x="560" y="162" fill="#000000" font-size="11" text-anchor="middle">scratch</text>
  <text x="560" y="175" fill="#000000" font-size="11" text-anchor="middle">(cleared)</text>

  <!-- second row connector -->
  <line x1="320" y1="200" x2="320" y2="216" stroke="#000000"/>
  <line x1="140" y1="216" x2="500" y2="216" stroke="#000000"/>
  <line x1="140" y1="216" x2="140" y2="236" stroke="#000000"/>
  <line x1="320" y1="216" x2="320" y2="236" stroke="#000000"/>
  <line x1="500" y1="216" x2="500" y2="236" stroke="#000000"/>

  <rect x="100" y="236" width="80" height="60" fill="#ffffff" stroke="#000000"/>
  <text x="140" y="259" fill="#000000" font-size="15" text-anchor="middle" font-family="monospace">/dev</text>
  <text x="140" y="278" fill="#000000" font-size="11" text-anchor="middle">devices</text>
  <text x="140" y="291" fill="#000000" font-size="11" text-anchor="middle">as files</text>

  <rect x="280" y="236" width="80" height="60" fill="#ffffff" stroke="#000000"/>
  <text x="320" y="259" fill="#000000" font-size="15" text-anchor="middle" font-family="monospace">/usr</text>
  <text x="320" y="278" fill="#000000" font-size="11" text-anchor="middle">most installed</text>
  <text x="320" y="291" fill="#000000" font-size="11" text-anchor="middle">software</text>

  <rect x="460" y="236" width="80" height="60" fill="#ffffff" stroke="#000000"/>
  <text x="500" y="259" fill="#000000" font-size="15" text-anchor="middle" font-family="monospace">/proc</text>
  <text x="500" y="278" fill="#000000" font-size="11" text-anchor="middle">live kernel</text>
  <text x="500" y="291" fill="#000000" font-size="11" text-anchor="middle">info</text>

  <text x="320" y="345" fill="#000000" font-size="13" text-anchor="middle">No drive letters (no C:, D:). Everything hangs off the single / tree.</text>
  <text x="320" y="372" fill="#000000" font-size="13" text-anchor="middle">Other disks are "mounted" onto a folder, e.g. a USB stick at /media/usb.</text>
  <text x="320" y="399" fill="#000000" font-size="12" text-anchor="middle">Think: a building directory telling you which floor holds what.</text>
</svg>
