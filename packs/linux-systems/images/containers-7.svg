<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="sans-serif">
  <rect width="720" height="400" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Docker (daemon) vs Podman (daemonless)</text>

  <!-- Docker side -->
  <text x="180" y="62" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8">Docker</text>
  <rect x="40" y="74" width="280" height="44" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="180" y="101" text-anchor="middle" font-size="13" fill="#111">docker command (you type this)</text>
  <line x1="180" y1="118" x2="180" y2="140" stroke="#111" stroke-width="2"/>
  <polygon points="180,140 173,128 187,128" fill="#111"/>
  <rect x="40" y="142" width="280" height="56" fill="#bfdbfe" stroke="#1d4ed8"/>
  <text x="180" y="166" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">dockerd daemon (runs as root)</text>
  <text x="180" y="186" text-anchor="middle" font-size="11" fill="#111">always-on; owns every container</text>
  <line x1="180" y1="198" x2="180" y2="220" stroke="#111" stroke-width="2"/>
  <polygon points="180,220 173,208 187,208" fill="#111"/>
  <rect x="80" y="222" width="200" height="40" fill="#93c5fd" stroke="#1d4ed8"/>
  <text x="180" y="247" text-anchor="middle" font-size="12" fill="#111">containers</text>

  <!-- Podman side -->
  <text x="540" y="62" text-anchor="middle" font-size="15" font-weight="bold" fill="#047857">Podman</text>
  <rect x="400" y="74" width="280" height="44" fill="#d1fae5" stroke="#047857"/>
  <text x="540" y="101" text-anchor="middle" font-size="13" fill="#111">podman command (you type this)</text>
  <line x1="540" y1="118" x2="540" y2="220" stroke="#111" stroke-width="2"/>
  <polygon points="540,220 533,208 547,208" fill="#111"/>
  <text x="610" y="172" text-anchor="middle" font-size="11" fill="#065f46">no daemon</text>
  <text x="610" y="188" text-anchor="middle" font-size="11" fill="#065f46">in between</text>
  <rect x="440" y="222" width="200" height="40" fill="#a7f3d0" stroke="#047857"/>
  <text x="540" y="247" text-anchor="middle" font-size="12" fill="#111">containers (your child processes)</text>

  <text x="360" y="306" text-anchor="middle" font-size="13" fill="#111">Docker routes everything through one always-on root daemon.</text>
  <text x="360" y="330" text-anchor="middle" font-size="13" fill="#111">Podman starts each container directly -- no central daemon.</text>
  <text x="360" y="358" text-anchor="middle" font-size="13" fill="#111">That makes Podman naturally "rootless": a normal user runs containers,</text>
  <text x="360" y="380" text-anchor="middle" font-size="13" fill="#111">and root inside maps to your ordinary (unprivileged) user outside.</text>
</svg>
