<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="sans-serif">
  <rect width="720" height="430" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">Full Desktop Linux vs a Small Custom "Embedded" Image</text>
  <text x="360" y="50" text-anchor="middle" font-size="12" fill="#111">Like a fully stocked kitchen vs a kit with only the parts one device needs</text>

  <!-- Desktop side -->
  <rect x="40" y="75" width="290" height="300" fill="#ffffff" stroke="#111" stroke-width="3"/>
  <text x="185" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Desktop / server distro</text>
  <text x="185" y="118" text-anchor="middle" font-size="11" fill="#111">(Ubuntu, Fedora ... on a PC)</text>

  <rect x="65" y="132" width="240" height="34" fill="#eeeeee" stroke="#111"/>
  <text x="185" y="154" text-anchor="middle" font-size="12" fill="#111">Thousands of programs</text>
  <rect x="65" y="172" width="240" height="34" fill="#eeeeee" stroke="#111"/>
  <text x="185" y="194" text-anchor="middle" font-size="12" fill="#111">Desktop, browser, editors</text>
  <rect x="65" y="212" width="240" height="34" fill="#eeeeee" stroke="#111"/>
  <text x="185" y="234" text-anchor="middle" font-size="12" fill="#111">Package manager on the box</text>
  <rect x="65" y="252" width="240" height="34" fill="#eeeeee" stroke="#111"/>
  <text x="185" y="274" text-anchor="middle" font-size="12" fill="#111">Many GB of disk, lots of RAM</text>
  <text x="185" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">General purpose</text>
  <text x="185" y="340" text-anchor="middle" font-size="11" fill="#111">runs anything, on big hardware</text>

  <!-- Embedded side -->
  <rect x="390" y="75" width="290" height="300" fill="#ffffff" stroke="#111" stroke-width="3"/>
  <text x="535" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Embedded Linux image</text>
  <text x="535" y="118" text-anchor="middle" font-size="11" fill="#111">(router, smart TV, Raspberry Pi)</text>

  <rect x="430" y="152" width="210" height="34" fill="#dbeafe" stroke="#111"/>
  <text x="535" y="174" text-anchor="middle" font-size="12" fill="#111">Just the few parts needed</text>
  <rect x="430" y="196" width="210" height="34" fill="#dbeafe" stroke="#111"/>
  <text x="535" y="218" text-anchor="middle" font-size="12" fill="#111">Tiny kernel + tiny userspace</text>
  <rect x="430" y="240" width="210" height="34" fill="#dbeafe" stroke="#111"/>
  <text x="535" y="262" text-anchor="middle" font-size="12" fill="#111">Built elsewhere, flashed whole</text>
  <text x="535" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">Tailored to ONE device</text>
  <text x="535" y="340" text-anchor="middle" font-size="11" fill="#111">small, fits tiny hardware</text>

  <text x="360" y="408" text-anchor="middle" font-size="12" fill="#111">Same Linux underneath - but embedded means a small, custom image with only</text>
  <text x="360" y="426" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">what one device needs, instead of a full general-purpose install.</text>
</svg>
