<svg xmlns="http://www.w3.org/2000/svg" width="720" height="410" viewBox="0 0 720 410" font-family="sans-serif">
  <rect width="720" height="410" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="18" text-anchor="middle" font-weight="bold">A firewall: a reception desk for incoming traffic</text>
  <text x="360" y="48" fill="#000000" font-size="12" text-anchor="middle">Rules checked top to bottom: allow SSH, drop everything else</text>

  <!-- incoming arrows -->
  <text x="70" y="120" fill="#000000" font-size="11" text-anchor="middle">incoming</text>
  <text x="70" y="136" fill="#000000" font-size="11" text-anchor="middle">connections</text>
  <line x1="120" y1="170" x2="210" y2="170" stroke="#000000" stroke-width="2"/>
  <polygon points="210,165 220,170 210,175" fill="#000000"/>
  <text x="100" y="190" fill="#000000" font-size="11" font-family="monospace">port 22 (SSH)</text>
  <line x1="120" y1="240" x2="210" y2="240" stroke="#000000" stroke-width="2"/>
  <polygon points="210,235 220,240 210,245" fill="#000000"/>
  <text x="100" y="260" fill="#000000" font-size="11" font-family="monospace">port 23 (telnet)</text>
  <line x1="120" y1="300" x2="210" y2="300" stroke="#000000" stroke-width="2"/>
  <polygon points="210,295 220,300 210,305" fill="#000000"/>
  <text x="100" y="320" fill="#000000" font-size="11" font-family="monospace">port 3306 (db)</text>

  <!-- firewall box (rules) -->
  <rect x="230" y="90" width="250" height="250" fill="#eeeeee" stroke="#000000" stroke-width="2"/>
  <text x="355" y="112" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">nftables input chain</text>
  <text x="240" y="140" fill="#000000" font-size="11" font-family="monospace">ct state established accept</text>
  <text x="240" y="166" fill="#000000" font-size="11" font-family="monospace">iif lo accept</text>
  <text x="240" y="192" fill="#000000" font-size="11" font-family="monospace">tcp dport 22 accept</text>
  <line x1="240" y1="210" x2="470" y2="210" stroke="#000000" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="240" y="232" fill="#000000" font-size="11" font-family="monospace">policy drop</text>
  <text x="355" y="262" fill="#000000" font-size="10" text-anchor="middle">(anything not allowed above</text>
  <text x="355" y="278" fill="#000000" font-size="10" text-anchor="middle">falls through to DROP)</text>
  <text x="355" y="312" fill="#000000" font-size="10" font-style="italic" text-anchor="middle">"default-deny": safe posture</text>

  <!-- outcomes -->
  <line x1="480" y1="186" x2="560" y2="170" stroke="#000000" stroke-width="2"/>
  <polygon points="560,166 570,170 558,177" fill="#000000"/>
  <rect x="570" y="150" width="120" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="630" y="175" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">ALLOWED</text>

  <line x1="480" y1="240" x2="560" y2="270" stroke="#000000" stroke-width="2"/>
  <polygon points="560,266 570,272 557,277" fill="#000000"/>
  <rect x="570" y="250" width="120" height="80" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="630" y="285" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">DROPPED</text>
  <text x="630" y="306" fill="#000000" font-size="10" text-anchor="middle">silently discarded</text>
  <text x="630" y="320" fill="#000000" font-size="10" text-anchor="middle">(telnet, db, ...)</text>

  <text x="360" y="372" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">Modern tool: nft (nftables), replaces the old iptables</text>
  <text x="360" y="394" fill="#000000" font-size="11" text-anchor="middle">A firewall decides which packets may pass; here only SSH gets in.</text>
</svg>
