<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="sans-serif">
  <rect width="760" height="400" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">How a Board Boots Linux: a Relay Race of Handoffs</text>
  <text x="380" y="50" text-anchor="middle" font-size="12" fill="#111">Each stage wakes up the next, then hands over the baton</text>

  <!-- Stage boxes -->
  <rect x="30" y="90" width="130" height="90" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="95" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Boot ROM</text>
  <text x="95" y="142" text-anchor="middle" font-size="10" fill="#111">tiny code baked</text>
  <text x="95" y="156" text-anchor="middle" font-size="10" fill="#111">into the chip</text>
  <text x="95" y="170" text-anchor="middle" font-size="10" fill="#111">runs first</text>

  <rect x="190" y="90" width="140" height="90" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="260" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">U-Boot</text>
  <text x="260" y="142" text-anchor="middle" font-size="10" fill="#111">the bootloader</text>
  <text x="260" y="156" text-anchor="middle" font-size="10" fill="#111">finds + loads the</text>
  <text x="260" y="170" text-anchor="middle" font-size="10" fill="#111">kernel into memory</text>

  <rect x="360" y="90" width="160" height="90" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="440" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Kernel + Device Tree</text>
  <text x="440" y="138" text-anchor="middle" font-size="10" fill="#111">Linux core starts;</text>
  <text x="440" y="152" text-anchor="middle" font-size="10" fill="#111">device tree tells it</text>
  <text x="440" y="166" text-anchor="middle" font-size="10" fill="#111">what hardware exists</text>

  <rect x="550" y="90" width="140" height="90" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="620" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">init</text>
  <text x="620" y="142" text-anchor="middle" font-size="10" fill="#111">first program;</text>
  <text x="620" y="156" text-anchor="middle" font-size="10" fill="#111">starts services,</text>
  <text x="620" y="170" text-anchor="middle" font-size="10" fill="#111">gives a login</text>

  <!-- arrows -->
  <line x1="160" y1="135" x2="188" y2="135" stroke="#111" stroke-width="3"/>
  <polygon points="188,135 176,128 176,142" fill="#111"/>
  <line x1="330" y1="135" x2="358" y2="135" stroke="#111" stroke-width="3"/>
  <polygon points="358,135 346,128 346,142" fill="#111"/>
  <line x1="520" y1="135" x2="548" y2="135" stroke="#111" stroke-width="3"/>
  <polygon points="548,135 536,128 536,142" fill="#111"/>

  <!-- PC contrast -->
  <rect x="80" y="240" width="600" height="80" fill="#ffffff" stroke="#111" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="380" y="266" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">On a normal PC the first stage is different (BIOS/UEFI firmware),</text>
  <text x="380" y="288" text-anchor="middle" font-size="12" fill="#111">and the PC can detect its own hardware, so it needs no device tree.</text>
  <text x="380" y="308" text-anchor="middle" font-size="12" fill="#111">A small board can't auto-detect its parts - that is why the device tree exists.</text>

  <text x="380" y="358" text-anchor="middle" font-size="12" fill="#111">Boot ROM -&gt; U-Boot -&gt; Kernel + Device Tree -&gt; init -&gt; login prompt.</text>
  <text x="380" y="380" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">Power on at the left; a usable system at the right.</text>
</svg>
