<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" fill="#000000" font-size="18" font-weight="bold">SIGTERM vs SIGKILL</text>

  <!-- divider -->
  <line x1="320" y1="55" x2="320" y2="370" stroke="#000000" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- LEFT: SIGTERM -->
  <text x="160" y="80" text-anchor="middle" fill="#000000" font-size="15" font-weight="bold">SIGTERM (15) — polite</text>
  <text x="160" y="102" text-anchor="middle" fill="#000000" font-size="12">"Please stop when you're ready."</text>

  <rect x="40" y="120" width="240" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="160" y="145" text-anchor="middle" fill="#000000" font-size="12">1. Program receives the request</text>

  <rect x="40" y="175" width="240" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="160" y="200" text-anchor="middle" fill="#000000" font-size="12">2. It can clean up: save files,</text>

  <rect x="40" y="230" width="240" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="160" y="248" text-anchor="middle" fill="#000000" font-size="12">3. Then exits tidily</text>
  <text x="160" y="263" text-anchor="middle" fill="#000000" font-size="11">(can be caught or ignored)</text>

  <text x="160" y="300" text-anchor="middle" fill="#000000" font-size="11">Command:  kill 4242</text>

  <!-- RIGHT: SIGKILL -->
  <text x="480" y="80" text-anchor="middle" fill="#000000" font-size="15" font-weight="bold">SIGKILL (9) — forced</text>
  <text x="480" y="102" text-anchor="middle" fill="#000000" font-size="12">"Stop right now. No choice."</text>

  <rect x="360" y="120" width="240" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="480" y="145" text-anchor="middle" fill="#000000" font-size="12">Kernel removes the process</text>

  <rect x="360" y="175" width="240" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="480" y="194" text-anchor="middle" fill="#000000" font-size="12">No cleanup: unsaved work and</text>
  <text x="480" y="209" text-anchor="middle" fill="#000000" font-size="11">temp/lock files may be left behind</text>

  <rect x="360" y="230" width="240" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="480" y="248" text-anchor="middle" fill="#000000" font-size="12">Cannot be caught or ignored</text>
  <text x="480" y="263" text-anchor="middle" fill="#000000" font-size="11">(the guaranteed last resort)</text>

  <text x="480" y="300" text-anchor="middle" fill="#000000" font-size="11">Command:  kill -9 4242</text>

  <text x="320" y="345" text-anchor="middle" fill="#000000" font-size="12" font-weight="bold">Rule of thumb: try SIGTERM first; use SIGKILL only if it won't stop.</text>
  <text x="320" y="368" text-anchor="middle" fill="#000000" font-size="11">Like asking an app to close vs force-quitting it in Task Manager.</text>
</svg>
