<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="sans-serif">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">What a Container Bundles: "Works on My Machine" Fixed</text>

  <!-- The bundle box -->
  <rect x="60" y="60" width="300" height="280" fill="#ffffff" stroke="#111" stroke-width="3"/>
  <text x="210" y="86" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">One Container Bundle</text>

  <rect x="90" y="100" width="240" height="44" fill="#dbeafe" stroke="#111"/>
  <text x="210" y="127" text-anchor="middle" font-size="14" fill="#111">Your App (the program)</text>

  <rect x="90" y="152" width="240" height="44" fill="#dbeafe" stroke="#111"/>
  <text x="210" y="179" text-anchor="middle" font-size="14" fill="#111">Libraries it needs</text>

  <rect x="90" y="204" width="240" height="44" fill="#dbeafe" stroke="#111"/>
  <text x="210" y="231" text-anchor="middle" font-size="14" fill="#111">Config files + tools</text>

  <rect x="90" y="256" width="240" height="44" fill="#dbeafe" stroke="#111"/>
  <text x="210" y="283" text-anchor="middle" font-size="14" fill="#111">Correct versions, locked in</text>

  <text x="210" y="324" text-anchor="middle" font-size="13" fill="#111">Everything packed together</text>

  <!-- Arrow -->
  <line x1="372" y1="200" x2="448" y2="200" stroke="#111" stroke-width="3"/>
  <polygon points="448,200 436,193 436,207" fill="#111"/>
  <text x="410" y="190" text-anchor="middle" font-size="12" fill="#111">runs the</text>
  <text x="410" y="224" text-anchor="middle" font-size="12" fill="#111">same on</text>

  <!-- Machines -->
  <rect x="470" y="80" width="190" height="60" fill="#d1fae5" stroke="#047857"/>
  <text x="565" y="106" text-anchor="middle" font-size="13" fill="#111">Your laptop</text>
  <text x="565" y="126" text-anchor="middle" font-size="12" fill="#065f46">same result</text>

  <rect x="470" y="160" width="190" height="60" fill="#d1fae5" stroke="#047857"/>
  <text x="565" y="186" text-anchor="middle" font-size="13" fill="#111">A teammate's PC</text>
  <text x="565" y="206" text-anchor="middle" font-size="12" fill="#065f46">same result</text>

  <rect x="470" y="240" width="190" height="60" fill="#d1fae5" stroke="#047857"/>
  <text x="565" y="266" text-anchor="middle" font-size="13" fill="#111">A cloud server</text>
  <text x="565" y="286" text-anchor="middle" font-size="12" fill="#065f46">same result</text>

  <text x="360" y="376" text-anchor="middle" font-size="13" fill="#111">A container packages an app WITH everything it needs, so it behaves</text>
  <text x="360" y="396" text-anchor="middle" font-size="13" fill="#111">identically anywhere -- no more "but it works on MY computer."</text>
</svg>
