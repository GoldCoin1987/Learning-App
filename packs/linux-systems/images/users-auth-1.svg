<svg xmlns="http://www.w3.org/2000/svg" width="660" height="360" viewBox="0 0 660 360" font-family="monospace">
  <rect width="660" height="360" fill="#0f1117"/>
  <text x="330" y="32" fill="#e6e6e6" font-size="18" text-anchor="middle" font-family="sans-serif">The password to shell journey (login)</text>

  <!-- step boxes -->
  <rect x="30" y="60" width="180" height="50" fill="#37474f" stroke="#90a4ae"/>
  <text x="120" y="82" fill="#e6e6e6" font-size="14" text-anchor="middle" font-family="sans-serif">1. login / sshd / gdm</text>
  <text x="120" y="100" fill="#90a4ae" font-size="11" text-anchor="middle" font-family="sans-serif">collects username + secret</text>

  <rect x="240" y="60" width="180" height="50" fill="#1a2f4a" stroke="#42a5f5"/>
  <text x="330" y="82" fill="#90caf9" font-size="14" text-anchor="middle" font-family="sans-serif">2. PAM stack</text>
  <text x="330" y="100" fill="#90a4ae" font-size="11" text-anchor="middle" font-family="sans-serif">auth / account / session</text>

  <rect x="450" y="60" width="180" height="50" fill="#3a2a14" stroke="#ffb74d"/>
  <text x="540" y="82" fill="#ffd54f" font-size="14" text-anchor="middle" font-family="sans-serif">3. NSS lookup</text>
  <text x="540" y="100" fill="#90a4ae" font-size="11" text-anchor="middle" font-family="sans-serif">nsswitch.conf: files/sss/ldap</text>

  <!-- arrows row 1 -->
  <line x1="210" y1="85" x2="240" y2="85" stroke="#90a4ae" stroke-width="2" marker-end="url(#a)"/>
  <line x1="420" y1="85" x2="450" y2="85" stroke="#90a4ae" stroke-width="2" marker-end="url(#a)"/>

  <!-- middle resolution -->
  <rect x="240" y="150" width="390" height="56" fill="#101b14" stroke="#66bb6a"/>
  <text x="435" y="172" fill="#a5d6a7" font-size="13" text-anchor="middle" font-family="sans-serif">pam_unix verifies hash in /etc/shadow ($6$=SHA-512, $y$=yescrypt)</text>
  <text x="435" y="190" fill="#a5d6a7" font-size="13" text-anchor="middle" font-family="sans-serif">UID/GID resolved from /etc/passwd + /etc/group</text>
  <line x1="330" y1="110" x2="350" y2="150" stroke="#42a5f5" stroke-width="2" marker-end="url(#a)"/>
  <line x1="540" y1="110" x2="520" y2="150" stroke="#ffb74d" stroke-width="2" marker-end="url(#a)"/>

  <!-- credentials set -->
  <rect x="180" y="240" width="300" height="50" fill="#2a1f3a" stroke="#ab47bc"/>
  <text x="330" y="262" fill="#ce93d8" font-size="14" text-anchor="middle" font-family="sans-serif">4. setuid/setgid + supplementary groups</text>
  <text x="330" y="280" fill="#90a4ae" font-size="11" text-anchor="middle" font-family="sans-serif">credentials fixed for the session here</text>
  <line x1="435" y1="206" x2="380" y2="240" stroke="#66bb6a" stroke-width="2" marker-end="url(#a)"/>

  <!-- shell -->
  <rect x="230" y="312" width="200" height="40" fill="#1b3a2b" stroke="#66bb6a"/>
  <text x="330" y="337" fill="#a5d6a7" font-size="14" text-anchor="middle" font-family="sans-serif">5. exec login shell ($SHELL)</text>
  <line x1="330" y1="290" x2="330" y2="312" stroke="#ab47bc" stroke-width="2" marker-end="url(#a)"/>

  <text x="40" y="290" fill="#ff8a80" font-size="11" font-family="sans-serif">nologin shell -&gt; step 5 exits immediately</text>
  <text x="40" y="307" fill="#90a4ae" font-size="11" font-family="sans-serif">group added after step 4? not visible until next login.</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#90a4ae"/>
    </marker>
  </defs>
</svg>
