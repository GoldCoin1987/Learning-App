<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240" font-family="monospace">
  <rect width="640" height="240" fill="#ffffff"/>
  <text x="320" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">Anatomy of a command line</text>

  <!-- the typed line -->
  <text x="60" y="90" fill="#000000" font-size="22">ls</text>
  <text x="120" y="90" fill="#000000" font-size="22">-l</text>
  <text x="200" y="90" fill="#000000" font-size="22">/home/you</text>

  <!-- brackets/labels for command -->
  <line x1="55" y1="105" x2="95" y2="105" stroke="#000000" stroke-width="2"/>
  <text x="75" y="130" fill="#000000" font-size="13" text-anchor="middle">command</text>
  <text x="75" y="148" fill="#444444" font-size="11" text-anchor="middle">(what to run)</text>

  <!-- option -->
  <line x1="115" y1="105" x2="155" y2="105" stroke="#000000" stroke-width="2"/>
  <text x="135" y="170" fill="#000000" font-size="13" text-anchor="middle">option / flag</text>
  <text x="135" y="188" fill="#444444" font-size="11" text-anchor="middle">(changes behavior)</text>

  <!-- argument -->
  <line x1="195" y1="105" x2="335" y2="105" stroke="#000000" stroke-width="2"/>
  <text x="265" y="130" fill="#000000" font-size="13" text-anchor="middle">argument</text>
  <text x="265" y="148" fill="#444444" font-size="11" text-anchor="middle">(what to act on)</text>

  <text x="320" y="222" fill="#000000" font-size="13" text-anchor="middle">Parts are separated by spaces. The shell reads left to right.</text>
</svg>
