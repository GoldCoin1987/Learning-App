<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="sans-serif">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">A Dockerfile Builds an Image in Layers</text>

  <!-- Dockerfile column -->
  <text x="180" y="64" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Dockerfile (the recipe)</text>
  <rect x="40" y="78" width="280" height="40" fill="#eef2ff" stroke="#3730a3"/>
  <text x="56" y="103" font-size="13" fill="#111">FROM python:3.12   (base)</text>
  <rect x="40" y="120" width="280" height="40" fill="#eef2ff" stroke="#3730a3"/>
  <text x="56" y="145" font-size="13" fill="#111">COPY requirements.txt .</text>
  <rect x="40" y="162" width="280" height="40" fill="#eef2ff" stroke="#3730a3"/>
  <text x="56" y="187" font-size="13" fill="#111">RUN pip install -r ...</text>
  <rect x="40" y="204" width="280" height="40" fill="#eef2ff" stroke="#3730a3"/>
  <text x="56" y="229" font-size="13" fill="#111">COPY . .   (your code)</text>
  <rect x="40" y="246" width="280" height="40" fill="#eef2ff" stroke="#3730a3"/>
  <text x="56" y="271" font-size="13" fill="#111">CMD ["python","app.py"]</text>

  <!-- build arrow -->
  <line x1="330" y1="180" x2="396" y2="180" stroke="#111" stroke-width="3"/>
  <polygon points="396,180 384,173 384,187" fill="#111"/>
  <text x="363" y="170" text-anchor="middle" font-size="12" fill="#111">build</text>

  <!-- Layer stack -->
  <text x="540" y="64" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Stacked image layers</text>
  <rect x="430" y="246" width="220" height="40" fill="#bfdbfe" stroke="#1d4ed8"/>
  <text x="540" y="271" text-anchor="middle" font-size="12" fill="#111">layer 4: your code</text>
  <rect x="430" y="204" width="220" height="40" fill="#93c5fd" stroke="#1d4ed8"/>
  <text x="540" y="229" text-anchor="middle" font-size="12" fill="#111">layer 3: installed packages</text>
  <rect x="430" y="162" width="220" height="40" fill="#bfdbfe" stroke="#1d4ed8"/>
  <text x="540" y="187" text-anchor="middle" font-size="12" fill="#111">layer 2: requirements file</text>
  <rect x="430" y="120" width="220" height="40" fill="#93c5fd" stroke="#1d4ed8"/>
  <text x="540" y="145" text-anchor="middle" font-size="12" fill="#111">layer 1: base (Python)</text>
  <text x="540" y="108" text-anchor="middle" font-size="11" fill="#111">each step adds a layer on top</text>

  <text x="360" y="320" text-anchor="middle" font-size="13" fill="#111">Each instruction adds one stacked layer. Docker caches layers and</text>
  <text x="360" y="342" text-anchor="middle" font-size="13" fill="#111">reuses unchanged ones, so rebuilds are fast (the build cache).</text>
  <text x="360" y="370" text-anchor="middle" font-size="13" fill="#111">Tip: copy dependencies BEFORE your code, so editing code does not</text>
  <text x="360" y="392" text-anchor="middle" font-size="13" fill="#111">force the slow "install packages" layer to run again.</text>
</svg>
