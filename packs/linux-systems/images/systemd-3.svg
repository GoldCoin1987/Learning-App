<svg xmlns="http://www.w3.org/2000/svg" width="780" height="430" viewBox="0 0 780 430" font-family="sans-serif">
  <rect width="780" height="430" fill="#0f1117"/>
  <text x="390" y="30" fill="#e8e8e8" font-size="18" font-weight="bold" text-anchor="middle">Anatomy of a .service Unit File</text>
  <text x="390" y="50" fill="#8893a8" font-size="12" text-anchor="middle">/etc/systemd/system/myapp.service</text>

  <!-- code panel -->
  <rect x="40" y="70" width="420" height="320" rx="8" fill="#161a22" stroke="#2a3550" stroke-width="2"/>

  <text x="60" y="100" fill="#9ec1ff" font-size="14" font-family="monospace" font-weight="bold">[Unit]</text>
  <text x="60" y="122" fill="#cfd8ec" font-size="13" font-family="monospace">Description=My App</text>

  <text x="60" y="160" fill="#9ec1ff" font-size="14" font-family="monospace" font-weight="bold">[Service]</text>
  <text x="60" y="182" fill="#cfd8ec" font-size="13" font-family="monospace">ExecStart=/usr/bin/myapp</text>
  <text x="60" y="204" fill="#cfd8ec" font-size="13" font-family="monospace">Restart=on-failure</text>
  <text x="60" y="226" fill="#cfd8ec" font-size="13" font-family="monospace">User=myapp</text>

  <text x="60" y="264" fill="#9ec1ff" font-size="14" font-family="monospace" font-weight="bold">[Install]</text>
  <text x="60" y="286" fill="#cfd8ec" font-size="13" font-family="monospace">WantedBy=multi-user.target</text>

  <text x="60" y="350" fill="#8893a8" font-size="11" font-family="monospace">After editing: systemctl</text>
  <text x="60" y="368" fill="#8893a8" font-size="11" font-family="monospace">daemon-reload</text>

  <!-- annotations -->
  <text x="490" y="100" fill="#fbbf24" font-size="12">&#8592; a human-readable name</text>
  <text x="490" y="182" fill="#fbbf24" font-size="12">&#8592; the command to run</text>
  <text x="490" y="204" fill="#fbbf24" font-size="12">&#8592; restart it if it crashes</text>
  <text x="490" y="226" fill="#fbbf24" font-size="12">&#8592; run as this user, not root</text>
  <text x="490" y="286" fill="#fbbf24" font-size="12">&#8592; where to hook it in</text>
  <text x="490" y="304" fill="#8893a8" font-size="11">   at boot (used by enable)</text>
  <text x="490" y="360" fill="#a7f3c8" font-size="12">reload so systemd re-reads</text>
  <text x="490" y="378" fill="#a7f3c8" font-size="12">the file from disk</text>
</svg>
