<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" font-family="monospace">
  <rect width="720" height="340" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">A for loop repeats once per item in a list</text>

  <defs>
    <marker id="ar5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- code -->
  <rect x="40" y="56" width="300" height="92" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="54" y="84" fill="#000000" font-size="13">for color in red green blue; do</text>
  <text x="54" y="112" fill="#000000" font-size="13">    echo "$color"</text>
  <text x="54" y="138" fill="#000000" font-size="13">done</text>

  <!-- the list -->
  <text x="200" y="178" fill="#000000" font-size="12" text-anchor="middle">the list:</text>
  <rect x="60" y="190" width="80" height="36" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="100" y="213" fill="#000000" font-size="13" text-anchor="middle">red</text>
  <rect x="160" y="190" width="80" height="36" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="200" y="213" fill="#000000" font-size="13" text-anchor="middle">green</text>
  <rect x="260" y="190" width="80" height="36" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="300" y="213" fill="#000000" font-size="13" text-anchor="middle">blue</text>

  <!-- pass 1/2/3 -->
  <text x="500" y="76" fill="#000000" font-size="12" font-weight="bold">each pass: color = one item</text>
  <line x1="100" y1="226" x2="445" y2="100" stroke="#000000" stroke-width="1.5" marker-end="url(#ar5)"/>
  <line x1="200" y1="226" x2="445" y2="150" stroke="#000000" stroke-width="1.5" marker-end="url(#ar5)"/>
  <line x1="300" y1="226" x2="445" y2="200" stroke="#000000" stroke-width="1.5" marker-end="url(#ar5)"/>

  <rect x="450" y="86" width="220" height="28" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="460" y="105" fill="#000000" font-size="12">pass 1: echo &#8594; red</text>
  <rect x="450" y="136" width="220" height="28" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="460" y="155" fill="#000000" font-size="12">pass 2: echo &#8594; green</text>
  <rect x="450" y="186" width="220" height="28" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="460" y="205" fill="#000000" font-size="12">pass 3: echo &#8594; blue</text>

  <text x="360" y="262" fill="#000000" font-size="12" text-anchor="middle">The body between  do  and  done  runs once for every item, with the variable set to that item.</text>
  <text x="360" y="290" fill="#444444" font-size="11" text-anchor="middle">A  while  loop instead repeats as long as a test stays true (e.g. reading a file line by line).</text>
</svg>
