<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="sans-serif">
  <rect width="720" height="430" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="18" text-anchor="middle" font-weight="bold">Reading your network: ip addr and ip route</text>
  <text x="360" y="48" fill="#000000" font-size="12" text-anchor="middle">Like your phone's Wi-Fi screen, but from the command line</text>

  <!-- ip addr box -->
  <rect x="30" y="70" width="400" height="150" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="40" y="90" fill="#000000" font-size="12" font-family="monospace" font-weight="bold">$ ip addr show</text>
  <text x="40" y="112" fill="#000000" font-size="11" font-family="monospace">2: eth0: &lt;UP&gt; mtu 1500</text>
  <text x="40" y="132" fill="#000000" font-size="11" font-family="monospace">    link/ether a4:5e:60:1b:cc:01</text>
  <text x="40" y="152" fill="#000000" font-size="11" font-family="monospace">    inet 192.168.1.42/24 ...</text>

  <!-- callouts for ip addr -->
  <line x1="120" y1="116" x2="120" y2="200" stroke="#000000" stroke-width="1"/>
  <text x="120" y="214" fill="#000000" font-size="10" text-anchor="middle">interface name (the NIC)</text>
  <line x1="250" y1="136" x2="250" y2="178" stroke="#000000" stroke-width="1"/>
  <text x="250" y="192" fill="#000000" font-size="10" text-anchor="middle">MAC (hardware address)</text>
  <rect x="118" y="143" width="150" height="14" fill="none" stroke="#000000" stroke-width="2"/>
  <line x1="330" y1="152" x2="395" y2="152" stroke="#000000" stroke-width="1"/>
  <text x="362" y="166" fill="#000000" font-size="10" text-anchor="middle">YOUR IP address</text>

  <!-- ip route box -->
  <rect x="30" y="250" width="400" height="100" fill="#eeeeee" stroke="#000000" stroke-width="2"/>
  <text x="40" y="270" fill="#000000" font-size="12" font-family="monospace" font-weight="bold">$ ip route show</text>
  <text x="40" y="292" fill="#000000" font-size="11" font-family="monospace">default via 192.168.1.1 dev eth0</text>
  <text x="40" y="312" fill="#000000" font-size="11" font-family="monospace">192.168.1.0/24 dev eth0</text>
  <rect x="86" y="280" width="135" height="15" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="153" y="335" fill="#000000" font-size="10" text-anchor="middle">the GATEWAY (door to other networks)</text>

  <!-- right side: meaning panel -->
  <rect x="455" y="70" width="235" height="280" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="572" y="92" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">What you just learned</text>
  <text x="467" y="122" fill="#000000" font-size="11">Interface = the network card</text>
  <text x="467" y="142" fill="#000000" font-size="11">(eth0 = wired, wlan0 = Wi-Fi).</text>
  <text x="467" y="172" fill="#000000" font-size="11">IP address = this machine's</text>
  <text x="467" y="192" fill="#000000" font-size="11">number on the network.</text>
  <text x="467" y="222" fill="#000000" font-size="11">Gateway = the router that</text>
  <text x="467" y="242" fill="#000000" font-size="11">forwards you to the world.</text>
  <text x="467" y="282" fill="#000000" font-size="11" font-style="italic">Modern tool: ip (iproute2),</text>
  <text x="467" y="302" fill="#000000" font-size="11" font-style="italic">replaces the old ifconfig.</text>

  <text x="360" y="378" fill="#000000" font-size="12" text-anchor="middle" font-weight="bold">See it:  ip a   (your address)      ip route   (your gateway)</text>
  <text x="360" y="400" fill="#000000" font-size="11" text-anchor="middle">Three questions answered: what card, what address, which way out.</text>
</svg>
