<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" font-family="monospace">
  <rect width="760" height="300" fill="#ffffff"/>
  <text x="380" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">A pipeline: each tool hands its output to the next with |</text>

  <defs>
    <marker id="ah6" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- stage boxes -->
  <rect x="20" y="80" width="120" height="60" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="80" y="108" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">log file</text>
  <text x="80" y="128" fill="#444444" font-size="11" text-anchor="middle">all requests</text>

  <rect x="180" y="80" width="130" height="60" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="245" y="104" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">grep 404</text>
  <text x="245" y="126" fill="#444444" font-size="11" text-anchor="middle">keep errors</text>

  <rect x="350" y="80" width="150" height="60" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="425" y="104" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">awk '{print $1}'</text>
  <text x="425" y="126" fill="#444444" font-size="11" text-anchor="middle">take the IP column</text>

  <rect x="540" y="80" width="200" height="60" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="640" y="104" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">sort | uniq -c</text>
  <text x="640" y="126" fill="#444444" font-size="11" text-anchor="middle">count each IP</text>

  <line x1="140" y1="110" x2="178" y2="110" stroke="#000000" stroke-width="2" marker-end="url(#ah6)"/>
  <line x1="310" y1="110" x2="348" y2="110" stroke="#000000" stroke-width="2" marker-end="url(#ah6)"/>
  <line x1="500" y1="110" x2="538" y2="110" stroke="#000000" stroke-width="2" marker-end="url(#ah6)"/>

  <!-- final stage -->
  <rect x="290" y="172" width="180" height="56" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="380" y="196" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">sort -rn | head</text>
  <text x="380" y="218" fill="#444444" font-size="11" text-anchor="middle">biggest counts first, top few</text>
  <line x1="640" y1="140" x2="640" y2="200" stroke="#000000" stroke-width="2"/>
  <line x1="640" y1="200" x2="472" y2="200" stroke="#000000" stroke-width="2" marker-end="url(#ah6)"/>

  <text x="380" y="262" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">Result: the IP addresses that hit the most 404s, top of the list.</text>
  <text x="380" y="286" fill="#444444" font-size="12" text-anchor="middle">Each | feeds one tool's output straight into the next. Build it up one stage at a time.</text>
</svg>
