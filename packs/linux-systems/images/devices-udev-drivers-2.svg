<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="Helvetica, Arial, sans-serif">
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="34" fill="#000000" font-size="19" font-weight="bold" text-anchor="middle">Hardware shows up as files in /dev</text>

  <!-- left: hardware -->
  <text x="150" y="70" fill="#000000" font-size="14" font-weight="bold" text-anchor="middle">Real hardware</text>
  <rect x="40" y="90" width="220" height="50" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="150" y="120" fill="#000000" font-size="13" text-anchor="middle">Hard disk</text>
  <rect x="40" y="160" width="220" height="50" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="150" y="190" fill="#000000" font-size="13" text-anchor="middle">USB serial adapter</text>
  <rect x="40" y="230" width="220" height="50" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="150" y="260" fill="#000000" font-size="13" text-anchor="middle">Keyboard / terminal</text>

  <!-- arrows -->
  <line x1="265" y1="115" x2="455" y2="115" stroke="#000000" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="265" y1="185" x2="455" y2="185" stroke="#000000" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="265" y1="255" x2="455" y2="255" stroke="#000000" stroke-width="2" marker-end="url(#ar)"/>

  <!-- right: /dev files -->
  <text x="575" y="70" fill="#000000" font-size="14" font-weight="bold" text-anchor="middle">File in /dev</text>
  <rect x="460" y="90" width="220" height="50" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="570" y="113" fill="#000000" font-size="13" text-anchor="middle">/dev/sda</text>
  <text x="570" y="131" fill="#000000" font-size="11" text-anchor="middle">(block device)</text>
  <rect x="460" y="160" width="220" height="50" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="570" y="183" fill="#000000" font-size="13" text-anchor="middle">/dev/ttyUSB0</text>
  <text x="570" y="201" fill="#000000" font-size="11" text-anchor="middle">(character device)</text>
  <rect x="460" y="230" width="220" height="50" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="570" y="253" fill="#000000" font-size="13" text-anchor="middle">/dev/tty</text>
  <text x="570" y="271" fill="#000000" font-size="11" text-anchor="middle">(character device)</text>

  <text x="360" y="320" fill="#000000" font-size="12" text-anchor="middle">Programs read and write these files instead of touching the hardware directly.</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
