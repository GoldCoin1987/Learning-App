<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="monospace" font-size="13">
  <rect width="720" height="430" fill="#0f1419"/>
  <text x="360" y="28" fill="#e6e6e6" font-size="16" text-anchor="middle">Kernel state surfaced as files: /proc vs /sys</text>

  <!-- Kernel box -->
  <rect x="220" y="50" width="280" height="40" rx="6" fill="#3b2f5e" stroke="#9b87d6"/>
  <text x="360" y="75" fill="#d7c9ff" text-anchor="middle">Linux kernel (in-memory state)</text>

  <!-- /proc column -->
  <rect x="30" y="120" width="300" height="280" rx="8" fill="#13241f" stroke="#4fae8a"/>
  <text x="180" y="145" fill="#7fe3bd" text-anchor="middle" font-size="15">/proc  (procfs)</text>
  <text x="180" y="166" fill="#6fae9a" text-anchor="middle" font-size="11">processes + global kernel info</text>
  <text x="50" y="196" fill="#cfe9df">/proc/&lt;pid&gt;/cmdline  fd/  maps</text>
  <text x="50" y="218" fill="#cfe9df">/proc/&lt;pid&gt;/status  limits  stat</text>
  <text x="50" y="248" fill="#cfe9df">/proc/meminfo   /proc/cpuinfo</text>
  <text x="50" y="270" fill="#cfe9df">/proc/loadavg  /proc/mounts</text>
  <text x="50" y="292" fill="#cfe9df">/proc/interrupts  /proc/cmdline</text>
  <rect x="50" y="312" width="260" height="70" rx="6" fill="#1b3a31" stroke="#4fae8a"/>
  <text x="180" y="334" fill="#7fe3bd" text-anchor="middle">/proc/sys/  =  sysctl tree</text>
  <text x="180" y="356" fill="#cfe9df" text-anchor="middle" font-size="11">net.ipv4.ip_forward</text>
  <text x="180" y="374" fill="#cfe9df" text-anchor="middle" font-size="11">vm.swappiness</text>

  <!-- /sys column -->
  <rect x="390" y="120" width="300" height="280" rx="8" fill="#241a24" stroke="#cf7fae"/>
  <text x="540" y="145" fill="#f0a9d6" text-anchor="middle" font-size="15">/sys  (sysfs)</text>
  <text x="540" y="166" fill="#c98ab0" text-anchor="middle" font-size="11">unified device / driver model</text>
  <text x="410" y="196" fill="#efd9e7">/sys/devices/   (the real tree)</text>
  <text x="410" y="220" fill="#efd9e7">/sys/class/net/  block/  ...</text>
  <text x="410" y="244" fill="#efd9e7">/sys/block/   (whole disks)</text>
  <text x="410" y="268" fill="#efd9e7">/sys/module/  (params, refcnt)</text>
  <rect x="410" y="292" width="260" height="90" rx="6" fill="#3a1b33" stroke="#cf7fae"/>
  <text x="540" y="314" fill="#f0a9d6" text-anchor="middle">class/ &amp; block/ are symlinks</text>
  <text x="540" y="334" fill="#efd9e7" text-anchor="middle" font-size="11">into /sys/devices/...</text>
  <text x="540" y="358" fill="#efd9e7" text-anchor="middle" font-size="11">one device, many views</text>
  <text x="540" y="376" fill="#efd9e7" text-anchor="middle" font-size="11">(udev reads attrs here)</text>

  <!-- arrows -->
  <line x1="300" y1="90" x2="180" y2="120" stroke="#9b87d6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="420" y1="90" x2="540" y2="120" stroke="#9b87d6" stroke-width="1.5" marker-end="url(#a)"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9b87d6"/>
    </marker>
  </defs>
  <text x="360" y="420" fill="#8a8a8a" text-anchor="middle" font-size="11">Both are virtual filesystems: reads/writes hit kernel data structures, not disk.</text>
</svg>
