<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="sans-serif">
  <rect width="720" height="320" fill="#0f1117"/>
  <text x="360" y="30" fill="#e6e6e6" font-size="18" text-anchor="middle" font-weight="bold">Cross-Compilation: x86_64 host -> aarch64 target</text>

  <!-- Host box -->
  <rect x="20" y="60" width="320" height="230" rx="8" fill="#1b2030" stroke="#3a4a6b"/>
  <text x="180" y="85" fill="#8ab4f8" font-size="15" text-anchor="middle" font-weight="bold">HOST  (build = x86_64-linux-gnu)</text>

  <rect x="45" y="105" width="270" height="55" rx="6" fill="#243049" stroke="#3a4a6b"/>
  <text x="180" y="128" fill="#e6e6e6" font-size="13" text-anchor="middle">Cross-toolchain</text>
  <text x="180" y="148" fill="#9aa6c0" font-size="11" text-anchor="middle">aarch64-linux-gnu-gcc + binutils</text>

  <rect x="45" y="175" width="270" height="55" rx="6" fill="#243049" stroke="#3a4a6b"/>
  <text x="180" y="198" fill="#e6e6e6" font-size="13" text-anchor="middle">Sysroot</text>
  <text x="180" y="218" fill="#9aa6c0" font-size="11" text-anchor="middle">target libc + headers (.so/.h for ARM)</text>

  <rect x="45" y="245" width="270" height="35" rx="6" fill="#243049" stroke="#3a4a6b"/>
  <text x="180" y="267" fill="#e6e6e6" font-size="12" text-anchor="middle">hello.c  -->  CC=aarch64-linux-gnu-gcc</text>

  <!-- Arrow -->
  <line x1="345" y1="175" x2="430" y2="175" stroke="#8ab4f8" stroke-width="3"/>
  <polygon points="430,168 446,175 430,182" fill="#8ab4f8"/>
  <text x="392" y="165" fill="#9aa6c0" font-size="11" text-anchor="middle">emits</text>

  <!-- Target box -->
  <rect x="455" y="60" width="245" height="230" rx="8" fill="#1b2030" stroke="#6b4a3a"/>
  <text x="577" y="85" fill="#f8b48a" font-size="15" text-anchor="middle" font-weight="bold">TARGET (aarch64)</text>

  <rect x="480" y="120" width="195" height="60" rx="6" fill="#492a24" stroke="#6b4a3a"/>
  <text x="577" y="145" fill="#e6e6e6" font-size="13" text-anchor="middle">ARM ELF binary</text>
  <text x="577" y="165" fill="#c0a69a" font-size="11" text-anchor="middle">ELF 64-bit, ARM aarch64</text>

  <rect x="480" y="200" width="195" height="60" rx="6" fill="#492a24" stroke="#6b4a3a"/>
  <text x="577" y="222" fill="#e6e6e6" font-size="12" text-anchor="middle">Runs on: SBC / device</text>
  <text x="577" y="242" fill="#c0a69a" font-size="11" text-anchor="middle">or qemu-aarch64 (user-mode)</text>
</svg>
