<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="sans-serif">
  <rect width="720" height="430" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">eBPF: a tiny safe program running inside the kernel</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#111">Like a small sensor on the engine while the car keeps driving</text>

  <!-- Kernel box -->
  <rect x="40" y="70" width="430" height="300" fill="#ffffff" stroke="#111" stroke-width="3"/>
  <text x="255" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">THE KERNEL (Linux core, still running)</text>

  <!-- Event -->
  <rect x="65" y="120" width="160" height="70" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="145" y="150" text-anchor="middle" font-size="12" fill="#111">An event happens</text>
  <text x="145" y="170" text-anchor="middle" font-size="11" fill="#111">("a file was opened")</text>

  <!-- arrow event -> program -->
  <line x1="225" y1="155" x2="285" y2="155" stroke="#111" stroke-width="3"/>
  <polygon points="285,155 273,148 273,162" fill="#111"/>

  <!-- eBPF program -->
  <rect x="290" y="115" width="150" height="80" fill="#dbeafe" stroke="#111" stroke-width="2"/>
  <text x="365" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">your eBPF</text>
  <text x="365" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">program</text>
  <text x="365" y="180" text-anchor="middle" font-size="10" fill="#111">runs, then stops</text>

  <!-- sandbox label -->
  <text x="255" y="225" text-anchor="middle" font-size="11" font-style="italic" fill="#111">It only watches/measures - it is sandboxed (fenced in)</text>

  <!-- map / buffer -->
  <rect x="290" y="245" width="150" height="55" fill="#eeeeee" stroke="#111" stroke-width="2"/>
  <text x="365" y="270" text-anchor="middle" font-size="12" fill="#111">collects data</text>
  <text x="365" y="288" text-anchor="middle" font-size="10" fill="#111">(counts, timings)</text>

  <!-- arrow program -> data -->
  <line x1="365" y1="195" x2="365" y2="243" stroke="#111" stroke-width="3"/>
  <polygon points="365,243 358,231 372,231" fill="#111"/>

  <text x="255" y="335" text-anchor="middle" font-size="11" fill="#111">No new kernel module. No reboot.</text>

  <!-- Userspace box -->
  <rect x="500" y="200" width="185" height="100" fill="#d1fae5" stroke="#047857" stroke-width="2"/>
  <text x="592" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">You (a tool)</text>
  <text x="592" y="256" text-anchor="middle" font-size="11" fill="#065f46">reads the data</text>
  <text x="592" y="276" text-anchor="middle" font-size="11" fill="#065f46">and shows it</text>

  <!-- arrow out to userspace -->
  <line x1="440" y1="272" x2="498" y2="252" stroke="#111" stroke-width="3"/>
  <polygon points="498,252 484,251 491,264" fill="#111"/>

  <text x="360" y="400" text-anchor="middle" font-size="12" fill="#111">Event -&gt; your small program runs in the kernel -&gt; data comes out to you.</text>
  <text x="360" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">Safe, fast, and nothing was stopped or rebuilt.</text>
</svg>
