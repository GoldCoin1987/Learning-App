<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440" font-family="sans-serif">
  <rect width="720" height="440" fill="#0f172a"/>
  <text x="360" y="34" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">eBPF: sandboxed program in the kernel</text>

  <!-- Userspace box -->
  <rect x="30" y="60" width="660" height="120" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="50" y="86" fill="#38bdf8" font-size="15" font-weight="bold">USERSPACE</text>
  <rect x="60" y="100" width="180" height="60" rx="6" fill="#334155"/>
  <text x="150" y="126" fill="#e2e8f0" font-size="13" text-anchor="middle">bpftrace / bcc</text>
  <text x="150" y="146" fill="#94a3b8" font-size="11" text-anchor="middle">compile + load (libbpf)</text>
  <rect x="270" y="100" width="180" height="60" rx="6" fill="#334155"/>
  <text x="360" y="126" fill="#e2e8f0" font-size="13" text-anchor="middle">reads results</text>
  <text x="360" y="146" fill="#94a3b8" font-size="11" text-anchor="middle">histograms / counts</text>
  <rect x="480" y="100" width="180" height="60" rx="6" fill="#334155"/>
  <text x="570" y="132" fill="#e2e8f0" font-size="13" text-anchor="middle">Cilium / Falco</text>

  <!-- boundary -->
  <line x1="30" y1="210" x2="690" y2="210" stroke="#64748b" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="360" y="204" fill="#64748b" font-size="11" text-anchor="middle">syscall boundary (bpf())</text>

  <!-- Kernel box -->
  <rect x="30" y="220" width="660" height="190" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="50" y="246" fill="#f59e0b" font-size="15" font-weight="bold">KERNEL</text>

  <!-- verifier -->
  <rect x="60" y="262" width="150" height="54" rx="6" fill="#7c2d12"/>
  <text x="135" y="285" fill="#fed7aa" font-size="13" text-anchor="middle">Verifier</text>
  <text x="135" y="303" fill="#fdba74" font-size="10" text-anchor="middle">safety check</text>

  <!-- JIT VM -->
  <rect x="240" y="262" width="180" height="54" rx="6" fill="#065f46"/>
  <text x="330" y="285" fill="#a7f3d0" font-size="13" text-anchor="middle">eBPF VM (JIT)</text>
  <text x="330" y="303" fill="#6ee7b7" font-size="10" text-anchor="middle">your program runs here</text>

  <!-- map -->
  <rect x="450" y="262" width="180" height="54" rx="6" fill="#1e3a8a"/>
  <text x="540" y="285" fill="#bfdbfe" font-size="13" text-anchor="middle">eBPF map</text>
  <text x="540" y="303" fill="#93c5fd" font-size="10" text-anchor="middle">kernel &lt;-&gt; user data</text>

  <!-- hooks -->
  <rect x="60" y="344" width="570" height="48" rx="6" fill="#334155"/>
  <text x="345" y="364" fill="#e2e8f0" font-size="12" text-anchor="middle">HOOKS: kprobe . uprobe . tracepoint . XDP . tc . LSM</text>
  <text x="345" y="382" fill="#94a3b8" font-size="10" text-anchor="middle">no kernel module, no reboot</text>

  <!-- arrows -->
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#cbd5e1"/>
    </marker>
  </defs>
  <line x1="150" y1="160" x2="135" y2="260" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
  <line x1="210" y1="289" x2="238" y2="289" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
  <line x1="540" y1="262" x2="450" y2="170" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
  <line x1="330" y1="344" x2="330" y2="318" stroke="#cbd5e1" stroke-width="2" marker-end="url(#a)"/>
</svg>
