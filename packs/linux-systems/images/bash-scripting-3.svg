<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="monospace">
  <rect width="720" height="320" fill="#ffffff"/>
  <text x="360" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">Variables: a labelled box that holds text</text>

  <defs>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- assignment -->
  <text x="170" y="70" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">put a value IN (no spaces around =)</text>
  <text x="170" y="100" fill="#000000" font-size="16" text-anchor="middle">name="Sam"</text>

  <!-- the box -->
  <rect x="100" y="120" width="140" height="70" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="170" y="112" fill="#444444" font-size="11" text-anchor="middle">box labelled: name</text>
  <text x="170" y="163" fill="#000000" font-size="18" text-anchor="middle">Sam</text>

  <line x1="170" y1="105" x2="170" y2="118" stroke="#000000" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- read back -->
  <line x1="240" y1="155" x2="340" y2="155" stroke="#000000" stroke-width="2" marker-end="url(#ar3)"/>
  <text x="290" y="145" fill="#000000" font-size="11" text-anchor="middle">read it back</text>
  <text x="290" y="178" fill="#000000" font-size="11" text-anchor="middle">with $</text>

  <text x="460" y="120" fill="#000000" font-size="14" text-anchor="middle" font-weight="bold">echo "Hi $name"</text>
  <rect x="360" y="135" width="200" height="44" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="460" y="163" fill="#000000" font-size="15" text-anchor="middle">Hi Sam</text>

  <text x="640" y="155" fill="#000000" font-size="11" text-anchor="middle">printed</text>
  <line x1="560" y1="157" x2="600" y2="157" stroke="#000000" stroke-width="2" marker-end="url(#ar3)"/>

  <text x="360" y="240" fill="#000000" font-size="12" text-anchor="middle">Set with  name=value  (no spaces). Use the value later by writing  $name .</text>
  <text x="360" y="266" fill="#000000" font-size="12" text-anchor="middle">echo prints text to the screen;  "$name"  inside double quotes is replaced by its value.</text>
  <text x="360" y="296" fill="#444444" font-size="11" text-anchor="middle">Single quotes 'do NOT' expand $name; double quotes "do".</text>
</svg>
