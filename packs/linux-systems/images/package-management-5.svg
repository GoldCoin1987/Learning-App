<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300" font-family="sans-serif">
  <rect width="820" height="300" fill="#ffffff"/>
  <text x="410" y="30" fill="#000000" font-size="18" font-weight="bold" text-anchor="middle">The signature check: how your computer knows a package is genuine</text>

  <defs>
    <marker id="ah5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>

  <!-- repository with sealed package -->
  <rect x="30" y="80" width="190" height="110" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="125" y="106" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">Repository</text>
  <text x="125" y="130" fill="#000000" font-size="11" text-anchor="middle">sends a package</text>
  <text x="125" y="150" fill="#000000" font-size="11" text-anchor="middle">with a digital seal</text>
  <text x="125" y="170" fill="#000000" font-size="11" text-anchor="middle">(a GPG signature)</text>

  <!-- your computer checks -->
  <rect x="320" y="80" width="200" height="110" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2.5"/>
  <text x="420" y="106" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">Your computer</text>
  <text x="420" y="130" fill="#000000" font-size="11" text-anchor="middle">checks the seal using</text>
  <text x="420" y="150" fill="#000000" font-size="11" text-anchor="middle">the stored public KEY</text>
  <text x="420" y="170" fill="#000000" font-size="11" text-anchor="middle">it already trusts</text>

  <!-- outcomes -->
  <rect x="620" y="60" width="180" height="64" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="710" y="86" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">Seal matches</text>
  <text x="710" y="108" fill="#000000" font-size="11" text-anchor="middle">install it (genuine)</text>

  <rect x="620" y="148" width="180" height="64" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="710" y="174" fill="#000000" font-size="12" font-weight="bold" text-anchor="middle">Seal is wrong</text>
  <text x="710" y="196" fill="#000000" font-size="11" text-anchor="middle">refuse (tampered)</text>

  <line x1="220" y1="135" x2="318" y2="135" stroke="#000000" stroke-width="2" marker-end="url(#ah5)"/>
  <line x1="520" y1="120" x2="618" y2="92" stroke="#000000" stroke-width="2" marker-end="url(#ah5)"/>
  <line x1="520" y1="150" x2="618" y2="178" stroke="#000000" stroke-width="2" marker-end="url(#ah5)"/>

  <text x="410" y="258" fill="#000000" font-size="12" text-anchor="middle">Key idea: you trust a KEY, not a server. A fake or hacked mirror cannot forge a matching seal,</text>
  <text x="410" y="278" fill="#000000" font-size="12" text-anchor="middle">so a tampered package fails the check and is rejected.</text>
</svg>
