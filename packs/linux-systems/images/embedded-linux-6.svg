<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="sans-serif">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#111">Two Tools That Assemble Your Image: Buildroot vs Yocto</text>
  <text x="360" y="50" text-anchor="middle" font-size="12" fill="#111">Both build a custom Linux image; one is simple, one is industrial</text>

  <!-- Buildroot -->
  <rect x="40" y="75" width="290" height="295" fill="#ffffff" stroke="#111" stroke-width="3"/>
  <text x="185" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">Buildroot</text>
  <text x="185" y="120" text-anchor="middle" font-size="12" font-style="italic" fill="#111">the simple toolkit</text>

  <rect x="70" y="138" width="240" height="34" fill="#d1fae5" stroke="#047857"/>
  <text x="190" y="160" text-anchor="middle" font-size="12" fill="#111">Tick boxes in a menu</text>
  <rect x="70" y="178" width="240" height="34" fill="#d1fae5" stroke="#047857"/>
  <text x="190" y="200" text-anchor="middle" font-size="12" fill="#111">Fast to learn, fast to build</text>
  <rect x="70" y="218" width="240" height="34" fill="#d1fae5" stroke="#047857"/>
  <text x="190" y="240" text-anchor="middle" font-size="12" fill="#111">Makes one small fixed image</text>
  <text x="185" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">Best when starting out</text>
  <text x="185" y="312" text-anchor="middle" font-size="11" fill="#111">or for a simple, fixed product</text>
  <text x="185" y="344" text-anchor="middle" font-size="11" fill="#111">Like a basic build-your-own kit</text>

  <!-- Yocto -->
  <rect x="390" y="75" width="290" height="295" fill="#ffffff" stroke="#111" stroke-width="3"/>
  <text x="535" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">Yocto / OpenEmbedded</text>
  <text x="535" y="120" text-anchor="middle" font-size="12" font-style="italic" fill="#111">the industrial system</text>

  <rect x="420" y="138" width="230" height="34" fill="#dbeafe" stroke="#111"/>
  <text x="535" y="160" text-anchor="middle" font-size="12" fill="#111">"Recipes" build each piece</text>
  <rect x="420" y="178" width="230" height="34" fill="#dbeafe" stroke="#111"/>
  <text x="535" y="200" text-anchor="middle" font-size="12" fill="#111">"Layers" stack and reuse</text>
  <rect x="420" y="218" width="230" height="34" fill="#dbeafe" stroke="#111"/>
  <text x="535" y="240" text-anchor="middle" font-size="12" fill="#111">Powerful, but steeper + slower</text>
  <text x="535" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">Best for big products</text>
  <text x="535" y="312" text-anchor="middle" font-size="11" fill="#111">across many boards, long term</text>
  <text x="535" y="344" text-anchor="middle" font-size="11" fill="#111">Like a full factory production line</text>

  <text x="360" y="398" text-anchor="middle" font-size="12" fill="#111">Rule of thumb: Buildroot for simple and quick;</text>
  <text x="360" y="416" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">Yocto when you need scale, reuse, and long-term maintenance.</text>
</svg>
