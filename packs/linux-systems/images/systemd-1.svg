<svg xmlns="http://www.w3.org/2000/svg" width="660" height="440" viewBox="0 0 660 440" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="660" height="440" fill="#0f172a"/>
  <text x="330" y="30" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">systemd Unit Dependencies &amp; Service Lifecycle</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f87171"/>
    </marker>
    <marker id="arrowW" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- LEFT: dependency graph -->
  <text x="160" y="62" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="bold">Ordering + Requirement</text>

  <rect x="80" y="80" width="160" height="44" rx="8" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/>
  <text x="160" y="108" text-anchor="middle" fill="#dbeafe" font-size="13" font-weight="bold">myapp.service</text>

  <rect x="40" y="190" width="110" height="44" rx="8" fill="#7f1d1d" stroke="#f87171" stroke-width="2"/>
  <text x="95" y="212" text-anchor="middle" fill="#fee2e2" font-size="12" font-weight="bold">network.target</text>
  <text x="95" y="227" text-anchor="middle" fill="#fecaca" font-size="9">Requires (hard)</text>

  <rect x="180" y="190" width="120" height="44" rx="8" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
  <text x="240" y="212" text-anchor="middle" fill="#dcfce7" font-size="12" font-weight="bold">postgres.service</text>
  <text x="240" y="227" text-anchor="middle" fill="#bbf7d0" font-size="9">Wants (soft)</text>

  <!-- Requires edge -->
  <path d="M130,124 C110,150 100,160 95,188" fill="none" stroke="#f87171" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="58" y="160" fill="#fca5a5" font-size="10">Requires=</text>
  <!-- Wants edge -->
  <path d="M190,124 C210,150 225,160 238,188" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowW)"/>
  <text x="232" y="158" fill="#86efac" font-size="10">Wants=</text>

  <text x="160" y="270" text-anchor="middle" fill="#94a3b8" font-size="10">After= sets ORDER; Requires/Wants set</text>
  <text x="160" y="284" text-anchor="middle" fill="#94a3b8" font-size="10">whether dep is PULLED IN. They are orthogonal.</text>
  <text x="160" y="304" text-anchor="middle" fill="#fca5a5" font-size="10">Requires + dep fails -&gt; we fail too.</text>
  <text x="160" y="318" text-anchor="middle" fill="#86efac" font-size="10">Wants + dep fails -&gt; we start anyway.</text>

  <line x1="335" y1="70" x2="335" y2="380" stroke="#334155" stroke-width="1"/>

  <!-- RIGHT: lifecycle states -->
  <text x="500" y="62" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="bold">Service active-state flow</text>

  <rect x="430" y="80" width="140" height="40" rx="8" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
  <text x="500" y="105" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">inactive</text>

  <rect x="430" y="160" width="140" height="40" rx="8" fill="#78350f" stroke="#fbbf24" stroke-width="2"/>
  <text x="500" y="185" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="bold">activating</text>

  <rect x="430" y="240" width="140" height="40" rx="8" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
  <text x="500" y="265" text-anchor="middle" fill="#dcfce7" font-size="12" font-weight="bold">active (running)</text>

  <rect x="430" y="320" width="140" height="40" rx="8" fill="#7f1d1d" stroke="#f87171" stroke-width="2"/>
  <text x="500" y="345" text-anchor="middle" fill="#fee2e2" font-size="12" font-weight="bold">failed</text>

  <path d="M500,120 L500,158" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="142" fill="#cbd5e1" font-size="9">start</text>
  <path d="M500,200 L500,238" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="222" fill="#cbd5e1" font-size="9">ExecStart ok / READY=1</text>
  <path d="M500,280 L500,318" fill="none" stroke="#f87171" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="510" y="302" fill="#fca5a5" font-size="9">nonzero exit / crash</text>
  <path d="M585,320 C620,260 620,180 585,118" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowW)"/>
  <text x="600" y="220" fill="#86efac" font-size="9" transform="rotate(90 600 220)">Restart=on-failure</text>

  <text x="330" y="408" text-anchor="middle" fill="#64748b" font-size="11">Type= tells systemd HOW to know it reached "active": simple=forked &amp; running, forking=parent exited, notify=sd_notify READY=1.</text>
</svg>
