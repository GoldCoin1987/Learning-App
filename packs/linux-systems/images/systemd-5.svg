<svg xmlns="http://www.w3.org/2000/svg" width="820" height="400" viewBox="0 0 820 400" font-family="sans-serif">
  <rect width="820" height="400" fill="#0f1117"/>
  <text x="410" y="30" fill="#e8e8e8" font-size="18" font-weight="bold" text-anchor="middle">Unit Types &amp; Targets (Boot Milestones)</text>

  <defs>
    <marker id="ah5" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f7cff"/>
    </marker>
  </defs>

  <!-- unit type legend -->
  <text x="180" y="70" fill="#cbd5e1" font-size="14" font-weight="bold" text-anchor="middle">Four common unit types</text>

  <rect x="40" y="85" width="280" height="40" rx="6" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
  <text x="55" y="110" fill="#9ec1ff" font-size="13" font-family="monospace">.service</text>
  <text x="180" y="110" fill="#cfd8ec" font-size="12">a background program</text>

  <rect x="40" y="135" width="280" height="40" rx="6" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
  <text x="55" y="160" fill="#9ec1ff" font-size="13" font-family="monospace">.target</text>
  <text x="180" y="160" fill="#cfd8ec" font-size="12">a named group / milestone</text>

  <rect x="40" y="185" width="280" height="40" rx="6" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
  <text x="55" y="210" fill="#9ec1ff" font-size="13" font-family="monospace">.timer</text>
  <text x="180" y="210" fill="#cfd8ec" font-size="12">runs a service on a schedule</text>

  <rect x="40" y="235" width="280" height="40" rx="6" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
  <text x="55" y="260" fill="#9ec1ff" font-size="13" font-family="monospace">.socket</text>
  <text x="180" y="260" fill="#cfd8ec" font-size="12">starts a service on first connect</text>

  <text x="180" y="305" fill="#8893a8" font-size="11" text-anchor="middle">A target pulls in many units at once.</text>
  <text x="180" y="322" fill="#8893a8" font-size="11" text-anchor="middle">It is the modern replacement for old "runlevels".</text>

  <!-- target graph -->
  <line x1="360" y1="60" x2="360" y2="350" stroke="#2a3550" stroke-width="1"/>

  <rect x="540" y="80" width="220" height="44" rx="8" fill="#3a2f1a" stroke="#fbbf24" stroke-width="2"/>
  <text x="650" y="107" fill="#fde68a" font-size="13" font-weight="bold" text-anchor="middle">multi-user.target</text>

  <rect x="430" y="230" width="120" height="44" rx="8" fill="#173a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="490" y="257" fill="#a7f3c8" font-size="12" text-anchor="middle">sshd.service</text>

  <rect x="580" y="230" width="120" height="44" rx="8" fill="#173a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="640" y="257" fill="#a7f3c8" font-size="12" text-anchor="middle">cron.service</text>

  <rect x="700" y="230" width="100" height="44" rx="8" fill="#173a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="750" y="257" fill="#a7f3c8" font-size="12" text-anchor="middle">myapp...</text>

  <line x1="620" y1="124" x2="500" y2="228" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah5)"/>
  <line x1="650" y1="124" x2="645" y2="228" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah5)"/>
  <line x1="685" y1="124" x2="745" y2="228" stroke="#4f7cff" stroke-width="2" marker-end="url(#ah5)"/>

  <text x="610" y="320" fill="#8893a8" font-size="11" text-anchor="middle">Reaching multi-user.target at boot</text>
  <text x="610" y="337" fill="#8893a8" font-size="11" text-anchor="middle">pulls in all the services it "Wants".</text>
</svg>
