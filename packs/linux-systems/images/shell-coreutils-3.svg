<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320" font-family="monospace">
  <rect width="520" height="320" fill="#ffffff"/>
  <text x="260" y="28" fill="#000000" font-size="16" text-anchor="middle" font-weight="bold">The filesystem is a tree of folders</text>

  <!-- root -->
  <rect x="220" y="50" width="80" height="34" rx="5" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="260" y="72" fill="#000000" font-size="15" text-anchor="middle">/ (root)</text>

  <!-- level 2 -->
  <rect x="60" y="140" width="90" height="34" rx="5" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="105" y="162" fill="#000000" font-size="14" text-anchor="middle">home</text>

  <rect x="215" y="140" width="90" height="34" rx="5" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="260" y="162" fill="#000000" font-size="14" text-anchor="middle">etc</text>

  <rect x="370" y="140" width="90" height="34" rx="5" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="415" y="162" fill="#000000" font-size="14" text-anchor="middle">usr</text>

  <!-- level 3 -->
  <rect x="60" y="230" width="90" height="34" rx="5" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="105" y="252" fill="#000000" font-size="14" text-anchor="middle">you</text>

  <!-- lines -->
  <line x1="260" y1="84" x2="105" y2="140" stroke="#000000" stroke-width="1.5"/>
  <line x1="260" y1="84" x2="260" y2="140" stroke="#000000" stroke-width="1.5"/>
  <line x1="260" y1="84" x2="415" y2="140" stroke="#000000" stroke-width="1.5"/>
  <line x1="105" y1="174" x2="105" y2="230" stroke="#000000" stroke-width="1.5"/>

  <text x="105" y="290" fill="#444444" font-size="12" text-anchor="middle">full path:</text>
  <text x="105" y="308" fill="#000000" font-size="13" text-anchor="middle">/home/you</text>
  <text x="370" y="300" fill="#444444" font-size="12" text-anchor="start">Every file lives at a path</text>
  <text x="370" y="316" fill="#444444" font-size="12" text-anchor="start">that traces back to /</text>
</svg>
