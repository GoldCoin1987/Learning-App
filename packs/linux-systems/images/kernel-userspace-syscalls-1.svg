<svg xmlns="http://www.w3.org/2000/svg" width="860" height="300" viewBox="0 0 860 300" font-family="sans-serif">
  <rect width="860" height="300" fill="#0f1117"/>
  <text x="430" y="28" fill="#e8e8e8" font-size="18" font-weight="bold" text-anchor="middle">Anatomy of a System Call: write(fd, buf, n)</text>

  <!-- Ring boundary -->
  <line x1="20" y1="160" x2="840" y2="160" stroke="#444c63" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="36" y="78" fill="#7fd17f" font-size="11" font-weight="bold">USER MODE (ring 3)</text>
  <text x="36" y="200" fill="#ff9e9e" font-size="11" font-weight="bold">KERNEL MODE (ring 0)</text>

  <!-- User-mode boxes -->
  <g>
    <rect x="40"  y="88" width="180" height="56" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="130" y="112" fill="#9ec1ff" font-size="13" font-weight="bold" text-anchor="middle">Your app</text>
    <text x="130" y="130" fill="#8893a8" font-size="10" text-anchor="middle">calls write()</text>
  </g>
  <g>
    <rect x="300" y="88" width="200" height="56" rx="8" fill="#1f2a44" stroke="#4f7cff" stroke-width="2"/>
    <text x="400" y="108" fill="#9ec1ff" font-size="13" font-weight="bold" text-anchor="middle">libc (glibc/musl)</text>
    <text x="400" y="126" fill="#8893a8" font-size="10" text-anchor="middle">load __NR_write, syscall insn</text>
  </g>

  <!-- Kernel-mode boxes -->
  <g>
    <rect x="300" y="184" width="200" height="56" rx="8" fill="#3a2330" stroke="#ff7a7a" stroke-width="2"/>
    <text x="400" y="206" fill="#ffb3b3" font-size="13" font-weight="bold" text-anchor="middle">syscall entry / trap</text>
    <text x="400" y="224" fill="#c79aa6" font-size="10" text-anchor="middle">dispatch via syscall table</text>
  </g>
  <g>
    <rect x="560" y="184" width="260" height="56" rx="8" fill="#3a2330" stroke="#ff7a7a" stroke-width="2"/>
    <text x="690" y="202" fill="#ffb3b3" font-size="13" font-weight="bold" text-anchor="middle">sys_write -> VFS -> driver</text>
    <text x="690" y="220" fill="#c79aa6" font-size="10" text-anchor="middle">copy_from_user, queue I/O</text>
  </g>

  <defs>
    <marker id="ab" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f7cff"/>
    </marker>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ff7a7a"/>
    </marker>
  </defs>

  <!-- app -> libc -->
  <line x1="220" y1="116" x2="298" y2="116" stroke="#4f7cff" stroke-width="2" marker-end="url(#ab)"/>
  <!-- libc -> trap (crosses ring boundary) -->
  <line x1="400" y1="144" x2="400" y2="182" stroke="#ff7a7a" stroke-width="2" marker-end="url(#ar)"/>
  <text x="412" y="170" fill="#ff9e9e" font-size="10">trap into ring 0</text>
  <!-- trap -> sys_write -->
  <line x1="500" y1="212" x2="558" y2="212" stroke="#ff7a7a" stroke-width="2" marker-end="url(#ar)"/>
  <!-- return path -->
  <line x1="690" y1="184" x2="690" y2="120" stroke="#7fd17f" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ab)"/>
  <line x1="690" y1="116" x2="502" y2="116" stroke="#7fd17f" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ab)"/>
  <text x="700" y="160" fill="#7fd17f" font-size="10">return value</text>

  <text x="430" y="276" fill="#6f7a90" font-size="11" text-anchor="middle">On error the kernel returns a negative value; libc sets errno and returns -1. strace prints exactly this line.</text>
</svg>
