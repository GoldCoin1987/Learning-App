<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Atomic Number = Number of Protons = Which Element</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The proton count is the atom's ID. Change it and you have a different element.</text>

  <!-- table -->
  <rect x="80" y="80" width="440" height="200" fill="none" stroke="black" stroke-width="2"/>
  <line x1="80" y1="120" x2="520" y2="120" stroke="black" stroke-width="2"/>
  <line x1="300" y1="80" x2="300" y2="280" stroke="black" stroke-width="1"/>
  <line x1="80" y1="160" x2="520" y2="160" stroke="black" stroke-width="1"/>
  <line x1="80" y1="200" x2="520" y2="200" stroke="black" stroke-width="1"/>
  <line x1="80" y1="240" x2="520" y2="240" stroke="black" stroke-width="1"/>

  <text x="190" y="106" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Number of protons</text>
  <text x="410" y="106" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Element it is</text>

  <text x="190" y="146" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">1</text>
  <text x="410" y="146" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Hydrogen</text>
  <text x="190" y="186" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">2</text>
  <text x="410" y="186" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Helium</text>
  <text x="190" y="226" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">6</text>
  <text x="410" y="226" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Carbon</text>
  <text x="190" y="266" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">8</text>
  <text x="410" y="266" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Oxygen</text>

  <text x="300" y="312" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">1 proton is ALWAYS hydrogen. 6 protons is ALWAYS carbon.</text>
  <text x="300" y="334" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">The atomic number is just the number of protons.</text>
</svg>
