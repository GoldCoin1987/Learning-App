<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Familiar Elements All Around You</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Every material is built from elements. Here are four you already know.</text>

  <!-- Copper cell + wire -->
  <rect x="60" y="90" width="90" height="90" fill="none" stroke="black" stroke-width="2"/>
  <text x="70" y="112" font-family="sans-serif" font-size="14" fill="black">29</text>
  <text x="105" y="150" font-family="sans-serif" font-size="34" text-anchor="middle" fill="black">Cu</text>
  <text x="105" y="200" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">copper</text>
  <path d="M60 230 q15 -12 30 0 q15 12 30 0 q15 -12 30 0" fill="none" stroke="black" stroke-width="2"/>
  <text x="105" y="262" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">copper wire (a metal)</text>

  <!-- Oxygen cell + breathing -->
  <rect x="200" y="90" width="90" height="90" fill="none" stroke="black" stroke-width="2"/>
  <text x="210" y="112" font-family="sans-serif" font-size="14" fill="black">8</text>
  <text x="245" y="150" font-family="sans-serif" font-size="34" text-anchor="middle" fill="black">O</text>
  <text x="245" y="200" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">oxygen</text>
  <circle cx="245" cy="232" r="16" fill="none" stroke="black" stroke-width="1.5"/>
  <path d="M232 240 q13 10 26 0" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="239" cy="228" r="2" fill="black"/>
  <circle cx="251" cy="228" r="2" fill="black"/>
  <text x="245" y="262" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">oxygen you breathe</text>

  <!-- Helium cell + balloon -->
  <rect x="340" y="90" width="90" height="90" fill="none" stroke="black" stroke-width="2"/>
  <text x="350" y="112" font-family="sans-serif" font-size="14" fill="black">2</text>
  <text x="385" y="150" font-family="sans-serif" font-size="34" text-anchor="middle" fill="black">He</text>
  <text x="385" y="200" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">helium</text>
  <ellipse cx="385" cy="230" rx="15" ry="18" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="385" y1="248" x2="385" y2="262" stroke="black" stroke-width="1"/>
  <text x="385" y="278" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">helium balloon</text>

  <!-- Carbon cell + pencil -->
  <rect x="480" y="90" width="90" height="90" fill="none" stroke="black" stroke-width="2"/>
  <text x="490" y="112" font-family="sans-serif" font-size="14" fill="black">6</text>
  <text x="525" y="150" font-family="sans-serif" font-size="34" text-anchor="middle" fill="black">C</text>
  <text x="525" y="200" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">carbon</text>
  <rect x="510" y="218" width="30" height="12" fill="none" stroke="black" stroke-width="1.5"/>
  <polygon points="540,218 552,224 540,230" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="525" y="262" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">carbon in a pencil</text>

  <text x="300" y="320" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Top number = atomic number (protons). Big letters = the element's symbol.</text>
  <text x="300" y="345" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Cu and He show why symbols can be one or two letters.</text>
  <text x="300" y="370" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Copper is a metal; oxygen and carbon are nonmetals; helium is a noble gas.</text>
</svg>
