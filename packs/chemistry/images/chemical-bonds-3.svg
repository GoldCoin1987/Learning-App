<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Ionic vs Covalent: TRANSFER vs SHARE</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Metal + nonmetal -&gt; transfer (ionic). Nonmetal + nonmetal -&gt; share (covalent).</text>

  <!-- divider -->
  <line x1="300" y1="62" x2="300" y2="356" stroke="black" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- LEFT: IONIC -->
  <text x="150" y="84" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">IONIC</text>
  <text x="150" y="102" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">metal + nonmetal</text>
  <!-- two atoms with a transfer arrow between -->
  <circle cx="95" cy="180" r="32" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="95" y="184" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">metal</text>
  <circle cx="205" cy="180" r="32" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="205" y="178" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">non-</text>
  <text x="205" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">metal</text>
  <!-- electron moving across -->
  <circle cx="130" cy="180" r="7" fill="black"/>
  <line x1="140" y1="180" x2="168" y2="180" stroke="black" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="150" y="234" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">electron is GIVEN AWAY</text>
  <!-- result ions -->
  <text x="150" y="262" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">+ ion and - ion ATTRACT</text>
  <text x="150" y="286" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Example: table salt (NaCl)</text>
  <text x="150" y="306" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Forms orderly crystals</text>

  <!-- RIGHT: COVALENT -->
  <text x="450" y="84" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">COVALENT</text>
  <text x="450" y="102" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">nonmetal + nonmetal</text>
  <!-- two overlapping atoms sharing a pair -->
  <circle cx="415" cy="180" r="36" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="485" cy="180" r="36" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="400" y="184" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">non-</text>
  <text x="500" y="184" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">non-</text>
  <!-- shared pair in the overlap -->
  <circle cx="443" cy="180" r="7" fill="black"/>
  <circle cx="457" cy="180" r="7" fill="black"/>
  <text x="450" y="234" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">electrons are SHARED</text>
  <text x="450" y="262" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">makes a MOLECULE</text>
  <text x="450" y="286" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Example: water (H2O)</text>
  <text x="450" y="306" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Distinct molecule units</text>

  <text x="300" y="384" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Transfer = give and take (ionic). Share = hold a pair together (covalent).</text>

  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>
</svg>
