<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Ions: An Atom That Gained or Lost Electrons</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Protons never change. Only electrons are gained or lost, so the charge changes.</text>

  <!-- NEUTRAL atom on the left -->
  <text x="150" y="84" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">NEUTRAL ATOM</text>
  <circle cx="150" cy="180" r="60" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="4 5"/>
  <!-- nucleus with 3 protons -->
  <circle cx="150" cy="180" r="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="176" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">3 +</text>
  <text x="150" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">protons</text>
  <!-- 3 electrons -->
  <circle cx="150" cy="120" r="9" fill="none" stroke="black" stroke-width="2"/><line x1="145" y1="120" x2="155" y2="120" stroke="black" stroke-width="2"/>
  <circle cx="210" cy="180" r="9" fill="none" stroke="black" stroke-width="2"/><line x1="205" y1="180" x2="215" y2="180" stroke="black" stroke-width="2"/>
  <circle cx="150" cy="240" r="9" fill="none" stroke="black" stroke-width="2"/><line x1="145" y1="240" x2="155" y2="240" stroke="black" stroke-width="2"/>
  <text x="150" y="278" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">3 protons, 3 electrons</text>
  <text x="150" y="296" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">+ and - balance: charge 0</text>

  <!-- arrow: loses one electron -->
  <line x1="245" y1="180" x2="345" y2="180" stroke="black" stroke-width="2"/>
  <polygon points="345,180 333,174 333,186" fill="black"/>
  <text x="295" y="166" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">loses</text>
  <text x="295" y="204" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">1 electron</text>

  <!-- POSITIVE ion on the right -->
  <text x="450" y="84" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">POSITIVE ION</text>
  <circle cx="450" cy="180" r="60" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="4 5"/>
  <circle cx="450" cy="180" r="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="450" y="176" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">3 +</text>
  <text x="450" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">protons</text>
  <!-- only 2 electrons now -->
  <circle cx="450" cy="120" r="9" fill="none" stroke="black" stroke-width="2"/><line x1="445" y1="120" x2="455" y2="120" stroke="black" stroke-width="2"/>
  <circle cx="510" cy="180" r="9" fill="none" stroke="black" stroke-width="2"/><line x1="505" y1="180" x2="515" y2="180" stroke="black" stroke-width="2"/>
  <text x="450" y="278" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">3 protons, 2 electrons</text>
  <text x="450" y="296" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">one extra +: charge is +</text>

  <text x="300" y="334" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Gaining electrons makes a negative ion; losing electrons makes a positive ion.</text>
</svg>
