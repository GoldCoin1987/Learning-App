<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Why Water Is Odd: It EXPANDS When It Freezes</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Most things shrink when they solidify. Water does the opposite, so ice floats.</text>

  <!-- LIQUID WATER glass -->
  <text x="160" y="80" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">LIQUID WATER</text>
  <rect x="110" y="95" width="100" height="170" fill="none" stroke="black" stroke-width="2"/>
  <!-- water fill line -->
  <line x1="110" y1="160" x2="210" y2="160" stroke="black" stroke-width="1.5"/>
  <!-- packed liquid particles below the line -->
  <circle cx="130" cy="185" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="152" cy="182" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="174" cy="186" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="196" cy="183" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="138" cy="208" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="162" cy="210" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="186" cy="206" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="148" cy="232" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="174" cy="234" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="160" y="284" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">particles close together</text>

  <!-- arrow: freeze -->
  <line x1="240" y1="180" x2="320" y2="180" stroke="black" stroke-width="2"/>
  <line x1="320" y1="180" x2="312" y2="175" stroke="black" stroke-width="2"/>
  <line x1="320" y1="180" x2="312" y2="185" stroke="black" stroke-width="2"/>
  <text x="280" y="170" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">FREEZE</text>
  <text x="280" y="198" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(remove heat)</text>

  <!-- ICE glass: same particles, more space, fills higher -->
  <text x="445" y="80" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">ICE (SOLID)</text>
  <rect x="395" y="95" width="100" height="170" fill="none" stroke="black" stroke-width="2"/>
  <!-- ice fill line is HIGHER -->
  <line x1="395" y1="120" x2="495" y2="120" stroke="black" stroke-width="1.5"/>
  <!-- open, spaced-out lattice particles -->
  <circle cx="415" cy="145" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="445" cy="145" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="475" cy="145" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="430" cy="175" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="460" cy="175" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="415" cy="205" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="445" cy="205" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="475" cy="205" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="430" cy="235" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="460" cy="235" r="8" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="445" y="284" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">same particles, more spread out</text>

  <text x="300" y="318" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Ice takes up MORE space than the water it came from (because of how the molecules line up).</text>
  <text x="300" y="342" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">That is why ice floats - and why water can burst pipes when it freezes.</text>
</svg>
