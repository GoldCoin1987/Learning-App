<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect x="0" y="0" width="600" height="380" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Indicators: Color Reveals pH (a safe way to test)</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">An indicator CHANGES COLOR to show acid or base. It does not change the pH.</text>

  <!-- LITMUS PAPER -->
  <text x="155" y="80" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">Litmus paper</text>

  <!-- red in acid strip -->
  <rect x="60" y="95" width="80" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="100" y="120" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">RED</text>
  <text x="100" y="152" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">in ACID</text>

  <!-- blue in base strip -->
  <rect x="170" y="95" width="80" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="210" y="120" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">BLUE</text>
  <text x="210" y="152" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">in BASE</text>

  <!-- UNIVERSAL INDICATOR / CABBAGE JUICE color strip across pH -->
  <text x="300" y="200" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">Universal indicator / red cabbage juice: a rainbow across pH</text>
  <g>
    <rect x="60" y="215" width="60" height="40" fill="none" stroke="black" stroke-width="2"/><text x="90" y="240" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">pH 1-2</text>
    <rect x="120" y="215" width="60" height="40" fill="none" stroke="black" stroke-width="2"/><text x="150" y="240" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">pH 3-4</text>
    <rect x="180" y="215" width="60" height="40" fill="none" stroke="black" stroke-width="2"/><text x="210" y="240" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">pH 5-6</text>
    <rect x="240" y="215" width="60" height="40" fill="none" stroke="black" stroke-width="2"/><text x="270" y="240" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">pH 7</text>
    <rect x="300" y="215" width="60" height="40" fill="none" stroke="black" stroke-width="2"/><text x="330" y="240" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">pH 8-9</text>
    <rect x="360" y="215" width="60" height="40" fill="none" stroke="black" stroke-width="2"/><text x="390" y="240" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">pH 10-11</text>
    <rect x="420" y="215" width="60" height="40" fill="none" stroke="black" stroke-width="2"/><text x="450" y="240" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">pH 12-14</text>
  </g>
  <text x="90" y="275" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">acidic</text>
  <text x="270" y="275" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">neutral</text>
  <text x="450" y="275" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">basic</text>
  <text x="270" y="294" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">each band is a different color = the pH</text>

  <!-- everyday hooks -->
  <text x="300" y="328" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Everyday: litmus paper, red cabbage juice, pool / soil test kits.</text>
  <text x="300" y="352" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The color REVEALS the pH; it does not make the solution more acidic or basic.</text>
</svg>
