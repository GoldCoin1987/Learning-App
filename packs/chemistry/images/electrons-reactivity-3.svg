<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">The Full-Shell Drive: Atoms React to Complete the Set</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">An almost-full outer shell GAINS one electron to become full (the 'octet', 8).</text>

  <!-- BEFORE atom: outer shell with 7, one gap -->
  <text x="150" y="84" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">BEFORE: needs 1 more</text>
  <circle cx="150" cy="210" r="95" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="150" cy="210" r="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="214" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">nucleus</text>
  <!-- 7 outer electrons at 8 positions, one slot empty (top-right) -->
  <circle cx="150" cy="115" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="145" y1="115" x2="155" y2="115" stroke="black" stroke-width="2"/>
  <circle cx="67" cy="162" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="62" y1="162" x2="72" y2="162" stroke="black" stroke-width="2"/>
  <circle cx="55" cy="210" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="50" y1="210" x2="60" y2="210" stroke="black" stroke-width="2"/>
  <circle cx="67" cy="258" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="62" y1="258" x2="72" y2="258" stroke="black" stroke-width="2"/>
  <circle cx="150" cy="305" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="145" y1="305" x2="155" y2="305" stroke="black" stroke-width="2"/>
  <circle cx="233" cy="258" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="228" y1="258" x2="238" y2="258" stroke="black" stroke-width="2"/>
  <circle cx="245" cy="210" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="240" y1="210" x2="250" y2="210" stroke="black" stroke-width="2"/>
  <!-- empty slot marked with a dashed circle -->
  <circle cx="233" cy="162" r="8" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="233" y="138" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">gap</text>

  <!-- arrow: gains an electron -->
  <line x1="270" y1="210" x2="340" y2="210" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="305" y="200" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">gains</text>
  <text x="305" y="232" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">1 electron</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>

  <!-- AFTER atom: outer shell full (8) -->
  <text x="455" y="84" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">AFTER: full + stable</text>
  <circle cx="455" cy="210" r="95" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="455" cy="210" r="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="455" y="214" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">nucleus</text>
  <circle cx="455" cy="115" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="450" y1="115" x2="460" y2="115" stroke="black" stroke-width="2"/>
  <circle cx="372" cy="162" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="367" y1="162" x2="377" y2="162" stroke="black" stroke-width="2"/>
  <circle cx="360" cy="210" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="355" y1="210" x2="365" y2="210" stroke="black" stroke-width="2"/>
  <circle cx="372" cy="258" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="367" y1="258" x2="377" y2="258" stroke="black" stroke-width="2"/>
  <circle cx="455" cy="305" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="450" y1="305" x2="460" y2="305" stroke="black" stroke-width="2"/>
  <circle cx="538" cy="258" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="533" y1="258" x2="543" y2="258" stroke="black" stroke-width="2"/>
  <circle cx="550" cy="210" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="545" y1="210" x2="555" y2="210" stroke="black" stroke-width="2"/>
  <!-- the newly added electron, shaded -->
  <circle cx="538" cy="162" r="11" fill="#d9d9d9" stroke="black" stroke-width="1"/>
  <circle cx="538" cy="162" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="533" y1="162" x2="543" y2="162" stroke="black" stroke-width="2"/>
  <text x="538" y="138" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">new</text>

  <text x="300" y="384" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A full outer shell = stable. This drive to fill it is WHY atoms react.</text>
</svg>
