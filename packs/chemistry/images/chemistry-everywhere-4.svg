<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Chemical Change vs Nuclear Change</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The big difference: which part of the atom changes?</text>

  <line x1="300" y1="60" x2="300" y2="370" stroke="black" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- LEFT: chemical change -->
  <text x="150" y="82" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">CHEMICAL CHANGE</text>
  <text x="150" y="100" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">ELECTRONS / BONDS rearrange</text>
  <!-- two atoms with nuclei intact, bond forming -->
  <circle cx="100" cy="170" r="34" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="200" cy="170" r="34" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="100" cy="170" r="9" fill="black"/>
  <circle cx="200" cy="170" r="9" fill="black"/>
  <text x="100" y="225" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">nucleus</text>
  <text x="200" y="225" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">nucleus</text>
  <!-- shared electrons between them -->
  <circle cx="140" cy="170" r="5" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="160" cy="170" r="5" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="250" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">outer electrons shared/swapped</text>
  <text x="150" y="292" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">NUCLEUS stays the same</text>
  <text x="150" y="312" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">same elements, new molecule</text>
  <text x="150" y="332" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">e.g. burning, rusting, cooking</text>
  <text x="150" y="356" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">releases SOME energy</text>

  <!-- RIGHT: nuclear change -->
  <text x="450" y="82" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">NUCLEAR CHANGE</text>
  <text x="450" y="100" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">the NUCLEUS itself changes</text>
  <!-- unstable nucleus emitting radiation -->
  <circle cx="450" cy="175" r="22" fill="black"/>
  <text x="450" y="140" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">unstable nucleus</text>
  <!-- radiation rays out -->
  <line x1="468" y1="160" x2="500" y2="135" stroke="black" stroke-width="2"/>
  <line x1="472" y1="175" x2="510" y2="175" stroke="black" stroke-width="2"/>
  <line x1="468" y1="190" x2="500" y2="215" stroke="black" stroke-width="2"/>
  <line x1="432" y1="160" x2="400" y2="135" stroke="black" stroke-width="2"/>
  <line x1="428" y1="175" x2="390" y2="175" stroke="black" stroke-width="2"/>
  <line x1="432" y1="190" x2="400" y2="215" stroke="black" stroke-width="2"/>
  <text x="450" y="245" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">gives off radiation (radioactivity)</text>
  <text x="450" y="292" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">protons/neutrons change</text>
  <text x="450" y="312" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">can become a NEW element</text>
  <text x="450" y="332" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">e.g. nuclear power, medical scans</text>
  <text x="450" y="356" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">releases FAR MORE energy</text>
</svg>
