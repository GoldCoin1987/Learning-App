<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect x="0" y="0" width="600" height="380" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">A Catalyst Lowers the Activation-Energy Hill</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A catalyst speeds a reaction by giving it a smaller hill (a shortcut).</text>

  <!-- axes -->
  <line x1="70" y1="320" x2="560" y2="320" stroke="black" stroke-width="2"/>
  <line x1="70" y1="320" x2="70" y2="80" stroke="black" stroke-width="2"/>
  <text x="40" y="200" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black" transform="rotate(-90 40 200)">energy</text>
  <text x="315" y="350" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">progress of reaction &#8594;</text>

  <!-- BIG hill (no catalyst) - dashed -->
  <path d="M90 240 Q160 240 220 110 Q250 80 280 110 Q330 240 480 280" fill="none" stroke="black" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="250" y="100" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">big hill (no catalyst)</text>

  <!-- SMALL hill (with catalyst) - solid -->
  <path d="M90 240 Q160 240 230 180 Q255 165 280 180 Q345 240 480 280" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="385" y="178" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">smaller hill</text>
  <text x="385" y="194" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(with catalyst)</text>

  <!-- arrow showing the hill is lowered -->
  <line x1="252" y1="118" x2="252" y2="160" stroke="black" stroke-width="1.5"/>
  <line x1="252" y1="160" x2="248" y2="152" stroke="black" stroke-width="1.5"/>
  <line x1="252" y1="160" x2="256" y2="152" stroke="black" stroke-width="1.5"/>
  <text x="252" y="138" font-family="sans-serif" font-size="11" text-anchor="start" fill="black"> lowered</text>

  <!-- reactants and products -->
  <text x="100" y="232" font-family="sans-serif" font-size="12" text-anchor="start" fill="black">reactants</text>
  <text x="470" y="298" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">products</text>

  <text x="300" y="368" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The catalyst is NOT used up - it is left unchanged. Enzymes are biological catalysts.</text>
</svg>
