<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Ionic Bond: One Atom GIVES an Electron</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Sodium (a metal) hands 1 electron to chlorine (a nonmetal). Opposite charges then attract.</text>

  <!-- BEFORE label -->
  <text x="300" y="78" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">TRANSFER: the metal gives, the nonmetal takes</text>

  <!-- sodium atom (left) -->
  <circle cx="150" cy="200" r="70" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="150" cy="200" r="20" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="204" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Na</text>
  <!-- sodium's 1 lonely outer electron, on the right side, about to move -->
  <circle cx="220" cy="200" r="9" fill="black" stroke="black" stroke-width="2"/>
  <text x="150" y="290" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">sodium: 1 outer electron</text>
  <text x="150" y="305" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(easier to GIVE it away)</text>

  <!-- transfer arrow -->
  <line x1="235" y1="190" x2="365" y2="190" stroke="black" stroke-width="2" marker-end="url(#arrow1)"/>
  <text x="300" y="178" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">gives 1 electron</text>

  <!-- chlorine atom (right) -->
  <circle cx="450" cy="200" r="70" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="450" cy="200" r="20" fill="none" stroke="black" stroke-width="2"/>
  <text x="450" y="204" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Cl</text>
  <!-- chlorine's 7 outer electrons + 1 gap (dashed) where it accepts -->
  <circle cx="450" cy="130" r="8" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="510" cy="160" r="8" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="520" cy="200" r="8" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="510" cy="240" r="8" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="450" cy="270" r="8" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="390" cy="240" r="8" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="380" cy="200" r="9" fill="none" stroke="black" stroke-width="1.3" stroke-dasharray="3 3"/>
  <text x="450" y="305" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">chlorine: needs just 1 more</text>

  <!-- AFTER row: the two ions attract -->
  <text x="300" y="338" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">RESULT: Na+  and  Cl-  attract  -&gt;  table salt (NaCl)</text>
  <text x="300" y="360" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">+ ion and - ion stick together like two magnets.</text>
  <text x="300" y="382" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(filled dot = the electron being given away; dashed circle = the empty spot it fills)</text>

  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>
</svg>
