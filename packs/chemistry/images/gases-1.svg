<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect x="0" y="0" width="600" height="380" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">What Gas Pressure Is: Particle Collisions on the Walls</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A gas = tiny particles far apart, zooming and bouncing off the walls of the container.</text>

  <!-- container -->
  <rect x="120" y="70" width="360" height="220" fill="none" stroke="black" stroke-width="3"/>
  <text x="300" y="92" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">sealed container</text>

  <!-- particle 1 + motion arrow + collision burst on top wall -->
  <circle cx="180" cy="150" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="180" y1="150" x2="200" y2="120" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="120" x2="193" y2="122" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="120" x2="199" y2="129" stroke="black" stroke-width="1.5"/>

  <!-- particle 2 hitting right wall (collision star) -->
  <circle cx="450" cy="180" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="450" y1="180" x2="478" y2="180" stroke="black" stroke-width="1.5"/>
  <line x1="478" y1="180" x2="471" y2="176" stroke="black" stroke-width="1.5"/>
  <line x1="478" y1="180" x2="471" y2="184" stroke="black" stroke-width="1.5"/>
  <!-- collision burst on right wall -->
  <line x1="478" y1="172" x2="486" y2="168" stroke="black" stroke-width="1.5"/>
  <line x1="479" y1="180" x2="489" y2="180" stroke="black" stroke-width="1.5"/>
  <line x1="478" y1="188" x2="486" y2="192" stroke="black" stroke-width="1.5"/>

  <!-- particle 3 -->
  <circle cx="260" cy="240" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="260" y1="240" x2="240" y2="265" stroke="black" stroke-width="1.5"/>
  <line x1="240" y1="265" x2="247" y2="263" stroke="black" stroke-width="1.5"/>
  <line x1="240" y1="265" x2="241" y2="258" stroke="black" stroke-width="1.5"/>

  <!-- particle 4 hitting bottom wall (collision burst) -->
  <circle cx="350" cy="255" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="350" y1="255" x2="350" y2="283" stroke="black" stroke-width="1.5"/>
  <line x1="350" y1="283" x2="346" y2="276" stroke="black" stroke-width="1.5"/>
  <line x1="350" y1="283" x2="354" y2="276" stroke="black" stroke-width="1.5"/>
  <line x1="342" y1="287" x2="338" y2="290" stroke="black" stroke-width="1.5"/>
  <line x1="358" y1="287" x2="362" y2="290" stroke="black" stroke-width="1.5"/>

  <!-- particle 5 -->
  <circle cx="320" cy="140" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="320" y1="140" x2="345" y2="155" stroke="black" stroke-width="1.5"/>
  <line x1="345" y1="155" x2="338" y2="154" stroke="black" stroke-width="1.5"/>
  <line x1="345" y1="155" x2="341" y2="149" stroke="black" stroke-width="1.5"/>

  <!-- callout to a wall hit -->
  <text x="505" y="178" font-family="sans-serif" font-size="11" text-anchor="start" fill="black">hit!</text>
  <text x="300" y="312" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">arrows = particles zooming; bursts = hits on the wall</text>

  <text x="300" y="338" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">PRESSURE = the total push from all those tiny collisions on the walls.</text>
  <text x="300" y="360" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">More hits or harder hits = more pressure (a pumped-up tire or balloon feels firm).</text>
</svg>
