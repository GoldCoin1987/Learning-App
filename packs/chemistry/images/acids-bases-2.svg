<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <rect x="0" y="0" width="640" height="360" fill="white"/>
  <text x="320" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">The pH Scale: 0 to 14 (how acidic or basic a solution is)</text>
  <text x="320" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">7 = NEUTRAL (pure water). Below 7 = acidic. Above 7 = basic (alkaline).</text>

  <!-- number line -->
  <line x1="40" y1="150" x2="600" y2="150" stroke="black" stroke-width="2"/>
  <!-- ticks 0..14 -->
  <g font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">
    <line x1="40" y1="143" x2="40" y2="157" stroke="black" stroke-width="2"/><text x="40" y="176">0</text>
    <line x1="80" y1="143" x2="80" y2="157" stroke="black" stroke-width="2"/><text x="80" y="176">1</text>
    <line x1="120" y1="143" x2="120" y2="157" stroke="black" stroke-width="2"/><text x="120" y="176">2</text>
    <line x1="160" y1="143" x2="160" y2="157" stroke="black" stroke-width="2"/><text x="160" y="176">3</text>
    <line x1="200" y1="143" x2="200" y2="157" stroke="black" stroke-width="2"/><text x="200" y="176">4</text>
    <line x1="240" y1="143" x2="240" y2="157" stroke="black" stroke-width="2"/><text x="240" y="176">5</text>
    <line x1="280" y1="143" x2="280" y2="157" stroke="black" stroke-width="2"/><text x="280" y="176">6</text>
    <line x1="320" y1="140" x2="320" y2="160" stroke="black" stroke-width="3"/><text x="320" y="178" font-size="14">7</text>
    <line x1="360" y1="143" x2="360" y2="157" stroke="black" stroke-width="2"/><text x="360" y="176">8</text>
    <line x1="400" y1="143" x2="400" y2="157" stroke="black" stroke-width="2"/><text x="400" y="176">9</text>
    <line x1="440" y1="143" x2="440" y2="157" stroke="black" stroke-width="2"/><text x="440" y="176">10</text>
    <line x1="480" y1="143" x2="480" y2="157" stroke="black" stroke-width="2"/><text x="480" y="176">11</text>
    <line x1="520" y1="143" x2="520" y2="157" stroke="black" stroke-width="2"/><text x="520" y="176">12</text>
    <line x1="560" y1="143" x2="560" y2="157" stroke="black" stroke-width="2"/><text x="560" y="176">13</text>
    <line x1="600" y1="143" x2="600" y2="157" stroke="black" stroke-width="2"/><text x="600" y="176">14</text>
  </g>

  <!-- NEUTRAL marker at 7 -->
  <text x="320" y="120" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">NEUTRAL</text>

  <!-- region arrows -->
  <line x1="290" y1="100" x2="60" y2="100" stroke="black" stroke-width="1.5" marker-end="url(#arrowL)"/>
  <text x="175" y="92" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">lower = MORE ACIDIC</text>
  <line x1="350" y1="100" x2="580" y2="100" stroke="black" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="465" y="92" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">higher = MORE BASIC</text>

  <defs>
    <marker id="arrowL" markerWidth="10" markerHeight="10" refX="2" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill="none" stroke="black" stroke-width="1.5"/></marker>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="none" stroke="black" stroke-width="1.5"/></marker>
  </defs>

  <!-- familiar items placed below, with leader lines up to ticks -->
  <g font-family="sans-serif" font-size="12" fill="black">
    <line x1="40" y1="150" x2="40" y2="210" stroke="black" stroke-width="1"/>
    <text x="40" y="226" text-anchor="middle">battery</text><text x="40" y="240" text-anchor="middle">acid ~0</text>

    <line x1="120" y1="150" x2="120" y2="252" stroke="black" stroke-width="1"/>
    <text x="120" y="268" text-anchor="middle">lemon ~2</text>

    <line x1="240" y1="150" x2="240" y2="210" stroke="black" stroke-width="1"/>
    <text x="240" y="226" text-anchor="middle">coffee ~5</text>

    <line x1="320" y1="160" x2="320" y2="252" stroke="black" stroke-width="1"/>
    <text x="320" y="268" text-anchor="middle">water 7</text>

    <line x1="400" y1="150" x2="400" y2="210" stroke="black" stroke-width="1"/>
    <text x="400" y="226" text-anchor="middle">baking</text><text x="400" y="240" text-anchor="middle">soda ~9</text>

    <line x1="560" y1="150" x2="560" y2="252" stroke="black" stroke-width="1"/>
    <text x="560" y="268" text-anchor="middle">bleach ~13</text>
  </g>

  <text x="320" y="310" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">ACIDIC side (left, below 7)  |  BASIC / alkaline side (right, above 7)</text>
  <text x="320" y="334" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Note: each step is a BIG jump (about ten times), not a little.</text>
</svg>
