<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">A Heating Curve: Why Temperature PAUSES During a Change</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Keep adding heat at a steady rate and watch the temperature.</text>

  <!-- axes -->
  <line x1="70" y1="320" x2="560" y2="320" stroke="black" stroke-width="2"/>
  <line x1="70" y1="320" x2="70" y2="70" stroke="black" stroke-width="2"/>
  <text x="315" y="356" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Heat added over time &#8594;</text>
  <text x="28" y="200" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black" transform="rotate(-90 28 200)">Temperature &#8594;</text>

  <!-- curve: rise, flat (melt), rise, flat (boil), rise -->
  <polyline points="70,300 140,250 230,250 300,170 430,170 500,110"
            fill="none" stroke="black" stroke-width="2.5"/>

  <!-- markers for the flat parts -->
  <line x1="140" y1="250" x2="140" y2="320" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="230" y1="250" x2="230" y2="320" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="185" y="240" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">FLAT: melting</text>
  <text x="185" y="296" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">solid + liquid</text>

  <line x1="300" y1="170" x2="300" y2="320" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="430" y1="170" x2="430" y2="320" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="365" y="160" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">FLAT: boiling</text>
  <text x="365" y="296" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">liquid + gas</text>

  <!-- rising-section labels -->
  <text x="100" y="285" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">solid</text>
  <text x="265" y="215" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">liquid</text>
  <text x="470" y="135" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">gas</text>

  <!-- the key insight callout -->
  <text x="300" y="384" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">During the flat parts, energy goes into BREAKING ATTRACTIONS between particles, not heating.</text>
</svg>
