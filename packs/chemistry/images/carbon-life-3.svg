<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Functional Group: the 'Active Part'</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The carbon chain is the BODY; a small attached cluster of atoms is the TOOL that does the chemistry.</text>

  <!-- carbon chain = the body -->
  <text x="230" y="120" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Carbon skeleton (the body)</text>
  <circle cx="120" cy="200" r="22" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="200" cy="200" r="22" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="280" cy="200" r="22" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="360" cy="200" r="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="120" y="205" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">C</text>
  <text x="200" y="205" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">C</text>
  <text x="280" y="205" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">C</text>
  <text x="360" y="205" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">C</text>
  <line x1="142" y1="200" x2="178" y2="200" stroke="black" stroke-width="2"/>
  <line x1="222" y1="200" x2="258" y2="200" stroke="black" stroke-width="2"/>
  <line x1="302" y1="200" x2="338" y2="200" stroke="black" stroke-width="2"/>

  <!-- bond out to the functional group -->
  <line x1="382" y1="200" x2="430" y2="200" stroke="black" stroke-width="2"/>

  <!-- highlighted active part -->
  <rect x="432" y="160" width="120" height="80" fill="none" stroke="black" stroke-width="3"/>
  <text x="492" y="195" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">ACTIVE PART</text>
  <text x="492" y="215" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(functional group)</text>
  <text x="492" y="135" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">small attached cluster</text>
  <text x="492" y="150" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">the TOOL it carries</text>

  <text x="300" y="300" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">The active part decides the molecule's behavior --</text>
  <text x="300" y="324" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">e.g. what makes something an alcohol, an acid, or a sugar.</text>
  <text x="300" y="360" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Same carbon body + different active part = different job.</text>
</svg>
