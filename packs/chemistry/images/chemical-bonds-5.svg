<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Metallic Bond: A Shared 'Sea' of Electrons</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Fixed + metal ions sit in a sea of free electrons that flow among them.</text>

  <!-- the metal block -->
  <rect x="80" y="70" width="440" height="210" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- fixed + metal ions in a grid -->
  <circle cx="150" cy="120" r="18" fill="none" stroke="black" stroke-width="2"/><text x="150" y="125" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">+</text>
  <circle cx="260" cy="120" r="18" fill="none" stroke="black" stroke-width="2"/><text x="260" y="125" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">+</text>
  <circle cx="370" cy="120" r="18" fill="none" stroke="black" stroke-width="2"/><text x="370" y="125" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">+</text>
  <circle cx="450" cy="120" r="18" fill="none" stroke="black" stroke-width="2"/><text x="450" y="125" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">+</text>
  <circle cx="150" cy="225" r="18" fill="none" stroke="black" stroke-width="2"/><text x="150" y="230" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">+</text>
  <circle cx="260" cy="225" r="18" fill="none" stroke="black" stroke-width="2"/><text x="260" y="230" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">+</text>
  <circle cx="370" cy="225" r="18" fill="none" stroke="black" stroke-width="2"/><text x="370" y="230" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">+</text>
  <circle cx="450" cy="225" r="18" fill="none" stroke="black" stroke-width="2"/><text x="450" y="230" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">+</text>

  <!-- free electrons (small filled dots) scattered in the 'sea' -->
  <circle cx="205" cy="120" r="5" fill="black"/>
  <circle cx="315" cy="120" r="5" fill="black"/>
  <circle cx="410" cy="120" r="5" fill="black"/>
  <circle cx="110" cy="172" r="5" fill="black"/>
  <circle cx="205" cy="172" r="5" fill="black"/>
  <circle cx="315" cy="172" r="5" fill="black"/>
  <circle cx="410" cy="172" r="5" fill="black"/>
  <circle cx="490" cy="172" r="5" fill="black"/>
  <circle cx="205" cy="225" r="5" fill="black"/>
  <circle cx="315" cy="225" r="5" fill="black"/>
  <circle cx="410" cy="225" r="5" fill="black"/>

  <!-- flow arrows showing electrons moving -->
  <line x1="120" y1="172" x2="195" y2="172" stroke="black" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <line x1="325" y1="172" x2="400" y2="172" stroke="black" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- labels with leader lines -->
  <text x="300" y="305" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">+  =  fixed metal ion        dot  =  free electron in the 'sea'</text>

  <text x="300" y="338" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Free electrons carry charge -&gt; metals CONDUCT electricity and heat.</text>
  <text x="300" y="362" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Ions can slide past in the sea -&gt; metals BEND instead of shattering.</text>
  <text x="300" y="386" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Everyday: copper wire conducts; gold can be hammered into shape.</text>

  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>
</svg>
