<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect x="0" y="0" width="600" height="380" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Exothermic vs Endothermic: Energy Out or Energy In</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Every reaction either RELEASES energy or ABSORBS it.</text>

  <!-- EXOTHERMIC panel -->
  <rect x="30" y="75" width="255" height="230" fill="none" stroke="black" stroke-width="2"/>
  <text x="157" y="100" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">EXOTHERMIC = energy OUT</text>
  <text x="157" y="120" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">surroundings get WARMER</text>

  <!-- campfire -->
  <line x1="120" y1="235" x2="195" y2="235" stroke="black" stroke-width="2"/>
  <line x1="130" y1="235" x2="160" y2="195" stroke="black" stroke-width="2"/>
  <line x1="185" y1="235" x2="155" y2="195" stroke="black" stroke-width="2"/>
  <path d="M157 195 Q145 175 157 160 Q169 175 157 195 Z" fill="none" stroke="black" stroke-width="2"/>
  <text x="157" y="255" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">campfire (burning)</text>

  <!-- energy out arrows -->
  <line x1="200" y1="170" x2="232" y2="155" stroke="black" stroke-width="1.5"/>
  <line x1="232" y1="155" x2="224" y2="155" stroke="black" stroke-width="1.5"/>
  <line x1="232" y1="155" x2="229" y2="162" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="185" x2="234" y2="185" stroke="black" stroke-width="1.5"/>
  <line x1="234" y1="185" x2="227" y2="181" stroke="black" stroke-width="1.5"/>
  <line x1="234" y1="185" x2="227" y2="189" stroke="black" stroke-width="1.5"/>
  <text x="157" y="285" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">heat / light come OUT</text>

  <!-- ENDOTHERMIC panel -->
  <rect x="315" y="75" width="255" height="230" fill="none" stroke="black" stroke-width="2"/>
  <text x="442" y="100" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">ENDOTHERMIC = energy IN</text>
  <text x="442" y="120" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">surroundings get COOLER</text>

  <!-- cold pack -->
  <rect x="405" y="170" width="75" height="60" rx="8" fill="none" stroke="black" stroke-width="2"/>
  <text x="442" y="205" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">COLD</text>
  <text x="442" y="250" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">instant cold pack</text>

  <!-- energy in arrows -->
  <line x1="378" y1="155" x2="408" y2="172" stroke="black" stroke-width="1.5"/>
  <line x1="408" y1="172" x2="400" y2="170" stroke="black" stroke-width="1.5"/>
  <line x1="408" y1="172" x2="404" y2="164" stroke="black" stroke-width="1.5"/>
  <line x1="378" y1="200" x2="402" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="402" y1="200" x2="395" y2="196" stroke="black" stroke-width="1.5"/>
  <line x1="402" y1="200" x2="395" y2="204" stroke="black" stroke-width="1.5"/>
  <text x="442" y="285" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">heat goes IN (soaked up)</text>

  <text x="300" y="335" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Plain reason: breaking bonds takes energy IN; making bonds gives energy OUT.</text>
  <text x="300" y="360" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">If more comes out making new bonds than went in, it is exothermic.</text>
</svg>
