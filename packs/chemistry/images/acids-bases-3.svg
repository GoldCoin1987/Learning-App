<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Each Step on the pH Scale is a BIG Jump (about 10x)</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">pH 3 is much more acidic than pH 5 -- not just a little more.</text>

  <!-- three bars showing roughly 10x per step, conceptual -->
  <!-- baseline -->
  <line x1="80" y1="300" x2="520" y2="300" stroke="black" stroke-width="2"/>

  <!-- pH 5 : small bar -->
  <rect x="110" y="285" width="70" height="15" fill="none" stroke="black" stroke-width="2"/>
  <text x="145" y="320" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">pH 5</text>
  <text x="145" y="338" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">least acidic here</text>

  <!-- pH 4 : ~10x taller -->
  <rect x="265" y="150" width="70" height="150" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="320" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">pH 4</text>
  <text x="300" y="338" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">about 10x more</text>

  <!-- pH 3 : ~10x taller again -->
  <rect x="420" y="80" width="70" height="220" fill="none" stroke="black" stroke-width="2"/>
  <text x="455" y="320" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">pH 3</text>
  <text x="455" y="338" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">much more acidic</text>

  <!-- x10 arrows between bars -->
  <path d="M185 240 q40 -30 75 -50" fill="none" stroke="black" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="225" y="200" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">x10</text>
  <path d="M340 170 q40 -25 75 -45" fill="none" stroke="black" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="380" y="130" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">x10</text>

  <defs>
    <marker id="a3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="none" stroke="black" stroke-width="1.5"/></marker>
  </defs>

  <text x="300" y="70" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Lower pH = stronger acid. Bar height = roughly how acidic (conceptual).</text>
</svg>
