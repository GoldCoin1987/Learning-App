<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Counting Atoms in a Formula</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Worked example: read each subscript, then add up all the atoms.</text>

  <!-- the formula -->
  <text x="300" y="110" font-family="sans-serif" font-size="48" text-anchor="middle" fill="black">C</text>
  <text x="338" y="110" font-family="sans-serif" font-size="48" text-anchor="middle" fill="black">O</text>
  <text x="368" y="124" font-family="sans-serif" font-size="26" text-anchor="middle" fill="black">2</text>

  <!-- step boxes -->
  <rect x="60" y="160" width="220" height="120" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="170" y="185" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Step 1: count each kind</text>
  <circle cx="110" cy="225" r="18" fill="none" stroke="black" stroke-width="2"/>
  <text x="110" y="229" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">C</text>
  <text x="170" y="229" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">C = 1</text>
  <text x="170" y="262" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">O = 2</text>
  <circle cx="208" cy="225" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="208" y="229" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">O</text>
  <circle cx="248" cy="225" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="248" y="229" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">O</text>

  <line x1="290" y1="220" x2="330" y2="220" stroke="black" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="340" y="160" width="200" height="120" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="440" y="185" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Step 2: add them up</text>
  <text x="440" y="225" font-family="sans-serif" font-size="20" text-anchor="middle" fill="black">1 + 2 = 3</text>
  <text x="440" y="258" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">3 atoms total</text>

  <text x="300" y="330" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">CO2 has 3 atoms in all: 1 carbon and 2 oxygen.</text>
  <text x="300" y="358" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">(Tip: a subscript belongs to the symbol just before it. No number means 1.)</text>

  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>
</svg>
