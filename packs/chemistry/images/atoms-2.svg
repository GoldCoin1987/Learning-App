<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">An Atom Is Mostly Empty Space</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">If the whole atom were a stadium, the nucleus would be a marble in the middle.</text>

  <!-- the "stadium" = the whole atom -->
  <ellipse cx="300" cy="210" rx="250" ry="120" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="300" cy="210" rx="200" ry="90" fill="none" stroke="black" stroke-width="1" stroke-dasharray="4 5"/>
  <text x="300" y="120" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">THE WHOLE ATOM (the stadium)</text>
  <text x="300" y="318" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">empty space, with light electrons whizzing around far out here</text>

  <!-- tiny nucleus = a marble at center -->
  <circle cx="300" cy="210" r="6" fill="black"/>
  <line x1="306" y1="210" x2="380" y2="210" stroke="black" stroke-width="1"/>
  <text x="384" y="206" font-family="sans-serif" font-size="12" fill="black">the NUCLEUS</text>
  <text x="384" y="222" font-family="sans-serif" font-size="12" fill="black">(a marble, this tiny dot)</text>

  <!-- a couple of far-out electrons -->
  <circle cx="120" cy="170" r="8" fill="none" stroke="black" stroke-width="2"/>
  <line x1="115" y1="170" x2="125" y2="170" stroke="black" stroke-width="2"/>
  <circle cx="480" cy="250" r="8" fill="none" stroke="black" stroke-width="2"/>
  <line x1="475" y1="250" x2="485" y2="250" stroke="black" stroke-width="2"/>

  <text x="300" y="348" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Electrons are much lighter than protons and neutrons, so the nucleus holds almost all the mass.</text>
</svg>
