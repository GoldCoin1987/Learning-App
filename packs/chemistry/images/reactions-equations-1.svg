<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">A Reaction: Reactants Turn Into Products</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The arrow means "turns into / yields". Example: baking soda + vinegar makes fizz (a gas).</text>

  <!-- LEFT: reactants -->
  <rect x="40" y="90" width="200" height="170" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="140" y="112" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">REACTANTS</text>
  <text x="140" y="130" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(the starting substances)</text>

  <ellipse cx="100" cy="185" rx="40" ry="28" fill="none" stroke="black" stroke-width="2"/>
  <text x="100" y="183" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">baking</text>
  <text x="100" y="197" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">soda</text>

  <text x="170" y="190" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">+</text>

  <ellipse cx="205" cy="185" rx="30" ry="28" fill="none" stroke="black" stroke-width="2"/>
  <text x="205" y="190" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">vinegar</text>

  <!-- ARROW -->
  <line x1="255" y1="175" x2="345" y2="175" stroke="black" stroke-width="3" marker-end="url(#arrowR)"/>
  <text x="300" y="165" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">yields</text>

  <!-- RIGHT: products -->
  <rect x="360" y="90" width="200" height="170" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="460" y="112" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">PRODUCTS</text>
  <text x="460" y="130" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(the new substances)</text>

  <ellipse cx="460" cy="190" rx="55" ry="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="460" y="186" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">new stuff +</text>
  <text x="460" y="202" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">fizz (gas)</text>
  <circle cx="430" cy="150" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="490" cy="148" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="470" cy="138" r="4" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="528" y="142" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">bubbles</text>

  <text x="300" y="305" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">A chemical reaction rearranges atoms into NEW substances.</text>
  <text x="300" y="332" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Signs it happened: color change, a gas (bubbles), heat or light, a solid (precipitate).</text>
  <text x="300" y="356" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">reactants  to the LEFT  of the arrow,  products  to the RIGHT.</text>

  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>
</svg>
