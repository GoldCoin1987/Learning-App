<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Same Column = Same Valence Count = Same Behavior</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Elements in one column have the SAME number of outer electrons, so they act alike.</text>

  <!-- LEFT atom: smaller, 1 outer electron -->
  <text x="150" y="86" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Element A (top of column)</text>
  <circle cx="150" cy="205" r="55" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="150" cy="205" r="20" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="209" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">core</text>
  <!-- 1 outer electron, shaded -->
  <circle cx="150" cy="150" r="13" fill="#d9d9d9" stroke="black" stroke-width="1"/>
  <circle cx="150" cy="150" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="145" y1="150" x2="155" y2="150" stroke="black" stroke-width="2"/>
  <text x="150" y="285" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">1 outer electron</text>

  <!-- RIGHT atom: larger (more inner shells), still 1 outer electron -->
  <text x="450" y="86" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Element B (lower in column)</text>
  <circle cx="450" cy="205" r="78" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="450" cy="205" r="48" fill="none" stroke="black" stroke-width="1.2"/>
  <circle cx="450" cy="205" r="20" fill="none" stroke="black" stroke-width="2"/>
  <text x="450" y="209" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">core</text>
  <!-- inner shell electrons (plain) -->
  <circle cx="450" cy="157" r="6" fill="none" stroke="black" stroke-width="1.3"/>
  <circle cx="450" cy="253" r="6" fill="none" stroke="black" stroke-width="1.3"/>
  <!-- 1 outer electron, shaded -->
  <circle cx="450" cy="127" r="13" fill="#d9d9d9" stroke="black" stroke-width="1"/>
  <circle cx="450" cy="127" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="445" y1="127" x2="455" y2="127" stroke="black" stroke-width="2"/>
  <text x="450" y="305" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">also 1 outer electron</text>

  <!-- equals / same behavior box -->
  <text x="300" y="200" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">=</text>
  <rect x="150" y="330" width="300" height="48" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="300" y="350" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Same outer-electron count =</text>
  <text x="300" y="368" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">same 'personality' = similar chemistry</text>
</svg>
