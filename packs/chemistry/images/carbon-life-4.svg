<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">The Four Big Molecules of Life</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">All are large carbon-based molecules that build and run living things. Each has its own job.</text>

  <!-- CARBOHYDRATE -->
  <rect x="40" y="80" width="230" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="106" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">CARBOHYDRATE</text>
  <text x="155" y="124" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(sugars and starches)</text>
  <!-- little ring icon -->
  <polygon points="120,160 140,150 160,160 153,180 127,180" fill="none" stroke="black" stroke-width="2"/>
  <text x="200" y="166" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">JOB:</text>
  <text x="200" y="184" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">quick energy</text>

  <!-- FAT / LIPID -->
  <rect x="330" y="80" width="230" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="445" y="106" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">FAT / LIPID</text>
  <text x="445" y="124" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(oils, butter)</text>
  <!-- droplet icon -->
  <path d="M410 150 q14 22 0 32 q-14 -10 0 -32 z" fill="none" stroke="black" stroke-width="2"/>
  <text x="490" y="166" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">JOB: stored energy</text>
  <text x="490" y="184" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">and cell membranes</text>

  <!-- PROTEIN -->
  <rect x="40" y="230" width="230" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="256" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">PROTEIN</text>
  <text x="155" y="274" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(muscle, enzymes, hair)</text>
  <!-- chain of beads = amino acids -->
  <circle cx="110" cy="312" r="8" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="130" cy="312" r="8" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="150" cy="312" r="8" fill="none" stroke="black" stroke-width="2"/>
  <line x1="118" y1="312" x2="122" y2="312" stroke="black" stroke-width="2"/>
  <line x1="138" y1="312" x2="142" y2="312" stroke="black" stroke-width="2"/>
  <text x="205" y="312" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">JOB: builder /</text>
  <text x="205" y="330" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">workhorse</text>

  <!-- DNA -->
  <rect x="330" y="230" width="230" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="445" y="256" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">DNA (nucleic acid)</text>
  <text x="445" y="274" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">the instruction molecule</text>
  <!-- ladder icon -->
  <line x1="405" y1="292" x2="405" y2="338" stroke="black" stroke-width="2"/>
  <line x1="425" y1="292" x2="425" y2="338" stroke="black" stroke-width="2"/>
  <line x1="405" y1="300" x2="425" y2="300" stroke="black" stroke-width="2"/>
  <line x1="405" y1="312" x2="425" y2="312" stroke="black" stroke-width="2"/>
  <line x1="405" y1="324" x2="425" y2="324" stroke="black" stroke-width="2"/>
  <text x="500" y="312" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">JOB: stores</text>
  <text x="500" y="330" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">genetic instructions</text>

  <text x="300" y="384" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">carbs = energy, fats = storage, proteins = builders, DNA = instructions.</text>
</svg>
