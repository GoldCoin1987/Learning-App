<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Why Carbon Is Special: 4 Bonds -&gt; Endless Shapes</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">One carbon makes exactly FOUR strong covalent bonds and can link to OTHER carbons.</text>

  <!-- LEFT: a single carbon with 4 studs (connector brick) -->
  <text x="120" y="78" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">A connector with 4 studs</text>
  <circle cx="120" cy="150" r="34" fill="none" stroke="black" stroke-width="2"/>
  <text x="120" y="155" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">C</text>
  <!-- four bonds sticking out -->
  <line x1="120" y1="116" x2="120" y2="86" stroke="black" stroke-width="2"/>
  <line x1="120" y1="184" x2="120" y2="214" stroke="black" stroke-width="2"/>
  <line x1="86" y1="150" x2="56" y2="150" stroke="black" stroke-width="2"/>
  <line x1="154" y1="150" x2="184" y2="150" stroke="black" stroke-width="2"/>
  <text x="120" y="238" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">4 valence electrons</text>
  <text x="120" y="252" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">-&gt; wants 4 bonds</text>

  <!-- divider -->
  <line x1="240" y1="64" x2="240" y2="330" stroke="black" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- TOP RIGHT: a CHAIN of carbons -->
  <text x="420" y="84" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">CHAIN (carbons in a row)</text>
  <circle cx="320" cy="120" r="18" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="380" cy="120" r="18" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="440" cy="120" r="18" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="500" cy="120" r="18" fill="none" stroke="black" stroke-width="2"/>
  <text x="320" y="125" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">C</text>
  <text x="380" y="125" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">C</text>
  <text x="440" y="125" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">C</text>
  <text x="500" y="125" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">C</text>
  <line x1="338" y1="120" x2="362" y2="120" stroke="black" stroke-width="2"/>
  <line x1="398" y1="120" x2="422" y2="120" stroke="black" stroke-width="2"/>
  <line x1="458" y1="120" x2="482" y2="120" stroke="black" stroke-width="2"/>

  <!-- BOTTOM RIGHT: a RING of carbons -->
  <text x="420" y="200" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">RING (carbons in a loop)</text>
  <circle cx="420" cy="270" r="20" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="470" cy="290" r="20" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="460" cy="340" r="20" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="400" cy="345" r="20" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="375" cy="298" r="20" fill="none" stroke="black" stroke-width="2"/>
  <text x="420" y="275" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">C</text>
  <text x="470" y="295" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">C</text>
  <text x="460" y="345" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">C</text>
  <text x="400" y="350" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">C</text>
  <text x="375" y="303" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">C</text>
  <line x1="438" y1="280" x2="452" y2="280" stroke="black" stroke-width="2"/>
  <line x1="466" y1="309" x2="464" y2="321" stroke="black" stroke-width="2"/>
  <line x1="441" y1="343" x2="419" y2="344" stroke="black" stroke-width="2"/>
  <line x1="389" y1="329" x2="383" y2="316" stroke="black" stroke-width="2"/>
  <line x1="392" y1="285" x2="404" y2="278" stroke="black" stroke-width="2"/>

  <text x="300" y="384" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Chains + branches + rings = a practically ENDLESS variety of molecules. Life is carbon-based.</text>
</svg>
