<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect x="0" y="0" width="600" height="380" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Physical Change vs Chemical Change</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Did you end up with NEW stuff, or the same stuff in a new form?</text>

  <!-- PHYSICAL CHANGE: ice -> water -> ice -->
  <text x="300" y="80" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">PHYSICAL CHANGE  (same substance, can reverse)</text>

  <!-- ice block -->
  <rect x="40" y="95" width="70" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="75" y="172" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">ICE</text>
  <!-- forward arrow (melt) -->
  <line x1="120" y1="125" x2="200" y2="125" stroke="black" stroke-width="2"/>
  <path d="M 200 125 L 190 120 L 190 130 Z" fill="black"/>
  <text x="160" y="115" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">melt</text>
  <!-- water (puddle) -->
  <path d="M 215 150 q 35 -45 70 0 q -35 18 -70 0 Z" fill="none" stroke="black" stroke-width="2"/>
  <text x="250" y="172" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">WATER</text>
  <!-- back arrow (freeze) -->
  <line x1="380" y1="125" x2="300" y2="125" stroke="black" stroke-width="2"/>
  <path d="M 300 125 L 310 120 L 310 130 Z" fill="black"/>
  <text x="340" y="115" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">freeze</text>
  <!-- ice block again -->
  <rect x="395" y="95" width="70" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="430" y="172" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">ICE again</text>
  <text x="540" y="128" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">same</text>
  <text x="540" y="142" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">water</text>
  <text x="555" y="180" font-family="sans-serif" font-size="11" text-anchor="end" fill="black">still H-O-H particles the whole time</text>

  <!-- divider -->
  <line x1="30" y1="200" x2="570" y2="200" stroke="black" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- CHEMICAL CHANGE: wood -> ash + smoke -->
  <text x="300" y="228" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">CHEMICAL CHANGE  (NEW substances, hard to reverse)</text>

  <!-- log of wood -->
  <rect x="55" y="255" width="90" height="40" rx="18" fill="none" stroke="black" stroke-width="2"/>
  <line x1="75" y1="255" x2="75" y2="295" stroke="black" stroke-width="1.5"/>
  <line x1="125" y1="255" x2="125" y2="295" stroke="black" stroke-width="1.5"/>
  <text x="100" y="315" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">WOOD + fire</text>

  <!-- one-way arrow with X (not reversible) -->
  <line x1="160" y1="275" x2="270" y2="275" stroke="black" stroke-width="2"/>
  <path d="M 270 275 L 260 270 L 260 280 Z" fill="black"/>
  <text x="215" y="265" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">burn</text>
  <!-- crossed-out return arrow -->
  <line x1="270" y1="300" x2="160" y2="300" stroke="black" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="205" y1="290" x2="225" y2="310" stroke="black" stroke-width="2"/>
  <line x1="225" y1="290" x2="205" y2="310" stroke="black" stroke-width="2"/>
  <text x="215" y="325" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">cannot go back</text>

  <!-- products: ash pile + smoke -->
  <path d="M 300 300 L 330 270 L 360 300 Z" fill="none" stroke="black" stroke-width="2"/>
  <text x="330" y="315" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">ASH (new)</text>
  <!-- smoke swirls -->
  <path d="M 420 300 q -15 -20 5 -30 q 20 -8 5 -28" fill="none" stroke="black" stroke-width="2"/>
  <path d="M 445 300 q -15 -18 5 -28 q 20 -8 5 -26" fill="none" stroke="black" stroke-width="2"/>
  <text x="438" y="315" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">SMOKE + gases (new)</text>
  <text x="540" y="278" font-family="sans-serif" font-size="11" text-anchor="end" fill="black">brand-new substances</text>

  <text x="300" y="358" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Physical: melt butter, cut paper, dissolve sugar.   Chemical: fry an egg, rust iron, bake a cake.</text>
</svg>
