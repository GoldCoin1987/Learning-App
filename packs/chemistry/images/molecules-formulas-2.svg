<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Reading a Chemical Formula</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The small low number (subscript) tells HOW MANY of that atom are in the unit. No number means 1.</text>

  <!-- ROW 1: H2O -->
  <text x="80" y="120" font-family="sans-serif" font-size="40" text-anchor="middle" fill="black">H</text>
  <text x="103" y="132" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">2</text>
  <text x="128" y="120" font-family="sans-serif" font-size="40" text-anchor="middle" fill="black">O</text>
  <!-- arrow to subscript -->
  <line x1="103" y1="165" x2="103" y2="138" stroke="black" stroke-width="1.5" marker-end="url(#arrowU)"/>
  <text x="103" y="182" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">subscript = 2</text>

  <text x="175" y="115" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">=</text>

  <!-- 2 H atoms + 1 O atom -->
  <circle cx="225" cy="110" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="225" y="114" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">H</text>
  <circle cx="270" cy="110" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="270" y="114" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">H</text>
  <text x="305" y="115" font-family="sans-serif" font-size="20" text-anchor="middle" fill="black">+</text>
  <circle cx="345" cy="110" r="18" fill="none" stroke="black" stroke-width="2"/>
  <text x="345" y="114" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">O</text>
  <text x="470" y="105" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">2 hydrogen + 1 oxygen</text>
  <text x="470" y="124" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">= 1 water molecule</text>

  <line x1="20" y1="210" x2="580" y2="210" stroke="black" stroke-width="1"/>

  <!-- ROW 2: CO2 -->
  <text x="80" y="290" font-family="sans-serif" font-size="40" text-anchor="middle" fill="black">C</text>
  <text x="108" y="290" font-family="sans-serif" font-size="40" text-anchor="middle" fill="black">O</text>
  <text x="131" y="302" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">2</text>
  <line x1="131" y1="335" x2="131" y2="308" stroke="black" stroke-width="1.5" marker-end="url(#arrowU)"/>
  <text x="131" y="352" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">subscript = 2</text>
  <text x="60" y="335" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">C has no number = 1</text>

  <text x="175" y="285" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">=</text>

  <circle cx="225" cy="280" r="18" fill="none" stroke="black" stroke-width="2"/>
  <text x="225" y="284" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">C</text>
  <text x="262" y="285" font-family="sans-serif" font-size="20" text-anchor="middle" fill="black">+</text>
  <circle cx="300" cy="280" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="284" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">O</text>
  <circle cx="345" cy="280" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="345" y="284" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">O</text>
  <text x="470" y="275" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">1 carbon + 2 oxygen</text>
  <text x="470" y="294" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">= 1 carbon dioxide unit</text>

  <defs>
    <marker id="arrowU" markerWidth="10" markerHeight="10" refX="3" refY="1" orient="auto" markerUnits="strokeWidth">
      <path d="M0,6 L3,0 L6,6 Z" fill="black"/>
    </marker>
  </defs>
</svg>
