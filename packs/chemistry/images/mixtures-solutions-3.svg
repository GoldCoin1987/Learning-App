<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Like Dissolves Like</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Water is polar, so it dissolves salt (also polar) but NOT oil (nonpolar).</text>

  <!-- LEFT: salt dissolves -->
  <rect x="40" y="70" width="230" height="225" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="92" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">SALT in water</text>
  <text x="155" y="110" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">dissolves: spreads out evenly</text>
  <path d="M75 130 L235 130 L222 270 L88 270 Z" fill="none" stroke="black" stroke-width="2"/>
  <!-- evenly scattered salt dots -->
  <circle cx="105" cy="160" r="4" fill="black"/>
  <circle cx="150" cy="155" r="4" fill="black"/>
  <circle cx="195" cy="162" r="4" fill="black"/>
  <circle cx="120" cy="195" r="4" fill="black"/>
  <circle cx="165" cy="198" r="4" fill="black"/>
  <circle cx="200" cy="192" r="4" fill="black"/>
  <circle cx="110" cy="230" r="4" fill="black"/>
  <circle cx="155" cy="235" r="4" fill="black"/>
  <circle cx="190" cy="228" r="4" fill="black"/>
  <circle cx="135" cy="258" r="4" fill="black"/>
  <circle cx="178" cy="256" r="4" fill="black"/>
  <text x="155" y="288" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">salt vanishes into the water</text>

  <!-- RIGHT: oil separates -->
  <rect x="330" y="70" width="230" height="225" fill="none" stroke="black" stroke-width="2"/>
  <text x="445" y="92" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">OIL in water</text>
  <text x="445" y="110" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">does NOT dissolve: floats, separates</text>
  <path d="M365 130 L525 130 L512 270 L378 270 Z" fill="none" stroke="black" stroke-width="2"/>
  <!-- oil layer on top (hatched band) -->
  <rect x="378" y="130" width="134" height="34" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="378" y1="146" x2="512" y2="146" stroke="black" stroke-width="1"/>
  <text x="445" y="152" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">OIL layer (floats on top)</text>
  <!-- clear water below -->
  <line x1="383" y1="164" x2="507" y2="164" stroke="black" stroke-width="2.5"/>
  <text x="445" y="225" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">water below</text>
  <text x="445" y="288" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">'oil and water don't mix'</text>

  <text x="300" y="322" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Similar types dissolve each other; very different types stay apart.</text>
  <text x="300" y="344" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Polar water + polar salt = mixes. Polar water + nonpolar oil = separates.</text>
</svg>
