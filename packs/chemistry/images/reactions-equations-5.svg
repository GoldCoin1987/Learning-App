<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <rect x="0" y="0" width="600" height="420" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Four Common Reaction Types</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Each panel shows the pattern, with the arrow meaning "yields".</text>

  <!-- Panel 1: combination -->
  <rect x="30" y="70" width="260" height="150" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="160" y="92" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">COMBINATION (synthesis)</text>
  <text x="160" y="110" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">two things join into one</text>
  <circle cx="80" cy="150" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="80" y="154" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A</text>
  <text x="110" y="155" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">+</text>
  <circle cx="140" cy="150" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="140" y="154" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">B</text>
  <line x1="165" y1="150" x2="195" y2="150" stroke="black" stroke-width="2" marker-end="url(#aR)"/>
  <ellipse cx="235" cy="150" rx="26" ry="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="235" y="154" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">AB</text>
  <text x="160" y="200" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">e.g. iron + oxygen makes rust</text>

  <!-- Panel 2: decomposition -->
  <rect x="310" y="70" width="260" height="150" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="440" y="92" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">DECOMPOSITION</text>
  <text x="440" y="110" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">one breaks into two</text>
  <ellipse cx="365" cy="150" rx="26" ry="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="365" y="154" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">AB</text>
  <line x1="397" y1="150" x2="427" y2="150" stroke="black" stroke-width="2" marker-end="url(#aR)"/>
  <circle cx="455" cy="150" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="455" y="154" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A</text>
  <text x="485" y="155" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">+</text>
  <circle cx="515" cy="150" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="515" y="154" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">B</text>
  <text x="440" y="200" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">e.g. water split into H2 and O2</text>

  <!-- Panel 3: combustion -->
  <rect x="30" y="235" width="260" height="150" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="160" y="257" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">COMBUSTION</text>
  <text x="160" y="275" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">a fuel + oxygen, releases energy</text>
  <ellipse cx="80" cy="315" rx="22" ry="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="80" y="319" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">fuel</text>
  <text x="112" y="320" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">+</text>
  <ellipse cx="148" cy="315" rx="20" ry="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="148" y="319" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">O2</text>
  <line x1="172" y1="315" x2="202" y2="315" stroke="black" stroke-width="2" marker-end="url(#aR)"/>
  <text x="240" y="312" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">energy</text>
  <text x="240" y="328" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(heat/light)</text>
  <text x="160" y="368" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">e.g. burning wood or gas</text>

  <!-- Panel 4: replacement -->
  <rect x="310" y="235" width="260" height="150" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="440" y="257" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">REPLACEMENT</text>
  <text x="440" y="275" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">atoms swap partners</text>
  <ellipse cx="370" cy="315" rx="26" ry="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="370" y="319" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">AB</text>
  <text x="402" y="320" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">+</text>
  <circle cx="425" cy="315" r="14" fill="none" stroke="black" stroke-width="2"/>
  <text x="425" y="319" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">C</text>
  <line x1="445" y1="315" x2="470" y2="315" stroke="black" stroke-width="2" marker-end="url(#aR)"/>
  <ellipse cx="500" cy="315" rx="26" ry="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="500" y="319" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">AC</text>
  <text x="534" y="320" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">+</text>
  <circle cx="554" cy="315" r="13" fill="none" stroke="black" stroke-width="2"/>
  <text x="554" y="319" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">B</text>
  <text x="440" y="368" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">single and double swaps (kept light)</text>

  <defs>
    <marker id="aR" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>
</svg>
