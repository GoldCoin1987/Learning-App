<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect x="0" y="0" width="600" height="380" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">The Parts of an Atom</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A tiny dense nucleus (protons + neutrons) with electrons in the space around it.</text>

  <!-- outer atom boundary: mostly empty space -->
  <circle cx="240" cy="220" r="140" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="4 5"/>
  <text x="240" y="100" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">the whole atom is mostly EMPTY SPACE</text>

  <!-- electron orbit path -->
  <circle cx="240" cy="220" r="110" fill="none" stroke="black" stroke-width="1"/>

  <!-- nucleus: protons (+) and neutrons (0) packed in the center -->
  <circle cx="240" cy="220" r="34" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="230" cy="212" r="11" fill="none" stroke="black" stroke-width="2"/>
  <text x="230" y="216" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">+</text>
  <circle cx="252" cy="210" r="11" fill="none" stroke="black" stroke-width="2"/>
  <text x="252" y="214" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">0</text>
  <circle cx="232" cy="232" r="11" fill="none" stroke="black" stroke-width="2"/>
  <text x="232" y="236" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">0</text>
  <circle cx="252" cy="232" r="11" fill="none" stroke="black" stroke-width="2"/>
  <text x="252" y="236" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">+</text>
  <text x="240" y="284" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">NUCLEUS</text>

  <!-- electrons on the orbit, drawn with a clear minus sign -->
  <circle cx="240" cy="110" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="234" y1="110" x2="246" y2="110" stroke="black" stroke-width="2"/>
  <circle cx="350" cy="220" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="344" y1="220" x2="356" y2="220" stroke="black" stroke-width="2"/>
  <circle cx="240" cy="330" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="234" y1="330" x2="246" y2="330" stroke="black" stroke-width="2"/>

  <!-- key / legend on the right -->
  <text x="430" y="120" font-family="sans-serif" font-size="13" fill="black">KEY</text>
  <circle cx="440" cy="150" r="10" fill="none" stroke="black" stroke-width="2"/>
  <text x="440" y="154" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">+</text>
  <text x="460" y="154" font-family="sans-serif" font-size="12" fill="black">PROTON: positive charge (+)</text>
  <circle cx="440" cy="185" r="10" fill="none" stroke="black" stroke-width="2"/>
  <text x="440" y="189" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">0</text>
  <text x="460" y="189" font-family="sans-serif" font-size="12" fill="black">NEUTRON: no charge (0)</text>
  <circle cx="440" cy="220" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="434" y1="220" x2="446" y2="220" stroke="black" stroke-width="2"/>
  <text x="460" y="224" font-family="sans-serif" font-size="12" fill="black">ELECTRON: negative charge</text>

  <text x="300" y="362" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Opposite charges attract: the + nucleus holds the - electrons nearby.</text>
</svg>
