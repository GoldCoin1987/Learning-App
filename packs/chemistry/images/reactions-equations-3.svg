<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440">
  <rect x="0" y="0" width="600" height="440" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Balancing: Making the Atoms Equal on Both Sides</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A balanced equation has the SAME number of each kind of atom on both sides.</text>

  <!-- UNBALANCED -->
  <text x="300" y="78" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">UNBALANCED</text>
  <text x="300" y="112" font-family="sans-serif" font-size="30" text-anchor="middle" fill="black">H</text>
  <text x="318" y="120" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">2</text>
  <text x="338" y="112" font-family="sans-serif" font-size="26" text-anchor="middle" fill="black">+</text>
  <text x="362" y="112" font-family="sans-serif" font-size="30" text-anchor="middle" fill="black">O</text>
  <text x="380" y="120" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">2</text>
  <text x="408" y="112" font-family="sans-serif" font-size="26" text-anchor="middle" fill="black">&#8594;</text>
  <text x="440" y="112" font-family="sans-serif" font-size="30" text-anchor="middle" fill="black">H</text>
  <text x="458" y="120" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">2</text>
  <text x="476" y="112" font-family="sans-serif" font-size="30" text-anchor="middle" fill="black">O</text>

  <text x="225" y="150" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">LEFT: 2 H, 2 O</text>
  <text x="470" y="150" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">RIGHT: 2 H, 1 O</text>
  <text x="300" y="172" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Oxygen does NOT match: 2 on left, 1 on right.  X</text>

  <line x1="40" y1="190" x2="560" y2="190" stroke="black" stroke-width="1"/>

  <!-- BALANCED -->
  <text x="300" y="218" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">BALANCED (put big numbers, coefficients, in FRONT)</text>
  <text x="222" y="256" font-family="sans-serif" font-size="30" text-anchor="middle" fill="black">2</text>
  <text x="244" y="256" font-family="sans-serif" font-size="30" text-anchor="middle" fill="black">H</text>
  <text x="262" y="264" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">2</text>
  <text x="284" y="256" font-family="sans-serif" font-size="26" text-anchor="middle" fill="black">+</text>
  <text x="312" y="256" font-family="sans-serif" font-size="30" text-anchor="middle" fill="black">O</text>
  <text x="330" y="264" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">2</text>
  <text x="356" y="256" font-family="sans-serif" font-size="26" text-anchor="middle" fill="black">&#8594;</text>
  <text x="390" y="256" font-family="sans-serif" font-size="30" text-anchor="middle" fill="black">2</text>
  <text x="412" y="256" font-family="sans-serif" font-size="30" text-anchor="middle" fill="black">H</text>
  <text x="430" y="264" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">2</text>
  <text x="448" y="256" font-family="sans-serif" font-size="30" text-anchor="middle" fill="black">O</text>

  <!-- count boxes -->
  <rect x="60" y="285" width="220" height="90" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="170" y="307" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">LEFT side count</text>
  <text x="170" y="332" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">2 of H2 = 4 H</text>
  <text x="170" y="356" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">1 of O2 = 2 O</text>

  <rect x="320" y="285" width="220" height="90" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="430" y="307" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">RIGHT side count</text>
  <text x="430" y="332" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">2 of H2O = 4 H</text>
  <text x="430" y="356" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">2 of H2O = 2 O</text>

  <text x="300" y="402" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">4 H + 2 O on each side. Balanced!  OK</text>
  <text x="300" y="426" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">The front number multiplies the WHOLE molecule. We never change the small subscripts.</text>
</svg>
