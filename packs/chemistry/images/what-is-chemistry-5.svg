<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <rect x="0" y="0" width="600" height="340" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Signs a Chemical Change Happened</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">See one or more of these clues? New stuff was probably made.</text>

  <!-- Box 1: color change -->
  <rect x="30" y="70" width="125" height="120" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="72" cy="120" r="18" fill="none" stroke="black" stroke-width="2"/>
  <line x1="95" y1="120" x2="118" y2="120" stroke="black" stroke-width="2"/>
  <path d="M 118 120 L 109 115 L 109 125 Z" fill="black"/>
  <circle cx="130" cy="120" r="18" fill="black"/>
  <text x="92" y="170" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">COLOR CHANGE</text>

  <!-- Box 2: gas / bubbles -->
  <rect x="170" y="70" width="125" height="120" fill="none" stroke="black" stroke-width="2"/>
  <!-- beaker -->
  <path d="M 205 105 L 210 165 L 255 165 L 260 105 Z" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="222" cy="130" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="240" cy="120" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="232" cy="100" r="4" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="246" cy="92" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="232" y="184" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">GAS / BUBBLES</text>

  <!-- Box 3: heat or light -->
  <rect x="310" y="70" width="125" height="120" fill="none" stroke="black" stroke-width="2"/>
  <!-- flame -->
  <path d="M 372 160 q -22 -18 -8 -42 q 6 14 14 8 q -10 -22 6 -38 q -2 22 14 30 q 12 18 -4 38 Z" fill="none" stroke="black" stroke-width="2"/>
  <!-- rays -->
  <line x1="340" y1="95" x2="330" y2="88" stroke="black" stroke-width="1.5"/>
  <line x1="405" y1="95" x2="415" y2="88" stroke="black" stroke-width="1.5"/>
  <text x="372" y="184" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">HEAT / LIGHT</text>

  <!-- Box 4: precipitate (solid forms) -->
  <rect x="450" y="70" width="125" height="120" fill="none" stroke="black" stroke-width="2"/>
  <path d="M 485 100 L 490 165 L 535 165 L 540 100 Z" fill="none" stroke="black" stroke-width="2"/>
  <!-- solid settling at the bottom -->
  <circle cx="500" cy="158" r="4" fill="black"/>
  <circle cx="512" cy="160" r="4" fill="black"/>
  <circle cx="524" cy="158" r="4" fill="black"/>
  <circle cx="506" cy="150" r="4" fill="black"/>
  <circle cx="519" cy="150" r="4" fill="black"/>
  <text x="512" y="184" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">SOLID FORMS</text>
  <text x="512" y="55" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">(a precipitate)</text>

  <!-- bottom note -->
  <rect x="60" y="225" width="480" height="80" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="300" y="250" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Plus: the change is usually HARD TO REVERSE.</text>
  <text x="300" y="274" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A physical change (melting, dissolving) shows none of these and makes no new stuff.</text>
  <text x="300" y="296" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Careful observation -- watch, smell, feel -- is how chemistry is learned.</text>
</svg>
