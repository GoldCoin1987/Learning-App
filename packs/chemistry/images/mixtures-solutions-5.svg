<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 360">
  <rect x="0" y="0" width="660" height="360" fill="white"/>
  <text x="330" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Separating Mixtures by Physical Methods</text>
  <text x="330" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Mixtures aren't bonded, so physical methods pull them apart.</text>

  <!-- PANEL 1: FILTERING -->
  <rect x="20" y="62" width="200" height="250" fill="none" stroke="black" stroke-width="2"/>
  <text x="120" y="84" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">FILTERING</text>
  <text x="120" y="100" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">sand from water</text>
  <!-- funnel -->
  <path d="M70 120 L170 120 L130 175 L110 175 Z" fill="none" stroke="black" stroke-width="2"/>
  <!-- sand caught (dots in funnel) -->
  <circle cx="100" cy="135" r="4" fill="black"/>
  <circle cx="120" cy="132" r="4" fill="black"/>
  <circle cx="140" cy="136" r="4" fill="black"/>
  <circle cx="115" cy="150" r="4" fill="black"/>
  <text x="120" y="115" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">sand stays</text>
  <!-- drips -->
  <line x1="120" y1="175" x2="120" y2="210" stroke="black" stroke-width="1.5" stroke-dasharray="3,4"/>
  <!-- beaker of clear water -->
  <path d="M85 215 L155 215 L148 285 L92 285 Z" fill="none" stroke="black" stroke-width="2"/>
  <text x="120" y="302" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">water passes through</text>

  <!-- PANEL 2: EVAPORATION -->
  <rect x="232" y="62" width="200" height="250" fill="none" stroke="black" stroke-width="2"/>
  <text x="332" y="84" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">EVAPORATION</text>
  <text x="332" y="100" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">salt back from salt water</text>
  <!-- dish -->
  <path d="M280 175 a52 22 0 0 0 104 0" fill="none" stroke="black" stroke-width="2"/>
  <line x1="280" y1="175" x2="384" y2="175" stroke="black" stroke-width="2"/>
  <!-- steam rising -->
  <path d="M312 160 q-8 -18 4 -34" fill="none" stroke="black" stroke-width="1.5"/>
  <path d="M352 160 q-8 -18 4 -34" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="332" y="120" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">water boils off</text>
  <!-- salt left in dish -->
  <circle cx="316" cy="184" r="4" fill="black"/>
  <circle cx="332" cy="186" r="4" fill="black"/>
  <circle cx="348" cy="184" r="4" fill="black"/>
  <text x="332" y="208" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">salt remains</text>
  <!-- heat -->
  <path d="M318 215 l6 10 l6 -10 l6 10 l6 -10" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="332" y="245" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">heat</text>

  <!-- PANEL 3: DISTILLATION -->
  <rect x="444" y="62" width="200" height="250" fill="none" stroke="black" stroke-width="2"/>
  <text x="544" y="84" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">DISTILLATION</text>
  <text x="544" y="100" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">separate liquids by boiling point</text>
  <!-- boiling flask -->
  <circle cx="490" cy="180" r="24" fill="none" stroke="black" stroke-width="2"/>
  <line x1="490" y1="156" x2="490" y2="135" stroke="black" stroke-width="2"/>
  <text x="490" y="186" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">boil</text>
  <!-- vapor tube to condenser -->
  <line x1="490" y1="135" x2="540" y2="135" stroke="black" stroke-width="2"/>
  <line x1="540" y1="135" x2="600" y2="180" stroke="black" stroke-width="2"/>
  <text x="558" y="128" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">vapor</text>
  <text x="572" y="158" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">cools</text>
  <!-- collecting beaker of pure liquid -->
  <path d="M580 188 L630 188 L624 250 L586 250 Z" fill="none" stroke="black" stroke-width="2"/>
  <line x1="600" y1="180" x2="600" y2="188" stroke="black" stroke-width="1.5" stroke-dasharray="3,4"/>
  <text x="605" y="268" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">pure liquid</text>
  <!-- heat under flask -->
  <path d="M478 215 l6 10 l6 -10 l6 10 l6 -10" fill="none" stroke="black" stroke-width="1.5"/>

  <text x="330" y="334" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Filter (solid from liquid) | Evaporate (solid from solution) | Distill (pure liquid out).</text>
</svg>
