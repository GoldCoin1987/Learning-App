<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Your Whole Chemistry Journey</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Every step built on the last -- from tiny atoms to the world around you.</text>

  <!-- Row 1 -->
  <rect x="30" y="70" width="120" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="90" y="95" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Atoms</text>
  <line x1="150" y1="90" x2="178" y2="90" stroke="black" stroke-width="2"/>
  <line x1="178" y1="90" x2="170" y2="85" stroke="black" stroke-width="2"/>
  <line x1="178" y1="90" x2="170" y2="95" stroke="black" stroke-width="2"/>

  <rect x="180" y="70" width="120" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="240" y="95" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Periodic Table</text>
  <line x1="300" y1="90" x2="328" y2="90" stroke="black" stroke-width="2"/>
  <line x1="328" y1="90" x2="320" y2="85" stroke="black" stroke-width="2"/>
  <line x1="328" y1="90" x2="320" y2="95" stroke="black" stroke-width="2"/>

  <rect x="330" y="70" width="120" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="95" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Bonds</text>
  <line x1="450" y1="90" x2="478" y2="90" stroke="black" stroke-width="2"/>
  <line x1="478" y1="90" x2="470" y2="85" stroke="black" stroke-width="2"/>
  <line x1="478" y1="90" x2="470" y2="95" stroke="black" stroke-width="2"/>

  <rect x="450" y="70" width="120" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="510" y="95" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Molecules</text>
  <!-- down arrow at right -->
  <line x1="510" y1="110" x2="510" y2="138" stroke="black" stroke-width="2"/>
  <line x1="510" y1="138" x2="505" y2="130" stroke="black" stroke-width="2"/>
  <line x1="510" y1="138" x2="515" y2="130" stroke="black" stroke-width="2"/>

  <!-- Row 2 (right to left) -->
  <rect x="450" y="140" width="120" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="510" y="165" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The Mole</text>
  <line x1="450" y1="160" x2="422" y2="160" stroke="black" stroke-width="2"/>
  <line x1="422" y1="160" x2="430" y2="155" stroke="black" stroke-width="2"/>
  <line x1="422" y1="160" x2="430" y2="165" stroke="black" stroke-width="2"/>

  <rect x="330" y="140" width="120" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="165" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Reactions</text>
  <line x1="330" y1="160" x2="302" y2="160" stroke="black" stroke-width="2"/>
  <line x1="302" y1="160" x2="310" y2="155" stroke="black" stroke-width="2"/>
  <line x1="302" y1="160" x2="310" y2="165" stroke="black" stroke-width="2"/>

  <rect x="180" y="140" width="120" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="240" y="165" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">States &amp; Gases</text>
  <line x1="180" y1="160" x2="152" y2="160" stroke="black" stroke-width="2"/>
  <line x1="152" y1="160" x2="160" y2="155" stroke="black" stroke-width="2"/>
  <line x1="152" y1="160" x2="160" y2="165" stroke="black" stroke-width="2"/>

  <rect x="30" y="140" width="120" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="90" y="165" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Solutions</text>
  <!-- down arrow at left -->
  <line x1="90" y1="180" x2="90" y2="208" stroke="black" stroke-width="2"/>
  <line x1="90" y1="208" x2="85" y2="200" stroke="black" stroke-width="2"/>
  <line x1="90" y1="208" x2="95" y2="200" stroke="black" stroke-width="2"/>

  <!-- Row 3 (left to right) -->
  <rect x="30" y="210" width="120" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="90" y="235" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Acids &amp; Bases</text>
  <line x1="150" y1="230" x2="178" y2="230" stroke="black" stroke-width="2"/>
  <line x1="178" y1="230" x2="170" y2="225" stroke="black" stroke-width="2"/>
  <line x1="178" y1="230" x2="170" y2="235" stroke="black" stroke-width="2"/>

  <rect x="180" y="210" width="120" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="240" y="235" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Energy &amp; Rates</text>
  <line x1="300" y1="230" x2="328" y2="230" stroke="black" stroke-width="2"/>
  <line x1="328" y1="230" x2="320" y2="225" stroke="black" stroke-width="2"/>
  <line x1="328" y1="230" x2="320" y2="235" stroke="black" stroke-width="2"/>

  <rect x="330" y="210" width="120" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="235" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Carbon &amp; Life</text>
  <line x1="450" y1="230" x2="478" y2="230" stroke="black" stroke-width="2"/>
  <line x1="478" y1="230" x2="470" y2="225" stroke="black" stroke-width="2"/>
  <line x1="478" y1="230" x2="470" y2="235" stroke="black" stroke-width="2"/>

  <rect x="450" y="208" width="120" height="44" fill="none" stroke="black" stroke-width="3"/>
  <text x="510" y="228" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Materials,</text>
  <text x="510" y="242" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Environment &amp; Beyond</text>

  <text x="300" y="300" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">YOU ARE HERE -- the whole pack, one connected story.</text>
  <text x="300" y="338" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Chemistry is the science of STUFF:</text>
  <text x="300" y="360" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">what everything is made of, and how it changes.</text>
  <text x="300" y="384" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">And it is everywhere.</text>
</svg>
