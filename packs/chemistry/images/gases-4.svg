<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect x="0" y="0" width="600" height="380" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Add More Gas: More Particles, More Pressure</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Pump more particles into the same space and they make even more wall-hits.</text>

  <!-- BEFORE: few particles -->
  <rect x="50" y="80" width="180" height="170" fill="none" stroke="black" stroke-width="3"/>
  <text x="140" y="104" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">FEWER particles</text>
  <circle cx="100" cy="150" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="180" cy="170" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="130" cy="210" r="9" fill="none" stroke="black" stroke-width="2"/>
  <text x="140" y="240" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">LOW pressure</text>

  <!-- pump arrow -->
  <text x="300" y="165" font-family="sans-serif" font-size="30" text-anchor="middle" fill="black">&#8594;</text>
  <text x="300" y="140" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">PUMP IN</text>
  <text x="300" y="188" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">add more</text>
  <text x="300" y="202" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">air</text>

  <!-- AFTER: many particles, same box -->
  <rect x="370" y="80" width="180" height="170" fill="none" stroke="black" stroke-width="3"/>
  <text x="460" y="104" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">MORE particles</text>
  <circle cx="410" cy="140" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="460" cy="135" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="510" cy="150" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="420" cy="185" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="475" cy="190" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="520" cy="200" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="440" cy="225" r="9" fill="none" stroke="black" stroke-width="2"/>
  <!-- collision bursts -->
  <line x1="370" y1="160" x2="362" y2="157" stroke="black" stroke-width="1.5"/>
  <line x1="550" y1="170" x2="558" y2="167" stroke="black" stroke-width="1.5"/>
  <line x1="460" y1="80" x2="460" y2="72" stroke="black" stroke-width="1.5"/>
  <text x="460" y="240" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">HIGH pressure</text>

  <text x="300" y="300" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Same-size container + more particles = more collisions = more pressure.</text>
  <text x="300" y="328" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Hook: inflating a tire &#8212; each pump adds air and the tire gets firmer.</text>
  <text x="300" y="350" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(These cause-and-effect rules are summarized by the gas laws &#8212; no formulas needed here.)</text>
</svg>
