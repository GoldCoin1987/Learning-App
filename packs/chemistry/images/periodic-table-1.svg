<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <rect x="0" y="0" width="600" height="420" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">The Periodic Table: An Organized Map</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Rows are PERIODS. Columns are GROUPS. Same column = similar behavior.</text>

  <!-- arrow showing a period (row) -->
  <text x="40" y="120" font-family="sans-serif" font-size="12" fill="black">PERIOD</text>
  <text x="40" y="135" font-family="sans-serif" font-size="11" fill="black">(a row)</text>
  <line x1="95" y1="118" x2="540" y2="118" stroke="black" stroke-width="1" stroke-dasharray="3 3"/>
  <polygon points="540,118 532,114 532,122" fill="black"/>

  <!-- arrow showing a group (column) -->
  <text x="150" y="200" font-family="sans-serif" font-size="12" fill="black">GROUP (a column)</text>
  <line x1="180" y1="210" x2="180" y2="390" stroke="black" stroke-width="1" stroke-dasharray="3 3"/>
  <polygon points="180,390 176,382 184,382" fill="black"/>

  <!-- simplified grid of cells -->
  <!-- row 1 -->
  <rect x="100" y="105" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="490" y="105" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <!-- row 2 -->
  <rect x="100" y="133" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="128" y="133" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="378" y="133" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="406" y="133" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="434" y="133" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="462" y="133" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="490" y="133" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <!-- row 3 -->
  <rect x="100" y="161" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="128" y="161" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="378" y="161" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="406" y="161" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="434" y="161" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="462" y="161" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="490" y="161" width="26" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <!-- rows 4-7 main block -->
  <rect x="100" y="189" width="416" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="100" y="217" width="416" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="100" y="245" width="416" height="26" fill="none" stroke="black" stroke-width="1.2"/>
  <rect x="100" y="273" width="416" height="26" fill="none" stroke="black" stroke-width="1.2"/>

  <!-- highlight one column to show "same column = same family" -->
  <rect x="490" y="105" width="26" height="194" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="503" y="316" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">one</text>
  <text x="503" y="329" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">family</text>

  <text x="300" y="372" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Elements are listed in order of increasing atomic number (proton count).</text>
  <text x="300" y="392" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A seating chart: similar elements sit together in the same column.</text>
</svg>
