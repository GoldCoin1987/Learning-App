<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <rect x="0" y="0" width="600" height="420" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">What Speeds a Reaction Up: More Collisions</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Reactions happen when particles collide hard enough. More/harder hits = faster.</text>

  <!-- TEMPERATURE panel -->
  <rect x="25" y="70" width="175" height="150" fill="none" stroke="black" stroke-width="2"/>
  <text x="112" y="92" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">HOTTER</text>
  <circle cx="80" cy="130" r="9" fill="none" stroke="black" stroke-width="2"/>
  <line x1="89" y1="130" x2="120" y2="130" stroke="black" stroke-width="1.5"/>
  <line x1="120" y1="130" x2="114" y2="126" stroke="black" stroke-width="1.5"/>
  <line x1="120" y1="130" x2="114" y2="134" stroke="black" stroke-width="1.5"/>
  <circle cx="140" cy="165" r="9" fill="none" stroke="black" stroke-width="2"/>
  <line x1="140" y1="156" x2="140" y2="125" stroke="black" stroke-width="1.5"/>
  <line x1="140" y1="125" x2="136" y2="131" stroke="black" stroke-width="1.5"/>
  <line x1="140" y1="125" x2="144" y2="131" stroke="black" stroke-width="1.5"/>
  <text x="112" y="200" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">faster particles =</text>
  <text x="112" y="214" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">harder, more collisions</text>

  <!-- CONCENTRATION panel -->
  <rect x="212" y="70" width="175" height="150" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="92" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">MORE CROWDED</text>
  <circle cx="250" cy="120" r="7" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="278" cy="118" r="7" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="306" cy="124" r="7" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="334" cy="120" r="7" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="262" cy="150" r="7" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="290" cy="155" r="7" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="320" cy="150" r="7" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="348" cy="156" r="7" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="200" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">more particles packed in =</text>
  <text x="300" y="214" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">more collisions (concentration)</text>

  <!-- SURFACE AREA panel -->
  <rect x="399" y="70" width="175" height="150" fill="none" stroke="black" stroke-width="2"/>
  <text x="486" y="92" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">SURFACE AREA</text>
  <!-- solid lump -->
  <rect x="415" y="115" width="45" height="45" fill="none" stroke="black" stroke-width="2"/>
  <text x="437" y="178" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">lump = slow</text>
  <!-- powder -->
  <circle cx="495" cy="118" r="4" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="510" cy="122" r="4" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="525" cy="116" r="4" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="540" cy="123" r="4" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="502" cy="135" r="4" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="518" cy="138" r="4" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="534" cy="135" r="4" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="512" cy="152" r="4" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="528" cy="152" r="4" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="518" y="178" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">powder = fast</text>

  <text x="300" y="255" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">More exposed surface (powder) reacts faster than one solid lump.</text>
  <text x="300" y="290" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">All three lead to MORE COLLISIONS &#8594; a FASTER reaction.</text>
  <text x="300" y="325" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Everyday: food spoils faster in heat; sawdust burns faster than a log;</text>
  <text x="300" y="345" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">pure oxygen burns things faster than air; chopped food cooks faster.</text>
</svg>
