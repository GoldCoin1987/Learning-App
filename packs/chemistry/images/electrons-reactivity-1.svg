<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Electron Shells: Layers Like an Onion</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Electrons sit in layers (shells) around the nucleus. Inner shells fill first.</text>

  <!-- outer shell ring -->
  <circle cx="230" cy="230" r="135" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- inner shell ring -->
  <circle cx="230" cy="230" r="75" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- nucleus -->
  <circle cx="230" cy="230" r="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="230" y="234" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">nucleus</text>

  <!-- inner shell electrons: 2 (full) -->
  <circle cx="230" cy="155" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="224" y1="155" x2="236" y2="155" stroke="black" stroke-width="2"/>
  <circle cx="230" cy="305" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="224" y1="305" x2="236" y2="305" stroke="black" stroke-width="2"/>

  <!-- outer shell electrons: a few, still filling -->
  <circle cx="95" cy="230" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="89" y1="230" x2="101" y2="230" stroke="black" stroke-width="2"/>
  <circle cx="160" cy="120" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="154" y1="120" x2="166" y2="120" stroke="black" stroke-width="2"/>
  <circle cx="300" cy="120" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="294" y1="120" x2="306" y2="120" stroke="black" stroke-width="2"/>

  <!-- labels for the rings -->
  <line x1="230" y1="155" x2="230" y2="305" stroke="none"/>
  <text x="305" y="200" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">1st shell</text>
  <text x="305" y="214" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(holds 2)</text>

  <line x1="365" y1="230" x2="430" y2="230" stroke="black" stroke-width="1"/>
  <text x="500" y="226" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">2nd shell</text>
  <text x="500" y="240" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(holds up to 8)</text>

  <!-- fill order arrow -->
  <line x1="230" y1="282" x2="230" y2="200" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>

  <text x="300" y="384" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Fill from the INSIDE OUT: the 1st shell fills (2) before the 2nd shell starts.</text>
</svg>
