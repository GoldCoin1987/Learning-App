<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Covalent Bond: Two Atoms SHARE Electrons</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Two nonmetals share a pair of electrons, so BOTH can count a full outer shell.</text>

  <!-- divider -->
  <line x1="300" y1="62" x2="300" y2="320" stroke="black" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- LEFT: H2 -->
  <text x="150" y="82" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Two hydrogen atoms -&gt; H2</text>
  <circle cx="110" cy="180" r="48" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="190" cy="180" r="48" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="110" y="184" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">H</text>
  <text x="190" y="184" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">H</text>
  <!-- shared pair in the overlap -->
  <circle cx="143" cy="180" r="8" fill="black" stroke="black" stroke-width="2"/>
  <circle cx="157" cy="180" r="8" fill="black" stroke="black" stroke-width="2"/>
  <text x="150" y="250" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">SHARED PAIR (counts for both)</text>
  <text x="150" y="266" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">each H now 'feels' full</text>

  <!-- RIGHT: water H2O -->
  <text x="450" y="82" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Water -&gt; H2O</text>
  <!-- central oxygen -->
  <circle cx="450" cy="170" r="30" fill="none" stroke="black" stroke-width="2"/>
  <text x="450" y="174" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">O</text>
  <!-- two hydrogens -->
  <circle cx="388" cy="225" r="20" fill="none" stroke="black" stroke-width="2"/>
  <text x="388" y="229" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">H</text>
  <circle cx="512" cy="225" r="20" fill="none" stroke="black" stroke-width="2"/>
  <text x="512" y="229" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">H</text>
  <!-- bonds (each a shared pair) -->
  <line x1="427" y1="190" x2="403" y2="210" stroke="black" stroke-width="2"/>
  <line x1="473" y1="190" x2="497" y2="210" stroke="black" stroke-width="2"/>
  <circle cx="415" cy="200" r="5" fill="black"/>
  <circle cx="485" cy="200" r="5" fill="black"/>
  <text x="450" y="266" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">O shares a pair with EACH H</text>

  <text x="300" y="350" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Sharing makes a MOLECULE: a distinct unit like H2 or H2O.</text>
  <text x="300" y="378" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(filled dots = shared electrons; both atoms get to count them)</text>
</svg>
