<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Full Shell = Content. Unfilled Shell = Reactive.</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Noble gases already have a full outer shell, so they have no drive to react.</text>

  <!-- divider -->
  <line x1="300" y1="64" x2="300" y2="360" stroke="black" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- LEFT: noble gas, full outer shell -->
  <text x="150" y="86" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">NOBLE GAS</text>
  <circle cx="150" cy="215" r="92" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="150" cy="215" r="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="219" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">nucleus</text>
  <!-- 8 outer electrons, full -->
  <circle cx="150" cy="123" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="145" y1="123" x2="155" y2="123" stroke="black" stroke-width="2"/>
  <circle cx="70" cy="168" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="65" y1="168" x2="75" y2="168" stroke="black" stroke-width="2"/>
  <circle cx="58" cy="215" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="53" y1="215" x2="63" y2="215" stroke="black" stroke-width="2"/>
  <circle cx="70" cy="262" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="65" y1="262" x2="75" y2="262" stroke="black" stroke-width="2"/>
  <circle cx="150" cy="307" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="145" y1="307" x2="155" y2="307" stroke="black" stroke-width="2"/>
  <circle cx="230" cy="262" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="225" y1="262" x2="235" y2="262" stroke="black" stroke-width="2"/>
  <circle cx="242" cy="215" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="237" y1="215" x2="247" y2="215" stroke="black" stroke-width="2"/>
  <circle cx="230" cy="168" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="225" y1="168" x2="235" y2="168" stroke="black" stroke-width="2"/>
  <text x="150" y="338" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">outer shell FULL (8)</text>
  <text x="150" y="354" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">CONTENT / UNREACTIVE</text>

  <!-- RIGHT: reactive atom, unfilled shell -->
  <text x="450" y="86" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">REACTIVE ATOM</text>
  <circle cx="450" cy="215" r="92" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="450" cy="215" r="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="450" y="219" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">nucleus</text>
  <!-- only 1 outer electron, lots of gaps -->
  <circle cx="450" cy="123" r="8" fill="none" stroke="black" stroke-width="2"/><line x1="445" y1="123" x2="455" y2="123" stroke="black" stroke-width="2"/>
  <!-- empty slots, dashed -->
  <circle cx="370" cy="168" r="8" fill="none" stroke="black" stroke-width="1.3" stroke-dasharray="3 3"/>
  <circle cx="358" cy="215" r="8" fill="none" stroke="black" stroke-width="1.3" stroke-dasharray="3 3"/>
  <circle cx="370" cy="262" r="8" fill="none" stroke="black" stroke-width="1.3" stroke-dasharray="3 3"/>
  <circle cx="450" cy="307" r="8" fill="none" stroke="black" stroke-width="1.3" stroke-dasharray="3 3"/>
  <circle cx="530" cy="262" r="8" fill="none" stroke="black" stroke-width="1.3" stroke-dasharray="3 3"/>
  <circle cx="542" cy="215" r="8" fill="none" stroke="black" stroke-width="1.3" stroke-dasharray="3 3"/>
  <circle cx="530" cy="168" r="8" fill="none" stroke="black" stroke-width="1.3" stroke-dasharray="3 3"/>
  <text x="450" y="338" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">outer shell NOT full</text>
  <text x="450" y="354" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">REACTIVE (wants to fill it)</text>

  <text x="300" y="384" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(dashed circles = empty spots in the outer shell)</text>
</svg>
