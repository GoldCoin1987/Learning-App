<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Two DIFFERENT Air Issues</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The greenhouse effect and the ozone layer are SEPARATE stories -- do not mix them up.</text>

  <line x1="300" y1="60" x2="300" y2="360" stroke="black" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- LEFT: greenhouse effect -->
  <text x="150" y="80" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">GREENHOUSE GASES</text>
  <text x="150" y="98" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(like CO2 from burning fuel)</text>
  <!-- sun -->
  <circle cx="60" cy="135" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="60" y="139" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">sun</text>
  <!-- ground -->
  <line x1="40" y1="300" x2="270" y2="300" stroke="black" stroke-width="3"/>
  <text x="150" y="318" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Earth's surface</text>
  <!-- sunlight in -->
  <line x1="74" y1="148" x2="140" y2="295" stroke="black" stroke-width="2"/>
  <text x="118" y="200" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">sunlight in</text>
  <!-- heat trying to leave, trapped -->
  <line x1="150" y1="295" x2="150" y2="215" stroke="black" stroke-width="2"/>
  <line x1="150" y1="215" x2="144" y2="227" stroke="black" stroke-width="2"/>
  <line x1="150" y1="215" x2="156" y2="227" stroke="black" stroke-width="2"/>
  <!-- gas layer -->
  <ellipse cx="150" cy="205" rx="95" ry="18" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="209" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">CO2 layer</text>
  <!-- bounce back -->
  <line x1="150" y1="223" x2="180" y2="280" stroke="black" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="205" y="250" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">heat trapped</text>
  <text x="150" y="345" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">EFFECT: traps heat -&gt;</text>
  <text x="150" y="359" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">planet warms</text>

  <!-- RIGHT: ozone layer -->
  <text x="450" y="80" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">OZONE LAYER</text>
  <text x="450" y="98" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(a form of oxygen, high up)</text>
  <!-- ground -->
  <line x1="330" y1="300" x2="560" y2="300" stroke="black" stroke-width="3"/>
  <text x="450" y="318" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Earth's surface</text>
  <!-- ozone shield -->
  <path d="M 340 150 Q 450 120 560 150" fill="none" stroke="black" stroke-width="3"/>
  <text x="450" y="142" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">ozone shield</text>
  <!-- UV blocked -->
  <line x1="400" y1="80" x2="400" y2="148" stroke="black" stroke-width="2"/>
  <line x1="500" y1="80" x2="500" y2="148" stroke="black" stroke-width="2"/>
  <text x="450" y="72" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">harmful UV from sun</text>
  <!-- blocked marks -->
  <line x1="392" y1="156" x2="408" y2="172" stroke="black" stroke-width="2"/>
  <line x1="408" y1="156" x2="392" y2="172" stroke="black" stroke-width="2"/>
  <line x1="492" y1="156" x2="508" y2="172" stroke="black" stroke-width="2"/>
  <line x1="508" y1="156" x2="492" y2="172" stroke="black" stroke-width="2"/>
  <text x="450" y="200" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">UV blocked (X)</text>
  <text x="450" y="345" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">EFFECT: blocks UV.</text>
  <text x="450" y="359" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Damaged, now recovering.</text>
</svg>
