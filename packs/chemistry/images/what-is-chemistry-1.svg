<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">The Particle View: Same Stuff, Three States</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">All matter is made of tiny moving particles. State depends on how packed and how fast they are.</text>

  <!-- SOLID -->
  <rect x="30" y="80" width="160" height="160" fill="none" stroke="black" stroke-width="2"/>
  <text x="110" y="100" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">SOLID</text>
  <!-- tightly packed grid of particles -->
  <circle cx="60" cy="130" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="90" cy="130" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="120" cy="130" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="150" cy="130" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="60" cy="160" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="90" cy="160" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="120" cy="160" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="150" cy="160" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="60" cy="190" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="90" cy="190" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="120" cy="190" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="150" cy="190" r="11" fill="none" stroke="black" stroke-width="2"/>
  <text x="110" y="225" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">packed tight, only jiggle</text>

  <!-- LIQUID -->
  <rect x="220" y="80" width="160" height="160" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="100" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">LIQUID</text>
  <!-- looser, irregular particles -->
  <circle cx="255" cy="135" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="295" cy="125" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="335" cy="140" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="270" cy="170" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="312" cy="165" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="350" cy="178" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="252" cy="205" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="293" cy="200" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="333" cy="208" r="11" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="225" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">touch but flow, slide past</text>

  <!-- GAS -->
  <rect x="410" y="80" width="160" height="160" fill="none" stroke="black" stroke-width="2"/>
  <text x="490" y="100" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">GAS</text>
  <!-- spread out particles with motion arrows -->
  <circle cx="445" cy="130" r="11" fill="none" stroke="black" stroke-width="2"/>
  <line x1="445" y1="130" x2="465" y2="118" stroke="black" stroke-width="1.5"/>
  <circle cx="520" cy="125" r="11" fill="none" stroke="black" stroke-width="2"/>
  <line x1="520" y1="125" x2="500" y2="115" stroke="black" stroke-width="1.5"/>
  <circle cx="480" cy="170" r="11" fill="none" stroke="black" stroke-width="2"/>
  <line x1="480" y1="170" x2="498" y2="182" stroke="black" stroke-width="1.5"/>
  <circle cx="540" cy="180" r="11" fill="none" stroke="black" stroke-width="2"/>
  <line x1="540" y1="180" x2="522" y2="190" stroke="black" stroke-width="1.5"/>
  <circle cx="450" cy="210" r="11" fill="none" stroke="black" stroke-width="2"/>
  <line x1="450" y1="210" x2="470" y2="218" stroke="black" stroke-width="1.5"/>
  <text x="490" y="225" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">far apart, zoom fast</text>

  <text x="300" y="270" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">More heat -> particles move faster -> solid melts to liquid, liquid boils to gas</text>
  <text x="30" y="300" font-family="sans-serif" font-size="12" fill="black">The particles themselves are the same in all three. Only their spacing and speed change.</text>
  <text x="30" y="322" font-family="sans-serif" font-size="12" fill="black">This one picture explains melting, boiling, smells spreading, and dissolving.</text>
</svg>
