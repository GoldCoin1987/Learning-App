<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Particles Spread Out: Smell and Dissolving</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">You cannot see particles, but watching them spread explains everyday things.</text>

  <!-- LEFT: smell spreading across a room -->
  <rect x="25" y="70" width="260" height="250" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="90" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">A SMELL CROSSING A ROOM</text>

  <!-- source: a cup -->
  <path d="M 55 250 L 60 290 L 95 290 L 100 250 Z" fill="none" stroke="black" stroke-width="2"/>
  <ellipse cx="77" cy="250" rx="22" ry="6" fill="none" stroke="black" stroke-width="2"/>
  <text x="77" y="308" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">smelly source</text>

  <!-- a nose on the far side -->
  <path d="M 250 200 q 18 12 0 28" fill="none" stroke="black" stroke-width="2"/>
  <text x="258" y="245" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">nose</text>

  <!-- particles drifting from source toward nose, getting sparser -->
  <circle cx="105" cy="235" r="6" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="125" cy="220" r="6" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="120" cy="250" r="6" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="150" cy="205" r="6" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="160" cy="235" r="6" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="185" cy="215" r="6" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="205" cy="225" r="6" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="225" cy="210" r="6" fill="none" stroke="black" stroke-width="2"/>
  <!-- drift arrow -->
  <line x1="100" y1="180" x2="235" y2="180" stroke="black" stroke-width="2"/>
  <path d="M 235 180 L 226 175 L 226 185 Z" fill="black"/>
  <text x="167" y="172" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">particles drift through the air</text>

  <!-- RIGHT: sugar dissolving in water -->
  <rect x="315" y="70" width="260" height="250" fill="none" stroke="black" stroke-width="2"/>
  <text x="445" y="90" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">SUGAR DISSOLVING IN WATER</text>

  <!-- glass of water -->
  <path d="M 360 130 L 370 300 L 520 300 L 530 130 Z" fill="none" stroke="black" stroke-width="2"/>
  <line x1="362" y1="150" x2="528" y2="150" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="540" y="148" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">water</text>

  <!-- water particles (small open) scattered -->
  <circle cx="390" cy="185" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="430" cy="200" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="470" cy="180" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="505" cy="205" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="405" cy="240" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="455" cy="250" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="495" cy="245" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="420" cy="280" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="475" cy="285" r="5" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- sugar particles (filled) spreading among the water -->
  <circle cx="410" cy="190" r="5" fill="black"/>
  <circle cx="445" cy="225" r="5" fill="black"/>
  <circle cx="485" cy="220" r="5" fill="black"/>
  <circle cx="395" cy="265" r="5" fill="black"/>
  <circle cx="460" cy="270" r="5" fill="black"/>
  <circle cx="505" cy="270" r="5" fill="black"/>
  <text x="445" y="316" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">filled = sugar particles spread among water</text>

  <text x="300" y="345" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Sugar does not vanish: its particles spread out so evenly you can no longer see them.</text>
</svg>
