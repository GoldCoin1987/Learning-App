<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Materials and Their Properties</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">How a material is BONDED gives it its properties. Pick the material to fit the job.</text>

  <!-- METAL panel -->
  <rect x="30" y="70" width="170" height="270" fill="none" stroke="black" stroke-width="2"/>
  <text x="115" y="94" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">METAL</text>
  <text x="115" y="112" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">a metal pan</text>
  <!-- shared electron sea -->
  <circle cx="75" cy="150" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="115" cy="150" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="155" cy="150" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="95" cy="185" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="135" cy="185" r="12" fill="none" stroke="black" stroke-width="2"/>
  <text x="75" y="154" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">+</text>
  <text x="115" y="154" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">+</text>
  <text x="155" y="154" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">+</text>
  <text x="95" y="189" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">+</text>
  <text x="135" y="189" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">+</text>
  <text x="115" y="218" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">"sea" of shared electrons</text>
  <text x="115" y="262" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">strong</text>
  <text x="115" y="282" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">conducts heat/electricity</text>
  <text x="115" y="302" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">bends (does not shatter)</text>

  <!-- CERAMIC panel -->
  <rect x="215" y="70" width="170" height="270" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="94" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">CERAMIC</text>
  <text x="300" y="112" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">a ceramic mug</text>
  <!-- rigid grid -->
  <line x1="250" y1="140" x2="350" y2="140" stroke="black" stroke-width="2"/>
  <line x1="250" y1="170" x2="350" y2="170" stroke="black" stroke-width="2"/>
  <line x1="250" y1="200" x2="350" y2="200" stroke="black" stroke-width="2"/>
  <line x1="270" y1="140" x2="270" y2="200" stroke="black" stroke-width="2"/>
  <line x1="300" y1="140" x2="300" y2="200" stroke="black" stroke-width="2"/>
  <line x1="330" y1="140" x2="330" y2="200" stroke="black" stroke-width="2"/>
  <text x="300" y="222" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">stiff, locked network</text>
  <text x="300" y="262" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">hard</text>
  <text x="300" y="282" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">heat-resistant</text>
  <text x="300" y="302" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">brittle (can shatter)</text>

  <!-- PLASTIC panel -->
  <rect x="400" y="70" width="170" height="270" fill="none" stroke="black" stroke-width="2"/>
  <text x="485" y="94" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">PLASTIC</text>
  <text x="485" y="112" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">a plastic bottle</text>
  <!-- long floppy chains -->
  <path d="M 420 150 Q 450 135 480 150 Q 510 165 540 150" fill="none" stroke="black" stroke-width="2"/>
  <path d="M 420 175 Q 450 160 480 175 Q 510 190 540 175" fill="none" stroke="black" stroke-width="2"/>
  <path d="M 420 200 Q 450 185 480 200 Q 510 215 540 200" fill="none" stroke="black" stroke-width="2"/>
  <text x="485" y="222" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">long polymer chains</text>
  <text x="485" y="262" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">light</text>
  <text x="485" y="282" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">moldable</text>
  <text x="485" y="302" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">cheap</text>

  <text x="300" y="370" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Plus SEMICONDUCTORS (like silicon) -&gt; the chip in a phone. Structure decides the properties.</text>
</svg>
