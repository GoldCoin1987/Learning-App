<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Solubility Limit: Saturated Solution</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">There is a limit to how much will dissolve. Once 'full', extra sits at the bottom.</text>

  <!-- LEFT: still dissolving (unsaturated) -->
  <rect x="40" y="72" width="230" height="225" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="94" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">UNSATURATED</text>
  <text x="155" y="112" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">more can still dissolve</text>
  <path d="M80 132 L230 132 L218 270 L92 270 Z" fill="none" stroke="black" stroke-width="2"/>
  <!-- scattered dissolved dots, none at bottom -->
  <circle cx="115" cy="165" r="4" fill="black"/>
  <circle cx="160" cy="160" r="4" fill="black"/>
  <circle cx="200" cy="168" r="4" fill="black"/>
  <circle cx="130" cy="200" r="4" fill="black"/>
  <circle cx="175" cy="205" r="4" fill="black"/>
  <circle cx="120" cy="235" r="4" fill="black"/>
  <circle cx="165" cy="232" r="4" fill="black"/>
  <text x="155" y="289" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">all the sugar dissolves</text>

  <!-- RIGHT: saturated, extra piles up -->
  <rect x="330" y="72" width="230" height="225" fill="none" stroke="black" stroke-width="2"/>
  <text x="445" y="94" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">SATURATED</text>
  <text x="445" y="112" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">'full': no more will dissolve</text>
  <path d="M370 132 L520 132 L508 270 L382 270 Z" fill="none" stroke="black" stroke-width="2"/>
  <!-- dissolved dots, densely scattered -->
  <circle cx="400" cy="160" r="4" fill="black"/>
  <circle cx="440" cy="156" r="4" fill="black"/>
  <circle cx="480" cy="162" r="4" fill="black"/>
  <circle cx="415" cy="190" r="4" fill="black"/>
  <circle cx="455" cy="194" r="4" fill="black"/>
  <circle cx="490" cy="188" r="4" fill="black"/>
  <circle cx="405" cy="222" r="4" fill="black"/>
  <circle cx="445" cy="225" r="4" fill="black"/>
  <circle cx="485" cy="220" r="4" fill="black"/>
  <!-- undissolved pile at the bottom -->
  <path d="M392 268 Q445 240 498 268 Z" fill="black"/>
  <line x1="445" y1="250" x2="445" y2="200" stroke="black" stroke-width="1.5" marker-end="url(#arrowS)"/>
  <text x="445" y="289" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">extra sugar piles at the bottom</text>

  <text x="300" y="322" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">SOLUBILITY = how much solute a solvent can hold. Heating usually lets MORE solid dissolve.</text>
  <text x="300" y="344" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">(For gases it is the opposite: warm soda goes flat as gas escapes.)</text>

  <defs>
    <marker id="arrowS" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>
</svg>
