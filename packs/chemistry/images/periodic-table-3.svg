<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Metals, Nonmetals, and Metalloids</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Most elements are metals (left and center). Nonmetals sit on the right.</text>

  <!-- outer table outline -->
  <rect x="80" y="70" width="440" height="180" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- METALS region: left/center, light shade -->
  <rect x="80" y="70" width="330" height="180" fill="#e6e6e6" stroke="none"/>
  <text x="220" y="150" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">METALS</text>
  <text x="220" y="172" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">shiny, bendable,</text>
  <text x="220" y="186" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">conduct heat and electricity</text>
  <text x="220" y="208" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">iron, copper, gold</text>

  <!-- NONMETALS region: right, white -->
  <rect x="440" y="70" width="80" height="180" fill="white" stroke="none"/>
  <text x="480" y="150" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">NON-</text>
  <text x="480" y="166" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">METALS</text>
  <text x="480" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">dull, poor</text>
  <text x="480" y="202" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">conductors</text>
  <text x="480" y="220" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">oxygen, carbon</text>

  <!-- METALLOID staircase border between the two -->
  <polyline points="410,70 410,110 440,110 440,250" fill="none" stroke="black" stroke-width="3"/>
  <line x1="425" y1="90" x2="500" y2="60" stroke="black" stroke-width="1"/>
  <polygon points="425,90 433,87 430,95" fill="black"/>
  <text x="505" y="58" font-family="sans-serif" font-size="11" fill="black">METALLOIDS</text>
  <text x="505" y="72" font-family="sans-serif" font-size="10" fill="black">(the staircase:</text>
  <text x="505" y="84" font-family="sans-serif" font-size="10" fill="black">in-between, e.g. silicon)</text>

  <!-- legend -->
  <rect x="80" y="300" width="20" height="14" fill="#e6e6e6" stroke="black" stroke-width="1"/>
  <text x="108" y="312" font-family="sans-serif" font-size="12" fill="black">Metals (most of the table)</text>
  <rect x="300" y="300" width="20" height="14" fill="white" stroke="black" stroke-width="1"/>
  <text x="328" y="312" font-family="sans-serif" font-size="12" fill="black">Nonmetals (upper right)</text>

  <text x="300" y="350" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The thick staircase line marks the metalloids that sit between the two.</text>
  <text x="300" y="372" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Copper wire is a metal; the oxygen you breathe is a nonmetal.</text>
</svg>
