<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Molar Mass: the Bridge Between Grams and Moles</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Weigh it in grams, then use molar mass to find the number of moles.</text>

  <!-- LEFT side: GRAMS (a scale) -->
  <text x="120" y="90" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">GRAMS (weigh it)</text>
  <!-- pan -->
  <ellipse cx="120" cy="150" rx="65" ry="13" fill="none" stroke="black" stroke-width="2"/>
  <line x1="120" y1="163" x2="120" y2="225" stroke="black" stroke-width="2"/>
  <rect x="75" y="225" width="90" height="38" fill="none" stroke="black" stroke-width="2"/>
  <text x="120" y="250" font-family="sans-serif" font-size="20" text-anchor="middle" fill="black">36 g</text>
  <text x="120" y="290" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">36 grams of water</text>

  <!-- BRIDGE arrow in the middle -->
  <line x1="195" y1="175" x2="405" y2="175" stroke="black" stroke-width="2.5"/>
  <polygon points="405,175 393,167 393,183" fill="black"/>
  <polygon points="195,175 207,167 207,183" fill="black"/>
  <rect x="235" y="125" width="130" height="44" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="143" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">MOLAR MASS</text>
  <text x="300" y="161" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">water = 18 g/mol</text>
  <text x="300" y="200" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">the bridge</text>

  <!-- RIGHT side: MOLES (a counted pile) -->
  <text x="480" y="90" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">MOLES (count it)</text>
  <!-- pile of particles -->
  <circle cx="455" cy="140" r="6" fill="black"/>
  <circle cx="475" cy="135" r="6" fill="black"/>
  <circle cx="495" cy="140" r="6" fill="black"/>
  <circle cx="465" cy="155" r="6" fill="black"/>
  <circle cx="485" cy="155" r="6" fill="black"/>
  <circle cx="505" cy="150" r="6" fill="black"/>
  <circle cx="450" cy="158" r="6" fill="black"/>
  <text x="480" y="250" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">2 moles</text>
  <text x="480" y="290" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">= about 12 x 10 to the 23</text>
  <text x="480" y="308" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">water particles</text>

  <text x="300" y="345" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">1 mole of water = 18 g, so 36 g = 2 moles (because 18 + 18 = 36).</text>
  <text x="300" y="372" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Half a mole would be 9 g; ten moles would be 180 g. Easy multiples, no calculator.</text>
</svg>
