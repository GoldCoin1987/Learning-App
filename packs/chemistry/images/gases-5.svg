<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <rect x="0" y="0" width="600" height="420" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Gas Safety: Why Heating a Sealed Container Is Dangerous</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A sealed gas cannot expand, so heat makes its pressure climb until it can BURST.</text>

  <!-- WARNING panel: sealed can heated -->
  <rect x="30" y="70" width="540" height="150" fill="none" stroke="black" stroke-width="3"/>
  <text x="300" y="92" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">SEALED CAN + HEAT &#8594; pressure builds &#8594; bursts</text>

  <!-- step 1: cool sealed can -->
  <rect x="70" y="110" width="70" height="90" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="90" cy="140" r="6" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="120" cy="160" r="6" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="95" cy="180" r="6" fill="none" stroke="black" stroke-width="2"/>
  <text x="105" y="215" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">sealed, cool</text>

  <text x="170" y="160" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">&#8594;</text>
  <text x="170" y="180" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">heat it</text>

  <!-- step 2: heated, more/faster hits -->
  <rect x="210" y="110" width="70" height="90" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="230" cy="135" r="6" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="262" cy="145" r="6" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="235" cy="170" r="6" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="262" cy="180" r="6" fill="none" stroke="black" stroke-width="2"/>
  <line x1="210" y1="125" x2="202" y2="122" stroke="black" stroke-width="1.5"/>
  <line x1="280" y1="150" x2="288" y2="147" stroke="black" stroke-width="1.5"/>
  <line x1="245" y1="110" x2="245" y2="102" stroke="black" stroke-width="1.5"/>
  <text x="245" y="215" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">faster, harder hits</text>

  <text x="310" y="160" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">&#8594;</text>

  <!-- step 3: burst -->
  <text x="400" y="150" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">BURST!</text>
  <line x1="360" y1="160" x2="330" y2="140" stroke="black" stroke-width="2"/>
  <line x1="360" y1="160" x2="335" y2="170" stroke="black" stroke-width="2"/>
  <line x1="400" y1="170" x2="380" y2="195" stroke="black" stroke-width="2"/>
  <line x1="430" y1="160" x2="460" y2="145" stroke="black" stroke-width="2"/>
  <line x1="430" y1="165" x2="465" y2="175" stroke="black" stroke-width="2"/>
  <text x="400" y="215" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">NEVER heat aerosol cans!</text>

  <!-- balloon in heat vs cold -->
  <text x="300" y="252" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">A stretchy balloon shows it too:</text>

  <!-- warm balloon: big -->
  <ellipse cx="170" cy="320" rx="55" ry="62" fill="none" stroke="black" stroke-width="2"/>
  <line x1="170" y1="382" x2="170" y2="400" stroke="black" stroke-width="2"/>
  <text x="170" y="300" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">WARM</text>
  <text x="170" y="318" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">expands</text>
  <text x="170" y="416" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(can pop in heat)</text>

  <!-- cold balloon: small -->
  <ellipse cx="430" cy="335" rx="30" ry="36" fill="none" stroke="black" stroke-width="2"/>
  <line x1="430" y1="371" x2="430" y2="400" stroke="black" stroke-width="2"/>
  <text x="430" y="305" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">COLD</text>
  <text x="430" y="335" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">shrinks</text>
  <text x="430" y="416" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(deflates in cold)</text>

  <text x="300" y="335" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">vs</text>
</svg>
