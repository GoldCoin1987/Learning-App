<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect x="0" y="0" width="600" height="380" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Heat a Gas: Faster Particles, More Pressure</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Heating speeds the particles up, so they hit the walls more often and harder.</text>

  <!-- COLD box: slow, soft hits -->
  <rect x="40" y="80" width="220" height="190" fill="none" stroke="black" stroke-width="3"/>
  <text x="150" y="104" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">COLD GAS</text>
  <text x="150" y="120" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">slow particles (short arrows)</text>
  <circle cx="100" cy="160" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="111" y1="160" x2="123" y2="160" stroke="black" stroke-width="1.5"/>
  <line x1="123" y1="160" x2="119" y2="156" stroke="black" stroke-width="1.5"/>
  <line x1="123" y1="160" x2="119" y2="164" stroke="black" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="211" y1="200" x2="223" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="223" y1="200" x2="219" y2="196" stroke="black" stroke-width="1.5"/>
  <line x1="223" y1="200" x2="219" y2="204" stroke="black" stroke-width="1.5"/>
  <circle cx="140" cy="230" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="151" y1="230" x2="163" y2="230" stroke="black" stroke-width="1.5"/>
  <line x1="163" y1="230" x2="159" y2="226" stroke="black" stroke-width="1.5"/>
  <line x1="163" y1="230" x2="159" y2="234" stroke="black" stroke-width="1.5"/>
  <text x="150" y="258" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">fewer, softer hits = LOW pressure</text>

  <!-- big arrow + flame label -->
  <text x="300" y="170" font-family="sans-serif" font-size="30" text-anchor="middle" fill="black">&#8594;</text>
  <text x="300" y="145" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">ADD HEAT</text>
  <text x="300" y="192" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(sun, stove)</text>

  <!-- HOT box: fast, hard hits -->
  <rect x="340" y="80" width="220" height="190" fill="none" stroke="black" stroke-width="3"/>
  <text x="450" y="104" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">HOT GAS</text>
  <text x="450" y="120" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">fast particles (long arrows)</text>
  <circle cx="395" cy="160" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="406" y1="160" x2="440" y2="160" stroke="black" stroke-width="1.5"/>
  <line x1="440" y1="160" x2="434" y2="155" stroke="black" stroke-width="1.5"/>
  <line x1="440" y1="160" x2="434" y2="165" stroke="black" stroke-width="1.5"/>
  <circle cx="500" cy="205" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="511" y1="205" x2="545" y2="205" stroke="black" stroke-width="1.5"/>
  <line x1="545" y1="205" x2="539" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="545" y1="205" x2="539" y2="210" stroke="black" stroke-width="1.5"/>
  <circle cx="420" cy="232" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="431" y1="232" x2="465" y2="232" stroke="black" stroke-width="1.5"/>
  <line x1="465" y1="232" x2="459" y2="227" stroke="black" stroke-width="1.5"/>
  <line x1="465" y1="232" x2="459" y2="237" stroke="black" stroke-width="1.5"/>
  <!-- collision bursts on hot box walls -->
  <line x1="340" y1="175" x2="332" y2="172" stroke="black" stroke-width="1.5"/>
  <line x1="560" y1="205" x2="568" y2="205" stroke="black" stroke-width="1.5"/>
  <text x="450" y="258" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">more, harder hits = HIGH pressure</text>

  <text x="300" y="300" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">If the container is sealed (fixed size): pressure RISES.</text>
  <text x="300" y="322" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">If it can stretch (a balloon): it EXPANDS. (Charles / Gay-Lussac, in words.)</text>
  <text x="300" y="350" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Hooks: a tire heats up in the sun; a balloon swells in heat, shrinks in cold.</text>
</svg>
