<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Polymer: a Long Chain of Repeating Units</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Small repeating units (MONOMERS) link together into one long molecule (a POLYMER).</text>

  <!-- monomers (separate) -->
  <text x="300" y="86" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Small units = MONOMERS (like single beads or train cars)</text>
  <rect x="120" y="100" width="34" height="34" fill="none" stroke="black" stroke-width="2"/>
  <rect x="180" y="100" width="34" height="34" fill="none" stroke="black" stroke-width="2"/>
  <rect x="240" y="100" width="34" height="34" fill="none" stroke="black" stroke-width="2"/>
  <text x="137" y="123" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">M</text>
  <text x="197" y="123" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">M</text>
  <text x="257" y="123" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">M</text>
  <text x="340" y="123" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">+ ... -&gt;</text>

  <!-- long polymer chain -->
  <text x="300" y="200" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Linked into a long chain = POLYMER (beads on a string)</text>
  <rect x="70" y="220" width="34" height="34" fill="none" stroke="black" stroke-width="2"/>
  <rect x="124" y="220" width="34" height="34" fill="none" stroke="black" stroke-width="2"/>
  <rect x="178" y="220" width="34" height="34" fill="none" stroke="black" stroke-width="2"/>
  <rect x="232" y="220" width="34" height="34" fill="none" stroke="black" stroke-width="2"/>
  <rect x="286" y="220" width="34" height="34" fill="none" stroke="black" stroke-width="2"/>
  <rect x="340" y="220" width="34" height="34" fill="none" stroke="black" stroke-width="2"/>
  <rect x="394" y="220" width="34" height="34" fill="none" stroke="black" stroke-width="2"/>
  <rect x="448" y="220" width="34" height="34" fill="none" stroke="black" stroke-width="2"/>
  <text x="87" y="243" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">M</text>
  <text x="141" y="243" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">M</text>
  <text x="195" y="243" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">M</text>
  <text x="249" y="243" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">M</text>
  <text x="303" y="243" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">M</text>
  <text x="357" y="243" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">M</text>
  <text x="411" y="243" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">M</text>
  <text x="465" y="243" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">M</text>
  <line x1="104" y1="237" x2="124" y2="237" stroke="black" stroke-width="2"/>
  <line x1="158" y1="237" x2="178" y2="237" stroke="black" stroke-width="2"/>
  <line x1="212" y1="237" x2="232" y2="237" stroke="black" stroke-width="2"/>
  <line x1="266" y1="237" x2="286" y2="237" stroke="black" stroke-width="2"/>
  <line x1="320" y1="237" x2="340" y2="237" stroke="black" stroke-width="2"/>
  <line x1="374" y1="237" x2="394" y2="237" stroke="black" stroke-width="2"/>
  <line x1="428" y1="237" x2="448" y2="237" stroke="black" stroke-width="2"/>

  <text x="300" y="306" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">SYNTHETIC polymers: plastics (bottles, bags).</text>
  <text x="300" y="328" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">NATURAL polymers: proteins, DNA, starch, rubber.</text>
  <text x="300" y="362" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">A polymer is the WHOLE long chain -- not a single small unit.</text>
</svg>
