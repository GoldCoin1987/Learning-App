<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Hydrocarbons: Carbon + Hydrogen = Fuels</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The simplest organic molecules are just carbon (C) and hydrogen (H). They BURN to release energy.</text>

  <!-- divider -->
  <line x1="300" y1="62" x2="300" y2="330" stroke="black" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- LEFT: methane CH4 -->
  <text x="150" y="84" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Methane: 1 carbon + 4 hydrogen</text>
  <circle cx="150" cy="180" r="30" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="185" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">C</text>
  <!-- four hydrogens -->
  <circle cx="150" cy="110" r="18" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="150" cy="250" r="18" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="80" cy="180" r="18" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="220" cy="180" r="18" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="115" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">H</text>
  <text x="150" y="255" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">H</text>
  <text x="80" y="185" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">H</text>
  <text x="220" y="185" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">H</text>
  <!-- four bonds -->
  <line x1="150" y1="150" x2="150" y2="128" stroke="black" stroke-width="2"/>
  <line x1="150" y1="210" x2="150" y2="232" stroke="black" stroke-width="2"/>
  <line x1="120" y1="180" x2="98" y2="180" stroke="black" stroke-width="2"/>
  <line x1="180" y1="180" x2="202" y2="180" stroke="black" stroke-width="2"/>
  <text x="150" y="292" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">natural gas (stove)</text>

  <!-- RIGHT: a short chain -->
  <text x="450" y="84" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">A short chain (propane-like)</text>
  <circle cx="380" cy="170" r="18" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="450" cy="170" r="18" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="520" cy="170" r="18" fill="none" stroke="black" stroke-width="2"/>
  <text x="380" y="175" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">C</text>
  <text x="450" y="175" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">C</text>
  <text x="520" y="175" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">C</text>
  <line x1="398" y1="170" x2="432" y2="170" stroke="black" stroke-width="2"/>
  <line x1="468" y1="170" x2="502" y2="170" stroke="black" stroke-width="2"/>
  <text x="450" y="230" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">propane / grill, gasoline</text>
  <text x="450" y="252" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">long chains = waxy / oily (candle wax)</text>
  <text x="450" y="274" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">chain length affects properties</text>

  <text x="300" y="360" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">FUEL -- burns (combustion) to release energy. That is why hydrocarbons are fuels.</text>
  <text x="300" y="384" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">methane, propane, butane, gasoline, candle wax -- all hydrocarbons.</text>
</svg>
