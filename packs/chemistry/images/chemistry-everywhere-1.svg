<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Chemistry in Everyday Products</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The stuff you use every day is made and shaped by chemistry.</text>

  <!-- MEDICINE: a pill -->
  <text x="150" y="80" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">MEDICINE</text>
  <rect x="110" y="95" width="80" height="38" rx="19" fill="none" stroke="black" stroke-width="2"/>
  <line x1="150" y1="95" x2="150" y2="133" stroke="black" stroke-width="2"/>
  <text x="150" y="152" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">a designed molecule</text>
  <text x="150" y="166" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">that acts in the body</text>

  <!-- CLEANING: soap grabs grease -->
  <text x="450" y="80" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">CLEANING (soap)</text>
  <circle cx="420" cy="115" r="14" fill="none" stroke="black" stroke-width="2"/>
  <line x1="434" y1="115" x2="470" y2="115" stroke="black" stroke-width="2"/>
  <circle cx="484" cy="115" r="10" fill="black"/>
  <text x="420" y="119" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">water</text>
  <text x="420" y="148" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">water-loving end</text>
  <text x="486" y="148" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">grease-grabbing end</text>
  <text x="450" y="164" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">soap grabs grease</text>

  <!-- divider line -->
  <line x1="40" y1="185" x2="560" y2="185" stroke="black" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- FOOD: cooking pan -->
  <text x="150" y="212" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">FOOD (cooking)</text>
  <ellipse cx="150" cy="255" rx="50" ry="14" fill="none" stroke="black" stroke-width="2"/>
  <line x1="100" y1="255" x2="100" y2="280" stroke="black" stroke-width="2"/>
  <line x1="200" y1="255" x2="200" y2="280" stroke="black" stroke-width="2"/>
  <line x1="100" y1="280" x2="200" y2="280" stroke="black" stroke-width="2"/>
  <line x1="200" y1="268" x2="240" y2="268" stroke="black" stroke-width="2"/>
  <text x="150" y="302" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">heat causes new molecules</text>
  <text x="150" y="316" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(browning, baking)</text>

  <!-- BATTERY -->
  <text x="450" y="212" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">BATTERY</text>
  <rect x="410" y="232" width="80" height="44" fill="none" stroke="black" stroke-width="2"/>
  <rect x="490" y="246" width="8" height="16" fill="black"/>
  <text x="425" y="259" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">+</text>
  <text x="470" y="259" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">-</text>
  <text x="450" y="302" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">a reaction makes</text>
  <text x="450" y="316" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">electricity</text>

  <text x="300" y="356" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">ALL OF THIS IS CHEMISTRY</text>
  <text x="300" y="380" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">medicine, cleaning, food, batteries -- molecules at work all around you.</text>
</svg>
