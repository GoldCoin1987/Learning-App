<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">The Phase-Change Map</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Add energy to move UP the ladder; remove energy to move DOWN.</text>

  <!-- three state boxes -->
  <rect x="60" y="290" width="130" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="125" y="326" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">SOLID</text>

  <rect x="235" y="290" width="130" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="326" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">LIQUID</text>

  <rect x="410" y="290" width="130" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="475" y="326" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">GAS</text>

  <!-- SOLID <-> LIQUID arrows -->
  <line x1="195" y1="305" x2="230" y2="305" stroke="black" stroke-width="2"/>
  <line x1="230" y1="305" x2="223" y2="301" stroke="black" stroke-width="2"/>
  <line x1="230" y1="305" x2="223" y2="309" stroke="black" stroke-width="2"/>
  <text x="212" y="296" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">MELTING</text>

  <line x1="230" y1="338" x2="195" y2="338" stroke="black" stroke-width="2"/>
  <line x1="195" y1="338" x2="202" y2="334" stroke="black" stroke-width="2"/>
  <line x1="195" y1="338" x2="202" y2="342" stroke="black" stroke-width="2"/>
  <text x="212" y="356" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">FREEZING</text>

  <!-- LIQUID <-> GAS arrows -->
  <line x1="370" y1="305" x2="405" y2="305" stroke="black" stroke-width="2"/>
  <line x1="405" y1="305" x2="398" y2="301" stroke="black" stroke-width="2"/>
  <line x1="405" y1="305" x2="398" y2="309" stroke="black" stroke-width="2"/>
  <text x="387" y="296" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">BOILING</text>

  <line x1="405" y1="338" x2="370" y2="338" stroke="black" stroke-width="2"/>
  <line x1="370" y1="338" x2="377" y2="334" stroke="black" stroke-width="2"/>
  <line x1="370" y1="338" x2="377" y2="342" stroke="black" stroke-width="2"/>
  <text x="387" y="356" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">CONDENSING</text>

  <!-- SUBLIMATION: solid straight to gas, big arc over the top -->
  <path d="M 110 290 C 110 150, 490 150, 490 290" fill="none" stroke="black" stroke-width="2"/>
  <line x1="490" y1="290" x2="486" y2="280" stroke="black" stroke-width="2"/>
  <line x1="490" y1="290" x2="494" y2="280" stroke="black" stroke-width="2"/>
  <text x="300" y="150" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">SUBLIMATION (solid straight to gas, skips liquid)</text>
  <text x="300" y="168" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">e.g. dry ice "smoking", ice cubes shrinking in the freezer</text>

  <!-- add/remove energy guides -->
  <text x="300" y="222" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">ADD energy: melt, boil, sublime  (move toward gas)</text>
  <text x="300" y="244" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">REMOVE energy: condense, freeze  (move toward solid)</text>

  <text x="300" y="384" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Hooks: ice melting, water boiling, dew/fog forming (condensing), dry ice (subliming).</text>
</svg>
