<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Equilibrium: Forward and Backward Balance Out</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">In a reversible reaction, products can turn back into reactants.</text>

  <!-- reactants box -->
  <rect x="70" y="120" width="150" height="90" fill="none" stroke="black" stroke-width="2"/>
  <text x="145" y="160" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">REACTANTS</text>
  <text x="145" y="182" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">starting stuff</text>

  <!-- products box -->
  <rect x="380" y="120" width="150" height="90" fill="none" stroke="black" stroke-width="2"/>
  <text x="455" y="160" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">PRODUCTS</text>
  <text x="455" y="182" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">new stuff</text>

  <!-- forward arrow (top) -->
  <line x1="225" y1="145" x2="375" y2="145" stroke="black" stroke-width="2"/>
  <line x1="375" y1="145" x2="365" y2="140" stroke="black" stroke-width="2"/>
  <line x1="375" y1="145" x2="365" y2="150" stroke="black" stroke-width="2"/>
  <text x="300" y="135" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">forward</text>

  <!-- backward arrow (bottom) -->
  <line x1="375" y1="185" x2="225" y2="185" stroke="black" stroke-width="2"/>
  <line x1="225" y1="185" x2="235" y2="180" stroke="black" stroke-width="2"/>
  <line x1="225" y1="185" x2="235" y2="190" stroke="black" stroke-width="2"/>
  <text x="300" y="205" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">backward</text>

  <!-- same-rate note -->
  <text x="300" y="245" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">When BOTH happen at the SAME RATE, the amounts stop changing.</text>
  <text x="300" y="268" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">That balance is EQUILIBRIUM - steady, but still happening (dynamic).</text>

  <text x="300" y="305" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Everyday: a sealed fizzy bottle (gas dissolving and escaping balance out);</text>
  <text x="300" y="325" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">a room where as many people enter as leave, so the count holds steady.</text>
  <text x="300" y="348" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Equilibrium does NOT mean the reaction stopped - both directions keep going.</text>
</svg>
