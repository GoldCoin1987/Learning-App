<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Valence Electrons: The Outer Shell Does the Chemistry</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Only the OUTERMOST electrons interact with other atoms. Inner electrons just sit there.</text>

  <!-- outer shell ring -->
  <circle cx="230" cy="235" r="140" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- inner shell ring -->
  <circle cx="230" cy="235" r="78" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- nucleus -->
  <circle cx="230" cy="235" r="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="230" y="239" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">nucleus</text>

  <!-- inner shell electrons: plain (just sit there) -->
  <circle cx="230" cy="157" r="9" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="225" y1="157" x2="235" y2="157" stroke="black" stroke-width="1.5"/>
  <circle cx="230" cy="313" r="9" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="225" y1="313" x2="235" y2="313" stroke="black" stroke-width="1.5"/>
  <text x="150" y="200" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">inner electrons</text>
  <text x="150" y="213" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">(mostly just sit)</text>

  <!-- outer (valence) electrons: highlighted with a halo ring -->
  <circle cx="90" cy="235" r="15" fill="#d9d9d9" stroke="black" stroke-width="1"/>
  <circle cx="90" cy="235" r="9" fill="none" stroke="black" stroke-width="2"/>
  <line x1="85" y1="235" x2="95" y2="235" stroke="black" stroke-width="2"/>

  <circle cx="160" cy="120" r="15" fill="#d9d9d9" stroke="black" stroke-width="1"/>
  <circle cx="160" cy="120" r="9" fill="none" stroke="black" stroke-width="2"/>
  <line x1="155" y1="120" x2="165" y2="120" stroke="black" stroke-width="2"/>

  <circle cx="300" cy="120" r="15" fill="#d9d9d9" stroke="black" stroke-width="1"/>
  <circle cx="300" cy="120" r="9" fill="none" stroke="black" stroke-width="2"/>
  <line x1="295" y1="120" x2="305" y2="120" stroke="black" stroke-width="2"/>

  <circle cx="370" cy="235" r="15" fill="#d9d9d9" stroke="black" stroke-width="1"/>
  <circle cx="370" cy="235" r="9" fill="none" stroke="black" stroke-width="2"/>
  <line x1="365" y1="235" x2="375" y2="235" stroke="black" stroke-width="2"/>

  <!-- valence callout -->
  <line x1="370" y1="235" x2="440" y2="235" stroke="black" stroke-width="1"/>
  <text x="510" y="225" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">VALENCE</text>
  <text x="510" y="240" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">ELECTRONS</text>
  <text x="510" y="258" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">(shaded = outer shell)</text>

  <text x="300" y="384" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Like your outermost layer is the only part that touches the world.</text>
</svg>
