<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">A Ball-and-Stick Model of Water (H2O)</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Balls = atoms, sticks = bonds. Models let us picture a molecule's SHAPE.</text>

  <!-- bonds (sticks) -->
  <line x1="300" y1="190" x2="200" y2="270" stroke="black" stroke-width="6"/>
  <line x1="300" y1="190" x2="400" y2="270" stroke="black" stroke-width="6"/>

  <!-- oxygen ball (big) -->
  <circle cx="300" cy="190" r="46" fill="white" stroke="black" stroke-width="2.5"/>
  <text x="300" y="197" font-family="sans-serif" font-size="20" text-anchor="middle" fill="black">O</text>

  <!-- hydrogen balls (small) -->
  <circle cx="200" cy="270" r="30" fill="white" stroke="black" stroke-width="2.5"/>
  <text x="200" y="276" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">H</text>
  <circle cx="400" cy="270" r="30" fill="white" stroke="black" stroke-width="2.5"/>
  <text x="400" y="276" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">H</text>

  <!-- callout labels -->
  <line x1="346" y1="190" x2="470" y2="150" stroke="black" stroke-width="1"/>
  <text x="500" y="148" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">big ball = O atom</text>
  <line x1="170" y1="270" x2="95" y2="300" stroke="black" stroke-width="1"/>
  <text x="85" y="320" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">small ball = H atom</text>
  <line x1="350" y1="235" x2="455" y2="265" stroke="black" stroke-width="1"/>
  <text x="500" y="270" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">stick = a bond</text>

  <text x="300" y="355" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Water is bent, not flat in a line. Its shape affects how it behaves.</text>
  <text x="300" y="380" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Like a tinker-toy model: balls joined by sticks show the real arrangement.</text>
</svg>
