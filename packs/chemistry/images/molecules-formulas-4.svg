<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Diatomic Molecules: Elements That Travel in Pairs</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A few elements naturally go around as bonded PAIRS. The air you breathe is mostly these two.</text>

  <!-- Oxygen O2 panel -->
  <rect x="40" y="80" width="240" height="220" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="160" y="108" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">Oxygen = O2</text>
  <line x1="120" y1="180" x2="200" y2="180" stroke="black" stroke-width="3"/>
  <circle cx="120" cy="180" r="30" fill="none" stroke="black" stroke-width="2"/>
  <text x="120" y="186" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">O</text>
  <circle cx="200" cy="180" r="30" fill="none" stroke="black" stroke-width="2"/>
  <text x="200" y="186" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">O</text>
  <text x="160" y="248" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">2 oxygen atoms bonded</text>
  <text x="160" y="268" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">SAME element, just paired</text>
  <text x="160" y="288" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(stick = the bond between them)</text>

  <!-- Nitrogen N2 panel -->
  <rect x="320" y="80" width="240" height="220" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="440" y="108" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">Nitrogen = N2</text>
  <line x1="400" y1="180" x2="480" y2="180" stroke="black" stroke-width="3"/>
  <circle cx="400" cy="180" r="30" fill="none" stroke="black" stroke-width="2"/>
  <text x="400" y="186" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">N</text>
  <circle cx="480" cy="180" r="30" fill="none" stroke="black" stroke-width="2"/>
  <text x="480" y="186" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">N</text>
  <text x="440" y="248" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">2 nitrogen atoms bonded</text>
  <text x="440" y="268" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">SAME element, just paired</text>
  <text x="440" y="288" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">air is mostly N2 and O2</text>

  <text x="300" y="335" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">O2 is NOT two different elements. It is one element (oxygen) whose atoms buddy up in pairs.</text>
  <text x="300" y="362" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Hydrogen does this too: H2. The subscript 2 means two atoms of the same kind.</text>
</svg>
