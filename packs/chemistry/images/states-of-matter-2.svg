<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">What Temperature Really Is: Average Particle Motion</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Temperature measures how fast the particles move on average. Hotter = faster.</text>

  <!-- COLD box -->
  <rect x="40" y="80" width="220" height="180" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="104" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">COLD</text>
  <text x="150" y="122" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">particles move SLOWLY</text>
  <!-- slow particles: short arrows -->
  <circle cx="100" cy="160" r="11" fill="none" stroke="black" stroke-width="2"/>
  <line x1="111" y1="160" x2="124" y2="160" stroke="black" stroke-width="1.5"/>
  <line x1="124" y1="160" x2="120" y2="156" stroke="black" stroke-width="1.5"/>
  <line x1="124" y1="160" x2="120" y2="164" stroke="black" stroke-width="1.5"/>
  <circle cx="190" cy="180" r="11" fill="none" stroke="black" stroke-width="2"/>
  <line x1="201" y1="180" x2="214" y2="180" stroke="black" stroke-width="1.5"/>
  <line x1="214" y1="180" x2="210" y2="176" stroke="black" stroke-width="1.5"/>
  <line x1="214" y1="180" x2="210" y2="184" stroke="black" stroke-width="1.5"/>
  <circle cx="130" cy="215" r="11" fill="none" stroke="black" stroke-width="2"/>
  <line x1="141" y1="215" x2="153" y2="215" stroke="black" stroke-width="1.5"/>
  <line x1="153" y1="215" x2="149" y2="211" stroke="black" stroke-width="1.5"/>
  <line x1="153" y1="215" x2="149" y2="219" stroke="black" stroke-width="1.5"/>
  <text x="150" y="248" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">short arrows = slow</text>

  <!-- HOT box -->
  <rect x="340" y="80" width="220" height="180" fill="none" stroke="black" stroke-width="2"/>
  <text x="450" y="104" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">HOT</text>
  <text x="450" y="122" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">particles move FAST</text>
  <!-- fast particles: long arrows -->
  <circle cx="395" cy="158" r="11" fill="none" stroke="black" stroke-width="2"/>
  <line x1="406" y1="158" x2="440" y2="158" stroke="black" stroke-width="1.5"/>
  <line x1="440" y1="158" x2="434" y2="153" stroke="black" stroke-width="1.5"/>
  <line x1="440" y1="158" x2="434" y2="163" stroke="black" stroke-width="1.5"/>
  <circle cx="500" cy="185" r="11" fill="none" stroke="black" stroke-width="2"/>
  <line x1="511" y1="185" x2="545" y2="185" stroke="black" stroke-width="1.5"/>
  <line x1="545" y1="185" x2="539" y2="180" stroke="black" stroke-width="1.5"/>
  <line x1="545" y1="185" x2="539" y2="190" stroke="black" stroke-width="1.5"/>
  <circle cx="420" cy="218" r="11" fill="none" stroke="black" stroke-width="2"/>
  <line x1="431" y1="218" x2="465" y2="218" stroke="black" stroke-width="1.5"/>
  <line x1="465" y1="218" x2="459" y2="213" stroke="black" stroke-width="1.5"/>
  <line x1="465" y1="218" x2="459" y2="223" stroke="black" stroke-width="1.5"/>
  <text x="450" y="248" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">long arrows = fast</text>

  <!-- big arrow between -->
  <text x="300" y="175" font-family="sans-serif" font-size="28" text-anchor="middle" fill="black">&#8594;</text>
  <text x="300" y="200" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">add heat</text>

  <text x="300" y="298" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Heating gives particles MORE energy (speed up). Cooling takes energy away (slow down).</text>
  <text x="300" y="324" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Everyday hook: warming food makes its particles jiggle and zoom faster.</text>
</svg>
