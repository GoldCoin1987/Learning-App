<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <rect x="0" y="0" width="600" height="340" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Pure Substance vs Mixture</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Look at the particles: one kind only, or different kinds mixed together?</text>

  <!-- PURE SUBSTANCE -->
  <rect x="40" y="75" width="230" height="200" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="98" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">PURE SUBSTANCE</text>
  <text x="155" y="116" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">all particles the same kind</text>
  <!-- all identical open circles -->
  <circle cx="80" cy="150" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="120" cy="150" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="160" cy="150" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="200" cy="150" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="240" cy="150" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="100" cy="190" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="140" cy="190" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="180" cy="190" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="220" cy="190" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="80" cy="230" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="120" cy="230" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="160" cy="230" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="200" cy="230" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="240" cy="230" r="12" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="262" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">examples: pure water, pure gold</text>

  <!-- MIXTURE -->
  <rect x="330" y="75" width="230" height="200" fill="none" stroke="black" stroke-width="2"/>
  <text x="445" y="98" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">MIXTURE</text>
  <text x="445" y="116" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">two or more kinds mixed together</text>
  <!-- mix of open circles, filled circles, and squares -->
  <circle cx="370" cy="150" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="410" cy="150" r="12" fill="black"/>
  <rect x="438" y="138" width="24" height="24" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="490" cy="150" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="530" cy="150" r="12" fill="black"/>
  <rect x="378" y="178" width="24" height="24" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="430" cy="190" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="470" cy="190" r="12" fill="black"/>
  <rect x="498" y="178" width="24" height="24" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="370" cy="230" r="12" fill="black"/>
  <rect x="398" y="218" width="24" height="24" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="450" cy="230" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="490" cy="230" r="12" fill="black"/>
  <rect x="518" y="218" width="24" height="24" fill="none" stroke="black" stroke-width="2"/>
  <text x="445" y="262" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">examples: salad, air, salt water</text>

  <text x="300" y="300" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A mixture can often be separated again (pick out the salad, boil off the water).</text>
  <text x="300" y="322" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Key: different shapes = different kinds of stuff = a mixture, NOT a pure substance.</text>
</svg>
