<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Polar Covalent Bond: UNEQUAL Sharing</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">In water, oxygen pulls the shared electrons closer. A lopsided tug-of-war.</text>

  <!-- central oxygen -->
  <circle cx="300" cy="190" r="44" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="195" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">O</text>

  <!-- two hydrogens -->
  <circle cx="190" cy="270" r="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="190" y="275" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">H</text>
  <circle cx="410" cy="270" r="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="410" y="275" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">H</text>

  <!-- bonds -->
  <line x1="268" y1="220" x2="212" y2="252" stroke="black" stroke-width="2"/>
  <line x1="332" y1="220" x2="388" y2="252" stroke="black" stroke-width="2"/>

  <!-- shared electrons drawn CLOSER to oxygen (filled dots near O end of each bond) -->
  <circle cx="252" cy="231" r="6" fill="black"/>
  <circle cx="348" cy="231" r="6" fill="black"/>
  <!-- small arrows showing the pull toward O -->
  <line x1="234" y1="248" x2="252" y2="234" stroke="black" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="366" y1="248" x2="348" y2="234" stroke="black" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <text x="300" y="258" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">electrons pulled toward O</text>

  <!-- partial-charge labels -->
  <text x="300" y="138" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">slightly -  (near O)</text>
  <text x="150" y="305" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">slightly +</text>
  <text x="450" y="305" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">slightly +</text>

  <text x="300" y="345" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">PARTIAL charges only (slight + / slight -), NOT full + or - ions.</text>
  <text x="300" y="368" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">This 'lopsided' pull is what makes water great at dissolving things.</text>
  <text x="300" y="388" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Equal sharing would be NONPOLAR; unequal sharing is POLAR.</text>

  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>
</svg>
