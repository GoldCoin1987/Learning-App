<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Why the Mole Matters: Weigh Out the Right Ratio</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A reaction needs whole-number ratios of atoms, like a recipe needs a ratio of ingredients.</text>

  <!-- RECIPE side (analogy) -->
  <rect x="40" y="80" width="230" height="220" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="106" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">A RECIPE (analogy)</text>
  <!-- 2 eggs -->
  <ellipse cx="90" cy="150" rx="16" ry="20" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="130" cy="150" rx="16" ry="20" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="110" y="195" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">2 eggs</text>
  <text x="195" y="155" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">+</text>
  <!-- flour cup -->
  <rect x="215" y="135" width="36" height="32" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="233" y="195" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">1 cup flour</text>
  <text x="155" y="240" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">You measure the right amount</text>
  <text x="155" y="260" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">of each ingredient by counting</text>
  <text x="155" y="280" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">or weighing.</text>

  <!-- REACTION side -->
  <rect x="330" y="80" width="230" height="220" fill="none" stroke="black" stroke-width="2"/>
  <text x="445" y="106" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">A REACTION</text>
  <!-- 2 H2 + 1 O2 -> water, shown simply as atoms -->
  <circle cx="370" cy="150" r="14" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="370" y="155" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">H</text>
  <circle cx="398" cy="150" r="14" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="398" y="155" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">H</text>
  <text x="384" y="180" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">2 moles H</text>
  <text x="425" y="155" font-family="sans-serif" font-size="20" text-anchor="middle" fill="black">+</text>
  <circle cx="460" cy="150" r="17" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="460" y="155" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">O</text>
  <text x="465" y="182" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">1 mole O</text>
  <text x="445" y="225" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Atoms combine in a fixed</text>
  <text x="445" y="245" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">whole-number ratio. You can't</text>
  <text x="445" y="265" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">count atoms, so you weigh out</text>
  <text x="445" y="285" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">the right number of MOLES.</text>

  <text x="300" y="335" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">The mole lets a chemist "count" atoms with a scale,</text>
  <text x="300" y="360" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">so the right numbers of atoms meet to react.</text>
  <text x="300" y="386" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">(Balancing those ratios is the next module.)</text>
</svg>
