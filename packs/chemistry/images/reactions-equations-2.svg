<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Conservation of Mass: Same Atoms, Rearranged</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Like rebuilding the SAME LEGO bricks into a new model. Nothing is created or destroyed.</text>

  <!-- BEFORE -->
  <text x="140" y="80" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">BEFORE (reactants)</text>
  <rect x="50" y="95" width="180" height="150" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- 4 bricks stacked one way -->
  <rect x="80" y="120" width="50" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="105" y="138" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">A</text>
  <rect x="130" y="120" width="50" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="138" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">B</text>
  <rect x="80" y="146" width="50" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="105" y="164" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">C</text>
  <rect x="130" y="146" width="50" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="164" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">D</text>
  <text x="140" y="225" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">4 bricks: A B C D</text>

  <!-- ARROW -->
  <line x1="245" y1="165" x2="345" y2="165" stroke="black" stroke-width="3" marker-end="url(#arrowR)"/>
  <text x="295" y="155" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">rearrange</text>

  <!-- AFTER -->
  <text x="460" y="80" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">AFTER (products)</text>
  <rect x="370" y="95" width="180" height="150" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- same 4 bricks, new arrangement (a row) -->
  <rect x="400" y="140" width="35" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="417" y="158" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">A</text>
  <rect x="435" y="140" width="35" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="452" y="158" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">C</text>
  <rect x="470" y="140" width="35" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="487" y="158" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">B</text>
  <rect x="505" y="140" width="35" height="26" fill="none" stroke="black" stroke-width="2"/>
  <text x="522" y="158" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">D</text>
  <text x="460" y="225" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">same 4 bricks: A C B D</text>

  <text x="300" y="295" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Count the bricks: 4 before, 4 after. Exactly the same bricks, just a new shape.</text>
  <text x="300" y="322" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Atoms are NOT created or destroyed in a reaction, only rearranged.</text>
  <text x="300" y="348" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">So the total mass before = total mass after. This is WHY we balance equations.</text>

  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>
</svg>
