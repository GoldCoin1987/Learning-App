<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Neutralization: Acid + Base Cancel Out</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">An acid and a base react and move toward neutral, making (typically) a SALT and WATER.</text>

  <!-- ACID box -->
  <rect x="40" y="100" width="120" height="80" fill="none" stroke="black" stroke-width="2"/>
  <text x="100" y="135" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">ACID</text>
  <text x="100" y="160" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">(e.g. stomach acid)</text>

  <!-- plus -->
  <text x="195" y="148" font-family="sans-serif" font-size="26" text-anchor="middle" fill="black">+</text>

  <!-- BASE box -->
  <rect x="230" y="100" width="120" height="80" fill="none" stroke="black" stroke-width="2"/>
  <text x="290" y="135" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">BASE</text>
  <text x="290" y="160" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">(e.g. antacid)</text>

  <!-- arrow -->
  <line x1="365" y1="140" x2="420" y2="140" stroke="black" stroke-width="2" marker-end="url(#a5)"/>
  <text x="392" y="128" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">react</text>
  <defs>
    <marker id="a5" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8" fill="none" stroke="black" stroke-width="2"/></marker>
  </defs>

  <!-- PRODUCTS box -->
  <rect x="430" y="100" width="140" height="80" fill="none" stroke="black" stroke-width="2"/>
  <text x="500" y="132" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">SALT + WATER</text>
  <text x="500" y="156" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">(often some gas/heat)</text>

  <!-- toward neutral note -->
  <text x="300" y="215" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Result moves toward NEUTRAL (around pH 7).</text>

  <!-- everyday hook: baking soda + vinegar fizz -->
  <rect x="120" y="245" width="360" height="90" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="270" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Everyday: baking soda (base) + vinegar (acid) = FIZZ</text>
  <!-- fizz bubbles -->
  <circle cx="200" cy="305" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="220" cy="295" r="4" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="240" cy="312" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="260" cy="298" r="4" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="280" cy="308" r="5" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="300" y="324" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">an antacid calming stomach acid; lime added to acidic soil</text>
</svg>
