<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Acids vs Bases: Meet Them Through the Senses</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Use familiar foods to build intuition only. Never taste or touch lab chemicals.</text>

  <!-- divider -->
  <line x1="300" y1="64" x2="300" y2="340" stroke="black" stroke-width="2"/>

  <!-- LEFT: ACIDS -->
  <rect x="20" y="64" width="270" height="276" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="92" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">ACIDS</text>
  <text x="155" y="114" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">taste SOUR</text>

  <text x="40" y="150" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">Examples you know:</text>
  <text x="40" y="174" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">- lemon juice</text>
  <text x="40" y="196" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">- vinegar</text>
  <text x="40" y="218" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">- soda (fizzy drinks)</text>
  <text x="40" y="240" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">- stomach acid</text>

  <!-- lemon icon -->
  <ellipse cx="155" cy="290" rx="42" ry="26" fill="none" stroke="black" stroke-width="2"/>
  <line x1="120" y1="290" x2="190" y2="290" stroke="black" stroke-width="1.5"/>
  <line x1="155" y1="266" x2="155" y2="314" stroke="black" stroke-width="1.5"/>
  <text x="155" y="332" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">lemon = sour bite</text>

  <!-- RIGHT: BASES -->
  <rect x="310" y="64" width="270" height="276" fill="none" stroke="black" stroke-width="2"/>
  <text x="445" y="92" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">BASES</text>
  <text x="445" y="114" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">feel SLIPPERY, taste BITTER</text>

  <text x="330" y="150" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">Examples you know:</text>
  <text x="330" y="174" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">- soap</text>
  <text x="330" y="196" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">- baking soda</text>
  <text x="330" y="218" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">- ammonia cleaners</text>
  <text x="330" y="240" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">- antacids</text>

  <!-- soap bar icon -->
  <rect x="410" y="270" width="70" height="40" rx="12" fill="none" stroke="black" stroke-width="2"/>
  <path d="M420 268 q6 -10 14 0" fill="none" stroke="black" stroke-width="1.5"/>
  <path d="M444 268 q6 -10 14 0" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="445" y="332" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">soap = slippery feel</text>
</svg>
