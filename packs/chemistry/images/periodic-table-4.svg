<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 410">
  <rect x="0" y="0" width="600" height="410" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Some Famous Families (Columns)</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Each column is a family with its own personality.</text>

  <!-- table outline -->
  <rect x="90" y="70" width="420" height="190" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- alkali metals: far-left column -->
  <rect x="90" y="70" width="30" height="190" fill="#d9d9d9" stroke="black" stroke-width="2"/>
  <text x="105" y="285" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">ALKALI</text>
  <text x="105" y="298" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">METALS</text>

  <!-- halogens: second column from right -->
  <rect x="450" y="70" width="30" height="190" fill="#d9d9d9" stroke="black" stroke-width="2"/>
  <text x="430" y="300" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">HALOGENS</text>

  <!-- noble gases: far-right column -->
  <rect x="480" y="70" width="30" height="190" fill="#d9d9d9" stroke="black" stroke-width="2"/>
  <text x="510" y="285" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">NOBLE</text>
  <text x="510" y="298" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">GASES</text>

  <!-- callout: alkali metals -->
  <line x1="105" y1="70" x2="105" y2="55" stroke="black" stroke-width="1"/>
  <text x="105" y="48" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">very reactive</text>

  <!-- callout: noble gases -->
  <line x1="495" y1="70" x2="495" y2="55" stroke="black" stroke-width="1"/>
  <text x="495" y="48" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">almost unreactive</text>

  <!-- personality boxes below -->
  <rect x="60" y="320" width="160" height="70" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="140" y="340" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">ALKALI METALS</text>
  <text x="140" y="358" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">far left, super reactive,</text>
  <text x="140" y="372" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">react with water</text>

  <rect x="230" y="320" width="150" height="70" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="305" y="340" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">HALOGENS</text>
  <text x="305" y="358" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">very reactive</text>
  <text x="305" y="372" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">nonmetals, e.g. chlorine</text>

  <rect x="390" y="320" width="160" height="70" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="470" y="340" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">NOBLE GASES</text>
  <text x="470" y="358" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">far right, inert (unreactive),</text>
  <text x="470" y="372" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">helium, neon</text>

  <text x="300" y="300" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(shaded columns highlighted)</text>
</svg>
