<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Two Kinds of Mixture</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Does it look the same throughout, or can you see the different parts?</text>

  <!-- HOMOGENEOUS -->
  <rect x="40" y="75" width="230" height="210" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="98" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">HOMOGENEOUS</text>
  <text x="155" y="116" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">uniform: looks the same everywhere</text>
  <!-- a glass of salt water, evenly speckled -->
  <path d="M75 135 L235 135 L222 255 L88 255 Z" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="150" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">salt water</text>
  <circle cx="100" cy="170" r="3" fill="black"/>
  <circle cx="135" cy="165" r="3" fill="black"/>
  <circle cx="170" cy="172" r="3" fill="black"/>
  <circle cx="205" cy="167" r="3" fill="black"/>
  <circle cx="115" cy="195" r="3" fill="black"/>
  <circle cx="150" cy="200" r="3" fill="black"/>
  <circle cx="185" cy="193" r="3" fill="black"/>
  <circle cx="100" cy="225" r="3" fill="black"/>
  <circle cx="135" cy="230" r="3" fill="black"/>
  <circle cx="170" cy="227" r="3" fill="black"/>
  <circle cx="205" cy="223" r="3" fill="black"/>
  <circle cx="118" cy="247" r="3" fill="black"/>
  <circle cx="155" cy="250" r="3" fill="black"/>
  <circle cx="192" cy="246" r="3" fill="black"/>
  <text x="155" y="275" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">e.g. salt water, air, sugar in tea</text>

  <!-- HETEROGENEOUS -->
  <rect x="330" y="75" width="230" height="210" fill="none" stroke="black" stroke-width="2"/>
  <text x="445" y="98" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">HETEROGENEOUS</text>
  <text x="445" y="116" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">non-uniform: you can see the parts</text>
  <!-- a salad bowl with visibly different chunks -->
  <path d="M360 200 a85 40 0 0 0 170 0" fill="none" stroke="black" stroke-width="2"/>
  <line x1="360" y1="200" x2="530" y2="200" stroke="black" stroke-width="2"/>
  <text x="445" y="150" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">a salad</text>
  <circle cx="395" cy="192" r="12" fill="none" stroke="black" stroke-width="2"/>
  <rect x="420" y="178" width="20" height="20" fill="black"/>
  <circle cx="465" cy="190" r="10" fill="black"/>
  <rect x="485" y="180" width="22" height="16" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="430" cy="205" r="9" fill="none" stroke="black" stroke-width="2"/>
  <rect x="455" y="205" width="16" height="14" fill="black"/>
  <text x="445" y="275" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">e.g. salad, sand in water, trail mix</text>

  <text x="300" y="312" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Both are MIXTURES (physically combined, not bonded, so separable).</text>
  <text x="300" y="334" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Same throughout = homogeneous. Visible different parts = heterogeneous.</text>
</svg>
