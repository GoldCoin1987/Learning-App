<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Building a Compound's Molar Mass</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Just add up the mass of every atom in the formula.</text>

  <!-- WATER row -->
  <text x="70" y="100" font-family="sans-serif" font-size="16" fill="black">Water, H2O:</text>
  <!-- H atom -->
  <circle cx="120" cy="150" r="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="120" y="150" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">H</text>
  <text x="120" y="156" font-family="sans-serif" font-size="0" fill="black"></text>
  <text x="120" y="190" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">1</text>
  <text x="160" y="155" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">+</text>
  <!-- H atom -->
  <circle cx="200" cy="150" r="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="200" y="150" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">H</text>
  <text x="200" y="190" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">1</text>
  <text x="240" y="155" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">+</text>
  <!-- O atom -->
  <circle cx="285" cy="150" r="28" fill="none" stroke="black" stroke-width="2"/>
  <text x="285" y="151" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">O</text>
  <text x="285" y="196" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">16</text>
  <text x="335" y="155" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">=</text>
  <rect x="365" y="128" width="150" height="46" fill="none" stroke="black" stroke-width="2"/>
  <text x="440" y="158" font-family="sans-serif" font-size="20" text-anchor="middle" fill="black">18 g / mol</text>
  <text x="440" y="192" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">1 + 1 + 16 = 18</text>

  <!-- divider -->
  <line x1="40" y1="225" x2="560" y2="225" stroke="black" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- CARBON DIOXIDE row -->
  <text x="70" y="262" font-family="sans-serif" font-size="16" fill="black">Carbon dioxide, CO2:</text>
  <!-- C atom -->
  <circle cx="120" cy="310" r="24" fill="none" stroke="black" stroke-width="2"/>
  <text x="120" y="311" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">C</text>
  <text x="120" y="352" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">12</text>
  <text x="160" y="315" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">+</text>
  <!-- O atom -->
  <circle cx="200" cy="310" r="28" fill="none" stroke="black" stroke-width="2"/>
  <text x="200" y="311" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">O</text>
  <text x="200" y="356" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">16</text>
  <text x="245" y="315" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">+</text>
  <!-- O atom -->
  <circle cx="290" cy="310" r="28" fill="none" stroke="black" stroke-width="2"/>
  <text x="290" y="311" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">O</text>
  <text x="290" y="356" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">16</text>
  <text x="335" y="315" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">=</text>
  <rect x="365" y="288" width="150" height="46" fill="none" stroke="black" stroke-width="2"/>
  <text x="440" y="318" font-family="sans-serif" font-size="20" text-anchor="middle" fill="black">44 g / mol</text>
  <text x="440" y="352" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">12 + 16 + 16 = 44</text>
</svg>
