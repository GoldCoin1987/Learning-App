<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect x="0" y="0" width="600" height="380" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Squeeze a Gas: Less Space, More Pressure</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Same particles in a smaller space hit the walls more often.</text>

  <!-- BIG box: low pressure -->
  <rect x="40" y="80" width="220" height="200" fill="none" stroke="black" stroke-width="3"/>
  <text x="150" y="104" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">BIG SPACE</text>
  <text x="150" y="120" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">particles spread out</text>
  <circle cx="90" cy="160" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="200" cy="150" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="130" cy="210" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="220" cy="225" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="80" cy="245" r="9" fill="none" stroke="black" stroke-width="2"/>
  <text x="150" y="270" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">few wall-hits = LOW pressure</text>

  <!-- arrow with PUSH / squeeze label -->
  <text x="300" y="175" font-family="sans-serif" font-size="30" text-anchor="middle" fill="black">&#8594;</text>
  <text x="300" y="150" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">SQUEEZE</text>
  <text x="300" y="198" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">push the</text>
  <text x="300" y="212" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">plunger in</text>

  <!-- SMALL box: high pressure (same 5 particles, packed closer) -->
  <rect x="340" y="80" width="110" height="200" fill="none" stroke="black" stroke-width="3"/>
  <text x="395" y="104" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">SMALL</text>
  <text x="395" y="120" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">SPACE</text>
  <circle cx="370" cy="160" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="420" cy="155" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="385" cy="195" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="425" cy="210" r="9" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="375" cy="235" r="9" fill="none" stroke="black" stroke-width="2"/>
  <!-- collision bursts on the walls of the small box -->
  <line x1="340" y1="170" x2="332" y2="167" stroke="black" stroke-width="1.5"/>
  <line x1="340" y1="200" x2="332" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="450" y1="160" x2="458" y2="157" stroke="black" stroke-width="1.5"/>
  <line x1="450" y1="215" x2="458" y2="218" stroke="black" stroke-width="1.5"/>
  <text x="395" y="305" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">many wall-hits =</text>
  <text x="395" y="321" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">HIGH pressure</text>

  <text x="300" y="352" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Halve the volume &#8594; about DOUBLE the pressure. (Boyle's idea, in words.)</text>
  <text x="300" y="372" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Hook: a blocked syringe gets harder to push the more you squeeze.</text>
</svg>
