<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Reading One Cell of the Table</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Each box holds a symbol, an atomic number, and an atomic mass.</text>

  <!-- the zoomed cell -->
  <rect x="210" y="90" width="180" height="200" fill="none" stroke="black" stroke-width="2.5"/>

  <!-- atomic number (top) -->
  <text x="230" y="125" font-family="sans-serif" font-size="26" fill="black">6</text>

  <!-- symbol (big, center) -->
  <text x="300" y="210" font-family="sans-serif" font-size="72" text-anchor="middle" fill="black">C</text>

  <!-- name -->
  <text x="300" y="245" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Carbon</text>

  <!-- atomic mass (bottom) -->
  <text x="300" y="278" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">12.0</text>

  <!-- callout: atomic number -->
  <line x1="210" y1="115" x2="120" y2="115" stroke="black" stroke-width="1"/>
  <polygon points="210,115 202,111 202,119" fill="black"/>
  <text x="115" y="108" font-family="sans-serif" font-size="12" text-anchor="end" fill="black">ATOMIC NUMBER = 6</text>
  <text x="115" y="123" font-family="sans-serif" font-size="12" text-anchor="end" fill="black">(number of protons)</text>

  <!-- callout: symbol -->
  <line x1="390" y1="195" x2="480" y2="195" stroke="black" stroke-width="1"/>
  <polygon points="390,195 398,191 398,199" fill="black"/>
  <text x="485" y="190" font-family="sans-serif" font-size="12" fill="black">SYMBOL</text>
  <text x="485" y="205" font-family="sans-serif" font-size="12" fill="black">(shorthand name)</text>

  <!-- callout: atomic mass -->
  <line x1="390" y1="274" x2="480" y2="274" stroke="black" stroke-width="1"/>
  <polygon points="390,274 398,270 398,278" fill="black"/>
  <text x="485" y="269" font-family="sans-serif" font-size="12" fill="black">ATOMIC MASS</text>
  <text x="485" y="284" font-family="sans-serif" font-size="12" fill="black">(roughly how heavy)</text>

  <text x="300" y="335" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The atomic number (protons) is the element's ID, just as we learned for atoms.</text>
  <text x="300" y="358" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Here: 6 protons means this box is always carbon.</text>
</svg>
