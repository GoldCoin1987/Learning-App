<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect x="0" y="0" width="600" height="380" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">The Three Common States: Same Particles, Different Spacing</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">State depends on how close the particles are and how much they move.</text>

  <!-- SOLID -->
  <rect x="30" y="70" width="160" height="150" fill="none" stroke="black" stroke-width="2"/>
  <text x="110" y="90" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">SOLID</text>
  <circle cx="60" cy="120" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="90" cy="120" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="120" cy="120" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="150" cy="120" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="60" cy="150" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="90" cy="150" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="120" cy="150" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="150" cy="150" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="60" cy="180" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="90" cy="180" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="120" cy="180" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="150" cy="180" r="10" fill="none" stroke="black" stroke-width="2"/>
  <text x="110" y="208" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">packed tight, only vibrate</text>

  <!-- LIQUID -->
  <rect x="220" y="70" width="160" height="150" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="90" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">LIQUID</text>
  <circle cx="255" cy="125" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="295" cy="118" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="335" cy="130" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="270" cy="158" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="312" cy="152" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="350" cy="165" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="252" cy="190" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="293" cy="186" r="10" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="333" cy="194" r="10" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="208" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">close, but slide past</text>

  <!-- GAS -->
  <rect x="410" y="70" width="160" height="150" fill="none" stroke="black" stroke-width="2"/>
  <text x="490" y="90" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">GAS</text>
  <circle cx="445" cy="120" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="445" y1="120" x2="465" y2="108" stroke="black" stroke-width="1.5"/>
  <circle cx="520" cy="116" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="520" y1="116" x2="500" y2="106" stroke="black" stroke-width="1.5"/>
  <circle cx="478" cy="160" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="478" y1="160" x2="496" y2="172" stroke="black" stroke-width="1.5"/>
  <circle cx="540" cy="172" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="540" y1="172" x2="522" y2="182" stroke="black" stroke-width="1.5"/>
  <circle cx="450" cy="198" r="10" fill="none" stroke="black" stroke-width="2"/>
  <line x1="450" y1="198" x2="470" y2="206" stroke="black" stroke-width="1.5"/>
  <text x="490" y="208" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">far apart, zoom freely</text>

  <!-- behavior labels row -->
  <text x="110" y="250" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">fixed SHAPE</text>
  <text x="110" y="266" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">fixed VOLUME</text>
  <text x="110" y="282" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(ice)</text>

  <text x="300" y="250" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">takes container SHAPE</text>
  <text x="300" y="266" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">fixed VOLUME, flows</text>
  <text x="300" y="282" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(water)</text>

  <text x="490" y="250" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">fills any container</text>
  <text x="490" y="266" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">easily squashed</text>
  <text x="490" y="282" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">(steam)</text>

  <text x="300" y="320" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">More energy = particles move more and spread out: solid then liquid then gas.</text>
  <text x="300" y="344" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">PLASMA (a 4th state): super-hot, charged particles - found in stars and neon signs.</text>
</svg>
