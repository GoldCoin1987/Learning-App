<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect x="0" y="0" width="600" height="380" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Isotopes: Same Element, Different Neutrons</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Both are carbon (6 protons). Only the number of neutrons is different.</text>

  <!-- Carbon-12 -->
  <text x="160" y="84" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">CARBON-12</text>
  <circle cx="160" cy="190" r="55" fill="none" stroke="black" stroke-width="2"/>
  <!-- 6 protons (+) -->
  <circle cx="140" cy="168" r="9" fill="none" stroke="black" stroke-width="2"/><text x="140" y="172" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">+</text>
  <circle cx="160" cy="168" r="9" fill="none" stroke="black" stroke-width="2"/><text x="160" y="172" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">+</text>
  <circle cx="180" cy="168" r="9" fill="none" stroke="black" stroke-width="2"/><text x="180" y="172" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">+</text>
  <circle cx="140" cy="210" r="9" fill="none" stroke="black" stroke-width="2"/><text x="140" y="214" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">+</text>
  <circle cx="160" cy="210" r="9" fill="none" stroke="black" stroke-width="2"/><text x="160" y="214" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">+</text>
  <circle cx="180" cy="210" r="9" fill="none" stroke="black" stroke-width="2"/><text x="180" y="214" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">+</text>
  <!-- 6 neutrons (0) -->
  <circle cx="130" cy="189" r="9" fill="none" stroke="black" stroke-width="2"/><text x="130" y="193" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <circle cx="150" cy="189" r="9" fill="none" stroke="black" stroke-width="2"/><text x="150" y="193" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <circle cx="170" cy="189" r="9" fill="none" stroke="black" stroke-width="2"/><text x="170" y="193" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <circle cx="190" cy="189" r="9" fill="none" stroke="black" stroke-width="2"/><text x="190" y="193" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <circle cx="150" cy="229" r="9" fill="none" stroke="black" stroke-width="2"/><text x="150" y="233" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <circle cx="170" cy="229" r="9" fill="none" stroke="black" stroke-width="2"/><text x="170" y="233" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <text x="160" y="268" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">6 protons</text>
  <text x="160" y="286" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">6 neutrons</text>

  <!-- Carbon-14 -->
  <text x="440" y="84" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">CARBON-14</text>
  <circle cx="440" cy="190" r="55" fill="none" stroke="black" stroke-width="2"/>
  <!-- 6 protons (+) -->
  <circle cx="420" cy="168" r="9" fill="none" stroke="black" stroke-width="2"/><text x="420" y="172" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">+</text>
  <circle cx="440" cy="168" r="9" fill="none" stroke="black" stroke-width="2"/><text x="440" y="172" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">+</text>
  <circle cx="460" cy="168" r="9" fill="none" stroke="black" stroke-width="2"/><text x="460" y="172" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">+</text>
  <circle cx="420" cy="210" r="9" fill="none" stroke="black" stroke-width="2"/><text x="420" y="214" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">+</text>
  <circle cx="440" cy="210" r="9" fill="none" stroke="black" stroke-width="2"/><text x="440" y="214" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">+</text>
  <circle cx="460" cy="210" r="9" fill="none" stroke="black" stroke-width="2"/><text x="460" y="214" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">+</text>
  <!-- 8 neutrons (0) -->
  <circle cx="408" cy="189" r="9" fill="none" stroke="black" stroke-width="2"/><text x="408" y="193" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <circle cx="428" cy="189" r="9" fill="none" stroke="black" stroke-width="2"/><text x="428" y="193" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <circle cx="452" cy="189" r="9" fill="none" stroke="black" stroke-width="2"/><text x="452" y="193" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <circle cx="472" cy="189" r="9" fill="none" stroke="black" stroke-width="2"/><text x="472" y="193" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <circle cx="418" cy="167" r="9" fill="none" stroke="black" stroke-width="2"/><text x="418" y="171" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <circle cx="462" cy="167" r="9" fill="none" stroke="black" stroke-width="2"/><text x="462" y="171" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <circle cx="428" cy="229" r="9" fill="none" stroke="black" stroke-width="2"/><text x="428" y="233" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <circle cx="452" cy="229" r="9" fill="none" stroke="black" stroke-width="2"/><text x="452" y="233" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">0</text>
  <text x="440" y="268" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">6 protons</text>
  <text x="440" y="286" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">8 neutrons</text>

  <text x="300" y="190" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">vs</text>

  <text x="300" y="326" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Same protons (6) = still carbon, same chemistry.</text>
  <text x="300" y="348" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Different neutrons (6 vs 8) = slightly different mass.</text>
</svg>
