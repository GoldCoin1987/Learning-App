<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Mass Number = Protons + Neutrons</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Electrons are too light to count for mass, so we add up only protons and neutrons.</text>

  <!-- worked example: carbon -->
  <text x="300" y="84" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Example: an ordinary carbon atom</text>

  <!-- protons box -->
  <rect x="60" y="110" width="150" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="135" y="134" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">PROTONS</text>
  <circle cx="95" cy="165" r="10" fill="none" stroke="black" stroke-width="2"/><text x="95" y="169" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">+</text>
  <circle cx="125" cy="165" r="10" fill="none" stroke="black" stroke-width="2"/><text x="125" y="169" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">+</text>
  <circle cx="155" cy="165" r="10" fill="none" stroke="black" stroke-width="2"/><text x="155" y="169" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">+</text>
  <circle cx="95" cy="195" r="10" fill="none" stroke="black" stroke-width="2"/><text x="95" y="199" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">+</text>
  <circle cx="125" cy="195" r="10" fill="none" stroke="black" stroke-width="2"/><text x="125" y="199" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">+</text>
  <circle cx="155" cy="195" r="10" fill="none" stroke="black" stroke-width="2"/><text x="155" y="199" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">+</text>
  <text x="135" y="222" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">6 protons</text>

  <text x="240" y="178" font-family="sans-serif" font-size="28" text-anchor="middle" fill="black">+</text>

  <!-- neutrons box -->
  <rect x="270" y="110" width="150" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="345" y="134" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">NEUTRONS</text>
  <circle cx="305" cy="165" r="10" fill="none" stroke="black" stroke-width="2"/><text x="305" y="169" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">0</text>
  <circle cx="335" cy="165" r="10" fill="none" stroke="black" stroke-width="2"/><text x="335" y="169" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">0</text>
  <circle cx="365" cy="165" r="10" fill="none" stroke="black" stroke-width="2"/><text x="365" y="169" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">0</text>
  <circle cx="305" cy="195" r="10" fill="none" stroke="black" stroke-width="2"/><text x="305" y="199" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">0</text>
  <circle cx="335" cy="195" r="10" fill="none" stroke="black" stroke-width="2"/><text x="335" y="199" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">0</text>
  <circle cx="365" cy="195" r="10" fill="none" stroke="black" stroke-width="2"/><text x="365" y="199" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">0</text>
  <text x="345" y="222" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">6 neutrons</text>

  <text x="455" y="178" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">=</text>

  <!-- result -->
  <rect x="480" y="130" width="100" height="80" fill="none" stroke="black" stroke-width="2"/>
  <text x="530" y="160" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">MASS</text>
  <text x="530" y="178" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">NUMBER</text>
  <text x="530" y="200" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">12</text>

  <text x="300" y="270" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">6 protons + 6 neutrons = mass number 12</text>
  <text x="300" y="298" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The 6 electrons add almost nothing to the mass, so we leave them out.</text>
  <text x="300" y="322" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A neutral atom has 6 electrons too, so + and - charges cancel out.</text>
</svg>
