<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">The Table's Mass = Grams per Mole</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Carbon's atomic mass is 12, so 1 mole of carbon weighs 12 grams.</text>

  <!-- periodic table cell for carbon -->
  <rect x="70" y="100" width="150" height="160" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="88" y="130" font-family="sans-serif" font-size="22" fill="black">6</text>
  <text x="145" y="195" font-family="sans-serif" font-size="60" text-anchor="middle" fill="black">C</text>
  <text x="145" y="225" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Carbon</text>
  <text x="145" y="250" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">12</text>

  <!-- callout to the mass number -->
  <line x1="220" y1="246" x2="270" y2="246" stroke="black" stroke-width="1"/>
  <polygon points="220,246 228,242 228,250" fill="black"/>
  <text x="145" y="285" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">atomic mass = 12</text>

  <!-- big arrow pointing right -->
  <line x1="280" y1="180" x2="360" y2="180" stroke="black" stroke-width="2.5"/>
  <polygon points="360,180 348,172 348,188" fill="black"/>
  <text x="320" y="168" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">means</text>

  <!-- a scale showing 12 g of carbon -->
  <text x="475" y="115" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">1 MOLE of carbon</text>
  <!-- pan -->
  <ellipse cx="475" cy="170" rx="70" ry="14" fill="none" stroke="black" stroke-width="2"/>
  <!-- little pile of carbon on the pan -->
  <circle cx="455" cy="160" r="5" fill="black"/>
  <circle cx="468" cy="156" r="5" fill="black"/>
  <circle cx="481" cy="160" r="5" fill="black"/>
  <circle cx="494" cy="156" r="5" fill="black"/>
  <circle cx="462" cy="150" r="5" fill="black"/>
  <circle cx="476" cy="148" r="5" fill="black"/>
  <circle cx="489" cy="150" r="5" fill="black"/>
  <!-- post and base of scale -->
  <line x1="475" y1="184" x2="475" y2="250" stroke="black" stroke-width="2"/>
  <rect x="425" y="250" width="100" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="475" y="276" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">12 g</text>

  <text x="300" y="330" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">The number on the table IS the weight, in grams, of one mole of the element.</text>
  <text x="300" y="354" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Hydrogen = 1 g per mole, oxygen = 16 g per mole, carbon = 12 g per mole.</text>
  <text x="300" y="380" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Think of the table as a menu giving the weight of one mole of each element.</text>
</svg>
