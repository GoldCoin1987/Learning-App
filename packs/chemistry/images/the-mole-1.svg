<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Counting in Groups: a Dozen vs a Mole</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A counting word stands for a fixed number of things.</text>

  <!-- left box: a dozen eggs = 12 -->
  <rect x="40" y="80" width="230" height="230" fill="none" stroke="black" stroke-width="2"/>
  <text x="155" y="105" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">A DOZEN = 12</text>

  <!-- 12 eggs as a 4x3 grid of ovals -->
  <ellipse cx="75" cy="140" rx="13" ry="17" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="120" cy="140" rx="13" ry="17" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="165" cy="140" rx="13" ry="17" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="210" cy="140" rx="13" ry="17" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="75" cy="185" rx="13" ry="17" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="120" cy="185" rx="13" ry="17" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="165" cy="185" rx="13" ry="17" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="210" cy="185" rx="13" ry="17" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="75" cy="230" rx="13" ry="17" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="120" cy="230" rx="13" ry="17" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="165" cy="230" rx="13" ry="17" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="210" cy="230" rx="13" ry="17" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="155" y="285" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">always exactly 12 eggs</text>

  <!-- right box: a mole = ~6 x 10^23 -->
  <rect x="330" y="80" width="230" height="230" fill="none" stroke="black" stroke-width="2"/>
  <text x="445" y="105" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">A MOLE = about</text>
  <text x="445" y="128" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">6 followed by 23 zeros</text>

  <!-- a dense pile of tiny dots = atoms -->
  <circle cx="365" cy="160" r="4" fill="black"/>
  <circle cx="385" cy="155" r="4" fill="black"/>
  <circle cx="405" cy="162" r="4" fill="black"/>
  <circle cx="425" cy="156" r="4" fill="black"/>
  <circle cx="445" cy="163" r="4" fill="black"/>
  <circle cx="465" cy="157" r="4" fill="black"/>
  <circle cx="485" cy="162" r="4" fill="black"/>
  <circle cx="505" cy="156" r="4" fill="black"/>
  <circle cx="525" cy="161" r="4" fill="black"/>
  <circle cx="375" cy="180" r="4" fill="black"/>
  <circle cx="395" cy="185" r="4" fill="black"/>
  <circle cx="415" cy="178" r="4" fill="black"/>
  <circle cx="435" cy="184" r="4" fill="black"/>
  <circle cx="455" cy="179" r="4" fill="black"/>
  <circle cx="475" cy="185" r="4" fill="black"/>
  <circle cx="495" cy="180" r="4" fill="black"/>
  <circle cx="515" cy="184" r="4" fill="black"/>
  <circle cx="365" cy="205" r="4" fill="black"/>
  <circle cx="385" cy="210" r="4" fill="black"/>
  <circle cx="405" cy="203" r="4" fill="black"/>
  <circle cx="425" cy="209" r="4" fill="black"/>
  <circle cx="445" cy="204" r="4" fill="black"/>
  <circle cx="465" cy="210" r="4" fill="black"/>
  <circle cx="485" cy="205" r="4" fill="black"/>
  <circle cx="505" cy="209" r="4" fill="black"/>
  <circle cx="525" cy="204" r="4" fill="black"/>
  <circle cx="375" cy="230" r="4" fill="black"/>
  <circle cx="395" cy="235" r="4" fill="black"/>
  <circle cx="415" cy="228" r="4" fill="black"/>
  <circle cx="435" cy="234" r="4" fill="black"/>
  <circle cx="455" cy="229" r="4" fill="black"/>
  <circle cx="475" cy="235" r="4" fill="black"/>
  <circle cx="495" cy="230" r="4" fill="black"/>
  <circle cx="515" cy="234" r="4" fill="black"/>
  <text x="445" y="270" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">a giant pile of atoms,</text>
  <text x="445" y="288" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">far too many to count</text>

  <text x="300" y="340" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Both are just counting words: a dozen always means 12;</text>
  <text x="300" y="360" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">a mole always means about 6 x 10 to the 23 particles.</text>
  <text x="300" y="384" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">We weigh rice or buy paper by the ream instead of counting each piece.</text>
</svg>
