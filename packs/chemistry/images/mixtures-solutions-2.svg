<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">A Solution: Solute Dissolved Evenly in Solvent</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Salt water: a few salt particles spread out among many water particles.</text>

  <!-- the glass -->
  <path d="M150 80 L450 80 L425 320 L175 320 Z" fill="none" stroke="black" stroke-width="2"/>

  <!-- water particles: many open circles (solvent) -->
  <circle cx="195" cy="120" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="245" cy="120" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="295" cy="120" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="345" cy="120" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="395" cy="120" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="220" cy="160" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="270" cy="160" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="320" cy="160" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="370" cy="160" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="200" cy="200" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="250" cy="200" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="300" cy="200" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="350" cy="200" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="400" cy="200" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="225" cy="240" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="275" cy="240" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="325" cy="240" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="375" cy="240" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="245" cy="280" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="295" cy="280" r="11" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="345" cy="280" r="11" fill="none" stroke="black" stroke-width="2"/>

  <!-- salt particles: a few filled dots, evenly scattered (solute) -->
  <circle cx="270" cy="120" r="6" fill="black"/>
  <circle cx="345" cy="160" r="6" fill="black"/>
  <circle cx="225" cy="200" r="6" fill="black"/>
  <circle cx="375" cy="200" r="6" fill="black"/>
  <circle cx="300" cy="240" r="6" fill="black"/>
  <circle cx="320" cy="280" r="6" fill="black"/>

  <!-- labels with leader lines -->
  <line x1="270" y1="120" x2="120" y2="100" stroke="black" stroke-width="1.5"/>
  <text x="118" y="96" font-family="sans-serif" font-size="13" text-anchor="end" fill="black">SOLUTE (salt)</text>
  <text x="118" y="112" font-family="sans-serif" font-size="11" text-anchor="end" fill="black">what dissolves; smaller amount</text>

  <line x1="320" y1="160" x2="480" y2="140" stroke="black" stroke-width="1.5"/>
  <text x="486" y="136" font-family="sans-serif" font-size="13" text-anchor="start" fill="black">SOLVENT (water)</text>
  <text x="486" y="152" font-family="sans-serif" font-size="11" text-anchor="start" fill="black">does the dissolving; larger amount</text>

  <text x="300" y="345" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">SOLUTE + SOLVENT = SOLUTION (a uniform mixture, spread out evenly).</text>
</svg>
