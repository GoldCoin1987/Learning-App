<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Element vs Compound vs Mixture</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">An element is one kind of atom. A compound is different atoms BONDED. A mixture is just mixed.</text>

  <!-- Panel 1: ELEMENT -->
  <rect x="20" y="70" width="175" height="250" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="107" y="92" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">ELEMENT</text>
  <text x="107" y="110" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">one kind of atom</text>
  <circle cx="70" cy="160" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="70" y="164" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">O</text>
  <circle cx="140" cy="200" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="140" y="204" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">O</text>
  <circle cx="80" cy="250" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="80" y="254" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">O</text>
  <text x="107" y="305" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">all the same</text>

  <!-- Panel 2: COMPOUND -->
  <rect x="212" y="70" width="175" height="250" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="300" y="92" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">COMPOUND</text>
  <text x="300" y="110" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">different atoms BONDED</text>
  <!-- water unit 1: O bonded to two H -->
  <line x1="270" y1="170" x2="300" y2="155" stroke="black" stroke-width="2"/>
  <line x1="300" y1="155" x2="330" y2="170" stroke="black" stroke-width="2"/>
  <circle cx="300" cy="155" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="159" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">O</text>
  <circle cx="262" cy="178" r="12" fill="none" stroke="black" stroke-width="2"/>
  <text x="262" y="182" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">H</text>
  <circle cx="338" cy="178" r="12" fill="none" stroke="black" stroke-width="2"/>
  <text x="338" y="182" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">H</text>
  <!-- water unit 2 -->
  <line x1="270" y1="255" x2="300" y2="240" stroke="black" stroke-width="2"/>
  <line x1="300" y1="240" x2="330" y2="255" stroke="black" stroke-width="2"/>
  <circle cx="300" cy="240" r="16" fill="none" stroke="black" stroke-width="2"/>
  <text x="300" y="244" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">O</text>
  <circle cx="262" cy="263" r="12" fill="none" stroke="black" stroke-width="2"/>
  <text x="262" y="267" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">H</text>
  <circle cx="338" cy="263" r="12" fill="none" stroke="black" stroke-width="2"/>
  <text x="338" y="267" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">H</text>
  <text x="300" y="305" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">water (H2O) units</text>

  <!-- Panel 3: MIXTURE -->
  <rect x="404" y="70" width="176" height="250" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="492" y="92" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">MIXTURE</text>
  <text x="492" y="110" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">mixed, NOT bonded</text>
  <circle cx="445" cy="155" r="14" fill="none" stroke="black" stroke-width="2"/>
  <text x="445" y="159" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">O</text>
  <circle cx="520" cy="165" r="11" fill="none" stroke="black" stroke-width="2"/>
  <text x="520" y="169" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">H</text>
  <circle cx="480" cy="200" r="14" fill="none" stroke="black" stroke-width="2"/>
  <text x="480" y="204" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">N</text>
  <circle cx="540" cy="215" r="11" fill="none" stroke="black" stroke-width="2"/>
  <text x="540" y="219" font-family="sans-serif" font-size="9" text-anchor="middle" fill="black">H</text>
  <circle cx="440" cy="245" r="14" fill="none" stroke="black" stroke-width="2"/>
  <text x="440" y="249" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">O</text>
  <circle cx="510" cy="255" r="14" fill="none" stroke="black" stroke-width="2"/>
  <text x="510" y="259" font-family="sans-serif" font-size="10" text-anchor="middle" fill="black">N</text>
  <text x="492" y="305" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">can be separated again</text>

  <text x="300" y="345" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Sticks between atoms = bonds. A compound's atoms are joined; a mixture's are just near each other.</text>
  <text x="300" y="368" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Like-letters bonded into a WORD (compound) vs letters tossed loose in a BAG (mixture).</text>
</svg>
