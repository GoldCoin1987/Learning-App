<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect x="0" y="0" width="600" height="380" fill="white"/>
  <text x="300" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Activation Energy: the Hill a Reaction Must Climb</text>
  <text x="300" y="48" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Even an energy-releasing reaction needs a small PUSH to get started.</text>

  <!-- axes -->
  <line x1="70" y1="320" x2="560" y2="320" stroke="black" stroke-width="2"/>
  <line x1="70" y1="320" x2="70" y2="80" stroke="black" stroke-width="2"/>
  <text x="40" y="200" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black" transform="rotate(-90 40 200)">energy</text>
  <text x="315" y="350" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">progress of reaction &#8594;</text>

  <!-- the hill curve: start mid-left, up over hill, down to lower products -->
  <path d="M90 250 Q150 250 200 130 Q230 90 270 130 Q320 250 480 290" fill="none" stroke="black" stroke-width="2.5"/>

  <!-- reactants label -->
  <line x1="90" y1="250" x2="130" y2="250" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="100" y="240" font-family="sans-serif" font-size="12" text-anchor="start" fill="black">reactants</text>

  <!-- top of hill -->
  <circle cx="240" cy="100" r="5" fill="black"/>
  <text x="240" y="90" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">top of the hill</text>

  <!-- activation energy bracket -->
  <line x1="300" y1="250" x2="300" y2="102" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="296" y1="250" x2="304" y2="250" stroke="black" stroke-width="1.5"/>
  <line x1="296" y1="102" x2="304" y2="102" stroke="black" stroke-width="1.5"/>
  <text x="312" y="180" font-family="sans-serif" font-size="12" text-anchor="start" fill="black">activation</text>
  <text x="312" y="196" font-family="sans-serif" font-size="12" text-anchor="start" fill="black">energy (the hill)</text>

  <!-- products label -->
  <line x1="440" y1="290" x2="490" y2="290" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="470" y="308" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">products</text>

  <!-- spark / match starting it -->
  <text x="150" y="200" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">&#9889;</text>
  <text x="150" y="222" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">a spark / strike to start</text>

  <text x="300" y="375" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Like a ball needing a push over a hill before it rolls down the other side.</text>
</svg>
