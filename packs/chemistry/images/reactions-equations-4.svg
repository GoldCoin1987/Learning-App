<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">Coefficient vs Subscript</text>
  <text x="300" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">To BALANCE, change the big FRONT number (coefficient). Never change the small subscript.</text>

  <!-- big example 2 H2O -->
  <text x="270" y="160" font-family="sans-serif" font-size="80" text-anchor="middle" fill="black">2</text>
  <text x="330" y="160" font-family="sans-serif" font-size="80" text-anchor="middle" fill="black">H</text>
  <text x="372" y="182" font-family="sans-serif" font-size="44" text-anchor="middle" fill="black">2</text>
  <text x="412" y="160" font-family="sans-serif" font-size="80" text-anchor="middle" fill="black">O</text>

  <!-- coefficient callout -->
  <line x1="270" y1="200" x2="270" y2="240" stroke="black" stroke-width="1.5" marker-end="url(#arrowDn)"/>
  <rect x="90" y="245" width="220" height="95" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="200" y="268" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">COEFFICIENT (front)</text>
  <text x="200" y="290" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">big number in FRONT</text>
  <text x="200" y="308" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">multiplies the WHOLE molecule</text>
  <text x="200" y="328" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">CHANGE this to balance</text>

  <!-- subscript callout -->
  <line x1="372" y1="200" x2="372" y2="240" stroke="black" stroke-width="1.5" marker-end="url(#arrowDn)"/>
  <rect x="330" y="245" width="220" height="95" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="440" y="268" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">SUBSCRIPT (small, low)</text>
  <text x="440" y="290" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">small number low down</text>
  <text x="440" y="308" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">counts atoms INSIDE one molecule</text>
  <text x="440" y="328" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">do NOT change (it makes new stuff)</text>

  <text x="300" y="372" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">"2 H2O" means 2 whole water molecules = 4 H and 2 O atoms in all.</text>

  <defs>
    <marker id="arrowDn" markerWidth="10" markerHeight="10" refX="3" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,0 L3,6 Z" fill="black"/>
    </marker>
  </defs>
</svg>
