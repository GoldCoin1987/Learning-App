<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="150" y="24">Honesty about a flaw</text>
  </g>

  <!-- LEFT: faking / hiding data = WRONG -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="56">Fake data or hide a flaw</text>
  </g>
  <!-- document with a flaw being covered -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="50" y="74" width="120" height="140"/>
    <line x1="66" y1="98" x2="154" y2="98"/>
    <line x1="66" y1="120" x2="154" y2="120"/>
    <line x1="66" y1="142" x2="120" y2="142"/>
  </g>
  <!-- the flaw, scribbled over -->
  <g stroke="black" stroke-width="1.5">
    <line x1="66" y1="166" x2="154" y2="166"/>
    <line x1="66" y1="176" x2="154" y2="176"/>
    <line x1="66" y1="186" x2="154" y2="186"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="64" y="206">flaw covered up</text>
  </g>
  <!-- big X -->
  <g stroke="black" stroke-width="3">
    <line x1="70" y1="84" x2="150" y2="204"/>
    <line x1="150" y1="84" x2="70" y2="204"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="86" y="238">WRONG</text>
  </g>

  <!-- divider -->
  <g stroke="black" stroke-width="1">
    <line x1="240" y1="40" x2="240" y2="280"/>
  </g>

  <!-- RIGHT: report it honestly = RIGHT -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="270" y="56">Report the flaw honestly</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="300" y="74" width="120" height="140"/>
    <line x1="316" y1="98" x2="404" y2="98"/>
    <line x1="316" y1="120" x2="404" y2="120"/>
    <line x1="316" y1="142" x2="404" y2="142"/>
    <line x1="316" y1="164" x2="404" y2="164"/>
    <line x1="316" y1="186" x2="370" y2="186"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="314" y="206">flaw written down</text>
  </g>
  <!-- big check -->
  <g stroke="black" stroke-width="3" fill="none">
    <polyline points="316,150 348,196 412,96"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="326" y="238">RIGHT</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="34" y="302">Be honest: never fake results or hide problems, even when the truth is inconvenient.</text>
  </g>
</svg>
