<svg xmlns="http://www.w3.org/2000/svg" width="440" height="320" viewBox="0 0 440 320">
  <rect width="440" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="40" y="24">Break a big goal into small tasks (some must wait)</text>
  </g>
  <!-- big goal box -->
  <g stroke="black" stroke-width="2" fill="none">
    <rect x="150" y="40" width="140" height="34"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="166" y="62">BIG GOAL: redo room</text>
  </g>
  <!-- split-down arrow -->
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="220" y1="74" x2="220" y2="98"/>
    <polygon points="220,106 215,96 225,96" fill="black"/>
  </g>
  <!-- task chain with dependencies -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="120" width="80" height="40"/>
    <rect x="150" y="120" width="80" height="40"/>
    <rect x="260" y="120" width="80" height="40"/>
    <rect x="150" y="210" width="80" height="40"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="62" y="144">1. Demo</text>
    <text x="166" y="144">2. Wiring</text>
    <text x="277" y="144">3. Drywall</text>
    <text x="170" y="234">4. Paint</text>
  </g>
  <!-- arrows between tasks (dependencies) -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="120" y1="140" x2="148" y2="140"/>
    <polygon points="150,140 142,135 142,145" fill="black"/>
    <line x1="230" y1="140" x2="258" y2="140"/>
    <polygon points="260,140 252,135 252,145" fill="black"/>
    <line x1="300" y1="160" x2="220" y2="208"/>
    <polygon points="214,212 224,209 220,200" fill="black"/>
  </g>
  <!-- dependency note -->
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="250" y="184">can't paint before</text>
    <text x="250" y="197">the wall is up</text>
  </g>
  <!-- milestone flag -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="60" y1="250" x2="60" y2="300"/>
    <polygon points="60,252 95,262 60,272"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="40" y="314">milestone = checkpoint</text>
  </g>
</svg>
