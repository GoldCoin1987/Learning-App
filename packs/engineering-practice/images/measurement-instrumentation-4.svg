<svg xmlns="http://www.w3.org/2000/svg" width="540" height="300" viewBox="0 0 540 300">
  <rect width="540" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="150" y="24">PARALLAX: read the scale straight-on</text>
  </g>
  <!-- LEFT: angled eye = wrong -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="70" y="52">WRONG (at an angle)</text>
  </g>
  <!-- scale with needle -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="60" y="70" width="150" height="50"/>
    <line x1="85" y1="70" x2="85" y2="120"/>
    <line x1="110" y1="70" x2="110" y2="120"/>
    <line x1="135" y1="70" x2="135" y2="120"/>
    <line x1="160" y1="70" x2="160" y2="120"/>
    <line x1="185" y1="70" x2="185" y2="120"/>
  </g>
  <!-- true needle position -->
  <g stroke="black" stroke-width="2">
    <line x1="135" y1="122" x2="135" y2="70"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="118" y="138">true mark</text>
  </g>
  <!-- eye to the side -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="40" cy="210" r="14"/>
  </g>
  <g fill="black"><circle cx="44" cy="210" r="4"/></g>
  <!-- sight line crossing at an angle -->
  <g stroke="black" stroke-width="1" stroke-dasharray="4 3" fill="none">
    <line x1="54" y1="206" x2="160" y2="120"/>
  </g>
  <g fill="black">
    <polygon points="160,120 150,121 155,129"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="100" y="175">eye off to the side</text>
    <text x="120" y="248">looks like a different mark</text>
  </g>
  <!-- divider -->
  <g stroke="black" stroke-width="1" stroke-dasharray="3 4">
    <line x1="270" y1="40" x2="270" y2="270"/>
  </g>
  <!-- RIGHT: straight-on = right -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="320" y="52">RIGHT (straight-on)</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="320" y="70" width="150" height="50"/>
    <line x1="345" y1="70" x2="345" y2="120"/>
    <line x1="370" y1="70" x2="370" y2="120"/>
    <line x1="395" y1="70" x2="395" y2="120"/>
    <line x1="420" y1="70" x2="420" y2="120"/>
    <line x1="445" y1="70" x2="445" y2="120"/>
  </g>
  <g stroke="black" stroke-width="2">
    <line x1="395" y1="122" x2="395" y2="70"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="378" y="138">true mark</text>
  </g>
  <!-- eye directly below/in front -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="395" cy="210" r="14"/>
  </g>
  <g fill="black"><circle cx="395" cy="206" r="4"/></g>
  <g stroke="black" stroke-width="1" stroke-dasharray="4 3" fill="none">
    <line x1="395" y1="196" x2="395" y2="122"/>
  </g>
  <g fill="black">
    <polygon points="395,122 390,132 400,132"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="318" y="248">eye square to the scale = correct reading</text>
  </g>
</svg>
