<svg xmlns="http://www.w3.org/2000/svg" width="440" height="340" viewBox="0 0 440 340">
  <rect width="440" height="340" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="40" y="22">Symptom vs root cause</text>
  </g>
  <!-- LEFT: mopping the puddle (symptom) -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="20" y="48">Symptom: mop the puddle</text>
  </g>
  <!-- puddle -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <ellipse cx="90" cy="120" rx="55" ry="16"/>
  </g>
  <!-- mop -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="120" y1="60" x2="95" y2="108"/>
    <line x1="82" y1="104" x2="108" y2="112"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="150">the puddle</text>
    <text x="40" y="165">comes back</text>
  </g>
  <!-- RIGHT: fix the pipe (root) -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="240" y="48">Root cause: fix the pipe</text>
  </g>
  <!-- pipe with wrench -->
  <g stroke="black" stroke-width="3" fill="none">
    <line x1="250" y1="100" x2="400" y2="100"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="315" y="92" width="20" height="16"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="250" y="150">stop the leak</text>
    <text x="250" y="165">and it is gone</text>
  </g>
  <!-- divider -->
  <g stroke="black" stroke-width="1" fill="none" stroke-dasharray="4 4">
    <line x1="220" y1="40" x2="220" y2="180"/>
  </g>
  <!-- 5 whys chain -->
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="40" y="210">The "5 whys": keep asking why</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="225" width="90" height="34"/>
    <rect x="140" y="225" width="90" height="34"/>
    <rect x="260" y="225" width="90" height="34"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="246">floor wet</text>
    <text x="150" y="246">pipe drips</text>
    <text x="266" y="246">joint loose</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="110" y1="242" x2="140" y2="242"/>
    <line x1="230" y1="242" x2="260" y2="242"/>
    <line x1="350" y1="242" x2="385" y2="242"/>
  </g>
  <g fill="black">
    <polygon points="140,242 128,237 128,247"/>
    <polygon points="260,242 248,237 248,247"/>
    <polygon points="385,242 373,237 373,247"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="115" y="238">why?</text>
    <text x="235" y="238">why?</text>
    <text x="358" y="238">why?</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="295">Each "why" digs past the visible effect toward the real</text>
    <text x="40" y="313">underlying reason - fix THAT, not just the symptom.</text>
  </g>
</svg>
