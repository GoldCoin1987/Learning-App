<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300">
  <rect width="440" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="60" y="22">Diverge (many ideas) then converge (pick one)</text>
  </g>
  <!-- many idea bubbles on the left -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <ellipse cx="70" cy="70" rx="44" ry="20"/>
    <ellipse cx="70" cy="120" rx="44" ry="20"/>
    <ellipse cx="70" cy="170" rx="44" ry="20"/>
    <ellipse cx="70" cy="220" rx="44" ry="20"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="48" y="74">Idea A</text>
    <text x="48" y="124">Idea B</text>
    <text x="48" y="174">Idea C</text>
    <text x="48" y="224">Idea D</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="20" y="262">DIVERGE: generate lots</text>
  </g>
  <!-- funnel converging -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="118" y1="58" x2="300" y2="130"/>
    <line x1="118" y1="232" x2="300" y2="160"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="150" y="118">narrow</text>
    <text x="150" y="180">down</text>
  </g>
  <!-- chosen concept on the right -->
  <g stroke="black" stroke-width="2.5" fill="none">
    <rect x="305" y="118" width="115" height="54"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="318" y="142">CHOSEN</text>
    <text x="318" y="160">concept</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="295" y="200">CONVERGE: pick the best</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="288">Don't fall in love with your first idea - the best one is often not the first.</text>
  </g>
</svg>
