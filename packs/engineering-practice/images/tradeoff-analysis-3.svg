<svg xmlns="http://www.w3.org/2000/svg" width="460" height="300" viewBox="0 0 460 300">
  <rect width="460" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="70" y="22">A decision matrix: score, weight, add up</text>
  </g>
  <!-- table grid -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="40" width="400" height="160"/>
    <line x1="150" y1="40" x2="150" y2="200"/>
    <line x1="250" y1="40" x2="250" y2="200"/>
    <line x1="350" y1="40" x2="350" y2="200"/>
    <line x1="30" y1="80" x2="430" y2="80"/>
    <line x1="30" y1="120" x2="430" y2="120"/>
    <line x1="30" y1="160" x2="430" y2="160"/>
  </g>
  <!-- column headers -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="64">Option</text>
    <text x="158" y="58">Price</text>
    <text x="158" y="74">(weight 3)</text>
    <text x="258" y="58">Battery</text>
    <text x="258" y="74">(weight 2)</text>
    <text x="360" y="64">Total</text>
  </g>
  <!-- row: Phone A -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="104">Phone A</text>
    <text x="185" y="104">4</text>
    <text x="285" y="104">2</text>
    <text x="360" y="104">4x3+2x2=16</text>
  </g>
  <!-- row: Phone B (winner) -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="144">Phone B</text>
    <text x="185" y="144">3</text>
    <text x="285" y="144">5</text>
    <text x="360" y="144">3x3+5x2=19</text>
  </g>
  <!-- row: Phone C -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="184">Phone C</text>
    <text x="185" y="184">2</text>
    <text x="285" y="184">4</text>
    <text x="360" y="184">2x3+4x2=14</text>
  </g>
  <!-- winner box -->
  <g stroke="black" stroke-width="2.5" fill="none">
    <rect x="350" y="120" width="80" height="40"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="230">Rate each 1-5, multiply by importance (weight), add the row.</text>
    <text x="30" y="250">Highest total wins: Phone B = 19. The matrix just organizes the comparison.</text>
    <text x="30" y="270">Garbage weights give a garbage answer - you still must judge.</text>
  </g>
</svg>
