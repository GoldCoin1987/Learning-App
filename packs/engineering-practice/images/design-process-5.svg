<svg xmlns="http://www.w3.org/2000/svg" width="460" height="320" viewBox="0 0 460 320">
  <rect width="460" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="90" y="22">The V-model: every test mirrors a requirement</text>
  </g>
  <!-- left (down) side: plan/requirements -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="50" width="130" height="34"/>
    <rect x="70" y="110" width="130" height="34"/>
    <rect x="110" y="170" width="130" height="34"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="71">Requirements</text>
    <text x="92" y="131">Design</text>
    <text x="120" y="191">Detailed design</text>
  </g>
  <!-- bottom: build -->
  <g stroke="black" stroke-width="2.5" fill="none">
    <rect x="165" y="232" width="130" height="36"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="200" y="255">BUILD it</text>
  </g>
  <!-- right (up) side: verify/test -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="300" y="50" width="130" height="34"/>
    <rect x="260" y="110" width="130" height="34"/>
    <rect x="220" y="170" width="130" height="34"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="310" y="71">Acceptance test</text>
    <text x="272" y="131">Design test</text>
    <text x="232" y="191">Detail test</text>
  </g>
  <!-- V lines connecting down then up -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="175" y1="204" x2="220" y2="232"/>
    <line x1="285" y1="232" x2="285" y2="204"/>
  </g>
  <!-- dashed mirror lines: each test checks its requirement -->
  <g stroke="black" stroke-width="1.5" fill="none" stroke-dasharray="5,4">
    <line x1="160" y1="67" x2="300" y2="67"/>
    <line x1="200" y1="127" x2="260" y2="127"/>
    <line x1="240" y1="187" x2="220" y2="187"/>
  </g>
  <g fill="black">
    <polygon points="300,67 290,62 290,72"/>
    <polygon points="160,67 170,62 170,72"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="170" y="58">does it do what we asked?</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="20" y="298">Plan/requirements go down the left; build at the bottom; verify up the right.</text>
    <text x="20" y="314">Each requirement has a matching test (traceability).</text>
  </g>
</svg>
