<svg xmlns="http://www.w3.org/2000/svg" width="470" height="320" viewBox="0 0 470 320">
  <rect width="470" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="70" y="24">HARD TO READ vs EASY TO SKIM</text>
  </g>

  <!-- LEFT: wall of text -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="48">WALL OF TEXT</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="58" width="185" height="190"/>
  </g>
  <!-- dense lines, no gaps -->
  <g stroke="black" stroke-width="1" fill="none">
    <line x1="42" y1="74" x2="203" y2="74"/>
    <line x1="42" y1="86" x2="203" y2="86"/>
    <line x1="42" y1="98" x2="203" y2="98"/>
    <line x1="42" y1="110" x2="203" y2="110"/>
    <line x1="42" y1="122" x2="203" y2="122"/>
    <line x1="42" y1="134" x2="203" y2="134"/>
    <line x1="42" y1="146" x2="203" y2="146"/>
    <line x1="42" y1="158" x2="203" y2="158"/>
    <line x1="42" y1="170" x2="203" y2="170"/>
    <line x1="42" y1="182" x2="203" y2="182"/>
    <line x1="42" y1="194" x2="203" y2="194"/>
    <line x1="42" y1="206" x2="203" y2="206"/>
    <line x1="42" y1="218" x2="203" y2="218"/>
    <line x1="42" y1="230" x2="203" y2="230"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="58" y="266">one big block,</text>
    <text x="58" y="278">nowhere for the</text>
    <text x="58" y="290">eye to land</text>
  </g>

  <!-- RIGHT: structured -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="255" y="48">STRUCTURED &amp; SKIMMABLE</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="255" y="58" width="185" height="190"/>
  </g>
  <!-- heading bar -->
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="267" y1="76" x2="350" y2="76"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="267" y="73">Heading</text>
  </g>
  <!-- bullets -->
  <g fill="black">
    <circle cx="271" cy="94" r="2.5"/>
    <circle cx="271" cy="110" r="2.5"/>
    <circle cx="271" cy="126" r="2.5"/>
  </g>
  <g stroke="black" stroke-width="1" fill="none">
    <line x1="282" y1="94" x2="420" y2="94"/>
    <line x1="282" y1="110" x2="400" y2="110"/>
    <line x1="282" y1="126" x2="415" y2="126"/>
  </g>
  <!-- second heading -->
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="267" y1="158" x2="350" y2="158"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="267" y="155">Heading</text>
  </g>
  <g fill="black">
    <circle cx="271" cy="176" r="2.5"/>
    <circle cx="271" cy="192" r="2.5"/>
  </g>
  <g stroke="black" stroke-width="1" fill="none">
    <line x1="282" y1="176" x2="410" y2="176"/>
    <line x1="282" y1="192" x2="395" y2="192"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="267" y="226">headings + bullets</text>
    <text x="267" y="238">+ white space</text>
  </g>

  <!-- caption -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="276">Organise it: short sentences, one idea per paragraph, headings,</text>
    <text x="30" y="294">lists, and white space. Make it easy to skim and find what matters.</text>
  </g>
</svg>
