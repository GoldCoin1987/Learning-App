<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300">
  <rect width="440" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="60" y="22">WHY WRITE THINGS DOWN?</text>
  </g>
  <!-- LEFT: knowledge in one head (fragile) -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="30" y="48">In one person's head (FRAGILE)</text>
  </g>
  <!-- head -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="90" cy="110" r="30"/>
    <line x1="90" y1="140" x2="90" y2="190"/>
    <line x1="90" y1="155" x2="65" y2="180"/>
    <line x1="90" y1="155" x2="115" y2="180"/>
    <line x1="90" y1="190" x2="70" y2="225"/>
    <line x1="90" y1="190" x2="110" y2="225"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="70" y="108">knows</text>
    <text x="74" y="120">how</text>
  </g>
  <!-- person leaving / forgetting -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="135" y1="110" x2="175" y2="110"/>
  </g>
  <g fill="black">
    <polygon points="175,110 165,105 165,115"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="130" y="252">If they leave or forget,</text>
    <text x="140" y="265">it is LOST</text>
  </g>
  <!-- divider -->
  <g stroke="black" stroke-width="1" fill="none" stroke-dasharray="4,4">
    <line x1="220" y1="40" x2="220" y2="280"/>
  </g>
  <!-- RIGHT: written down & shared (survives) -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="248" y="48">Written down (SURVIVES)</text>
  </g>
  <!-- document -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="300" y="70" width="80" height="100"/>
    <line x1="312" y1="90" x2="368" y2="90"/>
    <line x1="312" y1="105" x2="368" y2="105"/>
    <line x1="312" y1="120" x2="368" y2="120"/>
    <line x1="312" y1="135" x2="368" y2="135"/>
    <line x1="312" y1="150" x2="350" y2="150"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="318" y="84">DOC</text>
  </g>
  <!-- many readers -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="270" cy="215" r="12"/>
    <circle cx="320" cy="215" r="12"/>
    <circle cx="370" cy="215" r="12"/>
    <line x1="300" y1="170" x2="270" y2="200"/>
    <line x1="340" y1="170" x2="320" y2="200"/>
    <line x1="370" y1="170" x2="370" y2="200"/>
  </g>
  <g fill="black">
    <polygon points="270,200 264,191 276,193"/>
    <polygon points="320,200 314,191 326,193"/>
    <polygon points="370,200 364,192 376,192"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="240" y="252">Anyone can read it - a letter</text>
    <text x="250" y="265">to your future self</text>
  </g>
</svg>
