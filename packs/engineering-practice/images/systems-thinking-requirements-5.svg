<svg xmlns="http://www.w3.org/2000/svg" width="460" height="280" viewBox="0 0 460 280">
  <rect width="460" height="280" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="90" y="22">TRACEABILITY: link each step so nothing</text>
    <text x="150" y="40">gets forgotten</text>
  </g>
  <!-- requirement box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="70" width="130" height="90"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="34" y="92">REQUIREMENT</text>
    <text x="34" y="116">"Loads in</text>
    <text x="34" y="134">under 2 s"</text>
  </g>
  <!-- arrow 1 -->
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="152" y1="115" x2="195" y2="115"/>
  </g>
  <g fill="black"><polygon points="195,115 185,109 185,121"/></g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="150" y="106">leads to</text>
  </g>
  <!-- design box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="200" y="70" width="130" height="90"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="214" y="92">DESIGN CHOICE</text>
    <text x="214" y="116">"Shrink the</text>
    <text x="214" y="134">images"</text>
  </g>
  <!-- arrow 2 -->
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="332" y1="115" x2="375" y2="115"/>
  </g>
  <g fill="black"><polygon points="375,115 365,109 365,121"/></g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="332" y="106">proven by</text>
  </g>
  <!-- test box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="320" y="70" width="130" height="90"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="332" y="92">ACCEPTANCE</text>
    <text x="332" y="108">TEST</text>
    <text x="332" y="132">"Time the load:</text>
    <text x="332" y="150">is it under 2 s?"</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="210">Each requirement gets an acceptance test: how you will</text>
    <text x="30" y="228">PROVE it is met. The chain ties want - build - check together,</text>
    <text x="30" y="246">like a checklist where every must-have points to its proof.</text>
  </g>
</svg>
