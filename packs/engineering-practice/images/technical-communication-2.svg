<svg xmlns="http://www.w3.org/2000/svg" width="470" height="330" viewBox="0 0 470 330">
  <rect width="470" height="330" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="40" y="24">LEAD WITH THE POINT (BLUF)</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="40" y="42">BLUF = Bottom Line Up Front</text>
  </g>

  <!-- LEFT: good - bottom line first -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="68">GOOD: conclusion first</text>
  </g>
  <!-- highlighted top box -->
  <g stroke="black" stroke-width="2.5" fill="none">
    <rect x="30" y="78" width="180" height="40"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="42" y="96">THE ASK / ANSWER:</text>
    <text x="42" y="110">"Meeting moved to 3pm."</text>
  </g>
  <g stroke="black" stroke-width="1.2" fill="none">
    <rect x="30" y="124" width="180" height="26"/>
    <rect x="30" y="156" width="180" height="26"/>
    <rect x="30" y="188" width="180" height="26"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="42" y="141">then: the backstory</text>
    <text x="42" y="173">then: the details</text>
    <text x="42" y="205">then: the reasons</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="black">
    <line x1="120" y1="118" x2="120" y2="124"/>
    <polygon points="120,124 115,118 125,118"/>
  </g>

  <!-- RIGHT: bad - buried conclusion -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="255" y="68">BAD: buried at the end</text>
  </g>
  <g stroke="black" stroke-width="1.2" fill="none">
    <rect x="255" y="78" width="180" height="26"/>
    <rect x="255" y="110" width="180" height="26"/>
    <rect x="255" y="142" width="180" height="26"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="267" y="95">the backstory...</text>
    <text x="267" y="127">more details...</text>
    <text x="267" y="159">the reasons...</text>
  </g>
  <!-- buried box at bottom -->
  <g stroke="black" stroke-width="2.5" fill="none">
    <rect x="255" y="174" width="180" height="40"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="267" y="192">THE ANSWER, finally:</text>
    <text x="267" y="206">"...so the meeting is 3pm."</text>
  </g>

  <!-- caption -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="248">Busy readers want the takeaway, ask, or recommendation FIRST,</text>
    <text x="30" y="266">then the supporting detail. It is like a news headline before the</text>
    <text x="30" y="284">article. Do NOT make the reader dig to the end for the point.</text>
  </g>
</svg>
