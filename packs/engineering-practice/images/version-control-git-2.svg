<svg xmlns="http://www.w3.org/2000/svg" width="470" height="300" viewBox="0 0 470 300">
  <rect width="470" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="70" y="24">A commit history (save-points)</text>
  </g>

  <!-- timeline line -->
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="40" y1="90" x2="430" y2="90"/>
    <polygon points="430,90 420,85 420,95" fill="black"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="392" y="76">time</text>
  </g>

  <!-- four commit snapshots -->
  <g stroke="black" stroke-width="1.5" fill="white">
    <circle cx="70" cy="90" r="11"/>
    <circle cx="180" cy="90" r="11"/>
    <circle cx="290" cy="90" r="11"/>
    <circle cx="400" cy="90" r="11"/>
  </g>

  <!-- message cards under each -->
  <g stroke="black" stroke-width="1.2" fill="none">
    <rect x="30" y="120" width="92" height="58"/>
    <rect x="140" y="120" width="92" height="58"/>
    <rect x="250" y="120" width="92" height="58"/>
    <rect x="360" y="120" width="92" height="58"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="70" y1="101" x2="70" y2="120"/>
    <line x1="180" y1="101" x2="180" y2="120"/>
    <line x1="290" y1="101" x2="290" y2="120"/>
    <line x1="400" y1="101" x2="400" y2="120"/>
  </g>

  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="36" y="136">message:</text>
    <text x="36" y="150">"start draft"</text>
    <text x="36" y="166">Ada - Mon</text>

    <text x="146" y="136">message:</text>
    <text x="146" y="150">"add results"</text>
    <text x="146" y="166">Ada - Tue</text>

    <text x="256" y="136">message:</text>
    <text x="256" y="150">"fix typo in</text>
    <text x="256" y="164">summary"</text>
    <text x="256" y="176">Ben - Wed</text>

    <text x="366" y="136">message:</text>
    <text x="366" y="150">"before the</text>
    <text x="366" y="164">big rewrite"</text>
    <text x="366" y="176">Ada - Thu</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="212">Each commit = a snapshot + a short message saying WHAT changed and WHY.</text>
    <text x="40" y="232">A clear message is a note to your future self (like "before the boss fight").</text>
    <text x="40" y="252">Commit often, in meaningful chunks.</text>
  </g>
</svg>
