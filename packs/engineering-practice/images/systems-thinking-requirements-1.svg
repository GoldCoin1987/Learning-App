<svg xmlns="http://www.w3.org/2000/svg" width="420" height="300" viewBox="0 0 420 300">
  <rect width="420" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="120" y="20">A SYSTEM = parts working together</text>
  </g>
  <!-- boundary box -->
  <g stroke="black" stroke-width="2" fill="none" stroke-dasharray="6,4">
    <rect x="30" y="40" width="300" height="220"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="38" y="56">BOUNDARY (system of interest)</text>
  </g>
  <!-- parts as boxes -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="60" y="80" width="100" height="44"/>
    <rect x="200" y="80" width="100" height="44"/>
    <rect x="60" y="180" width="100" height="44"/>
    <rect x="200" y="180" width="100" height="44"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="78" y="106">Water tank</text>
    <text x="225" y="106">Heater</text>
    <text x="84" y="206">Pump</text>
    <text x="218" y="206">Spout</text>
  </g>
  <!-- interface arrows between parts -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="160" y1="102" x2="196" y2="102"/>
    <line x1="110" y1="124" x2="110" y2="176"/>
    <line x1="160" y1="202" x2="196" y2="202"/>
    <line x1="250" y1="124" x2="250" y2="176"/>
  </g>
  <!-- arrowheads -->
  <g fill="black">
    <polygon points="196,102 188,98 188,106"/>
    <polygon points="110,176 106,168 114,168"/>
    <polygon points="196,202 188,198 188,206"/>
    <polygon points="250,176 246,168 254,168"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="150" y="150">arrows =</text>
    <text x="150" y="162">INTERFACES</text>
  </g>
  <!-- environment outside -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="345" y="110" width="60" height="80"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="350" y="146">ENVIRON-</text>
    <text x="356" y="160">MENT</text>
    <text x="350" y="200">(outside)</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="330" y1="150" x2="343" y2="150"/>
  </g>
  <g fill="black">
    <polygon points="343,150 335,146 335,154"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="284">Whole makes coffee - no single part can (EMERGENT behavior)</text>
  </g>
</svg>
