<svg xmlns="http://www.w3.org/2000/svg" width="460" height="280" viewBox="0 0 460 280">
  <rect width="460" height="280" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="60" y="22">REQUIREMENT -&gt; SPEC -&gt; THE BUILT THING</text>
  </g>
  <!-- REQUIREMENT box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="60" width="120" height="120"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="82">REQUIREMENT</text>
    <text x="34" y="100">(the need)</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="34" y="135">"a sturdy</text>
    <text x="40" y="153">table"</text>
  </g>
  <!-- arrow 1 -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="140" y1="120" x2="180" y2="120"/>
  </g>
  <g fill="black">
    <polygon points="180,120 170,115 170,125"/>
  </g>
  <!-- SPEC box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="182" y="60" width="130" height="120"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="220" y="82">SPEC</text>
    <text x="190" y="100">(agreed details)</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="192" y="122">- 120 x 75 cm</text>
    <text x="192" y="137">- oak top, 25mm</text>
    <text x="192" y="152">- 4 steel legs</text>
    <text x="192" y="167">- holds 80 kg</text>
  </g>
  <!-- arrow 2 -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="312" y1="120" x2="352" y2="120"/>
  </g>
  <g fill="black">
    <polygon points="352,120 342,115 342,125"/>
  </g>
  <!-- BUILT THING: a table -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="356" y="95" width="84" height="12"/>
    <line x1="364" y1="107" x2="364" y2="160"/>
    <line x1="432" y1="107" x2="432" y2="160"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="362" y="82">THE TABLE</text>
    <text x="370" y="180">(built)</text>
  </g>
  <!-- caption -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="225">Requirement = WHAT is needed.  Spec = the exact, agreed</text>
    <text x="30" y="242">description (measurements + materials) everyone builds and checks against.</text>
  </g>
</svg>
