<svg xmlns="http://www.w3.org/2000/svg" width="560" height="280" viewBox="0 0 560 280">
  <rect width="560" height="280" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="110" y="26">A NUMBER WITHOUT A UNIT IS MEANINGLESS</text>
  </g>
  <!-- Left: bare number 5 with confused callouts -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="50" y="70" width="180" height="150"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="64">
    <text x="120" y="160">5</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="92" y="190">5 what??</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="60" y="208">meters? feet? seconds?</text>
  </g>
  <!-- question-mark arrows pointing in -->
  <g stroke="black" stroke-width="1" fill="none">
    <line x1="40" y1="90" x2="70" y2="110"/>
    <line x1="240" y1="90" x2="210" y2="110"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="16">
    <text x="28" y="88">?</text>
    <text x="244" y="88">?</text>
  </g>
  <!-- arrow between -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="245" y1="145" x2="305" y2="145"/>
    <polyline points="295,138 305,145 295,152"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="248" y="135">add a unit</text>
  </g>
  <!-- Right: clear number with unit -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="320" y="70" width="190" height="150"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="40">
    <text x="345" y="155">5 meters</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="350" y="190">clear and safe:</text>
    <text x="350" y="206">everyone agrees what it means</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="50" y="250">Cardinal rule: ALWAYS carry the unit. A recipe that just says "2" (cups? teaspoons?) is the same trap.</text>
  </g>
</svg>
