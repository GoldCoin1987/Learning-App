<svg xmlns="http://www.w3.org/2000/svg" width="440" height="320" viewBox="0 0 440 320">
  <rect width="440" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="90" y="24">Fast, cheap, good - pick two</text>
  </g>
  <!-- triangle -->
  <g stroke="black" stroke-width="2" fill="none">
    <polygon points="220,60 80,260 360,260"/>
  </g>
  <!-- corner labels -->
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="196" y="52">FAST</text>
    <text x="40" y="280">CHEAP</text>
    <text x="320" y="280">GOOD</text>
  </g>
  <!-- pick-two note in center -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="150" y="170">you can pick any TWO,</text>
    <text x="150" y="188">not all three at once</text>
  </g>
  <!-- one edge highlighted as a chosen pair -->
  <g stroke="black" stroke-width="2" fill="none" stroke-dasharray="5 4">
    <line x1="80" y1="260" x2="360" y2="260"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="120" y="300">example: choose cheap + good, and you give up fast</text>
  </g>
</svg>
