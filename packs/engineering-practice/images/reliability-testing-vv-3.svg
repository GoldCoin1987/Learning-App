<svg xmlns="http://www.w3.org/2000/svg" width="460" height="330" viewBox="0 0 460 330">
  <rect width="460" height="330" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="70" y="24">Regression: a fix that breaks something else</text>
  </g>

  <!-- BEFORE -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="56">Before the change</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="70" width="60" height="40"/>
    <rect x="140" y="70" width="60" height="40"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="60" y="95">A ok</text>
    <text x="160" y="95">B ok</text>
  </g>

  <!-- arrow change -->
  <g stroke="black" stroke-width="1.5">
    <line x1="120" y1="130" x2="120" y2="158"/>
    <polygon points="120,158 116,150 124,150" fill="black"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="130" y="148">you change A to fix it</text>
  </g>

  <!-- AFTER -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="184">After the change</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="198" width="60" height="40"/>
    <rect x="140" y="198" width="60" height="40"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="52" y="223">A fixed</text>
  </g>
  <!-- B broken: X mark -->
  <g stroke="black" stroke-width="1.5">
    <line x1="148" y1="206" x2="192" y2="230"/>
    <line x1="192" y1="206" x2="148" y2="230"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="146" y="254">B BROKEN!</text>
    <text x="100" y="254" font-size="10">(a regression)</text>
  </g>

  <!-- RIGHT: re-run old tests catches it -->
  <g stroke="black" stroke-width="1">
    <line x1="250" y1="50" x2="250" y2="290"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="270" y="70">Re-run the OLD tests</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="270" y="90" width="160" height="34"/>
    <rect x="270" y="134" width="160" height="34"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="282" y="111">test for A ......... passes</text>
    <text x="282" y="155">test for B ......... FAILS</text>
  </g>
  <!-- check and X -->
  <g stroke="black" stroke-width="2" fill="none">
    <polyline points="408,108 414,116 424,100"/>
  </g>
  <g stroke="black" stroke-width="2">
    <line x1="408" y1="142" x2="424" y2="160"/>
    <line x1="424" y1="142" x2="408" y2="160"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="270" y="196">The old test catches the break</text>
    <text x="270" y="212">before it ships.</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="20" y="312">A REGRESSION is when a change breaks something that used to work. Re-test to catch it.</text>
  </g>
</svg>
