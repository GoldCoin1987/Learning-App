<svg xmlns="http://www.w3.org/2000/svg" width="470" height="300" viewBox="0 0 470 300">
  <rect width="470" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="80" y="24">Branching and merging</text>
  </g>

  <!-- main line -->
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="40" y1="120" x2="430" y2="120"/>
    <polygon points="430,120 420,115 420,125" fill="black"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="112">MAIN version</text>
  </g>

  <!-- commits on main -->
  <g stroke="black" stroke-width="1.5" fill="white">
    <circle cx="90" cy="120" r="9"/>
    <circle cx="160" cy="120" r="9"/>
    <circle cx="340" cy="120" r="9"/>
    <circle cx="400" cy="120" r="9"/>
  </g>

  <!-- branch splits off and rejoins -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <path d="M160,120 C200,120 200,210 240,210"/>
    <path d="M300,210 C330,210 320,130 340,120"/>
    <line x1="240" y1="210" x2="300" y2="210"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="white">
    <circle cx="240" cy="210" r="9"/>
    <circle cx="300" cy="210" r="9"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="215" y="244">BRANCH (try changes safely)</text>
  </g>

  <!-- labels for split and merge -->
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="150" y="100">split off</text>
    <text x="318" y="100">MERGE back</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="272">A branch is a parallel copy: experiment WITHOUT disturbing main, then merge the good</text>
    <text x="40" y="290">work back. If two people changed the same spot, that is a merge conflict: a human picks.</text>
  </g>
</svg>
