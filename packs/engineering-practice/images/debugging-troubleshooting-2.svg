<svg xmlns="http://www.w3.org/2000/svg" width="440" height="320" viewBox="0 0 440 320">
  <rect width="440" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="40" y="22">Divide and conquer: halve the suspects</text>
  </g>
  <!-- chain of suspects -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="60" width="80" height="40"/>
    <rect x="130" y="60" width="80" height="40"/>
    <rect x="240" y="60" width="80" height="40"/>
    <rect x="350" y="60" width="70" height="40"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="48" y="84">bulb</text>
    <text x="150" y="84">lamp</text>
    <text x="258" y="84">outlet</text>
    <text x="360" y="84">breaker</text>
  </g>
  <!-- connectors -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="100" y1="80" x2="130" y2="80"/>
    <line x1="210" y1="80" x2="240" y2="80"/>
    <line x1="320" y1="80" x2="350" y2="80"/>
  </g>
  <!-- split line down the middle -->
  <g stroke="black" stroke-width="1.5" fill="none" stroke-dasharray="5 4">
    <line x1="225" y1="45" x2="225" y2="120"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="150" y="138">test the left half</text>
    <text x="300" y="138">vs the right half</text>
  </g>
  <!-- test 1 -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="20" y="180">Test 1: swap in a bulb you KNOW works.</text>
    <text x="40" y="198">Still dark? The bulb was fine - look right.</text>
  </g>
  <!-- test 2 -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="20" y="228">Test 2: plug another device into the outlet.</text>
    <text x="40" y="246">It works? The outlet is fine - check the lamp.</text>
  </g>
  <!-- result -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="130" y="268" width="180" height="34"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="150" y="290">Each test halves the suspects</text>
  </g>
</svg>
