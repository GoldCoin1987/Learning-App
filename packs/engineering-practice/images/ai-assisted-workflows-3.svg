<svg xmlns="http://www.w3.org/2000/svg" width="460" height="360" viewBox="0 0 460 360">
  <rect width="460" height="360" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="40" y="22">The verify gate: never ship what you did not check</text>
  </g>
  <!-- AI draft start -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="120" width="90" height="50"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="142">AI draft</text>
    <text x="32" y="160">or answer</text>
  </g>
  <!-- arrow to gate -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="110" y1="145" x2="150" y2="145"/>
  </g>
  <g fill="black">
    <polygon points="150,145 138,140 138,150"/>
  </g>
  <!-- the GATE (check) -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="152" y="95" width="150" height="100"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="200" y="115">CHECK:</text>
    <text x="162" y="135">- vs requirements</text>
    <text x="162" y="155">- test it</text>
    <text x="162" y="175">- understand it</text>
  </g>
  <!-- arrow from gate to SHIP -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="302" y1="145" x2="345" y2="145"/>
  </g>
  <g fill="black">
    <polygon points="345,145 333,140 333,150"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="305" y="138">pass</text>
  </g>
  <!-- SHIP box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="348" y="120" width="90" height="50"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="362" y="150">SHIP safely</text>
  </g>
  <!-- BYPASS path: paste unverified -> risk -->
  <g stroke="black" stroke-width="1.5" fill="none" stroke-dasharray="5 4">
    <line x1="65" y1="170" x2="65" y2="250"/>
    <line x1="65" y1="250" x2="393" y2="250"/>
    <line x1="393" y1="250" x2="393" y2="172"/>
  </g>
  <g fill="black">
    <polygon points="393,172 388,184 398,184"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="120" y="244">paste unverified, skip the gate</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="335" y="278" width="110" height="44"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="360" y="298">RISK: bugs,</text>
    <text x="358" y="314">wrong result</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="20" y="300">AI output is a DRAFT.</text>
    <text x="20" y="318">You are responsible for what you ship.</text>
  </g>
</svg>
