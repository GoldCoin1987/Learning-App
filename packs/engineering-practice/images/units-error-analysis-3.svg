<svg xmlns="http://www.w3.org/2000/svg" width="560" height="280" viewBox="0 0 560 280">
  <rect width="560" height="280" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="110" y="26">SIGNIFICANT FIGURES: DON'T FAKE PRECISION</text>
  </g>
  <!-- tape measure body -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="70" width="380" height="44"/>
  </g>
  <!-- cm numbers 1..4 -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="56" y="64">1</text>
    <text x="156" y="64">2</text>
    <text x="256" y="64">3</text>
    <text x="356" y="64">4</text>
    <text x="400" y="64">cm</text>
  </g>
  <!-- major cm ticks -->
  <g stroke="black" stroke-width="1.5">
    <line x1="60" y1="70" x2="60" y2="104"/>
    <line x1="160" y1="70" x2="160" y2="104"/>
    <line x1="260" y1="70" x2="260" y2="104"/>
    <line x1="360" y1="70" x2="360" y2="104"/>
  </g>
  <!-- mm ticks between 3 and 4 -->
  <g stroke="black" stroke-width="1">
    <line x1="270" y1="70" x2="270" y2="88"/>
    <line x1="280" y1="70" x2="280" y2="88"/>
    <line x1="290" y1="70" x2="290" y2="88"/>
    <line x1="300" y1="70" x2="300" y2="88"/>
    <line x1="310" y1="70" x2="310" y2="88"/>
    <line x1="320" y1="70" x2="320" y2="88"/>
    <line x1="330" y1="70" x2="330" y2="88"/>
    <line x1="340" y1="70" x2="340" y2="88"/>
    <line x1="350" y1="70" x2="350" y2="88"/>
  </g>
  <!-- object edge near 3.2 cm -->
  <g stroke="black" stroke-width="2">
    <line x1="280" y1="60" x2="280" y2="120"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="252" y="138">reads 3.2 cm</text>
  </g>
  <!-- honest box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="170" width="230" height="80"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="20">
    <text x="90" y="210">3.2 cm</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="55" y="235">HONEST: 2 sig figs, all real</text>
  </g>
  <!-- fake / crossed out box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="300" y="170" width="230" height="80"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="20">
    <text x="335" y="210">3.247 cm</text>
  </g>
  <!-- cross out the fake number -->
  <g stroke="black" stroke-width="2">
    <line x1="330" y1="208" x2="450" y2="190"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="315" y="235">FAKE: the .047 is made up</text>
  </g>
</svg>
