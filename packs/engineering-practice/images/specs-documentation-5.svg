<svg xmlns="http://www.w3.org/2000/svg" width="460" height="300" viewBox="0 0 460 300">
  <rect width="460" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="70" y="22">ONE SOURCE OF TRUTH</text>
  </g>
  <!-- LEFT: many conflicting copies -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="46">Many conflicting copies (chaos)</text>
  </g>
  <!-- doc copies scattered -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="60" width="60" height="40"/>
    <rect x="100" y="70" width="60" height="40"/>
    <rect x="45" y="110" width="60" height="40"/>
    <rect x="115" y="120" width="60" height="40"/>
    <rect x="70" y="160" width="60" height="40"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="8">
    <text x="34" y="84">final.doc</text>
    <text x="104" y="94">final_v2.doc</text>
    <text x="48" y="134">final_FINAL</text>
    <text x="118" y="144">final_v2_FINAL</text>
    <text x="74" y="184">really_final</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="35" y="225">Which one is right? Nobody knows.</text>
    <text x="35" y="240">Edits get lost; people disagree.</text>
  </g>
  <!-- divider -->
  <g stroke="black" stroke-width="1" fill="none" stroke-dasharray="4,4">
    <line x1="240" y1="38" x2="240" y2="280"/>
  </g>
  <!-- RIGHT: one shared versioned doc -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="260" y="46">One shared, versioned doc</text>
  </g>
  <g stroke="black" stroke-width="2" fill="none">
    <rect x="300" y="70" width="90" height="115"/>
    <line x1="314" y1="92" x2="376" y2="92"/>
    <line x1="314" y1="108" x2="376" y2="108"/>
    <line x1="314" y1="124" x2="376" y2="124"/>
    <line x1="314" y1="140" x2="376" y2="140"/>
    <line x1="314" y1="156" x2="360" y2="156"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="318" y="86">THE DOC</text>
    <text x="318" y="178">v3 (latest)</text>
  </g>
  <!-- everyone points to it -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="265" y1="120" x2="297" y2="120"/>
    <line x1="265" y1="150" x2="297" y2="135"/>
    <line x1="265" y1="90" x2="297" y2="105"/>
  </g>
  <g fill="black">
    <polygon points="297,120 287,116 287,125"/>
    <polygon points="297,135 287,132 288,141"/>
    <polygon points="297,105 287,103 288,112"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="255" y="225">Everyone refers to ONE copy.</text>
    <text x="255" y="240">Track VERSIONS so changes</text>
    <text x="255" y="255">are clear, not five emailed drafts.</text>
  </g>
</svg>
