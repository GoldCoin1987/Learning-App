<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300">
  <rect width="440" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="50" y="22">Change ONE thing at a time</text>
  </g>
  <!-- divider -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="220" y1="40" x2="220" y2="290"/>
  </g>
  <!-- LEFT: one change -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="58">One change</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="80" width="70" height="40"/>
    <rect x="130" y="80" width="70" height="40"/>
    <line x1="100" y1="100" x2="130" y2="100"/>
  </g>
  <g fill="black">
    <polygon points="130,100 118,95 118,105"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="48" y="104">before</text>
    <text x="150" y="104">after</text>
    <text x="40" y="150">changed: salt only</text>
    <text x="40" y="172">result is clear -</text>
    <text x="40" y="190">you KNOW the cause</text>
  </g>
  <!-- happy check -->
  <g stroke="black" stroke-width="2" fill="none">
    <polyline points="55,235 75,255 110,210"/>
  </g>
  <!-- RIGHT: many changes -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="245" y="58">Many changes</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="245" y="80" width="60" height="34"/>
    <rect x="330" y="80" width="60" height="34"/>
    <line x1="275" y1="114" x2="350" y2="160"/>
    <line x1="300" y1="114" x2="320" y2="160"/>
    <line x1="360" y1="114" x2="300" y2="160"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="255" y="101">salt</text>
    <text x="338" y="101">heat</text>
    <text x="245" y="180">changed: salt, heat,</text>
    <text x="245" y="196">and time at once</text>
    <text x="245" y="218">which one helped?</text>
  </g>
  <!-- tangle / question mark -->
  <g fill="black" font-family="sans-serif" font-size="40">
    <text x="305" y="270">?</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="245" y="252">cause and effect</text>
    <text x="245" y="268">are tangled</text>
  </g>
</svg>
