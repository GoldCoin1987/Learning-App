<svg xmlns="http://www.w3.org/2000/svg" width="440" height="340" viewBox="0 0 440 340">
  <rect width="440" height="340" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="40" y="22">Tools amplify a good process</text>
  </g>
  <!-- person -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="80" cy="120" r="18"/>
    <line x1="80" y1="138" x2="80" y2="195"/>
    <line x1="80" y1="155" x2="50" y2="180"/>
    <line x1="80" y1="155" x2="110" y2="180"/>
    <line x1="80" y1="195" x2="58" y2="235"/>
    <line x1="80" y1="195" x2="102" y2="235"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="52" y="258">you</text>
  </g>
  <!-- plus -->
  <g fill="black" font-family="sans-serif" font-size="22">
    <text x="138" y="130">+</text>
  </g>
  <!-- toolbox: power tools / AI -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="170" y="95" width="110" height="60"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="180" y="118">power tools</text>
    <text x="180" y="138">+ AI helper</text>
  </g>
  <!-- arrow to result -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="282" y1="125" x2="338" y2="125"/>
  </g>
  <g fill="black">
    <polygon points="338,125 326,120 326,130"/>
  </g>
  <!-- result: built faster -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="342" y="98" width="88" height="54"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="352" y="120">build</text>
    <text x="352" y="138">faster</text>
  </g>
  <!-- judgment stays with you -->
  <g stroke="black" stroke-width="1.5" fill="none" stroke-dasharray="5 4">
    <rect x="40" y="278" width="360" height="40"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="60" y="296">Judgment stays with YOU. A power drill builds faster,</text>
    <text x="60" y="313">but you still have to know what you are building.</text>
  </g>
</svg>
