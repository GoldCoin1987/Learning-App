<svg xmlns="http://www.w3.org/2000/svg" width="460" height="340" viewBox="0 0 460 340">
  <rect width="460" height="340" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="60" y="24">Verification vs Validation</text>
  </g>

  <!-- divider -->
  <g stroke="black" stroke-width="1.5">
    <line x1="230" y1="40" x2="230" y2="300"/>
  </g>

  <!-- LEFT panel: VERIFICATION -->
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="20" y="58">VERIFICATION</text>
    <text x="20" y="76" font-size="11">"Did we build the thing RIGHT?"</text>
    <text x="20" y="92" font-size="11">(matches the blueprint / spec)</text>
  </g>
  <!-- blueprint -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="110" width="80" height="100"/>
    <line x1="30" y1="130" x2="110" y2="130"/>
    <line x1="50" y1="170" x2="50" y2="210"/>
    <line x1="50" y1="170" x2="90" y2="170"/>
  </g>
  <!-- built house matching it -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <polygon points="140,150 175,120 210,150"/>
    <rect x="148" y="150" width="54" height="60"/>
    <rect x="166" y="178" width="18" height="32"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="116" y1="160" x2="136" y2="160"/>
    <polygon points="136,160 128,156 128,164" fill="black"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="34" y="226">blueprint</text>
    <text x="146" y="226">built to match</text>
    <text x="40" y="250" font-size="10">CHECK: meets the spec?</text>
  </g>

  <!-- RIGHT panel: VALIDATION -->
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="248" y="58">VALIDATION</text>
    <text x="248" y="76" font-size="11">"Did we build the RIGHT thing?"</text>
    <text x="248" y="92" font-size="11">(solves the family's real need)</text>
  </g>
  <!-- a perfect house -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <polygon points="258,150 293,120 328,150"/>
    <rect x="266" y="150" width="54" height="60"/>
    <rect x="284" y="178" width="18" height="32"/>
  </g>
  <!-- but family needed a bungalow with ramp (mismatch) -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="356" y="170" width="64" height="40"/>
    <polygon points="356,170 388,150 420,170"/>
    <line x1="356" y1="210" x2="340" y2="210"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="252" y="226">built perfectly...</text>
    <text x="346" y="226">...but NOT</text>
    <text x="346" y="240">what was needed</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="248" y="262" font-size="10">Built right, but the wrong thing.</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="20" y="316">Build it, then PROVE it: right (to spec) AND the right thing (the real need).</text>
  </g>
</svg>
