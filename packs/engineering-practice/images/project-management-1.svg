<svg xmlns="http://www.w3.org/2000/svg" width="440" height="330" viewBox="0 0 440 330">
  <rect width="440" height="330" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="70" y="24">The triple constraint: change one, the others move</text>
  </g>
  <!-- triangle -->
  <g stroke="black" stroke-width="2" fill="none">
    <polygon points="220,60 75,265 365,265"/>
  </g>
  <!-- corner labels -->
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="184" y="52">SCOPE</text>
    <text x="40" y="285">TIME</text>
    <text x="325" y="285">COST</text>
  </g>
  <!-- corner explanations -->
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="170" y="74">(what you do)</text>
    <text x="30" y="299">(by when)</text>
    <text x="310" y="299">(how much)</text>
  </g>
  <!-- quality in the middle -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="220" cy="195" r="34"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="187" y="192">QUALITY</text>
    <text x="183" y="208">in the middle</text>
  </g>
  <!-- note -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="60" y="320">Add scope without more time or cost, and quality drops.</text>
  </g>
</svg>
