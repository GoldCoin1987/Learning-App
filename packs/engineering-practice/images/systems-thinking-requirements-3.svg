<svg xmlns="http://www.w3.org/2000/svg" width="460" height="300" viewBox="0 0 460 300">
  <rect width="460" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="70" y="22">Three kinds of requirement (classify each)</text>
  </g>
  <!-- table grid -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="40" width="420" height="220"/>
    <line x1="20" y1="80" x2="440" y2="80"/>
    <line x1="20" y1="140" x2="440" y2="140"/>
    <line x1="20" y1="200" x2="440" y2="200"/>
    <line x1="170" y1="40" x2="170" y2="260"/>
  </g>
  <!-- header row -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="64">KIND</text>
    <text x="220" y="64">EXAMPLE</text>
  </g>
  <!-- functional -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="32" y="106">FUNCTIONAL</text>
    <text x="32" y="124">(what it DOES)</text>
    <text x="182" y="106">"Let users reset</text>
    <text x="182" y="124">their password"</text>
  </g>
  <!-- non-functional -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="32" y="166">NON-FUNCTIONAL</text>
    <text x="32" y="184">(a quality)</text>
    <text x="182" y="166">"Loads in under</text>
    <text x="182" y="184">2 seconds"</text>
  </g>
  <!-- constraint -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="32" y="226">CONSTRAINT</text>
    <text x="32" y="244">(fixed limit)</text>
    <text x="182" y="226">"Budget is $500"</text>
    <text x="182" y="244">"Must run on a phone"</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="20" y="284">ASSUMPTIONS = things taken for granted (e.g. "users have internet").</text>
  </g>
</svg>
