<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300">
  <rect width="440" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="60" y="22">Turn a VAGUE WISH into clear REQUIREMENTS</text>
  </g>
  <!-- vague wish box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="50" width="150" height="90"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="34" y="74">Vague wish:</text>
    <text x="34" y="98">"I want a</text>
    <text x="34" y="116">good website"</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="160">unclear,</text>
    <text x="40" y="174">untestable</text>
  </g>
  <!-- arrow -->
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="180" y1="95" x2="245" y2="95"/>
  </g>
  <g fill="black">
    <polygon points="245,95 235,89 235,101"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="184" y="86">pin down</text>
    <text x="190" y="116">WHAT</text>
  </g>
  <!-- good requirements box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="255" y="44" width="170" height="150"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="268" y="66">Clear requirements:</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="268" y="90">- Loads in under 2 s</text>
    <text x="268" y="112">- Works on a phone</text>
    <text x="268" y="134">- Shows a contact form</text>
    <text x="268" y="156">- Done by June</text>
    <text x="268" y="178">specific + testable</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="240">Like telling a builder "counters 90 cm high, oven fits a</text>
    <text x="30" y="258">large tray, done by June" instead of just "a nice kitchen".</text>
  </g>
</svg>
