<svg xmlns="http://www.w3.org/2000/svg" width="540" height="300" viewBox="0 0 540 300">
  <rect width="540" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="120" y="24">CALIBRATION: check against a known reference</text>
  </g>
  <!-- BEFORE: scale reads 2 kg with nothing on it -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="56">BEFORE (offset)</text>
  </g>
  <!-- empty pan -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="50" y1="95" x2="150" y2="95"/>
    <line x1="70" y1="95" x2="70" y2="110"/>
    <line x1="130" y1="95" x2="130" y2="110"/>
    <rect x="55" y="110" width="90" height="60"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="78" y="88">(nothing on it)</text>
    <text x="84" y="138">reads</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="20">
    <text x="78" y="162">2 kg</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="48" y="190">wrong: should read 0</text>
  </g>
  <!-- arrow: zero / tare against reference -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="170" y1="135" x2="240" y2="135"/>
  </g>
  <g fill="black">
    <polygon points="240,135 230,130 230,140"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="160" y="118">zero / tare,</text>
    <text x="160" y="158">check vs a</text>
    <text x="160" y="172">known weight</text>
  </g>
  <!-- AFTER: zeroed and verified -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="300" y="56">AFTER (trustworthy)</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="310" y1="95" x2="410" y2="95"/>
    <line x1="330" y1="95" x2="330" y2="110"/>
    <line x1="390" y1="95" x2="390" y2="110"/>
    <rect x="315" y="110" width="90" height="60"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="338" y="88">(nothing on it)</text>
    <text x="344" y="138">reads</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="20">
    <text x="344" y="162">0 kg</text>
  </g>
  <!-- known reference weight -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <polygon points="445,150 505,150 495,110 455,110"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="448" y="135">1.000 kg</text>
    <text x="452" y="168">reference</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="438" y="186">(itself checked vs</text>
    <text x="438" y="198">an official standard)</text>
  </g>
  <!-- caption -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="240">An offset (or drift over time) makes an instrument confidently wrong.</text>
    <text x="40" y="257">Calibration = comparing it to a trusted reference and adjusting until it agrees.</text>
  </g>
</svg>
