<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320">
  <rect width="560" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="110" y="24">SYSTEMATIC vs RANDOM ERROR</text>
  </g>
  <!-- LEFT panel: systematic (bias) -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="52">SYSTEMATIC (a steady bias)</text>
  </g>
  <!-- number line -->
  <g stroke="black" stroke-width="1.5">
    <line x1="40" y1="150" x2="250" y2="150"/>
  </g>
  <!-- true value tick -->
  <g stroke="black" stroke-width="2">
    <line x1="110" y1="140" x2="110" y2="160"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="86" y="134">TRUE</text>
  </g>
  <!-- clustered points all shifted right -->
  <g fill="black">
    <circle cx="186" cy="150" r="4"/>
    <circle cx="194" cy="150" r="4"/>
    <circle cx="190" cy="150" r="4"/>
    <circle cx="198" cy="150" r="4"/>
  </g>
  <!-- shift arrow -->
  <g stroke="black" stroke-width="1" fill="none">
    <line x1="110" y1="178" x2="190" y2="178"/>
  </g>
  <g fill="black">
    <polygon points="190,178 180,173 180,183"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="120" y="198">consistent shift (offset)</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="238">FIX: CALIBRATE it out</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="40" y="256">(adjust against a known</text>
    <text x="40" y="270">reference; averaging won't help)</text>
  </g>
  <!-- divider -->
  <g stroke="black" stroke-width="1" stroke-dasharray="3 4">
    <line x1="290" y1="40" x2="290" y2="290"/>
  </g>
  <!-- RIGHT panel: random (scatter) -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="320" y="52">RANDOM (scatter / jitter)</text>
  </g>
  <g stroke="black" stroke-width="1.5">
    <line x1="320" y1="150" x2="530" y2="150"/>
  </g>
  <g stroke="black" stroke-width="2">
    <line x1="425" y1="140" x2="425" y2="160"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="401" y="134">TRUE</text>
  </g>
  <!-- points scattered around true -->
  <g fill="black">
    <circle cx="392" cy="150" r="4"/>
    <circle cx="410" cy="150" r="4"/>
    <circle cx="426" cy="150" r="4"/>
    <circle cx="444" cy="150" r="4"/>
    <circle cx="460" cy="150" r="4"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="360" y="198">scattered both sides of true</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="320" y="238">FIX: AVERAGE it down</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="320" y="256">(take several readings; the</text>
    <text x="320" y="270">mean steadies toward the truth)</text>
  </g>
  <!-- bottom caption -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="60" y="306">Bias you CALIBRATE out. Scatter you AVERAGE down. They are different problems.</text>
  </g>
</svg>
