<svg xmlns="http://www.w3.org/2000/svg" width="460" height="320" viewBox="0 0 460 320">
  <rect width="460" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="40" y="22">Pitfalls to watch for when using AI tools</text>
  </g>
  <!-- 1: over-reliance / atrophy -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="50" width="200" height="100"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="55" cy="95" r="14"/>
    <line x1="55" y1="109" x2="55" y2="135"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="82" y="80">Over-reliance:</text>
    <text x="82" y="98">lean on it for</text>
    <text x="82" y="116">everything and</text>
    <text x="82" y="134">your own skill fades</text>
  </g>
  <!-- 2: bias / outdated -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="240" y="50" width="200" height="100"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="262" y="78" width="34" height="44"/>
    <line x1="268" y1="92" x2="290" y2="92"/>
    <line x1="268" y1="104" x2="290" y2="104"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="308" y="88">Bias / outdated:</text>
    <text x="308" y="106">may be unfair or</text>
    <text x="308" y="124">behind the times</text>
  </g>
  <!-- 3: privacy -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="165" width="200" height="120"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="44" y="205" width="36" height="28"/>
    <path d="M50 205 v-8 a12 12 0 0 1 24 0 v8"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="92" y="200">Privacy:</text>
    <text x="92" y="218">do NOT paste</text>
    <text x="92" y="236">secrets or personal</text>
    <text x="92" y="254">data into outside tools</text>
  </g>
  <!-- 4: honesty / transparency -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="240" y="165" width="200" height="120"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="262" y="200" width="30" height="38"/>
    <line x1="268" y1="212" x2="286" y2="212"/>
    <line x1="268" y1="222" x2="286" y2="222"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="304" y="200">Honesty:</text>
    <text x="304" y="218">be transparent</text>
    <text x="304" y="236">about AI help</text>
    <text x="304" y="254">where it matters</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="308">In every case: YOU own the result.</text>
  </g>
</svg>
