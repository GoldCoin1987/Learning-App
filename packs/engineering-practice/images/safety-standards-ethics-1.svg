<svg xmlns="http://www.w3.org/2000/svg" width="480" height="340" viewBox="0 0 480 340">
  <rect width="480" height="340" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="120" y="24">Three ways to design for safety</text>
  </g>

  <!-- PANEL 1: safety factor / margin -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="14" y="40" width="142" height="250"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="26" y="60">1. Safety margin</text>
  </g>
  <!-- cable holding a small load with big rating -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="85" y1="72" x2="85" y2="180"/>
    <rect x="62" y="180" width="46" height="34"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="70" y="201">LOAD</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="26" y="240">cable rated FAR</text>
    <text x="26" y="254">above the load</text>
    <text x="26" y="276" font-style="italic">build beyond</text>
    <text x="26" y="288" font-style="italic">the expected</text>
  </g>

  <!-- PANEL 2: guard / interlock -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="169" y="40" width="142" height="250"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="181" y="60">2. Guard / interlock</text>
  </g>
  <!-- machine box with cover open, OFF -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="200" y="120" width="80" height="60"/>
    <line x1="200" y1="120" x2="240" y2="86"/>
    <line x1="280" y1="120" x2="240" y2="86"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="222" y="156">OFF</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="181" y="210">cover open</text>
    <text x="181" y="224">so it will NOT run</text>
    <text x="181" y="246" font-style="italic">won't run with</text>
    <text x="181" y="258" font-style="italic">the cover off</text>
  </g>

  <!-- PANEL 3: fail-safe default -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="324" y="40" width="142" height="250"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="336" y="60">3. Fail-safe</text>
  </g>
  <!-- gate defaults closed -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="350" y1="100" x2="350" y2="180"/>
    <line x1="440" y1="100" x2="440" y2="180"/>
    <line x1="350" y1="180" x2="440" y2="180"/>
    <rect x="360" y="112" width="70" height="60"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="368" y="148">CLOSED</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="336" y="210">on failure it goes</text>
    <text x="336" y="224">to a SAFE state</text>
    <text x="336" y="246" font-style="italic">defaults to safe</text>
    <text x="336" y="258" font-style="italic">when things go wrong</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="14" y="318">Assume people make mistakes and the unexpected happens, then design for it.</text>
  </g>
</svg>
