<svg xmlns="http://www.w3.org/2000/svg" width="560" height="260" viewBox="0 0 560 260">
  <rect width="560" height="260" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="120" y="26">UNCERTAINTY: REPORT THE GIVE-OR-TAKE</text>
  </g>
  <!-- vertical scale -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="120" y1="60" x2="120" y2="210"/>
  </g>
  <!-- tick labels -->
  <g stroke="black" stroke-width="1">
    <line x1="114" y1="80" x2="126" y2="80"/>
    <line x1="114" y1="120" x2="126" y2="120"/>
    <line x1="114" y1="160" x2="126" y2="160"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="70" y="84">102 g</text>
    <text x="70" y="124">100 g</text>
    <text x="78" y="164">98 g</text>
  </g>
  <!-- error bar: central value with caps -->
  <g stroke="black" stroke-width="2">
    <line x1="260" y1="80" x2="260" y2="160"/>
    <line x1="244" y1="80" x2="276" y2="80"/>
    <line x1="244" y1="160" x2="276" y2="160"/>
  </g>
  <!-- center dot -->
  <g fill="black">
    <circle cx="260" cy="120" r="4"/>
  </g>
  <!-- dashed guide to center value -->
  <g stroke="black" stroke-width="1" stroke-dasharray="3,3">
    <line x1="126" y1="120" x2="256" y2="120"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="16">
    <text x="300" y="125">100 g +/- 2 g</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="300" y="86">top cap = 102 g</text>
    <text x="300" y="164">bottom cap = 98 g</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="232">The true value most likely lies somewhere in the bar. "+/- 2 g" is the give-or-take.</text>
    <text x="40" y="249">When you ADD quantities the give-or-takes add up; the answer is no more certain than its inputs.</text>
  </g>
</svg>
