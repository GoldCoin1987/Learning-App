<svg xmlns="http://www.w3.org/2000/svg" width="460" height="320" viewBox="0 0 460 320">
  <rect width="460" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="90" y="22">COMMON TYPES OF DOCUMENTS</text>
  </g>
  <!-- Card: SPEC -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="45" width="135" height="70"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="32" y="66">SPEC</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="32" y="86">what it must</text>
    <text x="32" y="100">be / do</text>
  </g>
  <!-- Card: DESIGN DOC -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="165" y="45" width="135" height="70"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="177" y="66">DESIGN DOC</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="177" y="86">how it works /</text>
    <text x="177" y="100">why decided</text>
  </g>
  <!-- Card: USER MANUAL -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="310" y="45" width="135" height="70"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="322" y="66">USER MANUAL</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="322" y="86">how to USE it</text>
    <text x="322" y="100">(for the reader)</text>
  </g>
  <!-- Card: MAINTENANCE -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="130" width="135" height="70"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="32" y="151">MAINTENANCE</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="32" y="171">how to fix /</text>
    <text x="32" y="185">run it</text>
  </g>
  <!-- Card: README -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="165" y="130" width="135" height="70"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="177" y="151">README</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="177" y="171">quick "start</text>
    <text x="177" y="185">here" overview</text>
  </g>
  <!-- Card: CHANGE LOG -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="310" y="130" width="135" height="70"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="322" y="151">CHANGE LOG</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="322" y="171">what changed</text>
    <text x="322" y="185">and when</text>
  </g>
  <!-- caption -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="240">Each doc has a job and an audience. A USER MANUAL (for whoever</text>
    <text x="30" y="257">uses it) is not the same as a SPEC (the precise what-it-must-be).</text>
    <text x="30" y="280">Pick the doc that fits the reader and the purpose.</text>
  </g>
</svg>
