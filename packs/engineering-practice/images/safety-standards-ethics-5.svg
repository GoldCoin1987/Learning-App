<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300">
  <rect width="480" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="120" y="24">Modern responsibilities</text>
  </g>

  <!-- PRIVACY -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="48" width="100" height="100"/>
    <!-- lock -->
    <rect x="52" y="92" width="36" height="32"/>
    <path d="M 58 92 V 80 a 12 12 0 0 1 24 0 V 92"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="42" y="166">Privacy</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="24" y="182">handle data</text>
    <text x="24" y="194">with care</text>
  </g>

  <!-- ENVIRONMENT -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="138" y="48" width="100" height="100"/>
    <!-- recycle triangle of arrows -->
    <polyline points="170,84 188,84 179,100"/>
    <polyline points="200,108 191,124 182,108"/>
    <polyline points="206,100 197,84 215,84" />
    <polygon points="166,72 224,72 224,128 166,128" stroke-dasharray="3,3"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="150" y="166">Environment</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="142" y="182">waste, energy,</text>
    <text x="142" y="194">lifecycle</text>
  </g>

  <!-- ACCESSIBILITY -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="256" y="48" width="100" height="100"/>
    <!-- person figure -->
    <circle cx="306" cy="78" r="9"/>
    <line x1="306" y1="87" x2="306" y2="116"/>
    <line x1="288" y1="100" x2="324" y2="100"/>
    <line x1="306" y1="116" x2="292" y2="134"/>
    <line x1="306" y1="116" x2="320" y2="134"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="266" y="166">Accessibility</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="260" y="182">works for people</text>
    <text x="260" y="194">of all abilities</text>
  </g>

  <!-- FAIRNESS -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="374" y="48" width="100" height="100"/>
    <!-- balance scale -->
    <line x1="424" y1="74" x2="424" y2="120"/>
    <line x1="400" y1="84" x2="448" y2="84"/>
    <line x1="400" y1="84" x2="392" y2="104"/>
    <line x1="400" y1="84" x2="408" y2="104"/>
    <line x1="448" y1="84" x2="440" y2="104"/>
    <line x1="448" y1="84" x2="456" y2="104"/>
    <line x1="408" y1="120" x2="440" y2="120"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="396" y="166">Fairness</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="378" y="182">unbiased</text>
    <text x="378" y="194">automated choices</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="20" y="234">Beyond classic safety, responsibility now includes how our work treats</text>
    <text x="20" y="250">people's data, the planet, people of every ability, and fair treatment for all.</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11" font-style="italic">
    <text x="20" y="280">Responsibility is part of the job.</text>
  </g>
</svg>
