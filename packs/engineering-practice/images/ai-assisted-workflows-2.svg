<svg xmlns="http://www.w3.org/2000/svg" width="440" height="360" viewBox="0 0 440 360">
  <rect width="440" height="360" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="30" y="22">AI is a fast junior assistant - check its work</text>
  </g>
  <!-- AI box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="55" width="130" height="60"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="58" y="80">AI assistant</text>
    <text x="52" y="100">drafts / suggests</text>
  </g>
  <!-- arrow right to YOU review -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="170" y1="85" x2="268" y2="85"/>
  </g>
  <g fill="black">
    <polygon points="268,85 256,80 256,90"/>
  </g>
  <!-- YOU review box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="270" y="55" width="130" height="60"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="288" y="80">YOU review,</text>
    <text x="288" y="100">test, verify</text>
  </g>
  <!-- arrow down to own the result -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="335" y1="115" x2="335" y2="185"/>
  </g>
  <g fill="black">
    <polygon points="335,185 330,173 340,173"/>
  </g>
  <!-- own the result box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="270" y="188" width="130" height="50"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="285" y="218">YOU own it</text>
  </g>
  <!-- arrow back left (loop) to AI: ask again -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="270" y1="213" x2="105" y2="213"/>
    <line x1="105" y1="213" x2="105" y2="117"/>
  </g>
  <g fill="black">
    <polygon points="105,117 100,129 110,129"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="150" y="208">ask again / refine</text>
  </g>
  <!-- warning -->
  <g stroke="black" stroke-width="1.5" fill="none" stroke-dasharray="5 4">
    <rect x="40" y="270" width="360" height="60"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="58" y="293">Helpful and fast, but CONFIDENTLY WRONG sometimes -</text>
    <text x="58" y="312">like a knowledgeable intern whose work still gets checked.</text>
  </g>
</svg>
