<svg xmlns="http://www.w3.org/2000/svg" width="480" height="340" viewBox="0 0 480 340">
  <rect width="480" height="340" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="110" y="24">Standards: checked rules that build trust</text>
  </g>

  <!-- LEFT: inspector checklist + approval stamp -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="24" y="54">Checked and approved</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="66" width="130" height="120"/>
  </g>
  <!-- checklist rows -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="44" y="82" width="14" height="14"/>
    <rect x="44" y="106" width="14" height="14"/>
    <rect x="44" y="130" width="14" height="14"/>
  </g>
  <g stroke="black" stroke-width="2" fill="none">
    <polyline points="46,90 50,95 57,82"/>
    <polyline points="46,114 50,119 57,106"/>
    <polyline points="46,138 50,143 57,130"/>
  </g>
  <g stroke="black" stroke-width="1.5">
    <line x1="68" y1="89" x2="148" y2="89"/>
    <line x1="68" y1="113" x2="148" y2="113"/>
    <line x1="68" y1="137" x2="148" y2="137"/>
  </g>
  <!-- approval stamp -->
  <g stroke="black" stroke-width="2" fill="none">
    <circle cx="95" cy="168" r="14"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="78" y="171">PASSED</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="24" y="206">an inspector / safety mark</text>
    <text x="24" y="220">says it meets the code</text>
  </g>

  <!-- divider -->
  <g stroke="black" stroke-width="1">
    <line x1="240" y1="40" x2="240" y2="300"/>
  </g>

  <!-- RIGHT: interoperability, standard plug fits any socket -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="262" y="54">Interoperability</text>
  </g>
  <!-- plug -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="270" y="78" width="40" height="40"/>
    <line x1="282" y1="78" x2="282" y2="62"/>
    <line x1="298" y1="78" x2="298" y2="62"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="264" y="134">standard plug</text>
  </g>
  <!-- arrow -->
  <g stroke="black" stroke-width="1.5">
    <line x1="320" y1="98" x2="360" y2="98"/>
    <polyline points="352,92 360,98 352,104" fill="none"/>
  </g>
  <!-- socket -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="370" y="74" width="48" height="48"/>
    <circle cx="386" cy="98" r="4"/>
    <circle cx="402" cy="98" r="4"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="372" y="138">any socket</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="262" y="168">parts from different makers</text>
    <text x="262" y="182">work together</text>
  </g>

  <!-- codes encode past lessons -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="262" y="200" width="200" height="44"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="272" y="220">Codes encode PAST lessons</text>
    <text x="272" y="236" font-size="10">so we do not repeat old failures</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="24" y="318">Follow the rules: they make things safe, trustworthy, and compatible.</text>
  </g>
</svg>
