<svg xmlns="http://www.w3.org/2000/svg" width="470" height="320" viewBox="0 0 470 320">
  <rect width="470" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="90" y="24">BAD SLIDE vs GOOD SLIDE</text>
  </g>

  <!-- BAD slide: dense paragraph -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="48">BAD: a wall of text</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="58" width="190" height="130"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="42" y="78">Project Update Q3 Results</text>
  </g>
  <!-- many dense lines -->
  <g stroke="black" stroke-width="1" fill="none">
    <line x1="42" y1="92" x2="208" y2="92"/>
    <line x1="42" y1="104" x2="208" y2="104"/>
    <line x1="42" y1="116" x2="208" y2="116"/>
    <line x1="42" y1="128" x2="208" y2="128"/>
    <line x1="42" y1="140" x2="208" y2="140"/>
    <line x1="42" y1="152" x2="208" y2="152"/>
    <line x1="42" y1="164" x2="208" y2="164"/>
    <line x1="42" y1="176" x2="190" y2="176"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="40" y="206">speaker just reads it</text>
    <text x="40" y="220">aloud - audience tunes out</text>
  </g>

  <!-- GOOD slide: one idea, big visual -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="255" y="48">GOOD: one idea, big visual</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="255" y="58" width="190" height="130"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="285" y="84">Sales doubled</text>
  </g>
  <!-- simple big bar chart -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="285" y1="170" x2="285" y2="100"/>
    <line x1="285" y1="170" x2="420" y2="170"/>
  </g>
  <g stroke="black" stroke-width="1" fill="white">
    <rect x="305" y="142" width="30" height="28"/>
    <rect x="370" y="112" width="30" height="58"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="312" y="182">Q2</text>
    <text x="377" y="182">Q3</text>
  </g>

  <!-- caption -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="216">Slides SUPPORT the speaker - they are not the script. Use one</text>
    <text x="30" y="234">idea per slide, few words, and a big clear visual. Do not read</text>
    <text x="30" y="252">dense paragraphs aloud. Know your single key message and practice.</text>
    <text x="30" y="276">If asked something you do not know: "I will find out" beats bluffing.</text>
  </g>
</svg>
