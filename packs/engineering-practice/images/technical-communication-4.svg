<svg xmlns="http://www.w3.org/2000/svg" width="470" height="340" viewBox="0 0 470 340">
  <rect width="470" height="340" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="80" y="24">PICK THE RIGHT VISUAL</text>
  </g>

  <!-- CHART: trend -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="40" width="200" height="120"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="32" y="58">CHART - for a trend</text>
  </g>
  <!-- axes -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="50" y1="145" x2="50" y2="70"/>
    <line x1="50" y1="145" x2="205" y2="145"/>
  </g>
  <!-- rising line -->
  <g stroke="black" stroke-width="2" fill="none">
    <polyline points="55,135 95,120 135,100 175,80 200,72"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="8">
    <text x="120" y="158">time</text>
  </g>

  <!-- TABLE: exact values -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="250" y="40" width="200" height="120"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="262" y="58">TABLE - exact values</text>
  </g>
  <g stroke="black" stroke-width="1" fill="none">
    <rect x="265" y="70" width="170" height="78"/>
    <line x1="265" y1="96" x2="435" y2="96"/>
    <line x1="265" y1="122" x2="435" y2="122"/>
    <line x1="350" y1="70" x2="350" y2="148"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="275" y="87">Item</text>
    <text x="360" y="87">Value</text>
    <text x="275" y="113">A</text>
    <text x="360" y="113">12.4</text>
    <text x="275" y="139">B</text>
    <text x="360" y="139">7.9</text>
  </g>

  <!-- DIAGRAM: how parts connect -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="175" width="200" height="120"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="32" y="193">DIAGRAM - how parts connect</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="225" width="44" height="34"/>
    <rect x="110" y="225" width="44" height="34"/>
    <rect x="180" y="225" width="30" height="34"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="black">
    <line x1="84" y1="242" x2="108" y2="242"/>
    <polygon points="110,242 102,238 102,246"/>
    <line x1="154" y1="242" x2="178" y2="242"/>
    <polygon points="180,242 172,238 172,246"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="54" y="246">A</text>
    <text x="124" y="246">B</text>
    <text x="190" y="246">C</text>
  </g>

  <!-- FLOWCHART: process -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="250" y="175" width="200" height="120"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="262" y="193">FLOWCHART - a process</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="300" y="210" width="100" height="24"/>
    <rect x="300" y="252" width="100" height="24"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="black">
    <line x1="350" y1="234" x2="350" y2="250"/>
    <polygon points="350,252 346,244 354,244"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="316" y="226">Step 1</text>
    <text x="316" y="268">Step 2</text>
  </g>

  <!-- caption -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="320">Match the visual to the job. Keep it simple; label the parts;</text>
    <text x="30" y="335">each visual should make ONE point clearly.</text>
  </g>
</svg>
