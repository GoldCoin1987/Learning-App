<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300">
  <rect width="440" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="70" y="22">Cost of fixing a flaw rises the later you catch it</text>
  </g>
  <!-- axes -->
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="60" y1="240" x2="410" y2="240"/>
    <line x1="60" y1="240" x2="60" y2="50"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="150" y="268">When the flaw is found (later -&gt;)</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11" transform="rotate(-90 22 170)">
    <text x="-30" y="22">Cost to fix (higher -&gt;)</text>
  </g>
  <!-- rising step curve -->
  <g stroke="black" stroke-width="2" fill="none">
    <polyline points="60,228 150,222 150,200 240,188 240,140 330,118 330,70 410,60"/>
  </g>
  <!-- early small fix marker -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="100" cy="225" r="5"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="76" y="210">cheap fix</text>
    <text x="80" y="222">(early)</text>
  </g>
  <!-- late expensive fix marker -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="370" cy="65" r="5"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="300" y="58">expensive fix (late)</text>
  </g>
  <!-- stage labels along x -->
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="78" y="254">design</text>
    <text x="172" y="254">prototype</text>
    <text x="290" y="254">build</text>
    <text x="355" y="254">shipped</text>
  </g>
</svg>
