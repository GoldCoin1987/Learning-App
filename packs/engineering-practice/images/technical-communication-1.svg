<svg xmlns="http://www.w3.org/2000/svg" width="470" height="320" viewBox="0 0 470 320">
  <rect width="470" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="60" y="24">SAME MESSAGE, THREE AUDIENCES</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="120" y="44">"The new pump moves water faster."</text>
  </g>

  <!-- arrows down to three boxes -->
  <g stroke="black" stroke-width="1.5" fill="black">
    <line x1="90" y1="52" x2="90" y2="78"/>
    <polygon points="90,80 85,72 95,72"/>
    <line x1="235" y1="52" x2="235" y2="78"/>
    <polygon points="235,80 230,72 240,72"/>
    <line x1="380" y1="52" x2="380" y2="78"/>
    <polygon points="380,80 375,72 385,72"/>
  </g>

  <!-- Expert box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="82" width="130" height="150"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="34" y="102">EXPERT</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="34" y="124">teammate</text>
    <text x="34" y="146">full detail,</text>
    <text x="34" y="159">jargon OK:</text>
    <text x="34" y="178">"flow rate up</text>
    <text x="34" y="191">to 40 L/min,</text>
    <text x="34" y="204">same head</text>
    <text x="34" y="217">pressure."</text>
  </g>

  <!-- Manager box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="165" y="82" width="130" height="150"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="179" y="102">MANAGER</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="179" y="124">busy, wants</text>
    <text x="179" y="137">the result</text>
    <text x="179" y="159">"It is about</text>
    <text x="179" y="172">a third</text>
    <text x="179" y="185">faster, no</text>
    <text x="179" y="198">extra cost."</text>
  </g>

  <!-- Non-technical box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="310" y="82" width="140" height="150"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="324" y="102">NON-TECHNICAL</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="324" y="124">customer, no</text>
    <text x="324" y="137">jargon</text>
    <text x="324" y="159">"It fills your</text>
    <text x="324" y="172">tank quicker</text>
    <text x="324" y="185">than before."</text>
  </g>

  <!-- caption -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="262">One fact, three versions. KNOW YOUR AUDIENCE: give each</text>
    <text x="30" y="280">reader the detail and words THEY need - more for the expert,</text>
    <text x="30" y="298">plain language and no jargon for the non-technical reader.</text>
  </g>
</svg>
