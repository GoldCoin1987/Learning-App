<svg xmlns="http://www.w3.org/2000/svg" width="440" height="320" viewBox="0 0 440 320">
  <rect width="440" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="70" y="24">Waterfall vs Agile: plan-all vs short cycles</text>
  </g>
  <!-- WATERFALL: one long straight plan then build -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="20" y="60">WATERFALL (plan everything first, build in order)</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="20" y="74" width="70" height="34"/>
    <rect x="110" y="74" width="70" height="34"/>
    <rect x="200" y="74" width="70" height="34"/>
    <rect x="290" y="74" width="70" height="34"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="38" y="95">Plan</text>
    <text x="128" y="95">Build</text>
    <text x="222" y="95">Build</text>
    <text x="312" y="95">Done</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="90" y1="91" x2="108" y2="91"/>
    <line x1="180" y1="91" x2="198" y2="91"/>
    <line x1="270" y1="91" x2="288" y2="91"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="20" y="128">problems found late, near the end</text>
  </g>
  <!-- divider -->
  <g stroke="black" stroke-width="1" fill="none" stroke-dasharray="3 3">
    <line x1="20" y1="148" x2="420" y2="148"/>
  </g>
  <!-- AGILE: short repeating cycles with feedback -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="20" y="178">AGILE (short cycles, deliver a piece, get feedback)</text>
  </g>
  <!-- three small loops -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="90" cy="240" r="34"/>
    <circle cx="220" cy="240" r="34"/>
    <circle cx="350" cy="240" r="34"/>
  </g>
  <!-- arrowheads on loops -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <polygon points="90,206 82,214 96,216" fill="black"/>
    <polygon points="220,206 212,214 226,216" fill="black"/>
    <polygon points="350,206 342,214 356,216" fill="black"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="64" y="238">cycle 1</text>
    <text x="194" y="238">cycle 2</text>
    <text x="324" y="238">cycle 3</text>
    <text x="70" y="252">+adjust</text>
    <text x="200" y="252">+adjust</text>
    <text x="330" y="252">+adjust</text>
  </g>
  <!-- arrows linking cycles -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="124" y1="240" x2="184" y2="240"/>
    <polygon points="186,240 178,235 178,245" fill="black"/>
    <line x1="254" y1="240" x2="314" y2="240"/>
    <polygon points="316,240 308,235 308,245" fill="black"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="120" y="300">good when requirements can change</text>
  </g>
</svg>
