<svg xmlns="http://www.w3.org/2000/svg" width="470" height="330" viewBox="0 0 470 330">
  <rect width="470" height="330" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="120" y="24">The "bathtub curve" of failures</text>
  </g>

  <!-- axes -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="60" y1="60" x2="60" y2="250"/>
    <line x1="60" y1="250" x2="430" y2="250"/>
  </g>
  <!-- arrowheads on axes -->
  <g fill="black">
    <polygon points="60,56 56,66 64,66"/>
    <polygon points="434,250 424,246 424,254"/>
  </g>

  <!-- axis labels -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="14" y="120" transform="rotate(-90 24,150)">failure rate</text>
    <text x="300" y="272">time / uses --&gt;</text>
  </g>

  <!-- bathtub curve: high, dips, flat, rises -->
  <g stroke="black" stroke-width="2" fill="none">
    <path d="M 70 90 C 100 200, 140 230, 180 232 L 320 232 C 360 230, 400 150, 415 80"/>
  </g>

  <!-- region dividers (dashed) -->
  <g stroke="black" stroke-width="1" stroke-dasharray="4 3">
    <line x1="180" y1="70" x2="180" y2="250"/>
    <line x1="320" y1="70" x2="320" y2="250"/>
  </g>

  <!-- region labels -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="80" y="110">high early</text>
    <text x="80" y="124">("infant</text>
    <text x="80" y="138">mortality":</text>
    <text x="80" y="152">early defects)</text>

    <text x="208" y="200">low, steady</text>
    <text x="214" y="214">middle</text>
    <text x="206" y="228">(useful life)</text>

    <text x="345" y="120">rising late</text>
    <text x="345" y="134">("wear-out")</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="20" y="300">MTBF = mean time between failures = the average time before it fails.</text>
    <text x="20" y="318" font-size="10">Improve reliability: margins (build stronger than the minimum), redundancy, remove single points of failure.</text>
  </g>
</svg>
