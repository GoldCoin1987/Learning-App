<svg xmlns="http://www.w3.org/2000/svg" width="560" height="280" viewBox="0 0 560 280">
  <rect width="560" height="280" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="120" y="24">RESOLUTION: the smallest mark you can read</text>
  </g>
  <!-- ruler body -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="70" width="480" height="50"/>
  </g>
  <!-- cm numbers -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="56" y="64">0</text>
    <text x="176" y="64">1</text>
    <text x="296" y="64">2</text>
    <text x="416" y="64">3</text>
    <text x="500" y="64">cm</text>
  </g>
  <!-- major (cm) ticks -->
  <g stroke="black" stroke-width="1.5">
    <line x1="60" y1="70" x2="60" y2="105"/>
    <line x1="180" y1="70" x2="180" y2="105"/>
    <line x1="300" y1="70" x2="300" y2="105"/>
    <line x1="420" y1="70" x2="420" y2="105"/>
  </g>
  <!-- minor (mm) ticks between 0 and 1 -->
  <g stroke="black" stroke-width="1">
    <line x1="72" y1="70" x2="72" y2="90"/>
    <line x1="84" y1="70" x2="84" y2="90"/>
    <line x1="96" y1="70" x2="96" y2="90"/>
    <line x1="108" y1="70" x2="108" y2="90"/>
    <line x1="120" y1="70" x2="120" y2="90"/>
    <line x1="132" y1="70" x2="132" y2="90"/>
    <line x1="144" y1="70" x2="144" y2="90"/>
    <line x1="156" y1="70" x2="156" y2="90"/>
    <line x1="168" y1="70" x2="168" y2="90"/>
    <line x1="192" y1="70" x2="192" y2="90"/>
    <line x1="204" y1="70" x2="204" y2="90"/>
    <line x1="216" y1="70" x2="216" y2="90"/>
    <line x1="228" y1="70" x2="228" y2="90"/>
    <line x1="240" y1="70" x2="240" y2="90"/>
    <line x1="252" y1="70" x2="252" y2="90"/>
    <line x1="264" y1="70" x2="264" y2="90"/>
    <line x1="276" y1="70" x2="276" y2="90"/>
    <line x1="288" y1="70" x2="288" y2="90"/>
  </g>
  <!-- smallest division callout -->
  <g stroke="black" stroke-width="1" fill="none">
    <line x1="180" y1="135" x2="180" y2="120"/>
    <line x1="192" y1="135" x2="192" y2="120"/>
    <line x1="180" y1="135" x2="192" y2="135"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="150" y="152">smallest division = 1 mm</text>
  </g>
  <!-- object edge falling between ticks -->
  <g stroke="black" stroke-width="2">
    <line x1="246" y1="60" x2="246" y2="128"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="252" y="200">An edge here is "between 1.5 and 1.6 cm".</text>
    <text x="252" y="216">You cannot honestly claim 1.547 cm:</text>
    <text x="252" y="232">that is finer than the tool can show.</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="200">RANGE = the whole span</text>
    <text x="40" y="216">it can measure (here 0-3 cm</text>
    <text x="40" y="232">and the ruler's full length).</text>
  </g>
</svg>
