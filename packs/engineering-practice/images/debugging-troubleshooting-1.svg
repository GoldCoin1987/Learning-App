<svg xmlns="http://www.w3.org/2000/svg" width="440" height="360" viewBox="0 0 440 360">
  <rect width="440" height="360" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="60" y="22">The troubleshooting loop</text>
  </g>
  <!-- stage boxes arranged around a loop -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="160" y="40" width="120" height="40"/>
    <rect x="315" y="120" width="115" height="40"/>
    <rect x="300" y="240" width="130" height="40"/>
    <rect x="155" y="300" width="130" height="40"/>
    <rect x="10" y="180" width="115" height="40"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="178" y="64">1. Reproduce</text>
    <text x="322" y="138">2. Gather</text>
    <text x="322" y="153">evidence</text>
    <text x="312" y="258">3. Form a</text>
    <text x="312" y="273">hypothesis</text>
    <text x="163" y="318">4. Test ONE</text>
    <text x="163" y="333">change</text>
    <text x="22" y="198">5. Verify</text>
    <text x="22" y="213">the fix</text>
  </g>
  <!-- clockwise arrows -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="280" y1="62" x2="333" y2="118"/>
    <line x1="375" y1="160" x2="368" y2="238"/>
    <line x1="345" y1="280" x2="288" y2="305"/>
    <line x1="160" y1="320" x2="120" y2="222"/>
    <line x1="60" y1="180" x2="170" y2="82"/>
  </g>
  <g fill="black">
    <polygon points="333,118 321,116 328,127"/>
    <polygon points="368,238 362,228 374,230"/>
    <polygon points="288,305 298,298 300,310"/>
    <polygon points="120,222 116,232 128,228"/>
    <polygon points="170,82 160,80 164,92"/>
  </g>
  <!-- loop-back note -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="150" y="170">if the test</text>
    <text x="150" y="185">fails, loop</text>
    <text x="150" y="200">back and try</text>
    <text x="150" y="215">the next idea</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="20" y="354">Calm and systematic beats frantic guessing - follow the clues like a detective.</text>
  </g>
</svg>
