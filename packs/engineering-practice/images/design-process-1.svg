<svg xmlns="http://www.w3.org/2000/svg" width="440" height="360" viewBox="0 0 440 360">
  <rect width="440" height="360" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="70" y="22">The design process is a LOOP, not a line</text>
  </g>
  <!-- stage boxes arranged around a circle -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="160" y="40" width="120" height="38"/>
    <rect x="320" y="120" width="110" height="38"/>
    <rect x="300" y="250" width="120" height="38"/>
    <rect x="160" y="300" width="120" height="38"/>
    <rect x="20" y="250" width="120" height="38"/>
    <rect x="10" y="120" width="110" height="38"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="170" y="63">1. Understand</text>
    <text x="335" y="143">2. Imagine</text>
    <text x="318" y="266">3. Choose</text>
    <text x="170" y="316">4. Prototype</text>
    <text x="55" y="266">5. Test</text>
    <text x="35" y="143">6. Learn</text>
  </g>
  <!-- clockwise arrows between stages -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="280" y1="64" x2="338" y2="118"/>
    <line x1="378" y1="158" x2="372" y2="248"/>
    <line x1="350" y1="288" x2="288" y2="312"/>
    <line x1="160" y1="320" x2="142" y2="288"/>
    <line x1="62" y1="248" x2="58" y2="160"/>
    <line x1="78" y1="118" x2="168" y2="76"/>
  </g>
  <g fill="black">
    <polygon points="338,118 326,116 333,126"/>
    <polygon points="372,248 366,238 378,240"/>
    <polygon points="288,312 298,304 300,316"/>
    <polygon points="142,288 138,298 150,294"/>
    <polygon points="58,160 52,150 64,152"/>
    <polygon points="168,76 158,74 162,86"/>
  </g>
  <!-- center label -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="175" y="180">loops back</text>
    <text x="172" y="196">many times</text>
    <text x="158" y="214">until it meets</text>
    <text x="160" y="230">requirements</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="20" y="354">First attempts are meant to be improved - like tasting and adjusting a recipe.</text>
  </g>
</svg>
