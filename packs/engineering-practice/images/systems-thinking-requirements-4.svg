<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <rect width="440" height="280" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="70" y="22">Say WHAT, not HOW (avoid solution-bias)</text>
  </g>
  <!-- GOOD column -->
  <g stroke="black" stroke-width="2" fill="none">
    <rect x="25" y="50" width="180" height="150"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="95" y="74">GOOD = WHAT</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="110">"Shall show the</text>
    <text x="40" y="128">time remaining"</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="166">Leaves the door</text>
    <text x="40" y="182">open to better ideas</text>
  </g>
  <!-- checkmark -->
  <g stroke="black" stroke-width="2.5" fill="none">
    <polyline points="160,86 168,94 184,72"/>
  </g>
  <!-- BAD column -->
  <g stroke="black" stroke-width="2" fill="none">
    <rect x="235" y="50" width="180" height="150"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="305" y="74">BAD = HOW</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="250" y="110">"Shall use a red</text>
    <text x="250" y="128">LED display"</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="250" y="166">Locks one solution</text>
    <text x="250" y="182">too early - kills options</text>
  </g>
  <!-- cross mark -->
  <g stroke="black" stroke-width="2.5" fill="none">
    <line x1="372" y1="70" x2="388" y2="86"/>
    <line x1="388" y1="70" x2="372" y2="86"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="244">Like "get to work by 9" (the need) vs "buy a red sports</text>
    <text x="30" y="262">car" (one premature solution).</text>
  </g>
</svg>
