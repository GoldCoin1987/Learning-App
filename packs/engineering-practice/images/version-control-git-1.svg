<svg xmlns="http://www.w3.org/2000/svg" width="470" height="320" viewBox="0 0 470 320">
  <rect width="470" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="60" y="24">File-copy chaos vs. version control</text>
  </g>

  <!-- LEFT: messy file copies -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="24" y="50">Copy-the-file chaos</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="24" y="64" width="84" height="34"/>
    <rect x="120" y="78" width="84" height="34"/>
    <rect x="40" y="112" width="84" height="34"/>
    <rect x="120" y="128" width="84" height="34"/>
    <rect x="60" y="176" width="100" height="34"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="8">
    <text x="28" y="84">report.docx</text>
    <text x="124" y="98">report_final.docx</text>
    <text x="44" y="132">report_FINAL.docx</text>
    <text x="124" y="148">final_v2.docx</text>
    <text x="64" y="196">final_v2_FINAL_really</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="24" y="238">Which is right? Nobody knows.</text>
    <text x="24" y="253">Edits get lost; no history.</text>
  </g>

  <!-- divider -->
  <g stroke="black" stroke-width="1" stroke-dasharray="4,4">
    <line x1="232" y1="40" x2="232" y2="300"/>
  </g>

  <!-- RIGHT: clean timeline of commits -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="252" y="50">One file, a clean history</text>
  </g>
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="262" y1="120" x2="440" y2="120"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="white">
    <circle cx="270" cy="120" r="9"/>
    <circle cx="320" cy="120" r="9"/>
    <circle cx="370" cy="120" r="9"/>
    <circle cx="420" cy="120" r="9"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="252" y="148">start</text>
    <text x="300" y="148">add intro</text>
    <text x="352" y="148">fix data</text>
    <text x="402" y="148">v-latest</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="252" y="184">Each dot = a saved snapshot</text>
    <text x="252" y="199">(who, what, when, why).</text>
    <text x="252" y="222">Go BACK to any point.</text>
    <text x="252" y="237">Latest is always clear.</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="300">Version control = a system that tracks every change over time.</text>
  </g>
</svg>
