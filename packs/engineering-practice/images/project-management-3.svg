<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300">
  <rect width="440" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="50" y="24">Estimate vs reality: we guess too optimistically</text>
  </g>
  <!-- baseline -->
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="120" y1="70" x2="120" y2="220"/>
  </g>
  <!-- estimate bar (short) -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="120" y="90" width="90" height="34"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="111">guess:</text>
    <text x="130" y="111">"10 min"</text>
  </g>
  <!-- reality bar (long) -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="120" y="150" width="270" height="34"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="171">reality:</text>
    <text x="200" y="171">actually an hour</text>
  </g>
  <!-- gap brace -->
  <g stroke="black" stroke-width="1.5" fill="none" stroke-dasharray="4 3">
    <line x1="210" y1="124" x2="210" y2="150"/>
  </g>
  <!-- buffer label -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="300" y1="200" x2="300" y2="230"/>
    <polygon points="300,232 295,222 305,222" fill="black"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="240" y="252">add BUFFER for the gap</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="60" y="282">Treat an estimate as a range, not a promise.</text>
  </g>
</svg>
