<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300">
  <rect width="440" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="70" y="24">A trade-off: push one up, the other goes down</text>
  </g>
  <!-- seesaw pivot -->
  <g stroke="black" stroke-width="2" fill="none">
    <polygon points="220,210 200,250 240,250"/>
  </g>
  <!-- tilted beam -->
  <g stroke="black" stroke-width="3" fill="none">
    <line x1="70" y1="150" x2="370" y2="250"/>
  </g>
  <!-- left pan (up = lighter) -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="90" y1="150" x2="90" y2="120"/>
    <rect x="55" y="95" width="70" height="26"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="66" y="112">LIGHTER</text>
    <text x="60" y="86">(goes up)</text>
  </g>
  <!-- right pan (down = stronger) -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="350" y1="243" x2="350" y2="268"/>
    <rect x="315" y="268" width="74" height="26"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="318" y="285">STRONGER</text>
  </g>
  <!-- explanation -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="150" y="200">improving one thing</text>
    <text x="150" y="216">costs you the other</text>
  </g>
</svg>
