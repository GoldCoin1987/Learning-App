<svg xmlns="http://www.w3.org/2000/svg" width="480" height="340" viewBox="0 0 480 340">
  <rect width="480" height="340" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="118" y="24">The ethics priority pyramid</text>
  </g>

  <!-- pyramid outline -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <polygon points="240,46 116,266 364,266"/>
    <!-- dividers -->
    <line x1="184" y1="146" x2="296" y2="146"/>
    <line x1="150" y1="206" x2="330" y2="206"/>
  </g>

  <!-- top tier: PUBLIC -->
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="206" y="120">PUBLIC</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="180" y="136">safety, health, welfare</text>
  </g>

  <!-- middle tier: EMPLOYER -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="196" y="182">EMPLOYER</text>
  </g>

  <!-- bottom tier: SELF -->
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="186" y="244">SELF-INTEREST</text>
  </g>

  <!-- arrow showing priority -->
  <g stroke="black" stroke-width="1.5">
    <line x1="408" y1="260" x2="408" y2="70"/>
    <polyline points="402,82 408,70 414,82" fill="none"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="384" y="288">comes</text>
    <text x="384" y="300">first</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="322">Public safety and welfare rank ABOVE the employer's wishes, above your own convenience.</text>
  </g>
</svg>
