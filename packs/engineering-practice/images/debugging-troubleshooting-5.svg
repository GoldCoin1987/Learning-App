<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300">
  <rect width="440" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="40" y="22">Known-good substitution</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="30" y="46">Swap a part you TRUST in place of a suspect.</text>
  </g>
  <!-- suspect part -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="80" width="120" height="60"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="60" y="108">suspect</text>
    <text x="68" y="126">part (?)</text>
  </g>
  <!-- arrow swap -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="170" y1="110" x2="270" y2="110"/>
  </g>
  <g fill="black">
    <polygon points="270,110 256,104 256,116"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="178" y="103">swap in</text>
  </g>
  <!-- known-good part -->
  <g stroke="black" stroke-width="2" fill="none">
    <rect x="280" y="80" width="120" height="60"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="298" y="108">known-good</text>
    <text x="312" y="126">part</text>
  </g>
  <!-- check mark on known-good -->
  <g stroke="black" stroke-width="2" fill="none">
    <polyline points="385,90 392,98 405,82"/>
  </g>
  <!-- outcomes -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="220" y1="160" x2="120" y2="195"/>
    <line x1="220" y1="160" x2="320" y2="195"/>
  </g>
  <g fill="black">
    <polygon points="120,195 132,191 127,201"/>
    <polygon points="320,195 313,191 308,201"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="200" width="180" height="60"/>
    <rect x="230" y="200" width="180" height="60"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="45" y="222">Problem GONE?</text>
    <text x="45" y="240">The suspect part</text>
    <text x="45" y="256">really was the fault.</text>
    <text x="245" y="222">Problem STAYS?</text>
    <text x="245" y="240">That part was fine -</text>
    <text x="245" y="256">cross it off, look on.</text>
  </g>
</svg>
