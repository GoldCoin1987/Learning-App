<svg xmlns="http://www.w3.org/2000/svg" width="560" height="300" viewBox="0 0 560 300">
  <rect width="560" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="120" y="24">ACCURACY vs PRECISION (the darts picture)</text>
  </g>
  <!-- Target 1: precise, not accurate -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="100" cy="140" r="60"/>
    <circle cx="100" cy="140" r="40"/>
    <circle cx="100" cy="140" r="20"/>
  </g>
  <g fill="black">
    <circle cx="142" cy="108" r="3"/>
    <circle cx="150" cy="116" r="3"/>
    <circle cx="146" cy="100" r="3"/>
    <circle cx="138" cy="116" r="3"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="55" y="225">precise,</text>
    <text x="50" y="241">not accurate</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="40" y="262">tight cluster,</text>
    <text x="40" y="275">but off-center</text>
  </g>
  <!-- Target 2: accurate-ish, not precise -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="280" cy="140" r="60"/>
    <circle cx="280" cy="140" r="40"/>
    <circle cx="280" cy="140" r="20"/>
  </g>
  <g fill="black">
    <circle cx="258" cy="120" r="3"/>
    <circle cx="306" cy="130" r="3"/>
    <circle cx="270" cy="170" r="3"/>
    <circle cx="300" cy="162" r="3"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="232" y="225">accurate on average,</text>
    <text x="248" y="241">not precise</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="222" y="262">spread out, but</text>
    <text x="222" y="275">centered overall</text>
  </g>
  <!-- Target 3: both -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="460" cy="140" r="60"/>
    <circle cx="460" cy="140" r="40"/>
    <circle cx="460" cy="140" r="20"/>
  </g>
  <g fill="black">
    <circle cx="458" cy="138" r="3"/>
    <circle cx="464" cy="142" r="3"/>
    <circle cx="456" cy="144" r="3"/>
    <circle cx="463" cy="135" r="3"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="412" y="225">accurate AND</text>
    <text x="428" y="241">precise</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="402" y="262">tight cluster,</text>
    <text x="402" y="275">on the bullseye</text>
  </g>
</svg>
