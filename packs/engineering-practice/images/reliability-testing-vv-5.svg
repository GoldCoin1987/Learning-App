<svg xmlns="http://www.w3.org/2000/svg" width="470" height="340" viewBox="0 0 470 340">
  <rect width="470" height="340" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="90" y="24">Redundancy and fail-safe design</text>
  </g>

  <!-- LEFT: redundancy = a backup -->
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="20" y="56">Redundancy: a BACKUP</text>
  </g>
  <!-- car with main tire + spare -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="80" width="140" height="44"/>
    <circle cx="60" cy="132" r="14"/>
    <circle cx="140" cy="132" r="14"/>
  </g>
  <!-- flat main tire X -->
  <g stroke="black" stroke-width="1.5">
    <line x1="52" y1="124" x2="68" y2="140"/>
    <line x1="68" y1="124" x2="52" y2="140"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="40" y="166">tire fails</text>
  </g>
  <!-- spare tire -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="120" cy="190" r="18"/>
    <circle cx="120" cy="190" r="6"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="150" y="186">spare tire</text>
    <text x="150" y="200">takes over</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="20" y="230">One failure is NOT fatal:</text>
    <text x="20" y="244">a backup keeps it working.</text>
    <text x="20" y="262" font-style="italic">(A backup, not duplicated effort.)</text>
  </g>

  <!-- divider -->
  <g stroke="black" stroke-width="1">
    <line x1="250" y1="40" x2="250" y2="300"/>
  </g>

  <!-- RIGHT: fail-safe = defaults to safe -->
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="270" y="56">Fail-safe: fails to a SAFE state</text>
  </g>
  <!-- fuse -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="280" y1="100" x2="310" y2="100"/>
    <rect x="310" y="88" width="50" height="24"/>
    <line x1="360" y1="100" x2="390" y2="100"/>
  </g>
  <!-- break in fuse wire -->
  <g stroke="black" stroke-width="1.5">
    <line x1="318" y1="100" x2="332" y2="100"/>
    <line x1="338" y1="100" x2="352" y2="100"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="300" y="132">fuse blows</text>
    <text x="280" y="148" font-size="10">--&gt; cuts power, protects the rest</text>
  </g>

  <!-- gate defaults closed -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="290" y1="190" x2="290" y2="250"/>
    <line x1="380" y1="190" x2="380" y2="250"/>
    <line x1="290" y1="250" x2="380" y2="250"/>
    <rect x="300" y="200" width="70" height="44"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="296" y="226">CLOSED</text>
    <text x="280" y="270" font-size="10">gate defaults closed when power is lost</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="20" y="320">Ask first: "How could this fail, and how bad would it be?" Then design failures to be safe.</text>
  </g>
</svg>
