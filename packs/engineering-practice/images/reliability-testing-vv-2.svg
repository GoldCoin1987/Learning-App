<svg xmlns="http://www.w3.org/2000/svg" width="470" height="360" viewBox="0 0 470 360">
  <rect width="470" height="360" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="70" y="24">Testing: small pieces to the whole</text>
  </g>

  <!-- Step 1: small pieces -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="60" width="36" height="36"/>
    <rect x="74" y="60" width="36" height="36"/>
    <rect x="118" y="60" width="36" height="36"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="112">1. test each piece</text>
    <text x="40" y="126" font-size="10">on its own</text>
  </g>

  <!-- arrow down -->
  <g stroke="black" stroke-width="1.5">
    <line x1="92" y1="132" x2="92" y2="158"/>
    <polygon points="92,158 88,150 96,150" fill="black"/>
  </g>

  <!-- Step 2: combined -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="160" width="124" height="40"/>
    <line x1="71" y1="160" x2="71" y2="200"/>
    <line x1="112" y1="160" x2="112" y2="200"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="216">2. test them together</text>
  </g>

  <!-- arrow down -->
  <g stroke="black" stroke-width="1.5">
    <line x1="92" y1="222" x2="92" y2="248"/>
    <polygon points="92,248 88,240 96,240" fill="black"/>
  </g>

  <!-- Step 3: whole end to end -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="250" width="124" height="44"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="48" y="276">WHOLE thing</text>
    <text x="30" y="310">3. end-to-end, as a user</text>
  </g>

  <!-- divider -->
  <g stroke="black" stroke-width="1">
    <line x1="220" y1="50" x2="220" y2="320"/>
  </g>

  <!-- RIGHT: happy path vs edge/failure -->
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="250" y="64">Test BOTH:</text>
  </g>
  <!-- happy path road -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="250" y1="100" x2="440" y2="100"/>
    <polygon points="440,100 430,95 430,105" fill="black"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="250" y="92">"Happy path" (normal case)</text>
    <text x="250" y="120" font-size="10">e.g. recipe followed exactly</text>
  </g>

  <!-- edge / failure cases -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="250" y1="170" x2="440" y2="170"/>
    <line x1="300" y1="160" x2="320" y2="180"/>
    <line x1="320" y1="160" x2="300" y2="180"/>
    <line x1="380" y1="160" x2="400" y2="180"/>
    <line x1="400" y1="160" x2="380" y2="180"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="250" y="158">Edge / failure cases</text>
    <text x="250" y="200" font-size="10">empty, maximum, weird input,</text>
    <text x="250" y="214" font-size="10">"what if the oven runs hot?"</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="250" y="250">A passing test shows a bug is</text>
    <text x="250" y="264">ABSENT only for what you tested.</text>
    <text x="250" y="284" font-style="italic">"Testing shows the presence</text>
    <text x="250" y="298" font-style="italic">of bugs, not their absence."</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="20" y="344">You cannot test everything, so test smartly: pieces, together, whole; normal AND edge.</text>
  </g>
</svg>
