<svg xmlns="http://www.w3.org/2000/svg" width="460" height="280" viewBox="0 0 460 280">
  <rect width="460" height="280" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="40" y="24">A hard constraint can knock out a high scorer</text>
  </g>
  <!-- high-scoring option box -->
  <g stroke="black" stroke-width="2" fill="none">
    <rect x="40" y="60" width="170" height="90"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="60" y="88">Car A</text>
    <text x="60" y="110">great score: 19/20</text>
    <text x="60" y="132">but too long to fit</text>
  </g>
  <!-- big X over it -->
  <g stroke="black" stroke-width="2.5" fill="none">
    <line x1="40" y1="60" x2="210" y2="150"/>
    <line x1="210" y1="60" x2="40" y2="150"/>
  </g>
  <!-- arrow to constraint -->
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="210" y1="105" x2="270" y2="105"/>
  </g>
  <g fill="black">
    <polygon points="270,105 258,99 258,111"/>
  </g>
  <!-- garage constraint -->
  <g stroke="black" stroke-width="2" fill="none">
    <rect x="275" y="70" width="150" height="70"/>
    <line x1="275" y1="70" x2="350" y2="40"/>
    <line x1="350" y1="40" x2="425" y2="70"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="300" y="100">GARAGE</text>
    <text x="295" y="122">(hard limit)</text>
  </g>
  <!-- explanation -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="200">A scored criterion adds points. A hard constraint is a must-have:</text>
    <text x="40" y="220">fail it and the option is OUT, no matter how high its score.</text>
    <text x="40" y="240">Check constraints FIRST, then score what is left.</text>
  </g>
</svg>
