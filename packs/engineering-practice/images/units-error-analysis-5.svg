<svg xmlns="http://www.w3.org/2000/svg" width="560" height="270" viewBox="0 0 560 270">
  <rect width="560" height="270" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="120" y="26">SANITY CHECK: DOES THE SIZE MAKE SENSE?</text>
  </g>
  <!-- absurd result box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="60" width="220" height="120"/>
  </g>
  <!-- tiny car drawn small -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="120" y="100" width="40" height="14"/>
    <path d="M128 100 L134 92 L150 92 L156 100"/>
    <circle cx="128" cy="116" r="5"/>
    <circle cx="152" cy="116" r="5"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="18">
    <text x="78" y="150">car = 5 g ?</text>
  </g>
  <!-- big X over the absurd result -->
  <g stroke="black" stroke-width="2">
    <line x1="60" y1="70" x2="240" y2="170"/>
    <line x1="240" y1="70" x2="60" y2="170"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="60" y="200">A real car weighs about 1000 kg,</text>
    <text x="60" y="216">not 5 grams. The SIZE is absurd,</text>
    <text x="60" y="232">so a unit or decimal slipped.</text>
  </g>
  <!-- arrow to corrected -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="270" y1="120" x2="320" y2="120"/>
    <polyline points="310,113 320,120 310,127"/>
  </g>
  <!-- rough estimate box -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="330" y="60" width="200" height="120"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="345" y="86">Rough (Fermi) estimate:</text>
    <text x="345" y="110">a car is roughly</text>
    <text x="345" y="130">"about a thousand kg",</text>
    <text x="345" y="150">i.e. ~1000 kg.</text>
    <text x="345" y="172">Catches blunders fast.</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="258">An order-of-magnitude guess (just the rough size) is a quick check before trusting any answer.</text>
  </g>
</svg>
