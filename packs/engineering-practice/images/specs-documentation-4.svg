<svg xmlns="http://www.w3.org/2000/svg" width="460" height="300" viewBox="0 0 460 300">
  <rect width="460" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="60" y="22">A STALE DOC IS DANGEROUS</text>
  </g>
  <!-- LEFT: old manual -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="55" width="110" height="135"/>
    <line x1="55" y1="80" x2="135" y2="80"/>
    <line x1="55" y1="98" x2="135" y2="98"/>
    <line x1="55" y1="116" x2="135" y2="116"/>
    <line x1="55" y1="134" x2="135" y2="134"/>
    <line x1="55" y1="152" x2="120" y2="152"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="48" y="72">MANUAL</text>
    <text x="44" y="208">"Press the RED</text>
    <text x="50" y="222">button to stop"</text>
    <text x="48" y="240">(LAST YEAR'S</text>
    <text x="60" y="254">model)</text>
  </g>
  <!-- "does not match" arrow -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="160" y1="120" x2="215" y2="120"/>
  </g>
  <g fill="black">
    <polygon points="215,120 205,115 205,125"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="158" y="112">does NOT</text>
    <text x="162" y="138">match!</text>
  </g>
  <!-- big X over the mismatch -->
  <g stroke="black" stroke-width="2.5" fill="none">
    <line x1="170" y1="150" x2="205" y2="185"/>
    <line x1="205" y1="150" x2="170" y2="185"/>
  </g>
  <!-- RIGHT: actual product -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="230" y="65" width="120" height="100"/>
    <circle cx="290" cy="115" r="20"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="238" y="58">ACTUAL PRODUCT</text>
    <text x="278" y="119">GREEN</text>
    <text x="260" y="185">(button is now GREEN)</text>
  </g>
  <!-- consequence -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="290" y1="200" x2="290" y2="225"/>
  </g>
  <g fill="black">
    <polygon points="290,225 285,215 295,215"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="225" y="248">User follows the old doc -&gt; presses</text>
    <text x="225" y="264">the wrong thing -&gt; MISTAKE.</text>
    <text x="225" y="285">An out-of-date doc misleads: worse than none.</text>
  </g>
</svg>
