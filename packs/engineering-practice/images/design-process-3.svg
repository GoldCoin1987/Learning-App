<svg xmlns="http://www.w3.org/2000/svg" width="460" height="280" viewBox="0 0 460 280">
  <rect width="460" height="280" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="90" y="22">Prototype: build rough and cheap to learn fast</text>
  </g>
  <!-- rough prototype: a wobbly paper/cardboard sketch -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="30" y="60" width="110" height="120"/>
    <line x1="45" y1="82" x2="125" y2="82"/>
    <line x1="45" y1="104" x2="110" y2="104"/>
    <rect x="45" y="120" width="50" height="26"/>
    <line x1="45" y1="162" x2="125" y2="162"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="34" y="200">Rough sketch /</text>
    <text x="34" y="214">cardboard mock-up</text>
    <text x="34" y="232">(just enough to ask</text>
    <text x="34" y="246">one question)</text>
  </g>
  <!-- arrow to TEST -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="150" y1="120" x2="200" y2="120"/>
  </g>
  <g fill="black">
    <polygon points="200,120 190,115 190,125"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <ellipse cx="240" cy="120" rx="36" ry="26"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="222" y="124">TEST</text>
  </g>
  <!-- arrow to refined -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="278" y1="120" x2="328" y2="120"/>
  </g>
  <g fill="black">
    <polygon points="328,120 318,115 318,125"/>
  </g>
  <!-- refined version: cleaner box -->
  <g stroke="black" stroke-width="2.5" fill="none">
    <rect x="332" y="60" width="110" height="120"/>
    <line x1="347" y1="84" x2="427" y2="84"/>
    <line x1="347" y1="106" x2="427" y2="106"/>
    <rect x="347" y="122" width="64" height="30"/>
    <line x1="347" y1="166" x2="427" y2="166"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="336" y="200">Refined version,</text>
    <text x="336" y="214">after learning</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="60" y="272">Fail fast, fail cheap: find problems early, while fixing them is still easy.</text>
  </g>
</svg>
