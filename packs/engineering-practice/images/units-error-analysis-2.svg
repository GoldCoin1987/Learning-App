<svg xmlns="http://www.w3.org/2000/svg" width="560" height="260" viewBox="0 0 560 260">
  <rect width="560" height="260" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="80" y="26">CONVERT BY MULTIPLYING BY A FRACTION EQUAL TO 1</text>
  </g>
  <!-- the equation -->
  <g fill="black" font-family="sans-serif" font-size="22">
    <text x="40" y="120">3 km</text>
    <text x="120" y="120">x</text>
  </g>
  <!-- fraction 1000 m / 1 km -->
  <g stroke="black" stroke-width="1.5">
    <line x1="155" y1="112" x2="265" y2="112"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="20">
    <text x="170" y="100">1000 m</text>
    <text x="185" y="135">1 km</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="22">
    <text x="285" y="120">=</text>
    <text x="320" y="120">3000 m</text>
  </g>
  <!-- cancellation note: km cancels -->
  <g stroke="black" stroke-width="1.5">
    <line x1="38" y1="124" x2="78" y2="100"/>
    <line x1="183" y1="146" x2="222" y2="123"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="40" y="160">"km" on top and "km" on the bottom cancel out, leaving the answer in meters.</text>
    <text x="40" y="178">The fraction (1000 m / 1 km) equals 1, so multiplying by it does not change the amount,</text>
    <text x="40" y="196">only the unit it is written in. 3 km and 3000 m are the same length.</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="230">DIMENSIONAL ANALYSIS = check the units match. If a "speed" comes out as meters per kilogram,</text>
    <text x="40" y="247">something is wrong. Speed must be a distance over a time (e.g. miles per hour).</text>
  </g>
</svg>
