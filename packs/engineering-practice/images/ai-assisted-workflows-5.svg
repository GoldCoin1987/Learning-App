<svg xmlns="http://www.w3.org/2000/svg" width="460" height="400" viewBox="0 0 460 400">
  <rect width="460" height="400" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="30" y="22">The whole Engineering Practice loop</text>
  </g>
  <!-- five stage boxes around a circle -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="165" y="40" width="130" height="40"/>
    <rect x="340" y="150" width="110" height="44"/>
    <rect x="285" y="300" width="140" height="40"/>
    <rect x="35" y="300" width="140" height="40"/>
    <rect x="10" y="150" width="110" height="44"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="178" y="58">1. Understand</text>
    <text x="178" y="73">the need</text>
    <text x="350" y="168">2. Design and</text>
    <text x="350" y="183">trade off</text>
    <text x="298" y="318">3. Build and</text>
    <text x="298" y="333">test</text>
    <text x="46" y="318">5. Work safely</text>
    <text x="46" y="333">and ethically</text>
    <text x="20" y="168">4. Document</text>
    <text x="20" y="183">+ communicate</text>
  </g>
  <!-- clockwise arrows -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="295" y1="62" x2="372" y2="148"/>
    <line x1="398" y1="194" x2="380" y2="298"/>
    <line x1="335" y1="320" x2="180" y2="320"/>
    <line x1="100" y1="298" x2="70" y2="196"/>
    <line x1="78" y1="148" x2="172" y2="74"/>
  </g>
  <g fill="black">
    <polygon points="372,148 360,146 366,156"/>
    <polygon points="380,298 374,287 386,289"/>
    <polygon points="180,320 192,315 192,325"/>
    <polygon points="70,196 64,207 76,205"/>
    <polygon points="172,74 162,72 166,84"/>
  </g>
  <!-- center: human judgment + tools amplify -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="230" cy="200" r="62"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="183" y="190">human judgment</text>
    <text x="186" y="207">+ responsibility</text>
    <text x="195" y="224">at the center</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="155" y="362">Modern tools (including AI) AMPLIFY this loop -</text>
    <text x="155" y="378">they do not replace your judgment.</text>
  </g>
</svg>
