<svg xmlns="http://www.w3.org/2000/svg" width="470" height="320" viewBox="0 0 470 320">
  <rect width="470" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="70" y="24">Remote: push up, pull down</text>
  </g>

  <!-- shared remote at top -->
  <g stroke="black" stroke-width="2" fill="none">
    <rect x="160" y="44" width="150" height="56"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="180" y="70">SHARED REMOTE</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="168" y="90">single source of truth + backup</text>
  </g>

  <!-- two local copies at bottom -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="220" width="130" height="50"/>
    <rect x="300" y="220" width="130" height="50"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="62" y="242">Your copy</text>
    <text x="318" y="242">Teammate copy</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="62" y="260">(on your machine)</text>
    <text x="318" y="260">(on their machine)</text>
  </g>

  <!-- arrows: push up from left, pull down to left -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="95" y1="220" x2="180" y2="104"/>
    <line x1="125" y1="220" x2="210" y2="104"/>
  </g>
  <g fill="black">
    <polygon points="180,104 184,114 191,108"/>
    <polygon points="125,220 117,214 124,210"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="60" y="170">PUSH up</text>
    <text x="138" y="186">PULL down</text>
  </g>

  <!-- arrows for teammate -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="375" y1="220" x2="290" y2="104"/>
    <line x1="345" y1="220" x2="260" y2="104"/>
  </g>
  <g fill="black">
    <polygon points="290,104 286,114 279,108"/>
    <polygon points="345,220 353,214 346,210"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="350" y="170">PUSH up</text>
    <text x="270" y="186">PULL down</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="30" y="300">PUSH = send your changes UP. PULL = bring others' changes DOWN. Like a cloud folder</text>
    <text x="30" y="316">that also remembers every version.</text>
  </g>
</svg>
