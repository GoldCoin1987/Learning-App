<svg xmlns="http://www.w3.org/2000/svg" width="470" height="320" viewBox="0 0 470 320">
  <rect width="470" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="90" y="24">Reproducibility = same result</text>
  </g>

  <!-- LEFT: vague, "works on my machine" -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="24" y="50">Vague: "works on my machine"</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="64" width="120" height="70"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="52" y="86">"some flour,</text>
    <text x="52" y="100">an oven,</text>
    <text x="52" y="114">bake a while"</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="100" y1="134" x2="100" y2="160"/>
    <polygon points="100,160 96,152 104,152" fill="black"/>
  </g>
  <!-- two different results -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="44" y="164" width="50" height="40"/>
    <rect x="110" y="164" width="50" height="40"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="56" y="188">good?</text>
    <text x="118" y="188">burnt?</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="24" y="226">Different result each time.</text>
  </g>

  <!-- divider -->
  <g stroke="black" stroke-width="1" stroke-dasharray="4,4">
    <line x1="234" y1="40" x2="234" y2="290"/>
  </g>

  <!-- RIGHT: pinned recipe -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="252" y="50">Pinned: exact recipe</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="268" y="64" width="150" height="70"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="280" y="82">250 g brand-X flour</text>
    <text x="280" y="96">2 eggs, size L</text>
    <text x="280" y="110">oven 180 C, 25 min</text>
    <text x="280" y="124">(versions recorded)</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="343" y1="134" x2="343" y2="160"/>
    <polygon points="343,160 339,152 347,152" fill="black"/>
  </g>
  <!-- identical results -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="288" y="164" width="50" height="40"/>
    <rect x="350" y="164" width="50" height="40"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="9">
    <text x="302" y="188">same</text>
    <text x="364" y="188">same</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="252" y="226">Anyone recreates it exactly.</text>
  </g>

  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="24" y="262">Reproducible = you recorded the VERSIONS of everything (files, settings, inputs),</text>
    <text x="24" y="280">so anyone (including future-you) gets the same result. Ties to traceability and specs.</text>
  </g>
</svg>
