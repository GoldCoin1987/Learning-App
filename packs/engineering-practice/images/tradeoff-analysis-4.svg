<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300">
  <rect width="440" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="60" y="22">Diminishing returns: more cost, less extra gain</text>
  </g>
  <!-- axes -->
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="60" y1="240" x2="410" y2="240"/>
    <line x1="60" y1="240" x2="60" y2="50"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="150" y="266">Effort / cost (more -&gt;)</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11" transform="rotate(-90 22 170)">
    <text x="-40" y="22">Quality (higher -&gt;)</text>
  </g>
  <!-- curve that flattens (rises fast then levels off) -->
  <g stroke="black" stroke-width="2" fill="none">
    <path d="M60,235 C120,120 180,95 250,88 C320,82 370,80 410,79"/>
  </g>
  <!-- good enough marker -->
  <g stroke="black" stroke-width="1.5" fill="none" stroke-dasharray="4 3">
    <line x1="200" y1="92" x2="200" y2="240"/>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="200" cy="92" r="5"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="150" y="288">'good enough' (meets the requirement)</text>
  </g>
  <!-- arrow pointing at flat tail -->
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="290" y="120">past here, big extra cost</text>
    <text x="290" y="134">buys tiny extra quality</text>
  </g>
</svg>
