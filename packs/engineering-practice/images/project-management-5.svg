<svg xmlns="http://www.w3.org/2000/svg" width="440" height="320" viewBox="0 0 440 320">
  <rect width="440" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="60" y="24">A kanban board: move cards left to right</text>
  </g>
  <!-- three columns -->
  <g stroke="black" stroke-width="2" fill="none">
    <rect x="20" y="50" width="130" height="240"/>
    <rect x="155" y="50" width="130" height="240"/>
    <rect x="290" y="50" width="130" height="240"/>
  </g>
  <!-- column headers -->
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="58" y="72">TO DO</text>
    <text x="194" y="72">DOING</text>
    <text x="330" y="72">DONE</text>
  </g>
  <g stroke="black" stroke-width="1" fill="none">
    <line x1="20" y1="80" x2="150" y2="80"/>
    <line x1="155" y1="80" x2="285" y2="80"/>
    <line x1="290" y1="80" x2="420" y2="80"/>
  </g>
  <!-- WIP limit note on Doing -->
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="170" y="96">limit: max 2</text>
  </g>
  <!-- To Do cards -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="32" y="104" width="106" height="30"/>
    <rect x="32" y="142" width="106" height="30"/>
    <rect x="32" y="180" width="106" height="30"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="44" y="123">task card</text>
    <text x="44" y="161">task card</text>
    <text x="44" y="199">task card</text>
  </g>
  <!-- Doing cards (only 2 = WIP limit) -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="167" y="108" width="106" height="30"/>
    <rect x="167" y="146" width="106" height="30"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="179" y="127">task card</text>
    <text x="179" y="165">task card</text>
  </g>
  <!-- Done cards -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="302" y="104" width="106" height="30"/>
    <rect x="302" y="142" width="106" height="30"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="314" y="123">task card</text>
    <text x="314" y="161">task card</text>
  </g>
  <!-- flow arrows -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="138" y1="250" x2="166" y2="250"/>
    <polygon points="168,250 160,245 160,255" fill="black"/>
    <line x1="273" y1="250" x2="301" y2="250"/>
    <polygon points="303,250 295,245 295,255" fill="black"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="10">
    <text x="40" y="310">See the work; finish things before starting new ones.</text>
  </g>
</svg>
