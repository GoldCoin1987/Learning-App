<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <rect x="0" y="0" width="400" height="320" fill="white"/>
  <!-- interface -->
  <line x1="20" y1="160" x2="380" y2="160" stroke="black" stroke-width="2"/>
  <!-- normal -->
  <line x1="200" y1="20" x2="200" y2="300" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>
  <!-- medium labels -->
  <text x="30" y="50" font-family="sans-serif" font-size="14" fill="black">Medium 1 (n1, eta1)</text>
  <text x="30" y="290" font-family="sans-serif" font-size="14" fill="black">Medium 2 (n2, eta2)</text>
  <!-- incident ray -->
  <line x1="80" y1="40" x2="200" y2="160" stroke="black" stroke-width="2"/>
  <polygon points="200,160 188,150 196,144" fill="black"/>
  <text x="95" y="60" font-family="sans-serif" font-size="13" fill="black">incident</text>
  <!-- reflected ray -->
  <line x1="200" y1="160" x2="320" y2="40" stroke="black" stroke-width="2"/>
  <polygon points="320,40 308,48 304,40" fill="black"/>
  <text x="280" y="60" font-family="sans-serif" font-size="13" fill="black">reflected</text>
  <!-- transmitted ray -->
  <line x1="200" y1="160" x2="270" y2="290" stroke="black" stroke-width="2"/>
  <polygon points="270,290 260,278 254,286" fill="black"/>
  <text x="275" y="280" font-family="sans-serif" font-size="13" fill="black">transmitted</text>
  <!-- angle arcs -->
  <path d="M 200 110 A 50 50 0 0 1 175 137" fill="none" stroke="black" stroke-width="1"/>
  <text x="172" y="120" font-family="sans-serif" font-size="13" fill="black">th1</text>
  <path d="M 200 110 A 50 50 0 0 0 225 137" fill="none" stroke="black" stroke-width="1"/>
  <text x="220" y="120" font-family="sans-serif" font-size="13" fill="black">th1</text>
  <path d="M 200 210 A 50 50 0 0 0 222 205" fill="none" stroke="black" stroke-width="1"/>
  <text x="208" y="225" font-family="sans-serif" font-size="13" fill="black">th2</text>
</svg>
