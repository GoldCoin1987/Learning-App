<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="520" height="360" font-family="sans-serif">
  <rect x="0" y="0" width="520" height="360" fill="#ffffff"/>
  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#000000">The simulation workflow (a repeating cycle)</text>

  <!-- Box 1: draw model (top) -->
  <rect x="195" y="44" width="130" height="46" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="260" y="65" text-anchor="middle" font-size="12" fill="#000000">1. Draw the model</text>
  <text x="260" y="81" text-anchor="middle" font-size="10" fill="#000000">(shape + materials)</text>

  <!-- Box 2: mesh (right) -->
  <rect x="380" y="135" width="120" height="46" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="440" y="156" text-anchor="middle" font-size="12" fill="#000000">2. Mesh it</text>
  <text x="440" y="172" text-anchor="middle" font-size="10" fill="#000000">(chop into cells)</text>

  <!-- Box 3: run/solve (bottom right) -->
  <rect x="320" y="250" width="120" height="46" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="380" y="271" text-anchor="middle" font-size="12" fill="#000000">3. Run / solve</text>
  <text x="380" y="287" text-anchor="middle" font-size="10" fill="#000000">(compute fields)</text>

  <!-- Box 4: read results (bottom left) -->
  <rect x="80" y="250" width="120" height="46" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="140" y="268" text-anchor="middle" font-size="12" fill="#000000">4. Read results</text>
  <text x="140" y="284" text-anchor="middle" font-size="10" fill="#000000">(pattern, match)</text>

  <!-- Box 5: refine (left) -->
  <rect x="20" y="135" width="120" height="46" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="80" y="156" text-anchor="middle" font-size="12" fill="#000000">5. Refine</text>
  <text x="80" y="172" text-anchor="middle" font-size="10" fill="#000000">(tweak, repeat)</text>

  <!-- arrows around the cycle -->
  <!-- 1 -> 2 -->
  <line x1="325" y1="78" x2="408" y2="133" stroke="#000000" stroke-width="1.5"/>
  <polygon points="408,133 396,127 404,120" fill="#000000"/>
  <!-- 2 -> 3 -->
  <line x1="435" y1="181" x2="400" y2="248" stroke="#000000" stroke-width="1.5"/>
  <polygon points="400,248 400,235 410,241" fill="#000000"/>
  <!-- 3 -> 4 -->
  <line x1="318" y1="273" x2="202" y2="273" stroke="#000000" stroke-width="1.5"/>
  <polygon points="202,273 214,267 214,279" fill="#000000"/>
  <!-- 4 -> 5 -->
  <line x1="120" y1="248" x2="85" y2="183" stroke="#000000" stroke-width="1.5"/>
  <polygon points="85,183 84,196 95,190" fill="#000000"/>
  <!-- 5 -> 1 (back to top) -->
  <line x1="120" y1="138" x2="200" y2="80" stroke="#000000" stroke-width="1.5"/>
  <polygon points="200,80 188,84 192,94" fill="#000000"/>

  <text x="260" y="200" text-anchor="middle" font-size="11" fill="#000000">Try a design,</text>
  <text x="260" y="217" text-anchor="middle" font-size="11" fill="#000000">see how it behaves,</text>
  <text x="260" y="234" text-anchor="middle" font-size="11" fill="#000000">improve it.</text>

  <text x="260" y="338" text-anchor="middle" font-size="11" fill="#000000">A virtual lab: test on screen before building anything real.</text>
</svg>
