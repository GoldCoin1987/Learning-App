<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <rect x="0" y="0" width="400" height="320" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="40" y="28">Every impedance becomes ONE point on the chart</text>
  </g>
  <!-- the chart circle -->
  <g fill="none" stroke="black" stroke-width="1.5">
    <circle cx="270" cy="180" r="110"/>
    <circle cx="270" cy="180" r="3.5" fill="black"/>
  </g>
  <!-- plotted point off-center -->
  <g fill="black">
    <circle cx="335" cy="135" r="5"/>
  </g>
  <!-- box of an impedance value mapping to the point -->
  <g fill="none" stroke="black" stroke-width="1.5">
    <rect x="20" y="150" width="110" height="50"/>
    <line x1="130" y1="175" x2="200" y2="160"/>
  </g>
  <g fill="black">
    <polygon points="200,160 190,159 193,168"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="35" y="172">a load's</text>
    <text x="35" y="190">impedance</text>
    <text x="230" y="178">center =</text>
    <text x="225" y="194">match</text>
    <text x="318" y="125">point</text>
    <text x="40" y="305">Plot the point, then read everything off its position.</text>
  </g>
</svg>
