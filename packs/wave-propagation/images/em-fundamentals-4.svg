<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 250" width="420" height="250">
  <rect x="0" y="0" width="420" height="250" fill="white"/>
  <text x="210" y="22" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">A field: a value at every point in space</text>
  <text x="210" y="42" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Each little arrow shows the push at that spot (longer = stronger)</text>

  <!-- source charge at left -->
  <circle cx="60" cy="140" r="16" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="60" y="146" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">+</text>

  <!-- grid of arrows pointing away from the source, shrinking with distance -->
  <g stroke="black" stroke-width="1.3" fill="black">
    <!-- column 1 (near, long arrows) -->
    <line x1="120" y1="90"  x2="148" y2="90" stroke-width="1.6"/>
    <polygon points="152,90 142,86 142,94"/>
    <line x1="120" y1="140" x2="150" y2="140" stroke-width="1.6"/>
    <polygon points="154,140 144,136 144,144"/>
    <line x1="120" y1="190" x2="148" y2="190" stroke-width="1.6"/>
    <polygon points="152,190 142,186 142,194"/>

    <!-- column 2 (medium) -->
    <line x1="210" y1="90"  x2="231" y2="90"/>
    <polygon points="235,90 225,86 225,94"/>
    <line x1="210" y1="140" x2="232" y2="140"/>
    <polygon points="236,140 226,136 226,144"/>
    <line x1="210" y1="190" x2="231" y2="190"/>
    <polygon points="235,190 225,186 225,194"/>

    <!-- column 3 (far, short) -->
    <line x1="300" y1="90"  x2="314" y2="90"/>
    <polygon points="318,90 308,86 308,94"/>
    <line x1="300" y1="140" x2="315" y2="140"/>
    <polygon points="319,140 309,136 309,144"/>
    <line x1="300" y1="190" x2="314" y2="190"/>
    <polygon points="318,190 308,186 308,194"/>

    <!-- column 4 (farthest, tiny) -->
    <line x1="370" y1="90"  x2="379" y2="90"/>
    <polygon points="383,90 373,86 373,94"/>
    <line x1="370" y1="140" x2="380" y2="140"/>
    <polygon points="384,140 374,136 374,144"/>
    <line x1="370" y1="190" x2="379" y2="190"/>
    <polygon points="383,190 373,186 373,194"/>
  </g>

  <text x="250" y="232" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Closer to the source the field is strong; farther away it fades.</text>
</svg>
