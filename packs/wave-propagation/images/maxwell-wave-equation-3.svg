<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <rect x="0" y="0" width="600" height="360" fill="white"/>
  <text x="300" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">Maxwell's four rules, in plain English</text>

  <!-- Box 1: Gauss E -->
  <rect x="20" y="50" width="270" height="120" fill="white" stroke="black" stroke-width="1.6"/>
  <text x="32" y="72" font-family="sans-serif" font-size="13" fill="black">1. Charges are the sources of E</text>
  <text x="32" y="92" font-family="sans-serif" font-size="11" fill="black">Electric field lines start on + charges</text>
  <text x="32" y="107" font-family="sans-serif" font-size="11" fill="black">and end on - charges.</text>
  <!-- tiny picture: + with lines out, - with lines in -->
  <circle cx="80" cy="140" r="10" fill="white" stroke="black" stroke-width="1.4"/>
  <text x="80" y="144" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">+</text>
  <line x1="90" y1="140" x2="115" y2="130" stroke="black" stroke-width="1"/>
  <line x1="90" y1="140" x2="115" y2="150" stroke="black" stroke-width="1"/>
  <line x1="90" y1="140" x2="118" y2="140" stroke="black" stroke-width="1"/>

  <!-- Box 2: Gauss B -->
  <rect x="310" y="50" width="270" height="120" fill="white" stroke="black" stroke-width="1.6"/>
  <text x="322" y="72" font-family="sans-serif" font-size="13" fill="black">2. No magnetic 'charge'</text>
  <text x="322" y="92" font-family="sans-serif" font-size="11" fill="black">Magnetic field lines never start or</text>
  <text x="322" y="107" font-family="sans-serif" font-size="11" fill="black">stop -- they always form closed loops.</text>
  <!-- tiny picture: closed loop -->
  <ellipse cx="420" cy="140" rx="34" ry="16" fill="none" stroke="black" stroke-width="1.4"/>
  <polygon points="454,140 446,135 446,145" fill="black"/>

  <!-- Box 3: Faraday -->
  <rect x="20" y="190" width="270" height="120" fill="white" stroke="black" stroke-width="1.6"/>
  <text x="32" y="212" font-family="sans-serif" font-size="13" fill="black">3. Changing B makes curling E</text>
  <text x="32" y="232" font-family="sans-serif" font-size="11" fill="black">A changing magnetic field creates an</text>
  <text x="32" y="247" font-family="sans-serif" font-size="11" fill="black">electric field. (How generators work.)</text>
  <!-- tiny picture: loop with circulating arrow -->
  <circle cx="80" cy="280" r="18" fill="none" stroke="black" stroke-width="1.4"/>
  <polygon points="80,262 73,268 86,270" fill="black"/>
  <text x="120" y="284" font-family="sans-serif" font-size="11" fill="black">E curls around</text>

  <!-- Box 4: Ampere-Maxwell -->
  <rect x="310" y="190" width="270" height="120" fill="white" stroke="black" stroke-width="1.6"/>
  <text x="322" y="212" font-family="sans-serif" font-size="13" fill="black">4. Currents &amp; changing E make B</text>
  <text x="322" y="232" font-family="sans-serif" font-size="11" fill="black">An electric current -- or a changing</text>
  <text x="322" y="247" font-family="sans-serif" font-size="11" fill="black">electric field -- creates a curling</text>
  <text x="322" y="262" font-family="sans-serif" font-size="11" fill="black">magnetic field.</text>
  <!-- tiny picture: wire with loop around -->
  <line x1="360" y1="270" x2="360" y2="300" stroke="black" stroke-width="1.6"/>
  <ellipse cx="360" cy="285" rx="22" ry="9" fill="none" stroke="black" stroke-width="1.2"/>
  <polygon points="382,285 374,280 374,290" fill="black"/>
  <text x="410" y="289" font-family="sans-serif" font-size="11" fill="black">B curls around</text>

  <text x="300" y="338" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Rules 3 and 4 together let the two fields keep re-creating each other.</text>
</svg>
