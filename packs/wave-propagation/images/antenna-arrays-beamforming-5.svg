<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320">
  <rect width="460" height="320" fill="white"/>
  <text x="40" y="24" font-family="sans-serif" font-size="14" fill="black">Beamforming: delay each one more = beam tilts</text>
  <!-- ground line -->
  <line x1="30" y1="275" x2="430" y2="275" stroke="black" stroke-width="0.6"/>
  <!-- four element antennas -->
  <circle cx="110" cy="275" r="7" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="180" cy="275" r="7" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="250" cy="275" r="7" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="320" cy="275" r="7" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- delay labels: each fires a bit later -->
  <text x="98" y="298" font-family="sans-serif" font-size="11" fill="black">now</text>
  <text x="160" y="298" font-family="sans-serif" font-size="11" fill="black">+1</text>
  <text x="230" y="298" font-family="sans-serif" font-size="11" fill="black">+2</text>
  <text x="300" y="298" font-family="sans-serif" font-size="11" fill="black">+3</text>
  <text x="120" y="312" font-family="sans-serif" font-size="10" fill="black">each antenna starts a little later (delay)</text>
  <!-- tilted combined wavefronts -->
  <line x1="95" y1="235" x2="205" y2="150" stroke="black" stroke-width="1.3"/>
  <line x1="140" y1="250" x2="250" y2="165" stroke="black" stroke-width="1.3"/>
  <line x1="185" y1="262" x2="295" y2="177" stroke="black" stroke-width="1.3"/>
  <text x="245" y="150" font-family="sans-serif" font-size="11" fill="black">tilted wavefront</text>
  <!-- beam arrow at an angle, perpendicular to wavefronts -->
  <line x1="215" y1="245" x2="330" y2="80" stroke="black" stroke-width="2"/>
  <polygon points="330,80 320,96 335,98" fill="black"/>
  <text x="335" y="80" font-family="sans-serif" font-size="13" fill="black">beam aims here</text>
  <!-- straight-ahead reference (dashed) -->
  <line x1="215" y1="245" x2="215" y2="80" stroke="black" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="150" y="78" font-family="sans-serif" font-size="10" fill="black">straight ahead</text>
</svg>
