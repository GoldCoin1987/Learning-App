<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" width="460" height="300">
  <rect x="0" y="0" width="460" height="300" fill="#ffffff"/>
  <text x="60" y="24" font-family="sans-serif" font-size="14" fill="#000000">Same power spread over a bigger and bigger area</text>

  <!-- transmitter at left -->
  <circle cx="40" cy="170" r="10" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="22" y="200" font-family="sans-serif" font-size="11" fill="#000000">transmitter</text>
  <text x="22" y="214" font-family="sans-serif" font-size="11" fill="#000000">(or bulb)</text>

  <!-- expanding arcs (wavefronts / shells) -->
  <path d="M40,90 A80,80 0 0 1 40,250" fill="none" stroke="#000000" stroke-width="1.2"/>
  <path d="M40,60 A110,110 0 0 1 40,280" fill="none" stroke="#000000" stroke-width="1.2"/>
  <path d="M40,35 A135,135 0 0 1 40,305" fill="none" stroke="#000000" stroke-width="1.2"/>

  <!-- near patch (small area, lots of power) -->
  <rect x="112" y="158" width="22" height="24" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="96" y="150" font-family="sans-serif" font-size="10" fill="#000000">near: strong</text>
  <text x="96" y="138" font-family="sans-serif" font-size="10" fill="#000000">(small area,</text>
  <text x="96" y="126" font-family="sans-serif" font-size="10" fill="#000000">big share)</text>

  <!-- far patch (same size, less power because spread thinner) -->
  <rect x="168" y="158" width="22" height="24" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="206" y="150" font-family="sans-serif" font-size="10" fill="#000000">far: weak</text>
  <text x="206" y="138" font-family="sans-serif" font-size="10" fill="#000000">(same patch,</text>
  <text x="206" y="126" font-family="sans-serif" font-size="10" fill="#000000">tiny share)</text>

  <!-- distance arrow -->
  <line x1="40" y1="270" x2="320" y2="270" stroke="#000000" stroke-width="1.5"/>
  <polygon points="320,270 311,265 311,275" fill="#000000"/>
  <text x="150" y="288" font-family="sans-serif" font-size="11" fill="#000000">distance grows -&gt; signal weakens</text>

  <!-- double distance label -->
  <text x="250" y="200" font-family="sans-serif" font-size="10" fill="#000000">twice as far =</text>
  <text x="250" y="214" font-family="sans-serif" font-size="10" fill="#000000">about 1/4 as strong</text>
</svg>
