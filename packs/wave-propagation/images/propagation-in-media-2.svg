<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect x="0" y="0" width="480" height="320" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">Same wave: in vacuum vs inside glass</text>

  <!-- divider between the two media -->
  <line x1="240" y1="40" x2="240" y2="250" stroke="#000000" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="125" y="52" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">VACUUM (fast)</text>
  <text x="360" y="52" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">GLASS (slower)</text>

  <!-- center line for both waves -->
  <line x1="20" y1="150" x2="460" y2="150" stroke="#000000" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- LEFT wave: long wavelength, 2 cycles over 200px (period ~100) -->
  <path d="M20,150 C45,90 70,90 95,150 C120,210 145,210 170,150 C195,90 220,90 240,150"
        fill="none" stroke="#000000" stroke-width="2"/>
  <!-- LEFT wavelength bracket: crest to crest (crests near x=57 and x=157) -->
  <line x1="57" y1="78" x2="157" y2="78" stroke="#000000" stroke-width="1.1"/>
  <line x1="57" y1="73" x2="57" y2="88" stroke="#000000" stroke-width="1.1"/>
  <line x1="157" y1="73" x2="157" y2="88" stroke="#000000" stroke-width="1.1"/>
  <text x="107" y="70" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">long wavelength</text>

  <!-- RIGHT wave: crests bunch up, ~4 cycles over 200px (period ~50), same height -->
  <path d="M240,150 C252,90 265,90 277,150 C289,210 302,210 315,150 C327,90 340,90 352,150 C364,210 377,210 390,150 C402,90 415,90 427,150 C439,210 452,210 460,150"
        fill="none" stroke="#000000" stroke-width="2"/>
  <!-- RIGHT wavelength bracket: crest to crest (crests near x=265 and x=315) -->
  <line x1="265" y1="78" x2="315" y2="78" stroke="#000000" stroke-width="1.1"/>
  <line x1="265" y1="73" x2="265" y2="88" stroke="#000000" stroke-width="1.1"/>
  <line x1="315" y1="73" x2="315" y2="88" stroke="#000000" stroke-width="1.1"/>
  <text x="380" y="70" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">shorter wavelength</text>

  <!-- same height note -->
  <text x="240" y="270" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">Crests bunch up in glass: wavelength shrinks, wave is slower.</text>
  <text x="240" y="290" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">Frequency stays the same (same number of crests pass per second).</text>
  <text x="240" y="308" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">Height (amplitude) is unchanged here.</text>
</svg>
