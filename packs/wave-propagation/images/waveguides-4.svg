<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 250" width="460" height="250">
  <rect x="0" y="0" width="460" height="250" fill="#ffffff"/>
  <text x="230" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#000000">Modes = the allowed patterns across the pipe</text>
  <text x="230" y="46" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#000000">(like the allowed vibration patterns of a drum head)</text>

  <!-- Pattern 1: simplest, one hump -->
  <rect x="40" y="70" width="110" height="90" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M40,160 Q95,90 150,160" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="95" y="182" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#000000">simplest pattern</text>
  <text x="95" y="198" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#000000">(one hump)</text>
  <text x="95" y="216" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">the usual one</text>

  <!-- Pattern 2: two humps across -->
  <rect x="175" y="70" width="110" height="90" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M175,115 Q202,80 230,115 Q257,150 285,115" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="230" y="182" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#000000">a more complex</text>
  <text x="230" y="198" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#000000">pattern (two humps)</text>

  <!-- Pattern 3: 2x2 grid of bumps -->
  <rect x="310" y="70" width="110" height="90" fill="none" stroke="#000000" stroke-width="2"/>
  <circle cx="338" cy="98" r="9" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="392" cy="98" r="9" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="338" cy="132" r="9" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="392" cy="132" r="9" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="365" y="182" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#000000">an even more</text>
  <text x="365" y="198" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#000000">complex pattern</text>

  <text x="230" y="240" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#000000">A bigger pipe or a higher frequency allows more patterns. Each pattern has its own cutoff.</text>
</svg>
