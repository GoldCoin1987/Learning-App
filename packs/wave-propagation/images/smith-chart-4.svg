<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 360" width="380" height="360">
  <rect x="0" y="0" width="380" height="360" fill="white"/>
  <!-- dartboard analogy: concentric rings -->
  <g fill="none" stroke="black" stroke-width="1.5">
    <circle cx="190" cy="185" r="140"/>
    <circle cx="190" cy="185" r="95"/>
    <circle cx="190" cy="185" r="50"/>
    <circle cx="190" cy="185" r="8" fill="black"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="95" y="28">Think of it like a dartboard</text>
    <text x="205" y="190">bullseye =</text>
    <text x="205" y="206">perfect match</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="200" y="120">getting close</text>
    <text x="225" y="70">rim = worst</text>
    <text x="40" y="350">Closer to the bullseye = better match. The rim = total reflection.</text>
  </g>
</svg>
