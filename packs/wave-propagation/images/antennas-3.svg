<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" width="460" height="300">
  <rect x="0" y="0" width="460" height="300" fill="#ffffff"/>
  <text x="120" y="22" font-family="sans-serif" font-size="14" fill="#000000">An antenna works BOTH ways</text>

  <!-- TRANSMIT (top half) -->
  <text x="14" y="58" font-family="sans-serif" font-size="12" fill="#000000">TRANSMIT:</text>
  <text x="14" y="72" font-family="sans-serif" font-size="10" fill="#000000">signal on wire</text>
  <text x="14" y="84" font-family="sans-serif" font-size="10" fill="#000000">becomes a wave</text>
  <!-- feed line -->
  <line x1="14" y1="120" x2="120" y2="120" stroke="#000000" stroke-width="1.5"/>
  <line x1="14" y1="128" x2="120" y2="128" stroke="#000000" stroke-width="1.5"/>
  <text x="34" y="146" font-family="sans-serif" font-size="9" fill="#000000">feed line</text>
  <!-- dipole (vertical rods) -->
  <line x1="120" y1="92" x2="120" y2="118" stroke="#000000" stroke-width="2"/>
  <line x1="120" y1="130" x2="120" y2="156" stroke="#000000" stroke-width="2"/>
  <text x="128" y="100" font-family="sans-serif" font-size="9" fill="#000000">antenna</text>
  <!-- radiating wavefronts (arcs going right) -->
  <path d="M150,124 a30,42 0 0 1 0,-0.1" fill="none"/>
  <path d="M150,82 A45,45 0 0 1 150,166" fill="none" stroke="#000000" stroke-width="1"/>
  <path d="M150,68 A62,62 0 0 1 150,180" fill="none" stroke="#000000" stroke-width="1"/>
  <path d="M150,54 A80,80 0 0 1 150,194" fill="none" stroke="#000000" stroke-width="1"/>
  <!-- direction arrow -->
  <line x1="250" y1="124" x2="300" y2="124" stroke="#000000" stroke-width="1.5"/>
  <polygon points="300,124 291,119 291,129" fill="#000000"/>
  <text x="305" y="120" font-family="sans-serif" font-size="10" fill="#000000">wave into</text>
  <text x="305" y="132" font-family="sans-serif" font-size="10" fill="#000000">the air</text>

  <!-- divider -->
  <line x1="14" y1="195" x2="446" y2="195" stroke="#000000" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- RECEIVE (bottom half) -->
  <text x="14" y="222" font-family="sans-serif" font-size="12" fill="#000000">RECEIVE:</text>
  <text x="14" y="236" font-family="sans-serif" font-size="10" fill="#000000">incoming wave</text>
  <text x="14" y="248" font-family="sans-serif" font-size="10" fill="#000000">becomes a signal</text>
  <!-- incoming wavefronts (arcs on right, arrow pointing left to antenna) -->
  <path d="M320,228 A45,45 0 0 0 320,290" fill="none" stroke="#000000" stroke-width="1"/>
  <path d="M334,222 A62,62 0 0 0 334,296" fill="none" stroke="#000000" stroke-width="1"/>
  <line x1="300" y1="259" x2="250" y2="259" stroke="#000000" stroke-width="1.5"/>
  <polygon points="250,259 259,254 259,264" fill="#000000"/>
  <text x="350" y="262" font-family="sans-serif" font-size="10" fill="#000000">wave arrives</text>
  <!-- dipole -->
  <line x1="220" y1="231" x2="220" y2="255" stroke="#000000" stroke-width="2"/>
  <line x1="220" y1="263" x2="220" y2="287" stroke="#000000" stroke-width="2"/>
  <!-- feed line back to receiver -->
  <line x1="120" y1="255" x2="220" y2="255" stroke="#000000" stroke-width="1.5"/>
  <line x1="120" y1="263" x2="220" y2="263" stroke="#000000" stroke-width="1.5"/>
  <text x="135" y="280" font-family="sans-serif" font-size="9" fill="#000000">signal out</text>
</svg>
