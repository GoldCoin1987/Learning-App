<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 240" width="540" height="240">
  <rect x="0" y="0" width="540" height="240" fill="white"/>
  <!-- axes -->
  <g fill="none" stroke="black" stroke-width="1.5">
    <line x1="40" y1="200" x2="510" y2="200"/>
    <line x1="40" y1="40" x2="40" y2="200"/>
  </g>
  <!-- standing wave envelope: |V| = Vmin(1 + |G|*|cos|) style ripple -->
  <!-- approximate |cos(beta z)| scaled envelope, load at right -->
  <g fill="none" stroke="black" stroke-width="2">
    <path d="M40,80
             C70,140 100,180 130,180
             C160,180 190,140 220,80
             C250,140 280,180 310,180
             C340,180 370,140 400,80
             C430,140 460,180 490,180"/>
  </g>
  <!-- max and min reference dashed lines -->
  <g fill="none" stroke="black" stroke-width="1" stroke-dasharray="4 4">
    <line x1="40" y1="80" x2="510" y2="80"/>
    <line x1="40" y1="180" x2="510" y2="180"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="6" y="84">Vmax</text>
    <text x="8" y="184">Vmin</text>
    <text x="220" y="225">distance along line z</text>
    <text x="2" y="40">|V(z)|</text>
    <text x="455" y="35">VSWR = Vmax/Vmin</text>
    <!-- lambda/2 spacing marker between two minima at x=130 and x=310 -->
    <text x="180" y="215">&#8592; &#955;/2 &#8594;</text>
  </g>
  <g fill="none" stroke="black" stroke-width="1">
    <line x1="130" y1="200" x2="130" y2="208"/>
    <line x1="310" y1="200" x2="310" y2="208"/>
  </g>
</svg>
