<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" width="460" height="300">
  <rect x="0" y="0" width="460" height="300" fill="#ffffff"/>
  <text x="70" y="24" font-family="sans-serif" font-size="14" fill="#000000">Waves bend over a hill into the shadow behind it</text>

  <!-- ground -->
  <line x1="20" y1="250" x2="440" y2="250" stroke="#000000" stroke-width="2"/>

  <!-- hill (triangle) -->
  <polygon points="200,250 250,120 300,250" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="228" y="110" font-family="sans-serif" font-size="11" fill="#000000">hill / building</text>

  <!-- transmitter -->
  <line x1="60" y1="250" x2="60" y2="200" stroke="#000000" stroke-width="2"/>
  <circle cx="60" cy="195" r="5" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="34" y="188" font-family="sans-serif" font-size="11" fill="#000000">transmitter</text>

  <!-- receiver in shadow -->
  <line x1="380" y1="250" x2="380" y2="210" stroke="#000000" stroke-width="2"/>
  <circle cx="380" cy="205" r="5" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="356" y="198" font-family="sans-serif" font-size="11" fill="#000000">receiver</text>

  <!-- straight ray up to the hilltop edge -->
  <line x1="62" y1="196" x2="248" y2="123" stroke="#000000" stroke-width="1.5"/>
  <text x="110" y="150" font-family="sans-serif" font-size="10" fill="#000000">wave reaches the edge</text>

  <!-- bending curve over the top into shadow -->
  <path d="M250,121 Q330,140 378,202" fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <polygon points="378,202 372,191 382,194" fill="#000000"/>
  <text x="300" y="165" font-family="sans-serif" font-size="10" fill="#000000">bends down</text>
  <text x="300" y="178" font-family="sans-serif" font-size="10" fill="#000000">(diffraction)</text>

  <!-- shadow zone label -->
  <text x="305" y="240" font-family="sans-serif" font-size="10" fill="#000000">shadow zone:</text>
  <text x="305" y="252" font-family="sans-serif" font-size="10" fill="#000000">weak, not zero</text>
</svg>
