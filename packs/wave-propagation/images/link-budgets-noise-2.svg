<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340" width="480" height="340" font-family="sans-serif">
  <rect x="0" y="0" width="480" height="340" fill="#ffffff"/>
  <text x="240" y="24" text-anchor="middle" font-size="15" fill="#000000">A link budget: add gains, subtract losses</text>

  <!-- transmitter -->
  <line x1="45" y1="200" x2="45" y2="170" stroke="#000000" stroke-width="2"/>
  <circle cx="45" cy="166" r="5" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="45" y="225" text-anchor="middle" font-size="11" fill="#000000">transmitter</text>

  <!-- receiver -->
  <line x1="435" y1="200" x2="435" y2="170" stroke="#000000" stroke-width="2"/>
  <circle cx="435" cy="166" r="5" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="435" y="225" text-anchor="middle" font-size="11" fill="#000000">receiver</text>

  <!-- signal path arrow -->
  <line x1="60" y1="160" x2="420" y2="160" stroke="#000000" stroke-width="1.5"/>
  <polygon points="420,160 408,154 408,166" fill="#000000"/>

  <!-- the running total box -->
  <text x="240" y="60" text-anchor="middle" font-size="12" fill="#000000">Start with transmit power, then...</text>

  <!-- plus gain -->
  <text x="120" y="100" text-anchor="middle" font-size="13" fill="#000000">+ antenna gain</text>
  <text x="120" y="118" text-anchor="middle" font-size="10" fill="#000000">(focusing helps)</text>
  <line x1="120" y1="125" x2="120" y2="152" stroke="#000000" stroke-width="1.5"/>
  <polygon points="120,152 114,142 126,142" fill="#000000"/>

  <!-- minus path loss -->
  <text x="245" y="100" text-anchor="middle" font-size="13" fill="#000000">- path loss</text>
  <text x="245" y="118" text-anchor="middle" font-size="10" fill="#000000">(distance spreading)</text>
  <line x1="245" y1="170" x2="245" y2="125" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="245,125 239,135 251,135" fill="#000000"/>

  <!-- minus cable + obstacles + rain -->
  <text x="360" y="100" text-anchor="middle" font-size="13" fill="#000000">- cables, rain,</text>
  <text x="360" y="116" text-anchor="middle" font-size="13" fill="#000000">obstacles</text>
  <line x1="360" y1="170" x2="360" y2="125" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="360,125 354,135 366,135" fill="#000000"/>

  <!-- equals received power -->
  <line x1="60" y1="265" x2="420" y2="265" stroke="#000000" stroke-width="1"/>
  <text x="240" y="290" text-anchor="middle" font-size="14" fill="#000000">= power left at the receiver</text>
  <text x="240" y="312" text-anchor="middle" font-size="12" fill="#000000">Question: is it strong enough to be understood?</text>
</svg>
