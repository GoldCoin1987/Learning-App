<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <rect x="0" y="0" width="480" height="300" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="15" fill="#000000" text-anchor="middle">Near a source: curved. Far away: nearly flat.</text>
  <!-- source dot -->
  <circle cx="50" cy="160" r="6" fill="#000000"/>
  <text x="50" y="190" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">source</text>
  <!-- curved wavefronts near source (arcs) -->
  <path d="M75,110 A 55 55 0 0 1 75,210" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M105,95 A 80 80 0 0 1 105,225" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M140,85 A 110 110 0 0 1 140,235" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="120" y="70" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">curved wavefronts</text>
  <!-- far away: nearly flat wavefronts -->
  <line x1="330" y1="80" x2="330" y2="240" stroke="#000000" stroke-width="2"/>
  <line x1="375" y1="80" x2="375" y2="240" stroke="#000000" stroke-width="2"/>
  <line x1="420" y1="80" x2="420" y2="240" stroke="#000000" stroke-width="2"/>
  <text x="375" y="70" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">nearly flat (a plane wave)</text>
  <!-- travel arrow -->
  <line x1="180" y1="160" x2="300" y2="160" stroke="#000000" stroke-width="1.5"/>
  <polygon points="300,160 288,154 288,166" fill="#000000"/>
  <text x="240" y="152" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">far from source</text>
</svg>
