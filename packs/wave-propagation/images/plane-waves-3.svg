<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect x="0" y="0" width="480" height="320" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">Anatomy of a wave</text>
  <!-- center line -->
  <line x1="40" y1="160" x2="450" y2="160" stroke="#000000" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- sine wave: two full cycles -->
  <path d="M40,160 C 75,70 110,70 145,160 C 180,250 215,250 250,160 C 285,70 320,70 355,160 C 390,250 425,250 440,160"
        fill="none" stroke="#000000" stroke-width="2"/>
  <!-- wavelength bracket: crest to crest (first crest near x=110, next near x=320) -->
  <line x1="110" y1="55" x2="320" y2="55" stroke="#000000" stroke-width="1.2"/>
  <line x1="110" y1="50" x2="110" y2="70" stroke="#000000" stroke-width="1.2"/>
  <line x1="320" y1="50" x2="320" y2="70" stroke="#000000" stroke-width="1.2"/>
  <text x="215" y="46" font-family="sans-serif" font-size="14" fill="#000000" text-anchor="middle">wavelength (crest to crest)</text>
  <!-- amplitude bracket: from center line up to crest at x=320 -->
  <line x1="360" y1="70" x2="360" y2="160" stroke="#000000" stroke-width="1.2"/>
  <line x1="355" y1="70" x2="370" y2="70" stroke="#000000" stroke-width="1.2"/>
  <line x1="355" y1="160" x2="370" y2="160" stroke="#000000" stroke-width="1.2"/>
  <text x="375" y="120" font-family="sans-serif" font-size="13" fill="#000000">amplitude</text>
  <text x="375" y="136" font-family="sans-serif" font-size="13" fill="#000000">(height)</text>
  <!-- crest and trough labels -->
  <text x="110" y="305" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">crest = high point</text>
  <text x="197" y="270" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">trough = low point</text>
</svg>
