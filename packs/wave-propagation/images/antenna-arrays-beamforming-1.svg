<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300">
  <rect width="460" height="300" fill="white"/>
  <text x="120" y="22" font-family="sans-serif" font-size="13" fill="black">Uniform linear array: progressive phase steers the wavefront</text>
  <!-- baseline -->
  <line x1="40" y1="250" x2="420" y2="250" stroke="black" stroke-width="0.6"/>
  <!-- elements -->
  <circle cx="60"  cy="250" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="135" cy="250" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="210" cy="250" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="285" cy="250" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="360" cy="250" r="6" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- spacing label d -->
  <line x1="60" y1="270" x2="135" y2="270" stroke="black" stroke-width="0.6"/>
  <line x1="60" y1="266" x2="60" y2="274" stroke="black" stroke-width="0.6"/>
  <line x1="135" y1="266" x2="135" y2="274" stroke="black" stroke-width="0.6"/>
  <text x="86" y="288" font-family="sans-serif" font-size="12" fill="black">d</text>
  <!-- phase labels increasing -->
  <text x="50"  y="240" font-family="sans-serif" font-size="10" fill="black">0</text>
  <text x="123" y="240" font-family="sans-serif" font-size="10" fill="black">&#946;</text>
  <text x="196" y="240" font-family="sans-serif" font-size="10" fill="black">2&#946;</text>
  <text x="271" y="240" font-family="sans-serif" font-size="10" fill="black">3&#946;</text>
  <text x="346" y="240" font-family="sans-serif" font-size="10" fill="black">4&#946;</text>
  <!-- tilted wavefronts (steered beam) -->
  <line x1="55"  y1="210" x2="150" y2="120" stroke="black" stroke-width="1"/>
  <line x1="120" y1="225" x2="215" y2="135" stroke="black" stroke-width="1"/>
  <line x1="185" y1="240" x2="280" y2="150" stroke="black" stroke-width="1"/>
  <line x1="250" y1="248" x2="345" y2="158" stroke="black" stroke-width="1"/>
  <!-- beam direction arrow normal to wavefronts -->
  <line x1="210" y1="250" x2="305" y2="70" stroke="black" stroke-width="1.5" stroke-dasharray="5 3"/>
  <polygon points="305,70 297,84 311,82" fill="black"/>
  <!-- steering angle -->
  <line x1="210" y1="250" x2="210" y2="60" stroke="black" stroke-width="0.5" stroke-dasharray="3 3"/>
  <path d="M210,150 A100,100 0 0,1 245,160" fill="none" stroke="black" stroke-width="0.8"/>
  <text x="222" y="140" font-family="sans-serif" font-size="13" fill="black">&#952;&#8320;</text>
  <text x="315" y="60" font-family="sans-serif" font-size="11" fill="black">beam</text>
</svg>
