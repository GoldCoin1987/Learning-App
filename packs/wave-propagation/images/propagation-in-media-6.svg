<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <rect x="0" y="0" width="480" height="300" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">Dielectric lets waves through; conductor blocks them</text>

  <!-- divider -->
  <line x1="240" y1="44" x2="240" y2="250" stroke="#000000" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: dielectric (glass / dry air) -->
  <text x="120" y="60" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">DIELECTRIC (glass, dry air)</text>
  <!-- material slab -->
  <rect x="95" y="80" width="50" height="120" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="120" y="218" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">insulator</text>
  <!-- incoming wave line -->
  <line x1="20" y1="140" x2="95" y2="140" stroke="#000000" stroke-width="2"/>
  <!-- wave passes through (slightly weaker) -->
  <line x1="145" y1="140" x2="225" y2="140" stroke="#000000" stroke-width="1.6"/>
  <polygon points="225,140 214,134 214,146" fill="#000000"/>
  <text x="120" y="120" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">passes through</text>

  <!-- RIGHT: conductor (metal) -->
  <text x="360" y="60" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">CONDUCTOR (metal)</text>
  <!-- metal slab (solid-looking with hatching) -->
  <rect x="350" y="80" width="50" height="120" fill="none" stroke="#000000" stroke-width="2"/>
  <line x1="350" y1="95" x2="400" y2="95" stroke="#000000" stroke-width="0.7"/>
  <line x1="350" y1="115" x2="400" y2="115" stroke="#000000" stroke-width="0.7"/>
  <line x1="350" y1="135" x2="400" y2="135" stroke="#000000" stroke-width="0.7"/>
  <line x1="350" y1="155" x2="400" y2="155" stroke="#000000" stroke-width="0.7"/>
  <line x1="350" y1="175" x2="400" y2="175" stroke="#000000" stroke-width="0.7"/>
  <text x="375" y="218" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">metal wall</text>
  <!-- incoming wave -->
  <line x1="270" y1="140" x2="350" y2="140" stroke="#000000" stroke-width="2"/>
  <!-- reflected wave bounces back -->
  <path d="M349,150 C320,165 300,168 280,168" fill="none" stroke="#000000" stroke-width="1.6"/>
  <polygon points="280,168 292,162 292,174" fill="#000000"/>
  <text x="320" y="120" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">reflected / blocked</text>

  <text x="240" y="272" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">Insulators (dielectrics) mostly let waves pass; metals reflect</text>
  <text x="240" y="290" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">and block them. This is why metal makes good shielding.</text>
</svg>
