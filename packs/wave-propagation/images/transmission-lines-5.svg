<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" width="460" height="320">
  <rect x="0" y="0" width="460" height="320" fill="#ffffff"/>
  <text x="230" y="24" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">Inside a coax cable (cross-section)</text>
  <text x="230" y="44" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">the cable behind your TV or Wi-Fi router</text>

  <!-- outer shield -->
  <circle cx="200" cy="180" r="110" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- outer insulating jacket ring (between outer edge and shield) -->
  <circle cx="200" cy="180" r="96" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- dielectric region -->
  <circle cx="200" cy="180" r="78" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- inner conductor -->
  <circle cx="200" cy="180" r="22" fill="#000000" stroke="#000000" stroke-width="2"/>

  <!-- labels with leader lines -->
  <!-- inner conductor -->
  <line x1="200" y1="180" x2="120" y2="120" stroke="#000000" stroke-width="1"/>
  <text x="30" y="116" font-family="sans-serif" font-size="12" fill="#000000">inner conductor</text>
  <text x="30" y="130" font-family="sans-serif" font-size="11" fill="#000000">(carries the signal)</text>

  <!-- dielectric -->
  <line x1="240" y1="130" x2="330" y2="96" stroke="#000000" stroke-width="1"/>
  <text x="335" y="100" font-family="sans-serif" font-size="12" fill="#000000">dielectric</text>
  <text x="335" y="114" font-family="sans-serif" font-size="11" fill="#000000">(insulator filling)</text>

  <!-- outer shield / conductor -->
  <line x1="290" y1="240" x2="360" y2="270" stroke="#000000" stroke-width="1"/>
  <text x="300" y="290" font-family="sans-serif" font-size="12" fill="#000000">outer shield</text>
  <text x="300" y="304" font-family="sans-serif" font-size="11" fill="#000000">(the return path)</text>

  <!-- outer jacket -->
  <line x1="110" y1="240" x2="60" y2="270" stroke="#000000" stroke-width="1"/>
  <text x="20" y="290" font-family="sans-serif" font-size="12" fill="#000000">outer jacket</text>
  <text x="20" y="304" font-family="sans-serif" font-size="11" fill="#000000">(protective cover)</text>
</svg>
