<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <rect x="0" y="0" width="480" height="300" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="15" fill="#000000" text-anchor="middle">Polarization = which way the E field wiggles</text>
  <!-- three panels -->
  <!-- Panel 1: vertical linear -->
  <rect x="20" y="50" width="130" height="180" fill="none" stroke="#000000" stroke-width="1"/>
  <line x1="85" y1="70" x2="85" y2="210" stroke="#000000" stroke-width="2"/>
  <polygon points="85,70 80,82 90,82" fill="#000000"/>
  <polygon points="85,210 80,198 90,198" fill="#000000"/>
  <text x="85" y="248" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">vertical</text>
  <text x="85" y="264" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">(up-down)</text>
  <!-- Panel 2: horizontal linear -->
  <rect x="175" y="50" width="130" height="180" fill="none" stroke="#000000" stroke-width="1"/>
  <line x1="195" y1="140" x2="285" y2="140" stroke="#000000" stroke-width="2"/>
  <polygon points="195,140 207,135 207,145" fill="#000000"/>
  <polygon points="285,140 273,135 273,145" fill="#000000"/>
  <text x="240" y="248" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">horizontal</text>
  <text x="240" y="264" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">(side-to-side)</text>
  <!-- Panel 3: circular -->
  <rect x="330" y="50" width="130" height="180" fill="none" stroke="#000000" stroke-width="1"/>
  <circle cx="395" cy="140" r="45" fill="none" stroke="#000000" stroke-width="2"/>
  <polygon points="395,95 388,106 402,106" fill="#000000"/>
  <text x="395" y="248" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">circular</text>
  <text x="395" y="264" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">(rotating)</text>
</svg>
