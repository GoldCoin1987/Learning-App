<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" width="460" height="320" font-family="sans-serif">
  <rect x="0" y="0" width="460" height="320" fill="#ffffff"/>
  <text x="230" y="24" text-anchor="middle" font-size="15" fill="#000000">A link is like a household budget</text>

  <!-- left column: income (gains) -->
  <rect x="50" y="60" width="120" height="180" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="110" y="82" text-anchor="middle" font-size="13" fill="#000000">INCOME</text>
  <text x="110" y="100" text-anchor="middle" font-size="10" fill="#000000">(gains)</text>
  <line x1="60" y1="110" x2="160" y2="110" stroke="#000000" stroke-width="1"/>
  <text x="110" y="135" text-anchor="middle" font-size="11" fill="#000000">transmit power</text>
  <text x="110" y="160" text-anchor="middle" font-size="11" fill="#000000">+ antenna gain</text>
  <text x="110" y="185" text-anchor="middle" font-size="11" fill="#000000">(sender)</text>
  <text x="110" y="210" text-anchor="middle" font-size="11" fill="#000000">+ antenna gain</text>
  <text x="110" y="226" text-anchor="middle" font-size="11" fill="#000000">(receiver)</text>

  <!-- minus sign -->
  <text x="195" y="155" text-anchor="middle" font-size="22" fill="#000000">-</text>

  <!-- middle column: expenses (losses) -->
  <rect x="220" y="60" width="120" height="180" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="280" y="82" text-anchor="middle" font-size="13" fill="#000000">EXPENSES</text>
  <text x="280" y="100" text-anchor="middle" font-size="10" fill="#000000">(losses)</text>
  <line x1="230" y1="110" x2="330" y2="110" stroke="#000000" stroke-width="1"/>
  <text x="280" y="135" text-anchor="middle" font-size="11" fill="#000000">distance</text>
  <text x="280" y="151" text-anchor="middle" font-size="11" fill="#000000">spreading</text>
  <text x="280" y="176" text-anchor="middle" font-size="11" fill="#000000">cables</text>
  <text x="280" y="201" text-anchor="middle" font-size="11" fill="#000000">obstacles</text>
  <text x="280" y="226" text-anchor="middle" font-size="11" fill="#000000">rain</text>

  <!-- equals sign -->
  <text x="365" y="155" text-anchor="middle" font-size="22" fill="#000000">=</text>

  <!-- right column: what's left -->
  <rect x="385" y="100" width="60" height="100" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="415" y="92" text-anchor="middle" font-size="11" fill="#000000">what is</text>
  <text x="415" y="155" text-anchor="middle" font-size="11" fill="#000000">left =</text>
  <text x="415" y="172" text-anchor="middle" font-size="11" fill="#000000">received</text>
  <text x="415" y="188" text-anchor="middle" font-size="11" fill="#000000">signal</text>

  <text x="230" y="270" text-anchor="middle" font-size="12" fill="#000000">If what's left is too small, the link "goes broke" (fails).</text>
  <text x="230" y="292" text-anchor="middle" font-size="12" fill="#000000">A safety margin keeps it working on a bad day.</text>
</svg>
