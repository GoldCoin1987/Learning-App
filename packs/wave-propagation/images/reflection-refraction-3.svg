<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect x="0" y="0" width="480" height="320" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">A wave bends TOWARD the slower side</text>
  <text x="240" y="46" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">entering slower glass, the ray bends closer to the normal (smaller angle)</text>

  <!-- boundary -->
  <line x1="30" y1="170" x2="450" y2="170" stroke="#000000" stroke-width="2"/>
  <!-- normal -->
  <line x1="200" y1="60" x2="200" y2="300" stroke="#000000" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="208" y="74" font-family="sans-serif" font-size="11" fill="#000000">normal</text>

  <!-- labels -->
  <text x="40" y="100" font-family="sans-serif" font-size="13" fill="#000000">air (fast) - big angle</text>
  <text x="40" y="298" font-family="sans-serif" font-size="13" fill="#000000">glass (slow) - small angle</text>

  <!-- incident ray, shallow (big angle from normal) -->
  <line x1="70" y1="70" x2="200" y2="170" stroke="#000000" stroke-width="2.5"/>
  <polygon points="200,170 186,162 192,154" fill="#000000"/>
  <text x="80" y="92" font-family="sans-serif" font-size="12" fill="#000000">incoming</text>

  <!-- refracted ray, steeper (small angle from normal) -->
  <line x1="200" y1="170" x2="240" y2="295" stroke="#000000" stroke-width="2.5"/>
  <polygon points="240,295 231,283 224,289" fill="#000000"/>
  <text x="245" y="280" font-family="sans-serif" font-size="12" fill="#000000">bent toward normal</text>

  <!-- big angle arc (incident side) -->
  <path d="M 200 120 A 50 50 0 0 1 162 145" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="150" y="135" font-family="sans-serif" font-size="12" fill="#000000">big</text>
  <!-- small angle arc (refracted side) -->
  <path d="M 200 220 A 50 50 0 0 0 216 217" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="222" y="232" font-family="sans-serif" font-size="12" fill="#000000">small</text>

  <text x="240" y="316" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">Snell's law in words: the slower (higher-index) side always has the smaller angle.</text>
</svg>
