<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" width="460" height="300">
  <rect x="0" y="0" width="460" height="300" fill="#ffffff"/>
  <text x="230" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#000000">Cutoff: only high-enough frequencies get through</text>

  <!-- TOP CASE: high frequency (short wavelength) passes -->
  <text x="20" y="60" font-family="sans-serif" font-size="13" text-anchor="start" fill="#000000">High frequency (short wavelength): FITS, passes</text>
  <!-- pipe -->
  <line x1="40" y1="72" x2="300" y2="72" stroke="#000000" stroke-width="2.5"/>
  <line x1="40" y1="128" x2="300" y2="128" stroke="#000000" stroke-width="2.5"/>
  <!-- short wave inside -->
  <path d="M40,100 Q55,80 70,100 T100,100 T130,100 T160,100 T190,100 T220,100 T250,100 T280,100" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- pass arrow out the right -->
  <line x1="300" y1="100" x2="350" y2="100" stroke="#000000" stroke-width="2"/>
  <polygon points="350,94 362,100 350,106" fill="#000000"/>
  <text x="408" y="104" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#000000">gets through</text>

  <!-- BOTTOM CASE: low frequency (long wavelength) blocked -->
  <text x="20" y="190" font-family="sans-serif" font-size="13" text-anchor="start" fill="#000000">Low frequency (long wavelength): TOO BIG, blocked</text>
  <!-- pipe -->
  <line x1="40" y1="202" x2="300" y2="202" stroke="#000000" stroke-width="2.5"/>
  <line x1="40" y1="258" x2="300" y2="258" stroke="#000000" stroke-width="2.5"/>
  <!-- long wave that does not fit (one big hump, fades) -->
  <path d="M40,230 Q90,180 140,230 Q175,265 210,230" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="2,3"/>
  <!-- blocked: X near the entrance -->
  <line x1="250" y1="218" x2="278" y2="246" stroke="#000000" stroke-width="2.5"/>
  <line x1="278" y1="218" x2="250" y2="246" stroke="#000000" stroke-width="2.5"/>
  <text x="408" y="234" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#000000">does not pass</text>

  <text x="230" y="290" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#000000">The pipe size sets the cutoff: a bigger pipe lets lower frequencies through.</text>
</svg>
