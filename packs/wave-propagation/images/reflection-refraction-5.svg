<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360">
  <rect x="0" y="0" width="480" height="360" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">Total internal reflection traps light</text>
  <text x="240" y="46" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">a shallow ray escapes; a steep ray cannot leave the slow side and is fully reflected</text>

  <!-- TOP PANEL: a single boundary, glass below, air above -->
  <line x1="30" y1="120" x2="450" y2="120" stroke="#000000" stroke-width="2"/>
  <line x1="240" y1="60" x2="240" y2="200" stroke="#000000" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="40" y="78" font-family="sans-serif" font-size="12" fill="#000000">air (fast)</text>
  <text x="40" y="195" font-family="sans-serif" font-size="12" fill="#000000">glass (slow)</text>

  <!-- ray A: below critical angle, escapes (refracts out, bent away) -->
  <line x1="170" y1="195" x2="240" y2="120" stroke="#000000" stroke-width="2.2"/>
  <polygon points="240,120 228,124 230,132" fill="#000000"/>
  <line x1="240" y1="120" x2="320" y2="70" stroke="#000000" stroke-width="2.2"/>
  <polygon points="320,70 308,72 311,80" fill="#000000"/>
  <text x="300" y="64" font-family="sans-serif" font-size="11" fill="#000000">escapes (shallow)</text>

  <!-- ray B: above critical angle, reflects back down (trapped) -->
  <line x1="120" y1="200" x2="240" y2="120" stroke="#000000" stroke-width="2.2" stroke-dasharray="3,3"/>
  <polygon points="240,120 228,121 229,129" fill="#000000"/>
  <line x1="240" y1="120" x2="360" y2="200" stroke="#000000" stroke-width="2.2"/>
  <polygon points="360,200 348,191 344,199" fill="#000000"/>
  <text x="300" y="160" font-family="sans-serif" font-size="11" fill="#000000">steep ray trapped</text>
  <text x="40" y="215" font-family="sans-serif" font-size="11" fill="#000000">(reflected back in)</text>

  <!-- BOTTOM PANEL: a fiber - light bouncing down a pipe -->
  <text x="240" y="255" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">This is how an optical fiber carries light:</text>
  <line x1="40" y1="275" x2="440" y2="275" stroke="#000000" stroke-width="2"/>
  <line x1="40" y1="335" x2="440" y2="335" stroke="#000000" stroke-width="2"/>
  <text x="445" y="262" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="end">glass fiber walls</text>

  <!-- zig-zag bouncing light path -->
  <polyline points="50,300 120,332 190,278 260,332 330,278 400,332 435,308" fill="none" stroke="#000000" stroke-width="2"/>
  <polygon points="435,308 423,309 426,317" fill="#000000"/>
  <text x="160" y="352" font-family="sans-serif" font-size="11" fill="#000000">light bounces down the fiber, never escaping</text>
</svg>
