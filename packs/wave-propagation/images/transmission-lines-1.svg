<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" width="520" height="220">
  <rect x="0" y="0" width="520" height="220" fill="white"/>
  <g fill="none" stroke="black" stroke-width="2">
    <!-- top rail in -->
    <line x1="20" y1="40" x2="60" y2="40"/>
    <!-- R (resistor zigzag) -->
    <polyline points="60,40 68,30 84,50 100,30 116,50 124,40"/>
    <!-- L (inductor loops) -->
    <path d="M124,40 q8,-16 16,0 q8,-16 16,0 q8,-16 16,0" />
    <!-- node before shunt -->
    <line x1="172" y1="40" x2="240" y2="40"/>
    <!-- shunt branch down: G (resistor) -->
    <line x1="206" y1="40" x2="206" y2="70"/>
    <polyline points="206,70 196,78 216,86 196,94 216,102 206,110"/>
    <line x1="206" y1="110" x2="206" y2="150"/>
    <!-- shunt branch: C (capacitor) parallel -->
    <line x1="240" y1="40" x2="240" y2="80"/>
    <line x1="228" y1="80" x2="252" y2="80"/>
    <line x1="228" y1="92" x2="252" y2="92"/>
    <line x1="240" y1="92" x2="240" y2="150"/>
    <!-- continue top rail out -->
    <line x1="240" y1="40" x2="320" y2="40"/>
    <!-- bottom rail -->
    <line x1="20" y1="150" x2="320" y2="150"/>
    <!-- dots -->
  </g>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="78" y="22">R&#916;z</text>
    <text x="132" y="22">L&#916;z</text>
    <text x="160" y="92">G&#916;z</text>
    <text x="258" y="92">C&#916;z</text>
    <text x="20" y="172">one section, length &#916;z</text>
  </g>
  <g fill="black">
    <circle cx="20" cy="40" r="3"/>
    <circle cx="20" cy="150" r="3"/>
    <circle cx="320" cy="40" r="3"/>
    <circle cx="320" cy="150" r="3"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="328" y="44">to next</text>
    <text x="328" y="58">section &#8594;</text>
  </g>
</svg>
