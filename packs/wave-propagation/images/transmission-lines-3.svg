<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320">
  <rect x="0" y="0" width="520" height="320" fill="#ffffff"/>
  <text x="260" y="24" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">The matching golden rule</text>
  <text x="260" y="44" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">when the load matches the cable, all the power goes through</text>

  <!-- TOP CASE: matched -->
  <text x="20" y="78" font-family="sans-serif" font-size="13" fill="#000000">MATCHED: load = 50 ohm</text>
  <!-- source -->
  <rect x="20" y="92" width="60" height="40" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="50" y="116" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">source</text>
  <!-- cable as two rails -->
  <line x1="80" y1="100" x2="380" y2="100" stroke="#000000" stroke-width="2"/>
  <line x1="80" y1="124" x2="380" y2="124" stroke="#000000" stroke-width="2"/>
  <text x="230" y="92" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">cable (Z0 = 50 ohm)</text>
  <!-- load -->
  <rect x="380" y="92" width="60" height="40" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="410" y="116" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">50 ohm</text>
  <!-- forward arrow only -->
  <line x1="160" y1="112" x2="300" y2="112" stroke="#000000" stroke-width="2"/>
  <polygon points="300,112 288,106 288,118" fill="#000000"/>
  <text x="455" y="116" font-family="sans-serif" font-size="11" fill="#000000">all power</text>
  <text x="455" y="130" font-family="sans-serif" font-size="11" fill="#000000">delivered</text>

  <!-- divider -->
  <line x1="20" y1="170" x2="500" y2="170" stroke="#000000" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- BOTTOM CASE: mismatched -->
  <text x="20" y="200" font-family="sans-serif" font-size="13" fill="#000000">MISMATCHED: load is wrong (e.g. 150 ohm)</text>
  <rect x="20" y="214" width="60" height="40" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="50" y="238" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">source</text>
  <line x1="80" y1="222" x2="380" y2="222" stroke="#000000" stroke-width="2"/>
  <line x1="80" y1="246" x2="380" y2="246" stroke="#000000" stroke-width="2"/>
  <text x="230" y="214" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">cable (Z0 = 50 ohm)</text>
  <rect x="380" y="214" width="60" height="40" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="410" y="238" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">150 ohm</text>
  <!-- forward arrow -->
  <line x1="150" y1="228" x2="300" y2="228" stroke="#000000" stroke-width="2"/>
  <polygon points="300,228 288,222 288,234" fill="#000000"/>
  <!-- reflected arrow (back toward source) -->
  <line x1="300" y1="242" x2="170" y2="242" stroke="#000000" stroke-width="2"/>
  <polygon points="170,242 182,236 182,248" fill="#000000"/>
  <text x="455" y="232" font-family="sans-serif" font-size="11" fill="#000000">part</text>
  <text x="455" y="246" font-family="sans-serif" font-size="11" fill="#000000">reflects back</text>
  <text x="260" y="278" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">reflected signal wastes power and travels back to the source</text>
</svg>
