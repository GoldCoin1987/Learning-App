<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" width="360" height="360">
  <rect x="0" y="0" width="360" height="360" fill="white"/>
  <g fill="none" stroke="black" stroke-width="1.5">
    <!-- outer unit circle (|Gamma| = 1), center (180,180) radius 150 -->
    <circle cx="180" cy="180" r="150"/>
    <!-- horizontal real axis -->
    <line x1="30" y1="180" x2="330" y2="180"/>
    <!-- constant-resistance circle r=1: center at midpoint of real axis (255,180), radius 75 -->
    <circle cx="255" cy="180" r="75" stroke-dasharray="0"/>
    <!-- constant-reactance arc x=+1: center (330,30), radius 150, clipped by unit circle.
         This arc passes through the right edge (330,180) and curves up-left. -->
    <path d="M330,180 A150,150 0 0 0 180,30"/>
  </g>
  <g fill="black">
    <!-- short (Gamma=-1) and open (Gamma=+1) endpoints -->
    <circle cx="30" cy="180" r="3"/>
    <circle cx="330" cy="180" r="3"/>
    <!-- a plotted load point on the r=1 circle, upper half (inductive) -->
    <circle cx="255" cy="105" r="4"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="14" y="176">short</text>
    <text x="14" y="196">z=0</text>
    <text x="306" y="176">open</text>
    <text x="298" y="196">z=&#8734;</text>
    <text x="166" y="170">z=1</text>
    <text x="200" y="100">r = 1 circle</text>
    <text x="120" y="44">x = +1 arc</text>
    <text x="250" y="100">load</text>
    <text x="120" y="350">|&#915;|=1 boundary (lossless)</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="150" y="200">center: matched</text>
  </g>
</svg>
