<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" width="480" height="220">
  <rect x="0" y="0" width="480" height="220" fill="white"/>
  <g fill="none" stroke="black" stroke-width="2">
    <!-- source side input rail -->
    <line x1="20" y1="50" x2="120" y2="50"/>
    <!-- series inductor L (loops) from 120 to 220 -->
    <path d="M120,50 q10,-18 20,0 q10,-18 20,0 q10,-18 20,0 q10,-18 20,0"/>
    <!-- continue rail to load -->
    <line x1="220" y1="50" x2="400" y2="50"/>
    <!-- shunt capacitor C dropping down at node x=300 -->
    <line x1="300" y1="50" x2="300" y2="95"/>
    <line x1="282" y1="95" x2="318" y2="95"/>
    <line x1="282" y1="107" x2="318" y2="107"/>
    <line x1="300" y1="107" x2="300" y2="170"/>
    <!-- load box on the right -->
    <rect x="400" y="35" width="40" height="30"/>
    <!-- bottom rail / ground -->
    <line x1="20" y1="170" x2="440" y2="170"/>
    <line x1="20" y1="50" x2="20" y2="170"/>
    <line x1="420" y1="65" x2="420" y2="170"/>
  </g>
  <g fill="black">
    <circle cx="20" cy="50" r="3"/>
    <circle cx="300" cy="50" r="3"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="155" y="28">series L</text>
    <text x="324" y="92">shunt C</text>
    <text x="402" y="28">Z_L</text>
    <text x="30" y="118">50 &#937;</text>
    <text x="30" y="134">source</text>
    <text x="120" y="200">L-network: series L + shunt C matching Z_L to 50 &#937;</text>
  </g>
</svg>
