<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="white"/>
  <!-- dipole wire, vertical, centered -->
  <line x1="200" y1="40" x2="200" y2="240" stroke="black" stroke-width="2"/>
  <!-- feed gap -->
  <rect x="196" y="135" width="8" height="10" fill="white" stroke="black" stroke-width="1"/>
  <line x1="190" y1="148" x2="210" y2="148" stroke="black" stroke-width="1"/>
  <text x="150" y="152" font-family="sans-serif" font-size="10" fill="black">feed</text>
  <!-- length bracket -->
  <line x1="240" y1="40" x2="240" y2="240" stroke="black" stroke-width="0.5"/>
  <line x1="236" y1="40" x2="244" y2="40" stroke="black" stroke-width="0.5"/>
  <line x1="236" y1="240" x2="244" y2="240" stroke="black" stroke-width="0.5"/>
  <text x="250" y="145" font-family="sans-serif" font-size="12" fill="black">L = &#955;/2</text>
  <!-- current distribution (sinusoidal, max at center, zero at ends) -->
  <path d="M200,40 C160,80 160,200 200,240" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="80" y="140" font-family="sans-serif" font-size="11" fill="black">I(z)</text>
  <text x="70" y="155" font-family="sans-serif" font-size="9" fill="black">current</text>
  <!-- end labels -->
  <text x="180" y="35" font-family="sans-serif" font-size="9" fill="black">I=0</text>
  <text x="180" y="255" font-family="sans-serif" font-size="9" fill="black">I=0</text>
  <text x="135" y="115" font-family="sans-serif" font-size="9" fill="black">I max</text>
</svg>
