<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 260" width="440" height="260">
  <rect x="0" y="0" width="440" height="260" fill="white"/>
  <text x="220" y="22" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">Magnetic field lines: bar magnet and a wire</text>

  <!-- BAR MAGNET with N and S, looping field lines -->
  <text x="115" y="48" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Bar magnet</text>
  <rect x="85" y="120" width="60" height="30" fill="white" stroke="black" stroke-width="1.5"/>
  <line x1="115" y1="120" x2="115" y2="150" stroke="black" stroke-width="1"/>
  <text x="100" y="141" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">N</text>
  <text x="130" y="141" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">S</text>
  <!-- field loops from N (left) around to S (right) -->
  <g stroke="black" stroke-width="1.3" fill="none">
    <path d="M85,128 C40,90 40,180 85,142"/>
    <path d="M85,123 C20,70 20,200 85,147"/>
    <path d="M145,128 C190,90 190,180 145,142"/>
    <path d="M145,123 C210,70 210,200 145,147"/>
  </g>
  <!-- arrowheads showing direction (out of N, into S) -->
  <g fill="black">
    <polygon points="58,98 66,103 60,109"/>
    <polygon points="172,98 164,103 170,109"/>
  </g>

  <!-- CURRENT-CARRYING WIRE with circular field lines -->
  <text x="330" y="48" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Wire carrying current</text>
  <!-- the wire (vertical), current arrow up -->
  <line x1="330" y1="75" x2="330" y2="205" stroke="black" stroke-width="2.5"/>
  <polygon points="330,72 325,84 335,84" fill="black"/>
  <text x="348" y="80" font-family="sans-serif" font-size="11" text-anchor="start" fill="black">current</text>
  <!-- concentric circles around the wire (field) -->
  <g stroke="black" stroke-width="1.3" fill="none">
    <ellipse cx="330" cy="140" rx="22" ry="9"/>
    <ellipse cx="330" cy="140" rx="40" ry="15"/>
  </g>
  <!-- arrowheads on circles showing it wraps around -->
  <g fill="black">
    <polygon points="352,140 344,135 344,145"/>
    <polygon points="308,140 316,135 316,145"/>
    <polygon points="370,140 362,135 362,145"/>
  </g>

  <text x="220" y="240" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A moving charge (current) makes a magnetic field that wraps around the wire.</text>
</svg>
