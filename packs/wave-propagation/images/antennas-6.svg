<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" width="460" height="280">
  <rect x="0" y="0" width="460" height="280" fill="#ffffff"/>
  <text x="60" y="24" font-family="sans-serif" font-size="14" fill="#000000">A dish focuses waves like a flashlight reflector</text>

  <!-- parabolic dish (curve open to the right) -->
  <path d="M90,50 Q40,140 90,230" fill="none" stroke="#000000" stroke-width="2.5"/>
  <text x="35" y="145" font-family="sans-serif" font-size="10" fill="#000000">curved</text>
  <text x="35" y="158" font-family="sans-serif" font-size="10" fill="#000000">reflector</text>

  <!-- feed at focus -->
  <circle cx="150" cy="140" r="4" fill="#000000"/>
  <text x="120" y="125" font-family="sans-serif" font-size="10" fill="#000000">feed</text>
  <text x="110" y="113" font-family="sans-serif" font-size="9" fill="#000000">(source at focus)</text>

  <!-- rays from feed bouncing off dish, then parallel to the right -->
  <!-- top ray -->
  <line x1="150" y1="140" x2="92" y2="70" stroke="#000000" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="92" y1="70" x2="440" y2="70" stroke="#000000" stroke-width="1.2"/>
  <polygon points="440,70 431,65 431,75" fill="#000000"/>
  <!-- upper-mid ray -->
  <line x1="150" y1="140" x2="80" y2="105" stroke="#000000" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="80" y1="105" x2="440" y2="105" stroke="#000000" stroke-width="1.2"/>
  <polygon points="440,105 431,100 431,110" fill="#000000"/>
  <!-- center ray -->
  <line x1="150" y1="140" x2="440" y2="140" stroke="#000000" stroke-width="1.2"/>
  <polygon points="440,140 431,135 431,145" fill="#000000"/>
  <!-- lower-mid ray -->
  <line x1="150" y1="140" x2="80" y2="175" stroke="#000000" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="80" y1="175" x2="440" y2="175" stroke="#000000" stroke-width="1.2"/>
  <polygon points="440,175 431,170 431,180" fill="#000000"/>
  <!-- bottom ray -->
  <line x1="150" y1="140" x2="92" y2="210" stroke="#000000" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="92" y1="210" x2="440" y2="210" stroke="#000000" stroke-width="1.2"/>
  <polygon points="440,210 431,205 431,215" fill="#000000"/>

  <text x="250" y="250" font-family="sans-serif" font-size="11" fill="#000000">scattered rays leave as one tight, parallel beam</text>
</svg>
