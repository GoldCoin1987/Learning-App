<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="640" height="360" fill="white"/>
  <text x="320" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="black">Picking a Solver: FDTD vs FEM vs MoM</text>

  <!-- header row -->
  <line x1="20" y1="40" x2="620" y2="40" stroke="black"/>
  <text x="30" y="60" font-weight="bold" fill="black">Method</text>
  <text x="170" y="60" font-weight="bold" fill="black">Domain</text>
  <text x="300" y="60" font-weight="bold" fill="black">Best for</text>
  <text x="520" y="60" font-weight="bold" fill="black">Tools</text>
  <line x1="20" y1="70" x2="620" y2="70" stroke="black"/>

  <!-- column separators -->
  <line x1="160" y1="40" x2="160" y2="320" stroke="black"/>
  <line x1="290" y1="40" x2="290" y2="320" stroke="black"/>
  <line x1="510" y1="40" x2="510" y2="320" stroke="black"/>
  <line x1="20" y1="40" x2="20" y2="320" stroke="black"/>
  <line x1="620" y1="40" x2="620" y2="320" stroke="black"/>

  <!-- FDTD row -->
  <text x="30" y="100" font-weight="bold" fill="black">FDTD</text>
  <text x="170" y="100" fill="black">Time domain</text>
  <text x="300" y="95" fill="black">Broadband, transients,</text>
  <text x="300" y="111" fill="black">antennas; Yee grid;</text>
  <text x="300" y="127" fill="black">Courant stability</text>
  <text x="520" y="100" fill="black">openEMS,</text>
  <text x="520" y="116" fill="black">Meep</text>
  <line x1="20" y1="140" x2="620" y2="140" stroke="black"/>

  <!-- FEM row -->
  <text x="30" y="180" font-weight="bold" fill="black">FEM</text>
  <text x="170" y="180" fill="black">Frequency</text>
  <text x="170" y="196" fill="black">domain</text>
  <text x="300" y="175" fill="black">Complex / inhomogeneous</text>
  <text x="300" y="191" fill="black">geometry; closed</text>
  <text x="300" y="207" fill="black">volumes; resonators</text>
  <text x="520" y="180" fill="black">HFSS,</text>
  <text x="520" y="196" fill="black">COMSOL</text>
  <line x1="20" y1="220" x2="620" y2="220" stroke="black"/>

  <!-- MoM row -->
  <text x="30" y="260" font-weight="bold" fill="black">MoM</text>
  <text x="170" y="260" fill="black">Frequency</text>
  <text x="170" y="276" fill="black">domain</text>
  <text x="300" y="255" fill="black">Open radiators, wires,</text>
  <text x="300" y="271" fill="black">surface currents;</text>
  <text x="300" y="287" fill="black">unbounded space free</text>
  <text x="520" y="260" fill="black">NEC2,</text>
  <text x="520" y="276" fill="black">FEKO</text>
  <line x1="20" y1="300" x2="620" y2="300" stroke="black"/>

  <text x="320" y="338" text-anchor="middle" font-style="italic" fill="black">Validate every solver against analytic results and VNA measurement.</text>
</svg>
