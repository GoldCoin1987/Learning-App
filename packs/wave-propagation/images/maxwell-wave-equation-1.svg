<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>
  <text x="320" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#000000">Propagating Plane Wave (E and H transverse to z)</text>

  <!-- propagation axis -->
  <line x1="40" y1="200" x2="600" y2="200" stroke="#000000" stroke-width="1.5"/>
  <polygon points="600,200 588,194 588,206" fill="#000000"/>
  <text x="606" y="205" font-family="sans-serif" font-size="14" fill="#000000">z</text>

  <!-- E field sine (vertical plane) -->
  <path d="M40,200 C80,120 120,120 160,200 C200,280 240,280 280,200 C320,120 360,120 400,200 C440,280 480,280 520,200 C545,145 565,135 580,150"
        fill="none" stroke="#000000" stroke-width="2"/>
  <text x="150" y="110" font-family="sans-serif" font-size="14" fill="#000000">E (x-axis)</text>

  <!-- H field sine (horizontal plane, drawn dashed to suggest orthogonality) -->
  <path d="M40,200 C80,170 120,170 160,200 C200,230 240,230 280,200 C320,170 360,170 400,200 C440,230 480,230 520,200 C545,182 565,178 580,185"
        fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="150" y="245" font-family="sans-serif" font-size="14" fill="#000000">H (y-axis)</text>

  <!-- axes triad -->
  <line x1="80" y1="320" x2="80" y2="280" stroke="#000000" stroke-width="1.5"/>
  <polygon points="80,278 75,290 85,290" fill="#000000"/>
  <text x="60" y="290" font-family="sans-serif" font-size="12" fill="#000000">x (E)</text>
  <line x1="80" y1="320" x2="130" y2="320" stroke="#000000" stroke-width="1.5"/>
  <polygon points="132,320 120,315 120,325" fill="#000000"/>
  <text x="135" y="324" font-family="sans-serif" font-size="12" fill="#000000">z (k)</text>
  <line x1="80" y1="320" x2="55" y2="338" stroke="#000000" stroke-width="1.5"/>
  <text x="20" y="345" font-family="sans-serif" font-size="12" fill="#000000">y (H)</text>

  <text x="320" y="350" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#000000">c = 1 / sqrt(mu0 * eps0),  E perp H perp k</text>
</svg>
