<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320">
  <rect width="460" height="320" fill="white"/>
  <text x="40" y="24" font-family="sans-serif" font-size="14" fill="black">Many small antennas, signals in step = one strong beam</text>
  <!-- ground line -->
  <line x1="30" y1="270" x2="430" y2="270" stroke="black" stroke-width="0.6"/>
  <!-- four element antennas -->
  <circle cx="110" cy="270" r="7" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="180" cy="270" r="7" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="250" cy="270" r="7" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="320" cy="270" r="7" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="60" y="292" font-family="sans-serif" font-size="11" fill="black">small antennas (elements)</text>
  <!-- circular wavefronts rising from each element -->
  <path d="M70,270 A40,40 0 0 1 150,270" fill="none" stroke="black" stroke-width="0.7"/>
  <path d="M60,270 A50,50 0 0 1 160,270" fill="none" stroke="black" stroke-width="0.7"/>
  <path d="M140,270 A40,40 0 0 1 220,270" fill="none" stroke="black" stroke-width="0.7"/>
  <path d="M130,270 A50,50 0 0 1 230,270" fill="none" stroke="black" stroke-width="0.7"/>
  <path d="M210,270 A40,40 0 0 1 290,270" fill="none" stroke="black" stroke-width="0.7"/>
  <path d="M200,270 A50,50 0 0 1 300,270" fill="none" stroke="black" stroke-width="0.7"/>
  <path d="M280,270 A40,40 0 0 1 360,270" fill="none" stroke="black" stroke-width="0.7"/>
  <path d="M270,270 A50,50 0 0 1 370,270" fill="none" stroke="black" stroke-width="0.7"/>
  <!-- combined flat wavefront where they all line up (in step) -->
  <line x1="95" y1="150" x2="335" y2="150" stroke="black" stroke-width="2"/>
  <text x="150" y="142" font-family="sans-serif" font-size="11" fill="black">waves line up (in step)</text>
  <!-- beam arrow straight up -->
  <line x1="215" y1="150" x2="215" y2="55" stroke="black" stroke-width="2"/>
  <polygon points="215,45 208,62 222,62" fill="black"/>
  <text x="228" y="60" font-family="sans-serif" font-size="13" fill="black">strong beam</text>
</svg>
