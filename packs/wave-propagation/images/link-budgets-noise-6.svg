<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" width="460" height="320" font-family="sans-serif">
  <rect x="0" y="0" width="460" height="320" fill="#ffffff"/>
  <text x="230" y="24" text-anchor="middle" font-size="15" fill="#000000">SNR: how far the signal stands above the hiss</text>

  <!-- vertical scale arrow -->
  <line x1="60" y1="60" x2="60" y2="280" stroke="#000000" stroke-width="1.5"/>
  <polygon points="60,60 54,72 66,72" fill="#000000"/>
  <text x="40" y="60" text-anchor="middle" font-size="10" fill="#000000">strong</text>
  <text x="40" y="278" text-anchor="middle" font-size="10" fill="#000000">faint</text>

  <!-- noise floor (the hiss) - wavy-ish band near bottom -->
  <line x1="60" y1="230" x2="430" y2="230" stroke="#000000" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="300" y="248" text-anchor="middle" font-size="11" fill="#000000">noise floor (background hiss)</text>
  <text x="300" y="263" text-anchor="middle" font-size="10" fill="#000000">from heat + electronics</text>

  <!-- signal bar standing above noise -->
  <rect x="120" y="110" width="70" height="120" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="155" y="102" text-anchor="middle" font-size="12" fill="#000000">signal</text>

  <!-- SNR gap arrows -->
  <line x1="240" y1="110" x2="240" y2="230" stroke="#000000" stroke-width="1.5"/>
  <polygon points="240,110 234,122 246,122" fill="#000000"/>
  <polygon points="240,230 234,218 246,218" fill="#000000"/>
  <text x="305" y="170" text-anchor="middle" font-size="13" fill="#000000">SNR = this gap</text>
  <text x="305" y="186" text-anchor="middle" font-size="10" fill="#000000">(signal-to-noise ratio)</text>

  <!-- restaurant analogy -->
  <text x="230" y="295" text-anchor="middle" font-size="11" fill="#000000">Like a friend's voice over a noisy crowd: what matters is</text>
  <text x="230" y="311" text-anchor="middle" font-size="11" fill="#000000">how much LOUDER they are than the din, not raw loudness.</text>
</svg>
