<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect x="0" y="0" width="400" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="30" y="28">Normalized: everything measured against 50 ohm</text>
  </g>
  <!-- number-line style scale -->
  <g fill="none" stroke="black" stroke-width="1.5">
    <line x1="40" y1="150" x2="360" y2="150"/>
    <!-- ticks -->
    <line x1="120" y1="143" x2="120" y2="157"/>
    <line x1="200" y1="140" x2="200" y2="160"/>
    <line x1="280" y1="143" x2="280" y2="157"/>
  </g>
  <!-- marker dot at center (the 1 = match) -->
  <g fill="black">
    <circle cx="200" cy="150" r="5"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="92" y="180">25 ohm</text>
    <text x="178" y="180">50 ohm</text>
    <text x="252" y="180">100 ohm</text>
    <text x="100" y="200">"0.5"</text>
    <text x="185" y="200">"1" = match</text>
    <text x="262" y="200">"2"</text>
    <text x="30" y="250">We relabel impedances as multiples of 50 ohm, so "1"</text>
    <text x="30" y="268">always means a perfect match no matter the system.</text>
  </g>
</svg>
