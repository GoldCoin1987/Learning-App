<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" width="460" height="300">
  <rect x="0" y="0" width="460" height="300" fill="#ffffff"/>
  <text x="150" y="22" font-family="sans-serif" font-size="14" fill="#000000">A tour of antenna types</text>

  <!-- Dipole -->
  <line x1="50" y1="55" x2="50" y2="95" stroke="#000000" stroke-width="2"/>
  <line x1="50" y1="100" x2="50" y2="140" stroke="#000000" stroke-width="2"/>
  <line x1="50" y1="98" x2="35" y2="98" stroke="#000000" stroke-width="1"/>
  <text x="30" y="160" font-family="sans-serif" font-size="11" fill="#000000">Dipole / whip</text>
  <text x="22" y="174" font-family="sans-serif" font-size="9" fill="#000000">simple rod</text>

  <!-- Monopole on ground plane -->
  <line x1="175" y1="55" x2="175" y2="120" stroke="#000000" stroke-width="2"/>
  <line x1="135" y1="120" x2="215" y2="120" stroke="#000000" stroke-width="2"/>
  <text x="130" y="160" font-family="sans-serif" font-size="11" fill="#000000">Monopole</text>
  <text x="120" y="174" font-family="sans-serif" font-size="9" fill="#000000">rod + ground plane</text>

  <!-- Yagi (boom with crossbars) -->
  <line x1="290" y1="100" x2="370" y2="100" stroke="#000000" stroke-width="1.5"/>
  <line x1="300" y1="78" x2="300" y2="122" stroke="#000000" stroke-width="2"/>
  <line x1="322" y1="82" x2="322" y2="118" stroke="#000000" stroke-width="2"/>
  <line x1="342" y1="86" x2="342" y2="114" stroke="#000000" stroke-width="2"/>
  <line x1="362" y1="88" x2="362" y2="112" stroke="#000000" stroke-width="2"/>
  <text x="300" y="160" font-family="sans-serif" font-size="11" fill="#000000">Yagi</text>
  <text x="282" y="174" font-family="sans-serif" font-size="9" fill="#000000">old TV aerial</text>

  <!-- Dish (parabola + feed) -->
  <path d="M70,210 Q100,255 70,300" fill="none" stroke="#000000" stroke-width="2"/>
  <circle cx="120" cy="255" r="3" fill="#000000"/>
  <line x1="120" y1="255" x2="74" y2="255" stroke="#000000" stroke-width="0.8"/>
  <text x="60" y="295" font-family="sans-serif" font-size="11" fill="#000000">Dish (parabolic)</text>
  <text x="58" y="200" font-family="sans-serif" font-size="9" fill="#000000">satellite / radar</text>

  <!-- Patch (flat rectangle on board) -->
  <rect x="300" y="225" width="70" height="40" fill="none" stroke="#000000" stroke-width="1.5"/>
  <rect x="318" y="237" width="34" height="16" fill="#000000"/>
  <text x="300" y="295" font-family="sans-serif" font-size="11" fill="#000000">Patch</text>
  <text x="282" y="215" font-family="sans-serif" font-size="9" fill="#000000">flat, inside phones</text>

  <!-- divider -->
  <line x1="255" y1="185" x2="255" y2="300" stroke="#000000" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="250" y1="50" x2="250" y2="140" stroke="#000000" stroke-width="0.5" stroke-dasharray="4 3"/>
</svg>
