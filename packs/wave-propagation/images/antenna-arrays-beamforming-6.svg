<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320">
  <rect width="420" height="320" fill="white"/>
  <text x="30" y="24" font-family="sans-serif" font-size="14" fill="black">Main beam, small side lobes, and a grating lobe</text>
  <!-- array at bottom center -->
  <circle cx="210" cy="280" r="4" fill="black"/>
  <text x="180" y="302" font-family="sans-serif" font-size="11" fill="black">the array</text>
  <!-- straight-ahead axis -->
  <line x1="210" y1="280" x2="210" y2="55" stroke="black" stroke-width="0.5" stroke-dasharray="4 3"/>
  <!-- main beam (tall, straight up) -->
  <path d="M210,280 C178,160 196,75 210,60 C224,75 242,160 210,280 Z" fill="none" stroke="black" stroke-width="1.6"/>
  <text x="216" y="68" font-family="sans-serif" font-size="12" fill="black">main beam (wanted)</text>
  <!-- right small side lobe -->
  <path d="M210,280 C252,228 296,210 326,214 C296,236 252,262 210,280 Z" fill="none" stroke="black" stroke-width="1"/>
  <text x="300" y="208" font-family="sans-serif" font-size="10" fill="black">side lobe (small leak)</text>
  <!-- left small side lobe -->
  <path d="M210,280 C168,228 124,210 94,214 C124,236 168,262 210,280 Z" fill="none" stroke="black" stroke-width="1"/>
  <!-- grating lobe (large, far right) -->
  <path d="M210,280 C300,262 358,212 392,188 C358,248 300,272 210,280 Z" fill="none" stroke="black" stroke-width="1.4"/>
  <text x="300" y="172" font-family="sans-serif" font-size="11" fill="black">grating lobe</text>
  <text x="276" y="186" font-family="sans-serif" font-size="9" fill="black">(elements spaced too far apart)</text>
</svg>
