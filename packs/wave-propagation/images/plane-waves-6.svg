<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect x="0" y="0" width="480" height="320" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="15" fill="#000000" text-anchor="middle">Phase: in step vs out of step</text>
  <!-- Top: in step -->
  <text x="20" y="58" font-family="sans-serif" font-size="13" fill="#000000">In step (crests line up):</text>
  <line x1="40" y1="100" x2="450" y2="100" stroke="#000000" stroke-width="0.8" stroke-dasharray="3,3"/>
  <path d="M40,100 C 70,55 100,55 130,100 C 160,145 190,145 220,100 C 250,55 280,55 310,100 C 340,145 370,145 400,100 C 415,78 430,78 445,100"
        fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M40,100 C 70,60 100,60 130,100 C 160,140 190,140 220,100 C 250,60 280,60 310,100 C 340,140 370,140 400,100 C 415,80 430,80 445,100"
        fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="455" y="104" font-family="sans-serif" font-size="11" fill="#000000">add up</text>
  <!-- Bottom: out of step -->
  <text x="20" y="205" font-family="sans-serif" font-size="13" fill="#000000">Out of step (crest meets trough):</text>
  <line x1="40" y1="250" x2="450" y2="250" stroke="#000000" stroke-width="0.8" stroke-dasharray="3,3"/>
  <path d="M40,250 C 70,205 100,205 130,250 C 160,295 190,295 220,250 C 250,205 280,205 310,250 C 340,295 370,295 400,250 C 415,228 430,228 445,250"
        fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M40,250 C 70,295 100,295 130,250 C 160,205 190,205 220,250 C 250,295 280,295 310,250 C 340,205 370,205 400,250 C 415,272 430,272 445,250"
        fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="455" y="254" font-family="sans-serif" font-size="11" fill="#000000">cancel</text>
</svg>
