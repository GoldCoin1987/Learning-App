<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="420" height="240">
  <rect x="0" y="0" width="420" height="240" fill="white"/>
  <text x="210" y="22" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">Electric charge: like repels, opposite attracts</text>

  <!-- LIKE CHARGES: two + pushing apart -->
  <text x="110" y="56" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Same sign: PUSH apart</text>
  <circle cx="70" cy="110" r="20" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="70" y="116" font-family="sans-serif" font-size="20" text-anchor="middle" fill="black">+</text>
  <circle cx="150" cy="110" r="20" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="150" y="116" font-family="sans-serif" font-size="20" text-anchor="middle" fill="black">+</text>
  <!-- arrows pointing outward (apart) -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="45" y1="110" x2="15" y2="110"/>
    <line x1="175" y1="110" x2="205" y2="110"/>
  </g>
  <g fill="black">
    <polygon points="11,110 21,105 21,115"/>
    <polygon points="209,110 199,105 199,115"/>
  </g>

  <!-- OPPOSITE CHARGES: + and - pulling together -->
  <text x="320" y="56" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Opposite sign: PULL together</text>
  <circle cx="280" cy="110" r="20" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="280" y="116" font-family="sans-serif" font-size="20" text-anchor="middle" fill="black">+</text>
  <circle cx="360" cy="110" r="20" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="360" y="117" font-family="sans-serif" font-size="22" text-anchor="middle" fill="black">&#8211;</text>
  <!-- arrows pointing inward (together) -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="252" y1="110" x2="232" y2="110"/>
    <line x1="388" y1="110" x2="408" y2="110"/>
  </g>
  <g fill="black">
    <polygon points="256,110 246,105 246,115"/>
    <polygon points="384,110 394,105 394,115"/>
  </g>

  <text x="210" y="200" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">The force grows weaker as the charges move farther apart.</text>
  <text x="210" y="222" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">(+ = extra protons, &#8211; = extra electrons)</text>
</svg>
