<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 360" width="380" height="360">
  <rect x="0" y="0" width="380" height="360" fill="white"/>
  <g fill="none" stroke="black" stroke-width="1.5">
    <!-- the chart as a simple circle -->
    <circle cx="190" cy="185" r="140"/>
    <!-- center dot marker ring -->
    <circle cx="190" cy="185" r="4" fill="black"/>
  </g>
  <!-- arrow from edge pointing inward to center -->
  <g fill="none" stroke="black" stroke-width="1.5">
    <line x1="300" y1="120" x2="205" y2="178"/>
  </g>
  <g fill="black">
    <polygon points="205,178 215,176 211,185"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="120" y="30">The Smith chart: a circular map</text>
    <text x="148" y="210">CENTER =</text>
    <text x="135" y="226">perfect match</text>
    <text x="155" y="242">(the goal)</text>
    <text x="250" y="112">EDGE =</text>
    <text x="240" y="128">full reflection</text>
    <text x="245" y="144">(worst)</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="55" y="352">Distance from center = how mismatched a load is</text>
  </g>
</svg>
