<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 330" width="470" height="330" font-family="sans-serif">
  <rect x="0" y="0" width="470" height="330" fill="#ffffff"/>
  <text x="235" y="24" text-anchor="middle" font-size="15" fill="#000000">A worked add-up, all in dB</text>

  <!-- baseline -->
  <line x1="60" y1="270" x2="440" y2="270" stroke="#000000" stroke-width="1.5"/>

  <!-- step 1: transmit power bar -->
  <rect x="70" y="170" width="55" height="100" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="97" y="162" text-anchor="middle" font-size="11" fill="#000000">transmit</text>
  <text x="97" y="290" text-anchor="middle" font-size="11" fill="#000000">+20</text>

  <!-- +6 antenna gains -->
  <text x="150" y="150" text-anchor="middle" font-size="12" fill="#000000">+6</text>
  <text x="150" y="166" text-anchor="middle" font-size="10" fill="#000000">gains</text>
  <line x1="150" y1="175" x2="150" y2="200" stroke="#000000" stroke-width="1.5"/>
  <polygon points="150,200 144,190 156,190" fill="#000000"/>

  <!-- running bar after gains -->
  <rect x="170" y="140" width="55" height="130" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="197" y="132" text-anchor="middle" font-size="11" fill="#000000">+26 now</text>

  <!-- -100 path loss (big drop) -->
  <text x="255" y="135" text-anchor="middle" font-size="12" fill="#000000">-100</text>
  <text x="255" y="151" text-anchor="middle" font-size="10" fill="#000000">path loss</text>
  <line x1="255" y1="270" x2="255" y2="160" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="255,160 249,170 261,170" fill="#000000"/>

  <!-- -2 cable loss -->
  <text x="320" y="135" text-anchor="middle" font-size="12" fill="#000000">-2</text>
  <text x="320" y="151" text-anchor="middle" font-size="10" fill="#000000">cable</text>
  <line x1="320" y1="270" x2="320" y2="160" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="320,160 314,170 326,170" fill="#000000"/>

  <!-- result -->
  <text x="400" y="200" text-anchor="middle" font-size="12" fill="#000000">received</text>
  <text x="400" y="216" text-anchor="middle" font-size="12" fill="#000000">level</text>
  <text x="400" y="240" text-anchor="middle" font-size="14" fill="#000000">-76</text>

  <text x="235" y="306" text-anchor="middle" font-size="12" fill="#000000">+20  +6  -100  -2  =  -76 (received level)</text>
  <text x="235" y="324" text-anchor="middle" font-size="11" fill="#000000">just adding and subtracting, no multiplying</text>
</svg>
