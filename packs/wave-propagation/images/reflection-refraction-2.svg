<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect x="0" y="0" width="480" height="320" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">At a boundary, a wave splits in two</text>
  <text x="240" y="46" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">part bounces back (reflects), part crosses over and bends (refracts)</text>

  <!-- boundary line -->
  <line x1="30" y1="180" x2="450" y2="180" stroke="#000000" stroke-width="2"/>
  <!-- the surface normal (dashed, perpendicular to boundary) -->
  <line x1="240" y1="70" x2="240" y2="300" stroke="#000000" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="248" y="84" font-family="sans-serif" font-size="11" fill="#000000">normal (the perpendicular line)</text>

  <!-- medium labels -->
  <text x="40" y="110" font-family="sans-serif" font-size="13" fill="#000000">Material 1 (e.g. air, faster)</text>
  <text x="40" y="300" font-family="sans-serif" font-size="13" fill="#000000">Material 2 (e.g. glass, slower)</text>

  <!-- incident ray (coming down-right) -->
  <line x1="110" y1="80" x2="240" y2="180" stroke="#000000" stroke-width="2.5"/>
  <polygon points="240,180 226,172 232,164" fill="#000000"/>
  <text x="120" y="100" font-family="sans-serif" font-size="12" fill="#000000">incoming wave</text>

  <!-- reflected ray (bounces up-right, same angle) -->
  <line x1="240" y1="180" x2="370" y2="80" stroke="#000000" stroke-width="2.5"/>
  <polygon points="370,80 356,86 352,78" fill="#000000"/>
  <text x="320" y="100" font-family="sans-serif" font-size="12" fill="#000000">reflected</text>

  <!-- refracted ray (continues down, bent toward normal) -->
  <line x1="240" y1="180" x2="300" y2="295" stroke="#000000" stroke-width="2.5"/>
  <polygon points="300,295 290,283 284,290" fill="#000000"/>
  <text x="305" y="285" font-family="sans-serif" font-size="12" fill="#000000">refracted (bent)</text>

  <!-- angle arcs: angle in = angle out -->
  <path d="M 240 132 A 48 48 0 0 1 211 142" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="200" y="150" font-family="sans-serif" font-size="12" fill="#000000">in</text>
  <path d="M 240 132 A 48 48 0 0 0 269 142" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="272" y="150" font-family="sans-serif" font-size="12" fill="#000000">out</text>
  <text x="240" y="232" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">angle in = angle out (law of reflection)</text>
</svg>
