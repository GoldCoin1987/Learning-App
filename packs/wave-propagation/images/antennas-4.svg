<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" width="460" height="280">
  <rect x="0" y="0" width="460" height="280" fill="#ffffff"/>
  <text x="70" y="24" font-family="sans-serif" font-size="14" fill="#000000">Two ways an antenna can radiate</text>

  <!-- LEFT: omnidirectional -->
  <text x="55" y="56" font-family="sans-serif" font-size="13" fill="#000000">Omnidirectional</text>
  <text x="40" y="72" font-family="sans-serif" font-size="10" fill="#000000">(spreads all around, like a bulb)</text>
  <!-- antenna dot -->
  <circle cx="115" cy="160" r="3" fill="#000000"/>
  <!-- concentric rings = energy in all directions -->
  <circle cx="115" cy="160" r="28" fill="none" stroke="#000000" stroke-width="1"/>
  <circle cx="115" cy="160" r="48" fill="none" stroke="#000000" stroke-width="1"/>
  <circle cx="115" cy="160" r="68" fill="none" stroke="#000000" stroke-width="1"/>
  <text x="95" y="250" font-family="sans-serif" font-size="10" fill="#000000">same in every direction</text>

  <!-- divider -->
  <line x1="230" y1="40" x2="230" y2="265" stroke="#000000" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- RIGHT: directional -->
  <text x="300" y="56" font-family="sans-serif" font-size="13" fill="#000000">Directional</text>
  <text x="270" y="72" font-family="sans-serif" font-size="10" fill="#000000">(focused beam, like a flashlight)</text>
  <!-- antenna dot -->
  <circle cx="300" cy="170" r="3" fill="#000000"/>
  <!-- main beam (long lobe to the right) -->
  <path d="M300,170 C330,110 400,95 445,108 C400,128 350,150 300,170 Z" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="380" y="100" font-family="sans-serif" font-size="11" fill="#000000">main beam</text>
  <!-- small back lobe -->
  <path d="M300,170 C285,150 268,148 258,152 C270,160 286,168 300,170 Z" fill="none" stroke="#000000" stroke-width="1"/>
  <text x="240" y="168" font-family="sans-serif" font-size="9" fill="#000000">small</text>
  <text x="240" y="180" font-family="sans-serif" font-size="9" fill="#000000">side lobe</text>
  <!-- small lower side lobe -->
  <path d="M300,170 C300,192 314,206 330,206 C318,192 308,180 300,170 Z" fill="none" stroke="#000000" stroke-width="1"/>
  <text x="300" y="252" font-family="sans-serif" font-size="10" fill="#000000">energy aimed one way</text>
</svg>
