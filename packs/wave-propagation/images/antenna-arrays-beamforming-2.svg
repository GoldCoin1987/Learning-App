<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320">
  <rect width="420" height="320" fill="white"/>
  <text x="70" y="22" font-family="sans-serif" font-size="13" fill="black">Array factor pattern: main lobe, side lobes, grating lobe</text>
  <!-- array baseline at bottom center -->
  <circle cx="210" cy="270" r="3" fill="black"/>
  <text x="180" y="292" font-family="sans-serif" font-size="11" fill="black">array</text>
  <!-- broadside axis -->
  <line x1="210" y1="270" x2="210" y2="50" stroke="black" stroke-width="0.5" stroke-dasharray="4 3"/>
  <!-- main lobe (vertical, broadside) -->
  <path d="M210,270 C175,150 195,70 210,55 C225,70 245,150 210,270 Z" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="216" y="62" font-family="sans-serif" font-size="11" fill="black">main lobe</text>
  <!-- right side lobe -->
  <path d="M210,270 C255,215 300,195 330,200 C300,225 255,255 210,270 Z" fill="none" stroke="black" stroke-width="1"/>
  <text x="300" y="195" font-family="sans-serif" font-size="10" fill="black">side lobe</text>
  <!-- left side lobe -->
  <path d="M210,270 C165,215 120,195 90,200 C120,225 165,255 210,270 Z" fill="none" stroke="black" stroke-width="1"/>
  <!-- grating lobe (large, far to the right) -->
  <path d="M210,270 C300,250 360,200 395,175 C360,235 300,265 210,270 Z" fill="none" stroke="black" stroke-width="1.3"/>
  <text x="320" y="160" font-family="sans-serif" font-size="11" fill="black">grating lobe</text>
  <text x="300" y="175" font-family="sans-serif" font-size="9" fill="black">(d &gt; &#955;)</text>
  <!-- broadside label -->
  <text x="158" y="48" font-family="sans-serif" font-size="10" fill="black">broadside</text>
</svg>
