<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 330" width="540" height="330" font-family="sans-serif">
  <rect x="0" y="0" width="540" height="330" fill="#ffffff"/>
  <text x="270" y="26" text-anchor="middle" font-size="15" fill="#000000">Three ways to chop the problem</text>

  <!-- FDTD panel -->
  <rect x="20" y="44" width="160" height="210" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="100" y="66" text-anchor="middle" font-size="13" fill="#000000">FDTD</text>
  <!-- grid of cells filling space -->
  <g stroke="#000000" stroke-width="0.5">
    <rect x="40" y="80" width="120" height="90" fill="none"/>
    <line x1="70" y1="80" x2="70" y2="170"/><line x1="100" y1="80" x2="100" y2="170"/><line x1="130" y1="80" x2="130" y2="170"/>
    <line x1="40" y1="110" x2="160" y2="110"/><line x1="40" y1="140" x2="160" y2="140"/>
  </g>
  <text x="100" y="194" text-anchor="middle" font-size="10" fill="#000000">grid through all space,</text>
  <text x="100" y="208" text-anchor="middle" font-size="10" fill="#000000">step forward in time</text>
  <text x="100" y="230" text-anchor="middle" font-size="10" fill="#000000">Good for: broadband,</text>
  <text x="100" y="244" text-anchor="middle" font-size="10" fill="#000000">antennas, transients</text>

  <!-- FEM panel -->
  <rect x="190" y="44" width="160" height="210" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="270" y="66" text-anchor="middle" font-size="13" fill="#000000">FEM</text>
  <!-- triangles filling a shape -->
  <g stroke="#000000" stroke-width="0.7" fill="none">
    <polygon points="210,170 240,90 270,170"/>
    <polygon points="270,170 240,90 285,110"/>
    <polygon points="270,170 285,110 320,150"/>
    <polygon points="270,170 320,150 320,170"/>
    <polygon points="240,90 285,110 300,85"/>
    <polygon points="285,110 320,150 330,110"/>
  </g>
  <text x="270" y="194" text-anchor="middle" font-size="10" fill="#000000">many small triangles</text>
  <text x="270" y="208" text-anchor="middle" font-size="10" fill="#000000">fit any shape</text>
  <text x="270" y="230" text-anchor="middle" font-size="10" fill="#000000">Good for: complex,</text>
  <text x="270" y="244" text-anchor="middle" font-size="10" fill="#000000">detailed geometry</text>

  <!-- MoM panel -->
  <rect x="360" y="44" width="160" height="210" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="440" y="66" text-anchor="middle" font-size="13" fill="#000000">MoM</text>
  <!-- just a metal surface / wire with marks, empty space around -->
  <line x1="440" y1="82" x2="440" y2="168" stroke="#000000" stroke-width="3"/>
  <!-- tick marks = segments on the surface -->
  <g stroke="#000000" stroke-width="1">
    <line x1="432" y1="96" x2="448" y2="96"/>
    <line x1="432" y1="110" x2="448" y2="110"/>
    <line x1="432" y1="124" x2="448" y2="124"/>
    <line x1="432" y1="138" x2="448" y2="138"/>
    <line x1="432" y1="152" x2="448" y2="152"/>
  </g>
  <text x="440" y="194" text-anchor="middle" font-size="10" fill="#000000">only the metal surface,</text>
  <text x="440" y="208" text-anchor="middle" font-size="10" fill="#000000">solve its currents</text>
  <text x="440" y="230" text-anchor="middle" font-size="10" fill="#000000">Good for: metal</text>
  <text x="440" y="244" text-anchor="middle" font-size="10" fill="#000000">antennas in open air</text>

  <text x="270" y="296" text-anchor="middle" font-size="11" fill="#000000">Same goal, different shortcut: pick the one that fits your design.</text>
  <text x="270" y="318" text-anchor="middle" font-size="10" fill="#000000">FDTD = grid + time | FEM = triangles for shapes | MoM = surface currents</text>
</svg>
