<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" width="420" height="300">
  <rect x="0" y="0" width="420" height="300" fill="#ffffff"/>
  <!-- Title -->
  <text x="210" y="24" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#000000">Rectangular Waveguide: TE10 Mode</text>

  <!-- Cross-section rectangle -->
  <rect x="60" y="60" width="200" height="120" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Dimension a (width) -->
  <line x1="60" y1="200" x2="260" y2="200" stroke="#000000" stroke-width="1"/>
  <line x1="60" y1="195" x2="60" y2="205" stroke="#000000" stroke-width="1"/>
  <line x1="260" y1="195" x2="260" y2="205" stroke="#000000" stroke-width="1"/>
  <text x="160" y="218" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#000000">a (broad wall)</text>

  <!-- Dimension b (height) -->
  <line x1="40" y1="60" x2="40" y2="180" stroke="#000000" stroke-width="1"/>
  <line x1="35" y1="60" x2="45" y2="60" stroke="#000000" stroke-width="1"/>
  <line x1="35" y1="180" x2="45" y2="180" stroke="#000000" stroke-width="1"/>
  <text x="22" y="124" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#000000" transform="rotate(-90 22 124)">b</text>

  <!-- E-field arrows (vertical, peaking at center half-sine across a) -->
  <g stroke="#000000" stroke-width="1.5" fill="#000000">
    <!-- short arrows near walls, tall in middle: half-sine -->
    <line x1="100" y1="115" x2="100" y2="125"/>
    <polygon points="96,123 104,123 100,128"/>
    <line x1="130" y1="95" x2="130" y2="145"/>
    <polygon points="126,143 134,143 130,148"/>
    <line x1="160" y1="78" x2="160" y2="162"/>
    <polygon points="156,160 164,160 160,166"/>
    <line x1="190" y1="95" x2="190" y2="145"/>
    <polygon points="186,143 194,143 190,148"/>
    <line x1="220" y1="115" x2="220" y2="125"/>
    <polygon points="216,123 224,123 220,128"/>
  </g>
  <text x="290" y="124" font-family="sans-serif" font-size="13" text-anchor="start" fill="#000000">E field</text>
  <text x="290" y="142" font-family="sans-serif" font-size="13" text-anchor="start" fill="#000000">(half-sine</text>
  <text x="290" y="158" font-family="sans-serif" font-size="13" text-anchor="start" fill="#000000">across a)</text>

  <!-- Cutoff note -->
  <text x="210" y="258" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#000000">fc(TE10) = c / (2a)   lambda_c = 2a</text>
  <text x="210" y="278" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#000000">one E half-cycle along a, none along b</text>
</svg>
