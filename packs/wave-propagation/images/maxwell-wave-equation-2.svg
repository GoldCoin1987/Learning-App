<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" width="560" height="300">
  <rect x="0" y="0" width="560" height="300" fill="white"/>
  <text x="280" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">The fields take turns: each one re-creates the other</text>

  <!-- chain of E and H circles handing off, marching to the right -->
  <!-- step 1: E -->
  <circle cx="80" cy="130" r="26" fill="white" stroke="black" stroke-width="1.8"/>
  <text x="80" y="136" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">E</text>
  <text x="80" y="178" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">a changing</text>
  <text x="80" y="191" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">electric field</text>

  <!-- arrow 1 -->
  <path d="M110,130 C135,108 165,108 188,128" fill="none" stroke="black" stroke-width="1.6"/>
  <polygon points="190,130 178,124 180,135" fill="black"/>
  <text x="149" y="100" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">makes a</text>

  <!-- step 2: H -->
  <circle cx="216" cy="130" r="26" fill="white" stroke="black" stroke-width="1.8"/>
  <text x="216" y="136" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">B</text>
  <text x="216" y="178" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">changing</text>
  <text x="216" y="191" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">magnetic field</text>

  <!-- arrow 2 -->
  <path d="M246,130 C271,108 301,108 324,128" fill="none" stroke="black" stroke-width="1.6"/>
  <polygon points="326,130 314,124 316,135" fill="black"/>
  <text x="285" y="100" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">makes a</text>

  <!-- step 3: E -->
  <circle cx="352" cy="130" r="26" fill="white" stroke="black" stroke-width="1.8"/>
  <text x="352" y="136" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">E</text>

  <!-- arrow 3 -->
  <path d="M382,130 C407,108 437,108 460,128" fill="none" stroke="black" stroke-width="1.6"/>
  <polygon points="462,130 450,124 452,135" fill="black"/>
  <text x="421" y="100" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">makes a</text>

  <!-- step 4: H -->
  <circle cx="488" cy="130" r="26" fill="white" stroke="black" stroke-width="1.8"/>
  <text x="488" y="136" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">B</text>

  <!-- big travel arrow underneath -->
  <line x1="60" y1="230" x2="500" y2="230" stroke="black" stroke-width="1.5"/>
  <polygon points="506,230 492,223 492,237" fill="black"/>
  <text x="280" y="252" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">the disturbance rolls outward on its own</text>
  <text x="280" y="284" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">This self-feeding hand-off IS an electromagnetic wave.</text>
</svg>
