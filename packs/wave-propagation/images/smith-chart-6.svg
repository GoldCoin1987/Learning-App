<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 360" width="380" height="360">
  <rect x="0" y="0" width="380" height="360" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="70" y="28">The constant-VSWR circle</text>
  </g>
  <!-- outer chart -->
  <g fill="none" stroke="black" stroke-width="1.5">
    <circle cx="190" cy="190" r="140"/>
    <!-- the VSWR circle: a smaller circle centred on the centre -->
    <circle cx="190" cy="190" r="80" stroke-dasharray="6 4"/>
    <circle cx="190" cy="190" r="3.5" fill="black"/>
  </g>
  <!-- a point on the dashed circle -->
  <g fill="black">
    <circle cx="247" cy="134" r="5"/>
  </g>
  <!-- radius line from center to point -->
  <g fill="none" stroke="black" stroke-width="1">
    <line x1="190" y1="190" x2="247" y2="134"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="150" y="208">center</text>
    <text x="252" y="128">load point</text>
    <text x="120" y="300">same distance all the way around =</text>
    <text x="150" y="318">same amount of mismatch</text>
  </g>
</svg>
