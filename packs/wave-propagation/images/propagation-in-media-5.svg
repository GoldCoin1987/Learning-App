<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <rect x="0" y="0" width="480" height="300" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">Dispersion: a prism splits white light</text>

  <!-- incoming white-light beam (single line) -->
  <line x1="20" y1="120" x2="180" y2="150" stroke="#000000" stroke-width="2"/>
  <text x="95" y="112" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">white light in</text>

  <!-- the prism (triangle) -->
  <polygon points="180,90 180,210 260,210" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="205" y="235" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">prism (glass)</text>

  <!-- fanned-out beams: each color bends a different amount -->
  <!-- they exit from the slanted right face around (220,150) and fan out -->
  <line x1="225" y1="155" x2="450" y2="120" stroke="#000000" stroke-width="1.4"/>
  <line x1="225" y1="156" x2="450" y2="140" stroke="#000000" stroke-width="1.4"/>
  <line x1="225" y1="157" x2="450" y2="160" stroke="#000000" stroke-width="1.4"/>
  <line x1="225" y1="158" x2="450" y2="180" stroke="#000000" stroke-width="1.4"/>
  <line x1="225" y1="159" x2="450" y2="200" stroke="#000000" stroke-width="1.4"/>

  <!-- color labels (named, since no color is used) -->
  <text x="462" y="122" font-family="sans-serif" font-size="10" fill="#000000">red</text>
  <text x="462" y="142" font-family="sans-serif" font-size="10" fill="#000000">orange</text>
  <text x="462" y="162" font-family="sans-serif" font-size="10" fill="#000000">yellow</text>
  <text x="462" y="182" font-family="sans-serif" font-size="10" fill="#000000">green</text>
  <text x="462" y="202" font-family="sans-serif" font-size="10" fill="#000000">blue</text>

  <text x="240" y="268" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">Different colors travel at slightly different speeds in glass,</text>
  <text x="240" y="286" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">so each bends a different amount and the colors separate.</text>
</svg>
