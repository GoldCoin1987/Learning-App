<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300">
  <rect width="460" height="300" fill="white"/>
  <text x="60" y="24" font-family="sans-serif" font-size="14" fill="black">In step adds up; out of step cancels out</text>
  <!-- LEFT: in step -> big combined wave -->
  <text x="55" y="60" font-family="sans-serif" font-size="12" fill="black">In step (add)</text>
  <path d="M30,120 Q55,90 80,120 T130,120 T180,120" fill="none" stroke="black" stroke-width="1"/>
  <path d="M30,120 Q55,90 80,120 T130,120 T180,120" fill="none" stroke="black" stroke-width="1" transform="translate(0,6)"/>
  <text x="35" y="150" font-family="sans-serif" font-size="10" fill="black">two waves, crests together</text>
  <!-- combined big wave -->
  <path d="M30,230 Q55,175 80,230 T130,230 T180,230" fill="none" stroke="black" stroke-width="2"/>
  <text x="35" y="262" font-family="sans-serif" font-size="11" fill="black">= big wave (strong)</text>
  <!-- divider -->
  <line x1="230" y1="40" x2="230" y2="280" stroke="black" stroke-width="0.5" stroke-dasharray="4 3"/>
  <!-- RIGHT: out of step -> cancels -->
  <text x="300" y="60" font-family="sans-serif" font-size="12" fill="black">Out of step (cancel)</text>
  <path d="M270,120 Q295,90 320,120 T370,120 T420,120" fill="none" stroke="black" stroke-width="1"/>
  <path d="M270,120 Q295,150 320,120 T370,120 T420,120" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="275" y="150" font-family="sans-serif" font-size="10" fill="black">crest meets trough</text>
  <!-- combined flat line -->
  <line x1="270" y1="230" x2="420" y2="230" stroke="black" stroke-width="2"/>
  <text x="285" y="262" font-family="sans-serif" font-size="11" fill="black">= flat (weak / nothing)</text>
</svg>
