<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect x="0" y="0" width="400" height="300" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="40" y="28">Modern tools draw the same chart for you</text>
  </g>
  <!-- a screen/monitor outline -->
  <g fill="none" stroke="black" stroke-width="1.5">
    <rect x="70" y="50" width="260" height="170" rx="6"/>
    <line x1="200" y1="220" x2="200" y2="245"/>
    <line x1="150" y1="245" x2="250" y2="245"/>
    <!-- the chart on screen -->
    <circle cx="200" cy="130" r="65"/>
    <circle cx="200" cy="130" r="2.5" fill="black"/>
  </g>
  <!-- marker plotted by the instrument -->
  <g fill="black">
    <circle cx="245" cy="100" r="4"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="95" y="68">network analyzer / RF software</text>
    <text x="40" y="280">A VNA or program plots your real circuit as a point automatically.</text>
  </g>
</svg>
