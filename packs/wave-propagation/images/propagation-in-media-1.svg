<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <rect x="0" y="0" width="400" height="260" fill="white"/>
  <!-- axes -->
  <line x1="60" y1="30" x2="60" y2="210" stroke="black" stroke-width="1.5"/>
  <line x1="60" y1="210" x2="370" y2="210" stroke="black" stroke-width="1.5"/>
  <!-- y axis label -->
  <text x="14" y="120" font-family="sans-serif" font-size="13" transform="rotate(-90 14 120)">J(z) / J0</text>
  <!-- x axis label -->
  <text x="200" y="248" font-family="sans-serif" font-size="13" text-anchor="middle">depth z into conductor</text>
  <!-- J0 tick -->
  <text x="34" y="44" font-family="sans-serif" font-size="12">J0</text>
  <line x1="56" y1="40" x2="60" y2="40" stroke="black" stroke-width="1.5"/>
  <!-- exponential decay curve J = J0 e^(-z/delta) ; surface at z=0 (x=60,y=40) -->
  <path d="M60,40 C100,95 130,140 160,165 C200,190 250,202 370,207" fill="none" stroke="black" stroke-width="2"/>
  <!-- skin depth marker at z = delta -> J/J0 = 0.368 -->
  <!-- delta chosen at x=130; y at 0.368*170+40 approx -->
  <line x1="130" y1="40" x2="130" y2="210" stroke="black" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="60" y1="140" x2="130" y2="140" stroke="black" stroke-width="0.8" stroke-dasharray="4 3"/>
  <circle cx="130" cy="140" r="3" fill="black"/>
  <text x="40" y="144" font-family="sans-serif" font-size="11">0.37 J0</text>
  <text x="118" y="225" font-family="sans-serif" font-size="13" font-style="italic">&#948;s</text>
  <!-- curve label -->
  <text x="205" y="120" font-family="sans-serif" font-size="13" font-style="italic">J = J0 e</text>
  <text x="263" y="113" font-family="sans-serif" font-size="11" font-style="italic">-z/&#948;s</text>
</svg>
