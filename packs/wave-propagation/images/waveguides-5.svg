<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" width="480" height="280">
  <rect x="0" y="0" width="480" height="280" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#000000">Three ways to carry a wave: when to use each</text>

  <!-- COAX -->
  <text x="80" y="60" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#000000">Coax cable</text>
  <!-- outer shield -->
  <rect x="40" y="75" width="80" height="44" rx="22" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- center wire -->
  <line x1="40" y1="97" x2="120" y2="97" stroke="#000000" stroke-width="3"/>
  <circle cx="80" cy="97" r="4" fill="#000000"/>
  <text x="80" y="140" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">center wire +</text>
  <text x="80" y="154" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">outer shield</text>
  <text x="80" y="178" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">Best: lower</text>
  <text x="80" y="192" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">frequencies,</text>
  <text x="80" y="206" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">flexible runs</text>

  <!-- WAVEGUIDE -->
  <text x="240" y="60" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#000000">Waveguide</text>
  <!-- hollow rectangle pipe -->
  <rect x="200" y="75" width="80" height="44" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="240" y="100" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">hollow</text>
  <text x="240" y="140" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">metal pipe,</text>
  <text x="240" y="154" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">no center wire</text>
  <text x="240" y="178" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">Best: high power,</text>
  <text x="240" y="192" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">microwave/radar,</text>
  <text x="240" y="206" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">low loss</text>

  <!-- FIBER -->
  <text x="400" y="60" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#000000">Optical fiber</text>
  <!-- thin glass strand -->
  <rect x="360" y="89" width="80" height="16" rx="8" fill="none" stroke="#000000" stroke-width="2"/>
  <line x1="360" y1="97" x2="440" y2="97" stroke="#000000" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="400" y="140" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">glass strand,</text>
  <text x="400" y="154" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">guides light</text>
  <text x="400" y="178" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">Best: very high</text>
  <text x="400" y="192" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">data over long</text>
  <text x="400" y="206" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#000000">distances</text>

  <text x="240" y="244" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#000000">All three guide a wave; the right choice depends on frequency, power, and distance.</text>
  <text x="240" y="266" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#000000">Waveguide and fiber both work by bouncing the wave along inside.</text>
</svg>
