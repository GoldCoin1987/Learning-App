<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="420" height="240">
  <rect x="0" y="0" width="420" height="240" fill="white"/>
  <text x="210" y="24" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">Voltage is like height on a hill</text>

  <!-- the hill (a downward slope from left-high to right-low) -->
  <path d="M40,190 C140,190 180,70 360,70" fill="none" stroke="black" stroke-width="2"/>
  <!-- ground line -->
  <line x1="40" y1="195" x2="380" y2="195" stroke="black" stroke-width="1.2"/>

  <!-- high point label -->
  <circle cx="350" cy="70" r="9" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="350" y="75" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">+</text>
  <text x="350" y="55" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">high voltage</text>

  <!-- low point label -->
  <text x="70" y="215" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">low voltage</text>

  <!-- arrow showing the + charge rolling downhill (high to low) -->
  <g stroke="black" stroke-width="1.6" fill="none">
    <path d="M330,82 C200,110 150,150 90,182" />
  </g>
  <polygon points="86,184 98,182 93,174" fill="black"/>
  <text x="210" y="135" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">a + charge rolls</text>
  <text x="210" y="151" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">from high to low</text>

  <text x="210" y="232" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">A steeper slope means a stronger push (a stronger field).</text>
</svg>
