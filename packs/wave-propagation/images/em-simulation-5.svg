<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 320" width="540" height="320" font-family="sans-serif">
  <rect x="0" y="0" width="540" height="320" fill="#ffffff"/>
  <text x="270" y="26" text-anchor="middle" font-size="15" fill="#000000">FDTD: a stop-motion movie of the wave</text>

  <!-- three time-step frames showing a wave spreading across a grid -->
  <!-- Frame 1 -->
  <text x="100" y="58" text-anchor="middle" font-size="12" fill="#000000">Step 1</text>
  <rect x="40" y="68" width="120" height="120" fill="none" stroke="#000000" stroke-width="1"/>
  <g stroke="#000000" stroke-width="0.4">
    <line x1="70" y1="68" x2="70" y2="188"/><line x1="100" y1="68" x2="100" y2="188"/><line x1="130" y1="68" x2="130" y2="188"/>
    <line x1="40" y1="98" x2="160" y2="98"/><line x1="40" y1="128" x2="160" y2="128"/><line x1="40" y1="158" x2="160" y2="158"/>
  </g>
  <!-- small source dot center -->
  <circle cx="100" cy="128" r="6" fill="#000000"/>

  <!-- arrow -->
  <line x1="168" y1="128" x2="192" y2="128" stroke="#000000" stroke-width="1.5"/>
  <polygon points="192,128 182,123 182,133" fill="#000000"/>

  <!-- Frame 2 -->
  <text x="270" y="58" text-anchor="middle" font-size="12" fill="#000000">Step 2</text>
  <rect x="210" y="68" width="120" height="120" fill="none" stroke="#000000" stroke-width="1"/>
  <g stroke="#000000" stroke-width="0.4">
    <line x1="240" y1="68" x2="240" y2="188"/><line x1="270" y1="68" x2="270" y2="188"/><line x1="300" y1="68" x2="300" y2="188"/>
    <line x1="210" y1="98" x2="330" y2="98"/><line x1="210" y1="128" x2="330" y2="128"/><line x1="210" y1="158" x2="330" y2="158"/>
  </g>
  <circle cx="270" cy="128" r="6" fill="#000000"/>
  <circle cx="270" cy="128" r="22" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- arrow -->
  <line x1="338" y1="128" x2="362" y2="128" stroke="#000000" stroke-width="1.5"/>
  <polygon points="362,128 352,123 352,133" fill="#000000"/>

  <!-- Frame 3 -->
  <text x="440" y="58" text-anchor="middle" font-size="12" fill="#000000">Step 3</text>
  <rect x="380" y="68" width="120" height="120" fill="none" stroke="#000000" stroke-width="1"/>
  <g stroke="#000000" stroke-width="0.4">
    <line x1="410" y1="68" x2="410" y2="188"/><line x1="440" y1="68" x2="440" y2="188"/><line x1="470" y1="68" x2="470" y2="188"/>
    <line x1="380" y1="98" x2="500" y2="98"/><line x1="380" y1="128" x2="500" y2="128"/><line x1="380" y1="158" x2="500" y2="158"/>
  </g>
  <circle cx="440" cy="128" r="6" fill="#000000"/>
  <circle cx="440" cy="128" r="22" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="440" cy="128" r="40" fill="none" stroke="#000000" stroke-width="1.5"/>

  <text x="270" y="230" text-anchor="middle" font-size="12" fill="#000000">Each step, the fields nudge their neighbors one cell over.</text>
  <text x="270" y="252" text-anchor="middle" font-size="12" fill="#000000">Replay the steps and you watch the wave spread, frame by frame.</text>
  <text x="270" y="288" text-anchor="middle" font-size="11" fill="#000000">Time marches forward in tiny steps, like weather forecasting hour by hour.</text>
</svg>
