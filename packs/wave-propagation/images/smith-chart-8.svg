<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 360" width="380" height="360">
  <rect x="0" y="0" width="380" height="360" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="35" y="28">Matching: slide the point to the center</text>
  </g>
  <!-- chart -->
  <g fill="none" stroke="black" stroke-width="1.5">
    <circle cx="190" cy="190" r="140"/>
    <circle cx="190" cy="190" r="4" fill="black"/>
  </g>
  <!-- starting load point off-center -->
  <g fill="black">
    <circle cx="300" cy="130" r="5"/>
  </g>
  <!-- path of two moves toward center (two curved segments) -->
  <g fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="5 4">
    <path d="M300,130 Q250,180 235,150"/>
    <path d="M235,150 Q210,135 192,186"/>
  </g>
  <g fill="black">
    <polygon points="192,186 198,178 201,188"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="270" y="120">start: mismatched</text>
    <text x="120" y="208">center: matched</text>
    <text x="40" y="335">Each added component (the dashed steps) nudges the point</text>
    <text x="40" y="351">closer to the bullseye, until it lands at the center.</text>
  </g>
</svg>
