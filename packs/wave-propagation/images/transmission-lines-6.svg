<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" width="520" height="220">
  <rect x="0" y="0" width="520" height="220" fill="#ffffff"/>
  <text x="260" y="24" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">VSWR: a "how-bad-is-the-mismatch" number</text>
  <text x="260" y="44" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">it starts at 1 (perfect) and gets larger as the mismatch gets worse</text>

  <!-- number line -->
  <line x1="40" y1="120" x2="480" y2="120" stroke="#000000" stroke-width="2"/>
  <polygon points="480,120 468,114 468,126" fill="#000000"/>

  <!-- ticks -->
  <line x1="60" y1="114" x2="60" y2="126" stroke="#000000" stroke-width="2"/>
  <text x="60" y="146" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">1</text>
  <line x1="170" y1="114" x2="170" y2="126" stroke="#000000" stroke-width="2"/>
  <text x="170" y="146" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">2</text>
  <line x1="280" y1="114" x2="280" y2="126" stroke="#000000" stroke-width="2"/>
  <text x="280" y="146" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">3</text>
  <line x1="390" y1="114" x2="390" y2="126" stroke="#000000" stroke-width="2"/>
  <text x="390" y="146" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">5</text>

  <!-- labels under regions -->
  <text x="60" y="172" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">perfect</text>
  <text x="60" y="186" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">match</text>
  <text x="225" y="172" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">usable</text>
  <text x="450" y="172" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">bad</text>
  <text x="450" y="186" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">mismatch</text>

  <!-- good/bad arrow -->
  <text x="100" y="86" font-family="sans-serif" font-size="12" fill="#000000">better</text>
  <line x1="150" y1="82" x2="90" y2="82" stroke="#000000" stroke-width="1.5"/>
  <polygon points="90,82 102,76 102,88" fill="#000000"/>
  <text x="360" y="86" font-family="sans-serif" font-size="12" fill="#000000">worse</text>
  <line x1="350" y1="82" x2="430" y2="82" stroke="#000000" stroke-width="1.5"/>
  <polygon points="430,82 418,76 418,88" fill="#000000"/>
</svg>
