<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" width="460" height="320">
  <rect x="0" y="0" width="460" height="320" fill="#ffffff"/>
  <text x="40" y="24" font-family="sans-serif" font-size="14" fill="#000000">Shortwave bounces off the sky to reach far away</text>

  <!-- curve of the Earth (big arc near bottom) -->
  <path d="M20,300 Q230,210 440,300" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="200" y="300" font-family="sans-serif" font-size="11" fill="#000000">curved Earth</text>

  <!-- ionosphere layer (dashed arc up high) -->
  <path d="M40,120 Q230,60 420,120" fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="150" y="80" font-family="sans-serif" font-size="11" fill="#000000">ionosphere (high-up layer)</text>

  <!-- transmitter on left of surface -->
  <line x1="80" y1="262" x2="80" y2="240" stroke="#000000" stroke-width="2"/>
  <circle cx="80" cy="236" r="4" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="58" y="230" font-family="sans-serif" font-size="10" fill="#000000">transmitter</text>

  <!-- receiver on right of surface (over the horizon) -->
  <line x1="380" y1="262" x2="380" y2="240" stroke="#000000" stroke-width="2"/>
  <circle cx="380" cy="236" r="4" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="356" y="230" font-family="sans-serif" font-size="10" fill="#000000">receiver</text>

  <!-- ray up to ionosphere -->
  <line x1="82" y1="236" x2="228" y2="92" stroke="#000000" stroke-width="1.5"/>
  <!-- ray bounced back down -->
  <line x1="228" y1="92" x2="378" y2="236" stroke="#000000" stroke-width="1.5"/>
  <polygon points="378,236 366,229 372,239" fill="#000000"/>
  <text x="232" y="120" font-family="sans-serif" font-size="10" fill="#000000">bounced back down</text>

  <!-- note about night/day -->
  <text x="40" y="300" font-family="sans-serif" font-size="10" fill="#000000"></text>
  <text x="250" y="300" font-family="sans-serif" font-size="10" fill="#000000">works best at night (AM travels farther)</text>
</svg>
