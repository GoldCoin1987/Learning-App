<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <rect x="0" y="0" width="480" height="300" fill="#ffffff"/>
  <text x="240" y="28" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">A plane wave: flat parallel wavefronts</text>
  <!-- flat parallel wavefronts (crests) as vertical lines -->
  <line x1="80" y1="60" x2="80" y2="240" stroke="#000000" stroke-width="3"/>
  <line x1="150" y1="60" x2="150" y2="240" stroke="#000000" stroke-width="3"/>
  <line x1="220" y1="60" x2="220" y2="240" stroke="#000000" stroke-width="3"/>
  <line x1="290" y1="60" x2="290" y2="240" stroke="#000000" stroke-width="3"/>
  <line x1="360" y1="60" x2="360" y2="240" stroke="#000000" stroke-width="3"/>
  <!-- ray arrow showing travel direction -->
  <line x1="100" y1="150" x2="410" y2="150" stroke="#000000" stroke-width="1.5"/>
  <polygon points="410,150 398,144 398,156" fill="#000000"/>
  <text x="345" y="142" font-family="sans-serif" font-size="13" fill="#000000">ray (travel direction)</text>
  <!-- label one wavefront -->
  <text x="80" y="258" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">crest</text>
  <text x="150" y="258" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">crest</text>
  <text x="220" y="270" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">flat wavefronts (sheets of crest)</text>
  <text x="115" y="80" font-family="sans-serif" font-size="12" fill="#000000">all move the same way together</text>
</svg>
