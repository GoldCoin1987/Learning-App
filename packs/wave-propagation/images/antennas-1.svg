<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="white"/>
  <!-- axes / origin at antenna -->
  <circle cx="60" cy="220" r="3" fill="black"/>
  <text x="40" y="240" font-family="sans-serif" font-size="11" fill="black">antenna</text>
  <!-- main lobe -->
  <path d="M60,220 C120,90 260,60 360,80 C260,110 200,150 60,220 Z" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- side lobe upper -->
  <path d="M60,220 C90,170 130,150 165,158 C130,180 95,200 60,220 Z" fill="none" stroke="black" stroke-width="1"/>
  <!-- side lobe lower -->
  <path d="M60,220 C80,250 110,265 140,262 C110,250 85,235 60,220 Z" fill="none" stroke="black" stroke-width="1"/>
  <!-- boresight axis -->
  <line x1="60" y1="220" x2="370" y2="70" stroke="black" stroke-width="0.5" stroke-dasharray="4 3"/>
  <!-- HPBW edges -->
  <line x1="60" y1="220" x2="360" y2="105" stroke="black" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="60" y1="220" x2="345" y2="55" stroke="black" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text x="300" y="50" font-family="sans-serif" font-size="11" fill="black">main lobe</text>
  <text x="150" y="150" font-family="sans-serif" font-size="10" fill="black">side lobe</text>
  <text x="118" y="278" font-family="sans-serif" font-size="10" fill="black">side lobe</text>
  <text x="200" y="100" font-family="sans-serif" font-size="11" fill="black">HPBW (3 dB)</text>
  <!-- null label -->
  <text x="165" y="172" font-family="sans-serif" font-size="9" fill="black">null</text>
</svg>
