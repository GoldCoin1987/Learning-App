<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <rect x="0" y="0" width="400" height="220" fill="white"/>
  <!-- DIVERGENCE: source point with outward arrows -->
  <text x="100" y="20" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Divergence (source)</text>
  <circle cx="100" cy="120" r="4" fill="black"/>
  <!-- radial arrows -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="100" y1="120" x2="100" y2="60"/>
    <line x1="100" y1="120" x2="100" y2="180"/>
    <line x1="100" y1="120" x2="40" y2="120"/>
    <line x1="100" y1="120" x2="160" y2="120"/>
    <line x1="100" y1="120" x2="58" y2="78"/>
    <line x1="100" y1="120" x2="142" y2="78"/>
    <line x1="100" y1="120" x2="58" y2="162"/>
    <line x1="100" y1="120" x2="142" y2="162"/>
  </g>
  <g fill="black">
    <polygon points="100,56 96,66 104,66"/>
    <polygon points="100,184 96,174 104,174"/>
    <polygon points="36,120 46,116 46,124"/>
    <polygon points="164,120 154,116 154,124"/>
    <polygon points="55,75 65,77 60,84"/>
    <polygon points="145,75 135,77 140,84"/>
    <polygon points="55,165 60,156 65,163"/>
    <polygon points="145,165 135,163 140,156"/>
  </g>
  <text x="100" y="205" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">div F &gt; 0</text>

  <!-- CURL: circulating arrows -->
  <text x="300" y="20" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">Curl (circulation)</text>
  <g stroke="black" stroke-width="1.5" fill="none">
    <circle cx="300" cy="120" r="50"/>
  </g>
  <!-- arrowheads on the circle (tangent, clockwise) -->
  <g fill="black">
    <polygon points="350,120 340,114 340,126"/>
    <polygon points="300,170 306,160 294,160"/>
    <polygon points="250,120 260,126 260,114"/>
    <polygon points="300,70 294,80 306,80"/>
  </g>
  <line x1="300" y1="120" x2="300" y2="120" />
  <circle cx="300" cy="120" r="3" fill="black"/>
  <text x="300" y="205" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">curl F &#8800; 0</text>
</svg>
