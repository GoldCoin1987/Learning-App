<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect x="0" y="0" width="400" height="240" fill="#ffffff"/>
  <!-- ground -->
  <line x1="20" y1="200" x2="380" y2="200" stroke="#000000" stroke-width="2"/>
  <!-- TX antenna -->
  <line x1="60" y1="200" x2="60" y2="120" stroke="#000000" stroke-width="2"/>
  <circle cx="60" cy="115" r="5" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="40" y="110" font-family="sans-serif" font-size="13">Tx</text>
  <!-- RX antenna -->
  <line x1="340" y1="200" x2="340" y2="140" stroke="#000000" stroke-width="2"/>
  <circle cx="340" cy="135" r="5" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="350" y="130" font-family="sans-serif" font-size="13">Rx</text>
  <!-- direct ray -->
  <line x1="60" y1="118" x2="340" y2="138" stroke="#000000" stroke-width="2"/>
  <text x="170" y="120" font-family="sans-serif" font-size="12">direct ray</text>
  <!-- reflected ray: TX down to ground bounce, up to RX -->
  <line x1="60" y1="118" x2="205" y2="200" stroke="#000000" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="205" y1="200" x2="340" y2="138" stroke="#000000" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="120" y="185" font-family="sans-serif" font-size="12">reflected ray</text>
  <!-- bounce point marker -->
  <circle cx="205" cy="200" r="3" fill="#000000"/>
  <!-- grazing angle arc indication -->
  <text x="210" y="218" font-family="sans-serif" font-size="11">ground reflection</text>
  <!-- heights -->
  <line x1="60" y1="200" x2="60" y2="200" stroke="#000000"/>
  <text x="20" y="160" font-family="sans-serif" font-size="11">h_t</text>
  <text x="350" y="175" font-family="sans-serif" font-size="11">h_r</text>
  <text x="150" y="232" font-family="sans-serif" font-size="11">two-ray ground-reflection model</text>
</svg>
