<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 230" width="460" height="230">
  <rect x="0" y="0" width="460" height="230" fill="white"/>
  <text x="230" y="24" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">The electromagnetic spectrum: one family</text>
  <text x="230" y="44" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">All the same waves &#8212; only the frequency changes</text>

  <!-- main horizontal line -->
  <line x1="30" y1="120" x2="430" y2="120" stroke="black" stroke-width="2"/>
  <polygon points="434,120 424,115 424,125" fill="black"/>

  <!-- low / high frequency labels -->
  <text x="30" y="150" font-family="sans-serif" font-size="11" text-anchor="start" fill="black">low frequency</text>
  <text x="430" y="150" font-family="sans-serif" font-size="11" text-anchor="end" fill="black">high frequency</text>
  <text x="30" y="164" font-family="sans-serif" font-size="11" text-anchor="start" fill="black">long waves</text>
  <text x="430" y="164" font-family="sans-serif" font-size="11" text-anchor="end" fill="black">short waves</text>

  <!-- tick marks for bands -->
  <g stroke="black" stroke-width="1.3">
    <line x1="70" y1="112" x2="70" y2="128"/>
    <line x1="150" y1="112" x2="150" y2="128"/>
    <line x1="230" y1="112" x2="230" y2="128"/>
    <line x1="290" y1="112" x2="290" y2="128"/>
    <line x1="350" y1="112" x2="350" y2="128"/>
    <line x1="405" y1="112" x2="405" y2="128"/>
  </g>

  <!-- band labels above -->
  <g font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">
    <text x="70" y="100">Radio</text>
    <text x="150" y="100">Microwave</text>
    <text x="150" y="86">(Wi-Fi)</text>
    <text x="230" y="100">Infrared</text>
    <text x="290" y="100">Visible</text>
    <text x="290" y="86">light</text>
    <text x="350" y="100">Ultraviolet</text>
    <text x="405" y="100">X-ray</text>
  </g>

  <text x="230" y="205" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Radio, Wi-Fi, and visible light are all the same thing at different frequencies.</text>
</svg>
