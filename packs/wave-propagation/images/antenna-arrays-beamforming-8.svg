<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320">
  <rect width="460" height="320" fill="white"/>
  <text x="30" y="24" font-family="sans-serif" font-size="14" fill="black">Nulling: aim the beam at the user, a zero at the jammer</text>
  <!-- array at bottom center -->
  <circle cx="210" cy="280" r="4" fill="black"/>
  <text x="180" y="302" font-family="sans-serif" font-size="11" fill="black">the array</text>
  <!-- main beam toward upper right (the user/target) -->
  <path d="M210,280 C250,170 300,120 340,100 C320,150 300,210 210,280 Z" fill="none" stroke="black" stroke-width="1.6"/>
  <line x1="210" y1="280" x2="345" y2="95" stroke="black" stroke-width="0.5" stroke-dasharray="4 3"/>
  <circle cx="350" cy="90" r="6" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="300" y="78" font-family="sans-serif" font-size="11" fill="black">user / target</text>
  <text x="250" y="150" font-family="sans-serif" font-size="11" fill="black">strong beam</text>
  <!-- null toward upper left (the interferer) -->
  <line x1="210" y1="280" x2="80" y2="120" stroke="black" stroke-width="0.6" stroke-dasharray="2 3"/>
  <text x="60" y="112" font-family="sans-serif" font-size="11" fill="black">interferer / jammer</text>
  <!-- mark the null with an X -->
  <line x1="118" y1="166" x2="132" y2="180" stroke="black" stroke-width="1.4"/>
  <line x1="132" y1="166" x2="118" y2="180" stroke="black" stroke-width="1.4"/>
  <text x="92" y="200" font-family="sans-serif" font-size="11" fill="black">zero (null): ignore it</text>
</svg>
