<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <rect x="0" y="0" width="480" height="300" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">Refractive index n and speed = c / n</text>
  <text x="240" y="46" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">n = how many times slower light goes than in vacuum</text>

  <!-- table outline -->
  <rect x="40" y="60" width="400" height="180" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- vertical column dividers -->
  <line x1="200" y1="60" x2="200" y2="240" stroke="#000000" stroke-width="1"/>
  <line x1="320" y1="60" x2="320" y2="240" stroke="#000000" stroke-width="1"/>
  <!-- horizontal header divider -->
  <line x1="40" y1="92" x2="440" y2="92" stroke="#000000" stroke-width="1.2"/>
  <!-- row dividers -->
  <line x1="40" y1="129" x2="440" y2="129" stroke="#000000" stroke-width="1"/>
  <line x1="40" y1="166" x2="440" y2="166" stroke="#000000" stroke-width="1"/>
  <line x1="40" y1="203" x2="440" y2="203" stroke="#000000" stroke-width="1"/>

  <!-- headers -->
  <text x="120" y="82" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">material</text>
  <text x="260" y="82" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">index n</text>
  <text x="380" y="82" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">speed = c/n</text>

  <!-- row: vacuum -->
  <text x="120" y="115" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">vacuum</text>
  <text x="260" y="115" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">1.00</text>
  <text x="380" y="115" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">c (fastest)</text>

  <!-- row: air -->
  <text x="120" y="152" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">air</text>
  <text x="260" y="152" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">~1.0003</text>
  <text x="380" y="152" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">~ c</text>

  <!-- row: water -->
  <text x="120" y="189" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">water</text>
  <text x="260" y="189" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">1.33</text>
  <text x="380" y="189" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">c / 1.33</text>

  <!-- row: glass -->
  <text x="120" y="226" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">glass</text>
  <text x="260" y="226" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">1.50</text>
  <text x="380" y="226" font-family="sans-serif" font-size="13" fill="#000000" text-anchor="middle">c / 1.50</text>

  <text x="240" y="266" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">Bigger n = slower wave. (c is about 300 million m/s.)</text>
  <text x="240" y="286" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">Example: in glass, light goes c / 1.5 = about 200 million m/s.</text>
</svg>
