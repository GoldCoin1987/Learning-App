<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 320" width="470" height="320" font-family="sans-serif">
  <rect x="0" y="0" width="470" height="320" fill="#ffffff"/>
  <text x="235" y="24" text-anchor="middle" font-size="15" fill="#000000">Fade margin: a cushion for bad days</text>

  <!-- vertical scale -->
  <line x1="55" y1="55" x2="55" y2="275" stroke="#000000" stroke-width="1.5"/>

  <!-- sensitivity threshold (the "must stay above" line) -->
  <line x1="55" y1="235" x2="440" y2="235" stroke="#000000" stroke-width="1.5"/>
  <text x="250" y="252" text-anchor="middle" font-size="11" fill="#000000">sensitivity threshold (lowest signal still usable)</text>

  <!-- clear day signal bar (tall) -->
  <rect x="100" y="95" width="60" height="140" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="130" y="87" text-anchor="middle" font-size="11" fill="#000000">clear day</text>

  <!-- margin bracket on clear-day bar -->
  <line x1="180" y1="95" x2="180" y2="235" stroke="#000000" stroke-width="1.5"/>
  <polygon points="180,95 174,107 186,107" fill="#000000"/>
  <polygon points="180,235 174,223 186,223" fill="#000000"/>
  <text x="225" y="160" text-anchor="middle" font-size="12" fill="#000000">fade</text>
  <text x="225" y="176" text-anchor="middle" font-size="12" fill="#000000">margin</text>

  <!-- rain cloud eating the margin -->
  <text x="335" y="80" text-anchor="middle" font-size="11" fill="#000000">rain eats</text>
  <text x="335" y="95" text-anchor="middle" font-size="11" fill="#000000">into it</text>
  <line x1="335" y1="100" x2="335" y2="125" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="335,125 329,115 341,115" fill="#000000"/>

  <!-- rainy day bar (shorter, but still above threshold) -->
  <rect x="305" y="135" width="60" height="100" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="335" y="153" text-anchor="middle" font-size="10" fill="#000000">rainy</text>
  <text x="335" y="167" text-anchor="middle" font-size="10" fill="#000000">day</text>

  <text x="235" y="290" text-anchor="middle" font-size="11" fill="#000000">With margin, a rainstorm weakens the signal but it stays</text>
  <text x="235" y="306" text-anchor="middle" font-size="11" fill="#000000">above the threshold, so the link keeps working.</text>
</svg>
