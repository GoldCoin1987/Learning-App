<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" width="460" height="300">
  <rect x="0" y="0" width="460" height="300" fill="#ffffff"/>
  <text x="40" y="22" font-family="sans-serif" font-size="14" fill="#000000">Low frequency bends/penetrates; high is line-of-sight</text>

  <!-- divider -->
  <line x1="230" y1="40" x2="230" y2="290" stroke="#000000" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- LEFT: low frequency bends over a hill -->
  <text x="30" y="56" font-family="sans-serif" font-size="12" fill="#000000">LOW frequency</text>
  <line x1="30" y1="250" x2="210" y2="250" stroke="#000000" stroke-width="2"/>
  <polygon points="100,250 130,180 160,250" fill="none" stroke="#000000" stroke-width="1.5"/>
  <line x1="40" y1="250" x2="40" y2="215" stroke="#000000" stroke-width="2"/>
  <circle cx="40" cy="210" r="4" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="30" y="205" font-family="sans-serif" font-size="9" fill="#000000">Tx</text>
  <path d="M44,210 Q120,150 195,235" fill="none" stroke="#000000" stroke-width="1.5"/>
  <polygon points="195,235 188,224 198,227" fill="#000000"/>
  <line x1="195" y1="250" x2="195" y2="232" stroke="#000000" stroke-width="2"/>
  <circle cx="195" cy="227" r="4" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="188" y="222" font-family="sans-serif" font-size="9" fill="#000000">Rx</text>
  <text x="34" y="278" font-family="sans-serif" font-size="10" fill="#000000">bends around / gets through</text>

  <!-- RIGHT: high frequency blocked by a building -->
  <text x="260" y="56" font-family="sans-serif" font-size="12" fill="#000000">HIGH frequency</text>
  <line x1="250" y1="250" x2="430" y2="250" stroke="#000000" stroke-width="2"/>
  <rect x="320" y="170" width="34" height="80" fill="none" stroke="#000000" stroke-width="1.5"/>
  <line x1="262" y1="250" x2="262" y2="215" stroke="#000000" stroke-width="2"/>
  <circle cx="262" cy="210" r="4" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="255" y="205" font-family="sans-serif" font-size="9" fill="#000000">Tx</text>
  <line x1="266" y1="212" x2="318" y2="200" stroke="#000000" stroke-width="1.5"/>
  <line x1="296" y1="216" x2="306" y2="206" stroke="#000000" stroke-width="2"/>
  <line x1="296" y1="206" x2="306" y2="216" stroke="#000000" stroke-width="2"/>
  <text x="300" y="240" font-family="sans-serif" font-size="9" fill="#000000">blocked</text>
  <line x1="415" y1="250" x2="415" y2="215" stroke="#000000" stroke-width="2"/>
  <circle cx="415" cy="210" r="4" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="408" y="205" font-family="sans-serif" font-size="9" fill="#000000">Rx</text>
  <text x="262" y="278" font-family="sans-serif" font-size="10" fill="#000000">needs clear line of sight</text>
</svg>
