<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 250" width="420" height="250">
  <rect x="0" y="0" width="420" height="250" fill="white"/>
  <text x="210" y="22" font-family="sans-serif" font-size="15" text-anchor="middle" fill="black">Electric field lines around charges</text>

  <!-- POSITIVE charge: arrows pointing OUT -->
  <text x="115" y="48" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Out of a + charge</text>
  <circle cx="115" cy="140" r="18" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="115" y="146" font-family="sans-serif" font-size="18" text-anchor="middle" fill="black">+</text>
  <g stroke="black" stroke-width="1.3" fill="none">
    <line x1="115" y1="122" x2="115" y2="78"/>
    <line x1="115" y1="158" x2="115" y2="202"/>
    <line x1="97" y1="140" x2="53" y2="140"/>
    <line x1="133" y1="140" x2="177" y2="140"/>
    <line x1="102" y1="127" x2="71" y2="96"/>
    <line x1="128" y1="127" x2="159" y2="96"/>
    <line x1="102" y1="153" x2="71" y2="184"/>
    <line x1="128" y1="153" x2="159" y2="184"/>
  </g>
  <g fill="black">
    <polygon points="115,74 111,84 119,84"/>
    <polygon points="115,206 111,196 119,196"/>
    <polygon points="49,140 59,136 59,144"/>
    <polygon points="181,140 171,136 171,144"/>
    <polygon points="68,93 78,95 73,102"/>
    <polygon points="162,93 152,95 157,102"/>
    <polygon points="68,187 73,178 78,185"/>
    <polygon points="162,187 152,185 157,178"/>
  </g>

  <!-- NEGATIVE charge: arrows pointing IN -->
  <text x="305" y="48" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Into a &#8211; charge</text>
  <circle cx="305" cy="140" r="18" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="305" y="147" font-family="sans-serif" font-size="20" text-anchor="middle" fill="black">&#8211;</text>
  <g stroke="black" stroke-width="1.3" fill="none">
    <line x1="305" y1="78" x2="305" y2="122"/>
    <line x1="305" y1="202" x2="305" y2="158"/>
    <line x1="243" y1="140" x2="287" y2="140"/>
    <line x1="367" y1="140" x2="323" y2="140"/>
    <line x1="261" y1="96" x2="292" y2="127"/>
    <line x1="349" y1="96" x2="318" y2="127"/>
    <line x1="261" y1="184" x2="292" y2="153"/>
    <line x1="349" y1="184" x2="318" y2="153"/>
  </g>
  <g fill="black">
    <polygon points="305,124 301,114 309,114"/>
    <polygon points="305,156 301,166 309,166"/>
    <polygon points="289,140 279,136 279,144"/>
    <polygon points="321,140 331,136 331,144"/>
    <polygon points="290,125 280,123 285,116"/>
    <polygon points="320,125 330,123 325,116"/>
    <polygon points="290,155 285,164 280,157"/>
    <polygon points="320,155 325,164 330,157"/>
  </g>

  <text x="210" y="235" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">Lines crowd together (strong) near the charge, spread out (weak) far away.</text>
</svg>
