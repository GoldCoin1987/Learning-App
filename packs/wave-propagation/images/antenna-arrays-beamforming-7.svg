<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300">
  <rect width="460" height="300" fill="white"/>
  <text x="60" y="24" font-family="sans-serif" font-size="14" fill="black">More antennas = a narrower, sharper beam</text>
  <!-- LEFT: few elements -> wide beam -->
  <text x="50" y="60" font-family="sans-serif" font-size="12" fill="black">Few antennas</text>
  <circle cx="70" cy="250" r="4" fill="black"/>
  <circle cx="95" cy="250" r="4" fill="black"/>
  <circle cx="120" cy="250" r="4" fill="black"/>
  <!-- wide beam wedge -->
  <line x1="95" y1="250" x2="35" y2="90" stroke="black" stroke-width="1"/>
  <line x1="95" y1="250" x2="170" y2="90" stroke="black" stroke-width="1"/>
  <path d="M55,150 A110,110 0 0 1 140,150" fill="none" stroke="black" stroke-width="0.6" stroke-dasharray="3 2"/>
  <text x="70" y="110" font-family="sans-serif" font-size="11" fill="black">wide beam</text>
  <!-- divider -->
  <line x1="230" y1="40" x2="230" y2="275" stroke="black" stroke-width="0.5" stroke-dasharray="4 3"/>
  <!-- RIGHT: many elements -> narrow beam -->
  <text x="300" y="60" font-family="sans-serif" font-size="12" fill="black">Many antennas</text>
  <circle cx="300" cy="250" r="3" fill="black"/>
  <circle cx="315" cy="250" r="3" fill="black"/>
  <circle cx="330" cy="250" r="3" fill="black"/>
  <circle cx="345" cy="250" r="3" fill="black"/>
  <circle cx="360" cy="250" r="3" fill="black"/>
  <circle cx="375" cy="250" r="3" fill="black"/>
  <circle cx="390" cy="250" r="3" fill="black"/>
  <!-- narrow beam wedge -->
  <line x1="345" y1="250" x2="330" y2="85" stroke="black" stroke-width="1"/>
  <line x1="345" y1="250" x2="362" y2="85" stroke="black" stroke-width="1"/>
  <text x="355" y="120" font-family="sans-serif" font-size="11" fill="black">narrow beam</text>
  <text x="300" y="288" font-family="sans-serif" font-size="10" fill="black">sharper aim, more reach</text>
</svg>
