<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <rect x="0" y="0" width="480" height="300" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">Attenuation: the wave fades as it goes</text>

  <!-- the absorbing material block -->
  <rect x="60" y="60" width="380" height="150" fill="none" stroke="#000000" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="250" y="78" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">inside an absorbing material (wall, water, fog)</text>

  <!-- center line -->
  <line x1="60" y1="140" x2="440" y2="140" stroke="#000000" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- decaying wave: amplitude shrinks left-to-right, same wavelength -->
  <!-- starts tall on left, each cycle smaller; period ~63px -->
  <path d="M60,140
           C68,90 76,90 91,140
           C99,98 107,98 123,140
           C131,105 139,105 154,140
           C162,112 170,112 186,140
           C194,118 202,118 217,140
           C225,123 233,123 249,140
           C257,127 265,127 280,140
           C288,130 296,130 312,140
           C320,132 328,132 343,140
           C351,134 359,134 375,140
           C383,135 391,135 406,140
           C414,136 422,136 438,140"
        fill="none" stroke="#000000" stroke-width="2"/>

  <!-- envelope hint (top decaying curve) -->
  <path d="M76,90 C160,108 300,130 430,138" fill="none" stroke="#000000" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- direction arrow under the block -->
  <line x1="80" y1="230" x2="420" y2="230" stroke="#000000" stroke-width="1.4"/>
  <polygon points="420,230 408,224 408,236" fill="#000000"/>
  <text x="250" y="250" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">distance traveled into the material</text>

  <text x="240" y="278" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">The wave loses a fixed fraction of its strength every meter,</text>
  <text x="240" y="294" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">so it shrinks fast at first, then keeps fading. Frequency stays the same.</text>
</svg>
