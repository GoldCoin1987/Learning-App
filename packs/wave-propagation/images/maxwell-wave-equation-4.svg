<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" width="620" height="220">
  <rect x="0" y="0" width="620" height="220" fill="white"/>
  <text x="310" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">It is all ONE wave -- just different frequencies</text>

  <!-- the spectrum line -->
  <line x1="40" y1="110" x2="580" y2="110" stroke="black" stroke-width="2"/>
  <polygon points="586,110 572,103 572,117" fill="black"/>
  <polygon points="34,110 48,103 48,117" fill="black"/>

  <!-- tick marks -->
  <line x1="90" y1="103" x2="90" y2="117" stroke="black" stroke-width="1.3"/>
  <line x1="190" y1="103" x2="190" y2="117" stroke="black" stroke-width="1.3"/>
  <line x1="290" y1="103" x2="290" y2="117" stroke="black" stroke-width="1.3"/>
  <line x1="370" y1="103" x2="370" y2="117" stroke="black" stroke-width="1.3"/>
  <line x1="450" y1="103" x2="450" y2="117" stroke="black" stroke-width="1.3"/>
  <line x1="530" y1="103" x2="530" y2="117" stroke="black" stroke-width="1.3"/>

  <!-- labels above -->
  <text x="90" y="92" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">radio</text>
  <text x="190" y="92" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">microwave</text>
  <text x="290" y="92" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">infrared</text>
  <text x="370" y="92" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">visible</text>
  <text x="450" y="92" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">ultraviolet</text>
  <text x="530" y="92" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">X-ray / gamma</text>

  <!-- ends labels below -->
  <text x="70" y="140" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">low frequency</text>
  <text x="70" y="154" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">long waves</text>
  <text x="555" y="140" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">high frequency</text>
  <text x="555" y="154" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">short waves</text>

  <text x="310" y="190" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Wi-Fi, light, and X-rays are the same electromagnetic wave.</text>
  <text x="310" y="208" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">In empty space they all travel at the speed of light, c.</text>
</svg>
