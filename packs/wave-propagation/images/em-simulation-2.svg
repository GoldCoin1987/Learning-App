<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="520" height="360" font-family="sans-serif">
  <rect x="0" y="0" width="520" height="360" fill="#ffffff"/>
  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#000000">Discretization: chop the object into tiny cells</text>

  <!-- LEFT: smooth antenna shape -->
  <text x="135" y="56" text-anchor="middle" font-size="12" fill="#000000">Real object (smooth)</text>
  <!-- a simple antenna: vertical rod on a ground plane -->
  <line x1="135" y1="90" x2="135" y2="250" stroke="#000000" stroke-width="3"/>
  <line x1="70" y1="250" x2="200" y2="250" stroke="#000000" stroke-width="3"/>
  <text x="135" y="276" text-anchor="middle" font-size="11" fill="#000000">an antenna + the</text>
  <text x="135" y="292" text-anchor="middle" font-size="11" fill="#000000">space around it</text>

  <!-- arrow -->
  <line x1="225" y1="170" x2="285" y2="170" stroke="#000000" stroke-width="2"/>
  <polygon points="285,170 272,163 272,177" fill="#000000"/>
  <text x="255" y="158" text-anchor="middle" font-size="11" fill="#000000">mesh it</text>

  <!-- RIGHT: same shape over a grid of cells -->
  <text x="395" y="56" text-anchor="middle" font-size="12" fill="#000000">Mesh (many small cells)</text>
  <!-- grid -->
  <g stroke="#000000" stroke-width="0.6">
    <line x1="310" y1="70" x2="310" y2="250"/>
    <line x1="327" y1="70" x2="327" y2="250"/>
    <line x1="344" y1="70" x2="344" y2="250"/>
    <line x1="361" y1="70" x2="361" y2="250"/>
    <line x1="378" y1="70" x2="378" y2="250"/>
    <line x1="395" y1="70" x2="395" y2="250"/>
    <line x1="412" y1="70" x2="412" y2="250"/>
    <line x1="429" y1="70" x2="429" y2="250"/>
    <line x1="446" y1="70" x2="446" y2="250"/>
    <line x1="463" y1="70" x2="463" y2="250"/>
    <line x1="480" y1="70" x2="480" y2="250"/>
    <line x1="310" y1="70" x2="480" y2="70"/>
    <line x1="310" y1="87" x2="480" y2="87"/>
    <line x1="310" y1="104" x2="480" y2="104"/>
    <line x1="310" y1="121" x2="480" y2="121"/>
    <line x1="310" y1="138" x2="480" y2="138"/>
    <line x1="310" y1="155" x2="480" y2="155"/>
    <line x1="310" y1="172" x2="480" y2="172"/>
    <line x1="310" y1="189" x2="480" y2="189"/>
    <line x1="310" y1="206" x2="480" y2="206"/>
    <line x1="310" y1="223" x2="480" y2="223"/>
    <line x1="310" y1="240" x2="480" y2="240"/>
    <line x1="310" y1="250" x2="480" y2="250"/>
  </g>
  <!-- antenna traced over the grid -->
  <line x1="395" y1="87" x2="395" y2="240" stroke="#000000" stroke-width="3"/>
  <line x1="344" y1="240" x2="446" y2="240" stroke="#000000" stroke-width="3"/>
  <!-- one cell highlighted -->
  <rect x="412" y="138" width="17" height="17" fill="none" stroke="#000000" stroke-width="2"/>
  <line x1="429" y1="146" x2="492" y2="146" stroke="#000000" stroke-width="1"/>
  <text x="395" y="276" text-anchor="middle" font-size="11" fill="#000000">solve the fields</text>
  <text x="395" y="292" text-anchor="middle" font-size="11" fill="#000000">cell by cell</text>

  <text x="497" y="150" font-size="10" fill="#000000">one cell</text>
  <text x="260" y="330" text-anchor="middle" font-size="11" fill="#000000">The computer trades one hard smooth problem for many tiny easy ones.</text>
</svg>
