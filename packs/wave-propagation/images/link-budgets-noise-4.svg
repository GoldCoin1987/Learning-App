<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" width="440" height="300" font-family="sans-serif">
  <rect x="0" y="0" width="440" height="300" fill="#ffffff"/>
  <text x="220" y="26" text-anchor="middle" font-size="15" fill="#000000">Decibel (dB) anchors: add instead of multiply</text>
  <text x="220" y="46" text-anchor="middle" font-size="11" fill="#000000">in dB you ADD; the real signal MULTIPLIES</text>

  <!-- table outline -->
  <rect x="60" y="65" width="320" height="180" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- header row line -->
  <line x1="60" y1="95" x2="380" y2="95" stroke="#000000" stroke-width="1.5"/>
  <!-- vertical divider -->
  <line x1="220" y1="65" x2="220" y2="245" stroke="#000000" stroke-width="1.5"/>

  <text x="140" y="86" text-anchor="middle" font-size="13" fill="#000000">change in dB</text>
  <text x="300" y="86" text-anchor="middle" font-size="13" fill="#000000">means the signal...</text>

  <!-- rows -->
  <line x1="60" y1="125" x2="380" y2="125" stroke="#000000" stroke-width="0.75"/>
  <line x1="60" y1="155" x2="380" y2="155" stroke="#000000" stroke-width="0.75"/>
  <line x1="60" y1="185" x2="380" y2="185" stroke="#000000" stroke-width="0.75"/>
  <line x1="60" y1="215" x2="380" y2="215" stroke="#000000" stroke-width="0.75"/>

  <text x="140" y="116" text-anchor="middle" font-size="13" fill="#000000">+3 dB</text>
  <text x="300" y="116" text-anchor="middle" font-size="13" fill="#000000">doubles (x2)</text>

  <text x="140" y="146" text-anchor="middle" font-size="13" fill="#000000">-3 dB</text>
  <text x="300" y="146" text-anchor="middle" font-size="13" fill="#000000">halves (1/2)</text>

  <text x="140" y="176" text-anchor="middle" font-size="13" fill="#000000">+10 dB</text>
  <text x="300" y="176" text-anchor="middle" font-size="13" fill="#000000">ten times (x10)</text>

  <text x="140" y="206" text-anchor="middle" font-size="13" fill="#000000">-10 dB</text>
  <text x="300" y="206" text-anchor="middle" font-size="13" fill="#000000">one tenth (1/10)</text>

  <text x="140" y="236" text-anchor="middle" font-size="13" fill="#000000">0 dB</text>
  <text x="300" y="236" text-anchor="middle" font-size="13" fill="#000000">no change (x1)</text>

  <text x="220" y="272" text-anchor="middle" font-size="11" fill="#000000">+3 and +3 = +6 dB, so x2 then x2 = x4</text>
  <text x="220" y="290" text-anchor="middle" font-size="11" fill="#000000">a small number of dB stands for a big multiply</text>
</svg>
