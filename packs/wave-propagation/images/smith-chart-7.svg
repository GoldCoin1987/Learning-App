<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 360" width="380" height="360">
  <rect x="0" y="0" width="380" height="360" fill="white"/>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="40" y="28">Moving along the cable = rotating on the chart</text>
  </g>
  <!-- chart -->
  <g fill="none" stroke="black" stroke-width="1.5">
    <circle cx="190" cy="195" r="135"/>
    <circle cx="190" cy="195" r="3.5" fill="black"/>
    <!-- constant distance circle the point rotates on -->
    <circle cx="190" cy="195" r="90" stroke-dasharray="5 4"/>
  </g>
  <!-- start point and rotated point -->
  <g fill="black">
    <circle cx="280" cy="195" r="5"/>
    <circle cx="225" cy="112" r="5"/>
  </g>
  <!-- curved rotation arrow (clockwise) -->
  <g fill="none" stroke="black" stroke-width="1.5">
    <path d="M280,195 A90,90 0 0 0 225,112"/>
  </g>
  <g fill="black">
    <polygon points="225,112 232,118 235,108"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="285" y="200">start</text>
    <text x="160" y="100">after moving</text>
    <text x="175" y="116">down the line</text>
    <text x="40" y="338">The point stays the same distance out (same mismatch),</text>
    <text x="40" y="354">it just swings around the center.</text>
  </g>
</svg>
