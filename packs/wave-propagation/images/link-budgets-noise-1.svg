<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" font-family="sans-serif" font-size="11">
  <rect x="0" y="0" width="460" height="320" fill="white"/>
  <text x="230" y="20" text-anchor="middle" font-size="14" fill="black">Link-Budget Waterfall (dBm)</text>

  <!-- y axis -->
  <line x1="60" y1="40" x2="60" y2="280" stroke="black"/>
  <line x1="60" y1="280" x2="430" y2="280" stroke="black"/>
  <text x="20" y="50" fill="black">+30</text>
  <text x="20" y="135" fill="black">0</text>
  <text x="14" y="220" fill="black">-90</text>
  <text x="10" y="278" fill="black">-150</text>

  <!-- EIRP bar (top) -->
  <rect x="80" y="55" width="50" height="20" fill="white" stroke="black"/>
  <text x="105" y="50" text-anchor="middle" fill="black">EIRP</text>
  <text x="105" y="69" text-anchor="middle" fill="black">+50</text>

  <!-- drop arrow: FSPL -->
  <line x1="130" y1="65" x2="170" y2="65" stroke="black" stroke-dasharray="3 2"/>
  <line x1="170" y1="65" x2="170" y2="190" stroke="black"/>
  <polygon points="170,190 166,182 174,182" fill="black"/>
  <text x="200" y="125" fill="black">- FSPL (162 dB)</text>

  <!-- + Gr arrow -->
  <line x1="170" y1="190" x2="210" y2="190" stroke="black" stroke-dasharray="3 2"/>
  <line x1="210" y1="190" x2="210" y2="170" stroke="black"/>
  <polygon points="210,170 206,178 214,178" fill="black"/>
  <text x="220" y="186" fill="black">+ Gr</text>

  <!-- Received power bar -->
  <rect x="230" y="160" width="50" height="20" fill="white" stroke="black"/>
  <text x="255" y="155" text-anchor="middle" fill="black">Pr</text>
  <text x="255" y="174" text-anchor="middle" fill="black">-92</text>

  <!-- noise floor / sensitivity line -->
  <line x1="60" y1="235" x2="430" y2="235" stroke="black" stroke-dasharray="6 3"/>
  <text x="300" y="231" fill="black">Sensitivity = N + req. SNR</text>

  <!-- margin -->
  <line x1="350" y1="170" x2="350" y2="235" stroke="black"/>
  <polygon points="350,170 346,178 354,178" fill="black"/>
  <polygon points="350,235 346,227 354,227" fill="black"/>
  <text x="358" y="205" fill="black">Link margin</text>

  <text x="80" y="305" fill="black">Pr(dBm) = EIRP + Gr - FSPL - Lmisc ;  Margin = Pr - Sensitivity</text>
</svg>
