<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect x="0" y="0" width="480" height="320" fill="#ffffff"/>
  <text x="240" y="26" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">Why a straw looks bent in water</text>
  <text x="240" y="46" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">light from the straw bends as it leaves the water, so your eye is fooled</text>

  <!-- glass cup outline -->
  <line x1="150" y1="80" x2="150" y2="290" stroke="#000000" stroke-width="2"/>
  <line x1="330" y1="80" x2="330" y2="290" stroke="#000000" stroke-width="2"/>
  <line x1="150" y1="290" x2="330" y2="290" stroke="#000000" stroke-width="2"/>
  <text x="358" y="86" font-family="sans-serif" font-size="12" fill="#000000">glass of water</text>

  <!-- water surface -->
  <line x1="150" y1="150" x2="330" y2="150" stroke="#000000" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="240" y="143" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">water surface</text>
  <text x="160" y="170" font-family="sans-serif" font-size="11" fill="#000000">water (slower)</text>
  <text x="160" y="115" font-family="sans-serif" font-size="11" fill="#000000">air (faster)</text>

  <!-- real straw: straight, going into the water at an angle -->
  <line x1="200" y1="95" x2="290" y2="270" stroke="#000000" stroke-width="2.5"/>
  <text x="195" y="92" font-family="sans-serif" font-size="11" fill="#000000">real straw (straight)</text>

  <!-- apparent straw underwater: shifted, dashed (where it looks like it is) -->
  <line x1="256" y1="150" x2="245" y2="270" stroke="#000000" stroke-width="1.6" stroke-dasharray="5,4"/>
  <text x="120" y="245" font-family="sans-serif" font-size="11" fill="#000000">straw looks</text>
  <text x="120" y="260" font-family="sans-serif" font-size="11" fill="#000000">bent / shifted</text>
  <line x1="180" y1="252" x2="240" y2="240" stroke="#000000" stroke-width="0.8"/>
  <polygon points="240,240 229,240 233,247" fill="#000000"/>

  <text x="240" y="312" font-family="sans-serif" font-size="11" fill="#000000" text-anchor="middle">Light bends at the surface, so the underwater part appears in a different spot.</text>
</svg>
