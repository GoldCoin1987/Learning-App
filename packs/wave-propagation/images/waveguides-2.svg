<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" width="460" height="260">
  <rect x="0" y="0" width="460" height="260" fill="#ffffff"/>
  <text x="230" y="26" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#000000">A wave bounces down a hollow metal pipe</text>

  <!-- Pipe walls (top and bottom) -->
  <line x1="40" y1="70" x2="420" y2="70" stroke="#000000" stroke-width="3"/>
  <line x1="40" y1="190" x2="420" y2="190" stroke="#000000" stroke-width="3"/>

  <!-- Wall labels -->
  <text x="230" y="60" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#000000">metal wall (reflects the wave)</text>
  <text x="230" y="208" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#000000">metal wall (reflects the wave)</text>

  <!-- Hollow interior label -->
  <text x="230" y="134" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#000000">hollow inside (no center wire)</text>

  <!-- Zig-zag bouncing wave path -->
  <polyline points="40,190 90,70 140,190 190,70 240,190 290,70 340,190 390,70 420,118" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Bounce dots -->
  <circle cx="90" cy="70" r="3" fill="#000000"/>
  <circle cx="140" cy="190" r="3" fill="#000000"/>
  <circle cx="190" cy="70" r="3" fill="#000000"/>
  <circle cx="240" cy="190" r="3" fill="#000000"/>
  <circle cx="290" cy="70" r="3" fill="#000000"/>
  <circle cx="340" cy="190" r="3" fill="#000000"/>

  <!-- Direction arrow -->
  <line x1="60" y1="232" x2="400" y2="232" stroke="#000000" stroke-width="1.5"/>
  <polygon points="400,227 410,232 400,237" fill="#000000"/>
  <text x="230" y="252" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#000000">wave travels this way, zig-zagging off the walls</text>
</svg>
