<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <rect x="0" y="0" width="480" height="300" fill="#ffffff"/>
  <!-- propagation axis (z) -->
  <line x1="40" y1="180" x2="450" y2="180" stroke="#000000" stroke-width="1.5"/>
  <polygon points="450,180 440,175 440,185" fill="#000000"/>
  <text x="455" y="184" font-family="sans-serif" font-size="14" fill="#000000">z (k)</text>
  <!-- vertical E axis -->
  <line x1="40" y1="180" x2="40" y2="60" stroke="#000000" stroke-width="1.5"/>
  <polygon points="40,60 35,70 45,70" fill="#000000"/>
  <text x="20" y="56" font-family="sans-serif" font-size="14" fill="#000000">E</text>
  <!-- E-field sine wave (in plane of page, vertical oscillation) -->
  <path d="M40,180 C 80,80 120,80 160,180 C 200,280 240,280 280,180 C 320,80 360,80 400,180"
        fill="none" stroke="#000000" stroke-width="2"/>
  <!-- H-field axis label (into page direction shown skewed) -->
  <line x1="40" y1="180" x2="120" y2="240" stroke="#000000" stroke-width="1.5"/>
  <polygon points="120,240 112,232 108,242" fill="#000000"/>
  <text x="124" y="248" font-family="sans-serif" font-size="14" fill="#000000">H</text>
  <!-- H-field sine wave, skewed to suggest orthogonal plane -->
  <path d="M40,180 C 76,210 112,210 148,180 C 184,150 220,150 256,180 C 292,210 328,210 364,180"
        fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- legend -->
  <line x1="300" y1="60" x2="330" y2="60" stroke="#000000" stroke-width="2"/>
  <text x="336" y="64" font-family="sans-serif" font-size="12" fill="#000000">E field</text>
  <line x1="300" y1="80" x2="330" y2="80" stroke="#000000" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="336" y="84" font-family="sans-serif" font-size="12" fill="#000000">H field</text>
  <text x="120" y="290" font-family="sans-serif" font-size="12" fill="#000000">TEM wave: E perp H perp k</text>
</svg>
