<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" width="460" height="300">
  <rect x="0" y="0" width="460" height="300" fill="#ffffff"/>
  <text x="40" y="24" font-family="sans-serif" font-size="14" fill="#000000">Multipath: copies arrive by different paths</text>

  <!-- ground -->
  <line x1="20" y1="250" x2="440" y2="250" stroke="#000000" stroke-width="2"/>

  <!-- transmitter -->
  <line x1="60" y1="250" x2="60" y2="150" stroke="#000000" stroke-width="2"/>
  <circle cx="60" cy="145" r="5" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="34" y="138" font-family="sans-serif" font-size="11" fill="#000000">transmitter</text>

  <!-- receiver -->
  <line x1="380" y1="250" x2="380" y2="150" stroke="#000000" stroke-width="2"/>
  <circle cx="380" cy="145" r="5" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="356" y="138" font-family="sans-serif" font-size="11" fill="#000000">receiver</text>

  <!-- direct path -->
  <line x1="62" y1="148" x2="378" y2="148" stroke="#000000" stroke-width="1.5"/>
  <text x="170" y="140" font-family="sans-serif" font-size="10" fill="#000000">direct path</text>

  <!-- reflected path off the ground -->
  <line x1="62" y1="150" x2="220" y2="248" stroke="#000000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="220" y1="248" x2="378" y2="150" stroke="#000000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <circle cx="220" cy="248" r="3" fill="#000000"/>
  <text x="150" y="230" font-family="sans-serif" font-size="10" fill="#000000">reflected (longer) path</text>

  <!-- reflected path off a building on the right -->
  <rect x="410" y="90" width="20" height="160" fill="none" stroke="#000000" stroke-width="1.5"/>
  <line x1="62" y1="150" x2="420" y2="110" stroke="#000000" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="420" y1="110" x2="378" y2="148" stroke="#000000" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="402" y="84" font-family="sans-serif" font-size="9" fill="#000000">wall</text>

  <!-- add / cancel callout -->
  <text x="120" y="278" font-family="sans-serif" font-size="11" fill="#000000">copies can ADD (louder) or CANCEL (dead spot) = fading</text>
</svg>
