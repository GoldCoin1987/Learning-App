<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" width="520" height="300">
  <rect x="0" y="0" width="520" height="300" fill="#ffffff"/>
  <text x="260" y="24" font-family="sans-serif" font-size="16" fill="#000000" text-anchor="middle">The rope analogy for matching</text>
  <text x="260" y="44" font-family="sans-serif" font-size="12" fill="#000000" text-anchor="middle">a sudden change reflects the wave; a smooth blend lets it pass</text>

  <!-- TOP: rope tied to wall (mismatch, reflects) -->
  <text x="20" y="78" font-family="sans-serif" font-size="13" fill="#000000">MISMATCH: rope tied to a solid wall</text>
  <!-- wall -->
  <rect x="430" y="86" width="20" height="70" fill="none" stroke="#000000" stroke-width="2"/>
  <line x1="432" y1="90" x2="448" y2="106" stroke="#000000" stroke-width="1"/>
  <line x1="432" y1="106" x2="448" y2="122" stroke="#000000" stroke-width="1"/>
  <line x1="432" y1="122" x2="448" y2="138" stroke="#000000" stroke-width="1"/>
  <line x1="432" y1="138" x2="448" y2="154" stroke="#000000" stroke-width="1"/>
  <!-- rope with a pulse -->
  <path d="M30,130 L120,130 Q150,90 180,130 L430,130" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- incoming arrow -->
  <line x1="60" y1="110" x2="120" y2="110" stroke="#000000" stroke-width="2"/>
  <polygon points="120,110 108,104 108,116" fill="#000000"/>
  <text x="62" y="102" font-family="sans-serif" font-size="11" fill="#000000">wave in</text>
  <!-- reflected arrow -->
  <line x1="400" y1="150" x2="320" y2="150" stroke="#000000" stroke-width="2"/>
  <polygon points="320,150 332,144 332,156" fill="#000000"/>
  <text x="330" y="170" font-family="sans-serif" font-size="11" fill="#000000">bounces back (reflected)</text>

  <!-- divider -->
  <line x1="20" y1="190" x2="500" y2="190" stroke="#000000" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- BOTTOM: light rope blended into heavy rope (match, passes) -->
  <text x="20" y="218" font-family="sans-serif" font-size="13" fill="#000000">MATCH: rope blended smoothly into a matching rope</text>
  <!-- thin rope left half -->
  <path d="M30,260 L120,260 Q150,228 180,260 L260,260" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- thick rope right half (smooth join, same impedance feel) -->
  <line x1="260" y1="260" x2="490" y2="260" stroke="#000000" stroke-width="2"/>
  <circle cx="260" cy="260" r="3" fill="#000000"/>
  <!-- incoming arrow -->
  <line x1="60" y1="240" x2="120" y2="240" stroke="#000000" stroke-width="2"/>
  <polygon points="120,240 108,234 108,246" fill="#000000"/>
  <text x="62" y="232" font-family="sans-serif" font-size="11" fill="#000000">wave in</text>
  <!-- pass-through arrow -->
  <line x1="320" y1="240" x2="430" y2="240" stroke="#000000" stroke-width="2"/>
  <polygon points="430,240 418,234 418,246" fill="#000000"/>
  <text x="330" y="232" font-family="sans-serif" font-size="11" fill="#000000">passes through (no reflection)</text>
  <text x="195" y="285" font-family="sans-serif" font-size="11" fill="#000000">smooth join</text>
</svg>
