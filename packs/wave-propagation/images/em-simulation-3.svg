<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" width="520" height="340" font-family="sans-serif">
  <rect x="0" y="0" width="520" height="340" fill="#ffffff"/>
  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#000000">Coarse mesh vs fine mesh: the trade-off</text>

  <!-- LEFT: coarse -->
  <text x="140" y="58" text-anchor="middle" font-size="13" fill="#000000">Coarse mesh</text>
  <text x="140" y="76" text-anchor="middle" font-size="11" fill="#000000">(few big cells)</text>
  <!-- quarter circle shape approximated coarsely -->
  <g stroke="#000000" stroke-width="0.8" fill="none">
    <rect x="60" y="90" width="40" height="40"/>
    <rect x="100" y="90" width="40" height="40"/>
    <rect x="140" y="90" width="40" height="40"/>
    <rect x="60" y="130" width="40" height="40"/>
    <rect x="100" y="130" width="40" height="40"/>
    <rect x="140" y="130" width="40" height="40"/>
    <rect x="60" y="170" width="40" height="40"/>
    <rect x="100" y="170" width="40" height="40"/>
    <rect x="140" y="170" width="40" height="40"/>
  </g>
  <!-- rough stair-step curve -->
  <polyline points="60,90 100,90 100,130 140,130 140,170 180,170 180,210" fill="none" stroke="#000000" stroke-width="2.5"/>
  <text x="140" y="236" text-anchor="middle" font-size="12" fill="#000000">faster, less memory</text>
  <text x="140" y="254" text-anchor="middle" font-size="12" fill="#000000">but rougher answer</text>

  <!-- arrow -->
  <line x1="235" y1="150" x2="285" y2="150" stroke="#000000" stroke-width="2"/>
  <polygon points="285,150 272,143 272,157" fill="#000000"/>
  <text x="260" y="138" text-anchor="middle" font-size="10" fill="#000000">refine</text>

  <!-- RIGHT: fine -->
  <text x="395" y="58" text-anchor="middle" font-size="13" fill="#000000">Fine mesh</text>
  <text x="395" y="76" text-anchor="middle" font-size="11" fill="#000000">(many small cells)</text>
  <g stroke="#000000" stroke-width="0.5" fill="none">
    <rect x="315" y="90" width="20" height="20"/><rect x="335" y="90" width="20" height="20"/><rect x="355" y="90" width="20" height="20"/><rect x="375" y="90" width="20" height="20"/><rect x="395" y="90" width="20" height="20"/><rect x="415" y="90" width="20" height="20"/>
    <rect x="315" y="110" width="20" height="20"/><rect x="335" y="110" width="20" height="20"/><rect x="355" y="110" width="20" height="20"/><rect x="375" y="110" width="20" height="20"/><rect x="395" y="110" width="20" height="20"/><rect x="415" y="110" width="20" height="20"/>
    <rect x="315" y="130" width="20" height="20"/><rect x="335" y="130" width="20" height="20"/><rect x="355" y="130" width="20" height="20"/><rect x="375" y="130" width="20" height="20"/><rect x="395" y="130" width="20" height="20"/><rect x="415" y="130" width="20" height="20"/>
    <rect x="315" y="150" width="20" height="20"/><rect x="335" y="150" width="20" height="20"/><rect x="355" y="150" width="20" height="20"/><rect x="375" y="150" width="20" height="20"/><rect x="395" y="150" width="20" height="20"/><rect x="415" y="150" width="20" height="20"/>
    <rect x="315" y="170" width="20" height="20"/><rect x="335" y="170" width="20" height="20"/><rect x="355" y="170" width="20" height="20"/><rect x="375" y="170" width="20" height="20"/><rect x="395" y="170" width="20" height="20"/><rect x="415" y="170" width="20" height="20"/>
    <rect x="315" y="190" width="20" height="20"/><rect x="335" y="190" width="20" height="20"/><rect x="355" y="190" width="20" height="20"/><rect x="375" y="190" width="20" height="20"/><rect x="395" y="190" width="20" height="20"/><rect x="415" y="190" width="20" height="20"/>
  </g>
  <!-- smoother curve -->
  <path d="M 315 90 Q 435 90 435 210" fill="none" stroke="#000000" stroke-width="2.5"/>
  <text x="395" y="236" text-anchor="middle" font-size="12" fill="#000000">slower, more memory</text>
  <text x="395" y="254" text-anchor="middle" font-size="12" fill="#000000">but truer answer</text>

  <text x="260" y="300" text-anchor="middle" font-size="11" fill="#000000">Like pixels in a photo: smaller pixels look sharper but cost more.</text>
  <text x="260" y="322" text-anchor="middle" font-size="11" fill="#000000">Finer mesh = more accurate, but takes longer to compute.</text>
</svg>
