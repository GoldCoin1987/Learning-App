<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" viewBox="0 0 680 360" font-family="sans-serif" font-size="13">
  <rect width="680" height="360" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="bold">Longest-prefix match: the most specific rule wins</text>

  <text x="340" y="52" text-anchor="middle" font-size="12">A packet is going to 10.1.2.130. Two rules below both match it.</text>

  <!-- Candidate route 1 (more general) -->
  <rect x="40" y="74" width="600" height="62" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="60" y="98" font-size="12" font-weight="bold">Rule 1:  10.0.0.0/8</text>
  <text x="60" y="118" font-size="11">Covers 10.0.0.0 - 10.255.255.255  (a HUGE range, very general)</text>
  <text x="600" y="110" text-anchor="end" font-size="11">matches? yes</text>

  <!-- Candidate route 2 (more specific) WINNER -->
  <rect x="40" y="146" width="600" height="62" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  <text x="60" y="170" font-size="12" font-weight="bold">Rule 2:  10.1.2.0/24   &#9664; WINNER</text>
  <text x="60" y="190" font-size="11">Covers 10.1.2.0 - 10.1.2.255  (a SMALL range, very specific)</text>
  <text x="600" y="182" text-anchor="end" font-size="11">matches? yes</text>

  <!-- Explanation -->
  <text x="340" y="240" text-anchor="middle" font-size="12" font-weight="bold">Both rules match, so the router picks the one with the longer prefix (the bigger /number).</text>
  <text x="340" y="262" text-anchor="middle" font-size="11">/24 is more specific than /8, so Rule 2 wins. More specific beats more general.</text>

  <!-- Everyday analogy -->
  <rect x="80" y="284" width="520" height="62" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="340" y="306" text-anchor="middle" font-size="12" font-weight="bold">Like an address vs a country</text>
  <text x="340" y="328" text-anchor="middle" font-size="11">"123 Main St" is more specific than "USA," so mail follows the street address.</text>
</svg>
