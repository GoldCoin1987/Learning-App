<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="760" height="300" fill="#0f172a"/>
  <text x="380" y="28" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">End-to-End Path: Sensor Reading to MQTT Subscriber</text>

  <!-- nodes -->
  <g font-size="11" text-anchor="middle">
    <rect x="20"  y="120" width="96" height="56" rx="6" fill="#1e293b" stroke="#38bdf8"/>
    <text x="68" y="143" fill="#e2e8f0" font-weight="bold">Sensor</text>
    <text x="68" y="160" fill="#94a3b8">I2C/SPI/ADC</text>

    <rect x="150" y="110" width="120" height="76" rx="6" fill="#1e293b" stroke="#38bdf8"/>
    <text x="210" y="130" fill="#e2e8f0" font-weight="bold">MCU + lwIP</text>
    <text x="210" y="147" fill="#94a3b8">pbuf -&gt; UDP/TCP</text>
    <text x="210" y="162" fill="#94a3b8">DTLS/TLS + MQTT</text>
    <text x="210" y="177" fill="#94a3b8">802.11 MAC/PHY</text>

    <rect x="305" y="120" width="96" height="56" rx="6" fill="#1e293b" stroke="#a78bfa"/>
    <text x="353" y="143" fill="#e2e8f0" font-weight="bold">AP / Router</text>
    <text x="353" y="160" fill="#94a3b8">WiFi -&gt; Eth, NAT</text>

    <rect x="435" y="120" width="110" height="56" rx="6" fill="#1e293b" stroke="#34d399"/>
    <text x="490" y="143" fill="#e2e8f0" font-weight="bold">Broker</text>
    <text x="490" y="160" fill="#94a3b8">Mosquitto</text>

    <rect x="580" y="120" width="120" height="56" rx="6" fill="#1e293b" stroke="#fbbf24"/>
    <text x="640" y="143" fill="#e2e8f0" font-weight="bold">Subscriber</text>
    <text x="640" y="160" fill="#94a3b8">logger app</text>
  </g>

  <!-- arrows -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#cbd5e1"/>
    </marker>
  </defs>
  <g stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#ah)">
    <line x1="116" y1="148" x2="148" y2="148"/>
    <line x1="270" y1="148" x2="303" y2="148"/>
    <line x1="401" y1="148" x2="433" y2="148"/>
    <line x1="545" y1="148" x2="578" y2="148"/>
  </g>

  <!-- link labels -->
  <g font-size="10" fill="#7dd3fc" text-anchor="middle">
    <text x="132" y="140">read</text>
    <text x="287" y="140">radio</text>
    <text x="417" y="140">IP/TCP</text>
    <text x="561" y="140">PUBLISH</text>
  </g>

  <!-- layer note -->
  <text x="380" y="240" fill="#94a3b8" font-size="11" text-anchor="middle">PUBLISH(topic, payload) descends MCU stack, crosses 802.11 + Ethernet, reaches broker;</text>
  <text x="380" y="258" fill="#94a3b8" font-size="11" text-anchor="middle">broker fans out to every matching subscriber. QoS + last-will live in the MQTT layer.</text>
</svg>
