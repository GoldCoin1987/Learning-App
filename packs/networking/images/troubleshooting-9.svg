<svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd { font-size:13px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .t { font-size:12px; fill:#000000; }
    .tc { font-size:12px; fill:#000000; text-anchor:middle; }
    .mono { font-size:12px; fill:#000000; font-family:monospace; }
  </style>
  <rect width="700" height="380" fill="#ffffff"/>
  <text class="ttl" x="350" y="28">Packet capture: seeing the actual messages</text>
  <text class="tc" x="350" y="48">Tools like tcpdump and Wireshark record real packets as they go in and out.</text>

  <!-- wire with packets -->
  <line x1="40" y1="110" x2="660" y2="110" stroke="#000000" stroke-width="2"/>
  <text class="t" x="40" y="100">the wire (or Wi-Fi)</text>
  <rect class="box" x="120" y="92" width="36" height="36"/>
  <rect class="box" x="220" y="92" width="36" height="36"/>
  <rect class="box" x="320" y="92" width="36" height="36"/>
  <rect class="box" x="420" y="92" width="36" height="36"/>
  <rect class="box" x="520" y="92" width="36" height="36"/>
  <text class="tc" x="138" y="115">pkt</text>
  <text class="tc" x="238" y="115">pkt</text>
  <text class="tc" x="338" y="115">pkt</text>
  <text class="tc" x="438" y="115">pkt</text>
  <text class="tc" x="538" y="115">pkt</text>

  <!-- capture funnel -->
  <line x1="338" y1="128" x2="338" y2="160" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="t" x="350" y="150">capture</text>

  <!-- capture readout -->
  <rect class="box" x="60" y="170" width="580" height="120"/>
  <text class="hd" x="350" y="192">What one captured line tells you</text>
  <text class="mono" x="80" y="218">12:00:01  192.168.1.42 -> 93.184.216.34  TCP SYN  (asking to connect)</text>
  <text class="mono" x="80" y="244">12:00:01  93.184.216.34 -> 192.168.1.42  TCP RST  (refused!)</text>
  <text class="tc" x="350" y="272">You can see WHO talked to WHOM and WHAT they said - here the server</text>
  <text class="tc" x="350" y="288">actively refused the connection. This is the tool for the hard cases.</text>

  <text class="tc" x="350" y="324">Use it when the simple checks above are not enough and you need ground truth:</text>
  <text class="tc" x="350" y="344">the packets do not lie about what was actually sent and received.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
