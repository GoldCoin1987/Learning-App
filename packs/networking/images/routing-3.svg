<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" viewBox="0 0 680 360" font-family="sans-serif" font-size="13">
  <rect width="680" height="360" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="bold">A routing table: "for this destination, send to this next hop"</text>

  <!-- Table outline -->
  <rect x="40" y="50" width="600" height="180" fill="#ffffff" stroke="#000000" stroke-width="2"/>

  <!-- Column header row -->
  <line x1="40" y1="80" x2="640" y2="80" stroke="#000000" stroke-width="2"/>
  <text x="150" y="71" text-anchor="middle" font-weight="bold" font-size="12">Destination range</text>
  <text x="400" y="71" text-anchor="middle" font-weight="bold" font-size="12">Send to (next hop)</text>
  <text x="570" y="71" text-anchor="middle" font-weight="bold" font-size="12">Out which door</text>

  <!-- Column separators -->
  <line x1="280" y1="50" x2="280" y2="230" stroke="#000000" stroke-width="1"/>
  <line x1="500" y1="50" x2="500" y2="230" stroke="#000000" stroke-width="1"/>

  <!-- Row 1 -->
  <line x1="40" y1="110" x2="640" y2="110" stroke="#000000" stroke-width="1"/>
  <text x="150" y="100" text-anchor="middle" font-size="12">192.168.1.0/24</text>
  <text x="400" y="100" text-anchor="middle" font-size="12">directly attached</text>
  <text x="570" y="100" text-anchor="middle" font-size="12">port 1</text>

  <!-- Row 2 -->
  <line x1="40" y1="140" x2="640" y2="140" stroke="#000000" stroke-width="1"/>
  <text x="150" y="130" text-anchor="middle" font-size="12">10.0.0.0/8</text>
  <text x="400" y="130" text-anchor="middle" font-size="12">10.9.9.1</text>
  <text x="570" y="130" text-anchor="middle" font-size="12">port 2</text>

  <!-- Row 3 -->
  <line x1="40" y1="170" x2="640" y2="170" stroke="#000000" stroke-width="1"/>
  <text x="150" y="160" text-anchor="middle" font-size="12">172.16.0.0/16</text>
  <text x="400" y="160" text-anchor="middle" font-size="12">10.9.9.1</text>
  <text x="570" y="160" text-anchor="middle" font-size="12">port 2</text>

  <!-- Default route row (highlighted with thick border, no color fill) -->
  <rect x="42" y="170" width="596" height="58" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  <text x="150" y="195" text-anchor="middle" font-size="12" font-weight="bold">0.0.0.0/0</text>
  <text x="150" y="214" text-anchor="middle" font-size="10">(the default route)</text>
  <text x="400" y="195" text-anchor="middle" font-size="12" font-weight="bold">203.0.113.1</text>
  <text x="400" y="214" text-anchor="middle" font-size="10">your gateway</text>
  <text x="570" y="200" text-anchor="middle" font-size="12" font-weight="bold">port 3</text>

  <!-- Callout for default route -->
  <text x="340" y="262" text-anchor="middle" font-size="12" font-weight="bold">The thick row is the DEFAULT ROUTE (0.0.0.0/0).</text>
  <text x="340" y="284" text-anchor="middle" font-size="11">It means "anything I have no specific rule for, send here." That is how your</text>
  <text x="340" y="302" text-anchor="middle" font-size="11">home router reaches the whole internet: through its gateway to the provider.</text>
  <text x="340" y="332" text-anchor="middle" font-size="11">A "next hop" is just the next router to hand the packet to.</text>
</svg>
