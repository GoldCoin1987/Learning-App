<svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd { font-size:13px; fill:#000000; font-weight:bold; }
    .t { font-size:12px; fill:#000000; }
    .tc { font-size:12px; fill:#000000; text-anchor:middle; }
    .mono { font-size:12px; fill:#000000; font-family:monospace; }
  </style>
  <rect width="700" height="380" fill="#ffffff"/>
  <text class="ttl" x="350" y="28">Your own settings: IP address and default gateway</text>
  <text class="tc" x="350" y="48">Before testing the outside world, confirm what YOUR computer thinks it is.</text>

  <!-- terminal box -->
  <rect class="box" x="40" y="70" width="620" height="170"/>
  <text class="mono" x="55" y="96">$ ipconfig            (Windows)        $ ip addr   (Linux/Mac)</text>
  <line x1="40" y1="108" x2="660" y2="108" stroke="#000000" stroke-width="1"/>
  <text class="mono" x="55" y="134">  IPv4 Address . . . : 192.168.1.42</text>
  <text class="t" x="430" y="134">&#8592; your own IP address</text>
  <text class="mono" x="55" y="160">  Subnet Mask . . . : 255.255.255.0</text>
  <text class="t" x="430" y="160">&#8592; which addresses are "local"</text>
  <text class="mono" x="55" y="186">  Default Gateway . : 192.168.1.1</text>
  <text class="t" x="430" y="186">&#8592; your router (door to outside)</text>
  <text class="mono" x="55" y="218">  DNS Server  . . . : 192.168.1.1</text>
  <text class="t" x="430" y="218">&#8592; who turns names into IPs</text>

  <!-- warning panel -->
  <rect class="box" x="40" y="262" width="620" height="90"/>
  <text class="hd" x="55" y="286">Warning sign: an address like 169.254.x.x</text>
  <text class="tc" x="350" y="312">That is a "self-assigned" address. It means your computer asked for</text>
  <text class="tc" x="350" y="330">an IP and got NO answer (a DHCP problem). With no real IP and no</text>
  <text class="tc" x="350" y="346">gateway, nothing beyond your own machine will work.</text>
</svg>
