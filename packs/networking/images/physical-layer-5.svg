<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="640" height="360" fill="white"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="black">Modulation: changing a wave to carry 1s and 0s</text>

  <!-- the bits we want to send -->
  <text x="20" y="60" font-size="12" font-weight="bold" fill="black">Bits to send:</text>
  <text x="160" y="60" font-size="13" font-weight="bold" fill="black">1        0        1        1</text>
  <!-- bit cell dividers -->
  <g stroke="black" stroke-dasharray="3,3">
    <line x1="140" y1="70" x2="140" y2="330"/>
    <line x1="260" y1="70" x2="260" y2="330"/>
    <line x1="380" y1="70" x2="380" y2="330"/>
    <line x1="500" y1="70" x2="500" y2="330"/>
  </g>

  <!-- Plain carrier wave -->
  <text x="20" y="110" font-size="12" font-weight="bold" fill="black">A plain carrier wave (steady, carries nothing yet):</text>
  <polyline fill="none" stroke="black" stroke-width="2"
    points="140,150 155,130 170,170 185,130 200,170 215,130 230,170 245,130
            260,170 275,130 290,170 305,130 320,170 335,130 350,170 365,130
            380,170 395,130 410,170 425,130 440,170 455,130 470,170 485,130
            500,170 515,130 530,170 545,130 560,170 575,130 590,170 605,130"/>

  <!-- Modulated wave: big swing for 1, small swing for 0 (amplitude) -->
  <text x="20" y="222" font-size="12" font-weight="bold" fill="black">Modulated: BIG wave = 1, small wave = 0</text>
  <!-- bit 1: large amplitude (cell 140-260) -->
  <polyline fill="none" stroke="black" stroke-width="2"
    points="140,270 155,240 170,300 185,240 200,300 215,240 230,300 245,240 260,270"/>
  <!-- bit 0: small amplitude (cell 260-380) -->
  <polyline fill="none" stroke="black" stroke-width="2"
    points="260,270 275,260 290,280 305,260 320,280 335,260 350,280 365,260 380,270"/>
  <!-- bit 1: large (cell 380-500) -->
  <polyline fill="none" stroke="black" stroke-width="2"
    points="380,270 395,240 410,300 425,240 440,300 455,240 470,300 485,240 500,270"/>
  <!-- bit 1: large (cell 500-620) -->
  <polyline fill="none" stroke="black" stroke-width="2"
    points="500,270 515,240 530,300 545,240 560,300 575,240 590,300 605,240 620,270"/>

  <text x="320" y="344" text-anchor="middle" font-size="11" fill="black">The receiver reads the wave's size to recover the bits. (Line coding does a similar job with voltage levels.)</text>
</svg>
