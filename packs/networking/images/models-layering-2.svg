<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 430" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="520" height="430" fill="white"/>
  <text x="260" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="black">One big job split into small jobs (layers)</text>

  <!-- Left: one huge job -->
  <text x="130" y="58" text-anchor="middle" font-weight="bold" fill="black">Too big for one box</text>
  <rect x="30" y="70" width="200" height="150" fill="white" stroke="black"/>
  <text x="130" y="100" text-anchor="middle" font-size="12" fill="black">Find the other computer</text>
  <text x="130" y="124" text-anchor="middle" font-size="12" fill="black">Pick a path to it</text>
  <text x="130" y="148" text-anchor="middle" font-size="12" fill="black">Fix errors / lost data</text>
  <text x="130" y="172" text-anchor="middle" font-size="12" fill="black">Make sense of the bytes</text>
  <text x="130" y="200" text-anchor="middle" font-size="12" fill="black">...all at once?</text>

  <!-- arrow -->
  <line x1="240" y1="145" x2="290" y2="145" stroke="black"/>
  <polygon points="290,140 300,145 290,150" fill="black"/>
  <text x="270" y="135" text-anchor="middle" font-size="11" fill="black">split</text>

  <!-- Right: stacked layers, one job each -->
  <text x="400" y="58" text-anchor="middle" font-weight="bold" fill="black">One job per layer</text>
  <rect x="310" y="70" width="180" height="34" fill="white" stroke="black"/><text x="400" y="92" text-anchor="middle" font-size="12" fill="black">Make sense of bytes</text>
  <rect x="310" y="104" width="180" height="34" fill="white" stroke="black"/><text x="400" y="126" text-anchor="middle" font-size="12" fill="black">Fix errors / order</text>
  <rect x="310" y="138" width="180" height="34" fill="white" stroke="black"/><text x="400" y="160" text-anchor="middle" font-size="12" fill="black">Pick a path</text>
  <rect x="310" y="172" width="180" height="34" fill="white" stroke="black"/><text x="400" y="194" text-anchor="middle" font-size="12" fill="black">Send over one wire</text>

  <text x="400" y="226" text-anchor="middle" font-size="11" fill="black">each layer talks only to</text>
  <text x="400" y="240" text-anchor="middle" font-size="11" fill="black">its neighbors (above/below)</text>

  <!-- building / floors analogy -->
  <text x="260" y="280" text-anchor="middle" font-weight="bold" fill="black">Like floors in a building</text>
  <rect x="170" y="292" width="180" height="28" fill="white" stroke="black"/><text x="260" y="311" text-anchor="middle" font-size="11" fill="black">Top floor</text>
  <rect x="170" y="320" width="180" height="28" fill="white" stroke="black"/><text x="260" y="339" text-anchor="middle" font-size="11" fill="black">Middle floor</text>
  <rect x="170" y="348" width="180" height="28" fill="white" stroke="black"/><text x="260" y="367" text-anchor="middle" font-size="11" fill="black">Ground floor</text>
  <text x="260" y="396" text-anchor="middle" font-size="11" fill="black">Rebuild one floor without redesigning the whole building</text>
</svg>
