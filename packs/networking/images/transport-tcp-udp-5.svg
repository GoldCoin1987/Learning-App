<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="sans-serif" font-size="13">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">TCP 3-Way Handshake: agreeing to talk</text>

  <!-- two parties -->
  <text x="120" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Your computer</text>
  <text x="520" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Server</text>
  <line x1="120" y1="66" x2="120" y2="320" stroke="#000000" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="520" y1="66" x2="520" y2="320" stroke="#000000" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- step 1: SYN -->
  <line x1="120" y1="110" x2="520" y2="140" stroke="#000000" stroke-width="2"/>
  <polygon points="520,140 506,134 508,146" fill="#000000"/>
  <text x="320" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">1. SYN</text>
  <text x="320" y="128" text-anchor="middle" font-size="11" fill="#000000">"Can we start? My count begins at x."</text>

  <!-- step 2: SYN-ACK -->
  <line x1="520" y1="180" x2="120" y2="210" stroke="#000000" stroke-width="2"/>
  <polygon points="120,210 134,204 132,216" fill="#000000"/>
  <text x="320" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">2. SYN-ACK</text>
  <text x="320" y="198" text-anchor="middle" font-size="11" fill="#000000">"Yes. Got yours. My count begins at y."</text>

  <!-- step 3: ACK -->
  <line x1="120" y1="250" x2="520" y2="280" stroke="#000000" stroke-width="2"/>
  <polygon points="520,280 506,274 508,286" fill="#000000"/>
  <text x="320" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">3. ACK</text>
  <text x="320" y="268" text-anchor="middle" font-size="11" fill="#000000">"Got yours too. Let's go."</text>

  <text x="320" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">Connection established: both sides are ready to send data reliably.</text>
  <text x="320" y="340" text-anchor="middle" font-size="11" fill="#000000">SYN = synchronize (start)   ACK = acknowledge (got it)</text>
</svg>
