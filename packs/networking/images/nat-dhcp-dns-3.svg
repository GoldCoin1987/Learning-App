<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380" font-family="sans-serif" font-size="13">
  <rect width="680" height="380" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="16" font-weight="bold">DNS: turning a name into an IP address</text>
  <text x="340" y="46" text-anchor="middle" font-size="12">Looking up www.example.com from a cold start</text>

  <!-- your computer -->
  <rect x="30" y="150" width="110" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="85" y="178" text-anchor="middle" font-weight="bold" font-size="11">Your computer</text>
  <text x="85" y="195" text-anchor="middle" font-size="10">"What is the IP?"</text>

  <!-- resolver -->
  <rect x="190" y="150" width="120" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="250" y="174" text-anchor="middle" font-weight="bold" font-size="11">Resolver</text>
  <text x="250" y="190" text-anchor="middle" font-size="10">does the legwork</text>
  <text x="250" y="204" text-anchor="middle" font-size="10">+ remembers (caches)</text>

  <!-- servers on the right -->
  <rect x="500" y="56"  width="150" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="575" y="76" text-anchor="middle" font-size="11" font-weight="bold">Root server (.)</text>
  <text x="575" y="90" text-anchor="middle" font-size="10">"ask .com"</text>

  <rect x="500" y="160" width="150" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="575" y="180" text-anchor="middle" font-size="11" font-weight="bold">.com server (TLD)</text>
  <text x="575" y="194" text-anchor="middle" font-size="10">"ask example.com"</text>

  <rect x="500" y="264" width="150" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="575" y="284" text-anchor="middle" font-size="11" font-weight="bold">example.com server</text>
  <text x="575" y="298" text-anchor="middle" font-size="10">(authoritative)</text>

  <!-- you -> resolver -->
  <line x1="140" y1="180" x2="188" y2="180" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- resolver -> root/tld/auth -->
  <line x1="310" y1="172" x2="498" y2="80"  stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="120" text-anchor="middle" font-size="10">1. ask root</text>
  <line x1="310" y1="180" x2="498" y2="180" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="160" text-anchor="middle" font-size="10">2. ask .com</text>
  <line x1="310" y1="188" x2="498" y2="284" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="246" text-anchor="middle" font-size="10">3. ask example.com</text>

  <!-- answer back -->
  <line x1="498" y1="296" x2="312" y2="200" stroke="#000000" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="408" y="318" text-anchor="middle" font-size="10">4. here is the IP: 93.184.216.34</text>

  <!-- answer to you -->
  <line x1="188" y1="200" x2="142" y2="200" stroke="#000000" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <text x="340" y="356" text-anchor="middle" font-size="11" font-style="italic">Like asking a phone book for a name to get the number. The resolver then remembers it for next time (TTL).</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
