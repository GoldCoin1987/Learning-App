<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="sans-serif" font-size="13">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold">Common DNS record types</text>
  <text x="320" y="46" text-anchor="middle" font-size="12">A record in DNS is one entry that answers a particular kind of question.</text>

  <!-- table -->
  <rect x="60" y="64" width="520" height="264" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <!-- header row -->
  <line x1="60" y1="92" x2="580" y2="92" stroke="#000000" stroke-width="1.5"/>
  <line x1="180" y1="64" x2="180" y2="328" stroke="#000000" stroke-width="1"/>
  <text x="120" y="84" text-anchor="middle" font-size="12" font-weight="bold">Record</text>
  <text x="380" y="84" text-anchor="middle" font-size="12" font-weight="bold">What it gives you</text>

  <!-- rows -->
  <line x1="60" y1="125" x2="580" y2="125" stroke="#000000" stroke-width="1"/>
  <text x="120" y="113" text-anchor="middle" font-size="12" font-weight="bold">A</text>
  <text x="190" y="113" text-anchor="start" font-size="11">an IPv4 address for a name</text>

  <line x1="60" y1="158" x2="580" y2="158" stroke="#000000" stroke-width="1"/>
  <text x="120" y="146" text-anchor="middle" font-size="12" font-weight="bold">AAAA</text>
  <text x="190" y="146" text-anchor="start" font-size="11">an IPv6 address for a name</text>

  <line x1="60" y1="191" x2="580" y2="191" stroke="#000000" stroke-width="1"/>
  <text x="120" y="179" text-anchor="middle" font-size="12" font-weight="bold">CNAME</text>
  <text x="190" y="179" text-anchor="start" font-size="11">an alias: "this name is really that name"</text>

  <line x1="60" y1="224" x2="580" y2="224" stroke="#000000" stroke-width="1"/>
  <text x="120" y="212" text-anchor="middle" font-size="12" font-weight="bold">MX</text>
  <text x="190" y="212" text-anchor="start" font-size="11">which mail server handles email for a domain</text>

  <line x1="60" y1="257" x2="580" y2="257" stroke="#000000" stroke-width="1"/>
  <text x="120" y="245" text-anchor="middle" font-size="12" font-weight="bold">NS</text>
  <text x="190" y="245" text-anchor="start" font-size="11">which servers are in charge of a domain</text>

  <line x1="60" y1="290" x2="580" y2="290" stroke="#000000" stroke-width="1"/>
  <text x="120" y="278" text-anchor="middle" font-size="12" font-weight="bold">TXT</text>
  <text x="190" y="278" text-anchor="start" font-size="11">free-form text (often for verification/email)</text>

  <text x="120" y="313" text-anchor="middle" font-size="12" font-weight="bold">PTR</text>
  <text x="190" y="313" text-anchor="start" font-size="11">the reverse: a name for an IP address</text>

  <text x="320" y="348" text-anchor="middle" font-size="11" font-style="italic">A and AAAA are the everyday "name to address" answers.</text>
</svg>
