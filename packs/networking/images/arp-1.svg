<svg xmlns="http://www.w3.org/2000/svg" width="660" height="360" viewBox="0 0 660 360" font-family="monospace" font-size="13">
  <rect width="660" height="360" fill="#ffffff"/>
  <text x="20" y="26" font-size="15" font-weight="bold">ARP resolution: "Who has 192.168.1.20?"</text>

  <!-- Host A box -->
  <rect x="30" y="60" width="170" height="64" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="115" y="84" text-anchor="middle" font-weight="bold">Host A</text>
  <text x="115" y="102" text-anchor="middle">192.168.1.10</text>
  <text x="115" y="118" text-anchor="middle">aa:aa:aa:11:11:11</text>

  <!-- Host B box -->
  <rect x="460" y="60" width="170" height="64" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="545" y="84" text-anchor="middle" font-weight="bold">Host B</text>
  <text x="545" y="102" text-anchor="middle">192.168.1.20</text>
  <text x="545" y="118" text-anchor="middle">bb:bb:bb:22:22:22</text>

  <!-- Switched LAN / broadcast domain -->
  <rect x="30" y="150" width="600" height="30" fill="#fafafa" stroke="#bbbbbb"/>
  <text x="330" y="170" text-anchor="middle" fill="#666">switched LAN (one broadcast domain)</text>

  <!-- Step 1: broadcast request -->
  <text x="30" y="220" font-weight="bold" fill="#c62828">1. REQUEST  (broadcast)</text>
  <line x1="115" y1="232" x2="600" y2="232" stroke="#c62828" stroke-width="2.5" marker-end="url(#redarrow)"/>
  <text x="120" y="250" fill="#c62828">dst MAC ff:ff:ff:ff:ff:ff  -- "Who has .20? Tell .10"</text>
  <text x="120" y="266" fill="#999">every host on the segment receives it; only B answers</text>

  <!-- Step 2: unicast reply -->
  <text x="30" y="300" font-weight="bold" fill="#2e7d32">2. REPLY  (unicast)</text>
  <line x1="545" y1="312" x2="125" y2="312" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#greenarrow)"/>
  <text x="120" y="330" fill="#2e7d32">dst MAC aa:aa:aa:11:11:11  -- ".20 is at bb:bb:bb:22:22:22"</text>
  <text x="120" y="346" fill="#999">A caches the mapping; now it can build the unicast frame</text>

  <defs>
    <marker id="redarrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c62828"/>
    </marker>
    <marker id="greenarrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2e7d32"/>
    </marker>
  </defs>
</svg>
