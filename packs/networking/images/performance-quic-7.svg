<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">QUIC independent streams vs one blocked TCP stream</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#000000">QUIC carries many separate streams; a stall in one does not freeze the others.</text>

  <!-- ===== Top: TCP (one shared lane) ===== -->
  <text x="60" y="86" font-size="13" font-weight="bold" fill="#000000">TCP: everything shares ONE lane</text>
  <rect x="60" y="98" width="600" height="50" fill="none" stroke="#000000" stroke-width="2"/>
  <rect x="72" y="108" width="80" height="30" fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="112" y="128" text-anchor="middle" font-size="11" fill="#000000">LOST</text>
  <rect x="162" y="108" width="80" height="30" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="202" y="128" text-anchor="middle" font-size="11" fill="#000000">img</text>
  <rect x="252" y="108" width="80" height="30" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="292" y="128" text-anchor="middle" font-size="11" fill="#000000">text</text>
  <rect x="342" y="108" width="80" height="30" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="382" y="128" text-anchor="middle" font-size="11" fill="#000000">video</text>
  <text x="540" y="128" text-anchor="middle" font-size="12" fill="#000000">all blocked by the gap -&gt;</text>
  <text x="360" y="170" text-anchor="middle" font-size="12" fill="#000000">One lost piece freezes the whole lane (head-of-line blocking).</text>

  <!-- ===== Bottom: QUIC (separate lanes) ===== -->
  <text x="60" y="208" font-size="13" font-weight="bold" fill="#000000">QUIC: each stream has its OWN lane</text>

  <!-- lane A blocked -->
  <rect x="60" y="222" width="600" height="34" fill="none" stroke="#000000" stroke-width="2"/>
  <rect x="72" y="228" width="70" height="22" fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="107" y="244" text-anchor="middle" font-size="10" fill="#000000">LOST</text>
  <text x="380" y="240" text-anchor="middle" font-size="11" fill="#000000">stream A waits (only A is affected)</text>

  <!-- lane B flowing -->
  <rect x="60" y="262" width="600" height="34" fill="none" stroke="#000000" stroke-width="2"/>
  <rect x="72" y="268" width="70" height="22" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="107" y="284" text-anchor="middle" font-size="10" fill="#000000">ok</text>
  <rect x="152" y="268" width="70" height="22" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="187" y="284" text-anchor="middle" font-size="10" fill="#000000">ok</text>
  <line x1="232" y1="279" x2="650" y2="279" stroke="#000000" stroke-width="1" marker-end="url(#a7)"/>
  <text x="430" y="274" text-anchor="middle" font-size="11" fill="#000000">stream B keeps flowing</text>

  <text x="360" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">Because streams are independent, a loss in one does not stall the rest.</text>
  <text x="360" y="356" text-anchor="middle" font-size="11" fill="#000000">(Bonus: QUIC can also keep the connection alive when your phone switches Wi-Fi to cellular.)</text>

  <defs>
    <marker id="a7" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
