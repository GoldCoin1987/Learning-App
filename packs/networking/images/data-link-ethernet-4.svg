<svg xmlns="http://www.w3.org/2000/svg" width="760" height="330" viewBox="0 0 760 330" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd  { font-size:13px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .t   { font-size:12px; fill:#000000; text-anchor:middle; }
    .tl  { font-size:12px; fill:#000000; }
    .solid { stroke:#000000; stroke-width:1.5; fill:none; }
    .dash { stroke:#000000; stroke-width:1.5; fill:none; stroke-dasharray:6 4; }
  </style>
  <text class="ttl" x="380" y="26">One physical switch, split into two VLANs (virtual networks)</text>

  <!-- the single switch -->
  <rect class="box" x="120" y="60" width="520" height="50"/>
  <text class="t" x="380" y="90">ONE physical switch</text>

  <!-- VLAN A group box (dashed) -->
  <rect class="dash" x="60" y="150" width="290" height="120"/>
  <text class="hd" x="205" y="172">VLAN A  (e.g. Staff)</text>
  <rect class="box" x="90"  y="190" width="90" height="44"/>
  <text class="t" x="135" y="216">PC A1</text>
  <rect class="box" x="230" y="190" width="90" height="44"/>
  <text class="t" x="275" y="216">PC A2</text>

  <!-- VLAN B group box (dashed) -->
  <rect class="dash" x="410" y="150" width="290" height="120"/>
  <text class="hd" x="555" y="172">VLAN B  (e.g. Guests)</text>
  <rect class="box" x="440" y="190" width="90" height="44"/>
  <text class="t" x="485" y="216">PC B1</text>
  <rect class="box" x="580" y="190" width="90" height="44"/>
  <text class="t" x="625" y="216">PC B2</text>

  <!-- connections from switch to PCs -->
  <line class="solid" x1="135" y1="110" x2="135" y2="190"/>
  <line class="solid" x1="275" y1="110" x2="275" y2="190"/>
  <line class="solid" x1="485" y1="110" x2="485" y2="190"/>
  <line class="solid" x1="625" y1="110" x2="625" y2="190"/>

  <!-- barrier note between VLANs -->
  <line x1="380" y1="150" x2="380" y2="270" stroke="#000000" stroke-width="1"/>
  <text class="tl" x="150" y="298">A1 and A2 can talk to each other.</text>
  <text class="tl" x="430" y="298">B1 and B2 can talk to each other.</text>
  <text class="t" x="380" y="320">VLAN A and VLAN B act like separate networks. To cross between them you need a router.</text>
</svg>
