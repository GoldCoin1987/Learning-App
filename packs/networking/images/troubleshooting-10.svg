<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" viewBox="0 0 700 420" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd { font-size:13px; fill:#000000; font-weight:bold; }
    .t { font-size:12px; fill:#000000; }
    .tc { font-size:12px; fill:#000000; text-anchor:middle; }
    .mono { font-size:11px; fill:#000000; font-family:monospace; }
  </style>
  <rect width="700" height="420" fill="#ffffff"/>
  <text class="ttl" x="350" y="28">Three health numbers: latency, jitter, packet loss</text>

  <!-- Latency -->
  <text class="hd" x="40" y="70">Latency = the delay (round-trip time)</text>
  <line x1="60" y1="92" x2="60" y2="110" stroke="#000000" stroke-width="1"/>
  <line x1="500" y1="92" x2="500" y2="110" stroke="#000000" stroke-width="1"/>
  <line x1="60" y1="101" x2="500" y2="101" stroke="#000000" stroke-width="2" marker-start="url(#a)" marker-end="url(#a)"/>
  <text class="t" x="220" y="94">request out, reply back: 30 ms</text>
  <text class="t" x="520" y="105">bigger = feels slower</text>

  <!-- Jitter -->
  <text class="hd" x="40" y="150">Jitter = how much the delay wobbles</text>
  <text class="mono" x="60" y="176">replies: 30ms  31ms  29ms  30ms     steady = low jitter (good)</text>
  <text class="mono" x="60" y="200">replies: 12ms  90ms  20ms  140ms    jumpy  = high jitter (bad for calls/video)</text>

  <!-- Packet loss -->
  <text class="hd" x="40" y="244">Packet loss = how many never made it back</text>
  <!-- sent row -->
  <text class="t" x="60" y="278">sent:</text>
  <rect class="box" x="110" y="264" width="28" height="22"/>
  <rect class="box" x="150" y="264" width="28" height="22"/>
  <rect class="box" x="190" y="264" width="28" height="22"/>
  <rect class="box" x="230" y="264" width="28" height="22"/>
  <rect class="box" x="270" y="264" width="28" height="22"/>
  <!-- back row -->
  <text class="t" x="60" y="318">back:</text>
  <rect class="box" x="110" y="304" width="28" height="22"/>
  <rect class="box" x="150" y="304" width="28" height="22"/>
  <line x1="190" y1="304" x2="218" y2="326" stroke="#000000" stroke-width="1.5"/>
  <line x1="218" y1="304" x2="190" y2="326" stroke="#000000" stroke-width="1.5"/>
  <text class="tc" x="204" y="319">lost</text>
  <rect class="box" x="230" y="304" width="28" height="22"/>
  <rect class="box" x="270" y="304" width="28" height="22"/>
  <text class="t" x="320" y="318">1 of 5 lost = 20% packet loss (stutter, retries, slowness)</text>

  <!-- ping summary tie-in -->
  <rect class="box" x="40" y="346" width="620" height="56"/>
  <text class="t" x="55" y="368">ping shows all three in its summary line:</text>
  <text class="mono" x="55" y="392">5 sent, 4 received, 20% loss, rtt min/avg/max = 12/40/140 ms</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
