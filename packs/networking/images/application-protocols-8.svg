<svg xmlns="http://www.w3.org/2000/svg" width="680" height="330" viewBox="0 0 680 330" font-family="sans-serif" font-size="13">
  <rect width="680" height="330" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">An API call: a program asks, gets back JSON data</text>
  <text x="340" y="48" text-anchor="middle" font-size="12" fill="#000000">Same HTTP request/response - but for DATA, not a whole web page.</text>

  <!-- App -->
  <rect x="40" y="80" width="160" height="100" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="120" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">A program</text>
  <text x="120" y="132" text-anchor="middle" font-size="11" fill="#000000">(weather app)</text>
  <text x="120" y="156" text-anchor="middle" font-size="11" fill="#000000">the CLIENT</text>

  <!-- API server -->
  <rect x="480" y="80" width="160" height="100" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="560" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">API server</text>
  <text x="560" y="132" text-anchor="middle" font-size="11" fill="#000000">(weather service)</text>
  <text x="560" y="156" text-anchor="middle" font-size="11" fill="#000000">the SERVER</text>

  <!-- request -->
  <line x1="200" y1="110" x2="480" y2="110" stroke="#000000" stroke-width="2" marker-end="url(#ap8arrow)"/>
  <text x="340" y="103" text-anchor="middle" font-size="11" fill="#000000">GET /weather?city=Reno</text>

  <!-- response -->
  <line x1="480" y1="150" x2="200" y2="150" stroke="#000000" stroke-width="2" marker-end="url(#ap8arrow)"/>
  <text x="340" y="170" text-anchor="middle" font-size="11" fill="#000000">200 OK + JSON below</text>

  <!-- JSON box -->
  <rect x="190" y="200" width="300" height="90" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="340" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">JSON (the data format)</text>
  <text x="205" y="246" font-size="12" fill="#000000">{ "city": "Reno",</text>
  <text x="205" y="266" font-size="12" fill="#000000">  "tempF": 71,</text>
  <text x="205" y="286" font-size="12" fill="#000000">  "sky": "clear" }</text>

  <text x="340" y="312" text-anchor="middle" font-size="11" fill="#000000">REST = use these plain HTTP requests to read/change data. JSON = simple labeled text any language can read.</text>

  <defs>
    <marker id="ap8arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
  </defs>
</svg>
