<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" font-family="sans-serif" font-size="13">
  <rect width="680" height="320" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="bold">A packet travels network-to-network to reach a far-away computer</text>

  <!-- Source computer -->
  <rect x="20" y="120" width="110" height="70" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="75" y="148" text-anchor="middle" font-weight="bold">Your PC</text>
  <text x="75" y="168" text-anchor="middle" font-size="11">src IP</text>
  <text x="75" y="183" text-anchor="middle" font-size="11">192.168.1.5</text>

  <!-- Routers as circles -->
  <circle cx="240" cy="155" r="34" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="240" y="152" text-anchor="middle" font-weight="bold">Router</text>
  <text x="240" y="168" text-anchor="middle" font-size="11">R1</text>

  <circle cx="400" cy="155" r="34" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="400" y="152" text-anchor="middle" font-weight="bold">Router</text>
  <text x="400" y="168" text-anchor="middle" font-size="11">R2</text>

  <circle cx="540" cy="155" r="34" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="540" y="152" text-anchor="middle" font-weight="bold">Router</text>
  <text x="540" y="168" text-anchor="middle" font-size="11">R3</text>

  <!-- Destination server -->
  <rect x="600" y="120" width="70" height="70" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="635" y="148" text-anchor="middle" font-weight="bold" font-size="12">Server</text>
  <text x="635" y="166" text-anchor="middle" font-size="10">dst IP</text>
  <text x="635" y="180" text-anchor="middle" font-size="9">203.0.113.7</text>

  <!-- Hops (arrows) -->
  <line x1="130" y1="155" x2="200" y2="155" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="278" y1="155" x2="362" y2="155" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="438" y1="155" x2="502" y2="155" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="578" y1="155" x2="596" y2="155" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Network labels under each link -->
  <text x="165" y="215" text-anchor="middle" font-size="10">Network 1</text>
  <text x="320" y="215" text-anchor="middle" font-size="10">Network 2</text>
  <text x="470" y="215" text-anchor="middle" font-size="10">Network 3</text>

  <!-- The packet label that stays the same -->
  <rect x="190" y="248" width="300" height="46" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="340" y="266" text-anchor="middle" font-size="11" font-weight="bold">The packet carries the SAME src + dst IP the whole way</text>
  <text x="340" y="284" text-anchor="middle" font-size="11">[ from 192.168.1.5  to  203.0.113.7 | data ]</text>

  <text x="340" y="312" text-anchor="middle" font-size="11">Each router passes it one network closer to the destination.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
