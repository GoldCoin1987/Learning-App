<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="sans-serif" font-size="13">
  <rect width="640" height="380" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Signal gets weaker with distance and through walls</text>

  <!-- the router / access point -->
  <rect x="60" y="150" width="70" height="44" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="95" y="178" text-anchor="middle" font-size="11" fill="#000000">Wi-Fi box</text>
  <circle cx="95" cy="172" r="4" fill="#000000"/>

  <!-- fading rings (thinner stroke = weaker as they spread) -->
  <g fill="none" stroke="#000000">
    <path d="M 140 140 A 60 60 0 0 1 140 204" stroke-width="3"/>
    <path d="M 200 120 A 110 110 0 0 1 200 224" stroke-width="2"/>
    <path d="M 270 96 A 165 165 0 0 1 270 248" stroke-width="1.2"/>
    <path d="M 340 74 A 222 222 0 0 1 340 270" stroke-width="0.6"/>
  </g>
  <text x="170" y="320" text-anchor="middle" font-size="11" fill="#000000">strong</text>
  <text x="300" y="320" text-anchor="middle" font-size="11" fill="#000000">weaker</text>
  <text x="420" y="320" text-anchor="middle" font-size="11" fill="#000000">faint</text>

  <!-- a wall that blocks -->
  <rect x="365" y="90" width="14" height="190" fill="#000000"/>
  <text x="372" y="84" text-anchor="middle" font-size="11" fill="#000000">wall</text>

  <!-- phone close: full bars -->
  <rect x="225" y="158" width="26" height="34" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="238" y="210" text-anchor="middle" font-size="10" fill="#000000">near:</text>
  <text x="238" y="224" text-anchor="middle" font-size="10" fill="#000000">full bars</text>

  <!-- phone far + behind wall: weak -->
  <rect x="470" y="158" width="26" height="34" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="483" y="210" text-anchor="middle" font-size="10" fill="#000000">far + wall:</text>
  <text x="483" y="224" text-anchor="middle" font-size="10" fill="#000000">weak / drops</text>

  <text x="320" y="352" text-anchor="middle" font-size="12" fill="#000000">The farther you go, and the more walls in the way, the weaker the signal. Eventually it is too weak to use.</text>
</svg>
