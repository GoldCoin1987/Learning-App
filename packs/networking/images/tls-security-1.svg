<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" font-family="monospace" font-size="11">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="22" text-anchor="middle" font-size="15" font-weight="bold">TLS 1.3 Handshake (1-RTT)</text>

  <!-- actors -->
  <text x="120" y="48" text-anchor="middle" font-size="13" font-weight="bold">Client</text>
  <text x="520" y="48" text-anchor="middle" font-size="13" font-weight="bold">Server</text>
  <line x1="120" y1="56" x2="120" y2="372" stroke="#333" stroke-width="1.5"/>
  <line x1="520" y1="56" x2="520" y2="372" stroke="#333" stroke-width="1.5"/>

  <!-- 1: ClientHello -->
  <g stroke="#1d4ed8" stroke-width="1.5">
    <line x1="120" y1="90" x2="520" y2="90" marker-end="url(#arrow)"/>
  </g>
  <text x="320" y="82" text-anchor="middle" fill="#1d4ed8" font-weight="bold">ClientHello</text>
  <text x="320" y="106" text-anchor="middle" font-size="9">supported groups + key_share (ephemeral DH pub) + SNI</text>

  <!-- 2: ServerHello -->
  <g stroke="#15803d" stroke-width="1.5">
    <line x1="520" y1="150" x2="120" y2="150" marker-end="url(#arrow)"/>
  </g>
  <text x="320" y="142" text-anchor="middle" fill="#15803d" font-weight="bold">ServerHello</text>
  <text x="320" y="166" text-anchor="middle" font-size="9">key_share (ephemeral DH pub) + cipher</text>

  <!-- shared secret derived -->
  <rect x="180" y="182" width="280" height="26" fill="#fef3c7" stroke="#333" stroke-dasharray="4 3"/>
  <text x="320" y="199" text-anchor="middle" font-size="9">both sides now derive shared secret -&gt; keys established</text>

  <!-- 3: encrypted server flight -->
  <g stroke="#15803d" stroke-width="1.5">
    <line x1="520" y1="246" x2="120" y2="246" marker-end="url(#arrow)"/>
  </g>
  <rect x="150" y="222" width="340" height="14" fill="#dcfce7" stroke="#15803d" stroke-dasharray="3 2"/>
  <text x="320" y="232" text-anchor="middle" font-size="8">ENCRYPTED</text>
  <text x="320" y="262" text-anchor="middle" font-size="9">{EncryptedExtensions, Certificate, CertVerify, Finished}</text>

  <!-- 4: client Finished + app data -->
  <g stroke="#1d4ed8" stroke-width="1.5">
    <line x1="120" y1="312" x2="520" y2="312" marker-end="url(#arrow)"/>
  </g>
  <rect x="150" y="288" width="340" height="14" fill="#dbeafe" stroke="#1d4ed8" stroke-dasharray="3 2"/>
  <text x="320" y="298" text-anchor="middle" font-size="8">ENCRYPTED</text>
  <text x="320" y="328" text-anchor="middle" font-size="9">{Finished} + Application Data</text>

  <text x="40" y="360" font-size="10">One round trip to first app byte. DH keys are ephemeral -&gt; forward secrecy.</text>
  <text x="40" y="374" font-size="10">Certificate is sent ENCRYPTED (unlike TLS 1.2). 0-RTT resumption risks replay.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
