<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340" font-family="sans-serif" font-size="13">
  <rect width="640" height="340" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold">Control plane vs. data plane</text>
  <text x="320" y="46" text-anchor="middle" font-size="12">SDN splits the "deciding" from the "doing"</text>

  <!-- Control plane box -->
  <rect x="60" y="70" width="520" height="80" fill="#ffffff" stroke="#000000"/>
  <text x="320" y="96" text-anchor="middle" font-weight="bold">CONTROL PLANE  =  the brain (decides WHERE traffic should go)</text>
  <text x="320" y="118" text-anchor="middle" font-size="12">Builds the rules / the map. In SDN this is centralized in the controller.</text>
  <text x="320" y="138" text-anchor="middle" font-size="12">Analogy: the air-traffic-control tower planning every route.</text>

  <!-- arrow down: pushes rules -->
  <line x1="320" y1="150" x2="320" y2="200" stroke="#000000" marker-end="url(#ar2)"/>
  <text x="430" y="180" text-anchor="middle" font-size="12">pushes forwarding rules down</text>

  <!-- Data plane box -->
  <rect x="60" y="200" width="520" height="90" fill="#ffffff" stroke="#000000"/>
  <text x="320" y="226" text-anchor="middle" font-weight="bold">DATA PLANE  =  the muscle (actually FORWARDS the packets)</text>
  <text x="320" y="248" text-anchor="middle" font-size="12">Lives in the switches/forwarders. Just matches each packet to a rule</text>
  <text x="320" y="266" text-anchor="middle" font-size="12">and sends it out a port. Very fast, makes no decisions of its own.</text>
  <text x="320" y="284" text-anchor="middle" font-size="12">Analogy: the pilots flying the planes as instructed.</text>

  <text x="320" y="318" text-anchor="middle" font-size="11">Key idea: same two jobs as a normal router, but the brain is moved out and shared.</text>

  <defs>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#000000"/>
    </marker>
  </defs>
</svg>
