<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd  { font-size:14px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .t   { font-size:12px; fill:#000000; }
    .tc  { font-size:12px; fill:#000000; text-anchor:middle; }
    .mono { font-size:13px; fill:#000000; text-anchor:middle; font-family:monospace; font-weight:bold; }
  </style>
  <text class="ttl" x="380" y="26">Two addresses, two jobs: MAC vs IP</text>

  <!-- MAC panel -->
  <rect class="box" x="20" y="50" width="340" height="240"/>
  <text class="hd" x="190" y="76">MAC address</text>
  <text class="tc" x="190" y="96">(the LOCAL, permanent address)</text>
  <rect class="box" x="60" y="112" width="260" height="34"/>
  <text class="mono" x="190" y="134">a1:b2:c3:44:55:66</text>
  <text class="t" x="40" y="172">- Burned into the network chip at the factory</text>
  <text class="t" x="40" y="194">- 48 bits, written as 6 pairs of hex digits</text>
  <text class="t" x="40" y="216">- Names ONE device on your local network</text>
  <text class="t" x="40" y="238">- Does not change if you move the device</text>
  <text class="t" x="40" y="260">- Used to deliver a frame to the right</text>
  <text class="t" x="56" y="278">  nearby device (e.g. laptop -&gt; router)</text>

  <!-- IP panel -->
  <rect class="box" x="400" y="50" width="340" height="240"/>
  <text class="hd" x="570" y="76">IP address</text>
  <text class="tc" x="570" y="96">(the LOGICAL, routable address)</text>
  <rect class="box" x="440" y="112" width="260" height="34"/>
  <text class="mono" x="570" y="134">192.168.1.42</text>
  <text class="t" x="420" y="172">- Assigned by software / the network</text>
  <text class="t" x="420" y="194">- Used to cross between networks</text>
  <text class="t" x="420" y="216">- Can change when you join a new network</text>
  <text class="t" x="420" y="238">- Lets data travel across the whole</text>
  <text class="t" x="436" y="256">  Internet, hop by hop</text>
  <text class="t" x="420" y="278">- Covered fully in the next sub-topics</text>

  <!-- divider arrow -->
  <line x1="362" y1="170" x2="398" y2="170" stroke="#000000" stroke-width="1.5"/>
</svg>
