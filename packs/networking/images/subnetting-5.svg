<svg xmlns="http://www.w3.org/2000/svg" width="700" height="330" viewBox="0 0 700 330" font-family="sans-serif" font-size="13">
  <rect width="700" height="330" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="15" font-weight="bold">Inside one /24 block: network, hosts, and broadcast</text>
  <text x="350" y="46" text-anchor="middle" font-size="12">192.168.1.0/24  -  a number line of all 256 addresses</text>

  <!-- Number line -->
  <line x1="60" y1="150" x2="640" y2="150" stroke="#000000" stroke-width="2"/>

  <!-- Ticks at 0, 1, 254, 255 -->
  <line x1="60" y1="142" x2="60" y2="158" stroke="#000000" stroke-width="2"/>
  <line x1="120" y1="142" x2="120" y2="158" stroke="#000000" stroke-width="1.5"/>
  <line x1="580" y1="142" x2="580" y2="158" stroke="#000000" stroke-width="1.5"/>
  <line x1="640" y1="142" x2="640" y2="158" stroke="#000000" stroke-width="2"/>

  <!-- Address labels -->
  <text x="60" y="176" text-anchor="middle" font-family="monospace" font-size="12">.0</text>
  <text x="120" y="176" text-anchor="middle" font-family="monospace" font-size="12">.1</text>
  <text x="580" y="176" text-anchor="middle" font-family="monospace" font-size="12">.254</text>
  <text x="640" y="176" text-anchor="middle" font-family="monospace" font-size="12">.255</text>

  <!-- Network address callout -->
  <rect x="20" y="92" width="120" height="44" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="80" y="110" text-anchor="middle" font-size="11" font-weight="bold">NETWORK address</text>
  <text x="80" y="127" text-anchor="middle" font-size="10">.0 - names the block</text>
  <line x1="80" y1="136" x2="62" y2="148" stroke="#000000" stroke-width="1"/>

  <!-- Broadcast address callout -->
  <rect x="560" y="92" width="130" height="44" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="625" y="110" text-anchor="middle" font-size="11" font-weight="bold">BROADCAST</text>
  <text x="625" y="127" text-anchor="middle" font-size="10">.255 - "everyone"</text>
  <line x1="625" y1="136" x2="640" y2="148" stroke="#000000" stroke-width="1"/>

  <!-- Usable range bracket -->
  <line x1="120" y1="210" x2="580" y2="210" stroke="#000000" stroke-width="1.5"/>
  <line x1="120" y1="204" x2="120" y2="216" stroke="#000000" stroke-width="1.5"/>
  <line x1="580" y1="204" x2="580" y2="216" stroke="#000000" stroke-width="1.5"/>
  <text x="350" y="232" text-anchor="middle" font-size="12" font-weight="bold">usable host addresses: .1 through .254</text>
  <line x1="350" y1="198" x2="350" y2="208" stroke="#000000" stroke-width="1"/>

  <!-- Count box -->
  <rect x="90" y="256" width="520" height="62" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="350" y="280" text-anchor="middle" font-size="13" font-weight="bold">256 addresses total, but only 254 are usable for devices</text>
  <text x="350" y="304" text-anchor="middle" font-size="11">Subtract 2: the first (.0, the network name) and the last (.255, broadcast).</text>
</svg>
