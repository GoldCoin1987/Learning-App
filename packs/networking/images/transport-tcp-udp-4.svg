<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" font-family="sans-serif" font-size="13">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">TCP vs UDP: two delivery styles</text>

  <!-- column headers -->
  <rect x="40" y="50" width="240" height="40" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="160" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">TCP</text>
  <text x="160" y="85" text-anchor="middle" font-size="11" fill="#000000">like a tracked package</text>

  <rect x="360" y="50" width="240" height="40" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="480" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">UDP</text>
  <text x="480" y="85" text-anchor="middle" font-size="11" fill="#000000">like a mailed postcard</text>

  <!-- rows: feature compared -->
  <!-- row labels in the middle -->
  <text x="320" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#000000">Sets up a connection first?</text>
  <text x="160" y="120" text-anchor="middle" font-size="12" fill="#000000">Yes (handshake)</text>
  <text x="480" y="120" text-anchor="middle" font-size="12" fill="#000000">No, just send</text>
  <line x1="40" y1="132" x2="600" y2="132" stroke="#000000" stroke-width="1"/>

  <text x="320" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#000000">Re-sends lost data?</text>
  <text x="160" y="160" text-anchor="middle" font-size="12" fill="#000000">Yes</text>
  <text x="480" y="160" text-anchor="middle" font-size="12" fill="#000000">No</text>
  <line x1="40" y1="172" x2="600" y2="172" stroke="#000000" stroke-width="1"/>

  <text x="320" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#000000">Delivers in order?</text>
  <text x="160" y="200" text-anchor="middle" font-size="12" fill="#000000">Yes</text>
  <text x="480" y="200" text-anchor="middle" font-size="12" fill="#000000">No</text>
  <line x1="40" y1="212" x2="600" y2="212" stroke="#000000" stroke-width="1"/>

  <text x="320" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#000000">Speed / overhead</text>
  <text x="160" y="240" text-anchor="middle" font-size="12" fill="#000000">More work, slower start</text>
  <text x="480" y="240" text-anchor="middle" font-size="12" fill="#000000">Fast, tiny header</text>
  <line x1="40" y1="252" x2="600" y2="252" stroke="#000000" stroke-width="1"/>

  <text x="320" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#000000">Good for</text>
  <text x="160" y="280" text-anchor="middle" font-size="11" fill="#000000">Files, web pages, email</text>
  <text x="480" y="280" text-anchor="middle" font-size="11" fill="#000000">Live video, games, DNS</text>

  <!-- vertical divider -->
  <line x1="320" y1="50" x2="320" y2="296" stroke="#000000" stroke-width="1" stroke-dasharray="4 4"/>

  <text x="320" y="330" text-anchor="middle" font-size="12" fill="#000000">Choose TCP when every byte must arrive correctly and in order.</text>
  <text x="320" y="350" text-anchor="middle" font-size="12" fill="#000000">Choose UDP when speed matters more than perfection.</text>
</svg>
