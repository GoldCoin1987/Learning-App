<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380" font-family="sans-serif" font-size="13">
  <rect width="680" height="380" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="16" font-weight="bold">Low-power radios: range vs amount of data</text>

  <!-- axes -->
  <line x1="80" y1="300" x2="640" y2="300" stroke="#000000" stroke-width="2"/>
  <line x1="80" y1="300" x2="80" y2="60" stroke="#000000" stroke-width="2"/>
  <text x="360" y="338" text-anchor="middle" font-weight="bold">Range (short to long) --&gt;</text>
  <text x="34" y="180" text-anchor="middle" font-weight="bold" transform="rotate(-90 34 180)">Data rate (low to high) --&gt;</text>

  <!-- BLE: short range, higher data -->
  <circle cx="160" cy="110" r="8" fill="#000000"/>
  <text x="160" y="96" text-anchor="middle">BLE</text>
  <text x="160" y="138" text-anchor="middle" fill="#333" font-size="11">short range,</text>
  <text x="160" y="153" text-anchor="middle" fill="#333" font-size="11">wearables</text>

  <!-- Zigbee / Thread: home mesh, medium-short -->
  <circle cx="300" cy="170" r="8" fill="#000000"/>
  <text x="300" y="156" text-anchor="middle">Zigbee / Thread</text>
  <text x="300" y="196" text-anchor="middle" fill="#333" font-size="11">home mesh,</text>
  <text x="300" y="211" text-anchor="middle" fill="#333" font-size="11">devices relay</text>

  <!-- LoRaWAN: very long range, tiny data -->
  <circle cx="560" cy="265" r="8" fill="#000000"/>
  <text x="560" y="251" text-anchor="middle">LoRaWAN</text>
  <text x="560" y="291" text-anchor="middle" fill="#333" font-size="11">very long range,</text>
  <text x="560" y="306" text-anchor="middle" fill="#333" font-size="11">tiny data</text>

  <!-- NB-IoT / cellular: long range, low-moderate data -->
  <circle cx="470" cy="215" r="8" fill="#000000"/>
  <text x="470" y="201" text-anchor="middle">NB-IoT (cellular)</text>
  <text x="470" y="241" text-anchor="middle" fill="#333" font-size="11">long range,</text>
  <text x="470" y="256" text-anchor="middle" fill="#333" font-size="11">uses cell towers</text>

  <text x="360" y="364" text-anchor="middle" fill="#333">Rule of thumb: more range usually means less data and the choice depends on the job.</text>
</svg>
