<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="640" height="520" fill="white"/>
  <text x="320" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="black">OSI (teaching) vs TCP/IP (real) + Encapsulation</text>

  <!-- OSI column -->
  <text x="110" y="58" text-anchor="middle" font-weight="bold" fill="black">OSI 7-layer</text>
  <rect x="20" y="70" width="180" height="34" fill="white" stroke="black"/><text x="110" y="92" text-anchor="middle" fill="black">7 Application</text>
  <rect x="20" y="104" width="180" height="34" fill="white" stroke="black"/><text x="110" y="126" text-anchor="middle" fill="black">6 Presentation</text>
  <rect x="20" y="138" width="180" height="34" fill="white" stroke="black"/><text x="110" y="160" text-anchor="middle" fill="black">5 Session</text>
  <rect x="20" y="172" width="180" height="34" fill="white" stroke="black"/><text x="110" y="194" text-anchor="middle" fill="black">4 Transport</text>
  <rect x="20" y="206" width="180" height="34" fill="white" stroke="black"/><text x="110" y="228" text-anchor="middle" fill="black">3 Network</text>
  <rect x="20" y="240" width="180" height="34" fill="white" stroke="black"/><text x="110" y="262" text-anchor="middle" fill="black">2 Data Link</text>
  <rect x="20" y="274" width="180" height="34" fill="white" stroke="black"/><text x="110" y="296" text-anchor="middle" fill="black">1 Physical</text>

  <!-- TCP/IP column -->
  <text x="320" y="58" text-anchor="middle" font-weight="bold" fill="black">TCP/IP 4-layer</text>
  <rect x="230" y="70" width="180" height="68" fill="white" stroke="black"/><text x="320" y="108" text-anchor="middle" fill="black">Application</text>
  <rect x="230" y="172" width="180" height="34" fill="white" stroke="black"/><text x="320" y="194" text-anchor="middle" fill="black">Transport</text>
  <rect x="230" y="206" width="180" height="34" fill="white" stroke="black"/><text x="320" y="228" text-anchor="middle" fill="black">Internet</text>
  <rect x="230" y="240" width="180" height="68" fill="white" stroke="black"/><text x="320" y="278" text-anchor="middle" fill="black">Link</text>

  <!-- dashed mapping lines -->
  <line x1="200" y1="104" x2="230" y2="104" stroke="black" stroke-dasharray="3,3"/>
  <line x1="200" y1="189" x2="230" y2="189" stroke="black" stroke-dasharray="3,3"/>
  <line x1="200" y1="223" x2="230" y2="223" stroke="black" stroke-dasharray="3,3"/>
  <line x1="200" y1="274" x2="230" y2="274" stroke="black" stroke-dasharray="3,3"/>

  <text x="470" y="92" font-size="11" fill="black">5/6 collapse into</text>
  <text x="470" y="108" font-size="11" fill="black">apps + libraries</text>

  <!-- Encapsulation stack -->
  <text x="320" y="348" text-anchor="middle" font-weight="bold" fill="black">Encapsulation: nested envelopes (PDUs)</text>
  <rect x="40" y="362" width="560" height="120" fill="white" stroke="black"/>
  <rect x="60" y="382" width="520" height="80" fill="white" stroke="black"/>
  <text x="78" y="402" font-size="11" fill="black">Frame hdr</text>
  <rect x="150" y="392" width="430" height="60" fill="white" stroke="black"/>
  <text x="168" y="412" font-size="11" fill="black">IP hdr</text>
  <rect x="230" y="402" width="350" height="40" fill="white" stroke="black"/>
  <text x="248" y="422" font-size="11" fill="black">TCP hdr</text>
  <rect x="320" y="408" width="252" height="26" fill="white" stroke="black"/>
  <text x="446" y="426" text-anchor="middle" font-size="11" fill="black">Application data (payload)</text>
  <text x="78" y="476" font-size="11" fill="black">Frame (L2)    Packet (L3)    Segment (L4)    Data (L7)</text>
</svg>
