<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="sans-serif">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Setup round trips: TCP + TLS vs QUIC</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#000000">Fewer round trips before real data = a faster-feeling connection.</text>

  <!-- ===== Left: TCP + TLS ===== -->
  <text x="180" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">TCP, then TLS (the old way)</text>
  <line x1="90"  y1="92" x2="90"  y2="350" stroke="#000000" stroke-width="2"/>
  <line x1="270" y1="92" x2="270" y2="350" stroke="#000000" stroke-width="2"/>
  <text x="90"  y="108" text-anchor="middle" font-size="11" fill="#000000">You</text>
  <text x="270" y="108" text-anchor="middle" font-size="11" fill="#000000">Server</text>

  <line x1="90"  y1="124" x2="270" y2="142" stroke="#000000" stroke-width="1.5" marker-end="url(#a6)"/>
  <text x="180" y="120" text-anchor="middle" font-size="10" fill="#000000">set up connection</text>
  <line x1="270" y1="142" x2="90"  y2="160" stroke="#000000" stroke-width="1.5" marker-end="url(#a6)"/>
  <text x="180" y="138" text-anchor="middle" font-size="10" fill="#000000">ok (RTT 1)</text>

  <line x1="90"  y1="176" x2="270" y2="194" stroke="#000000" stroke-width="1.5" marker-end="url(#a6)"/>
  <text x="180" y="172" text-anchor="middle" font-size="10" fill="#000000">set up encryption</text>
  <line x1="270" y1="194" x2="90"  y2="212" stroke="#000000" stroke-width="1.5" marker-end="url(#a6)"/>
  <text x="180" y="190" text-anchor="middle" font-size="10" fill="#000000">ok (RTT 2)</text>

  <line x1="90"  y1="228" x2="270" y2="246" stroke="#000000" stroke-width="2" marker-end="url(#a6)"/>
  <text x="180" y="224" text-anchor="middle" font-size="10" fill="#000000">finally: real request</text>

  <text x="180" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">2 round trips</text>
  <text x="180" y="320" text-anchor="middle" font-size="12" fill="#000000">of waiting before</text>
  <text x="180" y="338" text-anchor="middle" font-size="12" fill="#000000">any real data</text>

  <!-- divider -->
  <line x1="360" y1="92" x2="360" y2="360" stroke="#000000" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ===== Right: QUIC ===== -->
  <text x="540" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">QUIC (one combined setup)</text>
  <line x1="450" y1="92" x2="450" y2="350" stroke="#000000" stroke-width="2"/>
  <line x1="630" y1="92" x2="630" y2="350" stroke="#000000" stroke-width="2"/>
  <text x="450" y="108" text-anchor="middle" font-size="11" fill="#000000">You</text>
  <text x="630" y="108" text-anchor="middle" font-size="11" fill="#000000">Server</text>

  <line x1="450" y1="124" x2="630" y2="142" stroke="#000000" stroke-width="2" marker-end="url(#a6)"/>
  <text x="540" y="120" text-anchor="middle" font-size="10" fill="#000000">connection + encryption together</text>
  <line x1="630" y1="142" x2="450" y2="160" stroke="#000000" stroke-width="2" marker-end="url(#a6)"/>
  <text x="540" y="138" text-anchor="middle" font-size="10" fill="#000000">ok + start of reply (RTT 1)</text>

  <text x="540" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">just 1 round trip</text>
  <text x="540" y="240" text-anchor="middle" font-size="12" fill="#000000">(and 0 round trips if</text>
  <text x="540" y="258" text-anchor="middle" font-size="12" fill="#000000">you reconnect soon after)</text>

  <text x="360" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">QUIC merges "set up the connection" and "set up encryption" into one step.</text>
  <text x="360" y="414" text-anchor="middle" font-size="11" fill="#000000">Like combining several errands into one trip instead of driving back and forth.</text>

  <defs>
    <marker id="a6" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
