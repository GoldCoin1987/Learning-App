<svg xmlns="http://www.w3.org/2000/svg" width="680" height="340" viewBox="0 0 680 340" font-family="sans-serif" font-size="13">
  <rect width="680" height="340" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">HTTP status codes: read the FIRST digit</text>
  <text x="340" y="48" text-anchor="middle" font-size="12" fill="#000000">The first digit tells you the family; the rest is the detail.</text>

  <!-- 2xx -->
  <rect x="30" y="70" width="150" height="180" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="105" y="96" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">2xx</text>
  <text x="105" y="118" text-anchor="middle" font-size="12" fill="#000000">Success</text>
  <text x="105" y="138" text-anchor="middle" font-size="11" fill="#000000">"it worked"</text>
  <line x1="45" y1="150" x2="165" y2="150" stroke="#000000" stroke-width="1"/>
  <text x="105" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">200 OK</text>
  <text x="105" y="194" text-anchor="middle" font-size="11" fill="#000000">here is the page</text>

  <!-- 3xx -->
  <rect x="195" y="70" width="150" height="180" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="270" y="96" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">3xx</text>
  <text x="270" y="118" text-anchor="middle" font-size="12" fill="#000000">Redirect</text>
  <text x="270" y="138" text-anchor="middle" font-size="11" fill="#000000">"go look over there"</text>
  <line x1="210" y1="150" x2="330" y2="150" stroke="#000000" stroke-width="1"/>
  <text x="270" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">301 Moved</text>
  <text x="270" y="194" text-anchor="middle" font-size="11" fill="#000000">new address</text>

  <!-- 4xx -->
  <rect x="360" y="70" width="150" height="180" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="435" y="96" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">4xx</text>
  <text x="435" y="118" text-anchor="middle" font-size="12" fill="#000000">Your mistake</text>
  <text x="435" y="138" text-anchor="middle" font-size="11" fill="#000000">"bad request"</text>
  <line x1="375" y1="150" x2="495" y2="150" stroke="#000000" stroke-width="1"/>
  <text x="435" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">404 Not Found</text>
  <text x="435" y="194" text-anchor="middle" font-size="11" fill="#000000">no such page</text>

  <!-- 5xx -->
  <rect x="525" y="70" width="150" height="180" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="600" y="96" text-anchor="middle" font-size="15" font-weight="bold" fill="#000000">5xx</text>
  <text x="600" y="118" text-anchor="middle" font-size="12" fill="#000000">Server's fault</text>
  <text x="600" y="138" text-anchor="middle" font-size="11" fill="#000000">"it broke"</text>
  <line x1="540" y1="150" x2="660" y2="150" stroke="#000000" stroke-width="1"/>
  <text x="600" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">500 Error</text>
  <text x="600" y="194" text-anchor="middle" font-size="11" fill="#000000">server crashed</text>

  <text x="340" y="290" text-anchor="middle" font-size="12" fill="#000000">2xx = ok.  3xx = go elsewhere.  4xx = the client (you) asked wrong.  5xx = the server failed.</text>
  <text x="340" y="316" text-anchor="middle" font-size="11" fill="#000000">(1xx also exists for rare "still working on it" messages, but you will mostly see 2/3/4/5.)</text>
</svg>
