<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif" font-size="13">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="bold">Without TLS vs With TLS on an open network</text>

  <!-- ============ TOP: plaintext ============ -->
  <text x="20" y="58" font-size="14" font-weight="bold">No TLS: data travels in the open</text>

  <!-- You -->
  <rect x="30" y="72" width="120" height="48" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="90" y="92" text-anchor="middle" font-weight="bold">You</text>
  <text x="90" y="110" text-anchor="middle" font-size="11">laptop</text>

  <!-- Bank -->
  <rect x="570" y="72" width="120" height="48" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="630" y="92" text-anchor="middle" font-weight="bold">Bank</text>
  <text x="630" y="110" text-anchor="middle" font-size="11">server</text>

  <!-- wire -->
  <line x1="150" y1="96" x2="570" y2="96" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="88" text-anchor="middle" font-size="12">"password = hunter2"  (readable text)</text>

  <!-- snoop -->
  <rect x="300" y="128" width="120" height="40" fill="#ffffff" stroke="#000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="360" y="146" text-anchor="middle" font-size="11" font-weight="bold">Snoop in the middle</text>
  <text x="360" y="161" text-anchor="middle" font-size="10">(cafe Wi-Fi, ISP)</text>
  <line x1="360" y1="128" x2="360" y2="100" stroke="#000" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="430" y="150" font-size="11">reads &amp; can change it</text>

  <!-- divider -->
  <line x1="20" y1="190" x2="700" y2="190" stroke="#000" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- ============ BOTTOM: TLS ============ -->
  <text x="20" y="218" font-size="14" font-weight="bold">With TLS: a secure tunnel wraps the connection</text>

  <!-- You -->
  <rect x="30" y="240" width="120" height="48" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="90" y="260" text-anchor="middle" font-weight="bold">You</text>
  <text x="90" y="278" text-anchor="middle" font-size="11">laptop</text>

  <!-- Bank -->
  <rect x="570" y="240" width="120" height="48" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="630" y="260" text-anchor="middle" font-weight="bold">Bank</text>
  <text x="630" y="278" text-anchor="middle" font-size="11">server</text>

  <!-- tunnel -->
  <rect x="150" y="248" width="420" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="269" text-anchor="middle" font-size="12">TLS tunnel:  x7#k9@!q$2  (scrambled)</text>

  <!-- snoop -->
  <rect x="300" y="300" width="120" height="40" fill="#ffffff" stroke="#000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="360" y="318" text-anchor="middle" font-size="11" font-weight="bold">Snoop in the middle</text>
  <text x="360" y="333" text-anchor="middle" font-size="10">sees only scramble</text>
  <line x1="360" y1="300" x2="360" y2="280" stroke="#000" stroke-width="1" stroke-dasharray="3 2"/>

  <text x="20" y="368" font-size="12">TLS gives three things: ENCRYPTION (unreadable) + INTEGRITY (tampering detected) + AUTHENTICATION (it is really the bank).</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
  </defs>
</svg>
