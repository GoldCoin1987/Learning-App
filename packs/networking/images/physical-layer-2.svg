<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="640" height="300" fill="white"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="black">The physical layer's one job: bits to a signal to bits</text>

  <!-- Sending computer -->
  <rect x="20" y="110" width="120" height="80" fill="white" stroke="black"/>
  <text x="80" y="145" text-anchor="middle" font-size="12" fill="black">Sending</text>
  <text x="80" y="163" text-anchor="middle" font-size="12" fill="black">computer</text>

  <!-- bits out -->
  <text x="80" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="black">1 0 1 1 0</text>
  <text x="80" y="228" text-anchor="middle" font-size="11" fill="black">(bits)</text>

  <!-- arrow into sender->wire -->
  <line x1="140" y1="150" x2="200" y2="150" stroke="black"/>
  <polygon points="200,145 210,150 200,155" fill="black"/>
  <text x="175" y="140" text-anchor="middle" font-size="10" fill="black">turn into</text>
  <text x="175" y="128" text-anchor="middle" font-size="10" fill="black">a signal</text>

  <!-- the medium: a wavy signal travelling -->
  <text x="320" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="black">A physical signal travels</text>
  <text x="320" y="106" text-anchor="middle" font-size="11" fill="black">(voltage, light, or radio waves)</text>
  <polyline fill="none" stroke="black" stroke-width="2"
    points="210,150 225,130 240,170 255,130 270,170 285,130 300,170 315,130 330,170 345,130 360,170 375,130 390,170 405,130 420,150"/>

  <!-- arrow wire->receiver -->
  <line x1="420" y1="150" x2="480" y2="150" stroke="black"/>
  <polygon points="480,145 490,150 480,155" fill="black"/>
  <text x="455" y="140" text-anchor="middle" font-size="10" fill="black">turn back</text>
  <text x="455" y="128" text-anchor="middle" font-size="10" fill="black">into bits</text>

  <!-- Receiving computer -->
  <rect x="500" y="110" width="120" height="80" fill="white" stroke="black"/>
  <text x="560" y="145" text-anchor="middle" font-size="12" fill="black">Receiving</text>
  <text x="560" y="163" text-anchor="middle" font-size="12" fill="black">computer</text>
  <text x="560" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="black">1 0 1 1 0</text>
  <text x="560" y="228" text-anchor="middle" font-size="11" fill="black">(same bits)</text>

  <text x="320" y="270" text-anchor="middle" font-size="12" fill="black">Bits go in one end and come out the other. That is all the physical layer does.</text>
</svg>
