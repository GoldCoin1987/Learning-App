<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="sans-serif" font-size="13">
  <rect width="640" height="380" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">IP finds the building; the PORT finds the right app</text>

  <!-- The building = one computer at an IP address -->
  <rect x="120" y="60" width="240" height="280" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="240" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">One computer</text>
  <text x="240" y="102" text-anchor="middle" font-size="12" fill="#000000">IP = 203.0.113.7</text>
  <text x="240" y="116" text-anchor="middle" font-size="11" fill="#000000">(the street address)</text>

  <!-- apartments = ports / apps -->
  <rect x="150" y="135" width="180" height="46" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="240" y="153" text-anchor="middle" font-size="12" fill="#000000">Port 443: Web browser</text>
  <text x="240" y="170" text-anchor="middle" font-size="11" fill="#000000">apartment #443</text>

  <rect x="150" y="195" width="180" height="46" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="240" y="213" text-anchor="middle" font-size="12" fill="#000000">Port 25: Email program</text>
  <text x="240" y="230" text-anchor="middle" font-size="11" fill="#000000">apartment #25</text>

  <rect x="150" y="255" width="180" height="46" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="240" y="273" text-anchor="middle" font-size="12" fill="#000000">Port 22: Remote login</text>
  <text x="240" y="290" text-anchor="middle" font-size="11" fill="#000000">apartment #22</text>

  <!-- incoming data labeled with IP:port -->
  <text x="500" y="150" text-anchor="middle" font-size="12" fill="#000000">Incoming data</text>
  <text x="500" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">to 203.0.113.7</text>
  <text x="500" y="186" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">port 443</text>

  <!-- arrow into the web-browser apartment -->
  <line x1="430" y1="158" x2="334" y2="158" stroke="#000000" stroke-width="2"/>
  <polygon points="334,158 348,152 348,164" fill="#000000"/>
  <text x="385" y="206" text-anchor="middle" font-size="11" fill="#000000">IP + port</text>
  <text x="385" y="222" text-anchor="middle" font-size="11" fill="#000000">= a socket</text>

  <text x="320" y="366" text-anchor="middle" font-size="11" fill="#000000">IP picks the computer. The port number picks which program on it gets the data.</text>
</svg>
