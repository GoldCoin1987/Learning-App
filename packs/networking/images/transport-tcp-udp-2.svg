<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="monospace" font-size="12">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="15" font-weight="bold">Congestion Window: Slow Start + AIMD Sawtooth</text>

  <!-- axes -->
  <line x1="60" y1="300" x2="610" y2="300" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="300" x2="60" y2="50" stroke="#333" stroke-width="1.5"/>
  <text x="335" y="335" text-anchor="middle" font-size="11">time (RTTs)</text>
  <text x="20" y="180" text-anchor="middle" font-size="11" transform="rotate(-90 20 180)">cwnd</text>

  <!-- ssthresh line -->
  <line x1="60" y1="140" x2="610" y2="140" stroke="#9333ea" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="615" y="143" text-anchor="end" font-size="9" fill="#9333ea">ssthresh</text>

  <!-- slow start: exponential climb -->
  <path d="M60,295 L90,285 L120,265 L150,225 L180,140" fill="none" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="120" y="120" text-anchor="middle" font-size="10" fill="#1d4ed8">slow start</text>
  <text x="120" y="132" text-anchor="middle" font-size="9" fill="#1d4ed8">(exponential)</text>

  <!-- congestion avoidance linear -->
  <path d="M180,140 L320,80" fill="none" stroke="#15803d" stroke-width="2.5"/>
  <text x="245" y="66" text-anchor="middle" font-size="10" fill="#15803d">cong. avoidance (additive +1/RTT)</text>

  <!-- loss event: multiplicative decrease (fast recovery, halve) -->
  <line x1="320" y1="80" x2="320" y2="180" stroke="#b91c1c" stroke-width="2"/>
  <polygon points="320,180 314,168 326,168" fill="#b91c1c"/>
  <text x="345" y="100" font-size="10" fill="#b91c1c">3 dup-ACKs -&gt; halve (x0.5)</text>

  <!-- sawtooth continues -->
  <path d="M320,180 L470,110" fill="none" stroke="#15803d" stroke-width="2.5"/>
  <line x1="470" y1="110" x2="470" y2="200" stroke="#b91c1c" stroke-width="2"/>
  <polygon points="470,200 464,188 476,188" fill="#b91c1c"/>
  <path d="M470,200 L600,150" fill="none" stroke="#15803d" stroke-width="2.5"/>

  <!-- RTO event marker -->
  <text x="40" y="318" font-size="9" fill="#444">AIMD = Additive Increase, Multiplicative Decrease. Timeout (RTO) instead drops cwnd to 1 -&gt; full slow start.</text>
  <text x="40" y="350" font-size="9" fill="#444">CUBIC (Linux default) uses a cubic curve for the increase; BBR ignores loss, models bottleneck BW x RTT.</text>
</svg>
