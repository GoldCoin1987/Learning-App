<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="monospace" font-size="12">
  <rect width="640" height="380" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="15" font-weight="bold">Longest-Prefix Match: dest 10.1.2.130</text>

  <!-- table header -->
  <rect x="20" y="44" width="600" height="26" fill="#1f2d3d"/>
  <text x="34"  y="62" fill="#ffffff">Prefix</text>
  <text x="220" y="62" fill="#ffffff">Next hop</text>
  <text x="370" y="62" fill="#ffffff">Iface</text>
  <text x="470" y="62" fill="#ffffff">AD/Metric</text>

  <!-- rows -->
  <rect x="20" y="70"  width="600" height="26" fill="#f3f5f7"/>
  <text x="34"  y="88">0.0.0.0/0</text>
  <text x="220" y="88">203.0.113.1</text>
  <text x="370" y="88">eth0</text>
  <text x="470" y="88">1/0</text>

  <rect x="20" y="96"  width="600" height="26" fill="#ffffff"/>
  <text x="34"  y="114">10.0.0.0/8</text>
  <text x="220" y="114">10.255.0.1</text>
  <text x="370" y="114">eth1</text>
  <text x="470" y="114">110/20</text>

  <rect x="20" y="122" width="600" height="26" fill="#f3f5f7"/>
  <text x="34"  y="140">10.1.0.0/16</text>
  <text x="220" y="140">10.1.0.1</text>
  <text x="370" y="140">eth1</text>
  <text x="470" y="140">110/30</text>

  <!-- winning row highlighted -->
  <rect x="20" y="148" width="600" height="26" fill="#d4f5dd" stroke="#1a7f37" stroke-width="2"/>
  <text x="34"  y="166" font-weight="bold">10.1.2.0/24</text>
  <text x="220" y="166" font-weight="bold">10.1.2.1</text>
  <text x="370" y="166" font-weight="bold">eth2</text>
  <text x="470" y="166" font-weight="bold">0/0 (conn)</text>
  <text x="588" y="166" font-weight="bold" fill="#1a7f37">&#9664;</text>

  <text x="20" y="206" font-size="13" font-weight="bold">Why /24 wins:</text>
  <text x="20" y="228">Dest 10.1.2.130 matches all four entries above.</text>
  <text x="20" y="248">The router selects the entry with the most specific</text>
  <text x="20" y="268">(longest) prefix mask, regardless of metric or AD.</text>
  <text x="20" y="288">/24 (255.255.255.0) is longer than /16, /8, and /0.</text>

  <text x="20" y="322" fill="#555">AD = administrative distance (trust between sources):</text>
  <text x="20" y="342" fill="#555">connected 0 &lt; static 1 &lt; eBGP 20 &lt; OSPF 110 &lt; RIP 120.</text>
  <text x="20" y="362" fill="#555">AD/metric only break ties among equal-length prefixes.</text>
</svg>
