<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd { font-size:13px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .t { font-size:12px; fill:#000000; }
    .tc { font-size:12px; fill:#000000; text-anchor:middle; }
    .mono { font-size:12px; fill:#000000; text-anchor:middle; font-family:monospace; }
  </style>
  <rect width="720" height="420" fill="#ffffff"/>
  <text class="ttl" x="360" y="28">ping: "are you there?" and how long the round trip takes</text>

  <!-- your computer -->
  <rect class="box" x="40" y="80" width="180" height="80"/>
  <text class="hd" x="130" y="108">Your computer</text>
  <text class="mono" x="130" y="130">ping 1.1.1.1</text>

  <!-- the other machine -->
  <rect class="box" x="500" y="80" width="180" height="80"/>
  <text class="hd" x="590" y="108">The other machine</text>
  <text class="mono" x="590" y="130">1.1.1.1</text>

  <!-- success case -->
  <text class="hd" x="360" y="78" text-anchor="middle">Case A: it answers (reachable)</text>
  <line x1="220" y1="108" x2="500" y2="108" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="t" x="260" y="100">request: "are you there?"</text>
  <line x1="500" y1="140" x2="220" y2="140" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="t" x="280" y="158">reply: "yes, I'm here"</text>

  <!-- output success -->
  <rect class="box" x="40" y="200" width="640" height="70"/>
  <text class="mono" x="360" y="226">Reply from 1.1.1.1: time=14ms   Reply: time=15ms   Reply: time=14ms</text>
  <text class="tc" x="360" y="250">A REPLY means it is reachable. "time" is the round-trip time (how long</text>
  <text class="tc" x="360" y="264">the request took to get there and the answer to come back).</text>

  <!-- timeout case -->
  <rect class="box" x="40" y="300" width="640" height="90"/>
  <text class="hd" x="360" y="324">Case B: nothing comes back (Request timed out)</text>
  <text class="mono" x="360" y="348">Request timed out.   Request timed out.   Request timed out.</text>
  <text class="tc" x="360" y="370">A TIMEOUT means no reply came back. Something between you and</text>
  <text class="tc" x="360" y="384">the target is broken, OR the target is off / ignoring pings.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
