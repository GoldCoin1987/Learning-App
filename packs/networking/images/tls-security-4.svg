<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" font-family="sans-serif" font-size="13">
  <rect width="720" height="340" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="bold">Two kinds of keys</text>

  <!-- LEFT: symmetric -->
  <rect x="30" y="50" width="310" height="260" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="185" y="76" text-anchor="middle" font-size="14" font-weight="bold">Symmetric: one shared secret key</text>

  <!-- one key shape -->
  <circle cx="130" cy="120" r="14" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <line x1="143" y1="120" x2="200" y2="120" stroke="#000" stroke-width="1.5"/>
  <line x1="185" y1="120" x2="185" y2="132" stroke="#000" stroke-width="1.5"/>
  <line x1="200" y1="120" x2="200" y2="134" stroke="#000" stroke-width="1.5"/>
  <text x="240" y="124" font-size="11">same key</text>

  <text x="60" y="172" font-size="12">Same key both LOCKS and UNLOCKS.</text>
  <text x="60" y="196" font-size="12">+ Very fast.</text>
  <text x="60" y="220" font-size="12">- Both sides must somehow share</text>
  <text x="60" y="236" font-size="12">   the SAME secret first.</text>
  <text x="60" y="270" font-size="11">Like one house key two people copy.</text>
  <text x="60" y="290" font-size="11">Problem: how to copy it over an open line?</text>

  <!-- RIGHT: asymmetric -->
  <rect x="380" y="50" width="310" height="260" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="535" y="76" text-anchor="middle" font-size="14" font-weight="bold">Public-key: a public + private pair</text>

  <!-- public lock (open) -->
  <rect x="430" y="100" width="36" height="28" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <path d="M 437 100 v -8 a 11 11 0 0 1 22 0" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="448" y="146" text-anchor="middle" font-size="11">PUBLIC</text>
  <text x="448" y="160" text-anchor="middle" font-size="10">lock (shareable)</text>

  <!-- private key -->
  <circle cx="610" cy="112" r="13" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <line x1="622" y1="112" x2="666" y2="112" stroke="#000" stroke-width="1.5"/>
  <line x1="652" y1="112" x2="652" y2="123" stroke="#000" stroke-width="1.5"/>
  <text x="630" y="146" text-anchor="middle" font-size="11">PRIVATE</text>
  <text x="630" y="160" text-anchor="middle" font-size="10">key (kept secret)</text>

  <text x="410" y="196" font-size="12">Anyone can snap the PUBLIC lock shut...</text>
  <text x="410" y="216" font-size="12">...only the PRIVATE key opens it.</text>
  <text x="410" y="244" font-size="12">+ Solves sharing a secret over</text>
  <text x="410" y="260" font-size="12">   an open line.</text>
  <text x="410" y="288" font-size="11">- Slower, so used only to set things up.</text>

  <text x="360" y="330" text-anchor="middle" font-size="12">TLS uses BOTH: public-key to agree on a secret, then the fast shared key for the rest. (See next diagram.)</text>
</svg>
