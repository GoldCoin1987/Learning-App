<svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380" font-family="sans-serif" font-size="13">
  <rect width="700" height="380" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="bold">Certificate chain of trust</text>
  <text x="350" y="46" text-anchor="middle" font-size="12">Each level vouches for the one below; your browser trusts the top.</text>

  <!-- Root CA -->
  <rect x="250" y="62" width="200" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="350" y="86" text-anchor="middle" font-weight="bold">Root CA</text>
  <text x="350" y="104" text-anchor="middle" font-size="11">pre-installed &amp; trusted</text>

  <!-- arrow signs -->
  <line x1="350" y1="118" x2="350" y2="150" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="362" y="138" font-size="10">signs</text>

  <!-- Intermediate CA -->
  <rect x="250" y="150" width="200" height="56" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="350" y="174" text-anchor="middle" font-weight="bold">Intermediate CA</text>
  <text x="350" y="192" text-anchor="middle" font-size="11">a helper authority</text>

  <line x1="350" y1="206" x2="350" y2="238" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="362" y="226" font-size="10">signs</text>

  <!-- Leaf / site cert -->
  <rect x="250" y="238" width="200" height="56" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="350" y="262" text-anchor="middle" font-weight="bold">bank.com certificate</text>
  <text x="350" y="280" text-anchor="middle" font-size="11">"this key = bank.com"</text>

  <!-- Browser checks -->
  <rect x="40" y="150" width="170" height="144" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="125" y="174" text-anchor="middle" font-weight="bold">Your browser</text>
  <text x="125" y="194" text-anchor="middle" font-size="11">checks:</text>
  <text x="52" y="216" font-size="11">- name matches site?</text>
  <text x="52" y="236" font-size="11">- not expired?</text>
  <text x="52" y="256" font-size="11">- chain reaches a</text>
  <text x="62" y="272" font-size="11">trusted root?</text>
  <text x="52" y="290" font-size="11">- not revoked?</text>

  <!-- arrow from browser to leaf -->
  <line x1="210" y1="266" x2="250" y2="266" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="20" y="334" font-size="12">A Certificate Authority (CA) is a trusted third party that vouches "this public key really belongs to bank.com."</text>
  <text x="20" y="356" font-size="12">If every check passes, the browser shows the padlock. If any fails, it shows a warning.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
  </defs>
</svg>
