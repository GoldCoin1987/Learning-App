<svg xmlns="http://www.w3.org/2000/svg" width="700" height="320" viewBox="0 0 700 320" font-family="sans-serif" font-size="13">
  <rect width="700" height="320" fill="#ffffff"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold">SLAAC: a device builds its own address</text>

  <!-- Router box -->
  <rect x="40" y="70" width="150" height="70" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="115" y="100" text-anchor="middle" font-weight="bold">Router</text>
  <text x="115" y="122" text-anchor="middle" font-size="11">announces the</text>
  <text x="115" y="138" text-anchor="middle" font-size="11">/64 prefix</text>

  <!-- Device box -->
  <rect x="510" y="70" width="150" height="70" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="585" y="100" text-anchor="middle" font-weight="bold">Device</text>
  <text x="585" y="122" text-anchor="middle" font-size="11">(laptop, phone)</text>

  <!-- arrows -->
  <line x1="190" y1="95" x2="505" y2="95" stroke="#000000" stroke-width="1.5"/>
  <polygon points="505,95 493,90 493,100" fill="#000000"/>
  <text x="350" y="88" text-anchor="middle" font-size="11">"the prefix here is 2001:db8:1::/64"</text>

  <line x1="510" y1="125" x2="195" y2="125" stroke="#000000" stroke-width="1.5"/>
  <polygon points="195,125 207,120 207,130" fill="#000000"/>
  <text x="350" y="140" text-anchor="middle" font-size="11">device asks (Router Solicitation) / router replies (RA)</text>

  <!-- equation -->
  <text x="350" y="195" text-anchor="middle" font-weight="bold" font-size="14">Address = network prefix + interface ID</text>

  <rect x="120" y="215" width="200" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="220" y="240" text-anchor="middle" font-size="13">2001:db8:1:: /64</text>
  <text x="335" y="240" text-anchor="middle" font-size="18" font-weight="bold">+</text>

  <rect x="350" y="215" width="230" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="465" y="240" text-anchor="middle" font-size="13">::1a2b:3c4d:5e6f:7a8b</text>

  <text x="350" y="290" text-anchor="middle" font-size="12">No server needed. (DHCPv6 is the alternative: a server hands out addresses.)</text>
</svg>
