<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320" font-family="monospace" font-size="12">
  <rect width="640" height="320" fill="#0f1117"/>
  <text x="320" y="24" fill="#e6e6e6" font-size="15" text-anchor="middle">VXLAN: original L2 frame wrapped for transport over an L3 underlay</text>

  <!-- Original inner frame -->
  <text x="20" y="58" fill="#8ab4f8">Inner (tenant) frame, untouched:</text>
  <rect x="20" y="68" width="120" height="36" fill="#1e3a5f" stroke="#8ab4f8"/>
  <text x="80" y="91" fill="#e6e6e6" text-anchor="middle">Eth | IP</text>
  <rect x="140" y="68" width="200" height="36" fill="#16242f" stroke="#8ab4f8"/>
  <text x="240" y="91" fill="#e6e6e6" text-anchor="middle">tenant payload (L2-over-L3)</text>

  <!-- Arrow -->
  <text x="320" y="138" fill="#9aa" text-anchor="middle">encapsulate (push 50B of outer headers)  v</text>

  <!-- Outer packet on the wire -->
  <text x="20" y="172" fill="#f6c244">Outer packet on the underlay wire:</text>
  <g>
    <rect x="20" y="184" width="90"  height="44" fill="#3a2f12" stroke="#f6c244"/>
    <text x="65"  y="205" fill="#fff" text-anchor="middle">Outer</text>
    <text x="65"  y="220" fill="#fff" text-anchor="middle">Eth</text>

    <rect x="110" y="184" width="100" height="44" fill="#3a2f12" stroke="#f6c244"/>
    <text x="160" y="205" fill="#fff" text-anchor="middle">Outer IP</text>
    <text x="160" y="220" fill="#fff" text-anchor="middle">(host->host)</text>

    <rect x="210" y="184" width="90"  height="44" fill="#3a2f12" stroke="#f6c244"/>
    <text x="255" y="205" fill="#fff" text-anchor="middle">UDP</text>
    <text x="255" y="220" fill="#fff" text-anchor="middle">dport 4789</text>

    <rect x="300" y="184" width="100" height="44" fill="#5a3a12" stroke="#f6c244"/>
    <text x="350" y="205" fill="#fff" text-anchor="middle">VXLAN</text>
    <text x="350" y="220" fill="#fff" text-anchor="middle">VNI (24b)</text>

    <rect x="400" y="184" width="220" height="44" fill="#16242f" stroke="#8ab4f8"/>
    <text x="510" y="205" fill="#8ab4f8" text-anchor="middle">ENTIRE inner frame</text>
    <text x="510" y="220" fill="#8ab4f8" text-anchor="middle">(Eth|IP|payload) as opaque data</text>
  </g>

  <text x="20" y="262" fill="#9aa">VTEP A (host 1)  ====  IP routed underlay  ====  VTEP B (host 2)</text>
  <text x="20" y="284" fill="#9aa">VNI selects the tenant; underlay never inspects the inner frame.</text>
  <text x="20" y="306" fill="#6f8" >Result: a flat virtual L2 segment spanning many L3-separated hosts.</text>
</svg>
