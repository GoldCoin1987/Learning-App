<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="sans-serif" font-size="13">
  <rect width="640" height="380" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">TCP retransmission: a lost piece gets re-sent</text>

  <text x="120" y="56" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Sender</text>
  <text x="520" y="56" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Receiver</text>
  <line x1="120" y1="64" x2="120" y2="344" stroke="#000000" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="520" y1="64" x2="520" y2="344" stroke="#000000" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- piece 1 delivered, ACK back -->
  <line x1="120" y1="90" x2="520" y2="110" stroke="#000000" stroke-width="2"/>
  <polygon points="520,110 506,104 508,116" fill="#000000"/>
  <text x="320" y="86" text-anchor="middle" font-size="11" fill="#000000">piece 1</text>
  <line x1="520" y1="124" x2="120" y2="144" stroke="#000000" stroke-width="1.5"/>
  <polygon points="120,144 134,138 132,150" fill="#000000"/>
  <text x="320" y="120" text-anchor="middle" font-size="11" fill="#000000">ACK: got 1, send 2</text>

  <!-- piece 2 LOST -->
  <line x1="120" y1="170" x2="360" y2="182" stroke="#000000" stroke-width="2"/>
  <text x="240" y="166" text-anchor="middle" font-size="11" fill="#000000">piece 2</text>
  <text x="385" y="188" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">X  lost!</text>
  <line x1="352" y1="174" x2="372" y2="190" stroke="#000000" stroke-width="2"/>
  <line x1="372" y1="174" x2="352" y2="190" stroke="#000000" stroke-width="2"/>

  <!-- no ACK arrives - timeout -->
  <text x="120" y="222" text-anchor="middle" font-size="11" fill="#000000">(no ACK for 2</text>
  <text x="120" y="238" text-anchor="middle" font-size="11" fill="#000000">arrives...)</text>
  <rect x="60" y="248" width="120" height="26" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="120" y="266" text-anchor="middle" font-size="11" fill="#000000">wait times out</text>

  <!-- resend piece 2 -->
  <line x1="120" y1="296" x2="520" y2="316" stroke="#000000" stroke-width="2"/>
  <polygon points="520,316 506,310 508,322" fill="#000000"/>
  <text x="320" y="292" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">piece 2 (re-sent)</text>

  <text x="320" y="356" text-anchor="middle" font-size="11" fill="#000000">No acknowledgment came back, so TCP assumes the piece was lost and sends it again.</text>
  <text x="320" y="372" text-anchor="middle" font-size="11" fill="#000000">This is why TCP is "reliable": nothing is skipped.</text>
</svg>
