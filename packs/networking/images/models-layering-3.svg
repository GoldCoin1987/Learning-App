<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="white"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="black">Encapsulation: each layer adds its own envelope (header)</text>

  <!-- Going down (sender) -->
  <text x="280" y="50" text-anchor="middle" font-size="12" fill="black">Going DOWN the sender's stack, data gains a header at each layer</text>

  <!-- Step 1: app data -->
  <text x="60" y="86" font-size="12" fill="black">Application:</text>
  <rect x="150" y="72" width="120" height="24" fill="white" stroke="black"/>
  <text x="210" y="89" text-anchor="middle" font-size="11" fill="black">Data</text>

  <!-- Step 2: + transport header = segment -->
  <text x="60" y="126" font-size="12" fill="black">Transport:</text>
  <rect x="150" y="112" width="40" height="24" fill="white" stroke="black"/>
  <text x="170" y="129" text-anchor="middle" font-size="10" fill="black">T-hdr</text>
  <rect x="190" y="112" width="120" height="24" fill="white" stroke="black"/>
  <text x="250" y="129" text-anchor="middle" font-size="11" fill="black">Data</text>
  <text x="430" y="129" text-anchor="middle" font-size="11" fill="black">= Segment</text>

  <!-- Step 3: + internet header = packet -->
  <text x="60" y="166" font-size="12" fill="black">Internet (IP):</text>
  <rect x="150" y="152" width="40" height="24" fill="white" stroke="black"/>
  <text x="170" y="169" text-anchor="middle" font-size="10" fill="black">IP-hdr</text>
  <rect x="190" y="152" width="40" height="24" fill="white" stroke="black"/>
  <text x="210" y="169" text-anchor="middle" font-size="10" fill="black">T-hdr</text>
  <rect x="230" y="152" width="120" height="24" fill="white" stroke="black"/>
  <text x="290" y="169" text-anchor="middle" font-size="11" fill="black">Data</text>
  <text x="430" y="169" text-anchor="middle" font-size="11" fill="black">= Packet</text>

  <!-- Step 4: + link header = frame -->
  <text x="60" y="206" font-size="12" fill="black">Link:</text>
  <rect x="150" y="192" width="40" height="24" fill="white" stroke="black"/>
  <text x="170" y="209" text-anchor="middle" font-size="10" fill="black">L-hdr</text>
  <rect x="190" y="192" width="40" height="24" fill="white" stroke="black"/>
  <text x="210" y="209" text-anchor="middle" font-size="10" fill="black">IP-hdr</text>
  <rect x="230" y="192" width="40" height="24" fill="white" stroke="black"/>
  <text x="250" y="209" text-anchor="middle" font-size="10" fill="black">T-hdr</text>
  <rect x="270" y="192" width="120" height="24" fill="white" stroke="black"/>
  <text x="330" y="209" text-anchor="middle" font-size="11" fill="black">Data</text>
  <text x="460" y="209" text-anchor="middle" font-size="11" fill="black">= Frame (on wire)</text>

  <!-- down arrow -->
  <line x1="40" y1="72" x2="40" y2="210" stroke="black"/>
  <polygon points="35,210 40,220 45,210" fill="black"/>

  <text x="280" y="252" text-anchor="middle" font-size="12" fill="black">Going UP the receiver's stack, each layer strips its own header (decapsulation)</text>
  <text x="280" y="288" text-anchor="middle" font-size="11" fill="black">A lower layer never reads the inner headers --</text>
  <text x="280" y="306" text-anchor="middle" font-size="11" fill="black">to the Link layer, everything inside is just payload to carry.</text>
  <text x="280" y="336" text-anchor="middle" font-size="11" fill="black">PDU names: Data -&gt; Segment -&gt; Packet -&gt; Frame</text>
</svg>
