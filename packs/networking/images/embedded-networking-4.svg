<svg xmlns="http://www.w3.org/2000/svg" width="680" height="340" viewBox="0 0 680 340" font-family="sans-serif" font-size="13">
  <rect width="680" height="340" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="16" font-weight="bold">Sleep to save battery: whisper briefly, then sleep</text>

  <!-- time axis -->
  <line x1="50" y1="240" x2="640" y2="240" stroke="#000000" stroke-width="2"/>
  <text x="635" y="262" text-anchor="end" fill="#333">time</text>
  <text x="40" y="120" text-anchor="middle" fill="#333" transform="rotate(-90 40 120)">power use</text>

  <!-- baseline (sleep) low line with short tall spikes (wake to send) -->
  <!-- sleeping low segments -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="50" y1="220" x2="150" y2="220"/>
    <line x1="190" y1="220" x2="330" y2="220"/>
    <line x1="370" y1="220" x2="510" y2="220"/>
    <line x1="550" y1="220" x2="640" y2="220"/>
  </g>

  <!-- wake spikes (tall, brief) -->
  <g fill="#ffffff" stroke="#000000" stroke-width="2">
    <rect x="150" y="90" width="40" height="130"/>
    <rect x="330" y="90" width="40" height="130"/>
    <rect x="510" y="90" width="40" height="130"/>
  </g>

  <text x="170" y="80" text-anchor="middle" fill="#000000">send</text>
  <text x="350" y="80" text-anchor="middle" fill="#000000">send</text>
  <text x="530" y="80" text-anchor="middle" fill="#000000">send</text>

  <text x="100" y="212" text-anchor="middle" fill="#333">sleep</text>
  <text x="260" y="212" text-anchor="middle" fill="#333">sleep</text>
  <text x="440" y="212" text-anchor="middle" fill="#333">sleep</text>
  <text x="595" y="212" text-anchor="middle" fill="#333">sleep</text>

  <text x="340" y="296" text-anchor="middle" fill="#000000" font-style="italic">Radio on = expensive. Most of the day the device is asleep, drawing almost nothing.</text>
  <text x="340" y="318" text-anchor="middle" fill="#333">Brief tall spikes (transmit) + long low sleep = years on one small battery.</text>
</svg>
