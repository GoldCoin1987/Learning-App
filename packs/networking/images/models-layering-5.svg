<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 320" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="320" fill="white"/>
  <text x="270" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="black">Mailing a letter: every handler reads only its own label</text>

  <!-- letter -->
  <rect x="40" y="60" width="120" height="60" fill="white" stroke="black"/>
  <text x="100" y="86" text-anchor="middle" font-size="11" fill="black">Letter</text>
  <text x="100" y="104" text-anchor="middle" font-size="11" fill="black">(the message)</text>
  <text x="100" y="140" text-anchor="middle" font-size="11" fill="black">Application data</text>

  <line x1="165" y1="90" x2="195" y2="90" stroke="black"/>
  <polygon points="195,85 205,90 195,95" fill="black"/>

  <!-- envelope -->
  <rect x="210" y="55" width="130" height="70" fill="white" stroke="black"/>
  <rect x="222" y="67" width="106" height="46" fill="white" stroke="black"/>
  <text x="275" y="86" text-anchor="middle" font-size="11" fill="black">Letter inside</text>
  <text x="275" y="104" text-anchor="middle" font-size="11" fill="black">+ address label</text>
  <text x="275" y="142" text-anchor="middle" font-size="11" fill="black">header added</text>

  <line x1="345" y1="90" x2="375" y2="90" stroke="black"/>
  <polygon points="375,85 385,90 375,95" fill="black"/>

  <!-- mailbag / truck -->
  <rect x="390" y="55" width="130" height="70" fill="white" stroke="black"/>
  <rect x="402" y="67" width="106" height="46" fill="white" stroke="black"/>
  <text x="455" y="86" text-anchor="middle" font-size="11" fill="black">Bag of letters</text>
  <text x="455" y="104" text-anchor="middle" font-size="11" fill="black">+ truck route</text>
  <text x="455" y="142" text-anchor="middle" font-size="11" fill="black">another header</text>

  <text x="270" y="190" text-anchor="middle" font-size="12" fill="black">The truck driver never opens the envelope.</text>
  <text x="270" y="210" text-anchor="middle" font-size="12" fill="black">The mail sorter never reads the letter.</text>
  <text x="270" y="230" text-anchor="middle" font-size="12" fill="black">Each handler trusts the layer beside it and reads only its own label.</text>

  <line x1="270" y1="250" x2="270" y2="270" stroke="black"/>
  <polygon points="265,268 270,278 275,268" fill="black"/>
  <text x="270" y="300" text-anchor="middle" font-size="12" font-weight="bold" fill="black">That is exactly how network layers work.</text>
</svg>
