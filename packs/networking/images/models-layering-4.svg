<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="600" height="400" fill="white"/>
  <text x="300" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="black">A message: down the sender, across the wire, up the receiver</text>

  <!-- Sender stack -->
  <text x="110" y="58" text-anchor="middle" font-weight="bold" fill="black">Your computer</text>
  <rect x="30" y="70" width="160" height="30" fill="white" stroke="black"/><text x="110" y="90" text-anchor="middle" font-size="12" fill="black">Application</text>
  <rect x="30" y="100" width="160" height="30" fill="white" stroke="black"/><text x="110" y="120" text-anchor="middle" font-size="12" fill="black">Transport (ports)</text>
  <rect x="30" y="130" width="160" height="30" fill="white" stroke="black"/><text x="110" y="150" text-anchor="middle" font-size="12" fill="black">Internet (addresses)</text>
  <rect x="30" y="160" width="160" height="30" fill="white" stroke="black"/><text x="110" y="180" text-anchor="middle" font-size="12" fill="black">Link</text>
  <text x="110" y="212" text-anchor="middle" font-size="11" fill="black">data goes DOWN,</text>
  <text x="110" y="226" text-anchor="middle" font-size="11" fill="black">gaining headers</text>
  <line x1="110" y1="70" x2="110" y2="190" stroke="black" stroke-dasharray="2,2"/>
  <polygon points="105,188 110,196 115,188" fill="black"/>

  <!-- Receiver stack -->
  <text x="490" y="58" text-anchor="middle" font-weight="bold" fill="black">Other computer</text>
  <rect x="410" y="70" width="160" height="30" fill="white" stroke="black"/><text x="490" y="90" text-anchor="middle" font-size="12" fill="black">Application</text>
  <rect x="410" y="100" width="160" height="30" fill="white" stroke="black"/><text x="490" y="120" text-anchor="middle" font-size="12" fill="black">Transport (ports)</text>
  <rect x="410" y="130" width="160" height="30" fill="white" stroke="black"/><text x="490" y="150" text-anchor="middle" font-size="12" fill="black">Internet (addresses)</text>
  <rect x="410" y="160" width="160" height="30" fill="white" stroke="black"/><text x="490" y="180" text-anchor="middle" font-size="12" fill="black">Link</text>
  <text x="490" y="212" text-anchor="middle" font-size="11" fill="black">data goes UP,</text>
  <text x="490" y="226" text-anchor="middle" font-size="11" fill="black">shedding headers</text>
  <line x1="490" y1="190" x2="490" y2="70" stroke="black" stroke-dasharray="2,2"/>
  <polygon points="485,72 490,64 495,72" fill="black"/>

  <!-- the wire across the bottom of the link layers -->
  <line x1="190" y1="175" x2="300" y2="260" stroke="black"/>
  <line x1="300" y1="260" x2="410" y2="175" stroke="black"/>
  <rect x="250" y="250" width="100" height="30" fill="white" stroke="black"/>
  <text x="300" y="270" text-anchor="middle" font-size="12" fill="black">the network</text>
  <text x="300" y="300" text-anchor="middle" font-size="11" fill="black">(wires, Wi-Fi, routers in between)</text>

  <text x="300" y="340" text-anchor="middle" font-size="12" fill="black">Same layer "talks" to same layer, but the bits really travel</text>
  <text x="300" y="358" text-anchor="middle" font-size="12" fill="black">all the way down one side and all the way up the other.</text>
  <text x="300" y="384" text-anchor="middle" font-size="11" fill="black">Addresses pick the machine; ports pick the program (details in later lessons).</text>
</svg>
