<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" font-family="sans-serif" font-size="13">
  <rect width="680" height="320" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="bold">The subnet mask 255.255.255.0 lines up under the address</text>

  <!-- Address row -->
  <text x="70" y="76" text-anchor="end" font-size="12" font-weight="bold">Address</text>
  <rect x="90" y="58" width="130" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <rect x="220" y="58" width="130" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <rect x="350" y="58" width="130" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <rect x="480" y="58" width="130" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="155" y="84" text-anchor="middle" font-size="15" font-weight="bold">192</text>
  <text x="285" y="84" text-anchor="middle" font-size="15" font-weight="bold">168</text>
  <text x="415" y="84" text-anchor="middle" font-size="15" font-weight="bold">1</text>
  <text x="545" y="84" text-anchor="middle" font-size="15" font-weight="bold">5</text>

  <!-- Mask row -->
  <text x="70" y="138" text-anchor="end" font-size="12" font-weight="bold">Mask</text>
  <rect x="90" y="120" width="130" height="40" fill="url(#hatch)" stroke="#000000" stroke-width="1.5"/>
  <rect x="220" y="120" width="130" height="40" fill="url(#hatch)" stroke="#000000" stroke-width="1.5"/>
  <rect x="350" y="120" width="130" height="40" fill="url(#hatch)" stroke="#000000" stroke-width="1.5"/>
  <rect x="480" y="120" width="130" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="155" y="146" text-anchor="middle" font-size="15" font-weight="bold">255</text>
  <text x="285" y="146" text-anchor="middle" font-size="15" font-weight="bold">255</text>
  <text x="415" y="146" text-anchor="middle" font-size="15" font-weight="bold">255</text>
  <text x="545" y="146" text-anchor="middle" font-size="15" font-weight="bold">0</text>

  <!-- Labels under -->
  <text x="285" y="184" text-anchor="middle" font-size="11">255 = "all 8 bits are network" (locked)</text>
  <text x="545" y="184" text-anchor="middle" font-size="11">0 = "these bits are host" (free)</text>

  <!-- Bracket showing 24 -->
  <line x1="90" y1="200" x2="480" y2="200" stroke="#000000" stroke-width="1.5"/>
  <line x1="90" y1="196" x2="90" y2="204" stroke="#000000" stroke-width="1.5"/>
  <line x1="480" y1="196" x2="480" y2="204" stroke="#000000" stroke-width="1.5"/>
  <text x="285" y="220" text-anchor="middle" font-size="12" font-weight="bold">three 255s = 24 network bits</text>

  <!-- Equivalence box -->
  <rect x="90" y="240" width="520" height="64" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="350" y="266" text-anchor="middle" font-size="14" font-weight="bold">255.255.255.0  is the SAME thing as  /24</text>
  <text x="350" y="290" text-anchor="middle" font-size="11">Both say: 24 bits for the network, 8 bits for hosts. Two ways to write one idea.</text>

  <defs>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#ffffff"/>
      <path d="M0,8 L8,0" stroke="#000000" stroke-width="1"/>
    </pattern>
  </defs>
</svg>
