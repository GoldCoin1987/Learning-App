<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="monospace" font-size="12">
  <rect width="640" height="380" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="15" font-weight="bold">TCP 3-Way Handshake &amp; Teardown</text>

  <!-- lifelines -->
  <text x="150" y="48" text-anchor="middle" font-weight="bold">Client</text>
  <text x="490" y="48" text-anchor="middle" font-weight="bold">Server</text>
  <line x1="150" y1="54" x2="150" y2="356" stroke="#999" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="490" y1="54" x2="490" y2="356" stroke="#999" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- SYN -->
  <line x1="150" y1="80" x2="490" y2="100" stroke="#1d4ed8" stroke-width="2"/>
  <polygon points="490,100 478,94 480,104" fill="#1d4ed8"/>
  <text x="320" y="76" text-anchor="middle" fill="#1d4ed8">SYN  seq=x</text>

  <!-- SYN-ACK -->
  <line x1="490" y1="120" x2="150" y2="140" stroke="#15803d" stroke-width="2"/>
  <polygon points="150,140 162,134 160,144" fill="#15803d"/>
  <text x="320" y="116" text-anchor="middle" fill="#15803d">SYN,ACK  seq=y ack=x+1</text>

  <!-- ACK -->
  <line x1="150" y1="160" x2="490" y2="180" stroke="#1d4ed8" stroke-width="2"/>
  <polygon points="490,180 478,174 480,184" fill="#1d4ed8"/>
  <text x="320" y="156" text-anchor="middle" fill="#1d4ed8">ACK  ack=y+1</text>

  <text x="320" y="202" text-anchor="middle" font-size="11" fill="#444">--- ESTABLISHED: reliable byte stream ---</text>

  <!-- FIN -->
  <line x1="150" y1="232" x2="490" y2="252" stroke="#b91c1c" stroke-width="2"/>
  <polygon points="490,252 478,246 480,256" fill="#b91c1c"/>
  <text x="320" y="228" text-anchor="middle" fill="#b91c1c">FIN,ACK</text>

  <!-- ACK -->
  <line x1="490" y1="272" x2="150" y2="292" stroke="#b91c1c" stroke-width="2"/>
  <polygon points="150,292 162,286 160,296" fill="#b91c1c"/>
  <text x="320" y="268" text-anchor="middle" fill="#b91c1c">ACK</text>

  <!-- FIN back -->
  <line x1="490" y1="300" x2="150" y2="320" stroke="#b91c1c" stroke-width="2"/>
  <polygon points="150,320 162,314 160,324" fill="#b91c1c"/>
  <text x="320" y="296" text-anchor="middle" fill="#b91c1c">FIN,ACK</text>

  <text x="150" y="348" text-anchor="middle" font-size="10" fill="#b91c1c">TIME_WAIT (2*MSL)</text>
  <text x="490" y="348" text-anchor="middle" font-size="10" fill="#444">final ACK -&gt; CLOSED</text>
</svg>
