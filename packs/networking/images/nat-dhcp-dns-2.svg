<svg xmlns="http://www.w3.org/2000/svg" width="660" height="360" font-family="sans-serif" font-size="12">
  <rect width="660" height="360" fill="#ffffff"/>
  <text x="330" y="24" text-anchor="middle" font-size="16" font-weight="bold">Recursive DNS Resolution: www.example.com</text>
  <!-- boxes -->
  <rect x="20"  y="60" width="120" height="46" rx="6" fill="#eef3fb" stroke="#345"/>
  <text x="80" y="80" text-anchor="middle">Stub resolver</text>
  <text x="80" y="98" text-anchor="middle" font-size="11">(your host)</text>

  <rect x="20" y="160" width="120" height="46" rx="6" fill="#eef3fb" stroke="#345"/>
  <text x="80" y="180" text-anchor="middle">Recursive</text>
  <text x="80" y="198" text-anchor="middle" font-size="11">resolver / cache</text>

  <rect x="500" y="60"  width="140" height="40" rx="6" fill="#fdeee0" stroke="#a60"/>
  <text x="570" y="85" text-anchor="middle">Root (.)</text>
  <rect x="500" y="150" width="140" height="40" rx="6" fill="#fdeee0" stroke="#a60"/>
  <text x="570" y="175" text-anchor="middle">TLD (.com)</text>
  <rect x="500" y="240" width="140" height="40" rx="6" fill="#fdeee0" stroke="#a60"/>
  <text x="570" y="265" text-anchor="middle">Authoritative</text>

  <!-- stub -> recursive -->
  <line x1="80" y1="106" x2="80" y2="158" stroke="#333" marker-end="url(#b)"/>
  <text x="86" y="135">recursive query</text>
  <!-- recursive iterative queries -->
  <line x1="140" y1="175" x2="498" y2="82"  stroke="#a60" marker-end="url(#b)"/>
  <text x="250" y="120" fill="#a60">1. ? -> referral to .com NS</text>
  <line x1="140" y1="183" x2="498" y2="172" stroke="#a60" marker-end="url(#b)"/>
  <text x="250" y="205" fill="#a60">2. ? -> referral to example.com NS</text>
  <line x1="140" y1="191" x2="498" y2="262" stroke="#2c7a2c" marker-end="url(#b)"/>
  <text x="250" y="285" fill="#2c7a2c">3. ? -> A record (authoritative answer)</text>
  <!-- answer back to stub -->
  <line x1="60" y1="158" x2="60" y2="108" stroke="#2c7a2c" marker-end="url(#b)"/>
  <text x="0" y="135" fill="#2c7a2c" font-size="11">cached</text>
  <text x="330" y="340" text-anchor="middle" font-style="italic" fill="#555">Iterative side returns referrals; resolver chases them, then caches per TTL</text>
  <defs>
    <marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
</svg>
