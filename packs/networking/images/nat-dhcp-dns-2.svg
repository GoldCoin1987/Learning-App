<svg xmlns="http://www.w3.org/2000/svg" width="680" height="400" viewBox="0 0 680 400" font-family="sans-serif" font-size="13">
  <rect width="680" height="400" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="16" font-weight="bold">NAT: many devices share ONE public address</text>

  <!-- private devices -->
  <rect x="30" y="70" width="120" height="36" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="90" y="93" text-anchor="middle" font-size="11">Laptop  192.168.1.10</text>
  <rect x="30" y="130" width="120" height="36" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="90" y="153" text-anchor="middle" font-size="11">Phone  192.168.1.11</text>
  <rect x="30" y="190" width="120" height="36" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="90" y="213" text-anchor="middle" font-size="11">TV  192.168.1.12</text>
  <text x="90" y="246" text-anchor="middle" font-size="10" font-style="italic">private addresses</text>

  <!-- router -->
  <rect x="250" y="110" width="150" height="86" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="325" y="140" text-anchor="middle" font-weight="bold" font-size="12">Home router</text>
  <text x="325" y="160" text-anchor="middle" font-size="10">rewrites addresses</text>
  <text x="325" y="178" text-anchor="middle" font-size="10">(does the NAT)</text>

  <!-- internet -->
  <rect x="510" y="120" width="140" height="66" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="580" y="150" text-anchor="middle" font-weight="bold" font-size="12">Internet</text>
  <text x="580" y="170" text-anchor="middle" font-size="10">sees only 203.0.113.7</text>

  <!-- arrows in -->
  <line x1="150" y1="88"  x2="248" y2="130" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="148" x2="248" y2="150" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="208" x2="248" y2="172" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- arrow out -->
  <line x1="400" y1="153" x2="508" y2="153" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="455" y="145" text-anchor="middle" font-size="10">one public IP</text>

  <!-- port-mapping table -->
  <text x="340" y="280" text-anchor="middle" font-size="12" font-weight="bold">The router's port-mapping table (so replies come back right)</text>
  <rect x="120" y="292" width="440" height="86" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <line x1="120" y1="316" x2="560" y2="316" stroke="#000000" stroke-width="1"/>
  <line x1="340" y1="292" x2="340" y2="378" stroke="#000000" stroke-width="1"/>
  <text x="230" y="309" text-anchor="middle" font-size="11" font-weight="bold">Inside (private:port)</text>
  <text x="450" y="309" text-anchor="middle" font-size="11" font-weight="bold">Outside (public:port)</text>
  <text x="230" y="335" text-anchor="middle" font-size="11">192.168.1.10 : 5001</text>
  <text x="450" y="335" text-anchor="middle" font-size="11">203.0.113.7 : 40001</text>
  <text x="230" y="356" text-anchor="middle" font-size="11">192.168.1.11 : 5001</text>
  <text x="450" y="356" text-anchor="middle" font-size="11">203.0.113.7 : 40002</text>
  <text x="230" y="374" text-anchor="middle" font-size="11">192.168.1.12 : 6200</text>
  <text x="450" y="374" text-anchor="middle" font-size="11">203.0.113.7 : 40003</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
