<svg xmlns="http://www.w3.org/2000/svg" width="680" height="340" viewBox="0 0 680 340" font-family="sans-serif" font-size="13">
  <rect width="680" height="340" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Stateless HTTP: the server forgets you between requests</text>
  <text x="340" y="48" text-anchor="middle" font-size="12" fill="#000000">A cookie is a little ID note that reminds the server who you are.</text>

  <!-- Browser -->
  <rect x="40" y="80" width="150" height="200" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="115" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">Your browser</text>

  <!-- Server -->
  <rect x="490" y="80" width="150" height="200" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="565" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">Server</text>

  <!-- step 1 login -->
  <line x1="190" y1="130" x2="490" y2="130" stroke="#000000" stroke-width="1.5" marker-end="url(#ap7arrow)"/>
  <text x="340" y="123" text-anchor="middle" font-size="11" fill="#000000">1. log in (username + password)</text>

  <!-- step 2 set-cookie -->
  <line x1="490" y1="165" x2="190" y2="165" stroke="#000000" stroke-width="1.5" marker-end="url(#ap7arrow)"/>
  <text x="340" y="158" text-anchor="middle" font-size="11" fill="#000000">2. "OK. Here is your ticket:"</text>
  <text x="340" y="182" text-anchor="middle" font-size="11" font-weight="bold" fill="#000000">Set-Cookie: id=A7X9</text>

  <!-- step 3 later request -->
  <line x1="190" y1="225" x2="490" y2="225" stroke="#000000" stroke-width="1.5" marker-end="url(#ap7arrow)"/>
  <text x="340" y="218" text-anchor="middle" font-size="11" fill="#000000">3. next page + show the ticket back</text>
  <text x="340" y="242" text-anchor="middle" font-size="11" font-weight="bold" fill="#000000">Cookie: id=A7X9</text>

  <!-- step 4 -->
  <line x1="490" y1="265" x2="190" y2="265" stroke="#000000" stroke-width="1.5" marker-end="url(#ap7arrow)"/>
  <text x="340" y="280" text-anchor="middle" font-size="11" fill="#000000">4. "Ah, ticket A7X9 - welcome back!"</text>

  <text x="340" y="312" text-anchor="middle" font-size="11" fill="#000000">Without the cookie, each request is a stranger. The cookie is how a login "remembers" you.</text>
  <text x="340" y="330" text-anchor="middle" font-size="11" fill="#000000">This is like a coat-check ticket: the server holds your session; the cookie is your claim stub.</text>

  <defs>
    <marker id="ap7arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
  </defs>
</svg>
