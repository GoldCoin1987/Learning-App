<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360" font-family="sans-serif" font-size="13">
  <rect width="600" height="360" fill="#ffffff"/>
  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">HTTPS = HTTP riding inside a TLS tunnel</text>
  <text x="300" y="48" text-anchor="middle" font-size="12" fill="#000000">Each layer sits on the one below it (the stack you have been building).</text>

  <!-- HTTP -->
  <rect x="150" y="70" width="300" height="55" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="300" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">HTTP</text>
  <text x="300" y="114" text-anchor="middle" font-size="11" fill="#000000">the web request / response language (this lesson)</text>

  <!-- TLS -->
  <rect x="150" y="135" width="300" height="55" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="300" y="159" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">TLS</text>
  <text x="300" y="179" text-anchor="middle" font-size="11" fill="#000000">the secure tunnel: scrambles + verifies (last lesson)</text>

  <!-- TCP -->
  <rect x="150" y="200" width="300" height="55" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="300" y="224" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">TCP</text>
  <text x="300" y="244" text-anchor="middle" font-size="11" fill="#000000">reliable delivery of bytes in order (transport lesson)</text>

  <!-- IP -->
  <rect x="150" y="265" width="300" height="50" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="300" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">IP</text>
  <text x="300" y="307" text-anchor="middle" font-size="11" fill="#000000">getting the packet to the right computer</text>

  <!-- down arrow -->
  <line x1="500" y1="80" x2="500" y2="305" stroke="#000000" stroke-width="2" marker-end="url(#ap5arrow)"/>
  <text x="525" y="200" text-anchor="middle" font-size="11" fill="#000000" transform="rotate(90 525 200)">sent down the stack</text>

  <text x="300" y="345" text-anchor="middle" font-size="12" fill="#000000">Plain HTTP skips the TLS box. HTTPS is the SAME HTTP, just wrapped in TLS first.</text>

  <defs>
    <marker id="ap5arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
  </defs>
</svg>
