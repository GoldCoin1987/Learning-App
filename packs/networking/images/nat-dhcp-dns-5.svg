<svg xmlns="http://www.w3.org/2000/svg" width="660" height="340" viewBox="0 0 660 340" font-family="sans-serif" font-size="13">
  <rect width="660" height="340" fill="#ffffff"/>
  <text x="330" y="26" text-anchor="middle" font-size="16" font-weight="bold">Port-forwarding: letting one connection IN from outside</text>

  <!-- internet side -->
  <rect x="30" y="120" width="130" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="95" y="148" text-anchor="middle" font-weight="bold" font-size="12">Visitor</text>
  <text x="95" y="166" text-anchor="middle" font-size="10">on the Internet</text>

  <!-- router -->
  <rect x="250" y="100" width="160" height="100" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="330" y="128" text-anchor="middle" font-weight="bold" font-size="12">Home router</text>
  <text x="330" y="150" text-anchor="middle" font-size="10">Rule: public port 443</text>
  <text x="330" y="166" text-anchor="middle" font-size="10">forward to</text>
  <text x="330" y="182" text-anchor="middle" font-size="10">192.168.1.20 : 443</text>

  <!-- inside server -->
  <rect x="500" y="120" width="130" height="60" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="565" y="144" text-anchor="middle" font-weight="bold" font-size="12">Your server</text>
  <text x="565" y="162" text-anchor="middle" font-size="10">192.168.1.20</text>
  <text x="565" y="176" text-anchor="middle" font-size="10">(private, inside)</text>

  <!-- arrows -->
  <line x1="160" y1="150" x2="248" y2="150" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="204" y="142" text-anchor="middle" font-size="10">incoming</text>
  <line x1="410" y1="150" x2="498" y2="150" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="454" y="142" text-anchor="middle" font-size="10">delivered</text>

  <!-- explanation -->
  <text x="330" y="232" text-anchor="middle" font-size="12" font-weight="bold">Why this is needed:</text>
  <text x="330" y="252" text-anchor="middle" font-size="11">Normally the router only lets in replies to connections that started INSIDE.</text>
  <text x="330" y="270" text-anchor="middle" font-size="11">An outside visitor starting a brand-new connection would be dropped...</text>

  <rect x="90" y="284" width="480" height="44" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="330" y="304" text-anchor="middle" font-size="11">...unless you add a port-forwarding rule that says</text>
  <text x="330" y="320" text-anchor="middle" font-size="11">"send anything arriving on this port to this inside device."</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
