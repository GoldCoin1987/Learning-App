<svg xmlns="http://www.w3.org/2000/svg" width="660" height="380" viewBox="0 0 660 380" font-family="sans-serif" font-size="13">
  <rect width="660" height="380" fill="#ffffff"/>
  <text x="330" y="26" text-anchor="middle" font-size="16" font-weight="bold">DHCP: getting an address automatically (DORA)</text>

  <!-- Client -->
  <rect x="60" y="56" width="120" height="44" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="120" y="80" text-anchor="middle" font-weight="bold" font-size="12">New device</text>
  <text x="120" y="95" text-anchor="middle" font-size="10">(no IP yet)</text>

  <!-- Server -->
  <rect x="480" y="56" width="120" height="44" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="540" y="80" text-anchor="middle" font-weight="bold" font-size="12">DHCP server</text>
  <text x="540" y="95" text-anchor="middle" font-size="10">(hands out IPs)</text>

  <!-- lifelines -->
  <line x1="120" y1="100" x2="120" y2="330" stroke="#000000" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="540" y1="100" x2="540" y2="330" stroke="#000000" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- D -->
  <line x1="120" y1="140" x2="540" y2="140" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="133" text-anchor="middle" font-size="12">1. DISCOVER  "Is any DHCP server out there?"</text>
  <text x="330" y="155" text-anchor="middle" font-size="10">(shouted to everyone, since it has no address)</text>

  <!-- O -->
  <line x1="540" y1="190" x2="120" y2="190" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="183" text-anchor="middle" font-size="12">2. OFFER  "You can use 192.168.1.50"</text>

  <!-- R -->
  <line x1="120" y1="240" x2="540" y2="240" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="233" text-anchor="middle" font-size="12">3. REQUEST  "Yes please, I'll take it"</text>

  <!-- A -->
  <line x1="540" y1="290" x2="120" y2="290" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="283" text-anchor="middle" font-size="12">4. ACK  "It's yours" + gateway + DNS + lease time</text>

  <text x="330" y="324" text-anchor="middle" font-size="11" font-weight="bold">Discover - Offer - Request - Acknowledge = "DORA"</text>

  <!-- analogy box -->
  <rect x="80" y="340" width="500" height="32" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="330" y="360" text-anchor="middle" font-size="11">Like a hotel front desk handing you a room key the moment you arrive.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
