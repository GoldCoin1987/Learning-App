<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" font-family="sans-serif" font-size="13">
  <rect width="640" height="320" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="16" font-weight="bold">DHCP DORA Exchange</text>
  <!-- lifelines -->
  <text x="120" y="56" text-anchor="middle" font-weight="bold">Client</text>
  <text x="520" y="56" text-anchor="middle" font-weight="bold">Server</text>
  <line x1="120" y1="64" x2="120" y2="300" stroke="#888" stroke-dasharray="4 4"/>
  <line x1="520" y1="64" x2="520" y2="300" stroke="#888" stroke-dasharray="4 4"/>
  <!-- Discover (broadcast) -->
  <line x1="120" y1="100" x2="520" y2="100" stroke="#c0392b" stroke-width="2" marker-end="url(#a)"/>
  <text x="320" y="94" text-anchor="middle" fill="#c0392b">1. DISCOVER (broadcast 255.255.255.255)</text>
  <!-- Offer -->
  <line x1="520" y1="150" x2="120" y2="150" stroke="#2c7a2c" stroke-width="2" marker-end="url(#a)"/>
  <text x="320" y="144" text-anchor="middle" fill="#2c7a2c">2. OFFER (proposed IP + options)</text>
  <!-- Request (broadcast) -->
  <line x1="120" y1="200" x2="520" y2="200" stroke="#c0392b" stroke-width="2" marker-end="url(#a)"/>
  <text x="320" y="194" text-anchor="middle" fill="#c0392b">3. REQUEST (broadcast, names chosen server)</text>
  <!-- Ack -->
  <line x1="520" y1="250" x2="120" y2="250" stroke="#2c7a2c" stroke-width="2" marker-end="url(#a)"/>
  <text x="320" y="244" text-anchor="middle" fill="#2c7a2c">4. ACK (lease confirmed: IP, mask, GW, DNS, T1/T2)</text>
  <text x="320" y="290" text-anchor="middle" font-style="italic" fill="#555">Renew (unicast) at T1=0.5; Rebind (broadcast) at T2=0.875</text>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
</svg>
