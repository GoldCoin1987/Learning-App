<svg xmlns="http://www.w3.org/2000/svg" width="700" height="320" viewBox="0 0 700 320" font-family="sans-serif" font-size="13">
  <rect width="700" height="320" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="bold">HTTPS = HTTP over TLS (the padlock)</text>

  <!-- browser bar -->
  <rect x="60" y="56" width="580" height="44" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <!-- padlock -->
  <rect x="86" y="70" width="18" height="16" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <path d="M 90 70 v -5 a 5 5 0 0 1 10 0 v 5" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="120" y="84" font-size="14" font-family="monospace">https://bank.com</text>
  <text x="500" y="84" font-size="11">&#8592; padlock = TLS is on</text>

  <!-- stack -->
  <text x="350" y="138" text-anchor="middle" font-size="13" font-weight="bold">What the padlock means underneath:</text>

  <rect x="200" y="156" width="300" height="34" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="350" y="178" text-anchor="middle" font-size="12">HTTP  (the web request: GET /account)</text>

  <rect x="200" y="190" width="300" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="350" y="212" text-anchor="middle" font-size="12">TLS  (wraps it: encrypt + verify identity)</text>

  <rect x="200" y="224" width="300" height="34" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="350" y="246" text-anchor="middle" font-size="12">TCP  (the reliable connection)</text>

  <text x="350" y="290" text-anchor="middle" font-size="12">Same HTTP you know, now carried inside a TLS tunnel. The "S" in HTTPS is exactly that TLS layer.</text>
</svg>
