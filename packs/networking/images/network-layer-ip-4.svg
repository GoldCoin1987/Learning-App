<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320" font-family="sans-serif" font-size="13">
  <rect width="640" height="320" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="15" font-weight="bold">Inside an IP packet: a label (header) wrapped around your data</text>

  <!-- Outer packet box -->
  <rect x="40" y="50" width="560" height="150" fill="#ffffff" stroke="#000000" stroke-width="2"/>

  <!-- Header region -->
  <rect x="40" y="50" width="300" height="150" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="190" y="70" text-anchor="middle" font-size="12" font-weight="bold">HEADER (the address label)</text>

  <!-- Header fields -->
  <g stroke="#000000" stroke-width="1" fill="#ffffff">
    <rect x="55" y="82" width="270" height="26"/>
    <rect x="55" y="110" width="270" height="26"/>
    <rect x="55" y="138" width="130" height="26"/>
    <rect x="195" y="138" width="130" height="26"/>
  </g>
  <text x="62" y="100" font-size="11">Source IP  -- who sent it</text>
  <text x="62" y="128" font-size="11">Destination IP  -- where it goes</text>
  <text x="62" y="156" font-size="10">TTL -- hop limit</text>
  <text x="202" y="156" font-size="10">Protocol -- what's inside</text>
  <text x="190" y="186" text-anchor="middle" font-size="9">(plus a header checksum that guards the label)</text>

  <!-- Payload region -->
  <rect x="340" y="50" width="260" height="150" fill="url(#dots)" stroke="#000000" stroke-width="1.5"/>
  <text x="470" y="120" text-anchor="middle" font-size="13" font-weight="bold">DATA</text>
  <text x="470" y="140" text-anchor="middle" font-size="11">(the payload being</text>
  <text x="470" y="156" text-anchor="middle" font-size="11">carried, e.g. part of</text>
  <text x="470" y="172" text-anchor="middle" font-size="11">a web page)</text>

  <!-- Analogy line -->
  <text x="320" y="240" text-anchor="middle" font-size="12">The header is like the address written on an envelope;</text>
  <text x="320" y="260" text-anchor="middle" font-size="12">the data is the letter sealed inside.</text>
  <text x="320" y="290" text-anchor="middle" font-size="11" font-weight="bold">Routers only need to read the header to forward the packet.</text>

  <defs>
    <pattern id="dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#ffffff"/>
      <circle cx="5" cy="5" r="1.2" fill="#000000"/>
    </pattern>
  </defs>
</svg>
