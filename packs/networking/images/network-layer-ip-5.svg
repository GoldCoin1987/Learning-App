<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" font-family="sans-serif" font-size="13">
  <rect width="680" height="300" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="bold">TTL: a hop counter so lost packets can't circle forever</text>

  <text x="340" y="50" text-anchor="middle" font-size="11">Each router subtracts 1 from the TTL. When it reaches 0, the packet is dropped.</text>

  <!-- Routers -->
  <g stroke="#000000" stroke-width="2" fill="#ffffff">
    <circle cx="90"  cy="130" r="30"/>
    <circle cx="250" cy="130" r="30"/>
    <circle cx="410" cy="130" r="30"/>
    <circle cx="570" cy="130" r="30"/>
  </g>
  <text x="90"  y="135" text-anchor="middle" font-weight="bold">R1</text>
  <text x="250" y="135" text-anchor="middle" font-weight="bold">R2</text>
  <text x="410" y="135" text-anchor="middle" font-weight="bold">R3</text>
  <text x="570" y="135" text-anchor="middle" font-weight="bold">R4</text>

  <!-- Arrows between routers -->
  <line x1="120" y1="130" x2="220" y2="130" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="280" y1="130" x2="380" y2="130" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="130" x2="540" y2="130" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- TTL value tags on each link -->
  <g stroke="#000000" stroke-width="1.5" fill="#ffffff">
    <rect x="138" y="86" width="64" height="26"/>
    <rect x="298" y="86" width="64" height="26"/>
    <rect x="458" y="86" width="64" height="26"/>
  </g>
  <text x="170" y="104" text-anchor="middle" font-size="12" font-weight="bold">TTL=3</text>
  <text x="330" y="104" text-anchor="middle" font-size="12" font-weight="bold">TTL=2</text>
  <text x="490" y="104" text-anchor="middle" font-size="12" font-weight="bold">TTL=1</text>

  <!-- At R4 it hits 0 and is dropped -->
  <text x="570" y="180" text-anchor="middle" font-size="12" font-weight="bold">TTL=0</text>
  <line x1="555" y1="195" x2="585" y2="225" stroke="#000000" stroke-width="2.5"/>
  <line x1="585" y1="195" x2="555" y2="225" stroke="#000000" stroke-width="2.5"/>
  <text x="570" y="248" text-anchor="middle" font-size="11" font-weight="bold">DROPPED</text>

  <text x="340" y="285" text-anchor="middle" font-size="11">Without TTL, a packet stuck in a loop would travel forever, clogging the network.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
