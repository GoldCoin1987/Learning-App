<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd  { font-size:13px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .t   { font-size:12px; fill:#000000; }
    .tc  { font-size:12px; fill:#000000; text-anchor:middle; }
    .mono { font-size:12px; fill:#000000; text-anchor:middle; font-family:monospace; }
    .lie { font-size:12px; fill:#000000; font-style:italic; }
  </style>
  <text class="ttl" x="380" y="26">ARP spoofing: an attacker lies about who owns an IP</text>

  <!-- Victim -->
  <rect class="box" x="30" y="60" width="180" height="66"/>
  <text class="hd" x="120" y="83">Victim (You)</text>
  <text class="mono" x="120" y="103">192.168.1.10</text>
  <text class="tc" x="120" y="119">wants the gateway</text>

  <!-- Real gateway -->
  <rect class="box" x="550" y="60" width="180" height="66"/>
  <text class="hd" x="640" y="83">Real gateway</text>
  <text class="mono" x="640" y="103">192.168.1.1</text>
  <text class="mono" x="640" y="119">MAC cc:cc:cc:33:33:33</text>

  <!-- Attacker -->
  <rect class="box" x="290" y="200" width="180" height="66"/>
  <text class="hd" x="380" y="223">Attacker</text>
  <text class="mono" x="380" y="243">192.168.1.66</text>
  <text class="mono" x="380" y="259">MAC ff:ff:ff:66:66:66</text>

  <!-- the lie arrow from attacker to victim -->
  <line x1="350" y1="200" x2="160" y2="128" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="lie" x="60" y="158">The lie: "192.168.1.1 (the gateway) is at MY MAC, ff:ff:ff:66:66:66."</text>

  <text class="t" x="40" y="294">ARP has no way to check if a reply is true, so the victim believes it and</text>
  <text class="t" x="56" y="312">saves the wrong MAC. Now traffic meant for the gateway goes to the attacker,</text>
  <text class="t" x="56" y="330">who can read or block it (a "man in the middle"). Defenses exist on managed switches.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
