<svg xmlns="http://www.w3.org/2000/svg" width="680" height="370" viewBox="0 0 680 370" font-family="sans-serif" font-size="13">
  <rect width="680" height="370" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="bold">Inside one organization vs between organizations</text>

  <!-- Organization 1 box -->
  <rect x="20" y="50" width="260" height="180" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="150" y="72" text-anchor="middle" font-weight="bold" font-size="12">Organization 1 (one AS)</text>
  <circle cx="80" cy="120" r="22" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="80" y="124" text-anchor="middle" font-size="11">R1</text>
  <circle cx="200" cy="120" r="22" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="200" y="124" text-anchor="middle" font-size="11">R2</text>
  <circle cx="140" cy="185" r="22" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="140" y="189" text-anchor="middle" font-size="11">R3</text>
  <line x1="102" y1="120" x2="178" y2="120" stroke="#000000" stroke-width="1.5"/>
  <line x1="92" y1="139" x2="128" y2="168" stroke="#000000" stroke-width="1.5"/>
  <line x1="188" y1="139" x2="152" y2="168" stroke="#000000" stroke-width="1.5"/>
  <text x="150" y="218" text-anchor="middle" font-size="10">Routers here use an INTERIOR protocol</text>

  <!-- Organization 2 box -->
  <rect x="400" y="50" width="260" height="180" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="530" y="72" text-anchor="middle" font-weight="bold" font-size="12">Organization 2 (another AS)</text>
  <circle cx="460" cy="120" r="22" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="460" y="124" text-anchor="middle" font-size="11">R4</text>
  <circle cx="580" cy="120" r="22" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="580" y="124" text-anchor="middle" font-size="11">R5</text>
  <circle cx="520" cy="185" r="22" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="520" y="189" text-anchor="middle" font-size="11">R6</text>
  <line x1="482" y1="120" x2="558" y2="120" stroke="#000000" stroke-width="1.5"/>
  <line x1="472" y1="139" x2="508" y2="168" stroke="#000000" stroke-width="1.5"/>
  <line x1="568" y1="139" x2="532" y2="168" stroke="#000000" stroke-width="1.5"/>
  <text x="530" y="218" text-anchor="middle" font-size="10">Routers here use an INTERIOR protocol</text>

  <!-- Link between orgs = BGP -->
  <line x1="222" y1="120" x2="438" y2="120" stroke="#000000" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="340" y="110" text-anchor="middle" font-size="11" font-weight="bold">BGP</text>
  <text x="340" y="136" text-anchor="middle" font-size="10">links the two together</text>

  <!-- Captions -->
  <text x="150" y="252" text-anchor="middle" font-size="11">e.g. OSPF (builds a full map)</text>
  <text x="150" y="270" text-anchor="middle" font-size="11">or RIP (asks neighbors)</text>
  <text x="530" y="252" text-anchor="middle" font-size="11">e.g. OSPF or RIP</text>
  <text x="530" y="270" text-anchor="middle" font-size="11">(its own choice)</text>

  <!-- Bottom takeaway -->
  <rect x="60" y="294" width="560" height="62" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="340" y="316" text-anchor="middle" font-size="12" font-weight="bold">Interior protocols run INSIDE one network. BGP runs BETWEEN networks.</text>
  <text x="340" y="338" text-anchor="middle" font-size="11">BGP glues tens of thousands of organizations into the one internet we all share.</text>
</svg>
