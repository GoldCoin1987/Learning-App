<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380" font-family="sans-serif" font-size="13">
  <rect width="680" height="380" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="16" font-weight="bold">MQTT publish / subscribe: a broker in the middle</text>

  <!-- Publishers (sensors) on the left -->
  <text x="100" y="64" text-anchor="middle" font-weight="bold">Publishers (sensors)</text>

  <rect x="40" y="78" width="120" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="100" y="103" text-anchor="middle">Temp sensor</text>

  <rect x="40" y="170" width="120" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="100" y="195" text-anchor="middle">Door sensor</text>

  <rect x="40" y="262" width="120" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="100" y="287" text-anchor="middle">Soil probe</text>

  <!-- Broker in the middle -->
  <rect x="270" y="150" width="140" height="80" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="340" y="183" text-anchor="middle" font-weight="bold">Broker</text>
  <text x="340" y="203" text-anchor="middle" fill="#333">sorts by topic</text>

  <!-- Subscribers on the right -->
  <text x="580" y="64" text-anchor="middle" font-weight="bold">Subscribers (apps)</text>

  <rect x="520" y="78" width="130" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="585" y="103" text-anchor="middle">Phone app</text>

  <rect x="520" y="170" width="130" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="585" y="195" text-anchor="middle">Dashboard</text>

  <rect x="520" y="262" width="130" height="40" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="585" y="287" text-anchor="middle">Logger</text>

  <!-- arrows publishers -> broker (publish) -->
  <defs>
    <marker id="ahb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
  <g stroke="#000000" stroke-width="2" fill="none" marker-end="url(#ahb)">
    <line x1="160" y1="98"  x2="268" y2="165"/>
    <line x1="160" y1="190" x2="268" y2="190"/>
    <line x1="160" y1="282" x2="268" y2="215"/>
    <!-- broker -> subscribers (deliver) -->
    <line x1="412" y1="165" x2="518" y2="98"/>
    <line x1="412" y1="190" x2="518" y2="190"/>
    <line x1="412" y1="215" x2="518" y2="282"/>
  </g>

  <text x="205" y="332" text-anchor="middle" fill="#000000" font-style="italic">PUBLISH (topic, value)</text>
  <text x="490" y="332" text-anchor="middle" fill="#000000" font-style="italic">SUBSCRIBE (topic)</text>

  <text x="340" y="362" text-anchor="middle" fill="#333">Senders never talk to receivers directly. They publish to topics; the broker delivers.</text>
</svg>
