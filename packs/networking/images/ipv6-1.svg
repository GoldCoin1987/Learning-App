<svg xmlns="http://www.w3.org/2000/svg" width="660" height="320" viewBox="0 0 660 320" font-family="monospace" font-size="12">
  <rect width="660" height="320" fill="#ffffff"/>
  <text x="330" y="24" text-anchor="middle" font-size="15" font-weight="bold">IPv6 Global Unicast Address (128 bits)</text>

  <!-- the three fields -->
  <g stroke="#333" stroke-width="1">
    <rect x="30"  y="50" width="280" height="56" fill="#dbeafe"/>
    <rect x="310" y="50" width="120" height="56" fill="#fef3c7"/>
    <rect x="430" y="50" width="200" height="56" fill="#dcfce7"/>
  </g>
  <text x="170" y="78" text-anchor="middle" font-weight="bold">Global Routing Prefix</text>
  <text x="170" y="96" text-anchor="middle" font-size="10">assigned by ISP/RIR</text>
  <text x="370" y="78" text-anchor="middle" font-weight="bold">Subnet ID</text>
  <text x="370" y="96" text-anchor="middle" font-size="10">picked locally</text>
  <text x="530" y="78" text-anchor="middle" font-weight="bold">Interface ID</text>
  <text x="530" y="96" text-anchor="middle" font-size="10">EUI-64 or random</text>

  <!-- bit-width brackets -->
  <g stroke="#666" stroke-width="1">
    <line x1="30"  y1="116" x2="310" y2="116"/>
    <line x1="310" y1="116" x2="430" y2="116"/>
    <line x1="430" y1="116" x2="630" y2="116"/>
  </g>
  <text x="170" y="132" text-anchor="middle" font-size="11">first 48 bits  (/48 site)</text>
  <text x="370" y="132" text-anchor="middle" font-size="11">16 bits</text>
  <text x="530" y="132" text-anchor="middle" font-size="11">last 64 bits</text>

  <!-- prefix boundaries -->
  <g stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="5 3">
    <line x1="310" y1="44" x2="310" y2="146"/>
    <line x1="430" y1="44" x2="430" y2="146"/>
  </g>
  <text x="310" y="40" text-anchor="middle" font-size="10" fill="#1d4ed8">/48</text>
  <text x="430" y="40" text-anchor="middle" font-size="10" fill="#1d4ed8">/64</text>

  <!-- example address -->
  <text x="30" y="180" font-size="12" font-weight="bold">Example:</text>
  <text x="30" y="200" font-size="13" fill="#0f172a">2001:0db8:acad : 0007 : 0000:0000:0000:0001</text>
  <text x="30" y="216" font-size="10" fill="#1d4ed8">&lt;-- routing prefix --&gt; subnet  &lt;------ interface ID ------&gt;</text>
  <text x="30" y="238" font-size="12">compresses to: <tspan font-weight="bold">2001:db8:acad:7::1</tspan></text>

  <!-- key reminders -->
  <text x="30" y="270" font-size="11">/64 is the standard subnet (SLAAC requires it). A /48 site = 65,536 /64s.</text>
  <text x="30" y="286" font-size="11">Subnet on nibble (4-bit) boundaries: each hex digit = 4 bits.</text>
  <text x="30" y="302" font-size="11">No broadcast. fe80::/10 link-local. fc00::/7 ULA. ff00::/8 multicast.</text>
</svg>
