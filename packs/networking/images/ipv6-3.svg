<svg xmlns="http://www.w3.org/2000/svg" width="700" height="320" viewBox="0 0 700 320" font-family="monospace" font-size="13">
  <rect width="700" height="320" fill="#ffffff"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" font-family="sans-serif">Shortening an IPv6 address with ::</text>

  <!-- Step 1: full form -->
  <text x="30" y="64" font-family="sans-serif" font-weight="bold">Step 1 - full address (eight groups of four hex digits):</text>
  <text x="30" y="88">2001:0db8:0000:0000:0000:0000:0000:0001</text>

  <!-- Step 2: drop leading zeros -->
  <text x="30" y="128" font-family="sans-serif" font-weight="bold">Step 2 - drop the leading zeros inside each group:</text>
  <text x="30" y="152">2001:db8:0:0:0:0:0:1</text>
  <text x="30" y="170" font-size="11" font-family="sans-serif">0db8 becomes db8, and each 0000 becomes a single 0</text>

  <!-- Step 3: collapse zeros with :: -->
  <text x="30" y="210" font-family="sans-serif" font-weight="bold">Step 3 - replace ONE run of all-zero groups with :: </text>
  <text x="30" y="234">2001:db8::1</text>
  <text x="30" y="252" font-size="11" font-family="sans-serif">:: means "fill with as many zero groups as needed to reach eight"</text>

  <!-- rule box -->
  <rect x="30" y="272" width="640" height="34" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="350" y="293" text-anchor="middle" font-size="12" font-family="sans-serif">Rule: you may use :: only ONCE per address (otherwise the length is ambiguous).</text>
</svg>
