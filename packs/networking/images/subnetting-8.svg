<svg xmlns="http://www.w3.org/2000/svg" width="700" height="340" viewBox="0 0 700 340" font-family="sans-serif" font-size="13">
  <rect width="700" height="340" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="15" font-weight="bold">Supernetting: combine small blocks into one bigger block</text>
  <text x="350" y="46" text-anchor="middle" font-size="12">Four neighbouring /24 networks join into a single /22</text>

  <!-- Four small blocks -->
  <rect x="40" y="70" width="140" height="50" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="110" y="92" text-anchor="middle" font-size="11" font-weight="bold">192.168.4.0/24</text>
  <text x="110" y="110" text-anchor="middle" font-size="10">256 addresses</text>

  <rect x="190" y="70" width="140" height="50" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="260" y="92" text-anchor="middle" font-size="11" font-weight="bold">192.168.5.0/24</text>
  <text x="260" y="110" text-anchor="middle" font-size="10">256 addresses</text>

  <rect x="340" y="70" width="140" height="50" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="410" y="92" text-anchor="middle" font-size="11" font-weight="bold">192.168.6.0/24</text>
  <text x="410" y="110" text-anchor="middle" font-size="10">256 addresses</text>

  <rect x="490" y="70" width="140" height="50" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="560" y="92" text-anchor="middle" font-size="11" font-weight="bold">192.168.7.0/24</text>
  <text x="560" y="110" text-anchor="middle" font-size="10">256 addresses</text>

  <!-- Arrows down -->
  <line x1="335" y1="130" x2="335" y2="170" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="155" text-anchor="middle" font-size="11">combine (summarize)</text>

  <!-- One big block -->
  <rect x="190" y="180" width="290" height="56" fill="url(#hatch)" stroke="#000000" stroke-width="2"/>
  <text x="335" y="205" text-anchor="middle" font-size="13" font-weight="bold">192.168.4.0/22</text>
  <text x="335" y="225" text-anchor="middle" font-size="11">one route covers all four (1024 addresses)</text>

  <!-- Explanation -->
  <rect x="40" y="256" width="590" height="72" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="335" y="280" text-anchor="middle" font-size="12" font-weight="bold">A router can advertise one /22 instead of four /24s.</text>
  <text x="335" y="302" text-anchor="middle" font-size="11">Fewer routes to track keeps the internet's routing tables smaller. This is why</text>
  <text x="335" y="320" text-anchor="middle" font-size="11">flexible /N (CIDR) replaced the old fixed Class A / B / C system.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#ffffff"/>
      <path d="M0,8 L8,0" stroke="#000000" stroke-width="1"/>
    </pattern>
  </defs>
</svg>
