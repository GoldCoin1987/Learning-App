<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" font-family="sans-serif" font-size="13">
  <rect width="680" height="320" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">HTTP/1.1, HTTP/2, HTTP/3: faster versions, same idea</text>
  <text x="340" y="48" text-anchor="middle" font-size="12" fill="#000000">It is still GET / 200 / a body. Only the SPEED of moving it changed.</text>

  <!-- 1.1 -->
  <rect x="30" y="70" width="200" height="190" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="130" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">HTTP/1.1</text>
  <line x1="45" y1="104" x2="215" y2="104" stroke="#000000" stroke-width="1"/>
  <text x="130" y="128" text-anchor="middle" font-size="11" fill="#000000">one thing at a time,</text>
  <text x="130" y="146" text-anchor="middle" font-size="11" fill="#000000">in a line</text>
  <text x="130" y="172" text-anchor="middle" font-size="11" fill="#000000">a slow item holds</text>
  <text x="130" y="190" text-anchor="middle" font-size="11" fill="#000000">up the queue</text>
  <text x="130" y="232" text-anchor="middle" font-size="11" fill="#000000">runs over TCP</text>

  <!-- 2 -->
  <rect x="240" y="70" width="200" height="190" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="340" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">HTTP/2</text>
  <line x1="255" y1="104" x2="425" y2="104" stroke="#000000" stroke-width="1"/>
  <text x="340" y="128" text-anchor="middle" font-size="11" fill="#000000">many things at once</text>
  <text x="340" y="146" text-anchor="middle" font-size="11" fill="#000000">(multiplexing) over</text>
  <text x="340" y="164" text-anchor="middle" font-size="11" fill="#000000">one connection</text>
  <text x="340" y="190" text-anchor="middle" font-size="11" fill="#000000">no waiting in line</text>
  <text x="340" y="232" text-anchor="middle" font-size="11" fill="#000000">runs over TCP</text>

  <!-- 3 -->
  <rect x="450" y="70" width="200" height="190" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="550" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">HTTP/3</text>
  <line x1="465" y1="104" x2="635" y2="104" stroke="#000000" stroke-width="1"/>
  <text x="550" y="128" text-anchor="middle" font-size="11" fill="#000000">also many at once,</text>
  <text x="550" y="146" text-anchor="middle" font-size="11" fill="#000000">but on QUIC</text>
  <text x="550" y="172" text-anchor="middle" font-size="11" fill="#000000">a lost packet stalls</text>
  <text x="550" y="190" text-anchor="middle" font-size="11" fill="#000000">only its own item</text>
  <text x="550" y="232" text-anchor="middle" font-size="11" fill="#000000">QUIC runs over UDP</text>

  <text x="340" y="294" text-anchor="middle" font-size="11" fill="#000000">You almost never pick the version by hand - the browser and server agree on the fastest both support.</text>
  <text x="340" y="312" text-anchor="middle" font-size="11" fill="#000000">The next sub-topic covers QUIC and these speed-ups in detail.</text>
</svg>
