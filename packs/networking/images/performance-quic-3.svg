<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="sans-serif">
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Round-trip time (RTT): the there-and-back delay</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#000000">RTT = time for your message to reach the server AND the reply to come back.</text>

  <!-- You -->
  <rect x="40" y="90" width="150" height="60" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="115" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">You</text>
  <text x="115" y="138" text-anchor="middle" font-size="11" fill="#000000">(your device)</text>

  <!-- Server -->
  <rect x="530" y="90" width="150" height="60" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="605" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Server</text>
  <text x="605" y="138" text-anchor="middle" font-size="11" fill="#000000">(far away)</text>

  <!-- request arrow -->
  <line x1="190" y1="110" x2="530" y2="110" stroke="#000000" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="360" y="102" text-anchor="middle" font-size="12" fill="#000000">1. request goes there  -&gt;</text>

  <!-- reply arrow -->
  <line x1="530" y1="135" x2="190" y2="135" stroke="#000000" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="360" y="155" text-anchor="middle" font-size="12" fill="#000000">&lt;-  2. reply comes back</text>

  <!-- clock -->
  <circle cx="360" cy="225" r="34" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <line x1="360" y1="225" x2="360" y2="200" stroke="#000000" stroke-width="2"/>
  <line x1="360" y1="225" x2="378" y2="233" stroke="#000000" stroke-width="2"/>
  <text x="360" y="285" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">one round trip = 1 RTT</text>

  <text x="360" y="318" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">Every handshake or step that waits for a reply costs ONE more RTT.</text>
  <text x="360" y="342" text-anchor="middle" font-size="12" fill="#000000">Many things that feel "slow" are really too many round trips - not too little bandwidth.</text>

  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
