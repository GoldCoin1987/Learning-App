<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="sans-serif" font-size="13">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Congestion control: speed up slowly, back off on loss</text>

  <!-- axes -->
  <line x1="70" y1="290" x2="610" y2="290" stroke="#000000" stroke-width="1.5"/>
  <line x1="70" y1="290" x2="70" y2="60" stroke="#000000" stroke-width="1.5"/>
  <text x="340" y="322" text-anchor="middle" font-size="12" fill="#000000">time</text>
  <text x="28" y="180" text-anchor="middle" font-size="12" fill="#000000" transform="rotate(-90 28 180)">sending rate</text>

  <!-- ramp up -->
  <path d="M70,280 L120,255 L170,210 L220,130" fill="none" stroke="#000000" stroke-width="2.5"/>
  <text x="150" y="150" text-anchor="middle" font-size="11" fill="#000000">start slow,</text>
  <text x="150" y="165" text-anchor="middle" font-size="11" fill="#000000">speed up</text>

  <!-- loss event 1: drop -->
  <line x1="220" y1="130" x2="220" y2="220" stroke="#000000" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="220,220 214,208 226,208" fill="#000000"/>
  <text x="262" y="120" text-anchor="middle" font-size="11" fill="#000000">packet lost:</text>
  <text x="262" y="135" text-anchor="middle" font-size="11" fill="#000000">slow down</text>

  <!-- ramp up again -->
  <path d="M220,220 L320,150 L360,110" fill="none" stroke="#000000" stroke-width="2.5"/>

  <!-- loss event 2: drop -->
  <line x1="360" y1="110" x2="360" y2="200" stroke="#000000" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="360,200 354,188 366,188" fill="#000000"/>
  <text x="402" y="100" text-anchor="middle" font-size="11" fill="#000000">lost again:</text>
  <text x="402" y="115" text-anchor="middle" font-size="11" fill="#000000">slow down</text>

  <!-- ramp again -->
  <path d="M360,200 L470,130 L540,95" fill="none" stroke="#000000" stroke-width="2.5"/>

  <text x="320" y="346" text-anchor="middle" font-size="11" fill="#000000">The sender keeps probing for more speed, then backs off whenever loss signals the network is full.</text>
</svg>
