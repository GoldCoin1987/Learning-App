<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="monospace" font-size="11">
  <rect width="640" height="380" fill="#ffffff"/>
  <text x="320" y="22" text-anchor="middle" font-size="15" font-weight="bold">Link Budget Waterfall (dB / dBm)</text>
  <text x="320" y="40" text-anchor="middle" font-size="10">Prx = Ptx + Gtx + Grx - FSPL - L  vs receiver sensitivity</text>

  <!-- dBm axis -->
  <line x1="70" y1="60" x2="70" y2="320" stroke="#333" stroke-width="1"/>
  <text x="40" y="64" font-size="9">+30</text>
  <text x="40" y="130" font-size="9">0</text>
  <text x="40" y="196" font-size="9">-40</text>
  <text x="40" y="262" font-size="9">-80</text>
  <text x="40" y="318" font-size="9">-110</text>

  <!-- bars -->
  <g stroke="#333" stroke-width="1">
    <rect x="90"  y="64"  width="60" height="40" fill="#dcfce7"/>
    <rect x="160" y="56"  width="60" height="48" fill="#bbf7d0"/>
    <rect x="230" y="56"  width="60" height="48" fill="#bbf7d0"/>
    <rect x="300" y="56"  width="60" height="200" fill="#fecaca"/>
    <rect x="370" y="56"  width="60" height="216" fill="#fca5a5"/>
    <rect x="440" y="262" width="60" height="20" fill="#dbeafe"/>
  </g>
  <text x="120" y="118" text-anchor="middle" font-size="9">Ptx</text>
  <text x="120" y="130" text-anchor="middle" font-size="9">+20</text>
  <text x="190" y="118" text-anchor="middle" font-size="9">+Gtx</text>
  <text x="190" y="130" text-anchor="middle" font-size="9">+6</text>
  <text x="260" y="118" text-anchor="middle" font-size="9">+Grx</text>
  <text x="260" y="130" text-anchor="middle" font-size="9">+6</text>
  <text x="330" y="282" text-anchor="middle" font-size="9">-FSPL</text>
  <text x="330" y="294" text-anchor="middle" font-size="9">-100</text>
  <text x="400" y="298" text-anchor="middle" font-size="9">-L</text>
  <text x="400" y="310" text-anchor="middle" font-size="9">-3</text>
  <text x="470" y="256" text-anchor="middle" font-size="9">Prx</text>
  <text x="470" y="296" text-anchor="middle" font-size="9">-71</text>

  <!-- sensitivity line -->
  <line x1="80" y1="300" x2="560" y2="300" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="500" y="296" font-size="9" fill="#7c3aed">sensitivity -82 dBm</text>

  <!-- margin -->
  <line x1="530" y1="262" x2="530" y2="300" stroke="#16a34a" stroke-width="2"/>
  <text x="540" y="284" font-size="9" fill="#16a34a">margin</text>
  <text x="540" y="296" font-size="9" fill="#16a34a">11 dB</text>

  <text x="70" y="346" font-size="10">Gains lift the budget; FSPL + losses sink it. Link closes only if</text>
  <text x="70" y="360" font-size="10">Prx exceeds sensitivity. The leftover (margin) is your fade reserve.</text>
</svg>
