<svg xmlns="http://www.w3.org/2000/svg" width="700" height="340" viewBox="0 0 700 340" font-family="sans-serif" font-size="13">
  <rect width="700" height="340" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="15" font-weight="bold">Same subnet? Compare the network bits</text>
  <text x="350" y="46" text-anchor="middle" font-size="12">Two devices, both using a /24 mask (first 24 bits = network)</text>

  <!-- Device A -->
  <text x="60" y="86" text-anchor="start" font-size="12" font-weight="bold">PC A: 192.168.1.5</text>
  <rect x="60" y="96" width="130" height="36" fill="url(#hatch)" stroke="#000000" stroke-width="1.5"/>
  <rect x="190" y="96" width="130" height="36" fill="url(#hatch)" stroke="#000000" stroke-width="1.5"/>
  <rect x="320" y="96" width="130" height="36" fill="url(#hatch)" stroke="#000000" stroke-width="1.5"/>
  <rect x="450" y="96" width="100" height="36" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="125" y="120" text-anchor="middle" font-size="13">192</text>
  <text x="255" y="120" text-anchor="middle" font-size="13">168</text>
  <text x="385" y="120" text-anchor="middle" font-size="13">1</text>
  <text x="500" y="120" text-anchor="middle" font-size="13">5</text>

  <!-- Device B -->
  <text x="60" y="166" text-anchor="start" font-size="12" font-weight="bold">PC B: 192.168.1.9</text>
  <rect x="60" y="176" width="130" height="36" fill="url(#hatch)" stroke="#000000" stroke-width="1.5"/>
  <rect x="190" y="176" width="130" height="36" fill="url(#hatch)" stroke="#000000" stroke-width="1.5"/>
  <rect x="320" y="176" width="130" height="36" fill="url(#hatch)" stroke="#000000" stroke-width="1.5"/>
  <rect x="450" y="176" width="100" height="36" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="125" y="200" text-anchor="middle" font-size="13">192</text>
  <text x="255" y="200" text-anchor="middle" font-size="13">168</text>
  <text x="385" y="200" text-anchor="middle" font-size="13">1</text>
  <text x="500" y="200" text-anchor="middle" font-size="13">9</text>

  <!-- Network part label -->
  <text x="255" y="232" text-anchor="middle" font-size="11" font-weight="bold">network part (shaded): 192.168.1 = SAME</text>
  <text x="500" y="232" text-anchor="middle" font-size="11">host: differs</text>

  <!-- Verdict box -->
  <rect x="60" y="250" width="580" height="78" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="350" y="274" text-anchor="middle" font-size="13" font-weight="bold">Network parts match -> SAME subnet -> talk DIRECTLY</text>
  <text x="350" y="296" text-anchor="middle" font-size="11">If the shaded network bits differed, they would be on different subnets,</text>
  <text x="350" y="316" text-anchor="middle" font-size="11">and PC A would send the packet to the router to forward instead.</text>

  <defs>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#ffffff"/>
      <path d="M0,8 L8,0" stroke="#000000" stroke-width="1"/>
    </pattern>
  </defs>
</svg>
