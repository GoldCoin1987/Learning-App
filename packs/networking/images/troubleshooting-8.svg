<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd { font-size:13px; fill:#000000; font-weight:bold; }
    .t { font-size:12px; fill:#000000; }
    .tc { font-size:12px; fill:#000000; text-anchor:middle; }
  </style>
  <rect width="700" height="400" fill="#ffffff"/>
  <text class="ttl" x="350" y="28">Matching a symptom to its likely cause</text>

  <!-- table header -->
  <rect class="box" x="40" y="50" width="300" height="40"/>
  <text class="hd" x="55" y="75">What you SEE (symptom)</text>
  <rect class="box" x="340" y="50" width="320" height="40"/>
  <text class="hd" x="355" y="75">What it usually MEANS</text>

  <!-- row 1 -->
  <rect class="box" x="40" y="90" width="300" height="60"/>
  <text class="t" x="55" y="114">No IP address (or a 169.254</text>
  <text class="t" x="55" y="132">self-assigned one)</text>
  <rect class="box" x="340" y="90" width="320" height="60"/>
  <text class="t" x="355" y="124">DHCP problem - nobody handed you an address</text>

  <!-- row 2 -->
  <rect class="box" x="40" y="150" width="300" height="60"/>
  <text class="t" x="55" y="184">Can ping an IP, but names</text>
  <text class="t" x="55" y="202">like example.com fail</text>
  <rect class="box" x="340" y="150" width="320" height="60"/>
  <text class="t" x="355" y="184">DNS problem - names are not being looked up</text>

  <!-- row 3 -->
  <rect class="box" x="40" y="210" width="300" height="60"/>
  <text class="t" x="55" y="244">Can reach the gateway, but</text>
  <text class="t" x="55" y="262">nothing beyond it</text>
  <rect class="box" x="340" y="210" width="320" height="60"/>
  <text class="t" x="355" y="244">Routing / ISP problem - the path out is broken</text>

  <!-- row 4 -->
  <rect class="box" x="40" y="270" width="300" height="60"/>
  <text class="t" x="55" y="294">Name resolves and IP pings,</text>
  <text class="t" x="55" y="312">but one site/app won't load</text>
  <rect class="box" x="340" y="270" width="320" height="60"/>
  <text class="t" x="355" y="304">Port/service problem - that service is down or blocked</text>

  <text class="tc" x="350" y="364">Read the symptom first; it usually points straight at one rung of the ladder.</text>
  <text class="tc" x="350" y="384">No IP = link/DHCP.  IP-yes-name-no = DNS.  Gateway-yes-rest-no = routing.</text>
</svg>
