<svg xmlns="http://www.w3.org/2000/svg" width="700" height="340" viewBox="0 0 700 340" font-family="sans-serif" font-size="13">
  <rect width="700" height="340" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="15" font-weight="bold">Splitting one /24 into four /26 subnets of 64 each</text>
  <text x="350" y="46" text-anchor="middle" font-size="12">192.168.1.0/24  ->  four equal blocks on the 0-255 number line</text>

  <!-- Number line -->
  <line x1="50" y1="150" x2="650" y2="150" stroke="#000000" stroke-width="2"/>

  <!-- Boundary ticks at 0,64,128,192,255 -->
  <line x1="50"  y1="138" x2="50"  y2="162" stroke="#000000" stroke-width="2"/>
  <line x1="200" y1="138" x2="200" y2="162" stroke="#000000" stroke-width="2"/>
  <line x1="350" y1="138" x2="350" y2="162" stroke="#000000" stroke-width="2"/>
  <line x1="500" y1="138" x2="500" y2="162" stroke="#000000" stroke-width="2"/>
  <line x1="650" y1="138" x2="650" y2="162" stroke="#000000" stroke-width="2"/>

  <!-- Boundary numbers -->
  <text x="50"  y="182" text-anchor="middle" font-family="monospace" font-size="12">0</text>
  <text x="200" y="182" text-anchor="middle" font-family="monospace" font-size="12">64</text>
  <text x="350" y="182" text-anchor="middle" font-family="monospace" font-size="12">128</text>
  <text x="500" y="182" text-anchor="middle" font-family="monospace" font-size="12">192</text>
  <text x="650" y="182" text-anchor="middle" font-family="monospace" font-size="12">255</text>

  <!-- Four block labels above the line -->
  <text x="125" y="120" text-anchor="middle" font-size="11" font-weight="bold">Subnet 1</text>
  <text x="125" y="135" text-anchor="middle" font-size="10">.0/26</text>
  <text x="275" y="120" text-anchor="middle" font-size="11" font-weight="bold">Subnet 2</text>
  <text x="275" y="135" text-anchor="middle" font-size="10">.64/26</text>
  <text x="425" y="120" text-anchor="middle" font-size="11" font-weight="bold">Subnet 3</text>
  <text x="425" y="135" text-anchor="middle" font-size="10">.128/26</text>
  <text x="575" y="120" text-anchor="middle" font-size="11" font-weight="bold">Subnet 4</text>
  <text x="575" y="135" text-anchor="middle" font-size="10">.192/26</text>

  <!-- For subnet 1, mark N / usable / B -->
  <text x="55"  y="210" text-anchor="start" font-size="10">N=.0</text>
  <text x="125" y="210" text-anchor="middle" font-size="10">hosts .1-.62</text>
  <text x="195" y="210" text-anchor="end" font-size="10">B=.63</text>

  <text x="205" y="226" text-anchor="start" font-size="10">N=.64</text>
  <text x="345" y="226" text-anchor="end" font-size="10">B=.127</text>

  <!-- Explanation box -->
  <rect x="50" y="250" width="600" height="78" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="350" y="274" text-anchor="middle" font-size="12" font-weight="bold">Block size = 64. Each subnet starts on a multiple of 64: 0, 64, 128, 192.</text>
  <text x="350" y="296" text-anchor="middle" font-size="11">In each: first address = network name, last address = broadcast, the 62 between = usable hosts.</text>
  <text x="350" y="316" text-anchor="middle" font-size="11">/26 = 26 network bits, 6 host bits, so 2^6 = 64 addresses (62 usable) per subnet.</text>
</svg>
