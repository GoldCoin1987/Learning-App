<svg xmlns="http://www.w3.org/2000/svg" width="760" height="380" viewBox="0 0 760 380" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd  { font-size:14px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .t   { font-size:12px; fill:#000000; text-anchor:middle; }
    .tl  { font-size:11px; fill:#000000; }
    .mono { font-size:11px; fill:#000000; text-anchor:middle; font-family:monospace; }
    .solid { stroke:#000000; stroke-width:2; fill:none; }
    .dash { stroke:#000000; stroke-width:1.2; fill:none; stroke-dasharray:5 4; }
  </style>
  <text class="ttl" x="380" y="24">A switch forwards smartly; a hub just shouts to everyone</text>

  <!-- ===== LEFT: SWITCH ===== -->
  <text class="hd" x="190" y="52">SWITCH (smart)</text>

  <!-- switch body -->
  <rect class="box" x="60" y="70" width="260" height="46"/>
  <text class="t" x="190" y="98">SWITCH</text>

  <!-- MAC table -->
  <rect class="box" x="60" y="128" width="260" height="92"/>
  <text class="tl" x="70" y="146" font-weight="bold">MAC address table (what it learned)</text>
  <line x1="60" y1="152" x2="320" y2="152" stroke="#000000" stroke-width="1"/>
  <text class="mono" x="130" y="170">aa:aa  -&gt; port 1</text>
  <text class="mono" x="130" y="188">bb:bb  -&gt; port 2</text>
  <text class="mono" x="130" y="206">cc:cc  -&gt; port 3</text>

  <!-- devices for switch -->
  <rect class="box" x="40"  y="300" width="64" height="40"/>
  <text class="t" x="72"  y="324">PC aa:aa</text>
  <rect class="box" x="158" y="300" width="64" height="40"/>
  <text class="t" x="190" y="324">PC bb:bb</text>
  <rect class="box" x="276" y="300" width="64" height="40"/>
  <text class="t" x="308" y="324">PC cc:cc</text>

  <!-- port lines: only the matching one is bold/solid -->
  <line class="dash"  x1="72"  y1="220" x2="72"  y2="300"/>
  <line class="solid" x1="190" y1="220" x2="190" y2="300"/>
  <line class="dash"  x1="308" y1="220" x2="308" y2="300"/>
  <text class="tl" x="196" y="265">frame for bb:bb</text>
  <text class="tl" x="120" y="362" >Frame goes ONLY to port 2.</text>

  <!-- divider -->
  <line x1="380" y1="40" x2="380" y2="368" stroke="#000000" stroke-width="1"/>

  <!-- ===== RIGHT: HUB ===== -->
  <text class="hd" x="570" y="52">HUB (dumb)</text>

  <rect class="box" x="440" y="70" width="260" height="46"/>
  <text class="t" x="570" y="98">HUB (copies to all ports)</text>

  <!-- devices for hub -->
  <rect class="box" x="420" y="300" width="64" height="40"/>
  <text class="t" x="452" y="324">PC aa:aa</text>
  <rect class="box" x="538" y="300" width="64" height="40"/>
  <text class="t" x="570" y="324">PC bb:bb</text>
  <rect class="box" x="656" y="300" width="64" height="40"/>
  <text class="t" x="688" y="324">PC cc:cc</text>

  <!-- all lines bold/solid: floods everywhere -->
  <line class="solid" x1="452" y1="116" x2="452" y2="300"/>
  <line class="solid" x1="570" y1="116" x2="570" y2="300"/>
  <line class="solid" x1="688" y1="116" x2="688" y2="300"/>
  <text class="tl" x="500" y="362">Same frame is copied to EVERY port.</text>
</svg>
