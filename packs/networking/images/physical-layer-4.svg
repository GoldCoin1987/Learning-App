<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="640" height="340" fill="white"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="black">A signal fades and gets noisy over distance</text>

  <!-- Top: clean signal near the sender -->
  <text x="20" y="64" font-size="12" font-weight="bold" fill="black">Near the sender: clean, strong signal</text>
  <line x1="40" y1="120" x2="600" y2="120" stroke="black" stroke-dasharray="3,3"/>
  <text x="612" y="124" font-size="10" fill="black"></text>
  <polyline fill="none" stroke="black" stroke-width="2"
    points="40,120 70,80 100,160 130,80 160,160 190,80 220,160 250,80 280,160 310,80 340,160 370,80 400,160 430,80 460,160 490,80 520,160 550,80 580,120"/>
  <text x="320" y="186" text-anchor="middle" font-size="11" fill="black">Easy to tell a 1 from a 0: tall, even waves.</text>

  <!-- Bottom: degraded signal far away -->
  <text x="20" y="222" font-size="12" font-weight="bold" fill="black">Far away: weaker (attenuation) + jagged (noise)</text>
  <line x1="40" y1="280" x2="600" y2="280" stroke="black" stroke-dasharray="3,3"/>
  <!-- smaller amplitude, jittered points to suggest noise -->
  <polyline fill="none" stroke="black" stroke-width="2"
    points="40,280 70,262 100,296 130,260 160,300 190,266 220,294 250,258 280,302 310,268 340,292 370,261 400,299 430,264 460,297 490,259 520,301 550,267 580,280"/>
  <text x="320" y="324" text-anchor="middle" font-size="11" fill="black">Harder to tell a 1 from a 0: small, ragged waves cause errors.</text>

  <!-- labels for the two effects -->
  <text x="612" y="266" text-anchor="end" font-size="10" fill="black">attenuation = signal</text>
  <text x="612" y="300" text-anchor="end" font-size="10" fill="black">shrinks; noise = jagged</text>
</svg>
