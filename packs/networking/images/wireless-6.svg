<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" font-family="sans-serif" font-size="13">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Devices join one access point by its name (SSID)</text>

  <!-- access point in the middle -->
  <rect x="270" y="70" width="100" height="50" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="320" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">Access Point</text>
  <text x="320" y="108" text-anchor="middle" font-size="11" fill="#000000">(the Wi-Fi box)</text>
  <circle cx="320" cy="64" r="4" fill="#000000"/>
  <!-- name tag -->
  <rect x="250" y="132" width="140" height="26" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="320" y="150" text-anchor="middle" font-size="12" fill="#000000">name (SSID): "HomeWiFi"</text>

  <!-- three devices joining -->
  <rect x="70" y="250" width="60" height="40" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="100" y="275" text-anchor="middle" font-size="11" fill="#000000">Laptop</text>
  <rect x="290" y="270" width="60" height="40" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="320" y="295" text-anchor="middle" font-size="11" fill="#000000">Phone</text>
  <rect x="510" y="250" width="60" height="40" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="540" y="275" text-anchor="middle" font-size="11" fill="#000000">TV</text>

  <!-- join lines -->
  <g stroke="#000000" stroke-width="1.5" fill="none">
    <line x1="100" y1="250" x2="285" y2="120" marker-end="url(#ar)"/>
    <line x1="320" y1="270" x2="320" y2="160" marker-end="url(#ar)"/>
    <line x1="540" y1="250" x2="355" y2="120" marker-end="url(#ar)"/>
  </g>
  <text x="180" y="200" text-anchor="middle" font-size="10" fill="#000000">join + password</text>
  <text x="470" y="200" text-anchor="middle" font-size="10" fill="#000000">join + password</text>

  <text x="320" y="350" text-anchor="middle" font-size="12" fill="#000000">You pick the network name, type the password once, and the device joins (associates).</text>
  <text x="320" y="372" text-anchor="middle" font-size="12" fill="#000000">All joined devices share this one box and take turns sending.</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0,1 L8,5 L0,9 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
