<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd { font-size:13px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .tc { font-size:12px; fill:#000000; text-anchor:middle; }
    .mono { font-size:11px; fill:#000000; text-anchor:middle; font-family:monospace; }
  </style>
  <rect width="720" height="420" fill="#ffffff"/>
  <text class="ttl" x="360" y="28">traceroute: every "hop" along the path</text>
  <text class="tc" x="360" y="48">Each line is one router the packet passes through on the way to the target.</text>

  <!-- hop list -->
  <rect class="box" x="60" y="70" width="600" height="260"/>
  <text class="mono" x="360" y="96">traceroute example.com</text>
  <line x1="60" y1="108" x2="660" y2="108" stroke="#000000" stroke-width="1"/>

  <text class="mono" x="200" y="134">1   192.168.1.1     1 ms   (your router)</text>
  <text class="tc" x="600" y="134">ok</text>
  <text class="mono" x="200" y="160">2   10.0.0.1        8 ms   (your ISP)</text>
  <text class="tc" x="600" y="160">ok</text>
  <text class="mono" x="200" y="186">3   72.14.5.1      18 ms</text>
  <text class="tc" x="600" y="186">ok</text>
  <text class="mono" x="200" y="212">4   72.14.9.7      22 ms</text>
  <text class="tc" x="600" y="212">ok</text>
  <text class="mono" x="215" y="240">5   * * *          (no answer)</text>
  <line x1="120" y1="228" x2="540" y2="228" stroke="#000000" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="tc" x="600" y="240">STOPS</text>
  <text class="mono" x="215" y="266">6   * * *          (no answer)</text>
  <text class="mono" x="215" y="292">7   * * *          (no answer)</text>

  <text class="hd" x="360" y="364">The path was fine up to hop 4. It dies at hop 5 -</text>
  <text class="tc" x="360" y="384">so the break is at or just past that point, out in the path (not on your computer).</text>
  <text class="tc" x="360" y="404">The numbers (ms) are how long each hop took - rising numbers mean a slow leg.</text>
</svg>
