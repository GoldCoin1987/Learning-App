<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" font-family="sans-serif" font-size="13">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">2.4 GHz vs 5 GHz: reach vs speed</text>
  <text x="320" y="46" text-anchor="middle" font-size="12" fill="#000000">Two choices of "airwave". You usually cannot have both reach and top speed at once.</text>

  <!-- 2.4 GHz: reaches far, slower -->
  <text x="60" y="92" font-size="14" font-weight="bold" fill="#000000">2.4 GHz</text>
  <rect x="60" y="110" width="56" height="40" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="88" y="135" text-anchor="middle" font-size="10" fill="#000000">Wi-Fi box</text>
  <g fill="none" stroke="#000000" stroke-width="1.3">
    <path d="M 122 116 A 30 30 0 0 1 122 144"/>
    <path d="M 122 102 A 60 60 0 0 1 122 158"/>
    <path d="M 122 88 A 92 92 0 0 1 122 172"/>
  </g>
  <line x1="60" y1="186" x2="470" y2="186" stroke="#000000" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="490" y="190" font-size="11" fill="#000000">reaches FAR</text>
  <text x="60" y="208" font-size="11" fill="#000000">Travels farther, goes through walls better, but slower.</text>

  <!-- 5 GHz: shorter, faster -->
  <text x="60" y="252" font-size="14" font-weight="bold" fill="#000000">5 GHz</text>
  <rect x="60" y="270" width="56" height="40" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="88" y="295" text-anchor="middle" font-size="10" fill="#000000">Wi-Fi box</text>
  <g fill="none" stroke="#000000" stroke-width="1.3">
    <path d="M 122 276 A 22 22 0 0 1 122 304"/>
    <path d="M 122 266 A 40 40 0 0 1 122 314"/>
  </g>
  <line x1="60" y1="330" x2="250" y2="330" stroke="#000000" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="270" y="334" font-size="11" fill="#000000">shorter reach</text>
  <text x="60" y="356" font-size="11" fill="#000000">Faster, carries more data, but fades sooner and walls hurt it more.</text>

  <text x="320" y="386" text-anchor="middle" font-size="12" fill="#000000">(6 GHz is like 5 GHz: even faster, even shorter reach.)</text>
</svg>
