<svg xmlns="http://www.w3.org/2000/svg" width="660" height="340" viewBox="0 0 660 340" font-family="sans-serif" font-size="13">
  <rect width="660" height="340" fill="#ffffff"/>
  <text x="330" y="26" text-anchor="middle" font-size="15" font-weight="bold">A subnet splits one big block of addresses into smaller groups</text>

  <!-- Big block on the left -->
  <rect x="30" y="60" width="200" height="150" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="130" y="84" text-anchor="middle" font-weight="bold">One big block</text>
  <text x="130" y="104" text-anchor="middle" font-size="11">256 addresses</text>
  <text x="130" y="120" text-anchor="middle" font-size="11">192.168.1.0 - .255</text>
  <text x="130" y="150" text-anchor="middle" font-size="11">Everyone on ONE</text>
  <text x="130" y="166" text-anchor="middle" font-size="11">crowded network</text>

  <!-- Arrow -->
  <line x1="240" y1="135" x2="300" y2="135" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="270" y="125" text-anchor="middle" font-size="11">split</text>

  <!-- Four smaller groups on the right -->
  <text x="490" y="50" text-anchor="middle" font-weight="bold">Four smaller groups (subnets)</text>

  <rect x="320" y="60" width="150" height="55" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="395" y="82" text-anchor="middle" font-size="11" font-weight="bold">Sales subnet</text>
  <text x="395" y="100" text-anchor="middle" font-size="10">.0 - .63</text>

  <rect x="480" y="60" width="150" height="55" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="555" y="82" text-anchor="middle" font-size="11" font-weight="bold">Engineering</text>
  <text x="555" y="100" text-anchor="middle" font-size="10">.64 - .127</text>

  <rect x="320" y="125" width="150" height="55" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="395" y="147" text-anchor="middle" font-size="11" font-weight="bold">Office subnet</text>
  <text x="395" y="165" text-anchor="middle" font-size="10">.128 - .191</text>

  <rect x="480" y="125" width="150" height="55" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="555" y="147" text-anchor="middle" font-size="11" font-weight="bold">Guest subnet</text>
  <text x="555" y="165" text-anchor="middle" font-size="10">.192 - .255</text>

  <!-- Everyday analogy -->
  <rect x="30" y="240" width="600" height="80" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="330" y="262" text-anchor="middle" font-size="12" font-weight="bold">Like dividing an office building into departments</text>
  <text x="330" y="284" text-anchor="middle" font-size="11">Each department (subnet) is its own area. People in the same department</text>
  <text x="330" y="302" text-anchor="middle" font-size="11">talk directly; to reach another department you go through the front desk (router).</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
