<svg xmlns="http://www.w3.org/2000/svg" width="700" height="440" viewBox="0 0 700 440" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd { font-size:13px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .t { font-size:12px; fill:#000000; }
    .tc { font-size:12px; fill:#000000; text-anchor:middle; }
    .mono { font-size:12px; fill:#000000; text-anchor:middle; font-family:monospace; }
  </style>
  <rect width="700" height="440" fill="#ffffff"/>
  <text class="ttl" x="350" y="28">Is it a NAME problem or a CONNECTION problem?</text>

  <!-- question -->
  <rect class="box" x="220" y="56" width="260" height="50"/>
  <text class="hd" x="350" y="80">A website will not load.</text>
  <text class="tc" x="350" y="98">Can you ping its IP address directly?</text>

  <!-- arrows down -->
  <line x1="300" y1="106" x2="170" y2="160" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="106" x2="530" y2="160" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="hd" x="210" y="135">YES, the IP works</text>
  <text class="hd" x="500" y="135">NO, the IP fails too</text>

  <!-- left branch -->
  <rect class="box" x="40" y="165" width="280" height="120"/>
  <text class="hd" x="180" y="190">It is a NAME (DNS) problem</text>
  <text class="tc" x="180" y="214">The connection is fine - you reached</text>
  <text class="tc" x="180" y="232">the server by its number. Only turning</text>
  <text class="tc" x="180" y="250">the name into a number is broken.</text>
  <text class="mono" x="180" y="272">check: nslookup example.com</text>

  <!-- right branch -->
  <rect class="box" x="380" y="165" width="280" height="120"/>
  <text class="hd" x="520" y="190">It is a CONNECTION problem</text>
  <text class="tc" x="520" y="214">Names are not the issue - you cannot</text>
  <text class="tc" x="520" y="232">even reach the raw address. Go back to</text>
  <text class="tc" x="520" y="250">the lower rungs: gateway, routing, link.</text>
  <text class="mono" x="520" y="272">check: ping gateway, traceroute</text>

  <!-- example -->
  <rect class="box" x="60" y="315" width="580" height="100"/>
  <text class="hd" x="350" y="339">Try it both ways</text>
  <text class="mono" x="350" y="364">ping example.com    -> "could not find host"   (name fails)</text>
  <text class="mono" x="350" y="388">ping 93.184.216.34  -> replies just fine        (number works)</text>
  <text class="tc" x="350" y="408">Name fails but number works = classic DNS problem.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
