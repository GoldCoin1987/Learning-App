<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" viewBox="0 0 680 360" font-family="sans-serif" font-size="13">
  <rect width="680" height="360" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="bold">Each router makes ONE local choice: the best next hop</text>

  <!-- Your PC -->
  <rect x="20" y="120" width="100" height="64" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="70" y="148" text-anchor="middle" font-weight="bold" font-size="12">Your PC</text>
  <text x="70" y="166" text-anchor="middle" font-size="10">wants to reach</text>
  <text x="70" y="179" text-anchor="middle" font-size="10">the Server</text>

  <!-- Routers as circles -->
  <circle cx="235" cy="152" r="32" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="235" y="149" text-anchor="middle" font-weight="bold" font-size="12">Router A</text>
  <text x="235" y="165" text-anchor="middle" font-size="10">picks next</text>

  <circle cx="390" cy="152" r="32" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="390" y="149" text-anchor="middle" font-weight="bold" font-size="12">Router B</text>
  <text x="390" y="165" text-anchor="middle" font-size="10">picks next</text>

  <circle cx="545" cy="152" r="32" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="545" y="149" text-anchor="middle" font-weight="bold" font-size="12">Router C</text>
  <text x="545" y="165" text-anchor="middle" font-size="10">picks next</text>

  <!-- Server -->
  <rect x="600" y="120" width="64" height="64" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="632" y="150" text-anchor="middle" font-weight="bold" font-size="12">Server</text>
  <text x="632" y="170" text-anchor="middle" font-size="10">(goal)</text>

  <!-- Hop arrows with "next hop" labels -->
  <line x1="120" y1="152" x2="198" y2="152" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="267" y1="152" x2="353" y2="152" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="422" y1="152" x2="508" y2="152" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="577" y1="152" x2="596" y2="152" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="159" y="118" text-anchor="middle" font-size="10">next hop</text>
  <text x="310" y="118" text-anchor="middle" font-size="10">next hop</text>
  <text x="465" y="118" text-anchor="middle" font-size="10">next hop</text>

  <!-- The key point -->
  <text x="340" y="222" text-anchor="middle" font-size="12" font-weight="bold">No single router knows the whole path.</text>
  <text x="340" y="242" text-anchor="middle" font-size="11">Each one just sends the packet one step closer, then the next router decides again.</text>

  <!-- Everyday analogy box -->
  <rect x="60" y="266" width="560" height="74" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="340" y="288" text-anchor="middle" font-size="12" font-weight="bold">Like road signs to a city</text>
  <text x="340" y="310" text-anchor="middle" font-size="11">You don't memorize the whole route. At each intersection you follow the sign</text>
  <text x="340" y="328" text-anchor="middle" font-size="11">pointing toward your city. Many small "next" decisions get you all the way there.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
