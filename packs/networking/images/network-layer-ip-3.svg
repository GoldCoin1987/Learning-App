<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320" font-family="sans-serif" font-size="13">
  <rect width="640" height="320" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="15" font-weight="bold">An IPv4 address: four numbers, 32 bits total</text>

  <!-- Four octet boxes -->
  <g stroke="#000000" stroke-width="2" fill="#ffffff">
    <rect x="60"  y="60" width="120" height="70"/>
    <rect x="200" y="60" width="120" height="70"/>
    <rect x="340" y="60" width="120" height="70"/>
    <rect x="480" y="60" width="100" height="70"/>
  </g>
  <text x="120" y="100" text-anchor="middle" font-size="22" font-weight="bold">192</text>
  <text x="260" y="100" text-anchor="middle" font-size="22" font-weight="bold">168</text>
  <text x="400" y="100" text-anchor="middle" font-size="22" font-weight="bold">1</text>
  <text x="530" y="100" text-anchor="middle" font-size="22" font-weight="bold">5</text>

  <!-- dots between -->
  <text x="190" y="100" text-anchor="middle" font-size="22" font-weight="bold">.</text>
  <text x="330" y="100" text-anchor="middle" font-size="22" font-weight="bold">.</text>
  <text x="470" y="100" text-anchor="middle" font-size="22" font-weight="bold">.</text>

  <!-- Each is 8 bits / 0-255 -->
  <text x="120" y="148" text-anchor="middle" font-size="10">8 bits (0-255)</text>
  <text x="260" y="148" text-anchor="middle" font-size="10">8 bits (0-255)</text>
  <text x="400" y="148" text-anchor="middle" font-size="10">8 bits (0-255)</text>
  <text x="530" y="148" text-anchor="middle" font-size="10">8 bits (0-255)</text>
  <text x="320" y="170" text-anchor="middle" font-size="11">4 numbers x 8 bits = 32 bits in all</text>

  <!-- Network part vs host part split -->
  <text x="320" y="205" text-anchor="middle" font-size="13" font-weight="bold">The address splits into two parts:</text>

  <!-- Network part bracket (first three octets, shaded with diagonal hatch) -->
  <rect x="60" y="222" width="280" height="44" fill="url(#hatch)" stroke="#000000" stroke-width="1.5"/>
  <text x="200" y="240" text-anchor="middle" font-size="12" font-weight="bold">NETWORK part</text>
  <text x="200" y="257" text-anchor="middle" font-size="10">which network (192.168.1)</text>

  <!-- Host part bracket (last octet, plain white) -->
  <rect x="340" y="222" width="240" height="44" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="460" y="240" text-anchor="middle" font-size="12" font-weight="bold">HOST part</text>
  <text x="460" y="257" text-anchor="middle" font-size="10">which device on it (.5)</text>

  <text x="320" y="296" text-anchor="middle" font-size="11">Like a street (network) and a house number (host). Where the line falls</text>
  <text x="320" y="312" text-anchor="middle" font-size="11">is set by the subnet -- the topic of the next sub-topic.</text>

  <defs>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#ffffff"/>
      <path d="M0,8 L8,0" stroke="#000000" stroke-width="1"/>
    </pattern>
  </defs>
</svg>
