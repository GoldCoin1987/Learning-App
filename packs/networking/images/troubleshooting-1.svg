<svg xmlns="http://www.w3.org/2000/svg" width="660" height="560" viewBox="0 0 660 560" font-family="monospace" font-size="12">
  <rect width="660" height="560" fill="#ffffff"/>
  <text x="330" y="26" text-anchor="middle" font-size="15" font-weight="bold">Layered Diagnostic Flow: Link &#8594; IP &#8594; DNS &#8594; TCP &#8594; App</text>

  <!-- step boxes -->
  <rect x="200" y="44"  width="260" height="40" rx="5" fill="#e8eef5" stroke="#1f2d3d"/>
  <text x="330" y="62" text-anchor="middle" font-weight="bold">1. Link up?</text>
  <text x="330" y="78" text-anchor="middle" fill="#555">ip link / ethtool</text>

  <rect x="200" y="120" width="260" height="40" rx="5" fill="#e8eef5" stroke="#1f2d3d"/>
  <text x="330" y="138" text-anchor="middle" font-weight="bold">2. IP + gateway? reach gateway?</text>
  <text x="330" y="154" text-anchor="middle" fill="#555">ip addr / ip route / ping GW / ip neigh</text>

  <rect x="200" y="196" width="260" height="40" rx="5" fill="#e8eef5" stroke="#1f2d3d"/>
  <text x="330" y="214" text-anchor="middle" font-weight="bold">3. DNS resolves?</text>
  <text x="330" y="230" text-anchor="middle" fill="#555">dig name / dig @1.1.1.1</text>

  <rect x="200" y="272" width="260" height="40" rx="5" fill="#e8eef5" stroke="#1f2d3d"/>
  <text x="330" y="290" text-anchor="middle" font-weight="bold">4. Path OK? TCP opens?</text>
  <text x="330" y="306" text-anchor="middle" fill="#555">mtr host / nc -vz host 443</text>

  <rect x="200" y="348" width="260" height="40" rx="5" fill="#e8eef5" stroke="#1f2d3d"/>
  <text x="330" y="366" text-anchor="middle" font-weight="bold">5. App responds?</text>
  <text x="330" y="382" text-anchor="middle" fill="#555">curl -v https://host</text>

  <rect x="200" y="424" width="260" height="40" rx="5" fill="#d4f5dd" stroke="#1a7f37" stroke-width="2"/>
  <text x="330" y="448" text-anchor="middle" font-weight="bold" fill="#1a7f37">Fault isolated to a layer</text>

  <!-- down arrows (PASS) -->
  <g stroke="#1a7f37" stroke-width="2" fill="none">
    <path d="M330 84 L330 120" marker-end="url(#g)"/>
    <path d="M330 160 L330 196" marker-end="url(#g)"/>
    <path d="M330 236 L330 272" marker-end="url(#g)"/>
    <path d="M330 312 L330 348" marker-end="url(#g)"/>
    <path d="M330 388 L330 424" marker-end="url(#g)"/>
  </g>
  <text x="345" y="108" fill="#1a7f37">pass</text>
  <text x="345" y="184" fill="#1a7f37">pass</text>
  <text x="345" y="260" fill="#1a7f37">pass</text>
  <text x="345" y="336" fill="#1a7f37">pass</text>
  <text x="345" y="412" fill="#1a7f37">pass</text>

  <!-- fail branch to right -->
  <g stroke="#b00020" stroke-width="2" fill="none">
    <path d="M460 64  L560 64  L560 444 L460 444" marker-end="url(#r)"/>
    <path d="M460 140 L560 140" />
    <path d="M460 216 L560 216" />
    <path d="M460 292 L560 292" />
    <path d="M460 368 L560 368" />
  </g>
  <text x="565" y="250" fill="#b00020" font-weight="bold">FAIL here =</text>
  <text x="565" y="268" fill="#b00020" font-weight="bold">this layer is</text>
  <text x="565" y="286" fill="#b00020" font-weight="bold">the culprit</text>

  <text x="20" y="500" fill="#555">Verify each layer ONLY assuming the one below it passed.</text>
  <text x="20" y="520" fill="#555">First failing step localizes the fault &#8594; reach for that layer's tool + tcpdump.</text>
  <text x="20" y="540" fill="#555">Top-down works too: start at curl, descend on failure.</text>

  <defs>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1a7f37"/>
    </marker>
    <marker id="r" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#b00020"/>
    </marker>
  </defs>
</svg>
