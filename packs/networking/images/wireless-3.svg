<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="sans-serif" font-size="13">
  <rect width="640" height="380" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">A wire is private. The air is shared.</text>

  <!-- WIRED side -->
  <text x="160" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">WIRED (cable)</text>
  <rect x="60" y="80" width="80" height="44" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="100" y="107" text-anchor="middle" font-size="12" fill="#000000">Computer A</text>
  <rect x="180" y="80" width="80" height="44" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="220" y="107" text-anchor="middle" font-size="12" fill="#000000">Computer B</text>
  <!-- the private wire -->
  <line x1="140" y1="102" x2="180" y2="102" stroke="#000000" stroke-width="3"/>
  <text x="160" y="146" text-anchor="middle" font-size="11" fill="#000000">Its own wire.</text>
  <text x="160" y="162" text-anchor="middle" font-size="11" fill="#000000">Only B hears A.</text>
  <text x="160" y="178" text-anchor="middle" font-size="11" fill="#000000">No one else does.</text>

  <!-- divider -->
  <line x1="320" y1="70" x2="320" y2="330" stroke="#000000" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- WIRELESS side -->
  <text x="480" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">WIRELESS (radio waves)</text>
  <!-- talker -->
  <circle cx="420" cy="150" r="10" fill="#000000"/>
  <text x="420" y="180" text-anchor="middle" font-size="12" fill="#000000">A talks</text>
  <!-- radio rings spreading to everyone -->
  <g fill="none" stroke="#000000" stroke-width="1.2">
    <path d="M 432 138 A 22 22 0 0 1 432 162"/>
    <path d="M 440 130 A 36 36 0 0 1 440 170"/>
    <path d="M 448 122 A 52 52 0 0 1 448 178"/>
  </g>
  <!-- listeners, all hear it -->
  <circle cx="540" cy="110" r="9" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="560" y="114" font-size="11" fill="#000000">B hears it</text>
  <circle cx="540" cy="150" r="9" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="560" y="154" font-size="11" fill="#000000">C hears it</text>
  <circle cx="540" cy="190" r="9" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="560" y="194" font-size="11" fill="#000000">D hears it</text>
  <text x="480" y="232" text-anchor="middle" font-size="11" fill="#000000">Everyone nearby shares the same air,</text>
  <text x="480" y="248" text-anchor="middle" font-size="11" fill="#000000">so devices must take turns talking.</text>

  <text x="320" y="300" text-anchor="middle" font-size="12" fill="#000000">Same data either way. A wire keeps it to itself;</text>
  <text x="320" y="318" text-anchor="middle" font-size="12" fill="#000000">radio waves go out into shared air that everyone around can hear.</text>
</svg>
