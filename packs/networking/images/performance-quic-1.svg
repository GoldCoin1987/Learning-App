<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" font-family="sans-serif" font-size="12">
  <rect width="680" height="380" fill="#ffffff"/>
  <text x="340" y="24" text-anchor="middle" font-size="16" font-weight="bold">Connection setup latency: TCP+TLS 1.3 vs QUIC</text>

  <!-- ===== Left: TCP + TLS 1.3 ===== -->
  <text x="170" y="52" text-anchor="middle" font-weight="bold">TCP + TLS 1.3 (HTTP/2)</text>
  <line x1="60"  y1="64" x2="60"  y2="320" stroke="#345" stroke-width="2"/>
  <line x1="280" y1="64" x2="280" y2="320" stroke="#a60" stroke-width="2"/>
  <text x="60"  y="78" text-anchor="middle" font-size="11">Client</text>
  <text x="280" y="78" text-anchor="middle" font-size="11">Server</text>

  <!-- TCP handshake = 1 RTT -->
  <line x1="60"  y1="96"  x2="280" y2="116" stroke="#333" marker-end="url(#b)"/>
  <text x="170" y="92"  text-anchor="middle" font-size="10">SYN</text>
  <line x1="280" y1="116" x2="60"  y2="136" stroke="#333" marker-end="url(#b)"/>
  <text x="170" y="132" text-anchor="middle" font-size="10">SYN-ACK</text>
  <!-- TLS handshake = 1 RTT -->
  <line x1="60"  y1="150" x2="280" y2="170" stroke="#2c7a2c" marker-end="url(#b)"/>
  <text x="170" y="146" text-anchor="middle" font-size="10" fill="#2c7a2c">ClientHello</text>
  <line x1="280" y1="170" x2="60"  y2="190" stroke="#2c7a2c" marker-end="url(#b)"/>
  <text x="170" y="186" text-anchor="middle" font-size="10" fill="#2c7a2c">ServerHello + keys</text>
  <!-- first app data -->
  <line x1="60"  y1="204" x2="280" y2="224" stroke="#933" marker-end="url(#b)" stroke-width="2"/>
  <text x="170" y="200" text-anchor="middle" font-size="10" fill="#933">GET (1st request)</text>
  <text x="170" y="300" text-anchor="middle" font-size="12" font-weight="bold" fill="#933">= 2 RTT before data</text>

  <!-- ===== Right: QUIC ===== -->
  <text x="510" y="52" text-anchor="middle" font-weight="bold">QUIC (HTTP/3, over UDP)</text>
  <line x1="400" y1="64" x2="400" y2="320" stroke="#345" stroke-width="2"/>
  <line x1="620" y1="64" x2="620" y2="320" stroke="#a60" stroke-width="2"/>
  <text x="400" y="78" text-anchor="middle" font-size="11">Client</text>
  <text x="620" y="78" text-anchor="middle" font-size="11">Server</text>

  <!-- combined transport+crypto = 1 RTT, data on 1st flight -->
  <line x1="400" y1="96"  x2="620" y2="116" stroke="#2c7a2c" marker-end="url(#b)"/>
  <text x="510" y="92"  text-anchor="middle" font-size="10" fill="#2c7a2c">Initial + ClientHello + GET</text>
  <line x1="620" y1="116" x2="400" y2="136" stroke="#2c7a2c" marker-end="url(#b)"/>
  <text x="510" y="132" text-anchor="middle" font-size="10" fill="#2c7a2c">ServerHello + keys + response</text>
  <text x="510" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c7a2c">= 1 RTT (0 RTT on resume)</text>

  <text x="340" y="350" text-anchor="middle" font-style="italic" fill="#555">QUIC folds transport + TLS into one handshake; streams avoid TCP head-of-line blocking</text>
  <defs>
    <marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
</svg>
