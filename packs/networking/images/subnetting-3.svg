<svg xmlns="http://www.w3.org/2000/svg" width="680" height="340" viewBox="0 0 680 340" font-family="sans-serif" font-size="13">
  <rect width="680" height="340" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="bold">What "/24" means: the first 24 bits are the network part</text>

  <!-- The 32 bits in four octets -->
  <text x="340" y="52" text-anchor="middle" font-size="12">192.168.1.5  written as 32 bits (four 8-bit groups):</text>

  <!-- Octet 1 (network) -->
  <rect x="40" y="70" width="140" height="46" fill="url(#hatch)" stroke="#000000" stroke-width="1.5"/>
  <text x="110" y="99" text-anchor="middle" font-family="monospace" font-size="15">11000000</text>
  <text x="110" y="132" text-anchor="middle" font-size="11">192</text>

  <!-- Octet 2 (network) -->
  <rect x="180" y="70" width="140" height="46" fill="url(#hatch)" stroke="#000000" stroke-width="1.5"/>
  <text x="250" y="99" text-anchor="middle" font-family="monospace" font-size="15">10101000</text>
  <text x="250" y="132" text-anchor="middle" font-size="11">168</text>

  <!-- Octet 3 (network) -->
  <rect x="320" y="70" width="140" height="46" fill="url(#hatch)" stroke="#000000" stroke-width="1.5"/>
  <text x="390" y="99" text-anchor="middle" font-family="monospace" font-size="15">00000001</text>
  <text x="390" y="132" text-anchor="middle" font-size="11">1</text>

  <!-- Octet 4 (host) -->
  <rect x="460" y="70" width="140" height="46" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="530" y="99" text-anchor="middle" font-family="monospace" font-size="15">00000101</text>
  <text x="530" y="132" text-anchor="middle" font-size="11">5</text>

  <!-- Network bracket -->
  <line x1="40" y1="150" x2="460" y2="150" stroke="#000000" stroke-width="1.5"/>
  <line x1="40" y1="146" x2="40" y2="154" stroke="#000000" stroke-width="1.5"/>
  <line x1="460" y1="146" x2="460" y2="154" stroke="#000000" stroke-width="1.5"/>
  <text x="250" y="170" text-anchor="middle" font-size="12" font-weight="bold">first 24 bits = NETWORK part (shaded)</text>
  <text x="250" y="186" text-anchor="middle" font-size="11">same for every device on this network</text>

  <!-- Host bracket -->
  <line x1="460" y1="150" x2="600" y2="150" stroke="#000000" stroke-width="1.5"/>
  <line x1="600" y1="146" x2="600" y2="154" stroke="#000000" stroke-width="1.5"/>
  <text x="530" y="170" text-anchor="middle" font-size="12" font-weight="bold">last 8 bits = HOST</text>
  <text x="530" y="186" text-anchor="middle" font-size="11">picks the device</text>

  <!-- Read-off box -->
  <rect x="40" y="210" width="600" height="110" fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="340" y="234" text-anchor="middle" font-size="13" font-weight="bold">So 192.168.1.0/24 is the block of addresses</text>
  <text x="340" y="258" text-anchor="middle" font-family="monospace" font-size="14">192.168.1.0  through  192.168.1.255</text>
  <text x="340" y="282" text-anchor="middle" font-size="11">The "/24" just says: lock the first 24 bits, let the last 8 bits (0-255) vary.</text>
  <text x="340" y="302" text-anchor="middle" font-size="11">That is 256 addresses in this one network. No binary math needed to read it.</text>

  <defs>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#ffffff"/>
      <path d="M0,8 L8,0" stroke="#000000" stroke-width="1"/>
    </pattern>
  </defs>
</svg>
