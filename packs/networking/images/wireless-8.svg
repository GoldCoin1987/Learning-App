<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" font-family="sans-serif" font-size="13">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Cellular: many towers, each covering a "cell"</text>
  <text x="320" y="46" text-anchor="middle" font-size="12" fill="#000000">Carriers cover whole cities with overlapping zones so your phone works anywhere.</text>

  <!-- three hexagon-ish cells with towers -->
  <!-- cell 1 -->
  <polygon points="120,140 170,112 220,140 220,196 170,224 120,196" fill="none" stroke="#000000" stroke-width="1.5"/>
  <line x1="170" y1="168" x2="170" y2="140" stroke="#000000" stroke-width="2"/>
  <polygon points="170,140 164,150 176,150" fill="#000000"/>
  <text x="170" y="186" text-anchor="middle" font-size="11" fill="#000000">Tower A</text>

  <!-- cell 2 -->
  <polygon points="240,140 290,112 340,140 340,196 290,224 240,196" fill="none" stroke="#000000" stroke-width="1.5"/>
  <line x1="290" y1="168" x2="290" y2="140" stroke="#000000" stroke-width="2"/>
  <polygon points="290,140 284,150 296,150" fill="#000000"/>
  <text x="290" y="186" text-anchor="middle" font-size="11" fill="#000000">Tower B</text>

  <!-- cell 3 -->
  <polygon points="360,140 410,112 460,140 460,196 410,224 360,196" fill="none" stroke="#000000" stroke-width="1.5"/>
  <line x1="410" y1="168" x2="410" y2="140" stroke="#000000" stroke-width="2"/>
  <polygon points="410,140 404,150 416,150" fill="#000000"/>
  <text x="410" y="186" text-anchor="middle" font-size="11" fill="#000000">Tower C</text>

  <!-- moving car/phone with handoff -->
  <rect x="150" y="250" width="50" height="30" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="175" y="270" text-anchor="middle" font-size="10" fill="#000000">phone</text>
  <line x1="175" y1="250" x2="175" y2="224" stroke="#000000" stroke-width="1.2" stroke-dasharray="3 3"/>

  <!-- movement arrow -->
  <line x1="205" y1="265" x2="430" y2="265" stroke="#000000" stroke-width="2" marker-end="url(#ar3)"/>
  <text x="320" y="258" text-anchor="middle" font-size="11" fill="#000000">you move this way -></text>

  <text x="320" y="306" text-anchor="middle" font-size="12" fill="#000000">As you move out of one cell into the next, the call is</text>
  <text x="320" y="324" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">handed off</text>
  <text x="320" y="342" text-anchor="middle" font-size="12" fill="#000000">from Tower A to B to C without dropping.</text>

  <text x="320" y="376" text-anchor="middle" font-size="11" fill="#000000">A SIM card in the phone tells the network who you are so the right carrier connects you.</text>

  <defs>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0,1 L8,5 L0,9 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
