<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="sans-serif" font-size="13">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold">An overlay: a virtual network drawn on top of the physical one</text>

  <!-- Overlay (top) -->
  <text x="60" y="58" font-weight="bold">Virtual network (overlay)</text>
  <rect x="40" y="68" width="560" height="80" fill="#ffffff" stroke="#000000" stroke-dasharray="5 4"/>
  <rect x="90" y="92" width="90" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="135" y="114" text-anchor="middle">VM / pod A</text>
  <rect x="460" y="92" width="90" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="505" y="114" text-anchor="middle">VM / pod B</text>
  <line x1="180" y1="110" x2="460" y2="110" stroke="#000000" stroke-dasharray="5 4"/>
  <text x="320" y="104" text-anchor="middle" font-size="11">looks like one direct virtual link (same virtual network, e.g. VXLAN ID)</text>

  <!-- mapping arrows -->
  <line x1="135" y1="148" x2="135" y2="210" stroke="#000000" marker-end="url(#ar4)"/>
  <line x1="505" y1="148" x2="505" y2="210" stroke="#000000" marker-end="url(#ar4)"/>
  <text x="320" y="180" text-anchor="middle" font-size="12">the overlay is wrapped (encapsulated) and sent over the real wires below</text>

  <!-- Physical (bottom) -->
  <text x="60" y="232" font-weight="bold">Physical network (underlay)</text>
  <rect x="40" y="242" width="560" height="96" fill="#ffffff" stroke="#000000"/>
  <rect x="90" y="270" width="90" height="40" fill="#ffffff" stroke="#000000"/>
  <text x="135" y="288" text-anchor="middle" font-size="12">Host 1</text>
  <text x="135" y="304" text-anchor="middle" font-size="11">(VTEP)</text>
  <rect x="460" y="270" width="90" height="40" fill="#ffffff" stroke="#000000"/>
  <text x="505" y="288" text-anchor="middle" font-size="12">Host 2</text>
  <text x="505" y="304" text-anchor="middle" font-size="11">(VTEP)</text>
  <!-- real routed path through middle box -->
  <rect x="290" y="272" width="60" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="320" y="294" text-anchor="middle" font-size="11">router</text>
  <line x1="180" y1="290" x2="290" y2="290" stroke="#000000"/>
  <line x1="350" y1="290" x2="460" y2="290" stroke="#000000"/>
  <text x="320" y="330" text-anchor="middle" font-size="11">Real IP path: many hops. The overlay hides all of this from the VMs.</text>

  <defs>
    <marker id="ar4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#000000"/>
    </marker>
  </defs>
</svg>
