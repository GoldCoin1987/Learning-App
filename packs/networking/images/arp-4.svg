<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd  { font-size:13px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .t   { font-size:12px; fill:#000000; }
    .tc  { font-size:12px; fill:#000000; text-anchor:middle; }
    .mono { font-size:12px; fill:#000000; text-anchor:middle; font-family:monospace; }
  </style>
  <text class="ttl" x="380" y="26">Reaching a far-away device: ARP for the GATEWAY, not the destination</text>

  <!-- Host A -->
  <rect class="box" x="30" y="70" width="180" height="66"/>
  <text class="hd" x="120" y="92">Your computer (A)</text>
  <text class="mono" x="120" y="112">192.168.1.10</text>
  <text class="tc" x="120" y="128">on your local network</text>

  <!-- Gateway / router -->
  <rect class="box" x="290" y="70" width="180" height="66"/>
  <text class="hd" x="380" y="92">Gateway / router</text>
  <text class="mono" x="380" y="112">192.168.1.1</text>
  <text class="tc" x="380" y="128">the "door" out</text>

  <!-- Internet cloud (simple box) -->
  <rect class="box" x="550" y="70" width="180" height="66"/>
  <text class="hd" x="640" y="92">Far-away server</text>
  <text class="mono" x="640" y="112">8.8.8.8</text>
  <text class="tc" x="640" y="128">on a DIFFERENT network</text>

  <!-- connection lines -->
  <line x1="210" y1="103" x2="288" y2="103" stroke="#000000" stroke-width="1.5"/>
  <line x1="470" y1="103" x2="548" y2="103" stroke="#000000" stroke-width="1.5"/>
  <text class="tc" x="249" y="156">same local network</text>
  <text class="tc" x="509" y="156">routers + Internet</text>

  <!-- The ARP arrow: A asks only the gateway -->
  <line x1="120" y1="195" x2="375" y2="195" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="t" x="60" y="186">A asks ARP: "Who has 192.168.1.1 (the gateway)?" - NOT "who has 8.8.8.8".</text>
  <text class="t" x="60" y="218">8.8.8.8 is on another network, so A could never reach it with a local shout.</text>

  <text class="t" x="60" y="258">So A builds a frame whose destination MAC is the GATEWAY's MAC,</text>
  <text class="t" x="76" y="276">but whose destination IP is still 8.8.8.8.</text>
  <text class="t" x="60" y="304">Rule of thumb: to leave your network, hand the packet to the gateway.</text>
  <text class="t" x="76" y="322">You only ARP for devices ON your own local network.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
