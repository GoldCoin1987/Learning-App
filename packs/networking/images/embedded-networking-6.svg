<svg xmlns="http://www.w3.org/2000/svg" width="700" height="320" viewBox="0 0 700 320" font-family="sans-serif" font-size="13">
  <rect width="700" height="320" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="bold">A gateway (hub) bridges tiny devices to the internet</text>

  <!-- tiny devices on the left -->
  <text x="105" y="60" text-anchor="middle" font-weight="bold">Tiny devices</text>
  <text x="105" y="76" text-anchor="middle" fill="#333" font-size="11">(low-power radio)</text>

  <rect x="50" y="92" width="110" height="34" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="105" y="114" text-anchor="middle">Bulb</text>
  <rect x="50" y="148" width="110" height="34" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="105" y="170" text-anchor="middle">Lock</text>
  <rect x="50" y="204" width="110" height="34" rx="6" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="105" y="226" text-anchor="middle">Sensor</text>

  <!-- gateway in middle -->
  <rect x="280" y="125" width="140" height="80" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="350" y="158" text-anchor="middle" font-weight="bold">Gateway / Hub</text>
  <text x="350" y="178" text-anchor="middle" fill="#333" font-size="11">translates + relays</text>

  <!-- internet / cloud on right -->
  <ellipse cx="600" cy="165" rx="70" ry="48" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="600" y="160" text-anchor="middle" font-weight="bold">Internet</text>
  <text x="600" y="180" text-anchor="middle" fill="#333" font-size="11">cloud / apps</text>

  <!-- arrows devices -> gateway -->
  <defs>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
  <g stroke="#000000" stroke-width="2" fill="none" marker-end="url(#ahg)">
    <line x1="160" y1="109" x2="278" y2="150"/>
    <line x1="160" y1="165" x2="278" y2="165"/>
    <line x1="160" y1="221" x2="278" y2="180"/>
    <line x1="420" y1="165" x2="528" y2="165"/>
  </g>

  <text x="218" y="262" text-anchor="middle" fill="#333" font-style="italic">tiny low-power links</text>
  <text x="475" y="262" text-anchor="middle" fill="#333" font-style="italic">normal internet (Wi-Fi / Ethernet)</text>

  <text x="350" y="300" text-anchor="middle" fill="#333">The hub speaks both languages so battery devices need not run the full internet stack.</text>
</svg>
