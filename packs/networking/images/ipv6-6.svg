<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" font-family="sans-serif" font-size="13">
  <rect width="680" height="300" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="bold">Finding a neighbor: ARP (IPv4) vs NDP (IPv6)</text>
  <text x="340" y="48" text-anchor="middle" font-size="12">Same job: turn a neighbor's IP address into its hardware (MAC) address.</text>

  <!-- IPv4 / ARP column -->
  <rect x="30" y="70" width="300" height="200" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="180" y="96" text-anchor="middle" font-weight="bold">IPv4: ARP</text>
  <text x="50" y="126" font-size="12">Asks: "Who has 192.168.1.5?"</text>
  <text x="50" y="150" font-size="12">How: broadcast to EVERYONE</text>
  <text x="50" y="174" font-size="12">on the link.</text>
  <text x="50" y="206" font-size="12">Owner replies with its MAC.</text>
  <text x="50" y="238" font-size="11">Everyone is bothered by the</text>
  <text x="50" y="254" font-size="11">broadcast, even uninvolved hosts.</text>

  <!-- IPv6 / NDP column -->
  <rect x="350" y="70" width="300" height="200" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="500" y="96" text-anchor="middle" font-weight="bold">IPv6: NDP</text>
  <text x="370" y="126" font-size="12">Asks: "Who has 2001:db8::5?"</text>
  <text x="370" y="150" font-size="12">How: multicast to a small</text>
  <text x="370" y="174" font-size="12">group (no broadcast).</text>
  <text x="370" y="206" font-size="12">Owner replies with its MAC.</text>
  <text x="370" y="238" font-size="11">Runs on ICMPv6. Newer name,</text>
  <text x="370" y="254" font-size="11">same idea as ARP.</text>
</svg>
