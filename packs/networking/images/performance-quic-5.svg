<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">A long, fat pipe needs a BIG window to stay full</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#000000">"Window" = how much data you are allowed to send before waiting for an OK back.</text>

  <!-- Top: small window -->
  <text x="60" y="84" font-size="13" font-weight="bold" fill="#000000">Window too SMALL for a long pipe:</text>
  <rect x="60" y="96" width="600" height="46" fill="none" stroke="#000000" stroke-width="2"/>
  <rect x="66" y="102" width="70" height="34" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="101" y="123" text-anchor="middle" font-size="11" fill="#000000">data</text>
  <text x="400" y="123" text-anchor="middle" font-size="12" fill="#000000">. . . rest of the pipe sits EMPTY while you wait for the OK . . .</text>
  <text x="360" y="160" text-anchor="middle" font-size="12" fill="#000000">You send a little, then idle. The wide pipe is mostly wasted.</text>

  <!-- Bottom: big window -->
  <text x="60" y="200" font-size="13" font-weight="bold" fill="#000000">Window BIG enough (matches the pipe):</text>
  <rect x="60" y="212" width="600" height="46" fill="none" stroke="#000000" stroke-width="2"/>
  <rect x="66" y="218" width="70" height="34" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="101" y="239" text-anchor="middle" font-size="11" fill="#000000">data</text>
  <rect x="142" y="218" width="70" height="34" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="177" y="239" text-anchor="middle" font-size="11" fill="#000000">data</text>
  <rect x="218" y="218" width="70" height="34" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="253" y="239" text-anchor="middle" font-size="11" fill="#000000">data</text>
  <rect x="294" y="218" width="70" height="34" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="329" y="239" text-anchor="middle" font-size="11" fill="#000000">data</text>
  <rect x="370" y="218" width="70" height="34" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="405" y="239" text-anchor="middle" font-size="11" fill="#000000">data</text>
  <rect x="446" y="218" width="70" height="34" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="481" y="239" text-anchor="middle" font-size="11" fill="#000000">data</text>
  <rect x="522" y="218" width="70" height="34" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="557" y="239" text-anchor="middle" font-size="11" fill="#000000">data</text>
  <rect x="598" y="218" width="56" height="34" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="626" y="239" text-anchor="middle" font-size="11" fill="#000000">data</text>
  <text x="360" y="276" text-anchor="middle" font-size="12" fill="#000000">Enough data in flight to keep the whole pipe busy. No idle gaps.</text>

  <text x="360" y="318" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">The longer (higher latency) AND wider (more bandwidth) the pipe, the bigger the window must be.</text>
  <text x="360" y="346" text-anchor="middle" font-size="12" fill="#000000">If the window is too small, a single connection cannot use all the bandwidth - speed is capped.</text>
  <text x="360" y="370" text-anchor="middle" font-size="11" fill="#000000">(This "fill the pipe" amount is the bandwidth-delay product: width x there-and-back time.)</text>
</svg>
