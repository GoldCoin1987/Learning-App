<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="sans-serif" font-size="13">
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="bold">Hybrid: agree on a secret, then switch to fast encryption</text>

  <!-- actors -->
  <text x="110" y="60" text-anchor="middle" font-size="14" font-weight="bold">You (browser)</text>
  <text x="610" y="60" text-anchor="middle" font-size="14" font-weight="bold">Server (bank)</text>
  <line x1="110" y1="70" x2="110" y2="320" stroke="#000" stroke-width="1.5"/>
  <line x1="610" y1="70" x2="610" y2="320" stroke="#000" stroke-width="1.5"/>

  <!-- Step 1: server public lock -->
  <text x="40" y="100" font-size="12" font-weight="bold">Step 1</text>
  <line x1="610" y1="112" x2="110" y2="112" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="104" text-anchor="middle" font-size="11">Server sends its PUBLIC lock</text>

  <!-- Step 2: client makes secret, locks it -->
  <rect x="150" y="132" width="200" height="44" fill="#ffffff" stroke="#000"/>
  <text x="250" y="150" text-anchor="middle" font-size="11">You invent a random</text>
  <text x="250" y="166" text-anchor="middle" font-size="11">shared secret &amp; LOCK it</text>

  <!-- Step 3: send locked secret -->
  <text x="40" y="208" font-size="12" font-weight="bold">Step 2</text>
  <line x1="110" y1="220" x2="610" y2="220" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="212" text-anchor="middle" font-size="11">Send the LOCKED secret (snoop cannot open it)</text>

  <!-- Step 4: server unlocks with private key -->
  <rect x="430" y="240" width="260" height="44" fill="#ffffff" stroke="#000"/>
  <text x="560" y="258" text-anchor="middle" font-size="11">Server opens it with its</text>
  <text x="560" y="274" text-anchor="middle" font-size="11">PRIVATE key. Now BOTH share it.</text>

  <!-- Step 5: fast symmetric -->
  <text x="40" y="312" font-size="12" font-weight="bold">Step 3</text>
  <rect x="150" y="298" width="420" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="315" text-anchor="middle" font-size="11">Switch to the FAST shared key for all real data</text>

  <text x="20" y="348" font-size="12">Public-key (slow) is used only to share the secret safely; the fast symmetric key does the bulk work.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
  </defs>
</svg>
