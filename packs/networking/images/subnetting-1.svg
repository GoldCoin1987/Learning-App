<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" font-family="sans-serif">
  <style>
    .cell { stroke:#222; stroke-width:1; }
    .hdr  { fill:#dfe7f3; }
    .net  { fill:#cfe9d6; }
    .bc   { fill:#f2cdcd; }
    .rng  { fill:#f6e2c0; }
    .h    { font-size:13px; fill:#111; text-anchor:middle; font-weight:bold; }
    .t    { font-size:12px; fill:#111; text-anchor:middle; }
    .note { font-size:12px; fill:#333; }
    .mono { font-family:monospace; }
  </style>
  <text x="380" y="24" font-size="16" font-weight="bold" text-anchor="middle">192.168.10.0/24 split into 4 equal /26 subnets</text>
  <text x="380" y="44" class="note" text-anchor="middle">Borrow 2 bits (2^2 = 4 subnets). Block size = 256 - 192 = 64. New mask 255.255.255.192.</text>

  <!-- header row -->
  <rect class="cell hdr" x="20"  y="60" width="150" height="34"/>
  <rect class="cell hdr" x="170" y="60" width="150" height="34"/>
  <rect class="cell hdr" x="320" y="60" width="230" height="34"/>
  <rect class="cell hdr" x="550" y="60" width="150" height="34"/>
  <text class="h" x="95"  y="82">Network</text>
  <text class="h" x="245" y="82">Broadcast</text>
  <text class="h" x="435" y="82">Usable host range</text>
  <text class="h" x="625" y="82">Hosts (2^6 - 2)</text>

  <!-- row 1 -->
  <rect class="cell net" x="20"  y="94" width="150" height="44"/>
  <rect class="cell bc"  x="170" y="94" width="150" height="44"/>
  <rect class="cell rng" x="320" y="94" width="230" height="44"/>
  <rect class="cell"     x="550" y="94" width="150" height="44"/>
  <text class="t mono" x="95"  y="121">.0/26</text>
  <text class="t mono" x="245" y="121">.63</text>
  <text class="t mono" x="435" y="121">.1 &#8211; .62</text>
  <text class="t" x="625" y="121">62</text>

  <!-- row 2 -->
  <rect class="cell net" x="20"  y="138" width="150" height="44"/>
  <rect class="cell bc"  x="170" y="138" width="150" height="44"/>
  <rect class="cell rng" x="320" y="138" width="230" height="44"/>
  <rect class="cell"     x="550" y="138" width="150" height="44"/>
  <text class="t mono" x="95"  y="165">.64/26</text>
  <text class="t mono" x="245" y="165">.127</text>
  <text class="t mono" x="435" y="165">.65 &#8211; .126</text>
  <text class="t" x="625" y="165">62</text>

  <!-- row 3 -->
  <rect class="cell net" x="20"  y="182" width="150" height="44"/>
  <rect class="cell bc"  x="170" y="182" width="150" height="44"/>
  <rect class="cell rng" x="320" y="182" width="230" height="44"/>
  <rect class="cell"     x="550" y="182" width="150" height="44"/>
  <text class="t mono" x="95"  y="209">.128/26</text>
  <text class="t mono" x="245" y="209">.191</text>
  <text class="t mono" x="435" y="209">.129 &#8211; .190</text>
  <text class="t" x="625" y="209">62</text>

  <!-- row 4 -->
  <rect class="cell net" x="20"  y="226" width="150" height="44"/>
  <rect class="cell bc"  x="170" y="226" width="150" height="44"/>
  <rect class="cell rng" x="320" y="226" width="230" height="44"/>
  <rect class="cell"     x="550" y="226" width="150" height="44"/>
  <text class="t mono" x="95"  y="253">.192/26</text>
  <text class="t mono" x="245" y="253">.255</text>
  <text class="t mono" x="435" y="253">.193 &#8211; .254</text>
  <text class="t" x="625" y="253">62</text>

  <text class="note" x="20" y="292">Network = first address of each block; Broadcast = last (block_start + 63); usable = the 62 between.</text>
  <text class="note" x="20" y="310">Trick: in the variable octet, the network address is always a multiple of the block size (0, 64, 128, 192).</text>
</svg>
