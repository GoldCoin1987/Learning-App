<svg xmlns="http://www.w3.org/2000/svg" width="760" height="380" viewBox="0 0 760 380" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd  { font-size:13px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .t   { font-size:12px; fill:#000000; }
    .tc  { font-size:12px; fill:#000000; text-anchor:middle; }
    .mono { font-size:12px; fill:#000000; text-anchor:middle; font-family:monospace; }
    .step { font-size:13px; fill:#000000; font-weight:bold; }
  </style>
  <text class="ttl" x="380" y="26">ARP: "who has this IP? tell me your MAC"</text>

  <!-- Host A box -->
  <rect class="box" x="30" y="55" width="190" height="70"/>
  <text class="hd" x="125" y="78">Host A (the asker)</text>
  <text class="mono" x="125" y="98">IP 192.168.1.10</text>
  <text class="mono" x="125" y="116">MAC aa:aa:aa:11:11:11</text>

  <!-- Host B box -->
  <rect class="box" x="540" y="55" width="190" height="70"/>
  <text class="hd" x="635" y="78">Host B (the owner)</text>
  <text class="mono" x="635" y="98">IP 192.168.1.5</text>
  <text class="mono" x="635" y="116">MAC bb:bb:bb:22:22:22</text>

  <!-- other hosts to show "everyone hears the shout" -->
  <rect class="box" x="320" y="55" width="120" height="70"/>
  <text class="tc" x="380" y="84">other hosts</text>
  <text class="tc" x="380" y="104">on the same</text>
  <text class="tc" x="380" y="120">local network</text>

  <!-- the shared local network line -->
  <rect class="box" x="30" y="150" width="700" height="26"/>
  <text class="tc" x="380" y="168">one local network (the shout reaches everyone here)</text>

  <!-- Step 1: broadcast request -->
  <text class="step" x="30" y="216">Step 1 - REQUEST, sent to EVERYONE (a broadcast)</text>
  <line x1="125" y1="228" x2="700" y2="228" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="t" x="130" y="248">A shouts: "Who has 192.168.1.5? Tell 192.168.1.10."</text>
  <text class="t" x="130" y="266">Everyone hears it, but only B's IP matches, so only B answers.</text>

  <!-- Step 2: unicast reply -->
  <text class="step" x="30" y="306">Step 2 - REPLY, sent only to A (a unicast)</text>
  <line x1="635" y1="318" x2="130" y2="318" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="t" x="130" y="338">B answers A directly: "That's me - my MAC is bb:bb:bb:22:22:22."</text>
  <text class="t" x="130" y="356">Now A knows B's MAC and can build the frame to send its data.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
