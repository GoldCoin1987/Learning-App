<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="sans-serif" font-size="13">
  <rect width="720" height="320" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="bold">The three things TLS gives you</text>

  <!-- box 1: encryption -->
  <rect x="30" y="60" width="200" height="200" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="130" y="86" text-anchor="middle" font-size="14" font-weight="bold">1. Encryption</text>
  <text x="130" y="104" text-anchor="middle" font-size="11">(confidentiality)</text>
  <!-- envelope icon -->
  <rect x="80" y="120" width="100" height="64" fill="#ffffff" stroke="#000"/>
  <line x1="80" y1="120" x2="130" y2="155" stroke="#000"/>
  <line x1="180" y1="120" x2="130" y2="155" stroke="#000"/>
  <text x="130" y="210" text-anchor="middle" font-size="11">A snoop sees only</text>
  <text x="130" y="226" text-anchor="middle" font-size="11">scrambled bytes.</text>
  <text x="130" y="248" text-anchor="middle" font-size="10">"sealed letter"</text>

  <!-- box 2: integrity -->
  <rect x="260" y="60" width="200" height="200" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="360" y="86" text-anchor="middle" font-size="14" font-weight="bold">2. Integrity</text>
  <text x="360" y="104" text-anchor="middle" font-size="11">(no silent tampering)</text>
  <!-- broken seal -->
  <rect x="310" y="120" width="100" height="64" fill="#ffffff" stroke="#000"/>
  <path d="M 360 120 L 355 152 L 366 160 L 358 184" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="360" y="210" text-anchor="middle" font-size="11">If bytes are changed,</text>
  <text x="360" y="226" text-anchor="middle" font-size="11">the seal breaks and</text>
  <text x="360" y="242" text-anchor="middle" font-size="11">it is detected.</text>

  <!-- box 3: authentication -->
  <rect x="490" y="60" width="200" height="200" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="590" y="86" text-anchor="middle" font-size="14" font-weight="bold">3. Authentication</text>
  <text x="590" y="104" text-anchor="middle" font-size="11">(who you talk to)</text>
  <!-- ID card -->
  <rect x="540" y="120" width="100" height="64" fill="#ffffff" stroke="#000"/>
  <circle cx="562" cy="142" r="10" fill="#ffffff" stroke="#000"/>
  <line x1="582" y1="136" x2="628" y2="136" stroke="#000"/>
  <line x1="582" y1="150" x2="628" y2="150" stroke="#000"/>
  <line x1="552" y1="170" x2="628" y2="170" stroke="#000"/>
  <text x="590" y="210" text-anchor="middle" font-size="11">You are really at the</text>
  <text x="590" y="226" text-anchor="middle" font-size="11">real bank.com, proven</text>
  <text x="590" y="242" text-anchor="middle" font-size="11">by a certificate ("ID").</text>

  <text x="360" y="298" text-anchor="middle" font-size="12">Remember: Encryption + Integrity + Authentication. This is what the padlock in your browser promises.</text>
</svg>
