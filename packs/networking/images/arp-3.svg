<svg xmlns="http://www.w3.org/2000/svg" width="700" height="340" viewBox="0 0 700 340" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd  { font-size:13px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .cell { font-size:13px; fill:#000000; text-anchor:middle; font-family:monospace; }
    .t   { font-size:12px; fill:#000000; }
  </style>
  <text class="ttl" x="350" y="26">The ARP cache: a remembered list of IP -&gt; MAC</text>
  <text class="t" x="60" y="52">Once A learns a MAC, it saves it so it does not have to ask again every time.</text>

  <!-- table header -->
  <rect class="box" x="60" y="70" width="220" height="34"/>
  <rect class="box" x="280" y="70" width="240" height="34"/>
  <rect class="box" x="520" y="70" width="120" height="34"/>
  <text class="hd" x="170" y="92">IP address (logical)</text>
  <text class="hd" x="400" y="92">MAC address (hardware)</text>
  <text class="hd" x="580" y="92">Time left</text>

  <!-- row 1 -->
  <rect class="box" x="60" y="104" width="220" height="32"/>
  <rect class="box" x="280" y="104" width="240" height="32"/>
  <rect class="box" x="520" y="104" width="120" height="32"/>
  <text class="cell" x="170" y="125">192.168.1.5</text>
  <text class="cell" x="400" y="125">bb:bb:bb:22:22:22</text>
  <text class="cell" x="580" y="125">28 s</text>

  <!-- row 2 -->
  <rect class="box" x="60" y="136" width="220" height="32"/>
  <rect class="box" x="280" y="136" width="240" height="32"/>
  <rect class="box" x="520" y="136" width="120" height="32"/>
  <text class="cell" x="170" y="157">192.168.1.1</text>
  <text class="cell" x="400" y="157">cc:cc:cc:33:33:33</text>
  <text class="cell" x="580" y="157">55 s</text>

  <!-- row 3 -->
  <rect class="box" x="60" y="168" width="220" height="32"/>
  <rect class="box" x="280" y="168" width="240" height="32"/>
  <rect class="box" x="520" y="168" width="120" height="32"/>
  <text class="cell" x="170" y="189">192.168.1.42</text>
  <text class="cell" x="400" y="189">dd:dd:dd:44:44:44</text>
  <text class="cell" x="580" y="189">9 s</text>

  <text class="t" x="60" y="232">View it yourself:  ip neigh   (modern Linux)    or    arp -a   (older command)</text>
  <text class="t" x="60" y="262">Entries EXPIRE after a short time. When "Time left" hits 0, the row is dropped.</text>
  <text class="t" x="60" y="284">Why expire? A device may move, swap its network card, or get a new IP -</text>
  <text class="t" x="76" y="302">so an old saved MAC could become wrong. Re-asking keeps the list honest.</text>
</svg>
