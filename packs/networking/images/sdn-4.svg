<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" font-family="sans-serif" font-size="13">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold">How the controller works: global view, two interfaces</text>

  <!-- Apps / automation on top -->
  <rect x="200" y="50" width="240" height="44" fill="#ffffff" stroke="#000000"/>
  <text x="320" y="70" text-anchor="middle" font-weight="bold">Apps &amp; automation</text>
  <text x="320" y="86" text-anchor="middle" font-size="11">("give tenant A its own network")</text>

  <!-- northbound arrow -->
  <line x1="320" y1="94" x2="320" y2="138" stroke="#000000" marker-end="url(#ar3)"/>
  <text x="455" y="120" text-anchor="middle" font-size="12">NORTHBOUND API</text>
  <text x="455" y="135" text-anchor="middle" font-size="11">(apps tell the controller what they want)</text>

  <!-- Controller with global map -->
  <rect x="160" y="138" width="320" height="96" fill="#ffffff" stroke="#000000"/>
  <text x="320" y="160" text-anchor="middle" font-weight="bold">Controller</text>
  <text x="320" y="178" text-anchor="middle" font-size="11">Holds a GLOBAL MAP of the whole network:</text>
  <!-- tiny map of nodes inside controller -->
  <circle cx="250" cy="200" r="8" fill="#ffffff" stroke="#000000"/>
  <circle cx="320" cy="210" r="8" fill="#ffffff" stroke="#000000"/>
  <circle cx="390" cy="200" r="8" fill="#ffffff" stroke="#000000"/>
  <line x1="258" y1="200" x2="312" y2="208" stroke="#000000"/>
  <line x1="328" y1="208" x2="382" y2="200" stroke="#000000"/>
  <text x="320" y="228" text-anchor="middle" font-size="11">so it can plan the best paths.</text>

  <!-- southbound arrow -->
  <line x1="320" y1="234" x2="320" y2="290" stroke="#000000" marker-end="url(#ar3)"/>
  <text x="455" y="260" text-anchor="middle" font-size="12">SOUTHBOUND (e.g. OpenFlow)</text>
  <text x="455" y="275" text-anchor="middle" font-size="11">(the language used to program switches)</text>

  <!-- Switches at the bottom -->
  <rect x="120" y="290" width="110" height="44" fill="#ffffff" stroke="#000000"/>
  <text x="175" y="316" text-anchor="middle">switch</text>
  <rect x="265" y="290" width="110" height="44" fill="#ffffff" stroke="#000000"/>
  <text x="320" y="316" text-anchor="middle">switch</text>
  <rect x="410" y="290" width="110" height="44" fill="#ffffff" stroke="#000000"/>
  <text x="465" y="316" text-anchor="middle">switch</text>

  <line x1="300" y1="290" x2="200" y2="262" stroke="#000000"/>
  <line x1="340" y1="290" x2="440" y2="262" stroke="#000000"/>

  <text x="320" y="362" text-anchor="middle" font-size="11">Switches just store the rules the controller gives them and forward packets.</text>
  <text x="320" y="382" text-anchor="middle" font-size="11">Northbound = up to apps. Southbound = down to switches.</text>

  <defs>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#000000"/>
    </marker>
  </defs>
</svg>
