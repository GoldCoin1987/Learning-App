<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="monospace" font-size="11">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="22" text-anchor="middle" font-size="15" font-weight="bold">IPv4 Header (20 bytes, no options)</text>

  <!-- bit ruler -->
  <text x="40" y="44" font-size="10">bit 0</text>
  <text x="200" y="44" font-size="10">8</text>
  <text x="360" y="44" font-size="10">16</text>
  <text x="520" y="44" font-size="10">24</text>
  <text x="600" y="44" font-size="10">31</text>

  <!-- Row 1 -->
  <g stroke="#333" stroke-width="1">
    <rect x="40"  y="50" width="80"  height="44" fill="#dbeafe"/>
    <rect x="120" y="50" width="80"  height="44" fill="#dbeafe"/>
    <rect x="200" y="50" width="160" height="44" fill="#fef3c7"/>
    <rect x="360" y="50" width="240" height="44" fill="#dcfce7"/>
  </g>
  <text x="80"  y="70" text-anchor="middle">Version</text>
  <text x="80"  y="84" text-anchor="middle" font-size="9">(4)</text>
  <text x="160" y="70" text-anchor="middle">IHL</text>
  <text x="160" y="84" text-anchor="middle" font-size="9">(4)</text>
  <text x="280" y="70" text-anchor="middle">DSCP/ECN</text>
  <text x="280" y="84" text-anchor="middle" font-size="9">(8)</text>
  <text x="480" y="70" text-anchor="middle">Total Length</text>
  <text x="480" y="84" text-anchor="middle" font-size="9">(16)</text>

  <!-- Row 2 -->
  <g stroke="#333" stroke-width="1">
    <rect x="40"  y="94" width="320" height="44" fill="#dcfce7"/>
    <rect x="360" y="94" width="60"  height="44" fill="#fde68a"/>
    <rect x="420" y="94" width="180" height="44" fill="#dcfce7"/>
  </g>
  <text x="200" y="114" text-anchor="middle">Identification</text>
  <text x="200" y="128" text-anchor="middle" font-size="9">(16)</text>
  <text x="390" y="114" text-anchor="middle" font-size="9">Flags</text>
  <text x="390" y="128" text-anchor="middle" font-size="9">(3)</text>
  <text x="510" y="114" text-anchor="middle">Frag Offset</text>
  <text x="510" y="128" text-anchor="middle" font-size="9">(13)</text>

  <!-- Row 3 -->
  <g stroke="#333" stroke-width="1">
    <rect x="40"  y="138" width="80"  height="44" fill="#fecaca"/>
    <rect x="120" y="138" width="80"  height="44" fill="#dbeafe"/>
    <rect x="200" y="138" width="400" height="44" fill="#dcfce7"/>
  </g>
  <text x="80"  y="158" text-anchor="middle">TTL</text>
  <text x="80"  y="172" text-anchor="middle" font-size="9">(8)</text>
  <text x="160" y="158" text-anchor="middle">Proto</text>
  <text x="160" y="172" text-anchor="middle" font-size="9">(8)</text>
  <text x="400" y="158" text-anchor="middle">Header Checksum</text>
  <text x="400" y="172" text-anchor="middle" font-size="9">(16)</text>

  <!-- Row 4 -->
  <g stroke="#333" stroke-width="1">
    <rect x="40" y="182" width="560" height="44" fill="#e9d5ff"/>
  </g>
  <text x="320" y="202" text-anchor="middle">Source Address (32)</text>

  <!-- Row 5 -->
  <g stroke="#333" stroke-width="1">
    <rect x="40" y="226" width="560" height="44" fill="#e9d5ff"/>
  </g>
  <text x="320" y="246" text-anchor="middle">Destination Address (32)</text>

  <!-- Row 6 options -->
  <g stroke="#333" stroke-width="1" stroke-dasharray="4 3">
    <rect x="40" y="270" width="560" height="34" fill="#f3f4f6"/>
  </g>
  <text x="320" y="291" text-anchor="middle" font-size="10">Options + Padding (0-40 bytes, present only if IHL &gt; 5)</text>

  <text x="40" y="330" font-size="10">Fragmentation uses ID + Flags(DF/MF) + Offset. TTL decrements each hop;</text>
  <text x="40" y="344" font-size="10">reaching 0 -&gt; ICMP Time Exceeded (the engine behind traceroute).</text>
</svg>
