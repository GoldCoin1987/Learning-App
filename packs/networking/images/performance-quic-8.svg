<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="sans-serif">
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">A CDN puts a copy CLOSE to you to cut latency</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#000000">A shorter path means a shorter round trip, so the page feels faster.</text>

  <!-- You -->
  <rect x="40" y="150" width="120" height="60" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="100" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">You</text>
  <text x="100" y="198" text-anchor="middle" font-size="11" fill="#000000">(your city)</text>

  <!-- Nearby edge server (CDN) -->
  <rect x="250" y="150" width="150" height="60" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="325" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">CDN edge server</text>
  <text x="325" y="194" text-anchor="middle" font-size="11" fill="#000000">nearby copy (cache)</text>

  <!-- Far origin -->
  <rect x="540" y="150" width="150" height="60" fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="615" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">origin server</text>
  <text x="615" y="194" text-anchor="middle" font-size="11" fill="#000000">far away</text>

  <!-- short path you<->edge -->
  <line x1="160" y1="180" x2="250" y2="180" stroke="#000000" stroke-width="2" marker-end="url(#a8)"/>
  <line x1="250" y1="172" x2="160" y2="172" stroke="#000000" stroke-width="2" marker-end="url(#a8)"/>
  <text x="205" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">SHORT trip</text>
  <text x="205" y="250" text-anchor="middle" font-size="11" fill="#000000">(low latency)</text>

  <!-- long path edge<->origin, rarely used -->
  <line x1="400" y1="180" x2="540" y2="180" stroke="#000000" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#a8)"/>
  <text x="470" y="232" text-anchor="middle" font-size="12" fill="#000000">LONG trip</text>
  <text x="470" y="250" text-anchor="middle" font-size="11" fill="#000000">(only when the copy is missing)</text>

  <text x="360" y="296" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">Most requests are served by the nearby copy, so the round trip is short.</text>
  <text x="360" y="322" text-anchor="middle" font-size="12" fill="#000000">Caching (reuse a saved copy) and compression (send fewer bytes) also help.</text>
  <text x="360" y="346" text-anchor="middle" font-size="11" fill="#000000">None of this changes physics - it just shortens the distance or shrinks the data.</text>

  <defs>
    <marker id="a8" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
