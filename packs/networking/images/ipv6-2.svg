<svg xmlns="http://www.w3.org/2000/svg" width="660" height="340" viewBox="0 0 660 340" font-family="sans-serif" font-size="13">
  <rect width="660" height="340" fill="#ffffff"/>
  <text x="330" y="28" text-anchor="middle" font-size="16" font-weight="bold">How many addresses? IPv4 vs IPv6</text>

  <!-- IPv4 tiny box -->
  <rect x="60" y="60" width="40" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="80" y="120" text-anchor="middle" font-weight="bold">IPv4</text>
  <text x="80" y="138" text-anchor="middle" font-size="11">32 bits</text>
  <text x="80" y="156" text-anchor="middle" font-size="11">~4.3 billion</text>
  <text x="80" y="174" text-anchor="middle" font-size="11">(we ran out)</text>

  <!-- IPv6 huge box -->
  <rect x="220" y="60" width="380" height="200" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="410" y="150" text-anchor="middle" font-weight="bold" font-size="15">IPv6</text>
  <text x="410" y="172" text-anchor="middle" font-size="12">128 bits</text>
  <text x="410" y="192" text-anchor="middle" font-size="12">~340 undecillion addresses</text>
  <text x="410" y="212" text-anchor="middle" font-size="11">(3.4 followed by 38 zeros)</text>

  <!-- comparison note -->
  <text x="330" y="296" text-anchor="middle" font-size="12">The small box is NOT to scale: IPv6 has so many more</text>
  <text x="330" y="316" text-anchor="middle" font-size="12">addresses that the IPv4 box would be invisibly tiny next to it.</text>
</svg>
