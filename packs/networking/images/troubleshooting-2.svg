<svg xmlns="http://www.w3.org/2000/svg" width="640" height="560" viewBox="0 0 640 560" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .step { font-size:13px; fill:#000000; font-weight:bold; }
    .t { font-size:12px; fill:#000000; }
    .tc { font-size:12px; fill:#000000; text-anchor:middle; }
    .mono { font-size:11px; fill:#000000; text-anchor:middle; font-family:monospace; }
  </style>
  <rect width="640" height="560" fill="#ffffff"/>
  <text class="ttl" x="320" y="28">Check the network from the bottom up</text>
  <text class="tc" x="320" y="48">Start at the bottom rung. Climb only if a rung passes. Stop at the first one that fails.</text>

  <!-- Rung 1 -->
  <rect class="box" x="120" y="430" width="320" height="56"/>
  <text class="step" x="135" y="452">1. Link: am I connected?</text>
  <text class="mono" x="280" y="472">cable plugged in / Wi-Fi joined</text>
  <text class="t" x="460" y="463">check</text>

  <!-- Rung 2 -->
  <rect class="box" x="120" y="352" width="320" height="56"/>
  <text class="step" x="135" y="374">2. IP: do I have an address?</text>
  <text class="mono" x="280" y="394">ipconfig / ip addr</text>
  <text class="t" x="460" y="385">check</text>

  <!-- Rung 3 -->
  <rect class="box" x="120" y="274" width="320" height="56"/>
  <text class="step" x="135" y="296">3. Gateway: can I reach my router?</text>
  <text class="mono" x="280" y="316">ping (your gateway)</text>
  <text class="t" x="460" y="307">check</text>

  <!-- Rung 4 -->
  <rect class="box" x="120" y="196" width="320" height="56"/>
  <text class="step" x="135" y="218">4. Internet: can I reach the outside?</text>
  <text class="mono" x="280" y="238">ping 1.1.1.1</text>
  <text class="t" x="460" y="229">check</text>

  <!-- Rung 5 -->
  <rect class="box" x="120" y="118" width="320" height="56"/>
  <text class="step" x="135" y="140">5. DNS: do names resolve?</text>
  <text class="mono" x="280" y="160">nslookup example.com</text>
  <text class="t" x="460" y="151">check</text>

  <!-- Rung 6 -->
  <rect class="box" x="120" y="64" width="320" height="40"/>
  <text class="step" x="135" y="88">6. App: can the program connect?</text>
  <text class="mono" x="370" y="88">curl</text>

  <!-- climbing arrows -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="100" y1="430" x2="100" y2="412" marker-end="url(#up)"/>
    <line x1="100" y1="352" x2="100" y2="334" marker-end="url(#up)"/>
    <line x1="100" y1="274" x2="100" y2="256" marker-end="url(#up)"/>
    <line x1="100" y1="196" x2="100" y2="178" marker-end="url(#up)"/>
    <line x1="100" y1="118" x2="100" y2="104" marker-end="url(#up)"/>
  </g>
  <text class="t" x="20" y="300" transform="rotate(-90 20 300)">climb up, one rung at a time</text>

  <text class="tc" x="320" y="520">The first rung that FAILS is where the problem lives.</text>
  <text class="tc" x="320" y="540">Example: rungs 1-4 pass but rung 5 fails -> it is a DNS (name) problem.</text>

  <defs>
    <marker id="up" markerWidth="10" markerHeight="10" refX="3" refY="5" orient="auto">
      <path d="M0,6 L3,0 L6,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
