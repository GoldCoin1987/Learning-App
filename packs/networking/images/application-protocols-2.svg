<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" font-family="sans-serif" font-size="13">
  <rect width="680" height="320" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">HTTP: the web's request / response language</text>

  <!-- Browser box -->
  <rect x="40" y="80" width="170" height="120" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="125" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Your browser</text>
  <text x="125" y="126" text-anchor="middle" font-size="12" fill="#000000">(the CLIENT)</text>
  <text x="125" y="150" text-anchor="middle" font-size="11" fill="#000000">"the one who asks"</text>

  <!-- Server box -->
  <rect x="470" y="80" width="170" height="120" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="555" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Web server</text>
  <text x="555" y="126" text-anchor="middle" font-size="12" fill="#000000">(the SERVER)</text>
  <text x="555" y="150" text-anchor="middle" font-size="11" fill="#000000">"the one who answers"</text>

  <!-- Request arrow -->
  <line x1="210" y1="110" x2="470" y2="110" stroke="#000000" stroke-width="2" marker-end="url(#ap2arrow)"/>
  <text x="340" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">REQUEST</text>
  <text x="340" y="128" text-anchor="middle" font-size="11" fill="#000000">"GET the home page, please"</text>

  <!-- Response arrow -->
  <line x1="470" y1="170" x2="210" y2="170" stroke="#000000" stroke-width="2" marker-end="url(#ap2arrow)"/>
  <text x="340" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">RESPONSE</text>
  <text x="340" y="188" text-anchor="middle" font-size="11" fill="#000000">status code 200 OK + the page content</text>

  <text x="340" y="240" text-anchor="middle" font-size="12" fill="#000000">One request goes out. Exactly one response comes back.</text>
  <text x="340" y="262" text-anchor="middle" font-size="12" fill="#000000">A response = a STATUS CODE (did it work?) + a BODY (the content).</text>
  <text x="340" y="292" text-anchor="middle" font-size="11" fill="#000000">HTTP = HyperText Transfer Protocol, the language programs speak to fetch web pages and data.</text>

  <defs>
    <marker id="ap2arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
  </defs>
</svg>
