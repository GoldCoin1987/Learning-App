<svg xmlns="http://www.w3.org/2000/svg" width="660" height="380" viewBox="0 0 660 380" font-family="sans-serif" font-size="13">
  <rect width="660" height="380" fill="#ffffff"/>
  <text x="330" y="26" text-anchor="middle" font-size="16" font-weight="bold">Traditional networking vs. Software-Defined Networking (SDN)</text>

  <!-- LEFT: Traditional -->
  <text x="165" y="56" text-anchor="middle" font-weight="bold">Traditional: every box has its own brain</text>
  <text x="165" y="74" text-anchor="middle" font-size="11">(configured one-by-one, by hand)</text>

  <!-- three boxes each with a small brain -->
  <g>
    <rect x="40" y="120" width="100" height="56" fill="#ffffff" stroke="#000000"/>
    <text x="90" y="150" text-anchor="middle">switch</text>
    <text x="90" y="168" text-anchor="middle" font-size="11">+ brain</text>
    <circle cx="90" cy="104" r="12" fill="#ffffff" stroke="#000000"/>
    <text x="90" y="108" text-anchor="middle" font-size="11">B</text>
  </g>
  <g>
    <rect x="190" y="120" width="100" height="56" fill="#ffffff" stroke="#000000"/>
    <text x="240" y="150" text-anchor="middle">router</text>
    <text x="240" y="168" text-anchor="middle" font-size="11">+ brain</text>
    <circle cx="240" cy="104" r="12" fill="#ffffff" stroke="#000000"/>
    <text x="240" y="108" text-anchor="middle" font-size="11">B</text>
  </g>
  <g>
    <rect x="115" y="240" width="100" height="56" fill="#ffffff" stroke="#000000"/>
    <text x="165" y="270" text-anchor="middle">switch</text>
    <text x="165" y="288" text-anchor="middle" font-size="11">+ brain</text>
    <circle cx="165" cy="224" r="12" fill="#ffffff" stroke="#000000"/>
    <text x="165" y="228" text-anchor="middle" font-size="11">B</text>
  </g>
  <line x1="140" y1="148" x2="190" y2="148" stroke="#000000"/>
  <line x1="90" y1="176" x2="165" y2="240" stroke="#000000"/>
  <line x1="240" y1="176" x2="165" y2="240" stroke="#000000"/>
  <text x="165" y="332" text-anchor="middle" font-size="11">Each box decides on its own.</text>
  <text x="165" y="350" text-anchor="middle" font-size="11">Changing the network = editing</text>
  <text x="165" y="366" text-anchor="middle" font-size="11">every box by hand. Slow, error-prone.</text>

  <!-- divider -->
  <line x1="330" y1="44" x2="330" y2="372" stroke="#000000" stroke-dasharray="4 4"/>

  <!-- RIGHT: SDN -->
  <text x="495" y="56" text-anchor="middle" font-weight="bold">SDN: one central brain</text>
  <text x="495" y="74" text-anchor="middle" font-size="11">(simple forwarders below it)</text>

  <rect x="430" y="92" width="130" height="44" fill="#ffffff" stroke="#000000"/>
  <text x="495" y="112" text-anchor="middle" font-weight="bold">Controller</text>
  <text x="495" y="128" text-anchor="middle" font-size="11">(the brain, software)</text>

  <!-- three dumb forwarders -->
  <rect x="400" y="210" width="80" height="44" fill="#ffffff" stroke="#000000"/>
  <text x="440" y="230" text-anchor="middle" font-size="12">forwarder</text>
  <text x="440" y="246" text-anchor="middle" font-size="11">(no brain)</text>

  <rect x="510" y="210" width="80" height="44" fill="#ffffff" stroke="#000000"/>
  <text x="550" y="230" text-anchor="middle" font-size="12">forwarder</text>
  <text x="550" y="246" text-anchor="middle" font-size="11">(no brain)</text>

  <rect x="455" y="300" width="80" height="44" fill="#ffffff" stroke="#000000"/>
  <text x="495" y="320" text-anchor="middle" font-size="12">forwarder</text>
  <text x="495" y="336" text-anchor="middle" font-size="11">(no brain)</text>

  <!-- controller programs each forwarder (arrows down) -->
  <line x1="470" y1="136" x2="440" y2="210" stroke="#000000" marker-end="url(#ar)"/>
  <line x1="520" y1="136" x2="550" y2="210" stroke="#000000" marker-end="url(#ar)"/>
  <line x1="495" y1="136" x2="495" y2="300" stroke="#000000" marker-end="url(#ar)"/>

  <text x="495" y="366" text-anchor="middle" font-size="11">One place programs them all.</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#000000"/>
    </marker>
  </defs>
</svg>
