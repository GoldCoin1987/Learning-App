<svg xmlns="http://www.w3.org/2000/svg" width="660" height="360" font-family="sans-serif" font-size="13">
  <rect width="660" height="360" fill="#ffffff"/>
  <text x="330" y="24" text-anchor="middle" font-size="16" font-weight="bold">HTTP/1.1 sequential vs HTTP/2 multiplexed (one TCP connection)</text>

  <!-- HTTP/1.1 panel -->
  <text x="165" y="56" text-anchor="middle" font-weight="bold">HTTP/1.1 (1 request in flight)</text>
  <line x1="40" y1="70" x2="40" y2="320" stroke="#888"/>
  <text x="36" y="84" text-anchor="end" fill="#555">t</text>
  <!-- sequential blocks -->
  <rect x="50" y="80" width="220" height="26" fill="#c0392b" opacity="0.85"/>
  <text x="160" y="98" text-anchor="middle" fill="#fff">Req A -&gt; Resp A</text>
  <rect x="50" y="116" width="220" height="26" fill="#2c7a2c" opacity="0.85"/>
  <text x="160" y="134" text-anchor="middle" fill="#fff">Req B -&gt; Resp B</text>
  <rect x="50" y="152" width="220" height="26" fill="#2c5fa3" opacity="0.85"/>
  <text x="160" y="170" text-anchor="middle" fill="#fff">Req C -&gt; Resp C</text>
  <text x="160" y="200" text-anchor="middle" font-style="italic" fill="#555">head-of-line at the</text>
  <text x="160" y="216" text-anchor="middle" font-style="italic" fill="#555">application layer</text>

  <!-- HTTP/2 panel -->
  <text x="495" y="56" text-anchor="middle" font-weight="bold">HTTP/2 (streams interleaved)</text>
  <line x1="370" y1="70" x2="370" y2="320" stroke="#888"/>
  <text x="366" y="84" text-anchor="end" fill="#555">t</text>
  <!-- interleaved frames -->
  <rect x="380" y="80" width="70" height="22" fill="#c0392b" opacity="0.85"/>
  <rect x="452" y="80" width="70" height="22" fill="#2c7a2c" opacity="0.85"/>
  <rect x="524" y="80" width="70" height="22" fill="#2c5fa3" opacity="0.85"/>
  <rect x="380" y="104" width="70" height="22" fill="#2c7a2c" opacity="0.85"/>
  <rect x="452" y="104" width="70" height="22" fill="#2c5fa3" opacity="0.85"/>
  <rect x="524" y="104" width="70" height="22" fill="#c0392b" opacity="0.85"/>
  <rect x="380" y="128" width="70" height="22" fill="#2c5fa3" opacity="0.85"/>
  <rect x="452" y="128" width="70" height="22" fill="#c0392b" opacity="0.85"/>
  <rect x="524" y="128" width="70" height="22" fill="#2c7a2c" opacity="0.85"/>
  <text x="487" y="172" text-anchor="middle" fill="#555">binary frames of streams A/B/C</text>
  <text x="487" y="190" text-anchor="middle" fill="#555">interleaved; HPACK header compression</text>
  <text x="487" y="222" text-anchor="middle" font-style="italic" fill="#c0392b">app HOL fixed, but one lost TCP segment</text>
  <text x="487" y="238" text-anchor="middle" font-style="italic" fill="#c0392b">still stalls ALL streams (transport HOL)</text>

  <text x="330" y="300" text-anchor="middle" fill="#333">HTTP/3 moves streams onto QUIC/UDP, so a lost packet stalls only its own stream.</text>
  <rect x="50" y="76" width="14" height="14" fill="#c0392b"/><text x="70" y="88" fill="#333">stream A</text>
  <rect x="150" y="76" width="14" height="14" fill="#2c7a2c"/><text x="170" y="88" fill="#333">B</text>
</svg>
