<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="sans-serif" font-size="13">
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="bold">The TLS handshake as a short story</text>

  <!-- actors -->
  <text x="110" y="58" text-anchor="middle" font-size="14" font-weight="bold">You (browser)</text>
  <text x="610" y="58" text-anchor="middle" font-size="14" font-weight="bold">Server (bank)</text>
  <line x1="110" y1="68" x2="110" y2="300" stroke="#000" stroke-width="1.5"/>
  <line x1="610" y1="68" x2="610" y2="300" stroke="#000" stroke-width="1.5"/>

  <!-- 1 hello -->
  <line x1="110" y1="98" x2="610" y2="98" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="90" text-anchor="middle" font-size="11" font-weight="bold">1. "Hello, here is what I support"</text>

  <!-- 2 prove identity -->
  <line x1="610" y1="138" x2="110" y2="138" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="130" text-anchor="middle" font-size="11" font-weight="bold">2. "Hello + here is my certificate"</text>
  <text x="360" y="154" text-anchor="middle" font-size="10">(browser checks the certificate chain)</text>

  <!-- 3 agree keys -->
  <line x1="110" y1="194" x2="610" y2="194" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="186" text-anchor="middle" font-size="11" font-weight="bold">3. Agree on a shared secret key</text>
  <text x="360" y="210" text-anchor="middle" font-size="10">(using the public/private key idea)</text>

  <!-- 4 encrypted -->
  <rect x="150" y="232" width="420" height="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="252" text-anchor="middle" font-size="11" font-weight="bold">4. From here on: ENCRYPTED real data</text>

  <text x="20" y="296" font-size="11">Order: hello &#8594; server proves identity with its certificate &#8594; agree on keys &#8594; encrypted.</text>
  <text x="20" y="322" font-size="11">TLS 1.3 (the modern version) does this faster, in fewer trips.</text>
  <text x="20" y="344" font-size="11">Forward secrecy: fresh keys each time, so a stolen key later cannot unlock old recordings.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
  </defs>
</svg>
