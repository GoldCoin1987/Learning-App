<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340" font-family="monospace" font-size="11">
  <rect width="640" height="340" fill="#ffffff"/>
  <text x="320" y="22" text-anchor="middle" font-size="15" font-weight="bold">Modulation Constellations: more points = more bits/symbol</text>
  <text x="320" y="40" text-anchor="middle" font-size="10">Higher order packs points closer -> needs higher SNR to keep them apart</text>

  <!-- BPSK -->
  <text x="100" y="70" text-anchor="middle" font-size="11" font-weight="bold">BPSK (1 b/sym)</text>
  <line x1="40" y1="160" x2="160" y2="160" stroke="#999"/>
  <line x1="100" y1="100" x2="100" y2="220" stroke="#999"/>
  <circle cx="60" cy="160" r="4" fill="#2563eb"/>
  <circle cx="140" cy="160" r="4" fill="#2563eb"/>

  <!-- QPSK -->
  <text x="320" y="70" text-anchor="middle" font-size="11" font-weight="bold">QPSK (2 b/sym)</text>
  <line x1="260" y1="160" x2="380" y2="160" stroke="#999"/>
  <line x1="320" y1="100" x2="320" y2="220" stroke="#999"/>
  <circle cx="290" cy="130" r="4" fill="#16a34a"/>
  <circle cx="350" cy="130" r="4" fill="#16a34a"/>
  <circle cx="290" cy="190" r="4" fill="#16a34a"/>
  <circle cx="350" cy="190" r="4" fill="#16a34a"/>

  <!-- 16-QAM -->
  <text x="540" y="70" text-anchor="middle" font-size="11" font-weight="bold">16-QAM (4 b/sym)</text>
  <line x1="470" y1="160" x2="610" y2="160" stroke="#999"/>
  <line x1="540" y1="95" x2="540" y2="225" stroke="#999"/>
  <g fill="#dc2626">
    <circle cx="495" cy="115" r="3"/><circle cx="525" cy="115" r="3"/><circle cx="555" cy="115" r="3"/><circle cx="585" cy="115" r="3"/>
    <circle cx="495" cy="145" r="3"/><circle cx="525" cy="145" r="3"/><circle cx="555" cy="145" r="3"/><circle cx="585" cy="145" r="3"/>
    <circle cx="495" cy="175" r="3"/><circle cx="525" cy="175" r="3"/><circle cx="555" cy="175" r="3"/><circle cx="585" cy="175" r="3"/>
    <circle cx="495" cy="205" r="3"/><circle cx="525" cy="205" r="3"/><circle cx="555" cy="205" r="3"/><circle cx="585" cy="205" r="3"/>
  </g>

  <text x="100" y="250" text-anchor="middle" font-size="9">I/Q axes; distance</text>
  <text x="100" y="262" text-anchor="middle" font-size="9">= noise immunity</text>
  <text x="320" y="250" text-anchor="middle" font-size="9">phase only,</text>
  <text x="320" y="262" text-anchor="middle" font-size="9">constant envelope</text>
  <text x="540" y="250" text-anchor="middle" font-size="9">amplitude + phase,</text>
  <text x="540" y="262" text-anchor="middle" font-size="9">tight spacing</text>

  <text x="60" y="300" font-size="10">Adaptive MCS picks the densest constellation the current SNR/SINR can decode</text>
  <text x="60" y="316" font-size="10">below a target BER. Good link -> 256/1024-QAM; weak link -> fall back to QPSK/BPSK.</text>
</svg>
