<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" font-family="sans-serif" font-size="13">
  <rect width="680" height="320" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="bold">Common IPv6 address types</text>

  <!-- Link-local -->
  <rect x="30" y="55" width="620" height="58" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="45" y="80" font-weight="bold">Link-local: fe80::...</text>
  <text x="45" y="100" font-size="12">Auto-made on every interface. Works only on the local link (not routed).</text>

  <!-- Global unicast -->
  <rect x="30" y="123" width="620" height="58" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="45" y="148" font-weight="bold">Global unicast: 2000::/3 (e.g. 2001:db8::...)</text>
  <text x="45" y="168" font-size="12">A public address, routable across the Internet.</text>

  <!-- Loopback -->
  <rect x="30" y="191" width="620" height="58" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="45" y="216" font-weight="bold">Loopback: ::1</text>
  <text x="45" y="236" font-size="12">"This same machine" - like 127.0.0.1 in IPv4.</text>

  <!-- Multicast / no broadcast -->
  <rect x="30" y="259" width="620" height="48" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="45" y="282" font-weight="bold">Multicast: ff00::...</text>
  <text x="45" y="300" font-size="12">One-to-many. IPv6 has NO broadcast - it uses multicast groups instead.</text>
</svg>
