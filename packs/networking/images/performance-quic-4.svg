<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="sans-serif">
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Head-of-line blocking: one stuck packet holds up the line</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#000000">If data must arrive strictly in order, ONE lost packet stalls everything waiting behind it.</text>

  <!-- the queue, left = front (about to be delivered) -->
  <text x="120" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">front of line</text>
  <text x="120" y="108" text-anchor="middle" font-size="11" fill="#000000">(delivered first)</text>
  <line x1="60" y1="120" x2="60" y2="200" stroke="#000000" stroke-width="2"/>
  <text x="44" y="165" text-anchor="middle" font-size="11" fill="#000000" transform="rotate(-90 44 165)">exit</text>

  <!-- packet 1 = LOST -->
  <rect x="80" y="130" width="90" height="60" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="125" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">packet 1</text>
  <text x="125" y="175" text-anchor="middle" font-size="11" fill="#000000">LOST (X)</text>

  <!-- packets 2,3,4 = arrived but waiting -->
  <rect x="190" y="130" width="90" height="60" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="235" y="155" text-anchor="middle" font-size="12" fill="#000000">packet 2</text>
  <text x="235" y="175" text-anchor="middle" font-size="11" fill="#000000">waiting</text>

  <rect x="300" y="130" width="90" height="60" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="345" y="155" text-anchor="middle" font-size="12" fill="#000000">packet 3</text>
  <text x="345" y="175" text-anchor="middle" font-size="11" fill="#000000">waiting</text>

  <rect x="410" y="130" width="90" height="60" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="455" y="155" text-anchor="middle" font-size="12" fill="#000000">packet 4</text>
  <text x="455" y="175" text-anchor="middle" font-size="11" fill="#000000">waiting</text>

  <text x="560" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">back of line</text>
  <text x="560" y="108" text-anchor="middle" font-size="11" fill="#000000">(arrives later)</text>
  <line x1="510" y1="120" x2="510" y2="200" stroke="#000000" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- the blocking arrow -->
  <line x1="170" y1="215" x2="500" y2="215" stroke="#000000" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="335" y="233" text-anchor="middle" font-size="12" fill="#000000">2, 3, 4 already arrived - but can't be used until 1 is re-sent</text>

  <text x="360" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">Packets 2-4 are HERE and fine, yet they all wait for packet 1 to be resent.</text>
  <text x="360" y="306" text-anchor="middle" font-size="12" fill="#000000">This is TCP's weakness: one in-order byte stream, so one gap blocks the rest.</text>
  <text x="360" y="332" text-anchor="middle" font-size="12" fill="#000000">QUIC fixes this by giving each stream its own line, so a stall in one does not block the others.</text>
</svg>
