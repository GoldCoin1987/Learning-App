<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="sans-serif" font-size="13">
  <rect width="640" height="380" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Take turns: listen first, then talk (CSMA/CA)</text>
  <text x="320" y="46" text-anchor="middle" font-size="12" fill="#000000">Because everyone shares the air, two devices talking at once garble each other.</text>

  <!-- Step boxes -->
  <rect x="40" y="80" width="170" height="120" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="125" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">1. Listen</text>
  <text x="125" y="130" text-anchor="middle" font-size="11" fill="#000000">Is anyone else</text>
  <text x="125" y="146" text-anchor="middle" font-size="11" fill="#000000">talking right now?</text>
  <text x="125" y="174" text-anchor="middle" font-size="11" fill="#000000">Quiet? -> go.</text>
  <text x="125" y="190" text-anchor="middle" font-size="11" fill="#000000">Busy? -> wait.</text>

  <rect x="235" y="80" width="170" height="120" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="320" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">2. Wait a random bit</text>
  <text x="320" y="130" text-anchor="middle" font-size="11" fill="#000000">If busy, pause for a</text>
  <text x="320" y="146" text-anchor="middle" font-size="11" fill="#000000">short random time</text>
  <text x="320" y="162" text-anchor="middle" font-size="11" fill="#000000">so two waiters do not</text>
  <text x="320" y="178" text-anchor="middle" font-size="11" fill="#000000">jump in together.</text>

  <rect x="430" y="80" width="170" height="120" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="515" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">3. Talk</text>
  <text x="515" y="130" text-anchor="middle" font-size="11" fill="#000000">Send your data.</text>
  <text x="515" y="146" text-anchor="middle" font-size="11" fill="#000000">Get an "OK, got it"</text>
  <text x="515" y="162" text-anchor="middle" font-size="11" fill="#000000">back, then let the</text>
  <text x="515" y="178" text-anchor="middle" font-size="11" fill="#000000">next device go.</text>

  <!-- arrows -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="210" y1="140" x2="232" y2="140" marker-end="url(#ar2)"/>
    <line x1="405" y1="140" x2="427" y2="140" marker-end="url(#ar2)"/>
  </g>

  <text x="320" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">Wired vs wireless: avoid vs detect</text>
  <text x="320" y="276" text-anchor="middle" font-size="11" fill="#000000">A wire can DETECT a clash while it happens (CSMA/CD) and stop.</text>
  <text x="320" y="294" text-anchor="middle" font-size="11" fill="#000000">A radio cannot hear itself well enough for that, so Wi-Fi AVOIDS clashes</text>
  <text x="320" y="312" text-anchor="middle" font-size="11" fill="#000000">up front by listening and waiting its turn (CSMA/CA).</text>

  <text x="320" y="352" text-anchor="middle" font-size="11" fill="#000000">It is like a polite group: listen for a gap, then speak, so you do not talk over anyone.</text>

  <defs>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0,1 L8,5 L0,9 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
