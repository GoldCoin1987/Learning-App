<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300" font-family="monospace" font-size="13">
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="20" y="24" font-size="15" font-weight="bold">Line coding of the byte 0b10110010 (MSB first)</text>

  <!-- bit grid: 8 bits, each 64px wide, starting x=80 -->
  <!-- bit labels -->
  <text x="100" y="58" text-anchor="middle">1</text>
  <text x="164" y="58" text-anchor="middle">0</text>
  <text x="228" y="58" text-anchor="middle">1</text>
  <text x="292" y="58" text-anchor="middle">1</text>
  <text x="356" y="58" text-anchor="middle">0</text>
  <text x="420" y="58" text-anchor="middle">0</text>
  <text x="484" y="58" text-anchor="middle">1</text>
  <text x="548" y="58" text-anchor="middle">0</text>

  <!-- bit-cell separators -->
  <g stroke="#dddddd" stroke-width="1">
    <line x1="132" y1="70" x2="132" y2="270"/>
    <line x1="196" y1="70" x2="196" y2="270"/>
    <line x1="260" y1="70" x2="260" y2="270"/>
    <line x1="324" y1="70" x2="324" y2="270"/>
    <line x1="388" y1="70" x2="388" y2="270"/>
    <line x1="452" y1="70" x2="452" y2="270"/>
    <line x1="516" y1="70" x2="516" y2="270"/>
  </g>

  <!-- NRZ row: high=1 (y=80), low=0 (y=120). cell x ranges 68..132,132..196,... -->
  <text x="20" y="105" font-weight="bold">NRZ</text>
  <polyline fill="none" stroke="#1565c0" stroke-width="2.5"
    points="68,80 132,80 132,120 196,120 196,80 260,80 260,80 324,80 324,120 388,120 388,120 452,120 452,80 516,80 516,120 580,120"/>
  <line x1="68" y1="80" x2="580" y2="80" stroke="#eeeeee"/>

  <!-- Manchester row (IEEE 802.3): 1 = low->high (rising) mid-cell, 0 = high->low (falling). y high=160, low=200 -->
  <text x="20" y="185" font-weight="bold">Manch.</text>
  <!-- each cell 64 wide; mid at +32. transition always mid-cell -->
  <polyline fill="none" stroke="#2e7d32" stroke-width="2.5"
    points="68,200 100,200 100,160 132,160
            132,160 164,160 164,200 196,200
            196,200 228,200 228,160 260,160
            260,200 292,200 292,160 324,160
            324,160 356,160 356,200 388,200
            388,160 420,160 420,200 452,200
            452,200 484,200 484,160 516,160
            516,160 548,160 548,200 580,200"/>

  <!-- legend / note -->
  <text x="20" y="245">NRZ: level holds across a cell -> long runs give no edges (clock-recovery risk).</text>
  <text x="20" y="265">Manchester: guaranteed mid-cell edge -> self-clocking + DC-balanced, at 2x baud.</text>
</svg>
