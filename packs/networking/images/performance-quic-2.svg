<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Bandwidth vs latency: two DIFFERENT things</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#000000">Bandwidth = how WIDE the pipe is. Latency = how LONG the pipe is.</text>

  <!-- Left: wide pipe = bandwidth -->
  <text x="190" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">BANDWIDTH = pipe WIDTH</text>
  <text x="190" y="100" text-anchor="middle" font-size="12" fill="#000000">how much data per second can flow</text>
  <!-- a short fat pipe -->
  <rect x="70" y="120" width="240" height="90" fill="none" stroke="#000000" stroke-width="2"/>
  <line x1="70" y1="150" x2="310" y2="150" stroke="#000000" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="70" y1="180" x2="310" y2="180" stroke="#000000" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="190" y="145" text-anchor="middle" font-size="11" fill="#000000">data</text>
  <text x="190" y="175" text-anchor="middle" font-size="11" fill="#000000">data</text>
  <text x="190" y="205" text-anchor="middle" font-size="11" fill="#000000">data</text>
  <text x="40" y="168" text-anchor="middle" font-size="11" fill="#000000" transform="rotate(-90 40 168)">wide</text>
  <text x="190" y="232" text-anchor="middle" font-size="12" fill="#000000">A wide pipe moves a BIG DOWNLOAD fast.</text>

  <!-- Right: long pipe = latency -->
  <text x="540" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">LATENCY = pipe LENGTH</text>
  <text x="540" y="100" text-anchor="middle" font-size="12" fill="#000000">how long ONE message takes to arrive</text>
  <!-- a long thin pipe -->
  <rect x="400" y="135" width="280" height="40" fill="none" stroke="#000000" stroke-width="2"/>
  <circle cx="430" cy="155" r="8" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="430" y="159" text-anchor="middle" font-size="9" fill="#000000">msg</text>
  <line x1="448" y1="155" x2="660" y2="155" stroke="#000000" stroke-width="1" marker-end="url(#arr)"/>
  <text x="540" y="195" text-anchor="middle" font-size="11" fill="#000000">long</text>
  <text x="540" y="222" text-anchor="middle" font-size="12" fill="#000000">A long pipe makes a CALL feel laggy</text>
  <text x="540" y="240" text-anchor="middle" font-size="12" fill="#000000">no matter how wide it is.</text>

  <line x1="360" y1="115" x2="360" y2="255" stroke="#000000" stroke-width="1" stroke-dasharray="3 3"/>

  <text x="360" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">Big download? You want WIDTH (bandwidth).  Video call or game? You want a SHORT pipe (low latency).</text>
  <text x="360" y="328" text-anchor="middle" font-size="12" fill="#000000">A fat pipe does NOT fix a laggy call. They are different problems.</text>
  <text x="360" y="354" text-anchor="middle" font-size="11" fill="#000000">Everyday picture: a wide highway (lots of cars at once) vs a short commute (you arrive quickly).</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
