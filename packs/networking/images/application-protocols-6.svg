<svg xmlns="http://www.w3.org/2000/svg" width="700" height="360" viewBox="0 0 700 360" font-family="sans-serif" font-size="13">
  <rect width="700" height="360" fill="#ffffff"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Common application protocols, sorted by job</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#000000">All ride on the transport layer; each is just a language for a different task.</text>

  <!-- Web -->
  <rect x="30" y="70" width="150" height="120" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="105" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">Web pages</text>
  <line x1="45" y1="104" x2="165" y2="104" stroke="#000000" stroke-width="1"/>
  <text x="105" y="126" text-anchor="middle" font-size="12" fill="#000000">HTTP / HTTPS</text>
  <text x="105" y="150" text-anchor="middle" font-size="11" fill="#000000">browse sites,</text>
  <text x="105" y="166" text-anchor="middle" font-size="11" fill="#000000">call APIs</text>

  <!-- Names -->
  <rect x="195" y="70" width="150" height="120" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="270" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">Names to IPs</text>
  <line x1="210" y1="104" x2="330" y2="104" stroke="#000000" stroke-width="1"/>
  <text x="270" y="126" text-anchor="middle" font-size="12" fill="#000000">DNS</text>
  <text x="270" y="150" text-anchor="middle" font-size="11" fill="#000000">turns a name into</text>
  <text x="270" y="166" text-anchor="middle" font-size="11" fill="#000000">an IP address</text>

  <!-- Email -->
  <rect x="360" y="70" width="150" height="120" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="435" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">Email</text>
  <line x1="375" y1="104" x2="495" y2="104" stroke="#000000" stroke-width="1"/>
  <text x="435" y="126" text-anchor="middle" font-size="12" fill="#000000">SMTP = send</text>
  <text x="435" y="148" text-anchor="middle" font-size="12" fill="#000000">IMAP / POP = read</text>
  <text x="435" y="170" text-anchor="middle" font-size="11" fill="#000000">mail in / mail out</text>

  <!-- Files -->
  <rect x="525" y="70" width="150" height="120" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="600" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">Files / remote</text>
  <line x1="540" y1="104" x2="660" y2="104" stroke="#000000" stroke-width="1"/>
  <text x="600" y="126" text-anchor="middle" font-size="12" fill="#000000">FTP / SFTP</text>
  <text x="600" y="148" text-anchor="middle" font-size="12" fill="#000000">SSH = secure login</text>
  <text x="600" y="170" text-anchor="middle" font-size="11" fill="#000000">move / control</text>

  <!-- Realtime -->
  <rect x="110" y="210" width="220" height="110" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="220" y="234" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">Live, two-way</text>
  <line x1="125" y1="244" x2="315" y2="244" stroke="#000000" stroke-width="1"/>
  <text x="220" y="266" text-anchor="middle" font-size="12" fill="#000000">WebSocket = chat, games</text>
  <text x="220" y="288" text-anchor="middle" font-size="11" fill="#000000">both sides can send anytime,</text>
  <text x="220" y="304" text-anchor="middle" font-size="11" fill="#000000">not just request/response</text>

  <!-- IoT -->
  <rect x="370" y="210" width="220" height="110" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="480" y="234" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">Tiny devices (IoT)</text>
  <line x1="385" y1="244" x2="575" y2="244" stroke="#000000" stroke-width="1"/>
  <text x="480" y="266" text-anchor="middle" font-size="12" fill="#000000">MQTT = sensors report</text>
  <text x="480" y="288" text-anchor="middle" font-size="11" fill="#000000">lightweight publish / subscribe</text>
  <text x="480" y="304" text-anchor="middle" font-size="11" fill="#000000">for low-power gadgets</text>

  <text x="350" y="346" text-anchor="middle" font-size="11" fill="#000000">Pick the protocol that fits the job. HTTP is the most common, but it is far from the only one.</text>
</svg>
