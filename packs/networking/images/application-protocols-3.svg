<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" font-family="sans-serif" font-size="13">
  <rect width="680" height="320" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">The restaurant: client asks, server answers</text>

  <!-- Customer -->
  <rect x="40" y="70" width="160" height="90" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="120" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">You at the table</text>
  <text x="120" y="118" text-anchor="middle" font-size="11" fill="#000000">= the CLIENT</text>
  <text x="120" y="138" text-anchor="middle" font-size="11" fill="#000000">(browser)</text>

  <!-- Kitchen -->
  <rect x="480" y="70" width="160" height="90" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="560" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">The kitchen</text>
  <text x="560" y="118" text-anchor="middle" font-size="11" fill="#000000">= the SERVER</text>
  <text x="560" y="138" text-anchor="middle" font-size="11" fill="#000000">(web server)</text>

  <!-- order arrow -->
  <line x1="200" y1="100" x2="480" y2="100" stroke="#000000" stroke-width="2" marker-end="url(#ap3arrow)"/>
  <text x="340" y="92" text-anchor="middle" font-size="11" fill="#000000">order from the menu = a REQUEST</text>

  <!-- dish arrow -->
  <line x1="480" y1="135" x2="200" y2="135" stroke="#000000" stroke-width="2" marker-end="url(#ap3arrow)"/>
  <text x="340" y="155" text-anchor="middle" font-size="11" fill="#000000">the dish (or bad news) = a RESPONSE</text>

  <!-- waiter status codes -->
  <text x="340" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">The waiter's reply = the STATUS CODE</text>

  <rect x="60" y="218" width="180" height="62" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="150" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">200 OK</text>
  <text x="150" y="262" text-anchor="middle" font-size="11" fill="#000000">"here you go"</text>

  <rect x="250" y="218" width="180" height="62" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="340" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">404 Not Found</text>
  <text x="340" y="262" text-anchor="middle" font-size="11" fill="#000000">"we're out of that"</text>

  <rect x="440" y="218" width="180" height="62" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="530" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">500 Server Error</text>
  <text x="530" y="262" text-anchor="middle" font-size="11" fill="#000000">"kitchen problem"</text>

  <text x="340" y="304" text-anchor="middle" font-size="11" fill="#000000">Same pattern as the web: you request, the server responds with a status and (if all is well) the content.</text>

  <defs>
    <marker id="ap3arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
  </defs>
</svg>
