<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="640" height="400" fill="white"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="black">Three ways to carry bits, and their trade-offs</text>

  <!-- Copper -->
  <rect x="20" y="50" width="180" height="300" fill="white" stroke="black"/>
  <text x="110" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="black">Copper cable</text>
  <text x="110" y="94" text-anchor="middle" font-size="11" fill="black">(electrical voltage)</text>
  <!-- simple wire icon -->
  <line x1="40" y1="120" x2="180" y2="120" stroke="black" stroke-width="3"/>
  <line x1="40" y1="132" x2="180" y2="132" stroke="black" stroke-width="3"/>
  <text x="110" y="170" text-anchor="middle" font-size="11" fill="black">Cost: cheap</text>
  <text x="110" y="192" text-anchor="middle" font-size="11" fill="black">Distance: short</text>
  <text x="110" y="214" text-anchor="middle" font-size="11" fill="black">Speed: good</text>
  <text x="110" y="236" text-anchor="middle" font-size="11" fill="black">Interference:</text>
  <text x="110" y="252" text-anchor="middle" font-size="11" fill="black">picks up noise</text>

  <!-- Fiber -->
  <rect x="230" y="50" width="180" height="300" fill="white" stroke="black"/>
  <text x="320" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="black">Fiber-optic</text>
  <text x="320" y="94" text-anchor="middle" font-size="11" fill="black">(flashes of light)</text>
  <!-- glass pipe icon with light -->
  <rect x="250" y="116" width="140" height="20" fill="white" stroke="black"/>
  <line x1="258" y1="126" x2="384" y2="126" stroke="black" stroke-dasharray="4,4"/>
  <circle cx="262" cy="126" r="4" fill="black"/>
  <text x="320" y="170" text-anchor="middle" font-size="11" fill="black">Cost: higher</text>
  <text x="320" y="192" text-anchor="middle" font-size="11" fill="black">Distance: very long</text>
  <text x="320" y="214" text-anchor="middle" font-size="11" fill="black">Speed: fastest</text>
  <text x="320" y="236" text-anchor="middle" font-size="11" fill="black">Interference:</text>
  <text x="320" y="252" text-anchor="middle" font-size="11" fill="black">immune (light)</text>

  <!-- Wireless -->
  <rect x="440" y="50" width="180" height="300" fill="white" stroke="black"/>
  <text x="530" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="black">Wireless / radio</text>
  <text x="530" y="94" text-anchor="middle" font-size="11" fill="black">(radio waves in air)</text>
  <!-- antenna with arcs -->
  <line x1="530" y1="138" x2="530" y2="112" stroke="black" stroke-width="2"/>
  <path d="M 518 120 A 18 18 0 0 1 542 120" fill="none" stroke="black"/>
  <path d="M 512 126 A 26 26 0 0 1 548 126" fill="none" stroke="black"/>
  <text x="530" y="170" text-anchor="middle" font-size="11" fill="black">Cost: low (no wire)</text>
  <text x="530" y="192" text-anchor="middle" font-size="11" fill="black">Distance: varies</text>
  <text x="530" y="214" text-anchor="middle" font-size="11" fill="black">Speed: lower</text>
  <text x="530" y="236" text-anchor="middle" font-size="11" fill="black">Interference:</text>
  <text x="530" y="252" text-anchor="middle" font-size="11" fill="black">most (shared air)</text>

  <text x="320" y="378" text-anchor="middle" font-size="12" fill="black">No medium is best at everything: you trade cost, distance, speed, and interference.</text>
</svg>
