<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="sans-serif" font-size="13">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">UDP: fire-and-forget, no setup</text>

  <text x="120" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Sender</text>
  <text x="520" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Receiver</text>
  <line x1="120" y1="66" x2="120" y2="250" stroke="#000000" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="520" y1="66" x2="520" y2="250" stroke="#000000" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- just send packets, no handshake, no acks -->
  <line x1="120" y1="95" x2="520" y2="110" stroke="#000000" stroke-width="2"/>
  <polygon points="520,110 506,104 508,116" fill="#000000"/>
  <text x="320" y="90" text-anchor="middle" font-size="11" fill="#000000">packet</text>

  <line x1="120" y1="135" x2="520" y2="150" stroke="#000000" stroke-width="2"/>
  <polygon points="520,150 506,144 508,156" fill="#000000"/>
  <text x="320" y="130" text-anchor="middle" font-size="11" fill="#000000">packet</text>

  <!-- one lost, nobody re-sends -->
  <line x1="120" y1="175" x2="360" y2="184" stroke="#000000" stroke-width="2"/>
  <text x="240" y="170" text-anchor="middle" font-size="11" fill="#000000">packet</text>
  <line x1="352" y1="176" x2="372" y2="192" stroke="#000000" stroke-width="2"/>
  <line x1="372" y1="176" x2="352" y2="192" stroke="#000000" stroke-width="2"/>
  <text x="410" y="190" text-anchor="middle" font-size="11" fill="#000000">lost (no re-send)</text>

  <line x1="120" y1="215" x2="520" y2="230" stroke="#000000" stroke-width="2"/>
  <polygon points="520,230 506,224 508,236" fill="#000000"/>
  <text x="320" y="210" text-anchor="middle" font-size="11" fill="#000000">packet</text>

  <text x="320" y="262" text-anchor="middle" font-size="11" fill="#000000">No handshake, no ACKs, no re-sending. If a packet drops, it is simply gone.</text>

  <!-- well-known ports box -->
  <rect x="120" y="282" width="400" height="62" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="320" y="300" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">Some well-known port numbers</text>
  <text x="320" y="320" text-anchor="middle" font-size="11" fill="#000000">80 = web (HTTP)    443 = secure web (HTTPS)</text>
  <text x="320" y="336" text-anchor="middle" font-size="11" fill="#000000">53 = DNS (name lookups)    22 = secure login (SSH)</text>
</svg>
