<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="sans-serif" font-size="13">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold">NFV: network jobs as software, not dedicated boxes</text>

  <!-- LEFT: old way -->
  <text x="160" y="56" text-anchor="middle" font-weight="bold">Before: one job = one physical box</text>
  <rect x="60" y="78" width="200" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="160" y="101" text-anchor="middle" font-size="12">Firewall appliance</text>
  <rect x="60" y="124" width="200" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="160" y="147" text-anchor="middle" font-size="12">Load-balancer appliance</text>
  <rect x="60" y="170" width="200" height="36" fill="#ffffff" stroke="#000000"/>
  <text x="160" y="193" text-anchor="middle" font-size="12">Router appliance</text>
  <text x="160" y="236" text-anchor="middle" font-size="11">Buy, rack, and cable each box.</text>
  <text x="160" y="254" text-anchor="middle" font-size="11">Hard to scale or change.</text>

  <!-- divider -->
  <line x1="320" y1="44" x2="320" y2="332" stroke="#000000" stroke-dasharray="4 4"/>

  <!-- RIGHT: NFV -->
  <text x="480" y="56" text-anchor="middle" font-weight="bold">With NFV: same jobs, as software</text>
  <rect x="380" y="78" width="200" height="150" fill="#ffffff" stroke="#000000"/>
  <text x="480" y="98" text-anchor="middle" font-size="12">Ordinary server</text>
  <rect x="400" y="110" width="160" height="28" fill="#ffffff" stroke="#000000"/>
  <text x="480" y="129" text-anchor="middle" font-size="11">firewall (software)</text>
  <rect x="400" y="146" width="160" height="28" fill="#ffffff" stroke="#000000"/>
  <text x="480" y="165" text-anchor="middle" font-size="11">load balancer (software)</text>
  <rect x="400" y="182" width="160" height="28" fill="#ffffff" stroke="#000000"/>
  <text x="480" y="201" text-anchor="middle" font-size="11">router (software)</text>
  <text x="480" y="250" text-anchor="middle" font-size="11">Spin up, move, or scale</text>
  <text x="480" y="268" text-anchor="middle" font-size="11">with a few commands.</text>

  <text x="320" y="318" text-anchor="middle" font-size="11">NFV = Network Functions Virtualization: run network functions as programs on standard computers.</text>
</svg>
