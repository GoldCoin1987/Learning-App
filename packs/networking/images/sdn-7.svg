<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="sans-serif" font-size="13">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold">The big benefit and the big risk of central control</text>

  <!-- Controller -->
  <rect x="250" y="50" width="140" height="48" fill="#ffffff" stroke="#000000"/>
  <text x="320" y="72" text-anchor="middle" font-weight="bold">Controller</text>
  <text x="320" y="90" text-anchor="middle" font-size="11">(the one brain)</text>

  <!-- BENEFIT side -->
  <text x="150" y="140" text-anchor="middle" font-weight="bold">Benefit: manage everything</text>
  <text x="150" y="158" text-anchor="middle" font-weight="bold">from one place</text>
  <text x="150" y="182" text-anchor="middle" font-size="11">- change the whole network at once</text>
  <text x="150" y="200" text-anchor="middle" font-size="11">- automate with software / scripts</text>
  <text x="150" y="218" text-anchor="middle" font-size="11">- "network as code"</text>

  <!-- RISK side -->
  <text x="490" y="140" text-anchor="middle" font-weight="bold">Risk: single point to protect</text>
  <text x="490" y="164" text-anchor="middle" font-size="11">If the one brain fails or is</text>
  <text x="490" y="182" text-anchor="middle" font-size="11">attacked, the whole network</text>
  <text x="490" y="200" text-anchor="middle" font-size="11">is affected (SPOF).</text>
  <text x="490" y="224" text-anchor="middle" font-size="11">Fix: run several controllers</text>
  <text x="490" y="242" text-anchor="middle" font-size="11">together for backup.</text>

  <!-- forwarders -->
  <rect x="120" y="280" width="90" height="40" fill="#ffffff" stroke="#000000"/>
  <text x="165" y="305" text-anchor="middle" font-size="12">forwarder</text>
  <rect x="275" y="280" width="90" height="40" fill="#ffffff" stroke="#000000"/>
  <text x="320" y="305" text-anchor="middle" font-size="12">forwarder</text>
  <rect x="430" y="280" width="90" height="40" fill="#ffffff" stroke="#000000"/>
  <text x="475" y="305" text-anchor="middle" font-size="12">forwarder</text>

  <line x1="290" y1="98" x2="165" y2="280" stroke="#000000"/>
  <line x1="320" y1="98" x2="320" y2="280" stroke="#000000"/>
  <line x1="350" y1="98" x2="475" y2="280" stroke="#000000"/>

  <text x="320" y="346" text-anchor="middle" font-size="11">One brain controls all the forwarders: that power is the benefit and the risk.</text>
</svg>
