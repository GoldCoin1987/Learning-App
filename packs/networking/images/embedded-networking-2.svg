<svg xmlns="http://www.w3.org/2000/svg" width="660" height="380" viewBox="0 0 660 380" font-family="sans-serif" font-size="13">
  <rect width="660" height="380" fill="#ffffff"/>
  <text x="330" y="26" text-anchor="middle" font-size="16" font-weight="bold">Big computer vs tiny IoT device: very different resources</text>

  <!-- Left: powerful server -->
  <rect x="40" y="60" width="240" height="280" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="160" y="86" text-anchor="middle" font-weight="bold">Laptop / Server</text>
  <text x="160" y="104" text-anchor="middle" fill="#333">("plugged in, powerful")</text>

  <!-- server icon -->
  <rect x="120" y="118" width="80" height="58" rx="4" fill="#ffffff" stroke="#000000"/>
  <rect x="130" y="128" width="60" height="6" fill="#000000"/>
  <rect x="130" y="140" width="60" height="6" fill="#000000"/>
  <rect x="130" y="152" width="40" height="6" fill="#000000"/>

  <text x="60" y="206" fill="#000000">Memory: gigabytes</text>
  <text x="60" y="230" fill="#000000">Power: wall socket</text>
  <text x="60" y="254" fill="#000000">Data: streams video</text>
  <text x="60" y="278" fill="#000000">Always on</text>
  <text x="60" y="312" fill="#000000" font-style="italic">Runs full TCP, HTTP,</text>
  <text x="60" y="328" fill="#000000" font-style="italic">TLS with ease</text>

  <!-- Right: tiny sensor -->
  <rect x="380" y="60" width="240" height="280" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="500" y="86" text-anchor="middle" font-weight="bold">Tiny IoT Sensor</text>
  <text x="500" y="104" text-anchor="middle" fill="#333">("battery, barely any power")</text>

  <!-- coin battery + chip icon -->
  <circle cx="470" cy="146" r="20" fill="#ffffff" stroke="#000000"/>
  <text x="470" y="151" text-anchor="middle" font-size="11">batt</text>
  <rect x="505" y="132" width="40" height="28" rx="3" fill="#ffffff" stroke="#000000"/>
  <text x="525" y="151" text-anchor="middle" font-size="10">chip</text>

  <text x="400" y="206" fill="#000000">Memory: kilobytes</text>
  <text x="400" y="230" fill="#000000">Power: coin battery</text>
  <text x="400" y="254" fill="#000000">Data: a few bytes</text>
  <text x="400" y="278" fill="#000000">Sleeps most of the time</text>
  <text x="400" y="312" fill="#000000" font-style="italic">Needs lightweight,</text>
  <text x="400" y="328" fill="#000000" font-style="italic">low-power protocols</text>

  <text x="330" y="364" text-anchor="middle" fill="#333">Same internet, wildly different budgets: that is why IoT uses lighter protocols.</text>
</svg>
