<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <style>
    .box { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .ttl { font-size:16px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .hd { font-size:13px; fill:#000000; text-anchor:middle; font-weight:bold; }
    .tc { font-size:12px; fill:#000000; text-anchor:middle; }
    .mono { font-size:12px; fill:#000000; text-anchor:middle; font-family:monospace; }
  </style>
  <rect width="720" height="380" fill="#ffffff"/>
  <text class="ttl" x="360" y="28">A name can resolve but the door (port) still be shut</text>

  <!-- step boxes left to right -->
  <rect class="box" x="30" y="70" width="140" height="90"/>
  <text class="hd" x="100" y="100">1. Name</text>
  <text class="tc" x="100" y="124">example.com</text>
  <text class="tc" x="100" y="144">turns into an IP?</text>

  <rect class="box" x="210" y="70" width="140" height="90"/>
  <text class="hd" x="280" y="100">2. Reachable</text>
  <text class="tc" x="280" y="124">can you ping</text>
  <text class="tc" x="280" y="144">that IP?</text>

  <rect class="box" x="390" y="70" width="140" height="90"/>
  <text class="hd" x="460" y="100">3. Port open</text>
  <text class="tc" x="460" y="124">does the service</text>
  <text class="tc" x="460" y="144">answer on its port?</text>

  <rect class="box" x="570" y="70" width="120" height="90"/>
  <text class="hd" x="630" y="100">4. App</text>
  <text class="tc" x="630" y="124">does it load</text>
  <text class="tc" x="630" y="144">in full?</text>

  <line x1="170" y1="115" x2="210" y2="115" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="115" x2="390" y2="115" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="115" x2="570" y2="115" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- the gotcha -->
  <rect class="box" x="60" y="200" width="600" height="150"/>
  <text class="hd" x="360" y="226">The "DNS works but the site won't load" pattern</text>
  <text class="tc" x="360" y="252">Steps 1 and 2 pass: the name resolves and the IP replies to ping.</text>
  <text class="tc" x="360" y="272">But the specific service (a web server on port 443) is down or blocked,</text>
  <text class="tc" x="360" y="292">so step 3 fails. The host is up; the door for that service is shut.</text>
  <text class="mono" x="360" y="320">curl https://example.com      (try the actual service)</text>
  <text class="mono" x="360" y="340">telnet example.com 443        (can the port even open?)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000000"/>
    </marker>
  </defs>
</svg>
