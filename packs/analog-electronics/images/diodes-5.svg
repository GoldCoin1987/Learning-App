<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 280" width="380" height="280">
  <rect x="0" y="0" width="380" height="280" fill="#ffffff"/>
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- input source on left -->
    <line x1="30" y1="60" x2="30" y2="200"/>
    <line x1="30" y1="60" x2="120" y2="60"/>
    <!-- series resistor Rs (zigzag as box) -->
    <rect x="120" y="48" width="70" height="24"/>
    <line x1="190" y1="60" x2="280" y2="60"/>
    <!-- node down to zener -->
    <line x1="280" y1="60" x2="280" y2="200"/>
    <!-- zener diode symbol: triangle + bent bar (cathode up) -->
    <polygon points="265,140 295,140 280,120" fill="#000000"/>
    <!-- zener bent cathode bar -->
    <line x1="262" y1="120" x2="298" y2="120"/>
    <line x1="262" y1="120" x2="258" y2="114"/>
    <line x1="298" y1="120" x2="302" y2="126"/>
    <!-- bottom rail -->
    <line x1="30" y1="200" x2="360" y2="200"/>
    <!-- load on far right -->
    <line x1="340" y1="60" x2="340" y2="200"/>
    <line x1="280" y1="60" x2="340" y2="60"/>
    <rect x="331" y="100" width="18" height="60"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="20" y="135">Vin</text>
    <text x="138" y="40">Rs</text>
    <text x="240" y="135">Zener</text>
    <text x="352" y="135">load</text>
    <text x="285" y="95">Vout</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="40" y="265">Zener shunt regulator: holds Vout steady</text>
  </g>
</svg>
