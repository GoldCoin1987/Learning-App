<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" width="420" height="260">
  <rect x="0" y="0" width="420" height="260" fill="#ffffff"/>
  <!-- input rail -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="20" y1="60" x2="80" y2="60"/>
    <!-- high-side switch box -->
    <rect x="80" y="45" width="50" height="30"/>
    <!-- node SW -->
    <line x1="130" y1="60" x2="190" y2="60"/>
    <!-- inductor to output -->
    <line x1="230" y1="60" x2="320" y2="60"/>
    <!-- output rail to load -->
    <line x1="320" y1="60" x2="380" y2="60"/>
    <!-- low-side diode/sync from SW node to ground -->
    <line x1="190" y1="60" x2="190" y2="120"/>
    <!-- diode triangle -->
    <polygon points="178,90 202,90 190,108" fill="#1a6fd0" stroke="#1a6fd0"/>
    <line x1="178" y1="108" x2="202" y2="108"/>
    <line x1="190" y1="120" x2="190" y2="200"/>
    <!-- output cap -->
    <line x1="320" y1="60" x2="320" y2="110"/>
    <line x1="305" y1="110" x2="335" y2="110"/>
    <line x1="305" y1="120" x2="335" y2="120"/>
    <line x1="320" y1="120" x2="320" y2="200"/>
    <!-- load resistor -->
    <rect x="370" y="80" width="20" height="40"/>
    <line x1="380" y1="60" x2="380" y2="80"/>
    <line x1="380" y1="120" x2="380" y2="200"/>
    <!-- ground rail -->
    <line x1="20" y1="200" x2="380" y2="200"/>
    <line x1="20" y1="60" x2="20" y2="200"/>
  </g>
  <!-- inductor coil -->
  <g stroke="#c0392b" stroke-width="2.5" fill="none">
    <path d="M190 60 q10 -14 20 0 q10 -14 20 0"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="88" y="38">SW (PWM)</text>
    <text x="205" y="50">L</text>
    <text x="338" y="100">C_out</text>
    <text x="160" y="100">D / sync</text>
    <text x="395" y="104">R_L</text>
    <text x="22" y="52">V_in</text>
    <text x="328" y="52">V_out</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="20" y="240">Synchronous buck converter: Vout = D x Vin</text>
  </g>
</svg>
