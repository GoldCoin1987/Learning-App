<svg xmlns="http://www.w3.org/2000/svg" width="480" height="240" viewBox="0 0 480 240" font-family="sans-serif" font-size="12">
  <rect width="480" height="240" fill="#ffffff"/>
  <text x="240" y="18" text-anchor="middle" font-size="13" font-weight="bold">Same signal, two views</text>

  <!-- time domain -->
  <g transform="translate(20,35)">
    <text x="100" y="0" text-anchor="middle" font-weight="bold">Time domain (scope)</text>
    <rect x="0" y="10" width="200" height="150" fill="#fbfbfb" stroke="#000"/>
    <line x1="0" y1="85" x2="200" y2="85" stroke="#999"/>
    <!-- lumpy wave: fundamental + 3rd harmonic -->
    <path d="M0 85 C12 45 24 45 36 85 C48 125 60 125 72 85 C84 45 96 45 108 85 C120 125 132 125 144 85 C156 45 168 45 180 85 C188 110 196 110 200 95" fill="none" stroke="#c0392b" stroke-width="2"/>
    <text x="100" y="185" text-anchor="middle" fill="#555">shape over time</text>
    <text x="100" y="200" text-anchor="middle" fill="#555">"what does it look like?"</text>
  </g>

  <!-- frequency domain -->
  <g transform="translate(260,35)">
    <text x="100" y="0" text-anchor="middle" font-weight="bold">Frequency domain (spectrum)</text>
    <rect x="0" y="10" width="200" height="150" fill="#fbfbfb" stroke="#000"/>
    <line x1="20" y1="150" x2="200" y2="150" stroke="#000"/>
    <line x1="20" y1="150" x2="20" y2="20" stroke="#000"/>
    <!-- bars -->
    <line x1="50" y1="150" x2="50" y2="40" stroke="#2980b9" stroke-width="4"/>
    <text x="50" y="165" text-anchor="middle" font-size="10">f0</text>
    <line x1="90" y1="150" x2="90" y2="95" stroke="#2980b9" stroke-width="4"/>
    <text x="90" y="165" text-anchor="middle" font-size="10">3f0</text>
    <line x1="130" y1="150" x2="130" y2="120" stroke="#2980b9" stroke-width="4"/>
    <text x="130" y="165" text-anchor="middle" font-size="10">5f0</text>
    <!-- noise floor -->
    <line x1="20" y1="140" x2="200" y2="140" stroke="#999" stroke-dasharray="3 3"/>
    <text x="160" y="135" font-size="9" fill="#999">noise floor</text>
    <text x="100" y="190" text-anchor="middle" fill="#555">power at each frequency</text>
    <text x="100" y="205" text-anchor="middle" fill="#555">"what tones are inside?"</text>
  </g>
</svg>
