<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <rect x="0" y="0" width="440" height="280" fill="#ffffff"/>
  <text x="70" y="22" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Step response vs. phase margin (how much it rings)</text>

  <!-- Panel 1: good phase margin -->
  <text x="20" y="46" font-family="Arial, sans-serif" font-size="12" font-weight="bold">High PM (~90&#176;): clean</text>
  <line x1="20" y1="120" x2="150" y2="120" stroke="#000000" stroke-width="1.5"/>
  <line x1="30" y1="60" x2="30" y2="120" stroke="#000000" stroke-width="1.5"/>
  <!-- target line -->
  <line x1="30" y1="70" x2="150" y2="70" stroke="#888888" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M30,120 L30,118 C55,72 90,70 150,70" fill="none" stroke="#1a6fd0" stroke-width="2.5"/>
  <text x="34" y="135" font-family="Arial, sans-serif" font-size="10">no overshoot</text>

  <!-- Panel 2: low phase margin -->
  <text x="170" y="46" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Low PM (~30&#176;): rings</text>
  <line x1="170" y1="120" x2="300" y2="120" stroke="#000000" stroke-width="1.5"/>
  <line x1="180" y1="60" x2="180" y2="120" stroke="#000000" stroke-width="1.5"/>
  <line x1="180" y1="70" x2="300" y2="70" stroke="#888888" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M180,120 C195,55 215,90 232,72 C245,62 255,76 268,70 C278,67 285,72 300,70" fill="none" stroke="#d04a1a" stroke-width="2.5"/>
  <text x="184" y="135" font-family="Arial, sans-serif" font-size="10">overshoot + ringing</text>

  <!-- Panel 3: unstable -->
  <text x="320" y="46" font-family="Arial, sans-serif" font-size="12" font-weight="bold">PM &#8804; 0: unstable</text>
  <line x1="320" y1="120" x2="430" y2="120" stroke="#000000" stroke-width="1.5"/>
  <line x1="330" y1="55" x2="330" y2="125" stroke="#000000" stroke-width="1.5"/>
  <path d="M330,90 C338,60 346,120 354,58 C362,122 370,56 378,124 C386,54 394,126 402,52" fill="none" stroke="#000000" stroke-width="2.5"/>
  <text x="324" y="140" font-family="Arial, sans-serif" font-size="10">growing oscillation</text>

  <!-- axes labels -->
  <text x="20" y="175" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Each plot: output (vertical) vs. time (horizontal) after a sudden step at the input.</text>
  <text x="20" y="200" font-family="Arial, sans-serif" font-size="12">More phase margin = more damping = less overshoot. Less margin = ringing.</text>
  <text x="20" y="222" font-family="Arial, sans-serif" font-size="12">Zero or negative margin = the circuit oscillates on its own.</text>
  <text x="20" y="252" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Rough guide: 90&#176;&#8594;no overshoot, 60&#176;&#8594;~4%, 45&#176;&#8594;~23%, &lt;30&#176;&#8594;heavy ringing.</text>
</svg>
