<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" width="360" height="240">
  <rect x="0" y="0" width="360" height="240" fill="#ffffff"/>
  <!-- inductor L -->
  <line x1="90" y1="40" x2="90" y2="70" stroke="#000000" stroke-width="1.5"/>
  <path d="M90 70 q-12 8 0 16 q-12 8 0 16 q-12 8 0 16 q-12 8 0 16" fill="none" stroke="#cc0000" stroke-width="2"/>
  <line x1="90" y1="134" x2="90" y2="170" stroke="#000000" stroke-width="1.5"/>
  <text x="60" y="105" font-family="Arial, sans-serif" font-size="14" fill="#cc0000">L</text>
  <!-- top rail to C divider -->
  <line x1="90" y1="40" x2="240" y2="40" stroke="#000000" stroke-width="1.5"/>
  <!-- C1 top -->
  <line x1="240" y1="40" x2="240" y2="80" stroke="#000000" stroke-width="1.5"/>
  <line x1="225" y1="80" x2="255" y2="80" stroke="#0066cc" stroke-width="2"/>
  <line x1="225" y1="88" x2="255" y2="88" stroke="#0066cc" stroke-width="2"/>
  <text x="258" y="78" font-family="Arial, sans-serif" font-size="13" fill="#0066cc">C1</text>
  <!-- tap node -->
  <circle cx="240" cy="105" r="2.5" fill="#000000"/>
  <line x1="240" y1="88" x2="240" y2="105" stroke="#000000" stroke-width="1.5"/>
  <line x1="240" y1="105" x2="300" y2="105" stroke="#000000" stroke-width="1.5"/>
  <text x="295" y="100" font-family="Arial, sans-serif" font-size="11">feedback</text>
  <!-- C2 bottom -->
  <line x1="240" y1="105" x2="240" y2="125" stroke="#000000" stroke-width="1.5"/>
  <line x1="225" y1="125" x2="255" y2="125" stroke="#0066cc" stroke-width="2"/>
  <line x1="225" y1="133" x2="255" y2="133" stroke="#0066cc" stroke-width="2"/>
  <text x="258" y="135" font-family="Arial, sans-serif" font-size="13" fill="#0066cc">C2</text>
  <line x1="240" y1="133" x2="240" y2="170" stroke="#000000" stroke-width="1.5"/>
  <!-- bottom rail -->
  <line x1="90" y1="170" x2="240" y2="170" stroke="#000000" stroke-width="1.5"/>
  <!-- caption -->
  <text x="20" y="205" font-family="Arial, sans-serif" font-size="13" fill="#000000">Colpitts LC tank: capacitor divider C1/C2 sets the feedback</text>
  <text x="20" y="226" font-family="Arial, sans-serif" font-size="13" fill="#000000">f = 1 / (2&#960;&#8730;(L&#183;Ceq)),  Ceq = C1C2/(C1+C2)</text>
</svg>
