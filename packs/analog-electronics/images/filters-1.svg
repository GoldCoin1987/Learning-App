<svg xmlns="http://www.w3.org/2000/svg" width="520" height="340" viewBox="0 0 520 340" font-family="sans-serif">
  <rect width="520" height="340" fill="#ffffff"/>
  <text x="260" y="24" text-anchor="middle" font-size="16" font-weight="bold">Magnitude Response: Butterworth vs Chebyshev vs Bessel</text>
  <!-- axes -->
  <line x1="60" y1="280" x2="490" y2="280" stroke="#000" stroke-width="1.5"/>
  <line x1="60" y1="280" x2="60" y2="50" stroke="#000" stroke-width="1.5"/>
  <text x="275" y="312" text-anchor="middle" font-size="13">Frequency (log, normalized to f_c)</text>
  <text x="20" y="165" text-anchor="middle" font-size="13" transform="rotate(-90 20 165)">Gain (dB)</text>
  <!-- 0 dB and -3 dB guides -->
  <line x1="60" y1="70" x2="490" y2="70" stroke="#bbb" stroke-dasharray="4 3"/>
  <text x="64" y="66" font-size="11" fill="#666">0 dB</text>
  <line x1="60" y1="95" x2="300" y2="95" stroke="#bbb" stroke-dasharray="4 3"/>
  <text x="64" y="92" font-size="11" fill="#666">-3 dB</text>
  <!-- f_c marker -->
  <line x1="300" y1="70" x2="300" y2="280" stroke="#bbb" stroke-dasharray="4 3"/>
  <text x="300" y="296" text-anchor="middle" font-size="11" fill="#666">f_c</text>
  <!-- Chebyshev: ripple in passband, steepest of the three -->
  <path d="M60,72 Q120,66 160,73 Q200,67 240,72 Q280,80 300,95 Q330,140 360,210 L420,275" fill="none" stroke="#d62728" stroke-width="2.4"/>
  <!-- Butterworth: maximally flat then moderate roll-off -->
  <path d="M60,70 Q200,70 270,76 Q300,86 320,108 Q360,170 400,235 L440,272" fill="none" stroke="#1f77b4" stroke-width="2.4"/>
  <!-- Bessel: gentle, earliest droop, slowest roll-off -->
  <path d="M60,71 Q150,74 220,86 Q280,104 320,140 Q370,200 430,258 L470,276" fill="none" stroke="#2ca02c" stroke-width="2.4"/>
  <!-- legend -->
  <rect x="350" y="48" width="150" height="62" fill="#fff" stroke="#ccc"/>
  <line x1="360" y1="62" x2="382" y2="62" stroke="#d62728" stroke-width="2.4"/><text x="388" y="66" font-size="12">Chebyshev</text>
  <line x1="360" y1="80" x2="382" y2="80" stroke="#1f77b4" stroke-width="2.4"/><text x="388" y="84" font-size="12">Butterworth</text>
  <line x1="360" y1="98" x2="382" y2="98" stroke="#2ca02c" stroke-width="2.4"/><text x="388" y="102" font-size="12">Bessel</text>
</svg>
