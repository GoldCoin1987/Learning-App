<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <rect x="0" y="0" width="480" height="300" fill="#ffffff"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="20" y="24">A gap in the ground plane forces a big detour</text>
  </g>
  <!-- GOOD: solid plane -->
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <text x="20" y="50">Good: solid ground</text>
  </g>
  <rect x="20" y="60" width="200" height="70" fill="#dddddd" stroke="#000000" stroke-width="1"/>
  <!-- signal trace -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <line x1="40" y1="75" x2="200" y2="75"/>
  </g>
  <!-- return current straight under -->
  <g stroke="#d04a1a" stroke-width="2" fill="none" stroke-dasharray="5,4">
    <line x1="40" y1="95" x2="200" y2="95"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="10">
    <text x="44" y="71" fill="#1a6fd0">signal</text>
    <text x="44" y="118" fill="#d04a1a">return hugs trace</text>
    <text x="44" y="128" fill="#000000">small loop = quiet</text>
  </g>
  <!-- BAD: slotted plane -->
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <text x="260" y="50">Bad: slot in ground</text>
  </g>
  <rect x="260" y="60" width="200" height="70" fill="#dddddd" stroke="#000000" stroke-width="1"/>
  <!-- white slot -->
  <rect x="350" y="60" width="14" height="50" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <!-- signal trace -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <line x1="280" y1="75" x2="440" y2="75"/>
  </g>
  <!-- return detours around slot -->
  <g stroke="#d04a1a" stroke-width="2" fill="none" stroke-dasharray="5,4">
    <line x1="280" y1="95" x2="345" y2="95"/>
    <line x1="345" y1="95" x2="345" y2="122"/>
    <line x1="345" y1="122" x2="369" y2="122"/>
    <line x1="369" y1="122" x2="369" y2="95"/>
    <line x1="369" y1="95" x2="440" y2="95"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="10">
    <text x="338" y="55" fill="#000000">slot</text>
    <text x="300" y="118" fill="#d04a1a">return must go around</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="20" y="165">High-frequency return current does NOT follow least resistance -</text>
    <text x="20" y="184">it follows the path of LEAST LOOP AREA, right under the trace.</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <text x="20" y="218">Why the big loop is bad:</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="11">
    <text x="35" y="240">- larger loop = more inductance = ringing and noise</text>
    <text x="35" y="259">- a big current loop is a little antenna - it radiates interference (EMI)</text>
    <text x="35" y="278">- the stray field couples into nearby traces (crosstalk)</text>
    <text x="35" y="297">Rule: never run a fast signal across a gap in its ground.</text>
  </g>
</svg>
