<svg xmlns="http://www.w3.org/2000/svg" width="480" height="240" viewBox="0 0 480 240" font-family="sans-serif" font-size="12">
  <rect width="480" height="240" fill="#ffffff"/>
  <text x="240" y="18" text-anchor="middle" font-size="13" font-weight="bold">How you connect a multimeter</text>

  <!-- Voltage: in parallel -->
  <g transform="translate(20,40)">
    <text x="100" y="0" text-anchor="middle" font-weight="bold">Voltage: ACROSS (parallel)</text>
    <!-- source -->
    <line x1="0" y1="30" x2="0" y2="120" stroke="#000"/>
    <line x1="0" y1="30" x2="200" y2="30" stroke="#000"/>
    <line x1="0" y1="120" x2="200" y2="120" stroke="#000"/>
    <line x1="200" y1="30" x2="200" y2="120" stroke="#000"/>
    <!-- battery -->
    <line x1="0" y1="65" x2="0" y2="65" stroke="#000"/>
    <rect x="-8" y="60" width="16" height="4" fill="#000"/>
    <rect x="-5" y="68" width="10" height="4" fill="#000"/>
    <text x="-30" y="78" fill="#000">src</text>
    <!-- resistor -->
    <rect x="180" y="55" width="20" height="40" fill="none" stroke="#000"/>
    <text x="215" y="78">R</text>
    <!-- meter in parallel -->
    <circle cx="100" cy="170" r="22" fill="none" stroke="#000" stroke-width="2"/>
    <text x="100" y="174" text-anchor="middle" font-weight="bold">V</text>
    <line x1="100" y1="30" x2="100" y2="148" stroke="#2980b9" stroke-width="2"/>
    <line x1="100" y1="120" x2="100" y2="120" stroke="#2980b9" stroke-width="2"/>
    <line x1="78" y1="170" x2="40" y2="170" stroke="#2980b9" stroke-width="2"/>
    <line x1="40" y1="170" x2="40" y2="120" stroke="#2980b9" stroke-width="2"/>
    <text x="100" y="215" text-anchor="middle" fill="#2980b9">high resistance: lets almost no current in</text>
  </g>

  <!-- Current: in series -->
  <g transform="translate(270,40)">
    <text x="100" y="0" text-anchor="middle" font-weight="bold">Current: IN LINE (series)</text>
    <line x1="0" y1="30" x2="0" y2="120" stroke="#000"/>
    <line x1="0" y1="30" x2="60" y2="30" stroke="#000"/>
    <line x1="140" y1="30" x2="200" y2="30" stroke="#000"/>
    <line x1="0" y1="120" x2="200" y2="120" stroke="#000"/>
    <line x1="200" y1="30" x2="200" y2="120" stroke="#000"/>
    <rect x="-8" y="60" width="16" height="4" fill="#000"/>
    <rect x="-5" y="68" width="10" height="4" fill="#000"/>
    <text x="-30" y="78">src</text>
    <rect x="180" y="55" width="20" height="40" fill="none" stroke="#000"/>
    <text x="215" y="78">R</text>
    <!-- meter cut into the wire -->
    <circle cx="100" cy="30" r="22" fill="none" stroke="#000" stroke-width="2"/>
    <text x="100" y="34" text-anchor="middle" font-weight="bold">A</text>
    <text x="100" y="200" text-anchor="middle" fill="#c0392b">low resistance: all the current flows through it</text>
  </g>
</svg>
