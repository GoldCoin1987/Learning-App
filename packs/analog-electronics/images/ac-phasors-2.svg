<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280">
  <rect x="0" y="0" width="320" height="280" fill="#ffffff"/>
  <!-- axes (real / imag) -->
  <g stroke="#999999" stroke-width="1.5" fill="none">
    <line x1="40" y1="230" x2="300" y2="230"/>
    <line x1="40" y1="20" x2="40" y2="250"/>
  </g>
  <!-- V phasor (reference, along real axis) -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <line x1="40" y1="230" x2="250" y2="230"/>
  </g>
  <polygon points="250,230 238,224 238,236" fill="#1a6fd0"/>
  <!-- I phasor (leads by angle phi, rotated up) -->
  <g stroke="#d04a1a" stroke-width="3" fill="none">
    <line x1="40" y1="230" x2="220" y2="120"/>
  </g>
  <polygon points="220,120 207,123 214,133" fill="#d04a1a"/>
  <!-- angle arc -->
  <g stroke="#000000" stroke-width="1.5" fill="none">
    <path d="M110 230 A 70 70 0 0 0 95 188"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="14">
    <text x="255" y="234" fill="#1a6fd0">V</text>
    <text x="222" y="112" fill="#d04a1a">I</text>
    <text x="120" y="205">phi</text>
    <text x="285" y="248">Re</text>
    <text x="48" y="30">Im</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="40" y="272">Phasor diagram: I leads V by phi (capacitive)</text>
  </g>
</svg>
