<svg xmlns="http://www.w3.org/2000/svg" width="380" height="210" viewBox="0 0 380 210">
  <rect width="380" height="210" fill="white"/>
  <g stroke="black" stroke-width="2" fill="none">
    <!-- capacitor = bucket of water -->
    <path d="M40 60 L40 150 L120 150 L120 60"/>
    <rect x="40" y="105" width="80" height="45" fill="#cccccc" stroke="none"/>
    <path d="M40 105 L120 105"/>
    <!-- inductor = flywheel -->
    <circle cx="290" cy="110" r="55"/>
    <circle cx="290" cy="110" r="8" fill="black"/>
    <line x1="290" y1="55" x2="290" y2="165"/>
    <line x1="235" y1="110" x2="345" y2="110"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="22" y="175">Capacitor</text>
    <text x="20" y="192">stores charge (voltage)</text>
    <text x="255" y="185">Inductor</text>
    <text x="238" y="202">stores motion (current)</text>
  </g>
</svg>
