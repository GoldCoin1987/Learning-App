<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 230" width="380" height="230">
  <rect x="0" y="0" width="380" height="230" fill="#ffffff"/>
  <!-- axes -->
  <line x1="40" y1="180" x2="360" y2="180" stroke="#000000" stroke-width="1"/>
  <line x1="40" y1="30" x2="40" y2="180" stroke="#000000" stroke-width="1"/>
  <text x="335" y="197" font-family="Arial, sans-serif" font-size="12">time</text>
  <text x="6" y="45" font-family="Arial, sans-serif" font-size="11">V on C</text>
  <!-- threshold lines -->
  <line x1="40" y1="60" x2="360" y2="60" stroke="#0066cc" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="40" y1="140" x2="360" y2="140" stroke="#0066cc" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="300" y="56" font-family="Arial, sans-serif" font-size="10" fill="#0066cc">upper trip</text>
  <text x="300" y="153" font-family="Arial, sans-serif" font-size="10" fill="#0066cc">lower trip</text>
  <!-- capacitor charge/discharge sawtooth-ish (relaxation) -->
  <path d="M40 140 Q70 60 100 60 Q120 60 100 60 L100 60 Q130 140 160 140 Q190 60 220 60 Q250 140 280 140 Q310 60 340 60" fill="none" stroke="#cc0000" stroke-width="2"/>
  <text x="120" y="215" font-family="Arial, sans-serif" font-size="11" fill="#cc0000">cap voltage (charges, then resets)</text>
  <!-- caption -->
  <text x="15" y="222" font-family="Arial, sans-serif" font-size="11" fill="#000000"></text>
</svg>
