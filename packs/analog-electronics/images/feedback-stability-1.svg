<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" width="380" height="220">
  <rect x="0" y="0" width="380" height="220" fill="#ffffff"/>
  <!-- summing node -->
  <circle cx="80" cy="90" r="16" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="73" y="95" font-family="Arial, sans-serif" font-size="16">&#931;</text>
  <text x="58" y="78" font-family="Arial, sans-serif" font-size="13">+</text>
  <text x="58" y="118" font-family="Arial, sans-serif" font-size="15">&#8722;</text>
  <!-- input arrow -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="20" y1="90" x2="64" y2="90"/>
  </g>
  <polygon points="64,90 56,86 56,94" fill="#000000"/>
  <text x="18" y="82" font-family="Arial, sans-serif" font-size="13">Vin</text>
  <!-- forward block A -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="96" y1="90" x2="150" y2="90"/>
  </g>
  <polygon points="150,90 142,86 142,94" fill="#000000"/>
  <rect x="150" y="68" width="64" height="44" fill="#eaf2fb" stroke="#1a6fd0" stroke-width="2"/>
  <text x="173" y="96" font-family="Arial, sans-serif" font-size="18" fill="#1a6fd0">A</text>
  <!-- output -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="214" y1="90" x2="340" y2="90"/>
  </g>
  <polygon points="340,90 332,86 332,94" fill="#000000"/>
  <text x="328" y="82" font-family="Arial, sans-serif" font-size="13">Vout</text>
  <!-- tap to feedback -->
  <circle cx="290" cy="90" r="3" fill="#000000"/>
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="290" y1="90" x2="290" y2="170"/>
    <line x1="290" y1="170" x2="246" y2="170"/>
  </g>
  <!-- feedback block beta -->
  <rect x="182" y="148" width="64" height="44" fill="#fdeee8" stroke="#d04a1a" stroke-width="2"/>
  <text x="200" y="176" font-family="Arial, sans-serif" font-size="18" fill="#d04a1a">&#946;</text>
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="182" y1="170" x2="80" y2="170"/>
    <line x1="80" y1="170" x2="80" y2="106"/>
  </g>
  <polygon points="80,106 76,114 84,114" fill="#000000"/>
  <!-- caption -->
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="46" y="214">Negative-feedback block diagram: A_cl = A/(1 + A&#946;)</text>
  </g>
</svg>
