<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280">
  <rect x="0" y="0" width="420" height="280" fill="#ffffff"/>
  <!-- axes -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="40" y1="140" x2="400" y2="140"/>
    <line x1="40" y1="30" x2="40" y2="250"/>
  </g>
  <!-- sine wave (one full cycle starts a bit shifted to show phase) -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <path d="M70 140 C 110 40, 150 40, 190 140 C 230 240, 270 240, 310 140 C 330 90, 350 70, 370 75"/>
  </g>
  <!-- amplitude marker -->
  <g stroke="#d04a1a" stroke-width="1.5" fill="none" stroke-dasharray="4,3">
    <line x1="130" y1="60" x2="130" y2="140"/>
  </g>
  <!-- period marker (peak to peak, top) -->
  <g stroke="#2a9d3a" stroke-width="1.5" fill="none">
    <line x1="130" y1="50" x2="250" y2="50"/>
  </g>
  <polygon points="130,50 138,46 138,54" fill="#2a9d3a"/>
  <polygon points="250,50 242,46 242,54" fill="#2a9d3a"/>
  <!-- phase offset marker (start not at zero) -->
  <g stroke="#888888" stroke-width="1.5" fill="none" stroke-dasharray="3,3">
    <line x1="70" y1="140" x2="70" y2="250"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="86" y="100" fill="#d04a1a">amplitude</text>
    <text x="150" y="44" fill="#2a9d3a">period T (one cycle)</text>
    <text x="46" y="245" fill="#888888">phase offset</text>
    <text x="395" y="158">time</text>
    <text x="12" y="44">voltage</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="60" y="272">A sine wave: amplitude, period, and phase</text>
  </g>
</svg>
