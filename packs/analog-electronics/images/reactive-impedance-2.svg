<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320" font-family="sans-serif">
  <rect width="480" height="320" fill="#ffffff"/>
  <text x="240" y="24" text-anchor="middle" font-size="16" font-weight="bold">Real Capacitor Self-Resonance</text>
  <!-- axes -->
  <line x1="60" y1="270" x2="440" y2="270" stroke="#222" stroke-width="2"/>
  <line x1="60" y1="270" x2="60" y2="50" stroke="#222" stroke-width="2"/>
  <text x="250" y="305" text-anchor="middle" font-size="13">frequency (log f)</text>
  <text x="20" y="160" text-anchor="middle" font-size="13" transform="rotate(-90 20 160)">|Z| (log ohms)</text>
  <!-- V-shaped curve: capacitive down, ESR floor, inductive up -->
  <polyline points="70,70 200,210 240,235 280,210 410,70" fill="none" stroke="#6a1b9a" stroke-width="2.5"/>
  <!-- ESR floor marker -->
  <line x1="200" y1="235" x2="280" y2="235" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="118" y="120" font-size="12" fill="#1565c0">1/(wC)</text>
  <text x="335" y="120" font-size="12" fill="#c62828">wL (ESL)</text>
  <text x="200" y="258" font-size="12" fill="#2e7d32">ESR floor</text>
  <!-- SRF marker -->
  <line x1="240" y1="235" x2="240" y2="270" stroke="#222" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="240" y="288" text-anchor="middle" font-size="12" font-weight="bold">SRF</text>
  <text x="150" y="48" font-size="12" fill="#6a1b9a">cap looks inductive above SRF -&gt;</text>
</svg>
