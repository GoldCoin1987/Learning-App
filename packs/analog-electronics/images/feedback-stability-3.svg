<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="420" height="240">
  <rect x="0" y="0" width="420" height="240" fill="#ffffff"/>
  <text x="110" y="22" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Thermostat: a negative-feedback loop</text>
  <!-- set point -->
  <rect x="20" y="60" width="84" height="42" fill="#eaf2fb" stroke="#1a6fd0" stroke-width="2"/>
  <text x="34" y="80" font-family="Arial, sans-serif" font-size="12">Set point</text>
  <text x="42" y="96" font-family="Arial, sans-serif" font-size="12">(70&#176;F)</text>
  <!-- compare -->
  <circle cx="150" cy="81" r="18" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="138" y="86" font-family="Arial, sans-serif" font-size="14">&#8722;</text>
  <text x="128" y="66" font-family="Arial, sans-serif" font-size="11">+</text>
  <line x1="104" y1="81" x2="130" y2="81" stroke="#000000" stroke-width="2"/>
  <polygon points="132,81 124,77 124,85" fill="#000000"/>
  <text x="108" y="56" font-family="Arial, sans-serif" font-size="11">compare</text>
  <!-- furnace -->
  <line x1="168" y1="81" x2="200" y2="81" stroke="#000000" stroke-width="2"/>
  <polygon points="202,81 194,77 194,85" fill="#000000"/>
  <rect x="204" y="60" width="92" height="42" fill="#fdeee8" stroke="#d04a1a" stroke-width="2"/>
  <text x="214" y="80" font-family="Arial, sans-serif" font-size="12">Furnace</text>
  <text x="214" y="96" font-family="Arial, sans-serif" font-size="12">(heat on/off)</text>
  <!-- room -->
  <line x1="296" y1="81" x2="330" y2="81" stroke="#000000" stroke-width="2"/>
  <polygon points="332,81 324,77 324,85" fill="#000000"/>
  <rect x="334" y="60" width="70" height="42" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="346" y="80" font-family="Arial, sans-serif" font-size="12">Room</text>
  <text x="346" y="96" font-family="Arial, sans-serif" font-size="12">temp</text>
  <!-- feedback path -->
  <circle cx="369" cy="81" r="3" fill="#000000"/>
  <line x1="369" y1="102" x2="369" y2="170" stroke="#000000" stroke-width="2"/>
  <line x1="369" y1="170" x2="150" y2="170" stroke="#000000" stroke-width="2"/>
  <line x1="150" y1="170" x2="150" y2="99" stroke="#000000" stroke-width="2"/>
  <polygon points="150,99 146,107 154,107" fill="#000000"/>
  <text x="190" y="186" font-family="Arial, sans-serif" font-size="12">measured temperature fed back (thermometer)</text>
  <!-- recap -->
  <text x="20" y="218" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Too cold &#8594; heat on. Too hot &#8594; heat off. The output opposes the error: it holds steady.</text>
</svg>
