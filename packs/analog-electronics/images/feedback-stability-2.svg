<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 300" width="380" height="300">
  <rect x="0" y="0" width="380" height="300" fill="#ffffff"/>
  <!-- magnitude plot axes -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="50" y1="20" x2="50" y2="130"/>
    <line x1="50" y1="100" x2="350" y2="100"/>
  </g>
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="12">|T|dB</text>
  <!-- 0 dB line -->
  <g stroke="#888888" stroke-width="1" fill="none" stroke-dasharray="3,3">
    <line x1="50" y1="100" x2="350" y2="100"/>
  </g>
  <text x="22" y="104" font-family="Arial, sans-serif" font-size="11">0 dB</text>
  <!-- loop gain magnitude: -20 dB/dec then steeper -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <line x1="50" y1="40" x2="120" y2="40"/>
    <line x1="120" y1="40" x2="230" y2="100"/>
    <line x1="230" y1="100" x2="300" y2="160"/>
  </g>
  <!-- crossover marker (|T|=1) -->
  <g stroke="#d04a1a" stroke-width="1.5" fill="none" stroke-dasharray="4,3">
    <line x1="230" y1="100" x2="230" y2="270"/>
  </g>
  <text x="206" y="16" font-family="Arial, sans-serif" font-size="11" fill="#d04a1a">fc</text>
  <!-- phase plot axes -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="50" y1="180" x2="50" y2="290"/>
    <line x1="50" y1="180" x2="350" y2="180"/>
  </g>
  <text x="18" y="188" font-family="Arial, sans-serif" font-size="12">phase</text>
  <text x="20" y="200" font-family="Arial, sans-serif" font-size="11">0&#176;</text>
  <!-- -180 line -->
  <g stroke="#888888" stroke-width="1" fill="none" stroke-dasharray="3,3">
    <line x1="50" y1="270" x2="350" y2="270"/>
  </g>
  <text x="14" y="274" font-family="Arial, sans-serif" font-size="11">-180&#176;</text>
  <!-- phase curve -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <path d="M50 185 Q140 185 180 220 Q220 250 300 262"/>
  </g>
  <!-- phase at crossover marker -->
  <circle cx="230" cy="245" r="3.5" fill="#d04a1a"/>
  <!-- phase margin span -->
  <g stroke="#0a7d33" stroke-width="2" fill="none">
    <line x1="244" y1="245" x2="244" y2="270"/>
  </g>
  <text x="250" y="262" font-family="Arial, sans-serif" font-size="12" fill="#0a7d33">PM</text>
  <text x="300" y="296" font-family="Arial, sans-serif" font-size="11">log f</text>
  <!-- caption -->
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="40" y="300">Loop-gain Bode: phase margin at |T|=1 crossover</text>
  </g>
</svg>
