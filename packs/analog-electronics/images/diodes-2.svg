<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 300" width="380" height="300">
  <rect x="0" y="0" width="380" height="300" fill="#ffffff"/>
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- AC source (transformer secondary) on left -->
    <circle cx="50" cy="150" r="28"/>
    <!-- leads to bridge nodes -->
    <line x1="78" y1="135" x2="120" y2="80"/>
    <line x1="78" y1="165" x2="120" y2="220"/>
    <!-- bridge diamond nodes: top(190,50) left(120,150) right(260,150) bottom(190,250) -->
    <line x1="120" y1="80" x2="120" y2="220"/>
    <line x1="120" y1="80" x2="190" y2="50"/>
    <line x1="190" y1="50" x2="260" y2="80"/>
    <line x1="120" y1="220" x2="190" y2="250"/>
    <line x1="190" y1="250" x2="260" y2="220"/>
    <line x1="260" y1="80" x2="260" y2="220"/>
    <!-- top node to + output rail -->
    <line x1="190" y1="50" x2="320" y2="50"/>
    <line x1="320" y1="50" x2="320" y2="110"/>
    <!-- bottom node to - rail -->
    <line x1="190" y1="250" x2="320" y2="250"/>
    <line x1="320" y1="190" x2="320" y2="250"/>
    <!-- smoothing cap (two plates) -->
    <line x1="300" y1="110" x2="340" y2="110"/>
    <line x1="300" y1="190" x2="340" y2="190"/>
    <!-- load resistor -->
    <rect x="355" y="110" width="18" height="80"/>
    <line x1="320" y1="110" x2="355" y2="110"/>
    <line x1="320" y1="190" x2="355" y2="190"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="36" y="155">AC</text>
    <text x="195" y="155">bridge</text>
    <text x="305" y="155">C</text>
    <text x="356" y="205">RL</text>
    <text x="330" y="48">+</text>
    <text x="330" y="262">-</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="50" y="292">Full-wave bridge rectifier + smoothing cap</text>
  </g>
</svg>
