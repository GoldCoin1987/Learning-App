<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" width="360" height="240">
  <rect x="0" y="0" width="360" height="240" fill="#ffffff"/>
  <!-- op-amp triangle -->
  <polygon points="150,70 150,150 215,110" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="158" y="100" font-family="Arial, sans-serif" font-size="14">&#8211;</text>
  <text x="158" y="135" font-family="Arial, sans-serif" font-size="14">+</text>
  <!-- output node -->
  <line x1="215" y1="110" x2="300" y2="110" stroke="#000000" stroke-width="1.5"/>
  <circle cx="270" cy="110" r="2.5" fill="#000000"/>
  <text x="305" y="114" font-family="Arial, sans-serif" font-size="13">Vo</text>
  <!-- negative feedback: Rf gain network (top) -->
  <line x1="150" y1="85" x2="150" y2="40" stroke="#000000" stroke-width="1.5"/>
  <line x1="150" y1="40" x2="270" y2="40" stroke="#000000" stroke-width="1.5"/>
  <line x1="270" y1="40" x2="270" y2="110" stroke="#000000" stroke-width="1.5"/>
  <rect x="180" y="33" width="40" height="14" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <text x="190" y="30" font-family="Arial, sans-serif" font-size="12" fill="#cc0000">2R</text>
  <!-- inverting input to ground via R1 -->
  <line x1="150" y1="85" x2="110" y2="85" stroke="#000000" stroke-width="1.5"/>
  <rect x="80" y="78" width="14" height="40" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <line x1="110" y1="85" x2="110" y2="118" stroke="#000000" stroke-width="1.5"/>
  <text x="60" y="102" font-family="Arial, sans-serif" font-size="12" fill="#cc0000">R</text>
  <line x1="87" y1="118" x2="87" y2="135" stroke="#000000" stroke-width="1.5"/>
  <line x1="78" y1="135" x2="96" y2="135" stroke="#000000" stroke-width="1.5"/>
  <!-- Wien network: series RC and parallel RC into + input -->
  <line x1="150" y1="125" x2="120" y2="125" stroke="#000000" stroke-width="1.5"/>
  <line x1="120" y1="125" x2="120" y2="175" stroke="#000000" stroke-width="1.5"/>
  <!-- parallel RC to ground -->
  <rect x="113" y="180" width="14" height="22" fill="none" stroke="#0066cc" stroke-width="1.5"/>
  <line x1="120" y1="175" x2="120" y2="180" stroke="#000000" stroke-width="1.5"/>
  <line x1="120" y1="202" x2="120" y2="215" stroke="#000000" stroke-width="1.5"/>
  <line x1="111" y1="215" x2="129" y2="215" stroke="#000000" stroke-width="1.5"/>
  <!-- series RC from output to + node -->
  <line x1="270" y1="125" x2="270" y2="155" stroke="#000000" stroke-width="1.5"/>
  <line x1="270" y1="155" x2="120" y2="155" stroke="#000000" stroke-width="1.5"/>
  <rect x="185" y="148" width="14" height="14" fill="none" stroke="#0066cc" stroke-width="1.5"/>
  <text x="160" y="160" font-family="Arial, sans-serif" font-size="11" fill="#0066cc">R,C</text>
  <text x="130" y="195" font-family="Arial, sans-serif" font-size="11" fill="#0066cc">R,C</text>
  <!-- caption -->
  <text x="20" y="232" font-family="Arial, sans-serif" font-size="13" fill="#000000">Wien-bridge oscillator: f = 1/(2&#960;RC), needs gain = 3</text>
</svg>
