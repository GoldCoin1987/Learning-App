<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260">
  <rect x="0" y="0" width="320" height="260" fill="#ffffff"/>
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- top wire from Vin -->
    <line x1="60" y1="40" x2="160" y2="40"/>
    <!-- R1 box -->
    <rect x="140" y="40" width="40" height="50"/>
    <!-- wire to mid node -->
    <line x1="160" y1="90" x2="160" y2="130"/>
    <!-- R2 box -->
    <rect x="140" y="130" width="40" height="50"/>
    <!-- wire to ground -->
    <line x1="160" y1="180" x2="160" y2="210"/>
    <line x1="60" y1="210" x2="160" y2="210"/>
    <!-- Vin source line (left) -->
    <line x1="60" y1="40" x2="60" y2="210"/>
    <!-- output tap -->
    <line x1="160" y1="130" x2="260" y2="130"/>
    <circle cx="260" cy="130" r="4" fill="#000000"/>
    <!-- ground symbol -->
    <line x1="60" y1="210" x2="60" y2="222"/>
    <line x1="48" y1="222" x2="72" y2="222"/>
    <line x1="53" y1="228" x2="67" y2="228"/>
    <line x1="57" y1="234" x2="63" y2="234"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="15">
    <text x="195" y="68">R1</text>
    <text x="195" y="158">R2</text>
    <text x="20" y="128">Vin</text>
    <text x="200" y="120">Vout</text>
    <text x="30" y="248">GND</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="110" y="255">Vout = Vin x R2 / (R1 + R2)</text>
  </g>
</svg>
