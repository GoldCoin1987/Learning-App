<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="360" height="260">
  <rect x="0" y="0" width="360" height="260" fill="#ffffff"/>
  <!-- axes -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="50" y1="30" x2="50" y2="210"/>
    <line x1="50" y1="210" x2="335" y2="210"/>
  </g>
  <!-- triode/saturation boundary (parabola), dashed gray -->
  <g stroke="#888888" stroke-width="1.5" fill="none" stroke-dasharray="4,3">
    <path d="M50 210 Q120 90 200 70"/>
  </g>
  <!-- three I-V curves at increasing V_GS: rise in triode then flat in saturation -->
  <g stroke="#1a6fd0" stroke-width="2.5" fill="none">
    <path d="M50 210 Q70 175 95 168 L335 162"/>
    <path d="M50 210 Q90 135 130 122 L335 113"/>
    <path d="M50 210 Q120 80 175 62 L335 50"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="20" y="40">I_D</text>
    <text x="300" y="228">V_DS</text>
    <text x="340" y="166" fill="#1a6fd0">low</text>
    <text x="340" y="54" fill="#1a6fd0">high V_GS</text>
    <text x="95" y="120" fill="#888888">triode</text>
    <text x="215" y="100" fill="#888888">saturation</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="60" y="250">N-MOSFET output characteristics</text>
  </g>
</svg>
