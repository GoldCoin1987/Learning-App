<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" width="420" height="200">
  <rect x="0" y="0" width="420" height="200" fill="#ffffff"/>
  <!-- reference input -->
  <text x="8" y="70" font-family="Arial, sans-serif" font-size="12">f_ref</text>
  <line x1="40" y1="80" x2="70" y2="80" stroke="#000000" stroke-width="1.5"/>
  <polygon points="70,80 64,76 64,84" fill="#000000"/>
  <!-- phase detector -->
  <rect x="70" y="58" width="70" height="44" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="78" y="76" font-family="Arial, sans-serif" font-size="10">phase</text>
  <text x="78" y="92" font-family="Arial, sans-serif" font-size="10">detector</text>
  <!-- loop filter -->
  <line x1="140" y1="80" x2="170" y2="80" stroke="#000000" stroke-width="1.5"/>
  <rect x="170" y="58" width="60" height="44" fill="none" stroke="#0066cc" stroke-width="1.5"/>
  <text x="178" y="84" font-family="Arial, sans-serif" font-size="10" fill="#0066cc">loop filt</text>
  <!-- VCO -->
  <line x1="230" y1="80" x2="260" y2="80" stroke="#000000" stroke-width="1.5"/>
  <rect x="260" y="58" width="60" height="44" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <text x="278" y="84" font-family="Arial, sans-serif" font-size="13" fill="#cc0000">VCO</text>
  <!-- output -->
  <line x1="320" y1="80" x2="400" y2="80" stroke="#000000" stroke-width="1.5"/>
  <polygon points="400,80 394,76 394,84" fill="#000000"/>
  <text x="360" y="72" font-family="Arial, sans-serif" font-size="12">f_out</text>
  <!-- feedback divide-by-N -->
  <circle cx="360" cy="80" r="2.5" fill="#000000"/>
  <line x1="360" y1="80" x2="360" y2="150" stroke="#000000" stroke-width="1.5"/>
  <rect x="200" y="128" width="60" height="44" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="214" y="155" font-family="Arial, sans-serif" font-size="13">&#247; N</text>
  <line x1="360" y1="150" x2="260" y2="150" stroke="#000000" stroke-width="1.5"/>
  <polygon points="260,150 266,146 266,154" fill="#000000"/>
  <line x1="200" y1="150" x2="105" y2="150" stroke="#000000" stroke-width="1.5"/>
  <line x1="105" y1="150" x2="105" y2="102" stroke="#000000" stroke-width="1.5"/>
  <polygon points="105,102 101,108 109,108" fill="#000000"/>
  <!-- caption -->
  <text x="20" y="192" font-family="Arial, sans-serif" font-size="13" fill="#000000">PLL: locks the VCO to the reference, so f_out = N &#215; f_ref</text>
</svg>
