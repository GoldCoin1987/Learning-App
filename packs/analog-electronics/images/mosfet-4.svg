<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280">
  <rect x="0" y="0" width="360" height="280" fill="#ffffff"/>
  <!-- supply rail -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="40" y1="40" x2="320" y2="40"/>
    <!-- load (lamp/motor) box -->
    <rect x="160" y="60" width="60" height="40"/>
    <line x1="190" y1="40" x2="190" y2="60"/>
    <!-- wire from load to drain -->
    <line x1="190" y1="100" x2="190" y2="140"/>
    <!-- MOSFET symbol (low-side) -->
    <line x1="190" y1="140" x2="190" y2="200"/>
    <line x1="178" y1="140" x2="178" y2="200"/>
    <line x1="120" y1="170" x2="166" y2="170"/>
    <!-- source to ground -->
    <line x1="190" y1="200" x2="190" y2="230"/>
    <line x1="160" y1="230" x2="220" y2="230"/>
    <line x1="170" y1="238" x2="210" y2="238"/>
    <line x1="180" y1="246" x2="200" y2="246"/>
  </g>
  <!-- gate drive -->
  <g stroke="#1a6fd0" stroke-width="2" fill="none">
    <line x1="120" y1="170" x2="70" y2="170"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="325" y="44">+V</text>
    <text x="225" y="85">Load</text>
    <text x="225" y="100">(lamp/motor)</text>
    <text x="20" y="160" fill="#1a6fd0">Gate</text>
    <text x="20" y="176" fill="#1a6fd0">signal</text>
    <text x="200" y="150">D</text>
    <text x="200" y="205">S</text>
    <text x="225" y="240">ground</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="11">
    <text x="20" y="195">high = ON</text>
    <text x="20" y="210">low = OFF</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="55" y="272">MOSFET low-side switch driving a load</text>
  </g>
</svg>
