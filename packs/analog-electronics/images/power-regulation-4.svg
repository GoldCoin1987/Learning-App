<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240">
  <rect x="0" y="0" width="480" height="240" fill="#ffffff"/>
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- input line -->
    <line x1="30" y1="80" x2="150" y2="80"/>
    <!-- regulator box (pass element) -->
    <rect x="150" y="55" width="120" height="50"/>
    <!-- output line -->
    <line x1="270" y1="80" x2="380" y2="80"/>
    <!-- load resistor -->
    <rect x="370" y="80" width="22" height="60"/>
    <line x1="381" y1="140" x2="381" y2="190"/>
    <line x1="30" y1="190" x2="381" y2="190"/>
    <line x1="30" y1="80" x2="30" y2="190"/>
  </g>
  <!-- heat arrows -->
  <g stroke="#c0392b" stroke-width="2" fill="#c0392b">
    <line x1="180" y1="55" x2="180" y2="30"/>
    <polygon points="175,35 185,35 180,25"/>
    <line x1="210" y1="55" x2="210" y2="30"/>
    <polygon points="205,35 215,35 210,25"/>
    <line x1="240" y1="55" x2="240" y2="30"/>
    <polygon points="235,35 245,35 240,25"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="32" y="72">12 V in</text>
    <text x="320" y="72">5 V out</text>
    <text x="398" y="115">load</text>
    <text x="160" y="85">linear</text>
    <text x="160" y="100">regulator</text>
  </g>
  <g fill="#c0392b" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="150" y="18">7 V drop wasted as HEAT</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="30" y="225">Linear regulator burns the extra voltage as heat (eff = Vout/Vin)</text>
  </g>
</svg>
