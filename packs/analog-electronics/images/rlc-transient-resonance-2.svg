<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" width="360" height="240">
  <rect x="0" y="0" width="360" height="240" fill="#ffffff"/>
  <!-- axes -->
  <g stroke="#000000" stroke-width="1.5" fill="none">
    <line x1="40" y1="200" x2="340" y2="200"/>
    <line x1="40" y1="200" x2="40" y2="20"/>
  </g>
  <!-- peak line and -3 dB line -->
  <line x1="40" y1="45" x2="190" y2="45" stroke="#999999" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="40" y1="90" x2="250" y2="90" stroke="#999999" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- resonance response curve (band-pass peak) -->
  <path d="M40,185 C100,180 140,150 165,90 C180,55 185,45 190,45 C195,45 200,55 215,90 C240,150 280,180 340,188"
        stroke="#cc0000" stroke-width="2.5" fill="none"/>
  <!-- bandwidth markers at -3 dB crossings -->
  <line x1="150" y1="90" x2="150" y2="200" stroke="#0066cc" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="230" y1="90" x2="230" y2="200" stroke="#0066cc" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="190" y1="45" x2="190" y2="200" stroke="#118811" stroke-width="1" stroke-dasharray="2 3"/>
  <!-- BW arrow -->
  <g stroke="#0066cc" stroke-width="1.5" fill="none">
    <line x1="150" y1="110" x2="230" y2="110"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="46" y="42">peak</text>
    <text x="46" y="86">-3 dB</text>
    <text x="300" y="218">freq</text>
    <text x="6" y="30">|H|</text>
    <text x="178" y="214" fill="#118811">f0</text>
    <text x="170" y="106" fill="#0066cc">BW = f0/Q</text>
  </g>
  <text x="60" y="232" font-family="Arial, sans-serif" font-size="12" fill="#000000">Resonance peak: bandwidth BW set by the two -3 dB points</text>
</svg>
