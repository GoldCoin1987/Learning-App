<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect x="0" y="0" width="480" height="320" fill="#ffffff"/>
  <!-- TOP: clean signal -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="50" y1="80" x2="50" y2="20"/>
    <line x1="50" y1="80" x2="450" y2="80"/>
  </g>
  <g fill="#000000">
    <polygon points="50,20 46,30 54,30"/>
    <polygon points="450,80 440,76 440,84"/>
  </g>
  <!-- clean sine -->
  <path d="M60,80 Q90,30 120,80 T180,80 T240,80 T300,80 T360,80 T420,80" stroke="#1a6fd0" stroke-width="3" fill="none"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="20" y="20">level</text>
    <text x="455" y="84">time</text>
  </g>
  <g fill="#1a6fd0" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="120" y="115">Clean signal: easy to read (high SNR)</text>
  </g>

  <!-- BOTTOM: signal buried in hiss -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="50" y1="240" x2="50" y2="180"/>
    <line x1="50" y1="240" x2="450" y2="240"/>
  </g>
  <g fill="#000000">
    <polygon points="50,180 46,190 54,190"/>
    <polygon points="450,240 440,236 440,244"/>
  </g>
  <!-- noisy signal: same sine with jitter -->
  <polyline points="60,240 66,205 72,248 78,212 84,244 90,200 96,250 102,215 108,238 114,198 120,242 126,210 132,250 138,218 144,236 150,202 156,248 162,212 168,240 174,200 180,246 186,214 192,238 198,204 204,250 210,216 216,234 222,200 228,246 234,210 240,250 246,218 252,236 258,202 264,248 270,212 276,240 282,200 288,246 294,214 300,238 306,204 312,250 318,216 324,234 330,200 336,246 342,210 348,250 354,218 360,236 366,202 372,248 378,212 384,240 390,200 396,246 402,214 408,238 414,204 420,242" stroke="#d04a1a" stroke-width="2" fill="none"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="20" y="180">level</text>
    <text x="455" y="244">time</text>
  </g>
  <g fill="#d04a1a" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="80" y="275">Same signal buried in hiss (low SNR)</text>
  </g>
  <g fill="#555555" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">
    <text x="240" y="305">SNR = how big the signal is compared with the noise</text>
  </g>
</svg>
