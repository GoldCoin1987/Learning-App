<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280">
  <rect x="0" y="0" width="420" height="280" fill="#ffffff"/>
  <!-- axes -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="60" y1="220" x2="390" y2="220"/>
    <line x1="60" y1="220" x2="60" y2="30"/>
  </g>
  <!-- y gridline at 100% -->
  <g stroke="#cccccc" stroke-width="1" fill="none">
    <line x1="60" y1="50" x2="390" y2="50"/>
  </g>
  <!-- switching efficiency: high, fairly flat ~90% -->
  <g stroke="#c0392b" stroke-width="3" fill="none">
    <path d="M60 90 C 120 65, 200 62, 390 70"/>
  </g>
  <!-- linear efficiency: falls as Vout/Vin shrinks (eta = Vout/Vin) -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <line x1="60" y1="50" x2="390" y2="205"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="20" y="55">100%</text>
    <text x="30" y="224">0</text>
    <text x="150" y="240">increasing V_in - V_out (dropout)</text>
    <text x="10" y="130" transform="rotate(-90 10,130)">efficiency</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="250" y="62" fill="#c0392b">switching (~80-95%)</text>
    <text x="200" y="170" fill="#1a6fd0">linear: eta = Vout/Vin</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="60" y="270">Linear vs switching efficiency</text>
  </g>
</svg>
