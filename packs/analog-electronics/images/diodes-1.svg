<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280">
  <rect x="0" y="0" width="360" height="280" fill="#ffffff"/>
  <!-- axes -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="40" y1="140" x2="330" y2="140"/>
    <line x1="185" y1="20" x2="185" y2="260"/>
  </g>
  <!-- I-V curve: reverse (flat near zero), knee ~0.7V, steep forward rise -->
  <path d="M 60 142 L 150 141 L 185 139 L 215 135 L 235 120 L 248 80 L 256 30"
        stroke="#1a6dd6" stroke-width="3" fill="none"/>
  <!-- reverse breakdown (Zener) knee on left -->
  <path d="M 60 142 L 58 142 L 56 160 L 55 210 L 54 250"
        stroke="#c0392b" stroke-width="3" fill="none"/>
  <!-- knee marker -->
  <line x1="235" y1="140" x2="235" y2="145" stroke="#000000" stroke-width="1"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="14">
    <text x="300" y="158">V</text>
    <text x="193" y="32">I</text>
    <text x="210" y="160">~0.7 V</text>
    <text x="262" y="60">forward</text>
  </g>
  <g fill="#c0392b" font-family="Arial, sans-serif" font-size="13">
    <text x="40" y="245">breakdown (Vz)</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="70" y="275">Diode I-V: I = Is(e^(V/nVt) - 1)</text>
  </g>
</svg>
