<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <!-- Top: forward bias - current flows -->
  <g fill="#000000" font-family="Arial, sans-serif" font-size="14">
    <text x="10" y="40">Forward bias: current flows</text>
  </g>
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- wire -->
    <line x1="20" y1="80" x2="150" y2="80"/>
    <line x1="250" y1="80" x2="380" y2="80"/>
    <!-- diode triangle (anode on left) -->
    <polygon points="150,60 150,100 200,80" fill="#000000"/>
    <!-- cathode bar -->
    <line x1="200" y1="60" x2="200" y2="100"/>
    <line x1="200" y1="80" x2="250" y2="80"/>
  </g>
  <!-- current arrow forward -->
  <g stroke="#1a6dd6" stroke-width="2" fill="#1a6dd6">
    <line x1="60" y1="80" x2="110" y2="80"/>
    <polygon points="110,74 124,80 110,86"/>
    <line x1="290" y1="80" x2="340" y2="80"/>
    <polygon points="340,74 354,80 340,86"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="158" y="120">arrow = allowed direction</text>
    <text x="30" y="98">+</text>
    <text x="365" y="98">-</text>
  </g>
  <!-- divider -->
  <line x1="20" y1="155" x2="380" y2="155" stroke="#999999" stroke-width="1"/>
  <!-- Bottom: reverse bias - current blocked -->
  <g fill="#000000" font-family="Arial, sans-serif" font-size="14">
    <text x="10" y="195">Reverse bias: current blocked</text>
  </g>
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="20" y1="235" x2="150" y2="235"/>
    <line x1="250" y1="235" x2="380" y2="235"/>
    <polygon points="150,215 150,255 200,235" fill="#000000"/>
    <line x1="200" y1="215" x2="200" y2="255"/>
    <line x1="200" y1="235" x2="250" y2="235"/>
  </g>
  <!-- blocked arrow (X) -->
  <g stroke="#c0392b" stroke-width="3" fill="none">
    <line x1="95" y1="223" x2="115" y2="247"/>
    <line x1="115" y1="223" x2="95" y2="247"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="30" y="253">-</text>
    <text x="365" y="253">+</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="40" y="290">A diode: a one-way valve for electric current</text>
  </g>
</svg>
