<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 240" width="380" height="240">
  <rect x="0" y="0" width="380" height="240" fill="#ffffff"/>
  <!-- op-amp triangle, plus on top -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <polygon points="150,60 150,160 240,110"/>
    <!-- plus input from Vin -->
    <line x1="70" y1="80" x2="150" y2="80"/>
    <!-- minus input tied to output (follower) -->
    <line x1="110" y1="140" x2="150" y2="140"/>
    <!-- output -->
    <line x1="240" y1="110" x2="320" y2="110"/>
    <!-- feedback wire output back to minus -->
    <line x1="290" y1="110" x2="290" y2="50"/>
    <line x1="290" y1="50" x2="110" y2="50"/>
    <line x1="110" y1="50" x2="110" y2="140"/>
  </g>
  <g fill="#000000">
    <circle cx="70" cy="80" r="3"/>
    <circle cx="320" cy="110" r="3"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
    <text x="156" y="86">+</text>
    <text x="156" y="148">-</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="32" y="84">Vin</text>
    <text x="324" y="115">Vout</text>
    <text x="150" y="40" font-size="11">output wired straight to V-</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="40" y="210">Voltage follower (buffer): Vout = Vin, gain = 1</text>
    <text x="40" y="230" font-size="11" font-weight="normal">high input impedance, low output impedance</text>
  </g>
</svg>
