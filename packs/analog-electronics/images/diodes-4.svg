<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" width="420" height="320">
  <rect x="0" y="0" width="420" height="320" fill="#ffffff"/>
  <!-- Panel 1: AC input -->
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="10" y="20">1. AC input (wall power)</text>
  </g>
  <g stroke="#000000" stroke-width="1" fill="none">
    <line x1="20" y1="60" x2="400" y2="60"/>
  </g>
  <path d="M 30 60 Q 60 20 90 60 Q 120 100 150 60 Q 180 20 210 60 Q 240 100 270 60 Q 300 20 330 60 Q 360 100 390 60"
        stroke="#1a6dd6" stroke-width="2" fill="none"/>
  <!-- Panel 2: full-wave rectified (bumps) -->
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="10" y="120">2. After full-wave rectifier (all bumps positive)</text>
  </g>
  <g stroke="#000000" stroke-width="1" fill="none">
    <line x1="20" y1="180" x2="400" y2="180"/>
  </g>
  <path d="M 30 180 Q 60 140 90 180 Q 120 140 150 180 Q 180 140 210 180 Q 240 140 270 180 Q 300 140 330 180 Q 360 140 390 180"
        stroke="#1a6dd6" stroke-width="2" fill="none"/>
  <!-- Panel 3: smoothed DC with small ripple -->
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="10" y="232">3. After smoothing capacitor (nearly flat DC)</text>
  </g>
  <g stroke="#000000" stroke-width="1" fill="none">
    <line x1="20" y1="300" x2="400" y2="300"/>
  </g>
  <!-- smoothed: small sawtooth ripple near top -->
  <path d="M 30 260 L 60 252 L 62 258 L 90 252 L 92 258 L 120 252 L 122 258 L 150 252 L 152 258 L 180 252 L 182 258 L 210 252 L 212 258 L 240 252 L 242 258 L 270 252 L 272 258 L 300 252 L 302 258 L 330 252 L 332 258 L 360 252 L 362 258 L 390 252"
        stroke="#1a6dd6" stroke-width="2" fill="none"/>
  <g fill="#c0392b" font-family="Arial, sans-serif" font-size="11">
    <text x="300" y="248">small ripple</text>
  </g>
</svg>
