<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280">
  <rect x="0" y="0" width="360" height="280" fill="#ffffff"/>
  <!-- axes -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="55" y1="30" x2="55" y2="220"/>
    <line x1="55" y1="220" x2="330" y2="220"/>
  </g>
  <!-- DC load line: from (VCC, 0) on x-axis to (0, VCC/RC) on y-axis -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <line x1="55" y1="55" x2="300" y2="220"/>
  </g>
  <!-- Q-point marker -->
  <g stroke="#d04a1a" stroke-width="1.5" fill="none" stroke-dasharray="4,3">
    <line x1="178" y1="220" x2="178" y2="137"/>
    <line x1="55" y1="137" x2="178" y2="137"/>
  </g>
  <circle cx="178" cy="137" r="5" fill="#d04a1a" stroke="none"/>
  <!-- a couple of IB curves (horizontal-ish output characteristics) -->
  <g stroke="#888888" stroke-width="1.5" fill="none">
    <path d="M80 110 Q120 100 300 96"/>
    <path d="M80 150 Q120 140 300 136"/>
    <path d="M80 185 Q120 176 300 172"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="60" y="48">IC</text>
    <text x="300" y="238">VCE</text>
    <text x="35" y="62">VCC/RC</text>
    <text x="290" y="238"></text>
    <text x="165" y="238">VCEQ</text>
    <text x="22" y="141">ICQ</text>
    <text x="186" y="130" fill="#d04a1a">Q</text>
    <text x="245" y="90" fill="#888888">increasing IB</text>
    <text x="288" y="216">VCC</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="60" y="268">DC load line with Q-point</text>
  </g>
</svg>
