<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <rect x="0" y="0" width="480" height="300" fill="#ffffff"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="20" y="24">A "plain wire" is really R + L + C hiding inside</text>
  </g>
  <!-- IDEAL view -->
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <text x="20" y="58">What the schematic shows:</text>
  </g>
  <g stroke="#000000" stroke-width="3" fill="none">
    <line x1="20" y1="80" x2="200" y2="80"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="11">
    <text x="55" y="98">just a perfect wire (0 ohms)</text>
  </g>
  <!-- REAL view -->
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <text x="20" y="140">What is really there:</text>
  </g>
  <!-- series R then L -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="20" y1="170" x2="60" y2="170"/>
    <!-- resistor zigzag -->
    <path d="M60,170 l8,-10 l12,20 l12,-20 l12,20 l8,-10"/>
    <line x1="112" y1="170" x2="150" y2="170"/>
    <!-- inductor loops -->
    <path d="M150,170 q10,-16 20,0 q10,-16 20,0 q10,-16 20,0"/>
    <line x1="210" y1="170" x2="260" y2="170"/>
    <!-- node -->
    <circle cx="260" cy="170" r="3" fill="#000000"/>
    <!-- parasitic C to ground -->
    <line x1="260" y1="170" x2="260" y2="205"/>
    <line x1="248" y1="205" x2="272" y2="205"/>
    <line x1="248" y1="213" x2="272" y2="213"/>
    <line x1="260" y1="213" x2="260" y2="230"/>
    <!-- ground symbol -->
    <line x1="248" y1="230" x2="272" y2="230"/>
    <line x1="252" y1="236" x2="268" y2="236"/>
    <line x1="256" y1="242" x2="264" y2="242"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="11">
    <text x="58" y="200">R</text>
    <text x="166" y="200">L</text>
    <text x="278" y="200">C</text>
    <text x="20" y="265">R: a little resistance (wastes voltage, makes heat)</text>
    <text x="20" y="282">L: a little inductance (~1 nH per mm) - resists fast current changes</text>
    <text x="20" y="299">C: a little capacitance to nearby metal - leaks fast signals</text>
  </g>
</svg>
