<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="360" height="260">
  <rect x="0" y="0" width="360" height="260" fill="#ffffff"/>
  <!-- supply rail -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="60" y1="30" x2="300" y2="30"/>
    <!-- PMOS pull-up (top) -->
    <line x1="180" y1="30" x2="180" y2="60"/>
    <line x1="180" y1="60" x2="168" y2="60"/>
    <line x1="168" y1="55" x2="168" y2="95"/>
    <line x1="156" y1="55" x2="156" y2="95"/>
    <!-- NMOS pull-down (bottom) -->
    <line x1="168" y1="135" x2="168" y2="175"/>
    <line x1="156" y1="135" x2="156" y2="175"/>
    <!-- output node line between them -->
    <line x1="168" y1="95" x2="180" y2="95"/>
    <line x1="180" y1="95" x2="180" y2="135"/>
    <line x1="168" y1="135" x2="180" y2="135"/>
    <line x1="180" y1="115" x2="260" y2="115"/>
    <!-- NMOS source to ground -->
    <line x1="180" y1="175" x2="180" y2="200"/>
    <line x1="155" y1="200" x2="205" y2="200"/>
    <line x1="163" y1="208" x2="197" y2="208"/>
    <line x1="172" y1="216" x2="188" y2="216"/>
    <!-- shared gate input -->
    <line x1="156" y1="75" x2="100" y2="75"/>
    <line x1="156" y1="155" x2="100" y2="155"/>
    <line x1="100" y1="75" x2="100" y2="155"/>
    <line x1="100" y1="115" x2="60" y2="115"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="305" y="34">+V</text>
    <text x="30" y="119">In</text>
    <text x="265" y="119">Out</text>
    <text x="195" y="60">PMOS</text>
    <text x="195" y="170">NMOS</text>
    <text x="208" y="205">ground</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="11">
    <text x="240" y="135">(opposite</text>
    <text x="240" y="148">of In)</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="70" y="250">CMOS inverter: PMOS over NMOS</text>
  </g>
</svg>
