<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" width="360" height="240">
  <rect x="0" y="0" width="360" height="240" fill="#ffffff"/>
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- Vth source as circle -->
    <circle cx="60" cy="120" r="22"/>
    <line x1="60" y1="98" x2="60" y2="60"/>
    <line x1="60" y1="142" x2="60" y2="190"/>
    <!-- top wire to Rth -->
    <line x1="60" y1="60" x2="120" y2="60"/>
    <!-- Rth box -->
    <rect x="120" y="48" width="55" height="24"/>
    <!-- wire to output terminal A -->
    <line x1="175" y1="60" x2="270" y2="60"/>
    <circle cx="270" cy="60" r="4" fill="#000000"/>
    <!-- bottom wire to terminal B -->
    <line x1="60" y1="190" x2="270" y2="190"/>
    <circle cx="270" cy="190" r="4" fill="#000000"/>
    <!-- dashed box around equivalent -->
    <rect x="25" y="30" width="210" height="180" stroke-dasharray="5,4" stroke-width="1"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="15">
    <text x="40" y="125">+</text>
    <text x="40" y="178">-</text>
    <text x="48" y="20">Vth</text>
    <text x="128" y="40">Rth</text>
    <text x="278" y="64">A</text>
    <text x="278" y="194">B</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="55" y="232">Thevenin equivalent: Voc = Vth, Rth = Voc / Isc</text>
  </g>
</svg>
