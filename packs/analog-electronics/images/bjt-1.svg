<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" width="360" height="300">
  <rect x="0" y="0" width="360" height="300" fill="#ffffff"/>
  <!-- VCC rail -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="40" y1="30" x2="320" y2="30"/>
    <!-- R1 (top of divider) -->
    <line x1="90" y1="30" x2="90" y2="55"/>
    <rect x="80" y="55" width="20" height="38"/>
    <line x1="90" y1="93" x2="90" y2="150"/>
    <!-- RC (collector) -->
    <line x1="240" y1="30" x2="240" y2="55"/>
    <rect x="230" y="55" width="20" height="38"/>
    <line x1="240" y1="93" x2="240" y2="135"/>
    <!-- base node to transistor -->
    <line x1="90" y1="120" x2="160" y2="120"/>
    <!-- R2 (bottom of divider) -->
    <line x1="90" y1="150" x2="90" y2="175"/>
    <rect x="80" y="175" width="20" height="38"/>
    <line x1="90" y1="213" x2="90" y2="265"/>
    <!-- transistor: collector and emitter leads -->
    <line x1="200" y1="135" x2="200" y2="115"/>
    <line x1="200" y1="165" x2="200" y2="185"/>
    <!-- RE (emitter) -->
    <rect x="190" y="207" width="20" height="38"/>
    <line x1="200" y1="185" x2="200" y2="207"/>
    <line x1="200" y1="245" x2="200" y2="265"/>
    <!-- ground rail -->
    <line x1="40" y1="265" x2="320" y2="265"/>
  </g>
  <!-- BJT symbol -->
  <g stroke="#1a6fd0" stroke-width="2.5" fill="none">
    <line x1="160" y1="105" x2="160" y2="175"/>
    <line x1="160" y1="120" x2="200" y2="135"/>
    <line x1="160" y1="160" x2="200" y2="165"/>
  </g>
  <!-- emitter arrow -->
  <g fill="#1a6fd0" stroke="none">
    <polygon points="200,165 188,158 190,170"/>
  </g>
  <!-- coupling cap on base input -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="40" y1="120" x2="120" y2="120"/>
    <line x1="120" y1="110" x2="120" y2="130"/>
    <line x1="128" y1="110" x2="128" y2="130"/>
    <line x1="128" y1="120" x2="160" y2="120"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="40" y="22">VCC</text>
    <text x="60" y="80">R1</text>
    <text x="60" y="200">R2</text>
    <text x="255" y="80">RC</text>
    <text x="215" y="232">RE</text>
    <text x="118" y="104">Cin</text>
    <text x="210" y="118">C</text>
    <text x="210" y="178">E</text>
    <text x="138" y="142">B</text>
    <text x="20" y="116">Vin</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="40" y="290">Voltage-divider-biased common-emitter amp</text>
  </g>
</svg>
