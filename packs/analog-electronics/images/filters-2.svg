<svg xmlns="http://www.w3.org/2000/svg" width="520" height="300" viewBox="0 0 520 300" font-family="sans-serif">
  <rect width="520" height="300" fill="#ffffff"/>
  <text x="260" y="24" text-anchor="middle" font-size="16" font-weight="bold">Sallen-Key Low-Pass (unity gain, 2nd order)</text>
  <!-- input -->
  <text x="20" y="124" font-size="13">Vin</text>
  <line x1="42" y1="120" x2="80" y2="120" stroke="#000" stroke-width="2"/>
  <!-- R1 -->
  <rect x="80" y="112" width="46" height="16" fill="none" stroke="#000" stroke-width="2"/>
  <text x="103" y="106" text-anchor="middle" font-size="12">R1</text>
  <line x1="126" y1="120" x2="180" y2="120" stroke="#000" stroke-width="2"/>
  <!-- node A -->
  <circle cx="180" cy="120" r="3" fill="#000"/>
  <text x="180" y="142" text-anchor="middle" font-size="11" fill="#666">node A</text>
  <!-- R2 -->
  <rect x="180" y="112" width="46" height="16" fill="none" stroke="#000" stroke-width="2"/>
  <text x="203" y="106" text-anchor="middle" font-size="12">R2</text>
  <line x1="226" y1="120" x2="270" y2="120" stroke="#000" stroke-width="2"/>
  <!-- C2 to ground at op-amp + input -->
  <line x1="270" y1="120" x2="270" y2="160" stroke="#000" stroke-width="2"/>
  <line x1="258" y1="160" x2="282" y2="160" stroke="#000" stroke-width="2"/>
  <line x1="262" y1="168" x2="278" y2="168" stroke="#000" stroke-width="2"/>
  <text x="294" y="158" font-size="12">C2</text>
  <line x1="270" y1="168" x2="270" y2="186" stroke="#000" stroke-width="2"/>
  <line x1="258" y1="186" x2="282" y2="186" stroke="#000" stroke-width="2"/>
  <line x1="262" y1="190" x2="278" y2="190" stroke="#000" stroke-width="1.5"/>
  <line x1="266" y1="194" x2="274" y2="194" stroke="#000" stroke-width="1.5"/>
  <!-- op-amp triangle -->
  <polygon points="300,96 300,156 360,126" fill="none" stroke="#000" stroke-width="2"/>
  <text x="306" y="116" font-size="13">+</text>
  <text x="306" y="150" font-size="13">-</text>
  <line x1="270" y1="120" x2="300" y2="111" stroke="#000" stroke-width="2"/>
  <!-- output -->
  <line x1="360" y1="126" x2="440" y2="126" stroke="#000" stroke-width="2"/>
  <circle cx="400" cy="126" r="3" fill="#000"/>
  <text x="455" y="130" font-size="13">Vout</text>
  <!-- feedback to inverting input (unity gain) -->
  <line x1="400" y1="126" x2="400" y2="180" stroke="#000" stroke-width="2"/>
  <line x1="290" y1="180" x2="400" y2="180" stroke="#000" stroke-width="2"/>
  <line x1="290" y1="180" x2="290" y2="141" stroke="#000" stroke-width="2"/>
  <!-- C1 from node A to output -->
  <line x1="180" y1="120" x2="180" y2="60" stroke="#000" stroke-width="2"/>
  <line x1="180" y1="60" x2="400" y2="60" stroke="#000" stroke-width="2"/>
  <line x1="400" y1="60" x2="400" y2="126" stroke="#000" stroke-width="2"/>
  <line x1="278" y1="50" x2="278" y2="70" stroke="#000" stroke-width="2"/>
  <line x1="286" y1="54" x2="286" y2="66" stroke="#000" stroke-width="2"/>
  <line x1="180" y1="60" x2="278" y2="60" stroke="#000" stroke-width="2"/>
  <line x1="286" y1="60" x2="400" y2="60" stroke="#000" stroke-width="2"/>
  <text x="282" y="44" text-anchor="middle" font-size="12">C1</text>
  <text x="260" y="248" text-anchor="middle" font-size="12" fill="#444">f_c = 1 / (2*pi*sqrt(R1 R2 C1 C2)); equal parts: f_c = 1/(2*pi*R*C)</text>
</svg>
