<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 250" width="380" height="250">
  <rect x="0" y="0" width="380" height="250" fill="#ffffff"/>
  <!-- support beam -->
  <line x1="40" y1="30" x2="340" y2="30" stroke="#000000" stroke-width="3"/>
  <!-- swing ropes (three positions: left, middle, right) -->
  <g stroke="#999999" stroke-width="1" stroke-dasharray="4 3" fill="none">
    <line x1="190" y1="30" x2="130" y2="170"/>
    <line x1="190" y1="30" x2="250" y2="170"/>
  </g>
  <!-- current rope + seat at rest/middle -->
  <line x1="190" y1="30" x2="190" y2="175" stroke="#000000" stroke-width="2"/>
  <!-- seat -->
  <rect x="172" y="175" width="36" height="10" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- child (simple) -->
  <circle cx="190" cy="165" r="9" fill="none" stroke="#cc0000" stroke-width="2"/>
  <!-- swept seat ghosts -->
  <rect x="112" y="160" width="34" height="9" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <rect x="234" y="160" width="34" height="9" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <!-- push arrow at right, timed with swing -->
  <g stroke="#118811" stroke-width="2.5" fill="none">
    <line x1="300" y1="165" x2="262" y2="165"/>
    <polyline points="270,159 262,165 270,171"/>
  </g>
  <!-- rhythm arc -->
  <path d="M130,200 Q190,235 250,200" stroke="#0066cc" stroke-width="1.5" stroke-dasharray="5 4" fill="none"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="300" y="158" fill="#118811">push</text>
    <text x="290" y="180" fill="#118811">in rhythm</text>
    <text x="150" y="225" fill="#0066cc">back-and-forth at the swing's own pace</text>
  </g>
  <text x="40" y="245" font-family="Arial, sans-serif" font-size="12" fill="#000000">Resonance: small pushes at the right rhythm build a big swing</text>
</svg>
