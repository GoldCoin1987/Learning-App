<svg xmlns="http://www.w3.org/2000/svg" width="560" height="420" viewBox="0 0 560 420" font-family="sans-serif">
  <rect width="560" height="420" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="17" font-weight="bold">The Four Filter Types (which frequencies get through)</text>
  <text x="280" y="46" text-anchor="middle" font-size="12" fill="#555">up = signal passes (passband), down = signal blocked (stopband)</text>

  <!-- LOW-PASS -->
  <g>
    <text x="150" y="78" text-anchor="middle" font-size="14" font-weight="bold">Low-pass (keeps lows)</text>
    <line x1="40" y1="180" x2="270" y2="180" stroke="#000" stroke-width="1.4"/>
    <line x1="40" y1="180" x2="40" y2="95" stroke="#000" stroke-width="1.4"/>
    <text x="155" y="200" text-anchor="middle" font-size="11">frequency (low to high)</text>
    <path d="M45,105 L150,105 Q175,105 185,150 L210,175" fill="none" stroke="#1f77b4" stroke-width="2.6"/>
    <line x1="150" y1="105" x2="150" y2="180" stroke="#bbb" stroke-dasharray="4 3"/>
    <text x="150" y="92" text-anchor="middle" font-size="10" fill="#666">cutoff</text>
    <text x="90" y="123" text-anchor="middle" font-size="10" fill="#1f77b4">PASS</text>
    <text x="235" y="160" text-anchor="middle" font-size="10" fill="#888">BLOCK</text>
  </g>

  <!-- HIGH-PASS -->
  <g>
    <text x="410" y="78" text-anchor="middle" font-size="14" font-weight="bold">High-pass (keeps highs)</text>
    <line x1="300" y1="180" x2="530" y2="180" stroke="#000" stroke-width="1.4"/>
    <line x1="300" y1="180" x2="300" y2="95" stroke="#000" stroke-width="1.4"/>
    <text x="415" y="200" text-anchor="middle" font-size="11">frequency (low to high)</text>
    <path d="M305,175 L330,150 Q340,105 365,105 L470,105" fill="none" stroke="#d62728" stroke-width="2.6"/>
    <line x1="365" y1="105" x2="365" y2="180" stroke="#bbb" stroke-dasharray="4 3"/>
    <text x="365" y="92" text-anchor="middle" font-size="10" fill="#666">cutoff</text>
    <text x="325" y="160" text-anchor="middle" font-size="10" fill="#888">BLOCK</text>
    <text x="430" y="123" text-anchor="middle" font-size="10" fill="#d62728">PASS</text>
  </g>

  <!-- BAND-PASS -->
  <g>
    <text x="150" y="258" text-anchor="middle" font-size="14" font-weight="bold">Band-pass (keeps a middle band)</text>
    <line x1="40" y1="360" x2="270" y2="360" stroke="#000" stroke-width="1.4"/>
    <line x1="40" y1="360" x2="40" y2="275" stroke="#000" stroke-width="1.4"/>
    <text x="155" y="380" text-anchor="middle" font-size="11">frequency (low to high)</text>
    <path d="M45,355 L110,355 Q130,355 140,288 Q155,285 165,355 L235,355" fill="none" stroke="#2ca02c" stroke-width="2.6"/>
    <text x="150" y="305" text-anchor="middle" font-size="10" fill="#2ca02c">PASS band</text>
    <text x="80" y="345" text-anchor="middle" font-size="10" fill="#888">BLOCK</text>
    <text x="220" y="345" text-anchor="middle" font-size="10" fill="#888">BLOCK</text>
  </g>

  <!-- BAND-STOP / NOTCH -->
  <g>
    <text x="410" y="258" text-anchor="middle" font-size="14" font-weight="bold">Band-stop / notch (removes a band)</text>
    <line x1="300" y1="360" x2="530" y2="360" stroke="#000" stroke-width="1.4"/>
    <line x1="300" y1="360" x2="300" y2="275" stroke="#000" stroke-width="1.4"/>
    <text x="415" y="380" text-anchor="middle" font-size="11">frequency (low to high)</text>
    <path d="M305,285 L385,285 Q400,285 405,355 Q410,285 425,285 L500,285" fill="none" stroke="#9467bd" stroke-width="2.6"/>
    <text x="350" y="303" text-anchor="middle" font-size="10" fill="#9467bd">PASS</text>
    <text x="465" y="303" text-anchor="middle" font-size="10" fill="#9467bd">PASS</text>
    <text x="405" y="345" text-anchor="middle" font-size="10" fill="#888">notch</text>
  </g>
</svg>
