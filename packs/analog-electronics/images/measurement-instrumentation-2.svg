<svg xmlns="http://www.w3.org/2000/svg" width="480" height="240" viewBox="0 0 480 240" font-family="sans-serif" font-size="12">
  <rect width="480" height="240" fill="#ffffff"/>
  <text x="240" y="18" text-anchor="middle" font-size="13" font-weight="bold">Spectrum Analyzer Display: Fundamental + Harmonics</text>
  <!-- axes -->
  <line x1="50" y1="190" x2="460" y2="190" stroke="#333"/>
  <line x1="50" y1="30" x2="50" y2="190" stroke="#333"/>
  <text x="255" y="225" text-anchor="middle">Frequency (multiples of f0)</text>
  <text x="18" y="110" text-anchor="middle" transform="rotate(-90 18 110)">Amplitude (dBm)</text>
  <!-- noise floor -->
  <line x1="50" y1="175" x2="460" y2="175" stroke="#aaa" stroke-dasharray="4 3"/>
  <text x="455" y="170" text-anchor="end" fill="#888">noise floor</text>
  <!-- harmonic lines -->
  <g stroke="#2980b9" stroke-width="2">
    <line x1="110" y1="190" x2="110" y2="45"/>
    <line x1="190" y1="190" x2="190" y2="100"/>
    <line x1="270" y1="190" x2="270" y2="125"/>
    <line x1="350" y1="190" x2="350" y2="148"/>
    <line x1="430" y1="190" x2="430" y2="160"/>
  </g>
  <text x="110" y="42" text-anchor="middle" fill="#2980b9" font-weight="bold">f0</text>
  <text x="190" y="97" text-anchor="middle" fill="#2980b9">2f0</text>
  <text x="270" y="122" text-anchor="middle" fill="#2980b9">3f0</text>
  <text x="350" y="145" text-anchor="middle" fill="#2980b9">4f0</text>
  <text x="430" y="157" text-anchor="middle" fill="#2980b9">5f0</text>
  <!-- RBW annotation -->
  <line x1="100" y1="50" x2="120" y2="50" stroke="#c0392b"/>
  <text x="140" y="50" fill="#c0392b">RBW sets skirt width &amp; noise floor</text>
</svg>
