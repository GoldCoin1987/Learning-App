<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="360" height="260">
  <rect x="0" y="0" width="360" height="260" fill="#ffffff"/>
  <!-- axes -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="50" y1="30" x2="50" y2="210"/>
    <line x1="50" y1="210" x2="330" y2="210"/>
  </g>
  <!-- open-loop gain: flat then -20 dB/dec to unity-gain -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <line x1="50" y1="50" x2="100" y2="50"/>
    <line x1="100" y1="50" x2="300" y2="190"/>
  </g>
  <!-- closed-loop gain at higher Av: lower shelf, larger bandwidth -->
  <g stroke="#d04a1a" stroke-width="3" fill="none">
    <line x1="50" y1="110" x2="185" y2="110"/>
    <line x1="185" y1="110" x2="300" y2="190"/>
  </g>
  <!-- corner markers -->
  <g stroke="#888888" stroke-width="1" fill="none" stroke-dasharray="3,3">
    <line x1="100" y1="30" x2="100" y2="210"/>
    <line x1="185" y1="30" x2="185" y2="210"/>
    <line x1="300" y1="50" x2="300" y2="210"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="10" y="54">Aol</text>
    <text x="10" y="114" fill="#d04a1a">Acl</text>
    <text x="55" y="46" fill="#1a6fd0">open loop</text>
    <text x="195" y="105" fill="#d04a1a">closed loop</text>
    <text x="290" y="225">fT</text>
    <text x="290" y="46">GBW</text>
    <text x="56" y="44">Gain (dB)</text>
    <text x="285" y="228">log f</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="55" y="248">Gain-bandwidth: Av x BW = GBW (constant)</text>
  </g>
</svg>
