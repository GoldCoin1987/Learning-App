<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 230" width="380" height="230">
  <rect x="0" y="0" width="380" height="230" fill="#ffffff"/>
  <!-- axes -->
  <line x1="40" y1="110" x2="360" y2="110" stroke="#000000" stroke-width="1"/>
  <line x1="40" y1="20" x2="40" y2="200" stroke="#000000" stroke-width="1"/>
  <text x="345" y="128" font-family="Arial, sans-serif" font-size="12">time</text>
  <!-- growing then steady envelope sine -->
  <path d="M40 110 Q52 95 64 110 Q76 80 88 110 Q100 65 112 110 Q124 52 136 110 Q148 45 160 110 Q172 42 184 110 Q196 42 208 110 Q220 42 232 110 Q244 42 256 110 Q268 42 280 110 Q292 42 304 110 Q316 42 328 110 Q340 42 352 110" fill="none" stroke="#cc0000" stroke-width="2"/>
  <!-- envelope guide -->
  <path d="M40 110 Q120 42 200 68 L352 68" fill="none" stroke="#0066cc" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="60" y="190" font-family="Arial, sans-serif" font-size="12">loop gain &gt; 1: grows</text>
  <text x="225" y="190" font-family="Arial, sans-serif" font-size="12">limited: steady</text>
  <text x="200" y="58" font-family="Arial, sans-serif" font-size="11" fill="#0066cc">amplitude held by limiter</text>
  <!-- caption -->
  <text x="15" y="222" font-family="Arial, sans-serif" font-size="13" fill="#000000">Startup grows from noise, then a limiter parks loop gain at exactly 1</text>
</svg>
