<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <rect x="0" y="0" width="640" height="200" fill="#ffffff"/>
  <g stroke="#000000" stroke-width="2" fill="none">
    <rect x="20" y="70" width="90" height="50"/>
    <rect x="140" y="70" width="90" height="50"/>
    <rect x="260" y="70" width="90" height="50"/>
    <rect x="380" y="70" width="100" height="50"/>
    <rect x="510" y="70" width="110" height="50"/>
    <line x1="110" y1="95" x2="140" y2="95"/>
    <line x1="230" y1="95" x2="260" y2="95"/>
    <line x1="350" y1="95" x2="380" y2="95"/>
    <line x1="480" y1="95" x2="510" y2="95"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">
    <text x="65" y="92">Wall AC</text>
    <text x="65" y="108">(120/230 V)</text>
    <text x="185" y="92">Transformer</text>
    <text x="185" y="108">(step down)</text>
    <text x="305" y="92">Rectifier</text>
    <text x="305" y="108">(AC to DC)</text>
    <text x="430" y="92">Smoothing</text>
    <text x="430" y="108">capacitor</text>
    <text x="565" y="92">Regulator</text>
    <text x="565" y="108">steady DC</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
    <text x="125" y="90">~</text>
    <text x="245" y="90">~</text>
    <text x="365" y="90">pulsing</text>
    <text x="495" y="90">bumpy DC</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    <text x="20" y="40">The power supply chain: messy AC in, clean steady DC out</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">
    <text x="565" y="155">5.0 V flat</text>
  </g>
</svg>
