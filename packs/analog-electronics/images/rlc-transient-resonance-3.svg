<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 250" width="380" height="250">
  <rect x="0" y="0" width="380" height="250" fill="#ffffff"/>
  <!-- axes -->
  <g stroke="#000000" stroke-width="1.5" fill="none">
    <line x1="50" y1="200" x2="360" y2="200"/>
    <line x1="50" y1="200" x2="50" y2="25"/>
  </g>
  <!-- final value (100%) -->
  <line x1="50" y1="45" x2="360" y2="45" stroke="#999999" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- 63% level -->
  <line x1="50" y1="102" x2="115" y2="102" stroke="#999999" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- charging curve: rises fast then flattens -->
  <path d="M50,200 C75,110 100,75 130,62 C170,46 230,46 360,46"
        stroke="#cc0000" stroke-width="2.5" fill="none"/>
  <!-- 1 tau marker -->
  <line x1="115" y1="200" x2="115" y2="102" stroke="#0066cc" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- 5 tau marker -->
  <line x1="320" y1="200" x2="320" y2="46" stroke="#118811" stroke-width="1" stroke-dasharray="3 3"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="58" y="42">100% (final)</text>
    <text x="6" y="106">63%</text>
    <text x="335" y="218">time</text>
    <text x="14" y="30">voltage</text>
    <text x="6" y="160">on C</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="12">
    <text x="98" y="216" fill="#0066cc">1 tau</text>
    <text x="298" y="216" fill="#118811">5 tau</text>
    <text x="222" y="40" fill="#118811">settled (~99%)</text>
  </g>
  <text x="60" y="240" font-family="Arial, sans-serif" font-size="12" fill="#000000">Capacitor charging through a resistor: 63% at 1 tau, settled by 5 tau</text>
</svg>
