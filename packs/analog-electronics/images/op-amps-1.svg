<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="360" height="260">
  <rect x="0" y="0" width="360" height="260" fill="#ffffff"/>
  <!-- op-amp triangle -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <polygon points="170,80 170,180 250,130"/>
    <!-- inverting input line -->
    <line x1="120" y1="100" x2="170" y2="100"/>
    <!-- non-inverting input to ground -->
    <line x1="150" y1="160" x2="170" y2="160"/>
    <line x1="150" y1="160" x2="150" y2="190"/>
    <!-- output -->
    <line x1="250" y1="130" x2="310" y2="130"/>
    <!-- Rin from Vin to inverting node -->
    <line x1="40" y1="100" x2="60" y2="100"/>
    <rect x="60" y="92" width="40" height="16"/>
    <line x1="100" y1="100" x2="120" y2="100"/>
    <!-- feedback Rf around the amp -->
    <line x1="120" y1="100" x2="120" y2="50"/>
    <rect x="160" y="42" width="40" height="16"/>
    <line x1="120" y1="50" x2="160" y2="50"/>
    <line x1="200" y1="50" x2="280" y2="50"/>
    <line x1="280" y1="50" x2="280" y2="130"/>
  </g>
  <!-- ground symbol -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="140" y1="190" x2="160" y2="190"/>
    <line x1="144" y1="195" x2="156" y2="195"/>
    <line x1="148" y1="200" x2="152" y2="200"/>
  </g>
  <!-- input/output dots -->
  <g fill="#000000">
    <circle cx="40" cy="100" r="3"/>
    <circle cx="310" cy="130" r="3"/>
    <circle cx="120" cy="100" r="3"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="20" y="120">Vin</text>
    <text x="68" y="86" fill="#1a6fd0">Rin</text>
    <text x="168" y="38" fill="#d04a1a">Rf</text>
    <text x="300" y="120">Vout</text>
    <text x="100" y="118">v-</text>
    <text x="152" y="152">v+</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="70" y="240">Inverting amplifier: Av = -Rf/Rin</text>
  </g>
</svg>
