<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 300" width="380" height="300">
  <rect width="380" height="300" fill="white"/>
  <text x="190" y="22" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">BJT as a switch: tiny base signal turns a big load on/off</text>

  <!-- supply rail -->
  <line x1="40" y1="55" x2="340" y2="55" stroke="black" stroke-width="2"/>
  <text x="350" y="59" font-family="sans-serif" font-size="13">+V</text>

  <!-- LED load to collector -->
  <line x1="250" y1="55" x2="250" y2="95" stroke="black" stroke-width="2"/>
  <polygon points="240,95 260,95 250,115" fill="white" stroke="black" stroke-width="2"/>
  <line x1="240" y1="115" x2="260" y2="115" stroke="black" stroke-width="2"/>
  <text x="270" y="108" font-family="sans-serif" font-size="12">LED / relay</text>
  <text x="270" y="123" font-family="sans-serif" font-size="11">(the load)</text>
  <line x1="250" y1="115" x2="250" y2="150" stroke="black" stroke-width="2"/>

  <!-- transistor -->
  <line x1="250" y1="150" x2="250" y2="210" stroke="black" stroke-width="4"/>
  <line x1="250" y1="160" x2="290" y2="150" stroke="black" stroke-width="2"/>
  <text x="296" y="150" font-family="sans-serif" font-size="11">C</text>
  <line x1="250" y1="200" x2="290" y2="215" stroke="black" stroke-width="2"/>
  <polygon points="276,205 288,212 275,216" fill="black"/>
  <text x="296" y="218" font-family="sans-serif" font-size="11">E</text>

  <!-- base drive -->
  <line x1="160" y1="180" x2="250" y2="180" stroke="black" stroke-width="2"/>
  <rect x="120" y="172" width="40" height="16" fill="white" stroke="black" stroke-width="2"/>
  <text x="140" y="184" font-family="sans-serif" font-size="10" text-anchor="middle">R_B</text>
  <line x1="60" y1="180" x2="120" y2="180" stroke="black" stroke-width="2"/>
  <text x="30" y="184" font-family="sans-serif" font-size="11" text-anchor="middle">control</text>
  <text x="30" y="198" font-family="sans-serif" font-size="10" text-anchor="middle">in</text>

  <!-- ground -->
  <line x1="250" y1="215" x2="250" y2="250" stroke="black" stroke-width="2"/>
  <line x1="230" y1="250" x2="270" y2="250" stroke="black" stroke-width="2"/>
  <line x1="237" y1="256" x2="263" y2="256" stroke="black" stroke-width="2"/>
  <line x1="244" y1="262" x2="256" y2="262" stroke="black" stroke-width="2"/>

  <text x="50" y="285" font-family="sans-serif" font-size="11">control HIGH -&gt; saturation (ON, switch closed, LED lit)</text>
  <text x="50" y="298" font-family="sans-serif" font-size="11">control LOW  -&gt; cutoff (OFF, switch open, LED dark)</text>
</svg>
