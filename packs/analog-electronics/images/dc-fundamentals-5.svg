<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280" width="300" height="280">
  <rect x="0" y="0" width="300" height="280" fill="#ffffff"/>
  <!-- Ohm's law triangle -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <polygon points="150,30 40,220 260,220"/>
    <!-- horizontal divider (V on top) -->
    <line x1="80" y1="130" x2="220" y2="130"/>
    <!-- vertical divider (I and R on bottom) -->
    <line x1="150" y1="130" x2="150" y2="220"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="40">
    <text x="135" y="110">V</text>
    <text x="95" y="195">I</text>
    <text x="185" y="195">R</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="14">
    <text x="55" y="250">V = I x R   I = V / R   R = V / I</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="70" y="272">cover the one you want to find</text>
  </g>
</svg>
