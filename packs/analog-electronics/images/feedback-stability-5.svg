<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 250" width="440" height="250">
  <rect x="0" y="0" width="440" height="250" fill="#ffffff"/>
  <text x="40" y="22" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Buffer + capacitor rings; a series resistor fixes it</text>

  <!-- BEFORE -->
  <text x="20" y="48" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Problem: buffer drives C directly</text>
  <!-- triangle op-amp -->
  <polygon points="30,70 30,118 74,94" fill="#eaf2fb" stroke="#1a6fd0" stroke-width="2"/>
  <line x1="14" y1="80" x2="30" y2="80" stroke="#000000" stroke-width="2"/>
  <line x1="14" y1="108" x2="30" y2="108" stroke="#000000" stroke-width="2"/>
  <text x="56" y="98" font-family="Arial, sans-serif" font-size="10">buffer</text>
  <line x1="74" y1="94" x2="150" y2="94" stroke="#000000" stroke-width="2"/>
  <!-- feedback from output -->
  <line x1="100" y1="94" x2="100" y2="130" stroke="#000000" stroke-width="2"/>
  <line x1="100" y1="130" x2="22" y2="130" stroke="#000000" stroke-width="2"/>
  <line x1="22" y1="130" x2="22" y2="108" stroke="#000000" stroke-width="2"/>
  <circle cx="100" cy="94" r="2.5" fill="#000000"/>
  <!-- cap -->
  <line x1="150" y1="94" x2="150" y2="118" stroke="#000000" stroke-width="2"/>
  <line x1="138" y1="118" x2="162" y2="118" stroke="#000000" stroke-width="2"/>
  <line x1="138" y1="126" x2="162" y2="126" stroke="#000000" stroke-width="2"/>
  <line x1="150" y1="126" x2="150" y2="138" stroke="#000000" stroke-width="2"/>
  <line x1="142" y1="138" x2="158" y2="138" stroke="#000000" stroke-width="2"/>
  <text x="166" y="118" font-family="Arial, sans-serif" font-size="12">C_L</text>
  <text x="20" y="160" font-family="Arial, sans-serif" font-size="11">Output rings / oscillates</text>

  <!-- AFTER -->
  <text x="250" y="48" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Fix: R_iso in series</text>
  <polygon points="250,70 250,118 294,94" fill="#eaf2fb" stroke="#1a6fd0" stroke-width="2"/>
  <line x1="234" y1="80" x2="250" y2="80" stroke="#000000" stroke-width="2"/>
  <line x1="234" y1="108" x2="250" y2="108" stroke="#000000" stroke-width="2"/>
  <line x1="294" y1="94" x2="320" y2="94" stroke="#000000" stroke-width="2"/>
  <!-- feedback from op-amp side (before R) -->
  <circle cx="310" cy="94" r="2.5" fill="#000000"/>
  <line x1="310" y1="94" x2="310" y2="135" stroke="#000000" stroke-width="2"/>
  <line x1="310" y1="135" x2="242" y2="135" stroke="#000000" stroke-width="2"/>
  <line x1="242" y1="135" x2="242" y2="108" stroke="#000000" stroke-width="2"/>
  <text x="288" y="150" font-family="Arial, sans-serif" font-size="9">feedback from op-amp side</text>
  <!-- resistor -->
  <rect x="320" y="88" width="40" height="12" fill="#fdeee8" stroke="#d04a1a" stroke-width="2"/>
  <text x="326" y="82" font-family="Arial, sans-serif" font-size="11">R_iso</text>
  <line x1="360" y1="94" x2="395" y2="94" stroke="#000000" stroke-width="2"/>
  <!-- cap -->
  <line x1="395" y1="94" x2="395" y2="118" stroke="#000000" stroke-width="2"/>
  <line x1="383" y1="118" x2="407" y2="118" stroke="#000000" stroke-width="2"/>
  <line x1="383" y1="126" x2="407" y2="126" stroke="#000000" stroke-width="2"/>
  <line x1="395" y1="126" x2="395" y2="138" stroke="#000000" stroke-width="2"/>
  <line x1="387" y1="138" x2="403" y2="138" stroke="#000000" stroke-width="2"/>
  <text x="411" y="118" font-family="Arial, sans-serif" font-size="12">C_L</text>

  <text x="20" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="bold">R_iso (tens of ohms) moves the troublesome pole outside the loop,</text>
  <text x="20" y="220" font-family="Arial, sans-serif" font-size="12">restoring phase margin so the output settles cleanly instead of ringing.</text>
</svg>
