<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" width="460" height="280">
  <rect x="0" y="0" width="460" height="280" fill="#ffffff"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="40" y="24">Ground loop (bad)</text>
    <text x="300" y="24">Star ground (fix)</text>
  </g>
  <!-- LEFT: ground loop -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <rect x="30" y="50" width="60" height="40"/>
    <rect x="180" y="50" width="60" height="40"/>
    <!-- signal connection top -->
    <line x1="90" y1="60" x2="180" y2="60"/>
    <!-- two ground returns forming a loop -->
    <line x1="60" y1="90" x2="60" y2="150"/>
    <line x1="210" y1="90" x2="210" y2="150"/>
    <line x1="60" y1="150" x2="210" y2="150"/>
  </g>
  <!-- coupled EMF / interference arrow into the loop -->
  <g stroke="#d04a1a" stroke-width="2" fill="none">
    <path d="M135,115 q14,12 0,24" />
    <path d="M135,115 q-14,12 0,24" />
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="11">
    <text x="40" y="74">Instr A</text>
    <text x="190" y="74">Instr B</text>
    <text x="78" y="148" fill="#d04a1a">loop area enc. flux -&gt; noise EMF</text>
  </g>
  <!-- RIGHT: star ground -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <rect x="300" y="50" width="50" height="34"/>
    <rect x="390" y="50" width="50" height="34"/>
    <rect x="345" y="120" width="50" height="34"/>
    <!-- single star point -->
    <line x1="325" y1="84" x2="370" y2="200"/>
    <line x1="415" y1="84" x2="370" y2="200"/>
    <line x1="370" y1="154" x2="370" y2="200"/>
  </g>
  <g fill="#000000">
    <circle cx="370" cy="200" r="4"/>
  </g>
  <!-- ground symbol at star point -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="360" y1="210" x2="380" y2="210"/>
    <line x1="364" y1="215" x2="376" y2="215"/>
    <line x1="368" y1="220" x2="372" y2="220"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="11">
    <text x="306" y="71">A</text>
    <text x="411" y="71">B</text>
    <text x="362" y="141">C</text>
    <text x="384" y="200">single point</text>
  </g>
</svg>
