<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" width="360" height="240">
  <rect x="0" y="0" width="360" height="240" fill="#ffffff"/>
  <!-- axes -->
  <g stroke="#000000" stroke-width="1.5" fill="none">
    <line x1="40" y1="200" x2="340" y2="200"/>
    <line x1="40" y1="200" x2="40" y2="20"/>
  </g>
  <!-- final value line -->
  <line x1="40" y1="80" x2="340" y2="80" stroke="#999999" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- underdamped: overshoot + ringing -->
  <path d="M40,200 C80,40 110,55 140,75 C160,88 175,86 200,80 C220,76 230,81 260,80 L340,80"
        stroke="#cc0000" stroke-width="2" fill="none"/>
  <!-- critically damped: fastest no overshoot -->
  <path d="M40,200 C90,90 150,81 220,80 L340,80"
        stroke="#0066cc" stroke-width="2" fill="none"/>
  <!-- overdamped: slow rise -->
  <path d="M40,200 C140,150 240,95 340,82"
        stroke="#118811" stroke-width="2" fill="none"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="48" y="76">final value</text>
    <text x="300" y="218">time</text>
    <text x="8" y="30">v</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="12">
    <text x="150" y="40" fill="#cc0000">underdamped (z &lt; 1)</text>
    <text x="200" y="100" fill="#0066cc">critically damped (z = 1)</text>
    <text x="210" y="135" fill="#118811">overdamped (z &gt; 1)</text>
  </g>
  <text x="70" y="232" font-family="Arial, sans-serif" font-size="12" fill="#000000">Second-order step response vs. damping ratio z (zeta)</text>
</svg>
