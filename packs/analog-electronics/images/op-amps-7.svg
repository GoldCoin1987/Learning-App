<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect x="0" y="0" width="400" height="240" fill="#ffffff"/>
  <!-- two input buffer amps -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- top buffer -->
    <polygon points="80,40 80,90 130,65"/>
    <line x1="40" y1="50" x2="80" y2="50"/>
    <!-- bottom buffer -->
    <polygon points="80,150 80,200 130,175"/>
    <line x1="40" y1="190" x2="80" y2="190"/>
    <!-- Rg between the two buffer minus inputs -->
    <line x1="60" y1="80" x2="60" y2="105"/>
    <rect x="52" y="105" width="16" height="30"/>
    <line x1="60" y1="135" x2="60" y2="160"/>
    <line x1="60" y1="80" x2="80" y2="80"/>
    <line x1="60" y1="160" x2="80" y2="160"/>
    <!-- outputs into diff amp -->
    <line x1="130" y1="65" x2="250" y2="90"/>
    <line x1="130" y1="175" x2="250" y2="140"/>
    <!-- diff amp -->
    <polygon points="250,80 250,150 310,115"/>
    <line x1="310" y1="115" x2="360" y2="115"/>
  </g>
  <g fill="#000000">
    <circle cx="40" cy="50" r="3"/>
    <circle cx="40" cy="190" r="3"/>
    <circle cx="360" cy="115" r="3"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="12" y="54">V1</text>
    <text x="12" y="194">V2</text>
    <text x="364" y="119">Vout</text>
    <text x="70" y="125" fill="#1a6fd0">Rg</text>
    <text x="255" y="110" font-size="11">diff</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <text x="20" y="225">Instrumentation amp: 2 buffers + diff stage, gain set by one Rg</text>
  </g>
</svg>
