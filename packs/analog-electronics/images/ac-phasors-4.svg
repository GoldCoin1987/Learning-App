<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280">
  <rect x="0" y="0" width="420" height="280" fill="#ffffff"/>
  <!-- axes -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="50" y1="150" x2="400" y2="150"/>
    <line x1="50" y1="30" x2="50" y2="240"/>
  </g>
  <!-- AC sine wave (wiggling) -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <path d="M50 150 C 90 50, 130 50, 170 150 C 210 250, 250 250, 290 150 C 330 50, 370 50, 400 100"/>
  </g>
  <!-- peak line -->
  <g stroke="#888888" stroke-width="1.5" fill="none" stroke-dasharray="3,3">
    <line x1="50" y1="50" x2="400" y2="50"/>
  </g>
  <!-- RMS / equivalent DC line -->
  <g stroke="#d04a1a" stroke-width="3" fill="none">
    <line x1="50" y1="79" x2="400" y2="79"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="300" y="46" fill="#888888">peak V_m</text>
    <text x="250" y="74" fill="#d04a1a">RMS = equivalent steady DC</text>
    <text x="370" y="168">time</text>
    <text x="14" y="44">voltage</text>
    <text x="60" y="140" fill="#1a6fd0">AC</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="40" y="268">RMS: the steady DC that heats the same as the AC wave</text>
  </g>
</svg>
