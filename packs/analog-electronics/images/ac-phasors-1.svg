<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="360" height="260">
  <rect x="0" y="0" width="360" height="260" fill="#ffffff"/>
  <!-- axes -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="50" y1="40" x2="50" y2="210"/>
    <line x1="50" y1="210" x2="330" y2="210"/>
  </g>
  <!-- magnitude asymptote: flat (0 dB) then -20 dB/decade -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <line x1="50" y1="70" x2="170" y2="70"/>
    <line x1="170" y1="70" x2="310" y2="170"/>
  </g>
  <!-- actual curve (-3 dB at corner), dashed -->
  <g stroke="#d04a1a" stroke-width="2" fill="none" stroke-dasharray="5,4">
    <path d="M50 70 Q150 72 170 82 Q200 100 310 172"/>
  </g>
  <!-- corner frequency marker -->
  <g stroke="#888888" stroke-width="1" fill="none" stroke-dasharray="3,3">
    <line x1="170" y1="40" x2="170" y2="210"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="10" y="74">0 dB</text>
    <text x="150" y="228">w_c</text>
    <text x="245" y="135" fill="#1a6fd0">-20 dB/dec</text>
    <text x="175" y="100" fill="#d04a1a">-3 dB</text>
    <text x="60" y="55">|H|</text>
    <text x="290" y="228">log w</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="70" y="250">One-pole low-pass Bode magnitude</text>
  </g>
</svg>
