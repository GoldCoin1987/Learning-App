<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" width="420" height="260">
  <rect x="0" y="0" width="420" height="260" fill="#ffffff"/>
  <!-- axes -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="60" y1="40" x2="60" y2="200"/>
    <line x1="60" y1="200" x2="380" y2="200"/>
  </g>
  <!-- axis arrowheads -->
  <g fill="#000000">
    <polygon points="60,40 56,50 64,50"/>
    <polygon points="380,200 370,196 370,204"/>
  </g>
  <!-- flat white-noise PSD level -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <line x1="60" y1="100" x2="360" y2="100"/>
  </g>
  <!-- dashed level marker -->
  <g stroke="#1a6fd0" stroke-width="1" fill="none" stroke-dasharray="4,3">
    <line x1="60" y1="100" x2="360" y2="100"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="14" y="40">S(f)</text>
    <text x="365" y="225">f</text>
    <text x="68" y="92" fill="#1a6fd0" font-weight="bold">4kTR  (V^2/Hz)</text>
  </g>
  <g fill="#d04a1a" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="120" y="235">Thermal noise: flat (white) spectral density</text>
  </g>
  <g fill="#555555" font-family="Arial, sans-serif" font-size="11">
    <text x="90" y="160">Integrate over B  to get  v_n^2 = 4kTRB</text>
  </g>
</svg>
