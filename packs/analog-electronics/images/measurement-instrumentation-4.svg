<svg xmlns="http://www.w3.org/2000/svg" width="460" height="260" viewBox="0 0 460 260" font-family="sans-serif" font-size="12">
  <rect width="460" height="260" fill="#ffffff"/>
  <text x="230" y="18" text-anchor="middle" font-size="13" font-weight="bold">Reading an oscilloscope screen</text>
  <!-- screen -->
  <rect x="40" y="35" width="380" height="180" fill="#fbfbfb" stroke="#000"/>
  <!-- grid -->
  <g stroke="#ddd">
    <line x1="78" y1="35" x2="78" y2="215"/>
    <line x1="116" y1="35" x2="116" y2="215"/>
    <line x1="154" y1="35" x2="154" y2="215"/>
    <line x1="192" y1="35" x2="192" y2="215"/>
    <line x1="230" y1="35" x2="230" y2="215"/>
    <line x1="268" y1="35" x2="268" y2="215"/>
    <line x1="306" y1="35" x2="306" y2="215"/>
    <line x1="344" y1="35" x2="344" y2="215"/>
    <line x1="382" y1="35" x2="382" y2="215"/>
    <line x1="40" y1="71" x2="420" y2="71"/>
    <line x1="40" y1="107" x2="420" y2="107"/>
    <line x1="40" y1="143" x2="420" y2="143"/>
    <line x1="40" y1="179" x2="420" y2="179"/>
  </g>
  <!-- center axis -->
  <line x1="40" y1="125" x2="420" y2="125" stroke="#999"/>
  <!-- sine wave -->
  <path d="M40 125 Q78 60 116 60 Q154 60 154 125 Q154 190 192 190 Q230 190 230 125 Q230 60 268 60 Q306 60 306 125 Q306 190 344 190 Q382 190 382 125" fill="none" stroke="#c0392b" stroke-width="2"/>
  <!-- vertical scale label -->
  <text x="10" y="73" font-size="11">1 V</text>
  <text x="10" y="181" font-size="11">-1 V</text>
  <text x="200" y="245" text-anchor="middle" fill="#555">horizontal = TIME (e.g. 1 ms per square = "time/div")</text>
  <text x="200" y="233" text-anchor="middle" fill="#555">vertical = VOLTAGE (e.g. 0.5 V per square = "volts/div")</text>
</svg>
