<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 260" width="380" height="260">
  <rect x="0" y="0" width="380" height="260" fill="#ffffff"/>
  <!-- op-amp triangle -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <polygon points="170,70 170,170 250,120"/>
    <!-- plus input from Vin -->
    <line x1="60" y1="90" x2="170" y2="90"/>
    <!-- minus input node -->
    <line x1="130" y1="150" x2="170" y2="150"/>
    <!-- output -->
    <line x1="250" y1="120" x2="320" y2="120"/>
    <!-- feedback Rf from output to minus node -->
    <line x1="290" y1="120" x2="290" y2="55"/>
    <rect x="220" y="47" width="40" height="16"/>
    <line x1="290" y1="55" x2="260" y2="55"/>
    <line x1="220" y1="55" x2="130" y2="55"/>
    <line x1="130" y1="55" x2="130" y2="150"/>
    <!-- Rg from minus node to ground -->
    <line x1="130" y1="150" x2="130" y2="180"/>
    <rect x="122" y="180" width="16" height="40"/>
    <line x1="130" y1="220" x2="130" y2="235"/>
  </g>
  <!-- ground -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="120" y1="235" x2="140" y2="235"/>
    <line x1="124" y1="240" x2="136" y2="240"/>
    <line x1="128" y1="245" x2="132" y2="245"/>
  </g>
  <g fill="#000000">
    <circle cx="60" cy="90" r="3"/>
    <circle cx="320" cy="120" r="3"/>
    <circle cx="130" cy="55" r="3"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
    <text x="176" y="96">+</text>
    <text x="176" y="158">-</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="22" y="94">Vin</text>
    <text x="324" y="125">Vout</text>
    <text x="228" y="43" fill="#d04a1a">Rf</text>
    <text x="98" y="205" fill="#1a6fd0">Rg</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="60" y="255">Non-inverting amp: Gain = 1 + Rf/Rg</text>
  </g>
</svg>
