<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="360" height="260">
  <rect x="0" y="0" width="360" height="260" fill="#ffffff"/>
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- VDD rail -->
    <line x1="40" y1="30" x2="320" y2="30"/>
    <!-- drain resistor R_D -->
    <rect x="175" y="55" width="20" height="45"/>
    <line x1="185" y1="30" x2="185" y2="55"/>
    <!-- drain node to output -->
    <line x1="185" y1="100" x2="185" y2="120"/>
    <line x1="185" y1="110" x2="270" y2="110"/>
    <!-- MOSFET symbol: vertical channel -->
    <line x1="185" y1="120" x2="185" y2="180"/>
    <line x1="170" y1="125" x2="170" y2="175"/>
    <!-- gate -->
    <line x1="135" y1="150" x2="160" y2="150"/>
    <line x1="160" y1="125" x2="160" y2="175"/>
    <!-- source to ground -->
    <line x1="185" y1="180" x2="185" y2="210"/>
    <line x1="170" y1="210" x2="200" y2="210"/>
    <line x1="176" y1="216" x2="194" y2="216"/>
    <line x1="181" y1="222" x2="189" y2="222"/>
    <!-- input coupling cap -->
    <line x1="60" y1="150" x2="100" y2="150"/>
    <line x1="100" y1="138" x2="100" y2="162"/>
    <line x1="110" y1="138" x2="110" y2="162"/>
    <line x1="110" y1="150" x2="135" y2="150"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="40" y="24">+V_DD</text>
    <text x="200" y="82">R_D</text>
    <text x="275" y="114">v_out</text>
    <text x="40" y="145">v_in</text>
    <text x="100" y="190">G</text>
    <text x="195" y="125">D</text>
    <text x="195" y="185">S</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="55" y="250">Common-source amplifier</text>
  </g>
</svg>
