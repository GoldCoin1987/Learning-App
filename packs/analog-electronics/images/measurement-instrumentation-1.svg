<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" viewBox="0 0 480 200" font-family="sans-serif" font-size="12">
  <rect width="480" height="200" fill="#ffffff"/>
  <text x="240" y="18" text-anchor="middle" font-size="13" font-weight="bold">10x Probe Compensation (1 kHz square wave)</text>
  <!-- Under-compensated -->
  <g transform="translate(10,40)">
    <rect x="0" y="0" width="140" height="120" fill="none" stroke="#999"/>
    <line x1="0" y1="60" x2="140" y2="60" stroke="#ddd"/>
    <path d="M10 95 L10 30 C25 30 25 90 70 90 L70 30 C85 30 85 90 130 90" fill="none" stroke="#c0392b" stroke-width="2"/>
    <text x="70" y="115" text-anchor="middle" fill="#c0392b">Under (rounded)</text>
  </g>
  <!-- Correct -->
  <g transform="translate(170,40)">
    <rect x="0" y="0" width="140" height="120" fill="none" stroke="#999"/>
    <line x1="0" y1="60" x2="140" y2="60" stroke="#ddd"/>
    <path d="M10 90 L10 30 L70 30 L70 90 L130 90" fill="none" stroke="#27ae60" stroke-width="2"/>
    <text x="70" y="115" text-anchor="middle" fill="#27ae60">Correct (flat)</text>
  </g>
  <!-- Over-compensated -->
  <g transform="translate(330,40)">
    <rect x="0" y="0" width="140" height="120" fill="none" stroke="#999"/>
    <line x1="0" y1="60" x2="140" y2="60" stroke="#ddd"/>
    <path d="M10 90 L10 20 L20 32 L70 32 L70 98 L80 86 L130 86" fill="none" stroke="#2980b9" stroke-width="2"/>
    <text x="70" y="115" text-anchor="middle" fill="#2980b9">Over (peaked)</text>
  </g>
  <text x="240" y="190" text-anchor="middle" fill="#555">Adjust trimmer until corners are square (flat top).</text>
</svg>
