<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="420" height="240">
  <rect x="0" y="0" width="420" height="240" fill="#ffffff"/>
  <!-- LEFT: series -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="40" y1="50" x2="70" y2="50"/>
    <rect x="70" y="38" width="45" height="24"/>
    <line x1="115" y1="50" x2="145" y2="50"/>
    <rect x="145" y="38" width="45" height="24"/>
    <line x1="190" y1="50" x2="190" y2="150"/>
    <line x1="40" y1="50" x2="40" y2="150"/>
    <line x1="40" y1="150" x2="190" y2="150"/>
    <!-- battery -->
    <line x1="105" y1="150" x2="115" y2="150"/>
    <line x1="115" y1="140" x2="115" y2="160"/>
    <line x1="125" y1="145" x2="125" y2="155"/>
    <line x1="125" y1="150" x2="135" y2="150"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="82" y="32">R1</text>
    <text x="157" y="32">R2</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="55" y="195">SERIES</text>
    <text x="35" y="215">Req = R1 + R2</text>
  </g>
  <!-- RIGHT: parallel -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="250" y1="50" x2="400" y2="50"/>
    <line x1="290" y1="50" x2="290" y2="70"/>
    <rect x="278" y="70" width="24" height="45"/>
    <line x1="290" y1="115" x2="290" y2="135"/>
    <line x1="360" y1="50" x2="360" y2="70"/>
    <rect x="348" y="70" width="24" height="45"/>
    <line x1="360" y1="115" x2="360" y2="135"/>
    <line x1="250" y1="135" x2="400" y2="135"/>
    <line x1="250" y1="50" x2="250" y2="92"/>
    <line x1="250" y1="93" x2="250" y2="135"/>
    <!-- battery on left rail -->
    <line x1="250" y1="83" x2="250" y2="93"/>
    <line x1="240" y1="83" x2="260" y2="83"/>
    <line x1="244" y1="93" x2="256" y2="93"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="305" y="98">R1</text>
    <text x="375" y="98">R2</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="270" y="195">PARALLEL</text>
    <text x="245" y="215">Req = R1 x R2 / (R1 + R2)</text>
  </g>
</svg>
