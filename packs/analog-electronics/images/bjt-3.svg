<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280">
  <rect width="360" height="280" fill="white"/>
  <text x="180" y="22" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">NPN transistor: a tiny base current steers a big collector current</text>

  <!-- vertical base bar -->
  <line x1="150" y1="80" x2="150" y2="200" stroke="black" stroke-width="4"/>
  <!-- base lead -->
  <line x1="100" y1="140" x2="150" y2="140" stroke="black" stroke-width="2"/>
  <text x="78" y="144" font-family="sans-serif" font-size="13" text-anchor="middle">B</text>
  <text x="60" y="160" font-family="sans-serif" font-size="11" text-anchor="middle">(base)</text>

  <!-- collector lead (top) -->
  <line x1="150" y1="110" x2="220" y2="70" stroke="black" stroke-width="2"/>
  <line x1="220" y1="70" x2="220" y2="45" stroke="black" stroke-width="2"/>
  <text x="240" y="50" font-family="sans-serif" font-size="13">C (collector)</text>

  <!-- emitter lead (bottom) with arrow pointing out -->
  <line x1="150" y1="170" x2="220" y2="210" stroke="black" stroke-width="2"/>
  <line x1="220" y1="210" x2="220" y2="235" stroke="black" stroke-width="2"/>
  <!-- arrowhead on emitter -->
  <polygon points="200,196 214,205 199,209" fill="black"/>
  <text x="240" y="215" font-family="sans-serif" font-size="13">E (emitter)</text>

  <!-- currents -->
  <text x="110" y="128" font-family="sans-serif" font-size="12" fill="black">small I_B</text>
  <text x="245" y="80" font-family="sans-serif" font-size="12" font-weight="bold">BIG I_C</text>
  <text x="245" y="232" font-family="sans-serif" font-size="11">I_E = I_C + I_B</text>

  <!-- arrows showing flow direction (conventional current) -->
  <line x1="130" y1="146" x2="146" y2="146" stroke="black" stroke-width="1.5"/>
  <polygon points="146,143 152,146 146,149" fill="black"/>
  <line x1="220" y1="62" x2="220" y2="50" stroke="black" stroke-width="1.5"/>
  <polygon points="217,56 220,48 223,56" fill="black"/>

  <text x="180" y="270" font-family="sans-serif" font-size="12" text-anchor="middle">current gain  beta = I_C / I_B  (e.g. 100)</text>
</svg>
