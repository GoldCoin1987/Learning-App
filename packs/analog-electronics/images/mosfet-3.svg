<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="360" height="260">
  <rect x="0" y="0" width="360" height="260" fill="#ffffff"/>
  <!-- N-channel MOSFET symbol -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- gate vertical bar -->
    <line x1="150" y1="80" x2="150" y2="180"/>
    <!-- gate lead with gap (insulated) -->
    <line x1="90" y1="130" x2="138" y2="130"/>
    <!-- channel bar -->
    <line x1="162" y1="80" x2="162" y2="180"/>
    <!-- drain (top) -->
    <line x1="162" y1="90" x2="210" y2="90"/>
    <line x1="210" y1="90" x2="210" y2="50"/>
    <!-- source (bottom) -->
    <line x1="162" y1="170" x2="210" y2="170"/>
    <line x1="210" y1="170" x2="210" y2="210"/>
    <!-- middle (body) connection to source -->
    <line x1="162" y1="130" x2="210" y2="130"/>
    <line x1="210" y1="130" x2="210" y2="170"/>
  </g>
  <!-- arrow on body lead pointing in (N-channel) -->
  <g fill="#000000">
    <polygon points="180,130 170,124 170,136"/>
  </g>
  <!-- gate voltage source hint -->
  <g stroke="#1a6fd0" stroke-width="2" fill="none">
    <line x1="90" y1="130" x2="60" y2="130"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="35" y="120" fill="#1a6fd0">Gate</text>
    <text x="35" y="148" fill="#1a6fd0">voltage</text>
    <text x="218" y="45">Drain (D)</text>
    <text x="218" y="214">Source (S)</text>
    <text x="120" y="78">G</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="11">
    <text x="50" y="175">small V on gate</text>
    <text x="50" y="190">opens channel</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="60" y="245">N-channel MOSFET: a voltage-controlled valve</text>
  </g>
</svg>
