<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" width="360" height="220">
  <rect x="0" y="0" width="360" height="220" fill="#ffffff"/>
  <!-- summing node -->
  <circle cx="60" cy="80" r="14" fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="55" y="85" font-family="Arial, sans-serif" font-size="16">+</text>
  <!-- input arrow -->
  <line x1="15" y1="80" x2="46" y2="80" stroke="#000000" stroke-width="1.5"/>
  <polygon points="46,80 40,76 40,84" fill="#000000"/>
  <!-- forward gain block A -->
  <rect x="120" y="58" width="70" height="44" fill="none" stroke="#cc0000" stroke-width="2"/>
  <text x="148" y="86" font-family="Arial, sans-serif" font-size="20" fill="#cc0000">A</text>
  <line x1="74" y1="80" x2="120" y2="80" stroke="#000000" stroke-width="1.5"/>
  <!-- output -->
  <line x1="190" y1="80" x2="320" y2="80" stroke="#000000" stroke-width="1.5"/>
  <polygon points="320,80 314,76 314,84" fill="#000000"/>
  <text x="300" y="72" font-family="Arial, sans-serif" font-size="13">Vo</text>
  <!-- tap down to feedback -->
  <circle cx="250" cy="80" r="2.5" fill="#000000"/>
  <line x1="250" y1="80" x2="250" y2="160" stroke="#000000" stroke-width="1.5"/>
  <!-- feedback block beta -->
  <rect x="120" y="138" width="70" height="44" fill="none" stroke="#0066cc" stroke-width="2"/>
  <text x="140" y="166" font-family="Arial, sans-serif" font-size="20" fill="#0066cc">&#946;</text>
  <line x1="250" y1="160" x2="190" y2="160" stroke="#000000" stroke-width="1.5"/>
  <polygon points="190,160 196,156 196,164" fill="#000000"/>
  <line x1="120" y1="160" x2="60" y2="160" stroke="#000000" stroke-width="1.5"/>
  <line x1="60" y1="160" x2="60" y2="94" stroke="#000000" stroke-width="1.5"/>
  <polygon points="60,94 56,100 64,100" fill="#000000"/>
  <!-- caption -->
  <text x="30" y="208" font-family="Arial, sans-serif" font-size="13" fill="#000000">Positive-feedback loop: oscillation when loop gain A&#946; = 1 (0&#176;/360&#176;)</text>
</svg>
