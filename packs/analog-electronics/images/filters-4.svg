<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320" font-family="sans-serif">
  <rect width="520" height="320" fill="#ffffff"/>
  <text x="260" y="26" text-anchor="middle" font-size="16" font-weight="bold">Simple RC Low-Pass Filter</text>
  <text x="260" y="46" text-anchor="middle" font-size="12" fill="#555">a resistor then a capacitor; output is taken across the capacitor</text>

  <!-- input node -->
  <text x="55" y="110" text-anchor="middle" font-size="12">input</text>
  <line x1="55" y1="120" x2="55" y2="140" stroke="#000" stroke-width="1.6"/>
  <circle cx="55" cy="140" r="3" fill="#000"/>
  <line x1="55" y1="140" x2="120" y2="140" stroke="#000" stroke-width="1.6"/>

  <!-- resistor R (zigzag) -->
  <polyline points="120,140 130,128 150,152 170,128 190,152 210,128 220,140" fill="none" stroke="#000" stroke-width="1.6"/>
  <text x="170" y="120" text-anchor="middle" font-size="13" font-weight="bold">R</text>

  <!-- wire to output / cap top -->
  <line x1="220" y1="140" x2="320" y2="140" stroke="#000" stroke-width="1.6"/>
  <circle cx="300" cy="140" r="3" fill="#000"/>

  <!-- capacitor C (two plates) -->
  <line x1="300" y1="140" x2="300" y2="185" stroke="#000" stroke-width="1.6"/>
  <line x1="282" y1="185" x2="318" y2="185" stroke="#000" stroke-width="1.8"/>
  <line x1="282" y1="197" x2="318" y2="197" stroke="#000" stroke-width="1.8"/>
  <line x1="300" y1="197" x2="300" y2="240" stroke="#000" stroke-width="1.6"/>
  <text x="332" y="195" text-anchor="middle" font-size="13" font-weight="bold">C</text>

  <!-- output node -->
  <line x1="300" y1="140" x2="420" y2="140" stroke="#000" stroke-width="1.6"/>
  <line x1="420" y1="120" x2="420" y2="160" stroke="#000" stroke-width="1.6"/>
  <text x="455" y="144" text-anchor="middle" font-size="12">output</text>

  <!-- ground rail -->
  <line x1="55" y1="240" x2="420" y2="240" stroke="#000" stroke-width="1.6"/>
  <line x1="55" y1="140" x2="55" y2="240" stroke="#000" stroke-width="1.6"/>
  <line x1="420" y1="160" x2="420" y2="240" stroke="#000" stroke-width="1.6"/>
  <!-- ground symbol -->
  <line x1="237" y1="240" x2="237" y2="252" stroke="#000" stroke-width="1.6"/>
  <line x1="225" y1="252" x2="249" y2="252" stroke="#000" stroke-width="1.6"/>
  <line x1="229" y1="258" x2="245" y2="258" stroke="#000" stroke-width="1.6"/>
  <line x1="233" y1="264" x2="241" y2="264" stroke="#000" stroke-width="1.6"/>

  <!-- cutoff formula -->
  <rect x="120" y="280" width="280" height="32" fill="#fff" stroke="#ccc"/>
  <text x="260" y="301" text-anchor="middle" font-size="15">cutoff frequency  f_c = 1 / (2 &#960; R C)</text>
</svg>
