<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="420" height="240">
  <rect x="0" y="0" width="420" height="240" fill="#ffffff"/>
  <!-- LEFT: KCL node -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="20" y1="100" x2="100" y2="100"/>
    <line x1="100" y1="100" x2="170" y2="60"/>
    <line x1="100" y1="100" x2="170" y2="140"/>
    <circle cx="100" cy="100" r="5" fill="#000000"/>
    <!-- arrowheads -->
    <line x1="55" y1="92" x2="65" y2="100"/>
    <line x1="55" y1="108" x2="65" y2="100"/>
    <line x1="150" y1="64" x2="140" y2="72"/>
    <line x1="158" y1="78" x2="140" y2="72"/>
    <line x1="150" y1="136" x2="140" y2="128"/>
    <line x1="158" y1="122" x2="140" y2="128"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="14">
    <text x="30" y="90">5A in</text>
    <text x="172" y="60">3A out</text>
    <text x="172" y="145">2A out</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="35" y="195">KCL: current in</text>
    <text x="35" y="213">= current out</text>
  </g>
  <!-- RIGHT: KVL loop -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <rect x="270" y="50" width="110" height="100"/>
    <!-- battery on left side -->
    <line x1="260" y1="90" x2="280" y2="90"/>
    <line x1="266" y1="100" x2="274" y2="100"/>
    <!-- loop arrow -->
    <circle cx="325" cy="100" r="22" stroke-dasharray="4,3"/>
    <line x1="347" y1="100" x2="341" y2="92"/>
    <line x1="347" y1="100" x2="341" y2="108"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="14">
    <text x="248" y="78">+9V</text>
    <text x="385" y="80">-6V</text>
    <text x="385" y="135">-3V</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="265" y="195">KVL: voltages around</text>
    <text x="265" y="213">a loop sum to 0</text>
  </g>
</svg>
