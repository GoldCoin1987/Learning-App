<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 290" width="460" height="290">
  <rect x="0" y="0" width="460" height="290" fill="#ffffff"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="40" y="24">Decoupling placement &amp; return-current path</text>
  </g>
  <!-- signal trace on top layer -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <line x1="60" y1="70" x2="400" y2="70"/>
  </g>
  <g fill="#1a6fd0" font-family="Arial, sans-serif" font-size="11">
    <text x="60" y="62">signal trace (top)</text>
  </g>
  <!-- ground plane below -->
  <rect x="40" y="150" width="380" height="40" fill="#dddddd" stroke="#000000" stroke-width="1"/>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="11">
    <text x="48" y="175">ground / return plane</text>
  </g>
  <!-- return current hugging trace (image current) -->
  <g stroke="#d04a1a" stroke-width="2" fill="none" stroke-dasharray="5,4">
    <line x1="60" y1="158" x2="400" y2="158"/>
  </g>
  <g fill="#d04a1a" font-family="Arial, sans-serif" font-size="11">
    <text x="150" y="208">return current follows directly beneath -&gt; small loop area</text>
  </g>
  <!-- IC pin -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <rect x="300" y="70" width="60" height="30"/>
    <line x1="330" y1="100" x2="330" y2="150"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="11">
    <text x="312" y="90">IC Vdd</text>
  </g>
  <!-- decoupling cap close to pin -->
  <g stroke="#2a8a3a" stroke-width="2" fill="none">
    <line x1="380" y1="100" x2="380" y2="115"/>
    <line x1="372" y1="115" x2="388" y2="115"/>
    <line x1="372" y1="122" x2="388" y2="122"/>
    <line x1="380" y1="122" x2="380" y2="150"/>
    <line x1="360" y1="85" x2="380" y2="85"/>
    <line x1="380" y1="85" x2="380" y2="100"/>
  </g>
  <g fill="#2a8a3a" font-family="Arial, sans-serif" font-size="11">
    <text x="392" y="118">0.1uF</text>
    <text x="392" y="134">close to pin</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
    <text x="40" y="255">Keep the cap-to-pin loop tiny: loop inductance kills high-f decoupling.</text>
  </g>
</svg>
