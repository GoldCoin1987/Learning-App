<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 260" width="380" height="260">
  <rect x="0" y="0" width="380" height="260" fill="#ffffff"/>
  <!-- table grid -->
  <g stroke="#000000" stroke-width="1.5" fill="none">
    <rect x="20" y="40" width="340" height="180"/>
    <line x1="160" y1="40" x2="160" y2="220"/>
    <line x1="260" y1="40" x2="260" y2="220"/>
    <line x1="20" y1="76" x2="360" y2="76"/>
    <line x1="20" y1="112" x2="360" y2="112"/>
    <line x1="20" y1="148" x2="360" y2="148"/>
    <line x1="20" y1="184" x2="360" y2="184"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <text x="40" y="64">Feature</text>
    <text x="185" y="64">BJT</text>
    <text x="278" y="64">MOSFET</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="11">
    <text x="28" y="98">Controlled by</text>
    <text x="168" y="98">current</text>
    <text x="268" y="98">voltage</text>
    <text x="28" y="134">Input resistance</text>
    <text x="168" y="134">moderate</text>
    <text x="268" y="134">very high</text>
    <text x="28" y="170">Gain (per mA)</text>
    <text x="168" y="170">higher</text>
    <text x="268" y="170">lower</text>
    <text x="28" y="206">Digital chips</text>
    <text x="168" y="206">rare</text>
    <text x="268" y="206">workhorse</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="90" y="248">BJT vs MOSFET at a glance</text>
  </g>
</svg>
