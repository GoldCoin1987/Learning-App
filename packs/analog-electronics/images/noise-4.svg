<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240">
  <rect x="0" y="0" width="480" height="240" fill="#ffffff"/>
  <g fill="#555555" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">
    <text x="240" y="28">Put the low-noise amplifier (LNA) FIRST</text>
  </g>
  <!-- signal line -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="20" y1="110" x2="70" y2="110"/>
    <line x1="160" y1="110" x2="200" y2="110"/>
    <line x1="290" y1="110" x2="330" y2="110"/>
    <line x1="420" y1="110" x2="460" y2="110"/>
  </g>
  <g fill="#000000">
    <polygon points="70,110 62,106 62,114"/>
    <polygon points="200,110 192,106 192,114"/>
    <polygon points="330,110 322,106 322,114"/>
    <polygon points="460,110 452,106 452,114"/>
  </g>
  <!-- stage 1 LNA -->
  <g stroke="#1a6fd0" stroke-width="3" fill="none">
    <rect x="70" y="80" width="90" height="60"/>
  </g>
  <!-- stage 2 -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <rect x="200" y="80" width="90" height="60"/>
  </g>
  <!-- stage 3 -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <rect x="330" y="80" width="90" height="60"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="13" text-anchor="middle">
    <text x="115" y="105" fill="#1a6fd0" font-weight="bold">1st stage</text>
    <text x="115" y="125" fill="#1a6fd0" font-weight="bold">LNA</text>
    <text x="245" y="105" fill="#000000">2nd stage</text>
    <text x="375" y="105" fill="#000000">3rd stage</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="20" y="100">in</text>
    <text x="438" y="100">out</text>
  </g>
  <!-- noise contribution bars -->
  <g font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#000000">
    <text x="240" y="165">How much each stage adds to total noise:</text>
  </g>
  <g fill="#d04a1a">
    <rect x="80" y="175" width="70" height="45"/>
  </g>
  <g fill="#000000">
    <rect x="210" y="205" width="70" height="15"/>
    <rect x="340" y="213" width="70" height="7"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#000000">
    <text x="115" y="234" font-weight="bold">dominates</text>
    <text x="245" y="234">small</text>
    <text x="375" y="234">tiny</text>
  </g>
</svg>
