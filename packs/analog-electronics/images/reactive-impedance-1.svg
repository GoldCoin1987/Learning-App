<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320" font-family="sans-serif">
  <rect width="480" height="320" fill="#ffffff"/>
  <text x="240" y="24" text-anchor="middle" font-size="16" font-weight="bold">|Z| vs Frequency (log-log)</text>
  <!-- axes -->
  <line x1="60" y1="270" x2="440" y2="270" stroke="#222" stroke-width="2"/>
  <line x1="60" y1="270" x2="60" y2="50" stroke="#222" stroke-width="2"/>
  <text x="250" y="305" text-anchor="middle" font-size="13">frequency (log f)</text>
  <text x="20" y="160" text-anchor="middle" font-size="13" transform="rotate(-90 20 160)">|Z| (log ohms)</text>
  <!-- resistor: flat line -->
  <line x1="60" y1="200" x2="440" y2="200" stroke="#888" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="380" y="193" font-size="13" fill="#888">R (flat)</text>
  <!-- capacitor: falling 1/wC, -20 dB/dec -->
  <line x1="60" y1="70" x2="440" y2="260" stroke="#1565c0" stroke-width="2.5"/>
  <text x="120" y="80" font-size="13" fill="#1565c0">Z_C = 1/(wC)</text>
  <!-- inductor: rising wL, +20 dB/dec -->
  <line x1="60" y1="260" x2="440" y2="70" stroke="#c62828" stroke-width="2.5"/>
  <text x="330" y="90" font-size="13" fill="#c62828">Z_L = wL</text>
  <text x="120" y="252" font-size="12" fill="#1565c0">-20 dB/dec</text>
  <text x="300" y="252" font-size="12" fill="#c62828">+20 dB/dec</text>
</svg>
