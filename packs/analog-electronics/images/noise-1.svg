<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect x="0" y="0" width="480" height="200" fill="#ffffff"/>
  <!-- signal flow arrow line -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="20" y1="90" x2="60" y2="90"/>
    <line x1="150" y1="90" x2="190" y2="90"/>
    <line x1="280" y1="90" x2="320" y2="90"/>
    <line x1="410" y1="90" x2="450" y2="90"/>
  </g>
  <!-- arrowheads -->
  <g fill="#000000">
    <polygon points="450,90 442,86 442,94"/>
    <polygon points="60,90 52,86 52,94"/>
    <polygon points="190,90 182,86 182,94"/>
    <polygon points="320,90 312,86 312,94"/>
  </g>
  <!-- stage 1: LNA -->
  <g stroke="#1a6fd0" stroke-width="2" fill="none">
    <rect x="60" y="60" width="90" height="60"/>
  </g>
  <!-- stage 2 -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <rect x="190" y="60" width="90" height="60"/>
  </g>
  <!-- stage 3 -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <rect x="320" y="60" width="90" height="60"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">
    <text x="105" y="84" fill="#1a6fd0" font-weight="bold">Stage 1 (LNA)</text>
    <text x="105" y="104" fill="#1a6fd0">F1, G1</text>
    <text x="235" y="84">Stage 2</text>
    <text x="235" y="104">F2, G2</text>
    <text x="365" y="84">Stage 3</text>
    <text x="365" y="104">F3, G3</text>
    <text x="20" y="78">in</text>
    <text x="460" y="78">out</text>
  </g>
  <g fill="#d04a1a" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">
    <text x="240" y="175">F = F1 + (F2-1)/G1 + (F3-1)/(G1 G2)</text>
  </g>
  <g fill="#555555" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">
    <text x="240" y="30">Friis cascade: a low-F, high-G first stage dominates</text>
  </g>
</svg>
