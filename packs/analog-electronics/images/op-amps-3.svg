<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 260" width="380" height="260">
  <rect x="0" y="0" width="380" height="260" fill="#ffffff"/>
  <!-- op-amp triangle -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <polygon points="120,70 120,180 220,125"/>
    <!-- minus input line -->
    <line x1="60" y1="95" x2="120" y2="95"/>
    <!-- plus input line -->
    <line x1="60" y1="155" x2="120" y2="155"/>
    <!-- output -->
    <line x1="220" y1="125" x2="300" y2="125"/>
  </g>
  <!-- input/output dots -->
  <g fill="#000000">
    <circle cx="60" cy="95" r="3"/>
    <circle cx="60" cy="155" r="3"/>
    <circle cx="300" cy="125" r="3"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="20" font-weight="bold">
    <text x="128" y="102">-</text>
    <text x="128" y="166">+</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="22" y="99">V-</text>
    <text x="22" y="159">V+</text>
    <text x="305" y="130">Vout</text>
    <text x="150" y="120" font-size="12">huge gain</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="150" y="200">Vout = A x (V+ - V-)</text>
  </g>
  <!-- golden rules box -->
  <g stroke="#1a6fd0" stroke-width="1.5" fill="none">
    <rect x="20" y="212" width="345" height="38"/>
  </g>
  <g fill="#1a6fd0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <text x="30" y="229">Golden rules (with feedback):</text>
    <text x="30" y="245">1) V+ = V-     2) no current into either input</text>
  </g>
</svg>
