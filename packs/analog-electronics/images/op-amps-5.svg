<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="360" height="260">
  <rect x="0" y="0" width="360" height="260" fill="#ffffff"/>
  <!-- axes -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="60" y1="30" x2="60" y2="220"/>
    <line x1="60" y1="125" x2="330" y2="125"/>
  </g>
  <!-- hysteresis loop -->
  <g stroke="#d04a1a" stroke-width="3" fill="none">
    <!-- low output level -->
    <line x1="80" y1="190" x2="240" y2="190"/>
    <!-- rising edge at upper threshold -->
    <line x1="240" y1="190" x2="240" y2="60"/>
    <!-- high output level -->
    <line x1="240" y1="60" x2="310" y2="60"/>
    <!-- coming back: high level until lower threshold -->
    <line x1="310" y1="60" x2="150" y2="60"/>
    <!-- falling edge at lower threshold -->
    <line x1="150" y1="60" x2="150" y2="190"/>
    <!-- low level -->
    <line x1="150" y1="190" x2="80" y2="190"/>
  </g>
  <!-- arrows on loop -->
  <g fill="#d04a1a">
    <polygon points="160,190 152,186 152,194"/>
    <polygon points="230,60 238,56 238,64"/>
  </g>
  <!-- threshold markers -->
  <g stroke="#888888" stroke-width="1" fill="none" stroke-dasharray="3,3">
    <line x1="150" y1="60" x2="150" y2="220"/>
    <line x1="240" y1="60" x2="240" y2="220"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="135" y="235">VTL</text>
    <text x="225" y="235">VTH</text>
    <text x="300" y="143">Vin</text>
    <text x="68" y="44">Vout</text>
    <text x="248" y="100">high</text>
    <text x="95" y="183">low</text>
  </g>
  <!-- hysteresis width -->
  <g stroke="#1a6fd0" stroke-width="1.5" fill="none">
    <line x1="150" y1="110" x2="240" y2="110"/>
  </g>
  <g fill="#1a6fd0" font-family="Arial, sans-serif" font-size="11">
    <text x="158" y="105">VH (window)</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
    <text x="40" y="255">Schmitt trigger hysteresis: VH = VTH - VTL</text>
  </g>
</svg>
