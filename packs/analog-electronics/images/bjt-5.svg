<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <rect width="400" height="250" fill="white"/>
  <text x="200" y="22" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">Differential pair: amplifies the DIFFERENCE of two inputs</text>

  <!-- two transistors as boxes -->
  <rect x="90" y="70" width="60" height="60" fill="white" stroke="black" stroke-width="2"/>
  <text x="120" y="105" font-family="sans-serif" font-size="13" text-anchor="middle">Q1</text>
  <rect x="250" y="70" width="60" height="60" fill="white" stroke="black" stroke-width="2"/>
  <text x="280" y="105" font-family="sans-serif" font-size="13" text-anchor="middle">Q2</text>

  <!-- inputs -->
  <line x1="40" y1="100" x2="90" y2="100" stroke="black" stroke-width="2"/>
  <text x="30" y="92" font-family="sans-serif" font-size="13" text-anchor="middle">v1</text>
  <line x1="360" y1="100" x2="310" y2="100" stroke="black" stroke-width="2"/>
  <text x="370" y="92" font-family="sans-serif" font-size="13" text-anchor="middle">v2</text>

  <!-- outputs to top -->
  <line x1="120" y1="70" x2="120" y2="45" stroke="black" stroke-width="2"/>
  <text x="120" y="38" font-family="sans-serif" font-size="11" text-anchor="middle">out</text>
  <line x1="280" y1="70" x2="280" y2="45" stroke="black" stroke-width="2"/>
  <text x="280" y="38" font-family="sans-serif" font-size="11" text-anchor="middle">out</text>

  <!-- shared emitter node -->
  <line x1="120" y1="130" x2="120" y2="160" stroke="black" stroke-width="2"/>
  <line x1="280" y1="130" x2="280" y2="160" stroke="black" stroke-width="2"/>
  <line x1="120" y1="160" x2="280" y2="160" stroke="black" stroke-width="2"/>

  <!-- tail current source -->
  <line x1="200" y1="160" x2="200" y2="180" stroke="black" stroke-width="2"/>
  <circle cx="200" cy="195" r="15" fill="white" stroke="black" stroke-width="2"/>
  <line x1="200" y1="188" x2="200" y2="202" stroke="black" stroke-width="2"/>
  <polygon points="195,194 205,194 200,186" fill="black"/>
  <text x="218" y="199" font-family="sans-serif" font-size="11">tail current</text>
  <text x="218" y="212" font-family="sans-serif" font-size="11">source</text>
  <line x1="200" y1="210" x2="200" y2="230" stroke="black" stroke-width="2"/>
  <line x1="185" y1="230" x2="215" y2="230" stroke="black" stroke-width="2"/>
  <line x1="191" y1="236" x2="209" y2="236" stroke="black" stroke-width="2"/>

  <text x="200" y="58" font-family="sans-serif" font-size="11" text-anchor="middle">output  proportional to  (v1 - v2)</text>
</svg>
