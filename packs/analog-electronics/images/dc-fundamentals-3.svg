<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" width="420" height="260">
  <rect x="0" y="0" width="420" height="260" fill="#ffffff"/>
  <!-- LEFT: water pipe analogy -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- pump (pressure) -->
    <circle cx="50" cy="120" r="24"/>
    <!-- pipe loop -->
    <line x1="50" y1="96" x2="50" y2="50"/>
    <line x1="50" y1="50" x2="150" y2="50"/>
    <line x1="50" y1="144" x2="50" y2="200"/>
    <line x1="50" y1="200" x2="150" y2="200"/>
    <line x1="150" y1="200" x2="150" y2="150"/>
    <line x1="150" y1="100" x2="150" y2="50"/>
    <!-- narrow pipe (resistance) -->
    <line x1="150" y1="100" x2="135" y2="125"/>
    <line x1="135" y1="125" x2="150" y2="150"/>
    <line x1="150" y1="100" x2="165" y2="125"/>
    <line x1="165" y1="125" x2="150" y2="150"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="30" y="124">P</text>
    <text x="60" y="40">flow</text>
    <text x="170" y="129">narrow</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="18" y="232">pump = pressure</text>
    <text x="18" y="248">narrow pipe = resistance</text>
  </g>
  <!-- RIGHT: battery + resistor circuit -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <line x1="280" y1="50" x2="380" y2="50"/>
    <line x1="380" y1="50" x2="380" y2="100"/>
    <rect x="365" y="100" width="30" height="50"/>
    <line x1="380" y1="150" x2="380" y2="200"/>
    <line x1="280" y1="200" x2="380" y2="200"/>
    <!-- battery -->
    <line x1="280" y1="50" x2="280" y2="115"/>
    <line x1="280" y1="135" x2="280" y2="200"/>
    <line x1="268" y1="115" x2="292" y2="115"/>
    <line x1="274" y1="125" x2="286" y2="125"/>
    <line x1="268" y1="135" x2="292" y2="135"/>
    <line x1="274" y1="145" x2="286" y2="145"/>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="13">
    <text x="244" y="118">+</text>
    <text x="246" y="150">-</text>
    <text x="240" y="105">V</text>
    <text x="400" y="130">R</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="12">
    <text x="262" y="232">battery = pressure (V)</text>
    <text x="262" y="248">resistor = narrow pipe (R)</text>
  </g>
  <g fill="#000000" font-family="Arial, sans-serif" font-size="14">
    <text x="195" y="125">=</text>
  </g>
</svg>
