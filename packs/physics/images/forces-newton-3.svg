<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="520" height="340" fill="#ffffff"/>
  <text x="260" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Newton's 3rd Law: forces come in pairs</text>

  <defs>
    <marker id="ah3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- ground -->
  <line x1="40" y1="250" x2="480" y2="250" stroke="#000" stroke-width="3"/>
  <text x="60" y="270" fill="#000">ground</text>

  <!-- simple foot -->
  <path d="M200 150 L260 150 L270 200 L240 215 L190 215 Z" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="225" y="140" text-anchor="middle" fill="#000">foot</text>

  <!-- foot pushes DOWN on ground -->
  <line x1="230" y1="218" x2="230" y2="246" stroke="#000" stroke-width="3" marker-end="url(#ah3)"/>
  <text x="240" y="240" fill="#000">foot pushes ground (down)</text>

  <!-- ground pushes UP on foot -->
  <line x1="320" y1="250" x2="320" y2="200" stroke="#000" stroke-width="3" marker-end="url(#ah3)"/>
  <text x="330" y="205" fill="#000">ground pushes foot (up)</text>

  <!-- explanation -->
  <text x="260" y="300" text-anchor="middle" fill="#000">The two forces are EQUAL in size, OPPOSITE in direction,</text>
  <text x="260" y="320" text-anchor="middle" fill="#000">and act on DIFFERENT objects (one on ground, one on foot).</text>
</svg>
