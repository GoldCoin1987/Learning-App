<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="500" height="360" fill="#ffffff"/>
  <text x="250" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The Scientific Method (a cycle)</text>

  <!-- nodes -->
  <rect x="190" y="45" width="120" height="40" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="250" y="70" text-anchor="middle" fill="#000">1. Observe</text>

  <rect x="350" y="130" width="130" height="40" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="415" y="155" text-anchor="middle" fill="#000">2. Hypothesize</text>

  <rect x="350" y="245" width="130" height="40" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="415" y="270" text-anchor="middle" fill="#000">3. Predict</text>

  <rect x="185" y="300" width="130" height="40" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="250" y="325" text-anchor="middle" fill="#000">4. Test</text>

  <rect x="20" y="245" width="130" height="40" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="85" y="270" text-anchor="middle" fill="#000">5. Refine</text>

  <rect x="20" y="130" width="130" height="40" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="85" y="148" text-anchor="middle" fill="#000">(loop back</text>
  <text x="85" y="163" text-anchor="middle" fill="#000">to observe)</text>

  <!-- arrows around the loop -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
  <path d="M310,68 Q380,80 405,128" fill="none" stroke="#000" marker-end="url(#ah)"/>
  <path d="M415,170 L415,243" fill="none" stroke="#000" marker-end="url(#ah)"/>
  <path d="M350,278 Q300,300 318,312" fill="none" stroke="#000" marker-end="url(#ah)"/>
  <path d="M185,322 Q120,300 110,288" fill="none" stroke="#000" marker-end="url(#ah)"/>
  <path d="M85,245 L85,172" fill="none" stroke="#000" marker-end="url(#ah)"/>
  <path d="M120,130 Q170,80 190,70" fill="none" stroke="#000" marker-end="url(#ah)"/>

  <text x="250" y="200" text-anchor="middle" font-size="12" fill="#000">If the test fails,</text>
  <text x="250" y="216" text-anchor="middle" font-size="12" fill="#000">change the idea and go again.</text>
</svg>
