<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Entropy: order tends toward disorder</text>

  <defs>
    <marker id="ah4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- ordered box -->
  <rect x="40" y="70" width="170" height="170" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="125" y="62" text-anchor="middle" fill="#000">BEFORE: ordered (low entropy)</text>
  <g fill="#000">
    <circle cx="75" cy="105" r="6"/><circle cx="105" cy="105" r="6"/><circle cx="135" cy="105" r="6"/><circle cx="165" cy="105" r="6"/>
    <circle cx="75" cy="135" r="6"/><circle cx="105" cy="135" r="6"/><circle cx="135" cy="135" r="6"/><circle cx="165" cy="135" r="6"/>
    <circle cx="75" cy="165" r="6"/><circle cx="105" cy="165" r="6"/><circle cx="135" cy="165" r="6"/><circle cx="165" cy="165" r="6"/>
    <circle cx="75" cy="195" r="6"/><circle cx="105" cy="195" r="6"/><circle cx="135" cy="195" r="6"/><circle cx="165" cy="195" r="6"/>
  </g>
  <text x="125" y="262" text-anchor="middle" fill="#000">neat rows (like a tidy room)</text>

  <!-- arrow -->
  <line x1="225" y1="155" x2="320" y2="155" stroke="#000" stroke-width="2" marker-end="url(#ah4)"/>
  <text x="272" y="140" text-anchor="middle" fill="#000">time</text>
  <text x="272" y="175" text-anchor="middle" fill="#000">passes</text>

  <!-- disordered box -->
  <rect x="345" y="70" width="170" height="170" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="430" y="62" text-anchor="middle" fill="#000">AFTER: disordered (high entropy)</text>
  <g fill="#000">
    <circle cx="372" cy="98" r="6"/><circle cx="430" cy="112" r="6"/><circle cx="490" cy="90" r="6"/><circle cx="400" cy="140" r="6"/>
    <circle cx="465" cy="135" r="6"/><circle cx="378" cy="180" r="6"/><circle cx="440" cy="170" r="6"/><circle cx="500" cy="160" r="6"/>
    <circle cx="410" cy="205" r="6"/><circle cx="475" cy="200" r="6"/><circle cx="358" cy="220" r="6"/><circle cx="430" cy="225" r="6"/>
    <circle cx="495" cy="225" r="6"/><circle cx="385" cy="118" r="6"/><circle cx="455" cy="95" r="6"/><circle cx="415" cy="172" r="6"/>
  </g>
  <text x="430" y="262" text-anchor="middle" fill="#000">scattered (room messes up by itself)</text>

  <text x="280" y="295" text-anchor="middle" font-size="11" fill="#000">2nd law: total disorder (entropy) tends to increase; tidying needs energy from outside</text>
</svg>
