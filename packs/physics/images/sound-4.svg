<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The Doppler effect: a moving sound source</text>

  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- wavefront circles, centers shifted right to show bunching ahead -->
  <circle cx="240" cy="160" r="30" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="252" cy="160" r="62" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="264" cy="160" r="96" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="276" cy="160" r="132" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- source moving right -->
  <circle cx="240" cy="160" r="7" fill="#000"/>
  <line x1="250" y1="160" x2="320" y2="160" stroke="#000" stroke-width="1.5" marker-end="url(#ah2)"/>
  <text x="240" y="148" text-anchor="middle" fill="#000">source moves &#8594;</text>

  <!-- ahead listener -->
  <text x="455" y="120" text-anchor="middle" fill="#000">AHEAD (source</text>
  <text x="455" y="136" text-anchor="middle" fill="#000">approaching):</text>
  <text x="455" y="158" text-anchor="middle" fill="#000">wavefronts bunched</text>
  <text x="455" y="174" text-anchor="middle" fill="#000">= higher pitch</text>

  <!-- behind listener -->
  <text x="70" y="120" text-anchor="middle" fill="#000">BEHIND (source</text>
  <text x="70" y="136" text-anchor="middle" fill="#000">receding):</text>
  <text x="70" y="158" text-anchor="middle" fill="#000">wavefronts spread</text>
  <text x="70" y="174" text-anchor="middle" fill="#000">= lower pitch</text>

  <text x="280" y="300" text-anchor="middle" fill="#000">The siren's true frequency never changes; only the pitch each listener HEARS changes.</text>
</svg>
