<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Pitch = frequency &#183; Loudness = amplitude</text>

  <!-- low frequency / low pitch -->
  <text x="140" y="55" text-anchor="middle" fill="#000">Low frequency = low pitch</text>
  <path d="M30,90 Q60,55 90,90 T150,90 T210,90 T270,90" fill="none" stroke="#000" stroke-width="2"/>

  <!-- high frequency / high pitch -->
  <text x="420" y="55" text-anchor="middle" fill="#000">High frequency = high pitch</text>
  <path d="M300,90 Q315,55 330,90 T360,90 T390,90 T420,90 T450,90 T480,90 T510,90" fill="none" stroke="#000" stroke-width="2"/>

  <text x="280" y="120" text-anchor="middle" fill="#000">More waves squeezed into each second = higher pitch (a higher note).</text>

  <line x1="40" y1="140" x2="520" y2="140" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- small amplitude / quiet -->
  <text x="140" y="175" text-anchor="middle" fill="#000">Small amplitude = quiet</text>
  <line x1="30" y1="250" x2="270" y2="250" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M30,250 Q60,235 90,250 T150,250 T210,250 T270,250" fill="none" stroke="#000" stroke-width="2"/>

  <!-- large amplitude / loud -->
  <text x="420" y="175" text-anchor="middle" fill="#000">Large amplitude = loud</text>
  <line x1="300" y1="250" x2="520" y2="250" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M300,250 Q330,195 360,250 T420,250 T480,250" fill="none" stroke="#000" stroke-width="2"/>

  <text x="280" y="295" text-anchor="middle" fill="#000">Taller waves (bigger pressure swings) = louder sound. Loudness does NOT change the pitch.</text>
  <text x="280" y="325" text-anchor="middle" fill="#000">Human hearing: about 20 Hz to 20,000 Hz. Below = infrasound; above = ultrasound.</text>
  <text x="280" y="348" text-anchor="middle" fill="#000">Loudness is measured on the decibel (dB) scale.</text>
</svg>
