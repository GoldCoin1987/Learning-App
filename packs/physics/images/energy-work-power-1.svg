<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="340" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Work = force x distance moved (in the force's direction)</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- ground -->
  <line x1="30" y1="150" x2="510" y2="150" stroke="#000" stroke-width="2"/>

  <!-- box start (faint) -->
  <rect x="70" y="100" width="60" height="50" fill="#ffffff" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="100" y="130" text-anchor="middle" fill="#000">start</text>

  <!-- box end -->
  <rect x="300" y="100" width="60" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="330" y="130" text-anchor="middle" fill="#000">box</text>

  <!-- push force -->
  <line x1="20" y1="125" x2="65" y2="125" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="42" y="112" text-anchor="middle" fill="#000" font-weight="bold">F</text>

  <!-- distance bracket -->
  <line x1="100" y1="170" x2="330" y2="170" stroke="#000" stroke-width="1" marker-end="url(#ah)" marker-start="url(#ah)"/>
  <text x="215" y="188" text-anchor="middle" fill="#000">distance d (m)</text>
  <text x="215" y="205" text-anchor="middle" fill="#000" font-weight="bold">W = F x d   (in joules, J)</text>

  <!-- inset: perpendicular force = no work -->
  <line x1="30" y1="240" x2="510" y2="240" stroke="#000" stroke-width="1"/>
  <text x="270" y="262" text-anchor="middle" font-weight="bold" fill="#000">NO WORK cases</text>

  <!-- perpendicular -->
  <rect x="90" y="278" width="44" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="112" y1="278" x2="112" y2="300" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <line x1="135" y1="320" x2="240" y2="320" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="190" y="335" text-anchor="middle" fill="#000">moves this way</text>
  <text x="112" y="276" text-anchor="middle" fill="#000">F up</text>
  <text x="112" y="252" text-anchor="middle" fill="#000">Force perpendicular to motion -> W = 0</text>

  <!-- no displacement -->
  <rect x="380" y="278" width="44" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="350" y1="295" x2="378" y2="295" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="402" y="332" text-anchor="middle" fill="#000">box does not move</text>
  <text x="402" y="252" text-anchor="middle" fill="#000">No distance (d = 0) -> W = 0</text>
</svg>
