<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="340" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Power = energy used / time taken (in watts, W)</text>
  <text x="270" y="44" text-anchor="middle" fill="#000">Same job (same energy). Faster = more power.</text>

  <defs>
    <marker id="ah4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Person A: slow -->
  <line x1="40" y1="180" x2="220" y2="100" stroke="#000" stroke-width="2"/>
  <rect x="190" y="78" width="26" height="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="60" y1="200" x2="120" y2="200" stroke="#000" stroke-width="2" marker-end="url(#ah4)"/>
  <text x="130" y="240" text-anchor="middle" fill="#000" font-weight="bold">SLOW: 100 J in 10 s</text>
  <text x="130" y="258" text-anchor="middle" fill="#000">Power = 100 / 10 = 10 W</text>

  <!-- Person B: fast -->
  <line x1="320" y1="180" x2="500" y2="100" stroke="#000" stroke-width="2"/>
  <rect x="470" y="78" width="26" height="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="340" y1="200" x2="480" y2="200" stroke="#000" stroke-width="3" marker-end="url(#ah4)"/>
  <text x="410" y="240" text-anchor="middle" fill="#000" font-weight="bold">FAST: 100 J in 2 s</text>
  <text x="410" y="258" text-anchor="middle" fill="#000">Power = 100 / 2 = 50 W</text>

  <line x1="270" y1="70" x2="270" y2="270" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="270" y="298" text-anchor="middle" fill="#000" font-weight="bold">Same energy moved. The faster ramp delivers MORE power.</text>
  <text x="270" y="318" text-anchor="middle" fill="#000">1 watt = 1 joule per second. Efficiency = useful energy out / total energy in.</text>
</svg>
