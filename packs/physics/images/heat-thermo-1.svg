<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Heat flows from hot to cold; three temperature scales</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- hot object -->
  <rect x="40" y="70" width="90" height="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="85" y="120" text-anchor="middle" fill="#000">HOT</text>
  <text x="85" y="138" text-anchor="middle" fill="#000">cup of tea</text>
  <text x="85" y="178" text-anchor="middle" fill="#000">fast molecules</text>

  <!-- cold object -->
  <rect x="280" y="70" width="90" height="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="325" y="120" text-anchor="middle" fill="#000">COLD</text>
  <text x="325" y="138" text-anchor="middle" fill="#000">your hand</text>
  <text x="325" y="178" text-anchor="middle" fill="#000">slow molecules</text>

  <!-- heat flow arrow -->
  <line x1="135" y1="115" x2="275" y2="115" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="205" y="100" text-anchor="middle" fill="#000">HEAT (energy) flows</text>
  <text x="205" y="62" text-anchor="middle" fill="#000">Heat always moves hot to cold (never "cold flows in")</text>

  <!-- three thermometer scales aligned -->
  <text x="280" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Three ways to label temperature</text>

  <!-- number line -->
  <line x1="60" y1="280" x2="520" y2="280" stroke="#000" stroke-width="2"/>

  <!-- absolute zero tick -->
  <line x1="80" y1="270" x2="80" y2="290" stroke="#000" stroke-width="2"/>
  <text x="80" y="308" text-anchor="middle" fill="#000">absolute zero</text>
  <text x="80" y="324" text-anchor="middle" fill="#000">0 K</text>
  <text x="80" y="340" text-anchor="middle" fill="#000">-273 C / -460 F</text>

  <!-- water freezes -->
  <line x1="250" y1="270" x2="250" y2="290" stroke="#000" stroke-width="2"/>
  <text x="250" y="308" text-anchor="middle" fill="#000">water freezes</text>
  <text x="250" y="324" text-anchor="middle" fill="#000">0 C / 32 F</text>
  <text x="250" y="340" text-anchor="middle" fill="#000">273 K</text>

  <!-- water boils -->
  <line x1="480" y1="270" x2="480" y2="290" stroke="#000" stroke-width="2"/>
  <text x="480" y="308" text-anchor="middle" fill="#000">water boils</text>
  <text x="480" y="324" text-anchor="middle" fill="#000">100 C / 212 F</text>
  <text x="480" y="340" text-anchor="middle" fill="#000">373 K</text>

  <text x="290" y="262" text-anchor="middle" fill="#000">colder &#8592;&#8594; hotter</text>
</svg>
