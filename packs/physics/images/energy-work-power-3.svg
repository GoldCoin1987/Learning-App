<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="340" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Energy is not lost - it transforms (some becomes heat)</text>
  <text x="270" y="44" text-anchor="middle" fill="#000">Sliding box on a real (rough) floor. Total energy is the same before and after.</text>

  <!-- axis -->
  <line x1="80" y1="280" x2="80" y2="70" stroke="#000" stroke-width="2"/>
  <line x1="80" y1="280" x2="500" y2="280" stroke="#000" stroke-width="2"/>
  <text x="40" y="180" text-anchor="middle" fill="#000" transform="rotate(-90 40 180)">energy (J)</text>

  <!-- BEFORE bar: all KE -->
  <rect x="140" y="100" width="90" height="180" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="185" y="190" text-anchor="middle" fill="#000">KE</text>
  <text x="185" y="208" text-anchor="middle" fill="#000">(motion)</text>
  <text x="185" y="298" text-anchor="middle" fill="#000" font-weight="bold">BEFORE</text>

  <!-- AFTER bar: split heat + KE -->
  <rect x="340" y="100" width="90" height="120" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="385" y="165" text-anchor="middle" fill="#000">HEAT</text>
  <text x="385" y="183" text-anchor="middle" fill="#000">(from friction)</text>
  <rect x="340" y="220" width="90" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="385" y="255" text-anchor="middle" fill="#000">KE left</text>
  <text x="385" y="298" text-anchor="middle" fill="#000" font-weight="bold">AFTER</text>

  <!-- arrow -->
  <line x1="240" y1="160" x2="335" y2="160" stroke="#000" stroke-width="2" marker-end="url(#ah3)"/>
  <defs>
    <marker id="ah3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <text x="270" y="325" text-anchor="middle" fill="#000" font-weight="bold">Same total height of bar. Friction turns motion energy into heat - not destroyed.</text>
</svg>
