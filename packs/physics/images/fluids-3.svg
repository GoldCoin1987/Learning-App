<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Buoyancy: the upward push vs. weight</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- water container -->
  <rect x="30" y="70" width="500" height="240" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="30" y1="95" x2="530" y2="95" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="40" y="90" fill="#000">water surface</text>

  <!-- LEFT: floating object -->
  <text x="150" y="135" text-anchor="middle" font-weight="bold" fill="#000">Floats</text>
  <rect x="110" y="80" width="80" height="55" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="150" y1="80" x2="150" y2="35" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="150" y="30" text-anchor="middle" fill="#000">buoyant push UP</text>
  <line x1="150" y1="135" x2="150" y2="180" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="150" y="200" text-anchor="middle" fill="#000">weight DOWN</text>
  <text x="150" y="222" text-anchor="middle" fill="#000">push = weight (balanced)</text>

  <!-- RIGHT: sinking object -->
  <text x="410" y="135" text-anchor="middle" font-weight="bold" fill="#000">Sinks</text>
  <rect x="390" y="200" width="40" height="40" fill="#000" stroke="#000" stroke-width="2"/>
  <line x1="410" y1="200" x2="410" y2="165" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="410" y="158" text-anchor="middle" fill="#000">small push UP</text>
  <line x1="410" y1="240" x2="410" y2="290" stroke="#000" stroke-width="4" marker-end="url(#ah)"/>
  <text x="410" y="307" text-anchor="middle" fill="#000">big weight DOWN</text>

  <text x="280" y="335" text-anchor="middle" fill="#000">Buoyant push = weight of the fluid the object shoves aside (displaces).</text>
  <text x="280" y="353" text-anchor="middle" fill="#000">A hollow steel ship displaces lots of water, so it floats.</text>
</svg>
