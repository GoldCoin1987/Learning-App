<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 330" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="520" height="330" fill="#ffffff"/>
  <text x="260" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Velocity-Time Graph: slope = acceleration, area = distance</text>

  <!-- axes -->
  <line x1="70" y1="40" x2="70" y2="260" stroke="#000" stroke-width="2"/>
  <line x1="70" y1="260" x2="470" y2="260" stroke="#000" stroke-width="2"/>

  <text x="30" y="155" text-anchor="middle" fill="#000" transform="rotate(-90 30 155)">velocity v (m/s)</text>
  <text x="270" y="300" text-anchor="middle" fill="#000">time t (s)</text>

  <!-- y ticks -->
  <g fill="#000" text-anchor="end" font-size="12">
    <line x1="65" y1="260" x2="70" y2="260" stroke="#000"/><text x="60" y="264">0</text>
    <line x1="65" y1="205" x2="70" y2="205" stroke="#000"/><text x="60" y="209">5</text>
    <line x1="65" y1="150" x2="70" y2="150" stroke="#000"/><text x="60" y="154">10</text>
    <line x1="65" y1="95" x2="70" y2="95" stroke="#000"/><text x="60" y="99">15</text>
  </g>
  <!-- x ticks -->
  <g fill="#000" text-anchor="middle" font-size="12">
    <line x1="170" y1="260" x2="170" y2="265" stroke="#000"/><text x="170" y="278">2</text>
    <line x1="270" y1="260" x2="270" y2="265" stroke="#000"/><text x="270" y="278">4</text>
    <line x1="370" y1="260" x2="370" y2="265" stroke="#000"/><text x="370" y="278">6</text>
  </g>

  <!-- line from (0,0) to (6s,15 m/s): slope = 2.5 m/s^2 -->
  <line x1="70" y1="260" x2="370" y2="95" stroke="#000" stroke-width="2"/>

  <!-- shaded area under the line (triangle) -->
  <polygon points="70,260 370,260 370,95" fill="#000" fill-opacity="0.12" stroke="none"/>
  <text x="200" y="240" text-anchor="middle" fill="#000">area = distance travelled</text>

  <text x="150" y="120" fill="#000">slope = acceleration</text>
</svg>
