<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="520" height="340" fill="#ffffff"/>
  <text x="260" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A vector = an arrow (magnitude + direction)</text>

  <!-- grid -->
  <g stroke="#bbbbbb" stroke-width="1">
    <line x1="60" y1="60" x2="60" y2="300"/>
    <line x1="120" y1="60" x2="120" y2="300"/>
    <line x1="180" y1="60" x2="180" y2="300"/>
    <line x1="240" y1="60" x2="240" y2="300"/>
    <line x1="300" y1="60" x2="300" y2="300"/>
    <line x1="360" y1="60" x2="360" y2="300"/>
    <line x1="420" y1="60" x2="420" y2="300"/>
    <line x1="60" y1="60" x2="420" y2="60"/>
    <line x1="60" y1="120" x2="420" y2="120"/>
    <line x1="60" y1="180" x2="420" y2="180"/>
    <line x1="60" y1="240" x2="420" y2="240"/>
    <line x1="60" y1="300" x2="420" y2="300"/>
  </g>

  <!-- axes -->
  <line x1="60" y1="300" x2="60" y2="50" stroke="#000" stroke-width="2"/>
  <line x1="60" y1="300" x2="430" y2="300" stroke="#000" stroke-width="2"/>
  <text x="440" y="304" fill="#000">x</text>
  <text x="56" y="46" text-anchor="end" fill="#000">y</text>

  <!-- arrowhead def -->
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- the vector arrow: tail at origin (60,300) to (300,120) -->
  <line x1="60" y1="300" x2="300" y2="120" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="170" y="195" fill="#000" font-weight="bold">magnitude = length of arrow</text>

  <!-- angle arc -->
  <path d="M110 300 A 50 50 0 0 0 92 263" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="118" y="285" fill="#000">direction (angle)</text>

  <!-- tail/head labels -->
  <circle cx="60" cy="300" r="3" fill="#000"/>
  <text x="44" y="316" fill="#000">tail</text>
  <text x="305" y="116" fill="#000">head (tip)</text>
</svg>
