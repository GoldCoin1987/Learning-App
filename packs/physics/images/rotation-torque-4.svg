<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="360" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Spinning skater: arms in = spin faster</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <line x1="270" y1="44" x2="270" y2="300" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- LEFT: arms out, slow -->
  <text x="135" y="64" text-anchor="middle" font-weight="bold" fill="#000">Arms OUT</text>
  <circle cx="135" cy="120" r="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="135" y1="136" x2="135" y2="210" stroke="#000" stroke-width="2"/>
  <!-- wide arms -->
  <line x1="135" y1="155" x2="60" y2="135" stroke="#000" stroke-width="2"/>
  <line x1="135" y1="155" x2="210" y2="135" stroke="#000" stroke-width="2"/>
  <line x1="135" y1="210" x2="110" y2="270" stroke="#000" stroke-width="2"/>
  <line x1="135" y1="210" x2="160" y2="270" stroke="#000" stroke-width="2"/>
  <path d="M 90 290 A 60 18 0 0 0 180 290" fill="none" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="135" y="318" text-anchor="middle" fill="#000">slow spin</text>
  <text x="135" y="338" text-anchor="middle" font-weight="bold" fill="#000">big I, small speed</text>

  <!-- RIGHT: arms in, fast -->
  <text x="405" y="64" text-anchor="middle" font-weight="bold" fill="#000">Arms IN</text>
  <circle cx="405" cy="120" r="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="405" y1="136" x2="405" y2="210" stroke="#000" stroke-width="2"/>
  <!-- tucked arms -->
  <line x1="405" y1="155" x2="385" y2="180" stroke="#000" stroke-width="2"/>
  <line x1="405" y1="155" x2="425" y2="180" stroke="#000" stroke-width="2"/>
  <line x1="405" y1="210" x2="392" y2="270" stroke="#000" stroke-width="2"/>
  <line x1="405" y1="210" x2="418" y2="270" stroke="#000" stroke-width="2"/>
  <path d="M 370 290 A 45 14 0 0 0 440 290" fill="none" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="405" y="318" text-anchor="middle" fill="#000">fast spin</text>
  <text x="405" y="338" text-anchor="middle" font-weight="bold" fill="#000">small I, big speed</text>

  <text x="270" y="352" text-anchor="middle" fill="#000">Angular momentum stays the same: I down -> speed up</text>
</svg>
