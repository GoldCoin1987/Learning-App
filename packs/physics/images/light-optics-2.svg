<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Law of reflection: angle in = angle out</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- mirror surface -->
  <line x1="60" y1="250" x2="500" y2="250" stroke="#000" stroke-width="3"/>
  <text x="280" y="285" text-anchor="middle" font-size="12" fill="#000">mirror surface</text>
  <!-- hatching under mirror -->
  <line x1="80" y1="250" x2="68" y2="266" stroke="#000" stroke-width="1"/>
  <line x1="140" y1="250" x2="128" y2="266" stroke="#000" stroke-width="1"/>
  <line x1="200" y1="250" x2="188" y2="266" stroke="#000" stroke-width="1"/>
  <line x1="260" y1="250" x2="248" y2="266" stroke="#000" stroke-width="1"/>
  <line x1="320" y1="250" x2="308" y2="266" stroke="#000" stroke-width="1"/>
  <line x1="380" y1="250" x2="368" y2="266" stroke="#000" stroke-width="1"/>
  <line x1="440" y1="250" x2="428" y2="266" stroke="#000" stroke-width="1"/>

  <!-- normal (dashed, perpendicular) -->
  <line x1="280" y1="250" x2="280" y2="70" stroke="#000" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="288" y="80" font-size="12" fill="#000">normal (90 deg to surface)</text>

  <!-- incident ray coming down-left to point -->
  <line x1="110" y1="90" x2="280" y2="250" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="120" y="130" font-size="12" fill="#000">incident ray (incoming)</text>

  <!-- reflected ray going up-right from point -->
  <line x1="280" y1="250" x2="450" y2="90" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="360" y="130" font-size="12" fill="#000">reflected ray (outgoing)</text>

  <!-- angle arcs -->
  <path d="M 280 200 A 50 50 0 0 0 247 213" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="240" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">i</text>
  <path d="M 313 213 A 50 50 0 0 0 280 200" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="320" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">r</text>

  <text x="280" y="308" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">angle i = angle r (both measured from the normal)</text>
</svg>
