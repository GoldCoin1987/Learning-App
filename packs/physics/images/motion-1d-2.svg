<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="520" height="320" fill="#ffffff"/>
  <text x="260" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Position-Time Graph: straight line = constant velocity</text>

  <!-- axes -->
  <line x1="70" y1="40" x2="70" y2="260" stroke="#000" stroke-width="2"/>
  <line x1="70" y1="260" x2="470" y2="260" stroke="#000" stroke-width="2"/>

  <!-- axis labels -->
  <text x="30" y="155" text-anchor="middle" fill="#000" transform="rotate(-90 30 155)">position x (m)</text>
  <text x="270" y="295" text-anchor="middle" fill="#000">time t (s)</text>

  <!-- y ticks -->
  <g fill="#000" text-anchor="end" font-size="12">
    <line x1="65" y1="260" x2="70" y2="260" stroke="#000"/><text x="60" y="264">0</text>
    <line x1="65" y1="205" x2="70" y2="205" stroke="#000"/><text x="60" y="209">10</text>
    <line x1="65" y1="150" x2="70" y2="150" stroke="#000"/><text x="60" y="154">20</text>
    <line x1="65" y1="95" x2="70" y2="95" stroke="#000"/><text x="60" y="99">30</text>
  </g>
  <!-- x ticks -->
  <g fill="#000" text-anchor="middle" font-size="12">
    <line x1="170" y1="260" x2="170" y2="265" stroke="#000"/><text x="170" y="278">2</text>
    <line x1="270" y1="260" x2="270" y2="265" stroke="#000"/><text x="270" y="278">4</text>
    <line x1="370" y1="260" x2="370" y2="265" stroke="#000"/><text x="370" y="278">6</text>
  </g>

  <!-- the line: from (0,0) to (6s,30m) -> slope = 5 m/s -->
  <line x1="70" y1="260" x2="370" y2="95" stroke="#000" stroke-width="2"/>

  <!-- slope triangle -->
  <line x1="170" y1="205" x2="370" y2="205" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="370" y1="205" x2="370" y2="95" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="270" y="222" text-anchor="middle" fill="#000">run = 4 s</text>
  <text x="382" y="155" fill="#000">rise = 20 m</text>

  <text x="200" y="120" fill="#000">slope = rise / run = velocity = 5 m/s</text>
</svg>
