<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="340" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Torque = force x lever arm</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- the bolt -->
  <circle cx="90" cy="190" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="90" cy="190" r="6" fill="#000"/>
  <text x="90" y="234" text-anchor="middle" fill="#000">bolt (axis)</text>

  <!-- short wrench -->
  <rect x="90" y="182" width="120" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="150" y="176" text-anchor="middle" fill="#000">short handle: small r</text>
  <line x1="210" y1="190" x2="210" y2="130" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="210" y="122" text-anchor="middle" fill="#000">push F</text>
  <text x="150" y="210" text-anchor="middle" fill="#000">hard to turn</text>

  <!-- long wrench -->
  <rect x="90" y="262" width="320" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="250" y="256" text-anchor="middle" fill="#000">long handle: big r</text>
  <line x1="410" y1="270" x2="410" y2="210" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="410" y="202" text-anchor="middle" fill="#000">same push F</text>
  <text x="250" y="295" text-anchor="middle" fill="#000">easy to turn -- more torque</text>

  <!-- r distance brace -->
  <line x1="90" y1="320" x2="410" y2="320" stroke="#000" stroke-width="1" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="250" y="335" text-anchor="middle" font-weight="bold" fill="#000">lever arm r: farther from axis = more turning effect</text>
</svg>
