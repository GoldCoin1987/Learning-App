<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="480" height="480" fill="#ffffff"/>
  <text x="240" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Precision vs Accuracy</text>
  <text x="240" y="44" text-anchor="middle" font-size="12" fill="#000">Center of the dartboard = the true value</text>

  <!-- generic board template drawn 4 times -->
  <!-- Board A: top-left, accurate + precise -->
  <g>
    <circle cx="130" cy="150" r="70" fill="none" stroke="#000"/>
    <circle cx="130" cy="150" r="45" fill="none" stroke="#000"/>
    <circle cx="130" cy="150" r="20" fill="none" stroke="#000"/>
    <circle cx="130" cy="150" r="3" fill="#000"/>
    <!-- darts: tight + centered -->
    <circle cx="126" cy="146" r="4" fill="#000"/>
    <circle cx="134" cy="148" r="4" fill="#000"/>
    <circle cx="129" cy="155" r="4" fill="#000"/>
    <circle cx="135" cy="154" r="4" fill="#000"/>
    <text x="130" y="245" text-anchor="middle" font-weight="bold" fill="#000">Accurate AND precise</text>
    <text x="130" y="262" text-anchor="middle" fill="#000">close together, on target</text>
  </g>

  <!-- Board B: top-right, precise not accurate -->
  <g>
    <circle cx="350" cy="150" r="70" fill="none" stroke="#000"/>
    <circle cx="350" cy="150" r="45" fill="none" stroke="#000"/>
    <circle cx="350" cy="150" r="20" fill="none" stroke="#000"/>
    <circle cx="350" cy="150" r="3" fill="#000"/>
    <!-- darts: tight but off to one side -->
    <circle cx="378" cy="120" r="4" fill="#000"/>
    <circle cx="386" cy="124" r="4" fill="#000"/>
    <circle cx="381" cy="130" r="4" fill="#000"/>
    <circle cx="389" cy="131" r="4" fill="#000"/>
    <text x="350" y="245" text-anchor="middle" font-weight="bold" fill="#000">Precise, NOT accurate</text>
    <text x="350" y="262" text-anchor="middle" fill="#000">close together, but off target</text>
  </g>

  <!-- Board C: bottom-left, accurate not precise -->
  <g>
    <circle cx="130" cy="350" r="70" fill="none" stroke="#000"/>
    <circle cx="130" cy="350" r="45" fill="none" stroke="#000"/>
    <circle cx="130" cy="350" r="20" fill="none" stroke="#000"/>
    <circle cx="130" cy="350" r="3" fill="#000"/>
    <!-- darts: spread but average centered -->
    <circle cx="100" cy="330" r="4" fill="#000"/>
    <circle cx="162" cy="338" r="4" fill="#000"/>
    <circle cx="120" cy="380" r="4" fill="#000"/>
    <circle cx="150" cy="372" r="4" fill="#000"/>
    <text x="130" y="445" text-anchor="middle" font-weight="bold" fill="#000">Accurate, NOT precise</text>
    <text x="130" y="462" text-anchor="middle" fill="#000">spread out, but centered overall</text>
  </g>

  <!-- Board D: bottom-right, neither -->
  <g>
    <circle cx="350" cy="350" r="70" fill="none" stroke="#000"/>
    <circle cx="350" cy="350" r="45" fill="none" stroke="#000"/>
    <circle cx="350" cy="350" r="20" fill="none" stroke="#000"/>
    <circle cx="350" cy="350" r="3" fill="#000"/>
    <!-- darts: spread AND off -->
    <circle cx="320" cy="300" r="4" fill="#000"/>
    <circle cx="395" cy="318" r="4" fill="#000"/>
    <circle cx="378" cy="392" r="4" fill="#000"/>
    <circle cx="312" cy="378" r="4" fill="#000"/>
    <text x="350" y="445" text-anchor="middle" font-weight="bold" fill="#000">Neither</text>
    <text x="350" y="462" text-anchor="middle" fill="#000">spread out and off target</text>
  </g>
</svg>
