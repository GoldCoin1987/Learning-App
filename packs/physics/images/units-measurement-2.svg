<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="500" height="360" fill="#ffffff"/>
  <text x="250" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The 7 SI Base Units</text>

  <!-- table -->
  <g stroke="#000" fill="none">
    <rect x="30" y="40" width="440" height="280"/>
    <line x1="30" y1="70" x2="470" y2="70"/>
    <line x1="200" y1="40" x2="200" y2="320"/>
    <line x1="360" y1="40" x2="360" y2="320"/>
    <!-- 7 data rows -->
    <line x1="30" y1="105" x2="470" y2="105"/>
    <line x1="30" y1="140" x2="470" y2="140"/>
    <line x1="30" y1="175" x2="470" y2="175"/>
    <line x1="30" y1="210" x2="470" y2="210"/>
    <line x1="30" y1="245" x2="470" y2="245"/>
    <line x1="30" y1="280" x2="470" y2="280"/>
  </g>

  <!-- headers -->
  <text x="115" y="61" text-anchor="middle" font-weight="bold" fill="#000">Quantity</text>
  <text x="280" y="61" text-anchor="middle" font-weight="bold" fill="#000">Unit name</text>
  <text x="415" y="61" text-anchor="middle" font-weight="bold" fill="#000">Symbol</text>

  <!-- rows: quantity / unit / symbol -->
  <text x="115" y="93" text-anchor="middle" fill="#000">length</text>
  <text x="280" y="93" text-anchor="middle" fill="#000">meter</text>
  <text x="415" y="93" text-anchor="middle" fill="#000">m</text>

  <text x="115" y="128" text-anchor="middle" fill="#000">mass</text>
  <text x="280" y="128" text-anchor="middle" fill="#000">kilogram</text>
  <text x="415" y="128" text-anchor="middle" fill="#000">kg</text>

  <text x="115" y="163" text-anchor="middle" fill="#000">time</text>
  <text x="280" y="163" text-anchor="middle" fill="#000">second</text>
  <text x="415" y="163" text-anchor="middle" fill="#000">s</text>

  <text x="115" y="198" text-anchor="middle" fill="#000">electric current</text>
  <text x="280" y="198" text-anchor="middle" fill="#000">ampere</text>
  <text x="415" y="198" text-anchor="middle" fill="#000">A</text>

  <text x="115" y="233" text-anchor="middle" fill="#000">temperature</text>
  <text x="280" y="233" text-anchor="middle" fill="#000">kelvin</text>
  <text x="415" y="233" text-anchor="middle" fill="#000">K</text>

  <text x="115" y="268" text-anchor="middle" fill="#000">amount of substance</text>
  <text x="280" y="268" text-anchor="middle" fill="#000">mole</text>
  <text x="415" y="268" text-anchor="middle" fill="#000">mol</text>

  <text x="115" y="303" text-anchor="middle" fill="#000">luminous intensity</text>
  <text x="280" y="303" text-anchor="middle" fill="#000">candela</text>
  <text x="415" y="303" text-anchor="middle" fill="#000">cd</text>

  <text x="250" y="343" text-anchor="middle" font-size="12" fill="#000">Every other unit is built by combining these seven.</text>
</svg>
