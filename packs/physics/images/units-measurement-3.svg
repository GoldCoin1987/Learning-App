<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="520" height="300" fill="#ffffff"/>
  <text x="260" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Powers of Ten: Orders of Magnitude</text>

  <!-- number line -->
  <line x1="30" y1="150" x2="490" y2="150" stroke="#000"/>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
  <line x1="490" y1="150" x2="498" y2="150" stroke="#000" marker-end="url(#ar)"/>

  <!-- ticks at each power -->
  <!-- positions: atom 1e-10, hair 1e-4, human 1e0, mountain 1e3, Earth 1e7, galaxy 1e21 -->
  <g stroke="#000">
    <line x1="60" y1="143" x2="60" y2="157"/>
    <line x1="150" y1="143" x2="150" y2="157"/>
    <line x1="230" y1="143" x2="230" y2="157"/>
    <line x1="300" y1="143" x2="300" y2="157"/>
    <line x1="380" y1="143" x2="380" y2="157"/>
    <line x1="460" y1="143" x2="460" y2="157"/>
  </g>

  <!-- power labels above -->
  <text x="60"  y="118" text-anchor="middle" fill="#000">10⁻¹⁰ m</text>
  <text x="150" y="118" text-anchor="middle" fill="#000">10⁻⁴ m</text>
  <text x="230" y="118" text-anchor="middle" fill="#000">10⁰ m</text>
  <text x="300" y="118" text-anchor="middle" fill="#000">10³ m</text>
  <text x="380" y="118" text-anchor="middle" fill="#000">10⁷ m</text>
  <text x="460" y="118" text-anchor="middle" fill="#000">10²¹ m</text>

  <!-- thing labels below -->
  <text x="60"  y="178" text-anchor="middle" fill="#000">atom</text>
  <text x="150" y="178" text-anchor="middle" fill="#000">hair width</text>
  <text x="230" y="178" text-anchor="middle" fill="#000">human</text>
  <text x="300" y="178" text-anchor="middle" fill="#000">mountain</text>
  <text x="380" y="178" text-anchor="middle" fill="#000">Earth</text>
  <text x="460" y="178" text-anchor="middle" fill="#000">galaxy</text>

  <text x="260" y="220" text-anchor="middle" font-size="12" fill="#000">Each step right = 10x bigger.</text>
  <text x="260" y="240" text-anchor="middle" font-size="12" fill="#000">10⁻¹⁰ means 1 divided by 10 ten times (very small);</text>
  <text x="260" y="258" text-anchor="middle" font-size="12" fill="#000">10²¹ means 1 followed by 21 zeros (very large).</text>
</svg>
