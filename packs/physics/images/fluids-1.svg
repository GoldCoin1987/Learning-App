<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Same force, smaller area = more pressure</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- LEFT: large area -->
  <text x="140" y="60" text-anchor="middle" font-weight="bold" fill="#000">Large area (flat foot)</text>
  <line x1="140" y1="80" x2="140" y2="130" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="180" y="108" fill="#000">force = F</text>
  <rect x="70" y="135" width="140" height="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="140" y="151" text-anchor="middle" fill="#000">big contact area</text>
  <line x1="80" y1="170" x2="80" y2="200" stroke="#000" stroke-width="1"/>
  <line x1="115" y1="170" x2="115" y2="200" stroke="#000" stroke-width="1"/>
  <line x1="150" y1="170" x2="150" y2="200" stroke="#000" stroke-width="1"/>
  <line x1="185" y1="170" x2="185" y2="200" stroke="#000" stroke-width="1"/>
  <text x="140" y="220" text-anchor="middle" fill="#000">force spread out</text>
  <text x="140" y="240" text-anchor="middle" font-weight="bold" fill="#000">LOW pressure</text>

  <!-- RIGHT: small area -->
  <text x="420" y="60" text-anchor="middle" font-weight="bold" fill="#000">Small area (sharp point)</text>
  <line x1="420" y1="80" x2="420" y2="130" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="460" y="108" fill="#000">force = F (same)</text>
  <polygon points="410,135 430,135 420,160" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="420" y="178" text-anchor="middle" fill="#000">tiny contact area</text>
  <line x1="420" y1="185" x2="420" y2="215" stroke="#000" stroke-width="3"/>
  <text x="420" y="235" text-anchor="middle" font-weight="bold" fill="#000">HIGH pressure</text>

  <text x="280" y="300" text-anchor="middle" font-size="15" fill="#000">Pressure = Force / Area  (P = F / A)</text>
  <text x="280" y="326" text-anchor="middle" fill="#000">Squeeze the same push into less area and the pressure shoots up.</text>
  <text x="280" y="346" text-anchor="middle" fill="#000">That is why a pin pricks but a flat hand does not.</text>
</svg>
