<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="340" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Angular position &amp; one full turn</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- the wheel -->
  <circle cx="200" cy="190" r="110" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="200" cy="190" r="6" fill="#000"/>
  <text x="200" y="178" text-anchor="middle" fill="#000">axis</text>
  <text x="200" y="218" text-anchor="middle" fill="#000">(center it spins around)</text>

  <!-- reference spoke (start) -->
  <line x1="200" y1="190" x2="310" y2="190" stroke="#000" stroke-width="2"/>
  <text x="318" y="194" fill="#000">start</text>

  <!-- moved spoke (angle theta) -->
  <line x1="200" y1="190" x2="277" y2="112" stroke="#000" stroke-width="2"/>
  <circle cx="277" cy="112" r="7" fill="#000"/>
  <text x="290" y="108" fill="#000">a point on the rim</text>

  <!-- angle arc -->
  <path d="M 255 190 A 55 55 0 0 0 254 152" fill="none" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="270" y="160" fill="#000">angle (theta)</text>

  <!-- rotation arrow around -->
  <path d="M 200 70 A 120 120 0 0 1 320 190" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ah)"/>
  <text x="300" y="60" text-anchor="middle" fill="#000">spins this way</text>

  <text x="200" y="320" text-anchor="middle" font-weight="bold" fill="#000">One full turn = 360 deg = 2 x pi radians</text>
</svg>
