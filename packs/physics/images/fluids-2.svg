<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="380" fill="#ffffff"/>
  <text x="280" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Pressure grows with depth, and Pascal's lift</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- LEFT: tank of water with arrows getting longer deeper -->
  <text x="130" y="50" text-anchor="middle" font-weight="bold" fill="#000">Tank of water</text>
  <rect x="50" y="60" width="160" height="240" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="50" y1="80" x2="210" y2="80" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="225" y="84" fill="#000">surface</text>
  <!-- arrows out of the wall: deeper = longer -->
  <line x1="210" y1="110" x2="235" y2="110" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="210" y1="160" x2="250" y2="160" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="210" y1="215" x2="275" y2="215" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="210" y1="275" x2="305" y2="275" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="310" y="279" fill="#000">most pressure</text>
  <text x="130" y="325" text-anchor="middle" fill="#000">deeper water = longer arrows</text>
  <text x="130" y="345" text-anchor="middle" fill="#000">(more pressure pushing out)</text>

  <!-- RIGHT: hydraulic lift, small piston -> big piston -->
  <text x="430" y="50" text-anchor="middle" font-weight="bold" fill="#000">Hydraulic lift</text>
  <line x1="370" y1="70" x2="370" y2="100" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="370" y="64" text-anchor="middle" fill="#000">small push</text>
  <!-- connected U-shape of fluid -->
  <rect x="358" y="105" width="24" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="358" y="165" width="160" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="478" y="115" width="40" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="370" y="135" text-anchor="middle" fill="#000">narrow</text>
  <text x="498" y="143" text-anchor="middle" fill="#000">wide</text>
  <line x1="498" y1="115" x2="498" y2="75" stroke="#000" stroke-width="5" marker-end="url(#ah)"/>
  <text x="498" y="68" text-anchor="middle" font-weight="bold" fill="#000">BIG lift</text>
  <text x="438" y="250" text-anchor="middle" fill="#000">Push a small piston a little,</text>
  <text x="438" y="270" text-anchor="middle" fill="#000">the wide piston pushes up hard.</text>
  <text x="438" y="295" text-anchor="middle" fill="#000">Pressure is shared equally</text>
  <text x="438" y="313" text-anchor="middle" fill="#000">through the trapped fluid.</text>
</svg>
