<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="340" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Projectile motion: horizontal &amp; vertical are independent</text>

  <defs>
    <marker id="ah3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- ground + launch -->
  <line x1="50" y1="290" x2="540" y2="290" stroke="#000" stroke-width="2"/>
  <text x="500" y="284" fill="#000">x</text>
  <line x1="50" y1="290" x2="50" y2="50" stroke="#000" stroke-width="2"/>
  <text x="40" y="50" text-anchor="end" fill="#000">y</text>

  <!-- the parabolic arc -->
  <path d="M50 290 Q 260 30 470 290" fill="none" stroke="#000" stroke-width="2.5"/>

  <!-- point 1 near start (130,160) -->
  <circle cx="130" cy="170" r="3" fill="#000"/>
  <!-- horizontal velocity (constant) -->
  <line x1="130" y1="170" x2="190" y2="170" stroke="#000" stroke-width="2" marker-end="url(#ah3)"/>
  <text x="150" y="162" fill="#000">vx</text>
  <!-- vertical velocity (upward, shrinking) -->
  <line x1="130" y1="170" x2="130" y2="130" stroke="#000" stroke-width="2" marker-end="url(#ah3)"/>
  <text x="108" y="150" fill="#000">vy</text>

  <!-- top of arc (260,75) vy=0 -->
  <circle cx="260" cy="75" r="3" fill="#000"/>
  <line x1="260" y1="75" x2="320" y2="75" stroke="#000" stroke-width="2" marker-end="url(#ah3)"/>
  <text x="280" y="67" fill="#000">vx</text>
  <text x="240" y="60" fill="#000">vy = 0 at top</text>

  <!-- point 3 near landing (390,170) -->
  <circle cx="390" cy="170" r="3" fill="#000"/>
  <line x1="390" y1="170" x2="450" y2="170" stroke="#000" stroke-width="2" marker-end="url(#ah3)"/>
  <text x="410" y="162" fill="#000">vx</text>
  <line x1="390" y1="170" x2="390" y2="215" stroke="#000" stroke-width="2" marker-end="url(#ah3)"/>
  <text x="396" y="205" fill="#000">vy</text>

  <text x="300" y="320" text-anchor="middle" fill="#000">vx stays constant; gravity changes vy only (down)</text>
</svg>
