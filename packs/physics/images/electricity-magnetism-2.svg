<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="580" height="360" fill="#ffffff"/>
  <text x="290" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Water-pipe analogy for a circuit (V = I R)</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- LEFT: water loop -->
  <text x="160" y="52" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Water loop</text>
  <rect x="40" y="70" width="240" height="230" fill="none" stroke="#000" stroke-width="2"/>
  <!-- pump -->
  <circle cx="40" cy="185" r="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="40" y="190" text-anchor="middle" fill="#000">PUMP</text>
  <text x="40" y="240" text-anchor="middle" fill="#000">= pressure</text>
  <text x="40" y="256" text-anchor="middle" fill="#000">(voltage)</text>
  <!-- narrow section -->
  <rect x="120" y="64" width="80" height="12" fill="#000"/>
  <rect x="120" y="76" width="80" height="12" fill="#000"/>
  <text x="160" y="108" text-anchor="middle" fill="#000">narrow pipe</text>
  <text x="160" y="124" text-anchor="middle" fill="#000">= resistance</text>
  <!-- flow arrows -->
  <line x1="200" y1="290" x2="120" y2="290" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="160" y="284" text-anchor="middle" fill="#000">flow = current</text>

  <!-- RIGHT: electric circuit -->
  <text x="430" y="52" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Electric circuit</text>
  <rect x="320" y="70" width="220" height="230" fill="none" stroke="#000" stroke-width="2"/>
  <!-- battery -->
  <line x1="320" y1="170" x2="320" y2="155" stroke="#000" stroke-width="2"/>
  <line x1="305" y1="170" x2="335" y2="170" stroke="#000" stroke-width="3"/>
  <line x1="312" y1="185" x2="328" y2="185" stroke="#000" stroke-width="6"/>
  <line x1="305" y1="200" x2="335" y2="200" stroke="#000" stroke-width="3"/>
  <line x1="320" y1="215" x2="320" y2="200" stroke="#000" stroke-width="2"/>
  <text x="320" y="245" text-anchor="middle" fill="#000">BATTERY</text>
  <text x="320" y="261" text-anchor="middle" fill="#000">= voltage</text>
  <!-- resistor (zigzag) -->
  <polyline points="360,70 375,60 390,80 405,60 420,80 435,60 450,70" fill="none" stroke="#000" stroke-width="2"/>
  <text x="430" y="108" text-anchor="middle" fill="#000">resistor</text>
  <text x="430" y="124" text-anchor="middle" fill="#000">= resistance</text>
  <!-- current arrow -->
  <line x1="460" y1="290" x2="380" y2="290" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="430" y="284" text-anchor="middle" fill="#000">current I (amps)</text>

  <text x="290" y="332" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">More pressure &#8594; more flow; narrower pipe &#8594; less flow.  V = I &#215; R</text>
  <text x="290" y="350" text-anchor="middle" fill="#000">volts = amps &#215; ohms</text>
</svg>
