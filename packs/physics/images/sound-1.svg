<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Sound is a longitudinal pressure wave in air</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- speaker -->
  <rect x="30" y="120" width="34" height="80" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <path d="M64,140 L90,120 L90,200 L64,180 Z" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="55" y="220" text-anchor="middle" fill="#000">speaker</text>

  <!-- air molecules: bunched (compression) then spread (rarefaction) -->
  <g fill="#000">
    <circle cx="120" cy="160" r="4"/><circle cx="128" cy="145" r="4"/><circle cx="126" cy="175" r="4"/><circle cx="134" cy="160" r="4"/>
    <circle cx="170" cy="160" r="4"/>
    <circle cx="215" cy="160" r="4"/><circle cx="223" cy="145" r="4"/><circle cx="221" cy="175" r="4"/><circle cx="229" cy="160" r="4"/>
    <circle cx="270" cy="160" r="4"/>
    <circle cx="315" cy="160" r="4"/><circle cx="323" cy="145" r="4"/><circle cx="321" cy="175" r="4"/><circle cx="329" cy="160" r="4"/>
    <circle cx="370" cy="160" r="4"/>
    <circle cx="415" cy="160" r="4"/><circle cx="423" cy="145" r="4"/><circle cx="421" cy="175" r="4"/><circle cx="429" cy="160" r="4"/>
    <circle cx="475" cy="160" r="4"/>
  </g>

  <!-- labels for compression / rarefaction -->
  <line x1="125" y1="195" x2="125" y2="215" stroke="#000" stroke-width="1"/>
  <text x="125" y="232" text-anchor="middle" fill="#000">compression</text>
  <text x="125" y="248" text-anchor="middle" fill="#000">(air squeezed,</text>
  <text x="125" y="263" text-anchor="middle" fill="#000">high pressure)</text>

  <line x1="170" y1="195" x2="170" y2="215" stroke="#000" stroke-width="1"/>
  <text x="200" y="232" text-anchor="middle" fill="#000">rarefaction</text>
  <text x="200" y="248" text-anchor="middle" fill="#000">(air spread out,</text>
  <text x="200" y="263" text-anchor="middle" fill="#000">low pressure)</text>

  <!-- direction of travel -->
  <line x1="120" y1="100" x2="480" y2="100" stroke="#000" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="300" y="92" text-anchor="middle" fill="#000">wave travels this way; air molecules jiggle back and forth ALONG this same direction</text>

  <text x="280" y="300" text-anchor="middle" fill="#000">No air (or other matter) means no compressions to pass along, so there is NO sound in a vacuum.</text>
</svg>
