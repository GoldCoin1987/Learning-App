<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="400" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Waves adding up: constructive vs destructive</text>

  <defs>
    <marker id="ah4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- LEFT: constructive -->
  <text x="150" y="52" text-anchor="middle" font-weight="bold" fill="#000">Constructive (in step)</text>
  <line x1="30" y1="90" x2="270" y2="90" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M30,90 Q60,65 90,90 T150,90 T210,90 T270,90" fill="none" stroke="#000" stroke-width="1.5"/>
  <line x1="30" y1="150" x2="270" y2="150" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M30,150 Q60,125 90,150 T150,150 T210,150 T270,150" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="285" y="120" text-anchor="middle" fill="#000">+</text>
  <line x1="30" y1="230" x2="270" y2="230" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M30,230 Q60,180 90,230 T150,230 T210,230 T270,230" fill="none" stroke="#000" stroke-width="2.5"/>
  <text x="150" y="265" text-anchor="middle" fill="#000">= bigger wave</text>

  <!-- RIGHT: destructive -->
  <text x="410" y="52" text-anchor="middle" font-weight="bold" fill="#000">Destructive (out of step)</text>
  <line x1="290" y1="90" x2="530" y2="90" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M290,90 Q320,65 350,90 T410,90 T470,90 T530,90" fill="none" stroke="#000" stroke-width="1.5"/>
  <line x1="290" y1="150" x2="530" y2="150" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M290,150 Q320,175 350,150 T410,150 T470,150 T530,150" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="545" y="120" text-anchor="middle" fill="#000">+</text>
  <line x1="290" y1="230" x2="530" y2="230" stroke="#000" stroke-width="2.5"/>
  <text x="410" y="265" text-anchor="middle" fill="#000">= flat (they cancel)</text>

  <!-- standing wave -->
  <text x="280" y="305" text-anchor="middle" font-weight="bold" fill="#000">Standing wave (nodes stay still, antinodes swing biggest)</text>
  <line x1="80" y1="345" x2="480" y2="345" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M80,345 Q130,315 180,345 Q230,375 280,345 Q330,315 380,345 Q430,375 480,345" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M80,345 Q130,375 180,345 Q230,315 280,345 Q330,375 380,345 Q430,315 480,345" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="80" cy="345" r="3" fill="#000"/>
  <circle cx="180" cy="345" r="3" fill="#000"/>
  <circle cx="280" cy="345" r="3" fill="#000"/>
  <circle cx="380" cy="345" r="3" fill="#000"/>
  <circle cx="480" cy="345" r="3" fill="#000"/>
  <text x="180" y="392" text-anchor="middle" fill="#000">node (no motion)</text>
  <text x="330" y="392" text-anchor="middle" fill="#000">antinode (max motion)</text>
</svg>
