<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Newton's cannonball: an orbit is "falling around"</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Earth -->
  <circle cx="250" cy="210" r="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="250" y="214" text-anchor="middle" fill="#000">Earth</text>

  <!-- mountain / cannon at top -->
  <path d="M 230 122 L 250 100 L 270 122 Z" fill="#000"/>
  <text x="250" y="92" text-anchor="middle" fill="#000">cannon</text>

  <!-- slow shot: falls to ground -->
  <path d="M 270 110 Q 330 130 320 200" fill="none" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="345" y="160" fill="#000">slow: falls down</text>

  <!-- faster shot: lands farther -->
  <path d="M 270 110 Q 400 140 410 250" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="425" y="240" fill="#000">faster: lands farther</text>

  <!-- orbit: just right, circles -->
  <circle cx="250" cy="210" r="118" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="2 3"/>
  <text x="250" y="350" text-anchor="middle" font-weight="bold" fill="#000">Fast enough: it keeps falling but never lands = ORBIT</text>
</svg>
