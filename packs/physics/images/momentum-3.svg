<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="340" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Conservation of momentum: total before = total after</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- BEFORE -->
  <text x="60" y="70" text-anchor="middle" font-weight="bold" fill="#000">BEFORE</text>
  <line x1="20" y1="120" x2="520" y2="120" stroke="#000" stroke-width="2"/>
  <rect x="120" y="80" width="60" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="150" y="105" text-anchor="middle" fill="#000">A</text>
  <line x1="185" y1="65" x2="245" y2="65" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="215" y="58" text-anchor="middle" fill="#000">p = +6</text>
  <rect x="330" y="80" width="60" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="105" text-anchor="middle" fill="#000">B</text>
  <text x="360" y="58" text-anchor="middle" fill="#000">p = 0 (at rest)</text>
  <text x="270" y="142" text-anchor="middle" font-weight="bold" fill="#000">Total = +6 + 0 = +6 kg*m/s</text>

  <!-- AFTER -->
  <text x="60" y="200" text-anchor="middle" font-weight="bold" fill="#000">AFTER</text>
  <line x1="20" y1="250" x2="520" y2="250" stroke="#000" stroke-width="2"/>
  <rect x="120" y="210" width="60" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="150" y="235" text-anchor="middle" fill="#000">A</text>
  <line x1="185" y1="195" x2="215" y2="195" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="200" y="188" text-anchor="middle" fill="#000">p = +2</text>
  <rect x="330" y="210" width="60" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="235" text-anchor="middle" fill="#000">B</text>
  <line x1="395" y1="195" x2="455" y2="195" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="425" y="188" text-anchor="middle" fill="#000">p = +4</text>
  <text x="270" y="272" text-anchor="middle" font-weight="bold" fill="#000">Total = +2 + +4 = +6 kg*m/s</text>

  <text x="270" y="305" text-anchor="middle" fill="#000">No outside push (closed system) -> the total never changes</text>
  <text x="270" y="323" text-anchor="middle" fill="#000">A slowed down, B sped up, but the SUM stayed +6</text>
</svg>
