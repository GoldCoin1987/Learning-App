<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="340" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Momentum p = mass x velocity</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- divider -->
  <line x1="270" y1="50" x2="270" y2="320" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- LEFT: heavy slow truck -->
  <text x="135" y="68" text-anchor="middle" font-weight="bold" fill="#000">Heavy + slow</text>
  <line x1="20" y1="200" x2="250" y2="200" stroke="#000" stroke-width="2"/>
  <rect x="60" y="140" width="120" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="175" text-anchor="middle" fill="#000">m = 4000 kg</text>
  <circle cx="90" cy="200" r="12" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="150" cy="200" r="12" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="185" y1="120" x2="215" y2="120" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="200" y="112" text-anchor="middle" fill="#000">v = 2 m/s</text>
  <text x="135" y="240" text-anchor="middle" font-weight="bold" fill="#000">p = 4000 x 2</text>
  <text x="135" y="258" text-anchor="middle" font-weight="bold" fill="#000">= 8000 kg*m/s</text>

  <!-- RIGHT: light fast car -->
  <text x="405" y="68" text-anchor="middle" font-weight="bold" fill="#000">Light + fast</text>
  <line x1="290" y1="200" x2="520" y2="200" stroke="#000" stroke-width="2"/>
  <rect x="345" y="160" width="70" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="380" y="185" text-anchor="middle" fill="#000">m = 1000 kg</text>
  <circle cx="365" cy="200" r="10" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="400" cy="200" r="10" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="120" x2="500" y2="120" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="460" y="112" text-anchor="middle" fill="#000">v = 8 m/s</text>
  <text x="405" y="240" text-anchor="middle" font-weight="bold" fill="#000">p = 1000 x 8</text>
  <text x="405" y="258" text-anchor="middle" font-weight="bold" fill="#000">= 8000 kg*m/s</text>

  <text x="270" y="300" text-anchor="middle" fill="#000">Same momentum -> both equally "hard to stop"</text>
  <text x="270" y="318" text-anchor="middle" fill="#000">Longer arrow = more velocity; bigger box = more mass</text>
</svg>
