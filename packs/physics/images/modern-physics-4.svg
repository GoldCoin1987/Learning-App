<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The double-slit experiment: a striped pattern of probability</text>

  <!-- source -->
  <circle cx="55" cy="180" r="10" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="55" y="215" text-anchor="middle" font-size="10" fill="#000">source</text>
  <text x="55" y="229" text-anchor="middle" font-size="10" fill="#000">(one at a time)</text>

  <!-- barrier with two slits -->
  <rect x="200" y="70" width="14" height="92" fill="#000"/>
  <rect x="200" y="172" width="14" height="16" fill="#ffffff" stroke="#000" stroke-width="1"/>
  <rect x="200" y="198" width="14" height="92" fill="#000"/>
  <rect x="200" y="162" width="14" height="46" fill="#ffffff" stroke="#000" stroke-width="1"/>
  <!-- redraw slits as gaps -->
  <rect x="200" y="70" width="14" height="86" fill="#000"/>
  <rect x="200" y="170" width="14" height="20" fill="#ffffff"/>
  <rect x="200" y="204" width="14" height="86" fill="#000"/>
  <text x="207" y="60" text-anchor="middle" font-size="10" fill="#000">barrier with two slits</text>

  <!-- paths to slits -->
  <line x1="65" y1="180" x2="200" y2="180" stroke="#000" stroke-width="1.5"/>
  <line x1="200" y1="180" x2="200" y2="180" stroke="#000" stroke-width="1"/>

  <!-- waves spreading from each slit -->
  <path d="M214,180 q30,-30 60,0 q30,30 60,0" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M214,180 q30,30 60,0 q30,-30 60,0" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- detection screen -->
  <line x1="470" y1="60" x2="470" y2="300" stroke="#000" stroke-width="2"/>
  <text x="470" y="50" text-anchor="middle" font-size="10" fill="#000">screen</text>

  <!-- interference bands (bars of varying length = hit count) -->
  <rect x="478" y="95" width="20" height="10" fill="#000"/>
  <rect x="478" y="120" width="40" height="10" fill="#000"/>
  <rect x="478" y="145" width="60" height="10" fill="#000"/>
  <rect x="478" y="172" width="34" height="10" fill="#000"/>
  <rect x="478" y="180" width="34" height="10" fill="#000"/>
  <rect x="478" y="205" width="60" height="10" fill="#000"/>
  <rect x="478" y="230" width="40" height="10" fill="#000"/>
  <rect x="478" y="255" width="20" height="10" fill="#000"/>
  <text x="520" y="290" text-anchor="middle" font-size="10" fill="#000">bands</text>

  <text x="280" y="325" text-anchor="middle" font-size="11" fill="#000">Even sent one at a time, particles build up striped bands - landing</text>
  <text x="280" y="343" text-anchor="middle" font-size="11" fill="#000">where probability is high, never where the waves cancel out.</text>
</svg>
