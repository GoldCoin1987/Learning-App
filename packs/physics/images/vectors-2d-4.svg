<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="480" height="360" fill="#ffffff"/>
  <text x="240" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Uniform circular motion</text>

  <defs>
    <marker id="ah4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- circle path -->
  <circle cx="240" cy="190" r="120" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="6 5"/>
  <circle cx="240" cy="190" r="3" fill="#000"/>
  <text x="248" y="200" fill="#000">center</text>

  <!-- object on the circle at top (240,70) -->
  <circle cx="240" cy="70" r="6" fill="#000"/>

  <!-- velocity tangent (horizontal at top) -->
  <line x1="240" y1="70" x2="350" y2="70" stroke="#000" stroke-width="3" marker-end="url(#ah4)"/>
  <text x="300" y="62" fill="#000" font-weight="bold">velocity v (tangent)</text>

  <!-- centripetal acceleration pointing to center (downward) -->
  <line x1="240" y1="70" x2="240" y2="150" stroke="#000" stroke-width="3" marker-end="url(#ah4)"/>
  <text x="248" y="120" fill="#000" font-weight="bold">acceleration a (to center)</text>

  <!-- object on the right side to reinforce tangent direction -->
  <circle cx="360" cy="190" r="6" fill="#000"/>
  <line x1="360" y1="190" x2="360" y2="300" stroke="#000" stroke-width="3" marker-end="url(#ah4)"/>
  <text x="366" y="260" fill="#000">v</text>
  <line x1="360" y1="190" x2="280" y2="190" stroke="#000" stroke-width="3" marker-end="url(#ah4)"/>
  <text x="300" y="182" fill="#000">a</text>

  <text x="240" y="345" text-anchor="middle" fill="#000">speed constant; a always points inward toward the center</text>
</svg>
