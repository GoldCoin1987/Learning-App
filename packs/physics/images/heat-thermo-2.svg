<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="600" height="320" fill="#ffffff"/>
  <text x="300" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Three ways heat travels</text>

  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Panel 1: conduction -->
  <rect x="20" y="50" width="170" height="220" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="105" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">CONDUCTION</text>
  <text x="105" y="90" text-anchor="middle" fill="#000">through touching solids</text>
  <!-- metal rod in flame -->
  <rect x="45" y="140" width="120" height="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="60" y="135" text-anchor="middle" fill="#000">flame</text>
  <path d="M55,168 Q50,150 60,150 Q58,160 65,150 Q70,162 60,168 Z" fill="#000"/>
  <line x1="70" y1="150" x2="160" y2="150" stroke="#000" stroke-width="1" marker-end="url(#ah2)"/>
  <text x="105" y="195" text-anchor="middle" fill="#000">heat passes spoon-</text>
  <text x="105" y="210" text-anchor="middle" fill="#000">to-spoon along metal</text>
  <text x="105" y="240" text-anchor="middle" fill="#000">metal = conductor</text>
  <text x="105" y="256" text-anchor="middle" fill="#000">wood = insulator</text>

  <!-- Panel 2: convection -->
  <rect x="215" y="50" width="170" height="220" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="300" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">CONVECTION</text>
  <text x="300" y="90" text-anchor="middle" fill="#000">moving fluids (liquid/gas)</text>
  <!-- pot -->
  <rect x="255" y="170" width="90" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="300" y="248" text-anchor="middle" fill="#000">heat source below</text>
  <!-- circulation arrows -->
  <path d="M275,225 L275,180" stroke="#000" stroke-width="1.5" marker-end="url(#ah2)"/>
  <path d="M325,180 L325,225" stroke="#000" stroke-width="1.5" marker-end="url(#ah2)"/>
  <text x="265" y="160" text-anchor="middle" fill="#000">hot rises</text>
  <text x="335" y="160" text-anchor="middle" fill="#000">cool sinks</text>
  <text x="300" y="118" text-anchor="middle" fill="#000">warm fluid rises,</text>
  <text x="300" y="133" text-anchor="middle" fill="#000">cool sinks: a loop</text>

  <!-- Panel 3: radiation -->
  <rect x="410" y="50" width="170" height="220" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="495" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">RADIATION</text>
  <text x="495" y="90" text-anchor="middle" fill="#000">waves, no medium needed</text>
  <circle cx="455" cy="150" r="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="455" y="185" text-anchor="middle" fill="#000">Sun</text>
  <line x1="478" y1="150" x2="545" y2="150" stroke="#000" stroke-width="1.5" marker-end="url(#ah2)"/>
  <line x1="476" y1="138" x2="543" y2="125" stroke="#000" stroke-width="1.5" marker-end="url(#ah2)"/>
  <line x1="476" y1="162" x2="543" y2="175" stroke="#000" stroke-width="1.5" marker-end="url(#ah2)"/>
  <text x="495" y="215" text-anchor="middle" fill="#000">reaches us across</text>
  <text x="495" y="230" text-anchor="middle" fill="#000">empty space</text>
</svg>
