<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="580" height="360" fill="#ffffff"/>
  <text x="290" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Series vs Parallel circuits</text>

  <!-- battery symbol helper drawn inline both sides -->
  <!-- LEFT: SERIES -->
  <text x="150" y="52" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">SERIES (one loop)</text>
  <!-- loop wire -->
  <rect x="50" y="70" width="200" height="180" fill="none" stroke="#000" stroke-width="2"/>
  <!-- battery on left side -->
  <line x1="38" y1="160" x2="62" y2="160" stroke="#000" stroke-width="3"/>
  <line x1="44" y1="175" x2="56" y2="175" stroke="#000" stroke-width="6"/>
  <text x="30" y="195" text-anchor="middle" fill="#000">battery</text>
  <!-- bulb 1 on top -->
  <circle cx="120" cy="70" r="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="110" y1="60" x2="130" y2="80" stroke="#000"/>
  <line x1="130" y1="60" x2="110" y2="80" stroke="#000"/>
  <!-- bulb 2 on top -->
  <circle cx="200" cy="70" r="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="190" y1="60" x2="210" y2="80" stroke="#000"/>
  <line x1="210" y1="60" x2="190" y2="80" stroke="#000"/>
  <text x="160" y="120" text-anchor="middle" fill="#000">same current through</text>
  <text x="160" y="136" text-anchor="middle" fill="#000">BOTH bulbs</text>
  <text x="160" y="200" text-anchor="middle" fill="#000">voltage SPLITS</text>
  <text x="160" y="216" text-anchor="middle" fill="#000">between bulbs</text>
  <text x="160" y="276" text-anchor="middle" fill="#000">one breaks &#8594; all go dark</text>

  <!-- RIGHT: PARALLEL -->
  <text x="430" y="52" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">PARALLEL (branches)</text>
  <rect x="330" y="70" width="200" height="180" fill="none" stroke="#000" stroke-width="2"/>
  <!-- battery -->
  <line x1="318" y1="160" x2="342" y2="160" stroke="#000" stroke-width="3"/>
  <line x1="324" y1="175" x2="336" y2="175" stroke="#000" stroke-width="6"/>
  <text x="310" y="195" text-anchor="middle" fill="#000">battery</text>
  <!-- two branches: vertical rungs -->
  <line x1="410" y1="70" x2="410" y2="250" stroke="#000" stroke-width="2"/>
  <line x1="470" y1="70" x2="470" y2="250" stroke="#000" stroke-width="2"/>
  <!-- bulbs on branches -->
  <circle cx="410" cy="160" r="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="400" y1="150" x2="420" y2="170" stroke="#000"/>
  <line x1="420" y1="150" x2="400" y2="170" stroke="#000"/>
  <circle cx="470" cy="160" r="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="460" y1="150" x2="480" y2="170" stroke="#000"/>
  <line x1="480" y1="150" x2="460" y2="170" stroke="#000"/>
  <text x="430" y="120" text-anchor="middle" fill="#000">EACH branch gets</text>
  <text x="430" y="290" text-anchor="middle" fill="#000">FULL battery voltage</text>
  <text x="430" y="306" text-anchor="middle" fill="#000">one breaks &#8594; other stays lit</text>

  <text x="290" y="345" text-anchor="middle" font-size="13" fill="#000">Home wiring is PARALLEL: every outlet gets full voltage; devices work independently.</text>
</svg>
