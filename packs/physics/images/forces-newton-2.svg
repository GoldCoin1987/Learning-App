<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="360" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Newton's 2nd Law: F = m x a</text>

  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Row 1: bigger force, same mass => bigger acceleration -->
  <text x="20" y="70" fill="#000" font-weight="bold">Same box, bigger push:</text>
  <rect x="60" y="85" width="50" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="85" y="115" text-anchor="middle" fill="#000">m</text>
  <line x1="115" y1="110" x2="200" y2="110" stroke="#000" stroke-width="4" marker-end="url(#ah2)"/>
  <text x="240" y="114" fill="#000">big F  ->  big a (speeds up fast)</text>

  <rect x="60" y="155" width="50" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="85" y="185" text-anchor="middle" fill="#000">m</text>
  <line x1="115" y1="180" x2="150" y2="180" stroke="#000" stroke-width="4" marker-end="url(#ah2)"/>
  <text x="240" y="184" fill="#000">small F  ->  small a (speeds up slowly)</text>

  <line x1="20" y1="225" x2="520" y2="225" stroke="#bbbbbb" stroke-width="1"/>

  <!-- Row 2: same force, bigger mass => smaller acceleration -->
  <text x="20" y="255" fill="#000" font-weight="bold">Same push, heavier box:</text>
  <rect x="60" y="270" width="50" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="85" y="300" text-anchor="middle" fill="#000">m</text>
  <line x1="115" y1="295" x2="190" y2="295" stroke="#000" stroke-width="4" marker-end="url(#ah2)"/>
  <text x="260" y="299" fill="#000">small m  ->  big a</text>

  <rect x="350" y="262" width="70" height="66" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="385" y="300" text-anchor="middle" fill="#000">2m</text>
  <line x1="425" y1="295" x2="465" y2="295" stroke="#000" stroke-width="4" marker-end="url(#ah2)"/>
  <text x="350" y="345" fill="#000">big m -> small a</text>
</svg>
