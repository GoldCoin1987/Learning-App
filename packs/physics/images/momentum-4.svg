<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="340" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Elastic vs Inelastic collisions</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <line x1="270" y1="46" x2="270" y2="320" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- LEFT: elastic, bounce apart -->
  <text x="135" y="64" text-anchor="middle" font-weight="bold" fill="#000">ELASTIC: bounce apart</text>
  <text x="135" y="82" text-anchor="middle" fill="#000">(billiard balls)</text>
  <line x1="20" y1="150" x2="250" y2="150" stroke="#000" stroke-width="2"/>
  <circle cx="90" cy="135" r="15" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="170" cy="135" r="15" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="40" y1="135" x2="68" y2="135" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="135" y="180" text-anchor="middle" fill="#000">collide, then...</text>
  <line x1="20" y1="220" x2="250" y2="220" stroke="#000" stroke-width="2"/>
  <circle cx="80" cy="205" r="15" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="180" cy="205" r="15" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="78" y1="178" x2="50" y2="178" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <line x1="182" y1="178" x2="215" y2="178" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="135" y="260" text-anchor="middle" font-weight="bold" fill="#000">KE conserved</text>
  <text x="135" y="278" text-anchor="middle" fill="#000">(no energy lost)</text>

  <!-- RIGHT: inelastic, stick together -->
  <text x="405" y="64" text-anchor="middle" font-weight="bold" fill="#000">INELASTIC: stick together</text>
  <text x="405" y="82" text-anchor="middle" fill="#000">(clay lumps, train cars)</text>
  <line x1="290" y1="150" x2="520" y2="150" stroke="#000" stroke-width="2"/>
  <rect x="345" y="120" width="30" height="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="430" y="120" width="30" height="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="310" y1="135" x2="340" y2="135" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="405" y="180" text-anchor="middle" fill="#000">collide, then...</text>
  <line x1="290" y1="220" x2="520" y2="220" stroke="#000" stroke-width="2"/>
  <rect x="390" y="190" width="60" height="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="455" y1="178" x2="485" y2="178" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="405" y="260" text-anchor="middle" font-weight="bold" fill="#000">KE NOT conserved</text>
  <text x="405" y="278" text-anchor="middle" fill="#000">(lost to heat/sound/dents)</text>

  <text x="270" y="312" text-anchor="middle" font-weight="bold" fill="#000">Momentum is conserved in BOTH cases</text>
  <text x="270" y="330" text-anchor="middle" fill="#000">Only kinetic energy (KE) differs between the two</text>
</svg>
