<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="340" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Adding vectors tip-to-tail + x/y components</text>

  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="70" y1="300" x2="70" y2="50" stroke="#000" stroke-width="2"/>
  <line x1="70" y1="300" x2="500" y2="300" stroke="#000" stroke-width="2"/>
  <text x="505" y="304" fill="#000">x</text>
  <text x="66" y="46" text-anchor="end" fill="#000">y</text>

  <!-- vector A: origin to (220,300) horizontal-ish then B -->
  <!-- A from (70,300) to (250,220) -->
  <line x1="70" y1="300" x2="250" y2="220" stroke="#000" stroke-width="3" marker-end="url(#ah2)"/>
  <text x="150" y="248" fill="#000" font-weight="bold">A</text>

  <!-- B starts at tip of A (250,220) to (400,120) -->
  <line x1="250" y1="220" x2="400" y2="120" stroke="#000" stroke-width="3" marker-end="url(#ah2)"/>
  <text x="335" y="160" fill="#000" font-weight="bold">B</text>

  <!-- resultant R from origin to tip of B -->
  <line x1="70" y1="300" x2="400" y2="120" stroke="#000" stroke-width="3" stroke-dasharray="7 4" marker-end="url(#ah2)"/>
  <text x="215" y="195" fill="#000" font-weight="bold">R = A + B</text>

  <!-- x and y components of R (dashed thin) -->
  <line x1="70" y1="300" x2="400" y2="300" stroke="#000" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="400" y1="300" x2="400" y2="120" stroke="#000" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="235" y="318" fill="#000">x-component (Rx)</text>
  <text x="406" y="215" fill="#000">y-component (Ry)</text>
</svg>
