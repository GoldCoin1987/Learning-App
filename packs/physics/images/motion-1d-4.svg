<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="420" height="340" fill="#ffffff"/>
  <text x="210" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Free Fall Strobe: gaps grow each second</text>

  <!-- vertical guide line -->
  <line x1="120" y1="45" x2="120" y2="310" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ball positions: distance grows as t^2 (0, 5, 20, 45 m scaled) -->
  <circle cx="120" cy="55" r="9" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="120" cy="95" r="9" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="120" cy="175" r="9" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="120" cy="295" r="9" fill="#000" stroke="#000" stroke-width="2"/>

  <!-- time labels -->
  <g fill="#000" text-anchor="start" font-size="12">
    <text x="140" y="59">t = 0 s, fallen 0 m (released)</text>
    <text x="140" y="99">t = 1 s, fallen 5 m</text>
    <text x="140" y="179">t = 2 s, fallen 20 m</text>
    <text x="140" y="299">t = 3 s, fallen 45 m</text>
  </g>

  <!-- gap brackets -->
  <g stroke="#000" stroke-width="1" fill="none">
    <line x1="100" y1="55" x2="100" y2="95"/>
    <line x1="100" y1="95" x2="100" y2="175"/>
    <line x1="100" y1="175" x2="100" y2="295"/>
  </g>
  <g fill="#000" text-anchor="end" font-size="11">
    <text x="96" y="79">5 m</text>
    <text x="96" y="139">15 m</text>
    <text x="96" y="239">25 m</text>
  </g>

  <text x="210" y="328" text-anchor="middle" fill="#000">g approx 9.8 m/s^2: speed rises, so each second covers more.</text>
</svg>
