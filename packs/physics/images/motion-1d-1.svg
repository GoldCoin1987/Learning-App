<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="520" height="300" fill="#ffffff"/>
  <text x="260" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Distance vs Displacement (out and back)</text>

  <!-- number line -->
  <line x1="40" y1="120" x2="480" y2="120" stroke="#000" stroke-width="2"/>
  <g stroke="#000" stroke-width="1" fill="#000" text-anchor="middle">
    <line x1="80" y1="113" x2="80" y2="127"/>
    <text x="80" y="145">0 m</text>
    <line x1="180" y1="113" x2="180" y2="127"/>
    <text x="180" y="145">100 m</text>
    <line x1="280" y1="113" x2="280" y2="127"/>
    <text x="280" y="145">200 m</text>
    <line x1="380" y1="113" x2="380" y2="127"/>
    <text x="380" y="145">300 m</text>
  </g>

  <!-- trip out: 0 to 300 -->
  <path d="M80 100 L380 100" stroke="#000" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="230" y="92" text-anchor="middle" fill="#000">walk out: 300 m east</text>

  <!-- trip back: 300 to 100 -->
  <path d="M380 160 L180 160" stroke="#000" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="285" y="178" text-anchor="middle" fill="#000">walk back: 200 m west</text>

  <!-- totals -->
  <text x="40" y="215" fill="#000">Total distance travelled = 300 + 200 = 500 m (a length, no direction)</text>
  <text x="40" y="240" fill="#000">Displacement = start to end = 100 m east (straight-line, with direction)</text>
  <text x="40" y="265" fill="#000">Start dot at 0 m, End dot at 100 m.</text>

  <circle cx="80" cy="120" r="4" fill="#000"/>
  <circle cx="180" cy="120" r="4" fill="#000"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
</svg>
