<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The electromagnetic spectrum (visible light is a tiny slice)</text>

  <!-- main spectrum bar -->
  <rect x="40" y="60" width="480" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="160" y1="60" x2="160" y2="100" stroke="#000" stroke-width="1.5"/>
  <line x1="200" y1="60" x2="200" y2="100" stroke="#000" stroke-width="1.5"/>
  <line x1="220" y1="60" x2="220" y2="100" stroke="#000" stroke-width="1.5"/>
  <line x1="240" y1="60" x2="240" y2="100" stroke="#000" stroke-width="1.5"/>
  <line x1="360" y1="60" x2="360" y2="100" stroke="#000" stroke-width="1.5"/>

  <text x="100" y="85" text-anchor="middle" font-size="11" fill="#000">Radio</text>
  <text x="180" y="85" text-anchor="middle" font-size="10" fill="#000">Micro</text>
  <text x="210" y="85" text-anchor="middle" font-size="9" fill="#000">IR</text>
  <text x="230" y="116" text-anchor="middle" font-size="9" fill="#000">visible</text>
  <text x="300" y="85" text-anchor="middle" font-size="10" fill="#000">UV</text>
  <text x="400" y="85" text-anchor="middle" font-size="11" fill="#000">X-ray</text>
  <text x="490" y="85" text-anchor="middle" font-size="10" fill="#000">Gamma</text>

  <text x="50" y="135" font-size="11" fill="#000">long wavelength, low energy</text>
  <text x="510" y="135" text-anchor="end" font-size="11" fill="#000">short wavelength, high energy</text>

  <!-- zoom on the visible slice -->
  <line x1="220" y1="100" x2="120" y2="180" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="240" y1="100" x2="440" y2="180" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="120" y="180" width="320" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Visible light expanded</text>
  <line x1="173" y1="180" x2="173" y2="224" stroke="#000" stroke-width="1"/>
  <line x1="226" y1="180" x2="226" y2="224" stroke="#000" stroke-width="1"/>
  <line x1="280" y1="180" x2="280" y2="224" stroke="#000" stroke-width="1"/>
  <line x1="333" y1="180" x2="333" y2="224" stroke="#000" stroke-width="1"/>
  <line x1="386" y1="180" x2="386" y2="224" stroke="#000" stroke-width="1"/>
  <text x="146" y="207" text-anchor="middle" font-size="10" fill="#000">red</text>
  <text x="200" y="207" text-anchor="middle" font-size="9" fill="#000">orange</text>
  <text x="253" y="207" text-anchor="middle" font-size="9" fill="#000">yellow</text>
  <text x="306" y="207" text-anchor="middle" font-size="10" fill="#000">green</text>
  <text x="359" y="207" text-anchor="middle" font-size="10" fill="#000">blue</text>
  <text x="413" y="207" text-anchor="middle" font-size="9" fill="#000">violet</text>
  <text x="130" y="244" font-size="10" fill="#000">~700 nm (longer)</text>
  <text x="430" y="244" text-anchor="end" font-size="10" fill="#000">~400 nm (shorter)</text>

  <text x="280" y="280" text-anchor="middle" font-size="11" fill="#000">All travel at the same speed in a vacuum: about 300,000 km per second</text>
  <text x="280" y="300" text-anchor="middle" font-size="11" fill="#000">They differ only in wavelength (and so in energy)</text>
</svg>
