<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Inside an atom (mostly empty space)</text>

  <!-- electron cloud boundary -->
  <circle cx="260" cy="190" r="140" fill="#ffffff" stroke="#000" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="260" y="60" text-anchor="middle" font-size="12" fill="#000">electron "cloud" (where electrons are likely)</text>

  <!-- nucleus (tiny, exaggerated for visibility) -->
  <circle cx="260" cy="190" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="253" cy="184" r="6" fill="#000"/>
  <circle cx="267" cy="185" r="6" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <circle cx="258" cy="197" r="6" fill="#000"/>
  <circle cx="270" cy="196" r="6" fill="#ffffff" stroke="#000" stroke-width="1.5"/>

  <!-- electrons as dots scattered -->
  <circle cx="170" cy="150" r="4" fill="#000"/>
  <circle cx="360" cy="160" r="4" fill="#000"/>
  <circle cx="200" cy="280" r="4" fill="#000"/>
  <circle cx="330" cy="270" r="4" fill="#000"/>
  <circle cx="140" cy="220" r="4" fill="#000"/>
  <circle cx="380" cy="230" r="4" fill="#000"/>

  <!-- labels -->
  <line x1="260" y1="190" x2="430" y2="120" stroke="#000" stroke-width="1"/>
  <text x="435" y="118" font-size="11" fill="#000">nucleus: protons (+)</text>
  <text x="435" y="133" font-size="11" fill="#000">and neutrons (no charge)</text>

  <line x1="360" y1="160" x2="450" y2="180" stroke="#000" stroke-width="1"/>
  <text x="455" y="183" font-size="11" fill="#000">electron (-)</text>

  <text x="40" y="320" font-size="11" fill="#000">The nucleus is drawn far too big here.</text>
  <text x="40" y="338" font-size="11" fill="#000">If the atom were a stadium, the nucleus would be a pea at the center.</text>
</svg>
