<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A pendulum: one full swing = one period (T)</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- pivot -->
  <line x1="120" y1="60" x2="440" y2="60" stroke="#000" stroke-width="3"/>
  <circle cx="280" cy="60" r="4" fill="#000"/>
  <text x="280" y="50" text-anchor="middle" fill="#000">pivot (fixed point)</text>

  <!-- string and bob at center (rest) -->
  <line x1="280" y1="60" x2="280" y2="230" stroke="#000" stroke-width="1" stroke-dasharray="4 4"/>
  <circle cx="280" cy="235" r="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="262" text-anchor="middle" fill="#000">rest (middle)</text>

  <!-- left extreme -->
  <line x1="280" y1="60" x2="170" y2="200" stroke="#000" stroke-width="2"/>
  <circle cx="170" cy="200" r="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="150" y="232" text-anchor="middle" fill="#000">far left</text>

  <!-- right extreme -->
  <line x1="280" y1="60" x2="390" y2="200" stroke="#000" stroke-width="2"/>
  <circle cx="390" cy="200" r="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="410" y="232" text-anchor="middle" fill="#000">far right</text>

  <!-- amplitude -->
  <line x1="280" y1="300" x2="170" y2="300" stroke="#000" stroke-width="1" marker-end="url(#ah)"/>
  <text x="225" y="293" text-anchor="middle" fill="#000">amplitude</text>
  <line x1="280" y1="290" x2="280" y2="312" stroke="#000" stroke-width="1"/>
  <line x1="170" y1="290" x2="170" y2="312" stroke="#000" stroke-width="1"/>

  <text x="280" y="335" text-anchor="middle" fill="#000">One period (T): rest to far right, back through rest to far left, back to rest.</text>
  <text x="280" y="354" text-anchor="middle" fill="#000">Frequency = swings per second (hertz, Hz). Amplitude = how far from rest.</text>
</svg>
