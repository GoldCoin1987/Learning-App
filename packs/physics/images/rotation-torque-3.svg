<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="360" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Moment of inertia: where the mass sits</text>

  <line x1="270" y1="44" x2="270" y2="300" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- LEFT: mass near axis -->
  <text x="135" y="64" text-anchor="middle" font-weight="bold" fill="#000">Mass NEAR axis</text>
  <circle cx="135" cy="180" r="90" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="135" cy="180" r="5" fill="#000"/>
  <text x="135" y="298" text-anchor="middle" fill="#000">axis (center)</text>
  <rect x="120" y="140" width="30" height="30" fill="#000"/>
  <rect x="120" y="190" width="30" height="30" fill="#000"/>
  <line x1="135" y1="180" x2="135" y2="148" stroke="#000" stroke-width="1"/>
  <text x="160" y="200" fill="#000">small r</text>
  <text x="135" y="320" text-anchor="middle" font-weight="bold" fill="#000">Easy to spin (small I)</text>

  <!-- RIGHT: mass far from axis -->
  <text x="405" y="64" text-anchor="middle" font-weight="bold" fill="#000">Same mass FAR out</text>
  <circle cx="405" cy="180" r="90" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="405" cy="180" r="5" fill="#000"/>
  <text x="405" y="298" text-anchor="middle" fill="#000">axis (center)</text>
  <rect x="318" y="165" width="30" height="30" fill="#000"/>
  <rect x="462" y="165" width="30" height="30" fill="#000"/>
  <line x1="405" y1="180" x2="333" y2="180" stroke="#000" stroke-width="1"/>
  <text x="368" y="172" text-anchor="middle" fill="#000">big r</text>
  <text x="405" y="320" text-anchor="middle" font-weight="bold" fill="#000">Hard to spin (large I)</text>

  <text x="270" y="348" text-anchor="middle" fill="#000">Same total mass -- farther out resists spinning more</text>
</svg>
