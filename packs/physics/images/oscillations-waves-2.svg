<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="400" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Two kinds of wave: transverse vs longitudinal</text>

  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- TRANSVERSE -->
  <text x="280" y="52" text-anchor="middle" font-weight="bold" fill="#000">Transverse: wiggle is sideways to travel direction</text>
  <line x1="40" y1="110" x2="520" y2="110" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M40,110 Q90,50 140,110 T240,110 T340,110 T440,110 T520,110" fill="none" stroke="#000" stroke-width="2"/>
  <text x="90" y="48" text-anchor="middle" fill="#000">crest (top)</text>
  <line x1="90" y1="55" x2="90" y2="70" stroke="#000" stroke-width="1"/>
  <text x="190" y="185" text-anchor="middle" fill="#000">trough (bottom)</text>
  <line x1="190" y1="170" x2="190" y2="158" stroke="#000" stroke-width="1"/>
  <line x1="140" y1="110" x2="240" y2="110" stroke="#000" stroke-width="1" marker-start="url(#ah2)" marker-end="url(#ah2)"/>
  <text x="190" y="103" text-anchor="middle" fill="#000">wavelength</text>
  <line x1="500" y1="110" x2="500" y2="65" stroke="#000" stroke-width="1" marker-end="url(#ah2)"/>
  <text x="500" y="135" text-anchor="middle" fill="#000">amplitude</text>
  <line x1="480" y1="200" x2="520" y2="200" stroke="#000" stroke-width="2" marker-end="url(#ah2)"/>
  <text x="455" y="204" text-anchor="middle" fill="#000">travel</text>

  <!-- LONGITUDINAL -->
  <text x="280" y="252" text-anchor="middle" font-weight="bold" fill="#000">Longitudinal: squeeze is along travel direction</text>
  <g stroke="#000" stroke-width="2">
    <line x1="50" y1="285" x2="50" y2="335"/>
    <line x1="58" y1="285" x2="58" y2="335"/>
    <line x1="66" y1="285" x2="66" y2="335"/>
    <line x1="95" y1="285" x2="95" y2="335"/>
    <line x1="125" y1="285" x2="125" y2="335"/>
    <line x1="165" y1="285" x2="165" y2="335"/>
    <line x1="173" y1="285" x2="173" y2="335"/>
    <line x1="181" y1="285" x2="181" y2="335"/>
    <line x1="210" y1="285" x2="210" y2="335"/>
    <line x1="240" y1="285" x2="240" y2="335"/>
    <line x1="280" y1="285" x2="280" y2="335"/>
    <line x1="288" y1="285" x2="288" y2="335"/>
    <line x1="296" y1="285" x2="296" y2="335"/>
    <line x1="325" y1="285" x2="325" y2="335"/>
    <line x1="355" y1="285" x2="355" y2="335"/>
    <line x1="395" y1="285" x2="395" y2="335"/>
    <line x1="403" y1="285" x2="403" y2="335"/>
    <line x1="411" y1="285" x2="411" y2="335"/>
  </g>
  <text x="58" y="360" text-anchor="middle" fill="#000">compression</text>
  <text x="130" y="360" text-anchor="middle" fill="#000">rarefaction</text>
  <line x1="490" y1="310" x2="525" y2="310" stroke="#000" stroke-width="2" marker-end="url(#ah2)"/>
  <text x="465" y="314" text-anchor="middle" fill="#000">travel</text>
  <text x="280" y="392" text-anchor="middle" fill="#000">Compression = bunched together; rarefaction = spread apart (sound is longitudinal).</text>
</svg>
