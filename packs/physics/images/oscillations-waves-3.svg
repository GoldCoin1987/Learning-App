<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Same speed: double the frequency, halve the wavelength</text>

  <defs>
    <marker id="ah3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- TOP wave: low frequency, long wavelength -->
  <text x="40" y="60" fill="#000" font-weight="bold">Low frequency</text>
  <line x1="40" y1="100" x2="520" y2="100" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M40,100 Q100,50 160,100 T280,100 T400,100 T520,100" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="40" y1="135" x2="280" y2="135" stroke="#000" stroke-width="1" marker-start="url(#ah3)" marker-end="url(#ah3)"/>
  <text x="160" y="152" text-anchor="middle" fill="#000">long wavelength (one full wave)</text>

  <!-- BOTTOM wave: high frequency, short wavelength -->
  <text x="40" y="210" fill="#000" font-weight="bold">Double frequency</text>
  <line x1="40" y1="250" x2="520" y2="250" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M40,250 Q70,225 100,250 T160,250 T220,250 T280,250 T340,250 T400,250 T460,250 T520,250" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="40" y1="285" x2="160" y2="285" stroke="#000" stroke-width="1" marker-start="url(#ah3)" marker-end="url(#ah3)"/>
  <text x="100" y="302" text-anchor="middle" fill="#000">short wavelength</text>

  <text x="280" y="335" text-anchor="middle" font-size="15" fill="#000">speed = frequency x wavelength   (v = f &#955;)</text>
  <text x="280" y="354" text-anchor="middle" fill="#000">If speed stays the same, more waves per second means each wave is shorter.</text>
</svg>
