<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Speed of sound: faster in tightly packed matter</text>

  <!-- axis baseline -->
  <line x1="170" y1="70" x2="170" y2="250" stroke="#000" stroke-width="1"/>
  <text x="120" y="270" text-anchor="middle" fill="#000">medium</text>
  <text x="350" y="295" text-anchor="middle" fill="#000">speed (meters per second, m/s)</text>

  <!-- air bar ~343 -->
  <rect x="170" y="80" width="69" height="36" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="110" y="103" text-anchor="middle" fill="#000">Air (gas)</text>
  <text x="250" y="103" fill="#000">~343 m/s</text>

  <!-- water bar ~1480 -->
  <rect x="170" y="135" width="148" height="36" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="110" y="158" text-anchor="middle" fill="#000">Water (liquid)</text>
  <text x="330" y="158" fill="#000">~1480 m/s</text>

  <!-- steel bar ~5000 -->
  <rect x="170" y="190" width="350" height="36" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="110" y="213" text-anchor="middle" fill="#000">Steel (solid)</text>
  <text x="375" y="213" fill="#000">~5000 m/s</text>

  <text x="280" y="305" text-anchor="middle" fill="#000">Particles packed closer (solid) pass the push along faster. Sound is slowest in gases.</text>
</svg>
