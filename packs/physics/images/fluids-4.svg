<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A narrowing pipe: narrower = faster (continuity)</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- pipe outline: wide on left, narrow in middle, wide on right -->
  <path d="M40,90 L230,90 L330,135 L520,135" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M40,210 L230,210 L330,165 L520,165" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="40" y1="90" x2="40" y2="210" stroke="#000" stroke-width="2"/>
  <line x1="520" y1="135" x2="520" y2="165" stroke="#000" stroke-width="2"/>

  <!-- wide section: short slow arrow -->
  <line x1="90" y1="150" x2="140" y2="150" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="130" y="125" text-anchor="middle" fill="#000">wide section</text>
  <text x="130" y="245" text-anchor="middle" font-weight="bold" fill="#000">slow flow</text>
  <text x="130" y="263" text-anchor="middle" fill="#000">higher pressure</text>

  <!-- narrow section: long fast arrow -->
  <line x1="365" y1="150" x2="475" y2="150" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="420" y="110" text-anchor="middle" fill="#000">narrow section</text>
  <text x="420" y="245" text-anchor="middle" font-weight="bold" fill="#000">fast flow</text>
  <text x="420" y="263" text-anchor="middle" fill="#000">lower pressure</text>

  <text x="280" y="295" text-anchor="middle" fill="#000">Same water must squeeze through less space, so it speeds up</text>
  <text x="280" y="313" text-anchor="middle" fill="#000">(like a thumb on a hose). Faster flow tends to mean lower pressure.</text>
</svg>
