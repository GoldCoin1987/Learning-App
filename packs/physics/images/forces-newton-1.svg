<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="520" height="320" fill="#ffffff"/>
  <text x="260" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A force is a push or a pull (measured in newtons, N)</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- ground -->
  <line x1="40" y1="240" x2="480" y2="240" stroke="#000" stroke-width="2"/>

  <!-- the box -->
  <rect x="200" y="180" width="80" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="240" y="215" text-anchor="middle" fill="#000">box</text>

  <!-- push from left -->
  <line x1="120" y1="210" x2="195" y2="210" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="155" y="195" text-anchor="middle" fill="#000" font-weight="bold">PUSH</text>
  <text x="155" y="178" text-anchor="middle" fill="#000">(force on box)</text>

  <!-- pull from right (rope) -->
  <line x1="285" y1="210" x2="370" y2="210" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="335" y="195" text-anchor="middle" fill="#000" font-weight="bold">PULL</text>
  <text x="335" y="178" text-anchor="middle" fill="#000">(force on box)</text>

  <!-- key idea -->
  <text x="260" y="285" text-anchor="middle" fill="#000">Bigger arrow = bigger force. Unit of force = the newton (N).</text>
  <text x="260" y="305" text-anchor="middle" fill="#000">1 N is about the weight of a small apple in your hand.</text>
</svg>
