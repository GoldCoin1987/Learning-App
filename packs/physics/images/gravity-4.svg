<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Why there are two tidal bulges</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Ocean bulge (ellipse) under Earth -->
  <ellipse cx="220" cy="190" rx="135" ry="95" fill="#ffffff" stroke="#000" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- solid Earth -->
  <circle cx="220" cy="190" r="80" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="220" y="194" text-anchor="middle" fill="#000">Earth</text>

  <!-- Moon -->
  <circle cx="500" cy="190" r="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="500" y="194" text-anchor="middle" fill="#000">Moon</text>

  <!-- pull arrow toward moon -->
  <line x1="305" y1="150" x2="370" y2="150" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="338" y="142" text-anchor="middle" fill="#000">Moon's pull</text>

  <!-- bulge labels -->
  <text x="350" y="194" text-anchor="middle" fill="#000">near-side</text>
  <text x="350" y="208" text-anchor="middle" fill="#000">bulge</text>
  <text x="90" y="194" text-anchor="middle" fill="#000">far-side</text>
  <text x="90" y="208" text-anchor="middle" fill="#000">bulge</text>

  <text x="280" y="320" text-anchor="middle" fill="#000">Near side: water pulled toward Moon. Far side: water "left behind."</text>
  <text x="280" y="340" text-anchor="middle" font-weight="bold" fill="#000">Two bulges = two high tides as Earth spins each day.</text>
</svg>
