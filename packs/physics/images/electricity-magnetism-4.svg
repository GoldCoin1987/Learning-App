<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="580" height="360" fill="#ffffff"/>
  <text x="290" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Magnetic fields: bar magnet and electromagnet</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- LEFT: bar magnet with field lines N to S -->
  <text x="150" y="52" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Bar magnet: field loops N &#8594; S</text>
  <rect x="100" y="150" width="50" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="112" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">N</text>
  <rect x="150" y="150" width="50" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="188" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">S</text>
  <!-- field loops -->
  <path d="M150,150 C150,90 50,100 60,170" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#ah)"/>
  <path d="M150,190 C150,250 50,240 60,172" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M150,150 C150,70 250,80 240,170" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M240,172 C250,240 150,250 150,190" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="150" y="280" text-anchor="middle" fill="#000">Cut it in half &#8594; two NEW</text>
  <text x="150" y="296" text-anchor="middle" fill="#000">magnets. No lone pole exists.</text>

  <!-- RIGHT: electromagnet, coil + current -->
  <text x="430" y="52" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Electromagnet: current makes magnetism</text>
  <!-- core -->
  <rect x="360" y="155" width="160" height="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="440" y="175" text-anchor="middle" fill="#000">iron core</text>
  <!-- coil loops over the core -->
  <path d="M370,155 a12,18 0 1,1 0,30" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M400,155 a12,18 0 1,1 0,30" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M430,155 a12,18 0 1,1 0,30" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M460,155 a12,18 0 1,1 0,30" fill="none" stroke="#000" stroke-width="2"/>
  <text x="370" y="142" text-anchor="middle" fill="#000">N</text>
  <text x="515" y="142" text-anchor="middle" fill="#000">S</text>
  <!-- battery + current arrow -->
  <line x1="360" y1="210" x2="360" y2="240" stroke="#000" stroke-width="2"/>
  <line x1="345" y1="240" x2="375" y2="240" stroke="#000" stroke-width="3"/>
  <line x1="352" y1="252" x2="368" y2="252" stroke="#000" stroke-width="6"/>
  <line x1="360" y1="252" x2="520" y2="252" stroke="#000" stroke-width="2"/>
  <line x1="520" y1="252" x2="520" y2="210" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="440" y="270" text-anchor="middle" fill="#000">current I from battery</text>
  <text x="440" y="300" text-anchor="middle" fill="#000">Turn current off &#8594; magnetism stops.</text>
  <text x="290" y="345" text-anchor="middle" font-size="13" fill="#000">Current makes magnetism; a CHANGING magnetic field makes current (generator).</text>
</svg>
