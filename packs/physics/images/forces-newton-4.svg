<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="520" height="360" fill="#ffffff"/>
  <text x="260" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Free-body diagram: all forces on one box</text>

  <defs>
    <marker id="ah4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- ground -->
  <line x1="40" y1="250" x2="480" y2="250" stroke="#000" stroke-width="2"/>

  <!-- the box at center -->
  <rect x="220" y="200" width="80" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="260" cy="225" r="3" fill="#000"/>

  <!-- weight: down -->
  <line x1="260" y1="225" x2="260" y2="315" stroke="#000" stroke-width="3" marker-end="url(#ah4)"/>
  <text x="268" y="305" fill="#000">Weight (gravity, down)</text>

  <!-- normal: up -->
  <line x1="260" y1="225" x2="260" y2="120" stroke="#000" stroke-width="3" marker-end="url(#ah4)"/>
  <text x="268" y="120" fill="#000">Normal force (surface pushes up)</text>

  <!-- applied: right -->
  <line x1="260" y1="225" x2="400" y2="225" stroke="#000" stroke-width="3" marker-end="url(#ah4)"/>
  <text x="320" y="218" fill="#000">Applied push (right)</text>

  <!-- friction: left -->
  <line x1="260" y1="225" x2="150" y2="225" stroke="#000" stroke-width="3" marker-end="url(#ah4)"/>
  <text x="60" y="218" fill="#000">Friction (opposes motion, left)</text>

  <text x="260" y="348" text-anchor="middle" fill="#000">Up vs down and left vs right cancel? Then no acceleration.</text>
</svg>
