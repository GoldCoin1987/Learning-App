<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Same mass, different weight</text>

  <!-- EARTH side -->
  <text x="150" y="56" text-anchor="middle" font-weight="bold" fill="#000">On Earth</text>
  <circle cx="150" cy="110" r="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="150" y="114" text-anchor="middle" fill="#000">10 kg</text>
  <text x="150" y="158" text-anchor="middle" fill="#000">mass = 10 kg</text>
  <!-- scale -->
  <rect x="100" y="200" width="100" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="150" y="225" text-anchor="middle" fill="#000">SCALE reads</text>
  <text x="150" y="248" text-anchor="middle" font-size="18" font-weight="bold" fill="#000">98 N</text>
  <text x="150" y="290" text-anchor="middle" fill="#000">g = 9.8 N/kg</text>

  <!-- divider -->
  <line x1="280" y1="40" x2="280" y2="320" stroke="#000" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- MOON side -->
  <text x="410" y="56" text-anchor="middle" font-weight="bold" fill="#000">On the Moon</text>
  <circle cx="410" cy="110" r="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="410" y="114" text-anchor="middle" fill="#000">10 kg</text>
  <text x="410" y="158" text-anchor="middle" fill="#000">mass = 10 kg (SAME)</text>
  <rect x="360" y="200" width="100" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="410" y="225" text-anchor="middle" fill="#000">SCALE reads</text>
  <text x="410" y="248" text-anchor="middle" font-size="18" font-weight="bold" fill="#000">16 N</text>
  <text x="410" y="290" text-anchor="middle" fill="#000">g = 1.6 N/kg</text>

  <text x="280" y="330" text-anchor="middle" fill="#000">Mass never changes. Weight (the scale) shrinks where g is smaller.</text>
</svg>
