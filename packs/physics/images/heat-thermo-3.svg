<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Heating curve: temperature vs heat added</text>

  <!-- axes -->
  <line x1="70" y1="300" x2="530" y2="300" stroke="#000" stroke-width="2"/>
  <line x1="70" y1="300" x2="70" y2="50" stroke="#000" stroke-width="2"/>
  <text x="300" y="338" text-anchor="middle" fill="#000">Heat added (energy in) &#8594;</text>
  <text x="22" y="180" text-anchor="middle" fill="#000" transform="rotate(-90 22 180)">Temperature &#8594;</text>

  <!-- curve: rise, flat (melt), rise, flat (boil), rise -->
  <polyline points="70,280 150,210 230,210 320,120 430,120 510,70" fill="none" stroke="#000" stroke-width="2.5"/>

  <!-- plateau labels -->
  <line x1="150" y1="210" x2="230" y2="210" stroke="#000" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="190" y="200" text-anchor="middle" fill="#000">MELTING</text>
  <text x="190" y="232" text-anchor="middle" fill="#000">solid &#8594; liquid</text>
  <text x="190" y="247" text-anchor="middle" fill="#000">temp flat!</text>

  <line x1="320" y1="120" x2="430" y2="120" stroke="#000" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="375" y="110" text-anchor="middle" fill="#000">BOILING</text>
  <text x="375" y="142" text-anchor="middle" fill="#000">liquid &#8594; gas</text>
  <text x="375" y="157" text-anchor="middle" fill="#000">temp flat!</text>

  <!-- phase labels on slopes -->
  <text x="105" y="265" text-anchor="middle" fill="#000">solid</text>
  <text x="275" y="175" text-anchor="middle" fill="#000">liquid</text>
  <text x="475" y="95" text-anchor="middle" fill="#000">gas</text>

  <text x="280" y="354" text-anchor="middle" font-size="11" fill="#000">On flat parts, added energy (latent heat) breaks bonds, not raises temperature</text>
</svg>
