<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="340" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Roller coaster: energy trades between PE and KE</text>

  <!-- track curve -->
  <path d="M40,90 C140,90 150,280 270,280 C390,280 400,150 500,150" fill="none" stroke="#000" stroke-width="3"/>

  <!-- ground reference -->
  <line x1="30" y1="300" x2="510" y2="300" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="90" y="316" text-anchor="middle" fill="#000">ground (h = 0)</text>

  <!-- top cart -->
  <rect x="48" y="74" width="34" height="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="65" y="64" text-anchor="middle" fill="#000" font-weight="bold">TOP</text>
  <text x="160" y="80" fill="#000">high up, moving slow:</text>
  <text x="160" y="98" fill="#000">PE big, KE small</text>

  <!-- height arrow -->
  <line x1="40" y1="94" x2="40" y2="300" stroke="#000" stroke-width="1" marker-start="url(#ah2)" marker-end="url(#ah2)"/>
  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
  <text x="22" y="200" text-anchor="middle" fill="#000" transform="rotate(-90 22 200)">height h</text>

  <!-- bottom cart -->
  <rect x="252" y="264" width="34" height="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="269" y="258" text-anchor="middle" fill="#000" font-weight="bold">BOTTOM</text>
  <text x="300" y="262" fill="#000">low down, moving fast:</text>
  <text x="300" y="280" fill="#000">PE small, KE big</text>

  <!-- formulas -->
  <text x="270" y="332" text-anchor="middle" fill="#000" font-weight="bold">PE = m x g x h     KE = 1/2 x m x v^2     PE + KE stays the same</text>
</svg>
