<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="540" height="360" fill="#ffffff"/>
  <text x="270" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Impulse = force x time = change in momentum</text>
  <text x="270" y="44" text-anchor="middle" fill="#000">Same area (same change in momentum), two ways to stop</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- LEFT graph: short hard hit -->
  <text x="135" y="70" text-anchor="middle" font-weight="bold" fill="#000">Sudden stop (hard wall)</text>
  <line x1="50" y1="270" x2="50" y2="100" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="50" y1="270" x2="240" y2="270" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="30" y="100" text-anchor="middle" fill="#000">F</text>
  <text x="245" y="290" text-anchor="middle" fill="#000">time</text>
  <rect x="70" y="120" width="40" height="150" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="90" y="195" text-anchor="middle" fill="#000">area</text>
  <text x="135" y="310" text-anchor="middle" font-weight="bold" fill="#000">tall + narrow</text>
  <text x="135" y="328" text-anchor="middle" fill="#000">big force, short time</text>
  <text x="135" y="346" text-anchor="middle" fill="#000">= HURTS</text>

  <!-- RIGHT graph: long gentle stop -->
  <text x="405" y="70" text-anchor="middle" font-weight="bold" fill="#000">Gentle stop (airbag)</text>
  <line x1="320" y1="270" x2="320" y2="100" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="320" y1="270" x2="520" y2="270" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="300" y="100" text-anchor="middle" fill="#000">F</text>
  <text x="520" y="290" text-anchor="middle" fill="#000">time</text>
  <rect x="340" y="210" width="160" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="420" y="245" text-anchor="middle" fill="#000">same area</text>
  <text x="405" y="310" text-anchor="middle" font-weight="bold" fill="#000">short + wide</text>
  <text x="405" y="328" text-anchor="middle" fill="#000">small force, long time</text>
  <text x="405" y="346" text-anchor="middle" fill="#000">= SAFE</text>
</svg>
