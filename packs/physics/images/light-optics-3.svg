<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="340" fill="#ffffff"/>
  <text x="280" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Refraction: light bends when it changes speed</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- LEFT: air to glass boundary -->
  <text x="140" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Air to glass</text>
  <rect x="40" y="60" width="200" height="100" fill="#ffffff" stroke="#000" stroke-width="1"/>
  <rect x="40" y="160" width="200" height="100" fill="#eeeeee" stroke="#000" stroke-width="1"/>
  <text x="55" y="80" font-size="11" fill="#000">air (light is faster)</text>
  <text x="55" y="180" font-size="11" fill="#000">glass (light is slower)</text>
  <!-- normal at boundary point (140,160) -->
  <line x1="140" y1="60" x2="140" y2="260" stroke="#000" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="146" y="120" font-size="10" fill="#000">normal</text>
  <!-- incident ray steep angle -->
  <line x1="70" y1="70" x2="140" y2="160" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <!-- refracted ray bends TOWARD normal (steeper) -->
  <line x1="140" y1="160" x2="180" y2="250" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="60" y="148" font-size="10" fill="#000">incoming</text>
  <text x="184" y="225" font-size="10" fill="#000">bends toward</text>
  <text x="184" y="240" font-size="10" fill="#000">the normal</text>

  <!-- RIGHT: converging lens focusing parallel rays -->
  <text x="410" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Converging lens</text>
  <!-- lens shape -->
  <path d="M 400 70 Q 430 165 400 260 Q 370 165 400 70 Z" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" font-size="11" fill="#000">convex lens</text>
  <!-- optical axis -->
  <line x1="300" y1="165" x2="540" y2="165" stroke="#000" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- parallel incoming rays -->
  <line x1="300" y1="100" x2="400" y2="100" stroke="#000" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="300" y1="165" x2="400" y2="165" stroke="#000" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="300" y1="230" x2="400" y2="230" stroke="#000" stroke-width="1.8" marker-end="url(#ah)"/>
  <!-- rays converge to focal point -->
  <line x1="400" y1="100" x2="500" y2="165" stroke="#000" stroke-width="1.8"/>
  <line x1="400" y1="230" x2="500" y2="165" stroke="#000" stroke-width="1.8"/>
  <circle cx="500" cy="165" r="4" fill="#000"/>
  <text x="500" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">focal point</text>
  <text x="320" y="92" font-size="10" fill="#000">parallel rays in</text>

  <text x="280" y="320" text-anchor="middle" font-size="12" fill="#000">Slowing down at an angle makes the ray change direction; a convex lens uses this to focus light.</text>
</svg>
