<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Half-life: each step, half the atoms remain</text>

  <!-- axes -->
  <line x1="70" y1="290" x2="520" y2="290" stroke="#000" stroke-width="2"/>
  <line x1="70" y1="290" x2="70" y2="60" stroke="#000" stroke-width="2"/>
  <text x="295" y="335" text-anchor="middle" font-size="12" fill="#000">Time (in half-lives)</text>
  <text x="22" y="175" text-anchor="middle" font-size="12" fill="#000" transform="rotate(-90 22 175)">Amount remaining</text>

  <!-- y gridline labels -->
  <line x1="66" y1="80" x2="70" y2="80" stroke="#000" stroke-width="1.5"/>
  <text x="60" y="84" text-anchor="end" font-size="11" fill="#000">100%</text>
  <line x1="66" y1="185" x2="70" y2="185" stroke="#000" stroke-width="1.5"/>
  <text x="60" y="189" text-anchor="end" font-size="11" fill="#000">50%</text>
  <line x1="66" y1="237" x2="70" y2="237" stroke="#000" stroke-width="1.5"/>
  <text x="60" y="241" text-anchor="end" font-size="11" fill="#000">25%</text>

  <!-- x labels -->
  <text x="70" y="308" text-anchor="middle" font-size="11" fill="#000">0</text>
  <text x="180" y="308" text-anchor="middle" font-size="11" fill="#000">1</text>
  <text x="290" y="308" text-anchor="middle" font-size="11" fill="#000">2</text>
  <text x="400" y="308" text-anchor="middle" font-size="11" fill="#000">3</text>
  <text x="510" y="308" text-anchor="middle" font-size="11" fill="#000">4</text>

  <!-- decay curve points: 100,50,25,12.5,6.25 -->
  <polyline points="70,80 180,185 290,237 400,263 510,277" fill="none" stroke="#000" stroke-width="2.5"/>
  <circle cx="70" cy="80" r="4" fill="#000"/>
  <circle cx="180" cy="185" r="4" fill="#000"/>
  <circle cx="290" cy="237" r="4" fill="#000"/>
  <circle cx="400" cy="263" r="4" fill="#000"/>
  <circle cx="510" cy="277" r="4" fill="#000"/>

  <!-- halving guide -->
  <line x1="180" y1="185" x2="180" y2="290" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="70" y1="185" x2="180" y2="185" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="295" y="120" text-anchor="middle" font-size="11" fill="#000">After 1 half-life: half is gone.  After 2: a quarter left.</text>
  <text x="295" y="138" text-anchor="middle" font-size="11" fill="#000">It never quite reaches zero - it keeps halving.</text>
</svg>
