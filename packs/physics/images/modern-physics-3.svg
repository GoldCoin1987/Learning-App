<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A "light clock": why a moving clock ticks slower</text>

  <!-- Clock at rest -->
  <text x="150" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Clock at rest</text>
  <rect x="110" y="70" width="80" height="170" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="150" y="88" text-anchor="middle" font-size="10" fill="#000">top mirror</text>
  <line x1="118" y1="92" x2="182" y2="92" stroke="#000" stroke-width="2"/>
  <line x1="118" y1="228" x2="182" y2="228" stroke="#000" stroke-width="2"/>
  <text x="150" y="245" text-anchor="middle" font-size="10" fill="#000">bottom mirror</text>
  <!-- straight up-down light path -->
  <line x1="150" y1="226" x2="150" y2="94" stroke="#000" stroke-width="2" marker-end="url(#a)"/>
  <text x="150" y="160" text-anchor="middle" font-size="9" fill="#000" transform="rotate(-90 150 160)">light bounces straight up &amp; down</text>

  <!-- Clock moving -->
  <text x="400" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Same clock, moving right -></text>
  <line x1="300" y1="228" x2="500" y2="228" stroke="#000" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- zigzag path -->
  <polyline points="320,226 400,92 480,226" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="320" y1="86" x2="360" y2="86" stroke="#000" stroke-width="2"/>
  <line x1="440" y1="86" x2="480" y2="86" stroke="#000" stroke-width="2"/>
  <line x1="312" y1="228" x2="352" y2="228" stroke="#000" stroke-width="2"/>
  <line x1="448" y1="228" x2="488" y2="228" stroke="#000" stroke-width="2"/>
  <text x="400" y="265" text-anchor="middle" font-size="10" fill="#000">to a watcher on the ground, the light travels a longer, slanted path</text>

  <text x="280" y="300" text-anchor="middle" font-size="11" fill="#000">Light's speed is the SAME for everyone. A longer path at the same speed</text>
  <text x="280" y="318" text-anchor="middle" font-size="11" fill="#000">takes more time - so the moving clock's "tick" is stretched: it runs slow.</text>
  <text x="280" y="340" text-anchor="middle" font-size="10" fill="#000">(The effect is tiny at everyday speeds, huge near the speed of light.)</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#000"/>
    </marker>
  </defs>
</svg>
