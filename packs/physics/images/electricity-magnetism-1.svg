<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Electric charge: like repels, opposite attracts</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- LIKE charges repel: two plus -->
  <text x="150" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Like charges REPEL</text>
  <circle cx="90" cy="110" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="90" y="116" text-anchor="middle" font-size="20" font-weight="bold" fill="#000">+</text>
  <circle cx="210" cy="110" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="210" y="116" text-anchor="middle" font-size="20" font-weight="bold" fill="#000">+</text>
  <line x1="112" y1="110" x2="60" y2="110" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="188" y1="110" x2="240" y2="110" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="150" y="160" text-anchor="middle" fill="#000">they push apart</text>

  <!-- OPPOSITE charges attract: plus and minus -->
  <text x="420" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Opposite charges ATTRACT</text>
  <circle cx="360" cy="110" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="116" text-anchor="middle" font-size="20" font-weight="bold" fill="#000">+</text>
  <circle cx="480" cy="110" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="480" y="116" text-anchor="middle" font-size="22" font-weight="bold" fill="#000">&#8722;</text>
  <line x1="382" y1="110" x2="430" y2="110" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="458" y1="110" x2="410" y2="110" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="420" y="160" text-anchor="middle" fill="#000">they pull together</text>

  <!-- field lines around a single + charge -->
  <text x="280" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Electric field: arrows point away from +, toward &#8722;</text>
  <circle cx="280" cy="290" r="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="280" y="296" text-anchor="middle" font-size="18" font-weight="bold" fill="#000">+</text>
  <line x1="280" y1="270" x2="280" y2="235" stroke="#000" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="280" y1="310" x2="280" y2="345" stroke="#000" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="300" y1="290" x2="350" y2="290" stroke="#000" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="260" y1="290" x2="210" y2="290" stroke="#000" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="295" y1="275" x2="330" y2="245" stroke="#000" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="265" y1="275" x2="230" y2="245" stroke="#000" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="295" y1="305" x2="330" y2="335" stroke="#000" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="265" y1="305" x2="230" y2="335" stroke="#000" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="430" y="294" text-anchor="middle" fill="#000">field = push a + charge would feel</text>
</svg>
