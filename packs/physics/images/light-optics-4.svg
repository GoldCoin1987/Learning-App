<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Mixing color: additive (light) vs subtractive (pigment)</text>

  <!-- ADDITIVE: RGB light, overlaps make white -->
  <text x="150" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Additive (mixing LIGHT)</text>
  <circle cx="120" cy="120" r="50" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="180" cy="120" r="50" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="150" cy="170" r="50" fill="none" stroke="#000" stroke-width="2"/>
  <text x="95" y="105" text-anchor="middle" font-size="11" fill="#000">Red</text>
  <text x="205" y="105" text-anchor="middle" font-size="11" fill="#000">Green</text>
  <text x="150" y="205" text-anchor="middle" font-size="11" fill="#000">Blue</text>
  <text x="150" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">white</text>
  <text x="150" y="245" text-anchor="middle" font-size="11" fill="#000">R + G + B light = white</text>
  <text x="150" y="262" text-anchor="middle" font-size="10" fill="#000">(screens, stage lights)</text>
  <text x="150" y="278" text-anchor="middle" font-size="10" fill="#000">start dark, add light</text>

  <!-- SUBTRACTIVE: CMY pigment, overlaps make black -->
  <text x="410" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Subtractive (mixing PIGMENT)</text>
  <circle cx="380" cy="120" r="50" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="440" cy="120" r="50" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="410" cy="170" r="50" fill="none" stroke="#000" stroke-width="2"/>
  <text x="352" y="105" text-anchor="middle" font-size="10" fill="#000">Cyan</text>
  <text x="470" y="105" text-anchor="middle" font-size="9" fill="#000">Magenta</text>
  <text x="410" y="205" text-anchor="middle" font-size="10" fill="#000">Yellow</text>
  <text x="410" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">black</text>
  <text x="410" y="245" text-anchor="middle" font-size="11" fill="#000">C + M + Y paint = black</text>
  <text x="410" y="262" text-anchor="middle" font-size="10" fill="#000">(paint, ink, printers)</text>
  <text x="410" y="278" text-anchor="middle" font-size="10" fill="#000">start white, remove light</text>

  <text x="280" y="305" text-anchor="middle" font-size="11" fill="#000">Pigment works by absorbing (subtracting) some colors and reflecting the rest.</text>
</svg>
