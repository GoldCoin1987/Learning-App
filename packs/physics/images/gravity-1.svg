<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Gravity weakens with distance (inverse-square)</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- TOP CASE: distance r, full pull -->
  <circle cx="80" cy="110" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="80" y="114" text-anchor="middle" fill="#000">m1</text>
  <circle cx="300" cy="110" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="300" y="114" text-anchor="middle" fill="#000">m2</text>
  <line x1="102" y1="110" x2="278" y2="110" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="190" y="100" text-anchor="middle" fill="#000">distance = r</text>

  <!-- pull arrows (long = strong) -->
  <line x1="118" y1="135" x2="178" y2="135" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <line x1="262" y1="135" x2="202" y2="135" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="190" y="156" text-anchor="middle" font-weight="bold" fill="#000">pull = F (full strength)</text>

  <!-- BOTTOM CASE: distance 2r, quarter pull -->
  <circle cx="80" cy="265" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="80" y="269" text-anchor="middle" fill="#000">m1</text>
  <circle cx="430" cy="265" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="430" y="269" text-anchor="middle" fill="#000">m2</text>
  <line x1="102" y1="265" x2="408" y2="265" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="255" y="255" text-anchor="middle" fill="#000">distance = 2r (twice as far)</text>

  <!-- short pull arrows (weak) -->
  <line x1="118" y1="290" x2="138" y2="290" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <line x1="392" y1="290" x2="372" y2="290" stroke="#000" stroke-width="3" marker-end="url(#ah)"/>
  <text x="255" y="311" text-anchor="middle" font-weight="bold" fill="#000">pull = F / 4 (only one quarter!)</text>

  <text x="280" y="344" text-anchor="middle" fill="#000">Double the distance, the pull drops to 1/4 (not 1/2).</text>
</svg>
