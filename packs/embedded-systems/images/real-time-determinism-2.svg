<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="sans-serif">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Meeting vs Missing a Deadline</text>
  <text x="320" y="48" font-size="12" text-anchor="middle" fill="#666">A job must finish by its deadline. On time = success. Late = failure.</text>

  <!-- Deadline line -->
  <line x1="470" y1="70" x2="470" y2="310" stroke="#000" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="470" y="64" font-size="13" font-weight="bold" text-anchor="middle" fill="#000">deadline</text>

  <!-- Top: job finishes before deadline (OK) -->
  <text x="60" y="110" font-size="13" text-anchor="start" fill="#2e8b57" font-weight="bold">Job A</text>
  <line x1="110" y1="120" x2="600" y2="120" stroke="#ccc" stroke-width="1"/>
  <rect x="110" y="108" width="290" height="24" fill="#a8e6c0" stroke="#2e8b57" stroke-width="1.5"/>
  <text x="255" y="125" font-size="12" text-anchor="middle" fill="#1a1a1a">work running...</text>
  <text x="408" y="125" font-size="20" fill="#2e8b57">&#10003;</text>
  <text x="430" y="100" font-size="11" text-anchor="middle" fill="#2e8b57">finished early - OK</text>

  <!-- Bottom: job finishes after deadline (fail) -->
  <text x="60" y="230" font-size="13" text-anchor="start" fill="#c0392b" font-weight="bold">Job B</text>
  <line x1="110" y1="240" x2="600" y2="240" stroke="#ccc" stroke-width="1"/>
  <rect x="110" y="228" width="430" height="24" fill="#f5b7b1" stroke="#c0392b" stroke-width="1.5"/>
  <text x="280" y="245" font-size="12" text-anchor="middle" fill="#1a1a1a">work running... (took too long)</text>
  <text x="548" y="245" font-size="20" fill="#c0392b">&#10007;</text>
  <text x="505" y="220" font-size="11" text-anchor="middle" fill="#c0392b">finished late - FAIL</text>

  <!-- time axis -->
  <line x1="110" y1="300" x2="600" y2="300" stroke="#333" stroke-width="2"/>
  <polygon points="600,300 590,295 590,305" fill="#333"/>
  <text x="355" y="325" font-size="13" text-anchor="middle" fill="#333">time -&gt;</text>
  <text x="320" y="350" font-size="12" text-anchor="middle" fill="#666">"Real-time" means on time, not simply fast.</text>
</svg>
