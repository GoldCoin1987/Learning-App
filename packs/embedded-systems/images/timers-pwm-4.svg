<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">PWM duty cycle sets the average power</text>
  <text x="360" y="46" text-anchor="middle" font-size="11" fill="#555">More time ON each cycle = higher average (brighter LED, faster motor)</text>

  <!-- 25% -->
  <text x="60" y="86" font-size="12" fill="#333" font-weight="bold">25% duty</text>
  <line x1="60" y1="130" x2="690" y2="130" stroke="#ccc" stroke-dasharray="2 2"/>
  <line x1="60" y1="95" x2="690" y2="95" stroke="#ccc" stroke-dasharray="2 2"/>
  <g stroke="#8a5ad0" stroke-width="2.5" fill="none">
    <polyline points="60,130 95,130 95,95 195,95 195,130 230,130 230,95 330,95 330,130 365,130 365,95 465,95 465,130 500,130 500,95 600,95 600,130 635,130 635,95 690,95"/>
  </g>
  <line x1="60" y1="121" x2="690" y2="121" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="690" y="118" text-anchor="end" font-size="10" fill="#c0392b">avg ~25%</text>

  <!-- 50% -->
  <text x="60" y="176" font-size="12" fill="#333" font-weight="bold">50% duty</text>
  <line x1="60" y1="220" x2="690" y2="220" stroke="#ccc" stroke-dasharray="2 2"/>
  <line x1="60" y1="185" x2="690" y2="185" stroke="#ccc" stroke-dasharray="2 2"/>
  <g stroke="#8a5ad0" stroke-width="2.5" fill="none">
    <polyline points="60,220 130,220 130,185 235,185 235,220 305,220 305,185 410,185 410,220 480,220 480,185 585,185 585,220 655,220 655,185 690,185"/>
  </g>
  <line x1="60" y1="202" x2="690" y2="202" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="690" y="199" text-anchor="end" font-size="10" fill="#c0392b">avg ~50%</text>

  <!-- 75% -->
  <text x="60" y="266" font-size="12" fill="#333" font-weight="bold">75% duty</text>
  <line x1="60" y1="310" x2="690" y2="310" stroke="#ccc" stroke-dasharray="2 2"/>
  <line x1="60" y1="275" x2="690" y2="275" stroke="#ccc" stroke-dasharray="2 2"/>
  <g stroke="#8a5ad0" stroke-width="2.5" fill="none">
    <polyline points="60,310 165,310 165,275 265,275 265,310 305,310 305,275 405,275 405,310 445,310 445,275 545,275 545,310 585,310 585,275 685,275 685,310 690,310"/>
  </g>
  <line x1="60" y1="284" x2="690" y2="284" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="690" y="281" text-anchor="end" font-size="10" fill="#c0392b">avg ~75%</text>

  <text x="360" y="345" text-anchor="middle" font-size="12" fill="#333">Same period (frequency) every row; only the fraction of time ON changes.</text>
  <text x="360" y="365" text-anchor="middle" font-size="11" fill="#555">duty cycle = ON time / total period.  Red dashed line = average level.</text>
</svg>
