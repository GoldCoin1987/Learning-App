<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" font-family="sans-serif">
  <rect width="720" height="280" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">Input capture: timestamp the edges of an incoming pulse</text>

  <!-- incoming pulse -->
  <text x="60" y="70" font-size="12" fill="#333">Incoming signal</text>
  <g stroke="#1f6fb2" stroke-width="2.5" fill="none">
    <polyline points="60,150 200,150 200,90 460,90 460,150 660,150"/>
  </g>
  <line x1="60" y1="150" x2="690" y2="150" stroke="#ccc" stroke-dasharray="2 2"/>
  <line x1="60" y1="90" x2="690" y2="90" stroke="#ccc" stroke-dasharray="2 2"/>

  <!-- edge markers -->
  <line x1="200" y1="80" x2="200" y2="200" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="460" y1="80" x2="460" y2="200" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="200" y="78" text-anchor="middle" font-size="11" fill="#c0392b">rising edge</text>
  <text x="460" y="78" text-anchor="middle" font-size="11" fill="#c0392b">falling edge</text>

  <!-- counter values captured -->
  <text x="200" y="220" text-anchor="middle" font-size="11" fill="#333">counter = 1200</text>
  <text x="460" y="220" text-anchor="middle" font-size="11" fill="#333">counter = 1700</text>

  <!-- width brace -->
  <line x1="200" y1="240" x2="460" y2="240" stroke="#000" stroke-width="1"/>
  <line x1="200" y1="235" x2="200" y2="245" stroke="#000" stroke-width="1"/>
  <line x1="460" y1="235" x2="460" y2="245" stroke="#000" stroke-width="1"/>
  <text x="330" y="262" text-anchor="middle" font-size="12" fill="#000">pulse width = 1700 - 1200 = 500 ticks</text>

  <text x="360" y="200" text-anchor="middle" font-size="11" fill="#555">The timer copies its count at each edge; the difference is the width in ticks.</text>
</svg>
