<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="sans-serif">
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Top Half / Bottom Half: keep the ISR short</text>

  <!-- TOP HALF box -->
  <rect x="60" y="60" width="280" height="220" fill="#fff3df" stroke="#c97a00" stroke-width="2"/>
  <text x="200" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#5a3a00">TOP HALF (ISR)</text>
  <text x="200" y="104" text-anchor="middle" font-size="11" fill="#7a5a20">runs urgently, must be short</text>

  <g font-size="12" fill="#5a3a00">
    <text x="80" y="140">1. Clear the source flag</text>
    <text x="80" y="170">2. Grab the data quickly</text>
    <text x="80" y="200">3. Set a volatile flag</text>
    <text x="100" y="220" font-size="11" fill="#7a5a20">work_pending = 1;</text>
    <text x="80" y="252">4. Return fast</text>
  </g>

  <!-- arrow -->
  <line x1="340" y1="170" x2="400" y2="170" stroke="#333" stroke-width="2" marker-end="url(#arrK)"/>
  <text x="370" y="160" text-anchor="middle" font-size="11" fill="#333">hand off</text>

  <!-- BOTTOM HALF box -->
  <rect x="400" y="60" width="280" height="220" fill="#cfe8cf" stroke="#3a7d3a" stroke-width="2"/>
  <text x="540" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#234">BOTTOM HALF (main)</text>
  <text x="540" y="104" text-anchor="middle" font-size="11" fill="#2a5a2a">runs later, can take its time</text>

  <g font-size="12" fill="#234">
    <text x="420" y="140">Sees work_pending == 1</text>
    <text x="420" y="170">Does the heavy work:</text>
    <text x="440" y="190" font-size="11" fill="#2a5a2a">filtering, printing,</text>
    <text x="440" y="208" font-size="11" fill="#2a5a2a">big calculations</text>
    <text x="420" y="240">Protect multi-step reads</text>
    <text x="420" y="258" font-size="11" fill="#2a5a2a">with a critical section</text>
  </g>

  <text x="360" y="320" text-anchor="middle" font-size="12" fill="#666">A long ISR delays every other interrupt waiting behind it (worse latency).</text>
  <text x="360" y="342" text-anchor="middle" font-size="12" fill="#666">Shared variable changed in the ISR must be volatile so main really re-reads it.</text>

  <defs>
    <marker id="arrK" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#333"/></marker>
  </defs>
</svg>
