<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300" font-family="sans-serif">
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold">Switch Bounce vs Debounced Signal</text>
  <text x="320" y="50" text-anchor="middle" font-size="12">A mechanical contact chatters for a few milliseconds before settling.</text>

  <!-- Bouncing trace -->
  <text x="60" y="90" font-size="13" font-weight="bold">Raw (bouncing)</text>
  <!-- baseline low -->
  <line x1="60" y1="150" x2="170" y2="150" stroke="#000" stroke-width="2"/>
  <!-- bounce burst -->
  <polyline points="170,150 170,110 185,110 185,150 195,150 195,110 210,110 210,150 218,150 218,110 240,110" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="240" y1="110" x2="330" y2="110" stroke="#000" stroke-width="2"/>
  <text x="205" y="170" text-anchor="middle" font-size="10">bounce ~1-20 ms</text>
  <text x="120" y="142" text-anchor="middle" font-size="10">LOW</text>
  <text x="290" y="104" text-anchor="middle" font-size="10">HIGH</text>

  <!-- Debounced trace -->
  <text x="380" y="90" font-size="13" font-weight="bold">Debounced (clean)</text>
  <line x1="380" y1="150" x2="500" y2="150" stroke="#000" stroke-width="2"/>
  <line x1="500" y1="150" x2="500" y2="110" stroke="#000" stroke-width="2"/>
  <line x1="500" y1="110" x2="600" y2="110" stroke="#000" stroke-width="2"/>
  <text x="440" y="142" text-anchor="middle" font-size="10">LOW</text>
  <text x="560" y="104" text-anchor="middle" font-size="10">HIGH</text>
  <text x="500" y="180" text-anchor="middle" font-size="10">one clean edge</text>

  <text x="320" y="240" text-anchor="middle" font-size="12">Without debouncing, one press can look like many presses to the software.</text>
  <text x="320" y="262" text-anchor="middle" font-size="11">Fix: wait for the signal to stay stable (in software or with an RC filter).</text>
</svg>
