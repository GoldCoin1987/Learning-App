<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" font-family="sans-serif">
  <rect width="720" height="260" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">A periodic tick: the timer fires at an even rate</text>

  <!-- time axis -->
  <line x1="60" y1="160" x2="690" y2="160" stroke="#999" stroke-width="1"/>
  <polygon points="690,160 682,156 682,164" fill="#999"/>
  <text x="690" y="182" text-anchor="end" font-size="11" fill="#555">time</text>

  <!-- evenly spaced tick marks -->
  <g stroke="#1f6fb2" stroke-width="2.5">
    <line x1="120" y1="160" x2="120" y2="90"/>
    <line x1="240" y1="160" x2="240" y2="90"/>
    <line x1="360" y1="160" x2="360" y2="90"/>
    <line x1="480" y1="160" x2="480" y2="90"/>
    <line x1="600" y1="160" x2="600" y2="90"/>
  </g>
  <g fill="#1f6fb2">
    <circle cx="120" cy="90" r="4"/>
    <circle cx="240" cy="90" r="4"/>
    <circle cx="360" cy="90" r="4"/>
    <circle cx="480" cy="90" r="4"/>
    <circle cx="600" cy="90" r="4"/>
  </g>

  <!-- equal spacing brace -->
  <line x1="120" y1="200" x2="240" y2="200" stroke="#000" stroke-width="1"/>
  <line x1="120" y1="195" x2="120" y2="205" stroke="#000" stroke-width="1"/>
  <line x1="240" y1="195" x2="240" y2="205" stroke="#000" stroke-width="1"/>
  <text x="180" y="220" text-anchor="middle" font-size="11" fill="#333">e.g. 1 ms apart</text>

  <text x="360" y="70" text-anchor="middle" font-size="12" fill="#c0392b">each "tick" = one interrupt the CPU can act on</text>
  <text x="360" y="246" text-anchor="middle" font-size="11" fill="#555">Count these ticks to keep time (a 1 ms tick counted 1000 times = 1 second)</text>
</svg>
