<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300" font-family="sans-serif">
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold">Alternate Function: One Pin, Many Jobs</text>
  <text x="320" y="50" text-anchor="middle" font-size="12">A mux inside the chip decides what a pin is connected to.</text>

  <!-- mux box -->
  <polygon points="280,90 360,120 360,200 280,230" fill="#e8f0ff" stroke="#000" stroke-width="2"/>
  <text x="320" y="165" text-anchor="middle" font-size="12" font-weight="bold">mux</text>
  <text x="320" y="182" text-anchor="middle" font-size="10">(selector)</text>

  <!-- inputs to mux -->
  <line x1="120" y1="105" x2="280" y2="105" stroke="#000" stroke-width="2"/>
  <text x="115" y="109" text-anchor="end" font-size="11">plain GPIO</text>
  <line x1="120" y1="135" x2="280" y2="135" stroke="#000" stroke-width="2"/>
  <text x="115" y="139" text-anchor="end" font-size="11">UART TX</text>
  <line x1="120" y1="165" x2="280" y2="165" stroke="#000" stroke-width="2"/>
  <text x="115" y="169" text-anchor="end" font-size="11">SPI clock</text>
  <line x1="120" y1="195" x2="280" y2="195" stroke="#000" stroke-width="2"/>
  <text x="115" y="199" text-anchor="end" font-size="11">timer output</text>

  <!-- output pin -->
  <line x1="360" y1="160" x2="470" y2="160" stroke="#000" stroke-width="2"/>
  <circle cx="480" cy="160" r="10" fill="#fdeaea" stroke="#000" stroke-width="2"/>
  <text x="525" y="164" font-size="12" font-weight="bold">the pin</text>

  <text x="320" y="265" text-anchor="middle" font-size="11">Software picks which signal the pin carries. Only one job at a time.</text>
</svg>
