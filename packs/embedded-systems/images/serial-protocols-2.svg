<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" font-family="sans-serif">
  <rect width="680" height="300" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="18" font-weight="bold">I2C Transaction: START, Address+R/W, ACK, STOP</text>
  <text x="340" y="44" text-anchor="middle" font-size="12" fill="#555">Open-drain bus: pull-ups idle both lines HIGH. SDA changes only while SCL is LOW.</text>

  <!-- SDA -->
  <text x="50" y="100" text-anchor="end" font-size="13" font-weight="bold">SDA</text>
  <!-- START: SDA falls while SCL high. Then 7 addr bits + R/W + ACK. STOP: SDA rises while SCL high -->
  <path d="M60,80 L120,80
           L120,110 L150,110 L150,80 L180,80
           L180,110 L240,110 L240,80 L300,80
           L300,110 L360,110 L360,80 L420,80
           L420,110 L480,110
           L540,110 L540,80 L620,80"
        fill="none" stroke="#1a5fb4" stroke-width="2"/>
  <!-- ACK pulled low by slave -->
  <text x="120" y="74" text-anchor="middle" font-size="10" fill="#c0392b">START</text>
  <text x="510" y="124" text-anchor="middle" font-size="10" fill="#0a7">ACK (slave pulls SDA LOW)</text>
  <text x="600" y="74" text-anchor="middle" font-size="10" fill="#c0392b">STOP</text>

  <!-- SCL -->
  <text x="50" y="190" text-anchor="end" font-size="13" font-weight="bold">SCL</text>
  <path d="M60,170 L150,170
           L150,200 L180,200 L180,170 L210,170 L210,200 L240,200 L240,170
           L270,170 L270,200 L300,200 L300,170 L330,170 L330,200 L360,200 L360,170
           L390,170 L390,200 L420,200 L420,170 L450,170 L450,200 L480,200 L480,170
           L510,170 L510,200 L540,200 L540,170 L620,170"
        fill="none" stroke="#000" stroke-width="2"/>

  <!-- vertical guide lines for START and STOP showing SDA edge while SCL high -->
  <line x1="135" y1="60" x2="135" y2="210" stroke="#c0392b" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="565" y1="60" x2="565" y2="210" stroke="#c0392b" stroke-width="1" stroke-dasharray="3 3"/>

  <text x="340" y="244" text-anchor="middle" font-size="12">Frame: S | A6..A0 R/W | ACK | (data bytes + ACK each) | P</text>
  <text x="340" y="266" text-anchor="middle" font-size="11" fill="#c0392b">Missing pull-ups: lines never reach HIGH. START never seen, every transfer NACKs / bus reads as stuck LOW.</text>
  <text x="340" y="286" text-anchor="middle" font-size="11" fill="#555">A held-LOW SDA with a slave mid-byte requires a manual 9-clock recovery to free the bus.</text>
</svg>
