<svg xmlns="http://www.w3.org/2000/svg" width="560" height="340" viewBox="0 0 560 340" font-family="sans-serif">
  <rect width="560" height="340" fill="#ffffff"/>
  <text x="280" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Tiny Memory: Two Separate Budgets</text>
  <text x="280" y="48" text-anchor="middle" font-size="12" fill="#555">a microcontroller has kilobytes, not gigabytes</text>

  <!-- FLASH budget -->
  <text x="150" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#16306e">FLASH (program storage)</text>
  <text x="150" y="97" text-anchor="middle" font-size="10" fill="#555">keeps your code when power is off</text>
  <rect x="40" y="108" width="220" height="40" fill="#ffffff" stroke="#2f5fd0" stroke-width="2"/>
  <rect x="40" y="108" width="150" height="40" fill="#d6e4ff" stroke="none"/>
  <line x1="190" y1="108" x2="190" y2="148" stroke="#2f5fd0" stroke-width="2"/>
  <text x="115" y="133" text-anchor="middle" font-size="11" fill="#16306e">code used</text>
  <text x="225" y="133" text-anchor="middle" font-size="10" fill="#888">free</text>
  <text x="40" y="165" font-size="10" fill="#555">.text (code) + .rodata (constants)</text>

  <!-- RAM budget -->
  <text x="410" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d5e2a">RAM (working memory)</text>
  <text x="410" y="97" text-anchor="middle" font-size="10" fill="#555">scratch space while running</text>
  <rect x="300" y="108" width="220" height="40" fill="#ffffff" stroke="#2f9e3f" stroke-width="2"/>
  <rect x="300" y="108" width="120" height="40" fill="#d8f5d8" stroke="none"/>
  <line x1="420" y1="108" x2="420" y2="148" stroke="#2f9e3f" stroke-width="2"/>
  <text x="360" y="133" text-anchor="middle" font-size="11" fill="#1d5e2a">data used</text>
  <text x="470" y="133" text-anchor="middle" font-size="10" fill="#888">free</text>
  <text x="300" y="165" font-size="10" fill="#555">.data + .bss + stack (+ heap)</text>

  <!-- measuring -->
  <rect x="40" y="195" width="480" height="50" rx="6" fill="#fff7e6" stroke="#d08a2f" stroke-width="2"/>
  <text x="280" y="216" text-anchor="middle" font-size="12" font-weight="bold" fill="#8a5a16">Measure before you cut</text>
  <text x="280" y="234" text-anchor="middle" font-size="11" fill="#8a5a16">the build tools print a size report: how many bytes of flash and RAM you use</text>

  <!-- avoid heap -->
  <rect x="40" y="262" width="480" height="58" rx="6" fill="#ffe9e9" stroke="#c0392b" stroke-width="2"/>
  <text x="280" y="283" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a1f15">Rule of thumb: avoid the heap</text>
  <text x="280" y="300" text-anchor="middle" font-size="11" fill="#7a1f15">prefer fixed-size (static) buffers you size ahead of time</text>
  <text x="280" y="314" text-anchor="middle" font-size="10" fill="#7a1f15">grow-on-demand memory can run out unpredictably on a tiny chip</text>
</svg>
