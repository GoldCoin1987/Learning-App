<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" font-family="sans-serif">
  <rect width="720" height="260" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#000">Cross-compiling: build on one machine, run on another</text>

  <!-- Host PC -->
  <rect x="40" y="70" width="240" height="120" rx="8" fill="#ffffff" stroke="#000"/>
  <text x="160" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">HOST = your PC</text>
  <text x="160" y="120" text-anchor="middle" font-size="12" fill="#000">runs the compiler</text>
  <text x="160" y="140" text-anchor="middle" font-size="12" fill="#000">(big, fast, has a keyboard)</text>
  <text x="160" y="164" text-anchor="middle" font-size="11" fill="#000">Does the building</text>

  <!-- Target MCU -->
  <rect x="440" y="70" width="240" height="120" rx="8" fill="#ffffff" stroke="#000"/>
  <text x="560" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">TARGET = the chip (MCU)</text>
  <text x="560" y="120" text-anchor="middle" font-size="12" fill="#000">a different kind of</text>
  <text x="560" y="140" text-anchor="middle" font-size="12" fill="#000">processor (e.g. ARM)</text>
  <text x="560" y="164" text-anchor="middle" font-size="11" fill="#000">Does the running</text>

  <!-- Arrow -->
  <path d="M280,130 L438,130" fill="none" stroke="#000" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="360" y="120" text-anchor="middle" font-size="12" fill="#000">code for the target</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#000"/>
    </marker>
  </defs>

  <text x="360" y="220" text-anchor="middle" font-size="12" fill="#000">The PC and the chip are different processors, so the compiler on your PC</text>
  <text x="360" y="240" text-anchor="middle" font-size="12" fill="#000">produces code for the chip, not for the PC. That is "cross-compiling".</text>
</svg>
