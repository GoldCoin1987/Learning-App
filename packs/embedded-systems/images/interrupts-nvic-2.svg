<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Polling vs Interrupt</text>

  <!-- divider -->
  <line x1="360" y1="48" x2="360" y2="360" stroke="#ccc" stroke-width="1"/>

  <!-- LEFT: polling -->
  <text x="180" y="70" text-anchor="middle" font-size="15" font-weight="bold" fill="#b02020">POLLING: keep asking</text>

  <rect x="120" y="90" width="120" height="34" fill="#f4c2c2" stroke="#b02020"/>
  <text x="180" y="112" text-anchor="middle" font-size="12" fill="#4a0000">Any event yet?</text>
  <line x1="180" y1="124" x2="180" y2="146" stroke="#b02020" stroke-width="2" marker-end="url(#arrR)"/>

  <rect x="120" y="150" width="120" height="34" fill="#f4c2c2" stroke="#b02020"/>
  <text x="180" y="172" text-anchor="middle" font-size="12" fill="#4a0000">No. Ask again.</text>
  <line x1="180" y1="184" x2="180" y2="206" stroke="#b02020" stroke-width="2" marker-end="url(#arrR)"/>

  <rect x="120" y="210" width="120" height="34" fill="#f4c2c2" stroke="#b02020"/>
  <text x="180" y="232" text-anchor="middle" font-size="12" fill="#4a0000">No. Ask again.</text>
  <line x1="180" y1="244" x2="180" y2="266" stroke="#b02020" stroke-width="2" marker-end="url(#arrR)"/>

  <rect x="120" y="270" width="120" height="34" fill="#f4c2c2" stroke="#b02020"/>
  <text x="180" y="292" text-anchor="middle" font-size="12" fill="#4a0000">Finally: yes!</text>

  <text x="180" y="338" text-anchor="middle" font-size="11" fill="#666">CPU wastes time checking</text>

  <!-- RIGHT: interrupt -->
  <text x="540" y="70" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a5fb4">INTERRUPT: get tapped</text>

  <rect x="480" y="90" width="120" height="74" fill="#cfe0f7" stroke="#1a5fb4"/>
  <text x="540" y="122" text-anchor="middle" font-size="12" fill="#0a2a5a">CPU does other</text>
  <text x="540" y="140" text-anchor="middle" font-size="12" fill="#0a2a5a">useful work</text>

  <line x1="540" y1="164" x2="540" y2="206" stroke="#1a5fb4" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="612" y="188" text-anchor="middle" font-size="11" fill="#1a5fb4">event!</text>

  <rect x="480" y="210" width="120" height="34" fill="#ffe2b3" stroke="#c97a00"/>
  <text x="540" y="232" text-anchor="middle" font-size="12" fill="#5a3a00">Run handler (ISR)</text>
  <line x1="540" y1="244" x2="540" y2="266" stroke="#1a5fb4" stroke-width="2" marker-end="url(#arrB)"/>

  <rect x="480" y="270" width="120" height="34" fill="#cfe0f7" stroke="#1a5fb4"/>
  <text x="540" y="292" text-anchor="middle" font-size="12" fill="#0a2a5a">Resume work</text>

  <text x="540" y="338" text-anchor="middle" font-size="11" fill="#666">CPU reacts only when needed</text>

  <defs>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#b02020"/></marker>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#1a5fb4"/></marker>
  </defs>
</svg>
