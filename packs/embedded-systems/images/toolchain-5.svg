<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="sans-serif">
  <rect width="720" height="320" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#000">The linker decides where each part goes in memory</text>

  <!-- FLASH -->
  <text x="180" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">FLASH (keeps its contents</text>
  <text x="180" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">when power is off)</text>
  <rect x="80" y="90" width="200" height="44" fill="#ffffff" stroke="#000"/>
  <text x="180" y="111" text-anchor="middle" font-size="12" fill="#000">.text - your code</text>
  <text x="180" y="126" text-anchor="middle" font-size="10" fill="#000">(the instructions)</text>
  <rect x="80" y="134" width="200" height="40" fill="#ffffff" stroke="#000"/>
  <text x="180" y="159" text-anchor="middle" font-size="12" fill="#000">.rodata - constants</text>
  <rect x="80" y="174" width="200" height="40" fill="#ffffff" stroke="#000"/>
  <text x="180" y="195" text-anchor="middle" font-size="12" fill="#000">.data start values</text>
  <text x="180" y="208" text-anchor="middle" font-size="10" fill="#000">(stored copy)</text>

  <!-- RAM -->
  <text x="540" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">RAM (fast, writable,</text>
  <text x="540" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">empties when power is off)</text>
  <rect x="440" y="90" width="200" height="40" fill="#ffffff" stroke="#000"/>
  <text x="540" y="115" text-anchor="middle" font-size="12" fill="#000">.data - changeable globals</text>
  <rect x="440" y="130" width="200" height="40" fill="#ffffff" stroke="#000"/>
  <text x="540" y="155" text-anchor="middle" font-size="12" fill="#000">.bss - zeroed globals</text>
  <rect x="440" y="170" width="200" height="64" fill="#ffffff" stroke="#000"/>
  <text x="540" y="195" text-anchor="middle" font-size="12" fill="#000">heap (grows up)</text>
  <text x="540" y="222" text-anchor="middle" font-size="12" fill="#000">stack (grows down)</text>

  <!-- arrow data copy -->
  <path d="M280,194 C350,194 380,110 438,110" fill="none" stroke="#000" stroke-width="2" marker-end="url(#a)"/>
  <text x="360" y="150" text-anchor="middle" font-size="11" fill="#000">startup copies .data</text>
  <text x="360" y="164" text-anchor="middle" font-size="11" fill="#000">FLASH to RAM</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#000"/>
    </marker>
  </defs>

  <text x="360" y="270" text-anchor="middle" font-size="12" fill="#000">A linker script names the memory regions (FLASH, RAM) and tells the linker</text>
  <text x="360" y="290" text-anchor="middle" font-size="12" fill="#000">which parts go where. Code lives in flash; changeable data lives in RAM.</text>
</svg>
