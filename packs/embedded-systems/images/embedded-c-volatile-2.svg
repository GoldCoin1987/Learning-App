<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="sans-serif" font-size="14">
  <rect width="640" height="380" fill="#ffffff"/>
  <text x="320" y="30" fill="#000000" font-size="17" text-anchor="middle" font-weight="bold">A pointer holds an address, not the value</text>

  <!-- slip of paper (pointer) -->
  <rect x="40" y="80" width="200" height="90" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="140" y="70" fill="#000000" text-anchor="middle">pointer (a slip of paper)</text>
  <text x="140" y="120" fill="#000000" text-anchor="middle" font-size="13">"the value lives at</text>
  <text x="140" y="142" fill="#000000" text-anchor="middle" font-size="15" font-weight="bold">address 0x40020014"</text>

  <!-- arrow -->
  <line x1="240" y1="125" x2="400" y2="125" stroke="#000000" stroke-width="2"/>
  <polygon points="400,125 388,118 388,132" fill="#000000"/>
  <text x="320" y="115" fill="#000000" text-anchor="middle" font-size="12">points to</text>

  <!-- memory box (the house) -->
  <rect x="400" y="80" width="200" height="90" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="500" y="70" fill="#000000" text-anchor="middle">memory box (the house)</text>
  <text x="500" y="120" fill="#000000" text-anchor="middle" font-size="13">at 0x40020014</text>
  <text x="500" y="144" fill="#000000" text-anchor="middle" font-size="15" font-weight="bold">value: 0b00100000</text>

  <!-- code -->
  <rect x="40" y="220" width="560" height="120" fill="#f2f2f2" stroke="#000000"/>
  <text x="56" y="248" fill="#000000" font-family="monospace" font-size="13">uint32_t *p = (uint32_t *)0x40020014;  // p holds the address</text>
  <text x="56" y="274" fill="#000000" font-family="monospace" font-size="13">uint32_t v = *p;   // *p means "the value AT that address" (read)</text>
  <text x="56" y="300" fill="#000000" font-family="monospace" font-size="13">*p = 32;           // write 32 INTO the box at that address</text>
  <text x="56" y="326" fill="#000000" font-family="monospace" font-size="12">The * (dereference) is the act of going to the house the slip names.</text>
</svg>
