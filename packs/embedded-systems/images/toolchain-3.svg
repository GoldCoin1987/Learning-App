<svg xmlns="http://www.w3.org/2000/svg" width="760" height="220" viewBox="0 0 760 220" font-family="sans-serif">
  <rect width="760" height="220" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#000">From your C code to code running on the chip</text>
  <g font-size="12" fill="#000">
    <rect x="16"  y="70" width="110" height="56" rx="6" fill="#ffffff" stroke="#000"/>
    <text x="71"  y="94"  text-anchor="middle">Your C code</text>
    <text x="71"  y="112" text-anchor="middle" font-size="10">(what you write)</text>

    <rect x="166" y="70" width="120" height="56" rx="6" fill="#ffffff" stroke="#000"/>
    <text x="226" y="90"  text-anchor="middle">Compiler</text>
    <text x="226" y="108" text-anchor="middle" font-size="10">translates to</text>
    <text x="226" y="120" text-anchor="middle" font-size="10">machine code</text>

    <rect x="326" y="70" width="120" height="56" rx="6" fill="#ffffff" stroke="#000"/>
    <text x="386" y="90"  text-anchor="middle">Linker</text>
    <text x="386" y="108" text-anchor="middle" font-size="10">stitches pieces,</text>
    <text x="386" y="120" text-anchor="middle" font-size="10">picks addresses</text>

    <rect x="486" y="70" width="120" height="56" rx="6" fill="#ffffff" stroke="#000"/>
    <text x="546" y="94"  text-anchor="middle">Program file</text>
    <text x="546" y="112" text-anchor="middle" font-size="10">.elf / .bin</text>

    <rect x="646" y="70" width="98" height="56" rx="6" fill="#ffffff" stroke="#000"/>
    <text x="695" y="90"  text-anchor="middle">Flash it</text>
    <text x="695" y="108" text-anchor="middle" font-size="10">onto the</text>
    <text x="695" y="120" text-anchor="middle" font-size="10">chip</text>
  </g>
  <g stroke="#000" stroke-width="2" marker-end="url(#ar)">
    <line x1="126" y1="98" x2="164" y2="98"/>
    <line x1="286" y1="98" x2="324" y2="98"/>
    <line x1="446" y1="98" x2="484" y2="98"/>
    <line x1="606" y1="98" x2="644" y2="98"/>
  </g>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
  <text x="380" y="170" text-anchor="middle" font-size="12" fill="#000">A chain of tools turns text you type into bytes the chip can run.</text>
  <text x="380" y="192" text-anchor="middle" font-size="12" fill="#000">Compiler = translator. Linker = stitches chapters into a book and numbers the pages.</text>
</svg>
