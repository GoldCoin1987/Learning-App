<svg xmlns="http://www.w3.org/2000/svg" width="660" height="320" viewBox="0 0 660 320" font-family="sans-serif">
  <rect width="660" height="320" fill="#ffffff"/>
  <text x="330" y="26" text-anchor="middle" font-size="18" font-weight="bold">SPI Mode 0 Timing (CPOL=0, CPHA=0)</text>
  <text x="330" y="44" text-anchor="middle" font-size="12" fill="#555">Idle clock LOW; data sampled on the rising (leading) edge</text>

  <!-- CS / SS active-low -->
  <text x="58" y="84" text-anchor="end" font-size="13" font-weight="bold">CS</text>
  <!-- CS high before, drops low for frame, back high -->
  <path d="M70,70 L100,70 L100,95 L560,95 L560,70 L600,70" fill="none" stroke="#0a7" stroke-width="2"/>
  <text x="120" y="112" font-size="10" fill="#0a7">CS asserted LOW = transfer active</text>

  <!-- SCLK: 8 clocks, idle low -->
  <text x="58" y="150" text-anchor="end" font-size="13" font-weight="bold">SCLK</text>
  <!-- baseline low, then 8 pulses between x=120 and x=520 -->
  <path d="M70,160 L120,160
           L120,135 L145,135 L145,160 L170,160
           L170,135 L195,135 L195,160 L220,160
           L220,135 L245,135 L245,160 L270,160
           L270,135 L295,135 L295,160 L320,160
           L320,135 L345,135 L345,160 L370,160
           L370,135 L395,135 L395,160 L420,160
           L420,135 L445,135 L445,160 L470,160
           L470,135 L495,135 L495,160 L600,160"
        fill="none" stroke="#000" stroke-width="2"/>

  <!-- sample markers on rising edges -->
  <circle cx="120" cy="135" r="3" fill="#c0392b"/>
  <circle cx="170" cy="135" r="3" fill="#c0392b"/>
  <circle cx="220" cy="135" r="3" fill="#c0392b"/>
  <circle cx="270" cy="135" r="3" fill="#c0392b"/>
  <circle cx="320" cy="135" r="3" fill="#c0392b"/>
  <circle cx="370" cy="135" r="3" fill="#c0392b"/>
  <circle cx="420" cy="135" r="3" fill="#c0392b"/>
  <circle cx="470" cy="135" r="3" fill="#c0392b"/>

  <!-- MOSI data: 8 bits, changes on falling edge, stable across rising edge -->
  <text x="58" y="225" text-anchor="end" font-size="13" font-weight="bold">MOSI</text>
  <!-- draw bit cells as a series of high/low segments, transitions at falling edges (mid-bit) -->
  <path d="M70,235 L120,235
           L120,210 L170,210
           L170,235 L220,235
           L220,210 L270,210
           L270,210 L320,210
           L320,235 L370,235
           L370,210 L420,210
           L420,235 L470,235
           L470,210 L520,210
           L520,235 L600,235"
        fill="none" stroke="#1a5fb4" stroke-width="2"/>
  <text x="145" y="204" text-anchor="middle" font-size="10" fill="#1a5fb4">1</text>
  <text x="195" y="246" text-anchor="middle" font-size="10" fill="#1a5fb4">0</text>
  <text x="245" y="204" text-anchor="middle" font-size="10" fill="#1a5fb4">1</text>
  <text x="295" y="204" text-anchor="middle" font-size="10" fill="#1a5fb4">1</text>
  <text x="345" y="246" text-anchor="middle" font-size="10" fill="#1a5fb4">0</text>
  <text x="395" y="204" text-anchor="middle" font-size="10" fill="#1a5fb4">1</text>
  <text x="445" y="246" text-anchor="middle" font-size="10" fill="#1a5fb4">0</text>
  <text x="495" y="204" text-anchor="middle" font-size="10" fill="#1a5fb4">1</text>

  <text x="330" y="282" text-anchor="middle" font-size="12" fill="#c0392b">Red dot = sampling instant (leading/rising edge). Data changes on trailing edge.</text>
  <text x="330" y="302" text-anchor="middle" font-size="11" fill="#555">CPHA flips sample-vs-change edge; CPOL flips idle level. A mismatch reads bits shifted by half a clock = garbage.</text>
</svg>
