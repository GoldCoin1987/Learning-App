<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 360" font-family="sans-serif">
  <rect x="0" y="0" width="420" height="360" fill="white"/>
  <text x="210" y="26" font-size="16" font-weight="bold" text-anchor="middle" fill="black">Stack and heap share one RAM region</text>
  <text x="210" y="46" font-size="12" text-anchor="middle" fill="black">(no operating system to referee them)</text>

  <!-- RAM box -->
  <rect x="120" y="60" width="180" height="240" fill="none" stroke="black" stroke-width="2"/>
  <text x="210" y="78" font-size="11" text-anchor="middle" fill="black">high addresses (top)</text>

  <!-- stack region at top -->
  <rect x="120" y="85" width="180" height="55" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="210" y="108" font-size="12" font-weight="bold" text-anchor="middle" fill="black">Stack</text>
  <text x="210" y="125" font-size="10" text-anchor="middle" fill="black">function calls, locals</text>

  <!-- stack grows down arrow -->
  <line x1="210" y1="140" x2="210" y2="180" stroke="black" stroke-width="1.5"/>
  <polygon points="210,183 205,175 215,175" fill="black"/>
  <text x="320" y="160" font-size="10" text-anchor="start" fill="black">grows down</text>

  <!-- gap -->
  <text x="210" y="205" font-size="10" font-style="italic" text-anchor="middle" fill="black">free gap (unchecked!)</text>

  <!-- heap grows up arrow -->
  <line x1="210" y1="255" x2="210" y2="218" stroke="black" stroke-width="1.5"/>
  <polygon points="210,215 205,223 215,223" fill="black"/>
  <text x="320" y="240" font-size="10" text-anchor="start" fill="black">grows up</text>

  <!-- heap region at bottom -->
  <rect x="120" y="258" width="180" height="42" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="210" y="276" font-size="12" font-weight="bold" text-anchor="middle" fill="black">Heap + variables</text>
  <text x="210" y="292" font-size="10" text-anchor="middle" fill="black">.data / .bss</text>

  <text x="210" y="318" font-size="11" text-anchor="middle" fill="black">low addresses (bottom)</text>
  <text x="210" y="344" font-size="11" font-weight="bold" text-anchor="middle" fill="black">If they collide, data is silently overwritten.</text>
</svg>
