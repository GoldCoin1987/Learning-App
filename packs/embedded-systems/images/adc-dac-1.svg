<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240" font-family="sans-serif" font-size="13">
  <rect width="640" height="240" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="15" font-weight="bold">Timer-Triggered ADC + DMA: evenly-sampled buffer</text>

  <!-- Timer -->
  <rect x="20" y="70" width="120" height="60" rx="6" fill="#e8f0fe" stroke="#3367d6"/>
  <text x="80" y="96" text-anchor="middle" font-weight="bold">TIM (TRGO)</text>
  <text x="80" y="114" text-anchor="middle" font-size="11">period = 1/f_s</text>

  <!-- ADC -->
  <rect x="200" y="70" width="120" height="60" rx="6" fill="#e6f4ea" stroke="#188038"/>
  <text x="260" y="96" text-anchor="middle" font-weight="bold">ADC</text>
  <text x="260" y="114" text-anchor="middle" font-size="11">S/H + SAR</text>

  <!-- DMA -->
  <rect x="380" y="70" width="120" height="60" rx="6" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="440" y="96" text-anchor="middle" font-weight="bold">DMA (circular)</text>
  <text x="440" y="114" text-anchor="middle" font-size="11">DR -> RAM</text>

  <!-- Buffer -->
  <rect x="540" y="70" width="80" height="60" rx="6" fill="#fce8e6" stroke="#c5221f"/>
  <text x="580" y="96" text-anchor="middle" font-weight="bold">Buffer</text>
  <text x="580" y="114" text-anchor="middle" font-size="11">[N samples]</text>

  <!-- arrows -->
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>
  <line x1="140" y1="100" x2="196" y2="100" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <text x="168" y="92" text-anchor="middle" font-size="10">trigger</text>
  <line x1="320" y1="100" x2="376" y2="100" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <text x="348" y="92" text-anchor="middle" font-size="10">EOC req</text>
  <line x1="500" y1="100" x2="536" y2="100" stroke="#444" stroke-width="2" marker-end="url(#a)"/>

  <!-- HT/TC interrupt note -->
  <line x1="440" y1="130" x2="440" y2="175" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <rect x="350" y="175" width="180" height="40" rx="6" fill="#f1f3f4" stroke="#888"/>
  <text x="440" y="192" text-anchor="middle" font-size="11">HT / TC interrupt</text>
  <text x="440" y="208" text-anchor="middle" font-size="11">ping-pong -> FFT/radar</text>

  <text x="320" y="232" text-anchor="middle" font-size="11" fill="#555">CPU idle between buffers; sample interval set purely by the timer (low jitter)</text>
</svg>
