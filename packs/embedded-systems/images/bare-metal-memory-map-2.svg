<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="sans-serif">
  <rect x="0" y="0" width="480" height="300" fill="white"/>
  <text x="240" y="28" font-size="17" font-weight="bold" text-anchor="middle" fill="black">An embedded system: a tiny computer inside a device</text>

  <!-- device outline (a microwave) -->
  <rect x="30" y="60" width="200" height="160" fill="none" stroke="black" stroke-width="2"/>
  <text x="130" y="80" font-size="13" font-weight="bold" text-anchor="middle" fill="black">Microwave oven</text>
  <!-- door -->
  <rect x="45" y="95" width="100" height="100" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="95" y="150" font-size="10" text-anchor="middle" fill="black">door / window</text>
  <!-- keypad -->
  <rect x="160" y="95" width="55" height="100" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="187" y="112" font-size="9" text-anchor="middle" fill="black">keypad</text>
  <rect x="170" y="120" width="12" height="12" fill="none" stroke="black"/>
  <rect x="192" y="120" width="12" height="12" fill="none" stroke="black"/>
  <rect x="170" y="140" width="12" height="12" fill="none" stroke="black"/>
  <rect x="192" y="140" width="12" height="12" fill="none" stroke="black"/>

  <!-- arrow to the chip -->
  <line x1="235" y1="140" x2="290" y2="140" stroke="black" stroke-width="2"/>
  <polygon points="293,140 285,135 285,145" fill="black"/>
  <text x="262" y="132" font-size="9" text-anchor="middle" fill="black">controlled by</text>

  <!-- the chip -->
  <rect x="300" y="95" width="150" height="90" fill="none" stroke="black" stroke-width="2"/>
  <text x="375" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="black">Microcontroller</text>
  <text x="375" y="132" font-size="10" text-anchor="middle" fill="black">(the tiny computer chip)</text>
  <text x="375" y="150" font-size="9" text-anchor="middle" fill="black">CPU + memory + pins</text>
  <text x="375" y="166" font-size="9" text-anchor="middle" fill="black">runs your program</text>
  <text x="375" y="180" font-size="9" text-anchor="middle" fill="black">with no operating system</text>
  <!-- pins -->
  <line x1="300" y1="105" x2="290" y2="105" stroke="black"/>
  <line x1="300" y1="120" x2="290" y2="120" stroke="black"/>
  <line x1="450" y1="105" x2="460" y2="105" stroke="black"/>
  <line x1="450" y1="120" x2="460" y2="120" stroke="black"/>

  <text x="240" y="255" font-size="11" text-anchor="middle" fill="black">"Bare-metal" = your program runs straight on the chip,</text>
  <text x="240" y="272" font-size="11" text-anchor="middle" fill="black">with nothing (no Windows/Linux) sitting underneath it.</text>
</svg>
