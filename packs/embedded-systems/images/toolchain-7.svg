<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220" font-family="sans-serif">
  <rect width="720" height="220" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#000">Flashing and debugging: PC, debug probe, chip</text>
  <g font-size="12" fill="#000">
    <rect x="30"  y="80" width="150" height="60" rx="6" fill="#ffffff" stroke="#000"/>
    <text x="105" y="104" text-anchor="middle">Your PC</text>
    <text x="105" y="122" text-anchor="middle" font-size="10">software (GDB)</text>

    <rect x="285" y="80" width="150" height="60" rx="6" fill="#ffffff" stroke="#000"/>
    <text x="360" y="104" text-anchor="middle">Debug probe</text>
    <text x="360" y="122" text-anchor="middle" font-size="10">small adapter box</text>

    <rect x="540" y="80" width="150" height="60" rx="6" fill="#ffffff" stroke="#000"/>
    <text x="615" y="104" text-anchor="middle">The chip (MCU)</text>
    <text x="615" y="122" text-anchor="middle" font-size="10">on your board</text>
  </g>
  <g stroke="#000" stroke-width="2" marker-end="url(#ar)">
    <line x1="180" y1="110" x2="283" y2="110"/>
    <line x1="435" y1="110" x2="538" y2="110"/>
  </g>
  <text x="232" y="100" text-anchor="middle" font-size="10" fill="#000">USB</text>
  <text x="487" y="100" text-anchor="middle" font-size="10" fill="#000">SWD / JTAG wires</text>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
  <text x="360" y="170" text-anchor="middle" font-size="12" fill="#000">The probe loads (flashes) your program onto the chip and lets you pause it,</text>
  <text x="360" y="190" text-anchor="middle" font-size="12" fill="#000">set breakpoints, and watch variables. SWD and JTAG are the wire standards it uses.</text>
</svg>
