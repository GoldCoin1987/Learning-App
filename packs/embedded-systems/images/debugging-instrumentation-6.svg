<svg xmlns="http://www.w3.org/2000/svg" width="500" height="260" viewBox="0 0 500 260" font-family="sans-serif" font-size="13">
  <rect width="500" height="260" fill="#ffffff"/>
  <text x="250" y="26" text-anchor="middle" font-size="16" font-weight="bold">Timing an ISR with a GPIO toggle</text>
  <text x="250" y="46" text-anchor="middle" font-size="11" fill="#555">set a pin high at ISR start, low at end; measure the pulse on a scope</text>

  <!-- main line -->
  <text x="30" y="100" font-size="12">main</text>
  <line x1="70" y1="110" x2="160" y2="110" stroke="#222" stroke-width="2"/>
  <line x1="320" y1="110" x2="470" y2="110" stroke="#222" stroke-width="2"/>
  <text x="115" y="100" text-anchor="middle" font-size="10">running</text>
  <text x="395" y="100" text-anchor="middle" font-size="10">resumes</text>

  <!-- ISR region -->
  <rect x="160" y="80" width="160" height="60" fill="#fde9d6" stroke="#c0392b" stroke-width="1.5"/>
  <text x="240" y="115" text-anchor="middle" font-size="12" font-weight="bold">ISR runs</text>

  <!-- pin trace below -->
  <text x="30" y="190" font-size="12">pin</text>
  <polyline points="70,210 160,210 160,170 320,170 320,210 470,210" fill="none" stroke="#2e7d32" stroke-width="2"/>
  <text x="115" y="225" text-anchor="middle" font-size="10">low</text>
  <text x="240" y="162" text-anchor="middle" font-size="10" fill="#2e7d32">high = inside ISR</text>

  <!-- measurement arrow -->
  <line x1="160" y1="240" x2="320" y2="240" stroke="#1565c0" stroke-width="1.5"/>
  <line x1="160" y1="235" x2="160" y2="245" stroke="#1565c0" stroke-width="1.5"/>
  <line x1="320" y1="235" x2="320" y2="245" stroke="#1565c0" stroke-width="1.5"/>
  <text x="240" y="256" text-anchor="middle" font-size="11" fill="#1565c0">pulse width = how long the ISR took (costs ~1 store, no Heisenbug)</text>
</svg>
