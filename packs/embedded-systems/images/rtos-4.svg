<svg xmlns="http://www.w3.org/2000/svg" width="760" height="380" viewBox="0 0 760 380" font-family="sans-serif">
  <rect width="760" height="380" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">The Scheduler Shares One CPU Among Tasks</text>
  <text x="380" y="48" text-anchor="middle" font-size="11" fill="#555">Only one task runs at any instant; the scheduler switches so fast they all seem to run at once.</text>

  <!-- time axis -->
  <line x1="120" y1="300" x2="720" y2="300" stroke="#333" stroke-width="2"/>
  <text x="720" y="322" text-anchor="end" font-size="12" fill="#333">time</text>
  <text x="120" y="322" font-size="11" fill="#555">CPU runs:</text>

  <!-- lane labels -->
  <text x="110" y="100" text-anchor="end" font-size="12" fill="#555">Task A (sensor)</text>
  <text x="110" y="150" text-anchor="end" font-size="12" fill="#555">Task B (display)</text>
  <text x="110" y="200" text-anchor="end" font-size="12" fill="#555">Task C (wifi)</text>

  <!-- slices on the CPU timeline (bottom) -->
  <!-- A -->
  <rect x="120" y="280" width="80" height="20" fill="#cfe8cf" stroke="#3a7d3a"/>
  <text x="160" y="295" text-anchor="middle" font-size="10" fill="#234">A</text>
  <!-- B -->
  <rect x="200" y="280" width="80" height="20" fill="#cfe0f7" stroke="#1a5fb4"/>
  <text x="240" y="295" text-anchor="middle" font-size="10" fill="#234">B</text>
  <!-- C -->
  <rect x="280" y="280" width="80" height="20" fill="#ffe2b3" stroke="#c97a00"/>
  <text x="320" y="295" text-anchor="middle" font-size="10" fill="#234">C</text>
  <!-- A -->
  <rect x="360" y="280" width="80" height="20" fill="#cfe8cf" stroke="#3a7d3a"/>
  <text x="400" y="295" text-anchor="middle" font-size="10" fill="#234">A</text>
  <!-- B -->
  <rect x="440" y="280" width="80" height="20" fill="#cfe0f7" stroke="#1a5fb4"/>
  <text x="480" y="295" text-anchor="middle" font-size="10" fill="#234">B</text>
  <!-- C -->
  <rect x="520" y="280" width="80" height="20" fill="#ffe2b3" stroke="#c97a00"/>
  <text x="560" y="295" text-anchor="middle" font-size="10" fill="#234">C</text>
  <!-- A -->
  <rect x="600" y="280" width="80" height="20" fill="#cfe8cf" stroke="#3a7d3a"/>
  <text x="640" y="295" text-anchor="middle" font-size="10" fill="#234">A</text>

  <!-- per-lane bars showing when each is "the one running" -->
  <rect x="120" y="90" width="80" height="20" fill="#cfe8cf" stroke="#3a7d3a"/>
  <rect x="360" y="90" width="80" height="20" fill="#cfe8cf" stroke="#3a7d3a"/>
  <rect x="600" y="90" width="80" height="20" fill="#cfe8cf" stroke="#3a7d3a"/>

  <rect x="200" y="140" width="80" height="20" fill="#cfe0f7" stroke="#1a5fb4"/>
  <rect x="440" y="140" width="80" height="20" fill="#cfe0f7" stroke="#1a5fb4"/>

  <rect x="280" y="190" width="80" height="20" fill="#ffe2b3" stroke="#c97a00"/>
  <rect x="520" y="190" width="80" height="20" fill="#ffe2b3" stroke="#c97a00"/>

  <!-- tick markers -->
  <text x="240" y="245" text-anchor="middle" font-size="10" fill="#888">switch</text>
  <line x1="200" y1="250" x2="200" y2="278" stroke="#888" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="280" y1="250" x2="280" y2="278" stroke="#888" stroke-width="1" stroke-dasharray="3 2"/>

  <text x="380" y="352" text-anchor="middle" font-size="11" fill="#555">Each short turn is a "time slice." Swapping which task is on the CPU is a "context switch."</text>
</svg>
