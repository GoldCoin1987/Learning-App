<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 420 420" font-family="monospace" font-size="13">
  <rect width="420" height="420" fill="#ffffff"/>
  <text x="210" y="26" text-anchor="middle" font-size="15" font-weight="bold">Cortex-M Exception Stack Frame</text>
  <text x="210" y="44" text-anchor="middle" font-size="11" fill="#555">pushed automatically on exception entry</text>

  <!-- stack grows downward; high address top, SP points at lowest pushed word -->
  <text x="300" y="66" font-size="11" fill="#888">higher address</text>

  <!-- 8 stacked words (no FPU) -->
  <g stroke="#222" stroke-width="1.5">
    <rect x="120" y="72"  width="180" height="32" fill="#e8eef7"/>
    <rect x="120" y="104" width="180" height="32" fill="#e8eef7"/>
    <rect x="120" y="136" width="180" height="32" fill="#e8eef7"/>
    <rect x="120" y="168" width="180" height="32" fill="#e8eef7"/>
    <rect x="120" y="200" width="180" height="32" fill="#fde9d6"/>
    <rect x="120" y="232" width="180" height="32" fill="#fde9d6"/>
    <rect x="120" y="264" width="180" height="32" fill="#d8f0dc"/>
    <rect x="120" y="296" width="180" height="32" fill="#e8eef7"/>
  </g>

  <text x="210" y="93"  text-anchor="middle">xPSR</text>
  <text x="210" y="125" text-anchor="middle" font-weight="bold">PC  (return addr)</text>
  <text x="210" y="157" text-anchor="middle">LR  (R14)</text>
  <text x="210" y="189" text-anchor="middle">R12</text>
  <text x="210" y="221" text-anchor="middle">R3</text>
  <text x="210" y="253" text-anchor="middle">R2 / R1 / R0</text>
  <text x="210" y="285" text-anchor="middle">R1</text>
  <text x="210" y="317" text-anchor="middle">R0  &lt;-- SP after stacking</text>

  <!-- offset labels -->
  <g fill="#666" font-size="11">
    <text x="60" y="93">+0x1C</text>
    <text x="60" y="125">+0x18</text>
    <text x="60" y="157">+0x14</text>
    <text x="60" y="189">+0x10</text>
    <text x="60" y="221">+0x0C</text>
    <text x="60" y="253">+0x08</text>
    <text x="60" y="285">+0x04</text>
    <text x="60" y="317">+0x00</text>
  </g>

  <text x="300" y="338" font-size="11" fill="#888">lower address</text>

  <!-- callout for PC -->
  <line x1="300" y1="120" x2="360" y2="120" stroke="#c0392b" stroke-width="1.5"/>
  <text x="305" y="380" font-size="11" fill="#c0392b">Stacked PC = the faulting instruction.</text>
  <text x="305" y="396" font-size="11" fill="#c0392b">Find which SP (MSP/PSP) via EXC_RETURN</text>
  <text x="305" y="412" font-size="11" fill="#c0392b">bit2, then read PC; cross-check CFSR.</text>
</svg>
