<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240" font-family="sans-serif" font-size="13">
  <rect width="640" height="240" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="15" font-weight="bold">Sensor voltage to a number your program can read</text>

  <!-- Sensor -->
  <rect x="20" y="80" width="130" height="70" rx="6" fill="#e8f0fe" stroke="#3367d6"/>
  <text x="85" y="108" text-anchor="middle" font-weight="bold">Sensor</text>
  <text x="85" y="126" text-anchor="middle" font-size="11">gives a voltage</text>
  <text x="85" y="142" text-anchor="middle" font-size="11">(e.g. 1.65 V)</text>

  <!-- ADC -->
  <rect x="250" y="80" width="130" height="70" rx="6" fill="#e6f4ea" stroke="#188038"/>
  <text x="315" y="108" text-anchor="middle" font-weight="bold">ADC</text>
  <text x="315" y="126" text-anchor="middle" font-size="11">analog-to-digital</text>
  <text x="315" y="142" text-anchor="middle" font-size="11">converter</text>

  <!-- Program -->
  <rect x="480" y="80" width="140" height="70" rx="6" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="550" y="108" text-anchor="middle" font-weight="bold">Your program</text>
  <text x="550" y="126" text-anchor="middle" font-size="11">reads a number</text>
  <text x="550" y="142" text-anchor="middle" font-size="11">(count = 2048)</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>
  <line x1="150" y1="115" x2="246" y2="115" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <text x="198" y="106" text-anchor="middle" font-size="10">voltage</text>
  <line x1="380" y1="115" x2="476" y2="115" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <text x="428" y="106" text-anchor="middle" font-size="10">whole number</text>

  <text x="320" y="200" text-anchor="middle" font-size="12">0 V maps to 0, and the reference voltage Vref maps to the biggest count</text>
  <text x="320" y="220" text-anchor="middle" font-size="11" fill="#555">A DAC does the reverse: your program writes a number, the pin outputs a voltage</text>
</svg>
