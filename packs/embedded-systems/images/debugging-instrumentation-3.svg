<svg xmlns="http://www.w3.org/2000/svg" width="500" height="260" viewBox="0 0 500 260" font-family="sans-serif" font-size="13">
  <rect width="500" height="260" fill="#ffffff"/>
  <text x="250" y="28" text-anchor="middle" font-size="16" font-weight="bold">Debugging over SWD</text>

  <!-- PC -->
  <rect x="30" y="80" width="120" height="90" fill="#e8eef7" stroke="#222" stroke-width="1.5"/>
  <text x="90" y="120" text-anchor="middle" font-weight="bold">PC</text>
  <text x="90" y="140" text-anchor="middle" font-size="11">debugger (GDB)</text>

  <!-- Probe -->
  <rect x="200" y="90" width="100" height="70" fill="#d8f0dc" stroke="#222" stroke-width="1.5"/>
  <text x="250" y="120" text-anchor="middle" font-weight="bold">Debug</text>
  <text x="250" y="138" text-anchor="middle" font-weight="bold">probe</text>

  <!-- Target -->
  <rect x="360" y="80" width="110" height="90" fill="#fde9d6" stroke="#222" stroke-width="1.5"/>
  <text x="415" y="118" text-anchor="middle" font-weight="bold">Target board</text>
  <text x="415" y="138" text-anchor="middle" font-size="11">(MCU)</text>

  <!-- USB link -->
  <line x1="150" y1="125" x2="200" y2="125" stroke="#222" stroke-width="2"/>
  <text x="175" y="116" text-anchor="middle" font-size="10">USB</text>

  <!-- SWD link: 2 wires -->
  <line x1="300" y1="115" x2="360" y2="115" stroke="#c0392b" stroke-width="2"/>
  <line x1="300" y1="135" x2="360" y2="135" stroke="#c0392b" stroke-width="2"/>
  <text x="330" y="108" text-anchor="middle" font-size="10" fill="#c0392b">SWDIO</text>
  <text x="330" y="155" text-anchor="middle" font-size="10" fill="#c0392b">SWCLK</text>

  <text x="250" y="205" text-anchor="middle" font-size="12">Two wires (SWD) let the PC pause the chip,</text>
  <text x="250" y="223" text-anchor="middle" font-size="12">step one line at a time, and read its variables.</text>
  <text x="250" y="245" text-anchor="middle" font-size="11" fill="#555">Breakpoint = "stop here." Watch = "show me this variable."</text>
</svg>
