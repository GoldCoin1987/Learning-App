<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260" font-family="sans-serif" font-size="13">
  <rect width="640" height="260" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="15" font-weight="bold">DAC: a number becomes an output voltage (sine waveform)</text>

  <!-- table -->
  <rect x="20" y="80" width="120" height="70" rx="6" fill="#e8f0fe" stroke="#3367d6"/>
  <text x="80" y="106" text-anchor="middle" font-weight="bold">Sine table</text>
  <text x="80" y="124" text-anchor="middle" font-size="11">L numbers</text>
  <text x="80" y="140" text-anchor="middle" font-size="11">in RAM</text>

  <!-- DAC -->
  <rect x="220" y="80" width="120" height="70" rx="6" fill="#e6f4ea" stroke="#188038"/>
  <text x="280" y="106" text-anchor="middle" font-weight="bold">DAC</text>
  <text x="280" y="124" text-anchor="middle" font-size="11">number in,</text>
  <text x="280" y="140" text-anchor="middle" font-size="11">voltage out</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>
  <line x1="140" y1="115" x2="216" y2="115" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <text x="178" y="106" text-anchor="middle" font-size="10">timer+DMA</text>
  <line x1="340" y1="115" x2="410" y2="115" stroke="#444" stroke-width="2" marker-end="url(#a)"/>

  <!-- output waveform -->
  <rect x="410" y="70" width="210" height="90" rx="6" fill="#fef7e0" stroke="#f9ab00"/>
  <path d="M420 115 Q445 80 470 115 Q495 150 520 115 Q545 80 570 115 Q595 150 610 115" fill="none" stroke="#c5221f" stroke-width="2"/>
  <text x="515" y="152" text-anchor="middle" font-size="11">analog sine on the pin</text>

  <text x="320" y="200" text-anchor="middle" font-size="12">Vout = (count / max count) x Vref</text>
  <text x="320" y="226" text-anchor="middle" font-size="11" fill="#555">Output frequency = update rate / L (one trip through the table = one cycle)</text>
</svg>
