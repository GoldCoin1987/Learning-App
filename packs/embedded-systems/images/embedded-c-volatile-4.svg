<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400" font-family="sans-serif" font-size="14">
  <rect width="660" height="400" fill="#ffffff"/>
  <text x="330" y="30" fill="#000000" font-size="17" text-anchor="middle" font-weight="bold">Set, clear, and toggle one bit of a register</text>
  <text x="330" y="52" fill="#000000" font-size="13" text-anchor="middle">8-bit register, bit 0 is on the right. We act on bit 5.</text>

  <!-- helper: draw a row of 8 boxes -->
  <!-- START -->
  <text x="40" y="100" fill="#000000" font-size="13">start</text>
  <g font-family="monospace" font-size="15" text-anchor="middle">
    <rect x="120" y="80" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="135" y="101">0</text>
    <rect x="150" y="80" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="165" y="101">0</text>
    <rect x="180" y="80" width="30" height="30" fill="#cccccc" stroke="#000000"/><text x="195" y="101">1</text>
    <rect x="210" y="80" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="225" y="101">0</text>
    <rect x="240" y="80" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="255" y="101">0</text>
    <rect x="270" y="80" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="285" y="101">0</text>
    <rect x="300" y="80" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="315" y="101">0</text>
    <rect x="330" y="80" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="345" y="101">0</text>
  </g>
  <text x="195" y="74" fill="#000000" font-size="11" text-anchor="middle">bit5</text>

  <!-- SET -->
  <text x="40" y="160" fill="#000000" font-size="13">SET bit5</text>
  <text x="40" y="178" fill="#000000" font-family="monospace" font-size="11">|= (1&lt;&lt;5)</text>
  <g font-family="monospace" font-size="15" text-anchor="middle">
    <rect x="120" y="140" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="135" y="161">0</text>
    <rect x="150" y="140" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="165" y="161">0</text>
    <rect x="180" y="140" width="30" height="30" fill="#cccccc" stroke="#000000" stroke-width="2"/><text x="195" y="161">1</text>
    <rect x="210" y="140" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="225" y="161">0</text>
    <rect x="240" y="140" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="255" y="161">0</text>
    <rect x="270" y="140" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="285" y="161">0</text>
    <rect x="300" y="140" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="315" y="161">0</text>
    <rect x="330" y="140" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="345" y="161">0</text>
  </g>
  <text x="420" y="160" fill="#000000" font-size="12">forces bit5 to 1</text>

  <!-- CLEAR -->
  <text x="40" y="220" fill="#000000" font-size="13">CLEAR bit5</text>
  <text x="40" y="238" fill="#000000" font-family="monospace" font-size="11">&amp;= ~(1&lt;&lt;5)</text>
  <g font-family="monospace" font-size="15" text-anchor="middle">
    <rect x="120" y="200" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="135" y="221">0</text>
    <rect x="150" y="200" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="165" y="221">0</text>
    <rect x="180" y="200" width="30" height="30" fill="#ffffff" stroke="#000000" stroke-width="2"/><text x="195" y="221">0</text>
    <rect x="210" y="200" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="225" y="221">0</text>
    <rect x="240" y="200" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="255" y="221">0</text>
    <rect x="270" y="200" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="285" y="221">0</text>
    <rect x="300" y="200" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="315" y="221">0</text>
    <rect x="330" y="200" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="345" y="221">0</text>
  </g>
  <text x="420" y="220" fill="#000000" font-size="12">forces bit5 to 0</text>

  <!-- TOGGLE -->
  <text x="40" y="280" fill="#000000" font-size="13">TOGGLE bit5</text>
  <text x="40" y="298" fill="#000000" font-family="monospace" font-size="11">^= (1&lt;&lt;5)</text>
  <g font-family="monospace" font-size="15" text-anchor="middle">
    <rect x="120" y="260" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="135" y="281">0</text>
    <rect x="150" y="260" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="165" y="281">0</text>
    <rect x="180" y="260" width="30" height="30" fill="#cccccc" stroke="#000000" stroke-width="2"/><text x="195" y="281">1</text>
    <rect x="210" y="260" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="225" y="281">0</text>
    <rect x="240" y="260" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="255" y="281">0</text>
    <rect x="270" y="260" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="285" y="281">0</text>
    <rect x="300" y="260" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="315" y="281">0</text>
    <rect x="330" y="260" width="30" height="30" fill="#ffffff" stroke="#000000"/><text x="345" y="281">0</text>
  </g>
  <text x="420" y="280" fill="#000000" font-size="12">flips bit5 (0 to 1 here)</text>

  <!-- TEST -->
  <rect x="40" y="320" width="580" height="60" fill="#f2f2f2" stroke="#000000"/>
  <text x="56" y="345" fill="#000000" font-family="monospace" font-size="13">TEST:  if (reg &amp; (1&lt;&lt;5)) { ... }   // true when bit5 is 1</text>
  <text x="56" y="368" fill="#000000" font-size="12">1&lt;&lt;5 is a "mask": a single 1 in position 5, used to pick out that one bit.</text>
</svg>
