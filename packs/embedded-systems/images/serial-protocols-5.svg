<svg xmlns="http://www.w3.org/2000/svg" width="680" height="340" viewBox="0 0 680 340" font-family="sans-serif">
  <rect width="680" height="340" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="18" font-weight="bold">I2C Two-Wire Bus with Pull-Ups</text>
  <text x="340" y="44" text-anchor="middle" font-size="12" fill="#555">Just SDA (data) and SCL (clock), shared by everyone. Each device has an address.</text>

  <!-- power rail -->
  <line x1="40" y1="80" x2="640" y2="80" stroke="#000" stroke-width="2"/>
  <text x="40" y="74" font-size="11" font-weight="bold">+V</text>

  <!-- pull-up resistors -->
  <rect x="150" y="95" width="14" height="34" fill="#ffffff" stroke="#c0392b" stroke-width="2"/>
  <line x1="157" y1="80" x2="157" y2="95" stroke="#c0392b" stroke-width="2"/>
  <text x="170" y="115" font-size="10" fill="#c0392b">pull-up (e.g. 4.7k)</text>
  <rect x="200" y="95" width="14" height="34" fill="#ffffff" stroke="#c0392b" stroke-width="2"/>
  <line x1="207" y1="80" x2="207" y2="95" stroke="#c0392b" stroke-width="2"/>

  <!-- SDA line -->
  <line x1="157" y1="129" x2="157" y2="160" stroke="#1a5fb4" stroke-width="2"/>
  <line x1="60" y1="160" x2="620" y2="160" stroke="#1a5fb4" stroke-width="2"/>
  <text x="60" y="154" font-size="12" font-weight="bold" fill="#1a5fb4">SDA</text>

  <!-- SCL line -->
  <line x1="207" y1="129" x2="207" y2="200" stroke="#000" stroke-width="2"/>
  <line x1="60" y1="200" x2="620" y2="200" stroke="#000" stroke-width="2"/>
  <text x="60" y="194" font-size="12" font-weight="bold">SCL</text>

  <!-- Master -->
  <rect x="80" y="225" width="120" height="70" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="140" y="255" text-anchor="middle" font-size="12" font-weight="bold">MASTER</text>
  <text x="140" y="272" text-anchor="middle" font-size="10" fill="#555">(MCU)</text>
  <line x1="120" y1="225" x2="120" y2="160" stroke="#1a5fb4" stroke-width="2"/>
  <line x1="160" y1="225" x2="160" y2="200" stroke="#000" stroke-width="2"/>

  <!-- Device A -->
  <rect x="280" y="225" width="120" height="70" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="340" y="252" text-anchor="middle" font-size="12" font-weight="bold">DEVICE A</text>
  <text x="340" y="272" text-anchor="middle" font-size="10" fill="#555">addr 0x76</text>
  <line x1="320" y1="225" x2="320" y2="160" stroke="#1a5fb4" stroke-width="2"/>
  <line x1="360" y1="225" x2="360" y2="200" stroke="#000" stroke-width="2"/>

  <!-- Device B -->
  <rect x="480" y="225" width="120" height="70" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="540" y="252" text-anchor="middle" font-size="12" font-weight="bold">DEVICE B</text>
  <text x="540" y="272" text-anchor="middle" font-size="10" fill="#555">addr 0x3C</text>
  <line x1="520" y1="225" x2="520" y2="160" stroke="#1a5fb4" stroke-width="2"/>
  <line x1="560" y1="225" x2="560" y2="200" stroke="#000" stroke-width="2"/>

  <text x="340" y="320" text-anchor="middle" font-size="11" fill="#c0392b">No pull-ups = lines never go HIGH = bus never works. This is the #1 I2C mistake.</text>
  <text x="340" y="336" text-anchor="middle" font-size="11" fill="#555">More devices, fewer wires than SPI, but slower. Master calls each device by its address.</text>
</svg>
