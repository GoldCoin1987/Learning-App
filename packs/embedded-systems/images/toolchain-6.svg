<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200" font-family="sans-serif">
  <rect width="720" height="200" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#000">Startup code: the pre-flight checklist before main()</text>
  <g font-size="12" fill="#000">
    <rect x="20"  y="70" width="120" height="56" rx="6" fill="#ffffff" stroke="#000"/>
    <text x="80"  y="94"  text-anchor="middle">Reset</text>
    <text x="80"  y="112" text-anchor="middle" font-size="10">(power on)</text>

    <rect x="180" y="70" width="140" height="56" rx="6" fill="#ffffff" stroke="#000"/>
    <text x="250" y="90"  text-anchor="middle">Copy .data</text>
    <text x="250" y="108" text-anchor="middle" font-size="10">FLASH to RAM</text>
    <text x="250" y="120" text-anchor="middle" font-size="10">(start values)</text>

    <rect x="360" y="70" width="140" height="56" rx="6" fill="#ffffff" stroke="#000"/>
    <text x="430" y="90"  text-anchor="middle">Zero .bss</text>
    <text x="430" y="108" text-anchor="middle" font-size="10">clear the</text>
    <text x="430" y="120" text-anchor="middle" font-size="10">zeroed globals</text>

    <rect x="540" y="70" width="140" height="56" rx="6" fill="#ffffff" stroke="#000"/>
    <text x="610" y="94"  text-anchor="middle">Call main()</text>
    <text x="610" y="112" text-anchor="middle" font-size="10">your program runs</text>
  </g>
  <g stroke="#000" stroke-width="2" marker-end="url(#ar)">
    <line x1="140" y1="98" x2="178" y2="98"/>
    <line x1="320" y1="98" x2="358" y2="98"/>
    <line x1="500" y1="98" x2="538" y2="98"/>
  </g>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
  <text x="360" y="166" text-anchor="middle" font-size="12" fill="#000">main() does not run first. Small startup code runs first to get memory ready,</text>
  <text x="360" y="186" text-anchor="middle" font-size="12" fill="#000">just like a pilot's checklist before takeoff. Only then does it call main().</text>
</svg>
