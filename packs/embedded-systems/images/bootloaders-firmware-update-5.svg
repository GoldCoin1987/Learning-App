<svg xmlns="http://www.w3.org/2000/svg" width="560" height="340" viewBox="0 0 560 340" font-family="sans-serif">
  <rect width="560" height="340" fill="#ffffff"/>
  <text x="280" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Receiving a New Firmware Image</text>
  <text x="280" y="48" text-anchor="middle" font-size="12" fill="#555">the new version arrives over a wire or radio, into the spare slot</text>

  <!-- source -->
  <rect x="30" y="90" width="130" height="70" rx="8" fill="#eeeeee" stroke="#666" stroke-width="2"/>
  <text x="95" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Computer / cloud</text>
  <text x="95" y="138" text-anchor="middle" font-size="10" fill="#555">sends new .bin file</text>

  <!-- transport label -->
  <text x="245" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#16306e">over a link:</text>
  <text x="245" y="131" text-anchor="middle" font-size="10" fill="#16306e">UART cable,</text>
  <text x="245" y="145" text-anchor="middle" font-size="10" fill="#16306e">USB, or wireless (OTA)</text>
  <line x1="160" y1="125" x2="330" y2="125" stroke="#2f5fd0" stroke-width="2" marker-end="url(#c)"/>

  <!-- device flash -->
  <text x="430" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Device flash</text>

  <rect x="350" y="90" width="180" height="40" fill="#d6e4ff" stroke="#2f5fd0" stroke-width="2"/>
  <text x="440" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#16306e">Bootloader</text>

  <rect x="350" y="135" width="180" height="50" fill="#d8f5d8" stroke="#2f9e3f" stroke-width="2"/>
  <text x="440" y="156" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d5e2a">Slot A: current app</text>
  <text x="440" y="172" text-anchor="middle" font-size="10" fill="#1d5e2a">keeps running meanwhile</text>

  <rect x="350" y="190" width="180" height="50" fill="#fff0d6" stroke="#d08a2f" stroke-width="2"/>
  <text x="440" y="211" text-anchor="middle" font-size="11" font-weight="bold" fill="#8a5a16">Slot B: spare</text>
  <text x="440" y="227" text-anchor="middle" font-size="10" fill="#8a5a16">new image written HERE</text>

  <!-- arrow into slot B -->
  <line x1="245" y1="160" x2="245" y2="215" stroke="#d08a2f" stroke-width="2"/>
  <line x1="245" y1="215" x2="348" y2="215" stroke="#d08a2f" stroke-width="2" marker-end="url(#c)"/>

  <!-- write rule -->
  <rect x="40" y="262" width="480" height="58" rx="6" fill="#fff7e6" stroke="#d08a2f" stroke-width="2"/>
  <text x="280" y="283" text-anchor="middle" font-size="12" font-weight="bold" fill="#8a5a16">Writing flash: erase first, then write</text>
  <text x="280" y="300" text-anchor="middle" font-size="11" fill="#8a5a16">flash is erased a whole block at a time before new data can be programmed</text>
  <text x="280" y="314" text-anchor="middle" font-size="10" fill="#8a5a16">writing to the spare slot keeps the working app untouched</text>

  <defs>
    <marker id="c" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
</svg>
