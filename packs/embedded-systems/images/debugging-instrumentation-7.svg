<svg xmlns="http://www.w3.org/2000/svg" width="500" height="280" viewBox="0 0 500 280" font-family="sans-serif" font-size="13">
  <rect width="500" height="280" fill="#ffffff"/>
  <text x="250" y="26" text-anchor="middle" font-size="16" font-weight="bold">Why printf can hide a bug</text>

  <!-- printf path -->
  <text x="20" y="60" font-size="13" font-weight="bold" fill="#c0392b">Blocking printf over UART (slow)</text>
  <rect x="20" y="72" width="100" height="40" fill="#fde9d6" stroke="#222" stroke-width="1.5"/>
  <text x="70" y="96" text-anchor="middle" font-size="11">format text</text>
  <line x1="120" y1="92" x2="160" y2="92" stroke="#222" stroke-width="1.5"/>
  <rect x="160" y="72" width="300" height="40" fill="#fde9d6" stroke="#222" stroke-width="1.5"/>
  <text x="310" y="96" text-anchor="middle" font-size="11">send byte-by-byte out a slow wire... CPU WAITS (milliseconds)</text>
  <text x="240" y="132" text-anchor="middle" font-size="11" fill="#c0392b">that long wait changes the timing -- the bug you were chasing vanishes</text>

  <!-- divider -->
  <line x1="20" y1="150" x2="480" y2="150" stroke="#ccc" stroke-width="1"/>

  <!-- RTT path -->
  <text x="20" y="180" font-size="13" font-weight="bold" fill="#2e7d32">Low-overhead trace (SWO/ITM, RTT)</text>
  <rect x="20" y="192" width="120" height="40" fill="#d8f0dc" stroke="#222" stroke-width="1.5"/>
  <text x="80" y="216" text-anchor="middle" font-size="11">write a few words</text>
  <line x1="140" y1="212" x2="180" y2="212" stroke="#222" stroke-width="1.5"/>
  <rect x="180" y="192" width="130" height="40" fill="#d8f0dc" stroke="#222" stroke-width="1.5"/>
  <text x="245" y="210" text-anchor="middle" font-size="11">to RAM / SWO pin</text>
  <text x="245" y="226" text-anchor="middle" font-size="11">CPU keeps running</text>
  <line x1="310" y1="212" x2="350" y2="212" stroke="#222" stroke-width="1.5"/>
  <rect x="350" y="192" width="110" height="40" fill="#e8eef7" stroke="#222" stroke-width="1.5"/>
  <text x="405" y="210" text-anchor="middle" font-size="11">probe reads it</text>
  <text x="405" y="226" text-anchor="middle" font-size="11">later, off-chip</text>
  <text x="240" y="256" text-anchor="middle" font-size="11" fill="#2e7d32">near-zero delay -- timing stays honest</text>
</svg>
