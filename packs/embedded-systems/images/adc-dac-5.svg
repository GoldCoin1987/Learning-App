<svg xmlns="http://www.w3.org/2000/svg" width="640" height="280" viewBox="0 0 640 280" font-family="sans-serif" font-size="13">
  <rect width="640" height="280" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="15" font-weight="bold">Software trigger vs timer trigger: sample spacing</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>

  <!-- Software trigger row -->
  <text x="40" y="80" font-size="12" font-weight="bold">Software (read in a loop):</text>
  <line x1="40" y1="110" x2="600" y2="110" stroke="#000" stroke-width="2" marker-end="url(#a)"/>
  <text x="610" y="114" font-size="11">time</text>
  <!-- uneven samples -->
  <circle cx="80" cy="110" r="5" fill="#c5221f"/>
  <circle cx="150" cy="110" r="5" fill="#c5221f"/>
  <circle cx="270" cy="110" r="5" fill="#c5221f"/>
  <circle cx="330" cy="110" r="5" fill="#c5221f"/>
  <circle cx="470" cy="110" r="5" fill="#c5221f"/>
  <text x="320" y="140" text-anchor="middle" font-size="11" fill="#c5221f">uneven gaps: spacing jitters with whatever the CPU was doing</text>

  <!-- Timer trigger row -->
  <text x="40" y="190" font-size="12" font-weight="bold">Timer-triggered:</text>
  <line x1="40" y1="220" x2="600" y2="220" stroke="#000" stroke-width="2" marker-end="url(#a)"/>
  <text x="610" y="224" font-size="11">time</text>
  <!-- even samples -->
  <circle cx="90" cy="220" r="5" fill="#188038"/>
  <circle cx="180" cy="220" r="5" fill="#188038"/>
  <circle cx="270" cy="220" r="5" fill="#188038"/>
  <circle cx="360" cy="220" r="5" fill="#188038"/>
  <circle cx="450" cy="220" r="5" fill="#188038"/>
  <circle cx="540" cy="220" r="5" fill="#188038"/>
  <text x="320" y="250" text-anchor="middle" font-size="11" fill="#188038">equal gaps: the timer fires each conversion at an exact, fixed rate</text>
</svg>
