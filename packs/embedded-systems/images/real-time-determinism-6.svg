<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340" font-family="sans-serif">
  <rect width="640" height="340" fill="#ffffff"/>
  <text x="320" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CPU Budget: Don't Fill the Whole Bar</text>
  <text x="320" y="48" font-size="12" text-anchor="middle" fill="#666">Each task uses a slice of CPU time. Add the slices up. Leave room to spare.</text>

  <!-- Bar 1: healthy -->
  <text x="60" y="100" font-size="13" text-anchor="start" fill="#2e8b57" font-weight="bold">Healthy</text>
  <rect x="60" y="110" width="500" height="40" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
  <rect x="60" y="110" width="150" height="40" fill="#4a90d9"/>
  <rect x="210" y="110" width="100" height="40" fill="#7fb3e8"/>
  <rect x="310" y="110" width="60" height="40" fill="#a8cdf2"/>
  <rect x="370" y="110" width="190" height="40" fill="#eafaf1"/>
  <text x="135" y="135" font-size="11" text-anchor="middle" fill="#fff">task A</text>
  <text x="260" y="135" font-size="11" text-anchor="middle" fill="#fff">task B</text>
  <text x="340" y="135" font-size="11" text-anchor="middle" fill="#1a1a1a">C</text>
  <text x="465" y="135" font-size="11" text-anchor="middle" fill="#2e8b57">spare (headroom)</text>
  <text x="565" y="135" font-size="12" text-anchor="start" fill="#2e8b57">~60%</text>

  <!-- Bar 2: overcommitted -->
  <text x="60" y="200" font-size="13" text-anchor="start" fill="#c0392b" font-weight="bold">Overcommitted</text>
  <rect x="60" y="210" width="500" height="40" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
  <rect x="60" y="210" width="230" height="40" fill="#4a90d9"/>
  <rect x="290" y="210" width="160" height="40" fill="#7fb3e8"/>
  <rect x="450" y="210" width="110" height="40" fill="#a8cdf2"/>
  <text x="175" y="235" font-size="11" text-anchor="middle" fill="#fff">task A</text>
  <text x="370" y="235" font-size="11" text-anchor="middle" fill="#fff">task B</text>
  <text x="505" y="235" font-size="11" text-anchor="middle" fill="#1a1a1a">task C</text>
  <!-- overflow -->
  <rect x="560" y="210" width="50" height="40" fill="#f5b7b1" stroke="#c0392b" stroke-width="1.5"/>
  <text x="585" y="235" font-size="11" text-anchor="middle" fill="#c0392b">over!</text>
  <text x="585" y="200" font-size="11" text-anchor="middle" fill="#c0392b">&gt;100%</text>

  <text x="310" y="290" font-size="12" text-anchor="middle" fill="#1a1a1a">If the slices add up past 100% of the time available, some task WILL miss its deadline.</text>
  <text x="310" y="314" font-size="12" text-anchor="middle" fill="#666">Headroom absorbs the rare slow moments (the worst-case tail).</text>
</svg>
