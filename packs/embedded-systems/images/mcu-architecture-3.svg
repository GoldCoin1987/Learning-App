<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" font-family="sans-serif">
  <rect x="0" y="0" width="560" height="400" fill="white"/>
  <text x="280" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="black">Inside a Microcontroller</text>
  <text x="280" y="48" font-size="12" text-anchor="middle" fill="black">Buses are the roads connecting the parts</text>

  <!-- CPU -->
  <rect x="40" y="90" width="140" height="110" fill="none" stroke="black" stroke-width="2"/>
  <text x="110" y="115" font-size="14" font-weight="bold" text-anchor="middle" fill="black">CPU (brain)</text>
  <rect x="60" y="130" width="100" height="55" fill="none" stroke="black" stroke-width="1"/>
  <text x="110" y="150" font-size="11" text-anchor="middle" fill="black">registers</text>
  <text x="110" y="166" font-size="9" text-anchor="middle" fill="black">tiny fast slots</text>
  <text x="110" y="179" font-size="9" text-anchor="middle" fill="black">on the desk</text>

  <!-- Bus line (vertical spine) -->
  <line x1="280" y1="80" x2="280" y2="340" stroke="black" stroke-width="3"/>
  <text x="300" y="75" font-size="12" font-weight="bold" fill="black">BUS (the road)</text>

  <!-- CPU to bus -->
  <line x1="180" y1="145" x2="280" y2="145" stroke="black" stroke-width="2"/>

  <!-- Flash -->
  <rect x="360" y="95" width="160" height="45" fill="none" stroke="black" stroke-width="2"/>
  <text x="440" y="115" font-size="13" font-weight="bold" text-anchor="middle" fill="black">FLASH</text>
  <text x="440" y="132" font-size="10" text-anchor="middle" fill="black">program + constants</text>
  <line x1="280" y1="117" x2="360" y2="117" stroke="black" stroke-width="2"/>

  <!-- RAM -->
  <rect x="360" y="165" width="160" height="45" fill="none" stroke="black" stroke-width="2"/>
  <text x="440" y="185" font-size="13" font-weight="bold" text-anchor="middle" fill="black">RAM</text>
  <text x="440" y="202" font-size="10" text-anchor="middle" fill="black">working data (filing cabinet)</text>
  <line x1="280" y1="187" x2="360" y2="187" stroke="black" stroke-width="2"/>

  <!-- Peripherals -->
  <rect x="360" y="235" width="160" height="45" fill="none" stroke="black" stroke-width="2"/>
  <text x="440" y="255" font-size="13" font-weight="bold" text-anchor="middle" fill="black">PERIPHERALS</text>
  <text x="440" y="272" font-size="10" text-anchor="middle" fill="black">pins, timers, serial ports</text>
  <line x1="280" y1="257" x2="360" y2="257" stroke="black" stroke-width="2"/>

  <text x="280" y="375" font-size="11" text-anchor="middle" fill="black">The CPU fetches code from flash, keeps working values in registers, stores</text>
  <text x="280" y="392" font-size="11" text-anchor="middle" fill="black">larger data in RAM, and controls hardware through peripheral registers.</text>
</svg>
