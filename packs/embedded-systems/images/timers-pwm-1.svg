<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" font-family="sans-serif">
  <rect width="720" height="260" fill="#fbfbfd"/>
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Edge-aligned PWM: counter ramp vs output</text>

  <!-- axes for counter ramp -->
  <g stroke="#bbb" stroke-width="1">
    <line x1="60" y1="120" x2="700" y2="120"/>   <!-- time axis (counter) -->
    <line x1="60" y1="40"  x2="60"  y2="120"/>   <!-- value axis -->
  </g>
  <text x="40" y="46" text-anchor="middle" font-size="10" fill="#555">ARR</text>
  <text x="40" y="86" text-anchor="middle" font-size="10" fill="#555">CCR</text>
  <line x1="56" y1="42" x2="700" y2="42" stroke="#d08a2a" stroke-dasharray="4 3"/>
  <line x1="56" y1="82" x2="700" y2="82" stroke="#4a9a4a" stroke-dasharray="4 3"/>

  <!-- sawtooth counter, two periods, ARR at y=42, CCR at y=82 -->
  <polyline fill="none" stroke="#4a78c8" stroke-width="2"
    points="60,120 220,42 220,120 380,42 380,120 540,42 540,120 700,42"/>
  <text x="200" y="138" text-anchor="middle" font-size="10" fill="#1f3d6b">period = (ARR+1) ticks</text>

  <!-- PWM output line below -->
  <text x="360" y="172" text-anchor="middle" font-size="12" fill="#333">PWM output (high while CNT &lt; CCR)</text>
  <g stroke="#8a5ad0" stroke-width="2" fill="none">
    <!-- period 1: high 0..82-crossing then low -->
    <polyline points="60,200 140,200 140,240 220,240"/>
    <polyline points="220,200 300,200 300,240 380,240"/>
    <polyline points="380,200 460,200 460,240 540,240"/>
    <polyline points="540,200 620,200 620,240 700,240"/>
  </g>
  <line x1="60" y1="200" x2="700" y2="200" stroke="#ccc" stroke-dasharray="2 2"/>
  <line x1="60" y1="240" x2="700" y2="240" stroke="#ccc" stroke-dasharray="2 2"/>

  <text x="100" y="216" text-anchor="middle" font-size="10" fill="#4a2a7a">t_on</text>
  <text x="180" y="216" text-anchor="middle" font-size="10" fill="#4a2a7a">t_off</text>
  <text x="360" y="258" text-anchor="middle" font-size="11" fill="#555">duty = CCR / (ARR+1)   ;   f = f_clk / ((PSC+1)(ARR+1))</text>
</svg>
