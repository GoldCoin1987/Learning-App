<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="sans-serif">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Measuring How Long Code Takes</text>
  <text x="320" y="48" font-size="12" text-anchor="middle" fill="#666">Set a pin HIGH when the work starts, LOW when it ends. The pulse width = the time.</text>

  <!-- code side -->
  <rect x="30" y="80" width="230" height="150" fill="#f4f6f7" stroke="#333" stroke-width="1.5"/>
  <text x="145" y="104" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">your handler code</text>
  <text x="48" y="134" font-size="12" fill="#2e8b57" font-family="monospace">pin = HIGH;</text>
  <text x="48" y="160" font-size="12" fill="#1a1a1a" font-family="monospace">  do the work...</text>
  <text x="48" y="186" font-size="12" fill="#c0392b" font-family="monospace">pin = LOW;</text>
  <text x="48" y="214" font-size="11" fill="#666" font-family="monospace">// one I/O pin, near-free</text>

  <!-- arrow to scope -->
  <line x1="265" y1="155" x2="320" y2="155" stroke="#333" stroke-width="2"/>
  <polygon points="320,155 310,150 310,160" fill="#333"/>
  <text x="292" y="146" font-size="10" text-anchor="middle" fill="#666">wire</text>

  <!-- scope screen -->
  <rect x="330" y="80" width="290" height="200" fill="#0b0f1a" stroke="#333" stroke-width="2"/>
  <text x="475" y="104" font-size="13" font-weight="bold" text-anchor="middle" fill="#e0e0e0">oscilloscope</text>
  <!-- grid -->
  <g stroke="#23304a" stroke-width="1">
    <line x1="350" y1="130" x2="600" y2="130"/>
    <line x1="350" y1="180" x2="600" y2="180"/>
    <line x1="350" y1="230" x2="600" y2="230"/>
    <line x1="410" y1="120" x2="410" y2="260"/>
    <line x1="470" y1="120" x2="470" y2="260"/>
    <line x1="530" y1="120" x2="530" y2="260"/>
  </g>
  <!-- pulse trace -->
  <polyline points="350,240 420,240 420,150 520,150 520,240 600,240" fill="none" stroke="#46e07a" stroke-width="2.5"/>
  <!-- pulse width annotation -->
  <line x1="420" y1="270" x2="520" y2="270" stroke="#f1c40f" stroke-width="1.5"/>
  <line x1="420" y1="265" x2="420" y2="275" stroke="#f1c40f" stroke-width="1.5"/>
  <line x1="520" y1="265" x2="520" y2="275" stroke="#f1c40f" stroke-width="1.5"/>
  <text x="470" y="265" font-size="11" text-anchor="middle" fill="#f1c40f">width = run time</text>
  <text x="385" y="146" font-size="10" fill="#888">LOW</text>
  <text x="455" y="146" font-size="10" fill="#46e07a">HIGH</text>

  <text x="320" y="312" font-size="12" text-anchor="middle" fill="#1a1a1a">Capture thousands of pulses to see the longest one (the worst case),</text>
  <text x="320" y="332" font-size="12" text-anchor="middle" fill="#1a1a1a">not just a typical one. The toggling itself barely affects the timing.</text>
</svg>
