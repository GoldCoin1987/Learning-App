<svg xmlns="http://www.w3.org/2000/svg" width="500" height="320" viewBox="0 0 500 320" font-family="sans-serif" font-size="13">
  <rect width="500" height="320" fill="#ffffff"/>
  <text x="250" y="26" text-anchor="middle" font-size="16" font-weight="bold">Same wire, two views</text>

  <!-- Oscilloscope view -->
  <text x="250" y="52" text-anchor="middle" font-size="13" font-weight="bold">Oscilloscope: the real voltage shape</text>
  <rect x="40" y="60" width="420" height="90" fill="#fff8f1" stroke="#888" stroke-width="1"/>
  <!-- baseline -->
  <line x1="50" y1="135" x2="450" y2="135" stroke="#bbb" stroke-width="1"/>
  <!-- a pulse with ringing/glitch -->
  <polyline points="50,135 120,135 122,75 140,72 150,80 158,74 165,78 230,78 232,135 250,138 256,133 300,135 360,135 362,78 380,76 450,76"
            fill="none" stroke="#c0392b" stroke-width="2"/>
  <text x="160" y="68" font-size="10" fill="#c0392b">ringing / overshoot</text>
  <text x="290" y="128" font-size="10" fill="#c0392b">narrow glitch</text>

  <!-- Logic analyzer view -->
  <text x="250" y="186" text-anchor="middle" font-size="13" font-weight="bold">Logic analyzer: just 1s and 0s</text>
  <rect x="40" y="194" width="420" height="80" fill="#f1faf3" stroke="#888" stroke-width="1"/>
  <!-- clean square wave (same signal, thresholded) -->
  <polyline points="50,260 120,260 120,210 230,210 230,260 360,260 360,210 450,210"
            fill="none" stroke="#2e7d32" stroke-width="2"/>
  <text x="250" y="296" text-anchor="middle" font-size="11" fill="#555">The analyzer reports 0 or 1 only -- it hides the ringing and</text>
  <text x="250" y="312" text-anchor="middle" font-size="11" fill="#555">glitch shape. Great for decoding bytes, blind to signal quality.</text>
</svg>
