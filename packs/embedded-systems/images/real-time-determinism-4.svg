<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340" font-family="sans-serif">
  <rect width="640" height="340" fill="#ffffff"/>
  <text x="320" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Latency and Jitter</text>
  <text x="320" y="48" font-size="12" text-anchor="middle" fill="#666">Latency = wait from event to response. Jitter = how much that wait varies.</text>

  <!-- event ticks (top row) -->
  <text x="55" y="92" font-size="12" fill="#333" text-anchor="start" font-weight="bold">event</text>
  <line x1="110" y1="100" x2="610" y2="100" stroke="#999" stroke-width="1"/>
  <g stroke="#2c5f8a" stroke-width="2">
    <line x1="140" y1="90" x2="140" y2="110"/>
    <line x1="260" y1="90" x2="260" y2="110"/>
    <line x1="380" y1="90" x2="380" y2="110"/>
    <line x1="500" y1="90" x2="500" y2="110"/>
  </g>

  <!-- response ticks (bottom row) -->
  <text x="55" y="222" font-size="12" fill="#333" text-anchor="start" font-weight="bold">response</text>
  <line x1="110" y1="210" x2="610" y2="210" stroke="#999" stroke-width="1"/>
  <g stroke="#c0392b" stroke-width="2">
    <line x1="170" y1="200" x2="170" y2="220"/>
    <line x1="298" y1="200" x2="298" y2="220"/>
    <line x1="404" y1="200" x2="404" y2="220"/>
    <line x1="560" y1="200" x2="560" y2="220"/>
  </g>

  <!-- latency arrows -->
  <g stroke="#8e44ad" stroke-width="1.5">
    <line x1="140" y1="155" x2="170" y2="155"/>
    <line x1="260" y1="155" x2="298" y2="155"/>
    <line x1="380" y1="155" x2="404" y2="155"/>
    <line x1="500" y1="155" x2="560" y2="155"/>
  </g>
  <text x="155" y="148" font-size="10" text-anchor="middle" fill="#8e44ad">short</text>
  <text x="279" y="148" font-size="10" text-anchor="middle" fill="#8e44ad">medium</text>
  <text x="392" y="148" font-size="10" text-anchor="middle" fill="#8e44ad">short</text>
  <text x="530" y="148" font-size="10" text-anchor="middle" fill="#8e44ad">long!</text>

  <text x="320" y="250" font-size="12" text-anchor="middle" fill="#1a1a1a">Each purple gap is one latency. They are not equal.</text>
  <text x="320" y="272" font-size="13" text-anchor="middle" fill="#8e44ad" font-weight="bold">Jitter = the difference between the shortest and longest latency.</text>
  <text x="320" y="300" font-size="12" text-anchor="middle" fill="#666">A steady latency is easy to plan for. A wandering one (high jitter) is the enemy.</text>

  <line x1="110" y1="320" x2="610" y2="320" stroke="#333" stroke-width="2"/>
  <polygon points="610,320 600,315 600,325" fill="#333"/>
  <text x="360" y="337" font-size="12" text-anchor="middle" fill="#333">time -&gt;</text>
</svg>
