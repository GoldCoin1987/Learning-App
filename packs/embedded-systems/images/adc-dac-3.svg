<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260" font-family="sans-serif" font-size="13">
  <rect width="640" height="260" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="15" font-weight="bold">12-bit scale: 0..Vref maps to 0..4095</text>

  <!-- number line -->
  <line x1="60" y1="120" x2="580" y2="120" stroke="#000" stroke-width="2"/>
  <!-- ticks -->
  <line x1="60" y1="112" x2="60" y2="128" stroke="#000" stroke-width="2"/>
  <line x1="320" y1="112" x2="320" y2="128" stroke="#000" stroke-width="2"/>
  <line x1="580" y1="112" x2="580" y2="128" stroke="#000" stroke-width="2"/>

  <!-- voltage labels above -->
  <text x="60" y="100" text-anchor="middle" font-size="12">0 V</text>
  <text x="320" y="100" text-anchor="middle" font-size="12">Vref / 2 = 1.65 V</text>
  <text x="580" y="100" text-anchor="middle" font-size="12">Vref = 3.30 V</text>

  <!-- count labels below -->
  <text x="60" y="148" text-anchor="middle" font-size="12">count 0</text>
  <text x="320" y="148" text-anchor="middle" font-size="12">count 2048</text>
  <text x="580" y="148" text-anchor="middle" font-size="12">count 4095</text>

  <!-- step size callout -->
  <rect x="160" y="180" width="320" height="56" rx="6" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="320" y="202" text-anchor="middle" font-size="12" font-weight="bold">Step size (one LSB) = Vref / 4096</text>
  <text x="320" y="222" text-anchor="middle" font-size="12">3.30 V / 4096 = about 0.81 mV per count</text>

  <text x="320" y="62" text-anchor="middle" font-size="12" fill="#555">12 bits gives 2^12 = 4096 steps, numbered 0 to 4095</text>
</svg>
