<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 470" font-family="sans-serif">
  <rect x="0" y="0" width="520" height="470" fill="white"/>
  <text x="260" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="black">Cortex-M Exception Entry Stack Frame</text>
  <text x="260" y="48" font-size="12" text-anchor="middle" fill="black">8 words auto-pushed by hardware on exception entry</text>

  <!-- left: timeline -->
  <text x="20" y="80" font-size="12" font-weight="bold" fill="black">Before IRQ:</text>
  <text x="20" y="98" font-size="11" fill="black">thread mode, SP = MSP/PSP</text>
  <text x="20" y="120" font-size="12" font-weight="bold" fill="black">On entry, HW does:</text>
  <text x="20" y="138" font-size="11" fill="black">1. push 8 words to current SP</text>
  <text x="20" y="156" font-size="11" fill="black">2. load EXC_RETURN into LR</text>
  <text x="20" y="174" font-size="11" fill="black">3. fetch handler addr from</text>
  <text x="20" y="190" font-size="11" fill="black">    vector table, load into PC</text>
  <text x="20" y="208" font-size="11" fill="black">4. enter handler mode (priv.)</text>
  <text x="20" y="232" font-size="11" fill="black">Caller-saved regs are saved</text>
  <text x="20" y="248" font-size="11" fill="black">so the ISR is a normal C fn.</text>
  <text x="20" y="266" font-size="11" fill="black">Tail-chaining skips unstack/</text>
  <text x="20" y="282" font-size="11" fill="black">restack between back-to-back</text>
  <text x="20" y="298" font-size="11" fill="black">exceptions.</text>

  <!-- right: stack frame -->
  <text x="390" y="80" font-size="11" text-anchor="middle" fill="black">higher addr (old SP)</text>
  <rect x="300" y="90" width="180" height="32" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="111" font-size="13" text-anchor="middle" fill="black">xPSR</text>
  <rect x="300" y="122" width="180" height="32" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="143" font-size="13" text-anchor="middle" fill="black">PC (return addr)</text>
  <rect x="300" y="154" width="180" height="32" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="175" font-size="13" text-anchor="middle" fill="black">LR (R14)</text>
  <rect x="300" y="186" width="180" height="32" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="207" font-size="13" text-anchor="middle" fill="black">R12</text>
  <rect x="300" y="218" width="180" height="32" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="239" font-size="13" text-anchor="middle" fill="black">R3</text>
  <rect x="300" y="250" width="180" height="32" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="271" font-size="13" text-anchor="middle" fill="black">R2</text>
  <rect x="300" y="282" width="180" height="32" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="303" font-size="13" text-anchor="middle" fill="black">R1</text>
  <rect x="300" y="314" width="180" height="32" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="335" font-size="13" text-anchor="middle" fill="black">R0</text>
  <text x="390" y="364" font-size="11" text-anchor="middle" fill="black">lower addr (new SP) &#8592;</text>

  <!-- SP arrow -->
  <line x1="280" y1="330" x2="298" y2="330" stroke="black" stroke-width="2"/>
  <polygon points="300,330 292,326 292,334" fill="black"/>
  <text x="250" y="320" font-size="10" fill="black">SP</text>

  <text x="260" y="400" font-size="11" text-anchor="middle" fill="black">Stack grows down; if FPU active, S0-S15 + FPSCR are also pushed (extended frame).</text>
  <text x="260" y="420" font-size="11" text-anchor="middle" fill="black">On return, EXC_RETURN in PC triggers HW unstacking and restores thread mode.</text>
  <text x="260" y="440" font-size="11" text-anchor="middle" fill="black">Faulting PC for a HardFault is recovered from the stacked PC slot.</text>
</svg>
