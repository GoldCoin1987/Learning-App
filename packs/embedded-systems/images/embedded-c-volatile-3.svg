<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" font-family="sans-serif" font-size="14">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" fill="#000000" font-size="17" text-anchor="middle" font-weight="bold">Without volatile: the LED stops blinking</text>

  <!-- WITHOUT volatile -->
  <text x="170" y="62" fill="#000000" text-anchor="middle" font-weight="bold">WITHOUT volatile</text>
  <rect x="30" y="74" width="280" height="150" fill="#f2f2f2" stroke="#000000"/>
  <text x="44" y="100" fill="#000000" font-family="monospace" font-size="12">while (1) {</text>
  <text x="44" y="122" fill="#000000" font-family="monospace" font-size="12">  if (*STATUS) toggle_led();</text>
  <text x="44" y="144" fill="#000000" font-family="monospace" font-size="12">}</text>
  <text x="44" y="178" fill="#000000" font-size="12">Compiler reads STATUS ONCE,</text>
  <text x="44" y="196" fill="#000000" font-size="12">keeps a stale cached copy,</text>
  <text x="44" y="214" fill="#000000" font-size="12">never re-checks the hardware.</text>

  <!-- LED off -->
  <circle cx="170" cy="270" r="22" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="170" y="312" fill="#000000" text-anchor="middle" font-size="13">LED STUCK (off)</text>

  <!-- WITH volatile -->
  <text x="470" y="62" fill="#000000" text-anchor="middle" font-weight="bold">WITH volatile</text>
  <rect x="330" y="74" width="280" height="150" fill="#f2f2f2" stroke="#000000"/>
  <text x="344" y="100" fill="#000000" font-family="monospace" font-size="12">volatile uint32_t *STATUS;</text>
  <text x="344" y="122" fill="#000000" font-family="monospace" font-size="12">while (1) {</text>
  <text x="344" y="144" fill="#000000" font-family="monospace" font-size="12">  if (*STATUS) toggle_led();</text>
  <text x="344" y="166" fill="#000000" font-family="monospace" font-size="12">}</text>
  <text x="344" y="196" fill="#000000" font-size="12">Compiler ACTUALLY reads the</text>
  <text x="344" y="214" fill="#000000" font-size="12">hardware every loop.</text>

  <!-- LED on -->
  <circle cx="470" cy="270" r="22" fill="#cccccc" stroke="#000000" stroke-width="2"/>
  <line x1="470" y1="240" x2="470" y2="228" stroke="#000000" stroke-width="2"/>
  <line x1="470" y1="300" x2="470" y2="312" stroke="#000000" stroke-width="2"/>
  <text x="470" y="332" fill="#000000" text-anchor="middle" font-size="13">LED BLINKS</text>

  <text x="320" y="372" fill="#000000" text-anchor="middle" font-size="13" font-weight="bold">volatile = "always physically go check the mailbox, don't assume."</text>
</svg>
