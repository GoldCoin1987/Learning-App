<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360" font-family="sans-serif">
  <rect width="560" height="360" fill="#ffffff"/>
  <text x="280" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">A/B Dual-Bank Flash Layout</text>

  <!-- Address axis label -->
  <text x="40" y="60" font-size="11" fill="#666">0x08000000 (low)</text>
  <text x="40" y="345" font-size="11" fill="#666">high address</text>

  <!-- Bootloader -->
  <rect x="160" y="70" width="240" height="55" fill="#d6e4ff" stroke="#2f5fd0" stroke-width="2"/>
  <text x="280" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#16306e">Bootloader (immutable)</text>
  <text x="280" y="113" text-anchor="middle" font-size="11" fill="#16306e">ROM hands here; validates + jumps</text>

  <!-- Slot A -->
  <rect x="160" y="135" width="240" height="70" fill="#d8f5d8" stroke="#2f9e3f" stroke-width="2"/>
  <text x="280" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d5e2a">Slot A  (active app)</text>
  <text x="280" y="178" text-anchor="middle" font-size="11" fill="#1d5e2a">vector table + .text, v1.4.2</text>
  <text x="280" y="194" text-anchor="middle" font-size="11" fill="#1d5e2a">header: magic, size, CRC, sig</text>

  <!-- Slot B -->
  <rect x="160" y="215" width="240" height="70" fill="#fff0d6" stroke="#d08a2f" stroke-width="2"/>
  <text x="280" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#8a5a16">Slot B  (inactive / staging)</text>
  <text x="280" y="258" text-anchor="middle" font-size="11" fill="#8a5a16">new image written here first</text>
  <text x="280" y="274" text-anchor="middle" font-size="11" fill="#8a5a16">becomes active on atomic swap</text>

  <!-- Scratch / trailer -->
  <rect x="160" y="295" width="240" height="45" fill="#eee" stroke="#999" stroke-width="2"/>
  <text x="280" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">Swap status / trailer</text>
  <text x="280" y="333" text-anchor="middle" font-size="10" fill="#444">pending / confirmed / revert flags</text>

  <!-- Arrows -->
  <line x1="410" y1="170" x2="470" y2="170" stroke="#2f9e3f" stroke-width="2"/>
  <text x="475" y="166" font-size="10" fill="#1d5e2a">runs now</text>
  <line x1="410" y1="250" x2="470" y2="250" stroke="#d08a2f" stroke-width="2"/>
  <text x="475" y="246" font-size="10" fill="#8a5a16">downloads</text>
  <text x="475" y="259" font-size="10" fill="#8a5a16">into here</text>
</svg>
