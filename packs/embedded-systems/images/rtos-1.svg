<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="sans-serif">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">RTOS Task States &amp; Transitions</text>

  <!-- defs for arrowhead -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>

  <!-- RUNNING -->
  <rect x="290" y="70" width="140" height="56" rx="8" fill="#cfe8cf" stroke="#3a7d3a" stroke-width="2"/>
  <text x="360" y="98" text-anchor="middle" font-size="15" font-weight="bold" fill="#234">RUNNING</text>
  <text x="360" y="116" text-anchor="middle" font-size="10" fill="#3a7d3a">on the CPU (1 per core)</text>

  <!-- READY -->
  <rect x="70" y="250" width="150" height="56" rx="8" fill="#cfe0f7" stroke="#1a5fb4" stroke-width="2"/>
  <text x="145" y="278" text-anchor="middle" font-size="15" font-weight="bold" fill="#0a2a5a">READY</text>
  <text x="145" y="296" text-anchor="middle" font-size="10" fill="#1a5fb4">runnable, waiting for CPU</text>

  <!-- BLOCKED -->
  <rect x="500" y="250" width="150" height="56" rx="8" fill="#ffe2b3" stroke="#c97a00" stroke-width="2"/>
  <text x="575" y="278" text-anchor="middle" font-size="15" font-weight="bold" fill="#5a3a00">BLOCKED</text>
  <text x="575" y="296" text-anchor="middle" font-size="10" fill="#c97a00">waiting on event/timeout</text>

  <!-- SUSPENDED -->
  <rect x="290" y="330" width="140" height="50" rx="8" fill="#eeeeee" stroke="#888" stroke-width="2"/>
  <text x="360" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="#555">SUSPENDED</text>

  <!-- READY -> RUNNING (scheduler dispatch) -->
  <line x1="190" y1="250" x2="300" y2="128" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="205" y="190" font-size="11" fill="#1a5fb4">scheduler picks</text>
  <text x="205" y="204" font-size="11" fill="#1a5fb4">highest prio</text>

  <!-- RUNNING -> READY (preempted / time slice) -->
  <line x1="295" y1="120" x2="175" y2="248" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="60" y="220" font-size="11" fill="#b02020">preempted /</text>
  <text x="60" y="234" font-size="11" fill="#b02020">time-slice end</text>

  <!-- RUNNING -> BLOCKED (take mutex/queue wait) -->
  <line x1="425" y1="120" x2="545" y2="248" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="470" y="180" font-size="11" fill="#c97a00">blocks on take()/</text>
  <text x="470" y="194" font-size="11" fill="#c97a00">queue/delay</text>

  <!-- BLOCKED -> READY (event arrives / give from ISR) -->
  <line x1="500" y1="290" x2="222" y2="290" stroke="#444" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="300" y="282" font-size="11" fill="#3a7d3a">event/give (often from ISR), timeout</text>

  <!-- any -> SUSPENDED -->
  <line x1="360" y1="306" x2="360" y2="328" stroke="#888" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="368" y="320" font-size="10" fill="#888">vTaskSuspend</text>

  <text x="360" y="408" text-anchor="middle" font-size="11" fill="#555">Only the READY task with the highest priority runs. An ISR "gives" a semaphore -&gt; unblocks a task -&gt; scheduler may preempt immediately.</text>
</svg>
