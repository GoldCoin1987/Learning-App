<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" font-family="sans-serif">
  <rect width="760" height="430" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Superloop vs RTOS Multitasking</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>

  <!-- LEFT: superloop -->
  <text x="190" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a5fb4">Bare-metal superloop</text>
  <text x="190" y="80" text-anchor="middle" font-size="11" fill="#555">one big loop, jobs run in strict order</text>

  <ellipse cx="190" cy="110" rx="60" ry="22" fill="#cfe0f7" stroke="#1a5fb4" stroke-width="2"/>
  <text x="190" y="115" text-anchor="middle" font-size="12" fill="#0a2a5a">start: setup()</text>

  <rect x="120" y="150" width="140" height="30" rx="6" fill="#eef4fc" stroke="#1a5fb4"/>
  <text x="190" y="170" text-anchor="middle" font-size="11" fill="#234">read sensor</text>
  <rect x="120" y="195" width="140" height="30" rx="6" fill="#eef4fc" stroke="#1a5fb4"/>
  <text x="190" y="215" text-anchor="middle" font-size="11" fill="#234">update display</text>
  <rect x="120" y="240" width="140" height="30" rx="6" fill="#eef4fc" stroke="#1a5fb4"/>
  <text x="190" y="260" text-anchor="middle" font-size="11" fill="#234">talk to wifi</text>

  <line x1="190" y1="132" x2="190" y2="148" stroke="#444" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="190" y1="180" x2="190" y2="193" stroke="#444" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="190" y1="225" x2="190" y2="238" stroke="#444" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- loop back -->
  <path d="M120,255 C70,255 70,165 118,165" fill="none" stroke="#444" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="60" y="212" text-anchor="middle" font-size="10" fill="#444">loop</text>
  <text x="60" y="225" text-anchor="middle" font-size="10" fill="#444">forever</text>

  <text x="190" y="310" text-anchor="middle" font-size="11" fill="#b02020">A slow job makes the others wait their turn.</text>

  <!-- divider -->
  <line x1="380" y1="50" x2="380" y2="340" stroke="#ddd" stroke-width="2"/>

  <!-- RIGHT: RTOS -->
  <text x="570" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a7d3a">RTOS: each job is its own task</text>
  <text x="570" y="80" text-anchor="middle" font-size="11" fill="#555">a scheduler switches between them fast</text>

  <rect x="430" y="150" width="120" height="30" rx="6" fill="#cfe8cf" stroke="#3a7d3a"/>
  <text x="490" y="170" text-anchor="middle" font-size="11" fill="#234">Task: sensor</text>
  <rect x="430" y="195" width="120" height="30" rx="6" fill="#cfe8cf" stroke="#3a7d3a"/>
  <text x="490" y="215" text-anchor="middle" font-size="11" fill="#234">Task: display</text>
  <rect x="430" y="240" width="120" height="30" rx="6" fill="#cfe8cf" stroke="#3a7d3a"/>
  <text x="490" y="260" text-anchor="middle" font-size="11" fill="#234">Task: wifi</text>

  <rect x="600" y="180" width="110" height="60" rx="8" fill="#ffe2b3" stroke="#c97a00" stroke-width="2"/>
  <text x="655" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#5a3a00">SCHEDULER</text>
  <text x="655" y="222" text-anchor="middle" font-size="9" fill="#c97a00">picks who runs</text>
  <text x="655" y="234" text-anchor="middle" font-size="9" fill="#c97a00">on the CPU</text>

  <line x1="550" y1="165" x2="598" y2="195" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="550" y1="210" x2="598" y2="210" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="550" y1="255" x2="598" y2="225" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="570" y="310" text-anchor="middle" font-size="11" fill="#3a7d3a">All jobs seem to run at once; none has to wait long.</text>

  <text x="380" y="368" text-anchor="middle" font-size="11" fill="#555">Like one cook doing everything in order vs a chef switching between dishes so none burns.</text>
</svg>
