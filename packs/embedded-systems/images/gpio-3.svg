<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300" font-family="sans-serif">
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold">The Universal Peripheral Pattern</text>
  <text x="320" y="50" text-anchor="middle" font-size="12">Every peripheral on the chip is brought up the same way.</text>

  <!-- Step 1 -->
  <rect x="40" y="100" width="160" height="80" fill="#e8f0ff" stroke="#000" stroke-width="2"/>
  <text x="120" y="135" text-anchor="middle" font-size="14" font-weight="bold">1. Enable clock</text>
  <text x="120" y="158" text-anchor="middle" font-size="11">Turn on power/clock</text>
  <text x="120" y="173" text-anchor="middle" font-size="11">to the port</text>

  <!-- arrow -->
  <line x1="200" y1="140" x2="240" y2="140" stroke="#000" stroke-width="2"/>
  <polygon points="240,140 230,134 230,146" fill="#000"/>

  <!-- Step 2 -->
  <rect x="240" y="100" width="160" height="80" fill="#eef7ee" stroke="#000" stroke-width="2"/>
  <text x="320" y="135" text-anchor="middle" font-size="14" font-weight="bold">2. Configure</text>
  <text x="320" y="158" text-anchor="middle" font-size="11">Set the pin as</text>
  <text x="320" y="173" text-anchor="middle" font-size="11">input or output</text>

  <!-- arrow -->
  <line x1="400" y1="140" x2="440" y2="140" stroke="#000" stroke-width="2"/>
  <polygon points="440,140 430,134 430,146" fill="#000"/>

  <!-- Step 3 -->
  <rect x="440" y="100" width="160" height="80" fill="#fdeaea" stroke="#000" stroke-width="2"/>
  <text x="520" y="135" text-anchor="middle" font-size="14" font-weight="bold">3. Use</text>
  <text x="520" y="158" text-anchor="middle" font-size="11">Drive it high/low</text>
  <text x="520" y="173" text-anchor="middle" font-size="11">or read its level</text>

  <text x="320" y="235" text-anchor="middle" font-size="12" font-weight="bold">Classic gotcha: skip step 1 and nothing works.</text>
  <text x="320" y="258" text-anchor="middle" font-size="11">An unclocked peripheral ignores writes and reads back as zero.</text>
</svg>
