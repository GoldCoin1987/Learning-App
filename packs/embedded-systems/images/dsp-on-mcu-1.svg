<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" font-family="sans-serif">
  <rect width="760" height="320" fill="#fbfbfd"/>
  <text x="380" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Real-time DSP pipeline on an MCU = a radar receiver chain</text>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <!-- Stage boxes -->
  <rect x="20" y="60" width="120" height="50" rx="6" fill="#fff3df" stroke="#d08a2a"/>
  <text x="80" y="80" text-anchor="middle" font-size="11" fill="#7a4a10">TIM -&gt; ADC</text>
  <text x="80" y="96" text-anchor="middle" font-size="10" fill="#7a4a10">sample at fs</text>

  <rect x="170" y="60" width="120" height="50" rx="6" fill="#e9f0fb" stroke="#4a78c8"/>
  <text x="230" y="80" text-anchor="middle" font-size="11" fill="#1f3d6b">DMA ping-pong</text>
  <text x="230" y="96" text-anchor="middle" font-size="10" fill="#1f3d6b">2 x N samples</text>

  <rect x="320" y="60" width="120" height="50" rx="6" fill="#eaf6ea" stroke="#4a9a4a"/>
  <text x="380" y="80" text-anchor="middle" font-size="11" fill="#1c5c1c">window (Hann)</text>
  <text x="380" y="96" text-anchor="middle" font-size="10" fill="#1c5c1c">arm_mult_f32</text>

  <rect x="470" y="60" width="120" height="50" rx="6" fill="#f3eafb" stroke="#8a4ac8"/>
  <text x="530" y="80" text-anchor="middle" font-size="11" fill="#4a1c7a">N-pt rFFT</text>
  <text x="530" y="96" text-anchor="middle" font-size="10" fill="#4a1c7a">arm_rfft_fast_f32</text>

  <rect x="620" y="60" width="120" height="50" rx="6" fill="#fdeef0" stroke="#c84a6a"/>
  <text x="680" y="80" text-anchor="middle" font-size="11" fill="#7a1c34">|.|, dB</text>
  <text x="680" y="96" text-anchor="middle" font-size="10" fill="#7a1c34">arm_cmplx_mag</text>

  <g stroke="#666" stroke-width="1.6" marker-end="url(#ah)" fill="none">
    <line x1="140" y1="85" x2="168" y2="85"/>
    <line x1="290" y1="85" x2="318" y2="85"/>
    <line x1="440" y1="85" x2="468" y2="85"/>
    <line x1="590" y1="85" x2="618" y2="85"/>
  </g>

  <!-- output -->
  <rect x="620" y="150" width="120" height="44" rx="6" fill="#f4f4f8" stroke="#999"/>
  <text x="680" y="170" text-anchor="middle" font-size="11" fill="#333">spectrum out</text>
  <text x="680" y="185" text-anchor="middle" font-size="10" fill="#333">UART/RTT, detect</text>
  <line x1="680" y1="110" x2="680" y2="148" stroke="#666" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- deadline band -->
  <rect x="20" y="220" width="720" height="80" rx="6" fill="#f4f4f8" stroke="#999"/>
  <text x="380" y="242" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">The budget: one block of N samples must be fully processed before the next block fills</text>
  <text x="380" y="264" text-anchor="middle" font-size="11" fill="#444">deadline per block  T_block = N / fs   seconds</text>
  <text x="380" y="282" text-anchor="middle" font-size="11" fill="#444">cost(window + FFT + magnitude) cycles  must be  &lt;  T_block x f_cpu</text>
  <text x="380" y="298" text-anchor="middle" font-size="10" fill="#555">bigger N = finer bins (fs/N) but more cycles/block and more latency -- the sample-rate / FFT-size / CPU tradeoff</text>
</svg>
