<svg xmlns="http://www.w3.org/2000/svg" width="660" height="320" viewBox="0 0 660 320" font-family="sans-serif">
  <rect width="660" height="320" fill="#ffffff"/>
  <text x="330" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Three Kinds of Real-Time</text>
  <text x="330" y="48" font-size="12" text-anchor="middle" fill="#666">What happens when a result arrives after the deadline?</text>

  <!-- HARD -->
  <rect x="30" y="70" width="190" height="210" fill="#fdedec" stroke="#c0392b" stroke-width="2"/>
  <text x="125" y="96" font-size="15" font-weight="bold" text-anchor="middle" fill="#c0392b">HARD</text>
  <line x1="45" y1="106" x2="205" y2="106" stroke="#c0392b" stroke-width="1"/>
  <text x="125" y="132" font-size="12" text-anchor="middle" fill="#1a1a1a">A miss = failure.</text>
  <text x="125" y="152" font-size="12" text-anchor="middle" fill="#1a1a1a">Never acceptable.</text>
  <text x="125" y="190" font-size="11" text-anchor="middle" fill="#666">Examples:</text>
  <text x="125" y="210" font-size="12" text-anchor="middle" fill="#1a1a1a">airbag firing</text>
  <text x="125" y="230" font-size="12" text-anchor="middle" fill="#1a1a1a">motor controller</text>

  <!-- FIRM -->
  <rect x="235" y="70" width="190" height="210" fill="#fef9e7" stroke="#b7950b" stroke-width="2"/>
  <text x="330" y="96" font-size="15" font-weight="bold" text-anchor="middle" fill="#b7950b">FIRM</text>
  <line x1="250" y1="106" x2="410" y2="106" stroke="#b7950b" stroke-width="1"/>
  <text x="330" y="132" font-size="12" text-anchor="middle" fill="#1a1a1a">Late result is</text>
  <text x="330" y="152" font-size="12" text-anchor="middle" fill="#1a1a1a">useless, thrown</text>
  <text x="330" y="172" font-size="12" text-anchor="middle" fill="#1a1a1a">away. Rare miss</text>
  <text x="330" y="192" font-size="12" text-anchor="middle" fill="#1a1a1a">is tolerable.</text>
  <text x="330" y="230" font-size="11" text-anchor="middle" fill="#666">Example:</text>
  <text x="330" y="250" font-size="12" text-anchor="middle" fill="#1a1a1a">drop one frame</text>

  <!-- SOFT -->
  <rect x="440" y="70" width="190" height="210" fill="#eafaf1" stroke="#2e8b57" stroke-width="2"/>
  <text x="535" y="96" font-size="15" font-weight="bold" text-anchor="middle" fill="#2e8b57">SOFT</text>
  <line x1="455" y1="106" x2="615" y2="106" stroke="#2e8b57" stroke-width="1"/>
  <text x="535" y="132" font-size="12" text-anchor="middle" fill="#1a1a1a">A little late is</text>
  <text x="535" y="152" font-size="12" text-anchor="middle" fill="#1a1a1a">still somewhat</text>
  <text x="535" y="172" font-size="12" text-anchor="middle" fill="#1a1a1a">useful. Quality</text>
  <text x="535" y="192" font-size="12" text-anchor="middle" fill="#1a1a1a">just degrades.</text>
  <text x="535" y="230" font-size="11" text-anchor="middle" fill="#666">Example:</text>
  <text x="535" y="250" font-size="12" text-anchor="middle" fill="#1a1a1a">video stutter</text>

  <text x="330" y="306" font-size="12" text-anchor="middle" fill="#666">Cost of being late rises from right to left.</text>
</svg>
