<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380" font-family="sans-serif">
  <rect width="600" height="380" fill="#ffffff"/>
  <text x="300" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">OTA Update + Rollback Flow</text>

  <!-- box helper styling inline -->
  <!-- 1 Receive -->
  <rect x="40" y="50" width="160" height="48" rx="6" fill="#d6e4ff" stroke="#2f5fd0" stroke-width="2"/>
  <text x="120" y="71" text-anchor="middle" font-size="12" font-weight="bold" fill="#16306e">1. Receive image</text>
  <text x="120" y="88" text-anchor="middle" font-size="10" fill="#16306e">UART/USB-DFU/OTA into Slot B</text>

  <!-- 2 Validate -->
  <rect x="40" y="120" width="160" height="48" rx="6" fill="#d6e4ff" stroke="#2f5fd0" stroke-width="2"/>
  <text x="120" y="141" text-anchor="middle" font-size="12" font-weight="bold" fill="#16306e">2. Validate</text>
  <text x="120" y="158" text-anchor="middle" font-size="10" fill="#16306e">CRC + signature / secure boot</text>

  <!-- decision -->
  <polygon points="120,190 200,225 120,260 40,225" fill="#fff0d6" stroke="#d08a2f" stroke-width="2"/>
  <text x="120" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="#8a5a16">valid?</text>
  <text x="120" y="238" text-anchor="middle" font-size="10" fill="#8a5a16">sig + version OK</text>

  <!-- reject -->
  <rect x="240" y="200" width="150" height="48" rx="6" fill="#ffd6d6" stroke="#c0392b" stroke-width="2"/>
  <text x="315" y="221" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a1f15">Reject / erase B</text>
  <text x="315" y="238" text-anchor="middle" font-size="10" fill="#7a1f15">keep running A (no brick)</text>

  <!-- 3 mark pending -->
  <rect x="40" y="285" width="160" height="48" rx="6" fill="#d8f5d8" stroke="#2f9e3f" stroke-width="2"/>
  <text x="120" y="306" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d5e2a">3. Mark pending + reset</text>
  <text x="120" y="323" text-anchor="middle" font-size="10" fill="#1d5e2a">atomic swap A&lt;-&gt;B in bootloader</text>

  <!-- 4 test -->
  <rect x="410" y="120" width="160" height="48" rx="6" fill="#d8f5d8" stroke="#2f9e3f" stroke-width="2"/>
  <text x="490" y="141" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d5e2a">4. Boot new image</text>
  <text x="490" y="158" text-anchor="middle" font-size="10" fill="#1d5e2a">self-test, then CONFIRM</text>

  <!-- 5 rollback -->
  <rect x="410" y="200" width="160" height="62" rx="6" fill="#ffe6cc" stroke="#d08a2f" stroke-width="2"/>
  <text x="490" y="221" text-anchor="middle" font-size="12" font-weight="bold" fill="#8a5a16">5. No confirm?</text>
  <text x="490" y="238" text-anchor="middle" font-size="10" fill="#8a5a16">watchdog/boot-counter trips</text>
  <text x="490" y="253" text-anchor="middle" font-size="10" fill="#8a5a16">bootloader reverts to A</text>

  <!-- arrows -->
  <line x1="120" y1="98" x2="120" y2="120" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <line x1="120" y1="168" x2="120" y2="190" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <line x1="200" y1="225" x2="240" y2="224" stroke="#c0392b" stroke-width="2" marker-end="url(#a)"/>
  <text x="210" y="216" font-size="10" fill="#c0392b">no</text>
  <line x1="120" y1="260" x2="120" y2="285" stroke="#2f9e3f" stroke-width="2" marker-end="url(#a)"/>
  <text x="128" y="278" font-size="10" fill="#2f9e3f">yes</text>
  <line x1="200" y1="309" x2="490" y2="309" stroke="#333" stroke-width="2"/>
  <line x1="490" y1="309" x2="490" y2="168" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <line x1="490" y1="168" x2="490" y2="200" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
</svg>
