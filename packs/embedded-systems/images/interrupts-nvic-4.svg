<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">The Vector Table: a directory of handler addresses</text>

  <!-- table -->
  <text x="220" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#444">Vector table (in flash)</text>

  <g font-size="12">
    <rect x="90" y="72" width="260" height="32" fill="#eef2f7" stroke="#557"/>
    <text x="100" y="93" fill="#333">slot 0: initial stack pointer</text>
    <rect x="90" y="104" width="260" height="32" fill="#eef2f7" stroke="#557"/>
    <text x="100" y="125" fill="#333">slot 1: reset handler addr</text>
    <rect x="90" y="136" width="260" height="32" fill="#dde8f5" stroke="#557"/>
    <text x="100" y="157" fill="#333">... (system exceptions) ...</text>
    <rect x="90" y="168" width="260" height="32" fill="#cfe0f7" stroke="#1a5fb4"/>
    <text x="100" y="189" fill="#0a2a5a">slot for TIM2 IRQ &#8594; &amp;TIM2_Handler</text>
    <rect x="90" y="200" width="260" height="32" fill="#ffe2b3" stroke="#c97a00"/>
    <text x="100" y="221" fill="#5a3a00">slot for button IRQ &#8594; &amp;Btn_Handler</text>
    <rect x="90" y="232" width="260" height="32" fill="#eef2f7" stroke="#557"/>
    <text x="100" y="253" fill="#333">... more IRQ slots ...</text>
  </g>

  <!-- arrow to handler -->
  <line x1="350" y1="216" x2="470" y2="216" stroke="#c97a00" stroke-width="2" marker-end="url(#arrO)"/>
  <text x="410" y="208" text-anchor="middle" font-size="11" fill="#c97a00">jump</text>

  <rect x="470" y="196" width="180" height="44" fill="#fff3df" stroke="#c97a00"/>
  <text x="560" y="222" text-anchor="middle" font-size="12" fill="#5a3a00">Btn_Handler() runs</text>

  <!-- NVIC explanation -->
  <text x="360" y="300" text-anchor="middle" font-size="13" fill="#444">When the button IRQ fires, the NVIC marks it PENDING. If it is</text>
  <text x="360" y="320" text-anchor="middle" font-size="13" fill="#444">ENABLED, the CPU reads that slot's address and jumps to the handler.</text>
  <text x="360" y="350" text-anchor="middle" font-size="12" fill="#666">NVIC = Nested Vectored Interrupt Controller (built into the CPU).</text>

  <defs>
    <marker id="arrO" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#c97a00"/></marker>
  </defs>
</svg>
