<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300" font-family="sans-serif">
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold">GPIO Output: Blinking an LED</text>
  <text x="320" y="50" text-anchor="middle" font-size="12">The pin drives a voltage; current flows through a resistor and LED to ground.</text>

  <!-- MCU box -->
  <rect x="40" y="110" width="120" height="90" fill="#e8f0ff" stroke="#000" stroke-width="2"/>
  <text x="100" y="150" text-anchor="middle" font-size="14" font-weight="bold">MCU</text>
  <text x="100" y="170" text-anchor="middle" font-size="11">GPIO pin</text>

  <!-- wire from pin -->
  <line x1="160" y1="155" x2="240" y2="155" stroke="#000" stroke-width="2"/>
  <text x="200" y="145" text-anchor="middle" font-size="11">HIGH = on</text>

  <!-- resistor -->
  <rect x="240" y="140" width="60" height="30" fill="none" stroke="#000" stroke-width="2"/>
  <text x="270" y="160" text-anchor="middle" font-size="11">R</text>
  <text x="270" y="190" text-anchor="middle" font-size="10">(limits current)</text>

  <!-- wire to LED -->
  <line x1="300" y1="155" x2="360" y2="155" stroke="#000" stroke-width="2"/>

  <!-- LED triangle -->
  <polygon points="360,140 360,170 390,155" fill="#fdeaea" stroke="#000" stroke-width="2"/>
  <line x1="390" y1="140" x2="390" y2="170" stroke="#000" stroke-width="2"/>
  <text x="375" y="195" text-anchor="middle" font-size="11">LED</text>
  <!-- light rays -->
  <line x1="395" y1="130" x2="408" y2="117" stroke="#000" stroke-width="1.5"/>
  <line x1="405" y1="135" x2="420" y2="125" stroke="#000" stroke-width="1.5"/>

  <!-- wire to ground -->
  <line x1="390" y1="155" x2="470" y2="155" stroke="#000" stroke-width="2"/>
  <line x1="470" y1="155" x2="470" y2="210" stroke="#000" stroke-width="2"/>
  <!-- GND symbol -->
  <line x1="450" y1="210" x2="490" y2="210" stroke="#000" stroke-width="2"/>
  <line x1="457" y1="216" x2="483" y2="216" stroke="#000" stroke-width="2"/>
  <line x1="464" y1="222" x2="476" y2="222" stroke="#000" stroke-width="2"/>
  <text x="470" y="245" text-anchor="middle" font-size="11">GND (0 V)</text>

  <text x="320" y="285" text-anchor="middle" font-size="11">Software writes a 1 to the pin -&gt; pin goes HIGH -&gt; LED lights. Write 0 -&gt; LED off.</text>
</svg>
