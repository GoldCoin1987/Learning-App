<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340" font-family="sans-serif">
  <rect width="640" height="340" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="18" font-weight="bold">GPIO Output Stage: Push-Pull vs Open-Drain</text>

  <!-- Push-pull -->
  <text x="160" y="58" text-anchor="middle" font-size="15" font-weight="bold">Push-Pull</text>
  <!-- VDD rail -->
  <line x1="60" y1="80" x2="260" y2="80" stroke="#000" stroke-width="2"/>
  <text x="50" y="84" text-anchor="end" font-size="12">VDD</text>
  <!-- P-FET (high-side) -->
  <rect x="135" y="95" width="50" height="34" fill="#e8f0ff" stroke="#000"/>
  <text x="160" y="116" text-anchor="middle" font-size="12">P-FET</text>
  <line x1="160" y1="80" x2="160" y2="95" stroke="#000" stroke-width="2"/>
  <!-- node -->
  <line x1="160" y1="129" x2="160" y2="160" stroke="#000" stroke-width="2"/>
  <circle cx="160" cy="160" r="4" fill="#000"/>
  <line x1="160" y1="160" x2="240" y2="160" stroke="#000" stroke-width="2"/>
  <text x="248" y="164" font-size="12">PIN</text>
  <!-- N-FET (low-side) -->
  <rect x="135" y="190" width="50" height="34" fill="#fdeaea" stroke="#000"/>
  <text x="160" y="211" text-anchor="middle" font-size="12">N-FET</text>
  <line x1="160" y1="160" x2="160" y2="190" stroke="#000" stroke-width="2"/>
  <line x1="160" y1="224" x2="160" y2="250" stroke="#000" stroke-width="2"/>
  <!-- GND -->
  <line x1="135" y1="250" x2="185" y2="250" stroke="#000" stroke-width="2"/>
  <line x1="143" y1="256" x2="177" y2="256" stroke="#000" stroke-width="2"/>
  <line x1="151" y1="262" x2="169" y2="262" stroke="#000" stroke-width="2"/>
  <text x="160" y="288" text-anchor="middle" font-size="11">Drives both HIGH and LOW</text>

  <!-- Open-drain -->
  <text x="470" y="58" text-anchor="middle" font-size="15" font-weight="bold">Open-Drain</text>
  <!-- VDD rail with external pull-up -->
  <line x1="370" y1="80" x2="570" y2="80" stroke="#000" stroke-width="2"/>
  <text x="360" y="84" text-anchor="end" font-size="12">VDD</text>
  <!-- external pull-up resistor -->
  <line x1="470" y1="80" x2="470" y2="100" stroke="#000" stroke-width="2"/>
  <rect x="458" y="100" width="24" height="40" fill="none" stroke="#0a7" stroke-width="2"/>
  <text x="492" y="124" font-size="11" fill="#0a7">Rpu (ext.)</text>
  <line x1="470" y1="140" x2="470" y2="160" stroke="#000" stroke-width="2"/>
  <circle cx="470" cy="160" r="4" fill="#000"/>
  <line x1="470" y1="160" x2="550" y2="160" stroke="#000" stroke-width="2"/>
  <text x="558" y="164" font-size="12">PIN</text>
  <!-- N-FET only -->
  <rect x="445" y="190" width="50" height="34" fill="#fdeaea" stroke="#000"/>
  <text x="470" y="211" text-anchor="middle" font-size="12">N-FET</text>
  <line x1="470" y1="160" x2="470" y2="190" stroke="#000" stroke-width="2"/>
  <line x1="470" y1="224" x2="470" y2="250" stroke="#000" stroke-width="2"/>
  <line x1="445" y1="250" x2="495" y2="250" stroke="#000" stroke-width="2"/>
  <line x1="453" y1="256" x2="487" y2="256" stroke="#000" stroke-width="2"/>
  <line x1="461" y1="262" x2="479" y2="262" stroke="#000" stroke-width="2"/>
  <text x="470" y="288" text-anchor="middle" font-size="11">Drives LOW only; HIGH via pull-up</text>
  <text x="470" y="304" text-anchor="middle" font-size="11" fill="#0a7">No high-side FET (dashed = absent)</text>
  <rect x="445" y="95" width="50" height="34" fill="none" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4 3"/>
</svg>
