<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="monospace" font-size="13">
  <rect width="640" height="360" fill="#0f1117"/>
  <text x="320" y="28" fill="#e6e6e6" font-size="16" text-anchor="middle" font-weight="bold">volatile struct overlay onto a GPIO register block</text>

  <!-- Memory map column -->
  <text x="40" y="62" fill="#9aa4b2">Address space (peripheral region)</text>
  <rect x="40" y="72" width="170" height="40" fill="#1c2330" stroke="#3a4661"/>
  <text x="50" y="97" fill="#7fd1b9">0x4002 0000  MODER</text>
  <rect x="40" y="112" width="170" height="40" fill="#1c2330" stroke="#3a4661"/>
  <text x="50" y="137" fill="#7fd1b9">0x4002 0004  OTYPER</text>
  <rect x="40" y="152" width="170" height="40" fill="#1c2330" stroke="#3a4661"/>
  <text x="50" y="177" fill="#7fd1b9">0x4002 0014  ODR</text>
  <rect x="40" y="192" width="170" height="40" fill="#1c2330" stroke="#3a4661"/>
  <text x="50" y="217" fill="#7fd1b9">0x4002 0018  BSRR</text>

  <!-- Struct column -->
  <text x="300" y="62" fill="#9aa4b2">struct GPIO_TypeDef (fields at byte offsets)</text>
  <rect x="300" y="72" width="300" height="40" fill="#241c30" stroke="#6b4f8a"/>
  <text x="312" y="97" fill="#d9b3ff">+0x00  volatile uint32_t MODER;</text>
  <rect x="300" y="112" width="300" height="40" fill="#241c30" stroke="#6b4f8a"/>
  <text x="312" y="137" fill="#d9b3ff">+0x04  volatile uint32_t OTYPER;</text>
  <rect x="300" y="152" width="300" height="40" fill="#241c30" stroke="#6b4f8a"/>
  <text x="312" y="177" fill="#d9b3ff">+0x14  volatile uint32_t ODR;</text>
  <rect x="300" y="192" width="300" height="40" fill="#241c30" stroke="#6b4f8a"/>
  <text x="312" y="217" fill="#d9b3ff">+0x18  volatile uint32_t BSRR;</text>

  <!-- arrows -->
  <line x1="210" y1="92"  x2="300" y2="92"  stroke="#566" stroke-width="1.5"/>
  <line x1="210" y1="132" x2="300" y2="132" stroke="#566" stroke-width="1.5"/>
  <line x1="210" y1="172" x2="300" y2="172" stroke="#566" stroke-width="1.5"/>
  <line x1="210" y1="212" x2="300" y2="212" stroke="#566" stroke-width="1.5"/>

  <!-- cast note -->
  <rect x="40" y="258" width="560" height="78" fill="#161b26" stroke="#2a3346"/>
  <text x="56" y="282" fill="#e6e6e6">#define GPIOA ((GPIO_TypeDef *)0x40020000UL)</text>
  <text x="56" y="304" fill="#8fbf6f">GPIOA-&gt;BSRR = 1u &lt;&lt; 5;   // atomic set of bit 5, no read-modify-write</text>
  <text x="56" y="326" fill="#c98a8a">GPIOA-&gt;ODR |= 1u &lt;&lt; 5;  // RMW: read, OR, write -- racey vs ISR/DMA</text>
</svg>
