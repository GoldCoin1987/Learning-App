<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="sans-serif">
  <rect width="640" height="380" fill="#ffffff"/>
  <text x="320" y="26" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Latency Distribution: Average vs Worst Case</text>
  <text x="320" y="46" font-size="12" text-anchor="middle" fill="#666">Histogram of measured ISR-to-response times over many events</text>

  <!-- Axes -->
  <line x1="70" y1="300" x2="600" y2="300" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="300" x2="70" y2="70" stroke="#333" stroke-width="2"/>
  <text x="335" y="345" font-size="13" text-anchor="middle" fill="#333">Latency (microseconds) -></text>
  <text x="30" y="190" font-size="13" text-anchor="middle" fill="#333" transform="rotate(-90 30 190)">Count (event freq.)</text>

  <!-- Histogram bars: tall narrow peak near average, long thin tail to worst case -->
  <g fill="#4a90d9" stroke="#2c5f8a" stroke-width="1">
    <rect x="100" y="270" width="22" height="30"/>
    <rect x="124" y="220" width="22" height="80"/>
    <rect x="148" y="140" width="22" height="160"/>
    <rect x="172" y="110" width="22" height="190"/>
    <rect x="196" y="160" width="22" height="140"/>
    <rect x="220" y="235" width="22" height="65"/>
    <rect x="244" y="265" width="22" height="35"/>
    <rect x="268" y="278" width="22" height="22"/>
    <rect x="292" y="284" width="22" height="16"/>
    <rect x="316" y="288" width="22" height="12"/>
    <rect x="340" y="290" width="22" height="10"/>
    <rect x="364" y="292" width="22" height="8"/>
    <rect x="388" y="293" width="22" height="7"/>
    <rect x="412" y="294" width="22" height="6"/>
    <rect x="436" y="295" width="22" height="5"/>
    <rect x="460" y="295" width="22" height="5"/>
    <rect x="484" y="296" width="22" height="4"/>
    <rect x="508" y="296" width="22" height="4"/>
  </g>

  <!-- Average marker -->
  <line x1="183" y1="70" x2="183" y2="300" stroke="#2e8b57" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="183" y="64" font-size="12" font-weight="bold" text-anchor="middle" fill="#2e8b57">average</text>

  <!-- Worst-case marker -->
  <line x1="530" y1="70" x2="530" y2="300" stroke="#c0392b" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="530" y="64" font-size="12" font-weight="bold" text-anchor="middle" fill="#c0392b">worst case</text>

  <!-- Deadline marker -->
  <line x1="560" y1="70" x2="560" y2="300" stroke="#000" stroke-width="2"/>
  <text x="560" y="88" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">deadline</text>

  <!-- Jitter span annotation -->
  <line x1="183" y1="318" x2="530" y2="318" stroke="#8e44ad" stroke-width="1.5"/>
  <line x1="183" y1="313" x2="183" y2="323" stroke="#8e44ad" stroke-width="1.5"/>
  <line x1="530" y1="313" x2="530" y2="323" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="356" y="333" font-size="12" text-anchor="middle" fill="#8e44ad">jitter = spread of the tail</text>

  <text x="540" y="200" font-size="11" fill="#c0392b">rare tail events</text>
  <text x="540" y="214" font-size="11" fill="#c0392b">decide hard RT</text>
</svg>
