<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" font-family="sans-serif">
  <rect width="680" height="320" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" font-size="18" font-weight="bold">Comparing the Four Buses</text>

  <!-- table grid -->
  <!-- columns: Bus | Wires | Speed | Devices | Best for -->
  <line x1="20" y1="50" x2="660" y2="50" stroke="#000" stroke-width="2"/>
  <line x1="20" y1="80" x2="660" y2="80" stroke="#000" stroke-width="2"/>
  <line x1="20" y1="120" x2="660" y2="120" stroke="#000" stroke-width="1"/>
  <line x1="20" y1="160" x2="660" y2="160" stroke="#000" stroke-width="1"/>
  <line x1="20" y1="200" x2="660" y2="200" stroke="#000" stroke-width="1"/>
  <line x1="20" y1="240" x2="660" y2="240" stroke="#000" stroke-width="2"/>

  <line x1="20" y1="50" x2="20" y2="240" stroke="#000" stroke-width="2"/>
  <line x1="120" y1="50" x2="120" y2="240" stroke="#000" stroke-width="1"/>
  <line x1="230" y1="50" x2="230" y2="240" stroke="#000" stroke-width="1"/>
  <line x1="330" y1="50" x2="330" y2="240" stroke="#000" stroke-width="1"/>
  <line x1="430" y1="50" x2="430" y2="240" stroke="#000" stroke-width="1"/>
  <line x1="660" y1="50" x2="660" y2="240" stroke="#000" stroke-width="2"/>

  <!-- headers -->
  <text x="70" y="72" text-anchor="middle" font-size="12" font-weight="bold">Bus</text>
  <text x="175" y="72" text-anchor="middle" font-size="12" font-weight="bold">Wires</text>
  <text x="280" y="72" text-anchor="middle" font-size="12" font-weight="bold">Speed</text>
  <text x="380" y="72" text-anchor="middle" font-size="12" font-weight="bold">Devices</text>
  <text x="545" y="72" text-anchor="middle" font-size="12" font-weight="bold">Best for</text>

  <!-- UART -->
  <text x="70" y="105" text-anchor="middle" font-size="12" font-weight="bold">UART</text>
  <text x="175" y="105" text-anchor="middle" font-size="11">2 (TX/RX)</text>
  <text x="280" y="105" text-anchor="middle" font-size="11">low-mid</text>
  <text x="380" y="105" text-anchor="middle" font-size="11">2 (point-to-point)</text>
  <text x="545" y="105" text-anchor="middle" font-size="11">console, GPS, modems</text>

  <!-- SPI -->
  <text x="70" y="145" text-anchor="middle" font-size="12" font-weight="bold">SPI</text>
  <text x="175" y="145" text-anchor="middle" font-size="11">3 + 1 CS each</text>
  <text x="280" y="145" text-anchor="middle" font-size="11">fastest</text>
  <text x="380" y="145" text-anchor="middle" font-size="11">few (pin-hungry)</text>
  <text x="545" y="145" text-anchor="middle" font-size="11">displays, flash, fast sensors</text>

  <!-- I2C -->
  <text x="70" y="185" text-anchor="middle" font-size="12" font-weight="bold">I2C</text>
  <text x="175" y="185" text-anchor="middle" font-size="11">2 (SDA/SCL)</text>
  <text x="280" y="185" text-anchor="middle" font-size="11">slow-mid</text>
  <text x="380" y="185" text-anchor="middle" font-size="11">many (addressed)</text>
  <text x="545" y="185" text-anchor="middle" font-size="11">many low-speed sensors</text>

  <!-- CAN -->
  <text x="70" y="225" text-anchor="middle" font-size="12" font-weight="bold">CAN</text>
  <text x="175" y="225" text-anchor="middle" font-size="11">2 (diff. pair)</text>
  <text x="280" y="225" text-anchor="middle" font-size="11">mid</text>
  <text x="380" y="225" text-anchor="middle" font-size="11">many, long &amp; noisy</text>
  <text x="545" y="225" text-anchor="middle" font-size="11">cars, factories (rugged)</text>

  <text x="340" y="270" text-anchor="middle" font-size="12" fill="#555">Pick by: speed needed, distance, number of devices, and how noisy the environment is.</text>
  <text x="340" y="292" text-anchor="middle" font-size="11" fill="#555">More wires (SPI) usually buys speed; fewer wires (I2C) buys simplicity at lower speed.</text>
</svg>
