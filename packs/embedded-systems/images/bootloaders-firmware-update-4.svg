<svg xmlns="http://www.w3.org/2000/svg" width="560" height="300" viewBox="0 0 560 300" font-family="sans-serif">
  <rect width="560" height="300" fill="#ffffff"/>
  <text x="280" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">What Runs First: The Boot Flow</text>
  <text x="280" y="48" text-anchor="middle" font-size="12" fill="#555">when you power on the chip, a small program runs before your app</text>

  <!-- power on -->
  <rect x="30" y="110" width="120" height="70" rx="8" fill="#eeeeee" stroke="#666" stroke-width="2"/>
  <text x="90" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Power on</text>
  <text x="90" y="160" text-anchor="middle" font-size="10" fill="#555">/ reset button</text>

  <!-- bootloader -->
  <rect x="220" y="100" width="140" height="90" rx="8" fill="#d6e4ff" stroke="#2f5fd0" stroke-width="2"/>
  <text x="290" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#16306e">Bootloader</text>
  <text x="290" y="147" text-anchor="middle" font-size="10" fill="#16306e">small program,</text>
  <text x="290" y="161" text-anchor="middle" font-size="10" fill="#16306e">runs first. Can load</text>
  <text x="290" y="175" text-anchor="middle" font-size="10" fill="#16306e">a new app, then...</text>

  <!-- application -->
  <rect x="420" y="110" width="120" height="70" rx="8" fill="#d8f5d8" stroke="#2f9e3f" stroke-width="2"/>
  <text x="480" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d5e2a">Application</text>
  <text x="480" y="160" text-anchor="middle" font-size="10" fill="#1d5e2a">your real program</text>

  <!-- arrows -->
  <line x1="150" y1="145" x2="218" y2="145" stroke="#333" stroke-width="2" marker-end="url(#b)"/>
  <line x1="360" y1="145" x2="418" y2="145" stroke="#333" stroke-width="2" marker-end="url(#b)"/>
  <text x="390" y="135" text-anchor="middle" font-size="10" fill="#333">hands</text>
  <text x="390" y="147" text-anchor="middle" font-size="10" fill="#333">control</text>

  <text x="280" y="240" text-anchor="middle" font-size="12" fill="#8a5a16" font-weight="bold">Think of a hotel front desk: it greets you first,</text>
  <text x="280" y="258" text-anchor="middle" font-size="12" fill="#8a5a16">checks things, then sends you to your room (the app).</text>

  <defs>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
</svg>
