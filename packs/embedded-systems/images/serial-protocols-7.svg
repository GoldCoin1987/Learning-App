<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" font-family="sans-serif">
  <rect width="680" height="320" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="18" font-weight="bold">CAN: A Rugged Differential Bus</text>
  <text x="340" y="44" text-anchor="middle" font-size="12" fill="#555">Two wires (CANH, CANL) carry opposite signals. Noise hits both equally and cancels out.</text>

  <!-- bus lines -->
  <line x1="80" y1="120" x2="600" y2="120" stroke="#1a5fb4" stroke-width="2"/>
  <text x="60" y="124" text-anchor="end" font-size="11" font-weight="bold" fill="#1a5fb4">CANH</text>
  <line x1="80" y1="150" x2="600" y2="150" stroke="#0a7" stroke-width="2"/>
  <text x="60" y="154" text-anchor="end" font-size="11" font-weight="bold" fill="#0a7">CANL</text>

  <!-- termination resistors at both ends -->
  <rect x="74" y="120" width="12" height="30" fill="#ffffff" stroke="#c0392b" stroke-width="2"/>
  <text x="80" y="172" text-anchor="middle" font-size="10" fill="#c0392b">120&#937;</text>
  <rect x="594" y="120" width="12" height="30" fill="#ffffff" stroke="#c0392b" stroke-width="2"/>
  <text x="600" y="172" text-anchor="middle" font-size="10" fill="#c0392b">120&#937;</text>
  <text x="340" y="100" text-anchor="middle" font-size="10" fill="#c0392b">120&#937; termination at BOTH ends stops reflections</text>

  <!-- nodes -->
  <g>
    <rect x="160" y="200" width="110" height="70" fill="#ffffff" stroke="#000" stroke-width="2"/>
    <text x="215" y="225" text-anchor="middle" font-size="11" font-weight="bold">NODE</text>
    <text x="215" y="243" text-anchor="middle" font-size="9" fill="#555">transceiver</text>
    <text x="215" y="258" text-anchor="middle" font-size="9" fill="#555">+ MCU</text>
    <line x1="195" y1="200" x2="195" y2="120" stroke="#1a5fb4" stroke-width="2"/>
    <line x1="235" y1="200" x2="235" y2="150" stroke="#0a7" stroke-width="2"/>
  </g>
  <g>
    <rect x="320" y="200" width="110" height="70" fill="#ffffff" stroke="#000" stroke-width="2"/>
    <text x="375" y="225" text-anchor="middle" font-size="11" font-weight="bold">NODE</text>
    <text x="375" y="243" text-anchor="middle" font-size="9" fill="#555">transceiver</text>
    <text x="375" y="258" text-anchor="middle" font-size="9" fill="#555">+ MCU</text>
    <line x1="355" y1="200" x2="355" y2="120" stroke="#1a5fb4" stroke-width="2"/>
    <line x1="395" y1="200" x2="395" y2="150" stroke="#0a7" stroke-width="2"/>
  </g>
  <g>
    <rect x="480" y="200" width="110" height="70" fill="#ffffff" stroke="#000" stroke-width="2"/>
    <text x="535" y="225" text-anchor="middle" font-size="11" font-weight="bold">NODE</text>
    <text x="535" y="243" text-anchor="middle" font-size="9" fill="#555">transceiver</text>
    <text x="535" y="258" text-anchor="middle" font-size="9" fill="#555">+ MCU</text>
    <line x1="515" y1="200" x2="515" y2="120" stroke="#1a5fb4" stroke-width="2"/>
    <line x1="555" y1="200" x2="555" y2="150" stroke="#0a7" stroke-width="2"/>
  </g>

  <text x="340" y="295" text-anchor="middle" font-size="11" fill="#555">Every node hears every message. Each message has an ID; the lowest ID wins the bus (priority).</text>
  <text x="340" y="312" text-anchor="middle" font-size="11" fill="#555">A "transceiver" chip converts the MCU's logic signals to/from the differential CANH/CANL pair.</text>
</svg>
