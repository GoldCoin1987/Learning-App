<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" font-family="sans-serif">
  <rect width="720" height="340" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#000">Two ways to move a block of data into memory</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- LEFT: CPU copies each byte -->
  <text x="180" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Without DMA: CPU copies every byte</text>
  <rect x="60" y="80" width="100" height="50" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="110" y="103" text-anchor="middle" font-size="12" fill="#000">CPU</text>
  <text x="110" y="120" text-anchor="middle" font-size="10" fill="#000">busy copying</text>

  <rect x="240" y="80" width="100" height="50" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="290" y="103" text-anchor="middle" font-size="12" fill="#000">Memory</text>
  <text x="290" y="120" text-anchor="middle" font-size="10" fill="#000">buffer</text>

  <!-- many small arrows = byte by byte -->
  <g stroke="#000" stroke-width="1.4" marker-end="url(#ar)" fill="none">
    <line x1="162" y1="90" x2="238" y2="90"/>
    <line x1="162" y1="100" x2="238" y2="100"/>
    <line x1="162" y1="110" x2="238" y2="110"/>
    <line x1="162" y1="120" x2="238" y2="120"/>
  </g>
  <text x="200" y="152" text-anchor="middle" font-size="10" fill="#000">one load/store per byte</text>
  <text x="180" y="175" text-anchor="middle" font-size="11" fill="#000">CPU cannot do other work meanwhile</text>

  <!-- divider -->
  <line x1="360" y1="70" x2="360" y2="320" stroke="#000" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- RIGHT: DMA moves it -->
  <text x="540" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">With DMA: helper engine moves it</text>
  <rect x="410" y="80" width="90" height="50" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="455" y="103" text-anchor="middle" font-size="12" fill="#000">CPU</text>
  <text x="455" y="120" text-anchor="middle" font-size="10" fill="#000">free, other work</text>

  <rect x="410" y="160" width="90" height="46" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="455" y="183" text-anchor="middle" font-size="11" fill="#000">DMA</text>
  <text x="455" y="198" text-anchor="middle" font-size="9" fill="#000">engine</text>

  <rect x="600" y="160" width="90" height="46" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="645" y="183" text-anchor="middle" font-size="11" fill="#000">Memory</text>
  <text x="645" y="198" text-anchor="middle" font-size="9" fill="#000">buffer</text>

  <!-- one big arrow DMA -> memory -->
  <line x1="502" y1="183" x2="598" y2="183" stroke="#000" stroke-width="2.2" marker-end="url(#ar)"/>
  <text x="550" y="176" text-anchor="middle" font-size="9" fill="#000">moves whole block</text>

  <!-- CPU setup + done arrows -->
  <line x1="455" y1="132" x2="455" y2="158" stroke="#000" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="540" y="120" text-anchor="middle" font-size="9" fill="#000">CPU only: set up</text>
  <text x="455" y="232" text-anchor="middle" font-size="9" fill="#000">interrupt = "done"</text>

  <text x="540" y="270" text-anchor="middle" font-size="11" fill="#000">CPU sets it up once, gets one</text>
  <text x="540" y="286" text-anchor="middle" font-size="11" fill="#000">"finished" interrupt at the end</text>

  <text x="360" y="332" text-anchor="middle" font-size="10" fill="#000">DMA = Direct Memory Access: moves data on its own, freeing the CPU</text>
</svg>
