<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="sans-serif">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Cortex-M Preemption, Nesting &amp; Tail-Chaining</text>

  <!-- time axis -->
  <line x1="60" y1="340" x2="690" y2="340" stroke="#333" stroke-width="2"/>
  <text x="690" y="362" text-anchor="end" font-size="13" fill="#333">time</text>

  <!-- lane labels -->
  <text x="55" y="80"  text-anchor="end" font-size="13" fill="#555">IRQ_B (prio 1, high)</text>
  <text x="55" y="160" text-anchor="end" font-size="13" fill="#555">IRQ_A (prio 5, low)</text>
  <text x="55" y="300" text-anchor="end" font-size="13" fill="#555">main (thread)</text>

  <!-- main running -->
  <rect x="60" y="280" width="80" height="30" fill="#cfe8cf" stroke="#3a7d3a"/>
  <rect x="620" y="280" width="70" height="30" fill="#cfe8cf" stroke="#3a7d3a"/>
  <text x="100" y="300" text-anchor="middle" font-size="11" fill="#234">main</text>

  <!-- IRQ_A fires, preempts main -->
  <line x1="140" y1="340" x2="140" y2="120" stroke="#c97a00" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="140" y="358" text-anchor="middle" font-size="11" fill="#c97a00">A fires</text>
  <rect x="155" y="140" width="70" height="30" fill="#ffe2b3" stroke="#c97a00"/>
  <text x="190" y="160" text-anchor="middle" font-size="11" fill="#5a3a00">ISR_A</text>
  <text x="147" y="135" font-size="10" fill="#888">~12 cyc stack</text>

  <!-- IRQ_B fires during A, higher prio, preempts (nesting) -->
  <line x1="225" y1="340" x2="225" y2="60" stroke="#b02020" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="225" y="358" text-anchor="middle" font-size="11" fill="#b02020">B fires</text>
  <rect x="240" y="60" width="80" height="30" fill="#f4c2c2" stroke="#b02020"/>
  <text x="280" y="80" text-anchor="middle" font-size="11" fill="#4a0000">ISR_B (nests)</text>

  <!-- A paused region (greyed) -->
  <rect x="225" y="140" width="95" height="30" fill="#eeeeee" stroke="#bbb" stroke-dasharray="3 2"/>
  <text x="272" y="160" text-anchor="middle" font-size="10" fill="#999">A paused</text>

  <!-- B returns, A resumes -->
  <rect x="320" y="140" width="70" height="30" fill="#ffe2b3" stroke="#c97a00"/>
  <text x="355" y="160" text-anchor="middle" font-size="11" fill="#5a3a00">ISR_A</text>

  <!-- tail-chaining region: A ends, C pending -> no unstack/restack -->
  <line x1="390" y1="340" x2="390" y2="120" stroke="#1a5fb4" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="455" y="120" text-anchor="middle" font-size="11" fill="#1a5fb4">tail-chain (no full unstack)</text>
  <rect x="390" y="140" width="90" height="30" fill="#cfe0f7" stroke="#1a5fb4"/>
  <text x="435" y="160" text-anchor="middle" font-size="11" fill="#0a2a5a">ISR_C</text>
  <text x="435" y="190" text-anchor="middle" font-size="10" fill="#1a5fb4">~6 cyc, no pop+push</text>

  <!-- return to main -->
  <line x1="480" y1="340" x2="480" y2="160" stroke="#3a7d3a" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="550" y="270" text-anchor="middle" font-size="11" fill="#3a7d3a">unstack -&gt; resume main</text>

  <!-- legend -->
  <text x="60" y="222" font-size="11" fill="#555">Lower priority number = higher urgency. B (1) preempts A (5); C tail-chains after A.</text>
</svg>
