<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="sans-serif">
  <rect width="720" height="320" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#000">One DMA transfer: source, destination, count, increment</text>

  <defs>
    <marker id="ar3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Source: peripheral (fixed address) -->
  <rect x="40" y="70" width="150" height="70" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="115" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">SOURCE</text>
  <text x="115" y="110" text-anchor="middle" font-size="10" fill="#000">peripheral register</text>
  <text x="115" y="126" text-anchor="middle" font-size="10" fill="#000">(e.g. ADC result)</text>
  <text x="115" y="158" text-anchor="middle" font-size="10" fill="#000">increment: OFF</text>
  <text x="115" y="172" text-anchor="middle" font-size="9" fill="#000">same address each time</text>

  <!-- DMA engine in middle -->
  <rect x="270" y="78" width="170" height="80" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="355" y="104" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">DMA channel</text>
  <text x="355" y="124" text-anchor="middle" font-size="10" fill="#000">COUNT = how many items</text>
  <text x="355" y="140" text-anchor="middle" font-size="10" fill="#000">WIDTH = byte / half / word</text>

  <!-- Destination: memory buffer (incrementing) -->
  <rect x="520" y="70" width="160" height="70" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="600" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">DESTINATION</text>
  <text x="600" y="110" text-anchor="middle" font-size="10" fill="#000">memory buffer</text>
  <text x="600" y="126" text-anchor="middle" font-size="10" fill="#000">in RAM</text>
  <text x="600" y="158" text-anchor="middle" font-size="10" fill="#000">increment: ON</text>
  <text x="600" y="172" text-anchor="middle" font-size="9" fill="#000">pointer advances each item</text>

  <!-- arrows -->
  <line x1="192" y1="105" x2="268" y2="105" stroke="#000" stroke-width="2" marker-end="url(#ar3)"/>
  <line x1="442" y1="105" x2="518" y2="105" stroke="#000" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- buffer slots -->
  <g stroke="#000" fill="#ffffff">
    <rect x="520" y="200" width="32" height="28"/>
    <rect x="552" y="200" width="32" height="28"/>
    <rect x="584" y="200" width="32" height="28"/>
    <rect x="616" y="200" width="32" height="28"/>
    <rect x="648" y="200" width="32" height="28"/>
  </g>
  <text x="536" y="219" text-anchor="middle" font-size="10" fill="#000">0</text>
  <text x="568" y="219" text-anchor="middle" font-size="10" fill="#000">1</text>
  <text x="600" y="219" text-anchor="middle" font-size="10" fill="#000">2</text>
  <text x="632" y="219" text-anchor="middle" font-size="10" fill="#000">3</text>
  <text x="664" y="219" text-anchor="middle" font-size="10" fill="#000">4</text>
  <text x="600" y="248" text-anchor="middle" font-size="10" fill="#000">successive samples fill successive slots</text>

  <!-- trigger note -->
  <rect x="40" y="200" width="420" height="60" rx="6" fill="#ffffff" stroke="#000"/>
  <text x="250" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Peripheral-triggered: one event = one item moved</text>
  <text x="250" y="240" text-anchor="middle" font-size="10" fill="#000">ADC "sample ready" / UART "byte received" / timer tick</text>
  <text x="250" y="254" text-anchor="middle" font-size="10" fill="#000">paces the transfer by hardware, not a CPU loop</text>

  <text x="360" y="300" text-anchor="middle" font-size="10" fill="#000">Peripheral address stays put; the buffer pointer walks forward</text>
</svg>
