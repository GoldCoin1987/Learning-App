<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240" font-family="sans-serif" font-size="13">
  <rect width="640" height="240" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="15" font-weight="bold">A potentiometer (knob) wired to an ADC pin</text>

  <!-- 3.3V rail -->
  <line x1="120" y1="60" x2="120" y2="90" stroke="#000" stroke-width="2"/>
  <text x="120" y="52" text-anchor="middle" font-size="12">3.3 V</text>

  <!-- pot body -->
  <rect x="90" y="90" width="60" height="100" rx="4" fill="#e8f0fe" stroke="#3367d6"/>
  <text x="120" y="145" text-anchor="middle" font-size="11">pot</text>
  <text x="120" y="160" text-anchor="middle" font-size="11">(knob)</text>

  <!-- ground -->
  <line x1="120" y1="190" x2="120" y2="215" stroke="#000" stroke-width="2"/>
  <line x1="108" y1="215" x2="132" y2="215" stroke="#000" stroke-width="2"/>
  <text x="120" y="232" text-anchor="middle" font-size="11">GND (0 V)</text>

  <!-- wiper arrow -->
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>
  <line x1="150" y1="140" x2="380" y2="140" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <text x="265" y="130" text-anchor="middle" font-size="11">wiper voltage: 0 V .. 3.3 V</text>

  <!-- MCU ADC pin -->
  <rect x="380" y="100" width="200" height="80" rx="6" fill="#e6f4ea" stroke="#188038"/>
  <text x="480" y="130" text-anchor="middle" font-weight="bold">MCU ADC pin</text>
  <text x="480" y="150" text-anchor="middle" font-size="11">turning the knob</text>
  <text x="480" y="166" text-anchor="middle" font-size="11">changes the count</text>

  <text x="320" y="210" text-anchor="middle" font-size="11" fill="#555">Turn the knob fully left = 0 V = count 0; fully right = 3.3 V = max count</text>
</svg>
