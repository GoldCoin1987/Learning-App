<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" font-family="sans-serif">
  <rect width="760" height="300" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A filter cleans up a signal: noisy in, smooth out</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Left: noisy signal -->
  <rect x="30" y="70" width="220" height="160" fill="none" stroke="#000"/>
  <line x1="30" y1="150" x2="250" y2="150" stroke="#888"/>
  <text x="140" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Noisy input signal</text>
  <text x="140" y="250" text-anchor="middle" font-size="11" fill="#333">time -&gt;</text>
  <text x="22" y="80" text-anchor="end" font-size="10" fill="#333" transform="rotate(-90 22 150)">amplitude</text>
  <polyline fill="none" stroke="#000" stroke-width="1.4" points="35,150 45,120 50,165 58,110 64,140 72,95 80,150 88,118 96,170 104,100 112,135 120,90 128,155 136,120 144,165 152,108 160,138 168,98 176,150 184,122 192,168 200,105 208,140 216,95 224,150 232,118 244,150"/>

  <!-- Filter box -->
  <rect x="290" y="120" width="120" height="60" rx="8" fill="#eee" stroke="#000"/>
  <text x="350" y="146" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">FILTER</text>
  <text x="350" y="165" text-anchor="middle" font-size="10" fill="#333">average / smooth</text>
  <line x1="250" y1="150" x2="288" y2="150" stroke="#000" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="410" y1="150" x2="448" y2="150" stroke="#000" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- Right: clean signal -->
  <rect x="450" y="70" width="220" height="160" fill="none" stroke="#000"/>
  <line x1="450" y1="150" x2="670" y2="150" stroke="#888"/>
  <text x="560" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Clean output signal</text>
  <text x="560" y="250" text-anchor="middle" font-size="11" fill="#333">time -&gt;</text>
  <polyline fill="none" stroke="#000" stroke-width="1.8" points="455,150 470,128 485,112 500,108 515,118 530,135 545,150 560,165 575,178 590,182 605,172 620,155 635,138 650,125 665,120"/>

  <text x="380" y="285" text-anchor="middle" font-size="11" fill="#333">A filter keeps the slow, real shape of the signal and removes the fast random wiggles (noise).</text>
</svg>
