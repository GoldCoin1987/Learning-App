<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="sans-serif" font-size="14">
  <rect width="640" height="380" fill="#ffffff"/>
  <text x="320" y="30" fill="#000000" font-size="17" text-anchor="middle" font-weight="bold">Fixed-width types say exactly how big a box is</text>

  <!-- uint8 -->
  <text x="60" y="80" fill="#000000" font-size="13" font-family="monospace">uint8_t</text>
  <rect x="180" y="62" width="40" height="28" fill="#ffffff" stroke="#000000"/>
  <text x="200" y="81" fill="#000000" text-anchor="middle" font-size="12">8</text>
  <text x="320" y="80" fill="#000000" font-size="12">exactly 8 bits, holds 0..255</text>

  <!-- uint16 -->
  <text x="60" y="130" fill="#000000" font-size="13" font-family="monospace">uint16_t</text>
  <rect x="180" y="112" width="80" height="28" fill="#ffffff" stroke="#000000"/>
  <text x="220" y="131" fill="#000000" text-anchor="middle" font-size="12">16</text>
  <text x="320" y="130" fill="#000000" font-size="12">exactly 16 bits, 0..65535</text>

  <!-- uint32 -->
  <text x="60" y="180" fill="#000000" font-size="13" font-family="monospace">uint32_t</text>
  <rect x="180" y="162" width="160" height="28" fill="#ffffff" stroke="#000000"/>
  <text x="260" y="181" fill="#000000" text-anchor="middle" font-size="12">32</text>
  <text x="380" y="180" fill="#000000" font-size="12">exactly 32 bits</text>

  <!-- bool -->
  <text x="60" y="230" fill="#000000" font-size="13" font-family="monospace">bool</text>
  <rect x="180" y="212" width="40" height="28" fill="#ffffff" stroke="#000000"/>
  <text x="200" y="231" fill="#000000" text-anchor="middle" font-size="12">T/F</text>
  <text x="320" y="230" fill="#000000" font-size="12">true or false (from stdbool.h)</text>

  <!-- contrast box -->
  <rect x="40" y="266" width="560" height="96" fill="#f2f2f2" stroke="#000000"/>
  <text x="56" y="290" fill="#000000" font-size="13" font-weight="bold">Why not plain int?</text>
  <text x="56" y="312" fill="#000000" font-size="12">"int" can be 16 or 32 bits depending on the machine - its size is not promised.</text>
  <text x="56" y="332" fill="#000000" font-size="12">A 32-bit register MUST be read/written as uint32_t so the size matches the hardware.</text>
  <text x="56" y="352" fill="#000000" font-family="monospace" font-size="12">#include &lt;stdint.h&gt;   // gives you uint8_t, uint16_t, uint32_t ...</text>
</svg>
