<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="sans-serif">
  <rect width="760" height="360" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">A Queue Passes Data Safely Between Tasks</text>
  <text x="380" y="48" text-anchor="middle" font-size="11" fill="#555">The producer drops a copy in one end; the consumer takes it from the other. No tangled shared memory.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>

  <!-- producer task -->
  <rect x="40" y="140" width="150" height="70" rx="8" fill="#cfe8cf" stroke="#3a7d3a" stroke-width="2"/>
  <text x="115" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#234">Producer task</text>
  <text x="115" y="190" text-anchor="middle" font-size="10" fill="#3a7d3a">sensor reading = 42</text>

  <!-- queue (FIFO box of slots) -->
  <text x="380" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#5a3a00">QUEUE (first in, first out)</text>
  <rect x="270" y="140" width="220" height="50" fill="#fff" stroke="#c97a00" stroke-width="2"/>
  <line x1="325" y1="140" x2="325" y2="190" stroke="#c97a00" stroke-width="1.5"/>
  <line x1="380" y1="140" x2="380" y2="190" stroke="#c97a00" stroke-width="1.5"/>
  <line x1="435" y1="140" x2="435" y2="190" stroke="#c97a00" stroke-width="1.5"/>
  <rect x="272" y="142" width="51" height="46" fill="#ffe2b3"/>
  <text x="297" y="170" text-anchor="middle" font-size="12" fill="#5a3a00">42</text>
  <rect x="327" y="142" width="51" height="46" fill="#ffe2b3"/>
  <text x="352" y="170" text-anchor="middle" font-size="12" fill="#5a3a00">41</text>
  <text x="408" y="170" text-anchor="middle" font-size="11" fill="#bbb">empty</text>
  <text x="463" y="170" text-anchor="middle" font-size="11" fill="#bbb">empty</text>

  <!-- consumer task -->
  <rect x="570" y="140" width="150" height="70" rx="8" fill="#cfe0f7" stroke="#1a5fb4" stroke-width="2"/>
  <text x="645" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#234">Consumer task</text>
  <text x="645" y="190" text-anchor="middle" font-size="10" fill="#1a5fb4">reads &amp; uses it</text>

  <!-- arrows -->
  <line x1="190" y1="165" x2="268" y2="165" stroke="#3a7d3a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="228" y="158" text-anchor="middle" font-size="10" fill="#3a7d3a">send (put a copy)</text>
  <line x1="492" y1="165" x2="568" y2="165" stroke="#1a5fb4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="530" y="158" text-anchor="middle" font-size="10" fill="#1a5fb4">receive</text>

  <text x="380" y="262" text-anchor="middle" font-size="11" fill="#555">If the queue is full, the producer waits. If it is empty, the consumer waits (it blocks, using no CPU).</text>
  <text x="380" y="292" text-anchor="middle" font-size="11" fill="#555">A mutex is different: it is a single "key" a task must hold before touching a shared item, so only one task</text>
  <text x="380" y="308" text-anchor="middle" font-size="11" fill="#555">changes it at a time and the data never gets half-updated.</text>
</svg>
