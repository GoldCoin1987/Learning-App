<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" viewBox="0 0 680 360" font-family="sans-serif">
  <rect width="680" height="360" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="18" font-weight="bold">Serial vs Parallel, and a UART Frame</text>

  <!-- Parallel -->
  <text x="20" y="60" font-size="13" font-weight="bold">Parallel: many wires, all bits at once</text>
  <line x1="40" y1="75" x2="200" y2="75" stroke="#000" stroke-width="2"/>
  <line x1="40" y1="90" x2="200" y2="90" stroke="#000" stroke-width="2"/>
  <line x1="40" y1="105" x2="200" y2="105" stroke="#000" stroke-width="2"/>
  <line x1="40" y1="120" x2="200" y2="120" stroke="#000" stroke-width="2"/>
  <text x="210" y="102" font-size="11" fill="#555">8 wires = 1 byte per tick</text>

  <!-- Serial -->
  <text x="400" y="60" font-size="13" font-weight="bold">Serial: one wire, bits one-at-a-time</text>
  <line x1="420" y1="98" x2="600" y2="98" stroke="#000" stroke-width="2"/>
  <text x="430" y="90" font-size="11" fill="#1a5fb4">1 0 1 1 0 0 1 0  -&gt;</text>
  <text x="430" y="120" font-size="11" fill="#555">fewer wires, sent in sequence</text>

  <!-- UART frame -->
  <text x="340" y="170" text-anchor="middle" font-size="15" font-weight="bold">UART frame on the TX line (8N1: 8 data, No parity, 1 stop)</text>
  <text x="340" y="188" text-anchor="middle" font-size="12" fill="#555">Line idles HIGH. No clock wire: both sides agree on baud (bits per second).</text>

  <!-- waveform baseline -->
  <!-- idle high, start low, 8 data bits, stop high -->
  <path d="M40,300 L90,300
           L90,330 L140,330
           L140,300 L190,300
           L190,330 L240,330
           L240,300 L290,300
           L290,300 L340,300
           L340,330 L390,330
           L390,330 L440,330
           L440,300 L490,300
           L490,330 L540,330
           L540,300 L640,300"
        fill="none" stroke="#1a5fb4" stroke-width="2"/>

  <!-- labels for fields -->
  <text x="65" y="250" text-anchor="middle" font-size="11">IDLE</text>
  <text x="65" y="265" text-anchor="middle" font-size="10" fill="#555">HIGH</text>
  <line x1="90" y1="270" x2="90" y2="340" stroke="#aaa" stroke-width="1" stroke-dasharray="3 3"/>

  <text x="115" y="250" text-anchor="middle" font-size="11" fill="#c0392b">START</text>
  <text x="115" y="265" text-anchor="middle" font-size="10" fill="#c0392b">LOW</text>
  <line x1="140" y1="270" x2="140" y2="340" stroke="#aaa" stroke-width="1" stroke-dasharray="3 3"/>

  <text x="315" y="250" text-anchor="middle" font-size="11">8 DATA BITS (LSB first)</text>
  <line x1="490" y1="270" x2="490" y2="340" stroke="#aaa" stroke-width="1" stroke-dasharray="3 3"/>

  <text x="565" y="250" text-anchor="middle" font-size="11" fill="#0a7">STOP</text>
  <text x="565" y="265" text-anchor="middle" font-size="10" fill="#0a7">HIGH</text>

  <text x="340" y="356" text-anchor="middle" font-size="11" fill="#555">Receiver re-syncs on the falling START edge, then samples each bit at its center.</text>
</svg>
