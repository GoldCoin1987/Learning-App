<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320" font-family="sans-serif" font-size="13">
  <rect width="480" height="320" fill="#ffffff"/>
  <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="bold">Pick the right tool for the question</text>

  <!-- Debugger -->
  <rect x="20" y="50" width="200" height="60" fill="#e8eef7" stroke="#222" stroke-width="1.5"/>
  <text x="120" y="72" text-anchor="middle" font-weight="bold">Debugger (over SWD)</text>
  <text x="120" y="92" text-anchor="middle" font-size="11">Pause, step, watch a variable</text>
  <text x="120" y="106" text-anchor="middle" font-size="11">Q: "what is my code doing?"</text>

  <!-- Logic analyzer -->
  <rect x="260" y="50" width="200" height="60" fill="#d8f0dc" stroke="#222" stroke-width="1.5"/>
  <text x="360" y="72" text-anchor="middle" font-weight="bold">Logic analyzer</text>
  <text x="360" y="92" text-anchor="middle" font-size="11">Many wires as 1s and 0s</text>
  <text x="360" y="106" text-anchor="middle" font-size="11">Q: "what bytes on the bus?"</text>

  <!-- Oscilloscope -->
  <rect x="20" y="140" width="200" height="60" fill="#fde9d6" stroke="#222" stroke-width="1.5"/>
  <text x="120" y="162" text-anchor="middle" font-weight="bold">Oscilloscope</text>
  <text x="120" y="182" text-anchor="middle" font-size="11">Actual voltage shape vs time</text>
  <text x="120" y="196" text-anchor="middle" font-size="11">Q: "what is the signal shape?"</text>

  <!-- GPIO toggle -->
  <rect x="260" y="140" width="200" height="60" fill="#f7e8f2" stroke="#222" stroke-width="1.5"/>
  <text x="360" y="162" text-anchor="middle" font-weight="bold">GPIO toggle + scope</text>
  <text x="360" y="182" text-anchor="middle" font-size="11">Flip a pin to mark events</text>
  <text x="360" y="196" text-anchor="middle" font-size="11">Q: "how long did this take?"</text>

  <!-- doctor analogy -->
  <rect x="40" y="232" width="400" height="64" fill="#f4f4f4" stroke="#888" stroke-width="1"/>
  <text x="240" y="254" text-anchor="middle" font-size="12" font-weight="bold">Like a doctor's tools</text>
  <text x="240" y="274" text-anchor="middle" font-size="11">stethoscope, X-ray, thermometer each reveal</text>
  <text x="240" y="290" text-anchor="middle" font-size="11">something different -- you pick the right one for the symptom</text>
</svg>
