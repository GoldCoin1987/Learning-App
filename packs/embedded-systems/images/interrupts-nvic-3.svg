<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="sans-serif">
  <rect width="720" height="320" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">The Interrupt Flow: pause, run the ISR, resume</text>

  <!-- time axis -->
  <line x1="50" y1="250" x2="690" y2="250" stroke="#333" stroke-width="2"/>
  <text x="690" y="272" text-anchor="end" font-size="13" fill="#333">time</text>

  <!-- lane labels -->
  <text x="45" y="120" text-anchor="end" font-size="13" fill="#555">ISR (handler)</text>
  <text x="45" y="215" text-anchor="end" font-size="13" fill="#555">main loop</text>

  <!-- main running, part 1 -->
  <rect x="55" y="195" width="180" height="34" fill="#cfe8cf" stroke="#3a7d3a"/>
  <text x="145" y="217" text-anchor="middle" font-size="12" fill="#234">main running</text>

  <!-- event arrow -->
  <line x1="235" y1="250" x2="235" y2="100" stroke="#c97a00" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="235" y="92" text-anchor="middle" font-size="12" fill="#c97a00">1. event happens</text>

  <!-- pause marker -->
  <text x="248" y="190" font-size="11" fill="#888">2. CPU pauses main</text>

  <!-- ISR running -->
  <rect x="255" y="100" width="150" height="34" fill="#ffe2b3" stroke="#c97a00"/>
  <text x="330" y="122" text-anchor="middle" font-size="12" fill="#5a3a00">3. ISR runs (short)</text>

  <!-- return arrow -->
  <line x1="405" y1="117" x2="405" y2="195" stroke="#3a7d3a" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="420" y="160" font-size="11" fill="#3a7d3a">4. return</text>

  <!-- main resumes -->
  <rect x="405" y="195" width="270" height="34" fill="#cfe8cf" stroke="#3a7d3a"/>
  <text x="540" y="217" text-anchor="middle" font-size="12" fill="#234">5. main resumes exactly where it left off</text>

  <text x="360" y="305" text-anchor="middle" font-size="12" fill="#666">The handler that runs is the Interrupt Service Routine (ISR).</text>

  <defs>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#3a7d3a"/></marker>
  </defs>
</svg>
