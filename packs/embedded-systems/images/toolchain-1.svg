<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200" font-family="sans-serif">
  <rect width="720" height="200" fill="#fbfbfd"/>
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Build pipeline: source to flashable image</text>
  <g font-size="12">
    <rect x="16"  y="60" width="96" height="48" rx="6" fill="#e7f0ff" stroke="#4a78c8"/>
    <text x="64"  y="80" text-anchor="middle" fill="#1f3d6b">main.c</text>
    <text x="64"  y="96" text-anchor="middle" fill="#1f3d6b" font-size="10">+ startup.s</text>

    <rect x="148" y="60" width="104" height="48" rx="6" fill="#eef7ee" stroke="#4a9a4a"/>
    <text x="200" y="80" text-anchor="middle" fill="#27592a">cpp + cc1</text>
    <text x="200" y="96" text-anchor="middle" fill="#27592a" font-size="10">compile -&gt; .s</text>

    <rect x="288" y="60" width="104" height="48" rx="6" fill="#eef7ee" stroke="#4a9a4a"/>
    <text x="340" y="80" text-anchor="middle" fill="#27592a">as</text>
    <text x="340" y="96" text-anchor="middle" fill="#27592a" font-size="10">assemble -&gt; .o</text>

    <rect x="428" y="60" width="120" height="48" rx="6" fill="#fff3e0" stroke="#d08a2a"/>
    <text x="488" y="78" text-anchor="middle" fill="#7a4d10">ld + link.ld</text>
    <text x="488" y="93" text-anchor="middle" fill="#7a4d10" font-size="10">MEMORY/SECTIONS</text>
    <text x="488" y="105" text-anchor="middle" fill="#7a4d10" font-size="10">-&gt; firmware.elf</text>

    <rect x="584" y="60" width="120" height="48" rx="6" fill="#f3e9ff" stroke="#8a5ad0"/>
    <text x="644" y="80" text-anchor="middle" fill="#4a2a7a">objcopy</text>
    <text x="644" y="96" text-anchor="middle" fill="#4a2a7a" font-size="10">.bin / .hex</text>
  </g>
  <g stroke="#888" stroke-width="2" marker-end="url(#a)">
    <line x1="112" y1="84" x2="146" y2="84"/>
    <line x1="252" y1="84" x2="286" y2="84"/>
    <line x1="392" y1="84" x2="426" y2="84"/>
    <line x1="548" y1="84" x2="582" y2="84"/>
  </g>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>
  <text x="360" y="150" text-anchor="middle" font-size="12" fill="#555">newlib-nano + crt0 stubs are pulled in at the link step</text>
  <text x="360" y="172" text-anchor="middle" font-size="12" fill="#555">.elf carries symbols/sections for GDB; .bin/.hex are raw images for the flasher</text>
</svg>
