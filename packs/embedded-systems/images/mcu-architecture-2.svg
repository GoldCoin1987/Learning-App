<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" font-family="sans-serif">
  <rect x="0" y="0" width="520" height="360" fill="white"/>
  <text x="260" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="black">The Fetch - Decode - Execute Loop</text>
  <text x="260" y="50" font-size="12" text-anchor="middle" fill="black">What the CPU does over and over, forever</text>

  <!-- Fetch box -->
  <rect x="200" y="80" width="120" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="260" y="102" font-size="14" font-weight="bold" text-anchor="middle" fill="black">FETCH</text>
  <text x="260" y="120" font-size="10" text-anchor="middle" fill="black">read next instruction</text>

  <!-- Decode box -->
  <rect x="370" y="170" width="120" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="430" y="192" font-size="14" font-weight="bold" text-anchor="middle" fill="black">DECODE</text>
  <text x="430" y="210" font-size="10" text-anchor="middle" fill="black">figure out what it means</text>

  <!-- Execute box -->
  <rect x="200" y="260" width="120" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="260" y="282" font-size="14" font-weight="bold" text-anchor="middle" fill="black">EXECUTE</text>
  <text x="260" y="300" font-size="10" text-anchor="middle" fill="black">do the work</text>

  <!-- Flash box -->
  <rect x="30" y="80" width="120" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="90" y="102" font-size="13" font-weight="bold" text-anchor="middle" fill="black">FLASH</text>
  <text x="90" y="120" font-size="10" text-anchor="middle" fill="black">holds the program</text>

  <!-- arrows around loop -->
  <line x1="320" y1="120" x2="395" y2="170" stroke="black" stroke-width="2"/>
  <polygon points="397,172 388,168 391,175" fill="black"/>
  <line x1="395" y1="220" x2="320" y2="270" stroke="black" stroke-width="2"/>
  <polygon points="318,272 327,268 324,275" fill="black"/>
  <line x1="225" y1="260" x2="240" y2="132" stroke="black" stroke-width="2"/>
  <polygon points="241,130 235,138 247,137" fill="black"/>

  <!-- flash to fetch -->
  <line x1="150" y1="105" x2="198" y2="105" stroke="black" stroke-width="2"/>
  <polygon points="200,105 192,101 192,109" fill="black"/>

  <text x="260" y="345" font-size="11" text-anchor="middle" fill="black">PC (program counter) points at the next instruction; each loop it moves forward.</text>
</svg>
