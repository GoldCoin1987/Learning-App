<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" font-family="sans-serif">
  <rect width="760" height="430" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Priority Inversion &amp; the Priority-Inheritance Fix</text>

  <!-- time axis -->
  <line x1="150" y1="250" x2="730" y2="250" stroke="#333" stroke-width="2"/>
  <text x="730" y="272" text-anchor="end" font-size="13" fill="#333">time</text>

  <!-- lane labels -->
  <text x="140" y="78"  text-anchor="end" font-size="12" fill="#555">H (high prio)</text>
  <text x="140" y="138" text-anchor="end" font-size="12" fill="#555">M (medium)</text>
  <text x="140" y="198" text-anchor="end" font-size="12" fill="#555">L (low prio)</text>

  <!-- WITHOUT inheritance (top scenario) -->
  <text x="150" y="46" font-size="13" font-weight="bold" fill="#b02020">Without priority inheritance — H misses its deadline</text>

  <!-- L runs, takes mutex -->
  <rect x="150" y="180" width="70" height="26" fill="#ffe2b3" stroke="#c97a00"/>
  <text x="185" y="198" text-anchor="middle" font-size="10" fill="#5a3a00">L holds M</text>
  <line x1="180" y1="180" x2="180" y2="165" stroke="#c97a00" stroke-width="1"/>
  <text x="180" y="160" text-anchor="middle" font-size="9" fill="#c97a00">take(mtx)</text>

  <!-- H wakes, wants mutex, blocks -->
  <line x1="220" y1="250" x2="220" y2="60" stroke="#b02020" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="220" y="56" text-anchor="middle" font-size="9" fill="#b02020">H wakes, wants M -> BLOCKS</text>
  <rect x="220" y="60" width="14" height="26" fill="#f4c2c2" stroke="#b02020"/>
  <rect x="234" y="60" width="120" height="26" fill="#eeeeee" stroke="#bbb" stroke-dasharray="3 2"/>
  <text x="294" y="78" text-anchor="middle" font-size="10" fill="#999">H blocked (waiting on M)</text>

  <!-- M preempts L (the inversion!) -->
  <line x1="234" y1="250" x2="234" y2="120" stroke="#444" stroke-width="1.3" stroke-dasharray="4 3"/>
  <rect x="234" y="120" width="120" height="26" fill="#d9c2f4" stroke="#6a3da0"/>
  <text x="294" y="138" text-anchor="middle" font-size="10" fill="#33105a">M runs (preempts L!)</text>
  <rect x="234" y="180" width="120" height="26" fill="#eeeeee" stroke="#bbb" stroke-dasharray="3 2"/>
  <text x="294" y="198" text-anchor="middle" font-size="10" fill="#999">L can't release M</text>

  <text x="360" y="138" font-size="11" font-weight="bold" fill="#b02020">&lt;- inversion: M (mid) delays H (high)</text>

  <!-- WITH inheritance (right scenario) -->
  <text x="470" y="232" font-size="11" fill="#888">|</text>

  <!-- divider -->
  <line x1="450" y1="295" x2="450" y2="415" stroke="#ddd" stroke-width="1"/>
  <text x="150" y="318" font-size="13" font-weight="bold" fill="#3a7d3a">With priority inheritance — L is boosted to H's priority</text>

  <!-- mini timeline 2 -->
  <line x1="150" y1="400" x2="730" y2="400" stroke="#333" stroke-width="1.5"/>
  <text x="150" y="346" font-size="11" fill="#555">L holds M; H wants it -&gt; L temporarily inherits H's priority.</text>
  <rect x="150" y="365" width="80" height="22" fill="#ffe2b3" stroke="#c97a00"/>
  <text x="190" y="381" text-anchor="middle" font-size="10" fill="#5a3a00">L (boosted)</text>
  <rect x="230" y="365" width="60" height="22" fill="#d9c2f4" stroke="#6a3da0"/>
  <text x="260" y="381" text-anchor="middle" font-size="9" fill="#33105a">M waits</text>
  <rect x="290" y="365" width="120" height="22" fill="#f4c2c2" stroke="#b02020"/>
  <text x="350" y="381" text-anchor="middle" font-size="10" fill="#4a0000">H runs (got M)</text>
  <text x="420" y="381" font-size="10" fill="#3a7d3a">M can't preempt the boost; H runs ASAP.</text>
</svg>
