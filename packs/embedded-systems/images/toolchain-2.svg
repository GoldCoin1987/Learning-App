<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="sans-serif">
  <rect width="720" height="300" fill="#fbfbfd"/>
  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Startup: LMA in FLASH to VMA in RAM (.data copy, .bss zero)</text>

  <!-- FLASH column -->
  <text x="150" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a4d10">FLASH (LMA / load address)</text>
  <rect x="60" y="74" width="180" height="36" fill="#fff3e0" stroke="#d08a2a"/>
  <text x="150" y="97" text-anchor="middle" font-size="12" fill="#7a4d10">vector table + .text + .rodata</text>
  <rect x="60" y="110" width="180" height="36" fill="#ffe6cc" stroke="#d08a2a"/>
  <text x="150" y="133" text-anchor="middle" font-size="12" fill="#7a4d10">.data init values (LMA)</text>

  <!-- RAM column -->
  <text x="570" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f3d6b">RAM (VMA / run address)</text>
  <rect x="480" y="110" width="180" height="36" fill="#dbe9ff" stroke="#4a78c8"/>
  <text x="570" y="133" text-anchor="middle" font-size="12" fill="#1f3d6b">.data (VMA, writable)</text>
  <rect x="480" y="150" width="180" height="36" fill="#eef4ff" stroke="#4a78c8"/>
  <text x="570" y="173" text-anchor="middle" font-size="12" fill="#1f3d6b">.bss -&gt; zeroed</text>
  <rect x="480" y="190" width="180" height="60" fill="#f4f8ff" stroke="#4a78c8"/>
  <text x="570" y="216" text-anchor="middle" font-size="12" fill="#1f3d6b">heap up / stack down</text>
  <text x="570" y="234" text-anchor="middle" font-size="11" fill="#1f3d6b">SP = _estack</text>

  <!-- copy arrow -->
  <path d="M240,128 C340,128 380,128 478,128" fill="none" stroke="#4a9a4a" stroke-width="2.5" marker-end="url(#b)"/>
  <text x="360" y="120" text-anchor="middle" font-size="12" fill="#27592a">Reset_Handler copies .data</text>

  <!-- zero arrow -->
  <path d="M360,168 C400,168 440,168 478,168" fill="none" stroke="#9a4a4a" stroke-width="2.5" marker-end="url(#c)"/>
  <text x="330" y="160" text-anchor="middle" font-size="11" fill="#7a2a2a">memset 0</text>

  <text x="360" y="278" text-anchor="middle" font-size="12" fill="#555">Reset_Handler: set SP, copy .data (LMA-&gt;VMA), zero .bss, __libc_init_array, then call main()</text>

  <defs>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#4a9a4a"/>
    </marker>
    <marker id="c" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#9a4a4a"/>
    </marker>
  </defs>
</svg>
