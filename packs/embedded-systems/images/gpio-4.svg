<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320" font-family="sans-serif">
  <rect width="640" height="320" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="bold">Reading a Button with a Pull-Up Resistor</text>
  <text x="320" y="50" text-anchor="middle" font-size="12">The pull-up gives the pin a definite HIGH when the button is not pressed.</text>

  <!-- VDD rail -->
  <line x1="120" y1="90" x2="520" y2="90" stroke="#000" stroke-width="2"/>
  <text x="110" y="94" text-anchor="end" font-size="12">VDD (3.3 V)</text>

  <!-- pull-up resistor -->
  <line x1="300" y1="90" x2="300" y2="110" stroke="#000" stroke-width="2"/>
  <rect x="288" y="110" width="24" height="44" fill="none" stroke="#000" stroke-width="2"/>
  <text x="330" y="136" font-size="11">pull-up R</text>
  <line x1="300" y1="154" x2="300" y2="185" stroke="#000" stroke-width="2"/>

  <!-- node to pin -->
  <circle cx="300" cy="185" r="4" fill="#000"/>
  <line x1="300" y1="185" x2="200" y2="185" stroke="#000" stroke-width="2"/>
  <rect x="80" y="165" width="120" height="40" fill="#e8f0ff" stroke="#000" stroke-width="2"/>
  <text x="140" y="190" text-anchor="middle" font-size="12">MCU input pin</text>

  <!-- button below node -->
  <line x1="300" y1="185" x2="300" y2="220" stroke="#000" stroke-width="2"/>
  <line x1="280" y1="220" x2="320" y2="220" stroke="#000" stroke-width="2"/>
  <line x1="290" y1="234" x2="330" y2="234" stroke="#000" stroke-width="2"/>
  <text x="345" y="232" font-size="11">button</text>
  <line x1="300" y1="234" x2="300" y2="255" stroke="#000" stroke-width="2" stroke-dasharray="3 3"/>
  <line x1="300" y1="255" x2="300" y2="270" stroke="#000" stroke-width="2"/>

  <!-- GND -->
  <line x1="280" y1="270" x2="320" y2="270" stroke="#000" stroke-width="2"/>
  <line x1="287" y1="276" x2="313" y2="276" stroke="#000" stroke-width="2"/>
  <line x1="294" y1="282" x2="306" y2="282" stroke="#000" stroke-width="2"/>
  <text x="300" y="302" text-anchor="middle" font-size="11">GND</text>

  <!-- labels -->
  <text x="430" y="180" font-size="11" font-weight="bold">Not pressed: pin reads HIGH (1)</text>
  <text x="430" y="200" font-size="11" font-weight="bold">Pressed: pin pulled to GND, reads LOW (0)</text>
</svg>
