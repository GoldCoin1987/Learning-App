<svg xmlns="http://www.w3.org/2000/svg" width="500" height="240" viewBox="0 0 500 240" font-family="sans-serif" font-size="13">
  <rect width="500" height="240" fill="#ffffff"/>
  <text x="250" y="26" text-anchor="middle" font-size="16" font-weight="bold">Decoding an SPI transaction</text>
  <text x="250" y="46" text-anchor="middle" font-size="11" fill="#555">logic analyzer reads the wires AND labels the bytes</text>

  <!-- CS -->
  <text x="30" y="80" font-size="12">CS</text>
  <polyline points="55,72 90,72 90,95 360,95 360,72 470,72" fill="none" stroke="#222" stroke-width="2"/>

  <!-- SCLK clock pulses -->
  <text x="30" y="125" font-size="12">SCLK</text>
  <polyline points="95,140 105,140 105,118 115,118 115,140 130,140 130,118 140,118 140,140 155,140 155,118 165,118 165,140 180,140 180,118 190,118 190,140 205,140 205,118 215,118 215,140 230,140 230,118 240,118 240,140 255,140 255,118 265,118 265,140 280,140 280,118 290,118 290,140 305,140 305,118 315,118 315,140 330,140 330,118 340,118 340,140 350,140"
            fill="none" stroke="#222" stroke-width="1.5"/>

  <!-- MOSI data -->
  <text x="30" y="175" font-size="12">MOSI</text>
  <polyline points="90,185 90,162 220,162 220,185 360,185" fill="none" stroke="#2e7d32" stroke-width="2"/>

  <!-- decoded byte boxes -->
  <rect x="95" y="200" width="120" height="26" fill="#d8f0dc" stroke="#222" stroke-width="1"/>
  <text x="155" y="218" text-anchor="middle" font-size="12">0x9F (read ID)</text>
  <rect x="225" y="200" width="120" height="26" fill="#e8eef7" stroke="#222" stroke-width="1"/>
  <text x="285" y="218" text-anchor="middle" font-size="12">0xEF (reply)</text>
</svg>
