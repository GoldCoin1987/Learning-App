<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" viewBox="0 0 680 360" font-family="sans-serif">
  <rect width="680" height="360" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="18" font-weight="bold">SPI Wiring: One Master, Two Devices</text>
  <text x="340" y="44" text-anchor="middle" font-size="12" fill="#555">Three shared lines (SCLK, MOSI, MISO) + one chip-select (CS) per device.</text>

  <!-- Master box -->
  <rect x="40" y="90" width="150" height="180" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="115" y="115" text-anchor="middle" font-size="14" font-weight="bold">MASTER (MCU)</text>
  <text x="185" y="145" text-anchor="end" font-size="11">SCLK</text>
  <text x="185" y="175" text-anchor="end" font-size="11">MOSI</text>
  <text x="185" y="205" text-anchor="end" font-size="11">MISO</text>
  <text x="185" y="235" text-anchor="end" font-size="11">CS1</text>
  <text x="185" y="258" text-anchor="end" font-size="11">CS2</text>

  <!-- Device 1 -->
  <rect x="470" y="80" width="160" height="100" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="550" y="105" text-anchor="middle" font-size="13" font-weight="bold">DEVICE 1</text>
  <text x="550" y="125" text-anchor="middle" font-size="10" fill="#555">e.g. sensor</text>

  <!-- Device 2 -->
  <rect x="470" y="210" width="160" height="100" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="550" y="235" text-anchor="middle" font-size="13" font-weight="bold">DEVICE 2</text>
  <text x="550" y="255" text-anchor="middle" font-size="10" fill="#555">e.g. flash chip</text>

  <!-- shared lines: SCLK, MOSI, MISO go to both -->
  <!-- SCLK -->
  <path d="M190,140 L300,140 L300,140" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M300,140 L300,300 L470,300" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M300,140 L300,140 L470,140 L470,140" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M300,140 L470,140" stroke="#000" stroke-width="2" fill="none"/>
  <text x="330" y="134" font-size="10">SCLK (shared)</text>

  <!-- MOSI -->
  <path d="M190,170 L320,170 L320,290 L470,290" stroke="#1a5fb4" stroke-width="2" fill="none"/>
  <path d="M320,170 L470,170" stroke="#1a5fb4" stroke-width="2" fill="none"/>
  <text x="340" y="164" font-size="10" fill="#1a5fb4">MOSI (shared)</text>

  <!-- MISO -->
  <path d="M190,200 L340,200 L340,280 L470,280" stroke="#0a7" stroke-width="2" fill="none"/>
  <path d="M340,200 L470,200" stroke="#0a7" stroke-width="2" fill="none"/>
  <text x="360" y="216" font-size="10" fill="#0a7">MISO (shared)</text>

  <!-- CS1 to device 1 -->
  <path d="M190,232 L420,232 L420,160 L470,160" stroke="#c0392b" stroke-width="2" fill="none"/>
  <text x="430" y="226" font-size="10" fill="#c0392b">CS1</text>

  <!-- CS2 to device 2 -->
  <path d="M190,254 L400,254 L400,270 L470,270" stroke="#c0392b" stroke-width="2" fill="none"/>
  <text x="430" y="266" font-size="10" fill="#c0392b">CS2</text>

  <text x="340" y="335" text-anchor="middle" font-size="11" fill="#555">Master pulls one CS LOW to pick a device. Fast and full-duplex, but needs a CS pin per device.</text>
  <text x="340" y="352" text-anchor="middle" font-size="11" fill="#555">SCLK keeps both sides in step (synchronous); no agreed baud rate needed.</text>
</svg>
