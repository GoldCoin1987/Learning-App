<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="sans-serif" font-size="14">
  <rect width="640" height="380" fill="#ffffff"/>
  <text x="320" y="30" fill="#000000" font-size="17" text-anchor="middle" font-weight="bold">Read-modify-write: how a bit gets lost</text>
  <text x="320" y="52" fill="#000000" font-size="12" text-anchor="middle">reg |= (1&lt;&lt;5) is really three steps. An interrupt can sneak in between them.</text>

  <!-- timeline -->
  <line x1="60" y1="300" x2="600" y2="300" stroke="#000000" stroke-width="2"/>
  <polygon points="600,300 588,294 588,306" fill="#000000"/>
  <text x="600" y="325" fill="#000000" font-size="12" text-anchor="end">time</text>

  <!-- main read -->
  <rect x="70" y="90" width="150" height="50" fill="#f2f2f2" stroke="#000000"/>
  <text x="145" y="112" fill="#000000" font-size="12" text-anchor="middle">main: READ reg</text>
  <text x="145" y="130" fill="#000000" font-size="12" text-anchor="middle">sees 00000000</text>
  <line x1="145" y1="140" x2="145" y2="300" stroke="#000000" stroke-dasharray="3,3"/>

  <!-- ISR -->
  <rect x="245" y="160" width="170" height="70" fill="#dddddd" stroke="#000000"/>
  <text x="330" y="185" fill="#000000" font-size="12" text-anchor="middle">INTERRUPT runs:</text>
  <text x="330" y="205" fill="#000000" font-size="12" text-anchor="middle">sets bit6 -&gt; reg = 01000000</text>
  <text x="330" y="223" fill="#000000" font-size="11" text-anchor="middle">(written to hardware)</text>
  <line x1="330" y1="230" x2="330" y2="300" stroke="#000000" stroke-dasharray="3,3"/>

  <!-- main write -->
  <rect x="440" y="90" width="160" height="70" fill="#f2f2f2" stroke="#000000"/>
  <text x="520" y="112" fill="#000000" font-size="12" text-anchor="middle">main: OR in bit5,</text>
  <text x="520" y="130" fill="#000000" font-size="12" text-anchor="middle">WRITE BACK 00100000</text>
  <text x="520" y="148" fill="#000000" font-size="11" text-anchor="middle">bit6 is now LOST!</text>
  <line x1="520" y1="160" x2="520" y2="300" stroke="#000000" stroke-dasharray="3,3"/>

  <text x="320" y="355" fill="#000000" font-size="13" text-anchor="middle" font-weight="bold">Fix: a single-write set/clear register (e.g. BSRR), or briefly disable interrupts.</text>
</svg>
