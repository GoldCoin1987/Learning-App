<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="sans-serif">
  <rect width="720" height="300" fill="#fbfbfd"/>
  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Timer-triggered ADC to DMA ping-pong (double buffer)</text>

  <!-- Timer trigger -->
  <rect x="30" y="60" width="110" height="46" rx="6" fill="#fff3df" stroke="#d08a2a"/>
  <text x="85" y="80" text-anchor="middle" font-size="11" fill="#7a4a10">TIM TRGO</text>
  <text x="85" y="96" text-anchor="middle" font-size="10" fill="#7a4a10">fixed rate fs</text>

  <!-- ADC -->
  <rect x="180" y="60" width="110" height="46" rx="6" fill="#e9f0fb" stroke="#4a78c8"/>
  <text x="235" y="80" text-anchor="middle" font-size="11" fill="#1f3d6b">ADC</text>
  <text x="235" y="96" text-anchor="middle" font-size="10" fill="#1f3d6b">conv. complete</text>

  <!-- DMA -->
  <rect x="330" y="60" width="120" height="46" rx="6" fill="#eaf6ea" stroke="#4a9a4a"/>
  <text x="390" y="80" text-anchor="middle" font-size="11" fill="#1c5c1c">DMA stream</text>
  <text x="390" y="96" text-anchor="middle" font-size="10" fill="#1c5c1c">circular, periph-&gt;mem</text>

  <!-- arrows -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>
  <g stroke="#666" stroke-width="1.6" marker-end="url(#ah)" fill="none">
    <line x1="140" y1="83" x2="178" y2="83"/>
    <line x1="290" y1="83" x2="328" y2="83"/>
  </g>

  <!-- Buffer A / B -->
  <rect x="510" y="48" width="180" height="32" rx="4" fill="#fdeef0" stroke="#c84a6a"/>
  <text x="600" y="68" text-anchor="middle" font-size="11" fill="#7a1c34">Buffer A (first half)</text>
  <rect x="510" y="86" width="180" height="32" rx="4" fill="#eef0fd" stroke="#4a6ac8"/>
  <text x="600" y="106" text-anchor="middle" font-size="11" fill="#1c2c7a">Buffer B (second half)</text>
  <line x1="450" y1="83" x2="508" y2="83" stroke="#666" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- interrupts -->
  <text x="600" y="138" text-anchor="middle" font-size="10" fill="#555">HT IRQ fires at A full</text>
  <text x="600" y="152" text-anchor="middle" font-size="10" fill="#555">TC IRQ fires at B full, wraps</text>

  <!-- CPU consumes -->
  <rect x="30" y="180" width="660" height="90" rx="6" fill="#f4f4f8" stroke="#999"/>
  <text x="360" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">CPU: process the half that just filled while DMA fills the other</text>
  <rect x="60" y="214" width="280" height="40" rx="4" fill="#fdeef0" stroke="#c84a6a"/>
  <text x="200" y="232" text-anchor="middle" font-size="10" fill="#7a1c34">on HT: CPU reads A (DMA writing B)</text>
  <text x="200" y="248" text-anchor="middle" font-size="9" fill="#7a1c34">M7: invalidate A before read</text>
  <rect x="380" y="214" width="280" height="40" rx="4" fill="#eef0fd" stroke="#4a6ac8"/>
  <text x="520" y="232" text-anchor="middle" font-size="10" fill="#1c2c7a">on TC: CPU reads B (DMA writing A)</text>
  <text x="520" y="248" text-anchor="middle" font-size="9" fill="#1c2c7a">no torn reads: halves are disjoint</text>

  <text x="360" y="288" text-anchor="middle" font-size="10" fill="#555">Buffer must be cache-line aligned and invalidated before CPU read on Cortex-M7</text>
</svg>
