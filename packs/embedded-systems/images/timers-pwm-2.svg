<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="sans-serif">
  <rect width="720" height="320" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">A timer is a counter that ticks up and wraps around</text>

  <!-- clock + prescaler flow -->
  <text x="60" y="62" font-size="12" fill="#333">Chip clock</text>
  <rect x="60" y="70" width="120" height="34" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="120" y="92" text-anchor="middle" font-size="12" fill="#000">fast ticks</text>
  <line x1="180" y1="87" x2="230" y2="87" stroke="#000" stroke-width="1.5"/>
  <polygon points="230,87 222,83 222,91" fill="#000"/>
  <rect x="230" y="70" width="150" height="34" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="305" y="86" text-anchor="middle" font-size="11" fill="#000">Prescaler</text>
  <text x="305" y="99" text-anchor="middle" font-size="10" fill="#555">divides the clock</text>
  <line x1="380" y1="87" x2="430" y2="87" stroke="#000" stroke-width="1.5"/>
  <polygon points="430,87 422,83 422,91" fill="#000"/>
  <rect x="430" y="70" width="150" height="34" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="505" y="86" text-anchor="middle" font-size="11" fill="#000">Counter (CNT)</text>
  <text x="505" y="99" text-anchor="middle" font-size="10" fill="#555">steady slow ticks</text>

  <!-- counter ramp graph -->
  <g stroke="#999" stroke-width="1">
    <line x1="70" y1="280" x2="700" y2="280"/>   <!-- time axis -->
    <line x1="70" y1="150" x2="70" y2="280"/>    <!-- value axis -->
  </g>
  <text x="360" y="306" text-anchor="middle" font-size="11" fill="#555">time (each step = one tick)</text>
  <text x="34" y="218" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90 34 218)">count value</text>

  <!-- auto-reload line -->
  <line x1="66" y1="160" x2="700" y2="160" stroke="#c0392b" stroke-dasharray="5 3"/>
  <text x="700" y="156" text-anchor="end" font-size="11" fill="#c0392b">auto-reload value (top)</text>

  <!-- ramps that wrap: three sawtooth periods -->
  <polyline fill="none" stroke="#1f6fb2" stroke-width="2.5"
    points="70,280 230,160 230,280 390,160 390,280 550,160 550,280 700,205"/>
  <text x="150" y="178" text-anchor="middle" font-size="11" fill="#1f6fb2">counts up...</text>
  <text x="232" y="150" text-anchor="start" font-size="11" fill="#c0392b">wraps to 0 + fires event</text>

  <text x="360" y="132" text-anchor="middle" font-size="12" fill="#333">Reach the top -&gt; reset to 0 and fire an event. That repeats at a steady rate.</text>
</svg>
