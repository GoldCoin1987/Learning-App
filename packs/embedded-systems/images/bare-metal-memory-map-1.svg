<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 540" font-family="sans-serif">
  <rect x="0" y="0" width="460" height="540" fill="white"/>
  <text x="230" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="black">Cortex-M Memory Map (4 GB, little-endian)</text>

  <!-- address axis label -->
  <text x="20" y="60" font-size="11" fill="black">0xFFFF_FFFF (top)</text>
  <text x="20" y="510" font-size="11" fill="black">0x0000_0000 (bottom)</text>

  <!-- System / private peripheral block -->
  <rect x="150" y="70" width="200" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="250" y="92" font-size="13" font-weight="bold" text-anchor="middle" fill="black">System (PPB: NVIC, SysTick)</text>
  <text x="250" y="110" font-size="11" text-anchor="middle" fill="black">0xE000_0000</text>

  <!-- Peripheral region -->
  <rect x="150" y="130" width="200" height="90" fill="none" stroke="black" stroke-width="2"/>
  <text x="250" y="160" font-size="13" font-weight="bold" text-anchor="middle" fill="black">Peripherals</text>
  <text x="250" y="178" font-size="11" text-anchor="middle" fill="black">addresses ARE registers</text>
  <text x="250" y="194" font-size="11" text-anchor="middle" fill="black">writes have side effects;</text>
  <text x="250" y="210" font-size="11" text-anchor="middle" fill="black">reads can clear flags  0x4000_0000</text>

  <!-- SRAM -->
  <rect x="150" y="230" width="200" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="250" y="258" font-size="13" font-weight="bold" text-anchor="middle" fill="black">SRAM (read/write)</text>
  <text x="250" y="278" font-size="11" text-anchor="middle" fill="black">.data  .bss</text>
  <text x="250" y="296" font-size="11" text-anchor="middle" fill="black">heap (grows up)</text>
  <text x="250" y="320" font-size="11" text-anchor="middle" fill="black">stack (grows down)</text>
  <text x="250" y="340" font-size="11" text-anchor="middle" fill="black">0x2000_0000</text>

  <!-- arrows: stack down, heap up -->
  <line x1="120" y1="270" x2="120" y2="335" stroke="black" stroke-width="1.5"/>
  <polygon points="120,338 116,330 124,330" fill="black"/>
  <text x="70" y="305" font-size="10" fill="black">stack</text>

  <!-- Flash -->
  <rect x="150" y="360" width="200" height="120" fill="none" stroke="black" stroke-width="2"/>
  <text x="250" y="388" font-size="13" font-weight="bold" text-anchor="middle" fill="black">Flash (read / execute)</text>
  <text x="250" y="408" font-size="11" text-anchor="middle" fill="black">vector table @ 0x0000_0000</text>
  <text x="250" y="426" font-size="11" text-anchor="middle" fill="black">.text (code)  .rodata (consts)</text>
  <text x="250" y="444" font-size="11" text-anchor="middle" fill="black">init image of .data</text>
  <text x="250" y="468" font-size="11" text-anchor="middle" fill="black">0x0800_0000 (alias 0x0)</text>
</svg>
