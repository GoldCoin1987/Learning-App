<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="sans-serif">
  <rect x="0" y="0" width="560" height="380" fill="white"/>
  <text x="280" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="black">The Vector Table at Reset</text>
  <text x="280" y="48" font-size="12" text-anchor="middle" fill="black">A list of "where to jump" addresses at the start of memory</text>

  <!-- table -->
  <rect x="40" y="80" width="260" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="50" y="98" font-size="11" fill="black">slot 0:</text>
  <text x="120" y="105" font-size="12" font-weight="bold" fill="black">initial stack pointer</text>

  <rect x="40" y="120" width="260" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="50" y="138" font-size="11" fill="black">slot 1:</text>
  <text x="120" y="145" font-size="12" font-weight="bold" fill="black">reset handler address</text>

  <rect x="40" y="160" width="260" height="32" fill="none" stroke="black" stroke-width="1"/>
  <text x="120" y="180" font-size="11" text-anchor="middle" fill="black">slot 2: fault handler</text>
  <rect x="40" y="192" width="260" height="32" fill="none" stroke="black" stroke-width="1"/>
  <text x="120" y="212" font-size="11" text-anchor="middle" fill="black">slot 3+: other handlers ...</text>

  <!-- reset handler box -->
  <rect x="360" y="120" width="160" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="440" y="145" font-size="13" font-weight="bold" text-anchor="middle" fill="black">Reset handler</text>
  <text x="440" y="165" font-size="10" text-anchor="middle" fill="black">first code that runs</text>

  <!-- arrow slot1 to handler -->
  <line x1="300" y1="140" x2="358" y2="140" stroke="black" stroke-width="2"/>
  <polygon points="360,140 352,136 352,144" fill="black"/>
  <text x="330" y="132" font-size="9" text-anchor="middle" fill="black">jump</text>

  <text x="280" y="250" font-size="12" font-weight="bold" text-anchor="middle" fill="black">On power-up the CPU does, automatically:</text>
  <text x="280" y="272" font-size="11" text-anchor="middle" fill="black">1. Load slot 0 into the stack pointer (set up scratch space).</text>
  <text x="280" y="292" font-size="11" text-anchor="middle" fill="black">2. Load slot 1 into the PC (jump to the start of your program).</text>
  <text x="280" y="312" font-size="11" text-anchor="middle" fill="black">3. Begin the fetch-decode-execute loop from there.</text>
  <text x="280" y="345" font-size="11" text-anchor="middle" fill="black">Later, when an interrupt fires, the CPU jumps to that event's slot the same way.</text>
</svg>
