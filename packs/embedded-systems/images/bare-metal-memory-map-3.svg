<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="sans-serif">
  <rect x="0" y="0" width="480" height="300" fill="white"/>
  <text x="240" y="26" font-size="16" font-weight="bold" text-anchor="middle" fill="black">Writing a number to one address turns on an LED</text>

  <!-- the program writes a value -->
  <rect x="20" y="55" width="150" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="95" y="78" font-size="11" font-weight="bold" text-anchor="middle" fill="black">Your program writes</text>
  <text x="95" y="98" font-size="11" text-anchor="middle" fill="black">1 to address</text>
  <text x="95" y="112" font-size="11" text-anchor="middle" fill="black">0x40020018</text>

  <!-- arrow -->
  <line x1="172" y1="85" x2="215" y2="85" stroke="black" stroke-width="2"/>
  <polygon points="218,85 210,80 210,90" fill="black"/>

  <!-- that address is a special register -->
  <rect x="220" y="55" width="170" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="305" y="76" font-size="11" font-weight="bold" text-anchor="middle" fill="black">That address is NOT</text>
  <text x="305" y="91" font-size="11" text-anchor="middle" fill="black">storage. It is a special</text>
  <text x="305" y="106" font-size="11" text-anchor="middle" fill="black">control box (a "register")</text>

  <!-- arrow down -->
  <line x1="305" y1="117" x2="305" y2="150" stroke="black" stroke-width="2"/>
  <polygon points="305,153 300,145 310,145" fill="black"/>

  <!-- pin goes high -->
  <rect x="220" y="158" width="170" height="40" fill="none" stroke="black" stroke-width="2"/>
  <text x="305" y="183" font-size="11" font-weight="bold" text-anchor="middle" fill="black">A physical pin goes HIGH</text>

  <!-- arrow to LED -->
  <line x1="392" y1="178" x2="420" y2="178" stroke="black" stroke-width="2"/>
  <polygon points="423,178 415,173 415,183" fill="black"/>

  <!-- LED -->
  <circle cx="445" cy="178" r="14" fill="none" stroke="black" stroke-width="2"/>
  <line x1="445" y1="192" x2="445" y2="210" stroke="black" stroke-width="2"/>
  <text x="445" y="228" font-size="10" text-anchor="middle" fill="black">LED on</text>

  <text x="240" y="265" font-size="11" text-anchor="middle" fill="black">"Memory-mapped I/O": some addresses ARE the hardware.</text>
  <text x="240" y="282" font-size="11" text-anchor="middle" fill="black">Writing to them has a real-world side effect.</text>
</svg>
