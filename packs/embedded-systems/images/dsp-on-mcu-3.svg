<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" font-family="sans-serif">
  <rect width="760" height="320" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The FFT: from a wave in time to the frequencies inside it</text>

  <defs>
    <marker id="af" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Left: time domain -->
  <rect x="30" y="80" width="280" height="170" fill="none" stroke="#000"/>
  <line x1="30" y1="165" x2="310" y2="165" stroke="#888"/>
  <text x="170" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Time domain: the signal you record</text>
  <text x="170" y="270" text-anchor="middle" font-size="11" fill="#333">time -&gt;</text>
  <text x="22" y="95" text-anchor="end" font-size="10" fill="#333" transform="rotate(-90 22 165)">amplitude</text>
  <!-- sum of a low and a high sine -->
  <polyline fill="none" stroke="#000" stroke-width="1.6" points="35,165 45,135 55,120 65,140 75,110 85,95 95,125 105,150 115,130 125,165 135,195 145,210 155,190 165,220 175,235 185,205 195,180 205,200 215,165 225,135 235,120 245,140 255,110 265,98 275,128 285,150 295,132 305,165"/>

  <!-- arrow -->
  <line x1="320" y1="165" x2="368" y2="165" stroke="#000" stroke-width="2" marker-end="url(#af)"/>
  <text x="344" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">FFT</text>

  <!-- Right: frequency domain -->
  <rect x="380" y="80" width="350" height="170" fill="none" stroke="#000"/>
  <line x1="395" y1="235" x2="725" y2="235" stroke="#000"/>
  <line x1="395" y1="235" x2="395" y2="90" stroke="#000"/>
  <text x="555" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Frequency domain: which tones are present</text>
  <text x="555" y="270" text-anchor="middle" font-size="11" fill="#333">frequency (Hz) -&gt;</text>
  <text x="372" y="100" text-anchor="end" font-size="10" fill="#333" transform="rotate(-90 372 165)">strength</text>
  <!-- two peaks -->
  <rect x="460" y="120" width="14" height="115" fill="#000"/>
  <rect x="600" y="160" width="14" height="75" fill="#000"/>
  <text x="467" y="115" text-anchor="middle" font-size="10" fill="#000">low tone</text>
  <text x="607" y="155" text-anchor="middle" font-size="10" fill="#000">high tone</text>

  <text x="380" y="300" text-anchor="middle" font-size="11" fill="#333">A tall bar (peak) means that frequency is strongly present. Flat areas mean that frequency is absent.</text>
</svg>
