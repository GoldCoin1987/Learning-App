<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" width="460" height="280">
  <rect x="0" y="0" width="460" height="280" fill="#ffffff"/>
  <text x="230" y="22" font-family="sans-serif" font-size="15" text-anchor="middle" font-weight="bold">SNR: how far the signal stands above the noise</text>

  <!-- axes -->
  <line x1="50" y1="230" x2="430" y2="230" stroke="#000000" stroke-width="2"/>
  <line x1="50" y1="230" x2="50" y2="45" stroke="#000000" stroke-width="2"/>
  <text x="240" y="255" font-family="sans-serif" font-size="12" text-anchor="middle">time --&gt;</text>
  <text x="38" y="140" font-family="sans-serif" font-size="12" text-anchor="middle" transform="rotate(-90 38 140)">level</text>

  <!-- noise floor band (jagged baseline) -->
  <path d="M55,190 L70,200 L85,185 L100,198 L115,188 L130,200 L145,186 L160,197 L175,189 L190,199 L205,187 L220,198 L235,188 L250,200 L265,186 L280,197 L295,189 L310,199 L325,187 L340,198 L355,188 L370,200 L385,186 L400,197 L415,190"
        fill="none" stroke="#000000" stroke-width="1.5"/>
  <line x1="50" y1="193" x2="430" y2="193" stroke="#000000" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="380" y="213" font-family="sans-serif" font-size="11" text-anchor="middle">noise floor</text>

  <!-- signal peak rising above noise -->
  <path d="M210,193 L235,70 L260,193" fill="none" stroke="#000000" stroke-width="2.5"/>
  <text x="270" y="75" font-family="sans-serif" font-size="11">signal peak</text>

  <!-- SNR arrow -->
  <line x1="150" y1="193" x2="150" y2="70" stroke="#000000" stroke-width="1.5"/>
  <polygon points="150,68 146,80 154,80" fill="#000000"/>
  <polygon points="150,195 146,183 154,183" fill="#000000"/>
  <text x="118" y="135" font-family="sans-serif" font-size="12" text-anchor="middle">SNR</text>

  <text x="230" y="275" font-family="sans-serif" font-size="11" text-anchor="middle">Bigger gap = easier to detect. A matched filter maximizes this gap.</text>
</svg>
