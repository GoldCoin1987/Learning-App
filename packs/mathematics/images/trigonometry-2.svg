<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240" width="460" height="240">
  <rect x="0" y="0" width="460" height="240" fill="white"/>
  <!-- axes -->
  <line x1="30" y1="120" x2="445" y2="120" stroke="black" stroke-width="1"/>
  <line x1="40" y1="20" x2="40" y2="220" stroke="black" stroke-width="1"/>
  <text x="447" y="116" font-family="sans-serif" font-size="11" fill="black">t</text>
  <text x="20" y="30" font-family="sans-serif" font-size="11" fill="black">A</text>
  <text x="14" y="216" font-family="sans-serif" font-size="11" fill="black">-A</text>
  <!-- amplitude guide lines -->
  <line x1="40" y1="50" x2="445" y2="50" stroke="black" stroke-width="0.6" stroke-dasharray="3 3"/>
  <line x1="40" y1="190" x2="445" y2="190" stroke="black" stroke-width="0.6" stroke-dasharray="3 3"/>
  <!-- reference cosine A*cos(wt): peak at t=0. amplitude 70px, x from 40..440 over 2 periods (period=200) -->
  <path d="M 40 50 Q 65 50 90 120 Q 115 190 140 190 Q 165 190 190 120 Q 215 50 240 50 Q 265 50 290 120 Q 315 190 340 190 Q 365 190 390 120 Q 415 50 440 50" fill="none" stroke="black" stroke-width="1" stroke-dasharray="5 3"/>
  <!-- phase-shifted cosine A*cos(wt+phi): shifted left by phi; draw shifted right by ~40px for clarity (delay) -->
  <path d="M 40 95 Q 53 50 80 50 Q 105 50 130 120 Q 155 190 180 190 Q 205 190 230 120 Q 255 50 280 50 Q 305 50 330 120 Q 355 190 380 190 Q 405 190 430 120 L 440 100" fill="none" stroke="black" stroke-width="2"/>
  <!-- period bracket on reference -->
  <line x1="40" y1="210" x2="240" y2="210" stroke="black" stroke-width="0.8"/>
  <line x1="40" y1="205" x2="40" y2="215" stroke="black" stroke-width="0.8"/>
  <line x1="240" y1="205" x2="240" y2="215" stroke="black" stroke-width="0.8"/>
  <text x="120" y="226" font-family="sans-serif" font-size="11" fill="black">T = 2&#960;/&#969;</text>
  <!-- phase shift label -->
  <line x1="40" y1="40" x2="80" y2="40" stroke="black" stroke-width="0.8"/>
  <text x="46" y="36" font-family="sans-serif" font-size="10" fill="black">&#916;t = &#966;/&#969;</text>
  <!-- legend -->
  <line x1="300" y1="20" x2="325" y2="20" stroke="black" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="330" y="24" font-family="sans-serif" font-size="10" fill="black">A&#183;cos(&#969;t)</text>
  <line x1="300" y1="34" x2="325" y2="34" stroke="black" stroke-width="2"/>
  <text x="330" y="38" font-family="sans-serif" font-size="10" fill="black">A&#183;cos(&#969;t+&#966;)</text>
</svg>
