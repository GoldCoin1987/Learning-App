<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="white"/>
  <g font-family="sans-serif" font-size="13" font-weight="bold" fill="black">
    <text x="60" y="20">Expectation = the balance point of the data</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="30" y1="130" x2="370" y2="130"/>
  </g>
  <g fill="black">
    <rect x="70" y="100" width="20" height="30"/>
    <rect x="120" y="80" width="20" height="50"/>
    <rect x="170" y="60" width="20" height="70"/>
    <rect x="220" y="90" width="20" height="40"/>
    <rect x="270" y="110" width="20" height="20"/>
  </g>
  <g stroke="black" stroke-width="2" fill="black">
    <polygon points="180,135 172,150 188,150"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="158" y="170">mean (mu)</text>
    <text x="40" y="150">low</text>
    <text x="330" y="150">high</text>
    <text x="30" y="195">Heights = how likely each value is; mu sits where it balances.</text>
  </g>
</svg>
