<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <rect x="0" y="0" width="320" height="240" fill="#ffffff"/>
  <!-- start point -->
  <circle cx="40" cy="190" r="3" fill="#000000"/>
  <!-- vector a -->
  <line x1="40" y1="190" x2="170" y2="150" stroke="#000000" stroke-width="2.5"/>
  <polygon points="170,150 156,148 160,159" fill="#000000"/>
  <text x="95" y="160" font-family="serif" font-size="16" fill="#000000">a</text>
  <!-- vector b placed tip-to-tail at end of a -->
  <line x1="170" y1="150" x2="230" y2="60" stroke="#000000" stroke-width="2.5"/>
  <polygon points="230,60 218,66 227,72" fill="#000000"/>
  <text x="205" y="110" font-family="serif" font-size="16" fill="#000000">b</text>
  <!-- resultant a + b -->
  <line x1="40" y1="190" x2="230" y2="60" stroke="#000000" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="230,60 217,61 222,72" fill="#000000"/>
  <text x="110" y="105" font-family="serif" font-size="16" fill="#000000">a + b</text>
  <text x="14" y="228" font-family="serif" font-size="13" fill="#000000">Tip-to-tail: place b at the head of a; a + b goes start to end</text>
</svg>
