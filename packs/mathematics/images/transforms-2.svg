<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" font-family="sans-serif">
  <rect width="340" height="340" fill="white"/>
  <text x="10" y="20" font-size="13">z-plane pole-zero plot</text>
  <!-- axes -->
  <line x1="20" y1="180" x2="320" y2="180" stroke="black" stroke-width="1.2"/>
  <line x1="170" y1="320" x2="170" y2="40" stroke="black" stroke-width="1.2"/>
  <polygon points="320,180 312,176 312,184" fill="black"/>
  <polygon points="170,40 166,48 174,48" fill="black"/>
  <text x="306" y="200" font-size="12">Re</text>
  <text x="178" y="50" font-size="12">Im</text>
  <!-- unit circle, radius 110 px = |z| = 1 -->
  <circle cx="170" cy="180" r="110" fill="none" stroke="black" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="285" y="172" font-size="11">|z| = 1</text>
  <!-- pole inside unit circle (stable) at z = 0.6 -->
  <line x1="219" y1="171" x2="237" y2="189" stroke="black" stroke-width="2"/>
  <line x1="237" y1="171" x2="219" y2="189" stroke="black" stroke-width="2"/>
  <text x="226" y="208" font-size="11">pole (0.6)</text>
  <!-- zero at z = -1 (on circle) -->
  <circle cx="60" cy="180" r="7" fill="none" stroke="black" stroke-width="2"/>
  <text x="34" y="205" font-size="11">zero (-1)</text>
  <!-- origin -->
  <circle cx="170" cy="180" r="2" fill="black"/>
</svg>
