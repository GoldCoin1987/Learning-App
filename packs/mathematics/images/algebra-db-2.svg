<svg xmlns="http://www.w3.org/2000/svg" width="360" height="170" viewBox="0 0 360 170">
  <rect width="360" height="170" fill="white"/>
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="20" y1="70" x2="345" y2="70"/>
    <polygon points="345,70 337,66 337,74" fill="black"/>
    <line x1="40" y1="63" x2="40" y2="77"/>
    <line x1="100" y1="63" x2="100" y2="77"/>
    <line x1="160" y1="63" x2="160" y2="77"/>
    <line x1="220" y1="63" x2="220" y2="77"/>
    <line x1="280" y1="63" x2="280" y2="77"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13" text-anchor="middle">
    <text x="40" y="55">0 dB</text>
    <text x="100" y="55">3 dB</text>
    <text x="160" y="55">10 dB</text>
    <text x="220" y="55">20 dB</text>
    <text x="280" y="55">30 dB</text>
    <text x="40" y="95">x1</text>
    <text x="100" y="95">x2</text>
    <text x="160" y="95">x10</text>
    <text x="220" y="95">x100</text>
    <text x="280" y="95">x1000</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12" text-anchor="middle">
    <text x="182" y="140">Power ratio = 10^(dB/10) -- add dB to multiply ratios</text>
  </g>
</svg>
