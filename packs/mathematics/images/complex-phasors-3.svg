<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" font-family="sans-serif">
  <rect width="360" height="320" fill="white"/>
  <!-- axes -->
  <line x1="20" y1="200" x2="340" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="110" y1="300" x2="110" y2="20" stroke="black" stroke-width="1.5"/>
  <polygon points="340,200 332,196 332,204" fill="black"/>
  <polygon points="110,20 106,28 114,28" fill="black"/>
  <text x="318" y="218" font-size="13">Real axis</text>
  <text x="118" y="30" font-size="13">Imaginary axis</text>
  <!-- tick labels on real axis -->
  <text x="148" y="218" font-size="11">1</text>
  <text x="188" y="218" font-size="11">2</text>
  <text x="228" y="218" font-size="11">3</text>
  <!-- tick labels on imaginary axis -->
  <text x="92" y="164" font-size="11">1</text>
  <text x="92" y="124" font-size="11">2</text>
  <!-- the point z = 3 + j2 -->
  <line x1="230" y1="200" x2="230" y2="120" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="110" y1="120" x2="230" y2="120" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <circle cx="230" cy="120" r="4" fill="black"/>
  <text x="238" y="116" font-size="14">z = 3 + j2</text>
  <!-- go-right label -->
  <text x="150" y="236" font-size="12">go right 3 (real part)</text>
  <text x="150" y="252" font-size="12">go up 2 (imaginary part)</text>
</svg>
