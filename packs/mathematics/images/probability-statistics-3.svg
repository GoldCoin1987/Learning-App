<svg xmlns="http://www.w3.org/2000/svg" width="420" height="170" viewBox="0 0 420 170">
  <rect width="420" height="170" fill="white"/>
  <g stroke="black" stroke-width="2" fill="none">
    <line x1="30" y1="80" x2="390" y2="80"/>
    <line x1="30" y1="72" x2="30" y2="88"/>
    <line x1="210" y1="72" x2="210" y2="88"/>
    <line x1="390" y1="72" x2="390" y2="88"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="14">
    <text x="22" y="108">0</text>
    <text x="195" y="108">0.5</text>
    <text x="382" y="108">1</text>
    <text x="6" y="64">impossible</text>
    <text x="170" y="64">50/50</text>
    <text x="350" y="64">certain</text>
  </g>
  <g stroke="black" stroke-width="1" fill="none" stroke-dasharray="3,3">
    <line x1="30" y1="80" x2="30" y2="130"/>
    <line x1="120" y1="80" x2="120" y2="130"/>
    <line x1="210" y1="80" x2="210" y2="130"/>
    <line x1="390" y1="80" x2="390" y2="130"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="40" y="145">sun</text>
    <text x="38" y="158">rises</text>
    <text x="-2" y="145">never</text>
    <text x="92" y="145">roll a 6</text>
    <text x="98" y="158">(1/6)</text>
    <text x="185" y="145">coin</text>
    <text x="178" y="158">= heads</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13" font-weight="bold">
    <text x="120" y="22">The probability scale: how likely something is</text>
  </g>
</svg>
