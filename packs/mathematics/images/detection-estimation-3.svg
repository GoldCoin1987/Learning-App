<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" width="460" height="320">
  <rect x="0" y="0" width="460" height="320" fill="#ffffff"/>
  <text x="230" y="24" font-family="sans-serif" font-size="15" text-anchor="middle">The four outcomes of a yes/no decision</text>
  <!-- column headers -->
  <text x="230" y="56" font-family="sans-serif" font-size="12" text-anchor="middle">What is really there (the truth)</text>
  <text x="230" y="78" font-family="sans-serif" font-size="13" text-anchor="middle">Signal present</text>
  <text x="350" y="78" font-family="sans-serif" font-size="13" text-anchor="middle">No signal</text>
  <!-- row headers -->
  <text x="40" y="160" font-family="sans-serif" font-size="13" text-anchor="middle" transform="rotate(-90 40 160)">Your decision</text>
  <text x="95" y="135" font-family="sans-serif" font-size="13" text-anchor="middle">Say</text>
  <text x="95" y="151" font-family="sans-serif" font-size="13" text-anchor="middle">"yes"</text>
  <text x="95" y="225" font-family="sans-serif" font-size="13" text-anchor="middle">Say</text>
  <text x="95" y="241" font-family="sans-serif" font-size="13" text-anchor="middle">"no"</text>
  <!-- grid -->
  <rect x="135" y="90" width="190" height="90" fill="none" stroke="#000000" stroke-width="2"/>
  <rect x="325" y="90" width="120" height="90" fill="none" stroke="#000000" stroke-width="2"/>
  <rect x="135" y="180" width="190" height="90" fill="none" stroke="#000000" stroke-width="2"/>
  <rect x="325" y="180" width="120" height="90" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- cell labels -->
  <text x="230" y="128" font-family="sans-serif" font-size="14" text-anchor="middle">HIT</text>
  <text x="230" y="148" font-family="sans-serif" font-size="11" text-anchor="middle">(detection,</text>
  <text x="230" y="163" font-family="sans-serif" font-size="11" text-anchor="middle">correct)</text>
  <text x="385" y="128" font-family="sans-serif" font-size="14" text-anchor="middle">FALSE</text>
  <text x="385" y="146" font-family="sans-serif" font-size="14" text-anchor="middle">ALARM</text>
  <text x="385" y="164" font-family="sans-serif" font-size="11" text-anchor="middle">(error)</text>
  <text x="230" y="218" font-family="sans-serif" font-size="14" text-anchor="middle">MISS</text>
  <text x="230" y="238" font-family="sans-serif" font-size="11" text-anchor="middle">(error)</text>
  <text x="385" y="214" font-family="sans-serif" font-size="14" text-anchor="middle">CORRECT</text>
  <text x="385" y="232" font-family="sans-serif" font-size="14" text-anchor="middle">REJECTION</text>
  <text x="385" y="250" font-family="sans-serif" font-size="11" text-anchor="middle">(correct)</text>
  <!-- key -->
  <text x="230" y="298" font-family="sans-serif" font-size="11" text-anchor="middle">Two ways to be right, two ways to be wrong</text>
</svg>
