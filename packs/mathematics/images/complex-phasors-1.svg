<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" font-family="sans-serif">
  <rect width="360" height="320" fill="white"/>
  <!-- axes -->
  <line x1="30" y1="220" x2="340" y2="220" stroke="black" stroke-width="1.5"/>
  <line x1="120" y1="300" x2="120" y2="20" stroke="black" stroke-width="1.5"/>
  <!-- axis arrows -->
  <polygon points="340,220 332,216 332,224" fill="black"/>
  <polygon points="120,20 116,28 124,28" fill="black"/>
  <text x="328" y="240" font-size="13">Re</text>
  <text x="128" y="28" font-size="13">Im</text>
  <!-- point z = a + jb -->
  <line x1="120" y1="220" x2="280" y2="100" stroke="black" stroke-width="2"/>
  <polygon points="280,100 270,103 276,110" fill="black"/>
  <circle cx="280" cy="100" r="3.5" fill="black"/>
  <!-- projection guides -->
  <line x1="280" y1="100" x2="280" y2="220" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="280" y1="100" x2="120" y2="100" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- angle arc -->
  <path d="M 160 220 A 40 40 0 0 0 148 192" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="160" y="208" font-size="13">&#952;</text>
  <!-- labels -->
  <text x="290" y="96" font-size="13">z = a + jb</text>
  <text x="195" y="155" font-size="13">r = |z|</text>
  <text x="195" y="238" font-size="13">a</text>
  <text x="95" y="165" font-size="13">b</text>
</svg>
