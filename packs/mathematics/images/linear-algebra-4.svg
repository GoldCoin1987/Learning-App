<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280">
  <rect x="0" y="0" width="420" height="280" fill="white"/>
  <text x="210" y="22" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="black">A matrix transforms space: it stretches and rotates the grid</text>
  <!-- BEFORE -->
  <text x="100" y="50" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">Before (unit square)</text>
  <!-- before grid -->
  <g stroke="#dddddd" stroke-width="1">
    <line x1="40" y1="80" x2="40" y2="240"/>
    <line x1="80" y1="80" x2="80" y2="240"/>
    <line x1="120" y1="80" x2="120" y2="240"/>
    <line x1="160" y1="80" x2="160" y2="240"/>
    <line x1="40" y1="80" x2="160" y2="80"/>
    <line x1="40" y1="120" x2="160" y2="120"/>
    <line x1="40" y1="160" x2="160" y2="160"/>
    <line x1="40" y1="200" x2="160" y2="200"/>
    <line x1="40" y1="240" x2="160" y2="240"/>
  </g>
  <line x1="40" y1="240" x2="160" y2="240" stroke="black" stroke-width="2"/>
  <line x1="40" y1="80" x2="40" y2="240" stroke="black" stroke-width="2"/>
  <!-- unit square: origin (40,200), size 40 -->
  <rect x="40" y="200" width="40" height="40" fill="#9ec9ff" fill-opacity="0.5" stroke="#1560bd" stroke-width="2"/>
  <text x="60" y="225" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">area 1</text>
  <!-- arrow between -->
  <text x="210" y="160" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">apply A</text>
  <line x1="180" y1="170" x2="240" y2="170" stroke="black" stroke-width="2" marker-end="url(#mk)"/>
  <defs>
    <marker id="mk" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>
  <!-- AFTER -->
  <text x="330" y="50" font-family="sans-serif" font-size="13" text-anchor="middle" fill="black">After (sheared + stretched)</text>
  <g stroke="#dddddd" stroke-width="1">
    <line x1="260" y1="80" x2="260" y2="240"/>
    <line x1="300" y1="80" x2="300" y2="240"/>
    <line x1="340" y1="80" x2="340" y2="240"/>
    <line x1="380" y1="80" x2="380" y2="240"/>
    <line x1="260" y1="80" x2="380" y2="80"/>
    <line x1="260" y1="120" x2="380" y2="120"/>
    <line x1="260" y1="160" x2="380" y2="160"/>
    <line x1="260" y1="200" x2="380" y2="200"/>
    <line x1="260" y1="240" x2="380" y2="240"/>
  </g>
  <line x1="260" y1="240" x2="380" y2="240" stroke="black" stroke-width="2"/>
  <line x1="260" y1="80" x2="260" y2="240" stroke="black" stroke-width="2"/>
  <!-- transformed square (parallelogram): origin (260,200), basis i->(60,0)*? draw a stretched/sheared parallelogram -->
  <polygon points="260,200 340,200 360,120 280,120" fill="#9effb0" fill-opacity="0.5" stroke="#1a8a35" stroke-width="2"/>
  <text x="310" y="170" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">area = det A</text>
</svg>
