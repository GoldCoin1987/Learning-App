<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 320" font-family="sans-serif">
  <rect width="380" height="320" fill="white"/>
  <!-- axes -->
  <line x1="30" y1="220" x2="350" y2="220" stroke="black" stroke-width="1.5"/>
  <line x1="120" y1="300" x2="120" y2="20" stroke="black" stroke-width="1.5"/>
  <polygon points="350,220 342,216 342,224" fill="black"/>
  <polygon points="120,20 116,28 124,28" fill="black"/>
  <text x="334" y="238" font-size="13">Re</text>
  <text x="128" y="30" font-size="13">Im</text>
  <!-- phasor arrow -->
  <line x1="120" y1="220" x2="270" y2="110" stroke="black" stroke-width="2.5"/>
  <polygon points="270,110 259,112 266,121" fill="black"/>
  <!-- angle arc -->
  <path d="M 165 220 A 45 45 0 0 0 152 188" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="168" y="210" font-size="14">&#966;</text>
  <text x="150" y="248" font-size="12">&#966; = timing (phase)</text>
  <!-- length label -->
  <text x="190" y="150" font-size="13">length = size (V_m)</text>
  <!-- title / caption -->
  <text x="40" y="290" font-size="13">A phasor: one arrow holds a wave's size and timing</text>
</svg>
