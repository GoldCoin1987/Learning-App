<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <rect x="0" y="0" width="440" height="280" fill="#ffffff"/>
  <text x="220" y="24" font-family="sans-serif" font-size="15" text-anchor="middle">Estimating a true value from noisy readings</text>
  <!-- number line -->
  <line x1="40" y1="170" x2="410" y2="170" stroke="#000000" stroke-width="2"/>
  <line x1="40" y1="165" x2="40" y2="175" stroke="#000000" stroke-width="2"/>
  <line x1="410" y1="165" x2="410" y2="175" stroke="#000000" stroke-width="2"/>
  <text x="225" y="200" font-family="sans-serif" font-size="12" text-anchor="middle">measured height (cm)</text>
  <!-- scattered measurements as x marks -->
  <text x="120" y="175" font-family="sans-serif" font-size="14" text-anchor="middle">x</text>
  <text x="165" y="175" font-family="sans-serif" font-size="14" text-anchor="middle">x</text>
  <text x="195" y="175" font-family="sans-serif" font-size="14" text-anchor="middle">x</text>
  <text x="240" y="175" font-family="sans-serif" font-size="14" text-anchor="middle">x</text>
  <text x="270" y="175" font-family="sans-serif" font-size="14" text-anchor="middle">x</text>
  <text x="315" y="175" font-family="sans-serif" font-size="14" text-anchor="middle">x</text>
  <text x="120" y="148" font-family="sans-serif" font-size="11" text-anchor="middle">noisy</text>
  <text x="120" y="161" font-family="sans-serif" font-size="11" text-anchor="middle">readings</text>
  <!-- estimate = average, arrow down -->
  <line x1="218" y1="70" x2="218" y2="160" stroke="#000000" stroke-width="2"/>
  <path d="M218 168 L213 156 L223 156 Z" fill="#000000"/>
  <text x="218" y="58" font-family="sans-serif" font-size="13" text-anchor="middle">average of the readings</text>
  <text x="218" y="44" font-family="sans-serif" font-size="13" text-anchor="middle">= best estimate</text>
  <!-- spread bracket -->
  <line x1="120" y1="225" x2="315" y2="225" stroke="#000000" stroke-width="1"/>
  <line x1="120" y1="220" x2="120" y2="230" stroke="#000000" stroke-width="1"/>
  <line x1="315" y1="220" x2="315" y2="230" stroke="#000000" stroke-width="1"/>
  <text x="217" y="248" font-family="sans-serif" font-size="11" text-anchor="middle">spread = uncertainty (more readings shrinks it)</text>
</svg>
