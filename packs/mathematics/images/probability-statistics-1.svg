<svg xmlns="http://www.w3.org/2000/svg" width="360" height="260" viewBox="0 0 360 260">
  <rect width="360" height="260" fill="white"/>
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="30" y1="210" x2="340" y2="210"/>
    <line x1="40" y1="20" x2="40" y2="220"/>
    <path d="M 50 208 C 130 208 150 30 185 30 C 220 30 240 208 320 208"/>
  </g>
  <g stroke="black" stroke-width="1" fill="none" stroke-dasharray="3,3">
    <line x1="185" y1="210" x2="185" y2="30"/>
    <line x1="140" y1="210" x2="140" y2="150"/>
    <line x1="230" y1="210" x2="230" y2="150"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13">
    <text x="178" y="226">mu</text>
    <text x="118" y="226">mu-sigma</text>
    <text x="205" y="226">mu+sigma</text>
    <text x="250" y="70">f(x) = (1/(sigma*sqrt(2pi)))</text>
    <text x="250" y="86">  * e^(-(x-mu)^2 / 2sigma^2)</text>
    <text x="150" y="130">68% within +/-1 sigma</text>
    <text x="90" y="252">Gaussian (normal) probability density</text>
  </g>
</svg>
