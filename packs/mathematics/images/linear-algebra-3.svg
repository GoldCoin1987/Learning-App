<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" width="360" height="300">
  <rect x="0" y="0" width="360" height="300" fill="white"/>
  <text x="180" y="22" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="black">Vectors are arrows; adding them is tip-to-tail</text>
  <!-- grid -->
  <g stroke="#cccccc" stroke-width="1">
    <line x1="40" y1="60" x2="40" y2="270"/>
    <line x1="80" y1="60" x2="80" y2="270"/>
    <line x1="120" y1="60" x2="120" y2="270"/>
    <line x1="160" y1="60" x2="160" y2="270"/>
    <line x1="200" y1="60" x2="200" y2="270"/>
    <line x1="240" y1="60" x2="240" y2="270"/>
    <line x1="280" y1="60" x2="280" y2="270"/>
    <line x1="320" y1="60" x2="320" y2="270"/>
    <line x1="40" y1="60" x2="320" y2="60"/>
    <line x1="40" y1="100" x2="320" y2="100"/>
    <line x1="40" y1="140" x2="320" y2="140"/>
    <line x1="40" y1="180" x2="320" y2="180"/>
    <line x1="40" y1="220" x2="320" y2="220"/>
    <line x1="40" y1="270" x2="320" y2="270"/>
  </g>
  <!-- axes -->
  <line x1="40" y1="270" x2="320" y2="270" stroke="black" stroke-width="2"/>
  <line x1="40" y1="60" x2="40" y2="270" stroke="black" stroke-width="2"/>
  <text x="325" y="274" font-family="sans-serif" font-size="12" fill="black">x</text>
  <text x="30" y="58" font-family="sans-serif" font-size="12" fill="black">y</text>
  <defs>
    <marker id="arrA" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="black"/>
    </marker>
    <marker id="arrB" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1a6b1a"/>
    </marker>
    <marker id="arrC" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b00000"/>
    </marker>
  </defs>
  <!-- origin -->
  <circle cx="40" cy="270" r="3" fill="black"/>
  <!-- vector a = (3,1) -> tip at x=160,y=230 -->
  <line x1="40" y1="270" x2="160" y2="230" stroke="black" stroke-width="2.5" marker-end="url(#arrA)"/>
  <text x="95" y="263" font-family="sans-serif" font-size="13" fill="black">a = (3, 1)</text>
  <!-- vector b = (1,3) placed at tip of a -> from (160,230) to (200,110) -->
  <line x1="160" y1="230" x2="200" y2="110" stroke="#1a6b1a" stroke-width="2.5" marker-end="url(#arrB)"/>
  <text x="205" y="170" font-family="sans-serif" font-size="13" fill="#1a6b1a">b = (1, 3)</text>
  <!-- sum a+b = (4,4) from origin to (200,110) -->
  <line x1="40" y1="270" x2="200" y2="110" stroke="#b00000" stroke-width="2.5" marker-end="url(#arrC)"/>
  <text x="95" y="160" font-family="sans-serif" font-size="13" fill="#b00000">a + b = (4, 4)</text>
</svg>
