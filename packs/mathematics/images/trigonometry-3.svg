<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280">
  <rect x="0" y="0" width="360" height="280" fill="white"/>
  <!-- right triangle: right angle at bottom-right corner -->
  <!-- vertices: A (left, the angle theta) = (40,220); C (right angle) = (280,220); B (top) = (280,40) -->
  <polygon points="40,220 280,220 280,40" fill="none" stroke="black" stroke-width="2"/>
  <!-- right-angle square at C -->
  <polyline points="262,220 262,202 280,202" fill="none" stroke="black" stroke-width="1.2"/>
  <!-- angle theta arc at A -->
  <path d="M 90 220 A 50 50 0 0 0 78.5 188" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="92" y="208" font-family="sans-serif" font-size="15" fill="black">&#952;</text>
  <!-- side labels -->
  <text x="150" y="240" font-family="sans-serif" font-size="13" fill="black">adjacent</text>
  <text x="288" y="135" font-family="sans-serif" font-size="13" fill="black">opposite</text>
  <text x="120" y="115" font-family="sans-serif" font-size="13" fill="black" transform="rotate(-37 120 115)">hypotenuse</text>
  <!-- SOH-CAH-TOA legend -->
  <text x="20" y="262" font-family="sans-serif" font-size="13" fill="black">sin&#952;=opp/hyp   cos&#952;=adj/hyp   tan&#952;=opp/adj</text>
</svg>
