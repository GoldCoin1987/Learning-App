<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <rect x="0" y="0" width="320" height="320" fill="white"/>
  <!-- axes -->
  <line x1="20" y1="160" x2="300" y2="160" stroke="black" stroke-width="1"/>
  <line x1="160" y1="20" x2="160" y2="300" stroke="black" stroke-width="1"/>
  <text x="302" y="156" font-family="sans-serif" font-size="11" fill="black">x = cos&#952;</text>
  <text x="150" y="16" font-family="sans-serif" font-size="11" fill="black">y = sin&#952;</text>
  <!-- unit circle, radius 120 -->
  <circle cx="160" cy="160" r="120" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- angle theta = 50 deg : point (cos50, sin50)*120 = (77.1, 91.9), y up -->
  <line x1="160" y1="160" x2="237.1" y2="68.1" stroke="black" stroke-width="2"/>
  <circle cx="237.1" cy="68.1" r="3.5" fill="black"/>
  <!-- drop lines to axes -->
  <line x1="237.1" y1="68.1" x2="237.1" y2="160" stroke="black" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="237.1" y1="68.1" x2="160" y2="68.1" stroke="black" stroke-width="0.8" stroke-dasharray="4 3"/>
  <!-- theta arc -->
  <path d="M 200 160 A 40 40 0 0 0 185.7 130.4" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="196" y="142" font-family="sans-serif" font-size="13" fill="black">&#952;</text>
  <!-- labels -->
  <text x="240" y="120" font-family="sans-serif" font-size="11" fill="black">(cos&#952;, sin&#952;)</text>
  <text x="195" y="178" font-family="sans-serif" font-size="10" fill="black">cos&#952;</text>
  <text x="240" y="118" font-family="sans-serif" font-size="10" fill="black"></text>
  <text x="200" y="115" font-family="sans-serif" font-size="10" fill="black">sin&#952;</text>
  <!-- radius=1 label -->
  <text x="178" y="108" font-family="sans-serif" font-size="10" fill="black">r=1</text>
  <!-- quadrant markers -->
  <text x="285" y="150" font-family="sans-serif" font-size="10" fill="black">0</text>
  <text x="148" y="46" font-family="sans-serif" font-size="10" fill="black">90&#176;</text>
  <text x="22" y="150" font-family="sans-serif" font-size="10" fill="black">180&#176;</text>
  <text x="148" y="298" font-family="sans-serif" font-size="10" fill="black">270&#176;</text>
</svg>
