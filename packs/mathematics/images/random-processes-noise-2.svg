<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect x="0" y="0" width="400" height="240" fill="#ffffff"/>
  <!-- axes -->
  <line x1="40" y1="160" x2="380" y2="160" stroke="#000000" stroke-width="2"/>
  <line x1="210" y1="200" x2="210" y2="30" stroke="#000000" stroke-width="2"/>
  <!-- delta spike at tau=0 (white-noise autocorrelation) -->
  <line x1="210" y1="160" x2="210" y2="50" stroke="#000000" stroke-width="3"/>
  <polygon points="210,42 205,56 215,56" fill="#000000"/>
  <!-- labels -->
  <text x="200" y="190" font-family="sans-serif" font-size="14" text-anchor="middle">lag  tau</text>
  <text x="210" y="178" font-family="sans-serif" font-size="12" text-anchor="middle">0</text>
  <text x="255" y="50" font-family="sans-serif" font-size="13" text-anchor="middle">(N0/2) delta(tau)</text>
  <text x="200" y="220" font-family="sans-serif" font-size="13" text-anchor="middle">White-noise autocorrelation R(tau)</text>
  <text x="120" y="155" font-family="sans-serif" font-size="11" text-anchor="middle">0 elsewhere</text>
  <text x="300" y="155" font-family="sans-serif" font-size="11" text-anchor="middle">0 elsewhere</text>
</svg>
