<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <rect x="0" y="0" width="320" height="240" fill="#ffffff"/>
  <!-- origin -->
  <circle cx="40" cy="180" r="3" fill="#000000"/>
  <!-- vector b (along baseline) -->
  <line x1="40" y1="180" x2="280" y2="180" stroke="#000000" stroke-width="2.5"/>
  <polygon points="280,180 268,175 268,185" fill="#000000"/>
  <text x="286" y="185" font-family="serif" font-size="16" fill="#000000">b</text>
  <!-- vector a (up at an angle) -->
  <line x1="40" y1="180" x2="180" y2="60" stroke="#000000" stroke-width="2.5"/>
  <polygon points="180,60 166,64 173,73" fill="#000000"/>
  <text x="100" y="110" font-family="serif" font-size="16" fill="#000000">a</text>
  <!-- drop perpendicular from tip of a onto b -->
  <line x1="180" y1="60" x2="180" y2="180" stroke="#000000" stroke-width="1.2" stroke-dasharray="5,3"/>
  <!-- right-angle marker -->
  <rect x="168" y="168" width="12" height="12" fill="none" stroke="#000000" stroke-width="1"/>
  <!-- projection segment highlighted on b -->
  <line x1="40" y1="180" x2="180" y2="180" stroke="#000000" stroke-width="4"/>
  <text x="70" y="200" font-family="serif" font-size="13" fill="#000000">projection of a onto b</text>
  <!-- angle theta -->
  <path d="M 80 180 A 40 40 0 0 1 74 168" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="64" y="172" font-family="serif" font-size="14" fill="#000000">&#952;</text>
  <text x="14" y="228" font-family="serif" font-size="12" fill="#000000">Dot product: a.b = |a||b|cos&#952; = |b| x (shadow of a on b)</text>
</svg>
