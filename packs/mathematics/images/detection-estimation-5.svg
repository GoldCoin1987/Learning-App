<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 320" width="440" height="320">
  <rect x="0" y="0" width="440" height="320" fill="#ffffff"/>
  <text x="220" y="24" font-family="sans-serif" font-size="15" text-anchor="middle">Matched filter: slide a template, watch for a peak</text>
  <!-- Top: noisy input with a hidden signal -->
  <text x="20" y="58" font-family="sans-serif" font-size="12" text-anchor="start">Noisy data (known signal hidden inside):</text>
  <line x1="40" y1="120" x2="410" y2="120" stroke="#000000" stroke-width="1"/>
  <path d="M40 120 L55 112 L62 128 L74 108 L86 126 L98 114 L112 122 L120 116
           L140 118 L150 95 L160 145 L170 95 L180 118
           L200 116 L212 124 L224 110 L236 127 L248 113 L262 122 L278 114 L300 121 L320 116 L340 123 L360 114 L380 121 L410 118"
        fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="160" y="160" font-family="sans-serif" font-size="11" text-anchor="middle">(signal here, hard to see)</text>
  <!-- template -->
  <text x="20" y="195" font-family="sans-serif" font-size="12" text-anchor="start">Template (known shape) slides across &#8594;</text>
  <path d="M150 215 L160 192 L170 238 L180 192 L190 215" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- Bottom: matched filter output with sharp peak -->
  <text x="20" y="265" font-family="sans-serif" font-size="12" text-anchor="start">Matched-filter output: big peak where it matches</text>
  <line x1="40" y1="300" x2="410" y2="300" stroke="#000000" stroke-width="2"/>
  <path d="M40 300 L120 297 L150 293 L165 250 L180 293 L210 297 L410 299"
        fill="none" stroke="#000000" stroke-width="2"/>
  <line x1="165" y1="250" x2="165" y2="300" stroke="#000000" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="165" y="244" font-family="sans-serif" font-size="11" text-anchor="middle">peak = signal found</text>
</svg>
