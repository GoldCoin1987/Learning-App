<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" font-family="sans-serif">
  <rect width="480" height="220" fill="white"/>
  <!-- frequency axis -->
  <line x1="20" y1="170" x2="465" y2="170" stroke="black" stroke-width="1.5"/>
  <polygon points="465,170 457,166 457,174" fill="black"/>
  <text x="450" y="190" font-size="13">f</text>
  <!-- baseband triangle, centered at 0 (x=60), half-width B=40 -->
  <polygon points="20,170 60,90 100,170" fill="none" stroke="black" stroke-width="1.8"/>
  <text x="44" y="186" font-size="11">0</text>
  <text x="36" y="84" font-size="11">baseband</text>
  <!-- replica at +fs (center x=220) -->
  <polygon points="180,170 220,90 260,170" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="205" y="186" font-size="11">f_s</text>
  <!-- replica at +2fs (center x=380) -->
  <polygon points="340,170 380,90 420,170" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="362" y="186" font-size="11">2f_s</text>
  <!-- B label on baseband -->
  <line x1="60" y1="100" x2="100" y2="100" stroke="black" stroke-width="0.8" stroke-dasharray="2 2"/>
  <text x="74" y="96" font-size="11">B</text>
  <!-- guard gap marker between baseband and first replica -->
  <line x1="100" y1="155" x2="180" y2="155" stroke="black" stroke-width="0.8"/>
  <text x="118" y="150" font-size="10">f_s - B &#8805; B</text>
  <text x="20" y="40" font-size="13">Spectral replicas: sampling copies X(f) at every multiple of f_s</text>
</svg>
