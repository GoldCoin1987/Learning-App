<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <rect x="0" y="0" width="400" height="240" fill="#ffffff"/>
  <!-- axes -->
  <line x1="60" y1="200" x2="370" y2="200" stroke="#000000" stroke-width="2"/>
  <line x1="60" y1="200" x2="60" y2="30" stroke="#000000" stroke-width="2"/>
  <!-- flat white-noise PSD level -->
  <line x1="60" y1="100" x2="360" y2="100" stroke="#000000" stroke-width="2"/>
  <!-- N0/2 label dashed guide -->
  <line x1="60" y1="100" x2="360" y2="100" stroke="#000000" stroke-width="2" stroke-dasharray="0"/>
  <!-- labels -->
  <text x="200" y="225" font-family="sans-serif" font-size="14" text-anchor="middle">frequency f</text>
  <text x="30" y="120" font-family="sans-serif" font-size="14" text-anchor="middle" transform="rotate(-90 30 120)">S(f)</text>
  <text x="200" y="92" font-family="sans-serif" font-size="13" text-anchor="middle">N0/2  (flat, all frequencies)</text>
  <text x="200" y="55" font-family="sans-serif" font-size="13" text-anchor="middle">White-noise PSD</text>
  <text x="60" y="218" font-family="sans-serif" font-size="12" text-anchor="middle">0</text>
</svg>
