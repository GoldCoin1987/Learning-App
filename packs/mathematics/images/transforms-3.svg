<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 360" font-family="sans-serif">
  <rect width="440" height="360" fill="white"/>
  <text x="10" y="20" font-size="13">Two simple sine waves add up to one complex wave</text>
  <!-- wave A: low frequency -->
  <text x="10" y="55" font-size="12">Wave A (low note)</text>
  <line x1="30" y1="80" x2="420" y2="80" stroke="black" stroke-width="0.8"/>
  <polyline fill="none" stroke="black" stroke-width="1.5" points="30,80 70,55 110,80 150,105 190,80 230,55 270,80 310,105 350,80 390,55 420,68"/>
  <!-- plus sign -->
  <text x="215" y="120" font-size="20">+</text>
  <!-- wave B: higher frequency, smaller -->
  <text x="10" y="150" font-size="12">Wave B (higher note)</text>
  <line x1="30" y1="175" x2="420" y2="175" stroke="black" stroke-width="0.8"/>
  <polyline fill="none" stroke="black" stroke-width="1.5" points="30,175 50,162 70,175 90,188 110,175 130,162 150,175 170,188 190,175 210,162 230,175 250,188 270,175 290,162 310,175 330,188 350,175 370,162 390,175 410,188 420,180"/>
  <!-- equals sign -->
  <text x="215" y="215" font-size="20">=</text>
  <!-- sum wave -->
  <text x="10" y="250" font-size="12">A + B (the sound you hear)</text>
  <line x1="30" y1="290" x2="420" y2="290" stroke="black" stroke-width="0.8"/>
  <polyline fill="none" stroke="black" stroke-width="1.8" points="30,290 50,260 70,278 90,300 110,278 130,250 150,288 170,308 190,278 210,260 230,278 250,300 270,278 290,250 310,288 330,308 350,278 370,260 390,278 410,300 420,288"/>
  <text x="30" y="335" font-size="11">A transform splits this combined wave back into Wave A and Wave B.</text>
</svg>
