<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280">
  <rect x="0" y="0" width="420" height="280" fill="#ffffff"/>
  <!-- axes -->
  <line x1="70" y1="230" x2="400" y2="230" stroke="#000000" stroke-width="2"/>
  <line x1="70" y1="230" x2="70" y2="30" stroke="#000000" stroke-width="2"/>
  <!-- two overlapping Gaussian PDFs -->
  <!-- H0 (noise only), centered left -->
  <path d="M70 230 Q110 230 130 200 Q150 160 165 110 Q175 80 185 80 Q195 80 205 110 Q220 160 240 200 Q260 230 290 230" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- H1 (signal+noise), centered right -->
  <path d="M180 230 Q220 230 240 200 Q260 160 275 110 Q285 80 295 80 Q305 80 315 110 Q330 160 350 200 Q370 230 400 230" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- decision threshold gamma -->
  <line x1="240" y1="230" x2="240" y2="50" stroke="#000000" stroke-width="2" stroke-dasharray="2 3"/>
  <!-- labels -->
  <text x="170" y="70" font-family="sans-serif" font-size="13" text-anchor="middle">p(x|H0)</text>
  <text x="300" y="70" font-family="sans-serif" font-size="13" text-anchor="middle">p(x|H1)</text>
  <text x="240" y="44" font-family="sans-serif" font-size="13" text-anchor="middle">threshold &#947;</text>
  <text x="320" y="200" font-family="sans-serif" font-size="11" text-anchor="middle">Pd</text>
  <text x="258" y="222" font-family="sans-serif" font-size="11" text-anchor="middle">Pfa</text>
  <text x="235" y="255" font-family="sans-serif" font-size="13" text-anchor="middle">observation x</text>
  <text x="40" y="130" font-family="sans-serif" font-size="13" text-anchor="middle" transform="rotate(-90 40 130)">density</text>
  <text x="200" y="20" font-family="sans-serif" font-size="13" text-anchor="middle">Two-hypothesis decision</text>
</svg>
