<svg xmlns="http://www.w3.org/2000/svg" width="380" height="280" viewBox="0 0 380 280">
  <rect width="380" height="280" fill="white"/>
  <g font-family="sans-serif" font-size="13" font-weight="bold" fill="black">
    <text x="40" y="22">The 68-95-99.7 rule of the normal (bell) curve</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="30" y1="210" x2="350" y2="210"/>
    <path d="M 45 208 C 120 208 145 50 190 50 C 235 50 260 208 335 208"/>
  </g>
  <g stroke="black" stroke-width="1" fill="none" stroke-dasharray="3,3">
    <line x1="190" y1="210" x2="190" y2="50"/>
    <line x1="150" y1="210" x2="150" y2="120"/>
    <line x1="230" y1="210" x2="230" y2="120"/>
    <line x1="110" y1="210" x2="110" y2="180"/>
    <line x1="270" y1="210" x2="270" y2="180"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12">
    <text x="183" y="226">mu</text>
    <text x="118" y="226">mu-s</text>
    <text x="205" y="226">mu+s</text>
    <text x="78" y="226">mu-2s</text>
    <text x="248" y="226">mu+2s</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="150" y="115">68% within 1s</text>
    <text x="125" y="175">95% within 2s</text>
    <text x="55" y="255">s = standard deviation (sigma); mu = mean (center)</text>
    <text x="80" y="270">99.7% of values fall within 3 sigma</text>
  </g>
</svg>
