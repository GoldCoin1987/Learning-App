<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" font-family="sans-serif">
  <rect width="480" height="240" fill="white"/>
  <text x="20" y="18" font-size="13" font-weight="bold">Quantization: rounding each sample to the nearest level</text>
  <!-- axes -->
  <line x1="50" y1="200" x2="460" y2="200" stroke="black" stroke-width="1"/>
  <line x1="50" y1="200" x2="50" y2="30" stroke="black" stroke-width="1"/>
  <text x="445" y="218" font-size="11">time</text>
  <text x="8" y="36" font-size="11">value</text>
  <!-- level grid lines -->
  <line x1="50" y1="170" x2="460" y2="170" stroke="black" stroke-width="0.4" stroke-dasharray="2 3"/>
  <line x1="50" y1="140" x2="460" y2="140" stroke="black" stroke-width="0.4" stroke-dasharray="2 3"/>
  <line x1="50" y1="110" x2="460" y2="110" stroke="black" stroke-width="0.4" stroke-dasharray="2 3"/>
  <line x1="50" y1="80" x2="460" y2="80" stroke="black" stroke-width="0.4" stroke-dasharray="2 3"/>
  <line x1="50" y1="50" x2="460" y2="50" stroke="black" stroke-width="0.4" stroke-dasharray="2 3"/>
  <text x="20" y="174" font-size="9">000</text>
  <text x="20" y="144" font-size="9">001</text>
  <text x="20" y="114" font-size="9">010</text>
  <text x="20" y="84" font-size="9">011</text>
  <text x="20" y="54" font-size="9">100</text>
  <!-- smooth curve -->
  <path d="M50,185 C130,40 200,40 260,110 C320,180 400,180 460,70" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- quantization staircase approximating curve -->
  <polyline points="50,170 90,140 90,80 130,50 170,50 210,50 210,80 250,110 290,140 330,170 370,170 410,140 450,80" fill="none" stroke="black" stroke-width="1.8"/>
  <text x="270" y="40" font-size="10">smooth signal</text>
  <text x="300" y="200" font-size="10">staircase = stored levels</text>
  <text x="120" y="232" font-size="11">more bits = more levels = finer steps = less rounding error (noise)</text>
</svg>
