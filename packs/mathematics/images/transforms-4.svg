<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 340" font-family="sans-serif">
  <rect width="360" height="340" fill="white"/>
  <text x="10" y="20" font-size="13">s-plane: where poles sit decides stability</text>
  <!-- axes -->
  <line x1="20" y1="180" x2="340" y2="180" stroke="black" stroke-width="1.2"/>
  <line x1="180" y1="320" x2="180" y2="40" stroke="black" stroke-width="1.2"/>
  <polygon points="340,180 332,176 332,184" fill="black"/>
  <polygon points="180,40 176,48 184,48" fill="black"/>
  <text x="320" y="200" font-size="12">Re (decay)</text>
  <text x="188" y="52" font-size="12">Im (frequency)</text>
  <!-- left half shading label -->
  <text x="40" y="70" font-size="11">LEFT half = stable</text>
  <text x="40" y="86" font-size="11">(response dies down)</text>
  <text x="225" y="70" font-size="11">RIGHT half =</text>
  <text x="225" y="86" font-size="11">unstable (blows up)</text>
  <!-- stable complex-conjugate pole pair in left half plane (x marks) -->
  <line x1="92" y1="112" x2="108" y2="128" stroke="black" stroke-width="2"/>
  <line x1="108" y1="112" x2="92" y2="128" stroke="black" stroke-width="2"/>
  <line x1="92" y1="232" x2="108" y2="248" stroke="black" stroke-width="2"/>
  <line x1="108" y1="232" x2="92" y2="248" stroke="black" stroke-width="2"/>
  <text x="60" y="270" font-size="11">stable poles</text>
  <!-- unstable pole in right half (x) -->
  <line x1="262" y1="162" x2="278" y2="178" stroke="black" stroke-width="2"/>
  <line x1="278" y1="162" x2="262" y2="178" stroke="black" stroke-width="2"/>
  <text x="235" y="205" font-size="11">unstable pole</text>
  <!-- origin -->
  <circle cx="180" cy="180" r="2" fill="black"/>
  <text x="30" y="335" font-size="11">x = pole. Vertical axis (Im) = oscillation; all poles left of it means stable.</text>
</svg>
