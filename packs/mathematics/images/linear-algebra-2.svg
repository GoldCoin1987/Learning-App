<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <rect x="0" y="0" width="320" height="240" fill="#ffffff"/>
  <!-- center of the data cloud -->
  <circle cx="160" cy="120" r="2.5" fill="#000000"/>
  <!-- scattered data points (elongated cloud, tilted ~30 deg) -->
  <circle cx="96" cy="158" r="2" fill="#000000"/>
  <circle cx="118" cy="150" r="2" fill="#000000"/>
  <circle cx="128" cy="138" r="2" fill="#000000"/>
  <circle cx="140" cy="134" r="2" fill="#000000"/>
  <circle cx="150" cy="126" r="2" fill="#000000"/>
  <circle cx="168" cy="118" r="2" fill="#000000"/>
  <circle cx="176" cy="110" r="2" fill="#000000"/>
  <circle cx="190" cy="104" r="2" fill="#000000"/>
  <circle cx="202" cy="96" r="2" fill="#000000"/>
  <circle cx="222" cy="86" r="2" fill="#000000"/>
  <circle cx="146" cy="142" r="2" fill="#000000"/>
  <circle cx="182" cy="100" r="2" fill="#000000"/>
  <circle cx="134" cy="148" r="2" fill="#000000"/>
  <circle cx="196" cy="108" r="2" fill="#000000"/>
  <!-- ellipse showing covariance shape -->
  <ellipse cx="160" cy="120" rx="80" ry="26" fill="none" stroke="#000000" stroke-width="1" stroke-dasharray="3,3" transform="rotate(-30 160 120)"/>
  <!-- principal eigenvector v1 (large eigenvalue, along major axis) -->
  <line x1="160" y1="120" x2="229" y2="80" stroke="#000000" stroke-width="2.5"/>
  <polygon points="229,80 217,80 222,90" fill="#000000"/>
  <text x="232" y="78" font-family="serif" font-size="14" fill="#000000">v1 (max var)</text>
  <!-- second eigenvector v2 (small eigenvalue, minor axis, orthogonal) -->
  <line x1="160" y1="120" x2="183" y2="160" stroke="#000000" stroke-width="2"/>
  <polygon points="183,160 178,149 173,158" fill="#000000"/>
  <text x="186" y="172" font-family="serif" font-size="14" fill="#000000">v2</text>
  <!-- right-angle marker between eigenvectors -->
  <path d="M 173 127 L 178 130 L 175 135" fill="none" stroke="#000000" stroke-width="1"/>
  <text x="10" y="222" font-family="serif" font-size="12" fill="#000000">Eigenvectors of covariance R: v1 = signal direction (DOA), orthogonal axes</text>
</svg>
