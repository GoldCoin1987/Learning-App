<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" width="480" height="280">
  <rect x="0" y="0" width="480" height="280" fill="#ffffff"/>
  <text x="240" y="22" font-family="sans-serif" font-size="15" text-anchor="middle" font-weight="bold">White noise vs colored noise (power across frequency)</text>

  <!-- LEFT: white noise, flat -->
  <text x="120" y="50" font-family="sans-serif" font-size="13" text-anchor="middle">White: flat (all frequencies equal)</text>
  <line x1="40" y1="220" x2="220" y2="220" stroke="#000000" stroke-width="2"/>
  <line x1="40" y1="220" x2="40" y2="70" stroke="#000000" stroke-width="2"/>
  <line x1="45" y1="130" x2="215" y2="130" stroke="#000000" stroke-width="2"/>
  <text x="130" y="240" font-family="sans-serif" font-size="12" text-anchor="middle">frequency f</text>
  <text x="28" y="150" font-family="sans-serif" font-size="12" text-anchor="middle" transform="rotate(-90 28 150)">power S(f)</text>

  <!-- RIGHT: colored noise, sloping/peaked -->
  <text x="360" y="50" font-family="sans-serif" font-size="13" text-anchor="middle">Colored: uneven (some freqs louder)</text>
  <line x1="270" y1="220" x2="450" y2="220" stroke="#000000" stroke-width="2"/>
  <line x1="270" y1="220" x2="270" y2="70" stroke="#000000" stroke-width="2"/>
  <!-- sloping down curve (e.g. 1/f-like) -->
  <path d="M275,85 C300,110 320,150 350,175 C380,200 410,210 445,213"
        fill="none" stroke="#000000" stroke-width="2"/>
  <text x="360" y="240" font-family="sans-serif" font-size="12" text-anchor="middle">frequency f</text>
  <text x="258" y="150" font-family="sans-serif" font-size="12" text-anchor="middle" transform="rotate(-90 258 150)">power S(f)</text>

  <text x="240" y="270" font-family="sans-serif" font-size="11" text-anchor="middle">"Color" describes the SHAPE of the power-vs-frequency curve, not the amplitude.</text>
</svg>
