<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" font-family="sans-serif">
  <rect width="340" height="340" fill="white"/>
  <!-- axes -->
  <line x1="20" y1="170" x2="320" y2="170" stroke="black" stroke-width="1.5"/>
  <line x1="170" y1="320" x2="170" y2="20" stroke="black" stroke-width="1.5"/>
  <text x="308" y="188" font-size="13">Re</text>
  <text x="178" y="30" font-size="13">Im</text>
  <!-- unit circle, radius 130 -->
  <circle cx="170" cy="170" r="130" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- 8th roots of unity: k=0..7, angle 45k deg -->
  <!-- k0 (1,0) --><circle cx="300" cy="170" r="4" fill="black"/>
  <!-- k1 (.707,.707) --><circle cx="262" cy="78" r="4" fill="black"/>
  <!-- k2 (0,1) --><circle cx="170" cy="40" r="4" fill="black"/>
  <!-- k3 (-.707,.707) --><circle cx="78" cy="78" r="4" fill="black"/>
  <!-- k4 (-1,0) --><circle cx="40" cy="170" r="4" fill="black"/>
  <!-- k5 (-.707,-.707) --><circle cx="78" cy="262" r="4" fill="black"/>
  <!-- k6 (0,-1) --><circle cx="170" cy="300" r="4" fill="black"/>
  <!-- k7 (.707,-.707) --><circle cx="262" cy="262" r="4" fill="black"/>
  <!-- spokes -->
  <line x1="170" y1="170" x2="300" y2="170" stroke="black" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="170" y1="170" x2="262" y2="78" stroke="black" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- 45 deg angle label -->
  <text x="226" y="120" font-size="12">45&#176;</text>
  <text x="300" y="162" font-size="12">1</text>
  <text x="268" y="74" font-size="12">e^{j&#960;/4}</text>
  <text x="120" y="335" font-size="13">8th roots of unity (DFT twiddle factors)</text>
</svg>
