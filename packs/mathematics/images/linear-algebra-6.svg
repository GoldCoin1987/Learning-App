<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" width="360" height="300">
  <rect x="0" y="0" width="360" height="300" fill="white"/>
  <text x="180" y="22" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="black">An eigenvector keeps its direction; others get rotated</text>
  <!-- axes through center (180,170) -->
  <line x1="40" y1="170" x2="320" y2="170" stroke="#999999" stroke-width="1"/>
  <line x1="180" y1="50" x2="180" y2="290" stroke="#999999" stroke-width="1"/>
  <circle cx="180" cy="170" r="3" fill="black"/>
  <defs>
    <marker id="e1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1a8a35"/>
    </marker>
    <marker id="e2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0a8a35"/>
    </marker>
    <marker id="r1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1560bd"/>
    </marker>
    <marker id="r2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b00000"/>
    </marker>
  </defs>
  <!-- eigenvector before: along +x, length 60 -->
  <line x1="180" y1="170" x2="240" y2="170" stroke="#1a8a35" stroke-width="2.5" marker-end="url(#e1)"/>
  <!-- eigenvector after: same direction, stretched to 100 (only scaled) -->
  <line x1="180" y1="170" x2="280" y2="170" stroke="#0a8a35" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#e2)"/>
  <text x="245" y="190" font-family="sans-serif" font-size="11" fill="#1a8a35">eigenvector: only stretched</text>
  <!-- ordinary vector before: up at 60 deg -->
  <line x1="180" y1="170" x2="210" y2="110" stroke="#1560bd" stroke-width="2.5" marker-end="url(#r1)"/>
  <text x="120" y="105" font-family="sans-serif" font-size="11" fill="#1560bd">vector before</text>
  <!-- ordinary vector after: rotated more toward x, different direction -->
  <line x1="180" y1="170" x2="250" y2="135" stroke="#b00000" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#r2)"/>
  <text x="252" y="125" font-family="sans-serif" font-size="11" fill="#b00000">rotated: changed direction</text>
  <text x="180" y="285" font-family="sans-serif" font-size="11" text-anchor="middle" fill="black">Av = (lambda)v for an eigenvector v</text>
</svg>
