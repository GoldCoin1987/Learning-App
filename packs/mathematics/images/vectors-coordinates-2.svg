<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260">
  <rect x="0" y="0" width="320" height="260" fill="#ffffff"/>
  <!-- origin -->
  <circle cx="100" cy="180" r="3" fill="#000000"/>
  <!-- z axis -->
  <line x1="100" y1="180" x2="100" y2="30" stroke="#000000" stroke-width="1.5"/>
  <polygon points="100,30 95,42 105,42" fill="#000000"/>
  <text x="106" y="34" font-family="serif" font-size="15" fill="#000000">z</text>
  <!-- x axis (toward viewer / lower-left) -->
  <line x1="100" y1="180" x2="30" y2="225" stroke="#000000" stroke-width="1.5"/>
  <polygon points="30,225 44,222 38,213" fill="#000000"/>
  <text x="18" y="235" font-family="serif" font-size="15" fill="#000000">x</text>
  <!-- y axis (right) -->
  <line x1="100" y1="180" x2="270" y2="180" stroke="#000000" stroke-width="1.5"/>
  <polygon points="270,180 258,175 258,185" fill="#000000"/>
  <text x="276" y="185" font-family="serif" font-size="15" fill="#000000">y</text>
  <!-- radial vector r to point P -->
  <line x1="100" y1="180" x2="215" y2="80" stroke="#000000" stroke-width="2"/>
  <circle cx="215" cy="80" r="3" fill="#000000"/>
  <text x="220" y="76" font-family="serif" font-size="15" fill="#000000">P</text>
  <text x="150" y="118" font-family="serif" font-size="15" fill="#000000">r</text>
  <!-- theta arc (from z axis to r) -->
  <path d="M 100 90 A 90 90 0 0 1 152 116" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="112" y="108" font-family="serif" font-size="14" fill="#000000">&#952;</text>
  <!-- projection of r onto xy plane -->
  <line x1="100" y1="180" x2="215" y2="200" stroke="#000000" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="215" y1="80" x2="215" y2="200" stroke="#000000" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- phi arc (in xy plane from y axis) -->
  <path d="M 150 180 A 50 50 0 0 1 142 192" fill="none" stroke="#000000" stroke-width="1.2"/>
  <text x="150" y="200" font-family="serif" font-size="14" fill="#000000">&#966;</text>
  <text x="14" y="252" font-family="serif" font-size="13" fill="#000000">Spherical (r, &#952;, &#966;): &#952; from +z, &#966; azimuth in xy-plane</text>
</svg>
