<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 300" width="340" height="300">
  <rect x="0" y="0" width="340" height="300" fill="white"/>
  <text x="170" y="22" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="black">Solving a system = where the lines cross</text>
  <!-- axes -->
  <line x1="40" y1="260" x2="310" y2="260" stroke="black" stroke-width="2"/>
  <line x1="40" y1="50" x2="40" y2="260" stroke="black" stroke-width="2"/>
  <text x="313" y="264" font-family="sans-serif" font-size="12" fill="black">x</text>
  <text x="30" y="48" font-family="sans-serif" font-size="12" fill="black">y</text>
  <!-- line 1: equation 1 -->
  <line x1="50" y1="80" x2="300" y2="240" stroke="#1560bd" stroke-width="2.5"/>
  <text x="250" y="225" font-family="sans-serif" font-size="12" fill="#1560bd">equation 1</text>
  <!-- line 2: equation 2 -->
  <line x1="60" y1="245" x2="300" y2="70" stroke="#b00000" stroke-width="2.5"/>
  <text x="240" y="80" font-family="sans-serif" font-size="12" fill="#b00000">equation 2</text>
  <!-- intersection ~ (180,160) -->
  <circle cx="178" cy="158" r="5" fill="black"/>
  <text x="150" y="145" font-family="sans-serif" font-size="12" font-weight="bold" fill="black">solution</text>
  <text x="120" y="290" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">one crossing = unique solution</text>
  <text x="270" y="290" font-family="sans-serif" font-size="12" text-anchor="middle" fill="black">parallel = none</text>
</svg>
