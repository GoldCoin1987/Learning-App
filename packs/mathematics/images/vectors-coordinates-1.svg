<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <rect x="0" y="0" width="320" height="240" fill="#ffffff"/>
  <!-- origin -->
  <circle cx="120" cy="150" r="3" fill="#000000"/>
  <!-- vector a (along x, fingers point) -->
  <line x1="120" y1="150" x2="240" y2="150" stroke="#000000" stroke-width="2"/>
  <polygon points="240,150 230,145 230,155" fill="#000000"/>
  <text x="246" y="155" font-family="serif" font-size="16" fill="#000000">a</text>
  <!-- vector b (curl toward) -->
  <line x1="120" y1="150" x2="60" y2="60" stroke="#000000" stroke-width="2"/>
  <polygon points="60,60 70,66 64,72" fill="#000000"/>
  <text x="44" y="52" font-family="serif" font-size="16" fill="#000000">b</text>
  <!-- result a x b (thumb, up out of plane shown vertical) -->
  <line x1="120" y1="150" x2="120" y2="40" stroke="#000000" stroke-width="2"/>
  <polygon points="120,40 115,52 125,52" fill="#000000"/>
  <text x="126" y="40" font-family="serif" font-size="15" fill="#000000">a x b</text>
  <!-- curl arc from a to b -->
  <path d="M 180 150 A 60 60 0 0 1 96 108" fill="none" stroke="#000000" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="96,108 104,112 106,102" fill="#000000"/>
  <text x="20" y="220" font-family="serif" font-size="13" fill="#000000">Right-hand rule: fingers a to b, thumb gives a x b</text>
</svg>
