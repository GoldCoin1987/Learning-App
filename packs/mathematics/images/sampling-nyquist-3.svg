<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" font-family="sans-serif">
  <rect width="480" height="220" fill="white"/>
  <text x="20" y="18" font-size="13" font-weight="bold">Sampling: taking snapshots of a smooth wave at regular intervals</text>
  <!-- axis -->
  <line x1="40" y1="120" x2="460" y2="120" stroke="black" stroke-width="1"/>
  <text x="445" y="138" font-size="11">time</text>
  <!-- smooth sine wave -->
  <path d="M40,120 C70,40 110,40 140,120 C170,200 210,200 240,120 C270,40 310,40 340,120 C370,200 410,200 440,120" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- sample dots at regular intervals -->
  <line x1="40" y1="120" x2="40" y2="120" stroke="black"/>
  <circle cx="40" cy="120" r="4" fill="black"/>
  <circle cx="90" cy="62" r="4" fill="black"/>
  <circle cx="140" cy="120" r="4" fill="black"/>
  <circle cx="190" cy="178" r="4" fill="black"/>
  <circle cx="240" cy="120" r="4" fill="black"/>
  <circle cx="290" cy="62" r="4" fill="black"/>
  <circle cx="340" cy="120" r="4" fill="black"/>
  <circle cx="390" cy="178" r="4" fill="black"/>
  <circle cx="440" cy="120" r="4" fill="black"/>
  <!-- interval marker -->
  <line x1="40" y1="200" x2="90" y2="200" stroke="black" stroke-width="1"/>
  <line x1="40" y1="196" x2="40" y2="204" stroke="black"/>
  <line x1="90" y1="196" x2="90" y2="204" stroke="black"/>
  <text x="44" y="216" font-size="11">sample interval T_s = 1/f_s</text>
  <text x="300" y="30" font-size="11">dots = samples (the numbers stored)</text>
</svg>
