<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 320" font-family="sans-serif">
  <rect width="440" height="320" fill="white"/>
  <text x="10" y="20" font-size="13">FFT bar spectrum: bars show which frequencies are present</text>
  <!-- axes -->
  <line x1="40" y1="260" x2="420" y2="260" stroke="black" stroke-width="1.2"/>
  <line x1="40" y1="40" x2="40" y2="260" stroke="black" stroke-width="1.2"/>
  <text x="370" y="285" font-size="12">frequency (Hz)</text>
  <text x="48" y="50" font-size="12">amount</text>
  <!-- bins (bars). Two tall peaks = two tones present, rest near zero -->
  <rect x="60" y="252" width="18" height="8" fill="black"/>
  <rect x="90" y="248" width="18" height="12" fill="black"/>
  <rect x="120" y="120" width="18" height="140" fill="black"/>
  <text x="116" y="278" font-size="10">peak 1</text>
  <rect x="150" y="246" width="18" height="14" fill="black"/>
  <rect x="180" y="250" width="18" height="10" fill="black"/>
  <rect x="210" y="244" width="18" height="16" fill="black"/>
  <rect x="240" y="244" width="18" height="16" fill="black"/>
  <rect x="270" y="80" width="18" height="180" fill="black"/>
  <text x="266" y="278" font-size="10">peak 2</text>
  <rect x="300" y="248" width="18" height="12" fill="black"/>
  <rect x="330" y="252" width="18" height="8" fill="black"/>
  <rect x="360" y="250" width="18" height="10" fill="black"/>
  <rect x="390" y="253" width="18" height="7" fill="black"/>
  <!-- bin spacing annotation -->
  <line x1="60" y1="295" x2="78" y2="295" stroke="black" stroke-width="1"/>
  <line x1="60" y1="291" x2="60" y2="299" stroke="black" stroke-width="1"/>
  <line x1="78" y1="291" x2="78" y2="299" stroke="black" stroke-width="1"/>
  <text x="84" y="299" font-size="10">each bar = one bin, width = fs / N</text>
</svg>
