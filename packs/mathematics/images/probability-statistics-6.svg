<svg xmlns="http://www.w3.org/2000/svg" width="400" height="270" viewBox="0 0 400 270">
  <rect width="400" height="270" fill="white"/>
  <g font-family="sans-serif" font-size="13" font-weight="bold" fill="black">
    <text x="30" y="22">Correlation: how two things move together</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <line x1="30" y1="190" x2="130" y2="190"/>
    <line x1="30" y1="80" x2="30" y2="190"/>
    <line x1="160" y1="190" x2="260" y2="190"/>
    <line x1="160" y1="80" x2="160" y2="190"/>
    <line x1="290" y1="190" x2="390" y2="190"/>
    <line x1="290" y1="80" x2="290" y2="190"/>
  </g>
  <g fill="black">
    <circle cx="45" cy="180" r="2.5"/>
    <circle cx="60" cy="165" r="2.5"/>
    <circle cx="72" cy="155" r="2.5"/>
    <circle cx="88" cy="135" r="2.5"/>
    <circle cx="100" cy="120" r="2.5"/>
    <circle cx="118" cy="100" r="2.5"/>
    <circle cx="175" cy="100" r="2.5"/>
    <circle cx="190" cy="120" r="2.5"/>
    <circle cx="205" cy="135" r="2.5"/>
    <circle cx="220" cy="150" r="2.5"/>
    <circle cx="235" cy="168" r="2.5"/>
    <circle cx="248" cy="182" r="2.5"/>
    <circle cx="305" cy="160" r="2.5"/>
    <circle cx="350" cy="110" r="2.5"/>
    <circle cx="320" cy="175" r="2.5"/>
    <circle cx="375" cy="130" r="2.5"/>
    <circle cx="335" cy="100" r="2.5"/>
    <circle cx="360" cy="170" r="2.5"/>
    <circle cx="315" cy="120" r="2.5"/>
    <circle cx="370" cy="155" r="2.5"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="12" font-weight="bold">
    <text x="40" y="210">positive</text>
    <text x="172" y="210">negative</text>
    <text x="305" y="210">none (~0)</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="11">
    <text x="32" y="226">rho near +1</text>
    <text x="162" y="226">rho near -1</text>
    <text x="295" y="226">rho near 0</text>
    <text x="20" y="252">rho (correlation) ranges from -1 to +1; 0 means no straight-line link.</text>
    <text x="20" y="266">Note: zero correlation does not always mean independent.</text>
  </g>
</svg>
