<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <rect x="0" y="0" width="320" height="240" fill="#ffffff"/>
  <!-- origin -->
  <circle cx="50" cy="200" r="3" fill="#000000"/>
  <!-- line spanned by a (the subspace we project onto) -->
  <line x1="20" y1="215" x2="300" y2="75" stroke="#000000" stroke-width="1" stroke-dasharray="2,3"/>
  <!-- vector a along the line -->
  <line x1="50" y1="200" x2="210" y2="120" stroke="#000000" stroke-width="2"/>
  <polygon points="210,120 198,121 203,131" fill="#000000"/>
  <text x="214" y="120" font-family="serif" font-size="16" fill="#000000">a</text>
  <!-- vector b (to be projected) -->
  <line x1="50" y1="200" x2="170" y2="60" stroke="#000000" stroke-width="2"/>
  <polygon points="170,60 162,69 172,73" fill="#000000"/>
  <text x="156" y="52" font-family="serif" font-size="16" fill="#000000">b</text>
  <!-- projection p of b onto a -->
  <line x1="50" y1="200" x2="158" y2="146" stroke="#000000" stroke-width="2.5"/>
  <text x="100" y="190" font-family="serif" font-size="14" fill="#000000">p = proj_a b</text>
  <!-- error / residual b - p (perpendicular) -->
  <line x1="158" y1="146" x2="170" y2="60" stroke="#000000" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="172" y="110" font-family="serif" font-size="13" fill="#000000">b - p</text>
  <!-- right-angle marker at foot of perpendicular -->
  <path d="M 150 150 L 154 158 L 162 154" fill="none" stroke="#000000" stroke-width="1"/>
  <text x="14" y="232" font-family="serif" font-size="12" fill="#000000">Projection: p = (a^T b / a^T a) a ; residual b - p is orthogonal to a</text>
</svg>
