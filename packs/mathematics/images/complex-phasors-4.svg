<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 320" font-family="sans-serif">
  <rect width="380" height="320" fill="white"/>
  <!-- axes -->
  <line x1="30" y1="230" x2="350" y2="230" stroke="black" stroke-width="1.5"/>
  <line x1="120" y1="300" x2="120" y2="20" stroke="black" stroke-width="1.5"/>
  <polygon points="350,230 342,226 342,234" fill="black"/>
  <polygon points="120,20 116,28 124,28" fill="black"/>
  <text x="334" y="248" font-size="13">Re</text>
  <text x="128" y="30" font-size="13">Im</text>
  <!-- the arrow to the point -->
  <line x1="120" y1="230" x2="290" y2="110" stroke="black" stroke-width="2"/>
  <polygon points="290,110 280,113 286,120" fill="black"/>
  <circle cx="290" cy="110" r="3.5" fill="black"/>
  <!-- projection guides -->
  <line x1="290" y1="110" x2="290" y2="230" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="290" y1="110" x2="120" y2="110" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- angle arc -->
  <path d="M 170 230 A 50 50 0 0 0 156 196" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="172" y="218" font-size="14">&#952;</text>
  <!-- labels -->
  <text x="200" y="160" font-size="13">r (length)</text>
  <text x="195" y="248" font-size="12">a = r cos&#952;</text>
  <text x="296" y="180" font-size="12">b = r sin&#952;</text>
  <!-- two descriptions -->
  <text x="40" y="290" font-size="12">Rectangular: a + jb  &#8596;  Polar: r at angle &#952;</text>
</svg>
