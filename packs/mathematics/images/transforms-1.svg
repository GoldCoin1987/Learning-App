<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 360" font-family="sans-serif">
  <rect width="420" height="360" fill="white"/>
  <!-- TOP: time-domain waveform (sum of two sinusoids) -->
  <text x="10" y="20" font-size="13">Time domain  x(t)</text>
  <line x1="30" y1="90" x2="400" y2="90" stroke="black" stroke-width="1"/>
  <line x1="30" y1="30" x2="30" y2="150" stroke="black" stroke-width="1"/>
  <text x="405" y="94" font-size="11">t</text>
  <!-- sum of f0 and 3f0 sinusoids, sampled polyline -->
  <polyline fill="none" stroke="black" stroke-width="1.6" points="30,90 45,62 60,55 75,72 90,90 105,108 120,120 135,108 150,90 165,62 180,55 195,72 210,90 225,108 240,120 255,108 270,90 285,62 300,55 315,72 330,90 345,108 360,120 375,108 390,90"/>
  <!-- BOTTOM: frequency-domain magnitude spectrum (two lines) -->
  <text x="10" y="205" font-size="13">Frequency domain  |X(f)|</text>
  <line x1="30" y1="330" x2="400" y2="330" stroke="black" stroke-width="1"/>
  <line x1="30" y1="220" x2="30" y2="340" stroke="black" stroke-width="1"/>
  <text x="405" y="334" font-size="11">f</text>
  <!-- spectral line at f0 (tall) -->
  <line x1="130" y1="330" x2="130" y2="245" stroke="black" stroke-width="2.4"/>
  <polygon points="130,245 126,253 134,253" fill="black"/>
  <text x="118" y="345" font-size="11">f0</text>
  <!-- spectral line at 3f0 (shorter) -->
  <line x1="280" y1="330" x2="280" y2="280" stroke="black" stroke-width="2.4"/>
  <polygon points="280,280 276,288 284,288" fill="black"/>
  <text x="262" y="345" font-size="11">3f0</text>
</svg>
