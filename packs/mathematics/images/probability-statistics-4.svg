<svg xmlns="http://www.w3.org/2000/svg" width="380" height="280" viewBox="0 0 380 280">
  <rect width="380" height="280" fill="white"/>
  <g font-family="sans-serif" font-size="13" font-weight="bold" fill="black">
    <text x="60" y="22">Medical test: why a positive can still mean healthy</text>
  </g>
  <g font-family="sans-serif" font-size="12" fill="black">
    <text x="20" y="50">1000 people, 1% truly sick (10 sick, 990 healthy)</text>
  </g>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="40" y="70" width="120" height="40"/>
    <rect x="220" y="70" width="120" height="40"/>
    <rect x="20" y="160" width="110" height="55"/>
    <rect x="150" y="160" width="110" height="55"/>
    <rect x="280" y="160" width="80" height="55"/>
    <line x1="100" y1="110" x2="75" y2="160"/>
    <line x1="280" y1="110" x2="305" y2="160"/>
    <line x1="280" y1="110" x2="205" y2="160"/>
  </g>
  <g font-family="sans-serif" font-size="11" fill="black">
    <text x="62" y="94">10 SICK</text>
    <text x="240" y="94">990 HEALTHY</text>
    <text x="30" y="182">test +</text>
    <text x="30" y="198">(true)</text>
    <text x="42" y="212">~9-10</text>
    <text x="160" y="182">test +</text>
    <text x="160" y="198">(false)</text>
    <text x="172" y="212">~50</text>
    <text x="288" y="182">test -</text>
    <text x="290" y="212">~940</text>
  </g>
  <g font-family="sans-serif" font-size="12" font-weight="bold" fill="black">
    <text x="20" y="245">Of ~60 positives, only ~10 are sick:</text>
    <text x="20" y="262">P(sick | positive) is about 1 in 6, not 95%.</text>
  </g>
</svg>
