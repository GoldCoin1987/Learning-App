<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" width="340" height="340">
  <rect x="0" y="0" width="340" height="340" fill="white"/>
  <!-- circle centered (170,170) r=120 -->
  <circle cx="170" cy="170" r="120" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- center dot -->
  <circle cx="170" cy="170" r="2.5" fill="black"/>
  <!-- axes light -->
  <line x1="40" y1="170" x2="300" y2="170" stroke="black" stroke-width="0.6"/>
  <line x1="170" y1="40" x2="170" y2="300" stroke="black" stroke-width="0.6"/>
  <!-- tick markers at 0, 90, 180, 270 deg with degree + radian labels -->
  <circle cx="290" cy="170" r="3" fill="black"/>
  <text x="296" y="166" font-family="sans-serif" font-size="11" fill="black">0&#176; = 0</text>
  <text x="296" y="182" font-family="sans-serif" font-size="11" fill="black">360&#176; = 2&#960;</text>
  <circle cx="170" cy="50" r="3" fill="black"/>
  <text x="178" y="46" font-family="sans-serif" font-size="11" fill="black">90&#176; = &#960;/2</text>
  <circle cx="50" cy="170" r="3" fill="black"/>
  <text x="14" y="160" font-family="sans-serif" font-size="11" fill="black">180&#176;</text>
  <text x="22" y="186" font-family="sans-serif" font-size="11" fill="black">= &#960;</text>
  <circle cx="170" cy="290" r="3" fill="black"/>
  <text x="178" y="300" font-family="sans-serif" font-size="11" fill="black">270&#176; = 3&#960;/2</text>
  <!-- one radian: arc length = radius. mark angle ~57.3 deg -->
  <!-- point at 57.3 deg: (cos,sin)=(0.54,0.84) -> (170+64.8, 170-100.8)=(234.8,69.2) -->
  <line x1="170" y1="170" x2="234.8" y2="69.2" stroke="black" stroke-width="2"/>
  <!-- arc of length = radius highlighted (thicker) from 0deg to 57.3deg -->
  <path d="M 290 170 A 120 120 0 0 0 234.8 69.2" fill="none" stroke="black" stroke-width="3.5"/>
  <text x="246" y="120" font-family="sans-serif" font-size="11" fill="black">arc = r</text>
  <text x="232" y="150" font-family="sans-serif" font-size="12" fill="black">1 rad</text>
  <text x="200" y="60" font-family="sans-serif" font-size="11" fill="black">&#8776;57.3&#176;</text>
  <!-- radius label -->
  <text x="120" y="160" font-family="sans-serif" font-size="11" fill="black">r</text>
  <text x="40" y="325" font-family="sans-serif" font-size="12" fill="black">A full turn = 360&#176; = 2&#960; radians</text>
</svg>
