<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <rect x="0" y="0" width="320" height="240" fill="#ffffff"/>
  <!-- axes -->
  <line x1="40" y1="200" x2="300" y2="200" stroke="#000000" stroke-width="1.5"/>
  <polygon points="300,200 288,195 288,205" fill="#000000"/>
  <text x="292" y="218" font-family="serif" font-size="15" fill="#000000">x</text>
  <line x1="40" y1="200" x2="40" y2="20" stroke="#000000" stroke-width="1.5"/>
  <polygon points="40,20 35,32 45,32" fill="#000000"/>
  <text x="22" y="24" font-family="serif" font-size="15" fill="#000000">y</text>
  <!-- the vector v -->
  <line x1="40" y1="200" x2="240" y2="60" stroke="#000000" stroke-width="2.5"/>
  <polygon points="240,60 226,62 233,72" fill="#000000"/>
  <text x="150" y="110" font-family="serif" font-size="16" fill="#000000">v</text>
  <!-- x component (horizontal dashed) -->
  <line x1="40" y1="200" x2="240" y2="200" stroke="#000000" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="120" y="218" font-family="serif" font-size="14" fill="#000000">v_x = 4</text>
  <!-- y component (vertical dashed) -->
  <line x1="240" y1="200" x2="240" y2="60" stroke="#000000" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="246" y="135" font-family="serif" font-size="14" fill="#000000">v_y = 3</text>
  <!-- magnitude label -->
  <text x="95" y="95" font-family="serif" font-size="13" fill="#000000">|v| = 5</text>
  <text x="20" y="236" font-family="serif" font-size="12" fill="#000000">Components v_x, v_y and length |v| = sqrt(v_x^2 + v_y^2)</text>
</svg>
