<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="sans-serif">
  <rect width="480" height="280" fill="white"/>
  <text x="20" y="18" font-size="13" font-weight="bold">Too-few samples create a false slow wave (aliasing)</text>
  <!-- TOP: enough samples -->
  <text x="40" y="42" font-size="11">Enough samples: dots trace the real fast wave</text>
  <line x1="40" y1="80" x2="460" y2="80" stroke="black" stroke-width="0.8"/>
  <path d="M40,80 C55,40 75,40 90,80 C105,120 125,120 140,80 C155,40 175,40 190,80 C205,120 225,120 240,80 C255,40 275,40 290,80 C305,120 325,120 340,80 C355,40 375,40 390,80 C405,120 425,120 440,80" fill="none" stroke="black" stroke-width="1.3"/>
  <circle cx="40" cy="80" r="3.5" fill="black"/>
  <circle cx="65" cy="48" r="3.5" fill="black"/>
  <circle cx="90" cy="80" r="3.5" fill="black"/>
  <circle cx="115" cy="112" r="3.5" fill="black"/>
  <circle cx="140" cy="80" r="3.5" fill="black"/>
  <circle cx="165" cy="48" r="3.5" fill="black"/>
  <circle cx="190" cy="80" r="3.5" fill="black"/>
  <circle cx="215" cy="112" r="3.5" fill="black"/>
  <circle cx="240" cy="80" r="3.5" fill="black"/>
  <circle cx="265" cy="48" r="3.5" fill="black"/>
  <circle cx="290" cy="80" r="3.5" fill="black"/>
  <circle cx="315" cy="112" r="3.5" fill="black"/>
  <circle cx="340" cy="80" r="3.5" fill="black"/>
  <!-- BOTTOM: too few samples -->
  <text x="40" y="172" font-size="11">Too few samples: same dots now trace a false slow wave</text>
  <line x1="40" y1="210" x2="460" y2="210" stroke="black" stroke-width="0.8"/>
  <!-- real fast wave (light dashed) -->
  <path d="M40,210 C55,170 75,170 90,210 C105,250 125,250 140,210 C155,170 175,170 190,210 C205,250 225,250 240,210 C255,170 275,170 290,210 C305,250 325,250 340,210 C355,170 375,170 390,210 C405,250 425,250 440,210" fill="none" stroke="black" stroke-width="0.8" stroke-dasharray="3 3"/>
  <!-- false slow wave (solid) through sparse samples -->
  <path d="M40,210 C110,150 170,150 240,210 C310,270 370,270 440,210" fill="none" stroke="black" stroke-width="1.5"/>
  <circle cx="40" cy="210" r="3.5" fill="black"/>
  <circle cx="140" cy="178" r="3.5" fill="black"/>
  <circle cx="240" cy="210" r="3.5" fill="black"/>
  <circle cx="340" cy="242" r="3.5" fill="black"/>
  <circle cx="440" cy="210" r="3.5" fill="black"/>
  <text x="300" y="160" font-size="10">false alias</text>
  <text x="300" y="258" font-size="10">real wave (dashed)</text>
</svg>
