<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect x="0" y="0" width="300" height="300" fill="#ffffff"/>
  <!-- axes -->
  <line x1="50" y1="250" x2="270" y2="250" stroke="#000000" stroke-width="2"/>
  <line x1="50" y1="250" x2="50" y2="30" stroke="#000000" stroke-width="2"/>
  <!-- chance diagonal -->
  <line x1="50" y1="250" x2="270" y2="30" stroke="#000000" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- ROC curve, bowing toward top-left (good detector) -->
  <path d="M50 250 Q70 110 150 70 Q210 45 270 30" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- second ROC, higher SNR, bows more -->
  <path d="M50 250 Q58 70 120 45 Q190 32 270 30" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- labels -->
  <text x="160" y="280" font-family="sans-serif" font-size="13" text-anchor="middle">Pfa</text>
  <text x="22" y="140" font-family="sans-serif" font-size="13" text-anchor="middle" transform="rotate(-90 22 140)">Pd</text>
  <text x="200" y="120" font-family="sans-serif" font-size="11" text-anchor="middle">higher SNR</text>
  <text x="175" y="200" font-family="sans-serif" font-size="11" text-anchor="middle">chance</text>
  <text x="50" y="20" font-family="sans-serif" font-size="13" text-anchor="start">ROC curve</text>
  <text x="48" y="265" font-family="sans-serif" font-size="11" text-anchor="middle">0</text>
  <text x="270" y="265" font-family="sans-serif" font-size="11" text-anchor="middle">1</text>
</svg>
