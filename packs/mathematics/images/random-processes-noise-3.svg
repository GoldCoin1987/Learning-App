<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" width="460" height="300">
  <rect x="0" y="0" width="460" height="300" fill="#ffffff"/>
  <text x="230" y="22" font-family="sans-serif" font-size="15" text-anchor="middle" font-weight="bold">Clean signal vs the same signal buried in noise</text>

  <!-- TOP panel: clean signal -->
  <text x="20" y="55" font-family="sans-serif" font-size="13">Clean signal</text>
  <line x1="40" y1="100" x2="430" y2="100" stroke="#000000" stroke-width="1"/>
  <!-- smooth sine -->
  <path d="M40,100 C70,55 100,55 130,100 C160,145 190,145 220,100 C250,55 280,55 310,100 C340,145 370,145 400,100 C415,77 425,68 430,72"
        fill="none" stroke="#000000" stroke-width="2"/>
  <text x="40" y="135" font-family="sans-serif" font-size="11">time --&gt;</text>

  <!-- BOTTOM panel: noisy signal -->
  <text x="20" y="170" font-family="sans-serif" font-size="13">Signal + noise (what you actually measure)</text>
  <line x1="40" y1="220" x2="430" y2="220" stroke="#000000" stroke-width="1"/>
  <!-- jagged sine: same underlying wave with random wiggles -->
  <path d="M40,220 L48,205 L55,235 L62,200 L70,225 L78,185 L86,215 L94,175 L102,200 L110,170 L118,195 L126,178 L134,205 L142,190 L150,225 L158,210 L166,245 L174,228 L182,260 L190,240 L198,265 L206,245 L214,260 L222,235 L230,255 L238,225 L246,245 L254,215 L262,235 L270,200 L278,220 L286,188 L294,210 L302,180 L310,200 L318,178 L326,205 L334,195 L342,228 L350,212 L358,248 L366,232 L374,262 L382,242 L390,260 L398,238 L406,255 L414,230 L422,245 L430,222"
        fill="none" stroke="#000000" stroke-width="1.5"/>
  <text x="40" y="285" font-family="sans-serif" font-size="11">time --&gt;</text>
  <text x="230" y="285" font-family="sans-serif" font-size="11" text-anchor="middle">noise = unwanted random wiggle riding on the signal</text>
</svg>
