<svg xmlns="http://www.w3.org/2000/svg" width="360" height="180" viewBox="0 0 360 180">
  <rect width="360" height="180" fill="white"/>
  <g stroke="black" stroke-width="1.5" fill="none">
    <rect x="130" y="50" width="100" height="70"/>
    <line x1="60" y1="85" x2="128" y2="85"/>
    <polygon points="128,85 120,81 120,89" fill="black"/>
    <line x1="232" y1="85" x2="300" y2="85"/>
    <polygon points="300,85 292,81 292,89" fill="black"/>
  </g>
  <g fill="black" font-family="sans-serif" font-size="14" text-anchor="middle">
    <text x="180" y="80">f</text>
    <text x="180" y="100">rule</text>
    <text x="55" y="80" text-anchor="end">input</text>
    <text x="55" y="96" text-anchor="end">x = 3</text>
    <text x="305" y="80">output</text>
    <text x="305" y="96">f(3)</text>
  </g>
  <g fill="black" font-family="sans-serif" font-size="13" text-anchor="middle">
    <text x="180" y="35">A function is a machine: one input gives one output</text>
    <text x="180" y="155">Example: f(x) = 2x + 1, so input 3 gives output 7</text>
  </g>
</svg>
