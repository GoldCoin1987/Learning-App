<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" font-family="sans-serif">
  <rect width="480" height="240" fill="white"/>
  <!-- input frequency axis (horizontal) -->
  <line x1="40" y1="200" x2="465" y2="200" stroke="black" stroke-width="1.5"/>
  <polygon points="465,200 457,196 457,204" fill="black"/>
  <text x="448" y="220" font-size="13">f_in</text>
  <!-- apparent freq axis (vertical) -->
  <line x1="40" y1="200" x2="40" y2="20" stroke="black" stroke-width="1.5"/>
  <polygon points="40,20 36,28 44,28" fill="black"/>
  <text x="48" y="28" font-size="12">f_apparent</text>
  <!-- folding triangle wave: rises 0->fs/2, falls fs/2->fs, rises fs->3fs/2 -->
  <!-- x: 40=0, 160=fs/2, 280=fs, 400=3fs/2 ; y: 200=0, 80=fs/2 -->
  <polyline points="40,200 160,80 280,200 400,80" fill="none" stroke="black" stroke-width="2"/>
  <!-- Nyquist line -->
  <line x1="160" y1="200" x2="160" y2="80" stroke="black" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="138" y="216" font-size="11">f_s/2</text>
  <line x1="280" y1="200" x2="280" y2="80" stroke="black" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="268" y="216" font-size="11">f_s</text>
  <text x="20" y="84" font-size="11">f_s/2</text>
  <text x="32" y="204" font-size="11">0</text>
  <!-- labels -->
  <text x="62" y="150" font-size="11">no alias</text>
  <text x="190" y="150" font-size="11">folds back</text>
  <text x="40" y="14" font-size="13" font-weight="bold">Aliasing fold: frequencies mirror about f_s/2</text>
</svg>
