<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">CPU vs GPU: one fast worker vs many parallel workers</text>

  <!-- divider -->
  <line x1="360" y1="50" x2="360" y2="300" stroke="#000" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- CPU side -->
  <text x="180" y="68" text-anchor="middle" fill="#000" font-weight="bold">CPU: one super-fast worker</text>
  <circle cx="180" cy="130" r="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="180" y="128" text-anchor="middle" fill="#000" font-size="11">1 fast</text>
  <text x="180" y="143" text-anchor="middle" fill="#000" font-size="11">worker</text>
  <text x="180" y="195" text-anchor="middle" fill="#000" font-size="11">Does the grid of sums</text>
  <text x="180" y="211" text-anchor="middle" fill="#000" font-size="11">one after another.</text>

  <!-- GPU side: many small workers -->
  <text x="540" y="68" text-anchor="middle" fill="#000" font-weight="bold">GPU: a stadium of ordinary workers</text>
  <!-- grid of small circles -->
  <g fill="#ffffff" stroke="#000" stroke-width="1.5">
    <circle cx="430" cy="100" r="9"/><circle cx="460" cy="100" r="9"/><circle cx="490" cy="100" r="9"/><circle cx="520" cy="100" r="9"/><circle cx="550" cy="100" r="9"/><circle cx="580" cy="100" r="9"/><circle cx="610" cy="100" r="9"/><circle cx="640" cy="100" r="9"/>
    <circle cx="430" cy="130" r="9"/><circle cx="460" cy="130" r="9"/><circle cx="490" cy="130" r="9"/><circle cx="520" cy="130" r="9"/><circle cx="550" cy="130" r="9"/><circle cx="580" cy="130" r="9"/><circle cx="610" cy="130" r="9"/><circle cx="640" cy="130" r="9"/>
    <circle cx="430" cy="160" r="9"/><circle cx="460" cy="160" r="9"/><circle cx="490" cy="160" r="9"/><circle cx="520" cy="160" r="9"/><circle cx="550" cy="160" r="9"/><circle cx="580" cy="160" r="9"/><circle cx="610" cy="160" r="9"/><circle cx="640" cy="160" r="9"/>
  </g>
  <text x="540" y="195" text-anchor="middle" fill="#000" font-size="11">Thousands each do one small</text>
  <text x="540" y="211" text-anchor="middle" fill="#000" font-size="11">sum at the same time (parallel).</text>

  <!-- same workload note -->
  <rect x="120" y="235" width="480" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="252" text-anchor="middle" fill="#000" font-size="11">Same workload: huge grids of the same simple arithmetic, repeated over and over.</text>
  <text x="360" y="268" text-anchor="middle" fill="#000" font-size="11">Doing many at once finishes far sooner.</text>

  <line x1="60" y1="300" x2="660" y2="300" stroke="#000" stroke-width="1"/>
  <text x="360" y="324" text-anchor="middle" fill="#000" font-weight="bold">A GPU is not just a faster clock; it does thousands of sums in parallel.</text>
  <text x="360" y="346" text-anchor="middle" fill="#000" font-size="11">That parallelism is why training a neural network is far quicker on a GPU than a CPU.</text>
  <text x="360" y="368" text-anchor="middle" fill="#000" font-size="11">Big training jobs run on GPUs, or on cloud TPUs (similar parallel chips you rent).</text>
</svg>
