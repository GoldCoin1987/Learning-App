<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="380" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The sigmoid: bend a score into a probability (0 to 1)</text>

  <defs>
    <marker id="ahr4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="80" y1="300" x2="580" y2="300" stroke="#000" stroke-width="2" marker-end="url(#ahr4)"/>
  <line x1="330" y1="320" x2="330" y2="70" stroke="#000" stroke-width="2" marker-end="url(#ahr4)"/>
  <text x="540" y="320" text-anchor="middle" fill="#000">straight-line score &#8594;</text>
  <text x="300" y="84" text-anchor="middle" fill="#000">probability</text>

  <!-- gridline markers for 0 and 1 -->
  <line x1="80" y1="270" x2="580" y2="270" stroke="#000" stroke-width="1" stroke-dasharray="3,4"/>
  <text x="70" y="274" text-anchor="end" fill="#000" font-size="11">1.0</text>
  <line x1="80" y1="100" x2="80" y2="100" stroke="#000" stroke-width="1"/>
  <text x="70" y="190" text-anchor="end" fill="#000" font-size="11">0.5</text>
  <text x="70" y="304" text-anchor="end" fill="#000" font-size="11">0.0</text>

  <!-- S-shaped sigmoid curve from ~0 up to ~1 -->
  <path d="M 90 296 C 230 296 250 290 330 185 C 410 80 430 74 570 74" fill="none" stroke="#000" stroke-width="3"/>

  <!-- 0.5 threshold line -->
  <line x1="80" y1="185" x2="580" y2="185" stroke="#000" stroke-width="2" stroke-dasharray="7,5"/>
  <text x="575" y="178" text-anchor="end" fill="#000" font-weight="bold" font-size="11">threshold = 0.5</text>

  <!-- decision regions -->
  <text x="180" y="232" text-anchor="middle" fill="#000" font-size="11">below 0.5 &#8594; predict "NO"</text>
  <text x="470" y="140" text-anchor="middle" fill="#000" font-size="11">above 0.5 &#8594; predict "YES"</text>

  <text x="320" y="350" text-anchor="middle" fill="#000">The S-curve squashes any score into a probability between 0 and 1 (e.g. 0.9 = "90% likely").</text>
  <text x="320" y="368" text-anchor="middle" fill="#000" font-weight="bold">Pick a threshold (often 0.5) to turn the probability into a yes/no class.</text>
</svg>
