<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="700" height="400" fill="#ffffff"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A spectrogram: which frequencies appear, over time</text>

  <!-- axes -->
  <line x1="110" y1="80" x2="110" y2="300" stroke="#000" stroke-width="1.5"/>
  <line x1="110" y1="300" x2="560" y2="300" stroke="#000" stroke-width="1.5"/>
  <text x="335" y="330" text-anchor="middle" fill="#000">time (left to right)</text>
  <text x="60" y="195" text-anchor="middle" fill="#000" transform="rotate(-90 60 195)">frequency (low to high)</text>

  <!-- grid cells: darker fill = stronger at that time+frequency. 5 cols x 4 rows -->
  <!-- row 4 (high freq, top) -->
  <rect x="110" y="80" width="90" height="55" fill="#ffffff" stroke="#000" stroke-width="1"/>
  <rect x="200" y="80" width="90" height="55" fill="#cccccc" stroke="#000" stroke-width="1"/>
  <rect x="290" y="80" width="90" height="55" fill="#ffffff" stroke="#000" stroke-width="1"/>
  <rect x="380" y="80" width="90" height="55" fill="#888888" stroke="#000" stroke-width="1"/>
  <rect x="470" y="80" width="90" height="55" fill="#ffffff" stroke="#000" stroke-width="1"/>
  <!-- row 3 -->
  <rect x="110" y="135" width="90" height="55" fill="#cccccc" stroke="#000" stroke-width="1"/>
  <rect x="200" y="135" width="90" height="55" fill="#888888" stroke="#000" stroke-width="1"/>
  <rect x="290" y="135" width="90" height="55" fill="#cccccc" stroke="#000" stroke-width="1"/>
  <rect x="380" y="135" width="90" height="55" fill="#000000" stroke="#000" stroke-width="1"/>
  <rect x="470" y="135" width="90" height="55" fill="#888888" stroke="#000" stroke-width="1"/>
  <!-- row 2 -->
  <rect x="110" y="190" width="90" height="55" fill="#888888" stroke="#000" stroke-width="1"/>
  <rect x="200" y="190" width="90" height="55" fill="#000000" stroke="#000" stroke-width="1"/>
  <rect x="290" y="190" width="90" height="55" fill="#888888" stroke="#000" stroke-width="1"/>
  <rect x="380" y="190" width="90" height="55" fill="#cccccc" stroke="#000" stroke-width="1"/>
  <rect x="470" y="190" width="90" height="55" fill="#ffffff" stroke="#000" stroke-width="1"/>
  <!-- row 1 (low freq, bottom) -->
  <rect x="110" y="245" width="90" height="55" fill="#000000" stroke="#000" stroke-width="1"/>
  <rect x="200" y="245" width="90" height="55" fill="#cccccc" stroke="#000" stroke-width="1"/>
  <rect x="290" y="245" width="90" height="55" fill="#888888" stroke="#000" stroke-width="1"/>
  <rect x="380" y="245" width="90" height="55" fill="#cccccc" stroke="#000" stroke-width="1"/>
  <rect x="470" y="245" width="90" height="55" fill="#000000" stroke="#000" stroke-width="1"/>

  <!-- legend -->
  <text x="615" y="150" text-anchor="middle" fill="#000" font-size="11">darker</text>
  <text x="615" y="165" text-anchor="middle" fill="#000" font-size="11">= stronger</text>
  <rect x="590" y="175" width="50" height="18" fill="#000000" stroke="#000" stroke-width="1"/>
  <text x="615" y="188" text-anchor="middle" fill="#fff" font-size="10">strong</text>
  <rect x="590" y="195" width="50" height="18" fill="#888888" stroke="#000" stroke-width="1"/>
  <text x="615" y="208" text-anchor="middle" fill="#000" font-size="10">medium</text>
  <rect x="590" y="215" width="50" height="18" fill="#ffffff" stroke="#000" stroke-width="1"/>
  <text x="615" y="228" text-anchor="middle" fill="#000" font-size="10">quiet</text>

  <!-- takeaways -->
  <line x1="110" y1="346" x2="590" y2="346" stroke="#000" stroke-width="1"/>
  <text x="350" y="368" text-anchor="middle" fill="#000">Each square shows how strong one frequency is at one moment in time.</text>
  <text x="350" y="390" text-anchor="middle" fill="#000" font-size="11">This picture turns a signal into an "image," giving features that reveal patterns over time.</text>
</svg>
