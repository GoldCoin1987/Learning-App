<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="700" height="420" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The gap: a one-off notebook model vs a real production service</text>

  <!-- divider -->
  <line x1="350" y1="44" x2="350" y2="392" stroke="#000" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- LEFT: notebook, works once on one laptop -->
  <text x="175" y="64" text-anchor="middle" font-weight="bold" fill="#000">NOTEBOOK (works once)</text>
  <rect x="40" y="80" width="270" height="240" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- laptop -->
  <rect x="120" y="120" width="110" height="70" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="175" y="150" text-anchor="middle" fill="#000" font-size="11">trained</text>
  <text x="175" y="166" text-anchor="middle" fill="#000" font-size="11">model</text>
  <rect x="105" y="190" width="140" height="10" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="175" y="220" text-anchor="middle" fill="#000" font-size="11">one laptop, run by hand</text>

  <!-- single user -->
  <circle cx="175" cy="248" r="9" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="175" y1="257" x2="175" y2="278" stroke="#000" stroke-width="2"/>
  <text x="175" y="298" text-anchor="middle" fill="#000" font-size="11">just you, sometimes</text>

  <!-- RIGHT: production service, many users, always on -->
  <text x="525" y="64" text-anchor="middle" font-weight="bold" fill="#000">PRODUCTION (runs for real)</text>
  <rect x="390" y="80" width="270" height="240" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- server stack -->
  <rect x="490" y="110" width="70" height="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="490" y="134" width="70" height="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="490" y="158" width="70" height="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="525" y="198" text-anchor="middle" fill="#000" font-size="11">always-on service</text>

  <!-- many users -->
  <circle cx="430" cy="250" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="465" cy="250" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="500" cy="250" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="535" cy="250" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="570" cy="250" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="605" cy="250" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="525" y="290" text-anchor="middle" fill="#000" font-size="11">many real users, every day, for months</text>

  <text x="350" y="350" text-anchor="middle" fill="#000">Getting a model to work ONCE is not the same as serving it RELIABLY for real users.</text>
  <text x="350" y="376" text-anchor="middle" fill="#000" font-weight="bold">MLOps = the practices and tools that close this gap (like DevOps, but for ML).</text>
</svg>
