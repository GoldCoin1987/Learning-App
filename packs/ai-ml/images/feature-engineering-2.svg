<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="420" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Common feature moves: before to after</text>

  <defs>
    <marker id="ahf2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- ROW 1: category -> one-hot -->
  <text x="60" y="64" text-anchor="middle" fill="#000" font-weight="bold">1.</text>
  <text x="155" y="58" text-anchor="middle" fill="#000" font-size="11">category (a word)</text>
  <rect x="90" y="66" width="130" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="155" y="88" text-anchor="middle" fill="#000">color = "red"</text>
  <line x1="230" y1="83" x2="300" y2="83" stroke="#000" stroke-width="2" marker-end="url(#ahf2)"/>
  <text x="265" y="74" text-anchor="middle" fill="#000" font-size="10">one-hot</text>
  <text x="430" y="58" text-anchor="middle" fill="#000" font-size="11">one yes/no column per choice</text>
  <rect x="320" y="66" width="80" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="80" text-anchor="middle" fill="#000" font-size="10">is_red</text>
  <text x="360" y="94" text-anchor="middle" fill="#000" font-size="10">1</text>
  <rect x="405" y="66" width="80" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="445" y="80" text-anchor="middle" fill="#000" font-size="10">is_blue</text>
  <text x="445" y="94" text-anchor="middle" fill="#000" font-size="10">0</text>
  <rect x="490" y="66" width="80" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="530" y="80" text-anchor="middle" fill="#000" font-size="10">is_green</text>
  <text x="530" y="94" text-anchor="middle" fill="#000" font-size="10">0</text>

  <line x1="40" y1="118" x2="680" y2="118" stroke="#000" stroke-width="1"/>

  <!-- ROW 2: age -> buckets -->
  <text x="60" y="170" text-anchor="middle" fill="#000" font-weight="bold">2.</text>
  <text x="155" y="150" text-anchor="middle" fill="#000" font-size="11">continuous number</text>
  <rect x="90" y="158" width="130" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="155" y="180" text-anchor="middle" fill="#000">age = 70</text>
  <line x1="230" y1="175" x2="300" y2="175" stroke="#000" stroke-width="2" marker-end="url(#ahf2)"/>
  <text x="265" y="166" text-anchor="middle" fill="#000" font-size="10">bucket</text>
  <text x="450" y="150" text-anchor="middle" fill="#000" font-size="11">group into ranges</text>
  <rect x="320" y="158" width="100" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="370" y="179" text-anchor="middle" fill="#000" font-size="11">child</text>
  <rect x="425" y="158" width="100" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="475" y="179" text-anchor="middle" fill="#000" font-size="11">adult</text>
  <rect x="530" y="158" width="100" height="34" fill="#000" stroke="#000" stroke-width="2"/>
  <text x="580" y="179" text-anchor="middle" fill="#fff" font-size="11">senior</text>
  <text x="580" y="206" text-anchor="middle" fill="#000" font-size="10">70 lands here</text>

  <line x1="40" y1="222" x2="680" y2="222" stroke="#000" stroke-width="1"/>

  <!-- ROW 3: date -> parts -->
  <text x="60" y="274" text-anchor="middle" fill="#000" font-weight="bold">3.</text>
  <text x="155" y="254" text-anchor="middle" fill="#000" font-size="11">a date</text>
  <rect x="90" y="262" width="130" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="155" y="284" text-anchor="middle" fill="#000" font-size="11">2026-06-20</text>
  <line x1="230" y1="279" x2="300" y2="279" stroke="#000" stroke-width="2" marker-end="url(#ahf2)"/>
  <text x="265" y="270" text-anchor="middle" fill="#000" font-size="10">split</text>
  <text x="450" y="254" text-anchor="middle" fill="#000" font-size="11">pull out the useful parts</text>
  <rect x="320" y="262" width="120" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="380" y="277" text-anchor="middle" fill="#000" font-size="10">day_of_week</text>
  <text x="380" y="290" text-anchor="middle" fill="#000" font-size="10">Saturday</text>
  <rect x="445" y="262" width="110" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="500" y="277" text-anchor="middle" fill="#000" font-size="10">is_weekend</text>
  <text x="500" y="290" text-anchor="middle" fill="#000" font-size="10">1 (yes)</text>
  <rect x="560" y="262" width="90" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="605" y="277" text-anchor="middle" fill="#000" font-size="10">season</text>
  <text x="605" y="290" text-anchor="middle" fill="#000" font-size="10">summer</text>

  <line x1="40" y1="324" x2="680" y2="324" stroke="#000" stroke-width="1"/>

  <text x="360" y="352" text-anchor="middle" fill="#000">Each move rewrites raw data into numbers and groups a model can actually learn from.</text>
  <text x="360" y="378" text-anchor="middle" fill="#000" font-size="11">Also common: ratios (price per square foot), and scaling (put features on comparable ranges).</text>
  <text x="360" y="402" text-anchor="middle" fill="#000" font-weight="bold">More columns is NOT automatically better, the RIGHT columns are.</text>
</svg>
