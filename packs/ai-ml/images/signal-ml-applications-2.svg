<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="430" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Two recipes for machine learning on a signal</text>

  <!-- shared signal at top -->
  <text x="380" y="56" text-anchor="middle" font-size="12" fill="#000">Start with the same raw signal (a list of numbers over time):</text>
  <rect x="300" y="66" width="160" height="40" fill="none" stroke="#000" stroke-width="1.5"/>
  <polyline points="312,86 322,74 332,98 342,78 352,94 362,80 372,96 382,82 392,92 402,78 412,90 422,86 432,86 442,86" fill="none" stroke="#000" stroke-width="1.5"/>
  <line x1="380" y1="106" x2="220" y2="140" stroke="#000" stroke-width="1"/>
  <line x1="380" y1="106" x2="540" y2="140" stroke="#000" stroke-width="1"/>

  <!-- RECIPE 1 (left) -->
  <rect x="40" y="140" width="320" height="230" fill="none" stroke="#000" stroke-width="2"/>
  <text x="200" y="162" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Recipe 1: engineer features</text>

  <rect x="80" y="180" width="240" height="70" fill="none" stroke="#000" stroke-width="1"/>
  <text x="200" y="200" text-anchor="middle" font-size="11" fill="#000">summarize the signal into a few numbers:</text>
  <text x="200" y="218" text-anchor="middle" font-size="11" fill="#000">loudness/energy, how bumpy,</text>
  <text x="200" y="234" text-anchor="middle" font-size="11" fill="#000">peaks, which frequencies are present</text>

  <text x="200" y="270" text-anchor="middle" font-size="20" fill="#000">&#8595;</text>

  <rect x="100" y="280" width="200" height="40" fill="none" stroke="#000" stroke-width="1"/>
  <text x="200" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">a simple classic model</text>

  <text x="200" y="346" text-anchor="middle" font-size="11" fill="#000">Great when data is limited</text>
  <text x="200" y="362" text-anchor="middle" font-size="11" fill="#000">and you want it explainable.</text>

  <!-- RECIPE 2 (right) -->
  <rect x="400" y="140" width="320" height="230" fill="none" stroke="#000" stroke-width="2"/>
  <text x="560" y="162" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Recipe 2: make a picture</text>

  <text x="560" y="186" text-anchor="middle" font-size="11" fill="#000">turn the signal into a spectrogram</text>
  <text x="560" y="202" text-anchor="middle" font-size="11" fill="#000">(a time-vs-frequency image)</text>
  <!-- tiny spectrogram grid -->
  <rect x="500" y="210" width="30" height="20" fill="#000000" stroke="#000"/>
  <rect x="530" y="210" width="30" height="20" fill="#888888" stroke="#000"/>
  <rect x="560" y="210" width="30" height="20" fill="#cccccc" stroke="#000"/>
  <rect x="590" y="210" width="30" height="20" fill="#000000" stroke="#000"/>
  <rect x="500" y="230" width="30" height="20" fill="#cccccc" stroke="#000"/>
  <rect x="530" y="230" width="30" height="20" fill="#000000" stroke="#000"/>
  <rect x="560" y="230" width="30" height="20" fill="#888888" stroke="#000"/>
  <rect x="590" y="230" width="30" height="20" fill="#ffffff" stroke="#000"/>

  <text x="560" y="272" text-anchor="middle" font-size="20" fill="#000">&#8595;</text>

  <rect x="460" y="282" width="200" height="40" fill="none" stroke="#000" stroke-width="1"/>
  <text x="560" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">a CNN (image learner)</text>

  <text x="560" y="348" text-anchor="middle" font-size="11" fill="#000">How a lot of modern audio AI</text>
  <text x="560" y="364" text-anchor="middle" font-size="11" fill="#000">works: sound becomes a picture.</text>

  <!-- takeaway -->
  <line x1="40" y1="392" x2="720" y2="392" stroke="#000" stroke-width="1"/>
  <text x="380" y="414" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Either give a classic model good features, OR turn the signal into a picture for a CNN.</text>
</svg>
