<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="700" height="420" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Versioning: track everything, so you can reproduce or roll back</text>

  <defs>
    <marker id="ahm3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <text x="350" y="58" text-anchor="middle" fill="#000" font-size="11">A trustworthy ML system records ALL the ingredients of a result, not just the code.</text>

  <!-- four tracked boxes -->
  <rect x="40" y="90" width="140" height="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="110" y="120" text-anchor="middle" fill="#000" font-weight="bold">CODE</text>
  <text x="110" y="142" text-anchor="middle" fill="#000" font-size="11">the program</text>
  <text x="110" y="160" text-anchor="middle" fill="#000" font-size="11">that trains/runs</text>

  <rect x="200" y="90" width="140" height="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="270" y="120" text-anchor="middle" fill="#000" font-weight="bold">DATA</text>
  <text x="270" y="142" text-anchor="middle" fill="#000" font-size="11">which exact</text>
  <text x="270" y="160" text-anchor="middle" fill="#000" font-size="11">dataset version</text>

  <rect x="360" y="90" width="140" height="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="430" y="120" text-anchor="middle" fill="#000" font-weight="bold">MODEL</text>
  <text x="430" y="142" text-anchor="middle" fill="#000" font-size="11">the trained</text>
  <text x="430" y="160" text-anchor="middle" fill="#000" font-size="11">model file</text>

  <rect x="520" y="90" width="140" height="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="590" y="120" text-anchor="middle" fill="#000" font-weight="bold">SETTINGS</text>
  <text x="590" y="142" text-anchor="middle" fill="#000" font-size="11">the knobs/</text>
  <text x="590" y="160" text-anchor="middle" fill="#000" font-size="11">choices used</text>

  <!-- arrows down into a single labeled record -->
  <line x1="110" y1="180" x2="300" y2="225" stroke="#000" stroke-width="2" marker-end="url(#ahm3)"/>
  <line x1="270" y1="180" x2="330" y2="225" stroke="#000" stroke-width="2" marker-end="url(#ahm3)"/>
  <line x1="430" y1="180" x2="370" y2="225" stroke="#000" stroke-width="2" marker-end="url(#ahm3)"/>
  <line x1="590" y1="180" x2="400" y2="225" stroke="#000" stroke-width="2" marker-end="url(#ahm3)"/>

  <rect x="230" y="232" width="240" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="350" y="258" text-anchor="middle" fill="#000" font-weight="bold">one labeled version (v3)</text>
  <text x="350" y="278" text-anchor="middle" fill="#000" font-size="11">a complete, repeatable recipe</text>

  <text x="350" y="332" text-anchor="middle" fill="#000">Like a recipe that lists exact ingredients, amounts, and the batch number,</text>
  <text x="350" y="354" text-anchor="middle" fill="#000">so you can recreate the dish or ROLL BACK to a known-good version.</text>
  <text x="350" y="384" text-anchor="middle" fill="#000" font-weight="bold">Versioning code alone is NOT enough: the data and model decide the result too.</text>
</svg>
