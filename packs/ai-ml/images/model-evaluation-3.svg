<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Underfit vs good fit vs overfit</text>

  <!-- ===== PANEL 1: UNDERFIT ===== -->
  <text x="110" y="56" text-anchor="middle" fill="#000" font-weight="bold">UNDERFIT</text>
  <text x="110" y="72" text-anchor="middle" fill="#000" font-size="11">too simple (high bias)</text>
  <!-- axes -->
  <line x1="40" y1="200" x2="190" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="40" y1="90" x2="40" y2="200" stroke="#000" stroke-width="1.5"/>
  <!-- curved data points -->
  <circle cx="55" cy="180" r="3.5" fill="#000"/>
  <circle cx="75" cy="150" r="3.5" fill="#000"/>
  <circle cx="95" cy="125" r="3.5" fill="#000"/>
  <circle cx="115" cy="120" r="3.5" fill="#000"/>
  <circle cx="135" cy="130" r="3.5" fill="#000"/>
  <circle cx="155" cy="155" r="3.5" fill="#000"/>
  <circle cx="175" cy="185" r="3.5" fill="#000"/>
  <!-- a straight line that misses the curve -->
  <line x1="50" y1="170" x2="180" y2="140" stroke="#000" stroke-width="2.5"/>
  <text x="110" y="222" text-anchor="middle" fill="#000" font-size="11">straight line misses</text>
  <text x="110" y="236" text-anchor="middle" fill="#000" font-size="11">the real curved pattern</text>

  <!-- ===== PANEL 2: GOOD FIT ===== -->
  <text x="320" y="56" text-anchor="middle" fill="#000" font-weight="bold">GOOD FIT</text>
  <text x="320" y="72" text-anchor="middle" fill="#000" font-size="11">just right</text>
  <line x1="250" y1="200" x2="400" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="250" y1="90" x2="250" y2="200" stroke="#000" stroke-width="1.5"/>
  <circle cx="265" cy="180" r="3.5" fill="#000"/>
  <circle cx="285" cy="150" r="3.5" fill="#000"/>
  <circle cx="305" cy="125" r="3.5" fill="#000"/>
  <circle cx="325" cy="120" r="3.5" fill="#000"/>
  <circle cx="345" cy="130" r="3.5" fill="#000"/>
  <circle cx="365" cy="155" r="3.5" fill="#000"/>
  <circle cx="385" cy="185" r="3.5" fill="#000"/>
  <!-- smooth curve following the trend -->
  <path d="M258,182 Q325,95 392,182" fill="none" stroke="#000" stroke-width="2.5"/>
  <text x="320" y="222" text-anchor="middle" fill="#000" font-size="11">smooth curve follows</text>
  <text x="320" y="236" text-anchor="middle" fill="#000" font-size="11">the general trend</text>

  <!-- ===== PANEL 3: OVERFIT ===== -->
  <text x="530" y="56" text-anchor="middle" fill="#000" font-weight="bold">OVERFIT</text>
  <text x="530" y="72" text-anchor="middle" fill="#000" font-size="11">too complex (high variance)</text>
  <line x1="460" y1="200" x2="610" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="460" y1="90" x2="460" y2="200" stroke="#000" stroke-width="1.5"/>
  <circle cx="475" cy="180" r="3.5" fill="#000"/>
  <circle cx="495" cy="150" r="3.5" fill="#000"/>
  <circle cx="515" cy="125" r="3.5" fill="#000"/>
  <circle cx="535" cy="120" r="3.5" fill="#000"/>
  <circle cx="555" cy="130" r="3.5" fill="#000"/>
  <circle cx="575" cy="155" r="3.5" fill="#000"/>
  <circle cx="595" cy="185" r="3.5" fill="#000"/>
  <!-- wiggly line through every point -->
  <path d="M475,180 L495,150 L515,125 L535,120 L555,130 L575,155 L595,185" fill="none" stroke="#000" stroke-width="2.5"/>
  <text x="530" y="222" text-anchor="middle" fill="#000" font-size="11">wiggly line hits every dot,</text>
  <text x="530" y="236" text-anchor="middle" fill="#000" font-size="11">memorizing the noise</text>

  <!-- bottom takeaways -->
  <text x="320" y="296" text-anchor="middle" fill="#000">The dots are the SAME data in all three.   Only the model's flexibility changed.</text>
  <text x="320" y="324" text-anchor="middle" fill="#000" font-size="11">Underfit: misses the pattern.   Good fit: learns the general rule.   Overfit: memorizes every point.</text>
  <text x="320" y="356" text-anchor="middle" fill="#000" font-weight="bold">The tell-tale sign of overfitting:</text>
  <text x="320" y="378" text-anchor="middle" fill="#000">great on the TRAINING data, but poor on new TEST data it has never seen.</text>
  <text x="320" y="402" text-anchor="middle" fill="#000" font-size="11">Like a student who memorized last year's answers but can't handle a fresh question.</text>
</svg>
