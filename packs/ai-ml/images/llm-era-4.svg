<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="360" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">RAG: let the model look things up (open-book), then answer from real sources</text>

  <defs>
    <marker id="ahdL4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <text x="380" y="50" text-anchor="middle" fill="#000" font-size="11">RAG = Retrieval-Augmented Generation</text>

  <!-- Step 1: question -->
  <rect x="40" y="80" width="150" height="56" rx="6" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="115" y="104" text-anchor="middle" fill="#000" font-weight="bold">Question</text>
  <text x="115" y="124" text-anchor="middle" fill="#000" font-size="10">"What is our refund policy?"</text>

  <!-- arrow to retrieve -->
  <line x1="190" y1="108" x2="240" y2="108" stroke="#000" stroke-width="2.5" marker-end="url(#ahdL4)"/>
  <text x="215" y="98" text-anchor="middle" fill="#000" font-size="9">search</text>

  <!-- Step 2: retrieve from documents -->
  <rect x="240" y="80" width="160" height="56" rx="6" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="320" y="100" text-anchor="middle" fill="#000" font-weight="bold" font-size="11">Retrieve relevant</text>
  <text x="320" y="116" text-anchor="middle" fill="#000" font-weight="bold" font-size="11">documents</text>
  <text x="320" y="130" text-anchor="middle" fill="#000" font-size="9">from your files / database</text>

  <!-- the document store -->
  <rect x="252" y="160" width="44" height="54" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <rect x="300" y="160" width="44" height="54" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <rect x="348" y="160" width="44" height="54" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <line x1="258" y1="174" x2="290" y2="174" stroke="#000" stroke-width="1"/>
  <line x1="258" y1="186" x2="290" y2="186" stroke="#000" stroke-width="1"/>
  <line x1="258" y1="198" x2="290" y2="198" stroke="#000" stroke-width="1"/>
  <text x="320" y="232" text-anchor="middle" fill="#000" font-size="10">your real, current documents</text>
  <line x1="320" y1="158" x2="320" y2="138" stroke="#000" stroke-width="2" marker-end="url(#ahdL4)"/>

  <!-- arrow retrieve -> prompt -->
  <line x1="400" y1="108" x2="450" y2="108" stroke="#000" stroke-width="2.5" marker-end="url(#ahdL4)"/>

  <!-- Step 3: stuff into prompt -->
  <rect x="450" y="74" width="160" height="68" rx="6" fill="#ffffff" stroke="#000" stroke-width="3"/>
  <text x="530" y="96" text-anchor="middle" fill="#000" font-weight="bold" font-size="11">Put docs INTO</text>
  <text x="530" y="112" text-anchor="middle" fill="#000" font-weight="bold" font-size="11">the prompt</text>
  <text x="530" y="130" text-anchor="middle" fill="#000" font-size="9">question + retrieved text</text>

  <!-- arrow prompt -> model -->
  <line x1="530" y1="142" x2="530" y2="178" stroke="#000" stroke-width="2.5" marker-end="url(#ahdL4)"/>

  <!-- model -->
  <rect x="470" y="180" width="120" height="48" rx="8" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="530" y="208" text-anchor="middle" fill="#000" font-weight="bold">LLM</text>

  <!-- arrow model -> grounded answer -->
  <line x1="530" y1="228" x2="530" y2="258" stroke="#000" stroke-width="2.5" marker-end="url(#ahdL4)"/>

  <!-- grounded answer -->
  <rect x="430" y="262" width="200" height="44" rx="6" fill="#ffffff" stroke="#000" stroke-width="3"/>
  <text x="530" y="282" text-anchor="middle" fill="#000" font-weight="bold" font-size="11">Grounded answer</text>
  <text x="530" y="298" text-anchor="middle" fill="#000" font-size="9">based on the real documents</text>

  <!-- analogy box -->
  <rect x="40" y="262" width="350" height="44" rx="6" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="215" y="280" text-anchor="middle" fill="#000" font-size="11" font-weight="bold">Like an open-book exam:</text>
  <text x="215" y="296" text-anchor="middle" fill="#000" font-size="10">look facts up instead of relying on memory.</text>

  <line x1="60" y1="324" x2="700" y2="324" stroke="#000" stroke-width="1"/>
  <text x="380" y="344" text-anchor="middle" fill="#000" font-size="11">RAG fixes outdated/unknown facts and cuts hallucination. It feeds documents into the prompt - it does NOT retrain the model.</text>
</svg>
