<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="420" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The training loop: a repeatable recipe you run many times</text>

  <defs>
    <marker id="aht4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- four boxes arranged in a cycle -->
  <!-- top: forward -->
  <rect x="270" y="60" width="180" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="82" text-anchor="middle" fill="#000" font-weight="bold">1. FORWARD PASS</text>
  <text x="360" y="100" text-anchor="middle" fill="#000" font-size="11">predict from this batch</text>

  <!-- right: loss -->
  <rect x="500" y="180" width="180" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="590" y="202" text-anchor="middle" fill="#000" font-weight="bold">2. COMPUTE LOSS</text>
  <text x="590" y="220" text-anchor="middle" fill="#000" font-size="11">how wrong was it?</text>

  <!-- bottom: backward -->
  <rect x="270" y="300" width="180" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="322" text-anchor="middle" fill="#000" font-weight="bold">3. BACKWARD PASS</text>
  <text x="360" y="340" text-anchor="middle" fill="#000" font-size="11">autograd gets the gradients</text>

  <!-- left: optimizer update -->
  <rect x="40" y="180" width="180" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="130" y="198" text-anchor="middle" fill="#000" font-weight="bold">4. OPTIMIZER STEP</text>
  <text x="130" y="214" text-anchor="middle" fill="#000" font-size="11">nudge weights downhill</text>
  <text x="130" y="228" text-anchor="middle" fill="#000" font-size="11">(e.g. SGD, Adam)</text>

  <!-- curved arrows forming the cycle (clockwise) -->
  <path d="M450,95 Q560,110 575,178" fill="none" stroke="#000" stroke-width="2" marker-end="url(#aht4)"/>
  <path d="M575,236 Q500,320 452,330" fill="none" stroke="#000" stroke-width="2" marker-end="url(#aht4)"/>
  <path d="M270,330 Q160,320 142,238" fill="none" stroke="#000" stroke-width="2" marker-end="url(#aht4)"/>
  <path d="M145,178 Q230,110 268,96" fill="none" stroke="#000" stroke-width="2" marker-end="url(#aht4)"/>

  <!-- center label -->
  <text x="360" y="200" text-anchor="middle" fill="#000" font-size="11">repeat for</text>
  <text x="360" y="216" text-anchor="middle" fill="#000" font-weight="bold">each BATCH,</text>
  <text x="360" y="232" text-anchor="middle" fill="#000" font-size="11">many EPOCHS</text>

  <line x1="60" y1="372" x2="660" y2="372" stroke="#000" stroke-width="1"/>
  <text x="360" y="395" text-anchor="middle" fill="#000" font-size="11">BATCH = a handful of examples at a time. EPOCH = one full pass over all the data.</text>
  <text x="360" y="413" text-anchor="middle" fill="#000" font-weight="bold">forward, then loss, then backward, then update, then repeat.</text>
</svg>
