<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="430" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Match the architecture to the shape of the data</text>

  <!-- table outer border -->
  <rect x="40" y="50" width="680" height="320" fill="none" stroke="#000" stroke-width="2"/>

  <!-- column separators at x=240, x=480 -->
  <line x1="240" y1="50" x2="240" y2="370" stroke="#000" stroke-width="2"/>
  <line x1="480" y1="50" x2="480" y2="370" stroke="#000" stroke-width="2"/>
  <!-- header row separator -->
  <line x1="40" y1="92" x2="720" y2="92" stroke="#000" stroke-width="2"/>
  <!-- row separators -->
  <line x1="40" y1="150" x2="720" y2="150" stroke="#000" stroke-width="1"/>
  <line x1="40" y1="250" x2="720" y2="250" stroke="#000" stroke-width="1"/>

  <!-- headers -->
  <text x="140" y="78" text-anchor="middle" fill="#000" font-weight="bold">CNN</text>
  <text x="360" y="78" text-anchor="middle" fill="#000" font-weight="bold">RNN / LSTM</text>
  <text x="600" y="78" text-anchor="middle" fill="#000" font-weight="bold">Transformer</text>

  <!-- row labels (left edge, inside col 1 cells via small tags) -->
  <text x="50" y="112" fill="#000" font-size="11" font-weight="bold">Best for:</text>
  <text x="50" y="170" fill="#000" font-size="11" font-weight="bold">Core idea:</text>
  <text x="50" y="270" fill="#000" font-size="11" font-weight="bold">Reads:</text>

  <!-- ROW 1: best for -->
  <text x="140" y="130" text-anchor="middle" fill="#000" font-size="11">grids / images</text>
  <text x="140" y="146" text-anchor="middle" fill="#000" font-size="10">(and spectrograms)</text>
  <text x="360" y="130" text-anchor="middle" fill="#000" font-size="11">sequences: text,</text>
  <text x="360" y="146" text-anchor="middle" fill="#000" font-size="10">audio, time series</text>
  <text x="600" y="130" text-anchor="middle" fill="#000" font-size="11">text now, and</text>
  <text x="600" y="146" text-anchor="middle" fill="#000" font-size="10">increasingly everything</text>

  <!-- ROW 2: core idea -->
  <text x="140" y="180" text-anchor="middle" fill="#000" font-size="11">a small filter</text>
  <text x="140" y="196" text-anchor="middle" fill="#000" font-size="11">slides + detects</text>
  <text x="140" y="212" text-anchor="middle" fill="#000" font-size="11">local patterns;</text>
  <text x="140" y="228" text-anchor="middle" fill="#000" font-size="11">pooling shrinks</text>

  <text x="360" y="180" text-anchor="middle" fill="#000" font-size="11">step by step,</text>
  <text x="360" y="196" text-anchor="middle" fill="#000" font-size="11">carrying a memory;</text>
  <text x="360" y="212" text-anchor="middle" fill="#000" font-size="11">gates remember</text>
  <text x="360" y="228" text-anchor="middle" fill="#000" font-size="11">longer (LSTM)</text>

  <text x="600" y="180" text-anchor="middle" fill="#000" font-size="11">attention: focus</text>
  <text x="600" y="196" text-anchor="middle" fill="#000" font-size="11">on the relevant</text>
  <text x="600" y="212" text-anchor="middle" fill="#000" font-size="11">parts, all</text>
  <text x="600" y="228" text-anchor="middle" fill="#000" font-size="11">positions at once</text>

  <!-- ROW 3: reads (order vs parallel) -->
  <text x="140" y="284" text-anchor="middle" fill="#000" font-size="11">a whole grid,</text>
  <text x="140" y="300" text-anchor="middle" fill="#000" font-size="11">patch by patch</text>

  <text x="360" y="284" text-anchor="middle" fill="#000" font-size="11">one item at a time,</text>
  <text x="360" y="300" text-anchor="middle" fill="#000" font-size="11">in order (slower)</text>

  <text x="600" y="284" text-anchor="middle" fill="#000" font-size="11">the whole sequence</text>
  <text x="600" y="300" text-anchor="middle" fill="#000" font-size="11">in parallel (fast),</text>
  <text x="600" y="316" text-anchor="middle" fill="#000" font-size="11">long-range too</text>

  <!-- takeaways -->
  <line x1="40" y1="392" x2="720" y2="392" stroke="#000" stroke-width="1"/>
  <text x="380" y="412" text-anchor="middle" fill="#000" font-weight="bold">CNNs for grids/images, RNNs/LSTMs for sequences (older), transformers now dominate text and beyond.</text>
  <text x="380" y="428" text-anchor="middle" fill="#000" font-size="11">Transformers won by handling long-range links and training in parallel at scale, which made giant language models possible.</text>
</svg>
