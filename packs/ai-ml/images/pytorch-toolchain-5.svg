<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="740" height="360" fill="#ffffff"/>
  <text x="370" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Transfer learning: start from a pretrained model, then adapt it</text>

  <defs>
    <marker id="aht5" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- big pretrained model -->
  <rect x="50" y="90" width="230" height="150" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="165" y="116" text-anchor="middle" fill="#000" font-weight="bold">BIG PRETRAINED MODEL</text>
  <text x="165" y="134" text-anchor="middle" fill="#000" font-size="11">already trained on huge data</text>
  <circle cx="100" cy="180" r="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="150" cy="180" r="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="200" cy="180" r="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="250" cy="180" r="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="114" y1="180" x2="136" y2="180" stroke="#000" stroke-width="1.5"/>
  <line x1="164" y1="180" x2="186" y2="180" stroke="#000" stroke-width="1.5"/>
  <line x1="214" y1="180" x2="236" y2="180" stroke="#000" stroke-width="1.5"/>
  <text x="165" y="222" text-anchor="middle" fill="#000" font-size="11">general skills already learned</text>

  <!-- plus small adaptation -->
  <text x="320" y="170" text-anchor="middle" fill="#000" font-size="22" font-weight="bold">+</text>
  <rect x="345" y="135" width="120" height="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="405" y="160" text-anchor="middle" fill="#000" font-size="11">small</text>
  <text x="405" y="176" text-anchor="middle" fill="#000" font-size="11">adaptation</text>
  <text x="405" y="200" text-anchor="middle" fill="#000" font-size="11">(your few</text>
  <text x="405" y="216" text-anchor="middle" fill="#000" font-size="11">examples)</text>

  <!-- arrow to your task -->
  <line x1="465" y1="180" x2="535" y2="180" stroke="#000" stroke-width="2" marker-end="url(#aht5)"/>

  <!-- your task -->
  <rect x="540" y="135" width="150" height="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="615" y="170" text-anchor="middle" fill="#000" font-weight="bold">YOUR TASK</text>
  <text x="615" y="190" text-anchor="middle" fill="#000" font-size="11">solved with much</text>
  <text x="615" y="206" text-anchor="middle" fill="#000" font-size="11">less data and time</text>

  <line x1="50" y1="270" x2="690" y2="270" stroke="#000" stroke-width="1"/>
  <text x="370" y="294" text-anchor="middle" fill="#000" font-weight="bold">Like hiring someone already skilled and giving them a short orientation.</text>
  <text x="370" y="316" text-anchor="middle" fill="#000" font-size="11">You rarely start from zero. Model hubs (e.g. Hugging Face) are like "app stores" for pretrained models.</text>
  <text x="370" y="338" text-anchor="middle" fill="#000" font-size="11">Reusing a pretrained model is smart practice, not cheating.</text>
</svg>
