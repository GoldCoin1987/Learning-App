<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="430" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Data drift: the world changes, so accuracy quietly drops</text>

  <!-- LEFT panel: distributions drifting apart -->
  <text x="200" y="58" text-anchor="middle" font-weight="bold" fill="#000">Live data drifts away from training data</text>

  <!-- axes -->
  <line x1="60" y1="230" x2="350" y2="230" stroke="#000" stroke-width="2"/>
  <line x1="60" y1="230" x2="60" y2="90" stroke="#000" stroke-width="2"/>
  <text x="205" y="252" text-anchor="middle" fill="#000" font-size="11">value of the inputs</text>
  <text x="40" y="160" text-anchor="middle" fill="#000" font-size="11" transform="rotate(-90 40 160)">how often</text>

  <!-- training curve (solid, left) -->
  <path d="M70,230 C110,230 120,110 150,110 C180,110 190,230 230,230" fill="none" stroke="#000" stroke-width="2"/>
  <text x="150" y="104" text-anchor="middle" fill="#000" font-size="11">TRAINING data</text>

  <!-- live curve (dashed, shifted right) -->
  <path d="M180,230 C220,230 230,130 260,130 C290,130 300,230 340,230" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="290" y="124" text-anchor="middle" fill="#000" font-size="11">LATER live data</text>

  <text x="205" y="290" text-anchor="middle" fill="#000" font-size="11">The two distributions no longer line up.</text>
  <text x="205" y="308" text-anchor="middle" fill="#000" font-size="11">New slang, new fraud tricks, an aging sensor,</text>
  <text x="205" y="326" text-anchor="middle" fill="#000" font-size="11">shifting shopping habits...</text>

  <!-- divider -->
  <line x1="400" y1="44" x2="400" y2="402" stroke="#000" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- RIGHT panel: accuracy dropping over time -->
  <text x="560" y="58" text-anchor="middle" font-weight="bold" fill="#000">...so accuracy decays over time</text>

  <line x1="440" y1="230" x2="690" y2="230" stroke="#000" stroke-width="2"/>
  <line x1="440" y1="230" x2="440" y2="90" stroke="#000" stroke-width="2"/>
  <text x="565" y="252" text-anchor="middle" fill="#000" font-size="11">time after deployment</text>
  <text x="424" y="160" text-anchor="middle" fill="#000" font-size="11" transform="rotate(-90 424 160)">accuracy</text>

  <!-- declining accuracy line -->
  <path d="M450,105 C520,108 560,150 690,210" fill="none" stroke="#000" stroke-width="2"/>
  <text x="500" y="100" text-anchor="middle" fill="#000" font-size="11">starts high</text>
  <text x="650" y="200" text-anchor="middle" fill="#000" font-size="11">drops</text>

  <text x="565" y="290" text-anchor="middle" fill="#000" font-size="11">Nothing in the code broke. The model is the</text>
  <text x="565" y="308" text-anchor="middle" fill="#000" font-size="11">same; the WORLD moved. This is DATA / CONCEPT DRIFT.</text>

  <text x="360" y="372" text-anchor="middle" fill="#000">Like a road map that goes stale as roads change: you must update it.</text>
  <text x="360" y="396" text-anchor="middle" fill="#000" font-weight="bold">Fix: MONITOR live performance, set alerts, and RETRAIN on fresh data.</text>
</svg>
