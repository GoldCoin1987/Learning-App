<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="420" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Turning a wiggly signal into a picture a CNN can read</text>

  <!-- STAGE 1: waveform -->
  <text x="120" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">1. The raw signal</text>
  <rect x="30" y="74" width="180" height="120" fill="none" stroke="#000" stroke-width="1.5"/>
  <line x1="40" y1="134" x2="200" y2="134" stroke="#000" stroke-width="0.75"/>
  <polyline points="40,134 52,104 64,160 76,108 88,156 100,116 112,150 124,110 136,158 148,112 160,150 172,124 184,144 200,134" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="120" y="186" text-anchor="middle" font-size="10" fill="#000">level of the wave, moment by moment</text>

  <!-- arrow -->
  <text x="245" y="140" text-anchor="middle" font-size="26" fill="#000">&#8594;</text>
  <text x="245" y="162" text-anchor="middle" font-size="10" fill="#000">split into</text>
  <text x="245" y="174" text-anchor="middle" font-size="10" fill="#000">frequencies</text>

  <!-- STAGE 2: spectrogram image -->
  <text x="400" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">2. A spectrogram (an image)</text>
  <!-- axes -->
  <line x1="300" y1="80" x2="300" y2="194" stroke="#000" stroke-width="1.2"/>
  <line x1="300" y1="194" x2="500" y2="194" stroke="#000" stroke-width="1.2"/>
  <text x="400" y="212" text-anchor="middle" font-size="10" fill="#000">time &#8594;</text>
  <text x="288" y="137" text-anchor="middle" font-size="10" fill="#000" transform="rotate(-90 288 137)">frequency &#8593;</text>
  <!-- 4x4 grid of strength -->
  <rect x="300" y="80" width="50" height="28" fill="#ffffff" stroke="#000"/>
  <rect x="350" y="80" width="50" height="28" fill="#888888" stroke="#000"/>
  <rect x="400" y="80" width="50" height="28" fill="#ffffff" stroke="#000"/>
  <rect x="450" y="80" width="50" height="28" fill="#cccccc" stroke="#000"/>
  <rect x="300" y="108" width="50" height="28" fill="#cccccc" stroke="#000"/>
  <rect x="350" y="108" width="50" height="28" fill="#000000" stroke="#000"/>
  <rect x="400" y="108" width="50" height="28" fill="#888888" stroke="#000"/>
  <rect x="450" y="108" width="50" height="28" fill="#ffffff" stroke="#000"/>
  <rect x="300" y="136" width="50" height="28" fill="#888888" stroke="#000"/>
  <rect x="350" y="136" width="50" height="28" fill="#cccccc" stroke="#000"/>
  <rect x="400" y="136" width="50" height="28" fill="#000000" stroke="#000"/>
  <rect x="450" y="136" width="50" height="28" fill="#888888" stroke="#000"/>
  <rect x="300" y="164" width="50" height="30" fill="#000000" stroke="#000"/>
  <rect x="350" y="164" width="50" height="30" fill="#cccccc" stroke="#000"/>
  <rect x="400" y="164" width="50" height="30" fill="#cccccc" stroke="#000"/>
  <rect x="450" y="164" width="50" height="30" fill="#000000" stroke="#000"/>
  <text x="400" y="232" text-anchor="middle" font-size="10" fill="#000">darker square = that frequency is strong then</text>

  <!-- arrow -->
  <text x="540" y="140" text-anchor="middle" font-size="26" fill="#000">&#8594;</text>

  <!-- STAGE 3: CNN -->
  <text x="650" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">3. A CNN reads it</text>
  <rect x="575" y="80" width="150" height="114" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="650" y="110" text-anchor="middle" font-size="11" fill="#000">a small filter slides</text>
  <text x="650" y="126" text-anchor="middle" font-size="11" fill="#000">over the picture,</text>
  <text x="650" y="142" text-anchor="middle" font-size="11" fill="#000">finding patterns,</text>
  <text x="650" y="158" text-anchor="middle" font-size="11" fill="#000">just like any image</text>
  <!-- small sliding window glyph -->
  <rect x="600" y="168" width="18" height="18" fill="none" stroke="#000" stroke-width="1.5"/>
  <rect x="618" y="168" width="18" height="18" fill="none" stroke="#000" stroke-width="0.75" stroke-dasharray="3 2"/>
  <rect x="636" y="168" width="18" height="18" fill="none" stroke="#000" stroke-width="0.75" stroke-dasharray="3 2"/>

  <!-- takeaway -->
  <line x1="30" y1="262" x2="730" y2="262" stroke="#000" stroke-width="1"/>
  <text x="380" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">A spectrogram is a picture of which frequencies are strong at each moment.</text>
  <text x="380" y="318" text-anchor="middle" font-size="12" fill="#000">Once the signal is a picture, an image learner (a CNN) can recognize it,</text>
  <text x="380" y="338" text-anchor="middle" font-size="12" fill="#000">the same way a CNN tags a photo. Recall: a signal is a mix of frequencies, like a chord is a mix of notes.</text>
  <text x="380" y="372" text-anchor="middle" font-size="12" fill="#000">Yes, a spectrogram really IS an image, that is the whole point of making one.</text>
</svg>
