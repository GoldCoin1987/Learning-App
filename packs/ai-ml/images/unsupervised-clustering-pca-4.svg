<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Anomaly detection: the point that fits no group</text>

  <defs>
    <marker id="ah4" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#000"/>
    </marker>
  </defs>

  <rect x="60" y="50" width="520" height="270" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- normal cluster 1 -->
  <circle cx="170" cy="120" r="48" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="5 4"/>
  <circle cx="150" cy="105" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="180" cy="115" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="160" cy="135" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="190" cy="140" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="165" cy="155" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="170" y="186" text-anchor="middle" fill="#000" font-size="11">normal group</text>

  <!-- normal cluster 2 -->
  <circle cx="220" cy="245" r="46" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="5 4"/>
  <circle cx="200" cy="230" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="235" cy="240" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="210" cy="260" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="240" cy="265" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="220" y="305" text-anchor="middle" fill="#000" font-size="11">normal group</text>

  <!-- normal cluster 3 -->
  <circle cx="370" cy="155" r="46" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="5 4"/>
  <circle cx="350" cy="140" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="385" cy="150" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="360" cy="170" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="390" cy="175" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="370" y="216" text-anchor="middle" fill="#000" font-size="11">normal group</text>

  <!-- the anomaly: a lone solid point far away, flagged -->
  <circle cx="510" cy="255" r="8" fill="#000"/>
  <circle cx="510" cy="255" r="18" fill="none" stroke="#000" stroke-width="2.5"/>
  <line x1="510" y1="277" x2="510" y2="300" stroke="#000" stroke-width="2" marker-end="url(#ah4)"/>
  <text x="510" y="92" text-anchor="middle" fill="#000" font-weight="bold">ANOMALY</text>
  <text x="510" y="108" text-anchor="middle" fill="#000" font-size="11">fits no group</text>
  <line x1="510" y1="116" x2="510" y2="234" stroke="#000" stroke-width="1.5" stroke-dasharray="3 3"/>

  <text x="320" y="346" text-anchor="middle" fill="#000" font-size="11">Most points fall into normal groups. The flagged point stands out from the crowd.</text>
  <text x="320" y="372" text-anchor="middle" fill="#000">Anomaly detection = spotting points that do not fit any group or pattern.</text>
  <text x="320" y="398" text-anchor="middle" fill="#000" font-size="11">Everyday uses: fraud, faulty sensors, network intrusions, the odd one out.</text>
</svg>
