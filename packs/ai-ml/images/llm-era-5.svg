<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="380" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">An AI agent: an LLM that uses tools and takes steps toward a goal</text>

  <defs>
    <marker id="ahdL5" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <text x="380" y="50" text-anchor="middle" fill="#000" font-size="11">Goal: "Book me a dentist appointment for next week."</text>

  <!-- Decide (LLM) -->
  <rect x="300" y="74" width="160" height="56" rx="8" fill="#ffffff" stroke="#000" stroke-width="3"/>
  <text x="380" y="98" text-anchor="middle" fill="#000" font-weight="bold">LLM decides</text>
  <text x="380" y="116" text-anchor="middle" fill="#000" font-size="10">"What should I do next?"</text>

  <!-- arrow to tool (right side, going down) -->
  <line x1="460" y1="110" x2="560" y2="160" stroke="#000" stroke-width="2.5" marker-end="url(#ahdL5)"/>
  <text x="540" y="128" text-anchor="middle" fill="#000" font-size="10">use a tool</text>

  <!-- Tool -->
  <rect x="500" y="168" width="200" height="86" rx="8" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="600" y="190" text-anchor="middle" fill="#000" font-weight="bold">Use a TOOL</text>
  <text x="600" y="210" text-anchor="middle" fill="#000" font-size="10">- search the web</text>
  <text x="600" y="226" text-anchor="middle" fill="#000" font-size="10">- run code / query a database</text>
  <text x="600" y="242" text-anchor="middle" fill="#000" font-size="10">- call an app (the booking site)</text>

  <!-- arrow tool -> observe (bottom, going left) -->
  <line x1="560" y1="254" x2="380" y2="290" stroke="#000" stroke-width="2.5" marker-end="url(#ahdL5)"/>
  <text x="470" y="288" text-anchor="middle" fill="#000" font-size="10">get a result</text>

  <!-- Observe -->
  <rect x="200" y="278" width="160" height="56" rx="8" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="280" y="302" text-anchor="middle" fill="#000" font-weight="bold">Observe result</text>
  <text x="280" y="320" text-anchor="middle" fill="#000" font-size="10">"3 open slots on Tuesday"</text>

  <!-- arrow observe -> decide (left side, going up) = the loop -->
  <line x1="220" y1="278" x2="320" y2="130" stroke="#000" stroke-width="2.5" marker-end="url(#ahdL5)"/>
  <text x="210" y="200" text-anchor="middle" fill="#000" font-size="10" font-weight="bold">repeat the loop</text>
  <text x="210" y="216" text-anchor="middle" fill="#000" font-size="10">until the goal is met</text>

  <!-- goal reached -->
  <rect x="300" y="150" width="160" height="40" rx="6" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="380" y="167" text-anchor="middle" fill="#000" font-size="10" font-weight="bold">...eventually: goal done</text>
  <text x="380" y="182" text-anchor="middle" fill="#000" font-size="9">(appointment booked)</text>

  <!-- caution note -->
  <rect x="40" y="150" width="150" height="86" rx="6" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="115" y="172" text-anchor="middle" fill="#000" font-size="11" font-weight="bold">Powerful, but</text>
  <text x="115" y="190" text-anchor="middle" fill="#000" font-size="10">error-prone: it can take</text>
  <text x="115" y="206" text-anchor="middle" fill="#000" font-size="10">wrong actions. It needs</text>
  <text x="115" y="222" text-anchor="middle" fill="#000" font-size="10">guardrails and checks.</text>

  <line x1="60" y1="350" x2="700" y2="350" stroke="#000" stroke-width="1"/>
  <text x="380" y="370" text-anchor="middle" fill="#000" font-size="11">Tools + multi-step planning turn a chatbot into an agent that can ACT, not just talk. Like an assistant that does the steps for you.</text>
</svg>
