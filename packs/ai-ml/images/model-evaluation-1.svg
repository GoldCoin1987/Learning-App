<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The confusion matrix: 4 outcomes of a yes/no prediction</text>

  <!-- column headings (truth) -->
  <text x="320" y="58" text-anchor="middle" fill="#000" font-weight="bold">What was actually true</text>
  <text x="290" y="78" text-anchor="middle" fill="#000">Really YES (positive)</text>
  <text x="480" y="78" text-anchor="middle" fill="#000">Really NO (negative)</text>

  <!-- row heading (prediction) rotated -->
  <text x="40" y="240" text-anchor="middle" fill="#000" font-weight="bold" transform="rotate(-90 40 240)">What the model predicted</text>
  <text x="120" y="150" text-anchor="middle" fill="#000">Said</text>
  <text x="120" y="166" text-anchor="middle" fill="#000">YES</text>
  <text x="120" y="300" text-anchor="middle" fill="#000">Said</text>
  <text x="120" y="316" text-anchor="middle" fill="#000">NO</text>

  <!-- 2x2 grid -->
  <!-- top-left: TP -->
  <rect x="190" y="92" width="190" height="110" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="285" y="120" text-anchor="middle" fill="#000" font-weight="bold">True Positive (TP)</text>
  <text x="285" y="142" text-anchor="middle" fill="#000" font-size="11">Correctly flagged</text>
  <text x="285" y="162" text-anchor="middle" fill="#000" font-size="11">(alarm rang, fire was real)</text>
  <text x="285" y="184" text-anchor="middle" fill="#000" font-size="11">RIGHT</text>

  <!-- top-right: FP -->
  <rect x="380" y="92" width="190" height="110" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="475" y="120" text-anchor="middle" fill="#000" font-weight="bold">False Positive (FP)</text>
  <text x="475" y="142" text-anchor="middle" fill="#000" font-size="11">False alarm</text>
  <text x="475" y="162" text-anchor="middle" fill="#000" font-size="11">(alarm rang, no fire)</text>
  <text x="475" y="184" text-anchor="middle" fill="#000" font-size="11">WRONG</text>

  <!-- bottom-left: FN -->
  <rect x="190" y="202" width="190" height="110" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="285" y="230" text-anchor="middle" fill="#000" font-weight="bold">False Negative (FN)</text>
  <text x="285" y="252" text-anchor="middle" fill="#000" font-size="11">Missed it</text>
  <text x="285" y="272" text-anchor="middle" fill="#000" font-size="11">(no alarm, fire was real)</text>
  <text x="285" y="294" text-anchor="middle" fill="#000" font-size="11">WRONG</text>

  <!-- bottom-right: TN -->
  <rect x="380" y="202" width="190" height="110" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="475" y="230" text-anchor="middle" fill="#000" font-weight="bold">True Negative (TN)</text>
  <text x="475" y="252" text-anchor="middle" fill="#000" font-size="11">Correctly cleared</text>
  <text x="475" y="272" text-anchor="middle" fill="#000" font-size="11">(no alarm, no fire)</text>
  <text x="475" y="294" text-anchor="middle" fill="#000" font-size="11">RIGHT</text>

  <text x="320" y="344" text-anchor="middle" fill="#000" font-size="11">The two diagonal boxes are correct.  The two off-diagonal boxes are the two kinds of mistake.</text>
  <text x="320" y="372" text-anchor="middle" fill="#000">False alarm = a FALSE POSITIVE.   Missing the real thing = a FALSE NEGATIVE.</text>
  <text x="320" y="398" text-anchor="middle" fill="#000" font-size="11">Every metric in this sub-topic is built from these four counts.</text>
</svg>
