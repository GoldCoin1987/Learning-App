<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A single neuron: weigh the inputs, add them up, then "fire"</text>

  <defs>
    <marker id="ahn1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- inputs -->
  <text x="70" y="92" text-anchor="middle" fill="#000" font-weight="bold">inputs</text>
  <circle cx="70" cy="130" r="18" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="70" y="135" text-anchor="middle" fill="#000">x1</text>
  <circle cx="70" cy="200" r="18" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="70" y="205" text-anchor="middle" fill="#000">x2</text>
  <circle cx="70" cy="270" r="18" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="70" y="275" text-anchor="middle" fill="#000">x3</text>

  <!-- weighted connections into the sum -->
  <line x1="88" y1="130" x2="270" y2="195" stroke="#000" stroke-width="1.5" marker-end="url(#ahn1)"/>
  <line x1="88" y1="200" x2="270" y2="200" stroke="#000" stroke-width="1.5" marker-end="url(#ahn1)"/>
  <line x1="88" y1="270" x2="270" y2="205" stroke="#000" stroke-width="1.5" marker-end="url(#ahn1)"/>
  <text x="165" y="150" text-anchor="middle" fill="#000" font-size="11">x weight w1</text>
  <text x="165" y="188" text-anchor="middle" fill="#000" font-size="11">x weight w2</text>
  <text x="165" y="250" text-anchor="middle" fill="#000" font-size="11">x weight w3</text>

  <!-- bias arrow -->
  <text x="300" y="118" text-anchor="middle" fill="#000" font-size="11">+ bias</text>
  <line x1="300" y1="124" x2="300" y2="172" stroke="#000" stroke-width="1.5" marker-end="url(#ahn1)"/>

  <!-- sum box -->
  <rect x="270" y="178" width="80" height="46" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="310" y="198" text-anchor="middle" fill="#000" font-size="11">weighted</text>
  <text x="310" y="214" text-anchor="middle" fill="#000" font-size="11">sum + bias</text>

  <!-- arrow to activation -->
  <line x1="350" y1="201" x2="430" y2="201" stroke="#000" stroke-width="2" marker-end="url(#ahn1)"/>

  <!-- activation box -->
  <rect x="430" y="170" width="110" height="62" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="485" y="190" text-anchor="middle" fill="#000" font-size="11">activation</text>
  <text x="485" y="206" text-anchor="middle" fill="#000" font-size="11">function</text>
  <text x="485" y="222" text-anchor="middle" fill="#000" font-size="11">(how strongly</text>

  <!-- arrow to output -->
  <line x1="540" y1="201" x2="620" y2="201" stroke="#000" stroke-width="2" marker-end="url(#ahn1)"/>
  <circle cx="655" cy="201" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="655" y="198" text-anchor="middle" fill="#000" font-size="11">output</text>
  <text x="655" y="212" text-anchor="middle" fill="#000" font-size="11">("fires")</text>

  <!-- takeaways -->
  <line x1="50" y1="282" x2="670" y2="282" stroke="#000" stroke-width="1"/>
  <text x="360" y="306" text-anchor="middle" fill="#000" font-weight="bold">A weight says how much an input matters; bias shifts the threshold.</text>
  <text x="360" y="330" text-anchor="middle" fill="#000" font-size="11">Like a decision: if the weighted total of (cost, distance, reviews) crosses my threshold, I go.</text>
  <text x="360" y="354" text-anchor="middle" fill="#000" font-size="11">It is not a tiny brain. It is just a weighted score passed through a squashing curve.</text>
</svg>
