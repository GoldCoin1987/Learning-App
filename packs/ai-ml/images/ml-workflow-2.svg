<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Data as a table: rows, columns, and the target</text>

  <!-- column header band -->
  <rect x="60" y="60" width="120" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="82" text-anchor="middle" fill="#000">color</text>
  <rect x="180" y="60" width="120" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="240" y="82" text-anchor="middle" fill="#000">weight</text>
  <rect x="300" y="60" width="120" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="82" text-anchor="middle" fill="#000">size</text>
  <!-- target column header (highlighted by thick double border) -->
  <rect x="420" y="60" width="120" height="34" fill="#ffffff" stroke="#000" stroke-width="4"/>
  <text x="480" y="78" text-anchor="middle" fill="#000" font-weight="bold">fruit</text>
  <text x="480" y="90" text-anchor="middle" fill="#000" font-size="10">(target / answer)</text>

  <!-- data rows -->
  <rect x="60" y="94" width="120" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="115" text-anchor="middle" fill="#000">red</text>
  <rect x="180" y="94" width="120" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="240" y="115" text-anchor="middle" fill="#000">150 g</text>
  <rect x="300" y="94" width="120" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="115" text-anchor="middle" fill="#000">medium</text>
  <rect x="420" y="94" width="120" height="32" fill="#ffffff" stroke="#000" stroke-width="4"/>
  <text x="480" y="115" text-anchor="middle" fill="#000" font-weight="bold">apple</text>

  <rect x="60" y="126" width="120" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="147" text-anchor="middle" fill="#000">yellow</text>
  <rect x="180" y="126" width="120" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="240" y="147" text-anchor="middle" fill="#000">120 g</text>
  <rect x="300" y="126" width="120" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="147" text-anchor="middle" fill="#000">long</text>
  <rect x="420" y="126" width="120" height="32" fill="#ffffff" stroke="#000" stroke-width="4"/>
  <text x="480" y="147" text-anchor="middle" fill="#000" font-weight="bold">banana</text>

  <rect x="60" y="158" width="120" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="179" text-anchor="middle" fill="#000">orange</text>
  <rect x="180" y="158" width="120" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="240" y="179" text-anchor="middle" fill="#000">130 g</text>
  <rect x="300" y="158" width="120" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="360" y="179" text-anchor="middle" fill="#000">round</text>
  <rect x="420" y="158" width="120" height="32" fill="#ffffff" stroke="#000" stroke-width="4"/>
  <text x="480" y="179" text-anchor="middle" fill="#000" font-weight="bold">orange</text>

  <!-- labels / call-outs -->
  <text x="300" y="44" text-anchor="middle" fill="#000" font-size="11">columns = features (the inputs)</text>

  <!-- one row highlighted as a sample -->
  <rect x="58" y="92" width="484" height="36" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="575" y="115" text-anchor="start" fill="#000" font-size="11">&#8592; one row</text>
  <text x="575" y="129" text-anchor="start" fill="#000" font-size="11">= 1 example</text>
  <text x="575" y="143" text-anchor="start" fill="#000" font-size="11">(sample)</text>

  <text x="320" y="240" text-anchor="middle" fill="#000">Rows = examples (samples). Columns = features (inputs).</text>
  <text x="320" y="262" text-anchor="middle" fill="#000" font-weight="bold">The thick column is the TARGET: the answer we want to predict.</text>
  <text x="320" y="300" text-anchor="middle" fill="#000" font-size="11">Features can be numbers (weight), categories (color), text, or signals/images.</text>
</svg>
