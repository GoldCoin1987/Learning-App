<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Decision tree: a flowchart of yes/no questions</text>

  <defs>
    <marker id="ah1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- root question -->
  <rect x="240" y="48" width="160" height="44" rx="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="320" y="68" text-anchor="middle" fill="#000">Does it have</text>
  <text x="320" y="84" text-anchor="middle" fill="#000">feathers?</text>

  <!-- branches from root -->
  <line x1="290" y1="92" x2="170" y2="150" stroke="#000" stroke-width="2" marker-end="url(#ah1)"/>
  <line x1="350" y1="92" x2="470" y2="150" stroke="#000" stroke-width="2" marker-end="url(#ah1)"/>
  <text x="205" y="120" text-anchor="middle" fill="#000" font-weight="bold">yes</text>
  <text x="435" y="120" text-anchor="middle" fill="#000" font-weight="bold">no</text>

  <!-- left question -->
  <rect x="90" y="152" width="160" height="44" rx="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="170" y="172" text-anchor="middle" fill="#000">Can it fly?</text>
  <text x="170" y="188" text-anchor="middle" fill="#000" font-size="11">(a question splits the data)</text>

  <!-- right question -->
  <rect x="390" y="152" width="160" height="44" rx="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="470" y="172" text-anchor="middle" fill="#000">Does it have</text>
  <text x="470" y="188" text-anchor="middle" fill="#000">four legs?</text>

  <!-- left branches -->
  <line x1="140" y1="196" x2="95" y2="250" stroke="#000" stroke-width="2" marker-end="url(#ah1)"/>
  <line x1="200" y1="196" x2="245" y2="250" stroke="#000" stroke-width="2" marker-end="url(#ah1)"/>
  <text x="100" y="226" text-anchor="middle" fill="#000" font-weight="bold">yes</text>
  <text x="240" y="226" text-anchor="middle" fill="#000" font-weight="bold">no</text>

  <!-- right branches -->
  <line x1="440" y1="196" x2="395" y2="250" stroke="#000" stroke-width="2" marker-end="url(#ah1)"/>
  <line x1="500" y1="196" x2="545" y2="250" stroke="#000" stroke-width="2" marker-end="url(#ah1)"/>
  <text x="400" y="226" text-anchor="middle" fill="#000" font-weight="bold">yes</text>
  <text x="540" y="226" text-anchor="middle" fill="#000" font-weight="bold">no</text>

  <!-- leaves -->
  <rect x="40" y="252" width="110" height="40" rx="20" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="95" y="277" text-anchor="middle" fill="#000" font-weight="bold">Eagle</text>

  <rect x="190" y="252" width="110" height="40" rx="20" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="245" y="277" text-anchor="middle" fill="#000" font-weight="bold">Penguin</text>

  <rect x="340" y="252" width="110" height="40" rx="20" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="395" y="277" text-anchor="middle" fill="#000" font-weight="bold">Dog</text>

  <rect x="490" y="252" width="110" height="40" rx="20" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="545" y="277" text-anchor="middle" fill="#000" font-weight="bold">Snake</text>

  <text x="320" y="324" text-anchor="middle" fill="#000" font-size="11">Boxes = yes/no questions.  Rounded ends = leaves = the final answer (the prediction).</text>

  <!-- legend -->
  <line x1="120" y1="350" x2="160" y2="350" stroke="#000" stroke-width="2"/>
  <text x="168" y="354" text-anchor="start" fill="#000" font-size="11">arrow = the path you follow</text>
  <rect x="360" y="340" width="20" height="20" rx="10" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="388" y="354" text-anchor="start" fill="#000" font-size="11">leaf = answer reached</text>

  <text x="320" y="392" text-anchor="middle" fill="#000">Like the game "20 questions": each question narrows things down until you reach an answer.</text>
</svg>
