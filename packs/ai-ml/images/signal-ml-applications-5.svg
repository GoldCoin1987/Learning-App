<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="420" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A leakage trap with signal data</text>
  <text x="380" y="48" text-anchor="middle" font-size="12" fill="#000">Splitting one person's clips across BOTH train and test inflates the score.</text>

  <!-- The recordings: clips from Speaker A -->
  <text x="380" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Several clips recorded from the SAME speaker (Speaker A):</text>
  <rect x="250" y="90" width="40" height="28" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="270" y="109" text-anchor="middle" font-size="10" fill="#000">A-1</text>
  <rect x="300" y="90" width="40" height="28" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="320" y="109" text-anchor="middle" font-size="10" fill="#000">A-2</text>
  <rect x="350" y="90" width="40" height="28" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="370" y="109" text-anchor="middle" font-size="10" fill="#000">A-3</text>
  <rect x="400" y="90" width="40" height="28" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="420" y="109" text-anchor="middle" font-size="10" fill="#000">A-4</text>
  <rect x="450" y="90" width="40" height="28" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="470" y="109" text-anchor="middle" font-size="10" fill="#000">A-5</text>

  <!-- WRONG split -->
  <rect x="40" y="150" width="330" height="180" fill="none" stroke="#000" stroke-width="2"/>
  <text x="205" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Wrong: same speaker on both sides</text>
  <!-- big DON'T circle/slash -->
  <circle cx="70" cy="166" r="13" fill="none" stroke="#000" stroke-width="2.5"/>
  <line x1="61" y1="157" x2="79" y2="175" stroke="#000" stroke-width="2.5"/>

  <text x="120" y="206" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">TRAIN</text>
  <rect x="70" y="216" width="36" height="26" fill="none" stroke="#000"/>
  <text x="88" y="233" text-anchor="middle" font-size="9" fill="#000">A-1</text>
  <rect x="112" y="216" width="36" height="26" fill="none" stroke="#000"/>
  <text x="130" y="233" text-anchor="middle" font-size="9" fill="#000">A-2</text>
  <rect x="154" y="216" width="36" height="26" fill="none" stroke="#000"/>
  <text x="172" y="233" text-anchor="middle" font-size="9" fill="#000">A-3</text>

  <text x="290" y="206" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">TEST</text>
  <rect x="250" y="216" width="36" height="26" fill="none" stroke="#000"/>
  <text x="268" y="233" text-anchor="middle" font-size="9" fill="#000">A-4</text>
  <rect x="292" y="216" width="36" height="26" fill="none" stroke="#000"/>
  <text x="310" y="233" text-anchor="middle" font-size="9" fill="#000">A-5</text>

  <text x="205" y="272" text-anchor="middle" font-size="11" fill="#000">The model can memorize this voice,</text>
  <text x="205" y="290" text-anchor="middle" font-size="11" fill="#000">then "recognize" it in the test set.</text>
  <text x="205" y="314" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Score looks great, but it is fake.</text>

  <!-- RIGHT split -->
  <rect x="390" y="150" width="330" height="180" fill="none" stroke="#000" stroke-width="2"/>
  <text x="555" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Right: keep each speaker on one side</text>

  <text x="470" y="206" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">TRAIN</text>
  <rect x="420" y="216" width="36" height="26" fill="none" stroke="#000"/>
  <text x="438" y="233" text-anchor="middle" font-size="9" fill="#000">A-1</text>
  <rect x="462" y="216" width="36" height="26" fill="none" stroke="#000"/>
  <text x="480" y="233" text-anchor="middle" font-size="9" fill="#000">A-5</text>

  <text x="640" y="206" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">TEST</text>
  <rect x="600" y="216" width="36" height="26" fill="none" stroke="#000"/>
  <text x="618" y="233" text-anchor="middle" font-size="9" fill="#000">B-1</text>
  <rect x="642" y="216" width="36" height="26" fill="none" stroke="#000"/>
  <text x="660" y="233" text-anchor="middle" font-size="9" fill="#000">B-2</text>
  <text x="555" y="266" text-anchor="middle" font-size="10" fill="#000">(B = a different speaker the model never trained on)</text>
  <text x="555" y="292" text-anchor="middle" font-size="11" fill="#000">Now the test asks the real question:</text>
  <text x="555" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">does it work on someone NEW?</text>

  <!-- takeaway -->
  <line x1="40" y1="352" x2="720" y2="352" stroke="#000" stroke-width="1"/>
  <text x="380" y="380" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Don't let clips from the same person or session sit in both train and test.</text>
  <text x="380" y="404" text-anchor="middle" font-size="12" fill="#000">Also watch class imbalance (rare faults) and test on noisy, realistic data.</text>
</svg>
