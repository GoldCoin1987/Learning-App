<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="400" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">How it learns: forward pass, then send the error backward</text>

  <defs>
    <marker id="ahn5" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- nodes: input, hidden, output -->
  <circle cx="120" cy="170" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="175" text-anchor="middle" fill="#000" font-size="11">input</text>
  <circle cx="320" cy="170" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="320" y="175" text-anchor="middle" fill="#000" font-size="11">hidden</text>
  <circle cx="520" cy="170" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="520" y="166" text-anchor="middle" fill="#000" font-size="11">pred-</text>
  <text x="520" y="180" text-anchor="middle" fill="#000" font-size="11">iction</text>

  <!-- FORWARD arrows (top, left to right) -->
  <line x1="142" y1="160" x2="298" y2="160" stroke="#000" stroke-width="2" marker-end="url(#ahn5)"/>
  <line x1="342" y1="160" x2="498" y2="160" stroke="#000" stroke-width="2" marker-end="url(#ahn5)"/>
  <text x="320" y="120" text-anchor="middle" fill="#000" font-weight="bold">1. FORWARD PASS: push inputs through to a prediction</text>

  <!-- true answer + error -->
  <rect x="600" y="148" width="90" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="645" y="166" text-anchor="middle" fill="#000" font-size="11">compare to</text>
  <text x="645" y="182" text-anchor="middle" fill="#000" font-size="11">true answer</text>
  <line x1="542" y1="170" x2="598" y2="170" stroke="#000" stroke-width="2" marker-end="url(#ahn5)"/>
  <text x="645" y="214" text-anchor="middle" fill="#000" font-size="11">= error (loss)</text>

  <!-- BACKWARD arrows (bottom, right to left) -->
  <line x1="498" y1="240" x2="342" y2="240" stroke="#000" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ahn5)"/>
  <line x1="298" y1="240" x2="142" y2="240" stroke="#000" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ahn5)"/>
  <text x="320" y="280" text-anchor="middle" fill="#000" font-weight="bold">2. BACKPROPAGATION: send the error backward, assign blame</text>
  <text x="320" y="300" text-anchor="middle" fill="#000" font-size="11">work out how much each weight added to the error, then nudge each one to reduce it</text>

  <!-- takeaways -->
  <line x1="50" y1="324" x2="670" y2="324" stroke="#000" stroke-width="1"/>
  <text x="360" y="348" text-anchor="middle" fill="#000" font-weight="bold">This is gradient descent (roll downhill to cut error) applied to the whole network.</text>
  <text x="360" y="370" text-anchor="middle" fill="#000" font-size="11">Repeat over many examples, many times (epochs). Forward makes a guess; backprop fixes the weights.</text>
  <text x="360" y="392" text-anchor="middle" fill="#000" font-size="11">Like a team post-mortem: trace a mistake back to find who should adjust, and by how much.</text>
</svg>
