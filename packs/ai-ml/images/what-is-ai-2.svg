<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="640" height="340" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The big flip: who writes the rules?</text>

  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- LEFT: traditional programming -->
  <text x="160" y="62" text-anchor="middle" font-weight="bold" fill="#000">Traditional programming</text>

  <rect x="40" y="90" width="110" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="95" y="112" text-anchor="middle" fill="#000">Rules</text>
  <text x="95" y="128" text-anchor="middle" fill="#000" font-size="11">(written by a human)</text>

  <rect x="40" y="150" width="110" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="95" y="174" text-anchor="middle" fill="#000">Data</text>

  <rect x="200" y="118" width="90" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="245" y="145" text-anchor="middle" fill="#000">Answers</text>

  <line x1="150" y1="112" x2="200" y2="135" stroke="#000" stroke-width="2" marker-end="url(#ah2)"/>
  <line x1="150" y1="170" x2="200" y2="145" stroke="#000" stroke-width="2" marker-end="url(#ah2)"/>
  <text x="160" y="205" text-anchor="middle" fill="#000" font-size="12">rules + data &#8594; answers</text>

  <!-- divider -->
  <line x1="320" y1="55" x2="320" y2="250" stroke="#000" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- RIGHT: machine learning -->
  <text x="480" y="62" text-anchor="middle" font-weight="bold" fill="#000">Machine learning</text>

  <rect x="360" y="90" width="110" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="415" y="114" text-anchor="middle" fill="#000">Data</text>

  <rect x="360" y="146" width="110" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="415" y="168" text-anchor="middle" fill="#000">Answers</text>
  <text x="415" y="184" text-anchor="middle" fill="#000" font-size="11">(the examples' labels)</text>

  <rect x="520" y="118" width="90" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="565" y="140" text-anchor="middle" fill="#000">Rules</text>
  <text x="565" y="156" text-anchor="middle" fill="#000" font-size="11">(the model)</text>

  <line x1="470" y1="110" x2="520" y2="135" stroke="#000" stroke-width="2" marker-end="url(#ah2)"/>
  <line x1="470" y1="168" x2="520" y2="145" stroke="#000" stroke-width="2" marker-end="url(#ah2)"/>
  <text x="480" y="205" text-anchor="middle" fill="#000" font-size="12">data + answers &#8594; rules</text>

  <text x="320" y="250" text-anchor="middle" fill="#000">A human writes the rules (left) vs the computer figures the rules out (right).</text>
  <text x="320" y="290" text-anchor="middle" fill="#000" font-weight="bold">Show it many examples WITH answers, and it learns the rule by itself.</text>
</svg>
