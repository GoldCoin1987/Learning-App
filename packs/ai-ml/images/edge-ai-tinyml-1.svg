<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 430" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="700" height="430" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Cloud AI vs Edge AI: where does the model run?</text>

  <defs>
    <marker id="ahe1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- divider -->
  <line x1="350" y1="44" x2="350" y2="402" stroke="#000" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- LEFT: CLOUD AI -->
  <text x="175" y="64" text-anchor="middle" font-weight="bold" fill="#000">CLOUD AI</text>
  <text x="175" y="82" text-anchor="middle" fill="#000" font-size="11">data is sent away to a far data center</text>

  <!-- device -->
  <rect x="40" y="150" width="60" height="90" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="48" y="162" width="44" height="56" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <circle cx="70" cy="230" r="4" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="70" y="258" text-anchor="middle" fill="#000" font-size="11">your device</text>

  <!-- cloud / data center -->
  <path d="M225 150 q-22 0 -22 22 q-18 2 -16 20 q-12 4 -2 16 l78 0 q14 -2 12 -18 q14 -6 4 -22 q4 -18 -16 -18 q-8 -14 -22 -10 q-12 -10 -18 8 z" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="255" y="200" text-anchor="middle" fill="#000" font-size="11">data center</text>
  <text x="255" y="214" text-anchor="middle" fill="#000" font-size="11">(big model)</text>
  <text x="255" y="248" text-anchor="middle" fill="#000" font-size="11">far-away servers</text>

  <!-- arrows back and forth -->
  <line x1="102" y1="180" x2="200" y2="180" stroke="#000" stroke-width="2" marker-end="url(#ahe1)"/>
  <text x="150" y="172" text-anchor="middle" fill="#000" font-size="10">data sent up</text>
  <line x1="200" y1="208" x2="102" y2="208" stroke="#000" stroke-width="2" marker-end="url(#ahe1)"/>
  <text x="150" y="224" text-anchor="middle" fill="#000" font-size="10">answer comes back</text>

  <text x="175" y="300" text-anchor="middle" fill="#000" font-size="11">Needs internet. Round-trip takes time.</text>
  <text x="175" y="318" text-anchor="middle" fill="#000" font-size="11">Your data leaves the device.</text>

  <!-- RIGHT: EDGE AI -->
  <text x="525" y="64" text-anchor="middle" font-weight="bold" fill="#000">EDGE AI (on-device)</text>
  <text x="525" y="82" text-anchor="middle" fill="#000" font-size="11">the model runs on the local device itself</text>

  <!-- device with model inside -->
  <rect x="470" y="140" width="110" height="120" rx="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="484" y="156" width="82" height="70" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="525" y="186" text-anchor="middle" fill="#000" font-size="11">model</text>
  <text x="525" y="202" text-anchor="middle" fill="#000" font-size="11">runs here</text>
  <circle cx="525" cy="244" r="5" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="525" y="280" text-anchor="middle" fill="#000" font-size="11">your device</text>

  <!-- small loop arrow showing data stays -->
  <path d="M600 175 q34 25 0 50" fill="none" stroke="#000" stroke-width="2" marker-end="url(#ahe1)"/>
  <text x="636" y="204" text-anchor="middle" fill="#000" font-size="10" transform="rotate(90 636 204)">data stays put</text>

  <text x="525" y="300" text-anchor="middle" fill="#000" font-size="11">Works offline. Instant. Data never leaves.</text>
  <text x="525" y="318" text-anchor="middle" fill="#000" font-size="11">Device only RUNS the model (inference).</text>

  <text x="350" y="372" text-anchor="middle" fill="#000" font-weight="bold">Edge AI = run the model ON the device instead of sending data to the cloud.</text>
  <text x="350" y="392" text-anchor="middle" fill="#000" font-size="11">TinyML is the extreme end: tiny models on tiny, cheap, low-power chips.</text>
</svg>
