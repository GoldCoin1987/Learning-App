<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Break a signal into the frequencies inside it</text>

  <defs>
    <marker id="ahf4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- LEFT: wiggly signal over time -->
  <text x="170" y="60" text-anchor="middle" fill="#000" font-weight="bold">Raw signal (over time)</text>
  <text x="170" y="76" text-anchor="middle" fill="#000" font-size="11">just a list of numbers, hard to read</text>
  <!-- axes -->
  <line x1="50" y1="180" x2="300" y2="180" stroke="#000" stroke-width="1.5"/>
  <line x1="50" y1="100" x2="50" y2="180" stroke="#000" stroke-width="1.5"/>
  <text x="175" y="200" text-anchor="middle" fill="#000" font-size="11">time</text>
  <text x="40" y="144" text-anchor="end" fill="#000" font-size="11">level</text>
  <!-- a bumpy combined wave (sum of a few tones) -->
  <path d="M50,140 C70,110 80,170 100,150 C120,132 130,168 150,138 C170,112 180,166 200,150 C220,134 230,170 250,140 C270,116 280,162 300,144" fill="none" stroke="#000" stroke-width="2"/>

  <!-- arrow across -->
  <line x1="310" y1="140" x2="400" y2="140" stroke="#000" stroke-width="2" marker-end="url(#ahf4)"/>
  <text x="355" y="128" text-anchor="middle" fill="#000" font-size="11">break into</text>
  <text x="355" y="158" text-anchor="middle" fill="#000" font-size="11">frequencies</text>

  <!-- RIGHT: spectrum bars -->
  <text x="540" y="60" text-anchor="middle" fill="#000" font-weight="bold">Frequencies present (a spectrum)</text>
  <text x="540" y="76" text-anchor="middle" fill="#000" font-size="11">which notes, and how strong</text>
  <line x1="420" y1="180" x2="660" y2="180" stroke="#000" stroke-width="1.5"/>
  <line x1="420" y1="90" x2="420" y2="180" stroke="#000" stroke-width="1.5"/>
  <text x="540" y="200" text-anchor="middle" fill="#000" font-size="11">frequency (low to high)</text>
  <text x="412" y="138" text-anchor="end" fill="#000" font-size="11">strength</text>
  <!-- three tall bars = three notes in the chord -->
  <rect x="450" y="110" width="26" height="70" fill="#000"/>
  <text x="463" y="195" text-anchor="middle" fill="#000" font-size="10">low</text>
  <rect x="530" y="125" width="26" height="55" fill="#000"/>
  <text x="543" y="195" text-anchor="middle" fill="#000" font-size="10">mid</text>
  <rect x="610" y="100" width="26" height="80" fill="#000"/>
  <text x="623" y="195" text-anchor="middle" fill="#000" font-size="10">high</text>

  <!-- chord analogy band -->
  <line x1="50" y1="232" x2="670" y2="232" stroke="#000" stroke-width="1"/>
  <text x="360" y="258" text-anchor="middle" fill="#000" font-weight="bold">Music-chord analogy: a chord = several notes played at once.</text>
  <text x="360" y="282" text-anchor="middle" fill="#000" font-size="11">Each bar above is one note. Any wiggly signal is just a mix of frequencies, like a chord.</text>
  <text x="360" y="312" text-anchor="middle" fill="#000">The "frequencies present" picture reveals patterns invisible in the raw wiggles.</text>
  <text x="360" y="338" text-anchor="middle" fill="#000" font-size="11">That is why voice assistants and music apps work on a frequency picture, not the raw wave.</text>
  <text x="360" y="362" text-anchor="middle" fill="#000" font-size="11">(No math here, just the idea: split the sound into the notes inside it.)</text>
</svg>
