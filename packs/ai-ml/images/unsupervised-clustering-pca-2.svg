<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">k-means clustering: group points around k=3 centers</text>

  <text x="170" y="52" text-anchor="middle" font-weight="bold" fill="#000">Before: one pile of unlabeled points</text>
  <text x="470" y="52" text-anchor="middle" font-weight="bold" fill="#000">After: 3 groups, each with a center</text>

  <!-- arrow between panels -->
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- LEFT panel: scattered, no grouping -->
  <rect x="40" y="64" width="260" height="250" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="95" cy="110" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="120" cy="135" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="80" cy="150" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="110" cy="160" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="225" cy="115" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="250" cy="135" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="240" cy="160" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="215" cy="150" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="150" cy="250" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="175" cy="270" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="160" cy="285" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="190" cy="255" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="170" y="306" text-anchor="middle" fill="#000" font-size="11">no labels yet</text>

  <line x1="306" y1="190" x2="354" y2="190" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="330" y="178" text-anchor="middle" fill="#000" font-size="11">k=3</text>

  <!-- RIGHT panel: 3 groups, centers as X -->
  <rect x="360" y="64" width="260" height="250" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- group 1 (top-left) circle outline -->
  <circle cx="415" cy="135" r="42" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="5 4"/>
  <circle cx="395" cy="110" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="420" cy="135" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="400" cy="150" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="430" cy="160" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <!-- center X -->
  <line x1="408" y1="128" x2="422" y2="142" stroke="#000" stroke-width="3"/>
  <line x1="422" y1="128" x2="408" y2="142" stroke="#000" stroke-width="3"/>

  <!-- group 2 (top-right) -->
  <circle cx="545" cy="135" r="42" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="5 4"/>
  <circle cx="525" cy="115" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="555" cy="135" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="565" cy="155" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="535" cy="155" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="538" y1="128" x2="552" y2="142" stroke="#000" stroke-width="3"/>
  <line x1="552" y1="128" x2="538" y2="142" stroke="#000" stroke-width="3"/>

  <!-- group 3 (bottom-center) -->
  <circle cx="470" cy="255" r="42" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="5 4"/>
  <circle cx="450" cy="240" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="480" cy="245" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="465" cy="270" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="490" cy="270" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="463" y1="248" x2="477" y2="262" stroke="#000" stroke-width="3"/>
  <line x1="477" y1="248" x2="463" y2="262" stroke="#000" stroke-width="3"/>

  <text x="490" y="306" text-anchor="middle" fill="#000" font-size="11">X = group center (centroid)</text>

  <text x="320" y="338" text-anchor="middle" fill="#000" font-size="11">You pick k (here 3). The method finds k centers and assigns each point to its nearest center.</text>
  <text x="320" y="364" text-anchor="middle" fill="#000">It then re-places the centers and repeats until the groups stop changing (they settle).</text>
  <text x="320" y="390" text-anchor="middle" fill="#000" font-size="11">"Similar" depends on the features and their scale, so scaling the data matters.</text>
</svg>
