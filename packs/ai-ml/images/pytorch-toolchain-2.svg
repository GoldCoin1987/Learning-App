<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="360" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Autograd: you describe forward, the framework provides backward</text>

  <defs>
    <marker id="aht2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- YOU PROVIDE box -->
  <rect x="60" y="80" width="260" height="200" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="190" y="106" text-anchor="middle" fill="#000" font-weight="bold">YOU PROVIDE</text>
  <text x="190" y="124" text-anchor="middle" fill="#000" font-size="11">the forward calculation</text>

  <circle cx="120" cy="180" r="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="184" text-anchor="middle" fill="#000" font-size="11">in</text>
  <circle cx="190" cy="180" r="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="190" y="184" text-anchor="middle" fill="#000" font-size="11">layer</text>
  <circle cx="260" cy="180" r="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="260" y="184" text-anchor="middle" fill="#000" font-size="11">out</text>
  <line x1="140" y1="180" x2="170" y2="180" stroke="#000" stroke-width="2" marker-end="url(#aht2)"/>
  <line x1="210" y1="180" x2="240" y2="180" stroke="#000" stroke-width="2" marker-end="url(#aht2)"/>
  <text x="190" y="240" text-anchor="middle" fill="#000" font-size="11">"predict: push inputs through</text>
  <text x="190" y="256" text-anchor="middle" fill="#000" font-size="11">the layers to an answer"</text>

  <!-- AUTOGRAD PROVIDES box -->
  <rect x="400" y="80" width="260" height="200" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="530" y="106" text-anchor="middle" fill="#000" font-weight="bold">AUTOGRAD PROVIDES</text>
  <text x="530" y="124" text-anchor="middle" fill="#000" font-size="11">the backward gradients</text>

  <circle cx="600" cy="180" r="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="530" cy="180" r="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="460" cy="180" r="20" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="580" y1="180" x2="550" y2="180" stroke="#000" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aht2)"/>
  <line x1="510" y1="180" x2="480" y2="180" stroke="#000" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aht2)"/>
  <text x="530" y="240" text-anchor="middle" fill="#000" font-size="11">"which way is downhill for</text>
  <text x="530" y="256" text-anchor="middle" fill="#000" font-size="11">each weight" worked out for you</text>

  <!-- arrow between boxes -->
  <line x1="322" y1="180" x2="398" y2="180" stroke="#000" stroke-width="2" marker-end="url(#aht2)"/>
  <text x="360" y="170" text-anchor="middle" fill="#000" font-size="11">auto</text>

  <line x1="60" y1="304" x2="660" y2="304" stroke="#000" stroke-width="1"/>
  <text x="360" y="328" text-anchor="middle" fill="#000" font-weight="bold">You never hand-derive any calculus. Like a GPS that recomputes the route when you move.</text>
  <text x="360" y="350" text-anchor="middle" fill="#000" font-size="11">Gradients are the same "which way is downhill" idea from backprop, computed automatically.</text>
</svg>
