<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Supervised vs unsupervised: do we have the answers?</text>

  <!-- divider -->
  <line x1="320" y1="44" x2="320" y2="392" stroke="#000" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- LEFT: supervised, points already labeled -->
  <text x="160" y="62" text-anchor="middle" font-weight="bold" fill="#000">SUPERVISED</text>
  <text x="160" y="80" text-anchor="middle" fill="#000" font-size="11">data comes WITH labels (answers)</text>
  <rect x="40" y="92" width="240" height="220" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- group A: triangles (one labeled class) -->
  <path d="M85,140 l8,14 l-16,0 Z" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <path d="M115,165 l8,14 l-16,0 Z" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <path d="M80,185 l8,14 l-16,0 Z" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <path d="M120,205 l8,14 l-16,0 Z" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="100" y="245" text-anchor="middle" fill="#000" font-size="11">labeled "A"</text>

  <!-- group B: squares (another labeled class) -->
  <rect x="200" y="135" width="15" height="15" fill="#000"/>
  <rect x="225" y="160" width="15" height="15" fill="#000"/>
  <rect x="195" y="185" width="15" height="15" fill="#000"/>
  <rect x="230" y="205" width="15" height="15" fill="#000"/>
  <text x="222" y="245" text-anchor="middle" fill="#000" font-size="11">labeled "B"</text>

  <text x="160" y="295" text-anchor="middle" fill="#000" font-size="11">Each point already wears its answer.</text>

  <!-- RIGHT: unsupervised, same points, no labels -->
  <text x="480" y="62" text-anchor="middle" font-weight="bold" fill="#000">UNSUPERVISED</text>
  <text x="480" y="80" text-anchor="middle" fill="#000" font-size="11">NO labels: the algorithm must find groups</text>
  <rect x="360" y="92" width="240" height="220" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- same positions, but all identical plain dots (no class shown) -->
  <circle cx="405" cy="146" r="7" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="435" cy="171" r="7" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="400" cy="191" r="7" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="440" cy="211" r="7" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="520" cy="141" r="7" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="545" cy="166" r="7" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="515" cy="191" r="7" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="550" cy="211" r="7" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="480" y="245" text-anchor="middle" fill="#000" font-size="11">all the same: no answer given</text>

  <text x="480" y="295" text-anchor="middle" fill="#000" font-size="11">It groups by what looks similar, on its own.</text>

  <text x="320" y="334" text-anchor="middle" fill="#000" font-size="11">Same points, two worlds: with answers (supervised) vs without answers (unsupervised).</text>
  <text x="320" y="362" text-anchor="middle" fill="#000">Unsupervised learning = finding structure in data that has NO labels.</text>
  <text x="320" y="388" text-anchor="middle" fill="#000" font-size="11">Like sorting a box of uncaptioned photos into natural piles, with nobody telling you the piles.</text>
</svg>
