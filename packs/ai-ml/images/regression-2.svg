<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="380" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Error (residual): the gap between each dot and the line</text>

  <defs>
    <marker id="ahr2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="80" y1="300" x2="560" y2="300" stroke="#000" stroke-width="2" marker-end="url(#ahr2)"/>
  <line x1="80" y1="300" x2="80" y2="60" stroke="#000" stroke-width="2" marker-end="url(#ahr2)"/>
  <text x="320" y="338" text-anchor="middle" fill="#000">house size &#8594;</text>
  <text x="34" y="180" text-anchor="middle" fill="#000" transform="rotate(-90 34 180)">price &#8594;</text>

  <!-- best-fit line -->
  <line x1="110" y1="278" x2="520" y2="110" stroke="#000" stroke-width="3"/>
  <text x="470" y="150" text-anchor="start" fill="#000" font-weight="bold">prediction (line)</text>

  <!-- dots with vertical residual gaps to the line -->
  <!-- point 1: true above line -->
  <line x1="170" y1="222" x2="170" y2="256" stroke="#000" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="170" cy="222" r="5" fill="#000"/>
  <!-- point 2: true below line -->
  <line x1="250" y1="226" x2="250" y2="178" stroke="#000" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="250" cy="178" r="5" fill="#000"/>
  <!-- point 3 -->
  <line x1="330" y1="192" x2="330" y2="226" stroke="#000" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="330" cy="226" r="5" fill="#000"/>
  <!-- point 4 -->
  <line x1="410" y1="174" x2="410" y2="138" stroke="#000" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="410" cy="138" r="5" fill="#000"/>

  <!-- call-out for the gap -->
  <text x="182" y="245" text-anchor="start" fill="#000" font-size="11">error = gap</text>

  <text x="320" y="358" text-anchor="middle" fill="#000">Square every gap (so big misses count more) and add them up: that total is the error.</text>
  <text x="320" y="374" text-anchor="middle" fill="#000" font-weight="bold">The best line is the one with the smallest total squared error.</text>
</svg>
