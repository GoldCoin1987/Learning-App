<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="700" height="460" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Shrinking a big model to fit a tiny chip</text>

  <defs>
    <marker id="ahe3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- big model -->
  <rect x="40" y="60" width="120" height="120" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="100" y="48" text-anchor="middle" fill="#000" font-size="11">BIG model</text>
  <text x="100" y="120" text-anchor="middle" fill="#000" font-size="11">too large for</text>
  <text x="100" y="136" text-anchor="middle" fill="#000" font-size="11">a tiny device</text>

  <!-- arrow to shrink -->
  <line x1="165" y1="120" x2="215" y2="120" stroke="#000" stroke-width="2" marker-end="url(#ahe3)"/>
  <text x="190" y="110" text-anchor="middle" fill="#000" font-size="10">shrink</text>

  <!-- small model -->
  <rect x="220" y="92" width="56" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="248" y="124" text-anchor="middle" fill="#000" font-size="10">small</text>
  <text x="248" y="166" text-anchor="middle" fill="#000" font-size="10">fits the chip</text>

  <!-- tiny chip -->
  <rect x="320" y="98" width="44" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="320" y1="108" x2="312" y2="108" stroke="#000" stroke-width="1.5"/>
  <line x1="320" y1="120" x2="312" y2="120" stroke="#000" stroke-width="1.5"/>
  <line x1="320" y1="132" x2="312" y2="132" stroke="#000" stroke-width="1.5"/>
  <line x1="364" y1="108" x2="372" y2="108" stroke="#000" stroke-width="1.5"/>
  <line x1="364" y1="120" x2="372" y2="120" stroke="#000" stroke-width="1.5"/>
  <line x1="364" y1="132" x2="372" y2="132" stroke="#000" stroke-width="1.5"/>
  <text x="342" y="124" text-anchor="middle" fill="#000" font-size="9">chip</text>
  <line x1="280" y1="120" x2="316" y2="120" stroke="#000" stroke-width="2" marker-end="url(#ahe3)"/>

  <!-- THREE WAYS panels -->
  <text x="350" y="212" text-anchor="middle" font-weight="bold" fill="#000">Three plain ways to shrink it</text>

  <!-- Quantization -->
  <rect x="40" y="230" width="195" height="150" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="137" y="252" text-anchor="middle" font-weight="bold" fill="#000" font-size="12">QUANTIZATION</text>
  <text x="137" y="272" text-anchor="middle" fill="#000" font-size="10">use lower-precision numbers</text>
  <text x="60" y="300" fill="#000" font-size="11">3.14159265  ->  3</text>
  <text x="60" y="320" fill="#000" font-size="11">long decimals -> small</text>
  <text x="60" y="334" fill="#000" font-size="11">whole numbers</text>
  <text x="137" y="362" text-anchor="middle" fill="#000" font-size="10">like saving a photo at lower</text>
  <text x="137" y="375" text-anchor="middle" fill="#000" font-size="10">(but still fine) quality</text>

  <!-- Pruning -->
  <rect x="252" y="230" width="196" height="150" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="350" y="252" text-anchor="middle" font-weight="bold" fill="#000" font-size="12">PRUNING</text>
  <text x="350" y="272" text-anchor="middle" fill="#000" font-size="10">cut connections that barely matter</text>
  <!-- mini net before -->
  <circle cx="290" cy="305" r="6" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <circle cx="290" cy="335" r="6" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <circle cx="350" cy="320" r="6" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <line x1="296" y1="305" x2="344" y2="320" stroke="#000" stroke-width="1.5"/>
  <line x1="296" y1="335" x2="344" y2="320" stroke="#000" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="372" y="318" fill="#000" font-size="10">keep strong</text>
  <text x="372" y="340" fill="#000" font-size="10">cut weak (- - -)</text>
  <text x="350" y="372" text-anchor="middle" fill="#000" font-size="10">trim the dead weight</text>

  <!-- Distillation -->
  <rect x="465" y="230" width="195" height="150" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="562" y="252" text-anchor="middle" font-weight="bold" fill="#000" font-size="12">DISTILLATION</text>
  <text x="562" y="272" text-anchor="middle" fill="#000" font-size="10">small student copies big teacher</text>
  <rect x="485" y="292" width="50" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="510" y="316" text-anchor="middle" fill="#000" font-size="9">teacher</text>
  <rect x="590" y="300" width="30" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="605" y="317" text-anchor="middle" fill="#000" font-size="8">student</text>
  <line x1="535" y1="312" x2="586" y2="312" stroke="#000" stroke-width="2" marker-end="url(#ahe3)"/>
  <text x="562" y="350" text-anchor="middle" fill="#000" font-size="10">student learns to imitate</text>
  <text x="562" y="363" text-anchor="middle" fill="#000" font-size="10">most of the skill, tiny size</text>

  <text x="350" y="408" text-anchor="middle" fill="#000" font-weight="bold">All three make the model SMALLER and faster, with little accuracy lost.</text>
  <text x="350" y="430" text-anchor="middle" fill="#000" font-size="11">(Plus: efficient model designs and special low-power AI chips, called NPUs/accelerators.)</text>
</svg>
