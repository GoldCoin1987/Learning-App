<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="360" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Tensors: just grids of numbers, of different shapes</text>

  <defs>
    <marker id="aht1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- 1: single number -->
  <text x="80" y="70" text-anchor="middle" fill="#000" font-weight="bold">A single number</text>
  <rect x="55" y="85" width="50" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="80" y="116" text-anchor="middle" fill="#000">7</text>

  <!-- 2: a row (list) -->
  <text x="250" y="70" text-anchor="middle" fill="#000" font-weight="bold">A row (a list)</text>
  <rect x="180" y="85" width="40" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="220" y="85" width="40" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="260" y="85" width="40" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="200" y="110" text-anchor="middle" fill="#000">3</text>
  <text x="240" y="110" text-anchor="middle" fill="#000">1</text>
  <text x="280" y="110" text-anchor="middle" fill="#000">4</text>

  <!-- 3: a table (grid) -->
  <text x="460" y="70" text-anchor="middle" fill="#000" font-weight="bold">A table (a grid)</text>
  <rect x="400" y="85" width="35" height="35" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="435" y="85" width="35" height="35" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="470" y="85" width="35" height="35" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="400" y="120" width="35" height="35" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="435" y="120" width="35" height="35" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="470" y="120" width="35" height="35" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="400" y="155" width="35" height="35" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="435" y="155" width="35" height="35" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="470" y="155" width="35" height="35" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- 4: a stack of tables (an image) -->
  <text x="650" y="70" text-anchor="middle" fill="#000" font-weight="bold">A stack of tables</text>
  <rect x="585" y="100" width="110" height="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="575" y="90" width="110" height="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="565" y="80" width="110" height="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="565" y1="110" x2="675" y2="110" stroke="#000" stroke-width="1"/>
  <line x1="565" y1="140" x2="675" y2="140" stroke="#000" stroke-width="1"/>
  <line x1="595" y1="80" x2="595" y2="170" stroke="#000" stroke-width="1"/>
  <line x1="625" y1="80" x2="625" y2="170" stroke="#000" stroke-width="1"/>
  <line x1="655" y1="80" x2="655" y2="170" stroke="#000" stroke-width="1"/>

  <!-- arrows showing "more dimensions" -->
  <line x1="115" y1="110" x2="170" y2="110" stroke="#000" stroke-width="2" marker-end="url(#aht1)"/>
  <line x1="310" y1="110" x2="390" y2="110" stroke="#000" stroke-width="2" marker-end="url(#aht1)"/>
  <line x1="515" y1="135" x2="555" y2="135" stroke="#000" stroke-width="2" marker-end="url(#aht1)"/>

  <text x="380" y="235" text-anchor="middle" fill="#000">Each step just adds another dimension. A photo is a grid of pixel numbers;</text>
  <text x="380" y="253" text-anchor="middle" fill="#000">a batch of photos is a stack of those grids.</text>

  <line x1="60" y1="280" x2="700" y2="280" stroke="#000" stroke-width="1"/>
  <text x="380" y="305" text-anchor="middle" fill="#000" font-weight="bold">A tensor is just a multi-dimensional grid of numbers, nothing exotic.</text>
  <text x="380" y="327" text-anchor="middle" fill="#000" font-size="11">It is the data container everything in a neural network flows through.</text>
</svg>
