<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 470" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="700" height="470" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The MLOps lifecycle: a loop, not a finish line</text>

  <defs>
    <marker id="ahm5" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- five stage boxes arranged around a cycle -->
  <!-- 1 collect data (top-left) -->
  <rect x="120" y="70" width="130" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="185" y="94" text-anchor="middle" fill="#000" font-weight="bold">1. Collect data</text>
  <text x="185" y="112" text-anchor="middle" fill="#000" font-size="11">gather examples</text>

  <!-- 2 train (top-right) -->
  <rect x="450" y="70" width="130" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="515" y="94" text-anchor="middle" fill="#000" font-weight="bold">2. Train</text>
  <text x="515" y="112" text-anchor="middle" fill="#000" font-size="11">fit the model</text>

  <!-- 3 deploy (right) -->
  <rect x="500" y="200" width="130" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="565" y="224" text-anchor="middle" fill="#000" font-weight="bold">3. Deploy</text>
  <text x="565" y="242" text-anchor="middle" fill="#000" font-size="11">make it usable</text>

  <!-- 4 monitor (bottom) -->
  <rect x="285" y="320" width="130" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="350" y="344" text-anchor="middle" fill="#000" font-weight="bold">4. Monitor</text>
  <text x="350" y="362" text-anchor="middle" fill="#000" font-size="11">watch live results</text>

  <!-- 5 retrain (left) -->
  <rect x="70" y="200" width="130" height="56" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="135" y="224" text-anchor="middle" fill="#000" font-weight="bold">5. Retrain</text>
  <text x="135" y="242" text-anchor="middle" fill="#000" font-size="11">on fresh data</text>

  <!-- arrows around the loop -->
  <line x1="250" y1="98" x2="450" y2="98" stroke="#000" stroke-width="2" marker-end="url(#ahm5)"/>
  <line x1="540" y1="126" x2="565" y2="200" stroke="#000" stroke-width="2" marker-end="url(#ahm5)"/>
  <line x1="520" y1="256" x2="415" y2="335" stroke="#000" stroke-width="2" marker-end="url(#ahm5)"/>
  <line x1="285" y1="345" x2="180" y2="256" stroke="#000" stroke-width="2" marker-end="url(#ahm5)"/>
  <line x1="160" y1="200" x2="185" y2="126" stroke="#000" stroke-width="2" marker-end="url(#ahm5)"/>

  <!-- drift label on the monitor->retrain arrow -->
  <text x="205" y="312" text-anchor="middle" fill="#000" font-size="11">drift detected:</text>
  <text x="205" y="328" text-anchor="middle" fill="#000" font-size="11">go around again</text>

  <!-- redeploy note -->
  <text x="350" y="218" text-anchor="middle" fill="#000" font-size="11">retrain then REDEPLOY</text>
  <text x="350" y="236" text-anchor="middle" fill="#000" font-size="11">the new model</text>

  <text x="350" y="414" text-anchor="middle" fill="#000">ML is never "done": it is a maintained loop, often automated with pipelines.</text>
  <text x="350" y="438" text-anchor="middle" fill="#000" font-size="11">Along the way: testing, rollback if a new model is worse, and A/B testing (try it on a slice of traffic first).</text>
  <text x="350" y="460" text-anchor="middle" fill="#000" font-weight="bold">Collect -&gt; train -&gt; deploy -&gt; monitor -&gt; retrain -&gt; redeploy, forever.</text>
</svg>
