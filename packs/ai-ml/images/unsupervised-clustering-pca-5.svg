<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Choosing k: too few, just right, too many</text>

  <text x="320" y="50" text-anchor="middle" fill="#000" font-size="11">The same three natural clumps of points, grouped three different ways.</text>

  <!-- PANEL 1: too few (k=2) -->
  <text x="130" y="76" text-anchor="middle" font-weight="bold" fill="#000">k = 2 (too few)</text>
  <rect x="30" y="84" width="200" height="200" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <!-- one loop swallows two real clumps -->
  <ellipse cx="95" cy="150" rx="58" ry="48" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="75" cy="130" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="95" cy="140" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="80" cy="160" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="115" cy="135" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="125" cy="165" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="100" cy="175" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <ellipse cx="150" cy="235" rx="44" ry="34" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="135" cy="225" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="160" cy="230" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="150" cy="248" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="130" y="305" text-anchor="middle" fill="#000" font-size="10.5">two real groups merged into one</text>

  <!-- PANEL 2: just right (k=3) -->
  <text x="320" y="76" text-anchor="middle" font-weight="bold" fill="#000">k = 3 (just right)</text>
  <rect x="220" y="84" width="200" height="200" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="280" cy="135" r="30" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="270" cy="128" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="290" cy="132" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="280" cy="148" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="365" cy="150" r="30" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="355" cy="143" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="375" cy="147" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="365" cy="162" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="320" cy="230" r="30" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="310" cy="223" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="330" cy="227" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="320" cy="242" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="320" y="305" text-anchor="middle" fill="#000" font-size="10.5">each natural clump is its own group</text>

  <!-- PANEL 3: too many (k=6) -->
  <text x="510" y="76" text-anchor="middle" font-weight="bold" fill="#000">k = 6 (too many)</text>
  <rect x="410" y="84" width="200" height="200" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <!-- one real clump sliced into pieces -->
  <circle cx="465" cy="130" r="16" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="465" cy="130" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="500" cy="140" r="16" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="500" cy="140" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="483" cy="165" r="16" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="483" cy="165" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="545" cy="150" r="16" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="545" cy="150" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="500" cy="225" r="16" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="500" cy="225" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="535" cy="235" r="16" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="535" cy="235" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="510" y="305" text-anchor="middle" fill="#000" font-size="10.5">one real group split into pieces</text>

  <text x="320" y="346" text-anchor="middle" fill="#000" font-size="11">Too few groups merge distinct clumps; too many split a single clump apart.</text>
  <text x="320" y="372" text-anchor="middle" fill="#000">Picking a sensible k is part of the work, and "similar" depends on the features used.</text>
  <text x="320" y="398" text-anchor="middle" fill="#000" font-size="11">With no labels, you lean on judgment and what the groups are for, not a single right answer.</text>
</svg>
