<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="380" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Decision boundary: a straight line splitting two classes</text>

  <defs>
    <marker id="ahr5" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="80" y1="310" x2="560" y2="310" stroke="#000" stroke-width="2" marker-end="url(#ahr5)"/>
  <line x1="80" y1="310" x2="80" y2="60" stroke="#000" stroke-width="2" marker-end="url(#ahr5)"/>
  <text x="320" y="344" text-anchor="middle" fill="#000">feature 1 (e.g. hours studied) &#8594;</text>
  <text x="34" y="190" text-anchor="middle" fill="#000" transform="rotate(-90 34 190)">feature 2 &#8594;</text>

  <!-- straight decision boundary -->
  <line x1="120" y1="300" x2="500" y2="90" stroke="#000" stroke-width="3"/>
  <text x="468" y="84" text-anchor="middle" fill="#000" font-weight="bold" font-size="11">decision boundary</text>

  <!-- class A: open circles (one side, "fail") -->
  <circle cx="140" cy="150" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="180" cy="120" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="210" cy="170" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="160" cy="200" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="240" cy="130" r="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="180" y="240" text-anchor="middle" fill="#000" font-size="11">class: "fail"</text>

  <!-- class B: filled squares (other side, "pass") -->
  <rect x="360" y="244" width="12" height="12" fill="#000"/>
  <rect x="410" y="214" width="12" height="12" fill="#000"/>
  <rect x="440" y="264" width="12" height="12" fill="#000"/>
  <rect x="390" y="284" width="12" height="12" fill="#000"/>
  <rect x="470" y="224" width="12" height="12" fill="#000"/>
  <text x="430" y="300" text-anchor="middle" fill="#000" font-size="11">class: "pass"</text>

  <text x="320" y="364" text-anchor="middle" fill="#000">Logistic regression draws a straight boundary; points fall on one side or the other to decide the class.</text>
</svg>
