<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="360" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">From raw next-word predictor to helpful assistant</text>

  <defs>
    <marker id="ahdL2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Stage 1: pretraining -->
  <rect x="40" y="90" width="200" height="120" rx="8" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="140" y="116" text-anchor="middle" fill="#000" font-weight="bold" font-size="13">1. PRETRAINING</text>
  <text x="140" y="138" text-anchor="middle" fill="#000" font-size="11">Read huge amounts of</text>
  <text x="140" y="154" text-anchor="middle" fill="#000" font-size="11">internet text; learn to</text>
  <text x="140" y="170" text-anchor="middle" fill="#000" font-size="11">predict the next token.</text>
  <text x="140" y="192" text-anchor="middle" fill="#000" font-size="10">Result: a "raw" model that</text>
  <text x="140" y="205" text-anchor="middle" fill="#000" font-size="10">knows language, not manners.</text>

  <!-- arrow -->
  <line x1="240" y1="150" x2="290" y2="150" stroke="#000" stroke-width="2.5" marker-end="url(#ahdL2)"/>

  <!-- Stage 2: fine-tuning / RLHF -->
  <rect x="290" y="90" width="200" height="120" rx="8" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="390" y="114" text-anchor="middle" fill="#000" font-weight="bold" font-size="13">2. FINE-TUNING</text>
  <text x="390" y="130" text-anchor="middle" fill="#000" font-size="11">+ human feedback (RLHF)</text>
  <text x="390" y="152" text-anchor="middle" fill="#000" font-size="11">People show good answers</text>
  <text x="390" y="168" text-anchor="middle" fill="#000" font-size="11">and rate the model's replies;</text>
  <text x="390" y="184" text-anchor="middle" fill="#000" font-size="11">it is nudged toward helpful,</text>
  <text x="390" y="200" text-anchor="middle" fill="#000" font-size="11">honest, harmless answers.</text>

  <!-- arrow -->
  <line x1="490" y1="150" x2="540" y2="150" stroke="#000" stroke-width="2.5" marker-end="url(#ahdL2)"/>

  <!-- Stage 3: assistant -->
  <rect x="540" y="90" width="180" height="120" rx="8" fill="#ffffff" stroke="#000" stroke-width="3"/>
  <text x="630" y="124" text-anchor="middle" fill="#000" font-weight="bold" font-size="13">3. ASSISTANT</text>
  <text x="630" y="150" text-anchor="middle" fill="#000" font-size="11">A polite, helpful</text>
  <text x="630" y="166" text-anchor="middle" fill="#000" font-size="11">chat assistant that</text>
  <text x="630" y="182" text-anchor="middle" fill="#000" font-size="11">follows instructions.</text>

  <text x="380" y="252" text-anchor="middle" fill="#000" font-size="11" font-weight="bold">Same model underneath; the extra training teaches it HOW to be useful, not WHAT language is.</text>

  <!-- analogy -->
  <rect x="120" y="270" width="520" height="40" rx="6" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="380" y="287" text-anchor="middle" fill="#000" font-size="11">Like a brilliant generalist who has read everything,</text>
  <text x="380" y="303" text-anchor="middle" fill="#000" font-size="11">then gets job training and coaching on how to be helpful and polite.</text>

  <line x1="60" y1="328" x2="700" y2="328" stroke="#000" stroke-width="1"/>
  <text x="380" y="348" text-anchor="middle" fill="#000" font-size="11">Pretraining learns language from the internet; fine-tuning/RLHF turns that raw model into a chat assistant.</text>
</svg>
