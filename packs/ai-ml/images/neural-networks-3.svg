<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Each layer builds on the last: edges, then shapes, then a face</text>

  <defs>
    <marker id="ahn3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- STAGE 1: edges -->
  <text x="130" y="80" text-anchor="middle" fill="#000" font-weight="bold">early layers</text>
  <text x="130" y="98" text-anchor="middle" fill="#000" font-size="11">simple edges</text>
  <rect x="70" y="110" width="120" height="120" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="90" y1="130" x2="170" y2="130" stroke="#000" stroke-width="2"/>
  <line x1="100" y1="150" x2="100" y2="210" stroke="#000" stroke-width="2"/>
  <line x1="120" y1="155" x2="165" y2="200" stroke="#000" stroke-width="2"/>
  <line x1="140" y1="210" x2="140" y2="150" stroke="#000" stroke-width="2"/>

  <!-- arrow -->
  <line x1="195" y1="170" x2="265" y2="170" stroke="#000" stroke-width="2" marker-end="url(#ahn3)"/>

  <!-- STAGE 2: shapes -->
  <text x="350" y="80" text-anchor="middle" fill="#000" font-weight="bold">middle layers</text>
  <text x="350" y="98" text-anchor="middle" fill="#000" font-size="11">combine into shapes</text>
  <rect x="290" y="110" width="120" height="120" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="325" cy="150" r="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="375" cy="150" r="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="335" y="170" width="30" height="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <path d="M325,205 Q350,222 375,205" fill="none" stroke="#000" stroke-width="2"/>

  <!-- arrow -->
  <line x1="415" y1="170" x2="485" y2="170" stroke="#000" stroke-width="2" marker-end="url(#ahn3)"/>

  <!-- STAGE 3: face -->
  <text x="570" y="80" text-anchor="middle" fill="#000" font-weight="bold">later layers</text>
  <text x="570" y="98" text-anchor="middle" fill="#000" font-size="11">combine into a face</text>
  <rect x="510" y="110" width="120" height="120" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="570" cy="170" r="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="552" cy="158" r="6" fill="#000"/>
  <circle cx="588" cy="158" r="6" fill="#000"/>
  <line x1="570" y1="166" x2="570" y2="182" stroke="#000" stroke-width="2"/>
  <path d="M550,196 Q570,210 590,196" fill="none" stroke="#000" stroke-width="2"/>

  <!-- takeaways -->
  <line x1="50" y1="262" x2="670" y2="262" stroke="#000" stroke-width="1"/>
  <text x="360" y="288" text-anchor="middle" fill="#000" font-weight="bold">Early layers detect simple things; later layers combine them into complex ones.</text>
  <text x="360" y="312" text-anchor="middle" fill="#000" font-size="11">This build-up is why depth (more layers) lets a network learn rich, complicated patterns.</text>
  <text x="360" y="336" text-anchor="middle" fill="#000" font-size="11">More layers is not automatically better; it just gives the network room to build up such patterns.</text>
</svg>
