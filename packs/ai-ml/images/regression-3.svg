<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="380" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Gradient descent: roll downhill to the smallest error</text>

  <defs>
    <marker id="ahr3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="70" y1="300" x2="590" y2="300" stroke="#000" stroke-width="2" marker-end="url(#ahr3)"/>
  <line x1="70" y1="300" x2="70" y2="60" stroke="#000" stroke-width="2" marker-end="url(#ahr3)"/>
  <text x="330" y="334" text-anchor="middle" fill="#000">the knob settings (slope &amp; intercept) &#8594;</text>
  <text x="30" y="180" text-anchor="middle" fill="#000" transform="rotate(-90 30 180)">error &#8594;</text>

  <!-- U-shaped valley -->
  <path d="M 110 90 Q 330 430 550 90" fill="none" stroke="#000" stroke-width="3"/>

  <!-- lowest point marker -->
  <circle cx="330" cy="278" r="4" fill="#000"/>
  <text x="330" y="296" text-anchor="middle" fill="#000" font-size="11">lowest point = best line</text>

  <!-- small steps rolling down (good) -->
  <circle cx="200" cy="196" r="9" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <line x1="212" y1="206" x2="246" y2="234" stroke="#000" stroke-width="2" marker-end="url(#ahr3)"/>
  <line x1="262" y1="246" x2="292" y2="262" stroke="#000" stroke-width="2" marker-end="url(#ahr3)"/>
  <text x="150" y="180" text-anchor="middle" fill="#000" font-weight="bold" font-size="11">small steps:</text>
  <text x="150" y="194" text-anchor="middle" fill="#000" font-size="11">steady, reaches</text>
  <text x="150" y="208" text-anchor="middle" fill="#000" font-size="11">the bottom</text>

  <!-- too-big step overshoots (bad) -->
  <path d="M 470 150 C 380 360 300 360 220 140" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ahr3)"/>
  <text x="500" y="150" text-anchor="middle" fill="#000" font-weight="bold" font-size="11">too-big step:</text>
  <text x="500" y="164" text-anchor="middle" fill="#000" font-size="11">overshoots,</text>
  <text x="500" y="178" text-anchor="middle" fill="#000" font-size="11">bounces across</text>

  <text x="320" y="358" text-anchor="middle" fill="#000">The step size is the LEARNING RATE: too big overshoots and bounces; too small is painfully slow.</text>
  <text x="320" y="374" text-anchor="middle" fill="#000">Start at a random spot, nudge the knobs downhill, repeat &#8212; like walking downhill in fog.</text>
</svg>
