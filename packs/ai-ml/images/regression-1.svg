<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="380" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Linear regression: the best-fit line predicts a number</text>

  <defs>
    <marker id="ahr1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="80" y1="300" x2="560" y2="300" stroke="#000" stroke-width="2" marker-end="url(#ahr1)"/>
  <line x1="80" y1="300" x2="80" y2="60" stroke="#000" stroke-width="2" marker-end="url(#ahr1)"/>
  <text x="320" y="338" text-anchor="middle" fill="#000">house size (square feet) &#8594;</text>
  <text x="34" y="180" text-anchor="middle" fill="#000" transform="rotate(-90 34 180)">price ($) &#8594;</text>

  <!-- scattered data dots -->
  <circle cx="130" cy="268" r="5" fill="#000"/>
  <circle cx="170" cy="250" r="5" fill="#000"/>
  <circle cx="210" cy="242" r="5" fill="#000"/>
  <circle cx="250" cy="214" r="5" fill="#000"/>
  <circle cx="290" cy="206" r="5" fill="#000"/>
  <circle cx="330" cy="180" r="5" fill="#000"/>
  <circle cx="370" cy="172" r="5" fill="#000"/>
  <circle cx="410" cy="150" r="5" fill="#000"/>
  <circle cx="450" cy="128" r="5" fill="#000"/>

  <!-- best-fit straight line -->
  <line x1="110" y1="280" x2="520" y2="96" stroke="#000" stroke-width="3"/>
  <text x="470" y="150" text-anchor="start" fill="#000" font-weight="bold">best-fit line = the model</text>

  <!-- a new house: read its predicted price off the line -->
  <line x1="490" y1="300" x2="490" y2="110" stroke="#000" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="80" y1="110" x2="490" y2="110" stroke="#000" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="490" cy="110" r="6" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="490" y="316" text-anchor="middle" fill="#000" font-size="11">new house size</text>
  <text x="86" y="102" text-anchor="start" fill="#000" font-size="11">predicted price</text>

  <text x="320" y="362" text-anchor="middle" fill="#000">Each dot is one real house. The line follows the dots; read a new house's price off it.</text>
</svg>
