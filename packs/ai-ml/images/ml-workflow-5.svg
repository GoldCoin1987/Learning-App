<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Always beat a simple baseline first</text>

  <!-- y axis -->
  <line x1="90" y1="60" x2="90" y2="280" stroke="#000" stroke-width="2"/>
  <!-- x axis -->
  <line x1="90" y1="280" x2="500" y2="280" stroke="#000" stroke-width="2"/>
  <text x="40" y="170" text-anchor="middle" fill="#000" font-size="11" transform="rotate(-90 40 170)">accuracy (higher is better)</text>

  <!-- y ticks -->
  <line x1="85" y1="280" x2="90" y2="280" stroke="#000" stroke-width="2"/>
  <text x="78" y="284" text-anchor="end" fill="#000" font-size="10">0%</text>
  <line x1="85" y1="170" x2="90" y2="170" stroke="#000" stroke-width="2"/>
  <text x="78" y="174" text-anchor="end" fill="#000" font-size="10">50%</text>
  <line x1="85" y1="60" x2="90" y2="60" stroke="#000" stroke-width="2"/>
  <text x="78" y="64" text-anchor="end" fill="#000" font-size="10">100%</text>

  <!-- baseline bar: ~60% -->
  <rect x="150" y="148" width="90" height="132" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="195" y="300" text-anchor="middle" fill="#000" font-size="11">Baseline</text>
  <text x="195" y="316" text-anchor="middle" fill="#000" font-size="10">(always guess</text>
  <text x="195" y="330" text-anchor="middle" fill="#000" font-size="10">most common)</text>
  <text x="195" y="142" text-anchor="middle" fill="#000" font-size="11">60%</text>

  <!-- model bar: ~85% -->
  <rect x="320" y="93" width="90" height="187" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="365" y="300" text-anchor="middle" fill="#000" font-size="11">Your model</text>
  <text x="365" y="87" text-anchor="middle" fill="#000" font-size="11">85%</text>

  <!-- dashed line at baseline level across to model -->
  <line x1="240" y1="148" x2="410" y2="148" stroke="#000" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="280" y="350" text-anchor="middle" fill="#000" font-weight="bold">If the model can't beat the baseline, it isn't really learning.</text>
</svg>
