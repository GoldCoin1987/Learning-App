<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="660" height="300" fill="#ffffff"/>
  <text x="330" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A short history of AI (and why now)</text>

  <defs>
    <marker id="ah5" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- timeline -->
  <line x1="40" y1="150" x2="630" y2="150" stroke="#000" stroke-width="2" marker-end="url(#ah5)"/>

  <!-- 1958 perceptron -->
  <line x1="90" y1="142" x2="90" y2="158" stroke="#000" stroke-width="2"/>
  <text x="90" y="132" text-anchor="middle" font-weight="bold" fill="#000">1958</text>
  <text x="90" y="178" text-anchor="middle" fill="#000">perceptron</text>
  <text x="90" y="194" text-anchor="middle" fill="#000">(first neuron)</text>

  <!-- AI winters -->
  <line x1="230" y1="142" x2="230" y2="158" stroke="#000" stroke-width="2"/>
  <text x="230" y="132" text-anchor="middle" font-weight="bold" fill="#000">1970s-80s</text>
  <text x="230" y="178" text-anchor="middle" fill="#000">"AI winters"</text>
  <text x="230" y="194" text-anchor="middle" fill="#000">overpromise,</text>
  <text x="230" y="210" text-anchor="middle" fill="#000">funding dries up</text>

  <!-- 2012 deep learning -->
  <line x1="390" y1="142" x2="390" y2="158" stroke="#000" stroke-width="2"/>
  <text x="390" y="132" text-anchor="middle" font-weight="bold" fill="#000">2012</text>
  <text x="390" y="178" text-anchor="middle" fill="#000">deep learning</text>
  <text x="390" y="194" text-anchor="middle" fill="#000">wins at image</text>
  <text x="390" y="210" text-anchor="middle" fill="#000">recognition</text>

  <!-- 2017 transformer -->
  <line x1="510" y1="142" x2="510" y2="158" stroke="#000" stroke-width="2"/>
  <text x="510" y="132" text-anchor="middle" font-weight="bold" fill="#000">2017</text>
  <text x="510" y="178" text-anchor="middle" fill="#000">transformer</text>
  <text x="510" y="194" text-anchor="middle" fill="#000">invented</text>

  <!-- today LLMs -->
  <line x1="610" y1="142" x2="610" y2="158" stroke="#000" stroke-width="2"/>
  <text x="610" y="132" text-anchor="middle" font-weight="bold" fill="#000">2020s</text>
  <text x="610" y="178" text-anchor="middle" fill="#000">chatbots</text>
  <text x="610" y="194" text-anchor="middle" fill="#000">/ LLMs</text>

  <text x="330" y="258" text-anchor="middle" fill="#000" font-weight="bold">Why now = lots of data + powerful chips (GPUs) + algorithm breakthroughs.</text>
  <text x="330" y="282" text-anchor="middle" fill="#000">Progress came in bursts, not a steady climb.</text>
</svg>
