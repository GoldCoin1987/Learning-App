<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Random forest: many trees each vote, majority wins</text>

  <defs>
    <marker id="ah4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- TREE 1 -->
  <line x1="100" y1="80" x2="70" y2="120" stroke="#000" stroke-width="2"/>
  <line x1="100" y1="80" x2="130" y2="120" stroke="#000" stroke-width="2"/>
  <line x1="70" y1="120" x2="55" y2="155" stroke="#000" stroke-width="2"/>
  <line x1="70" y1="120" x2="90" y2="155" stroke="#000" stroke-width="2"/>
  <circle cx="100" cy="74" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="130" cy="124" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="55" cy="159" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="90" cy="159" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="100" y="184" text-anchor="middle" fill="#000" font-size="11">Tree 1</text>
  <rect x="62" y="192" width="76" height="26" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="100" y="210" text-anchor="middle" fill="#000" font-weight="bold">"Cat"</text>

  <!-- TREE 2 -->
  <line x1="250" y1="80" x2="220" y2="120" stroke="#000" stroke-width="2"/>
  <line x1="250" y1="80" x2="280" y2="120" stroke="#000" stroke-width="2"/>
  <line x1="280" y1="120" x2="265" y2="155" stroke="#000" stroke-width="2"/>
  <line x1="280" y1="120" x2="300" y2="155" stroke="#000" stroke-width="2"/>
  <circle cx="250" cy="74" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="220" cy="124" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="265" cy="159" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="300" cy="159" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="250" y="184" text-anchor="middle" fill="#000" font-size="11">Tree 2</text>
  <rect x="212" y="192" width="76" height="26" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="250" y="210" text-anchor="middle" fill="#000" font-weight="bold">"Dog"</text>

  <!-- TREE 3 -->
  <line x1="400" y1="80" x2="370" y2="120" stroke="#000" stroke-width="2"/>
  <line x1="400" y1="80" x2="430" y2="120" stroke="#000" stroke-width="2"/>
  <line x1="370" y1="120" x2="355" y2="155" stroke="#000" stroke-width="2"/>
  <line x1="370" y1="120" x2="390" y2="155" stroke="#000" stroke-width="2"/>
  <circle cx="400" cy="74" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="430" cy="124" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="355" cy="159" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="390" cy="159" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="400" y="184" text-anchor="middle" fill="#000" font-size="11">Tree 3</text>
  <rect x="362" y="192" width="76" height="26" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="400" y="210" text-anchor="middle" fill="#000" font-weight="bold">"Cat"</text>

  <!-- TREE 4 -->
  <line x1="550" y1="80" x2="520" y2="120" stroke="#000" stroke-width="2"/>
  <line x1="550" y1="80" x2="580" y2="120" stroke="#000" stroke-width="2"/>
  <line x1="520" y1="120" x2="505" y2="155" stroke="#000" stroke-width="2"/>
  <line x1="520" y1="120" x2="540" y2="155" stroke="#000" stroke-width="2"/>
  <circle cx="550" cy="74" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="580" cy="124" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="505" cy="159" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="540" cy="159" r="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="550" y="184" text-anchor="middle" fill="#000" font-size="11">Tree 4</text>
  <rect x="512" y="192" width="76" height="26" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="550" y="210" text-anchor="middle" fill="#000" font-weight="bold">"Cat"</text>

  <text x="320" y="238" text-anchor="middle" fill="#000" font-size="11">Each tree trains on its own random slice of the data and features, so they differ.</text>

  <!-- arrows down to vote box -->
  <line x1="100" y1="222" x2="270" y2="288" stroke="#000" stroke-width="1.5" marker-end="url(#ah4)"/>
  <line x1="250" y1="222" x2="305" y2="288" stroke="#000" stroke-width="1.5" marker-end="url(#ah4)"/>
  <line x1="400" y1="222" x2="335" y2="288" stroke="#000" stroke-width="1.5" marker-end="url(#ah4)"/>
  <line x1="550" y1="222" x2="370" y2="288" stroke="#000" stroke-width="1.5" marker-end="url(#ah4)"/>

  <!-- vote tally box -->
  <rect x="200" y="292" width="240" height="56" rx="10" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="320" y="316" text-anchor="middle" fill="#000">Count the votes: Cat 3, Dog 1</text>
  <text x="320" y="338" text-anchor="middle" fill="#000" font-weight="bold">Forest answer: "Cat"</text>

  <text x="320" y="378" text-anchor="middle" fill="#000" font-size="11">A panel of varied experts voting beats one expert.  Many trees together = far less overfitting.</text>
  <text x="320" y="400" text-anchor="middle" fill="#000" font-size="11">Note: one tree is NOT a forest &#8212; a forest is many trees combined by a vote.</text>
</svg>
