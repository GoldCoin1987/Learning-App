<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Finding the sweet spot: where test error is lowest</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="90" y1="60" x2="90" y2="320" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="90" y1="320" x2="600" y2="320" stroke="#000" stroke-width="2" marker-end="url(#ah)"/>
  <text x="60" y="190" text-anchor="middle" fill="#000" transform="rotate(-90 60 190)">error (how wrong)</text>
  <text x="345" y="352" text-anchor="middle" fill="#000">model complexity  &#8594;  (simple on left, complex on right)</text>

  <!-- training error: always falls -->
  <path d="M110,110 C220,180 360,250 580,290" fill="none" stroke="#000" stroke-width="2.5"/>
  <text x="560" y="306" text-anchor="end" fill="#000" font-size="11">Training error (keeps falling)</text>

  <!-- test error: U shape -->
  <path d="M110,120 C230,250 300,255 330,250 C420,235 500,150 575,95" fill="none" stroke="#000" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="575" y="88" text-anchor="end" fill="#000" font-size="11">Test error (U-shape, dashed)</text>

  <!-- sweet spot marker at bottom of U -->
  <line x1="330" y1="250" x2="330" y2="320" stroke="#000" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="330" cy="250" r="6" fill="#000"/>
  <text x="330" y="240" text-anchor="middle" fill="#000" font-weight="bold" font-size="11">SWEET SPOT</text>
  <text x="330" y="226" text-anchor="middle" fill="#000" font-size="10">(lowest test error)</text>

  <!-- region labels -->
  <text x="180" y="300" text-anchor="middle" fill="#000" font-size="11">UNDERFIT</text>
  <text x="180" y="314" text-anchor="middle" fill="#000" font-size="10">both errors high</text>
  <text x="500" y="270" text-anchor="middle" fill="#000" font-size="11">OVERFIT</text>
  <text x="500" y="284" text-anchor="middle" fill="#000" font-size="10">train low, test rising</text>

  <text x="320" y="386" text-anchor="middle" fill="#000">As a model gets more complex, training error keeps dropping &#8212; but test error eventually rises again.</text>
  <text x="320" y="408" text-anchor="middle" fill="#000" font-size="11">Past the sweet spot, the gap between low training error and high test error is the sign of overfitting.</text>
</svg>
