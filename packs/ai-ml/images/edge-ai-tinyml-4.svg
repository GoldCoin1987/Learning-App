<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="380" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Train big, deploy small: the edge workflow</text>

  <defs>
    <marker id="ahe4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Step 1: train on powerful computer -->
  <rect x="30" y="90" width="150" height="110" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="105" y="76" text-anchor="middle" font-weight="bold" fill="#000" font-size="11">1. TRAIN</text>
  <rect x="55" y="110" width="100" height="60" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <rect x="80" y="170" width="50" height="8" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="105" y="135" text-anchor="middle" fill="#000" font-size="10">powerful</text>
  <text x="105" y="150" text-anchor="middle" fill="#000" font-size="10">computer</text>
  <text x="105" y="218" text-anchor="middle" fill="#000" font-size="10">model learns here</text>

  <line x1="182" y1="145" x2="222" y2="145" stroke="#000" stroke-width="2" marker-end="url(#ahe4)"/>

  <!-- Step 2: convert / shrink -->
  <rect x="225" y="90" width="150" height="110" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="300" y="76" text-anchor="middle" font-weight="bold" fill="#000" font-size="11">2. CONVERT / SHRINK</text>
  <rect x="250" y="116" width="48" height="48" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <rect x="318" y="128" width="26" height="26" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <line x1="300" y1="140" x2="314" y2="140" stroke="#000" stroke-width="2" marker-end="url(#ahe4)"/>
  <text x="300" y="184" text-anchor="middle" fill="#000" font-size="10">quantize / prune</text>
  <text x="300" y="218" text-anchor="middle" fill="#000" font-size="10">packed for small hardware</text>

  <line x1="377" y1="145" x2="417" y2="145" stroke="#000" stroke-width="2" marker-end="url(#ahe4)"/>

  <!-- Step 3: deploy + run on device -->
  <rect x="420" y="90" width="150" height="110" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="495" y="76" text-anchor="middle" font-weight="bold" fill="#000" font-size="11">3. DEPLOY + RUN</text>
  <rect x="470" y="108" width="50" height="74" rx="6" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <rect x="478" y="118" width="34" height="42" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="495" y="143" text-anchor="middle" fill="#000" font-size="9">tiny model</text>
  <text x="495" y="218" text-anchor="middle" fill="#000" font-size="10">on the device</text>

  <!-- inference-only callout -->
  <rect x="430" y="240" width="260" height="56" rx="6" fill="#ffffff" stroke="#000" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="560" y="262" text-anchor="middle" fill="#000" font-size="11">The device only RUNS the model</text>
  <text x="560" y="280" text-anchor="middle" fill="#000" font-size="11">(this is "inference"). It does NOT train.</text>

  <!-- tools note -->
  <rect x="30" y="240" width="380" height="56" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="220" y="262" text-anchor="middle" fill="#000" font-size="11">Tools (named only in passing) pack a model to run on small</text>
  <text x="220" y="280" text-anchor="middle" fill="#000" font-size="11">hardware, e.g. on-device runtimes like TensorFlow Lite.</text>

  <text x="360" y="340" text-anchor="middle" fill="#000" font-weight="bold">Training happens on a big machine. The device just runs the shrunk model.</text>
</svg>
