<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Precision vs recall: a net catching fish</text>

  <!-- the pond of all real target fish -->
  <ellipse cx="200" cy="200" rx="150" ry="120" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="200" y="64" text-anchor="middle" fill="#000" font-size="11">The pond: every real TARGET fish (star) lives here, plus junk (circles)</text>

  <!-- the net region (what the model flagged) -->
  <rect x="150" y="110" width="240" height="180" rx="14" fill="#ffffff" stroke="#000" stroke-width="2.5" stroke-dasharray="6 5"/>
  <text x="355" y="128" text-anchor="middle" fill="#000" font-size="11">THE CATCH</text>
  <text x="355" y="142" text-anchor="middle" fill="#000" font-size="11">(what the model flagged)</text>

  <!-- target fish (stars) inside the net = caught targets (TP) -->
  <text x="185" y="165" text-anchor="middle" fill="#000" font-size="20">&#9733;</text>
  <text x="230" y="165" text-anchor="middle" fill="#000" font-size="20">&#9733;</text>
  <text x="200" y="205" text-anchor="middle" fill="#000" font-size="20">&#9733;</text>
  <text x="250" y="210" text-anchor="middle" fill="#000" font-size="20">&#9733;</text>

  <!-- junk (circles) inside the net = false positives (FP) -->
  <circle cx="320" cy="170" r="9" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="320" cy="240" r="9" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="355" y="255" text-anchor="middle" fill="#000" font-size="10">junk in net</text>
  <text x="355" y="268" text-anchor="middle" fill="#000" font-size="10">= false alarms</text>

  <!-- target fish OUTSIDE the net = missed (FN) -->
  <text x="105" y="245" text-anchor="middle" fill="#000" font-size="20">&#9733;</text>
  <text x="120" y="295" text-anchor="middle" fill="#000" font-size="20">&#9733;</text>
  <text x="120" y="320" text-anchor="middle" fill="#000" font-size="10">stars outside net = missed targets</text>

  <!-- definitions on the right -->
  <line x1="410" y1="150" x2="450" y2="150" stroke="#000" stroke-width="2"/>
  <text x="455" y="148" text-anchor="start" fill="#000" font-weight="bold" font-size="12">PRECISION</text>
  <text x="455" y="166" text-anchor="start" fill="#000" font-size="11">Of the fish IN the net,</text>
  <text x="455" y="182" text-anchor="start" fill="#000" font-size="11">what fraction are real targets?</text>
  <text x="455" y="200" text-anchor="start" fill="#000" font-size="11">(few false alarms = high)</text>

  <line x1="410" y1="240" x2="450" y2="240" stroke="#000" stroke-width="2"/>
  <text x="455" y="238" text-anchor="start" fill="#000" font-weight="bold" font-size="12">RECALL</text>
  <text x="455" y="256" text-anchor="start" fill="#000" font-size="11">Of ALL the target fish,</text>
  <text x="455" y="272" text-anchor="start" fill="#000" font-size="11">what fraction did the net catch?</text>
  <text x="455" y="290" text-anchor="start" fill="#000" font-size="11">(few misses = high)</text>

  <text x="320" y="356" text-anchor="middle" fill="#000" font-size="11">&#9733; = a real target fish.   circle = junk you did not want.</text>
  <text x="320" y="380" text-anchor="middle" fill="#000">Cast a bigger net: catch more targets (recall up) but scoop more junk too (precision down).</text>
  <text x="320" y="402" text-anchor="middle" fill="#000" font-size="11">F1 score = one number that balances precision and recall together.</text>
</svg>
