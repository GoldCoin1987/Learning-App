<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="380" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">An LLM writes by predicting the next token, then feeding it back</text>

  <defs>
    <marker id="ahdL1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <text x="380" y="52" text-anchor="middle" fill="#000" font-size="11">A "token" is a piece of text (roughly a word or word-chunk). The model reads the text so far and guesses what comes next.</text>

  <!-- the running text box -->
  <rect x="60" y="80" width="470" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="80" y="100" fill="#000" font-size="11">Text so far (the prompt + what it has written):</text>
  <text x="80" y="120" fill="#000" font-weight="bold">The cat sat on the ___</text>

  <!-- arrow into the model -->
  <line x1="530" y1="105" x2="580" y2="105" stroke="#000" stroke-width="2" marker-end="url(#ahdL1)"/>

  <!-- the model box -->
  <rect x="580" y="78" width="120" height="54" rx="8" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="640" y="100" text-anchor="middle" fill="#000" font-weight="bold">LLM</text>
  <text x="640" y="118" text-anchor="middle" fill="#000" font-size="10">(giant transformer)</text>

  <!-- predicted candidates with "probabilities" -->
  <text x="380" y="168" text-anchor="middle" fill="#000" font-size="11">It ranks possible next tokens by how likely each is:</text>
  <rect x="250" y="180" width="110" height="30" fill="#ffffff" stroke="#000" stroke-width="3"/>
  <text x="305" y="200" text-anchor="middle" fill="#000" font-weight="bold">"mat"  (most likely)</text>
  <rect x="250" y="216" width="110" height="26" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="305" y="234" text-anchor="middle" fill="#000" font-size="10">"floor"</text>
  <rect x="250" y="248" width="110" height="26" fill="#ffffff" stroke="#000" stroke-width="1"/>
  <text x="305" y="266" text-anchor="middle" fill="#000" font-size="10">"roof"</text>
  <text x="305" y="290" text-anchor="middle" fill="#000" font-size="10">pick the top one -&gt; "mat"</text>

  <!-- arrow from model down to candidates -->
  <line x1="640" y1="132" x2="640" y2="195" stroke="#000" stroke-width="2"/>
  <line x1="640" y1="195" x2="365" y2="195" stroke="#000" stroke-width="2" marker-end="url(#ahdL1)"/>

  <!-- feedback loop: chosen token appended back to the text -->
  <line x1="250" y1="225" x2="120" y2="225" stroke="#000" stroke-width="2"/>
  <line x1="120" y1="225" x2="120" y2="132" stroke="#000" stroke-width="2" marker-end="url(#ahdL1)"/>
  <text x="150" y="250" text-anchor="middle" fill="#000" font-size="11" font-weight="bold">append it,</text>
  <text x="150" y="266" text-anchor="middle" fill="#000" font-size="11">then repeat</text>

  <text x="380" y="322" text-anchor="middle" fill="#000" font-size="11" font-weight="bold">Do this over and over (autoregression) and full sentences appear, one token at a time.</text>

  <line x1="60" y1="344" x2="700" y2="344" stroke="#000" stroke-width="1"/>
  <text x="380" y="364" text-anchor="middle" fill="#000" font-size="11">Like a super-powered autocomplete that has read much of the internet. One simple goal: predict the next token.</text>
</svg>
