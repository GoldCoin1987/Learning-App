<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="360" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Two paths to a prediction: which wins?</text>

  <defs>
    <marker id="ahf3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- PATH A (winner): great features + simple model -->
  <text x="120" y="70" text-anchor="middle" fill="#000" font-weight="bold">PATH A</text>
  <rect x="40" y="84" width="160" height="46" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="103" text-anchor="middle" fill="#000" font-size="11">GREAT features</text>
  <text x="120" y="119" text-anchor="middle" fill="#000" font-size="11">(age, price/sq-ft)</text>
  <line x1="200" y1="107" x2="270" y2="107" stroke="#000" stroke-width="2" marker-end="url(#ahf3)"/>
  <rect x="275" y="84" width="150" height="46" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="350" y="103" text-anchor="middle" fill="#000" font-size="11">SIMPLE model</text>
  <text x="350" y="119" text-anchor="middle" fill="#000" font-size="11">(plain, fast)</text>
  <line x1="425" y1="107" x2="495" y2="107" stroke="#000" stroke-width="2" marker-end="url(#ahf3)"/>
  <rect x="500" y="82" width="170" height="50" fill="#000" stroke="#000" stroke-width="2"/>
  <text x="585" y="103" text-anchor="middle" fill="#fff" font-weight="bold">STRONG result</text>
  <text x="585" y="120" text-anchor="middle" fill="#fff" font-size="11">WINS</text>

  <!-- PATH B (loser): raw messy + fancy model -->
  <text x="120" y="186" text-anchor="middle" fill="#000" font-weight="bold">PATH B</text>
  <rect x="40" y="200" width="160" height="46" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="219" text-anchor="middle" fill="#000" font-size="11">RAW, messy inputs</text>
  <text x="120" y="235" text-anchor="middle" fill="#000" font-size="11">(user-id, raw dates)</text>
  <line x1="200" y1="223" x2="270" y2="223" stroke="#000" stroke-width="2" marker-end="url(#ahf3)"/>
  <rect x="275" y="200" width="150" height="46" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="350" y="219" text-anchor="middle" fill="#000" font-size="11">FANCY model</text>
  <text x="350" y="235" text-anchor="middle" fill="#000" font-size="11">(big, complex)</text>
  <line x1="425" y1="223" x2="495" y2="223" stroke="#000" stroke-width="2" marker-end="url(#ahf3)"/>
  <rect x="500" y="198" width="170" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="585" y="219" text-anchor="middle" fill="#000" font-weight="bold">weak result</text>
  <text x="585" y="236" text-anchor="middle" fill="#000" font-size="11">loses</text>

  <line x1="40" y1="282" x2="680" y2="282" stroke="#000" stroke-width="1"/>
  <text x="360" y="308" text-anchor="middle" fill="#000" font-weight="bold">The simple model with great features beats the fancy model with raw, messy inputs.</text>
  <text x="360" y="334" text-anchor="middle" fill="#000" font-size="11">Feature engineering is often where most of the real payoff in machine learning comes from.</text>
</svg>
