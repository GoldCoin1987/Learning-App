<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="900" height="320" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">The ML workflow: a repeatable pipeline (left to right)</text>

  <defs>
    <marker id="ahw1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- stage boxes -->
  <rect x="20" y="110" width="80" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="60" y="132" text-anchor="middle" fill="#000">Frame the</text>
  <text x="60" y="148" text-anchor="middle" fill="#000">problem</text>

  <rect x="115" y="110" width="80" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="155" y="140" text-anchor="middle" fill="#000">Get data</text>

  <rect x="210" y="110" width="80" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="250" y="132" text-anchor="middle" fill="#000">Explore</text>
  <text x="250" y="148" text-anchor="middle" fill="#000">&amp; clean</text>

  <rect x="305" y="110" width="80" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="345" y="140" text-anchor="middle" fill="#000">Features</text>

  <rect x="400" y="110" width="80" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="440" y="132" text-anchor="middle" fill="#000">Split</text>
  <text x="440" y="148" text-anchor="middle" fill="#000">train/test</text>

  <rect x="495" y="110" width="80" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="535" y="140" text-anchor="middle" fill="#000">Train</text>

  <rect x="590" y="110" width="80" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="630" y="140" text-anchor="middle" fill="#000">Evaluate</text>

  <rect x="685" y="110" width="80" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="725" y="140" text-anchor="middle" fill="#000">Deploy</text>

  <rect x="780" y="110" width="90" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="825" y="140" text-anchor="middle" fill="#000">Monitor</text>

  <!-- forward arrows -->
  <line x1="100" y1="135" x2="115" y2="135" stroke="#000" stroke-width="2" marker-end="url(#ahw1)"/>
  <line x1="195" y1="135" x2="210" y2="135" stroke="#000" stroke-width="2" marker-end="url(#ahw1)"/>
  <line x1="290" y1="135" x2="305" y2="135" stroke="#000" stroke-width="2" marker-end="url(#ahw1)"/>
  <line x1="385" y1="135" x2="400" y2="135" stroke="#000" stroke-width="2" marker-end="url(#ahw1)"/>
  <line x1="480" y1="135" x2="495" y2="135" stroke="#000" stroke-width="2" marker-end="url(#ahw1)"/>
  <line x1="575" y1="135" x2="590" y2="135" stroke="#000" stroke-width="2" marker-end="url(#ahw1)"/>
  <line x1="670" y1="135" x2="685" y2="135" stroke="#000" stroke-width="2" marker-end="url(#ahw1)"/>
  <line x1="765" y1="135" x2="780" y2="135" stroke="#000" stroke-width="2" marker-end="url(#ahw1)"/>

  <!-- loop-back arrow for tuning: from Evaluate back to Train -->
  <path d="M630,160 L630,210 L535,210 L535,160" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ahw1)"/>
  <text x="582" y="228" text-anchor="middle" fill="#000" font-size="11">tune &amp; retrain (loop back)</text>

  <text x="450" y="280" text-anchor="middle" fill="#000">Most of the real work is the DATA stages (get, clean, features), not the fancy algorithm.</text>
</svg>
