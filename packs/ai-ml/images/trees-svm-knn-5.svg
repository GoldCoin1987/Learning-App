<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Boosting: a chain of models, each fixing the last one's mistakes</text>

  <defs>
    <marker id="ah5" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- MODEL 1 -->
  <rect x="40" y="120" width="120" height="70" rx="10" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="100" y="148" text-anchor="middle" fill="#000" font-weight="bold">Model 1</text>
  <text x="100" y="168" text-anchor="middle" fill="#000" font-size="11">first guess</text>
  <text x="100" y="206" text-anchor="middle" fill="#000" font-size="11">makes some</text>
  <text x="100" y="220" text-anchor="middle" fill="#000" font-size="11">mistakes &#10007;</text>

  <!-- arrow 1 -> 2 -->
  <line x1="160" y1="155" x2="240" y2="155" stroke="#000" stroke-width="2" marker-end="url(#ah5)"/>
  <text x="200" y="146" text-anchor="middle" fill="#000" font-size="11">pass the</text>
  <text x="200" y="116" text-anchor="middle" fill="#000" font-size="11">errors on</text>

  <!-- MODEL 2 -->
  <rect x="250" y="120" width="120" height="70" rx="10" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="310" y="148" text-anchor="middle" fill="#000" font-weight="bold">Model 2</text>
  <text x="310" y="168" text-anchor="middle" fill="#000" font-size="11">fixes Model 1's</text>
  <text x="310" y="182" text-anchor="middle" fill="#000" font-size="11">mistakes</text>

  <!-- arrow 2 -> 3 -->
  <line x1="370" y1="155" x2="450" y2="155" stroke="#000" stroke-width="2" marker-end="url(#ah5)"/>
  <text x="410" y="146" text-anchor="middle" fill="#000" font-size="11">pass the</text>
  <text x="410" y="116" text-anchor="middle" fill="#000" font-size="11">errors on</text>

  <!-- MODEL 3 -->
  <rect x="460" y="120" width="120" height="70" rx="10" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="520" y="148" text-anchor="middle" fill="#000" font-weight="bold">Model 3</text>
  <text x="520" y="168" text-anchor="middle" fill="#000" font-size="11">fixes Model 2's</text>
  <text x="520" y="182" text-anchor="middle" fill="#000" font-size="11">mistakes</text>

  <!-- arrow down to combined result -->
  <line x1="520" y1="190" x2="520" y2="250" stroke="#000" stroke-width="1.5" marker-end="url(#ah5)"/>
  <line x1="100" y1="230" x2="100" y2="250" stroke="#000" stroke-width="1.5" marker-end="url(#ah5)"/>
  <line x1="310" y1="190" x2="310" y2="250" stroke="#000" stroke-width="1.5" marker-end="url(#ah5)"/>

  <!-- combined strong result -->
  <rect x="160" y="255" width="320" height="56" rx="12" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="320" y="279" text-anchor="middle" fill="#000">Add the models together &#8594;</text>
  <text x="320" y="301" text-anchor="middle" fill="#000" font-weight="bold">one strong, accurate model</text>

  <text x="320" y="345" text-anchor="middle" fill="#000" font-size="11">Built in SEQUENCE (one after another), unlike a forest where trees are built independently.</text>
  <text x="320" y="367" text-anchor="middle" fill="#000" font-size="11">Like a team where each member patches the previous member's errors.</text>
  <text x="320" y="394" text-anchor="middle" fill="#000" font-size="11">Gradient boosting / XGBoost work this way and win on lots of real-world tabular data.</text>
</svg>
