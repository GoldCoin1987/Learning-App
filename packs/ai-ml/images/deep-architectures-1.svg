<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="420" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">A CNN filter: a small window slides over the image to find a local pattern</text>

  <defs>
    <marker id="ahd1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- image grid (left) -->
  <text x="150" y="62" text-anchor="middle" fill="#000" font-weight="bold">the image (a grid of pixels)</text>
  <!-- 6x6 grid from x=60..300, y=78..318, cell 40 -->
  <line x1="60" y1="78" x2="300" y2="78" stroke="#000" stroke-width="1"/>
  <line x1="60" y1="118" x2="300" y2="118" stroke="#000" stroke-width="1"/>
  <line x1="60" y1="158" x2="300" y2="158" stroke="#000" stroke-width="1"/>
  <line x1="60" y1="198" x2="300" y2="198" stroke="#000" stroke-width="1"/>
  <line x1="60" y1="238" x2="300" y2="238" stroke="#000" stroke-width="1"/>
  <line x1="60" y1="278" x2="300" y2="278" stroke="#000" stroke-width="1"/>
  <line x1="60" y1="318" x2="300" y2="318" stroke="#000" stroke-width="1"/>
  <line x1="60" y1="78" x2="60" y2="318" stroke="#000" stroke-width="1"/>
  <line x1="100" y1="78" x2="100" y2="318" stroke="#000" stroke-width="1"/>
  <line x1="140" y1="78" x2="140" y2="318" stroke="#000" stroke-width="1"/>
  <line x1="180" y1="78" x2="180" y2="318" stroke="#000" stroke-width="1"/>
  <line x1="220" y1="78" x2="220" y2="318" stroke="#000" stroke-width="1"/>
  <line x1="260" y1="78" x2="260" y2="318" stroke="#000" stroke-width="1"/>
  <line x1="300" y1="78" x2="300" y2="318" stroke="#000" stroke-width="1"/>

  <!-- the filter window (3x3) at top-left, solid -->
  <rect x="60" y="78" width="120" height="120" fill="none" stroke="#000" stroke-width="3.5"/>
  <text x="120" y="143" text-anchor="middle" fill="#000" font-weight="bold">filter</text>

  <!-- the filter window slid to a new spot, dashed -->
  <rect x="180" y="198" width="120" height="120" fill="none" stroke="#000" stroke-width="2.5" stroke-dasharray="6,4"/>
  <text x="240" y="263" text-anchor="middle" fill="#000" font-size="11">slides</text>

  <!-- slide arrow -->
  <line x1="180" y1="138" x2="248" y2="206" stroke="#000" stroke-width="2" stroke-dasharray="2,3" marker-end="url(#ahd1)"/>

  <text x="180" y="346" text-anchor="middle" fill="#000" font-size="11">The SAME small filter is reused at every position (so it needs far fewer weights</text>
  <text x="180" y="362" text-anchor="middle" fill="#000" font-size="11">and can spot its pattern wherever it appears).</text>

  <!-- arrow to layers -->
  <line x1="312" y1="150" x2="372" y2="150" stroke="#000" stroke-width="2" marker-end="url(#ahd1)"/>

  <!-- stacked layers: edges -> shapes -> face -->
  <text x="540" y="62" text-anchor="middle" fill="#000" font-weight="bold">stack filters into layers</text>

  <!-- edges -->
  <rect x="390" y="84" width="80" height="80" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="402" y1="100" x2="458" y2="100" stroke="#000" stroke-width="2"/>
  <line x1="410" y1="112" x2="410" y2="152" stroke="#000" stroke-width="2"/>
  <line x1="425" y1="150" x2="455" y2="120" stroke="#000" stroke-width="2"/>
  <text x="430" y="180" text-anchor="middle" fill="#000" font-size="11">early: edges</text>

  <line x1="478" y1="124" x2="508" y2="124" stroke="#000" stroke-width="2" marker-end="url(#ahd1)"/>

  <!-- shapes -->
  <rect x="516" y="84" width="80" height="80" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="540" cy="112" r="11" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="572" cy="112" r="11" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <path d="M538,140 Q556,152 574,140" fill="none" stroke="#000" stroke-width="2"/>
  <text x="556" y="180" text-anchor="middle" fill="#000" font-size="11">deeper: shapes</text>

  <line x1="604" y1="124" x2="634" y2="124" stroke="#000" stroke-width="2" marker-end="url(#ahd1)"/>

  <!-- face -->
  <rect x="642" y="84" width="70" height="80" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="677" cy="120" r="28" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="667" cy="113" r="4" fill="#000"/>
  <circle cx="687" cy="113" r="4" fill="#000"/>
  <path d="M666,132 Q677,141 688,132" fill="none" stroke="#000" stroke-width="2"/>
  <text x="677" y="180" text-anchor="middle" fill="#000" font-size="11">deepest: objects</text>

  <!-- takeaways -->
  <line x1="340" y1="372" x2="700" y2="372" stroke="#000" stroke-width="1"/>
  <text x="520" y="394" text-anchor="middle" fill="#000" font-weight="bold">Same edges-&gt;shapes-&gt;face build-up,</text>
  <text x="520" y="410" text-anchor="middle" fill="#000" font-size="11">but each detector is a small sliding filter, not the whole image at once.</text>
</svg>
