<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="400" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Stack neurons into layers: a multi-layer perceptron (MLP)</text>

  <!-- column headers -->
  <text x="140" y="70" text-anchor="middle" fill="#000" font-weight="bold">input layer</text>
  <text x="360" y="70" text-anchor="middle" fill="#000" font-weight="bold">hidden layer</text>
  <text x="580" y="70" text-anchor="middle" fill="#000" font-weight="bold">output layer</text>

  <!-- connections drawn first so nodes sit on top -->
  <!-- input(2) to hidden(3) -->
  <line x1="140" y1="140" x2="360" y2="120" stroke="#000" stroke-width="1"/>
  <line x1="140" y1="140" x2="360" y2="200" stroke="#000" stroke-width="1"/>
  <line x1="140" y1="140" x2="360" y2="280" stroke="#000" stroke-width="1"/>
  <line x1="140" y1="240" x2="360" y2="120" stroke="#000" stroke-width="1"/>
  <line x1="140" y1="240" x2="360" y2="200" stroke="#000" stroke-width="1"/>
  <line x1="140" y1="240" x2="360" y2="280" stroke="#000" stroke-width="1"/>
  <!-- hidden(3) to output(1) -->
  <line x1="360" y1="120" x2="580" y2="200" stroke="#000" stroke-width="1"/>
  <line x1="360" y1="200" x2="580" y2="200" stroke="#000" stroke-width="1"/>
  <line x1="360" y1="280" x2="580" y2="200" stroke="#000" stroke-width="1"/>

  <!-- input nodes -->
  <circle cx="140" cy="140" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="140" y="145" text-anchor="middle" fill="#000">x1</text>
  <circle cx="140" cy="240" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="140" y="245" text-anchor="middle" fill="#000">x2</text>

  <!-- hidden nodes -->
  <circle cx="360" cy="120" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="360" cy="200" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="360" cy="280" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- output node -->
  <circle cx="580" cy="200" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="580" y="205" text-anchor="middle" fill="#000" font-size="11">out</text>

  <!-- takeaways -->
  <line x1="50" y1="320" x2="670" y2="320" stroke="#000" stroke-width="1"/>
  <text x="360" y="344" text-anchor="middle" fill="#000" font-weight="bold">One neuron draws only a straight line. A stack of neurons carves out curvy, complex patterns.</text>
  <text x="360" y="368" text-anchor="middle" fill="#000" font-size="11">Each line above is a weight. Information flows left to right, layer by layer.</text>
  <text x="360" y="390" text-anchor="middle" fill="#000" font-size="11">"Deep learning" just means many hidden layers, not a smarter kind of neuron.</text>
</svg>
