<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 430" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="700" height="430" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Two ways to deploy a model: real-time service vs batch</text>

  <defs>
    <marker id="ahm2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- divider -->
  <line x1="350" y1="44" x2="350" y2="402" stroke="#000" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- LEFT: real-time API -->
  <text x="175" y="64" text-anchor="middle" font-weight="bold" fill="#000">REAL-TIME SERVICE (API)</text>
  <text x="175" y="82" text-anchor="middle" fill="#000" font-size="11">one input in, one answer back, instantly</text>

  <rect x="35" y="120" width="80" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="75" y="146" text-anchor="middle" fill="#000" font-size="11">one input</text>

  <rect x="145" y="120" width="80" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="185" y="146" text-anchor="middle" fill="#000" font-size="11">model</text>

  <rect x="255" y="120" width="80" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="295" y="140" text-anchor="middle" fill="#000" font-size="11">instant</text>
  <text x="295" y="156" text-anchor="middle" fill="#000" font-size="11">answer</text>

  <line x1="115" y1="142" x2="145" y2="142" stroke="#000" stroke-width="2" marker-end="url(#ahm2)"/>
  <line x1="225" y1="142" x2="255" y2="142" stroke="#000" stroke-width="2" marker-end="url(#ahm2)"/>

  <text x="185" y="210" text-anchor="middle" fill="#000" font-size="11">Example: a fraud check at checkout</text>
  <text x="185" y="228" text-anchor="middle" fill="#000" font-size="11">answer needed in a split second</text>

  <!-- RIGHT: batch -->
  <text x="525" y="64" text-anchor="middle" font-weight="bold" fill="#000">BATCH (scheduled run)</text>
  <text x="525" y="82" text-anchor="middle" fill="#000" font-size="11">a big pile of data, on a timer</text>

  <!-- clock -->
  <circle cx="420" cy="142" r="22" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="142" x2="420" y2="128" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="142" x2="431" y2="150" stroke="#000" stroke-width="2"/>
  <text x="420" y="186" text-anchor="middle" fill="#000" font-size="11">nightly</text>

  <!-- stacked data -->
  <rect x="470" y="120" width="70" height="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="470" y="136" width="70" height="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="470" y="152" width="70" height="14" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <rect x="560" y="120" width="80" height="48" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="600" y="140" text-anchor="middle" fill="#000" font-size="11">model runs</text>
  <text x="600" y="156" text-anchor="middle" fill="#000" font-size="11">over all rows</text>

  <line x1="540" y1="143" x2="560" y2="143" stroke="#000" stroke-width="2" marker-end="url(#ahm2)"/>

  <text x="525" y="210" text-anchor="middle" fill="#000" font-size="11">Example: nightly recommendations</text>
  <text x="525" y="228" text-anchor="middle" fill="#000" font-size="11">no rush; results ready by morning</text>

  <!-- third option note -->
  <rect x="120" y="290" width="460" height="50" fill="#ffffff" stroke="#000" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="350" y="312" text-anchor="middle" fill="#000" font-size="11">A third option: run the model ON-DEVICE / at the EDGE (on a phone or sensor itself).</text>
  <text x="350" y="330" text-anchor="middle" fill="#000" font-size="11">That is the focus of the next sub-topic.</text>

  <text x="350" y="372" text-anchor="middle" fill="#000" font-weight="bold">Real-time = instant answer per request. Batch = scheduled run over a big dataset.</text>
</svg>
