<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="520" height="360" fill="#ffffff"/>
  <text x="260" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">AI contains ML contains Deep Learning</text>

  <!-- outer circle: AI -->
  <circle cx="260" cy="205" r="135" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <!-- middle circle: ML -->
  <circle cx="260" cy="225" r="92" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <!-- inner circle: Deep Learning -->
  <circle cx="260" cy="245" r="48" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- labels -->
  <text x="260" y="95" text-anchor="middle" font-weight="bold" fill="#000">Artificial Intelligence</text>
  <text x="260" y="111" text-anchor="middle" fill="#000">any system that seems "smart"</text>

  <text x="260" y="158" text-anchor="middle" font-weight="bold" fill="#000">Machine Learning</text>
  <text x="260" y="174" text-anchor="middle" fill="#000">learns patterns from examples</text>

  <text x="260" y="242" text-anchor="middle" font-weight="bold" fill="#000">Deep</text>
  <text x="260" y="258" text-anchor="middle" font-weight="bold" fill="#000">Learning</text>

  <text x="260" y="345" text-anchor="middle" fill="#000">Each smaller idea is a special case inside the larger one.</text>
</svg>
