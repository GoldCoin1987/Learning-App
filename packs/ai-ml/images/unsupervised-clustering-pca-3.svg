<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="440" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">PCA: squash many features down to a few, keep the spread</text>

  <defs>
    <marker id="ah3" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- LEFT: a wide table with many columns -->
  <text x="150" y="58" text-anchor="middle" font-weight="bold" fill="#000">Many features (a wide table)</text>
  <rect x="40" y="70" width="220" height="120" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <!-- column lines -->
  <line x1="84" y1="70" x2="84" y2="190" stroke="#000" stroke-width="1"/>
  <line x1="128" y1="70" x2="128" y2="190" stroke="#000" stroke-width="1"/>
  <line x1="172" y1="70" x2="172" y2="190" stroke="#000" stroke-width="1"/>
  <line x1="216" y1="70" x2="216" y2="190" stroke="#000" stroke-width="1"/>
  <!-- row lines -->
  <line x1="40" y1="100" x2="260" y2="100" stroke="#000" stroke-width="1"/>
  <line x1="40" y1="130" x2="260" y2="130" stroke="#000" stroke-width="1"/>
  <line x1="40" y1="160" x2="260" y2="160" stroke="#000" stroke-width="1"/>
  <text x="150" y="90" text-anchor="middle" fill="#000" font-size="11">col 1  col 2  col 3 ... col 50</text>
  <text x="150" y="208" text-anchor="middle" fill="#000" font-size="11">50 columns = hard to picture</text>

  <line x1="266" y1="130" x2="314" y2="130" stroke="#000" stroke-width="2" marker-end="url(#ah3)"/>
  <text x="290" y="120" text-anchor="middle" fill="#000" font-size="11">PCA</text>

  <!-- RIGHT: a 2D map -->
  <text x="470" y="58" text-anchor="middle" font-weight="bold" fill="#000">A 2D map (2 features)</text>
  <rect x="350" y="70" width="240" height="180" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <!-- axes -->
  <line x1="380" y1="230" x2="570" y2="230" stroke="#000" stroke-width="1.5" marker-end="url(#ah3)"/>
  <line x1="380" y1="230" x2="380" y2="90" stroke="#000" stroke-width="1.5" marker-end="url(#ah3)"/>
  <text x="560" y="248" text-anchor="middle" fill="#000" font-size="11">direction 1</text>
  <text x="372" y="100" text-anchor="end" fill="#000" font-size="11">dir 2</text>
  <!-- points forming visible groups -->
  <circle cx="430" cy="120" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="445" cy="135" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="420" cy="140" r="5" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="515" cy="170" r="5" fill="#000"/>
  <circle cx="530" cy="185" r="5" fill="#000"/>
  <circle cx="505" cy="190" r="5" fill="#000"/>
  <text x="470" y="268" text-anchor="middle" fill="#000" font-size="11">now you can plot it and see groups</text>

  <!-- BOTTOM: cloud + direction of most spread -->
  <text x="320" y="300" text-anchor="middle" font-weight="bold" fill="#000">The idea: find the direction of biggest spread, describe points by it</text>
  <ellipse cx="320" cy="360" rx="120" ry="34" transform="rotate(-22 320 360)" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="5 4"/>
  <circle cx="232" cy="392" r="4" fill="#000"/>
  <circle cx="268" cy="378" r="4" fill="#000"/>
  <circle cx="300" cy="366" r="4" fill="#000"/>
  <circle cx="338" cy="354" r="4" fill="#000"/>
  <circle cx="372" cy="342" r="4" fill="#000"/>
  <circle cx="404" cy="330" r="4" fill="#000"/>
  <circle cx="290" cy="380" r="4" fill="#000"/>
  <circle cx="350" cy="342" r="4" fill="#000"/>
  <!-- main spread arrow -->
  <line x1="220" y1="398" x2="420" y2="322" stroke="#000" stroke-width="2.5" marker-end="url(#ah3)"/>
  <text x="455" y="320" text-anchor="middle" fill="#000" font-size="11">direction of</text>
  <text x="455" y="334" text-anchor="middle" fill="#000" font-size="11">most spread</text>
  <text x="320" y="424" text-anchor="middle" fill="#000" font-size="11">Keep the few directions that hold most of the variation; drop redundant detail. No features are added.</text>
</svg>
