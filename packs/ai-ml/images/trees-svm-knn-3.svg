<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Support Vector Machine: the widest-margin boundary</text>

  <!-- the margin band (white, outlined by two dashed lines) -->
  <line x1="150" y1="360" x2="470" y2="70" stroke="#000" stroke-width="1.5" stroke-dasharray="6,5"/>
  <line x1="250" y1="360" x2="570" y2="70" stroke="#000" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- the decision boundary (solid, down the middle) -->
  <line x1="200" y1="360" x2="520" y2="70" stroke="#000" stroke-width="3"/>
  <text x="392" y="92" text-anchor="start" fill="#000" font-weight="bold">boundary line</text>

  <!-- margin gap label with double arrow -->
  <line x1="300" y1="250" x2="360" y2="196" stroke="#000" stroke-width="1.5"/>
  <text x="356" y="248" text-anchor="start" fill="#000" font-size="11">margin = the empty gap (kept as wide as possible)</text>

  <!-- Class A: filled dots, lower-left side -->
  <circle cx="120" cy="300" r="9" fill="#000"/>
  <circle cx="160" cy="250" r="9" fill="#000"/>
  <circle cx="100" cy="220" r="9" fill="#000"/>
  <circle cx="200" cy="320" r="9" fill="#000"/>
  <!-- support vector on the margin (left), highlighted with ring -->
  <circle cx="245" cy="250" r="9" fill="#000"/>
  <circle cx="245" cy="250" r="15" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Class B: open squares, upper-right side -->
  <rect x="441" y="161" width="18" height="18" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <rect x="501" y="201" width="18" height="18" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <rect x="531" y="141" width="18" height="18" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <rect x="471" y="111" width="18" height="18" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <!-- support vector on the margin (right), highlighted with ring -->
  <rect x="381" y="181" width="18" height="18" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <circle cx="390" cy="190" r="17" fill="none" stroke="#000" stroke-width="2"/>

  <!-- support vector callout -->
  <text x="245" y="300" text-anchor="middle" fill="#000" font-size="11">support vectors =</text>
  <text x="245" y="314" text-anchor="middle" fill="#000" font-size="11">borderline points that</text>
  <text x="245" y="328" text-anchor="middle" fill="#000" font-size="11">set the boundary</text>

  <!-- legend -->
  <circle cx="120" cy="382" r="9" fill="#000"/>
  <text x="136" y="386" text-anchor="start" fill="#000" font-size="11">Class A</text>
  <rect x="210" y="373" width="18" height="18" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="236" y="386" text-anchor="start" fill="#000" font-size="11">Class B</text>
  <circle cx="360" cy="382" r="11" fill="none" stroke="#000" stroke-width="2"/>
  <text x="378" y="386" text-anchor="start" fill="#000" font-size="11">ring = a support vector</text>

  <text x="320" y="408" text-anchor="middle" fill="#000" font-size="11">Like the fairest line down the widest empty street between two neighborhoods.</text>
</svg>
