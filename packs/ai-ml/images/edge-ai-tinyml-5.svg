<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="700" height="420" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Edge vs Cloud: a trade-off, not a winner</text>

  <!-- table outline -->
  <rect x="60" y="50" width="580" height="240" fill="#ffffff" stroke="#000" stroke-width="2"/>

  <!-- column dividers -->
  <line x1="280" y1="50" x2="280" y2="290" stroke="#000" stroke-width="1.5"/>
  <line x1="460" y1="50" x2="460" y2="290" stroke="#000" stroke-width="1.5"/>

  <!-- header row -->
  <line x1="60" y1="86" x2="640" y2="86" stroke="#000" stroke-width="1.5"/>
  <text x="170" y="74" text-anchor="middle" font-weight="bold" fill="#000">What you care about</text>
  <text x="370" y="74" text-anchor="middle" font-weight="bold" fill="#000">EDGE (on-device)</text>
  <text x="550" y="74" text-anchor="middle" font-weight="bold" fill="#000">CLOUD (data center)</text>

  <!-- rows -->
  <line x1="60" y1="126" x2="640" y2="126" stroke="#000" stroke-width="1"/>
  <line x1="60" y1="166" x2="640" y2="166" stroke="#000" stroke-width="1"/>
  <line x1="60" y1="206" x2="640" y2="206" stroke="#000" stroke-width="1"/>
  <line x1="60" y1="246" x2="640" y2="246" stroke="#000" stroke-width="1"/>

  <text x="70" y="111" fill="#000" font-size="11">Privacy</text>
  <text x="370" y="111" text-anchor="middle" fill="#000" font-size="11">data stays put (strong)</text>
  <text x="550" y="111" text-anchor="middle" fill="#000" font-size="11">data is sent away</text>

  <text x="70" y="151" fill="#000" font-size="11">Speed (latency)</text>
  <text x="370" y="151" text-anchor="middle" fill="#000" font-size="11">instant, no round-trip</text>
  <text x="550" y="151" text-anchor="middle" fill="#000" font-size="11">round-trip delay</text>

  <text x="70" y="191" fill="#000" font-size="11">Works offline?</text>
  <text x="370" y="191" text-anchor="middle" fill="#000" font-size="11">yes</text>
  <text x="550" y="191" text-anchor="middle" fill="#000" font-size="11">no, needs internet</text>

  <text x="70" y="231" fill="#000" font-size="11">Raw power</text>
  <text x="370" y="231" text-anchor="middle" fill="#000" font-size="11">smaller, less capable</text>
  <text x="550" y="231" text-anchor="middle" fill="#000" font-size="11">huge, most capable</text>

  <text x="70" y="271" fill="#000" font-size="11">Best for</text>
  <text x="370" y="271" text-anchor="middle" fill="#000" font-size="11">privacy / speed / offline</text>
  <text x="550" y="271" text-anchor="middle" fill="#000" font-size="11">heavy, complex tasks</text>

  <!-- combine both note -->
  <rect x="80" y="312" width="540" height="64" rx="8" fill="#ffffff" stroke="#000" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="350" y="336" text-anchor="middle" font-weight="bold" fill="#000" font-size="12">Many systems COMBINE BOTH</text>
  <text x="350" y="356" text-anchor="middle" fill="#000" font-size="11">do the quick part on-device, then ask the cloud for the heavy part.</text>

  <text x="350" y="402" text-anchor="middle" fill="#000" font-weight="bold">Pick edge for privacy/speed/offline; cloud for raw power. It is a balance.</text>
</svg>
