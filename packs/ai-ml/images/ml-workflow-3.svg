<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="340" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Splitting the data: training set vs held-out test set</text>

  <defs>
    <marker id="ahw3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- full dataset -->
  <rect x="220" y="55" width="200" height="44" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="320" y="82" text-anchor="middle" fill="#000" font-weight="bold">All the data</text>

  <!-- split arrows -->
  <line x1="300" y1="99" x2="180" y2="150" stroke="#000" stroke-width="2" marker-end="url(#ahw3)"/>
  <line x1="340" y1="99" x2="470" y2="150" stroke="#000" stroke-width="2" marker-end="url(#ahw3)"/>
  <text x="320" y="128" text-anchor="middle" fill="#000" font-size="11">split (e.g. 80% / 20%)</text>

  <!-- TRAIN box (big) -->
  <rect x="50" y="155" width="260" height="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="180" y="182" text-anchor="middle" fill="#000" font-weight="bold">TRAIN set (big)</text>
  <text x="180" y="204" text-anchor="middle" fill="#000" font-size="11">the model learns from these</text>
  <text x="180" y="224" text-anchor="middle" fill="#000" font-size="11">examples + their answers</text>

  <!-- TEST box (smaller, held out) -->
  <rect x="380" y="155" width="180" height="90" fill="#ffffff" stroke="#000" stroke-width="4"/>
  <text x="470" y="182" text-anchor="middle" fill="#000" font-weight="bold">TEST set</text>
  <text x="470" y="202" text-anchor="middle" fill="#000" font-size="11">locked away during</text>
  <text x="470" y="218" text-anchor="middle" fill="#000" font-size="11">training</text>
  <text x="470" y="236" text-anchor="middle" fill="#000" font-weight="bold" font-size="11">test = unseen</text>

  <text x="320" y="285" text-anchor="middle" fill="#000">The test set stands in for "new, unseen data" the model will meet in the real world.</text>
  <text x="320" y="312" text-anchor="middle" fill="#000" font-weight="bold">Only score on TEST after training is finished.</text>
</svg>
