<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="360" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Feature engineering: turn raw data into a useful input</text>

  <defs>
    <marker id="ahf1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- RAW column -->
  <text x="120" y="70" text-anchor="middle" fill="#000" font-weight="bold">RAW data</text>
  <text x="120" y="86" text-anchor="middle" fill="#000" font-size="11">(hard for a model to use)</text>
  <rect x="50" y="100" width="140" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="118" text-anchor="middle" fill="#000" font-size="11">date built</text>
  <text x="120" y="133" text-anchor="middle" fill="#000">2015-03-04</text>

  <!-- arrow + transform label -->
  <line x1="200" y1="120" x2="300" y2="120" stroke="#000" stroke-width="2" marker-end="url(#ahf1)"/>
  <text x="250" y="108" text-anchor="middle" fill="#000" font-size="11">compute</text>
  <text x="250" y="142" text-anchor="middle" fill="#000" font-size="11">today minus date</text>

  <!-- FEATURE column -->
  <text x="430" y="70" text-anchor="middle" fill="#000" font-weight="bold">ENGINEERED feature</text>
  <text x="430" y="86" text-anchor="middle" fill="#000" font-size="11">(captures what matters)</text>
  <rect x="360" y="100" width="140" height="40" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="430" y="118" text-anchor="middle" fill="#000" font-size="11">age in years</text>
  <text x="430" y="133" text-anchor="middle" fill="#000">11</text>

  <!-- arrow to model -->
  <line x1="510" y1="120" x2="580" y2="120" stroke="#000" stroke-width="2" marker-end="url(#ahf1)"/>

  <!-- MODEL box -->
  <rect x="585" y="95" width="100" height="50" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="635" y="118" text-anchor="middle" fill="#000">MODEL</text>
  <text x="635" y="134" text-anchor="middle" fill="#000" font-size="11">learns easily</text>

  <!-- bottom takeaways -->
  <text x="360" y="210" text-anchor="middle" fill="#000">The raw "date built" barely helps. The derived "age in years" is exactly what predicts price.</text>
  <text x="360" y="240" text-anchor="middle" fill="#000" font-weight="bold">Big idea: the RIGHT features often matter more than a fancy model.</text>
  <text x="360" y="268" text-anchor="middle" fill="#000" font-size="11">A simple model with great features usually beats a fancy model fed raw, messy inputs.</text>

  <!-- mini example row -->
  <line x1="50" y1="292" x2="670" y2="292" stroke="#000" stroke-width="1"/>
  <text x="360" y="316" text-anchor="middle" fill="#000" font-size="11">Another example: to guess if you'll like a movie, "genres you rated highly before" beats a raw user-ID number.</text>
  <text x="360" y="338" text-anchor="middle" fill="#000" font-size="11">Good features describe what actually drives the answer.</text>
</svg>
