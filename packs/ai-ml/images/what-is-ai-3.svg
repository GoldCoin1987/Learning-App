<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Four ways a machine can learn</text>

  <!-- Supervised -->
  <rect x="30" y="50" width="270" height="120" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="165" y="74" text-anchor="middle" font-weight="bold" fill="#000">SUPERVISED</text>
  <text x="165" y="94" text-anchor="middle" fill="#000">Learns from labeled examples.</text>
  <text x="165" y="116" text-anchor="middle" fill="#000">Example: photos tagged "cat" or "dog".</text>
  <text x="165" y="138" text-anchor="middle" fill="#000">Pick a category = classification.</text>
  <text x="165" y="156" text-anchor="middle" fill="#000">Predict a number (price) = regression.</text>

  <!-- Unsupervised -->
  <rect x="340" y="50" width="270" height="120" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="475" y="74" text-anchor="middle" font-weight="bold" fill="#000">UNSUPERVISED</text>
  <text x="475" y="98" text-anchor="middle" fill="#000">No labels given.</text>
  <text x="475" y="120" text-anchor="middle" fill="#000">Finds groupings or structure</text>
  <text x="475" y="138" text-anchor="middle" fill="#000">on its own.</text>
  <text x="475" y="158" text-anchor="middle" fill="#000">Example: cluster similar customers.</text>

  <!-- Self-supervised -->
  <rect x="30" y="195" width="270" height="120" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="165" y="219" text-anchor="middle" font-weight="bold" fill="#000">SELF-SUPERVISED</text>
  <text x="165" y="243" text-anchor="middle" fill="#000">The data makes its own labels.</text>
  <text x="165" y="265" text-anchor="middle" fill="#000">Example: "predict the next word"</text>
  <text x="165" y="283" text-anchor="middle" fill="#000">in a sentence.</text>
  <text x="165" y="303" text-anchor="middle" fill="#000">Powers modern chatbots.</text>

  <!-- Reinforcement -->
  <rect x="340" y="195" width="270" height="120" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="475" y="219" text-anchor="middle" font-weight="bold" fill="#000">REINFORCEMENT</text>
  <text x="475" y="243" text-anchor="middle" fill="#000">Learns by trial and reward.</text>
  <text x="475" y="265" text-anchor="middle" fill="#000">Good moves earn points;</text>
  <text x="475" y="283" text-anchor="middle" fill="#000">bad moves lose them.</text>
  <text x="475" y="303" text-anchor="middle" fill="#000">Example: game-playing, robots.</text>

  <text x="320" y="345" text-anchor="middle" fill="#000">The key question each time: are the answers (labels) provided, or not?</text>
</svg>
