<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="380" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Two popular activation functions (the "bend" between layers)</text>

  <!-- LEFT: ReLU -->
  <text x="190" y="62" text-anchor="middle" fill="#000" font-weight="bold">ReLU: keep positives, zero out negatives</text>
  <!-- axes -->
  <line x1="70" y1="230" x2="310" y2="230" stroke="#000" stroke-width="2"/>
  <line x1="190" y1="90" x2="190" y2="250" stroke="#000" stroke-width="2"/>
  <text x="315" y="246" text-anchor="start" fill="#000" font-size="11">x</text>
  <text x="198" y="100" text-anchor="start" fill="#000" font-size="11">output</text>
  <!-- relu line: flat 0 for x<0, then 45 deg up -->
  <line x1="70" y1="230" x2="190" y2="230" stroke="#000" stroke-width="3"/>
  <line x1="190" y1="230" x2="300" y2="120" stroke="#000" stroke-width="3"/>
  <text x="125" y="248" text-anchor="middle" fill="#000" font-size="10">negatives -&gt; 0</text>
  <text x="250" y="158" text-anchor="middle" fill="#000" font-size="10">positives kept</text>
  <text x="190" y="270" text-anchor="middle" fill="#000" font-size="11">in words: ReLU = max(0, x)</text>

  <!-- RIGHT: sigmoid -->
  <text x="530" y="62" text-anchor="middle" fill="#000" font-weight="bold">Sigmoid: squash anything into 0 to 1</text>
  <!-- axes -->
  <line x1="410" y1="230" x2="650" y2="230" stroke="#000" stroke-width="2"/>
  <line x1="530" y1="90" x2="530" y2="250" stroke="#000" stroke-width="2"/>
  <text x="655" y="246" text-anchor="start" fill="#000" font-size="11">x</text>
  <text x="538" y="100" text-anchor="start" fill="#000" font-size="11">output</text>
  <!-- 0 and 1 guide lines -->
  <line x1="410" y1="120" x2="650" y2="120" stroke="#000" stroke-width="0.75" stroke-dasharray="3,3"/>
  <text x="404" y="124" text-anchor="end" fill="#000" font-size="10">1</text>
  <text x="404" y="234" text-anchor="end" fill="#000" font-size="10">0</text>
  <!-- S-curve -->
  <path d="M410,224 C480,222 500,210 530,175 C560,140 580,128 650,126" fill="none" stroke="#000" stroke-width="3"/>
  <text x="530" y="270" text-anchor="middle" fill="#000" font-size="11">a smooth S-curve</text>

  <!-- takeaways -->
  <line x1="50" y1="292" x2="670" y2="292" stroke="#000" stroke-width="1"/>
  <text x="360" y="316" text-anchor="middle" fill="#000" font-weight="bold">Why we need a bend: without a non-linearity, stacking layers collapses back to one straight line.</text>
  <text x="360" y="340" text-anchor="middle" fill="#000" font-size="11">The bend is what lets layers combine into curvy patterns. ReLU is the popular default.</text>
  <text x="360" y="362" text-anchor="middle" fill="#000" font-size="11">Activations are not optional decoration; remove them and extra layers buy you nothing.</text>
</svg>
