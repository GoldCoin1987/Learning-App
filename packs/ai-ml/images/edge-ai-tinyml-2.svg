<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 430" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="700" height="430" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Everyday AI that runs ON the device (no cloud needed)</text>

  <!-- Phone: wake word -->
  <rect x="60" y="70" width="110" height="150" rx="12" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="74" y="86" width="82" height="100" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <circle cx="115" cy="203" r="6" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="115" y="118" text-anchor="middle" fill="#000" font-size="11">phone</text>
  <text x="115" y="150" text-anchor="middle" fill="#000" font-size="11">"Hey..."</text>
  <text x="115" y="166" text-anchor="middle" fill="#000" font-size="10">wake word</text>
  <text x="115" y="244" text-anchor="middle" fill="#000" font-size="11">Wake-word detection</text>
  <text x="115" y="260" text-anchor="middle" fill="#000" font-size="10">listens locally for its name</text>

  <!-- Smartwatch: heartbeat -->
  <rect x="240" y="80" width="90" height="90" rx="14" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="285" y1="70" x2="285" y2="80" stroke="#000" stroke-width="2"/>
  <line x1="285" y1="170" x2="285" y2="180" stroke="#000" stroke-width="2"/>
  <polyline points="252,128 268,128 276,108 288,148 296,128 318,128" fill="none" stroke="#000" stroke-width="2"/>
  <text x="285" y="200" text-anchor="middle" fill="#000" font-size="11">Smartwatch</text>
  <text x="285" y="216" text-anchor="middle" fill="#000" font-size="10">spots an odd heartbeat</text>
  <text x="285" y="230" text-anchor="middle" fill="#000" font-size="10">or a fall, right away</text>

  <!-- Earbud: noise cancel -->
  <circle cx="455" cy="120" r="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <path d="M455 92 q22 0 22 28" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="430" y1="100" x2="480" y2="140" stroke="#000" stroke-width="1.5"/>
  <line x1="480" y1="100" x2="430" y2="140" stroke="#000" stroke-width="1.5"/>
  <text x="455" y="124" text-anchor="middle" fill="#000" font-size="10">hush</text>
  <text x="455" y="180" text-anchor="middle" fill="#000" font-size="11">Earbuds</text>
  <text x="455" y="196" text-anchor="middle" fill="#000" font-size="10">cancel noise instantly</text>

  <!-- Doorbell camera: package -->
  <rect x="585" y="80" width="80" height="100" rx="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="625" cy="120" r="18" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <circle cx="625" cy="120" r="7" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <rect x="610" y="150" width="30" height="20" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="625" y="164" text-anchor="middle" fill="#000" font-size="9">box</text>
  <text x="625" y="200" text-anchor="middle" fill="#000" font-size="11">Doorbell camera</text>
  <text x="625" y="216" text-anchor="middle" fill="#000" font-size="10">recognizes a package</text>

  <!-- bottom band -->
  <rect x="40" y="290" width="620" height="60" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="350" y="314" text-anchor="middle" fill="#000" font-size="12">All of these decide things RIGHT ON THE GADGET, with no trip to the cloud.</text>
  <text x="350" y="334" text-anchor="middle" fill="#000" font-size="12">That means instant response, it works offline, and your voice/video stays private.</text>

  <text x="350" y="384" text-anchor="middle" fill="#000" font-weight="bold">On-device AI is already all around you, often in tiny low-power chips.</text>
</svg>
