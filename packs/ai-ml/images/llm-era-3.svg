<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="400" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">How you ask matters; and the context window is the model's short-term memory</text>

  <defs>
    <marker id="ahdL3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Vague prompt path -->
  <rect x="40" y="60" width="200" height="56" rx="6" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="140" y="82" text-anchor="middle" fill="#000" font-weight="bold">Vague prompt</text>
  <text x="140" y="102" text-anchor="middle" fill="#000" font-size="11">"Tell me about dogs."</text>
  <line x1="240" y1="88" x2="300" y2="88" stroke="#000" stroke-width="2" marker-end="url(#ahdL3)"/>
  <rect x="300" y="60" width="220" height="56" rx="6" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="410" y="82" text-anchor="middle" fill="#000" font-size="11">Vague, rambling answer</text>
  <text x="410" y="102" text-anchor="middle" fill="#000" font-size="10">(could be about anything)</text>

  <!-- Clear prompt path -->
  <rect x="40" y="132" width="200" height="86" rx="6" fill="#ffffff" stroke="#000" stroke-width="3"/>
  <text x="140" y="152" text-anchor="middle" fill="#000" font-weight="bold">Clear prompt</text>
  <text x="140" y="170" text-anchor="middle" fill="#000" font-size="10">"List 3 dog breeds good</text>
  <text x="140" y="184" text-anchor="middle" fill="#000" font-size="10">for apartments. Here's an</text>
  <text x="140" y="198" text-anchor="middle" fill="#000" font-size="10">example. Think step by step."</text>
  <text x="140" y="212" text-anchor="middle" fill="#000" font-size="9" font-weight="bold">(example = "few-shot")</text>
  <line x1="240" y1="175" x2="300" y2="175" stroke="#000" stroke-width="2.5" marker-end="url(#ahdL3)"/>
  <rect x="300" y="138" width="220" height="74" rx="6" fill="#ffffff" stroke="#000" stroke-width="3"/>
  <text x="410" y="162" text-anchor="middle" fill="#000" font-weight="bold" font-size="11">Focused, useful answer</text>
  <text x="410" y="182" text-anchor="middle" fill="#000" font-size="10">1. Bulldog  2. Pug</text>
  <text x="410" y="198" text-anchor="middle" fill="#000" font-size="10">3. Cavalier ... clear steps</text>

  <text x="540" y="120" fill="#000" font-size="11" font-weight="bold">Better asking:</text>
  <text x="548" y="140" fill="#000" font-size="10">- clear instructions</text>
  <text x="548" y="156" fill="#000" font-size="10">- examples (few-shot)</text>
  <text x="548" y="172" fill="#000" font-size="10">- "think step by step"</text>
  <text x="540" y="196" fill="#000" font-size="9">A bigger prompt is NOT</text>
  <text x="540" y="208" fill="#000" font-size="9">automatically better -</text>
  <text x="540" y="220" fill="#000" font-size="9">clarity beats length.</text>

  <!-- context window as a sliding box over a long ribbon of text -->
  <text x="380" y="258" text-anchor="middle" fill="#000" font-size="13" font-weight="bold">The context window: how much text it can consider at once</text>

  <!-- long ribbon -->
  <rect x="60" y="278" width="640" height="40" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="70" y="302" fill="#000" font-size="10">...older words... older words... older words... older words... recent words... newest words</text>

  <!-- the window (sliding box) -->
  <rect x="430" y="270" width="280" height="56" fill="none" stroke="#000" stroke-width="3"/>
  <text x="570" y="338" text-anchor="middle" fill="#000" font-size="11" font-weight="bold">context window (what it can "see" now)</text>

  <!-- arrow showing it slides forward, forgetting the far left -->
  <line x1="430" y1="262" x2="700" y2="262" stroke="#000" stroke-width="2" marker-end="url(#ahdL3)"/>
  <text x="200" y="338" text-anchor="middle" fill="#000" font-size="10">text that scrolled out of the window is forgotten</text>

  <line x1="60" y1="356" x2="700" y2="356" stroke="#000" stroke-width="1"/>
  <text x="380" y="376" text-anchor="middle" fill="#000" font-size="11">Steer the model with words. The context window is its short-term memory; it forgets anything beyond that window.</text>
</svg>
