<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 340" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="620" height="340" fill="#ffffff"/>
  <text x="310" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">What a "model" is: a box with adjustable knobs</text>

  <defs>
    <marker id="ah4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- input -->
  <rect x="30" y="120" width="120" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="90" y="146" text-anchor="middle" fill="#000">INPUT</text>
  <text x="90" y="164" text-anchor="middle" fill="#000" font-size="11">features (the data in)</text>

  <!-- model box -->
  <rect x="230" y="95" width="160" height="110" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="310" y="118" text-anchor="middle" font-weight="bold" fill="#000">MODEL</text>
  <!-- knobs -->
  <circle cx="265" cy="150" r="13" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="265" y1="150" x2="265" y2="139" stroke="#000" stroke-width="2"/>
  <circle cx="310" cy="150" r="13" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="310" y1="150" x2="318" y2="141" stroke="#000" stroke-width="2"/>
  <circle cx="355" cy="150" r="13" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="355" y1="150" x2="348" y2="159" stroke="#000" stroke-width="2"/>
  <text x="310" y="192" text-anchor="middle" fill="#000" font-size="11">knobs = parameters</text>

  <!-- output -->
  <rect x="470" y="120" width="120" height="60" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="530" y="146" text-anchor="middle" fill="#000">OUTPUT</text>
  <text x="530" y="164" text-anchor="middle" fill="#000" font-size="11">prediction</text>

  <!-- arrows -->
  <line x1="150" y1="150" x2="228" y2="150" stroke="#000" stroke-width="2" marker-end="url(#ah4)"/>
  <line x1="390" y1="150" x2="468" y2="150" stroke="#000" stroke-width="2" marker-end="url(#ah4)"/>

  <!-- training note -->
  <text x="310" y="250" text-anchor="middle" fill="#000" font-weight="bold">TRAINING = adjust the knobs so the output fits the example answers.</text>
  <text x="310" y="278" text-anchor="middle" fill="#000">INFERENCE = use the trained model on a brand-new input.</text>
  <text x="310" y="306" text-anchor="middle" fill="#000" font-size="12">A model is just a function with lots of tunable knobs.</text>
</svg>
