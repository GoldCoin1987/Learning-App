<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="720" height="360" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Pooling: shrink the grid down to keep only the gist</text>

  <defs>
    <marker id="ahd2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- BEFORE: big 4x4 grid -->
  <text x="170" y="64" text-anchor="middle" fill="#000" font-weight="bold">before: a detailed 4x4 grid</text>
  <!-- grid x=90..250 (cell 40), y=80..240 -->
  <line x1="90" y1="80" x2="250" y2="80" stroke="#000" stroke-width="1"/>
  <line x1="90" y1="120" x2="250" y2="120" stroke="#000" stroke-width="1"/>
  <line x1="90" y1="160" x2="250" y2="160" stroke="#000" stroke-width="1"/>
  <line x1="90" y1="200" x2="250" y2="200" stroke="#000" stroke-width="1"/>
  <line x1="90" y1="240" x2="250" y2="240" stroke="#000" stroke-width="1"/>
  <line x1="90" y1="80" x2="90" y2="240" stroke="#000" stroke-width="1"/>
  <line x1="130" y1="80" x2="130" y2="240" stroke="#000" stroke-width="1"/>
  <line x1="170" y1="80" x2="170" y2="240" stroke="#000" stroke-width="1"/>
  <line x1="210" y1="80" x2="210" y2="240" stroke="#000" stroke-width="1"/>
  <line x1="250" y1="80" x2="250" y2="240" stroke="#000" stroke-width="1"/>

  <!-- highlight one 2x2 block that becomes one cell -->
  <rect x="90" y="80" width="80" height="80" fill="none" stroke="#000" stroke-width="3"/>
  <text x="110" y="105" text-anchor="middle" fill="#000" font-size="11">7</text>
  <text x="150" y="105" text-anchor="middle" fill="#000" font-size="11">3</text>
  <text x="110" y="145" text-anchor="middle" fill="#000" font-size="11">2</text>
  <text x="150" y="145" text-anchor="middle" fill="#000" font-size="11">5</text>

  <text x="170" y="262" text-anchor="middle" fill="#000" font-size="11">Each 2x2 block is summarized by one number</text>
  <text x="170" y="278" text-anchor="middle" fill="#000" font-size="11">(for example, keep the largest: 7).</text>

  <!-- arrow -->
  <line x1="280" y1="160" x2="380" y2="160" stroke="#000" stroke-width="2.5" marker-end="url(#ahd2)"/>
  <text x="330" y="150" text-anchor="middle" fill="#000" font-weight="bold">pool</text>

  <!-- AFTER: small 2x2 grid -->
  <text x="480" y="64" text-anchor="middle" fill="#000" font-weight="bold">after: a smaller 2x2 summary</text>
  <!-- grid x=440..520 (cell 40), y=120..200 -->
  <line x1="440" y1="120" x2="520" y2="120" stroke="#000" stroke-width="1.5"/>
  <line x1="440" y1="160" x2="520" y2="160" stroke="#000" stroke-width="1.5"/>
  <line x1="440" y1="200" x2="520" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="440" y1="120" x2="440" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="480" y1="120" x2="480" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="520" y1="120" x2="520" y2="200" stroke="#000" stroke-width="1.5"/>
  <rect x="440" y="120" width="40" height="40" fill="none" stroke="#000" stroke-width="3"/>
  <text x="460" y="145" text-anchor="middle" fill="#000" font-weight="bold">7</text>

  <text x="600" y="150" text-anchor="middle" fill="#000" font-size="11">Fewer cells to handle,</text>
  <text x="600" y="166" text-anchor="middle" fill="#000" font-size="11">but the important</text>
  <text x="600" y="182" text-anchor="middle" fill="#000" font-size="11">signal is kept.</text>

  <!-- takeaways -->
  <line x1="60" y1="306" x2="660" y2="306" stroke="#000" stroke-width="1"/>
  <text x="360" y="328" text-anchor="middle" fill="#000" font-weight="bold">Pooling = shrinking/summarizing the grid to keep the gist and cut the detail.</text>
  <text x="360" y="348" text-anchor="middle" fill="#000" font-size="11">This makes the network smaller and faster, and less fussy about exactly where a pattern sits.</text>
</svg>
