<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">k-Nearest Neighbors: vote of the closest examples</text>

  <!-- the circle around the nearest k -->
  <circle cx="320" cy="220" r="118" fill="#ffffff" stroke="#000" stroke-width="2" stroke-dasharray="6,5"/>
  <text x="320" y="120" text-anchor="middle" fill="#000" font-size="11">circle holds the k = 5 nearest neighbors</text>

  <!-- new point to classify (white star-ish square with ?) -->
  <rect x="306" y="206" width="28" height="28" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="320" y="226" text-anchor="middle" fill="#000" font-weight="bold" font-size="14">?</text>
  <text x="320" y="258" text-anchor="middle" fill="#000" font-size="11">new point</text>

  <!-- inside circle: class A = filled black dots (3 of them) -->
  <circle cx="270" cy="190" r="9" fill="#000"/>
  <circle cx="360" cy="175" r="9" fill="#000"/>
  <circle cx="358" cy="262" r="9" fill="#000"/>

  <!-- inside circle: class B = open squares (2 of them) -->
  <rect x="248" y="248" width="18" height="18" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <rect x="300" y="146" width="18" height="18" fill="#ffffff" stroke="#000" stroke-width="2.5"/>

  <!-- outside circle: far-away points (not counted) -->
  <circle cx="120" cy="110" r="9" fill="#000"/>
  <circle cx="540" cy="130" r="9" fill="#000"/>
  <rect x="110" y="320" width="18" height="18" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <rect x="520" y="330" width="18" height="18" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <circle cx="560" cy="280" r="9" fill="#000"/>
  <text x="150" y="150" text-anchor="start" fill="#000" font-size="11">far away &#8594; not counted</text>

  <!-- legend -->
  <circle cx="120" cy="382" r="9" fill="#000"/>
  <text x="136" y="386" text-anchor="start" fill="#000" font-size="11">Class A (filled)</text>
  <rect x="250" y="373" width="18" height="18" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="276" y="386" text-anchor="start" fill="#000" font-size="11">Class B (open)</text>

  <!-- tally -->
  <rect x="410" y="360" width="200" height="44" rx="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="510" y="378" text-anchor="middle" fill="#000" font-size="11">3 filled vs 2 open &#8594;</text>
  <text x="510" y="394" text-anchor="middle" fill="#000" font-weight="bold">majority wins: Class A</text>

  <text x="320" y="344" text-anchor="middle" fill="#000" font-size="11">Look at the k closest neighbors, take a majority vote.  "You're judged by the company you keep."</text>
</svg>
