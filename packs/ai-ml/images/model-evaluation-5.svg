<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">5-fold cross-validation: every slice takes a turn being the test slice</text>

  <text x="320" y="50" text-anchor="middle" fill="#000" font-size="11">Split the data into 5 equal slices (folds).  Rotate which one is held out, then average the 5 scores.</text>

  <!-- legend -->
  <rect x="150" y="62" width="22" height="16" fill="#000"/>
  <text x="178" y="75" text-anchor="start" fill="#000" font-size="11">= held-out TEST slice</text>
  <rect x="350" y="62" width="22" height="16" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="378" y="75" text-anchor="start" fill="#000" font-size="11">= TRAIN slices</text>

  <!-- Round 1: fold 1 is test -->
  <text x="70" y="115" text-anchor="middle" fill="#000" font-size="11">Round 1</text>
  <rect x="120" y="98" width="80" height="26" fill="#000" stroke="#000" stroke-width="2"/>
  <rect x="200" y="98" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="280" y="98" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="360" y="98" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="440" y="98" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="560" y="115" text-anchor="middle" fill="#000" font-size="11">score 1</text>

  <!-- Round 2: fold 2 is test -->
  <text x="70" y="153" text-anchor="middle" fill="#000" font-size="11">Round 2</text>
  <rect x="120" y="136" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="200" y="136" width="80" height="26" fill="#000" stroke="#000" stroke-width="2"/>
  <rect x="280" y="136" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="360" y="136" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="440" y="136" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="560" y="153" text-anchor="middle" fill="#000" font-size="11">score 2</text>

  <!-- Round 3: fold 3 is test -->
  <text x="70" y="191" text-anchor="middle" fill="#000" font-size="11">Round 3</text>
  <rect x="120" y="174" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="200" y="174" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="280" y="174" width="80" height="26" fill="#000" stroke="#000" stroke-width="2"/>
  <rect x="360" y="174" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="440" y="174" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="560" y="191" text-anchor="middle" fill="#000" font-size="11">score 3</text>

  <!-- Round 4: fold 4 is test -->
  <text x="70" y="229" text-anchor="middle" fill="#000" font-size="11">Round 4</text>
  <rect x="120" y="212" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="200" y="212" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="280" y="212" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="360" y="212" width="80" height="26" fill="#000" stroke="#000" stroke-width="2"/>
  <rect x="440" y="212" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="560" y="229" text-anchor="middle" fill="#000" font-size="11">score 4</text>

  <!-- Round 5: fold 5 is test -->
  <text x="70" y="267" text-anchor="middle" fill="#000" font-size="11">Round 5</text>
  <rect x="120" y="250" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="200" y="250" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="280" y="250" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="360" y="250" width="80" height="26" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <rect x="440" y="250" width="80" height="26" fill="#000" stroke="#000" stroke-width="2"/>
  <text x="560" y="267" text-anchor="middle" fill="#000" font-size="11">score 5</text>

  <!-- average box -->
  <rect x="200" y="300" width="240" height="40" rx="10" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="320" y="325" text-anchor="middle" fill="#000" font-weight="bold">Average the 5 scores = the CV estimate</text>

  <text x="320" y="372" text-anchor="middle" fill="#000">Averaging over 5 rotations is more trustworthy than betting on one lucky (or unlucky) split.</text>
  <text x="320" y="398" text-anchor="middle" fill="#000" font-size="11">Honesty rule: still keep a final, untouched test set aside &#8212; never tune on it.</text>
</svg>
