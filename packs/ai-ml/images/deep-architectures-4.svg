<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="360" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Attention: each word looks at ALL the others and focuses on what matters</text>

  <defs>
    <marker id="ahd4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <text x="380" y="58" text-anchor="middle" fill="#000" font-size="11">Sentence: "The cat did not cross the road because it was tired."</text>

  <!-- words in a row near the top; the focal word "it" sits below, arrows go up to each -->
  <!-- top row words -->
  <rect x="70" y="86" width="70" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="105" y="107" text-anchor="middle" fill="#000">The</text>
  <rect x="160" y="86" width="70" height="32" fill="#ffffff" stroke="#000" stroke-width="3.5"/>
  <text x="195" y="107" text-anchor="middle" fill="#000" font-weight="bold">cat</text>
  <rect x="250" y="86" width="70" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="285" y="107" text-anchor="middle" fill="#000">cross</text>
  <rect x="340" y="86" width="70" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="375" y="107" text-anchor="middle" fill="#000">the</text>
  <rect x="430" y="86" width="70" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="465" y="107" text-anchor="middle" fill="#000">road</text>
  <rect x="520" y="86" width="80" height="32" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="560" y="107" text-anchor="middle" fill="#000">tired</text>

  <!-- focal word "it" at bottom center -->
  <rect x="330" y="250" width="90" height="38" rx="6" fill="#ffffff" stroke="#000" stroke-width="3"/>
  <text x="375" y="274" text-anchor="middle" fill="#000" font-weight="bold">"it"</text>
  <text x="375" y="308" text-anchor="middle" fill="#000" font-size="11">the word doing the looking</text>

  <!-- weighted attention arrows from "it" to each word; thickness = focus weight -->
  <!-- strong to "cat" -->
  <line x1="360" y1="250" x2="200" y2="122" stroke="#000" stroke-width="4" marker-end="url(#ahd4)"/>
  <text x="246" y="196" text-anchor="middle" fill="#000" font-size="11" font-weight="bold">strong focus</text>
  <!-- weak to others -->
  <line x1="350" y1="250" x2="110" y2="122" stroke="#000" stroke-width="1" marker-end="url(#ahd4)"/>
  <line x1="368" y1="250" x2="288" y2="122" stroke="#000" stroke-width="1" marker-end="url(#ahd4)"/>
  <line x1="382" y1="250" x2="378" y2="122" stroke="#000" stroke-width="1" marker-end="url(#ahd4)"/>
  <line x1="392" y1="250" x2="466" y2="122" stroke="#000" stroke-width="1" marker-end="url(#ahd4)"/>
  <line x1="405" y1="252" x2="556" y2="122" stroke="#000" stroke-width="1.5" marker-end="url(#ahd4)"/>
  <text x="500" y="210" text-anchor="middle" fill="#000" font-size="11">thin arrows = weak focus</text>

  <!-- takeaways -->
  <line x1="60" y1="326" x2="700" y2="326" stroke="#000" stroke-width="1"/>
  <text x="380" y="346" text-anchor="middle" fill="#000" font-size="11">To resolve "it", the model puts most weight on "cat". It learns WHAT TO FOCUS ON, weighing every word at once.</text>
</svg>
