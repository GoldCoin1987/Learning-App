<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 410" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="410" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Three common jobs for signal AI</text>
  <text x="380" y="48" text-anchor="middle" font-size="12" fill="#000">These are the same supervised tasks as before, now on signals.</text>

  <!-- CLASSIFY -->
  <rect x="40" y="70" width="220" height="220" fill="none" stroke="#000" stroke-width="2"/>
  <text x="150" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">CLASSIFY</text>
  <line x1="60" y1="106" x2="240" y2="106" stroke="#000" stroke-width="1"/>
  <text x="150" y="128" text-anchor="middle" font-size="11" fill="#000">What IS this?</text>
  <text x="150" y="150" text-anchor="middle" font-size="11" fill="#000">Pick the right label.</text>
  <text x="150" y="184" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Example:</text>
  <text x="150" y="204" text-anchor="middle" font-size="11" fill="#000">Is this heartbeat</text>
  <text x="150" y="220" text-anchor="middle" font-size="11" fill="#000">normal or abnormal?</text>
  <text x="150" y="248" text-anchor="middle" font-size="11" fill="#000">(or: which word?</text>
  <text x="150" y="264" text-anchor="middle" font-size="11" fill="#000">which song?)</text>

  <!-- DETECT -->
  <rect x="280" y="70" width="220" height="220" fill="none" stroke="#000" stroke-width="2"/>
  <text x="390" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">DETECT</text>
  <line x1="300" y1="106" x2="480" y2="106" stroke="#000" stroke-width="1"/>
  <text x="390" y="128" text-anchor="middle" font-size="11" fill="#000">Is the thing present</text>
  <text x="390" y="144" text-anchor="middle" font-size="11" fill="#000">right now? Yes / no.</text>
  <text x="390" y="184" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Example:</text>
  <text x="390" y="204" text-anchor="middle" font-size="11" fill="#000">Did someone just say</text>
  <text x="390" y="220" text-anchor="middle" font-size="11" fill="#000">the wake-word</text>
  <text x="390" y="236" text-anchor="middle" font-size="11" fill="#000">"Hey Assistant"?</text>
  <text x="390" y="264" text-anchor="middle" font-size="11" fill="#000">(or: a fault, an alarm)</text>

  <!-- ESTIMATE -->
  <rect x="520" y="70" width="220" height="220" fill="none" stroke="#000" stroke-width="2"/>
  <text x="630" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">ESTIMATE</text>
  <text x="630" y="112" text-anchor="middle" font-size="10" fill="#000">(a number / regress)</text>
  <line x1="540" y1="120" x2="720" y2="120" stroke="#000" stroke-width="1"/>
  <text x="630" y="142" text-anchor="middle" font-size="11" fill="#000">Put a number on it.</text>
  <text x="630" y="184" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Example:</text>
  <text x="630" y="204" text-anchor="middle" font-size="11" fill="#000">What is the</text>
  <text x="630" y="220" text-anchor="middle" font-size="11" fill="#000">heart rate (beats</text>
  <text x="630" y="236" text-anchor="middle" font-size="11" fill="#000">per minute)?</text>
  <text x="630" y="264" text-anchor="middle" font-size="11" fill="#000">(or: a speed)</text>

  <!-- takeaway -->
  <line x1="40" y1="312" x2="720" y2="312" stroke="#000" stroke-width="1"/>
  <text x="380" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">CLASSIFY = which kind.  DETECT = present or not.  ESTIMATE = how much (a number).</text>
  <text x="380" y="366" text-anchor="middle" font-size="12" fill="#000">Watch the mix-up: "is a wake-word there?" is DETECT, not naming which of many words it is.</text>
  <text x="380" y="392" text-anchor="middle" font-size="12" fill="#000">Naming which word from many choices would be CLASSIFY.</text>
</svg>
