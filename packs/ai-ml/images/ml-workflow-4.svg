<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 350" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="640" height="350" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Data leakage = seeing the exam answers before the test</text>

  <defs>
    <marker id="ahw4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- TRAIN box -->
  <rect x="60" y="80" width="200" height="90" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="160" y="108" text-anchor="middle" fill="#000" font-weight="bold">TRAINING</text>
  <text x="160" y="130" text-anchor="middle" fill="#000" font-size="11">studying for the exam</text>
  <text x="160" y="150" text-anchor="middle" fill="#000" font-size="11">(the model learns here)</text>

  <!-- TEST box -->
  <rect x="380" y="80" width="200" height="90" fill="#ffffff" stroke="#000" stroke-width="4"/>
  <text x="480" y="108" text-anchor="middle" fill="#000" font-weight="bold">TEST</text>
  <text x="480" y="130" text-anchor="middle" fill="#000" font-size="11">the real exam</text>
  <text x="480" y="150" text-anchor="middle" fill="#000" font-size="11">(must stay unseen)</text>

  <!-- leak arrow from TEST into TRAINING -->
  <path d="M380,125 L260,125" fill="none" stroke="#000" stroke-width="3" marker-end="url(#ahw4)"/>
  <text x="320" y="116" text-anchor="middle" fill="#000" font-size="11">LEAK: test info sneaks in</text>

  <!-- warning sign -->
  <path d="M320,185 L300,225 L340,225 Z" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="320" y="220" text-anchor="middle" fill="#000" font-weight="bold" font-size="16">!</text>

  <text x="320" y="258" text-anchor="middle" fill="#000" font-weight="bold">Studying the exact exam questions: you "ace" practice but learn nothing.</text>
  <text x="320" y="282" text-anchor="middle" fill="#000">Scores look amazing in the lab, then the model fails on truly new data.</text>
  <text x="320" y="312" text-anchor="middle" fill="#000" font-size="11">Fix: fit cleaning &amp; scaling on the TRAINING data only, then apply to test.</text>
</svg>
