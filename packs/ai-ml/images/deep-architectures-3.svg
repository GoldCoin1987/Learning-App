<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="340" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">An RNN reads one word at a time, carrying a memory forward</text>

  <defs>
    <marker id="ahd3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- four steps, each: word box (bottom) -> cell (middle), memory arrow connects cells -->
  <!-- Step centers at x = 120, 300, 480, 660 -->

  <!-- word boxes (inputs) -->
  <rect x="80" y="250" width="80" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="272" text-anchor="middle" fill="#000" font-weight="bold">The</text>
  <rect x="260" y="250" width="80" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="300" y="272" text-anchor="middle" fill="#000" font-weight="bold">cat</text>
  <rect x="440" y="250" width="80" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="480" y="272" text-anchor="middle" fill="#000" font-weight="bold">sat</text>
  <rect x="620" y="250" width="80" height="34" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="660" y="272" text-anchor="middle" fill="#000" font-weight="bold">down</text>

  <!-- cells -->
  <rect x="86" y="150" width="68" height="50" rx="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="120" y="180" text-anchor="middle" fill="#000" font-size="11">step 1</text>
  <rect x="266" y="150" width="68" height="50" rx="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="300" y="180" text-anchor="middle" fill="#000" font-size="11">step 2</text>
  <rect x="446" y="150" width="68" height="50" rx="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="480" y="180" text-anchor="middle" fill="#000" font-size="11">step 3</text>
  <rect x="626" y="150" width="68" height="50" rx="8" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="660" y="180" text-anchor="middle" fill="#000" font-size="11">step 4</text>

  <!-- word -> cell arrows -->
  <line x1="120" y1="248" x2="120" y2="202" stroke="#000" stroke-width="2" marker-end="url(#ahd3)"/>
  <line x1="300" y1="248" x2="300" y2="202" stroke="#000" stroke-width="2" marker-end="url(#ahd3)"/>
  <line x1="480" y1="248" x2="480" y2="202" stroke="#000" stroke-width="2" marker-end="url(#ahd3)"/>
  <line x1="660" y1="248" x2="660" y2="202" stroke="#000" stroke-width="2" marker-end="url(#ahd3)"/>

  <!-- memory arrows between cells (the carried state) -->
  <line x1="156" y1="175" x2="264" y2="175" stroke="#000" stroke-width="2.5" marker-end="url(#ahd3)"/>
  <line x1="336" y1="175" x2="444" y2="175" stroke="#000" stroke-width="2.5" marker-end="url(#ahd3)"/>
  <line x1="516" y1="175" x2="624" y2="175" stroke="#000" stroke-width="2.5" marker-end="url(#ahd3)"/>
  <text x="210" y="140" text-anchor="middle" fill="#000" font-size="11">memory</text>
  <text x="390" y="140" text-anchor="middle" fill="#000" font-size="11">memory</text>
  <text x="570" y="140" text-anchor="middle" fill="#000" font-size="11">memory</text>
  <text x="380" y="120" text-anchor="middle" fill="#000" font-weight="bold">a running memory (state) is passed from each step to the next</text>

  <!-- order arrow at very bottom -->
  <text x="380" y="306" text-anchor="middle" fill="#000" font-size="11">Order matters: each step sees the current word AND the memory of all the words before it.</text>

  <line x1="60" y1="318" x2="700" y2="318" stroke="#000" stroke-width="1"/>
  <text x="380" y="336" text-anchor="middle" fill="#000" font-size="11">Like reading a sentence word by word. Plain RNNs forget far-back words; LSTMs/GRUs add gates to remember longer.</text>
</svg>
