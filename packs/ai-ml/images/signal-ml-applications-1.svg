<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="760" height="430" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">Everyday AI that listens to signals</text>
  <text x="380" y="48" text-anchor="middle" font-size="12" fill="#000">A signal is a measurement that changes over time. AI turns each one into an answer.</text>

  <!-- box 1: voice -> words -->
  <rect x="40" y="80" width="150" height="150" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="115" y="104" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Voice</text>
  <!-- little waveform -->
  <polyline points="60,150 72,130 84,170 96,135 108,165 120,140 132,160 144,150 156,150 168,150" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="115" y="196" text-anchor="middle" font-size="20" fill="#000">&#8594;</text>
  <text x="115" y="220" text-anchor="middle" font-size="12" fill="#000">the words you said</text>

  <!-- box 2: heartbeat -> normal/abnormal -->
  <rect x="210" y="80" width="150" height="150" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="285" y="104" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Heartbeat</text>
  <!-- ecg-like trace -->
  <polyline points="228,150 250,150 256,150 260,120 264,180 268,150 290,150 300,150 306,120 310,180 314,150 336,150" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="285" y="196" text-anchor="middle" font-size="20" fill="#000">&#8594;</text>
  <text x="285" y="220" text-anchor="middle" font-size="12" fill="#000">normal vs abnormal</text>

  <!-- box 3: song -> title -->
  <rect x="400" y="80" width="150" height="150" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="475" y="104" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">A song clip</text>
  <text x="475" y="158" text-anchor="middle" font-size="34" fill="#000">&#9834;</text>
  <text x="475" y="196" text-anchor="middle" font-size="20" fill="#000">&#8594;</text>
  <text x="475" y="220" text-anchor="middle" font-size="12" fill="#000">the song's title</text>

  <!-- box 4: machine vibration -> fault -->
  <rect x="570" y="80" width="150" height="150" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="645" y="104" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Machine "hum"</text>
  <!-- jittery vibration -->
  <polyline points="588,150 596,138 604,162 612,134 620,166 628,140 636,160 644,132 652,168 660,142 668,158 676,150 700,150" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="645" y="196" text-anchor="middle" font-size="20" fill="#000">&#8594;</text>
  <text x="645" y="220" text-anchor="middle" font-size="12" fill="#000">healthy vs fault</text>

  <!-- takeaways -->
  <line x1="40" y1="270" x2="720" y2="270" stroke="#000" stroke-width="1"/>
  <text x="380" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">Same playbook every time: a stream of measurements goes in, a useful answer comes out.</text>
  <text x="380" y="326" text-anchor="middle" font-size="12" fill="#000">Voice assistants, health wearables, music apps and factory sensors all run on signals.</text>
  <text x="380" y="352" text-anchor="middle" font-size="12" fill="#000">Radar and sonar are just two more sensors that fit the very same pattern.</text>
  <text x="380" y="384" text-anchor="middle" font-size="12" fill="#000">The raw stream of numbers is hard to learn from directly, so we reshape it first.</text>
</svg>
